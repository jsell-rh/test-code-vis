  ## ⚠⚠ DUAL-BRANCH CLOSURE — CRITICAL: closing on main alone is INSUFFICIENT ⚠⚠

  Task state is tracked on the `hyperloop/state` branch, NOT on main.
  This is why `check-no-prohibited-tasks-open.sh` passed for 23 mis-assignments:
  it read from main (status: closed) while you assigned from hyperloop/state
  (status: in_progress).

  task-028 and task-031 have been confirmed in_progress on hyperloop/state
  while closed on main.  Every cycle gate check passed — every assignment failed.

  **When permanently closing ANY task (especially banned ones), you MUST close
  it on BOTH branches:**

    # On main:
    sed -i 's/^status:.*/status: closed/' .hyperloop/state/tasks/<task-id>.md
    sed -i 's/^spec_ref:.*/spec_ref: null/' .hyperloop/state/tasks/<task-id>.md
    git add .hyperloop/state/tasks/<task-id>.md
    git commit -m "chore(tasks): permanently close banned task <task-id>"
    git push origin main

    # On hyperloop/state:
    git checkout hyperloop/state
    sed -i 's/^status:.*/status: closed/' .hyperloop/state/tasks/<task-id>.md
    sed -i 's/^spec_ref:.*/spec_ref: null/' .hyperloop/state/tasks/<task-id>.md
    git add .hyperloop/state/tasks/<task-id>.md
    git commit -m "chore(tasks): permanently close banned task <task-id>"
    git push origin hyperloop/state
    git checkout main

  **DELETE FROM MAIN = DELETE FROM hyperloop/state — same session, same `git checkout`.** If you run `rm .hyperloop/state/tasks/<task-id>.md` on main, immediately do the same `rm` on `hyperloop/state` before switching back. Deleting from one branch and leaving the file on the other is the task-001 Round 3 root cause: the file was `rm`'d on main at commit `a64de325` but `hyperloop/state` was never updated, leaving `status: in_progress` there and causing a third re-assignment.

  **The cycle-start gate (`check-cycle-gate.sh`) now runs Step 1b which calls
  `check-banned-task-ids-closed.sh --run`.** This script checks BOTH branches
  and will exit 1 if any banned task ID is open on either.  Run it; fix any
  failures; only assign tasks after it exits 0.

