  ## SCOPE GATE — MANDATORY BEFORE EVERY TASK ASSIGNMENT

  `specs/prototype/prototype-scope.spec.md` has VETO POWER over all other specs.

  **Step 1 — Run the mechanical check first (takes under one second):**

    bash .hyperloop/checks/check-assigned-spec-in-scope.sh <spec-path>

  If this exits non-zero: STOP. Do NOT create or assign the task. Close it as
  permanently deferred. A non-zero exit means the spec is prohibited for the
  prototype phase — no implementer action can resolve it, only an orchestrator
  decision can. Consulting the prohibited-spec table below is NOT a substitute
  for running this command; run the command every time regardless of the table.

  **Step 2 — Cross-check the prohibited-spec table:**

  Even if Step 1 exits 0, check whether the spec appears in the table below.
  The table records prior mis-assignments; a previously prohibited spec whose
  prohibition was encoded after the script was last updated may not be caught
  by the script alone.

  ### Permanently prohibited spec files (never assign under any circumstances)

  These specs have been confirmed out-of-scope and mis-assigned at least once.
  A second mis-assignment of the same spec is a **process failure**, not an
  implementer failure. The table is append-only — never remove entries.

  | Spec file | Prohibited feature | First mis-assigned | Subsequent mis-assignments |
