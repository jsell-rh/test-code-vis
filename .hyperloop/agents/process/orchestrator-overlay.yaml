  ### SCOPE-PROHIBITION FINDINGS — MANDATORY FIRST ACTION IN EVERY CYCLE

  When the Findings section you receive at the start of a cycle contains a report
  classified as SCOPE-PROHIBITION FAIL, your mandatory first action for that task
  is permanent closure — before scheduling any re-attempt, before reading any spec,
  before assigning any other task in the cycle.

  1. Read the report's "Required Orchestrator Actions" / "Recommended Orchestrator
     Action" section.  It is NOT a suggestion — it is the required set of orchestrator
     actions for that task.
  2. Permanently close the task.  Do NOT schedule a re-attempt under any task ID —
     neither the original ID nor any new number describing the same spec or feature.
  3. Verify the spec is listed in the prohibited-spec table above and in
     `check-assigned-spec-in-scope.sh`.  If it is absent from either, add it.
  4. Identify and close the upstream gap that put this spec back in the candidate
     pool.  A scope-prohibition FAIL from a previous cycle means the spec is STILL
     prohibited in this cycle — nothing between cycles makes a prohibited spec
     implementable without first revising `specs/prototype/prototype-scope.spec.md`.
  5. Delete the task's working branch immediately after closing (see BRANCH CLEANUP
     below).  Prohibited branches accumulate rebase conflicts against main; implementers
     cannot resolve them without doing prohibited implementation work.

  A scope-prohibition FAIL is NOT an implementation failure.  It is an assignment
  error.  Retrying it is not a fix — it is another assignment error.

  ### FAIL classification — scope-prohibition FAILs are permanent, never retryable

  There are two distinct FAIL types. Confusing them causes repeated mis-assignments.

  | FAIL type              | Identifying text in report                        | Response                          |
  |------------------------|---------------------------------------------------|-----------------------------------|
  | Scope-prohibition FAIL | "INVALID ASSIGNMENT" + scope check exit-1 output  | PERMANENTLY CLOSE — no re-attempt |
  | Implementation FAIL    | Failing checks, missing coverage, broken tests    | Schedule re-attempt               |

  A scope-prohibition FAIL report contains "INVALID ASSIGNMENT", quotes
  `check-assigned-spec-in-scope.sh` exit-1 output verbatim, and states that no
  implementation code was written. Nothing in this report is fixable. The spec itself
  is prohibited — a different implementer, a re-worded task, or a new task number for
  the same spec will reach the identical conclusion.

  **Before scheduling any retry or re-attempt:** Read the prior FAIL report first.
  If it contains "INVALID ASSIGNMENT" with scope-prohibition language, close the
  task permanently. Do not create a new task number for the same spec. Do not schedule
  a second attempt of the same task. task-031 (6 runs for understanding-modes),
  task-028 (9 attempts), the 8th attempt of task-024 (moldable-views), task-021
  (data-flow spec), and every prior scope-prohibited re-attempt were all process
  errors caused by treating a scope-prohibition FAIL as an implementation FAIL.
  Twenty-two total mis-assignments have occurred for these three specs. Each one
  produced the identical outcome.

  ### TABLE-FIRST RULE — check the table before ANY script

  The prohibited-spec table above is the AUTHORITATIVE source of truth. It does not
  require file I/O or a fail-report path to query — scan it with your eyes.

  **Before assigning or re-assigning ANY task:** look up the candidate spec path in
  the table. If it appears there, the decision is already made: PERMANENTLY CLOSED.
  Do NOT run a script, do NOT re-read the spec, do NOT create a new task number for
  it. The table entry supersedes all other considerations.

  The script checks (`check-assigned-spec-in-scope.sh`, `check-fail-report-classification.sh`)
  are supplementary — they catch specs NOT yet recorded in the table. They do not
  override the table for specs already listed.

  ### PRE-RETRY GATE — mandatory before every re-attempt

  Before creating a re-attempt task (same task ID OR a new task number for the
  same spec or feature), run the unified pre-retry gate:

    bash .hyperloop/checks/check-retry-not-scope-prohibited.sh <task-id>

  This script requires only the task ID — no file path lookup needed.  It runs
  three independent checks: (A) spec_ref scope, (B) task body keyword scan for
  prohibited feature language, (C) review file classification.  Any check failing
  exits 1.

  If this exits **non-zero**: STOP. Permanently close the task. Do NOT create a
  re-attempt under any task number, name, or framing.

  Only proceed with a re-attempt when this check exits 0.

  **This gate exists because task-028's scope-prohibition FAIL was retried NINE
  times and task-031 was re-named and retried SIX more times — FOURTEEN combined
  understanding-modes mis-assignments, all preventable by running the gate first.**

  Use the consolidated one-command cycle gate (runs BOTH queue audit AND per-task
  retry gate in one call — see CYCLE-START GATE above):

    bash .hyperloop/checks/check-cycle-gate.sh <task-id> [task-id ...]

  If it exits 1, the candidate pool is infected — close all flagged tasks before
  assigning anything. Re-run after closing to confirm exit 0.

  If you want to classify a specific FAIL report by file path, the lower-level
  script is still available:
    bash .hyperloop/checks/check-fail-report-classification.sh <fail-report-path>

  ### Invalid assignment protocol

  When an implementer returns a FAIL report whose only content is a
  `check-assigned-spec-in-scope.sh` exit-1 output:
  - Do NOT re-assign the same spec under any name or framing.
  - Do NOT schedule a re-attempt (same task ID or new task number) for this task.
  - Mark the task permanently deferred.
  - Add the spec to the prohibited-spec table above (with task reference) and
    in `pm-overlay.yaml` if not already listed.
  - Investigate why the spec entered the candidate pool and close that upstream gap.
  - Update `check-assigned-spec-in-scope.sh` if the prohibited spec is not already
    detected by the script (the script may lag behind the table).
  - Delete the task's working branch (see BRANCH CLEANUP below).

