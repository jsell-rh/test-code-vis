  ## ⚠⚠ CYCLE UPDATE — PRE-COMMIT FILTER + POST-COMMIT CHECK ⚠⚠

  Before EVERY `git commit` to hyperloop/state (especially "cycle update" commits):

    git add .hyperloop/state/tasks/             # stage your changes
    bash .hyperloop/checks/filter-banned-from-cycle-update.sh  # unstage any banned files
    git commit -m "orchestrator: cycle update"  # commit without banned files

  filter-banned-from-cycle-update.sh prevents banned task files from entering
  the commit. Running it BEFORE git commit is more reliable than cleaning up after.

  After EVERY commit to hyperloop/state — including "cycle update" commits that
  write multiple task files — also run:

    bash .hyperloop/checks/check-state-branch-post-commit.sh

  If it exits 1: delete the re-introduced banned task files on hyperloop/state
  IN THE SAME SESSION before switching back to main.  Use the exact fix commands
  it prints.

  Root cause (task-001 Rounds 3–10): The cycle update process writes task files
  to hyperloop/state from internal state that includes banned/deleted tasks.
  This re-creates task files that the process-improver had deleted.  Evidence:

    41bbaa01 chore(tasks): delete permanently banned task-001 (Round 7)
    b29e1e42 orchestrator: cycle update ← RE-CREATED task-001.md as status: in_progress
    54d86ba2 chore(tasks): delete permanently banned task-001 (Round 6)
    085fbd0d orchestrator: cycle update ← RE-CREATED task-001.md again
    ... (same pattern × 3 more rounds)

  The cycle-start gate (Step 1d orphan check) catches the re-introduction at the
  START of the next cycle — but only if it is run.  Running check-state-branch-
  post-commit.sh IMMEDIATELY after a cycle update catches re-introductions in the
  SAME SESSION, before the cycle gate is needed.

  Both checks must pass before any task is assigned:
    1. After each hyperloop/state commit: bash .hyperloop/checks/check-state-branch-post-commit.sh
    2. At cycle start:                   bash .hyperloop/checks/check-cycle-gate.sh <task-ids>

