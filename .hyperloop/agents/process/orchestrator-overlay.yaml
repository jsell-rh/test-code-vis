apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: orchestrator
guidelines: |
  ## PUSH MAIN BEFORE EVERY CYCLE — PREVENTS VERIFIER CHECK FAILURES

  **The very first action of every cycle — even before check-cycle-gate.sh:**

    git push origin main

  If local main is ahead of origin/main (e.g., after committing a new check script or
  overlay update without pushing), `check-main-local-vs-remote.sh` exits 1 in EVERY
  verifier worktree. Implementers cannot fix this — `git fetch origin main:main` cannot
  rewind local main. The result: multiple FAIL rounds on correct implementations.

  Observed pattern (task-108, rounds 7–9): orchestrator committed
  `fix(process): add mechanical check for FAIL lines in PASS reports` to local main
  but did not push. The branch had excellent coverage (172 Godot tests, 198 pytest, all
  spec requirements covered) but failed three extra rounds solely due to this state.

  **Checklist at cycle start:**
    1. git push origin main                                              # push FIRST
    2. bash .hyperloop/checks/check-cycle-gate.sh <task-ids from findings>  # gate check
    3. Only assign tasks after both steps succeed.

  ---

