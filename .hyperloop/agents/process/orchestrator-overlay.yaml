  ### BRANCH CLEANUP — mandatory when permanently closing a scope-prohibited task

  Prohibited task branches accumulate rebase conflicts against main because no
  implementation commits are ever made on them.  When the same task is re-assigned
  (same or different ID) the new branch inherits these conflicts and produces
  merge-conflict noise in files the implementer is not allowed to touch.

  Observed pattern (task-028 and task-031): both FAIL reports noted unresolvable
  rebase conflicts in godot/ files.  The implementers correctly refused to resolve
  them ("doing so would constitute implementation work on a prohibited task").
  Only the orchestrator can clean this up — by deleting the branch.

  When you permanently close a scope-prohibited task:
  1. Identify its working branch. Convention: `hyperloop/<task-id>`
     (e.g. `hyperloop/task-024`, `hyperloop/task-028`, `hyperloop/task-031`).
  2. Delete the remote branch immediately:
       git push origin --delete hyperloop/<task-id>
     If the branch does not exist remotely, skip silently.
  3. Do NOT merge, cherry-pick, or rebase the branch.  It contains only a
     scope-prohibition FAIL report — there is no implementation work to preserve.
  4. Delete the task file from the task queue:
       rm .hyperloop/state/tasks/<task-id>.md
     A task file that survives closure re-enters the candidate pool every cycle.
     Deleting the file is the only reliable way to prevent queue re-infection.
     If task history must be preserved, move it to `.hyperloop/state/closed/`.
  5. Confirm cleanup:
       bash .hyperloop/checks/check-cycle-gate.sh
     Exit 0 = queue is clean AND no prohibited branches remain.  Exit 1 lists survivors.

