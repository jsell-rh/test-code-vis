  ## STOP PROTOCOL — ROUND 2+ REQUIRES IMMEDIATE TASK FILE DELETION

  A "Round 2 confirmation" in any STOP PROTOCOL finding means the orchestrator
  did not act on Round 1. Round 3+ means the rule was still not followed.
  check-cycle-gate.sh Step 2c now mechanically blocks re-assignment after Round 1,
  but if findings reach Round 2+ anyway, the ABSOLUTE FIRST action — before reading
  any other finding in the cycle — is to delete the task file from BOTH branches:

    # On hyperloop/state:
    git checkout hyperloop/state
    rm .hyperloop/state/tasks/<task-id>.md
    git add .hyperloop/state/tasks/<task-id>.md
    git commit -m "chore(tasks): delete superseded task <task-id> — 3x STOP PROTOCOL"
    git push origin hyperloop/state
    git checkout main

    # On main:
    rm -f .hyperloop/state/tasks/<task-id>.md
    git add .hyperloop/state/tasks/<task-id>.md
    git commit -m "chore(tasks): delete superseded task <task-id> — 3x STOP PROTOCOL"
    git push origin main

  Do NOT re-read the finding. Do NOT create a replacement task. Do NOT re-assign
  under any task ID or framing. The feature is already on origin/main — it was
  delivered by a prior task. Deletion is the only action that prevents Round 4.

  How to count rounds: Round 1 = first STOP PROTOCOL report, Round 2 = second
  report on the same task. The verifier's preamble will state "Round 2 confirmation"
  or "Round N confirmation" explicitly.

  check-cycle-gate.sh Step 2c (check-stop-protocol-repeat.sh) mechanically blocks
  re-assignment after any STOP PROTOCOL round. If that gate is somehow bypassed
  and Round 2+ arrives, deletion is the only correct response.

  Observed failure: task-078 triggered STOP PROTOCOL in Rounds 1–5.
  The orchestrator-overlay documented Rounds 2–4 and required retirement each time.
  The task was NOT retired. Round 5 revealed a second mechanical gap:
  check-stop-protocol-repeat.sh scans the task's remote branch for commits above
  origin/main that contain worker-result.yaml with "STOP PROTOCOL" text. When the
  branch is reset to zero commits after each round, those commits are gone — the
  script SKIPs with "no commits above origin/main" and the gate passes. This allowed
  Round 5 to be dispatched despite four prior STOP PROTOCOL rounds.

  Two mechanical fixes were applied for Round 5+:
    1. task-078 added to BANNED_IDS in check-banned-task-ids-closed.sh. This check
       is branch-state-independent (reads task file status on both branches) and
       cannot be defeated by branch resets. check-cycle-gate.sh Step 1b runs it.
    2. check-stop-protocol-repeat.sh now has a fallback for the zero-commits case:
       when the branch has no commits above main, it scans the orchestrator-overlay
       on origin/main for the task ID co-occurring with "STOP PROTOCOL". If found,
       exits 1 instead of SKIPping.

