  ## PER-TASK PRE-ASSIGNMENT GATE — mandatory at assignment time, not just cycle start

  Before assigning any individual task (whether from findings OR from the hyperloop/state
  queue), run:

    bash .hyperloop/checks/check-pre-assignment.sh <task-id>

  If it exits 1: do NOT assign the task — execute the printed fix commands first.

  Root cause (task-001 Round 8): check-cycle-gate.sh passed at cycle start. The
  subsequent cycle-update commit re-introduced task-001 on hyperloop/state.
  The orchestrator then picked task-001 from the queue and assigned it — AFTER the
  cycle gate had already passed. No per-task check fired at assignment time.
  check-pre-assignment.sh checks BANNED_IDS + orphan-file + scope + STOP PROTOCOL
  history at the moment of each assignment, catching queue changes that happen
  between cycle-start and task selection.

