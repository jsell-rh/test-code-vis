apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: orchestrator
guidelines: |
  ## AUTO-CLEAN BANNED TASKS — MANDATORY BEFORE check-cycle-gate.sh

  Run `bash .hyperloop/checks/auto-clean-banned-state-tasks.sh` as the ABSOLUTE
  FIRST action at every cycle start — before check-cycle-gate.sh, before reading
  any finding — to automatically delete banned task files re-created on
  hyperloop/state by cycle-update commits (root cause of task-001 Rounds 3–10).

  Root cause: "cycle update" commits to hyperloop/state write task-001.md (and
  other banned task files) back with status: in_progress after each deletion.
  check-state-branch-post-commit.sh printed fix commands for 7+ rounds without
  them being executed. auto-clean-banned-state-tasks.sh executes the deletion
  automatically — no manual command execution required.

  Mandatory cycle-start sequence (Step 0 is NEW — add it before existing steps):
    Step 0: bash .hyperloop/checks/auto-clean-banned-state-tasks.sh    # auto-deletes banned files
    Step 1: git fetch origin main:main                                  # detect incoming PRs
    Step 2: git push origin main                                        # push pending commits
    Step 3: bash .hyperloop/checks/check-main-local-vs-remote.sh       # must exit 0
    Step 4: bash .hyperloop/checks/check-cycle-gate.sh <task-ids...>   # gate check (exit 0)
    Step 5: Assign tasks only after all steps succeed.

  After EVERY commit to hyperloop/state (including cycle-update commits):
    bash .hyperloop/checks/auto-clean-banned-state-tasks.sh
    # Run immediately after the commit, in the same session, before switching branches.

  ## PRE-ASSIGNMENT VERIFICATION — GREP FOR PRIMARY DELIVERABLE BEFORE ASSIGNING

  Before assigning any NEW task (first assignment, round 0), verify the spec's
  primary deliverable does NOT already exist on origin/main:

    bash .hyperloop/checks/check-primary-deliverable-not-on-main.sh <primary_function_name>

  The primary function name is the main Python function or GDScript method the
  task spec requires creating. Derive it from the task's `pr_description` or
  the spec's THEN-clauses.

  If the check exits 1 (function found on main): do NOT assign the task.
  Retire it immediately via Option A (DUAL-BRANCH CLOSURE, see below) and
  record which existing commit delivers the feature.

  Observed failure (task-001, Round 1): task assigned to implement the scene
  graph schema. All 11 spec requirements were already satisfied by commits
  bcca0b17, 5faf01e6, 7f08e1d8, 3a5c40d8. The implementer's three commits
  ALL resolved to empty diffs after rebase — the task slot was wasted entirely.
  A single `git grep "def build_scene_graph" origin/main` would have caught this.

  ---

  ## STOP PROTOCOL FINDINGS — MANDATORY TASK RETIREMENT OR REDESIGN

  A finding that opens with "STOP PROTOCOL: Feature already on origin/main" means
  an implementer verified the assigned feature is already fully implemented on main
  and halted without writing any code.

  **Do NOT re-assign the task unchanged.** The same `spec_ref` and `title` pointing
  to the same feature will produce the same STOP PROTOCOL result every cycle — the
  feature on main does not un-implement itself.

  Required response — exactly ONE of:

  **Option A — Retire the task:** The feature was delivered by a parallel task.
  No work remains. Close the task on both main and hyperloop/state branches (see
  DUAL-BRANCH CLOSURE below). Record which task/PR delivered the feature for audit.

  **Option B — Redesign the task:** A different section of the same spec is
  genuinely unimplemented. Update the task definition: change `spec_ref` hash,
  update `title`, update `pr_description` to name the new section. Confirm the
  new primary function does NOT already exist on origin/main before assigning:
    git grep -n "def <new_primary_function>" origin/main -- extractor/ godot/

  **Verify before choosing an option:**
    git grep -n "def <primary_function_name>" origin/main -- extractor/ godot/
  If the function is present and fully implements the spec requirement → Option A.
  If a different spec section is unimplemented → Option B (update the task).

  **MECHANICAL ENFORCEMENT — check-cycle-gate.sh Step 2c:**
  `check-cycle-gate.sh` now includes Step 2c which calls
  `check-stop-protocol-repeat.sh` for every task ID in findings. If the task's
  remote branch has ANY prior STOP PROTOCOL commits in its history, Step 2c
  exits 1 — the cycle gate FAILS. You cannot proceed past a failing cycle gate.
  Fix by retiring or redesigning the task BEFORE running the gate again.

  Observed failure: task-078 ("Symbol Table Extraction" / `extract_symbols`)
  triggered STOP PROTOCOL in Round 2. The task was re-assigned in the next cycle
  with the same `spec_ref: specs/core/visual-primitives.spec.md` and the same
  title. The same outcome (STOP PROTOCOL, zero code written) occurred again in
  Round 3 and Round 4. The task must be retired — `extract_symbols` exists on
  main at line 1011. check-cycle-gate.sh Step 2c would have blocked Round 3+.

