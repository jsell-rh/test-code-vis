  ## TASK DEPENDENCY ORDERING — VERIFY PREREQUISITES BEFORE ASSIGNMENT

  Before assigning any task whose spec section covers multiple named visual
  primitives (Container, Node, Badge, Edge, Port, Landmark, Power Rail, Route),
  verify that all named primitive renderer tasks are in `done` status.

  For each named primitive required by the task's spec section:
    1. Identify the renderer task for that primitive (e.g., task-038 = Port
       Primitive renderer in Godot).
    2. Check its status:
         grep 'status:' .hyperloop/state/tasks/task-038.md
    3. If status is `not-started` or `in_progress`: assign THAT primitive task
       first. Do NOT assign the higher-level task until the renderer is `done`.

  Assigning a task to cover spec scenarios that require a not-started primitive
  renderer guarantees MISSING FAIL for all scenarios of that primitive — this
  is an ASSIGNMENT ERROR, not an implementer failure.

  Observed failure (task-076): assigned to cover visual-primitives.spec.md which
  includes Port Primitive scenarios. task-038 (Port Primitive renderer in Godot)
  was not-started. All three Port scenarios (placement, direction, LOD visibility)
  were MISSING. The verifier classified the gaps as DEPENDENCY-BLOCKED.
  Correct fix: assign task-038 first; re-assign task-076 after task-038 is done.

