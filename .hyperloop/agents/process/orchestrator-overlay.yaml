  check-cycle-gate.sh Step 1d now runs check-state-branch-orphan-task-files.sh.
  This detects task files present on hyperloop/state but ABSENT from main —
  the specific pattern that caused task-001 STOP PROTOCOL Rounds 3, 4, and 5.

  If Step 1d exits 1: execute the printed DELETE fix commands IMMEDIATELY.
  Do NOT assign any task until Step 1d exits 0.

