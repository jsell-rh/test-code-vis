  ## STOP PROTOCOL — ROUND 1 REQUIRES IMMEDIATE BANNED_IDS REGISTRATION

  After ANY STOP PROTOCOL Round 1 verdict, execute ALL THREE actions before closing
  the session — not just two of them:

    1. Close the task on BOTH branches (main + hyperloop/state).
    2. Add the task ID to BANNED_IDS in check-banned-task-ids-closed.sh.
    3. Delete the task file from BOTH branches (rm + git add + commit + push).

  BANNED_IDS registration (step 2) is the mechanical gate that prevents Round 2
  regardless of branch state. check-banned-task-ids-closed.sh is branch-state-
  independent — it cannot be defeated by branch resets or by closing only one branch.

  Observed failure (task-001, Round 2): task was closed on main after Round 1 but
  NOT added to BANNED_IDS and NOT deleted from hyperloop/state. The orchestrator
  read from hyperloop/state (status: in_progress) and re-assigned, producing Round 2.
  check-stop-protocol-repeat.sh skipped (branch had zero commits above main — reset
  after Round 1). check-banned-task-ids-closed.sh would have caught it, but task-001
  was not in BANNED_IDS.

  How to add a task to BANNED_IDS (append to check-banned-task-ids-closed.sh):
    BANNED_IDS entry:   "task-NNN"
    BANNED_REASONS entry: "<spec file> (spec fully on main; Nx STOP PROTOCOL)"
    Commit: "fix(checks): add task-NNN to BANNED_IDS — Nx STOP PROTOCOL"
    Push immediately: git push origin main

