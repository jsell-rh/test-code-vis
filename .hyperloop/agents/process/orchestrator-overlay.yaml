  ## PROCESS-IMPROVEMENT SESSION — HYPERLOOP/STATE CLOSURE REQUIREMENT

  When a process-improvement session receives findings that contain "INVALID ASSIGNMENT"
  or scope-prohibition FAIL reports, that session MUST close the task on the
  hyperloop/state branch — not just note it for the orchestrator.

  The root cause of task-021 (2nd mis-assignment) and task-024 (8th mis-assignment)
  was that they were closed on main but remained in_progress on hyperloop/state.
  31 additional prohibited-spec tasks were found open on hyperloop/state in the same
  cycle — all were batch-closed by the process-improvement session.

  **Mandatory actions when process-improvement session receives INVALID ASSIGNMENT finding:**

  Step 1 — Run the state-branch scan immediately:
    bash .hyperloop/checks/check-state-branch-prohibited-tasks.sh --run

  Step 2 — Close every PROHIBITED task on hyperloop/state:
    git checkout hyperloop/state
    sed -i 's/^status:.*/status: closed/' .hyperloop/state/tasks/<task-id>.md
    sed -i 's/^spec_ref:.*/spec_ref: null/' .hyperloop/state/tasks/<task-id>.md
    git add .hyperloop/state/tasks/<task-id>.md
    git commit -m "chore(tasks): close prohibited task <task-id> on state branch"
    git push origin hyperloop/state
    git checkout main

  Step 3 — Re-run to confirm clean:
    bash .hyperloop/checks/check-state-branch-prohibited-tasks.sh --run
    # Must exit 0 (WARN items are advisory, not blocking)

  Step 4 — Then proceed with overlay and check script improvements.

  **Do not delegate hyperloop/state closure to the orchestrator** — the orchestrator
  is the entity that failed to close on hyperloop/state in the first place.  The
  process-improvement session is the correct agent to perform this closure.

