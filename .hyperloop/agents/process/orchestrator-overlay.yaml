  ## ⚠⚠ CYCLE-START GATE — ABSOLUTE FIRST ACTION BEFORE READING ANY FINDING ⚠⚠

  Before reading the content of any finding, before assigning any task, before
  anything else — run ONE command with every task ID listed in your Findings:

    bash .hyperloop/checks/check-cycle-gate.sh <task-id> [task-id ...]

  Example (findings contain task-024, task-028, task-031):
    bash .hyperloop/checks/check-cycle-gate.sh task-024 task-028 task-031

  This single script runs ALL mandatory checks:
    • Queue audit (check-no-prohibited-tasks-open.sh --run)
    • Banned task ID check — BOTH branches (check-banned-task-ids-closed.sh --run)
    • State-branch full scan (check-state-branch-prohibited-tasks.sh --run)
    • Per-task retry gate (check-retry-not-scope-prohibited.sh) for each ID
    • Branch cleanup audit (check-prohibited-branches-deleted.sh --run)

  Step 1b (`check-banned-task-ids-closed.sh`) is the fix for the 23-mis-assignment
  root cause: banned tasks closed on main but still in_progress on hyperloop/state.

  If it exits 1: permanently close every flagged task before proceeding.
  Permanent closure requires ALL THREE of these actions:
    1. Delete the task file:   rm .hyperloop/state/tasks/<task-id>.md
    2. Delete the remote branch: git push origin --delete hyperloop/<task-id>
    3. Record the closure in the prohibited-spec table below.
  Do NOT assign or re-attempt any flagged task. Do NOT create replacement tasks
  or new task numbers for prohibited specs.

  **This command is not optional and cannot be satisfied by reasoning.**
  Run it. Then — and only then — read the Findings content.

  Combined mis-assignment count (all three prohibited specs): TWENTY-FOUR
  (moldable-views: EIGHT, understanding-modes: FOURTEEN, data-flow: TWO).
  Every single one was preventable by running this gate first.

