  ## PUSH MAIN AFTER EVERY COMMIT — NOT JUST AT CYCLE START

  **Rule: every git commit to local main MUST be followed immediately by:**

    git push origin main

  This applies to ALL commits on main: process improvements, check script updates,
  overlay changes, documentation fixes — anything. Never let local main be ahead of
  origin/main for more than one command.

  **The very first action of every new cycle — even before check-cycle-gate.sh:**

    git push origin main

  If local main is ahead of origin/main, `check-main-local-vs-remote.sh` exits 1 in
  EVERY verifier worktree. Implementers cannot fix this — `git fetch origin main:main`
  cannot rewind local main. The result: correct implementations receive spurious FAILs.

  Observed pattern (task-012, task-021 — same cycle): orchestrator committed 2 check
  script updates to local main during process improvement but did not push. Both tasks
  failed check-main-local-vs-remote.sh despite having correct implementations.

  Observed pattern (task-108, rounds 7–9): orchestrator committed
  `fix(process): add mechanical check for FAIL lines in PASS reports` to local main
  but did not push. The branch had excellent coverage (172 Godot tests, 198 pytest, all
  spec requirements covered) but failed three extra rounds solely due to this state.

  Observed pattern (task-011, task-108 round 10 — same cycle): A process-improvement
  session committed 3 commits to local main (chore(intake), process: fix spec-ref
  check, feat(tasks): intake) without pushing. Both task-011 and task-108 (round 10)
  had correct implementations and passed all other checks — they failed ONLY due to
  this unpushed state. Combined across all three incidents: 7 tasks penalized across
  3 separate sessions that closed without pushing local main to origin.

  Observed pattern (task-006, task-012 — same cycle): Both tasks received FAIL on
  check-main-local-vs-remote.sh. task-012 had a fully correct implementation (59/60
  checks passing, 191 Godot tests + 204 pytest passing, all spec requirements covered)
  and failed SOLELY due to local main being ahead of origin/main. task-006 also
  received this failure as a secondary issue alongside its primary FAIL. This cycle
  adds 2 more tasks penalized by the same missed-push pattern.

  Observed pattern (task-012 — recurrence, next cycle): task-012 was reviewed AGAIN
  and failed check-main-local-vs-remote.sh a SECOND time. Root cause: the subsequent
  INTAKE session (commit 031e6730, "sixteenth PM pass — 3 new tasks") and a
  PROCESS-IMPROVEMENT session (commit 5d785278, "clarify check-sync ≠ rebase") both
  committed to local main without pushing. The original process-improvement session
  documenting task-012's first failure (c39079ca) DID push — but the two sessions
  immediately following it did not. This demonstrates the push rule must apply to
  EVERY session that commits to main — not just process-improvement sessions.
  INTAKE SESSIONS are equally capable of creating the missed-push condition.

  Observed pattern (task-012 — THIRD FAILURE, DIVERGED state): task-012 failed
  check-main-local-vs-remote.sh a THIRD time in a third re-attempt cycle. This
  time the state was DIVERGED (not merely AHEAD): PR #224 (feat: size encoding,
  commit f038e7c6) was merged to origin/main via GitHub while local main had
  commits 6ea54878 ("process: add submission rebase gate") and b28dcc36
  ("chore(intake): seventeenth PM pass") that were never pushed. Because no
  `git fetch origin main:main` was run before committing locally, the orchestrator
  did not observe the incoming PR merge. The diverged state required a merge commit
  (601b9613) to reconcile — a merge that would never have been needed if the
  session had fetched before committing. This is the THIRD CONSECUTIVE CYCLE where
  task-012 has received ORCHESTRATOR CONFIGURATION FAIL. The implementation is
  59/60 checks passing, 191 Godot + 204 pytest tests green, all spec requirements
  covered — every failure has been caused solely by the push/fetch rule violation.

  Observed pattern (task-034): A correct implementation (all 5 Type Topology
  Extraction spec THEN-clauses covered, 254 pytest + 280 Godot tests passing,
  71/71 check scripts in sync) received FAIL solely because a prior
  process-improvement session committed to local main without pushing. Local main
  (11e40ac7) was AHEAD of origin/main (354babde). Both check-main-local-vs-remote.sh
  and check-main-not-diverged.sh EXIT 1 in every verifier worktree; implementers
  cannot resolve this. The verifier correctly classified it FAST-FIX / ORCHESTRATOR
  CONFIGURATION and specified the single required action: git push origin main.

  ## FETCH BEFORE COMMITTING — PREVENTS DIVERGED STATE

  PRs merged to origin/main via GitHub create new commits on origin that local main
  does not automatically receive. If the orchestrator commits to local main WITHOUT
  first fetching, local main and origin/main diverge. A DIVERGED state cannot be
  resolved by `git push origin main` (rejected as non-fast-forward) — it requires a
  merge commit, which itself must be pushed.

  **Before making ANY commit to local main:**
    git fetch origin main:main              # pull in any merged PRs
    # If origin is now ahead, integrate first:
    git merge origin/main                   # or: git rebase origin/main
    # THEN make your local commit:
    git commit -m "..."
    git push origin main                    # push immediately after committing
    bash .hyperloop/checks/check-main-local-vs-remote.sh   # must exit 0

  **Checklist at cycle start:**
    1. git fetch origin main:main                                        # fetch FIRST
    2. git push origin main                                              # push any pending local commits
    3. bash .hyperloop/checks/check-main-local-vs-remote.sh             # must exit 0
    4. bash .hyperloop/checks/check-cycle-gate.sh <task-ids from findings>  # gate check
    5. Only assign tasks after all steps succeed.

  **Checklist before every commit to local main:**
    1. git fetch origin main:main           # detect incoming PR merges
    2. git merge origin/main               # integrate if origin is ahead
    3. git commit -m "..."                 # make your commit
    4. git push origin main               # push IMMEDIATELY after committing
    5. bash .hyperloop/checks/check-main-local-vs-remote.sh   # must exit 0

  **Checklist after any mid-cycle commit to main (process-improvement OR intake OR closure):**
    1. git push origin main                                              # push IMMEDIATELY
    2. bash .hyperloop/checks/check-main-local-vs-remote.sh             # must exit 0
    3. Do not spawn any new task until both steps succeed.

  **ALL SESSIONS THAT COMMIT TO MAIN — MANDATORY FINAL ACTION:**

  Process-improvement, intake, and task-closure work ALL produce commits on local
  main. Every such commit MUST be pushed before the session ends — not deferred
  to "the start of the next cycle".

  Affected session types (all apply equally — none are exempt):
    - Process-improvement sessions (overlay edits, new check scripts, kustomization)
    - Intake sessions (task file creation, PM passes, queue management)
    - Task-closure sessions (closing banned tasks, dual-branch closures)

  The 3 unpushed commits causing task-011/task-108-round-10 failures included
  `process: fix spec-ref check for process commits` — a process-improvement commit
  itself. The session that wrote it did not push before closing.

  The 2 unpushed commits causing task-012's second failure were from an INTAKE
  session (031e6730) and a PROCESS-IMPROVEMENT session (5d785278) — both made after
  the previous process-improvement session had already pushed. Correct behavior in
  one session does NOT protect against unpushed commits from the next session.

  task-012's THIRD failure added a new root cause: no `git fetch` before committing
  locally caused a DIVERGED state (not just AHEAD) when PR #224 merged to origin.
  A fetch-before-commit discipline prevents this class of failure entirely.

  Last action of EVERY session that writes a commit to main, without exception:
    bash .hyperloop/checks/check-main-not-diverged.sh   # fetches + detects AHEAD/DIVERGED

  If check-main-not-diverged.sh exits 1, follow its printed fix instructions and
  re-run until it exits 0. The session is NOT complete until it exits 0.

  check-main-not-diverged.sh is the session-end companion to check-main-local-vs-remote.sh:
    - check-main-not-diverged.sh  → run at END of every session that commits to main
    - check-main-local-vs-remote.sh → run by verifiers inside task worktrees

  Both scripts report the same failures. check-main-not-diverged.sh additionally
  fetches origin before checking, so it catches DIVERGED state caused by incoming
  PR merges that the orchestrator hasn't fetched.

  ## UNPUSHED CHECK SCRIPTS = IMPLEMENTER BLIND SPOTS

  Every check script committed to local main but not pushed to origin/main is
  INVISIBLE to implementers — their run-all-checks.sh cannot run scripts absent
  from origin/main, so their submission passes a check that does not exist for them.

  Concrete impact (task-075): check-rebased-onto-main.sh was committed to local
  main but not pushed. The implementer submitted a branch 3 commits behind
  origin/main. They correctly ran Sync Point 1 and Sync Point 2 and run-all-checks.sh
  — all passed, because check-rebased-onto-main.sh was absent from origin/main.
  The verifier (running from local main) found the rebase failure. The entire extra
  review cycle was caused solely by the missed push.

  Concrete impact (task-031): four check scripts (including check-rebased-onto-main.sh
  and check-run-tests-suite-count.sh) were not pushed. Implementers could not detect
  that the branch was 1262 commits behind main or that a test suite had been dropped.

  Rule: never treat an unpushed check script as "active." A script not on origin/main
  does not exist from the implementer's perspective. If a failure is found by a script
  that was not on origin/main at submission time, the implementer is not at fault — the
  missed push is the root cause. Fix the push; do not penalize the implementer.

