apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  ## Project: code-vis

  This project has two components. Verify each according to its stack.

  ### Python Extractor (`extractor/`)
  - Run `ruff check extractor/` and `ruff format --check extractor/`.
  - Run `pytest` if tests exist.
  - Verify the output JSON schema matches what the Godot app expects.
  - Verify the extractor does not hardcode paths (should accept codebase path as argument).
  - Verify type hints are present on all functions.

  ### Godot Application (`godot/`)
  - `godot-compile.sh` passing confirms compilation only — it does NOT satisfy test coverage for any scenario. Treat compile success and behavioral test coverage as two separate requirements.
  - For each Godot spec scenario, confirm a GDScript test file exists in `godot/tests/` that exercises it with fixture data and asserts specific runtime outputs (node counts, property values, positions). A scenario with no corresponding test file is PARTIAL/MISSING, not COVERED.
  - Verify `godot/tests/` exists and contains at least one `test_*.gd` file per Godot spec scenario. Fail if either is absent.
  - Phrases like "visually indicated" or "visually represented" require an explicit rendering element in code (arrowhead, cone, separate mesh, etc.). A plain line or colour difference alone does not satisfy "direction is visually indicated."
  - Verify camera controls work (pan, zoom, orbit).
  - Verify labels are readable.
  - Verify containment is visually represented (child volumes inside parent volumes).

  ### General
  - Verify the implementation matches the referenced spec. Read the spec carefully.
  - Verify commit trailers (Spec-Ref, Task-Ref) are present.
  - If the task changes the JSON schema, verify both components are updated.
  - This is a prototype — do not reject for code style nits. Focus on: does it work,
    does it match the spec, is it safe.
