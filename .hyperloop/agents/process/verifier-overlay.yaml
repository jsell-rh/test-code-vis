apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  ## Project: code-vis

  This project has two components. Verify each according to its stack.

  ### Python Extractor (`extractor/`)
  - Run `ruff check extractor/` and `ruff format --check extractor/`.
  - Run `pytest` if tests exist.
  - Verify the output JSON schema matches what the Godot app expects.
  - Verify the extractor does not hardcode paths (should accept codebase path as argument).
  - Verify type hints are present on all functions.

  ### Godot Application (`godot/`)
  - `godot-compile.sh` passing confirms compilation only — it does NOT satisfy test
    coverage for any scenario. Treat compile success and behavioral test coverage as
    two separate requirements.
  - For each Godot spec scenario, confirm a GDScript test file exists in `godot/tests/`
    that exercises it with fixture data and asserts specific runtime outputs (node counts,
    property values, positions). A scenario with no corresponding test file is
    PARTIAL/MISSING, not COVERED.
  - Verify `godot/tests/` exists and contains at least one `test_*.gd` file per Godot
    spec scenario.
  - Phrases like "visually indicated" or "visually represented" require an explicit
    rendering element in code (arrowhead, cone, separate mesh, etc.).
  - Check entry-point scripts for empty stubs. If `_ready()` contains only `pass`, and
    the spec scenario requires rendering or node instantiation, the implementation is
    MISSING — not PARTIAL.
  - Dict-key assertions are NOT rendering coverage. A GDScript test that only calls
    `.has()` on a dictionary does NOT satisfy a rendering THEN clause. Confirm the test
    instantiates a real `Node3D`, invokes the function under test, and asserts the node's
    `.position.x`, `.position.y`, `.position.z` properties match the fixture values.
  - Node properties that produce visual behavior are spec-observable. For any THEN clause
    satisfied by a node property (`billboard`, `pixel_size`, etc.), confirm a GDScript test
    asserts that specific property value on the instantiated node.
  - Trace every THEN-clause to a named test assertion. A correct production implementation
    without a corresponding test assertion is PARTIAL — not COVERED.
  - Grep for every test function name the worker lists in their THEN-test mapping. A test
    name that does not appear in any test file is fabricated — mark that THEN-clause as
    MISSING and issue a FAIL.
  - Read test bodies to verify assertion predicates match THEN-clause predicates.
  - Verify camera controls work (pan, zoom, orbit).
  - Verify labels are readable (assert `billboard == BILLBOARD_ENABLED` and
    `pixel_size > 0.0` on any Label3D nodes).
  - Verify containment is visually represented (child volumes inside parent volumes).

  ### General
  - Verify the implementation matches the referenced spec. Read the spec carefully.
  - Verify commit trailers (Spec-Ref, Task-Ref) are present.
  - If the task changes the JSON schema, verify both components are updated.
  - This is a prototype — do not reject for code style nits. Focus on: does it work,
    does it match the spec, is it safe.
  - Run `bash .hyperloop/checks/run-all-checks.sh` as your first verification action.
    Include its complete output verbatim in your findings table.
  - Run `bash .hyperloop/checks/check-not-in-scope.sh` FIRST — before reading any
    implementation files. If it exits non-zero, issue a FAIL verdict immediately.
  - Audit every "Not In Scope" item explicitly before issuing a verdict.
  - Distinguish "untested" from "untestable by environment." When a THEN-clause describes
    a property that is physically impossible to verify in the available test environment
    (e.g., FPS measurement in headless Godot), verify the implementation is architecturally
    correct and mark it PASS-WITH-NOTE.

  ## Coordinate Frame Contracts

  When a spec says a position field is "relative to parent" (or "local offset"),
  proximity tests are NOT sufficient coverage:
  1. Reject proximity tests as sole coverage.
  2. Verify the test places the parent at a non-zero position.
  3. Verify the test asserts the stored value equals the local offset directly.
  4. Check the consumer's interpretation against the producer's storage.

  ## Directional Behavior Review

  When a THEN-clause describes directional movement:
  - Derive expected sign BEFORE reading the test body.
  - Non-directional predicates (`!= Vector3.ZERO`, `!= initial_*`) are a FAIL.
  - Verify the inline derivation comment exists in the implementation.
  - When the spec contains internally contradictory direction language, record the
    contradiction verbatim in findings.

  ## Verdict Rules

  - FAIL if any SHALL/MUST requirement lacks implementation OR test coverage.
  - PASS if all SHALL/MUST requirements are implemented and tested.
  - In findings, list every requirement with: COVERED, PARTIAL, or MISSING.
  - For PARTIAL/MISSING, explain exactly what's needed so the implementer can fix it.
