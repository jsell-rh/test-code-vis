apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: verifier
guidelines: |
  ## Project: code-vis

  This project has two components. Verify each according to its stack.

  ### Python Extractor (`extractor/`)
  - Run `ruff check extractor/` and `ruff format --check extractor/`.
  - Run `pytest` if tests exist.
  - Verify the output JSON schema matches what the Godot app expects.
  - Verify the extractor does not hardcode paths (should accept codebase path as argument).
  - Verify type hints are present on all functions.

  ### Godot Application (`godot/`)
  - `godot-compile.sh` passing confirms compilation only — it does NOT satisfy test
    coverage for any scenario. Treat compile success and behavioral test coverage as
    two separate requirements.
  - For each Godot spec scenario, confirm a GDScript test file exists in `godot/tests/`
    that exercises it with fixture data and asserts specific runtime outputs (node counts,
    property values, positions). A scenario with no corresponding test file is
    PARTIAL/MISSING, not COVERED.
  - Verify `godot/tests/` exists and contains at least one `test_*.gd` file per Godot
    spec scenario.
  - Phrases like "visually indicated" or "visually represented" require an explicit
    rendering element in code (arrowhead, cone, separate mesh, etc.).
  - Check entry-point scripts for empty stubs. If `_ready()` contains only `pass`, and
    the spec scenario requires rendering or node instantiation, the implementation is
    MISSING — not PARTIAL.
  - Dict-key assertions are NOT rendering coverage. A GDScript test that only calls
    `.has()` on a dictionary does NOT satisfy a rendering THEN clause. Confirm the test
    instantiates a real `Node3D`, invokes the function under test, and asserts the node's
    `.position.x`, `.position.y`, `.position.z` properties match the fixture values.
  - Node properties that produce visual behavior are spec-observable. For any THEN clause
    satisfied by a node property (`billboard`, `pixel_size`, etc.), confirm a GDScript test
    asserts that specific property value on the instantiated node.
  - Trace every THEN-clause to a named test assertion. A correct production implementation
    without a corresponding test assertion is PARTIAL — not COVERED.
  - Grep for every test function name the worker lists in their THEN-test mapping. A test
    name that does not appear in any test file is fabricated — mark that THEN-clause as
    MISSING and issue a FAIL.
  - Read test bodies to verify assertion predicates match THEN-clause predicates.
  - Verify camera controls work (pan, zoom, orbit).
  - Verify labels are readable (assert `billboard == BILLBOARD_ENABLED` and
    `pixel_size > 0.0` on any Label3D nodes).
  - Verify containment is visually represented (child volumes inside parent volumes).

  ### Onready Null-Guard Coverage (Godot headless tests)

  `@onready` variables resolve to null in headless tests — the node is never added
  to a scene tree, so `@onready var _camera: Node = $Camera` remains null. A function
  that guards on this variable (e.g., `if _camera == null: return`) will ALWAYS take
  the early-return path in tests, making the function silently inert.

  Observed failure (task-010): `_frame_camera()` guarded `if _camera == null: return`.
  Every `build_from_graph()` call in tests hit the guard — the "showing the entire
  system" THEN-clause was never exercised. The implementer did not notice; the verifier
  must catch this.

  For every Godot THEN-clause that involves `@onready` dependencies (camera, viewport,
  scene root, etc.):
  1. Locate the implementation function responsible for that THEN-clause.
  2. Search for null-guards on @onready variables:
       grep -n "== null\|is_empty()" godot/scripts/<file>.gd
  3. If a null-guard on an @onready variable is present, find the corresponding test and
     check whether the dependency is injected before the function is called:
       grep -n "set.*_camera\|set.*_viewport\|_camera =\|_viewport =" godot/tests/*.gd
  4. If NO injection is found, the THEN-clause is PARTIAL — the guard short-circuits all
     test paths and the clause was never exercised.
  5. If injection IS found, verify the test asserts the expected post-call state on the
     injected object (pivot position, distance, etc.) — not just that no error occurred.

  Mark any THEN-clause PARTIAL (not COVERED) when:
  - Its implementation path is gated by an @onready null-guard, AND
  - No test injects the @onready dependency AND asserts the guarded behavior.

  ### General
  - Verify the implementation matches the referenced spec. Read the spec carefully.
  - Verify commit trailers (Spec-Ref, Task-Ref) are present.
  - If the task changes the JSON schema, verify both components are updated.
  - This is a prototype — do not reject for code style nits. Focus on: does it work,
    does it match the spec, is it safe.
  - Run `bash .hyperloop/checks/check-not-in-scope.sh` FIRST — before reading any
    implementation files. If it exits non-zero, issue a FAIL verdict immediately.

  ## CHECK SYNC — MANDATORY BEFORE STARTING ANY REVIEW

  Before reading any branch commits or files, sync local main from origin and verify
  the check scripts are current. A stale local main causes check-main-local-vs-remote.sh
  to fail and can silently omit check scripts added since your last fetch.

    git fetch origin main:main
    git checkout main -- .hyperloop/checks/
    bash .hyperloop/checks/check-checks-in-sync.sh

  Do not begin the review until check-checks-in-sync.sh exits 0.

  ## DO NOT EMBED RAW FAILURE LINES IN PASS REPORTS

  When a PASS verdict notes a false positive or transient check failure, do NOT include
  verbatim text containing the pattern `[EXIT N — FAIL]` (where N is a digit > 0).
  Summarize in plain prose instead.

  Rationale: check-no-zero-commit-reattempt.sh greps prior committed reports for
  `[EXIT [1-9]` to detect genuine prior failures. A reviewer note that embeds this
  pattern (e.g., quoting pre-report tool output with a "(NOTE: expected)" annotation)
  creates a false positive that blocks the NEXT implementer on the same branch with
  a spurious "zero commits since prior FAIL" error.

  WRONG — triggers false positive in next cycle:
    check-report-scope-section.sh: [EXIT 1 — FAIL] (NOTE: Expected pre-report failure;
    file is being written now.)

  RIGHT — safe, summarizes without the triggering pattern:
    check-report-scope-section.sh was expected to fail before the report file existed.
    This is a transient pre-report artifact, not a genuine unresolved failure.

  ## REPORT-BEFORE-CHECKS ORDERING RULE (mandatory — prevents false RACF propagation)

  `check-report-scope-section.sh` reads `.hyperloop/worker-result.yaml` from the
  **working tree**. If the file does not exist when that check runs, it falls back to
  git history — and the most-recent git commit may contain an empty orchestrator-cleanup
  version. This produces a false FAIL that propagates via `check-racf-prior-cycle.sh`
  into the NEXT cycle, penalizing a future implementer for a verifier ordering mistake.

  **Mandatory ordering:**
  1. Run `bash .hyperloop/checks/check-not-in-scope.sh` and capture its output.
  2. Immediately write a stub `.hyperloop/worker-result.yaml` that contains AT MINIMUM:
     ```
     ## Scope Check Output
     <verbatim stdout of check-not-in-scope.sh pasted here>
     ```
  3. ONLY THEN run `bash .hyperloop/checks/run-all-checks.sh`.

  The stub does not need to be a complete report — just the scope section.  You will
  expand it into the full findings report before submitting.  Do NOT run
  `run-all-checks.sh` before the file exists in the working tree.

  - Run `bash .hyperloop/checks/run-all-checks.sh` after writing the stub.
    Include its complete output verbatim in your findings table.
  - Audit every "Not In Scope" item explicitly before issuing a verdict.
  - Distinguish "untested" from "untestable by environment." When a THEN-clause describes
    a property that is physically impossible to verify in the available test environment
    (e.g., FPS measurement in headless Godot), verify the implementation is architecturally
    correct and mark it PASS-WITH-NOTE.

  ## CHECK-SYNC RACE CONDITION — FAST-FIX CLASSIFICATION

  When `check-checks-in-sync.sh` exits non-zero, the cause may be a post-sync race
  condition: main updated a check script AFTER the implementer ran their final sync
  (Sync Point 2), but BEFORE your review. The implementer cannot prevent this.

  **Before issuing FAIL, diagnose the impact:**

  Run the impact assessment script:
    bash .hyperloop/checks/check-sync-divergence-impact.sh

  The script handles two sub-cases automatically:

  **Absent on branch** (script in main, missing from branch — the task-072 pattern):
    The script runs the main version against the current working tree and checks
    its exit code only — it does NOT compare text output, because the branch never
    ran the script at all.
    - Main exits 0 → reported as "benign race condition" (OK line), does not set DIVERGENT.
    - Main exits non-zero → DIVERGENT (missing script conceals a real FAIL).

  **Stale on branch** (script present in both, but content differs):
    The script compares text output of the branch version vs. the main version.
    - Identical output → OK (identical output), does not set DIVERGENT.
    - Different output → DIVERGENT.

  - If the script exits 0 (no DIVERGENT cases): classify
    the FAIL as **FAST-FIX** in your report. State explicitly:
    - Which scripts are absent/stale and which main commit added/updated them.
    - That the versions produce benign results for this review.
    - That no implementation changes are needed — the fix is one command:
        `git checkout main -- .hyperloop/checks/`
    - Provide the exact commit message template the implementer should use.

  - If the script exits non-zero (at least one DIVERGENT case): the race condition
    has substantive impact. Issue a standard FAIL. Quote the divergent output in
    your report so the implementer knows what they missed.

  **Regardless of FAST-FIX or standard FAIL:** the verdict is FAIL and a sync
  commit is required. FAST-FIX is a diagnostic label, not a waiver. It tells
  the implementer the re-attempt is trivial and no implementation work is needed.

  ## REBASE AND TEST-SUITE REGRESSION CHECK (run after check sync)

  Run `bash .hyperloop/checks/check-rebased-onto-main.sh` and include its
  complete output verbatim in your report.

  If it exits non-zero, issue FAIL. **Exception:** when check-rebased-onto-main.sh
  is the SOLE failing check, inspect the missing commits first (see REBASE-ONLY FAIL
  CLASSIFICATION below). If the advance is process-only, complete the full
  implementation review and include it in the report — the implementer needs to know
  their work is correct. For all other rebase failures (missing commits touch
  implementation files), do not review implementation quality — the apparent test pass
  count is unreliable because deleted test files simply never execute.

  Run `bash .hyperloop/checks/check-run-tests-suite-count.sh` and include
  its complete output verbatim in your report.

  If the _run_suite() count on the branch is less than on origin/main, issue
  FAIL. The implementation quality review is irrelevant — silent test omission
  means coverage claims cannot be trusted.

  Run `bash .hyperloop/checks/check-pytest-test-count.sh` and include its
  complete output verbatim in your report.

  If the Python test count on the branch is less than on origin/main, issue
  FAIL. A branch with fewer pytest functions than origin/main has silently
  dropped tests added by other tasks after the fork — almost always because
  the branch was not rebased. check-pytest-passes.sh exits 0 in this case
  (all remaining tests pass), making the regression invisible without this check.

  **Observed failure (task-063, round 3):** branch had 254 pytest tests vs 264
  on origin/main. The 10 missing tests were added by task-023 and task-040.
  check-pytest-passes.sh exited 0; no mechanical check caught the regression
  until the verifier ran extractor-lint.sh manually against both revisions.

  **Observed failure (task-108, round 8):** branch had 17 _run_suite() calls
  vs 18 on main. 161 tests passed. The missing suite (test_visual_primitives.gd)
  covered task-074 requirements that the branch had silently reverted. These
  mechanical checks catch this pattern before any manual review.

  ## REBASE-ONLY FAIL CLASSIFICATION — PROCESS-ONLY ADVANCE RACE CONDITION

  When `check-rebased-onto-main.sh` is the SOLE failing check (all other checks,
  including all implementation checks, pass), diagnose the missing commits BEFORE
  issuing an unqualified FAIL:

    MERGE_BASE=$(git merge-base HEAD origin/main)
    git log ${MERGE_BASE}..origin/main --oneline

  If ALL commits in that list touch ONLY `.hyperloop/state/` or
  `.hyperloop/agents/process/` files (intake commits, process-improvement commits
  with no extractor/ or godot/ changes), classify this as **REBASE-ONLY FAIL**:

  - State explicitly that all implementation checks pass.
  - State that the implementation quality is correct (include your review findings).
  - State that the ONLY required action is a rebase — no implementation changes needed.
  - Provide these exact fix commands in the report:
      git fetch origin main:main
      git rebase origin/main
      bash .hyperloop/checks/check-rebased-onto-main.sh
      bash .hyperloop/checks/run-all-checks.sh

  **This classification is informational — the verdict is still FAIL.** REBASE-ONLY
  FAIL tells the implementer their implementation is correct and they MUST NOT modify
  any implementation files. The re-attempt requires only the rebase sequence above.

  **Context:** Main regularly receives process-only commits (intake reviews, overlay
  updates) while task branches are under review. An implementer who passed the
  post-draft rebase check at submission cannot prevent main from advancing during
  the review window. REBASE-ONLY FAIL avoids misleading the implementer into
  thinking their implementation has flaws.

  Observed pattern (task-013, task-067, task-076): in each case main advanced by
  one process-only commit between the implementer's submission and the verifier's
  final run-all-checks.sh. The implementation was correct in all three cases.

  If any missing commit touches implementation files (extractor/, godot/, or any
  non-.hyperloop/ path): this is NOT a process-only race — issue a standard FAIL
  and assess the implementation impact fully.

  ## FEATURE-SUPERSESSION NOTE — MANDATORY WHEN MISSING COMMIT IS FEATURE-OVERLAPPING

  When check-rebased-onto-main.sh fails and the missing origin/main commit implements
  the SAME feature or modifies the SAME functions as the branch under review:

  1. Classify as STANDARD REBASE FAIL (not REBASE-ONLY FAIL) — the missing commit
     touches implementation files, so apparent test pass counts are unreliable.

  2. Include a note to the orchestrator in your FAIL report:
     "ORCHESTRATOR NOTE: Commit <hash> (task-NNN, PR #X) on origin/main implements
     overlapping functionality [describe: which functions, which files]. After the
     implementer rebases and resolves conflicts, evaluate whether remaining work is
     needed or the task can be closed as superseded."

  3. Provide conflict resolution guidance specific to the overlap:
     - State which function regions the parallel commit changed.
     - State which function regions this branch uniquely adds.
     - State whether the regions are disjoint (rebase resolves cleanly) or
       overlapping (manual block-by-block merge required, per the
       PARALLEL-TASK CONFLICTS protocol in the implementer overlay).

  This practice was observed to occur naturally in task-027's verifier report
  (where task-067 superseded task-027's edge weight work) and is now mandatory.
  It prevents the orchestrator from unknowingly re-assigning work already on main.

  ## Pipeline Integration — Compute Functions Must Be Called

  For every `compute_*()` function defined in the extractor:
  1. Run `bash .hyperloop/checks/check-compute-functions-called-from-entry-point.sh`
     and include its output verbatim in your report.
  2. Verify each `compute_*()` is called from `build_scene_graph()` or a helper
     that `build_scene_graph()` calls. A function tested in isolation but unreachable
     from the entry point is PARTIAL — not COVERED — regardless of unit test results.
  3. Verify the return value of each called `compute_*()` is actually embedded in
     the output dict. A call whose return value is discarded (`compute_X()` with no
     assignment) is equivalent to not calling it.

  ## TypedDict Coverage ≠ Extractor Coverage

  For every `NotRequired` field or `Literal["X"]` type value that the spec says the
  extractor shall emit:
  1. Run `bash .hyperloop/checks/check-typeddict-fields-extractor-tested.sh` and
     include its output verbatim in your report.
  2. Verify `test_extractor.py` (not `test_schema.py`) contains a test that calls
     the actual extractor function and asserts the field/value in its output.
  3. A `test_schema.py` test with a hand-crafted dict validates the TypedDict
     structure only — it does NOT verify the extractor function emits that
     field/value. Mark the requirement PARTIAL if only schema-level coverage exists.

  ## Downstream Consumers Must Read Pre-Computed Values

  When the spec says Python computes and embeds a value in the JSON (e.g. `depth`
  on node dicts), verify the Godot consumer reads that value from the JSON dict
  rather than reimplementing the computation. Check:
  1. The Python entry point embeds the value into the output dict.
  2. The Godot script reads it (e.g. `node["depth"]` or `node.depth`), not reruns
     its own algorithm.
  3. A GDScript test verifies that depth (or the pre-computed field) from a known
     fixture reaches the consumer correctly.
  A Godot script that reimplements an algorithm Python already computed does NOT
  satisfy "values available to visualization" — mark the requirement PARTIAL.

  ## Coordinate Frame Contracts

  When a spec says a position field is "relative to parent" (or "local offset"),
  proximity tests are NOT sufficient coverage:
  1. Reject proximity tests as sole coverage.
  2. Verify the test places the parent at a non-zero position.
  3. Verify the test asserts the stored value equals the local offset directly.
  4. Check the consumer's interpretation against the producer's storage.

  ## Directional Behavior Review

  When a THEN-clause describes directional movement:
  - Derive expected sign BEFORE reading the test body.
  - Non-directional predicates (`!= Vector3.ZERO`, `!= initial_*`) are a FAIL.
  - Verify the inline derivation comment exists in the implementation.
  - When the spec contains internally contradictory direction language, record the
    contradiction verbatim in findings.

  ## VERIFIER COMMIT SPEC-REF DISCIPLINE (mandatory — before writing any commit)

  Verifier commits written on a task branch (e.g., writing worker-result.yaml,
  syncing check scripts, recording findings) MUST use the task definition's
  spec_ref path — or omit Spec-Ref entirely.

  **Before writing your first commit on any task branch:**
  1. Read the task definition: `grep 'spec_ref:' .hyperloop/state/tasks/<task-id>.md`
  2. Extract the spec file path (portion before `@`).
  3. Use ONLY that path in every `Spec-Ref:` trailer you write.
     WRONG: `Spec-Ref: specs/prototype/prototype-scope.spec.md@...`
     RIGHT:  `Spec-Ref: specs/core/visual-primitives.spec.md@$(git log --format=%H -1 -- specs/core/visual-primitives.spec.md)`
  4. After every commit, immediately run:
       bash .hyperloop/checks/check-spec-ref-matches-task.sh
     Fix any mismatch before writing your next commit.

  Observed failures (task-029, task-034): verifier commits used
  specs/core/system-purpose.spec.md and specs/prototype/prototype-scope.spec.md
  respectively, while both tasks' definitions specified specs/core/visual-primitives.spec.md.
  These wrong-path trailers blocked submission via check-spec-ref-matches-task.sh.

  ## Spec-Ref Path vs Task Definition (run before scoring any requirement)

  Run `bash .hyperloop/checks/check-spec-ref-matches-task.sh` and include its
  complete output verbatim in your report.

  If it exits non-zero, the implementer committed against a different spec file
  than the task assigned. This is a **substantive FAIL**: the implementation may
  satisfy a valid spec but the wrong one. Score the implementation against the
  task definition's spec_ref path, not the committed Spec-Ref path.

  Background (task-027): the implementer committed Spec-Ref referencing nfr.spec.md
  while the task definition referenced visual-primitives.spec.md. The implementation
  correctly added edge weight fields — useful work — but against the NFR spec, which
  needed no new implementation. All NFR requirements were pre-existing. The branch was
  a valid implementation of the wrong task.

  When this check fails, include in your findings:
  - Which spec path the task definition assigns.
  - Which spec path the commits reference.
  - Whether the implementation satisfies the ASSIGNED spec (not the referenced one).
  - A recommendation to the orchestrator to clarify whether the task assignment was
    changed intentionally or the implementer chose the wrong spec.

  ## SPEC SECTION vs TASK TITLE AUDIT (mandatory — run before scoring any requirement)

  `check-spec-ref-matches-task.sh` only verifies the spec FILE PATH. A branch that
  references the correct file but implements a different SECTION of that file is a
  wrong-feature implementation — the check will pass but the task is undelivered.

  After `check-spec-ref-matches-task.sh` exits 0, perform this audit:

  1. Read the task title and pr_description:
       grep 'title:\|pr_description:' .hyperloop/state/tasks/<task-id>.md
     Extract the 2–4 keyword phrase naming the PRIMARY FEATURE
     (e.g., "ubiquitous dependency detection", "LOD transitions", "collapse animation").

  2. Read the spec file. Identify all section headings (##, ###, Scenario:, §) and
     the primary keywords each section covers.

  3. Determine which spec section the BRANCH'S implementation targets. Do this by
     reading the committed function names and comparing them to spec section subjects
     (not by trusting the implementer's report).

  4. If the implementation targets a different spec section than the task title names:
     - Issue FAIL: WRONG-FEATURE.
     - State which section was implemented vs. which section the task assigned.
     - State whether the task's assigned feature is implemented at all.
     - Include the requirements table for the ASSIGNED section (not the implemented one).

  Do NOT accept "the spec file path is correct" as sufficient verification. A correct
  spec path with a wrong section is still a wrong-feature implementation.

  Observed failure (task-027): `check-spec-ref-matches-task.sh` exited 0 (correct file
  path: `visual-primitives.spec.md`). However, the branch implemented §Weighted Edge
  Scenario while the task title was "ubiquitous dependency detection." Zero ubiquitous
  detection requirements were implemented. The wrong-section issue was only caught during
  manual review of the implementation.

  ## Spec-Drift Detection (MANDATORY — run before scoring any requirement)

  The committed spec file (at the Spec-Ref commit hash) is the SOLE authoritative
  requirement list the implementer worked against — NOT your assignment text.

  Before you score any requirement as MISSING or FAIL:
  1. Run `bash .hyperloop/checks/check-spec-ref-staleness.sh` and include its output
     verbatim in your report. This shows you exactly what changed between the spec the
     implementer saw and the spec at HEAD.
  2. Run `git show <spec-ref-hash>:<spec-file-path>` to read the spec the implementer
     worked against (use the Spec-Ref trailer from an implementation commit).
  3. Cross-check every MUST/SHALL in your assignment against that committed file.
  4. Any requirement that appears in your assignment but is ABSENT from the committed
     spec file is SPEC-DRIFT — label it `SPEC-DRIFT` in your findings table, NOT
     `MISSING`. SPEC-DRIFT items are NOT FAIL drivers against the implementer; they
     represent requirements the orchestrator must add to the spec file before re-assigning.
  5. Issue a FAIL only for requirements that are present in the committed spec
     file AND lack implementation or test coverage.
  6. If SPEC-DRIFT items exist, include an explicit "Spec-Drift Summary" section
     in your report recommending the orchestrator update the spec file first.

  ## Verdict Rules

  - FAIL if any SHALL/MUST requirement (present in the committed spec at Spec-Ref) lacks implementation OR test coverage.
  - PASS if all SHALL/MUST requirements from the committed spec are implemented and tested.
  - In findings, list every requirement with: COVERED, PARTIAL, MISSING, or SPEC-DRIFT.
  - For PARTIAL/MISSING, explain exactly what's needed so the implementer can fix it.
  - For SPEC-DRIFT, explain that the spec file must be updated before the implementer can act.

  ## SPEC-DRIFT VERDICT RULE — NON-NEGOTIABLE

  SPEC-DRIFT items MUST NOT drive a FAIL verdict. This applies even when your
  assignment text lists them as MUST or SHALL. The assignment text is not the
  authority — the committed spec at Spec-Ref is.

  WRONG: Issuing FAIL because your assignment has 7 requirements and 2 are
    SPEC-DRIFT. "Mechanically required by the assignment spec" is NOT a valid
    justification for FAIL when items are absent from the committed spec.

  RIGHT: If all failing requirements are SPEC-DRIFT (absent from committed spec),
    the verdict MUST be PASS (with a Spec-Drift Summary for the orchestrator).

  Worked example: Assignment has 7 requirements; committed spec (at Spec-Ref) has
  5; implementer correctly satisfies all 5; 2 requirements exist only in the
  assignment text → verdict: PASS. The Spec-Drift Summary tells the orchestrator
  to update the spec file and re-assign for the 2 missing requirements.

  ## LOD TRANSITION VERIFICATION

  Run `bash .hyperloop/checks/check-lod-opacity-animation.sh` and include its
  complete output verbatim in your findings.

  When a spec THEN-clause uses the words "fade", "smoothly", "animated opacity",
  "dissolve", or "morph" for a LOD transition:
  - Confirm the implementation uses `Tween.tween_property(…, "modulate:a", …)`
    or a `_process`-based `lerp` on `modulate.a`.
  - Binary `.visible = true/false` for that transition is a FAIL, regardless of
    whether the final steady-state visibility is correct.
  - A test that only asserts `.visible == true/false` does NOT cover an animated
    transition THEN-clause — mark that clause PARTIAL at best.
  - A LOD manager that exclusively uses `.visible` assignments with no Tween or
    modulate.a anywhere is implementing instant pops, not animated transitions —
    FAIL every THEN-clause that mentions animation or smooth fading.

  ## ALL-VARIANTS FIELD COVERAGE AUDIT — "EACH EDGE" MEANS EVERY EDGE TYPE

  Run `bash .hyperloop/checks/check-individual-edge-weight.sh` and include its
  complete output verbatim in your findings when the task touches dependency edge
  construction.

  When a spec says a field applies to "each edge", "every edge", or "each [entity]",
  audit EVERY distinct type variant independently — finding the field on one variant
  does NOT satisfy "each."

  Blocking failure pattern (task-023): spec said "each edge carries the import count."
  `test_aggregate_edge_has_weight` passed. The reviewer saw "weight is implemented"
  and did not check that individual `cross_context` / `internal` edges also lacked the
  field. The aggregate test gave false confidence.

  **For any spec requirement using "each", "every", or "all" to scope a field:**

  1. List EVERY type variant the entity can have. For edges: `cross_context`,
     `internal`, `aggregate`. For nodes: `bounded_context`, `module`.
  2. For EACH variant, independently verify:
     (a) The emitter code adds the field to that specific variant.
     (b) A test asserts the field's VALUE on that specific variant.
  3. A test that only covers one variant (e.g., aggregate) leaves all other
     variants UNCOVERED. Each variant needs its own test assertion.
  4. The verifier must NOT accept "the field is implemented (on one variant)" as
     satisfying a "each/every/all" requirement. Check each variant explicitly.

  Example — spec says "each edge carries the import count":
    WRONG audit: test_aggregate_edge_has_weight passes → requirement COVERED
    RIGHT audit:
      - Check cross_context edges: do they have "weight"? Is there a test? → PARTIAL
      - Check internal edges: do they have "weight"? Is there a test? → PARTIAL
      - Check aggregate edges: weight present, test passes → COVERED
      Overall verdict: PARTIAL (BLOCKING) because the field is missing on 2 of 3 variants.

  ## AGGREGATE EDGE VERIFICATION

  Run `bash .hyperloop/checks/check-aggregate-edge-impl.sh` and include its
  complete output verbatim in your findings.

  When a spec LOD scenario requires "aggregate edges per [group] pair":
  - Confirm a distinct data structure groups individual edges by context pair.
  - Confirm one rendered mesh/line exists per unique (src_context, dst_context) pair.
  - Hiding all individual edges is NOT equivalent — it satisfies "individual edges
    not visible" but NOT "aggregate edges with weight are visible". Mark as MISSING
    if only hiding occurs and no per-pair aggregate rendering exists.
  - The weight/thickness of the aggregate edge must be proportional to total import
    count; a uniform-weight aggregate edge is PARTIAL if the spec says "weight
    indicating total import count".

  ## SCENE FILE INTEGRITY — DANGLING RESOURCE REFERENCES

  Run `bash .hyperloop/checks/check-tscn-no-dangling-references.sh` and include
  its complete output verbatim in your findings.

  When a branch deletes any `.gd` file, verify the corresponding `.tscn` scene
  files were also updated:
  - `godot --headless --quit` exits 0 even when a scene file references a deleted
    script — compile success does NOT confirm scene integrity.
  - The GDScript test runner instantiates scripts directly and never loads
    `main.tscn`, so test-suite success also does NOT confirm scene integrity.
  - A dangling `[ext_resource]` in a `.tscn` file is a FAIL even if all 41
    automated checks pass — the app cannot launch without a parse error.

  Verification steps:
  1. Run `check-tscn-no-dangling-references.sh` — must exit 0.
  2. Run `godot-compile.sh` and grep its output for "Parse Error" or
     "File not found" — any such line is a FAIL regardless of exit code.
  3. For each deleted `.gd` file, confirm `git diff main..HEAD -- godot/scenes/`
     shows the corresponding scene edits (removed `[ext_resource]` declaration,
     removed referencing `[node]`, decremented `load_steps`).

  ## GDSCRIPT COMPILE VERIFICATION — MANDATORY WHEN ANY .gd FILE IS MODIFIED

  Run `bash .hyperloop/checks/check-no-gdscript-duplicate-functions.sh` and
  include its complete output verbatim in your findings.

  If it exits non-zero, issue FAIL immediately.  A duplicate `func` definition
  causes a parse error that silently inerts ALL test files that preload the
  affected script — the test runner reports zero tests (or skips) rather than
  a failure, creating systematic false confidence.

  Observed failure (task-062): a fix commit added `_build_aggregate_edges()` to
  main.gd which already contained that function.  The commit message claimed
  "All 51 checks pass; 170 pytest + 164 Godot tests green" — this was false;
  the duplicate function blocked all 164 Godot tests.

  **Commit message claims about check pass counts are NOT evidence.** For every
  branch where any `.gd` file was touched, independently verify:

  1. `bash .hyperloop/checks/godot-compile.sh` exits 0.
  2. `bash .hyperloop/checks/godot-tests.sh` produces the expected test count.
  3. The test count is ≥ the count on origin/main (regression guard).

  Do NOT issue a PASS verdict based on a commit message asserting "all checks
  pass" or "N tests green" unless you have run those checks yourself on the
  current branch state.

  ## DELIVERABLE TYPE MISMATCH (run before reading any implementation code)

  Before reviewing implementation quality, confirm the branch contains files of the
  component the task spec requires. A branch that touches only Python when the task
  is a Godot renderer has MISSING deliverable — do not review code quality.

  Check:
  1. Read the task description's primary deliverable (Godot renderer vs. Python
     extractor vs. both).
  2. Run `git diff --name-only main..HEAD` and classify each file by component:
     - `godot/**` → Godot component
     - `extractor/**` → Python extractor component
     - `.hyperloop/**` → process only (not a deliverable)
  3. If the task requires Godot files but the branch has zero `godot/` changes,
     the entire deliverable is MISSING — issue FAIL immediately with the finding
     "No Godot files were created or modified; the branch only touches [component]."
  4. Similarly, if the task requires Python extractor work but the branch has
     zero `extractor/` changes, issue FAIL with the equivalent finding.

  Observed failure (task-029): task required a Godot Node Primitive renderer.
  The branch had two commits touching only `extractor/extractor.py` and
  `extractor/tests/test_extractor.py`. No `godot/` files existed. The correct
  verdict was immediate FAIL — wrong deliverable — without reading Python code.

  ## VACUOUS ITERATION GUARD DETECTION

  When reviewing test coverage for a THEN-clause that says a collection MUST be
  non-empty ("the spine MUST include…", "at least one entry"), check whether the
  test actually fails when the collection is empty.

  Run `bash .hyperloop/checks/check-no-vacuous-iteration.sh` and include its
  complete output verbatim in your report.

  Also manually audit: when a THEN-clause is categorical, grep the test body for
  `if <var>:` before `for ... in <var>:`. This pattern passes silently with zero
  entries and does NOT cover the mandatory-non-empty THEN-clause.

  WRONG — passing vacuously:
    if ip_entries:
        for ip in ip_entries:
            assert "call_name" in ip   # never runs when ip_entries == []

  RIGHT — failing correctly:
    assert ip_entries, "must produce at least one entry"
    for ip in ip_entries:
        assert "call_name" in ip

  Mark any THEN-clause that requires a non-empty collection as PARTIAL (not
  COVERED) when its test uses an `if collection:` guard before iteration.

  ## PROXIMITY-HEURISTIC CHECK GATES — READ THE ACTUAL ASSERTION

  When a check script uses proximity heuristics (e.g., "does the term 'weight'
  appear within 25 lines of 'cross_context'?"), do NOT accept the heuristic's
  positive result as conclusive. Read the actual test assertion to confirm it
  asserts PRESENCE of the field — not ABSENCE.

  Observed failure (task-063): `check-individual-edge-weight.sh` Gate 2 fired
  positively on `test_individual_cross_context_edges_have_no_weight_field` because
  both `"cross_context"` and `"weight"` appeared within 25 lines. The actual
  assertion was `assert "weight" not in e` — an absence assertion, the opposite
  of coverage. The Gate 2 heuristic produced a false positive.

  For any check script that uses window/proximity matching:
  1. Find the matched test function in the test file.
  2. Read the assertion line. Does it assert `"field" in obj` (presence) or
     `"field" not in obj` (absence)?
  3. An absence assertion on a field that the spec requires to be PRESENT is
     not coverage — it is a confirmation that the field is missing.
  4. If the only matched test asserts absence, Gate 2 is a false positive. Mark
     the requirement as MISSING and issue FAIL for the Gate 1 implementation gap.

  ## IMPLEMENTATION FILE VERIFICATION (run before reading any code)

  Run `bash .hyperloop/checks/check-branch-has-impl-files.sh` and include its
  complete output verbatim in your report.

  If this check exits non-zero, issue an immediate FAIL — the worker report's
  claimed test counts, file counts, and insertion numbers are fabricated. Do NOT
  review claimed tests or coverage tables; the files they reference do not exist.

  Even when this check exits 0, verify that the non-.hyperloop/ files on the
  branch correspond to the spec being implemented (not unrelated files).

  ## CHECK-BRANCH-HAS-IMPL-FILES — TWO LOOPHOLES PERMANENTLY CLOSED

  When this check exits non-zero, no reasoning can override the FAIL verdict.
  Two specific bypass arguments are permanently closed as of cycle task-006:

  **LOOPHOLE 1 — "Implementation is on main":** The check measures THIS branch's
  commits — not the project's overall state. Code that arrived on main via other
  branches or prior tasks does NOT satisfy the requirement that this branch contribute
  at least one non-.hyperloop/ commit. A branch where every commit exclusively
  touches `.hyperloop/` files has zero implementation, regardless of what exists
  on main. Do NOT PASS based on this reasoning.

  **LOOPHOLE 2 — "The check was added after the branch committed (FAST-FIX)":**
  FAST-FIX classification applies ONLY to sync-script race conditions where the
  newer version of a check script produces identical output to the older version
  — a timing artifact with no substantive impact. It does NOT apply to
  `check-branch-has-impl-files.sh` failures. A branch with zero implementation
  commits has a genuine gap regardless of when the check was added to main. The
  timing of the check's introduction is irrelevant to whether this branch did work.
  Do NOT classify this as FAST-FIX. Issue a standard FAIL.

  ## PERCEPTUAL CHANNEL VERIFICATION

  When a spec THEN-clause names a specific perceptual channel for a visual property,
  verify the implementation uses THAT channel — not a different one that produces
  a superficially similar effect.

  Common substitution errors to check for:

  | Spec says              | Invalid substitute     | What to grep/check                |
  |------------------------|------------------------|-----------------------------------|
  | "visual thickness"     | color channel scaling  | search for mesh width or geometry thickness; reject color-only changes |
  | "line style (dashed)"  | color encoding         | search for gap-geometry or dashed pattern; reject color-only encoding |
  | "opacity proportional" | visibility toggle      | check alpha is computed from ratio, not .visible flip |
  | "size proportional"    | color brightness       | check scale is applied to geometry |

  For each THEN-clause with a named perceptual channel:
  1. Identify the channel name in the spec text.
  2. Grep the implementation for that channel (e.g., `width`, `line_style`, `modulate.a`).
  3. If only a different channel is used, mark the requirement FAIL.
  4. Verify the test asserts the correct channel's value — not a substitute.

  ## SUPPRESSION GUARD VERIFICATION

  When a spec says an element is "NOT drawn", "suppressed", "hidden", or "not rendered",
  verify the rendering function contains an explicit guard condition (early return or
  conditional skip) keyed on the suppression flag.

  Steps:
  1. Identify the suppression clause (e.g., "the Edge is NOT drawn" for ubiquitous modules).
  2. Locate the rendering function responsible for that element.
  3. Search for the guard: `if ed.get("ubiquitous")`, `if node["suppressed"]`, etc.
  4. If no guard exists, mark the requirement FAIL — unconditional rendering violates the spec.
  5. Verify a test constructs a fixture with the suppression flag set and asserts no rendered
     node/mesh was created. A test that only checks the rendered output of non-suppressed
     elements does NOT cover the suppression requirement.

  ## LOD COMPLETENESS AUDIT (ALL LEVELS)

  Run `bash .hyperloop/checks/check-lod-level-tests.sh` and include its complete
  output verbatim in your findings.

  When the branch modifies ANY LOD or visualization code:
  1. List ALL LOD levels defined in the assigned spec (Near / Medium / Far).
  2. For EACH level, independently verify: (a) implementation code exists, AND
     (b) a behavioral GDScript test exercises it with fixture data.
  3. Do NOT limit your review to the LOD levels that have obvious code changes.
     A branch that adds "Medium" code while silently leaving "Far" unimplemented
     is FAIL — even if the verifier didn't notice the Far gap in their initial read.
  4. An LOD level with implementation but no behavioral test is PARTIAL, not COVERED.
  5. An LOD level with neither implementation nor test is MISSING.

  Scope note: if a particular LOD level's requirement existed before this branch and
  the branch did not touch it, apply the standard "pre-existing gap / not this
  task's remit" rule — but only when the branch made ZERO changes to that level's
  code path. If the branch touches shared LOD infrastructure, all levels are in scope.

  ## BIDIRECTIONAL OPERATION AUDIT (collapse/expand, open/close, fold/unfold)

  When a spec defines a forward operation AND its reverse, audit EACH direction
  independently before assigning coverage status:

  **Forward direction (collapse, close, fold):**
  1. Does the implementation capture ALL state needed by the reverse?
     Required: original positions, original edge endpoints, member list, any metrics.
     Missing any of these means the reverse cannot work correctly — mark PARTIAL.
  2. Does the implementation apply ALL side effects specified in the THEN-clauses?
     (Node animation, edge re-routing, label creation, etc.)

  **Reverse direction (expand, open, unfold):**
  1. Does the implementation READ the captured state from the forward operation?
     An expand that only calls `anchor.visible = true` WITHOUT restoring captured
     positions and edge endpoints is PARTIAL — visibility alone is not restoration.
  2. Does the implementation animate members BACK to their original positions
     (using the values captured during the forward operation)?
  3. Does the implementation restore edge endpoints to their original locations?

  Mark as PARTIAL (not COVERED) whenever:
  - State is captured during forward but not used during reverse.
  - The reverse restores visibility without restoring position or edge endpoints.
  - Original positions were not stored during forward, making correct reverse
    mathematically impossible (not just untested).

  Observed failure (task-019): `expand_cluster()` restored `anchor.visible = true`
  for each member but contained no Tween position animation and no edge endpoint
  restoration. The code comment inside the function explicitly acknowledged that
  original positions were not stored. Both expand THEN-clauses were PARTIAL/MISSING.

  ## EDGE RE-ROUTING WIRING CHECK (run when spec involves collapse/expand)

  Run `bash .hyperloop/checks/check-edge-rerouting-wired.sh` and include its
  complete output verbatim in your findings when the branch touches cluster
  collapse or expand code.

  Observed failure (task-068): `_path_edge_entries` was declared and had `.append()`
  calls in `_create_edge()`. collapse_cluster() and expand_cluster() were present.
  But no `for entry in _path_edge_entries:` loop existed anywhere in the file —
  the array was dead state. All four edge re-routing THEN-clauses were MISSING.

  If the check exits non-zero: all edge re-routing THEN-clauses are MISSING — do not
  mark any of them COVERED based on the data structure's existence or population alone.

  ## EDGE RE-ROUTING COVERAGE AUDIT

  When a spec THEN-clause uses the words "edge", "re-route", "reroute",
  "formerly connected", "updated edges", or "point to [supernode/aggregate]":

  1. Search the implementation files for edge re-routing code:
       grep -n "edge.*supernode\|reroute\|_path_edge_entries\|endpoint.*supernode" \
           godot/scripts/*.gd
     If grep returns zero matches, ALL edge re-routing THEN-clauses are MISSING.
     Do not mark any of them COVERED based on node-visual code alone.

  2. Verify re-routing exists in BOTH directions:
     - Collapse direction: edges that connected to cluster members now point to supernode.
     - Expand direction: those same edges restored to original endpoints.
     If only one direction is implemented, the other direction's THEN-clauses are MISSING.

  3. Verify test coverage for edge re-routing:
     - A valid test builds a fixture with edges that CROSS the cluster boundary.
     - Calls collapse and asserts the edge endpoint position equals supernode position.
     - Calls expand and asserts the edge endpoint returns to the original node position.
     Tests that only assert supernode creation or member visibility do NOT cover
     edge re-routing THEN-clauses.

  4. Node-visual changes (supernode appearance, tinting, labels) are ORTHOGONAL to
     edge re-routing. A perfect supernode implementation with zero edge re-routing
     leaves all edge-related THEN-clauses MISSING.

  Observed failure (task-019): four THEN-clauses across collapse and expand scenarios
  explicitly described edge re-routing. The implementer built correct supernode visuals
  and tinting. No edge re-routing code existed in either direction. Grep for rerouting
  patterns in changed files returned zero matches. All four clauses were MISSING.

  ## ANIMATION CLAUSE AUDIT — PARTIAL vs PASS-WITH-NOTE (MANDATORY)

  Run `bash .hyperloop/checks/check-highlight-function-has-tween.sh` and include
  its complete output verbatim in your findings when any GDScript file defining
  highlight or color-application functions is on the branch.

  For any spec THEN-clause containing "animated smoothly", "transition animated",
  "slides not jumps", or "animates from X outward":

  1. Locate the implementation function responsible for applying the animated change.
  2. Grep that function (and its file) for `create_tween` and `is_inside_tree`:
       grep -n "create_tween\|is_inside_tree" godot/scripts/<file>.gd
  3. Classify:
     - `create_tween` present in an `is_inside_tree()` branch → architecture is
       correct. PASS-WITH-NOTE: headless tests verify only the direct-assignment
       path; the Tween path is untestable in CI.
     - No `create_tween` anywhere in the file (only direct assignment, or comment
       "caller should Tween") → architecture is INCOMPLETE. PARTIAL — not PASS-WITH-NOTE.
  4. Do NOT accept an implementer's PASS-WITH-NOTE claim without independently
     verifying `create_tween` appears in the implementation code.
  5. A test that asserts only the final/steady-state outcome (color was applied,
     position changed) does NOT verify animation architecture. Read the
     implementation code directly; do not infer architecture from test assertions.

  **Outward propagation clauses** ("animates from selected module outward",
  "highlight propagates outward") additionally require BFS-ordered staggered
  delays. A loop applying all changes simultaneously with no per-hop delay is
  PARTIAL even when `create_tween` is present — simultaneity is not outward
  propagation.

  Observed failure (task-070, Finding 1): `_apply_node_color()` set
  `albedo_color` directly with no Tween code anywhere in the file. The spec
  clause "transition animated smoothly" was PARTIAL. The implementer claimed
  PASS-WITH-NOTE, which was incorrect — that label requires existing Tween code.
  Observed failure (task-070, Finding 2): all independent contexts received
  the highlight color in one loop with no delay. "Animates from selected module
  outward" was PARTIAL — simultaneous, not outward.

  ## NAMED PRIMITIVE AUDIT — EACH PRIMITIVE IS AN INDEPENDENT COVERAGE REQUIREMENT

  When a spec defines multiple named primitive types (e.g., Container, Node, Badge,
  Edge, Port, Landmark, Route), audit each primitive type INDEPENDENTLY. Do not carry
  coverage from one primitive type to satisfy another.

  Observed failure (task-029): Port Primitive was PARTIAL because the implementer
  rendered public functions as inner Node Primitives (inside the container at tier-2
  LOD) and treated that as Port coverage. Node Primitives inside a container do NOT
  satisfy "a Port anchored to the Container's membrane." No Port scene nodes existed
  on the membrane. Zero tests covered any Port scenario.

  For each named primitive in the spec, independently verify:
  1. Spatial attachment — does a DISTINCT scene node type exist, positioned at the
     spec-named attachment point? ("anchored to the membrane" means nodes must be ON
     the membrane surface — not inside the container body.)
  2. Edge wiring — when the spec says "Edges connect to [Primitive X], not to
     [Container body]", grep the rendering code for edge endpoint assignment. Verify
     edge target IDs reference Port node IDs, not Container node IDs.
  3. LOD behavior — does the primitive independently follow its specified LOD rule?
     A Port that should "fade in at tier-2" requires its own LOD entry, separate from
     the general Node Primitive LOD logic.
  4. Tests — does at least one behavioral test exist per scenario, with fixture data
     that creates the specific primitive type and asserts its spatial properties?

  Mark a primitive PARTIAL (not COVERED) when:
  - A different primitive type is used in its place (e.g., Node Primitive covers the
    function-rendering case but Port Primitive is absent).
  - Spatial attachment is wrong (nodes inside the container, not on the membrane).
  - Edge wiring targets the wrong node type.
  - No behavioral test asserts the primitive's spatial placement.

  Do NOT accept "functions are rendered at tier-2 LOD" as Port coverage when the spec
  requires "Ports anchored to the Container membrane." These are architecturally distinct.

  ## RELOAD PATH TEST VERIFICATION

  For any spec THEN-clause describing behavior "on reload", "smooth regrouping",
  "when new extraction produces different groups", or "nodes animate to new
  positions":

  1. Find the test that the implementer maps to this clause.
  2. Count how many times the primary build function (e.g., `build_from_graph()`)
     is called in that test:
       grep -c "build_from_graph\|build_from" <test_file>.gd
  3. A test that calls the build function only ONCE cannot exercise the reload
     path — the clause is PARTIAL.
  4. A valid reload test must:
     - Call build once with initial data.
     - Record an anchor identity and its position.
     - Call build again with DIFFERENT data.
     - Assert the anchor's position changed AND the object identity is the same.
  5. In headless mode the direct-assignment path is used (`anchor.position = new_pos`).
     This IS testable. "Headless can't verify Tween" does NOT excuse the absence of
     a two-call test — the position change is observable without Tween.

  Observed failure (task-065): every test for the "smooth regrouping on data
  change" scenario called `build_from_graph()` exactly once. The reload path
  was never exercised. The clause was PARTIAL. The verifier provided the exact
  test body needed; the fix required only adding one test function.
