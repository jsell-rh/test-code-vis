apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  ## PRE-FLIGHT — MANDATORY FIRST ACTIONS (before reading anything)

  No matter how rich the task description is, no matter how many spec files it
  references, and no matter what prior failures occurred: do ONLY these two
  commands first.

  1. `git checkout -B <task-id>`                          ← capital -B, always
  2. `git commit --allow-empty -m "chore: begin <task-id>"`

  If step 1 fails → output the error verbatim and stop. Do not continue.
  If step 2 fails → output the error verbatim and stop. Do not continue.

  Only after BOTH commands succeed may you read a spec, run git status, explore
  code, or form an implementation plan. This applies on every dispatch — first
  attempt, re-attempt, and post-reset — regardless of what the task description
  says or how curious you are about prior failures.

  **First-attempt trap (round: 0, branch: null):** A first dispatch has NO prior
  review history to remind you of this requirement. The temptation to "understand
  the task before branching" is highest here — and causes the same total loss as
  any other missed checkpoint. There is no grace period on a first attempt.

  ---

  ## Project: code-vis

  **BRANCH-NULL TRAP — read this before anything else:** When the task state shows
  `branch: null`, the ONLY permitted first two Bash calls are
  `git checkout -B <task-id>` → `git commit --allow-empty -m "chore: begin <task-id>"` —
  in that order, with zero tool calls (Read, Glob, Grep, or any other) in between.
  Skipping this sequence or reversing the order causes "Agent future missing or failed"
  and loses the entire cycle. Make the checkout and the commit before you read a single
  file. `check-not-on-main.sh` fails mechanically if you are still on `main` at
  submission time, which means you made the checkpoint on the wrong branch.

  **Checkpoint commit (first action, no exceptions):** Your very first Bash tool call —
  before any Read, Glob, Grep, or other tool — MUST be:
  `git commit --allow-empty -m "chore: begin <task-id>"` (preceded by
  `git checkout -B <task-id>` if the task has `branch: null`).
  This is the only way to signal the agent is running; if the session crashes without it,
  the orchestrator sees "agent future missing or failed" and the entire cycle is lost.
  `check-checkpoint-commit.sh` (included in `run-all-checks.sh`) fails mechanically if
  this commit is absent from the branch — add it retroactively before submitting if you
  missed it.
  **Re-attempt rule:** If your branch already has commits from a prior failed round, the
  checkpoint commit is STILL required as your first new action this cycle — make it even
  if commits already exist on the branch. The orchestrator resets its signal tracking on
  each dispatch; without a new checkpoint commit, this cycle is invisible and will be
  reported as "agent future missing or failed" regardless of prior work on the branch.
  **Branch-null rule (task reset or first attempt with no existing branch):** When the
  task state shows `branch: null` — meaning the branch was deleted after a reset or this
  is a completely fresh attempt — the only permitted first two Bash commands are:
  `git checkout -B <task-id>` then immediately `git commit --allow-empty -m "chore: begin <task-id>"`.
  Use the capital `-B` flag (not lowercase `-b`) — it force-resets the local branch ref
  even if a stale local branch with that name still exists from a prior reset cycle.
  Using lowercase `-b` will ERROR with "branch already exists" if the local ref was not
  cleaned up after the remote was deleted, which prevents the checkpoint commit from ever
  being made and causes "agent future missing or failed" in the next orchestrator cycle.
  No other tool (Read, Glob, Grep, Bash, or anything else) may execute between those two
  commands. Do NOT read the spec, check git status, explore the repo, or inspect the task
  state before the checkpoint commit exists on the branch. The exact sequence is:
  `git checkout -B <task-id>` → `git commit --allow-empty -m "chore: begin <task-id>"` → everything else.
  **Post-reset branch is gone remotely, but may linger locally:** After a branch reset the
  orchestrator deletes the remote branch — but the LOCAL branch ref often still exists.
  `git checkout task-NNN` (no flag) will switch to that stale local branch rather than error.
  Always use `git checkout -B <task-id>` to force-reset to the current HEAD of main,
  ensuring a clean branch regardless of prior local state.

  **Never stage .hyperloop/state/ files.** Files under `.hyperloop/state/` (task YAMLs,
  review files, intake records) are managed exclusively by the orchestrator. Committing
  them to your task branch causes permanent rebase conflicts and forces a branch reset,
  losing all your work. Stage files individually — never use `git add -A` or `git add .`.
  Only stage source files and `.hyperloop/worker-result.yaml` explicitly.
  `check-no-state-files-committed.sh` (included in `run-all-checks.sh`) fails
  mechanically if any `.hyperloop/state/` file appears in your branch's commit history.
  **If a state file appears in `git status` as modified or untracked, restore it from
  main with `git checkout main -- .hyperloop/state/<file>` — do NOT stage or commit it.**
  Staging a state file "to eliminate the diff" or "to sync from main" is the opposite of
  the fix: it introduces the file into your branch's commit history and guarantees a
  rebase conflict. The only correct responses to a state-file diff are: (a) at rebase
  time, `git checkout --theirs .hyperloop/state/ && git add .hyperloop/state/`; (b) in
  the working tree, `git checkout main -- .hyperloop/state/<file>` (leaves it unstaged).

  This project has two components with different languages and tooling. Understand which
  component your task targets before writing code.

  ### Component 1: Python Extractor (`extractor/`)
  - Parses the kartograph codebase (~/code/kartograph) and outputs a JSON scene graph.
  - Python 3.12+. Use only standard library + tree-sitter (or ast module).
  - Output is a single JSON file that the Godot app consumes.
  - No frameworks. Keep it simple — a CLI script.
  - Use type hints throughout. Run `ruff check` and `ruff format --check` before committing.
  - Write tests with pytest for extraction logic.

  ### Component 2: Godot Application (`godot/`)
  - Godot 4.x with GDScript.
  - Loads the JSON scene graph and renders it as a navigable 3D space.
  - Use Godot's built-in node types (MeshInstance3D, Label3D, etc.).
  - Keep scenes composable — one scene per logical visual element.
  - Do not hardcode paths to the kartograph codebase in the Godot project. The JSON file
    is the sole interface between the extractor and the Godot app.
  - **GDScript tests are required for every Godot spec scenario.** A compile check (`godot --headless --quit`) is NOT a test — it only confirms the project parses, not that any behavior is correct.
  - Write GDScript tests in `godot/tests/` (filenames: `test_*.gd`). Each test must instantiate the relevant node/script, call its functions with a known fixture dictionary, and assert the resulting scene-tree structure or property values.
  - Use a headless test runner: either the GUT addon (`addons/gut/`) or a minimal custom `godot/tests/run_tests.gd` script that prints PASS/FAIL and exits non-zero on failure.
  - Before marking a scenario complete, quote each THEN clause verbatim and confirm exactly which line of code implements it. Vague phrases like "direction is visually indicated" or "size is encoded" are implementation requirements — add the specific rendering element (arrowhead, cone, scaled mesh, etc.) and assert it in a test.

  ### General
  - The JSON scene graph is the interface contract between the two components.
    If you change its schema, update both sides.
  - Specs are in `specs/`. Read the relevant spec thoroughly before implementing.
  - This is a prototype — prefer simple and working over clever and flexible.
  - Do not add dependencies beyond what the spec requires.
  - **Empty `_ready()` / `_process()` stubs are never a complete implementation.** If a
    spec scenario says Godot renders, positions, or instantiates something, the relevant
    script must contain code that creates nodes and sets their properties — `pass` alone fails.
  - **Dict-key assertions do not satisfy rendering THEN clauses.** A test that only checks
    `dict.has("position")` or `dict["position"].has("x")` does NOT cover a scenario that
    says "renders nodes at pre-computed positions." The test must instantiate the Node3D,
    call the function under test, and assert the actual `.position.x`, `.position.y`,
    `.position.z` values on the scene-tree node — not on an intermediate dictionary.
  - **Node properties that produce visual behavior require property-value tests.** If a THEN clause is satisfied by setting a node property (e.g. `billboard`, `pixel_size`, `no_depth_test`, `transparency_mode`, `cull_mode`, `albedo_color.a`), write a test that builds the scene from fixture data and asserts that property value on the resulting node. "The engine renders it correctly" is never a substitute for asserting the property.
  - **Label3D readability is mandatory, not optional.** Whenever you create a `Label3D` node, you MUST immediately set `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` and `label.pixel_size = 0.05` (or another legible value > 0.0). These are not style choices — a Label3D at default settings is illegible in a 3D scene. Write tests asserting both `billboard == BaseMaterial3D.BILLBOARD_ENABLED` and `pixel_size > 0.0` on the resulting node, even if the spec's THEN clause only mentions "add an annotation."
  - **Technology/version constraint scenarios require behavioral tests too.** A spec scenario
    like "Engine version" or "GDScript only" is NOT satisfied by setting a config file value
    alone. Write a GDScript test that reads the config file via `FileAccess.open()` +
    `get_as_text()` and asserts the expected version or constraint (e.g., assert the string
    "4.6" appears in the `project.godot` content). Config-without-test is PARTIAL.
  - **`_ready()` file I/O must be covered by at least one test.** If `_ready()` uses
    `FileAccess.open()` + `get_as_text()` but unit tests bypass `_ready()` by calling
    internal methods directly, add a test that exercises `FileAccess.open()` +
    `get_as_text()` on a known file and asserts its content. The call path must appear in
    a test, not only in production code.
  - **Before submitting, run the master check runner — not individual scripts.** Execute `bash .hyperloop/checks/run-all-checks.sh` and paste its COMPLETE output into your submission report under a `## Check Script Results` heading. Running individual checks selectively and omitting others from your report is NOT acceptable — it is how working checks get silently bypassed. The master runner executes every script in `.hyperloop/checks/` so none can be skipped.
  - **Audit the 'Not In Scope' section before writing any code.** Open the spec, find every item listed under "Not In Scope", "MUST NOT", or "prohibited", and write them down. Do not implement any of them in any form — not as code, a helper function, a CLI flag, a commented block, or a test. A prohibited feature that is flag-gated or disconnected is still a prohibited feature.
  - **Run check-not-in-scope.sh before submitting.** Execute `.hyperloop/checks/check-not-in-scope.sh` and confirm it exits 0. Any prohibited feature detected is an automatic block on submission — remove the feature, its tests, and all wiring before reporting done.
  - **Run check-not-in-scope.sh before creating any new file.** Do not wait until submission. If you are about to create a file, function, CLI flag, or test that would make the check fail, do not create it. Run the check after every logical chunk of new code, not only at the end.
  - **There are no acceptable forms of a prohibited feature.** A prohibited feature implemented as "optional", "flag-gated", "helper", "commented out", or "disconnected from main" is still a prohibited feature and will fail the scope check. Remove it completely — code, tests, CLI flags, signal connections, and wiring — before reporting done.
  - **Your submission MUST include the verbatim output of `check-not-in-scope.sh`.** Run `.hyperloop/checks/check-not-in-scope.sh` as the final step before reporting done, and paste its complete stdout into your submission report under a heading "## Scope Check Output". A submission that omits this section will be treated by the verifier as if the check was never run and will receive an automatic FAIL.
  - **"Verbatim" means literal copy-paste — NOT a paraphrase, NOT a summary, NOT a bullet point.** Do NOT write things like "check-not-in-scope.sh: OK" or "scope check passed" anywhere as a substitute. The required format is exactly: a standalone `## Scope Check Output` section header followed by the raw terminal output on the next line, e.g.: `OK: No prohibited (not-in-scope) features detected.` Run `.hyperloop/checks/check-report-scope-section.sh` after drafting your report to mechanically confirm the section is present and correct before submitting.
  - **Every THEN-clause requires its own named test assertion.** Before submitting, list every THEN-clause from the spec in your report and name the exact test function (and assertion line) that covers it. A THEN-clause that is correctly implemented in production code but has no test directly exercising the behavior is PARTIAL — not COVERED. "Indirect coverage" (e.g., another test incidentally touching the same path) does not count; the test must explicitly assert the observable outcome described in the THEN-clause.
  - **"All X are Y" THEN-clauses require iteration tests — not config-string tests.** If a THEN-clause says "all [files/scripts/nodes] are [type/property]" (e.g., "all scripts use GDScript", "all nodes have a label"), write a test that iterates the complete set using `DirAccess`, an array loop, or equivalent, and asserts the predicate on every element. Mapping such a THEN-clause to a test that checks a config value, a version string, or a single representative sample is INCORRECT — the predicate "all" demands iteration. Before mapping, ask: "Does my named test actually enumerate every member of the set?"
  - **Constraint behaviors (clamping, bounding, capping) require explicit constraint tests.** If a THEN-clause is satisfied by clamping, bounding, or limiting a value (e.g., theta clamped to prevent flip, distance clamped to minimum), write a test that drives the input past the limit and asserts the clamped result. A test that only verifies normal-range behavior does not cover the constraint.
  - **`run-all-checks.sh` includes `check-clamp-boundary-tests.sh` automatically.** That script enumerates every `clamp()` assignment in production GDScript and fails if any clamped variable lacks a boundary-asserting test. Partial coverage (one clamped variable tested, another missed) is the exact failure mode it catches — and why you must use the master runner rather than selecting which checks to run.
  - **A SKIP result from any check must be verified — it is not a free pass.** Read the check script's skip logic and confirm the skip condition genuinely applies to your branch. If the script skips when "no constraint found in spec" but your spec files contain the constraint, the correct result is FAIL not SKIP. Never report SKIP from memory or assumption; copy verbatim terminal output from an actual run on the current codebase. A falsely reported SKIP is treated identically to a falsely reported PASS: active falsification.
  - **When run-all-checks.sh reveals a pre-existing failure (from code not introduced by your branch), fix it before submitting — do not cite attribution.** Add the missing test or code in a separate preparatory commit with message "fix: address pre-existing check failure in <area>" before your task implementation commits, then re-run run-all-checks.sh to confirm it exits 0. "This was broken before my branch" is never an acceptable reason to leave a FAIL unresolved.
  - **Never reformat `run-all-checks.sh` output into inline form.** The master runner produces multi-line blocks: a `--- check-name.sh ---` header, the check's stdout, then `[EXIT 0]` or `[EXIT N — FAIL]` on its own line. Copy-paste this exact multi-line format verbatim into your `## Check Script Results` section. Do NOT condense it to an inline form such as `check-name.sh  [EXIT 0]  description` — inline formats evade the falsification detector (`check-compound-coverage-not-falsified.sh`) and will be flagged as falsification by the spec reviewer even if the underlying check passed.
  - **Before writing a single line of code, write down every item from the spec's "Not In Scope" section as a bullet list in your scratchpad.** Keep that list visible throughout implementation. If you feel tempted to add a feature that resembles any item on that list, stop and consult the list — do not implement it.
  - **Prohibited file NAMES do not prohibit the FEATURE — but a prohibited FEATURE is prohibited under any name.** The "name ban ≠ feature ban" rule applies ONLY in the narrow case where a spec explicitly bans a specific filename while still requiring the capability (e.g., "do not name the file `view_spec_renderer.gd`"). It does NOT apply when the spec bans a FEATURE in its "Not In Scope" section (e.g., "moldable views is NOT implemented"). A feature banned in "Not In Scope" is prohibited under every possible filename, class name, function name, and organizational structure. Renaming `view_spec_renderer.gd` → `scene_interpreter.gd` and `LlmViewGenerator` → any other class name does NOT make a prohibited feature compliant.
  - **`check-not-in-scope.sh` uses keyword matching, but the check is not exhaustive.** After the check passes, do a manual audit: for every feature in the spec's "Not In Scope" list, read your new files and ask "does any code here implement this capability?" If yes — delete it, its tests, and all wiring immediately, even if the check script did not flag it.
  - **Multi-stage pipelines require ALL stages to be implemented.** When the spec describes a data-flow pipeline (e.g., "LLM produces view spec; the renderer interprets it"), implement every stage — producer AND consumer. Producing an intermediate representation (e.g., a dictionary from `parse_response()`) without writing the code that consumes it and produces the final output (e.g., mutating the 3D scene) is a PARTIAL implementation. Before submitting, trace each intermediate value the spec describes and confirm there is code that reads it and acts on it.
  - **Run `.hyperloop/checks/check-pipeline-wiring.sh` before submitting.** This script verifies that key pipeline stages are wired end-to-end. Fix any FAIL lines before reporting done.
  - **Integration tests are required when the spec names a specific target path.** If the spec says "MUST use [path]" or describes a scenario "GIVEN the [named codebase]", write an automated test (pytest or shell) that invokes the code against that actual path and asserts that expected output is present. A committed output artifact (e.g., scene_graph.json) is evidence the pipeline was run manually, not an automated test. Run `check-kartograph-integration-test.sh` before submitting.
  - **Delete prohibited files immediately — never plan to remove them later.** If you realise mid-implementation that a file you just created would be flagged by `check-not-in-scope.sh`, delete it, its tests, and all wiring now. A prohibited file left "temporarily" in the working tree is how scope violations survive to submission.
  - **The check output you paste must come from a terminal run on the current codebase state.** Do not copy a previous "OK" result, recall it from memory, or paste it from an earlier run. If the latest run produced FAIL lines, those FAIL lines are your current scope check output — paste them, fix every violation, re-run the check, and only then update your report with the new passing output.
  - **Pasting stale or fabricated check output is a more severe finding than a scope violation.** A report that shows "OK: No prohibited" while prohibited code is present is active falsification. The verifier will flag this explicitly. Always report what the script actually printed.
  - **`run-all-checks.sh` exit-0 is the hard submission gate — no exceptions.** If `run-all-checks.sh` exits non-zero for any reason (including `check-report-scope-section.sh`), fix every FAIL and re-run until the master runner exits 0 before reporting done. Submitting with a known FAIL in the check output is invalid regardless of how minor the fix appears.
  - **Rebase your branch onto current `main` BEFORE syncing checks or running `run-all-checks.sh`.** Run `git rebase main` first so your worktree picks up the latest check scripts and state. At any rebase conflict on a `.hyperloop/state/` file, accept `main`'s version (`git checkout --theirs .hyperloop/state/ && git add .hyperloop/state/`) — you never own those files. `check-no-state-files-committed.sh` uses `git log main..HEAD` (commit-based, not tip-diff-based), so state files updated on main after your rebase will NOT cause false positives — only files your branch's own commits introduced will be flagged.
  - **Sync `.hyperloop/checks/` from `main` before running `run-all-checks.sh`.** New check scripts may have been added to `main` after your worktree was created, so your worktree may contain a stale subset. Run `git checkout main -- .hyperloop/checks/` first — this pulls any missing check files into your worktree without switching branches. Only then run the master runner. If you skip this step, you will silently miss checks that the verifier will run, and your submission will fail on findings you never saw.
  - **Pre-existing failures from check scripts still block your submission.** A check that FAILs because of code already present on `main` (unchanged by your branch) is not exempt. Fix the underlying issue before submitting — "this was broken before my branch" is not an acceptable reason to leave a FAIL unresolved.
  - **"Agent future missing or failed" is an orchestrator-level total loss — no partial credit, no recovery.** It occurs when the orchestrator receives no liveness signal from the agent before the session ends. The ONLY signal it accepts is the checkpoint commit (`chore: begin <task-id>`) as the FIRST commit on the task branch. A cycle that ends without that commit as the oldest branch commit is treated identically to an agent that never ran — all work is unrecoverable.
  - **`check-checkpoint-commit-is-first.sh` verifies the checkpoint is the chronologically OLDEST commit on the branch.** The existing `check-checkpoint-commit.sh` only confirms the commit exists somewhere in history; a checkpoint commit added AFTER exploratory commits still fails the orchestrator signal. Use `git log main..HEAD --reverse --pretty=format:"%s" | head -1` to confirm the first line is `chore: begin <task-id>` before submitting.
  - **A new file whose docstring cites a prohibited spec section IS that prohibited feature — regardless of filename or class name.** Before submitting, grep every new file you created for references to spec paths listed under "Not In Scope" (e.g., `data-flow.spec.md`, `moldable-views.spec.md`). A docstring line like "Covers all THEN-clauses from specs/visualization/data-flow.spec.md" is unambiguous proof the file implements a prohibited feature. Delete it and all wiring immediately.
  - **The required section header is `## Scope Check Output` — NOT `## Scope Check`.** Writing `## Scope Check` (without the word "Output") causes `check-report-scope-section.sh` to exit 1 even when the scope check itself passed. To avoid this: create your skeleton `worker-result.yaml` by copy-pasting the literal string `## Scope Check Output` — never type it from memory.
  - **Grep for every test function name you list in your THEN→test mapping before submitting.** For each entry in your mapping, run `grep -rn "<test_function_name>" extractor/ godot/` (both directories — Python tests live in `extractor/tests/`, GDScript tests in `godot/tests/`) and confirm it returns at least one match. A test name you list that does not exist in the test files is fabrication — an automatic FAIL worse than a missing test. Do not invent names of tests you intended to write; if the test is missing, write it first. `check-then-test-mapping.sh` (included in `run-all-checks.sh`) enforces this mechanically.
  - **After confirming a test exists, open the test file and read every `assert` statement in its body. Verify the asserted predicate matches the THEN-clause predicate — not just the topic.** A test that shares the same subject as the THEN-clause but asserts a different property (or the opposite direction) is a wrong-predicate mapping identical to an unmapped clause. "The test is about the camera" is not sufficient; "the test asserts `cam._distance` decreases over `_process()` frames" is.
  - **Beware of opposite-direction traps when mapping THEN-clauses about visibility, direction, or magnitude.** If the THEN-clause says "X becomes visible / increases / enabled", open the test and confirm the assertion reads `== true`, `> threshold`, or equivalent positive direction — not `== false` or `== null`. A test whose name sounds relevant but asserts the opposite outcome is the most dangerous wrong-predicate mapping because it looks correct at a glance.
  - **A THEN-clause that lists multiple capabilities with "and" (e.g., "pan, zoom, and rotate"; "A, B, and C") requires one mapping entry per capability — not a single test that covers only one.** If no single test exercises all listed capabilities, cite multiple tests (one per capability) in that row. Mapping a multi-capability THEN-clause to a single test that covers only one capability is a wrong-predicate mapping and will FAIL. `check-compound-then-clause-coverage.sh` enforces this mechanically.
  - **"All X are Y" THEN-clauses cannot be satisfied by a test that checks a single instance or a config string.** If your mapping entry for such a THEN-clause names a test that reads a config file, checks a version string, or asserts one representative sample, your mapping is wrong even if the test exists. Replace the mapping with a test that iterates every member of the set (via DirAccess, array loop, etc.) and asserts the predicate on each.
  - **Before running any check, verify your branch has commits: `git log main..HEAD --oneline`.** An empty result means your branch is identical to main — you have submitted no implementation. Commit your work first. `check-branch-has-commits.sh` (included in `run-all-checks.sh`) will fail loudly on an empty branch, but do not wait for it — check before running anything. A branch with zero commits is not a partial implementation; it is no implementation.
  - **CLI entry points require dedicated tests.** If a Python component exposes a `main()` function (or `__main__.py` entry point), write at least one pytest test that calls `main([...])` directly or invokes the module via `subprocess.run(["python", "-m", "<pkg>", ...], check=True)` and asserts exit code 0 and valid output. A THEN-clause "runs as a standalone CLI tool" is PARTIAL until this test exists. `check-extractor-cli-tested.sh` enforces this mechanically.
  - **"Stdlib-only" or "no dependencies" constraints require an explicit import-inspection test.** If a spec THEN-clause says a component "requires no dependencies beyond stdlib" or similar, write a test that parses the package's source with `ast` and asserts every top-level import name appears in `sys.stdlib_module_names`. Do not rely on the absence of a `requirements.txt` as a proxy — that is not a test. `check-extractor-stdlib-only.sh` enforces this mechanically.
  - **Scale scenarios require a fixture at the scale stated in the spec.** If a MUST requirement says the system works at "N modules / M files across K bounded contexts", write a test that calls the relevant function with a synthetic fixture of at least that scale (or the actual target codebase) and asserts no errors and correct output counts. A test at a smaller scale does not cover the MUST. "Performance cannot be measured in headless tests" applies only to FPS; structural correctness at scale is always testable.
  - **Check scripts added to main after your branch was created are still blocking.** If `git checkout main -- .hyperloop/checks/` pulls in scripts that were not present during your implementation, every FAIL from those scripts blocks your submission — regardless of when the script was added. "The check didn't exist when I synced" is not an exemption. Read each new script's FAIL message, add the required tests or code, and re-run `run-all-checks.sh` until it exits 0 before submitting.
  - **Platform/runtime constraint THEN-clauses require explicit `OS.has_feature()` tests.** If a spec scenario says the system "runs natively on desktop", "does not run in a browser/container/VM", or similar, write a GDScript test that calls `OS.has_feature("web")` (and/or `"android"`, `"ios"`) and asserts the negative — do NOT rely on the Godot project type structurally enforcing it. Additionally, read `project.godot` via `FileAccess.open()` + `get_as_text()` and assert no web-export settings are present. The project being configured as a desktop app is architectural evidence, not a test.
  - **Proactively flag untestable THEN-clauses in your submission report.** If a THEN-clause describes a property that is physically impossible to verify in the headless/CI environment (e.g., FPS measurement without a render pipeline, OS identity at runtime, absence of browser/container when only a source tree is present), document it explicitly in your report under "## Untestable THEN-Clauses" with three items per clause: (1) the verbatim THEN text, (2) why it is untestable in this environment, and (3) the architectural evidence that demonstrates compliance (e.g., no HTML5 export preset in project.godot, no Dockerfile, LOD system present). Do not leave an untestable clause silently uncovered — document the gap so the verifier can apply PASS-WITH-NOTE rather than FAIL.
  - **"End-to-end wiring" means `main.gd` (or a named coordinator) calls ALL pipeline stages.** The components existing as class files in `godot/scripts/` is NOT wiring. Wiring means a coordinator script instantiates and calls each stage: `var gen = LlmViewGenerator.new(); var spec = gen.parse_response(llm_output); interpreter.apply_spec(spec, anchors, self)`. Before reporting done, open `main.gd` and confirm each required stage is called there.
  - **UI requirements are scene-tree requirements, not logic requirements.** If the spec says "question input UI" or "submit button", a Godot scene must contain the corresponding node (LineEdit, Button, etc.) added in `_ready()` or present in a `.tscn`. A function that builds a prompt string does NOT satisfy a UI requirement. Add the node, connect its signal, and test that the signal triggers the pipeline.
  - **Integration tests must call ALL pipeline stages in one test body.** When the spec says "wire X → Y end-to-end," at least one test must call the producer stage (build_prompt / parse_response), pass its output to the consumer stage (apply_spec / render_spec), and assert the resulting scene-tree state. Two separate unit tests — one for the producer, one for the consumer — do NOT constitute an integration test. Run `check-end-to-end-integration-test.sh` before submitting.
  - **Before writing a commit message, run `git diff --name-only HEAD` to see which files you actually changed.** Only list files that appear in that output. Never cite files from a previous task's commit as work done in the current commit. A commit message that claims files not present in `git show --stat HEAD` is falsification.
  - **"(i.e. Y)" in a THEN-clause is the authoritative behavioral definition — not an optional clarification.** When the spec writes "THEN X (i.e. Y)," derive your implementation and tests FROM Y, literally and exactly. Do not generalize, paraphrase, or reinterpret. If Y is a directional statement ("dragging left reveals content to the right"), your sign chain MUST produce exactly that outcome.
  - **For pan/drag THEN-clauses, reason from the user-visible screen outcome first, then work backward to the pivot/delta sign.** "Scene moves left" means objects on screen shift left — the camera pivot must move RIGHT (opposite to apparent motion). Camera-pan model (pivot follows drag) and map-grab model (pivot moves against drag; content follows drag) are behaviorally opposite for the same input. Identify which the spec requires by reading the "(i.e.)" example before writing any code, then trace: user-visible-outcome → pivot direction → sign in code.
  - **Your pan/drag sign-chain derivation comment MUST end with the user-visible screen outcome, not just the pivot state.** Acceptable final step: "→ content from the right enters view ✓". Unacceptable final step: "→ pivot.x increases" — pivot state alone cannot distinguish map-grab from camera-pan. The final arrow must name what the user sees on screen. `check-pan-grab-model-comments.sh` (included in `run-all-checks.sh`) enforces this mechanically.
  - **SKIP from `check-then-test-mapping.sh` means your mapping format was not recognised — it is NOT a passing result.** The check extracts test names from three formats: Format 1 (`file::test_name`), Format 2 (markdown table with a PASS/FAIL/PARTIAL verdict column), and Format 3 (bullet backtick `` - `test_name` ``). A SKIP occurs only when the file contains no parseable test references at all. If the check skips and your mapping section is non-empty, your format is wrong — rewrite the mapping in Format 1 or Format 2 and re-run until the check exits 0 with named counts.
  - **Count every THEN-clause in the spec before writing a single mapping row.** Run `grep -c 'THEN' specs/<relevant-spec>.md` and record that number. Your completed mapping table must have at least that many rows (one per THEN-clause, plus separate rows for compound "A and B" sub-capabilities). If your table has fewer rows than THEN-clauses, find and add the missing ones before submitting. Scenarios in different parts of the spec that name the same concept (e.g., two THEN-clauses in separate scenarios both saying "reflects coupling") each require their own mapping row.
  - **"AND"-prefixed rows in the THEN→test mapping table are compound clauses.** Any row whose THEN-clause text begins with "AND the …" still contains the word "and" and triggers `check-compound-then-clause-coverage.sh`. Each such row must cite ≥2 test functions: at minimum the test for the sub-capability named in that row AND the test from the parent THEN row above it. A single citation is not enough, even if the row appears to describe only one behavior.
  - **Re-run `run-all-checks.sh` after every edit to the THEN→test mapping table.** If you add, modify, or remove rows from the mapping table after running checks, the previously recorded check output is stale and invalid. Replace the entire `## Check Script Results` section with the output of a fresh `run-all-checks.sh` run made against the current file state before submitting. A check that returned SKIP on an incomplete table is not a passing result once the table is populated.
  - **"X reflects Y" THEN-clauses require algorithm-quality tests, not rendering-fidelity tests.** When a THEN-clause says "positions reflect coupling," "sizes reflect complexity," or similar ("X reflects/encodes Y"), the covering test must VARY the input property Y in its fixture and assert that the output X changes correspondingly (e.g., coupled pair is closer than uncoupled pair). A rendering-fidelity test — one that loads pre-computed values from a fixture and asserts they appear unchanged in the scene — does NOT cover this: it passes even if the computation is random or absent. Ask yourself: "Would this test fail if the layout algorithm ignored Y entirely?" If the answer is no, the predicate is wrong.
  - **Before finalising a THEN→test mapping entry, write down the test's fixture inputs and its assert statement in one sentence, then compare it to the THEN-clause.** Sentence form: "Given [fixture describing the input property], the test asserts [the output relationship]." If the fixture does not vary the property named in the THEN-clause, or the assert does not check the relationship named in the THEN-clause, the mapping is wrong — find or write the correct test before submitting.
  - **For sign-convention / directional behaviors, derive test assertions from the spec BEFORE writing implementation.** When a spec names a concrete behavioral reference (e.g., "Google Maps style": drag left → scene moves left → right-side content comes into view), trace the full sign chain in a comment in the test body: `# drag left → delta.x < 0 → × right_vec (+X) × minus sign → pivot.x increases → camera moves right → scene shifts left ✓`. Write the `assert` to match that derivation. Never observe implementation output and assert it — that produces a test that passes with a wrong implementation.
  - **Derivation arrow comments (`→` or `->`) must appear as `#` inline comments INSIDE the function body — after the `func` declaration line, not in `##` GDScript docstrings preceding it.** `check-direction-test-derivations.sh` scans only the lines that follow the `func` line; arrows placed in a docstring above `func` are never found. If you write a docstring derivation, duplicate the key arrow line as an inline comment inside the function body before the first assertion.
  - **A test name that encodes a spec requirement (e.g., `test_pan_direction_not_inverted`) must assert the spec's definition, not what the implementation happens to produce.** After writing any such test, re-read the spec's behavioral description and verify your `assert` predicate matches the spec's stated outcome, not your implementation's output. If the spec says "dragging left reveals content to the right," explicitly confirm the assertion enforces that — write the sign-chain derivation as a comment in the test.
  - **"Relative to parent" coordinate contracts require a non-proximity test.** When the spec says a child node's `position` field is "relative to its parent," write a test that: (a) places the parent at a **non-zero** world position (e.g., x=10, not x=0), (b) asserts `child["position"]["x"] == local_offset` (the expected local offset alone), and (c) asserts `child["position"]["x"] != parent["position"]["x"] + local_offset` (it is NOT the absolute world coordinate). A test that only checks `abs(child_pos - parent_pos) < threshold` passes for both absolute and relative storage whenever the offset is small — it does NOT cover the contract.
  - **Before shipping any position/coordinate test, ask: "Would this test fail if the code stored absolute world coordinates instead of the local offset?"** If the answer is no — if parent is at the origin, or if you only check proximity — the test is insufficient. Move the parent fixture to a non-zero, non-trivial position so that `absolute ≠ relative`, then assert the stored value equals the local offset directly.
  - **JSON interface field semantics must be verified from the consumer's perspective.** When Python writes a position field that the Godot consumer treats as a local offset (adding parent world position on top), write a Python test that explicitly verifies only the local offset is stored — independent of any Godot test. The contract lives on the Python side; the Godot side's behavior tells you *what to verify*, not *that it has been verified*.
  - **When you fix a wrong-predicate mapping for one "X reflects Y" THEN-clause, grep the full mapping table for ALL other rows naming the same Y-concept and update each sibling.** Example: if you correct a "position reflects coupling" row to cite an algorithm-quality test, search for every other row containing "reflects" and "coupling" (or "coupled") and verify each also cites the same algorithm-quality test — not a rendering-fidelity test. A fix applied to one sibling while another remains wrong is still a FAIL.
  - **In a Pattern-1 GDScript test suite (`var _test_failed` is declared), ALL test functions MUST use `_check()` — never `return bool`.** The Pattern-1 runner calls each test method and ignores its return value; only calls to `_check()` can set `_test_failed = true`. A test that `return`s a bool without calling `_check()` is permanently inert — it always reports PASS. Correct form: `func test_foo() -> void: … _check(<expr>, "description")`. Wrong form: `func test_foo() -> bool: … return <expr>`. Run `check-gdscript-test-bool-return.sh` before submitting.
  - **Before adding a test function to a Pattern-1 suite, check whether the file declares `var _test_failed`.** If it does, write every test function as `-> void` using `_check()`. If the file does not declare `_test_failed` (Pattern-2), return values are used. Never mix patterns in the same file.
  - **Removal tasks require a scope inventory before touching any file.** If your task is to remove prohibited features or dead code, run `check-not-in-scope.sh` as your very first action and record every FAIL line. The task description may name only one prohibited feature; other violations may already be present. Treat every FAIL line as a required deletion target and track each to completion before submitting.
  - **Re-attempt protocol — mandatory before writing any new code.** When dispatched to a branch that already has implementation commits from a prior failed round (`git log main..HEAD --oneline` shows commits beyond the checkpoint), STOP. Before writing a single new line of code: (1) Read the prior verifier's `## Check Script Results` section. (2) Write down every check that shows `[EXIT 1 — FAIL]`. (3) Apply the prescribed fix for each failing check. (4) Run that check individually (`bash .hyperloop/checks/<check-name>.sh`) and confirm EXIT 0. (5) Only after every previously-failing check exits 0 individually may you proceed. Re-submitting with the same FAIL checks as the prior round is never acceptable — the verifier will document it as a re-attempt compliance failure, separate from the original finding.
  - **A committed state file cannot be fixed by committing it again.** `check-no-state-files-committed.sh` uses `git log main..HEAD -- <file>` — it detects whether ANY commit on the branch ever touched the file, regardless of current file content. Committing the state file again, even with content byte-for-byte identical to `main`, adds ANOTHER commit entry to branch history and permanently guarantees the check fails. Do NOT run `git checkout main -- .hyperloop/state/<file> && git add .hyperloop/state/<file> && git commit` — this is the exact wrong move. The ONLY valid fixes are: (a) Rewrite all branch commits: `git filter-branch --index-filter 'git rm --cached --ignore-unmatch .hyperloop/state/*' HEAD`; or (b) Cherry-pick each non-state commit onto a fresh branch: `git checkout main && git checkout -B <task-id>`, then `git cherry-pick <sha>` for each commit that does NOT touch `.hyperloop/state/`.
  - **After each direction/sign-convention test function, immediately run `check-direction-test-derivations.sh` and confirm EXIT 0 before moving on.** If the check fails on a function you just wrote, the derivation `→` arrow must be inside the function body as an inline `#` comment — not in a `##` GDScript docstring above the `func` line. The docstring is outside the function body; the check's `awk` begins scanning AFTER the `func` declaration and never sees the docstring. Both the docstring and an inline comment can coexist — but only the inline comment inside the body satisfies the check.
  - **Create a skeleton `.hyperloop/worker-result.yaml` with placeholder section headers BEFORE running any check scripts.** Include at minimum `## Scope Check Output` and `## Check Script Results` with placeholder text. Run checks, then replace placeholders with verbatim output. Running checks before the file exists forces you to fill in output from memory — which is how falsification occurs. The report must exist before `run-all-checks.sh` runs so that `check-report-scope-section.sh` and `check-scope-report-not-falsified.sh` can validate it in the same pass.
  - **Before writing your worker result, verify your own commits introduce source files.** Run `git diff --name-only --diff-filter=AM main..HEAD | grep -v '^\.hyperloop/'` and confirm the output is non-empty. If the output is empty, your branch adds no source files outside `.hyperloop/` — you have not implemented the task, only written a report. Files introduced by a different task's commit (visible in `git log main..HEAD --oneline` with a different Task-Ref trailer) do NOT count as your deliverable. `check-branch-adds-source-files.sh` enforces this mechanically and is included in `run-all-checks.sh`.
  - **"Viewport moved", "pivot moved", and "camera moved" are NOT user-visible-outcome language — they describe internal system state, not what appears on screen.** A pan/drag derivation ending with "→ viewport moved right ✓" or "→ pivot.x increases ✓" fails `check-pan-grab-model-comments.sh` even though it sounds plausible. The final step must use one of these accepted screen-outcome tokens (any one): `reveals`, `enters view`, `scene moves`, `scene shifts`, `content from`, `on screen`, `drifts`, `user sees`, `scroll`. Correct example: "→ pivot.x increases → camera looks further right → right-side content enters view ✓". Self-check before submitting: grep your pan/drag test comments for at least one of those tokens.
  - **After writing each direction/sign-convention test function, immediately run `bash .hyperloop/checks/check-direction-test-derivations.sh` and confirm EXIT 0 before writing the next test.** A derivation arrow (`→` or `->`) placed only in a `##` GDScript docstring above the `func` declaration is outside the function body and is never found by the check — you must add an identical inline `#` comment inside the body, after the `func` line. Do not defer this check to submission time; a docstring-only derivation on any one direction test blocks the entire submission.
  - **When a check script's FAIL output names "Offending lines:" with exact file paths and line numbers, fix those exact lines in those exact files.** Do not restructure, extract to a new module, or refactor the surrounding code as a substitute for applying the prescribed fix. Creating a new module that has the same logic (correct or otherwise) but is never imported by the consuming file is dead code — the consuming file's old broken code path remains active, the original check still fails, and you have now added a SECOND failure (`check-new-modules-wired.sh`). The correct action is to open the named file, change the named lines, and re-run the failing check before anything else.
  - **After creating any new Python source module as part of a fix, immediately verify it is wired before writing its tests.** Run `grep -rn 'from.*<module_name> import\|import.*<module_name>' extractor/ --include='*.py' | grep -v test_` and confirm at least one production import exists. If no production import exists, you have created dead code. Either wire it now or delete it and fix the code directly in the consuming file. Tests that pass against a dead module give zero assurance about the actual runtime code path.
  - **`pre-submit.sh` and `run-all-checks.sh` are NOT interchangeable.** `pre-submit.sh` is the final report-format gate. `run-all-checks.sh` is the submission gate — it must exit 0. Seeing `pre-submit.sh` pass does NOT mean `run-all-checks.sh` exits 0. Always run `run-all-checks.sh` last, confirm it outputs `RESULT: ALL PASS`, then paste that output into `worker-result.yaml` before running `pre-submit.sh`.
  - **`check-racf-remediation.sh` SKIP on a re-attempt branch is NOT clearance — run `check-racf-prior-cycle.sh` immediately after.** The SKIP condition fires when the most-recent commit for `.hyperloop/worker-result.yaml` is an orchestrator cleanup commit that deleted the file's content; prior-cycle FAIL lines are invisible to RACF even though they are still unresolved. `check-racf-prior-cycle.sh` (included in `run-all-checks.sh`) walks all git history to recover the prior FAIL report and re-runs each failing check — treat every FAIL it surfaces identically to a RACF failure from `check-racf-remediation.sh`.
  - **When both `check-racf-remediation.sh` and `check-racf-prior-cycle.sh` SKIP but the branch has prior implementation commits, recover the prior report manually before writing any code.** Run `git log --all --format="%H" -- .hyperloop/worker-result.yaml | head -10`, then for each SHA run `git show <sha>:.hyperloop/worker-result.yaml` until you find `[EXIT N — FAIL]` lines, then apply every prescribed fix in that report before adding new tests or commits.
  - **After `filter-branch` or cherry-pick history rewrite to remove state files, verify TWO things before running any check.** (1) `git log main..HEAD --oneline -- .hyperloop/state/` must return empty — confirming no state file exists in branch history. (2) `git log main..HEAD --reverse --pretty=format:"%s" | head -1` must return `chore: begin <task-id>` — confirming the checkpoint is still the chronologically oldest commit after the rewrite. If (2) fails, reorder commits with `git rebase -i main` before submitting.
  - **Before every `git commit`, run `git diff --name-only --staged | grep 'hyperloop/state'` and confirm it returns empty.** If any `.hyperloop/state/` path appears, run `git restore --staged .hyperloop/state/` and do NOT commit — a state file once committed cannot be removed without rewriting branch history (forcing a branch reset and losing all subsequent work). The root cause is always `git add -A` or `git add .`; stage only individual named source files and `.hyperloop/worker-result.yaml`.
  - **Immediately after committing any change to a file that pre-existed on `main`, run `bash .hyperloop/checks/run-all-checks.sh` and fix every FAIL before writing your next commit.** Pre-existing check failures in a file you touch become your blocking responsibility the moment that file appears in your branch's commit history — "I only changed unrelated lines" is not an exemption. Fix them in a dedicated `fix: address pre-existing check failure in <area>` commit before adding new functionality.
  - **Post-reset dispatch — do NOT diagnose prior failures before the checkpoint.** When dispatched to a task whose state shows `branch: null` and you are aware (from any source) that the task has previously failed, the prior failures are irrelevant to your current action. DO NOT read `.hyperloop/state/reviews/`, `.hyperloop/state/tasks/`, or git log before the checkpoint commit. Diagnostic curiosity before the checkpoint is the direct cause of "Agent future missing or failed" — the orchestrator sees only the checkpoint commit as the liveness signal. Prior-round review files are readable AFTER the checkpoint commit exists. The sequence is always: `git checkout -B <task-id>` → `git commit --allow-empty -m "chore: begin <task-id>"` → everything else.
  - **If `git checkout -B <task-id>` returns any error, STOP and report the error as your entire output.** Do not attempt fallback git commands (`git checkout <task-id>`, `git branch <task-id>`, or any variant). A failed checkout means the checkpoint commit cannot be placed on the correct branch — any commit made after a failed checkout will land on the wrong branch or not at all, causing "Agent future missing or failed". Report the exact error message and stop; do not proceed with implementation.
  - **When both `check-no-state-files-committed.sh` AND `check-checkpoint-commit-is-first.sh` fail, you MUST run `git filter-branch -- main..HEAD` (to remove state files) FIRST, then `git rebase -i main` (to reorder commits) SECOND — in that exact order.** Reversing the order corrupts the rebase plan because filter-branch rewrites commit SHAs; run `check-combined-rewrite-guide.sh` to see the exact combined command sequence and verify steps.
  - **The filter-branch range MUST be `-- main..HEAD`, not `HEAD` alone.** Using `HEAD` without the `main..` prefix rewrites the entire repository history including commits already on main, causing mass SHA divergence and permanent merge conflicts; always scope the rewrite to branch-only commits with `-- main..HEAD`.
  - **When you create a new module to replace or fix logic in an existing module, immediately verify it is wired into the production code path.** After creating the file, run `grep -rn 'from.*<module_name> import\|import.*<module_name>' extractor/ --include='*.py' | grep -v test_` and confirm at least one production (non-test) import exists. A test suite covering the new module does NOT guarantee the pipeline calls it — the old internal function may still be the active code path. Run `bash .hyperloop/checks/check-new-modules-wired.sh` before submitting.
  - **Replacing a broken function by creating a new module is incomplete until the old call site is updated.** If `file_A.py` calls `compute_x()` internally and you create `module_B.py::compute_x()`, you MUST either (a) update `file_A.py` to `from module_B import compute_x` and remove the internal definition, OR (b) fix the internal function directly and delete `module_B.py`. Leaving `module_B.py` unused while `file_A.py`'s internal `compute_x()` remains active is dead code — tests for `module_B.py` pass but give zero assurance about the runtime behaviour of `file_A.py`.
  - **`check-racf-remediation.sh` is the mandatory first check in every re-attempt cycle.** When dispatched to a branch that already has implementation commits, run `bash .hyperloop/checks/check-racf-remediation.sh` as your VERY FIRST action — before reading any code, writing any test, or creating any commit. This script reads the prior committed `worker-result.yaml`, identifies every check that exited non-zero in that cycle, and re-runs each against the current codebase. If any still fail, the script outputs "FAIL (still failing — RACF)" for each. Apply the prescribed fix for each RACF failure, re-run that individual check to confirm EXIT 0, and only then proceed. Do NOT add new tests, new features, or new commits until `check-racf-remediation.sh` exits 0 — a re-attempt that adds new passing tests while prior-cycle failures remain unresolved is still a RACF and will block submission.
  - **`check-docstring-arrow-placement.sh` detects the ## docstring mis-placement trap for direction tests.** If you write a sign-chain derivation with `→` or `->` in a `##` GDScript docstring ABOVE a direction test function (not inside the body), `check-direction-test-derivations.sh` will FAIL even though the code looks annotated — the check's `awk` begins scanning after the `func` declaration line and never reaches the docstring. `check-docstring-arrow-placement.sh` (included in `run-all-checks.sh`) catches this specific pattern and names the exact function. Fix: add a `#` inline comment containing `→` inside the function body, immediately after the `func` declaration line. The `##` docstring may remain; only the duplicate inline comment is required.
