apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  ## PROJECT: code-vis

  ### Python Extractor (`extractor/`)
  - Parses kartograph codebase, outputs JSON scene graph
  - Python 3.12+, standard library + tree-sitter only
  - Type hints throughout
  - Run `ruff format extractor/` (auto-fix) then `ruff format --check extractor/` (verify) before committing — applies to ALL files including test files; running only `ruff check` is insufficient
  - Write pytest tests for extraction logic

  ### Godot Application (`godot/`)
  - Godot 4.x with GDScript
  - Write GDScript tests in `godot/tests/` (filenames: `test_*.gd`)
  - Every spec scenario requires a behavioral test with fixture data and assertions on scene-tree properties — not just compile checks
  - Use headless test runner (GUT addon or custom `run_tests.gd`)

  ### General Requirements
  - JSON scene graph is the interface contract between components
  - Dict-key assertions are NOT rendering coverage. Tests must instantiate Node3D and assert `.position`, `.visible`, property values
  - Label3D readability: `billboard = BILLBOARD_ENABLED` and `pixel_size > 0.0`
  - Empty `_ready()` stubs are never a complete implementation
  - Direction/sign derivation arrows must be inline `#` comments INSIDE the function body, not `##` docstrings above it
  - "Relative to parent" positions require tests where parent is at NON-ZERO world position AND the assertion is a direct equality check (`child["position"]["x"] == local_offset`), NOT a proximity check (`dist < radius`) — proximity passes for both absolute and relative storage

  ## BRANCH HYGIENE — ALWAYS FORK FROM MAIN

  Your working branch MUST be created directly from main. Never fork a task
  branch from another task branch (e.g., `hyperloop/task-020`).

  Correct:
    git checkout main
    git checkout -b hyperloop/task-NNN

  Wrong (causes inherited foreign commits):
    git checkout hyperloop/task-020
    git checkout -b hyperloop/task-NNN   # inherits task-020's commits

  **Why this matters:** Forking from a task branch inherits that branch's
  commits onto your branch. Those commits carry foreign Task-Ref trailers and
  appear above main — `check-commit-trailer-task-ref.sh` will FAIL and
  `check-branch-forked-from-main.sh` will FAIL. The correct fix is to DROP
  the inherited commits via `git rebase --onto main`, not to reword them.

  **Before writing a single line of code**, verify your branch has no inherited
  foreign commits:
    bash .hyperloop/checks/check-branch-forked-from-main.sh

  If it exits non-zero, rebase onto main before proceeding:
    git log --oneline main..HEAD          # identify which commits are yours
    git rebase -i main                    # drop foreign commits (not 'reword')
    bash .hyperloop/checks/check-branch-forked-from-main.sh   # confirm exit 0

  ## REBASE HYGIENE — STAY CURRENT WITH MAIN BEFORE SUBMITTING

  When multiple tasks run concurrently, main can advance after your branch was
  created. A branch that is not rebased onto current main will SILENTLY DELETE
  everything main added — the diff against main shows `-lines` for code you
  never wrote, and tests appear clean only because the deleted test files are
  never executed.

  **Observed failure (task-108):** branch forked from db76c822; main advanced
  one commit (task-074 work). Branch was never rebased. Merging would have
  reverted compute_structural_significance(), schema TypedDict fields, and
  test_visual_primitives.gd. 161 tests passed because the unregistered test
  file simply never ran.

  **Before every submission**, verify your branch is current:

    bash .hyperloop/checks/check-rebased-onto-main.sh

  If it exits non-zero, rebase immediately:

    git fetch origin main:main
    git rebase origin/main

  **During conflict resolution — critical rules:**
  - NEVER choose "ours" (branch side) to resolve an entire file when main
    added new functions, TypedDict fields, or test registrations.
  - After resolving each file, verify functions that existed in main are
    still present: `grep "def compute_" extractor/extractor.py`
  - For `godot/tests/run_tests.gd` specifically: count the `_run_suite()`
    lines after resolution — the count MUST be >= the count on main.

  After rebase, run the regression guard before `run-all-checks.sh`:

    bash .hyperloop/checks/check-run-tests-suite-count.sh
    bash .hyperloop/checks/run-all-checks.sh

  ## COMMIT TRAILER DISCIPLINE — VERIFY AFTER EVERY COMMIT

  After every `git commit` (including rebase sessions and fix-up commits), immediately run:

    bash .hyperloop/checks/check-commit-trailer-task-ref.sh

  This confirms every commit on the branch carries `Task-Ref: task-NNN` for THIS
  task. Do not proceed to the next commit until this exits 0.

  Never copy a `Task-Ref` trailer from another commit, branch, or task. The trailer
  is the audit trail. A single wrong Task-Ref causes `check-branch-forked-from-main.sh`
  and `check-commit-trailer-task-ref.sh` to FAIL at submission and requires an
  interactive rebase to fix — catching it immediately after the commit is always
  cheaper than discovering it at submission.

  ## CHECK SYNC — TWO MANDATORY POINTS (FAILURE TO COMPLY BLOCKS SUBMISSION)

  `check-checks-in-sync.sh` now fetches `origin/main` silently before comparing,
  so a stale local `main` no longer produces false-OK results. If the script exits 0,
  your working tree is confirmed to match the actual remote state. This closes the
  task-075 gap: implementer ran `git checkout main -- .hyperloop/checks/` without
  fetching first; local main was 3 commits stale; the sync and the verification both
  agreed on 52 checks while origin/main had 54 — concealing the rebase failure.

  ### Sync Point 1 — Absolute first action (before spec, before code)

  Before reading the assigned spec, before running any check, before writing
  any code: sync check scripts from main AND verify the sync is complete.

    git fetch origin main:main
    git checkout main -- .hyperloop/checks/
    bash .hyperloop/checks/check-checks-in-sync.sh

  `git fetch origin main:main` MUST run first — it updates local `main` to
  match the remote. Without the fetch, `git checkout main -- .hyperloop/checks/`
  reads from a potentially stale local `main` and silently omits check scripts
  that were added to origin/main since your last fetch. A stale local main is
  indistinguishable from a current one without fetching first.

  The third command MUST exit 0 before you proceed. If it exits non-zero,
  re-run the full three-command sequence above and check again.
  Do not proceed until `check-checks-in-sync.sh` is clean. Apply this on BOTH
  first attempts AND re-attempts.

  ### Sync Point 2 — Immediately before final submission

  After all implementation is complete and immediately before running
  `run-all-checks.sh` for your submission check, sync checks from main again:

    git fetch origin main:main
    git checkout main -- .hyperloop/checks/
    bash .hyperloop/checks/check-checks-in-sync.sh

  The fetch is required here too — new checks may have been pushed to origin/main
  between Sync Point 1 and now. Always fetch before checkout; never assume local
  main is current.

  This closes the timing gap: new check scripts can be added to main between
  your branch creation and the verifier's review. A check added to main after
  Sync Point 1 but before Sync Point 2 would otherwise be silently absent and
  block your submission with a `check-checks-in-sync.sh` failure.

  This second sync is the LAST action before `run-all-checks.sh`. Do not
  write additional code after it — only run checks and commit results.

  ## SCOPE COMPLIANCE

  `specs/prototype/prototype-scope.spec.md` is the PROTOTYPE-SCOPE AUTHORITY.
  It has VETO POWER over every other spec, including your assigned task spec.
  No other spec can override it.

  ### Step 0 — Spec-level prohibition check (absolute first action)

  Before reading your assigned spec in detail, before writing any code, before
  running any check (but AFTER syncing checks from main per the section above):

  **Run the mechanical check first — takes under one second:**
  ```
  bash .hyperloop/checks/check-assigned-spec-in-scope.sh <your-spec-path>
  ```
  If this exits non-zero, the assignment is INVALID. Paste the script output
  verbatim into your FAIL report and stop — do not read the spec further, do
  not write any implementation code.

  Then complete the manual check:
  1. Identify the PRIMARY FEATURE described by your assigned spec (one sentence
     summary: what is the spec fundamentally about?).
  2. Open `specs/prototype/prototype-scope.spec.md` and read every item in its
     "Not In Scope" section.
  3. If the assigned spec's primary feature matches ANY prohibited item — even
     partially or under a different name — the task assignment is INVALID.
     Write an immediate FAIL finding that states:
       - The assigned spec
       - The matching "Not In Scope" item
       - The output of `check-assigned-spec-in-scope.sh`
       - That no implementation was written
     Stop. Do not write a single line of implementation code. Return the finding
     to the orchestrator for reassignment or deferral.

  This check exists because an implementer cannot resolve a scope conflict — only
  the orchestrator can. The correct outcome is a clean FAIL report, not a partial
  implementation of a prohibited feature.

  ### When the assigned spec contains a MIX of in-scope and out-of-scope features

  Implement only the in-scope portions. Explicitly note every skipped clause and
  the matching "Not In Scope" prohibition in your report.

  ### Feature-level check (before writing any individual file or function)

  When your assigned spec says "3D navigation SHALL" but prototype-scope.spec.md
  lists "first-person navigation" as NOT IN SCOPE, implement orbital navigation
  only — the scope spec's prohibition wins unconditionally.

  Prohibited features are forbidden under ANY name. Before writing ANY new file
  or function:
  1. Open `specs/prototype/prototype-scope.spec.md` and read every item in its
     "Not In Scope" section. If your planned feature matches any item, STOP — do
     not write a single line of that code.
  2. Run `bash .hyperloop/checks/check-not-in-scope.sh` — confirm exit 0.
  3. Re-run after every logical code chunk.
  4. If `check-not-in-scope.sh` exits non-zero, identify the failing file(s) first,
     then choose the correct fix:

     **Case A — File has commits from YOUR branch** (`git log main..HEAD -- <file>`
     returns output): You introduced the violation. Delete or rewrite the prohibited
     code in-place.

     **Case B — File has NO commits from your branch** (`git log main..HEAD -- <file>`
     returns nothing): You did NOT introduce this violation — it was inherited from
     the fork point, and main has likely already fixed it. Do NOT hand-edit.
     Sync from main instead:
       git checkout main -- <failing-file>
     Then re-run `bash .hyperloop/checks/check-not-in-scope.sh` — confirm exit 0.
     Also sync any companion test file if one exists (e.g., `godot/tests/test_*.gd`
     with a matching name).

     Do not attempt to submit with a failing scope check regardless of which case
     applies.

  ## INVALID ASSIGNMENT — COMPLETE STOP PROTOCOL

  When `check-assigned-spec-in-scope.sh` exits non-zero, you have an INVALID
  ASSIGNMENT. Execute this STOP PROTOCOL exactly — no deviation:

  1. Paste the script's stdout verbatim into your FAIL report.
  2. State that no implementation code was written.
  3. Stop. Submit the FAIL report and nothing else.

  **Do NOT commit anything to the task branch.** This means no implementation
  code, no process improvements, no overlay updates, no check scripts.  The
  task branch MUST contain zero commits above main when you submit an INVALID
  ASSIGNMENT FAIL report.

  Why: any commit you make to the task branch will cause
  `check-spec-ref-valid.sh` to scan it for a Spec-Ref trailer and fail on
  the missing or malformed value.  `check-branch-has-impl-files.sh` will
  flag the branch for having commits but no implementation files.  Your
  process-improvement work will trigger cascading check failures that obscure
  the real issue (the invalid assignment itself) and force an additional
  review cycle.

  If you have process improvements to record: do so on the main branch or in
  a separate process-improvement commit stream — NEVER on the task branch.

  ## SHADOW-REPLACEMENT IS FORBIDDEN

  When you create a new Python file to fix or replace a function defined in an
  existing module, you MUST choose exactly one resolution path:

  Option A — Fix in-place: apply the fix directly to the original file and delete
    the new file entirely.

  Option B — Import and delegate: import the new file's function in the consuming
    file and remove the original definition from that file.

  Leaving both definitions active means the consuming file calls the original
  (potentially broken) function while tests on the new file give false confidence.

  ## SUBMISSION GATES

  1. `bash .hyperloop/checks/run-all-checks.sh` — must exit 0 before submitting
  2. Never stage files under `.hyperloop/state/` — use `git add <file>` for specific files

  ## COORDINATE FRAME — PRODUCTION SOURCE CODE

  When computing child node positions in layout code, the stored value MUST be
  the LOCAL offset only. NEVER add parent world coordinates to the child position:

    WRONG: pos_x = parent_pos[0] + math.cos(angle) * offset_r   # absolute world coord
    RIGHT: pos_x = math.cos(angle) * offset_r                   # local offset only

  Godot's main.gd adds the parent world position at render time — storing an
  absolute coordinate here causes double-offset rendering regardless of whether
  tests pass.

  ## SPATIAL LAYOUT RADIUS BOUNDS

  Every child-orbit radius computed with `max(lower, n * factor)` MUST be wrapped
  in a `min(…, parent_size * fraction)` cap. An unbounded radius places children
  outside the parent's scene boundary.

  Correct form:
    bc_radius  = min(max(5.0, len(bc_nodes)  * 2.5), scene_radius * 0.8)
    mod_radius = min(max(1.5, len(children)  * 0.9), bc_radius    * 0.4)

  Module-level `_circular_positions` calls MUST use `y=0.0`. A non-zero y value
  adds a vertical component to every child position and inflates the 3D
  child-to-parent distance independently of the orbit radius.

  ## DIRECTIONAL BEHAVIOR AND SIGN CONVENTIONS

  - Sign derivation before coding: Before implementing ANY directional movement (pan,
    orbit, zoom, drag), derive the expected sign from the spec's concrete example — the
    "(i.e.)" parenthetical if present. Write the full derivation chain as an inline `#`
    comment immediately BEFORE the implementation line (e.g., `# drag left → grab model
    → pivot moves RIGHT → negate delta.x`). Write the comment first, then the code.

  - Sign-chain completeness sweep (run before `run-all-checks.sh`): After implementing
    ALL directional blocks, grep `godot/scripts/*.gd` for `delta.x` and `delta.y`. For
    every matching non-comment line, confirm there is a `#` comment containing `→` within
    15 lines above it. A derivation block written for pan but omitted for orbit is a
    FAIL — `check-directional-signchain-comments.sh` enforces this mechanically.

  - Directional test predicates are mandatory: Any test that asserts a direction or sign
    MUST use a signed comparison (`cam._pivot.x < initial_x`, `cam._pivot.z > 0.0`).
    An assertion of `!= initial_value` or `!= Vector3.ZERO` verifies only that movement
    occurred — a sign-inverted implementation passes it identically.

  - Spec contradiction escalation — STOP and flag: When a spec THEN-clause contains
    internally contradictory direction language, do NOT choose an interpretation silently.
    STOP and escalate to the process owner.

  ## PIPELINE INTEGRATION — COMPUTE FUNCTIONS MUST BE WIRED

  Every `compute_*()` function that produces spec-required output MUST be called
  from `build_scene_graph()` (or a helper that `build_scene_graph()` calls).
  A function that is implemented and unit-tested but not reachable from the entry
  point is dead code — its results never appear in any output.

  Before marking a requirement done, trace the call chain:
    build_scene_graph() → ... → compute_X()
  If the chain is broken, the requirement is incomplete regardless of test results.

  Run `bash .hyperloop/checks/check-compute-functions-called-from-entry-point.sh`
  before submitting and confirm exit 0.

  ## TYPEDDICT COVERAGE ≠ EXTRACTOR COVERAGE

  Defining a field in a TypedDict (including `NotRequired` fields) and testing it
  with a hand-crafted dict in `test_schema.py` does NOT verify the extractor
  function actually emits that field.

  For every field or Literal type value that the spec says the extractor SHALL
  emit, write a test in `test_extractor.py` that:
    1. Calls the actual extractor function (e.g. `build_dependency_edges()`).
    2. Asserts the returned output contains an entry with that field/value.

  Specifically: for every `Literal["X"]` value in an Edge/Node `type` field that
  the spec requires the extractor to produce, `test_schema.py` coverage with a
  hand-crafted dict is insufficient. The extractor function must emit `type="X"`
  and a `test_extractor.py` test must assert it.

  Run `bash .hyperloop/checks/check-typeddict-fields-extractor-tested.sh` and
  confirm exit 0 before submitting.

  ## DOWNSTREAM CONSUMERS MUST READ, NOT RECOMPUTE

  If Python embeds a computed value in the JSON scene graph (e.g. a `depth` field
  on node dicts), the Godot consumer MUST read that value from the JSON — not
  reimplement the same algorithm. A Godot script that runs its own BFS when the
  JSON already carries `depth` is not wired to the pipeline; the Python computation
  is dead code from the rendering perspective.

  Check: does every spec-required pre-computed value flow Python → JSON → Godot
  consumer reads it? If Godot re-derives a value Python already computed,
  embed the Python value in the JSON and read it in Godot instead.

  ## ONREADY NULL-GUARD — NO-OP DETECTION (MANDATORY BEFORE MARKING A THEN-CLAUSE COVERED)

  Any GDScript function containing an early-return guard on an `@onready` variable
  (e.g., `if _camera == null: return`) is SILENTLY INERT in headless tests — `@onready`
  variables resolve to null outside the scene tree because the node is never added to it.
  A THEN-clause whose only implementation path runs through such a guard has ZERO test
  coverage even if the enclosing function is called in a test.

  Observed failure (task-010): `_frame_camera()` guards on `_camera == null`. Every
  `build_from_graph()` call in headless tests hit the guard and returned early — the
  "showing the entire system" THEN-clause was never exercised despite the function
  being called.

  Before marking ANY THEN-clause as covered:
  1. Grep the implementation function for null-guards on @onready variables:
       grep -n "== null\|is_empty()" godot/scripts/<file>.gd
  2. If a null-guard on an @onready variable is found, the test MUST bypass it via
     one of these methods:
     - Dependency injection: `main_node.set("_camera", CameraScript.new())`
       before calling the function.
     - Pure helper extraction: factor the guarded logic into a `static func` or
       parameter-driven helper that takes the dependency as an argument, then test
       that helper directly (no @onready variable needed).
  3. A test that calls the guarded function WITHOUT injecting the @onready dependency
     is equivalent to not testing — the THEN-clause is PARTIAL, not COVERED.

  Providing Option A (injection) sketch for `_frame_camera()` specifically:
    var cam = CameraScript.new()
    main_node.set("_camera", cam)
    main_node.build_from_graph(fixture)
    assert cam._pivot.is_equal_approx(expected_center)
    assert cam._distance > expected_min_distance

  ## GDSCRIPT PROPERTY NAME ALIGNMENT

  When a commit touches both a GDScript implementation file and its test file,
  verify that every `var` and `const` name the test accesses on the implementation
  object exists with the EXACT same name and case in that GDScript file.

  GDScript does NOT raise a compile error for missing property access in headless
  mode — it emits `SCRIPT ERROR:` at runtime, aborts the test function before any
  `assert` runs, and the runner still reports PASS (because `_test_failed` is never
  set). The test is silently inert.

  Before committing: grep the test file for every `.` member access on the object
  under test, then grep the implementation file to confirm each name exists.

  ## LOD TRANSITIONS MUST USE ANIMATED OPACITY

  When a spec THEN-clause uses the words "fade", "smoothly", "animated opacity",
  "dissolve", or "morph", the transition MUST be implemented via
  `Tween.tween_property(node, "modulate:a", target, duration)` (or equivalent
  `_process`-based lerp on `modulate.a`). Binary `.visible = true/false` is
  FORBIDDEN for any transition the spec describes as animated or smooth — it
  produces an instant pop/snap that directly contradicts the spec.

  Mapping of spec language to required GDScript technique:
  - "fade in / fade out" → Tween modulate.a from 0.0 → 1.0 (or reverse)
  - "animated opacity transition" → Tween.tween_property on modulate.a
  - "smoothly dissolve" → Tween fading out one set while fading in another
  - "morph smoothly" → simultaneous opacity crossfade between two edge sets
  - "continuous — no elements pop in" → modulate.a animation, not .visible toggle

  Nodes hidden via modulate.a=0.0 are still in the scene tree; nodes hidden via
  .visible=false are culled. Use modulate.a for spec-required animated transitions
  and .visible only for permanently out-of-LOD-band culling.

  Run `bash .hyperloop/checks/check-lod-opacity-animation.sh` before submitting.

  ## AGGREGATE EDGES ARE A SEPARATE RENDERED SET

  When a spec LOD scenario requires "aggregate edges per [group] pair" (e.g.
  "single aggregate edges per context pair, with weight indicating total import
  count"), this is a DISTINCT rendered data structure — NOT the same individual
  edges with `.visible=false`. The implementation must:
  1. Build a separate array/dict grouping edges by (source_context, target_context)
     pair and summing their import counts.
  2. Render one aggregate MeshInstance3D (or ImmediateMesh line) per pair,
     with visual weight (e.g., line width or opacity) proportional to total count.
  3. Show aggregate edges at the LOD level the spec specifies (e.g., FAR);
     hide individual edges at that same level.

  Hiding all individual edges at FAR distance does NOT satisfy the requirement for
  "aggregate edges with weight". It satisfies only "individual edges not visible".

  Run `bash .hyperloop/checks/check-aggregate-edge-impl.sh` before submitting.

  ## LOD COMPLETENESS — ALL LEVELS, NOT JUST SOME

  When your task spec defines multiple LOD distance levels (Near / Medium / Far),
  you MUST implement AND write behavioral tests for ALL levels before submitting.
  Implementing "Medium" LOD changes while leaving "Far" unaddressed is a blocking
  gap, even if the gap existed before your branch.

  Before touching any LOD/visualization code:
  1. List every LOD level defined in the spec (Near / Medium / Far).
  2. For each level, identify the THEN-clauses that apply (e.g., "aggregate edges
     with weight" for Far).
  3. Implement each level fully — including a test that asserts the THEN-clause
     behavior with fixture data — before moving to the next level.
  4. Run `bash .hyperloop/checks/check-lod-level-tests.sh` — confirm exit 0.
  5. Run `bash .hyperloop/checks/check-aggregate-edge-impl.sh` — confirm exit 0.

  "Hiding individual edges" at Far distance is NOT equivalent to "showing aggregate
  edges with weight". The aggregate structure is a separate rendered data set —
  see the AGGREGATE EDGES section above for its required form.

  ## SCENE FILE HYGIENE WHEN DELETING GDSCRIPT FILES

  When you delete a `.gd` file for any reason (removing out-of-scope code,
  applying a fix, refactoring), you MUST also update every `.tscn` scene file
  that references it. Failure to do so leaves a dangling `[ext_resource]` that
  causes a parse error on scene load — even though `godot --headless --quit`
  exits 0 and tests pass (the test runner bypasses scene loading entirely).

  Deletion checklist (run before committing any `.gd` deletion):
  1. `grep -rn "path=\"res://$(basename <deleted_file>)\"" godot/scenes/`
     — for every matching `.tscn` file, perform the following edits in one commit:
     a. Remove the `[ext_resource … path="res://<deleted_file>" …]` line.
     b. Remove every `[node]` block that has `script = ExtResource("<id>")` for
        that resource id.
     c. Decrement `load_steps` on line 1 by 1 for each removed `[ext_resource]`.
  2. Run `bash .hyperloop/checks/check-tscn-no-dangling-references.sh` — exit 0.
  3. Run `bash .hyperloop/checks/godot-compile.sh` — exit 0 with no parse errors.

  After a deletion fix, `git diff main..HEAD -- godot/scenes/main.tscn` for any
  file that was also on main should show ZERO diff for the scene file, or only
  the intentional new changes — never a dangling `[ext_resource]` reference.

  ## MUST-REQUIREMENT ENUMERATION — COMPLETE BEFORE ANY IMPLEMENTATION

  Before writing a single line of implementation code, enumerate EVERY requirement
  in the assigned spec that starts with MUST, SHALL, or "The system MUST/SHALL".
  Create a coverage table in your working notes:

    | # | Requirement (one sentence) | Impl file/function | Test name |
    |---|---|---|---|
    | 1 | ... | | |

  Do NOT start coding until this table exists.  Do NOT submit until every row has
  BOTH an implementation location AND at least one test name.  A row missing either
  column is MISSING — not COVERED.  A spec with 13 MUST requirements needs 13
  implementations AND 13+ tests; submitting with 3 COVERED and 13 MISSING is always
  a FAIL.  Include the completed table verbatim in your submission report.

  ## CHECK SCRIPT AUTHORING CONVENTION

  When writing a new check script that requires a positional argument, the empty-arg
  path MUST exit 0 (SKIP) — NEVER exit 2 or exit 1.  run-all-checks.sh calls every
  *.sh with no arguments; a non-zero exit on empty args breaks every task branch.

  Correct pattern (copy from check-fail-report-classification.sh):
    ARG="${1:-}"
    if [ -z "$ARG" ]; then
        echo "SKIP: no <arg> provided — run manually: $0 <arg>"
        exit 0
    fi

  The check-script-skip-on-no-args.sh script enforces this mechanically and will
  FAIL your submission if any new check script violates the convention.

  ## SPEC-FIRST TEST STUBS BEFORE IMPLEMENTATION

  For every spec scenario assigned to this task, enumerate each THEN-clause as a
  failing test stub BEFORE writing implementation code. The test stub should
  assert exactly what the spec's language says — not what your planned
  implementation does. Examples:
  - Spec says "fade in smoothly" → stub asserts a Tween was created on modulate.a
  - Spec says "aggregate edges per context pair" → stub asserts one rendered edge
    exists per unique (src_ctx, dst_ctx) pair in fixture data
  - Spec says "no elements pop in" → stub asserts no direct .visible assignments

  If you cannot write a failing test for a THEN-clause, escalate — it may be
  untestable in the current environment and requires PASS-WITH-NOTE treatment.

  ## PERCEPTUAL CHANNEL FIDELITY

  When the spec names a specific perceptual channel for a visual property, use
  that EXACT channel — substituting a different one is always a FAIL.

  Common substitution errors to avoid:

  | Spec says              | Wrong substitute       | Right implementation              |
  |------------------------|------------------------|-----------------------------------|
  | "visual thickness"     | color channel scaling  | mesh width / geometry proportional to value |
  | "line style (dashed)"  | color encoding         | separate geometry pattern (gaps, dots) |
  | "opacity proportional" | visibility toggle      | alpha value computed from ratio   |
  | "size proportional"    | color brightness       | scale applied to geometry         |

  Before implementing any visual property: identify its spec-named channel.
  Write a failing test that asserts THAT channel (not a substitute).

  Example — spec says "visual thickness is proportional to weight":
    WRONG test: `assert edge_color.r == expected_r`
    RIGHT test:  `assert edge_mesh.get_width() > thin_ref_width` (thickness, not color)

  ## SUPPRESSION GUARD CONDITIONS

  When a spec THEN-clause says an element is "NOT drawn", "suppressed",
  "hidden", "excluded", or "not rendered", the rendering function MUST contain
  an explicit early-return or conditional skip keyed on the suppression flag.
  Unconditional rendering is a FAIL regardless of surrounding logic.

  Required pattern:
    func _create_edge(ed: Dictionary) -> void:
        if ed.get("ubiquitous", false):
            return  # suppressed — spec says NOT drawn
        # ... rest of rendering ...

  Before committing any rendering function:
  1. Search the spec for "NOT drawn", "suppressed", "hidden", "no edges", "excluded".
  2. For each such clause, confirm a guard condition exists in the matching function.
  3. Write a test that provides a suppressed element as fixture data and asserts
     no rendered node/mesh was created for it.

  ## CONTINUOUS VISUAL PROPERTIES — COMPUTE, DON'T HARDCODE

  When the spec says a visual property is "proportional to", "reflects",
  "continuous", or "varies with" a data value, compute it dynamically from
  that value. A hardcoded constant is FAIL regardless of whether the constant
  falls within an acceptable range.

  Example — spec says membrane opacity reflects the public/private symbol ratio:
    WRONG: Color(0.25, 0.45, 0.85, 0.18)  # fixed alpha — always FAIL
    RIGHT: var alpha = clampf(public_count / max(total_count, 1.0), 0.05, 0.40)
           Color(0.25, 0.45, 0.85, alpha)  # computed from data — PASS

  Test requirement: provide two fixtures with different data values and assert
  the resulting visual property DIFFERS between them.

  ## ENUMERATED SOURCES — IMPLEMENT ALL LISTED ITEMS

  When a spec lists multiple sources, types, or cases using "and" or a comma
  enumeration (e.g., "derived from: hubs, bridges, entry points"), EVERY
  listed item must be implemented. A partial subset is PARTIAL/FAIL.

  Before writing any code for a multi-source requirement:
  1. Extract the full list from the spec text.
  2. Create a coverage stub for each item:
       | Source      | Implemented | Test name |
       |-------------|-------------|-----------|
       | hubs        |             |           |
       | bridges     |             |           |
       | entry points|             |           |
  3. Do not close the requirement until every row has both columns filled.

  Omitting one source because it "seemed less common" or "was not in the
  examples" is always a FAIL — the spec enumeration is exhaustive.

  ## TEST VALUE ASSERTIONS — ASSERT FIELD VALUES, NOT JUST PRESENCE

  Tests for spec-required data fields must assert the field's VALUE (or that
  it is non-empty / matches a pattern), not merely that the key exists.

  WRONG — passes even when field is empty or wrong:
    assert "param_name" in edge
    assert edge.has("type")

  RIGHT — fails when field is absent, empty, or wrong:
    assert edge["param_name"] == expected_param   # Python
    assert edge.get("param_name", "") != ""       # Python (non-empty)
    assert_eq(edge["param_name"], expected_param)  # GDScript

  Spec scenario: "the call site carries the parameter name and any type hints"
    WRONG test: checks edge type only, not param_name payload
    RIGHT test: asserts `edge["param_name"]` is non-empty and matches the
                parameter variable name from the fixture source code

  ## GDSCRIPT FUNCTION UNIQUENESS — CHECK BEFORE EVERY COMMIT

  GDScript does NOT support function overloading.  A second `func` definition
  with the same name causes a parse error that blocks ALL test files that preload
  the affected script — the test runner silently reports zero tests instead of a
  failure, giving false confidence.

  Observed failure (task-062): a fix commit added `_build_aggregate_edges()` to
  main.gd, which already defined that function.  godot-compile.sh failed; all 164
  Godot tests were silently inert.

  **Before committing any GDScript file change that adds or renames a function:**

  1. Identify the name of every function you are adding.
  2. Search the target file for existing definitions of the same name:
       grep -n "^func <function_name>(" <gd_file>
  3. If a match is found, resolve the conflict BEFORE committing:
       - If your definition replaces the existing one: delete the old definition.
       - If both are needed: use different names (GDScript has no overloading).
  4. Run `bash .hyperloop/checks/check-no-gdscript-duplicate-functions.sh` and
     confirm exit 0.
  5. Run `bash .hyperloop/checks/godot-compile.sh` immediately after any GDScript
     commit and confirm exit 0 before running any other check.

  A commit message claiming "all checks pass" is INVALID if godot-compile.sh was
  not confirmed to pass AFTER the commit was applied.

  ## SPEC-NAMED ALGORITHMS AND METRICS — NO SUBSTITUTION WITHOUT AMENDMENT

  When a spec THEN-clause names a specific algorithm, data structure, or metric
  by name (e.g., "betweenness centrality score", "Louvain community detection",
  "in-degree count"), implement that EXACT item — not a proxy or approximation.

  Observed failure (task-119): spec said "the module is annotated with its
  betweenness centrality score AND it is flagged as a bridge".  The implementer
  substituted `is_bridge: bool` (articulation-point detection).  A boolean flag
  is not a score.  The THEN-clause requires a numeric float field on the node.

  If you believe a different algorithm is adequate, you MUST:
  1. Document the deviation explicitly in your report — name the spec requirement,
     name what you implemented instead, and explain why you believe it is adequate.
  2. Request a spec amendment from the orchestrator BEFORE submitting.
  3. Do NOT assume the verifier will accept the substitution as equivalent.

  Without a spec amendment, a different algorithm or proxy value is always
  PARTIAL/FAIL regardless of how well it approximates the spec's requirement.

  ## SPEC-REF TRAILER — COMMIT HASH, NOT BLOB HASH

  The `Spec-Ref` trailer MUST contain a **commit hash**, not a blob hash.
  These are two different git object types and they are NOT interchangeable.

  WRONG (blob hash — sha of file content, fails `hash^{commit}` check):
    $ git rev-parse HEAD:specs/foo/bar.spec.md   # → blob hash ← DO NOT USE

  RIGHT (commit hash — sha of the commit that last touched the file):
    $ git log --format=%H -1 -- specs/foo/bar.spec.md   # → commit hash ✓

  Correct trailer form:
    Spec-Ref: specs/foo/bar.spec.md@$(git log --format=%H -1 -- specs/foo/bar.spec.md)

  Self-validate before every commit — this command MUST exit 0:
    git cat-file -e <hash>^{commit}

  If it exits non-zero the hash is not a commit. Re-run the `git log` command above
  and use its output instead. `check-spec-ref-valid.sh` enforces this mechanically
  and will FAIL your submission if a blob hash is present.
