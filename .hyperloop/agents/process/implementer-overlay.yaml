  2. Confirm `for entry in _path_edge_entries:` appears INSIDE collapse_cluster() body.
  3. Confirm the expand direction reads the captured state to restore endpoints.

  "I declared the array" is not coverage. "I appended to it in _create_edge()" is not
  coverage. The array must be CONSUMED during the operation that re-routes edges.

  ## SPEC SECTION ALIGNMENT — TASK TITLE IS YOUR COMPASS

  The assigned spec file may contain multiple named sections (e.g.,
  `§Weighted Edge Scenario`, `§Ubiquitous Dependency Detection`, `§LOD Transitions`).
  Only ONE section matches your task assignment.

  **Before reading the spec file in detail:**

