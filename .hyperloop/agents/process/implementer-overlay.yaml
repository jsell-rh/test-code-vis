  ## ANIMATED TRANSITIONS — TWEEN CODE MUST EXIST IN THE RESPONSIBLE FUNCTION

  When a spec THEN-clause says a transition "is animated smoothly", "animated
  smoothly", "slides not jumps", "animates from X outward", or similar, the
  function responsible for applying the change MUST contain a Tween branch:

    if is_inside_tree():
        var tween := create_tween()
        tween.tween_property(node, "property", target, duration)
    else:
        node.property = target  # headless: direct assignment

  **PASS-WITH-NOTE ≠ missing Tween.** PASS-WITH-NOTE applies ONLY when the
  Tween code EXISTS in an `is_inside_tree()` branch and only the headless path
  is used during tests — the architecture is correct, just unverifiable in CI.
  If no `create_tween` call exists anywhere in the call path, the clause is
  PARTIAL — architecture incomplete, NOT PASS-WITH-NOTE.

  A comment "the caller should Tween" is NOT implementation. Delegation to a
  non-existent caller is NOT implementation. The Tween code must be present
  INSIDE the function responsible for applying the animated change — not
  described, not deferred, not delegated.

  **"Animates outward from X"** requires BFS-ordered staggered delays, not a
  plain loop. Example pattern:
    var hop_dist := _compute_hop_distances(context_id, nodes_data, edges_data)
    for ctx_id: String in independent_contexts:
        var delay := hop_dist.get(ctx_id, 0) * 0.15
        var tween := create_tween()
        tween.tween_interval(delay)
        tween.tween_callback(func(): _apply_node_color(anchors[ctx_id], color))
  Applying all changes simultaneously in a single loop (no delay) produces a
  simultaneous flash — it is NOT "outward animation" and is PARTIAL.

  Run `bash .hyperloop/checks/check-highlight-function-has-tween.sh` before
  submitting whenever you implement highlight or color-change functions.

  ## RELOAD / DATA-CHANGE SCENARIOS — CALL PRIMARY BUILD FUNCTION TWICE

  When a spec THEN-clause describes behavior that occurs "on reload", "smooth
  regrouping", "when new extraction produces different groups", or "nodes
  animate to their new positions", the test MUST call the primary build
  function (e.g., `build_from_graph()`) AT LEAST TWICE:

  1. First call with initial fixture data. Record pre-state:
       var anchor_before := main.get_anchors().get("ctx.module_id")
       var pos_before := anchor_before.position

  2. Second call with DIFFERENT fixture data (shifted positions, different
     groupings). Assert BOTH:
       a. State changed from the first call — position is different.
       b. Node identity preserved — same Node3D object, not rebuilt:
            assert anchor_after == anchor_before, "identity must be preserved"
            assert not anchor_after.position.is_equal_approx(pos_before)

  In headless mode, `_animate_node_to_position()` applies the direct assignment
  path (`anchor.position = new_pos`). This IS testable — position changes are
  observable after the second call without any Tween. A single-call test cannot
  exercise the reload path and leaves this clause PARTIAL.

  Observed failure (task-065): every test called `build_from_graph()` once. The
  "smooth regrouping on data change" THEN-clause had no test that invoked it
  twice with different node positions. The prior implementation of the same spec
  (task-022) included exactly this test; it was not carried forward.

  ## NAMED PRIMITIVE DISTINCTNESS — EACH PRIMITIVE IS AN INDEPENDENT TARGET

  When a spec defines multiple named primitive types (e.g., Container, Node, Badge,
  Edge, Port, Landmark), each is a separate, independent implementation target.
  Named primitives differ in: spatial attachment point, scene-node type, edge wiring
  contract, and LOD visibility rules. They do NOT share implementations.

  Observed failure (task-029): Port Primitive required "anchored to a Container's
  membrane." The implementer rendered public functions as Node Primitives INSIDE the
  container volume (tier-2 LOD) and treated that as Port coverage. No Port scene nodes
  existed on the membrane surface. Zero tests covered any Port scenario.

  Before implementing any named primitive:
  1. Locate the spec's definition of that primitive. Extract three facts:
     (a) Spatial attachment — WHERE does the scene node live? ("on the membrane",
         "inside the container", "superposed on the edge", etc.)
     (b) Edge wiring — what does the spec say edges connect TO for this primitive?
         ("Edges connect to Ports, not to the Container body" is a distinct wiring rule.)
     (c) LOD behavior — at what zoom level does this primitive appear/disappear?
  2. Confirm your planned implementation differs from all OTHER named primitives on
     all three axes. If two primitives share the same attachment point AND the same
     edge wiring, you are implementing one primitive, not two.
  3. Each named primitive needs its OWN row in your MUST-REQUIREMENT coverage table
     with its OWN impl file/function AND its OWN test name. A single row covering
     "rendering" cannot satisfy two architecturally distinct primitive types.

  Self-check before marking any primitive COVERED:
  - Where does the spec say this primitive's node lives? (membrane? interior? superposed?)
  - Does the implementation create scene nodes AT that exact location?
  - Do edges wire to the node type the spec specifies for this primitive?
  - Are there tests with fixture data that assert all three points above?
  All four must be YES. Any NO means the primitive is PARTIAL/MISSING.

  ## ATTACHMENT POINT SPECIFICITY — "ANCHORED TO X" IS NOT "INSIDE X"

  When a spec THEN-clause says a primitive is "anchored to", "on", "at", or "attached
  to" a specific surface or boundary (membrane, edge face, perimeter), the implementation
  MUST create scene nodes positioned AT that surface — NOT inside the enclosing volume.

  "Near the boundary" is not "on the boundary." "Inside a container, near its wall" is
  not "anchored to the container's membrane."

  Required pattern when the spec says "anchored to the membrane":
  - Create a distinct scene node parented to the container at its boundary position.
  - The node's local position must place it ON the membrane surface (at the container
    radius/edge), not at an interior coordinate.
  - Write a test that: (a) asserts the port node exists as a child of the membrane, and
    (b) asserts its position is at the container boundary, not interior.
  - Write a second test that asserts edges target the port node's ID, not the container
    body's node ID ("Edges connect to Ports, not directly to the Container body").

  Before writing any code for a membrane-anchored primitive:
  1. Identify the container node in the scene tree.
  2. Plan to create port nodes as children positioned at the container's boundary radius.
  3. Plan to wire edges to port node IDs (not container IDs) in the rendering pass.
  4. Write test stubs FIRST that assert (a) port exists on membrane, (b) port has label
     matching function name, (c) edge endpoint is port position, not container center.

  ## DEFERRAL COMMENTS ON MUST CLAUSES — FORBIDDEN

  A `# future improvement` or `# TODO` comment placed on a code path required by a
  spec MUST/SHALL THEN-clause is a blocking gap — implement the Tween branch now, or
  escalate via a FAIL report explaining the architectural constraint (never defer silently).

  ## DOCSTRINGS MUST MATCH ACTUAL FUNCTION BEHAVIOR

  Do not write a docstring claiming animated behavior (e.g., "In scene-tree contexts
  a Tween slides the visual") when the function body contains no `create_tween` call —
  false docstrings mask PARTIAL gaps and cause verifiers to mis-classify them as
  PASS-WITH-NOTE.

  ## REPOSITIONING FUNCTIONS REQUIRE TWEEN WHEN SPEC SAYS "SLIDES NOT JUMPS"

  Any function named `_reposition_*`, `_reroute_*`, `_relocate_*`, or `_slide_*` that
  is called from `collapse_cluster()` or `expand_cluster()` MUST contain a
  `create_tween` / `is_inside_tree()` branch when the spec says endpoints "slide not
  jump" or animate "smoothly"; run `bash .hyperloop/checks/check-reposition-function-has-tween.sh`
  before submitting.

  ## SPATIAL "BETWEEN" POSITION ASSERTIONS

  When a spec THEN-clause says a node is "positioned between" two reference structures
  (subsystems, modules, bounded contexts), the test MUST place BOTH reference structures
  at DISTINCT, NON-ZERO world positions and assert the positioned node's coordinate value
  falls numerically between them (e.g., `a_pos.x < bridge_pos.x < b_pos.x`).

  A fixture with either reference at origin (0, 0, 0) makes the "between" assertion
  trivially satisfied by any position — it verifies nothing.

  Required pattern:
    subsystem_a = Vector3(2.0, 0.0, 0.0)  # NON-ZERO
    subsystem_b = Vector3(8.0, 0.0, 0.0)  # NON-ZERO, distinct from A
    bridge_pos = ...  # position assigned by layout algorithm
    assert subsystem_a.x < bridge_pos.x and bridge_pos.x < subsystem_b.x

  Observed failure (task-029 REQ-C7): The bridge landmark fixture had one or both
  subsystems at world origin; the "between" assertion passed vacuously for any
  bridge coordinate, providing zero coverage of the positioning contract.

  Before marking any "positioned between" THEN-clause as COVERED:
  1. Confirm both reference structures are at NON-ZERO and DISTINCT world positions.
  2. Confirm the assertion checks both inequalities (lower < value AND value < upper).
  3. A signed-inequality assertion (e.g., using `<` not `is_equal_approx`) is required.

  ## INVARIANT / "DOES NOT CHANGE" CLAUSES

  When a spec THEN-clause states that property X "does NOT change", "is unchanged",
  or "remains stable" under operation Y (e.g., "the underlying topology does NOT change
  when an overlay is applied"), the test MUST:

  1. Record the value of X BEFORE invoking Y.
  2. Invoke Y.
  3. Assert X equals the recorded pre-Y value (e.g., `assert pos_after == pos_before`).

  A test that only asserts X is correct AFTER Y cannot distinguish "unchanged" from
  "coincidentally the same value" — it does not verify the invariant. Both the
  before-state capture AND the equality assertion are required.

  Observed failure (task-029 REQ-P1): no test captured node world positions before
  calling `apply_overlay()` and asserted they were unchanged after. The spec clause
  "the underlying topology (Container nesting, Node positions) does NOT change" was PARTIAL.

  Common spec phrases that trigger this rule:
  - "does NOT change", "remains unchanged", "is stable", "is preserved"
  - "layout is NOT affected", "positions are NOT modified"
  Write a before/after equality assertion for every such clause.

  ## CONSUMER-SIDE COVERAGE FOR INTER-LAYER DATA FLOWS

  When a spec describes data flowing from a producer (e.g., extractor) to a consumer
  (e.g., composition layer) for a named purpose (e.g., "the symbol table provides
  human-readable identity for edge endpoint labels"), tests must cover BOTH sides:

  1. Producer test: verifies the data is emitted with the expected field and value.
  2. Consumer test: calls the consuming function with fixture data that includes the
     field and asserts the OUTPUT uses the data value (not a raw ID or None).

  A test that only confirms the field is embedded in the source dict does NOT verify
  the consumer reads and uses it. Add a test that retrieves the labeling data for a
  call-graph edge's source/target endpoint and asserts the name matches the symbol
  table entry — not the node ID.

  Observed failure (task-029 REQ-EX3): `test_symbols_embedded_in_module_node` confirmed
  the symbol dict is stored on the node. No test verified that the composition layer
  resolves symbol names when constructing edge endpoint labels. The "labeling layer"
  scenario was untested.

  Before marking any data-flow THEN-clause COVERED: confirm a test exercises the
  CONSUMING function (not just the producing function) and asserts the output uses the
  produced value.

  ## EDGE/CONNECTION RE-ROUTING IS A DISTINCT IMPLEMENTATION REQUIREMENT

  When a spec scenario involves collapsing, grouping, folding, or aggregating nodes:

  1. BEFORE writing code, search every THEN-clause for the words:
     "edge", "edges", "connection", "re-route", "reroute", "formerly connected",
     "updated", "point to", "directed to".
  2. If any such clause exists, edge re-routing is a SEPARATE implementation task
     from node-visual changes. It requires:
     - Iterating the rendered edge data structures (e.g., `_path_edge_entries`).
     - Finding edges whose source OR target is a member of the collapsed/grouped set.
     - Moving their endpoint (with Tween if in scene tree) to the new supernode/group.
     - Storing original endpoints in `_collapse_state` so expansion can restore them.
  3. Implementing the node-visual side (supernode appearance, tinting) WITHOUT
     the edge-routing side is always PARTIAL/FAIL for every edge-related THEN-clause.

  Edge re-routing THEN-clauses require two separate sets of tests:
  - Collapse test: build fixture with edges spanning cluster boundary → collapse →
    assert edge endpoint position matches supernode position.
  - Expand test: collapse then expand → assert edge endpoint returns to
    original node position.

  Observed failure (task-019): `collapse_cluster()` created a visually correct
  supernode with aggregate metrics, but zero edge re-routing code was written.
  Grep for "edge.*supernode", "reroute", "_path_edge_entries" in changed files
  returned zero matches. Four THEN-clauses (two per direction) were MISSING.
