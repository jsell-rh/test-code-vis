apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  ## PROJECT: code-vis

  ### Python Extractor (`extractor/`)
  - Parses kartograph codebase, outputs JSON scene graph
  - Python 3.12+, standard library + tree-sitter only
  - Type hints throughout
  - Run `ruff format extractor/` (auto-fix) then `ruff format --check extractor/` (verify) before committing — applies to ALL files including test files; running only `ruff check` is insufficient
  - Write pytest tests for extraction logic

  ### Godot Application (`godot/`)
  - Godot 4.x with GDScript
  - Write GDScript tests in `godot/tests/` (filenames: `test_*.gd`)
  - Every spec scenario requires a behavioral test with fixture data and assertions on scene-tree properties — not just compile checks
  - Use headless test runner (GUT addon or custom `run_tests.gd`)

  ### General Requirements
  - JSON scene graph is the interface contract between components
  - Dict-key assertions are NOT rendering coverage. Tests must instantiate Node3D and assert `.position`, `.visible`, property values
  - Label3D readability: `billboard = BILLBOARD_ENABLED` and `pixel_size > 0.0`
  - Empty `_ready()` stubs are never a complete implementation
  - Direction/sign derivation arrows must be inline `#` comments INSIDE the function body, not `##` docstrings above it
  - "Relative to parent" positions require tests where parent is at NON-ZERO world position AND the assertion is a direct equality check (`child["position"]["x"] == local_offset`), NOT a proximity check (`dist < radius`) — proximity passes for both absolute and relative storage

  ## BRANCH HYGIENE — ALWAYS FORK FROM MAIN

  Your working branch MUST be created directly from main. Never fork a task
  branch from another task branch (e.g., `hyperloop/task-020`).

  Correct:
    git checkout main
    git checkout -b hyperloop/task-NNN

  Wrong (causes inherited foreign commits):
    git checkout hyperloop/task-020
    git checkout -b hyperloop/task-NNN   # inherits task-020's commits

  **Why this matters:** Forking from a task branch inherits that branch's
  commits onto your branch. Those commits carry foreign Task-Ref trailers and
  appear above main — `check-commit-trailer-task-ref.sh` will FAIL and
  `check-branch-forked-from-main.sh` will FAIL. The correct fix is to DROP
  the inherited commits via `git rebase --onto main`, not to reword them.

  **Before writing a single line of code**, verify your branch has no inherited
  foreign commits:
    bash .hyperloop/checks/check-branch-forked-from-main.sh

  If it exits non-zero, rebase onto main before proceeding:
    git log --oneline main..HEAD          # identify which commits are yours
    git rebase -i main                    # drop foreign commits (not 'reword')
    bash .hyperloop/checks/check-branch-forked-from-main.sh   # confirm exit 0

  ## REBASE HYGIENE — STAY CURRENT WITH MAIN BEFORE SUBMITTING

  When multiple tasks run concurrently, main can advance after your branch was
  created. A branch that is not rebased onto current main will SILENTLY DELETE
  everything main added — the diff against main shows `-lines` for code you
  never wrote, and tests appear clean only because the deleted test files are
  never executed.

  **Observed failure (task-108):** branch forked from db76c822; main advanced
  one commit (task-074 work). Branch was never rebased. Merging would have
  reverted compute_structural_significance(), schema TypedDict fields, and
  test_visual_primitives.gd. 161 tests passed because the unregistered test
  file simply never ran.

  **Before every submission**, verify your branch is current:

    bash .hyperloop/checks/check-rebased-onto-main.sh

  If it exits non-zero, rebase immediately:

    git fetch origin main:main
    git rebase origin/main

  **During conflict resolution — critical rules:**
  - NEVER choose "ours" (branch side) to resolve an entire file when main
    added new functions, TypedDict fields, or test registrations.
  - After resolving each file, verify functions that existed in main are
    still present: `grep "def compute_" extractor/extractor.py`
  - For `godot/tests/run_tests.gd` specifically: count the `_run_suite()`
    lines after resolution — the count MUST be >= the count on main.
  - **`.hyperloop/checks/` conflicts — take ALL of origin/main in one command:**
    When the rebase produces conflicts in `.hyperloop/checks/` (both sides added
    or modified the same check script), resolve the entire directory by taking
    origin/main's version unconditionally:

      git checkout origin/main -- .hyperloop/checks/
      bash .hyperloop/checks/check-checks-in-sync.sh   # must exit 0

    Never hand-edit check scripts to resolve conflicts — take origin/main wholesale.
    Observed failure (task-010): both branch and origin/main added check-rebased-onto-main.sh
    and check-run-tests-suite-count.sh; conflict resolution left stale versions on the
    branch, causing both scripts to fail at review.

  - **Parallel-task conflicts — KEEP main's duplicate, PRESERVE your unique additions:**
    When a parallel task merged to main implements the SAME feature your branch
    implements, the rebase will produce conflicts in the overlapping code area.
    Observed failure (task-034 / task-040): both branches independently implemented
    individual edge weight. task-040 merged first, producing conflicts in
    `extractor/extractor.py` and `extractor/tests/test_extractor.py`.

    Conflict resolution protocol:

    Step 1 — Classify every conflicted block as DUPLICATE or UNIQUE:
      - DUPLICATE: code that implements the same feature as the parallel task
        (e.g., both branches add `weight` to `build_dependency_edges()`).
      - UNIQUE: code only YOUR branch introduces — your task's actual deliverable
        (e.g., `extract_type_topology()` is task-034's unique addition).

    Step 2 — Apply the rule per block:
      - For DUPLICATE blocks: KEEP ORIGIN/MAIN, DISCARD YOURS. The parallel task
        was already reviewed and merged; replacing it with your unreviewed version
        is a silent regression.
      - For UNIQUE blocks: PRESERVE YOURS. This is what your task actually delivers.

    Step 3 — Verify both sides survived:
      git grep "def your_unique_function"  # must still exist
      git grep "def parallel_task_function"  # must be main's version
      pytest extractor/tests/  # both main's tests and your new tests must pass

    NEVER resolve a conflict file by taking one side entirely (git checkout
    origin/main -- <file>) when the conflict contains BOTH duplicate code (take
    main's) AND your unique additions (keep yours). Use block-by-block resolution.

  **After rebase, if `check-run-tests-suite-count.sh` exits non-zero:**
  The diagnostic diff identifies which `_run_suite()` registrations are missing.
  For each missing suite, also restore the test file itself from origin/main —
  not just the registration line:

    # Identify missing suite(s) from the diff output, e.g. test_nfr.gd:
    git show origin/main:godot/tests/test_nfr.gd > godot/tests/test_nfr.gd
    # Then confirm the _run_suite() registration is present in run_tests.gd:
    grep "test_nfr" godot/tests/run_tests.gd

  Observed failure (task-010): origin/main added test_nfr.gd (67 lines) in commit
  a1ebeffa; the branch was not rebased so the file was never incorporated. After
  rebase, a missing test file is NOT automatically restored when the conflict was
  in a different file — explicitly restore it from origin/main.

  After rebase, run both regression guards before `run-all-checks.sh`:

    bash .hyperloop/checks/check-run-tests-suite-count.sh   # GDScript suite count
    bash .hyperloop/checks/check-pytest-test-count.sh       # Python test count
    bash .hyperloop/checks/run-all-checks.sh

  ## COMMIT TRAILER DISCIPLINE — VERIFY AFTER EVERY COMMIT

  After every `git commit` (including rebase sessions and fix-up commits), immediately run:

    bash .hyperloop/checks/check-commit-trailer-task-ref.sh

  This confirms every commit on the branch carries `Task-Ref: task-NNN` for THIS
  task. Do not proceed to the next commit until this exits 0.

  Never copy a `Task-Ref` trailer from another commit, branch, or task. The trailer
  is the audit trail. A single wrong Task-Ref causes `check-branch-forked-from-main.sh`
  and `check-commit-trailer-task-ref.sh` to FAIL at submission and requires an
  interactive rebase to fix — catching it immediately after the commit is always
  cheaper than discovering it at submission.

  ## CHECK SYNC — TWO MANDATORY POINTS (FAILURE TO COMPLY BLOCKS SUBMISSION)

  `check-checks-in-sync.sh` now fetches `origin/main` silently before comparing,
  so a stale local `main` no longer produces false-OK results. If the script exits 0,
  your working tree is confirmed to match the actual remote state. This closes the
  task-075 gap: implementer ran `git checkout main -- .hyperloop/checks/` without
  fetching first; local main was 3 commits stale; the sync and the verification both
  agreed on 52 checks while origin/main had 54 — concealing the rebase failure.

  ### Sync Point 1 — Absolute first action (before spec, before code)

  Before reading the assigned spec, before running any check, before writing
  any code: sync check scripts AND overlay files from main, verify the sync
  is complete, and confirm your branch is rebased onto current main.

    git fetch origin main:main
    git checkout main -- .hyperloop/checks/
    git checkout main -- .hyperloop/agents/process/
    bash .hyperloop/checks/check-checks-in-sync.sh
    bash .hyperloop/checks/check-rebased-onto-main.sh

  **After syncing overlay files**: immediately read the updated implementer
  guidelines to pick up any rules added since your branch was created:

    cat .hyperloop/agents/process/implementer-overlay.yaml

  Observed failure (task-027): the post-draft rebase rule was added to the
  overlay via commit 17ac862 AFTER the branch was created. The implementer's
  spawned agent never saw the rule because overlay files were not synced at
  Sync Point 1. The branch was submitted without the post-draft check, causing
  a blocking FAIL for being 1 commit behind origin/main. Syncing overlay files
  closes this gap: implementers on any branch will pick up new rules added to
  main during the session.

  `git fetch origin main:main` MUST run first — it updates local `main` to
  match the remote. Without the fetch, `git checkout main -- .hyperloop/checks/`
  reads from a potentially stale local `main` and silently omits check scripts
  that were added to origin/main since your last fetch. A stale local main is
  indistinguishable from a current one without fetching first.

  The third command MUST exit 0 before you proceed. If it exits non-zero,
  re-run the full four-command sequence above and check again.
  Do not proceed until `check-checks-in-sync.sh` is clean.

  The fourth command (`check-rebased-onto-main.sh`) MUST also exit 0 before
  you write a single line of code. If it exits non-zero, rebase immediately —
  do NOT write any implementation code first:

    git rebase origin/main
    # Resolve conflicts — keep all .hyperloop/checks/ changes from origin/main:
    git checkout origin/main -- .hyperloop/checks/
    bash .hyperloop/checks/check-checks-in-sync.sh    # must exit 0
    bash .hyperloop/checks/check-rebased-onto-main.sh # must exit 0

  Observed failure (task-065): assignment explicitly stated "MUST run git rebase
  before any other work." Implementer wrote implementation code without rebasing.
  Branch was 5 commits behind origin/main at submission. The sole blocking failure
  was check-rebased-onto-main.sh — all implementation work was correct but the
  submission was rejected because the rebase precondition was skipped entirely.

  Apply all four commands on BOTH first attempts AND re-attempts.

  ### Sync Point 2 — Immediately before final submission

  After all implementation is complete and immediately before running
  `run-all-checks.sh` for your submission check, sync check scripts AND
  overlay files from main again:

    git fetch origin main:main
    git checkout main -- .hyperloop/checks/
    git checkout main -- .hyperloop/agents/process/
    bash .hyperloop/checks/check-checks-in-sync.sh

  The fetch is required here too — new checks may have been pushed to origin/main
  between Sync Point 1 and now. Always fetch before checkout; never assume local
  main is current.

  This closes the timing gap: new check scripts can be added to main between
  your branch creation and the verifier's review. A check added to main after
  Sync Point 1 but before Sync Point 2 would otherwise be silently absent and
  block your submission with a `check-checks-in-sync.sh` failure.

  This second sync is the LAST action before `run-all-checks.sh`. Do not
  write additional code after it — only run checks and commit results.

  ## PROCESS-ONLY FAIL — REBASE-ONLY FIX PROTOCOL

  When your prior FAIL report lists ONLY `check-rebased-onto-main.sh` and/or
  `check-checks-in-sync.sh` as failing checks (every implementation check
  passes), execute this EXACT sequence and NOTHING ELSE:

    git fetch origin main:main
    git rebase origin/main
    # Resolve any conflicts — keep all .hyperloop/checks/ changes from origin/main:
    git checkout origin/main -- .hyperloop/checks/
    bash .hyperloop/checks/check-checks-in-sync.sh     # must exit 0
    bash .hyperloop/checks/check-rebased-onto-main.sh  # must exit 0
    bash .hyperloop/checks/run-all-checks.sh           # must exit 0

  Do NOT add implementation commits. Do NOT modify any implementation files.
  A rebase-only fix has zero implementation changes — the only new content is
  the check-sync commit and the rebase itself. Adding gratuitous implementation
  commits to a branch that only needs a rebase introduces new risk and can
  reset check-no-zero-commit-reattempt.sh baselines in unexpected ways.

  **Why process-check failures are especially damaging:**
  A FAIL verdict from check-rebased-onto-main.sh or check-checks-in-sync.sh
  causes the verifier to STOP READING immediately — your implementation quality
  is NOT evaluated at all. Ten rounds of solid implementation work can be
  blocked indefinitely by a single missing rebase. The verifier protocol states:
  "If [check-rebased-onto-main.sh] exits non-zero, issue FAIL immediately —
  do not review implementation quality." Fix process issues first. Never submit
  with these checks failing.

  ## STANDARD REBASE FAIL — REBASE BEFORE APPLYING PRESCRIBED FIXES

  When your prior FAIL report lists BOTH a rebase failure AND implementation
  findings (missing Tween, missing BFS animation, incomplete test), you MUST
  complete the rebase BEFORE applying any implementation fix from the prior report.
  Do NOT fix implementations first and rebase afterward.

  **Why order matters:** The missing main commit may modify the SAME files your
  branch touches. Applying your implementation fixes to the stale base and then
  rebasing produces a harder three-way conflict than rebasing first and applying
  fixes cleanly to the current base. Some prior FAIL findings may also be
  partially or fully resolved by the parallel task's commit — you need to see
  the rebased state before deciding what still needs fixing.

  **Mandatory order for any re-attempt where the prior FAIL cited a rebase failure:**

  1. Run Sync Point 1 (every re-attempt, every time — do not skip):

       git fetch origin main:main
       git checkout main -- .hyperloop/checks/
       git checkout main -- .hyperloop/agents/process/
       bash .hyperloop/checks/check-checks-in-sync.sh   # must exit 0

  2. Rebase BEFORE reading the prior FAIL report's implementation findings:

       bash .hyperloop/checks/check-rebased-onto-main.sh
       # If non-zero, rebase immediately:
       git rebase origin/main
       # Apply the PARALLEL-TASK CONFLICTS protocol: keep origin/main's
       # version of overlapping code sections; keep your unique additions.
       bash .hyperloop/checks/check-rebased-onto-main.sh   # must exit 0

  3. Run all checks against the rebased state BEFORE touching any code:

       bash .hyperloop/checks/run-all-checks.sh

     Some prior FAIL findings may now be resolved by the parallel task's commit.
     Only apply fixes for findings that STILL fail after this baseline run.

  4. Apply remaining implementation fixes, then complete Sync Point 2 and the
     post-draft rebase check before submitting.

  Observed failure (task-070, Round 2): prior FAIL (Round 1) cited missing Tween
  and BFS animation. Round 2 correctly fixed both. However, task-067 had merged to
  origin/main during Round 2 work, modifying extractor/extractor.py — the same file
  task-070 touches. The branch was submitted without rebasing. The conflict was in
  separate function regions and would have resolved cleanly, but the rebase was
  skipped entirely. Sole blocking reason: check-rebased-onto-main.sh FAIL.

  ## FIX COMMITS ON STALE BRANCHES — A FIX COMMIT IS NOT A REBASE

  A fix commit authored on a non-rebased branch does NOT make the branch rebased.
  Committing your implementation fix and failing to run `git rebase origin/main`
  leaves check-rebased-onto-main.sh failing — the two operations are completely
  independent.

  `check-rebased-onto-main.sh` verifies branch ANCESTRY, not file content. A commit
  that adds new tests or fixes a bug does not move the fork point onto origin/main.
  Only `git rebase origin/main` does that. No other action satisfies it.

  **Self-check before authoring ANY fix commit in a re-attempt:**

    bash .hyperloop/checks/check-rebased-onto-main.sh   # must exit 0 FIRST
    bash .hyperloop/checks/check-checks-in-sync.sh      # must exit 0 FIRST

  If either exits non-zero: resolve it before writing a single line of code. Do not
  commit the fix to a stale base and expect to rebase afterward — rebase first, then
  commit the fix on top of the current base.

  **Check scripts added to main between Round N and Round N+1 will be absent from
  your branch.** Run Sync Point 1 at the very start of EVERY re-attempt, before
  reading the prior FAIL report's implementation findings. A check added after your
  Round 1 Sync Point 2 will surface as a blocking failure at Round 2 submission even
  when it would EXIT 0 against your code — a purely avoidable process violation.

  Observed failure (task-065, Round 2): prior FAIL listed (a) check-rebased-onto-main.sh
  FAIL and (b) missing test_smooth_regrouping_updates_anchor_positions(). The implementer
  correctly authored the missing test — but committed it to the stale base without
  rebasing. The branch remained 3 commits behind origin/main after the fix commit.
  check-reposition-function-has-tween.sh (added to main after Round 1's review) was
  absent because Sync Point 1 was skipped at the start of Round 2. Both blockers
  required zero implementation changes: (1) git rebase origin/main, then (2)
  git checkout origin/main -- .hyperloop/checks/.

  ## SINGLE-IMPLEMENTATION-CHECK FAIL — CHECK-FIRST PROTOCOL

  When your prior FAIL report shows exactly ONE implementation check exiting
  non-zero (rebase and sync checks pass), execute this protocol BEFORE writing
  any code or running any other check:

  1. Run the single failing check and capture its COMPLETE output:

       bash .hyperloop/checks/<failing-check-name>.sh 2>&1 | cat

  2. Find the "Required fix" or "Required:" section in the output. Apply the
     fix VERBATIM — copy the code exactly as printed. Do NOT paraphrase, do NOT
     rewrite, do NOT attempt an alternative approach.

  3. Run the single failing check again immediately:

       bash .hyperloop/checks/<failing-check-name>.sh   # must exit 0

  4. Only after the specific check exits 0, run the full suite:

       bash .hyperloop/checks/run-all-checks.sh

  Do NOT make changes unrelated to the failing check. Do NOT re-attempt with
  the same broken implementation — every check that fails has printed exactly
  what is wrong and exactly what to do. If it has failed for multiple rounds,
  the check's own output has prescribed the fix each time and was not followed.

  **Why `check-prescribed-fixes-applied.sh` does not catch this:**
  That check tracks "Offending lines:" formatted citations in the FAIL report.
  Many checks (including `check-individual-edge-weight.sh`) use a "Required fix:"
  bullet format instead — those are NOT scanned. This means sole-check failures
  with "Required fix:" output can persist indefinitely if the check's output is
  not read and applied directly.

  Observed failure (task-108, rounds 1–10): sole blocking check was
  `check-individual-edge-weight.sh`. Its stdout printed:

    Required fix in build_dependency_edges():
      1. Replace the raw_edges set with a dict[tuple, int] that accumulates
         import count per (source_id, target_id, etype) triple:
           raw_edge_count: dict[tuple[str,str,str], int] = {}
           raw_edge_count[key] = raw_edge_count.get(key, 0) + 1
      2. Emit weight on each individual edge:
           {'source': src, 'target': tgt, 'type': etype, 'weight': count}

  After 10 rounds, the fix was still not applied verbatim. Apply the check's
  own prescribed fix first — do not write any other code until the check exits 0.

  ## CHECK SYNC ≠ REBASE — TWO DISTINCT GIT OPERATIONS, BOTH REQUIRED

  `git checkout main -- .hyperloop/checks/` copies CHECK SCRIPT FILES into your
  working tree. It does NOT change your branch's commit ancestry. These are
  completely different git operations.

  `check-rebased-onto-main.sh` checks commit ancestry, NOT file content. It will
  still EXIT 1 after a sync commit if you have not run `git rebase origin/main`,
  even if every check-script file is byte-identical to main.

  **Observed failure (task-108, round 9):** sync commit f287ddfd made
  check-checks-in-sync.sh pass but check-rebased-onto-main.sh still failed —
  the branch was 5 commits behind origin/main in ancestry even though all check
  script files were current.

  Mandatory rule: after EVERY `git checkout main -- .hyperloop/checks/` sync,
  immediately also run:

    bash .hyperloop/checks/check-rebased-onto-main.sh

  If it exits non-zero, rebase BEFORE committing the sync:

    git fetch origin main:main
    git rebase origin/main
    # resolve conflicts — keep all main additions (see REBASE HYGIENE above)
    git checkout origin/main -- .hyperloop/checks/   # re-sync after rebase
    bash .hyperloop/checks/check-checks-in-sync.sh   # must exit 0
    bash .hyperloop/checks/check-rebased-onto-main.sh  # must exit 0

  A sync commit that is not accompanied by a passing rebase check is INCOMPLETE.
  Never submit with check-rebased-onto-main.sh failing.

  ## SCOPE COMPLIANCE

  `specs/prototype/prototype-scope.spec.md` is the PROTOTYPE-SCOPE AUTHORITY.
  It has VETO POWER over every other spec, including your assigned task spec.
  No other spec can override it.

  ### Step 0 — Spec-level prohibition check (absolute first action)

  Before reading your assigned spec in detail, before writing any code, before
  running any check (but AFTER syncing checks from main per the section above):

  **Run the mechanical check first — takes under one second:**
  ```
  bash .hyperloop/checks/check-assigned-spec-in-scope.sh <your-spec-path>
  ```
  If this exits non-zero, the assignment is INVALID. Paste the script output
  verbatim into your FAIL report and stop — do not read the spec further, do
  not write any implementation code.

  Then complete the manual check:
  1. Identify the PRIMARY FEATURE described by your assigned spec (one sentence
     summary: what is the spec fundamentally about?).
  2. Open `specs/prototype/prototype-scope.spec.md` and read every item in its
     "Not In Scope" section.
  3. If the assigned spec's primary feature matches ANY prohibited item — even
     partially or under a different name — the task assignment is INVALID.
     Write an immediate FAIL finding that states:
       - The assigned spec
       - The matching "Not In Scope" item
       - The output of `check-assigned-spec-in-scope.sh`
       - That no implementation was written
     Stop. Do not write a single line of implementation code. Return the finding
     to the orchestrator for reassignment or deferral.

  This check exists because an implementer cannot resolve a scope conflict — only
  the orchestrator can. The correct outcome is a clean FAIL report, not a partial
  implementation of a prohibited feature.

  ### When the assigned spec contains a MIX of in-scope and out-of-scope features

  Implement only the in-scope portions. Explicitly note every skipped clause and
  the matching "Not In Scope" prohibition in your report.

  ### Feature-level check (before writing any individual file or function)

  When your assigned spec says "3D navigation SHALL" but prototype-scope.spec.md
  lists "first-person navigation" as NOT IN SCOPE, implement orbital navigation
  only — the scope spec's prohibition wins unconditionally.

  Prohibited features are forbidden under ANY name. Before writing ANY new file
  or function:
  1. Open `specs/prototype/prototype-scope.spec.md` and read every item in its
     "Not In Scope" section. If your planned feature matches any item, STOP — do
     not write a single line of that code.
  2. Run `bash .hyperloop/checks/check-not-in-scope.sh` — confirm exit 0.
  3. Re-run after every logical code chunk.
  4. If `check-not-in-scope.sh` exits non-zero, identify the failing file(s) first,
     then choose the correct fix:

     **Case A — File has commits from YOUR branch** (`git log main..HEAD -- <file>`
     returns output): You introduced the violation. Delete or rewrite the prohibited
     code in-place.

     **Case B — File has NO commits from your branch** (`git log main..HEAD -- <file>`
     returns nothing): You did NOT introduce this violation — it was inherited from
     the fork point, and main has likely already fixed it. Do NOT hand-edit.
     Sync from main instead:
       git checkout main -- <failing-file>
     Then re-run `bash .hyperloop/checks/check-not-in-scope.sh` — confirm exit 0.
     Also sync any companion test file if one exists (e.g., `godot/tests/test_*.gd`
     with a matching name).

     **Case C — File has commits from YOUR branch, but the prohibited PATTERN was NOT
     added by your branch** (check `git diff main..HEAD -- <file> | grep '^+[^+]' |
     grep <pattern>` — returns nothing): You did not introduce this pattern. With the
     current `check-not-in-scope.sh`, this produces a NOTE (not FAIL) — no action
     required from you. If you see FAIL in this case, your check scripts are stale:
     sync from main immediately (`git checkout main -- .hyperloop/checks/`) and re-run.
     Do NOT independently remove the pre-existing code — that is another task's
     responsibility. Escalate to the orchestrator if the FAIL persists after syncing.

     Observed failure (task-027): `extractor/extractor.py` had branch commits for
     ubiquitous-dependency work; `discover_spec_nodes` and `_position_spec_nodes`
     were pre-existing. The stale scope check FAILed on them because section 2 had
     no branch-attribution logic. The fix is in the current `check-not-in-scope.sh`
     (section 2 now uses diff-based attribution, same as sections 3–5).

     Do not attempt to submit with a failing scope check regardless of which case
     applies.

  ## INTENTIONAL TEST COUNT REGRESSION — DOCUMENT IN COMMIT MESSAGE

  When you remove code because it implements a prohibited feature
  (`check-not-in-scope.sh` would FAIL if it were present), the associated tests
  MUST also be removed. This deliberately lowers the `def test_` count below
  origin/main, causing `check-pytest-test-count.sh` to exit non-zero.

  **TWO checks enforce test count — both must pass:**
  - `check-pytest-test-count.sh` — counts top-level `^def test_` only.
  - `check-class-test-count.sh` — counts ALL `def test_` including class methods.
    Class-method tests can be silently dropped while the top-level count stays
    the same or goes up (e.g., adding 2 top-level tests while removing 16
    class-method tests). This second check catches that pattern.

  Run BOTH before submitting whenever tests are removed:
    bash .hyperloop/checks/check-pytest-test-count.sh
    bash .hyperloop/checks/check-class-test-count.sh

  Observed failure (task-034): 16 class-method tests in TestSpecNodeDiscovery were
  removed (prohibited feature). Two new top-level tests were added. The top-level
  check showed 10 vs 8 (OK). The all-inclusive count showed 244 vs 256 (FAIL).
  The commit message was missing elements (3) and (4), so check-class-test-count.sh
  would have exited 1. The verifier caught the missing documentation and issued FAIL.

  A silent test count drop is always treated as a regression by the verifier.
  Make the removal legible by stating it explicitly in the commit message:

    fix(scope): remove prohibited spec-extraction functions and tests

    discover_spec_nodes() and _position_spec_nodes() implement spec extraction,
    which is explicitly "NOT implemented" per prototype-scope.spec.md.
    Removes 16 tests from TestSpecNodeDiscovery; test count reduction is
    intentional and scope-correct — not a rebase regression.

    Spec-Ref: specs/prototype/prototype-scope.spec.md@<hash>
    Task-Ref: task-NNN

  Required elements in the commit message:
  1. Name the specific function(s) removed.
  2. Cite the prototype-scope.spec.md prohibition by name.
  3. State the exact number of tests removed.
  4. Assert the reduction is intentional and scope-correct — not a rebase regression.
     The exact phrase "intentional and scope-correct" MUST appear in the commit
     message. check-class-test-count.sh greps for this phrase to distinguish
     intentional removals from accidental regressions. If the phrase is absent,
     the check exits 1 regardless of whether the removal was actually correct.

  Without elements (1)–(4), the verifier MUST treat the test count drop as a rebase
  regression and issue FAIL. With all four, the verifier can verify the prohibition,
  count the tests, and classify the delta as intentional.

  ## INVALID ASSIGNMENT — COMPLETE STOP PROTOCOL

  When `check-assigned-spec-in-scope.sh` exits non-zero, you have an INVALID
  ASSIGNMENT. Execute this STOP PROTOCOL exactly — no deviation:

  0. IMMEDIATELY reset the branch to origin/main tip before writing anything:

       git reset --hard origin/main
       git log --oneline origin/main..HEAD   # MUST print nothing

     Rationale: the branch may have commits from prior implementer attempts that
     count as "commits above main" even though you did not write them.  Simply
     avoiding new commits leaves inherited commits in place — this triggers false
     failures in check-branch-has-impl-files.sh and confuses the verifier into
     treating prior-attempt code as current-attempt code.  The reset removes
     ALL commits above main regardless of who wrote them.

  1. Paste the script's stdout verbatim into your FAIL report.
  2. State that no implementation code was written.
  3. Stop. Submit the FAIL report and nothing else.

  **Do NOT commit anything to the task branch.** This means no implementation
  code, no process improvements, no overlay updates, no check scripts.  The
  task branch MUST contain zero commits above main when you submit an INVALID
  ASSIGNMENT FAIL report.

  Why: any commit you make to the task branch will cause
  `check-spec-ref-valid.sh` to scan it for a Spec-Ref trailer and fail on
  the missing or malformed value.  `check-branch-has-impl-files.sh` will
  flag the branch for having commits but no implementation files.  Your
  process-improvement work will trigger cascading check failures that obscure
  the real issue (the invalid assignment itself) and force an additional
  review cycle.

  If you have process improvements to record: do so on the main branch or in
  a separate process-improvement commit stream — NEVER on the task branch.

  ## SHADOW-REPLACEMENT IS FORBIDDEN

  When you create a new Python file to fix or replace a function defined in an
  existing module, you MUST choose exactly one resolution path:

  Option A — Fix in-place: apply the fix directly to the original file and delete
    the new file entirely.

  Option B — Import and delegate: import the new file's function in the consuming
    file and remove the original definition from that file.

  Leaving both definitions active means the consuming file calls the original
  (potentially broken) function while tests on the new file give false confidence.

