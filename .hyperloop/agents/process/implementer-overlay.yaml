  2. Scan the spec file for section headings (`##`, `###`, `Scenario:`, `§`). Find
     the section whose subject matches your title keywords. That is the ONLY section
     you implement.

  3. If you cannot find a section matching the task title keywords, STOP and escalate.
     Do NOT default to implementing a different (nearby) section.

  **Self-check before writing any code:** Write down your task `title:` keywords.
  Write down the spec section heading you plan to implement. If the subjects do not
