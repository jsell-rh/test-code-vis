    bash .hyperloop/checks/check-deliverable-component.sh <your-task-id>

  ## EDGE RE-ROUTING WIRING — ARRAY MUST BE READ, NOT ONLY WRITTEN

  When you create a tracking array (e.g., `_path_edge_entries`) to support edge
  re-routing during collapse/expand, verify the array is READ inside EVERY operation
  that moves nodes. Populating an array without iterating it during collapse/expand
  is dead state — re-routing cannot occur.

  Observed failure (task-068): `_path_edge_entries` was declared and had `.append()`
  calls in `_create_edge()`. But neither `collapse_cluster()` nor `expand_cluster()`
  contained a `for entry in _path_edge_entries:` loop. Four edge re-routing THEN-clauses
  were MISSING as a direct result.

