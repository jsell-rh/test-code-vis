  ## ROUTING/WIRING CONTRACT TESTS — CALL THE FUNCTION, NOT JUST ITS PREREQUISITES

  When a spec THEN-clause says "X routes to Y", "edges connect to Ports", or
  "the lookup returns Z when ports are available", the test MUST:

  1. CALL the routing or lookup function directly (e.g., `_find_port_or_centroid()`).
  2. ASSERT the return value matches the expected result (e.g., port position, not centroid).

  Verifying that the input data structures are correctly populated is INSUFFICIENT.
  A test that asserts `_port_world_positions.has("ctx_a/func_out")` proves that
  registration happened — it does NOT prove the routing function reads and returns
  the correct value from those structures.

  Observed failure (task-038): `test_edge_endpoint_uses_port_position_when_available`
  verified that `_port_world_positions` contained output-port keys that differed from
  the centroid. It did NOT call `_find_port_or_centroid()` and assert the return value.
  The THEN-clause "Edges connect to Ports, not directly to the Container body" was PARTIAL.

  Required pattern (GDScript):
    var from_pos := root._find_port_or_centroid("ctx_a", true)
    _check(
        not from_pos.is_equal_approx(ctx_a_centroid),
        "find_port_or_centroid must return port position, not centroid, when ports exist"
    )
    var found_match := false
    for key in port_world:
        if key.begins_with("ctx_a/") and key.ends_with("_out"):
            if from_pos.is_equal_approx(port_world[key]):
                found_match = true
    _check(found_match, "returned position must match a registered port world position")

  Self-check before marking any routing/wiring THEN-clause COVERED:
  - Does the test call the routing function? (not just read the data structure?)
  - Does the test assert the return value? (not just assert preconditions?)
  Both must be YES. Either alone is a PARTIAL — not COVERED.

  ## BIDIRECTIONAL OPERATIONS — COMPLETE STATE CAPTURE AND REVERSAL

  When a spec defines a forward operation AND its reverse (collapse/expand,
  open/close, fold/unfold, group/ungroup), you MUST implement both directions
  as a unit. Before writing any code:

  1. List EVERY piece of state the forward operation changes:
     - Positions, visibility, parent-child relationships, edge endpoints, labels, etc.
  2. For each changed state item, confirm:
     - The forward operation CAPTURES the original value before changing it.
     - The reverse operation RESTORES the original value using the captured state.
  3. Edge endpoints are state. If collapse moves nodes, any edges that connected
     to those nodes must have their endpoints updated — in BOTH directions.

  Required pattern for state capture:
    # During collapse — capture everything needed for expansion
    _collapse_state[cluster_id] = {
        "original_positions": { member_id: anchor.position, ... },
        "original_edge_endpoints": { edge_id: { "from": pos_a, "to": pos_b }, ... },
        "members": [...],
        "supernode": supernode_ref,
    }

    # During expand — restore from captured state
    var state = _collapse_state[cluster_id]
    for member_id in state["members"]:
        tween.tween_property(anchor, "position", state["original_positions"][member_id], ...)

  Observed failure (task-019): `collapse_cluster()` captured centroid and members
  but NOT original member positions or edge endpoints. `expand_cluster()` could only
  restore visibility — position animation and edge restoration were impossible because
  the data was never captured. The forward operation was incomplete from the moment
  of implementation.

  A forward operation that does not capture all state needed by its reverse is
  always PARTIAL/FAIL — regardless of how well the visual side works.

  ## POST-REBASE CHECK FAILURES — YOUR RESPONSIBILITY REGARDLESS OF AUTHORSHIP

  After every `git rebase origin/main`, re-run `bash .hyperloop/checks/run-all-checks.sh`
  from scratch. A rebase can bring in new check scripts that were not present at Sync
  Point 2; those scripts may fail against pre-existing code you never touched.

  **Observed failure (task-022):** `check-individual-edge-weight.sh` was added to main
  2.5 hours after the implementation commit. Rebase brought in the check. `check-sync-
  divergence-impact.sh` exited 0 (no stale scripts — the rebase made working tree match
  main), but `check-individual-edge-weight.sh` failed against `build_dependency_edges()`
  code from task-003. The implementer did not write the gap, but still had to fix it.

  Protocol when a check fails on code you didn't write:

  1. Confirm you didn't write the failing code:
       git log main..HEAD -- <failing-file>   # returns nothing → not your commit
  2. Include the root cause in your report (which task introduced the gap, when the
     check was added to main) — this is useful context for the verifier.
  3. Fix the gap anyway. The check suite is the submission contract. "I didn't write
     this code" is NOT an exemption — every check must exit 0 before you submit.
  4. Commit the fix with the current task's Task-Ref and Spec-Ref trailers.

