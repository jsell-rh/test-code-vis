apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  ## Project: code-vis

  This project has two components with different languages and tooling. Understand which
  component your task targets before writing code.

  ### Component 1: Python Extractor (`extractor/`)
  - Parses the kartograph codebase (~/code/kartograph) and outputs a JSON scene graph.
  - Python 3.12+. Use only standard library + tree-sitter (or ast module).
  - Output is a single JSON file that the Godot app consumes.
  - No frameworks. Keep it simple — a CLI script.
  - Use type hints throughout. Run `ruff check` and `ruff format --check` before committing.
  - Write tests with pytest for extraction logic.

  ### Component 2: Godot Application (`godot/`)
  - Godot 4.x with GDScript.
  - Loads the JSON scene graph and renders it as a navigable 3D space.
  - Use Godot's built-in node types (MeshInstance3D, Label3D, etc.).
  - Keep scenes composable — one scene per logical visual element.
  - Do not hardcode paths to the kartograph codebase in the Godot project. The JSON file
    is the sole interface between the extractor and the Godot app.
  - **GDScript tests are required for every Godot spec scenario.** A compile check (`godot --headless --quit`) is NOT a test — it only confirms the project parses, not that any behavior is correct.
  - Write GDScript tests in `godot/tests/` (filenames: `test_*.gd`). Each test must instantiate the relevant node/script, call its functions with a known fixture dictionary, and assert the resulting scene-tree structure or property values.
  - Use a headless test runner: either the GUT addon (`addons/gut/`) or a minimal custom `godot/tests/run_tests.gd` script that prints PASS/FAIL and exits non-zero on failure.
  - Before marking a scenario complete, quote each THEN clause verbatim and confirm exactly which line of code implements it. Vague phrases like "direction is visually indicated" or "size is encoded" are implementation requirements — add the specific rendering element (arrowhead, cone, scaled mesh, etc.) and assert it in a test.

  ### General
  - The JSON scene graph is the interface contract between the two components.
    If you change its schema, update both sides.
  - Specs are in `specs/`. Read the relevant spec thoroughly before implementing.
  - This is a prototype — prefer simple and working over clever and flexible.
  - Do not add dependencies beyond what the spec requires.
  - **Empty `_ready()` / `_process()` stubs are never a complete implementation.** If a
    spec scenario says Godot renders, positions, or instantiates something, the relevant
    script must contain code that creates nodes and sets their properties — `pass` alone fails.
  - **Dict-key assertions do not satisfy rendering THEN clauses.** A test that only checks
    `dict.has("position")` or `dict["position"].has("x")` does NOT cover a scenario that
    says "renders nodes at pre-computed positions." The test must instantiate the Node3D,
    call the function under test, and assert the actual `.position.x`, `.position.y`,
    `.position.z` values on the scene-tree node — not on an intermediate dictionary.
  - **Node properties that produce visual behavior require property-value tests.** If a THEN clause is satisfied by setting a node property (e.g. `billboard`, `pixel_size`, `no_depth_test`, `transparency_mode`, `cull_mode`, `albedo_color.a`), write a test that builds the scene from fixture data and asserts that property value on the resulting node. "The engine renders it correctly" is never a substitute for asserting the property.
  - **Label3D readability is mandatory, not optional.** Whenever you create a `Label3D` node, you MUST immediately set `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` and `label.pixel_size = 0.05` (or another legible value > 0.0). These are not style choices — a Label3D at default settings is illegible in a 3D scene. Write tests asserting both `billboard == BaseMaterial3D.BILLBOARD_ENABLED` and `pixel_size > 0.0` on the resulting node, even if the spec's THEN clause only mentions "add an annotation."
  - **Technology/version constraint scenarios require behavioral tests too.** A spec scenario
    like "Engine version" or "GDScript only" is NOT satisfied by setting a config file value
    alone. Write a GDScript test that reads the config file via `FileAccess.open()` +
    `get_as_text()` and asserts the expected version or constraint (e.g., assert the string
    "4.6" appears in the `project.godot` content). Config-without-test is PARTIAL.
  - **`_ready()` file I/O must be covered by at least one test.** If `_ready()` uses
    `FileAccess.open()` + `get_as_text()` but unit tests bypass `_ready()` by calling
    internal methods directly, add a test that exercises `FileAccess.open()` +
    `get_as_text()` on a known file and asserts its content. The call path must appear in
    a test, not only in production code.
  - **Before submitting, run the master check runner — not individual scripts.** Execute `bash .hyperloop/checks/run-all-checks.sh` and paste its COMPLETE output into your submission report under a `## Check Script Results` heading. Running individual checks selectively and omitting others from your report is NOT acceptable — it is how working checks get silently bypassed. The master runner executes every script in `.hyperloop/checks/` so none can be skipped.
  - **Audit the 'Not In Scope' section before writing any code.** Open the spec, find every item listed under "Not In Scope", "MUST NOT", or "prohibited", and write them down. Do not implement any of them in any form — not as code, a helper function, a CLI flag, a commented block, or a test. A prohibited feature that is flag-gated or disconnected is still a prohibited feature.
  - **Run check-not-in-scope.sh before submitting.** Execute `.hyperloop/checks/check-not-in-scope.sh` and confirm it exits 0. Any prohibited feature detected is an automatic block on submission — remove the feature, its tests, and all wiring before reporting done.
  - **Run check-not-in-scope.sh before creating any new file.** Do not wait until submission. If you are about to create a file, function, CLI flag, or test that would make the check fail, do not create it. Run the check after every logical chunk of new code, not only at the end.
  - **There are no acceptable forms of a prohibited feature.** A prohibited feature implemented as "optional", "flag-gated", "helper", "commented out", or "disconnected from main" is still a prohibited feature and will fail the scope check. Remove it completely — code, tests, CLI flags, signal connections, and wiring — before reporting done.
  - **Your submission MUST include the verbatim output of `check-not-in-scope.sh`.** Run `.hyperloop/checks/check-not-in-scope.sh` as the final step before reporting done, and paste its complete stdout into your submission report under a heading "## Scope Check Output". A submission that omits this section will be treated by the verifier as if the check was never run and will receive an automatic FAIL.
  - **"Verbatim" means literal copy-paste — NOT a paraphrase, NOT a summary, NOT a bullet point.** Do NOT write things like "check-not-in-scope.sh: OK" or "scope check passed" anywhere as a substitute. The required format is exactly: a standalone `## Scope Check Output` section header followed by the raw terminal output on the next line, e.g.: `OK: No prohibited (not-in-scope) features detected.` Run `.hyperloop/checks/check-report-scope-section.sh` after drafting your report to mechanically confirm the section is present and correct before submitting.
  - **Every THEN-clause requires its own named test assertion.** Before submitting, list every THEN-clause from the spec in your report and name the exact test function (and assertion line) that covers it. A THEN-clause that is correctly implemented in production code but has no test directly exercising the behavior is PARTIAL — not COVERED. "Indirect coverage" (e.g., another test incidentally touching the same path) does not count; the test must explicitly assert the observable outcome described in the THEN-clause.
  - **"All X are Y" THEN-clauses require iteration tests — not config-string tests.** If a THEN-clause says "all [files/scripts/nodes] are [type/property]" (e.g., "all scripts use GDScript", "all nodes have a label"), write a test that iterates the complete set using `DirAccess`, an array loop, or equivalent, and asserts the predicate on every element. Mapping such a THEN-clause to a test that checks a config value, a version string, or a single representative sample is INCORRECT — the predicate "all" demands iteration. Before mapping, ask: "Does my named test actually enumerate every member of the set?"
  - **Constraint behaviors (clamping, bounding, capping) require explicit constraint tests.** If a THEN-clause is satisfied by clamping, bounding, or limiting a value (e.g., theta clamped to prevent flip, distance clamped to minimum), write a test that drives the input past the limit and asserts the clamped result. A test that only verifies normal-range behavior does not cover the constraint.
  - **`run-all-checks.sh` includes `check-clamp-boundary-tests.sh` automatically.** That script enumerates every `clamp()` assignment in production GDScript and fails if any clamped variable lacks a boundary-asserting test. Partial coverage (one clamped variable tested, another missed) is the exact failure mode it catches — and why you must use the master runner rather than selecting which checks to run.
  - **A SKIP result from any check must be verified — it is not a free pass.** Read the check script's skip logic and confirm the skip condition genuinely applies to your branch. If the script skips when "no constraint found in spec" but your spec files contain the constraint, the correct result is FAIL not SKIP. Never report SKIP from memory or assumption; copy verbatim terminal output from an actual run on the current codebase. A falsely reported SKIP is treated identically to a falsely reported PASS: active falsification.
  - **When run-all-checks.sh reveals a pre-existing failure (from code not introduced by your branch), fix it before submitting — do not cite attribution.** Add the missing test or code in a separate preparatory commit with message "fix: address pre-existing check failure in <area>" before your task implementation commits, then re-run run-all-checks.sh to confirm it exits 0. "This was broken before my branch" is never an acceptable reason to leave a FAIL unresolved.
  - **Before writing a single line of code, write down every item from the spec's "Not In Scope" section as a bullet list in your scratchpad.** Keep that list visible throughout implementation. If you feel tempted to add a feature that resembles any item on that list, stop and consult the list — do not implement it.
  - **Prohibited file NAMES do not prohibit the FEATURE.** If the spec's "Not In Scope" or "prohibited" list names a specific file (e.g., `view_spec_renderer.gd`), only that exact file name is prohibited — the feature itself must still be implemented using a different name (e.g., `view_spec_applier.gd`, `scene_updater.gd`). Read each prohibition literally: a name ban is not a feature ban.
  - **Multi-stage pipelines require ALL stages to be implemented.** When the spec describes a data-flow pipeline (e.g., "LLM produces view spec; the renderer interprets it"), implement every stage — producer AND consumer. Producing an intermediate representation (e.g., a dictionary from `parse_response()`) without writing the code that consumes it and produces the final output (e.g., mutating the 3D scene) is a PARTIAL implementation. Before submitting, trace each intermediate value the spec describes and confirm there is code that reads it and acts on it.
  - **Run `.hyperloop/checks/check-pipeline-wiring.sh` before submitting.** This script verifies that key pipeline stages are wired end-to-end. Fix any FAIL lines before reporting done.
  - **Integration tests are required when the spec names a specific target path.** If the spec says "MUST use [path]" or describes a scenario "GIVEN the [named codebase]", write an automated test (pytest or shell) that invokes the code against that actual path and asserts that expected output is present. A committed output artifact (e.g., scene_graph.json) is evidence the pipeline was run manually, not an automated test. Run `check-kartograph-integration-test.sh` before submitting.
  - **Delete prohibited files immediately — never plan to remove them later.** If you realise mid-implementation that a file you just created would be flagged by `check-not-in-scope.sh`, delete it, its tests, and all wiring now. A prohibited file left "temporarily" in the working tree is how scope violations survive to submission.
  - **The check output you paste must come from a terminal run on the current codebase state.** Do not copy a previous "OK" result, recall it from memory, or paste it from an earlier run. If the latest run produced FAIL lines, those FAIL lines are your current scope check output — paste them, fix every violation, re-run the check, and only then update your report with the new passing output.
  - **Pasting stale or fabricated check output is a more severe finding than a scope violation.** A report that shows "OK: No prohibited" while prohibited code is present is active falsification. The verifier will flag this explicitly. Always report what the script actually printed.
  - **`run-all-checks.sh` exit-0 is the hard submission gate — no exceptions.** If `run-all-checks.sh` exits non-zero for any reason (including `check-report-scope-section.sh`), fix every FAIL and re-run until the master runner exits 0 before reporting done. Submitting with a known FAIL in the check output is invalid regardless of how minor the fix appears.
  - **Sync `.hyperloop/checks/` from `main` before running `run-all-checks.sh`.** New check scripts may have been added to `main` after your worktree was created, so your worktree may contain a stale subset. Run `git checkout main -- .hyperloop/checks/` first — this pulls any missing check files into your worktree without switching branches. Only then run the master runner. If you skip this step, you will silently miss checks that the verifier will run, and your submission will fail on findings you never saw.
  - **Pre-existing failures from check scripts still block your submission.** A check that FAILs because of code already present on `main` (unchanged by your branch) is not exempt. Fix the underlying issue before submitting — "this was broken before my branch" is not an acceptable reason to leave a FAIL unresolved.
  - **Grep for every test function name you list in your THEN→test mapping before submitting.** For each entry in your mapping, run `grep -rn "<test_function_name>" godot/tests/` and confirm it returns at least one match. A test name you list that does not exist in the test files is fabrication — an automatic FAIL worse than a missing test. Do not invent names of tests you intended to write; if the test is missing, write it first.
  - **"All X are Y" THEN-clauses cannot be satisfied by a test that checks a single instance or a config string.** If your mapping entry for such a THEN-clause names a test that reads a config file, checks a version string, or asserts one representative sample, your mapping is wrong even if the test exists. Replace the mapping with a test that iterates every member of the set (via DirAccess, array loop, etc.) and asserts the predicate on each.
  - **Before running any check, verify your branch has commits: `git log main..HEAD --oneline`.** An empty result means your branch is identical to main — you have submitted no implementation. Commit your work first. `check-branch-has-commits.sh` (included in `run-all-checks.sh`) will fail loudly on an empty branch, but do not wait for it — check before running anything. A branch with zero commits is not a partial implementation; it is no implementation.
  - **CLI entry points require dedicated tests.** If a Python component exposes a `main()` function (or `__main__.py` entry point), write at least one pytest test that calls `main([...])` directly or invokes the module via `subprocess.run(["python", "-m", "<pkg>", ...], check=True)` and asserts exit code 0 and valid output. A THEN-clause "runs as a standalone CLI tool" is PARTIAL until this test exists. `check-extractor-cli-tested.sh` enforces this mechanically.
  - **"Stdlib-only" or "no dependencies" constraints require an explicit import-inspection test.** If a spec THEN-clause says a component "requires no dependencies beyond stdlib" or similar, write a test that parses the package's source with `ast` and asserts every top-level import name appears in `sys.stdlib_module_names`. Do not rely on the absence of a `requirements.txt` as a proxy — that is not a test. `check-extractor-stdlib-only.sh` enforces this mechanically.
  - **Scale scenarios require a fixture at the scale stated in the spec.** If a MUST requirement says the system works at "N modules / M files across K bounded contexts", write a test that calls the relevant function with a synthetic fixture of at least that scale (or the actual target codebase) and asserts no errors and correct output counts. A test at a smaller scale does not cover the MUST. "Performance cannot be measured in headless tests" applies only to FPS; structural correctness at scale is always testable.
  - **Check scripts added to main after your branch was created are still blocking.** If `git checkout main -- .hyperloop/checks/` pulls in scripts that were not present during your implementation, every FAIL from those scripts blocks your submission — regardless of when the script was added. "The check didn't exist when I synced" is not an exemption. Read each new script's FAIL message, add the required tests or code, and re-run `run-all-checks.sh` until it exits 0 before submitting.
  - **Proactively flag untestable THEN-clauses in your submission report.** If a THEN-clause describes a property that is physically impossible to verify in the headless/CI environment (e.g., FPS measurement without a render pipeline, OS identity at runtime, absence of browser/container when only a source tree is present), document it explicitly in your report under "## Untestable THEN-Clauses" with three items per clause: (1) the verbatim THEN text, (2) why it is untestable in this environment, and (3) the architectural evidence that demonstrates compliance (e.g., no HTML5 export preset in project.godot, no Dockerfile, LOD system present). Do not leave an untestable clause silently uncovered — document the gap so the verifier can apply PASS-WITH-NOTE rather than FAIL.
  - **"End-to-end wiring" means `main.gd` (or a named coordinator) calls ALL pipeline stages.** The components existing as class files in `godot/scripts/` is NOT wiring. Wiring means a coordinator script instantiates and calls each stage: `var gen = LlmViewGenerator.new(); var spec = gen.parse_response(llm_output); interpreter.apply_spec(spec, anchors, self)`. Before reporting done, open `main.gd` and confirm each required stage is called there.
  - **UI requirements are scene-tree requirements, not logic requirements.** If the spec says "question input UI" or "submit button", a Godot scene must contain the corresponding node (LineEdit, Button, etc.) added in `_ready()` or present in a `.tscn`. A function that builds a prompt string does NOT satisfy a UI requirement. Add the node, connect its signal, and test that the signal triggers the pipeline.
  - **Integration tests must call ALL pipeline stages in one test body.** When the spec says "wire X → Y end-to-end," at least one test must call the producer stage (build_prompt / parse_response), pass its output to the consumer stage (apply_spec / render_spec), and assert the resulting scene-tree state. Two separate unit tests — one for the producer, one for the consumer — do NOT constitute an integration test. Run `check-end-to-end-integration-test.sh` before submitting.
  - **Before writing a commit message, run `git diff --name-only HEAD` to see which files you actually changed.** Only list files that appear in that output. Never cite files from a previous task's commit as work done in the current commit. A commit message that claims files not present in `git show --stat HEAD` is falsification.
