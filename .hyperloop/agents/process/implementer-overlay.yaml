apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: implementer
guidelines: |
  ## CRITICAL — FIRST BASH CALL PROTOCOL

  Your VERY FIRST Bash call — before any other tool — MUST be:
  ```
  bash .hyperloop/bootstrap-task.sh <task-id>
  ```
  This performs `git checkout -B` and the empty checkpoint commit atomically.
  If it fails, report the error and STOP.

  ## CHECKPOINT COMMIT

  The checkpoint commit (`chore: begin <task-id>`) is the orchestrator liveness signal.
  - FIRST commit on the branch (chronologically oldest)
  - EMPTY — zero file changes (`git commit --allow-empty`)
  - Before ANY other work

  ## PROJECT: code-vis

  ### Python Extractor (`extractor/`)
  - Parses kartograph codebase, outputs JSON scene graph
  - Python 3.12+, standard library + tree-sitter only
  - Type hints throughout
  - Run `ruff format extractor/` (auto-fix) then `ruff format --check extractor/` (verify) before committing — applies to ALL files including test files; running only `ruff check` is insufficient
  - Write pytest tests for extraction logic

  ### Godot Application (`godot/`)
  - Godot 4.x with GDScript
  - Write GDScript tests in `godot/tests/` (filenames: `test_*.gd`)
  - Every spec scenario requires a behavioral test with fixture data and assertions on scene-tree properties — not just compile checks
  - Use headless test runner (GUT addon or custom `run_tests.gd`)

  ### General Requirements
  - JSON scene graph is the interface contract between components
  - Dict-key assertions are NOT rendering coverage. Tests must instantiate Node3D and assert `.position`, `.visible`, property values
  - Label3D readability: `billboard = BILLBOARD_ENABLED` and `pixel_size > 0.0`
  - Empty `_ready()` stubs are never a complete implementation
  - Direction/sign derivation arrows must be inline `#` comments INSIDE the function body, not `##` docstrings above it
  - "Relative to parent" positions require tests where parent is at NON-ZERO world position AND the assertion is a direct equality check (`child["position"]["x"] == local_offset`), NOT a proximity check (`dist < radius`) — proximity passes for both absolute and relative storage

  ## SCOPE COMPLIANCE

  Prohibited features are forbidden under ANY name. Before writing ANY code:
  1. Read every item in the spec's "Not In Scope" section
  2. Run `bash .hyperloop/checks/check-not-in-scope.sh` — confirm exit 0
  3. Re-run after every logical code chunk
  4. Include verbatim output in `worker-result.yaml` under `## Scope Check Output`

  ## SUBMISSION GATES

  1. `bash .hyperloop/checks/run-all-checks.sh` — must exit 0
  2. Paste COMPLETE multi-line output into `## Check Script Results` section
  3. Paste verbatim `check-not-in-scope.sh` output into `## Scope Check Output`
  4. Never stage files under `.hyperloop/state/` — use `git add <file>` for specific files; `git add -A` and `git add .` are forbidden because they silently capture state files

  ## COMBINED REWRITE PROTOCOL (state files + checkpoint ordering)

  When BOTH check-no-state-files-committed.sh AND check-checkpoint-commit-is-first.sh fail:
  - Run filter-branch FIRST to remove state files from history — this rewrites commit SHAs
  - Run rebase -i SECOND to reorder commits — doing it before filter-branch invalidates the plan
  - Reversing the order requires starting over; check-combined-rewrite-guide.sh emits the exact commands
  - Do NOT run run-all-checks.sh until both individual checks exit 0

  ## SHADOW-REPLACEMENT IS FORBIDDEN

  When you create a new Python file to fix or replace a function defined in an
  existing module, you MUST choose exactly one resolution path before submitting:

  Option A — Fix in-place: apply the fix directly to the original file and delete
    the new file entirely. `check-no-duplicate-toplevel-functions.sh` must exit 0.

  Option B — Import and delegate: import the new file's function in the consuming
    file and remove the original definition from that file.
    Both `check-new-modules-wired.sh` AND `check-no-duplicate-toplevel-functions.sh`
    must exit 0.

  Leaving both definitions active means the consuming file calls the original
  (potentially broken) function while tests on the new file give false confidence.
  `check-new-modules-wired.sh` and `check-no-duplicate-toplevel-functions.sh` detect
  this — BOTH must exit 0 before you write worker-result.yaml.

  ## PYTEST IS A HARD GATE

  Run `pytest extractor/tests/ -v --tb=short` before submitting.
  `check-pytest-passes.sh` (included in `run-all-checks.sh`) will fail your
  submission if any test fails.  A FAILED test is a blocking error — fix the
  implementation or fix the test's coordinate-frame assumption before re-submitting.
  Do NOT paste run-all-checks.sh output that contains a pytest FAIL — that submission
  is invalid.

  ## RE-ATTEMPT PROTOCOL

  When dispatched to a branch with prior implementation commits:
  1. Run `bash .hyperloop/checks/check-racf-remediation.sh` immediately
  2. If it fails, apply every prescribed fix before new code
  3. If it skips, run `bash .hyperloop/checks/check-racf-prior-cycle.sh`
  4. If that also skips, inspect recent history manually:
     `git log --oneline -10` and `git show <sha>:.hyperloop/worker-result.yaml`
  5. Do NOT write new tests until all prior-cycle failures are resolved
  6. After applying prescribed fixes, COMMIT them before writing worker-result.yaml.
     A re-attempt with no new commits is invalid — the verifier will detect it.
     Verify with: `git log --oneline main..HEAD` (must show new commit(s))
