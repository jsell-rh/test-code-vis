apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: pm
guidelines: |
  ## Project: code-vis

  This project has two components: a Python extractor and a Godot 4 application.
  They communicate via a JSON scene graph file.

  ### Scope pre-validation (mandatory before creating any task)

  `specs/prototype/prototype-scope.spec.md` is the PROTOTYPE-SCOPE AUTHORITY with
  VETO POWER over every other spec. Before creating a task from ANY spec — especially
  those under `specs/interaction/`, `specs/core/`, or `specs/visualization/` — you MUST:

  1. Open `specs/prototype/prototype-scope.spec.md` and read its "Not In Scope" section.
  2. Identify the primary feature described by the candidate spec.
  3. If that feature matches any "Not In Scope" item, DO NOT create the task.
     Close it with a note that it is deferred to a future phase.
     The NOT IN SCOPE list is a hard veto — no other spec or assignment can override it.

  A task assigned to an implementer for a prohibited spec is an invalid assignment.
  The implementer cannot fix it; they can only report failure and stop. Prevent this
  upstream by validating scope before the task is ever created.

  #### Permanently prohibited spec files

  The following spec files have been confirmed out-of-scope and MUST NOT be assigned
  as implementer tasks under any circumstances:

  | Spec file | Prohibited feature | Authority | Mis-assignment count |
  |---|---|---|---|
  | `specs/interaction/moldable-views.spec.md` | Moldable views (LLM-powered question-driven views) | prototype-scope.spec.md line 93 | 1 (task-024) |
  | `specs/core/understanding-modes.spec.md` | Conformance/evaluation/simulation modes | prototype-scope.spec.md lines 89-91 | 2 (task-028, task-031) ⚠ |

  **`specs/core/understanding-modes.spec.md` has been mis-assigned TWICE.**
  Do not assign it again under any name or framing.  Investigate how it
  re-entered the candidate pool after task-028 and close that gap.

  **If a spec on this list has already been mis-assigned once: do not assign it
  again.  A repeated invalid assignment is a process failure, not an implementer
  failure.  Remove the spec from the candidate pool entirely and record it as
  permanently deferred.**

  Run `bash .hyperloop/checks/check-assigned-spec-in-scope.sh <spec-path>` on any
  candidate spec before creating its task.  A non-zero exit means DO NOT create
  the task.

  ### Task decomposition rules
  - Specs under `specs/extraction/` produce tasks for the Python extractor (`extractor/`).
  - Specs under `specs/prototype/` produce tasks for the Godot app (`godot/`), except for
    NFRs which are cross-cutting constraints, not standalone tasks.
  - Specs under `specs/core/`, `specs/visualization/`, and `specs/interaction/` describe
    the vision. Only create tasks from these if the prototype specs reference them AND the
    feature is not listed as NOT IN SCOPE in `specs/prototype/prototype-scope.spec.md`.
  - The JSON scene graph schema is a shared dependency. If a task requires defining or
    changing the schema, make that a separate task and list it as a dependency for both
    extractor and Godot tasks.
  - Extraction tasks should come before Godot tasks (Godot needs JSON input to work with).
  - Keep tasks small: one spec requirement per task where possible.
