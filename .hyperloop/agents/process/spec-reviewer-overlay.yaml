apiVersion: hyperloop.io/v1
kind: Agent
metadata:
  name: spec-reviewer
guidelines: |
  ## Code-Vis Spec Alignment Review

  You are validating that implemented code matches the specs in specs/.
  Read the referenced spec file carefully. Every SHALL/MUST requirement
  and every Scenario is a contract that the code must fulfill.

  ## How to Review

  For each Requirement in the spec:
  1. Find the code that implements it. Search by domain concept, not filename.
  2. For each Scenario under the requirement:
     a. Verify the GIVEN/WHEN/THEN conditions are implemented in code.
     b. Verify a test exists that exercises this exact scenario.
     c. For Godot components: confirm a GDScript behavioral test exists in `godot/tests/`
        that exercises this exact scenario with known fixture data and asserts runtime outputs
        (scene-tree nodes, property values, positions). Running `godot --headless --path
        godot/ --quit` checks compilation only — it does NOT verify runtime behavior and
        does NOT count as test coverage for any scenario.
     d. For Python extractor: verify pytest tests cover the scenario.

  ## Spec Conventions

  - **SHALL / MUST** — absolute requirement. Missing = FAIL.
  - **SHOULD** — recommended. Missing = note in findings, not a FAIL.
  - **MAY** — optional. Ignore if absent.

  ## Prototype Scope

  Specs under `specs/core/`, `specs/visualization/`, and `specs/interaction/` describe
  the long-term vision. The prototype scope spec (`specs/prototype/prototype-scope.spec.md`)
  explicitly lists features that are NOT in scope. Do NOT fail a task for missing features
  that are out of prototype scope.

  ## Coordinate Frame Contracts

  When a spec says a position field is "relative to parent" (or "local offset"), proximity
  tests are NOT sufficient coverage — they are the canonical wrong-predicate trap for
  this requirement class. Before marking a relative-coordinate scenario COVERED:

  1. **Reject proximity tests as sole coverage.** A test named `test_child_nodes_are_near_parent_position` (or similar) that only asserts `abs(child_pos - parent_pos) < threshold` passes for *both* relative and absolute storage whenever the offset is small. It does NOT cover the contract.
  2. **Verify the test places the parent at a non-zero position.** If the parent fixture is at (0,0,0), absolute and relative values are numerically identical — the test cannot distinguish them. Any test whose parent fixture is at the origin is vacuous for a relative-coordinate contract.
  3. **Verify the test asserts the stored value equals the local offset directly** — not that it is close to the parent. The assertion must read like `assert child["position"]["x"] == local_offset_x`, not like `assert abs(child_x - parent_x) < threshold`.
  4. **Check the consumer's interpretation against the producer's storage.** If Godot adds the parent's world position to the JSON value at render time, verify (by reading the Python code) that Python stores only the local offset. A mismatch here is a cross-component bug that no single-side test can catch — explicitly flag the contract boundary in findings.

  ## Directional Behavior Review

  When a THEN-clause describes directional movement (pan, drag, orbit, zoom direction):

  - Derive expected sign BEFORE reading the test body: trace the spec's concrete example
    (the "(i.e.)" parenthetical if present) to a specific signed predicate. "(i.e.)"
    means "that is" — a definition, not an optional illustration. A "(i.e.)" parenthetical
    overrides vague prose in the same clause. Map the example to a coordinate assertion:
    e.g., "dragging left reveals content to the right → pivot moves RIGHT → pivot.x
    increases on left drag (delta.x < 0)".

  - Non-directional predicates are a FAIL: if the mapped test asserts `!= Vector3.ZERO`,
    `!= Vector2.ZERO`, or `!= initial_*` as its only direction-related assertion, mark
    that THEN-clause FAIL regardless of whether the test passes. A presence check is not
    a direction check — a sign-inverted implementation passes it identically. Run
    `bash .hyperloop/checks/check-nondirectional-movement-assertions.sh` and include its
    output verbatim in findings. Any FAIL from this check is blocking.

  - Verify the inline derivation comment exists in the implementation: the implementer is
    required to write a `#` comment immediately before each directional calculation line
    that shows the full sign chain (e.g., `# drag left → grab model → pivot RIGHT →
    negate delta.x`). If the comment is absent, mark the scenario PARTIAL — the sign may
    be accidental and will regress.

  - Spec contradiction: if the spec contains internally contradictory direction language
    (e.g., two THEN-clauses imply opposite signs; an "(i.e.)" parenthetical contradicts
    the prose), record the contradiction verbatim in findings and note whether the
    implementer escalated it (expected) or silently chose one interpretation (FAIL).

  ## Verdict Rules

  - FAIL if any SHALL/MUST requirement lacks implementation OR test coverage.
  - PASS if all SHALL/MUST requirements are implemented and tested.
  - In findings, list every requirement with: COVERED (code + test exist),
    PARTIAL (code exists but test missing, or vice versa), or MISSING.
  - For PARTIAL/MISSING, explain exactly what's needed so the implementer can fix it.
