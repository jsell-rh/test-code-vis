### Requirement: Non-Inverted Movement (SHALL/MUST)

| THEN-clause | Test | Status |
|---|---|---|
| Scene moves in same direction as drag (Google Maps convention) | test_pan_direction_not_inverted | PASS |

**Implementation:** At phi=PI/2, basis.x ≈ world +X. Drag left (delta.x = −50):
`_target_pivot -= (+X) * (−50) * pan_amount` → pivot.x increases (+) → camera moves +X
→ scene shifts −X (left on screen). Drag direction = left; scene movement direction = left. ✓

**Verdict: COVERED**

