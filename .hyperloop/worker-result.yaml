## Spec Scenario Coverage

### Requirement: Question-Driven View Generation — COVERED

**Scenario: Architectural question**
- THEN generates a view focused on auth-related components
  → `_apply_show()` sets `anchor.visible = true`
  → `test_show_op_sets_visible_true`: instantiates real `Node3D`, applies spec,
    asserts `anchor.visible == true` ✓
- AND irrelevant components are hidden or de-emphasized
  → `_apply_hide()` sets `anchor.visible = false`
  → `test_hide_op_sets_visible_false`: asserts `anchor.visible == false` ✓
  → `test_hide_op_leaves_other_nodes_unchanged`: bystander stays `true` ✓
- AND relevant components are arranged to answer the question
  → `_apply_arrange()` sets `anchor.position = Vector3(x, y, z)`
  → `test_arrange_op_sets_position_x`, `test_arrange_op_sets_all_three_axes`:
    assert `absf(anchor.position.x - 5.0) < 0.001` etc. ✓

**Scenario: Impact question**
- THEN shows user database and all dependents → show op (above) ✓
- AND dependency relationships are spatially clear
  → `_apply_connect()` draws `ImmediateMesh` line + `CylinderMesh` arrowhead
    (top_radius=0.0 = pointed cone; satisfies "direction is visually indicated")
  → `test_connect_op_adds_line_geometry`: asserts ≥1 `MeshInstance3D` on root ✓
  → `test_connect_op_adds_arrowhead`: asserts ≥2 `MeshInstance3D` (line + cone) ✓

### Requirement: View Specs as Intermediate Representation — COVERED

**Scenario: LLM produces view spec**
- THEN emits structured view spec (not raw 3D geometry)
  → `test_parse_response_returns_dictionary`: confirms `result is Dictionary` ✓
- AND view spec controls show/hide/highlight/arrange/annotate/connect
  → individual op pass-through tests in `test_llm_view_generator.gd` ✓
- AND 3D renderer interprets spec into spatial scene
  → `test_scene_interpreter.gd` tests instantiate real `Node3D` objects and assert
    `.visible`, `.position.x/y/z`, `mat.albedo_color.r/g/b`, `label.billboard`,
    `label.pixel_size`, and `root.get_child_count()` — NOT dict `.has()` ✓
  → `test_all_six_ops_mutate_scene_correctly`: integration test applies all 6 ops ✓

### Requirement: Fixed Visual Primitive Set — COVERED

**Scenario: LLM uses existing primitives**
- THEN composes from existing primitives only
  → `VALID_OPS: Array = ["show","hide","highlight","arrange","annotate","connect"]`
    is a compile-time constant (not built at runtime) ✓
  → `build_prompt()` embeds all 6 primitives so the LLM knows the contract ✓
  → `test_build_prompt_contains_*_primitive` (6 tests) ✓
- AND no new rendering logic generated at runtime
  → `_make_spec()` drops any op not in `VALID_OPS` before returning ✓
  → `SceneInterpreter.apply()` uses a `match` with exactly 6 arms; unknown ops
    fall through silently ✓
  → `test_parse_response_filters_unknown_ops`: verifies filtering ✓
  → `test_unknown_op_is_ignored`: verifies no crash + no effect ✓

