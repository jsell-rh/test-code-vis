### Direction Test Predicate Verification (independently derived)

- **Pan right → pivot.x increases:** drag right (delta.x = +50) → `cam._pivot.x > initial_x`.
  Google Maps convention: non-inverted. ✓
- **Orbit horizontal drag changes phi:** drag right → `_phi -= delta.x * orbit_speed` → phi
  decreases → `cam._phi != initial_phi`. ✓
- **Arrowhead near target:** `arrow.position = to_pos - dir * height/2` → tip at `to_pos`. Test
  asserts `distance_to(target_pos) < 2.0`. ✓

