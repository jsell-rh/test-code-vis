### REQ: Dependency Visualization — COVERED

Spec: "MUST show dependencies between modules as visible connections … direction
of the dependency is discernible."

- **Code**: `main.gd::_create_edge()` creates:
  1. `ImmediateMesh` (`PRIMITIVE_LINES`) line between `_world_positions[source]`
     and `_world_positions[target]`.
  2. `CylinderMesh` arrowhead cone (`top_radius=0`) at target end oriented along
     edge direction (`Basis(Quaternion(Vector3.UP, dir))`).
  - Orange color (`Color(1.0, 0.50, 0.10)`) for cross-context; grey for internal.
- **Tests**:
  - `test_scene_graph_loading.gd::test_edge_mesh_instances_created` — ≥2 mesh
    children (line + cone) after `build_from_graph()` ✓
  - `test_dependency_rendering.gd::test_edge_line_mesh_created` — ImmediateMesh
    child exists ✓
  - `test_dependency_rendering.gd::test_direction_indicator_cone_created` —
    CylinderMesh with `top_radius=0` present ✓
  - `test_dependency_rendering.gd::test_direction_cone_near_target` — cone
    position within 2 units of target `(20, 0, 0)` ✓
  - `test_dependency_rendering.gd::test_cross_context_cone_is_orange` —
    `albedo_color.r > 0.8 and albedo_color.b < 0.3` for cross-context cone ✓

