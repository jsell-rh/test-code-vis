### Requirement: Size Encoding — COVERED

The application MUST encode complexity metrics as the visual size of volumes.

**Implementation**: `_create_volume()` reads `sz = float(nd["size"])` and sets
`BoxMesh.size = Vector3(sz, sz*0.6, sz)` for modules — size maps directly and
proportionally to mesh dimensions.

**Scenario: Large module vs small module**

| THEN-clause | Test | Status |
|---|---|---|
| module with more code appears as larger volume | `test_large_module_has_bigger_mesh` asserts large_mesh.size.x > small_mesh.size.x (fixtures: size=9 vs size=3) | COVERED |
| relative sizes are proportional to the metric | `test_mesh_sizes_proportional_to_metric` asserts abs(actual_ratio - expected_ratio) < 0.001 where expected_ratio = 9.0/3.0 = 3.0 | COVERED |

