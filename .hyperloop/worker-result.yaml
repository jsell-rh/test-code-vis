All prescribed fixes from the prior FAIL report (611bdf9) have been applied and verified.

## Fixes Applied

### Fix 1 — `extractor/extractor.py:206` — cap bc_radius with min()
Added `scene_radius = 7.5` and wrapped `bc_radius` with `min(max(5.0, ...), scene_radius * 0.8)`
so bounded-context orbit radius is capped at 6.0 and children cannot be placed outside the
scene boundary.

### Fix 2 — `extractor/extractor.py:221` — cap mod_radius with min()
Wrapped `mod_radius` with `min(max(1.5, len(children) * 0.9), bc_radius * 0.4)` to cap the
module orbit radius to 40% of the parent BC radius.

### Fix 3 — `extractor/extractor.py:222` — y=1.0 → y=0.0
Changed `_circular_positions(len(children), mod_radius, y=1.0)` to `y=0.0` to eliminate
the vertical inflation that was causing the 3D child-to-parent distance to exceed the
test threshold.

### Fix 4 — `extractor/tests/test_extractor.py` — fix proximity test geometry
`test_child_nodes_are_near_parent_position` was computing `dist(parent_world, child_local)`,
which is geometrically incorrect because child positions are stored as local offsets.  Fixed
to compute the local offset magnitude `sqrt(cx²+cy²+cz²)` and aligned the bc_radius
threshold with production code (added min() cap).

### Fix 5 — `extractor/tests/test_extractor.py` — add direct equality tests
Added `test_child_position_is_local_offset` (magnitude < parent magnitude) and
`test_child_position_x_equals_local_offset_exactly` which uses a deterministic 1-BC/1-module
fixture and asserts `child["position"]["x"] == pytest.approx(1.5)` — satisfying the
check-relative-position-tests.sh `HAS_DIRECT_ASSERT` requirement.

### Fix 6 — Task-Ref trailer on commit `997ac245`
Used `git filter-branch --msg-filter` to rewrite the commit message of the Godot project
setup commit from `Task-Ref: task-007` to `Task-Ref: task-014`.

