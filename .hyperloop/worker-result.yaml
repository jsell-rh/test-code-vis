### Process Note — State File Misconception

The implementer's commit 032589eb explicitly states "Also sync .hyperloop/state/
intake-2026-04-25.md from main to eliminate the state-file diff." This reveals a
fundamental misunderstanding of how `check-no-state-files-committed.sh` works. The check
detects commits that modified state files (`git log main..HEAD`), not file content
differences. Making the file content match main does not remove the commit from branch
history. The correct fix is `git filter-branch` as prescribed in F2.

