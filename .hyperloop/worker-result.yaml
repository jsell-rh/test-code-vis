## Requirement Coverage

### Requirement: JSON Scene Graph Loading ‚Äî COVERED

**Spec**: The application MUST load a JSON scene graph file and generate the 3D scene from it.

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` calls `FileAccess.open(scene_graph_path, FileAccess.READ)` ‚Üí `file.get_as_text()` (Godot 4.6 API) ‚Üí `JSON.new().parse()` ‚Üí `SceneGraphLoader.load_from_dict()` ‚Üí `build_from_graph()`
- `build_from_graph()` iterates nodes ‚Üí `_create_volume()` for each; iterates edges ‚Üí `_create_edge()` for each
- Positions set directly from JSON x/y/z fields with no Godot-side recomputation

**Tests** (`test_scene_graph_loading.gd`, `test_node_renderer.gd`):
- `test_volumes_created_for_each_node`: asserts `_anchors` dict contains an entry per node id ‚úì
- `test_mesh_instances_exist_in_anchors`: asserts each anchor has a MeshInstance3D child ‚úì
- `test_edge_mesh_instances_created`: asserts ‚â•2 MeshInstance3D children on main node (line + cone) ‚úì
- `test_anchor_positions_match_json`: asserts `anchor.position.is_equal_approx(Vector3(...))` for each node ‚úì
- `test_labels_are_billboard_and_readable`: asserts Label3D has BILLBOARD_ENABLED, pixel_size > 0, no_depth_test = true ‚úì
- `test_node_rendered_at_json_position` / `test_second_node_rendered_at_json_position` / `test_no_layout_recomputed_in_godot`: assert x/y/z of Node3D match JSON coords exactly ‚úì

