### Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`
- Initial `_theta = 0.15` (≈8.6°, near top-down); initial `_distance = 40.0` ✓
- `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it ✓
- `MOUSE_BUTTON_MIDDLE` drag: changes `_phi` (azimuth) and `_theta` (polar) ✓
- `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps up-axis stable ✓
- `set_pivot()` callable by main.gd after scene framing

**Tests:** `godot/tests/test_camera_controls.gd`
- `test_initial_theta_is_near_top_down()` — asserts `_theta < PI/4` (top-down default) ✓
- `test_initial_distance_is_positive()` — asserts `_distance > 0` ✓
- `test_scroll_up_decreases_distance()` — synthesises WHEEL_UP event, asserts distance < initial ✓
- `test_scroll_down_increases_distance()` — synthesises WHEEL_DOWN event, asserts distance > initial ✓
- `test_orbit_horizontal_drag_changes_phi()` — synthesises middle-drag, asserts `_phi` changed ✓
- `test_orbit_vertical_drag_changes_theta()` — synthesises middle-drag, asserts `_theta` changed ✓
- `test_set_pivot_updates_state()` — calls `set_pivot()`, asserts `_pivot` and `_distance` updated ✓
- `test_zoom_clamped_at_minimum()` — 200 scroll-up events, asserts `_distance >= min_distance` ✓

All three scenarios (Top-down overview, Zooming in, Orbiting) are covered.

