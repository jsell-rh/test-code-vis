## Requirement: Godot 4.6 — COVERED

**Implementation:** `godot/project.godot` declares
`config/features=PackedStringArray("4.6")`. All script files use `.gd` extension
(GDScript). `main.gd` uses `FileAccess.open()` + `get_as_text()` (Godot 4.x API);
does not use deprecated `File.new()` or `read_as_text()`.

**Scenario: Engine version — all THEN/AND clauses covered:**

| Clause | Code | Test |
|--------|------|------|
| uses Godot 4.6.x | `config/features=PackedStringArray("4.6")` in project.godot | `test_engine_version.gd::test_project_godot_declares_46_feature`, `test_project_godot_config_features_line`; `test_godot_version.gd::test_project_declares_godot_46` |
| all scripts use GDScript | only `.gd` files in `res://scripts/`; no C# declared | `test_engine_version.gd::test_project_does_not_declare_csharp`, `test_scripts_dir_contains_only_gdscript`; `test_godot_version.gd::test_main_script_is_gdscript` |
| all API calls valid for Godot 4.6 | FileAccess.open + get_as_text (4.x); no File.new/read_as_text | `test_engine_version.gd::test_file_access_get_as_text_returns_non_empty_string`; `test_godot_version.gd::test_main_uses_godot4_fileaccess_api` |

