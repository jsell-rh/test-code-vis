### Requirement: Camera Controls ‚Äî COVERED

**Spec**: The application MUST provide camera controls for navigating the scene.

**Implementation** (`godot/scripts/camera_controller.gd`):
- Spherical coordinates: `_theta = 0.15` rad (‚âà8.6¬∞ from zenith ‚Äî near top-down) on init
- `WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it; both clamped to `[min_distance, max_distance]`
- Middle-mouse drag changes `_phi` (azimuth) and `_theta` (polar); theta clamped to (0.01, PI-0.01) so camera never flips
- `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps orientation intuitive
- Labels use `BILLBOARD_ENABLED` + `no_depth_test = true` so they remain readable at all zoom levels

**Tests** (`test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down`: asserts `_theta < PI/4` ‚úì (top-down overview scenario)
- `test_initial_distance_is_positive`: asserts `_distance > 0` ‚úì
- `test_scroll_up_decreases_distance`: fires WHEEL_UP event; asserts `_distance < initial` ‚úì (zooming in)
- `test_scroll_down_increases_distance`: fires WHEEL_DOWN event; asserts `_distance > initial` ‚úì
- `test_orbit_horizontal_drag_changes_phi`: middle-mouse press + motion; asserts `_phi != initial` ‚úì (orbiting)
- `test_orbit_vertical_drag_changes_theta`: middle-mouse press + vertical motion; asserts `_theta != initial` ‚úì
- `test_set_pivot_updates_state`: calls `set_pivot(new_pivot, dist)`; asserts `_pivot == new_pivot` ‚úì
- `test_zoom_clamped_at_minimum`: scrolls in 200√ó; asserts `_distance >= min_distance` ‚úì

Note on "internal structure becomes visible as camera approaches": no LOD gating is implemented, nor required ‚Äî all geometry is always rendered, and proximity naturally reveals internal volumes. The label legibility condition is covered by the billboard+no_depth_test tests.

