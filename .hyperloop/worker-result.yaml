### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`camera_controller.gd`):
- Zoom: `_process` lerps `_distance` toward `_target_distance` via
  `lerp(_distance, _target_distance, min(zoom_smoothing * delta, 0.9))` (lines 50–56). ✅
- Pan: pivot update is immediate but proportional to `delta.x` / `delta.y` via
  `pan_amount = pan_speed * (_distance * 0.05 + 1.0)` (lines 151–153). ✅

**Scenario: Smooth zoom**
- `test_zoom_is_interpolated_not_instantaneous`:
  Triggers WHEEL_UP, verifies `_distance` has NOT jumped to target immediately, then
  calls `_process(0.016)` and verifies the distance has moved partially:
  `after_one_frame < initial_distance and after_one_frame > target`. ✅
  This covers "animated smoothly (interpolated), not instantaneous".

**Scenario: Smooth pan**
- `test_pan_proportional_to_drag_speed`:
  cam1 drags 10 px → `|pivot offset| = 10 × pan_amount`;
  cam2 drags 50 px → `|pivot offset| = 50 × pan_amount`;
  asserts `move2 > move1`. ✅
  This covers "proportional to drag speed".

