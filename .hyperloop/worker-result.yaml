  cursor point. ✓
- `test_zoom_in_cursor_point_invariant` (lines 213–223): asserts `0 < pivot.x < world_pt.x`,
  verifying the cursor-invariant preservation. ✓

**Scenario: Zooming out** — COVERED
- `test_zoom_out_shifts_pivot_away_from_cursor` (lines 228–240): asserts pivot moves
  away from cursor on zoom out (`pivot.x < 0.0` when cursor at `+X`). ✓

