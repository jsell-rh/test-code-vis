### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd`, `_create_volume()`):
- Bounded-context nodes: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED` (slab).
- Module nodes: `albedo_color.a = 1.0` (opaque).
- Module anchor is `add_child`-ed to the parent context anchor → nested in scene tree.
- Context `BoxMesh.size.x = sz_ctx (10.0)` > module `BoxMesh.size.x = sz_mod (3.0)`.

**Tests** (`godot/tests/test_containment_rendering.gd`, 5 tests):
- `test_bounded_context_is_translucent()` — asserts `TRANSPARENCY_ALPHA` and `albedo_color.a < 1.0`.
- `test_module_is_opaque()` — asserts module `albedo_color.a >= 1.0`.
- `test_module_parented_inside_context()` — asserts `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module()` — asserts `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled()` — asserts `cull_mode == CULL_DISABLED`.

All THEN clauses fully covered. ✅

