## Spec Alignment Review — task-011

Branch: hyperloop/task-011
Spec: specs/prototype/godot-application.spec.md

Independent review confirms all SHALL/MUST requirements are implemented and every
scenario has a corresponding behavioral GDScript test that asserts runtime Node3D
properties (not just dictionary keys or compilation).

---

## Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:**
- `main.gd._ready()` uses `FileAccess.open()` + `file.get_as_text()` (Godot 4.6 API)
- Parses via `JSON.new()` + `json.parse()`, delegates to `SceneGraphLoader.load_from_dict()`
- `build_from_graph()` iterates nodes calling `_create_volume()` and edges calling `_create_edge()`
- Positions are set directly from JSON x/y/z with no Godot-side recomputation
- `godot/data/scene_graph.json` contains real kartograph data

**Tests (`test_scene_graph_loading.gd`, 5 tests):**
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1") and _anchors.has("mod1")`
- `test_mesh_instances_exist_in_anchors` — confirms MeshInstance3D children per anchor
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D on main node (line + arrowhead)
- `test_anchor_positions_match_json` — asserts `anchor.position.is_equal_approx(Vector3(...))` for both nodes
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED, pixel_size > 0, no_depth_test

**Additional position tests (`test_node_renderer.gd`, 4 tests):** Confirm nodes are placed at
JSON-specified coordinates with no layout recomputation.

### Requirement: Containment Rendering — COVERED

**Implementation:**
- `_create_volume()` creates bounded_context as translucent BoxMesh slab
  (`TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`)
- Module nodes: opaque boxes (`albedo_color.a = 1.0`, default culling)
- Child nodes are parented to their parent's anchor Node3D via `_create_volume(nd, parent_anchor)`

**Tests (`test_containment_rendering.gd`, 5 tests):**
- `test_bounded_context_is_translucent` — asserts `transparency != TRANSPARENCY_DISABLED and albedo_color.a < 1.0`
- `test_module_is_opaque` — asserts `albedo_color.a >= 1.0`
- `test_module_parented_inside_context` — asserts `mod_anchor.get_parent() == ctx_anchor`
- `test_bounded_context_larger_than_module` — asserts `ctx_mesh.size.x > mod_mesh.size.x`
- `test_bounded_context_cull_disabled` — asserts `mat.cull_mode == CULL_DISABLED`

### Requirement: Dependency Rendering — COVERED

**Implementation:**
- `_create_edge()` creates ImmediateMesh with PRIMITIVE_LINES between world-space positions
- Direction indicated by CylinderMesh arrowhead cone (top_radius=0.0) placed at target end
- Cross-context edges: orange `Color(1.0, 0.50, 0.10)`; internal edges: grey

**Tests (`test_dependency_rendering.gd`, 4 tests):**
- `test_edge_line_mesh_created` — confirms ImmediateMesh MeshInstance3D exists
- `test_direction_indicator_cone_created` — confirms CylinderMesh with `top_radius == 0.0`
- `test_direction_cone_near_target` — asserts cone `position.distance_to(target_pos) < 2.0`
- `test_cross_context_cone_is_orange` — asserts `mat.albedo_color.r > 0.8 and b < 0.3`

### Requirement: Size Encoding — COVERED

**Implementation:**
- `_create_volume()`: `sz = float(nd["size"])`, then `box.size = Vector3(sz, sz * 0.6, sz)`
- Width (x) is directly proportional to the input size metric; ratio preserved exactly

**Tests (`test_size_encoding.gd`, 2 tests, fixture: size 3.0 vs 9.0):**
- `test_large_module_has_bigger_mesh` — asserts `large_mesh.size.x > small_mesh.size.x`
- `test_mesh_sizes_proportional_to_metric` — asserts ratio within 0.001 of expected 3.0×

### Requirement: Camera Controls — COVERED

**Implementation (`camera_controller.gd`):**
- Initial `_theta = 0.15 rad` (~8.6°) — near top-down view
- `_frame_camera()` sets pivot and distance to frame entire graph on load
- WHEEL_UP/DOWN adjusts `_distance` with clamping to `[min_distance, max_distance]`
- Middle-mouse drag orbits: `_phi` (azimuth) and `_theta` (polar, clamped [0.01, PI-0.01])
- `look_at(_pivot, Vector3.UP)` ensures intuitive orientation (up stays up)

**Tests (`test_camera_controls.gd`, 7 tests):**
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4` (top-down scenario)
- `test_initial_distance_is_positive` — camera not at origin
- `test_scroll_up_decreases_distance` — fires WHEEL_UP event, asserts `_distance < initial`
- `test_scroll_down_increases_distance` — fires WHEEL_DOWN event, asserts `_distance > initial`
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse press + motion, asserts `_phi != initial`
- `test_orbit_vertical_drag_changes_theta` — middle-mouse press + vertical motion, asserts `_theta != initial`
- `test_zoom_clamped_at_minimum` — scrolls up 200×, asserts `_distance >= min_distance`
- `test_set_pivot_updates_state` — asserts `_pivot` and `_distance` updated after `set_pivot()`

### Requirement: Godot 4.6 — COVERED

**Implementation:**
- `project.godot`: `config/features=PackedStringArray("4.6")` — declares Godot 4.6.x
- All scripts are `.gd` (GDScript); no C# or Mono
- `main.gd._ready()` uses `FileAccess.open()` + `file.get_as_text()` (Godot 4.6 API)

**Tests (`test_engine_version.gd`, 4 tests):**
- `test_project_godot_declares_46_feature` — reads `project.godot` via `FileAccess.open()`, asserts contains `"4.6"`
- `test_project_godot_config_features_line` — asserts `config/features` present and contains `'"4.6"'`
- `test_project_does_not_declare_csharp` — asserts no `"Mono"` or `"C#"` in project.godot
- `test_file_access_get_as_text_returns_non_empty_string` — asserts `get_as_text()` returns non-empty string starting with `"; Engine configuration"`

