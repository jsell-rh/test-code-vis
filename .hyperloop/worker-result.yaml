### F2 — FAIL: check-no-state-files-committed.sh [BLOCKING — same as previous review, NOT fixed]

**check**: `check-no-state-files-committed.sh` exits 1
**file**: `.hyperloop/state/intake-2026-04-25.md`
**introduced by**: `git log main..HEAD --oneline -- .hyperloop/state/intake-2026-04-25.md`
  → `032589eb feat(tests): add spec-named test aliases and expand coverage for task-007`

The implementer's commit message for `032589eb` claims:
> "Also sync .hyperloop/state/intake-2026-04-25.md from main to eliminate the
>  state-file diff that caused check-no-state-files-committed.sh to fail."

This approach does NOT fix the check. The script uses `git log main..HEAD --oneline -- <file>`
to detect whether any branch commit touched the file. Even if the file now matches main's
content, the git history still records `032589eb` as a commit on the branch that modified it.
The implementer would need to rewrite branch history (filter-branch or cherry-pick onto fresh
branch) to eliminate this commit's touch on the state file.

Additionally, the current working-tree diff shows that `.hyperloop/state/intake-2026-04-26.md`
(which exists on main) was deleted on this branch, and `.hyperloop/state/intake-2026-04-25.md`
still differs from main's current content (the branch has an older version).

**Fix**: Rewrite branch history to exclude state file changes from `032589eb`. Cherry-pick
only the non-state-file changes from that commit onto a fresh branch, or use `filter-branch`
to strip `.hyperloop/state/*` from all branch commits.

