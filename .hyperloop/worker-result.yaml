## Fix Applied

**File**: `godot/scripts/camera_controller.gd`

Added sign-chain derivation comment immediately before line 101
(`_pivot = _pivot.lerp(cursor_world, zoom_fraction)`) in `_zoom_toward_cursor()`:

    # zoom in: direction < 0 -> step < 0 -> target_distance < old_target
    #   -> zoom_fraction = 1 - (smaller/larger) > 0 -> lerp toward cursor -> pivot shifts toward cursor
    # zoom out: direction > 0 -> step > 0 -> target_distance > old_target
    #   -> zoom_fraction = 1 - (larger/smaller) < 0 -> lerp away from cursor -> pivot shifts away

This follows the same arrow-chained format already used for the pan direction comments
(lines 135, 137). No implementation logic or tests were changed.

