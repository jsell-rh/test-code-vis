### Requirement: Pre-Computed Layout
**Status: COVERED**

- **Implementation**: The `Node.position` field (with x, y, z) is defined in the schema as the vehicle for pre-computed layout. The `godot/scripts/main.gd` is an intentional stub (`pass` only) — the Godot app does not perform any layout computation, satisfying the "not by the Godot application" constraint at the schema/architecture level.
- **Scenario: Layout in JSON** — conditions addressed by `TestPreComputedLayout` (3 tests):
  - `test_every_node_has_a_position` — each node's position contains x, y, z ✓
  - `test_positions_are_floats` — coordinates are numeric ✓
  - `test_scene_graph_nodes_have_distinct_positions` — positions are not degenerate (layout has been applied) ✓
- **Note**: The scenario also specifies "tightly coupled nodes have smaller distances" and "child nodes are positioned within spatial bounds of their parent." These are behavioral properties of the layout algorithm, not of the schema structure itself. No layout algorithm is implemented in this schema-definition task — that is appropriate, as this task scopes only the JSON contract. These layout-algorithm properties will require tests in the future task that implements the extractor's layout algorithm. They are noted here but are not a reason to fail this schema task.

