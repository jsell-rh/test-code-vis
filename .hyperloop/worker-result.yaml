## Summary

Task-034 implements the complete prototype scope for the code-vis project:
a Python extractor that parses the kartograph codebase and produces a JSON scene
graph, and a Godot 4.x application that renders it as a navigable 3D space.

All THEN-clauses from `specs/prototype/prototype-scope.spec.md` are implemented
and covered by automated tests. All Not-In-Scope features are absent and verified
by `check-not-in-scope.sh`.

## Not In Scope (pre-implementation audit)

The following features were identified as prohibited BEFORE writing any code:
- Conformance mode (spec overlay comparison)
- Evaluation mode (architectural quality assessment)
- Simulation mode (hypothetical change impact)
- Data flow visualization
- Moldable views (LLM-powered question-driven views)
- Spec extraction
- First-person navigation

None of these appear in any production code, test, or wiring in this branch.

