### Requirement: Camera Controls — COVERED

The application MUST provide camera controls for navigating the scene.

**Implementation**: `camera_controller.gd` — spherical coordinate orbit camera.
`_theta=0.15` rad (≈8.6° from vertical, near top-down). WHEEL_UP/DOWN change `_distance`
(clamped to [min_distance, max_distance]). MIDDLE drag changes `_phi`/`_theta`; `_theta`
clamped to [0.01, PI-0.01] to prevent camera flip. RIGHT drag pans pivot.

**Scenario: Top-down overview**

| THEN-clause | Test | Status |
|---|---|---|
| camera defaults to top-down view showing entire system | `test_initial_theta_is_near_top_down` asserts _theta < PI/4 (initial value 0.15 << 0.785) | COVERED |

**Scenario: Zooming in**

| THEN-clause | Test | Status |
|---|---|---|
| camera moves closer | `test_scroll_up_decreases_distance` sends WHEEL_UP event, asserts _distance < initial_distance | COVERED |
| internal structure becomes visible as camera approaches | No direct behavioral test exists — rendering visibility is not evaluable in headless mode. Structural prerequisites are confirmed: modules are Godot children of context anchors (test_module_parented_inside_context) and zoom works (test_scroll_up_decreases_distance). No LOD or culling hides internal structure. | NOTE (headless limitation, not a missing implementation) |
| labels scale to remain readable | `test_labels_are_billboard_and_readable` asserts BILLBOARD_ENABLED, pixel_size > 0, no_depth_test == true | COVERED |

**Scenario: Orbiting**

| THEN-clause | Test | Status |
|---|---|---|
| camera rotates around current focal point | `test_orbit_horizontal_drag_changes_phi` asserts _phi changes on horizontal drag; `test_orbit_vertical_drag_changes_theta` asserts _theta changes on vertical drag | COVERED |
| orientation remains intuitive (up stays up) | `test_orbit_theta_clamped_prevents_flip` drives 1,000,000-pixel vertical drag, asserts _theta <= PI-0.01 (clamping prevents camera inversion) | COVERED |

