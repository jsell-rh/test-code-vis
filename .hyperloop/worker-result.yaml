## Blocking Finding: _theta Clamp Has No Boundary Test

**Finding:** `check-clamp-boundary-tests.sh` (present on `main` as of commit `13a7ef3`, absent from this worktree) exits **non-zero**. Per guidelines, this is blocking.

`godot/scripts/camera_controller.gd` line 73 clamps `_theta`:
```gdscript
_theta = clamp(_theta - delta.y * orbit_speed, 0.01, PI - 0.01)
```

`test_camera_controls.gd` has `test_zoom_clamped_at_minimum` for `_distance` but **no test** that:
1. Applies a large extreme upward drag to push `_theta` below `0.01`, and asserts `_theta >= 0.01`; or
2. Applies a large extreme downward drag to push `_theta` above `PI - 0.01`, and asserts `_theta <= PI - 0.01`.

**Note:** This issue pre-exists on `main` and was not introduced by this branch (camera_controller.gd is unchanged in this PR). However, the guideline is unambiguous: "A FAIL from this check is blocking."

**Required fix** — add to `godot/tests/test_camera_controls.gd`:

```gdscript
## _theta is clamped to [0.01, PI - 0.01] to prevent camera flip.
## Drive input past the upper and lower limits and assert the clamped result.
func test_orbit_theta_clamped_at_lower_bound() -> bool:
    var cam = CameraScript.new()
    cam._theta = 0.02  # just above lower limit
    var press := InputEventMouseButton.new()
    press.button_index = MOUSE_BUTTON_MIDDLE
    press.pressed = true
    press.position = Vector2(100.0, 100.0)
    cam._handle_button(press)
    # Large upward drag (negative delta.y) tries to push _theta below 0.01.
    var motion := InputEventMouseMotion.new()
    motion.position = Vector2(100.0, -10000.0)
    cam._handle_motion(motion)
    return cam._theta >= 0.01

func test_orbit_theta_clamped_at_upper_bound() -> bool:
    var cam = CameraScript.new()
    cam._theta = PI - 0.02  # just below upper limit
    var press := InputEventMouseButton.new()
    press.button_index = MOUSE_BUTTON_MIDDLE
    press.pressed = true
    press.position = Vector2(100.0, 100.0)
    cam._handle_button(press)
    # Large downward drag (positive delta.y) tries to push _theta above PI - 0.01.
    var motion := InputEventMouseMotion.new()
    motion.position = Vector2(100.0, 10100.0)
    cam._handle_motion(motion)
    return cam._theta <= PI - 0.01
```

