### Detail

**JSON Scene Graph Loading** — `_build()` iterates nodes and edges from the
parsed JSON. `_anchors` is populated for every node id, each anchor contains a
`MeshInstance3D`, edge pairs produce line + cone meshes, and local positions
match the JSON `position` fields. Tests: `test_volumes_created_for_each_node`,
`test_mesh_instances_exist_in_anchors`, `test_edge_mesh_instances_created`,
`test_anchor_positions_match_json`.

**Containment Rendering** — bounded_context nodes receive a translucent
(`TRANSPARENCY_ALPHA`, alpha=0.18, `CULL_DISABLED`) box; module nodes get an
opaque box; child modules are parented to their context anchor. Tests confirm
transparency flag, alpha value, cull mode, nesting, and relative mesh sizes.

**Dependency Rendering** — `_create_edge()` draws an `ImmediateMesh` line
coloured by edge type (orange = cross-context, grey = internal) and adds a
`CylinderMesh` cone (`top_radius=0`, height=0.7) at the target end, oriented
along the edge direction. This satisfies "the line's direction is visually
indicated." Tests verify line mesh existence, cone colour, cone type, and cone
proximity to target.

**Size Encoding** — `sz = float(nd["size"])` is applied directly to
`BoxMesh.size`, making dimensions linearly proportional to the metric. Tests
confirm larger size → larger mesh and exact 3:1 ratio for 9.0 vs 3.0 inputs.

**Camera Controls** — `camera_controller.gd` initialises `_theta=0.15` (≈8.6°
from vertical, satisfying "top-down"), supports wheel-up/down zoom with
min-distance clamping, and middle-mouse orbit that updates `_phi` and `_theta`.
`set_pivot()` accepts a new centre and distance. Tests exercise all these paths
by synthesising `InputEventMouseButton` and `InputEventMouseMotion` objects and
asserting on internal state variables (`_theta`, `_phi`, `_distance`, `_pivot`).
Camera tests emit harmless `look_at` / `get_global_transform` engine errors
because the node is not in a scene tree, but all 7 assertions pass because they
test state variables, not transform outputs — acceptable for headless prototype
testing.

**Godot 4** — `project.godot` declares `config/features=PackedStringArray("4.6")`;
all scripts are GDScript; headless compile confirms engine version.
