## Task-007: Godot Application — Spec Alignment Review

Independent review of `hyperloop/task-007` against `specs/prototype/godot-application.spec.md`.

### Spec Coverage

| Requirement               | Scenarios | Implementation                            | Tests                              | Status  |
|---------------------------|-----------|-------------------------------------------|------------------------------------|---------|
| JSON Scene Graph Loading  | 1         | `main.gd::_load_and_build()`, `_build()`  | `test_scene_graph_loading.gd` (4)  | COVERED |
| Containment Rendering     | 1         | `main.gd::_create_volume()` nesting       | `test_containment_rendering.gd` (5)| COVERED |
| Dependency Rendering      | 1         | `main.gd::_create_edge()` line + cone     | `test_dependency_rendering.gd` (4) | COVERED |
| Size Encoding             | 1         | `main.gd::_create_volume()` BoxMesh size  | `test_size_encoding.gd` (2)        | COVERED |
| Camera Controls           | 3         | `camera_controller.gd` full orbit/zoom    | `test_camera_controls.gd` (8)      | COVERED |
| Godot 4                   | 1         | `project.godot` features=["4.6"]          | compile + runtime GDScript tests   | COVERED |

### Detailed Findings

**JSON Scene Graph Loading (SHALL)**
- `_load_and_build()` reads the file via `FileAccess`, parses via `JSON.new()`, and calls `_build(graph)`.
- `_build()` iterates nodes and calls `_create_volume()` for each; iterates edges and calls `_create_edge()` for each.
- Positions are set directly: `anchor.position = Vector3(p["x"], p["y"], p["z"])`.
- Four tests cover: volumes created for each node, MeshInstance3D children exist, edge meshes created (≥2 per edge), and anchor positions match JSON data.

**Containment Rendering (MUST)**
- Parent anchors (`bounded_context` nodes) are added to `self`; child anchors are added to the parent's `Node3D` anchor — creating true scene-tree nesting.
- `bounded_context`: `BoxMesh.size = Vector3(sz, sz*0.2, sz)`, `albedo_color.a = 0.18`, `TRANSPARENCY_ALPHA`, `CULL_DISABLED`.
- `module`: `BoxMesh.size = Vector3(sz, sz*0.6, sz)`, `albedo_color.a = 1.0` (fully opaque).
- Five tests cover: translucency, opacity, parent-child scene-tree relationship, size ordering, and CULL_DISABLED.

**Dependency Rendering (MUST)**
- `_create_edge()` builds an `ImmediateMesh` line between world-space positions.
- A `CylinderMesh` with `top_radius=0.0` (cone/arrowhead) is placed at the target end, rotated via `Basis(Quaternion(Vector3.UP, dir))`, satisfying "line's direction is visually indicated".
- Cross-context edges use orange `Color(1.0, 0.50, 0.10)`; internal edges use grey.
- Four tests cover: line mesh exists, orange cone for cross-context, direction cone created, cone positioned near target.

**Size Encoding (MUST)**
- `sz = float(nd["size"])` is used directly as `BoxMesh.size` dimensions.
- Two tests confirm larger metric → larger mesh (size.x comparison) and proportional ratio (9.0/3.0 = 3.0, within 0.001 tolerance).

**Camera Controls (MUST)**
- Three scenarios, all covered:
  - *Top-down overview*: `_theta = 0.15` rad (~8.6°) → well below 45° = top-down. Test: `test_initial_theta_is_near_top_down()`.
  - *Zooming*: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `MOUSE_BUTTON_WHEEL_DOWN` increases it; clamped to `[min_distance, max_distance]`. Labels use `BILLBOARD_ENABLED` so they remain readable at any distance. Tests: scroll_up/down and clamp tests.
  - *Orbiting*: Middle-mouse press+drag changes `_phi` (azimuth) and `_theta` (polar); `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps the up-vector stable. Tests: horizontal and vertical drag tests.
- Eight tests cover all three scenarios plus pivot-update and zoom-clamp edge cases.

**Godot 4 (MUST)**
- `project.godot`: `config/features=PackedStringArray("4.6")` — Godot 4.6.
- Both scripts (`main.gd`, `camera_controller.gd`) are `.gd` GDScript files; `main.tscn` references them via `ext_resource type="Script"`.
- The test runner itself (`run_tests.gd`) is GDScript and drives 23 behavioral tests.
