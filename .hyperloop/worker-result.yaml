## Reflects-Test Algorithm-Quality Verification

`test_coupled_bcs_are_closer_than_uncoupled`:
- Fixture: 4 BCs; auth imports shared_kernel (coupled); billing has no import from auth (uncoupled).
- Assert: `dist("auth","shared_kernel") < dist("auth","billing")`.
- ✓ Algorithm-quality: varies coupling in fixture, asserts relative spatial output.

`test_complexity_and_coupling_both_reflected`:
- Fixture: big_ctx (100 LOC + import from ctx_c) vs small_ctx (1 LOC, no coupling).
- Assert: `bc_nodes["big_ctx"]["size"] > bc_nodes["small_ctx"]["size"]` (complexity reflected).
- Assert: `dist("big_ctx","ctx_c") < dist("big_ctx","ctx_d")` (coupling reflected).
- ✓ Algorithm-quality: varies BOTH LOC and coupling, asserts BOTH relative outputs.

