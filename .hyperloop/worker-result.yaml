### REQ: Abstract Visual Language — COVERED

Spec: "MUST use abstract volumes (boxes, spheres, or similar primitives). No
buildings, terrain, or thematic decoration. Size reflects complexity. Position
reflects coupling. Containment by nesting."

- **Code**:
  - `main.gd::_create_volume()` creates `BoxMesh` for every node. Contexts get
    a translucent slab (`alpha=0.18`, `TRANSPARENCY_ALPHA`, `CULL_DISABLED`).
    Modules get an opaque box. No metaphorical geometry anywhere.
  - Mesh dimensions: `box.size = Vector3(sz, sz*0.2, sz)` for contexts,
    `Vector3(sz, sz*0.6, sz)` for modules — size proportional to the `size`
    field from the extractor.
- **Tests**:
  - `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors` ✓
  - `test_size_encoding.gd::test_large_module_has_bigger_mesh` (size=9 wider
    than size=3) ✓
  - `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` (ratio 3:1) ✓
  - `test_containment_rendering.gd::test_bounded_context_is_translucent` ✓
  - `test_spatial_structure.gd::test_containment_expressed_as_scene_tree_parenting` ✓

