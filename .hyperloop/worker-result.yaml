### Requirement: Non-Inverted Movement

**THEN: scene moves in same direction as drag
  (i.e. dragging left reveals content to the right, as in Google Maps)**

The "(i.e.)" parenthetical is a definition, not an illustration.

#### Horizontal axis — pre-read derivation

Drag LEFT (delta.x = -50, position 100→50):
1. User grabs map and pulls left.
2. Map slides left under hand.
3. Content to the RIGHT becomes visible.
4. Pivot moves RIGHT (+X).
5. `_pivot -= right * (-50) * pan_amount` = `_pivot += right * 50 * pan_amount`
6. In headless identity basis (basis.x = (1,0,0)): **pivot.x INCREASES**.

Drag RIGHT (delta.x = +50, position 100→150):
1. Content to the LEFT becomes visible.
2. Pivot moves LEFT (-X).
3. `_pivot -= right * (+50) * pan_amount` → **pivot.x DECREASES**.

#### Vertical axis — pre-read derivation

Drag DOWN (delta.y = +50, position 100→150):
1. User grabs map and pulls down.
2. Map slides down; content ABOVE becomes visible.
3. Pivot moves in -forward direction.
4. In headless identity basis, forward ≈ basis.z = (0,0,1).
5. `_pivot -= forward * (+50) * pan_amount` → **pivot.z DECREASES**.

#### Test verification

| THEN-clause | Test | Derived predicate | Actual assertion | Match |
|---|---|---|---|---|
| Drag left reveals content to right | `test_pan_drag_left_increases_pivot_x` | pivot.x INCREASES | `cam._pivot.x > initial_x` | ✓ |
| Drag right reveals content to left | `test_pan_drag_right_decreases_pivot_x` | pivot.x DECREASES | `cam._pivot.x < initial_x` | ✓ |
| Drag down (general direction test) | `test_drag_direction_matches_view_movement` | pivot.z DECREASES | `cam._pivot.z < 0.0` | ✓ |

All three assertions are signed comparisons — confirmed by
check-nondirectional-movement-assertions.sh EXIT 0.

#### Inline derivation comment check (per Directional Behavior Review guidelines)

Line 134 (`_pivot -= right * delta.x * pan_amount`):
- Comment block lines 124-126: "Map-grab model (Google Maps): drag right → pivot
  moves LEFT (reveals content to the left). Negate delta so pivot moves opposite
  to drag direction." Explicit horizontal sign chain present. ✓

Line 135 (`_pivot -= forward * delta.y * pan_amount`):
- Immediately preceding line is line 134 (code), not a comment.
- The block comment at lines 124-126 documents "Negate delta so pivot moves
  opposite to drag direction" which implies drag-down → pivot.z decreases.
  However, no comment **immediately before line 135** shows the full vertical
  sign chain (e.g. "drag down → map-grab → pivot moves backward → negate delta.y").
- Per guidelines: "If the comment is absent, mark the scenario PARTIAL."

STATUS: **PARTIAL** — Implementation correct (signed `-=`); all tests use signed
predicates; check-nondirectional-movement-assertions.sh passes. Missing: dedicated
inline sign-chain comment immediately before camera_controller.gd:135 for the
vertical pan direction. This is a documentation gap, not an implementation or
test coverage gap, so it does NOT produce a FAIL verdict per Verdict Rules.

What is needed (non-blocking, for the implementer to prevent silent regression):
```gdscript
# drag down (delta.y > 0) → map-grab → pivot moves backward → negate delta.y
_pivot -= forward * delta.y * pan_amount
```

