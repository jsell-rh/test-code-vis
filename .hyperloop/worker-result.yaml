### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Initial `_theta = 0.15` rad (≈ 8.6° from zenith) → top-down default.
- Scroll wheel adjusts `_distance`; clamped to `[min_distance, max_distance]`.
- Middle-mouse drag updates `_phi` (azimuth) and `_theta` (elevation) →
  orbit around `_pivot`.
- `look_at(_pivot, Vector3.UP)` keeps world-up as the camera's up vector.
- `_frame_camera()` calls `camera.set_pivot(centre, span * 1.5)` after build.
- Labels use `BILLBOARD_ENABLED` + `no_depth_test = true` + `pixel_size = 0.012`
  (tested in `test_scene_graph_loading.gd`), ensuring readability at all zoom levels.

**Tests** (`godot/tests/test_camera_controls.gd`, `test_scene_graph_loading.gd`):

*Top-down overview scenario*:
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4`.
- `test_initial_distance_is_positive` — asserts `_distance > 0`.

*Zooming in scenario*:
- `test_scroll_up_decreases_distance` / `test_scroll_down_increases_distance` —
  asserts distance changes on wheel events.
- `test_zoom_clamped_at_minimum` — 200 scroll-ups cannot go below `min_distance`.
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`,
  `pixel_size > 0`, `no_depth_test == true`.

*Orbiting scenario*:
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse horizontal drag changes
  `_phi`.
- `test_orbit_vertical_drag_changes_theta` — middle-mouse vertical drag changes
  `_theta`.
- `test_set_pivot_updates_state` — `set_pivot()` updates `_pivot` and `_distance`.

All three scenarios and their THEN/AND clauses are covered.

