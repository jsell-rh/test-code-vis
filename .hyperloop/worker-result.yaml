## Task: task-011 — Spec Alignment Review
## Spec: specs/prototype/godot-application.spec.md

All six SHALL/MUST requirements are implemented in code and covered by
GDScript behavioral tests in `godot/tests/`. Tests instantiate real Godot
objects, call `build_from_graph()` with known fixture data, and assert
scene-tree node properties, mesh sizes, material flags, and camera state.
These are runtime behavioral tests — not compilation-only checks.

---

## Requirement Status

### REQ-1: JSON Scene Graph Loading — COVERED

**Code**: `main.gd._ready()` opens the JSON via `FileAccess.open()` +
`get_as_text()`, parses it with `JSON.new()`, calls
`SceneGraphLoader.load_from_dict()`, then `build_from_graph()`.

**Tests** (`test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` → `_anchors.has("ctx1") and _anchors.has("mod1")`
- `test_mesh_instances_exist_in_anchors` → each anchor has a `MeshInstance3D` child
- `test_edge_mesh_instances_created` → ≥ 2 `MeshInstance3D` on main node per edge (line + cone)
- `test_anchor_positions_match_json` → `anchor.position.is_equal_approx(Vector3(x,y,z))`
- `test_labels_are_billboard_and_readable` → `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test = true`

FileAccess API call path also exercised in `test_engine_version.gd::test_file_access_get_as_text_returns_non_empty_string`.

---

### REQ-2: Containment Rendering — COVERED

**Code**: `main.gd._create_volume()` — bounded contexts get `TRANSPARENCY_ALPHA`,
alpha 0.18, `CULL_DISABLED`; modules get fully opaque material (alpha 1.0).
Child nodes are parented to their parent's anchor (not scene root).

**Tests** (`test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` → `transparency != DISABLED` and `albedo_color.a < 1.0`
- `test_module_is_opaque` → `albedo_color.a >= 1.0`
- `test_module_parented_inside_context` → `mod_anchor.get_parent() == ctx_anchor`
- `test_bounded_context_larger_than_module` → `ctx_mesh.size.x > mod_mesh.size.x`
- `test_bounded_context_cull_disabled` → `cull_mode == CULL_DISABLED`

---

### REQ-3: Dependency Rendering — COVERED

**Code**: `main.gd._create_edge()` builds an `ImmediateMesh` line
(PRIMITIVE_LINES, two vertices) and a `CylinderMesh` arrowhead cone
(`top_radius = 0.0`) at the target end oriented along the edge direction.

**Tests** (`test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` → `ImmediateMesh` `MeshInstance3D` exists among main node's children
- `test_direction_indicator_cone_created` → `CylinderMesh` with `top_radius == 0.0` found
- `test_direction_cone_near_target` → cone position within 2 units of target (20, 0, 0)
- `test_cross_context_cone_is_orange` → `albedo_color.r > 0.8` and `.b < 0.3`

---

### REQ-4: Size Encoding — COVERED

**Code**: `main.gd._create_volume()` sets `box.size = Vector3(sz, sz*0.6, sz)` where
`sz = float(nd["size"])`, so mesh width is directly proportional to the size metric.

**Tests** (`test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` → `large_mesh.size.x > small_mesh.size.x` (sizes 9 vs 3)
- `test_mesh_sizes_proportional_to_metric` → ratio `9/3 = 3.0` matches within `0.001` tolerance

---

### REQ-5: Camera Controls — COVERED

**Code**: `camera_controller.gd` implements spherical-coordinate orbit
(`_theta`, `_phi`, `_distance`), zoom via scroll wheel, orbit via middle-mouse
drag, and `set_pivot()` for scene-framing. `_theta` is clamped to `[0.01, PI-0.01]`
preventing pole flip. `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps
orientation stable.

**Scenario: Top-down overview** (`test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` → `_theta < PI/4` (0.15 rad ≈ 8.6° from directly above)
- `test_initial_distance_is_positive` → `_distance > 0`

**Scenario: Zooming in**:
- `test_scroll_up_decreases_distance` → `_distance < initial_distance` after WHEEL_UP
- `test_scroll_down_increases_distance` → `_distance > initial_distance` after WHEEL_DOWN
- `test_zoom_clamped_at_minimum` → `_distance >= min_distance` after 200 scroll-ups
- Label readability covered by `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`

**Scenario: Orbiting**:
- `test_orbit_horizontal_drag_changes_phi` → `_phi != initial_phi` after horizontal middle-mouse drag
- `test_orbit_vertical_drag_changes_theta` → `_theta != initial_theta` after vertical drag
- `test_set_pivot_updates_state` → pivot and distance updated correctly by `set_pivot()`

---

### REQ-6: Godot 4.6 — COVERED

**Code**: `project.godot` declares `config/features=PackedStringArray("4.6")`.
All scripts are `.gd` (GDScript). `main.gd` uses `FileAccess.open()` +
`get_as_text()` (Godot 4.x API, not deprecated `read_as_text()`).

**Tests** (`test_engine_version.gd`):
- `test_project_godot_declares_46_feature` → `project.godot` contains `"4.6"`
- `test_project_godot_config_features_line` → `content.contains("config/features")` and `'"4.6"'`
- `test_project_does_not_declare_csharp` → no `"Mono"` or `"C#"` in project.godot
- `test_file_access_get_as_text_returns_non_empty_string` → `get_as_text()` returns content beginning with `"; Engine configuration"`

