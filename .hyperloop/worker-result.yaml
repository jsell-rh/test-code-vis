### Sign-chain independent derivations (from spec parenthetical)

**Spec (i.e.): "dragging left reveals content to the right"**
- drag left → delta.x = −50
- `_pivot -= right(1,0,0) * (−50) * pan_amount` → pivot.x **increases**
- Camera pivot moves right → camera looks right → content from right enters view ✓
- Expected predicate: `pivot.x > initial_x`
- `test_pan_drag_left_increases_pivot_x` asserts `cam._pivot.x > initial_x` — **MATCH** ✅

**Zoom-in (direction < 0):**
- step < 0 → `_target_distance` decreases → `zoom_fraction = 1 − (smaller/larger) > 0`
- `_pivot.lerp(cursor, positive)` → pivot shifts **toward** cursor ✓
- `test_zoom_toward_cursor_shifts_pivot_toward_cursor` asserts `pivot.x > 0.0` with cursor at (10,0,0) — **MATCH** ✅

**Zoom-out (direction > 0):**
- step > 0 → `_target_distance` increases → `zoom_fraction = 1 − (larger/smaller) < 0`
- `_pivot.lerp(cursor, negative)` → pivot shifts **away** from cursor ✓
- `test_zoom_out_from_cursor_shifts_pivot_away` asserts `pivot.x < 5.0` with pivot at (5,0,0) and cursor at (10,0,0) — **MATCH** ✅

