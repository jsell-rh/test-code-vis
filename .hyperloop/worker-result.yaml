| generates view focused on auth-related components | `build_prompt()` embeds node ids including auth_service | `test_build_prompt_contains_node_id_auth_service` (test_llm_view_generator.gd:123): `prompt.contains("auth_service")` |
| irrelevant components are hidden or de-emphasized (pipeline) | `parse_response()` passes through "hide" op | `test_parse_response_passes_through_hide_op` (line 211): `spec["operations"][0]["op"] == "hide"` |
| irrelevant components are hidden or de-emphasized (renderer) | `_apply_hide()` sets `anchor.visible = false` | `test_hide_op_sets_visible_false` (test_scene_interpreter.gd:73): `anchor.visible == false` on real Node3D |
| relevant components are arranged (pipeline) | `parse_response()` passes through "arrange" op | `test_parse_response_passes_through_arrange_op` (line 223): `spec["operations"][0]["op"] == "arrange"` |
| relevant components are arranged (renderer) | `_apply_arrange()` sets `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_all_three_axes` (test_scene_interpreter.gd:250): all 3 axes within 0.001 of fixture |

