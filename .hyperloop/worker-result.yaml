## Requirement Status

### Requirement: Target Codebase — COVERED

Code: `extractor/extractor.py` → `build_scene_graph()` discovers bounded contexts and
modules from any Python source tree; `__main__.py` accepts `src_path` as a positional
argument targeting kartograph. A committed `godot/data/scene_graph.json` was produced from
the real kartograph codebase (nodes: `graph`, `iam`, `infrastructure`, `management`, etc.).

Tests:
- `test_kartograph_integration.py::test_kartograph_integration_bounded_contexts` — calls
  `main()` against `~/code/kartograph/src/api`; asserts `iam`, `graph`, `shared_kernel`
  appear as bounded-context nodes. Skipped gracefully when codebase absent.
- `test_kartograph_integration.py::test_kartograph_extraction_produces_modules` — asserts
  ≥1 module node, confirming internal structure is reflected.

---

### Requirement: Two-Stage Pipeline — COVERED

Code: Python extractor (`extractor/`) produces JSON; Godot `main.gd._ready()` opens
the JSON file with `FileAccess.open()`, parses it with `JSON.new().parse()`, then calls
`build_from_graph()` — a complete pipeline, not a stub.

Tests:
- `test_cli.py::test_main_writes_json_output` — `main()` writes JSON with `nodes`,
  `edges`, `metadata` keys.
- `test_scene_graph_loading.gd::test_volumes_created_for_each_node` — `build_from_graph()`
  populates `_anchors` for every JSON node.
- `test_scene_graph_loading.gd::test_anchor_positions_match_json` — positions on
  Node3D anchors match JSON coordinates exactly.

---

### Requirement: Top-Down Architectural View — COVERED

Code: `camera_controller.gd` initialises `_theta = 0.15` (≈8.6° from vertical — substantially
top-down). `lod_manager.gd._apply_far()` shows only `bounded_context` nodes at far distance.
`extractor.py::compute_layout()` uses `_order_by_coupling()` to place tightly coupled BCs
adjacent in the ring (closer together). `main.gd._create_edge()` draws `ImmediateMesh` lines
between contexts.

Tests:
- `test_camera_controls.gd::test_initial_theta_is_near_top_down` — `_theta < PI/4`.
- `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled` — fixture
  with coupling edges; asserts `dist(auth, shared_kernel) < dist(auth, billing)`.
- `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection` — ImmediateMesh
  child exists after `build_from_graph()`.

---

### Requirement: Zoom to Detail — COVERED

Code: `lod_manager.gd` exposes `NEAR_THRESHOLD=20` / `FAR_THRESHOLD=80`. At MEDIUM distance,
module nodes become visible. At NEAR distance, all edges including internal are visible.
Module `size` is set proportionally to LOC via `size_from_loc()`.

Tests:
- `test_spatial_structure.gd::test_medium_distance_shows_modules` — LOD at midpoint;
  module anchor `visible == true`.
- `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail` —
  distance < `NEAR_THRESHOLD-5`; internal edge entry visible.
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` — size=3 vs size=9;
  mesh ratio == 3.0 ± 0.001.

---

### Requirement: Abstract Visual Language — COVERED

Code: `main.gd._create_volume()` creates `BoxMesh` for every node (bounded_context =
translucent slab; module = opaque box). `Label3D` with the node's name is attached to
each anchor. Size mapped from `nd["size"]` directly to `BoxMesh.size`. Module anchors
are added as children of their parent BC anchor (nesting).

Tests:
- `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors` — `MeshInstance3D`
  child (BoxMesh) found in every anchor.
- `test_size_encoding.gd::test_large_module_has_bigger_mesh` — larger size → bigger mesh.
- `test_extractor.py::TestLayout::test_complexity_and_coupling_both_reflected` — verifies
  both size (LOC) and position (coupling) simultaneously.
- `test_containment_rendering.gd::test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`.

---

### Requirement: Readable Labels — COVERED

Code: `main.gd._create_volume()` adds `Label3D` with `text = nd["name"]`,
`billboard = BaseMaterial3D.BILLBOARD_ENABLED`, `pixel_size = 0.012`,
`no_depth_test = true` — always faces camera, visible through geometry.

Tests:
- `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` — asserts
  `billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` on a
  real `Label3D` node instantiated from `MainScript`.

---

### Requirement: Dependency Visualization — COVERED

Code: `main.gd._create_edge()` creates:
1. `ImmediateMesh` (PRIMITIVE_LINES) between `from_pos` and `to_pos`.
2. `CylinderMesh` arrowhead (`top_radius=0.0`) oriented along edge direction and
   placed at the target end, indicating dependency flow direction.
Cross-context edges are orange; internal are grey.

Tests:
- `test_dependency_rendering.gd::test_edge_line_mesh_created` — ImmediateMesh found.
- `test_dependency_rendering.gd::test_direction_indicator_cone_created` — CylinderMesh
  with `top_radius == 0.0` found.
- `test_dependency_rendering.gd::test_direction_cone_near_target` — cone within 2 units
  of target position (20,0,0).
- `test_dependency_rendering.gd::test_cross_context_cone_is_orange` — cone material
  `R > 0.8`, `B < 0.3`.

---

### Requirement: Navigation — COVERED

Code: `camera_controller.gd` — LMB drag pans pivot; RMB drag orbits (_phi/_theta);
scroll wheel zooms `_target_distance` (smooth lerp in `_process()`). LOD system
transitions overview→detail as distance decreases.

Tests:
- `test_ux_polish.gd::test_lmb_pan_moves_pivot` — LMB + drag; pivot changes.
- `test_ux_polish.gd::test_pan_drag_right_increases_pivot_x` — non-inverted direction.
- `test_camera_controls.gd::test_scroll_up_decreases_distance` — WHEEL_UP → target_distance decreases.
- `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` — RMB drag → _phi changes.
- `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous` — smooth interpolation
  verified: distance unchanged immediately; partial lerp after 16ms frame.
- `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts` +
  `test_medium_distance_shows_modules` — LOD transitions between overview and detail.

---

### Requirement: Not In Scope — COVERED

Verified absent: conformance mode, evaluation mode, simulation mode, data flow
visualization, moldable views (no LLM/question-panel code), spec extraction,
first-person navigation (no WASD/fly-cam; camera is orbit-only).

`camera_controller.gd` note: comment on line 28 of `test_spatial_structure.gd`
explicitly acknowledges first-person navigation is NOT implemented.

