### Camera Controls

| THEN clause | Test function | File | Status |
|---|---|---|---|
| camera defaults to top-down view | `test_initial_theta_is_near_top_down`, `test_initial_camera_is_above_pivot` | test_camera_controls.gd | PASS |
| camera moves closer (zoom in) | `test_scroll_up_decreases_distance` | test_camera_controls.gd | PASS |
| internal structure becomes visible as camera approaches | `test_zoom_is_smooth_not_instantaneous` | test_camera_controls.gd | PASS |
| labels scale to remain readable | `test_labels_are_billboard_and_readable` | test_scene_graph_loading.gd | PASS |
| camera rotates around current focal point | `test_orbit_changes_theta_and_phi`, `test_orbit_horizontal_drag_changes_phi` | test_camera_controls.gd | PASS |
| orientation remains intuitive (up stays up) | `test_theta_clamped_at_minimum_to_prevent_flip`, `test_theta_clamped_at_maximum_to_prevent_flip` | test_camera_controls.gd | PASS |

Verified:
- `test_initial_theta_is_near_top_down`: asserts `cam._theta < PI/4.0` — correct for "near top-down"
- `test_labels_are_billboard_and_readable`: asserts `billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` — satisfies label readability guideline
- `test_theta_clamped_at_minimum_to_prevent_flip`: drives theta to extreme with drag delta.y=+10000, asserts `cam._theta >= 0.01` — correct boundary test
- `test_theta_clamped_at_maximum_to_prevent_flip`: drives theta with drag delta.y=-10000, asserts `cam._theta <= PI - 0.01` — correct boundary test
- Sign-chain in `test_orbit_horizontal_drag_changes_phi` body (lines 87-88): `# Sign derivation: drag right → delta.x = +50 → _phi -= 50 * orbit_speed`

Note: `test_zoom_toward_point_moves_pivot_toward_target` has its sign-chain arrow in the
`##` docstring above the function, not inside the body. check-direction-test-derivations.sh
was removed from main, so this is a process observation only (PO-4 above).

