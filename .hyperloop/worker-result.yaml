### F2 — TWO COUPLING-POSITION THEN-CLAUSES ABSENT FROM MAPPING (BLOCKING FAIL)

The spec contains two THEN-clauses about coupling-based positioning:
- Scenario "Viewing kartograph from above": "their relative positions reflect
  their coupling (tightly coupled contexts are closer together)"
- Scenario "Visual representation": "its position reflects its coupling
  relationships"

Neither appears in the worker's THEN→test Mapping section.

Actual coverage verified by verifier (algorithm-quality tests DO exist):
- test_coupled_bcs_are_closer_than_uncoupled (test_extractor.py:435):
  builds a 4-BC fixture where auth-shared_kernel are coupled and billing is
  not; asserts dist(auth,shared_kernel) < dist(auth,billing). VARIES coupling,
  CHECKS relative position. Algorithm-quality. PASS.
- test_order_by_coupling_places_coupled_adjacent (test_extractor.py:464):
  unit test for _order_by_coupling with a-b coupled fixture; asserts adjacent
  ordering. Algorithm-quality. PASS.

Per guidelines: "A correct production implementation without a corresponding
test assertion is PARTIAL — not COVERED." The mapping must include these entries.

Actionable fix: Add both THEN-clauses to the mapping citing
test_coupled_bcs_are_closer_than_uncoupled and
test_order_by_coupling_places_coupled_adjacent.

