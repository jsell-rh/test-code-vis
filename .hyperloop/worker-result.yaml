### REQ: Zoom to Detail — COVERED

Spec: "MUST allow the user to zoom into a bounded context to see its internal
structure … internal layers become visible … internal dependencies shown …
relative sizes of internal modules visible."

- **Code**: `lod_manager.gd` three-level LOD with `FAR_THRESHOLD=80`,
  `NEAR_THRESHOLD=20`. `_apply_medium()` makes modules visible; `_apply_near()`
  makes all edges visible.
- **Tests**:
  - `test_spatial_structure.gd::test_medium_distance_shows_modules` ✓
  - `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail` ✓
  - `test_spatial_structure.gd::test_lod_integration_far_hides_modules_in_built_scene` ✓
  - `test_size_encoding.gd::test_large_module_has_bigger_mesh` +
    `test_mesh_sizes_proportional_to_metric` — relative sizes of internal
    modules are encoded as BoxMesh dimensions ✓

