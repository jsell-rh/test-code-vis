## Root Cause of Loop-Back

The `check-not-in-scope.sh` was added to main after this branch was
created. It prohibits: moldable-view scripts (view_spec.gd,
view_spec_renderer.gd, question_panel.gd), their tests, and
spec-extraction code in the extractor. This branch inherited these
files from main at branch-creation time. When the orchestrator ran
the check, it failed.

