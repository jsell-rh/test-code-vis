### R3: Zoom Toward Mouse Cursor (MUST) — COVERED

**Code:** `godot/scripts/camera_controller.gd`
- Lines 120–128: `MOUSE_BUTTON_WHEEL_UP/DOWN` resolves world point via
  `_get_ground_point_under_cursor(_last_mouse)` then calls `_zoom_toward_point(world_pt, ±1)`.
- Lines 170–178 (`_zoom_toward_point`):
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
  Zoom-in: ratio < 1 → pivot shifts toward cursor. Zoom-out: ratio > 1 → pivot shifts away.
  Only `_target_*` fields mutated; `_process()` interpolates smoothly.

**Scenario: Zooming into a specific component**

| THEN clause | Test | File |
|---|---|---|
| View zooms toward point under cursor | `test_zoom_in_shifts_pivot_toward_cursor` | test_camera_controls.gd |
| Component under cursor stays under cursor | `test_zoom_in_cursor_point_invariant` | test_camera_controls.gd |

`test_zoom_in_shifts_pivot_toward_cursor`: cursor at (+10,0,0); zoom-in → asserts
`_target_pivot.x > 0`. `test_zoom_in_cursor_point_invariant`: cursor at (+20,0,0); asserts
`0 < _target_pivot.x < 20` (new pivot between old origin and cursor, cursor-stable invariant).

**Scenario: Zooming out**

| THEN clause | Test | File |
|---|---|---|
| View zooms out from point under cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | test_camera_controls.gd |

Cursor at (+10,0,0); zoom-out → asserts `_target_pivot.x < 0` (pivot pushed away from cursor).

