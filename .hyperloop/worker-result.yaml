### Requirement: Camera Controls — COVERED (one headless limitation noted)

**SHALL**: The application must provide camera controls for navigating the scene.

**Code**: `godot/scripts/camera_controller.gd` implements spherical-coordinate orbit camera:
- `_theta=0.15` initial (≈8.6° from top-down); `_distance=40.0`
- Scroll wheel → zoom; middle-mouse drag → orbit (_phi/_theta)
- `_theta` clamped to [0.01, PI-0.01] preventing pole flip
- `set_pivot()` accepts new focal point + distance for full-scene framing

**Tests** (in `godot/tests/test_camera_controls.gd`):

| THEN-clause | Test | Status |
|---|---|---|
| camera defaults to top-down view | `test_initial_theta_is_near_top_down` (_theta < PI/4; initial=0.15) | COVERED |
| camera moves closer on scroll | `test_scroll_up_decreases_distance` | COVERED |
| internal structure becomes visible as camera approaches | No direct headless test possible — rendering visibility requires a display. Structural prerequisite confirmed: modules are scene-tree children of context anchors with no LOD/culling (`test_module_parented_inside_context`), so no implementation hides them. | NOTE |
| labels scale to remain readable | `test_labels_are_billboard_and_readable` (BILLBOARD_ENABLED, pixel_size > 0, no_depth_test == true) | COVERED |
| camera rotates around current focal point | `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta` | COVERED |
| orientation remains intuitive (up stays up) | `test_orbit_theta_clamped_prevents_flip` (1,000,000-pixel drag; asserts _theta <= PI-0.01) | COVERED |

The single untested THEN-clause ("internal structure becomes visible as camera approaches")
is a physical headless-rendering limitation. The implementation is correct: child volumes are
always present in the scene tree and nothing hides them at any distance. This does NOT
constitute a FAIL.

