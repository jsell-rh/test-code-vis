### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()`: opens file via `FileAccess`, parses JSON with `JSON.new()`, calls
  `SceneGraphLoader.load_from_dict()` then `build_from_graph()`.
- `build_from_graph()`: iterates nodes → `_create_volume()`, edges → `_create_edge()`.
- `_resolve_world_pos()`: reads `position.{x,y,z}` directly from JSON for placement.

**Tests** (`test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node()`: asserts `_anchors.has("ctx1")` and
  `_anchors.has("mod1")` — volumes exist for every JSON node.
- `test_mesh_instances_exist_in_anchors()`: asserts MeshInstance3D child in each anchor.
- `test_edge_mesh_instances_created()`: asserts ≥2 MeshInstance3D children on main node
  (1 ImmediateMesh line + 1 CylinderMesh arrowhead per edge).
- `test_anchor_positions_match_json()`: asserts `anchor.position` equals fixture values
  exactly (`ctx1` at 0,0,0 and `mod1` at 2,0,2).

All four THEN/AND clauses of the scenario are exercised by real Node3D instantiation
with known fixture data and property assertions.

