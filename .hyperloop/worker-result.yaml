## Requirement-by-Requirement Findings

### Requirement: Pan with Left Mouse Button — COVERED

**Scenario: Panning the view**
- GIVEN the top-down camera view
- WHEN the user holds left mouse button and drags
- THEN the camera pans in the direction of the drag
- AND the movement direction matches the drag direction (not inverted)

Implementation (`camera_controller.gd`):
- Lines 101-104: `MOUSE_BUTTON_LEFT` sets `_panning = event.pressed`, records `_last_mouse`.
- Lines 141-160 (`_handle_motion`): When `_panning`, projects delta onto `transform.basis`:
  `_target_pivot -= right * delta.x * pan_amount` and
  `_target_pivot -= backward * delta.y * pan_amount`.
  Immediately applied: `_pivot = _target_pivot`.

Tests (`test_camera_controls.gd`):
- `test_lmb_drag_pans_camera()` (line 149): LMB press + motion event, asserts
  `cam._pivot != initial_pivot`. Covers THEN "camera pans in direction of drag."
- `test_pan_direction_not_inverted()` (line 172): At phi=PI/2 (camera on +Z side,
  basis.x = world +X), drags 50 px LEFT (delta.x = -50).
  Code: `_target_pivot -= (+X) * (-50) * k` → pivot.x += 50k > 0.
  Asserts `cam._pivot.x > 0.0`. Covers THEN "movement direction not inverted."

Status: **COVERED** — implementation and GDScript behavioral tests both present and passing.

