### Requirement: JSON Scene Graph Loading — COVERED

`_ready()` is NOT an empty stub. It opens the JSON file via `FileAccess`,
parses with `JSON.new()`, and calls `build_from_graph()` which iterates
nodes → `_create_volume()` and edges → `_create_edge()`. World positions
are read directly from JSON `position.{x,y,z}` — no Godot-side layout.

Tests (`test_scene_graph_loading.gd`, 5 tests): instantiate real `Node3D`,
assert `_anchors` has entries for every node id, assert `MeshInstance3D`
children exist, assert edge produces ≥ 2 `MeshInstance3D` children (line +
cone), assert `anchor.position.is_equal_approx(Vector3(x,y,z))` for each node.
Dict-key checks are NOT used — positions are asserted on the node's `.position`
property. ✅

---

### Requirement: Containment Rendering — COVERED

`_create_volume()` creates bounded-context nodes as translucent
(`TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`) and module
nodes as opaque (`albedo_color.a = 1.0`). Module anchor is `add_child`-ed to
the parent context anchor, placing it inside the parent in the scene tree.

Tests (`test_containment_rendering.gd`, 5 tests): assert translucency,
opacity, parent relationship via `mod_anchor.get_parent() == ctx_anchor`,
size comparison (`ctx_mesh.size.x > mod_mesh.size.x`), and
`cull_mode == CULL_DISABLED` on the boundary. All node property assertions
made on instantiated `Node3D` objects, not dictionary key checks. ✅

---

### Requirement: Dependency Rendering — COVERED

Direction indicator is an explicit geometric element: `CylinderMesh` with
`top_radius = 0.0` (pointed cone) placed at the target end of each edge.
A plain line alone is not used — the cone satisfies "direction is visually
indicated." Color difference (orange cross-context vs grey internal) is
additional, not the primary directional indicator.

Tests (`test_dependency_rendering.gd`, 4 tests): assert `ImmediateMesh`
line exists, assert `CylinderMesh` with `top_radius == 0.0` exists, assert
cone position within 2 units of target `Vector3(20,0,0)`, assert cross-context
cone `r > 0.8 and b < 0.3`. ✅

---

### Requirement: Size Encoding — COVERED

`sz = float(nd["size"])` drives `BoxMesh.size = Vector3(sz, sz*0.6, sz)`.
X/Z mesh dimensions are linearly proportional to the JSON `size` field.

Tests (`test_size_encoding.gd`, 2 tests): assert `large_mesh.size.x >
small_mesh.size.x` and verify exact proportionality (`abs(9.0/3.0 -
actual_ratio) < 0.001`). ✅

---

### Requirement: Camera Controls — COVERED

`camera_controller.gd`: top-down default (`_theta = 0.15` < `PI/4`), scroll
zoom (`WHEEL_UP`/`WHEEL_DOWN` modify `_distance`, clamped), middle-mouse orbit
(modifies `_phi` azimuth and `_theta` polar), `look_at(_pivot, Vector3.UP)`
keeps up-vector intuitive. `set_pivot()` allows programmatic reframing.

"Labels scale to remain readable" is covered by `test_labels_are_billboard_and_readable()`
in `test_scene_graph_loading.gd`: asserts `BILLBOARD_ENABLED`, `pixel_size > 0.0`,
and `no_depth_test == true` on the `Label3D` node instantiated in a real `Node3D` scene.

Tests (`test_camera_controls.gd`, 8 tests): top-down theta, positive distance,
scroll up/down, horizontal/vertical orbit drag, `set_pivot()` state, zoom clamp. ✅

