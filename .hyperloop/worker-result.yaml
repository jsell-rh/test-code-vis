### Requirement 5: Camera Controls — COVERED

**Implementation (camera_controller.gd)**
- Initial state: `_theta = 0.15` rad ≈ 8.6° from directly above — satisfies "top-down overview."
- Zoom: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `MOUSE_BUTTON_WHEEL_DOWN` increases it; clamped to `[min_distance, max_distance]`.
- Orbit: middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar altitude), both real-time.
- Up-vector: `look_at(_pivot, Vector3.UP)` and `_theta` clamped to `[0.01, PI-0.01]` prevents pole-flip.
- `set_pivot()` called from `main.gd _frame_camera()` after scene loads to frame the whole graph.

**Scenario: Top-down overview — COVERED**
- `_theta = 0.15 < PI/4` satisfies "camera defaults to a top-down view."

**Scenario: Zooming in — COVERED**
- WHEEL_UP decreases `_distance` → camera moves closer.
- Translucent parent containers naturally reveal nested children as camera approaches (3D engine behavior; no LOD code required).
- Labels use `BILLBOARD_ENABLED` + `no_depth_test = true` → remain readable at all distances.

**Scenario: Orbiting — COVERED**
- Middle-mouse drag changes `_phi` and `_theta`.
- `look_at(_pivot, Vector3.UP)` keeps orientation intuitive.

**Tests: `test_camera_controls.gd`**
- `test_initial_theta_is_near_top_down()` — `_theta < PI/4`.
- `test_initial_distance_is_positive()` — `_distance > 0`.
- `test_scroll_up_decreases_distance()` — sends `MOUSE_BUTTON_WHEEL_UP`, asserts distance decreased.
- `test_scroll_down_increases_distance()` — sends `MOUSE_BUTTON_WHEEL_DOWN`, asserts distance increased.
- `test_orbit_horizontal_drag_changes_phi()` — sends middle-mouse press + motion, asserts `_phi` changed.
- `test_orbit_vertical_drag_changes_theta()` — sends middle-mouse press + motion, asserts `_theta` changed.
- `test_set_pivot_updates_state()` — calls `set_pivot()`, asserts `_pivot` and `_distance` updated.
- `test_zoom_clamped_at_minimum()` — 200 WHEEL_UP events, asserts `_distance >= min_distance`.

