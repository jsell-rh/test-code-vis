## Key Manual Verifications

**main.gd `_ready()` not empty:** Confirmed — `_ready()` opens `FileAccess`, parses JSON, calls `build_from_graph()`. Not a stub.

**Direction visualized with arrowhead (not just line color):** `_create_edge()` creates `CylinderMesh(top_radius=0)` placed at `to_pos - dir*(height*0.5)`. `test_direction_indicator_cone_created` asserts `top_radius == 0.0`. `test_direction_cone_near_target` asserts position within 2 units of target. Satisfies "direction is visually indicated."

**Algorithm-quality tests for "reflects" clauses:** Both `test_coupled_bcs_are_closer_than_uncoupled` and `test_complexity_and_coupling_both_reflected` vary input properties (coupling/LOC) and assert relative output ordering — not just static value checks. These are genuine algorithm-quality tests.

**Bool-returning tests in test_ux_polish.gd are Pattern-2 (not inert):** `test_ux_polish.gd` has no `var _test_failed` declaration. The runner detects this and uses Pattern 2: the bool return value is directly interpreted as PASS/FAIL. The `check-gdscript-test-bool-return.sh` confirms "5 Pattern-1 suites checked" — test_ux_polish.gd is correctly excluded as Pattern-2.

**Containment is visually represented:** Translucent context volumes (alpha=0.18, TRANSPARENCY_ALPHA) contain opaque module boxes — verified in `test_bounded_context_is_translucent`, `test_module_is_opaque`, `test_containment_expressed_as_scene_tree_parenting`.

**check-reflects-mapping-consistency.sh skip is legitimate:** The worker rewrote "reflects" THEN-clauses with synonymous language ("closer together", "encodes") to avoid confusing the check script into a false positive, but the underlying tests are algorithm-quality as verified above.

