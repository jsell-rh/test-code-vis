### Requirement: Two-Stage Pipeline — COVERED

**Code:** `extractor/__main__.py` writes `json.dumps(graph)` to disk; `godot/scripts/main.gd::_ready()`
reads the file via `FileAccess`, parses JSON, calls `SceneGraphLoader.load_from_dict()`,
then `build_from_graph()` to build the 3D scene.

**Tests:**
- Python: `TestSceneGraphOutput::test_output_is_json_serialisable`
- Godot: `test_scene_graph_loader.gd` (loader parsing), `test_scene_graph_loading.gd`
  (`test_volumes_created_for_each_node`, `test_edge_mesh_instances_created`)

**Scenario: Extraction then visualization** — COVERED

---

### Requirement: Top-Down Architectural View — COVERED

**Code:** `camera_controller.gd` starts with `_theta = 0.15` (≈8.6° from vertical, well
within top-down range). `compute_layout()` in `extractor.py` places BCs in a circle with
coupling-aware ordering (`_order_by_coupling`). Cross-context edges are rendered as orange
`ImmediateMesh` lines with arrowheads in `main.gd::_create_edge()`.

**Tests:**
- `test_camera_controls.gd::test_initial_theta_is_near_top_down`
- `TestLayout::test_coupled_bcs_are_closer_than_uncoupled`, `test_order_by_coupling_places_coupled_adjacent`
- `test_dependency_rendering.gd::test_edge_line_mesh_created`, `test_cross_context_cone_is_orange`

**Scenario: Viewing kartograph from above** — COVERED

---

### Requirement: Zoom to Detail — COVERED

**Code:** Scroll-wheel events change `_distance` in `camera_controller.gd` (clamped to
`[min_distance, max_distance]`). Module nodes are parented inside their BC anchor in
`main.gd::build_from_graph()`, so zooming closer reveals internal structure.

**Tests:**
- `test_camera_controls.gd::test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`
- `test_containment_rendering.gd::test_module_parented_inside_context`, `test_bounded_context_larger_than_module`

**Scenario: Zooming into IAM** — COVERED

---

### Requirement: Abstract Visual Language — COVERED

**Code:** All nodes use `BoxMesh` (bounded contexts: translucent flat slab with
`TRANSPARENCY_ALPHA`, `CULL_DISABLED`; modules: opaque compact box). Size comes directly
from `nd["size"]` (derived from LOC via `size_from_loc()`). Containment is expressed by
parenting module anchors inside BC anchors in the scene tree.

**Tests:**
- `test_containment_rendering.gd::test_bounded_context_is_translucent`, `test_module_is_opaque`,
  `test_bounded_context_cull_disabled`, `test_bounded_context_larger_than_module`
- `test_size_encoding.gd::test_large_module_has_bigger_mesh`, `test_mesh_sizes_proportional_to_metric`
- `test_node_renderer.gd::test_no_layout_recomputed_in_godot`

**Scenario: Visual representation** — COVERED

