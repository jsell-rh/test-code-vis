Root cause (test_extractor.py:407-432): The test measures world-space distance
between child and parent and asserts it is less than bc_radius (the BC ring radius,
~7.5 for 3 BCs). But mod_radius = max(1.5, len(children) * 0.9) is unbounded — when
a parent has many children (e.g., graph context with 10+ modules), the child orbit
radius exceeds 7.5 and the test fails.

This is the same root cause as F_NEW (unbounded radius). Resolving F_NEW resolves F4.

