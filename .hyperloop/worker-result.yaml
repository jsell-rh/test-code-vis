## Requirement Findings

### REQ-1: Target Codebase — COVERED

Scenario: Loading kartograph
- THEN kartograph's structure is visualized in 3D space
  → `test_kartograph_integration.py::test_kartograph_integration_bounded_contexts`
    Runs `main()` against `~/code/kartograph/src/api`; asserts iam, graph,
    shared_kernel bounded context nodes in output JSON. @skipif when not present.
- AND the visualization reflects the actual structure of the codebase
  → `test_kartograph_integration.py::test_kartograph_extraction_produces_modules`
    Asserts at least one `type=="module"` node in the JSON output.

Code: `extractor/__main__.py` (CLI) + `extractor/extractor.py::build_scene_graph()`.

---

### REQ-2: Two-Stage Pipeline — COVERED

Scenario: Extraction then visualization
- THEN a JSON scene graph file is produced
  → `test_cli.py::test_main_writes_json_output`: CLI writes valid JSON (nodes/edges/metadata).
- AND the Godot application can load that file and render the scene
  → `test_scene_graph_loading.gd::test_volumes_created_for_each_node`:
    `build_from_graph()` with fixture creates Node3D anchors for each node id.
  → `test_scene_graph_loader.gd` suite (18 tests): SceneGraphLoader.load_from_dict()
    correctly parses all JSON fields (nodes, edges, metadata, metrics, position, size).

Code: extractor writes JSON; `godot/scripts/main.gd::_ready()` reads via FileAccess →
`SceneGraphLoader.load_from_dict()` → `build_from_graph()`.

---

### REQ-3: Top-Down Architectural View — COVERED

Scenario: Viewing kartograph from above
- THEN all bounded contexts are visible as distinct volumes
  → `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`:
    LOD FAR → bounded_context visible, module hidden.
  → `test_spatial_structure.gd::test_distinct_contexts_occupy_distinct_regions`:
    Two contexts at different JSON positions → different scene positions.
- AND their relative positions reflect coupling
  → `test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled`:
    dist(auth,shared_kernel) < dist(auth,billing) for coupled vs uncoupled fixture.
  → `test_extractor.py::test_complexity_and_coupling_both_reflected`:
    Varies both LOC and coupling; asserts BOTH size and position outputs together.
- AND dependencies between contexts are visible as connections
  → `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection`:
    ImmediateMesh child of main node exists per edge.

Code: `camera_controller.gd` (_theta=0.15, top-down start); `lod_manager.gd` FAR mode;
`extractor.py::_order_by_coupling()` + `compute_layout()`.
- `test_camera_controls.gd::test_initial_theta_is_near_top_down` confirms theta < PI/4.

---

### REQ-4: Zoom to Detail — COVERED

Scenario: Zooming into IAM
- THEN the internal layers become visible
  → `test_spatial_structure.gd::test_medium_distance_shows_modules`:
    Module anchors become visible at medium camera distance.
- AND internal dependencies are shown
  → `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail`:
    Internal edge entries visible at NEAR distance (<NEAR_THRESHOLD).
- AND the user can see relative sizes of internal modules
  → `test_size_encoding.gd::test_large_module_has_bigger_mesh`: size=9 > size=3.
  → `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`:
    BoxMesh.size.x ratio == input size ratio within float tolerance.

Code: `lod_manager.gd` MEDIUM/NEAR modes; `camera_controller.gd` scroll-wheel zoom;
`main.gd::_create_volume()` uses `sz = float(nd["size"])` → BoxMesh dimensions.

---

### REQ-5: Abstract Visual Language — COVERED

Scenario: Visual representation
- THEN it appears as a labeled geometric volume
  → `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors`:
    Each anchor has MeshInstance3D (BoxMesh). No terrain/buildings/metaphors.
  → `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`:
    Label3D with billboard enabled and positive pixel_size.
- AND its size reflects its relative complexity
  → `test_size_encoding.gd::test_large_module_has_bigger_mesh` (covered above).
- AND its position reflects its coupling relationships
  → `test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled` (covered above).
- AND containment is shown by nesting (smaller volumes inside larger ones)
  → `test_containment_rendering.gd::test_module_parented_inside_context`:
    `mod_anchor.get_parent() == ctx_anchor`.
  → `test_containment_rendering.gd::test_bounded_context_larger_than_module`:
    ctx BoxMesh.size.x > mod BoxMesh.size.x.

Code: `main.gd::_create_volume()` — BoxMesh only; `extractor.py::compute_layout()`.

---

### REQ-6: Readable Labels — COVERED

Scenario: Identifying a module
- THEN the module's name is visible as a text label
  → `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`:
    Label3D exists with `billboard == BILLBOARD_ENABLED`.
- AND the label remains readable at the current zoom level
  → Same test: `pixel_size > 0.0` and `no_depth_test == true` — labels render
    above geometry at all distances.

Code: `main.gd::_create_volume()` adds Label3D with text=nd["name"], billboard,
pixel_size=0.012, no_depth_test=true.

---

### REQ-7: Dependency Visualization — COVERED

Scenario: Cross-context dependency
- THEN a line or connection is drawn between them
  → `test_dependency_rendering.gd::test_edge_line_mesh_created`:
    ImmediateMesh MeshInstance3D child present after `_create_edge()`.
- AND the direction of the dependency is discernible
  → `test_dependency_rendering.gd::test_direction_indicator_cone_created`:
    CylinderMesh with top_radius=0 (arrowhead cone) exists.
  → `test_dependency_rendering.gd::test_direction_cone_near_target`:
    Cone within 2.0 units of target node world position.
  → `test_dependency_rendering.gd::test_cross_context_cone_is_orange`:
    Cross-context arrowhead is orange (R>0.8, B<0.3) for visual distinction.

Code: `main.gd::_create_edge()` — ImmediateMesh line + CylinderMesh(top_radius=0)
arrowhead positioned and oriented at target end along edge direction.

---

### REQ-8: Navigation — COVERED

Scenario: Moving through the space
- THEN they can pan, zoom, and rotate the view
  → Pan: `test_ux_polish.gd::test_lmb_pan_moves_pivot`,
         `test_pan_drag_right_increases_pivot_x`, `test_pan_drag_left_decreases_pivot_x`.
  → Zoom: `test_camera_controls.gd::test_scroll_up_decreases_distance`,
           `test_scroll_down_increases_distance`.
  → Rotate: `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi`,
             `test_orbit_vertical_drag_changes_theta`.
- AND they can smoothly transition between overview and detail levels
  → `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous`:
    After scroll, `_distance != _target_distance` (lerp in flight); after
    `_process(0.016)`, distance is between initial and target.
  → `test_spatial_structure.gd` LOD suite confirms FAR/MEDIUM/NEAR transitions
    via `lod_manager.gd::update_lod()`.

Code: `camera_controller.gd` (orbit _theta/_phi, LMB pan, scroll smooth zoom via lerp);
`lod_manager.gd` (progressive disclosure by distance).

