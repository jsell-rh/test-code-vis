### Requirement: Containment Rendering ‚Äî COVERED

**Spec**: The application MUST render containment relationships as nested volumes.

**Implementation** (`godot/scripts/main.gd ‚Üí _create_volume()`):
- Bounded contexts: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `cull_mode = CULL_DISABLED`
- Modules: opaque boxes (`albedo_color.a = 1.0`, no transparency flag)
- Child nodes are parented to their parent's anchor via `parent_anchor.add_child(anchor)`, placing them visually inside the parent volume

**Tests** (`test_containment_rendering.gd`):
- `test_bounded_context_is_translucent`: asserts `transparency != TRANSPARENCY_DISABLED` and `albedo_color.a < 1.0` ‚úì
- `test_module_is_opaque`: asserts `albedo_color.a >= 1.0` on module material ‚úì
- `test_module_parented_inside_context`: asserts `mod_anchor.get_parent() == ctx_anchor` ‚úì
- `test_bounded_context_larger_than_module`: asserts `ctx_mesh.size.x > mod_mesh.size.x` ‚úì
- `test_bounded_context_cull_disabled`: asserts `mat.cull_mode == CULL_DISABLED` ‚úì

