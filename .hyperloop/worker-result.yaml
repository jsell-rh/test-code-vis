### Requirement 4: Size Encoding — COVERED

**Implementation (main.gd `_create_volume()`)**
- `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)` (modules).
- Size value maps directly from the `"size"` field in JSON, which the Python extractor derives from LOC metrics.

**Scenario: Large module vs small module — all THEN clauses covered**
- THEN module with more code appears as a larger volume: larger `size` → larger `BoxMesh.size.x`.
- AND relative sizes are proportional to the metric: `BoxMesh.size.x` ratio equals `size` field ratio exactly.

**Tests: `test_size_encoding.gd`**
- `test_large_module_has_bigger_mesh()` — asserts `large_mesh.size.x > small_mesh.size.x` (size 9 > size 3).
- `test_mesh_sizes_proportional_to_metric()` — asserts ratio `9.0/3.0 = 3.0` within 0.001 tolerance.

