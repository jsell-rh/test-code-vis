### Requirement: Orbit Around Mouse Point — COVERED

**Code:** `begin_orbit_at_world_point(world_pt)` lines 73–85:
Sets `_pivot = world_pt`, recomputes spherical angles from camera's current position so the
camera does not jump — only the orbit centre changes. Called from `_handle_button` on
`MOUSE_BUTTON_RIGHT` press (lines 111–116). Subsequent `_handle_motion` with `_orbiting = true`
changes `_phi`/`_theta` without moving `_pivot`.

**Scenario: Orbiting around a component** — COVERED
- GIVEN cursor over specific component: `world_pt = Vector3(5, 0, 3)` ✓
- WHEN user holds RMB and drags: `MOUSE_BUTTON_RIGHT` → `begin_orbit_at_world_point` → orbit motion ✓
- THEN camera orbits around cursor point: `cam._pivot == world_pt` after `begin_orbit_at_world_point` ✓
- AND component remains at visual center: `_pivot` unchanged during orbit (only `_phi`/`_theta` move) ✓

Tests: `test_orbit_uses_right_mouse_button`, `test_orbit_around_cursor_point`,
`test_orbit_pivot_is_world_point`

