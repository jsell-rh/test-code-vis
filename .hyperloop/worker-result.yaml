## Requirement: Dependency Rendering — COVERED

**Implementation:** `godot/scripts/main.gd::_create_edge()`
- Builds an `ImmediateMesh` with `PRIMITIVE_LINES` between `from_pos` and `to_pos`.
- Adds a `CylinderMesh` with `top_radius=0` (cone) positioned at the target end,
  oriented along the edge direction via `Basis(Quaternion(Vector3.UP, dir))`.
- Cross-context edges use orange `Color(1.0, 0.50, 0.10)`; internal use grey.

**Scenario: Rendering a cross-context dependency — tests in `test_dependency_rendering.gd`:**
- `test_edge_line_mesh_created()` — THEN an ImmediateMesh MeshInstance3D exists.
- `test_direction_indicator_cone_created()` — THEN a CylinderMesh with top_radius==0
  exists (arrowhead cone).
- `test_direction_cone_near_target()` — THEN cone position is within 2 units of
  target_pos, confirming it marks the arrival point.
- `test_cross_context_cone_is_orange()` — THEN cone material albedo has r > 0.8,
  b < 0.3 (orange).

