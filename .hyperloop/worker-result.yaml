## Implementation Review

**flow_overlay.gd** — complete, non-stub implementation:
- `setup()`, `show_path()`, `clear_path()`, `show_aggregate()`, `is_path_active()` all fully implemented.
- On-demand constraint: `_path_active = false` on construction; activation requires explicit `show_path()` or `show_aggregate()` call.
- De-emphasis uses `TRANSPARENCY_ALPHA` mode so reduced-alpha colors render correctly.
- Structural context preservation: off-path anchors remain in scene tree with `visible = true`; their material is dimmed (not removed).
