## THEN→Test Mapping (independently verified)

### R1: Godot 4.6 Engine (MUST) — COVERED

| THEN clause | Test function | File | Predicate verified |
|---|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | test_engine_version.gd | reads project.godot, asserts contains "4.6" |
| config/features declares "4.6" | `test_project_godot_config_features_line` | test_engine_version.gd | asserts `"4.6"` quoted string in config/features |
| No C# / Mono | `test_project_does_not_declare_csharp` | test_engine_version.gd | asserts `"Mono"` and `"C#"` absent |
| FileAccess.get_as_text() valid 4.6 API | `test_file_access_get_as_text_returns_non_empty_string` | test_engine_version.gd | calls get_as_text(), asserts non-empty |
| All scripts use GDScript (iteration) | `test_scripts_dir_contains_only_gdscript` | test_engine_version.gd | DirAccess iterates res://scripts/, asserts each file ends with .gd |

Note: `test_godot_version.gd` is a Pattern-2 (bool-return) suite with no `_test_failed`
property. The `run_tests.gd` runner correctly branches on this and reports PASS/FAIL from
the return value. `test_main_script_is_gdscript` checks a single file — supplemental only;
full coverage is provided by `test_scripts_dir_contains_only_gdscript` which iterates all
scripts. Predicate correctly matches the "all scripts" THEN-clause.

### R2: Python Extractor (MUST) — COVERED

