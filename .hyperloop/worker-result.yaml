   Fixture: 4 BCs with auth↔shared_kernel coupled, billing uncoupled.
   Assert: `dist(auth, shared_kernel) < dist(auth, billing)`.
   ALGORITHM-QUALITY: varies coupling in fixture, asserts relative distance. ✓

2. "size reflects its relative complexity" (REQ:Abstract-Visual-Language)
   → `test_mesh_sizes_proportional_to_metric` + `test_complexity_and_coupling_both_reflected`
   Fixture: 100-LOC vs 1-LOC; size values 9.0 vs 3.0 passed to BoxMesh.
   Assert: ratio of BoxMesh.size.x equals input size ratio (3:1, within 0.001).
   ALGORITHM-QUALITY: varies LOC/size input, asserts proportional output. ✓

3. "position reflects its coupling relationships" (REQ:Abstract-Visual-Language)
   → `test_complexity_and_coupling_both_reflected`
   Fixture: big_ctx imports ctx_c (coupled); ctx_d is uncoupled.
   Assert: `dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d)`.
   ALGORITHM-QUALITY: varies coupling in fixture, asserts relative distance. ✓

Both coupling clauses (1 and 3) use different tests, but BOTH are
algorithm-quality. The check-reflects-mapping-consistency.sh concern (one
rendering-fidelity, one algorithm-quality) does not apply here — both are
algorithm-quality. No FAIL.

### Direction Test Predicates — Independent Derivation

pan drag right:
  Spec: "the scene moves in the same direction as the drag."
  Derivation: drag right → delta.x = +50 → pivot shifts right (map-grab model)
  → pivot.x increases.
  Test assert: `cam._pivot.x > initial_x` after dragging from (100,100) to (150,100). ✓

pan drag left:
  Derivation: drag left → delta.x = -50 → pivot.x decreases.
  Test assert: `cam._pivot.x < initial_x`. ✓

orbit horizontal:
  Spec: "they can rotate the view" (no direction specified).
  Derivation: _phi must change after horizontal drag.
  Test assert: `cam._phi != initial_phi`. ✓

orbit vertical:
  Derivation: _theta must change after vertical drag.
  Test assert: `cam._theta != initial_theta`. ✓

zoom scroll-up:
  Spec: camera moves closer.
  Test assert: `cam._target_distance < initial_target`. ✓

zoom scroll-down:
  Test assert: `cam._target_distance > initial_target`. ✓

All direction predicates correct. No sign inversions.

