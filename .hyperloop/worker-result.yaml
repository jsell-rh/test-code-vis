### Requirement: Two-Stage Pipeline — COVERED

**Scenario: Extraction then visualization**
- GIVEN the kartograph codebase
- WHEN the user runs the extractor
- THEN a JSON scene graph file is produced
- AND the Godot application can load that file and render the scene

**Implementation:**
Stage 1 — Python extractor:
- `extractor/extractor.py` produces `SceneGraph` dict conforming to `extractor/schema.py`
- Edge fields use `"source"` and `"target"` (matching Godot's `_create_edge()`)
- `extractor/__main__.py` writes JSON to disk via `json.dump()`

Stage 2 — Godot loader:
- `godot/scripts/scene_graph_loader.gd`: `load_from_dict()` validates and
  normalizes `"source"`/`"target"` edge fields; returns `{"nodes": [...], "edges": [...]}`
- `godot/scripts/main.gd`: `build_from_graph()` consumes the dict, creates
  `Node3D` anchors + `BoxMesh` volumes + `ImmediateMesh` edge lines

**Tests:**
- `extractor/tests/test_cli.py::test_main_writes_json_output` — CLI produces
  valid JSON output file
- `godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node` —
  `build_from_graph()` with fixture JSON creates expected Node3D children
- `godot/tests/test_scene_graph_loading.gd::test_edge_mesh_instances_created` —
  edge dict produces ImmediateMesh line child

| THEN clause | Test | Status |
|---|---|---|
| JSON scene graph file produced | test_main_writes_json_output | COVERED |
| Godot loads file and renders scene | test_volumes_created_for_each_node, test_edge_mesh_instances_created | COVERED |
| No Python coupling (decoupled pipeline) | JSON is sole interface; scene_graph_loader has no Python imports | COVERED |

Status: **COVERED**

