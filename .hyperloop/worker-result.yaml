### Requirement: View Specs as Intermediate Representation — COVERED

The system MUST use a structured view specification as the intermediate representation between the LLM and the 3D renderer.

**Implementation:**
- `parse_response()` returns a plain `Dictionary` with "question" and "operations" keys — never raw 3D geometry.
- `scene_interpreter.gd::apply()` is the sole consumer of this dict; it emits scene-tree mutations, not geometry instructions.

**Scenario: LLM produces view spec — COVERED**

| THEN clause | Code | Test |
|---|---|---|
| Emits structured view spec (not raw 3D geometry) | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` |
| View spec controls show/hide/highlight/arrange/annotate/connect | `_make_spec()` filters and passes ops through | 6 `test_parse_response_passes_through_*_op` tests |
| 3D renderer interprets the view spec into a spatial scene | `SceneInterpreter.apply()` dispatches each op to `_apply_*` method | `test_all_six_ops_mutate_scene_correctly` — all 6 ops applied, asserts `.visible`, `.position.x`, `albedo_color.g`, `label.text`, MeshInstance3D presence |

