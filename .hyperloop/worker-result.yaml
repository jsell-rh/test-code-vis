### Summary of Changes in This Round

Round 4 addresses a new failure introduced by an updated `check-not-in-scope.sh`
on `main`. The script now includes keyword-based detection (sections 1c and 1d)
that catches moldable-views code regardless of file name. Prior rounds passed
because the check only matched specific historic filenames.

Actions taken:
- Deleted `godot/scripts/llm_view_generator.gd`
- Deleted `godot/scripts/scene_interpreter.gd`
- Deleted `godot/tests/test_llm_view_generator.gd`
- Deleted `godot/tests/test_scene_interpreter.gd`
- Deleted `godot/tests/test_moldable_views_pipeline.gd`
- Removed all moldable-views wiring from `godot/scripts/main.gd`:
  `LlmViewGenerator`/`SceneInterpreter` preloads, `_scene_interpreter` /
  `_question_input` / `_ask_button` variables, `_add_question_ui()`,
  `_on_ask_button_pressed()`, `_on_question_submitted()`, `_call_llm()`.
- Removed moldable-views test suite entries from `godot/tests/run_tests.gd`.

Checks that previously required the moldable-views code now SKIP cleanly
(`check-pipeline-wiring.sh`, `check-coordinator-calls-pipeline.sh`,
`check-end-to-end-integration-test.sh`) because no producer/consumer exists.

