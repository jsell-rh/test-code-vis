### Requirement 2: Non-Inverted Movement (MUST)

**Implementation:** `godot/scripts/camera_controller.gd` lines 141–160
- Code comment: "Non-inverted pan: drag direction matches scene movement direction"
- Formula: `_target_pivot -= right * delta.x * pan_amount`
- Google Maps convention comment explicitly documented in code

**Scenario: Drag direction matches view movement**
- GIVEN any camera position ✓
- WHEN user drags in any direction ✓
- THEN scene moves in same direction as drag ✓

**Sign derivation (independently verified):**
At phi=PI/2, theta=0.15, distance=40 → camera basis.x = world +X.
Drag LEFT → delta.x = −50 → `_target_pivot -= (+X)×(−50)×pan_amount` → pivot.x increases
→ camera moves +X → scene shifts left (−X direction) = drag direction ✓

**Tests:**
- `test_pan_direction_not_inverted` — at phi=PI/2, drag-left (delta.x<0) → asserts
  `cam._pivot.x > 0.0` (pivot moves in drag direction)

**Status: COVERED**

