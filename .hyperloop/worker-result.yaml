### Requirement 1: Understanding Without Writing Code — COVERED

**SHALL:** The system MUST provide humans with a concrete understanding of how a software
system is actually built, without requiring them to read or write any of its source code.

**Scenario: Architect evaluates unfamiliar system**

THEN the human can correctly answer architectural questions about the system:
- `test_bounded_contexts_are_structurally_identifiable` — verifies main.gd
  `build_from_graph()` places each top-level bounded-context node in `_anchors`
  (godot/tests/test_system_purpose.gd)
- `test_node_names_are_labelled_for_identification` — verifies each anchor has a
  Label3D whose `.text` matches the node name (godot/tests/test_system_purpose.gd)
- `test_label_billboard_enabled_for_readability` — verifies
  `BaseMaterial3D.BILLBOARD_ENABLED` so labels always face the camera
  (godot/tests/test_system_purpose.gd)
- `test_label_pixel_size_positive_for_readability` — verifies `pixel_size > 0.0`
  (godot/tests/test_system_purpose.gd)

AND the human can identify structural problems in the system:
- `test_dependencies_are_visible_as_connections` — verifies at least one
  `MeshInstance3D` with an `ImmediateMesh` is present for each edge
  (godot/tests/test_system_purpose.gd)
- `test_cross_context_and_internal_edges_are_distinguishable` — verifies two
  distinct colours in `_lod_edge_entries` (orange vs. grey)
  (godot/tests/test_system_purpose.gd)

AND the human can predict the impact of proposed changes:
- `test_dependency_direction_is_encoded_in_edges` — verifies `_path_edge_entries`
  contains the correct `billing→auth` directed entry
  (godot/tests/test_system_purpose.gd)
- `test_modules_are_contained_within_bounded_contexts` — verifies `auth.domain`
  is parented under `auth` in the scene tree (godot/tests/test_system_purpose.gd)

All eight GDScript behavioral tests exercise the scenario with a known fixture
(two bounded contexts, two modules, two edges) and assert runtime node/property
values. Implementation is in `godot/scripts/main.gd` → `build_from_graph()`,
`_create_volume()`, `_create_edge()`.

