### Predicate verification (direction-critical THEN-clauses)

**Guideline requirement: "derive expected predicate from parenthetical alone."**

Spec parenthetical (definition): "dragging left reveals content to the right, as in Google Maps"

Independent derivation (map-grab model, headless basis = identity):
- Drag LEFT → screen delta.x = −N → `_pivot -= basis.x * (−N) * pan_amount`
  → pivot.x += N * pan_amount → pivot moves RIGHT → camera looks left
  → scene shifts left on screen → content from the RIGHT enters view ✓
- Drag RIGHT → screen delta.x = +N → `_pivot -= basis.x * (+N) * pan_amount`
  → pivot.x -= N * pan_amount → pivot moves LEFT → camera looks right
  → scene shifts right on screen → content from the LEFT enters view ✓

**Test `test_pan_drag_left_increases_pivot_x`** (directly tests the parenthetical):
- Drags LEFT (100→50, delta.x = −50)
- Asserts `cam._pivot.x > initial_x` (increases) ✓ — matches derivation above

**Test `test_drag_direction_matches_view_movement`**:
- Drags RIGHT (100→150, delta.x = +50)
- Asserts `cam._pivot.x < initial_x` (decreases) ✓ — consistent with same model

**Test `test_pan_drag_right_decreases_pivot_x`**:
- Drags RIGHT (100→150, delta.x = +50)
- Asserts `cam._pivot.x < initial_x` (decreases) ✓

**Test `test_pan_drag_down_decreases_pivot_z`** (vertical panning):
- Drags DOWN (100→150 y, delta.y = +50)
- `_pivot -= forward(0,0,1) * +50 * pan_amount` → pivot.z -= N → decreases ✓

**Test `test_pan_drag_up_increases_pivot_z`**:
- Drags UP (100→50 y, delta.y = −50)
- `_pivot -= forward(0,0,1) * (−50) * pan_amount` → pivot.z += N → increases ✓

All directional assertions are CORRECTLY predicated for the map-grab model. No opposite-direction mappings detected.

