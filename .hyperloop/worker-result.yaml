## Requirement Coverage

### Requirement: Target Codebase — COVERED

**Implementation:**
- `extractor/extractor.py → build_scene_graph()` discovers bounded contexts and modules from any Python codebase via filesystem traversal.

**Tests:**
- `extractor/tests/test_kartograph_integration.py → test_kartograph_integration_bounded_contexts()` — runs extractor against real kartograph codebase; asserts bounded contexts `iam`, `graph`, `shared_kernel` are present.
- `extractor/tests/test_kartograph_integration.py → test_kartograph_extraction_produces_modules()` — asserts module-level nodes are produced (visualization reflects actual internal structure).

---

### Requirement: Two-Stage Pipeline — COVERED

**Implementation:**
- Python extractor (`extractor/__main__.py`) produces JSON scene graph to disk.
- Godot `godot/scripts/main.gd → _ready()` reads JSON via `FileAccess.open()`, parses via `JSON.new()`, calls `build_from_graph()`.

**Tests:**
- `extractor/tests/test_cli.py → test_main_writes_json_output()` — verifies JSON file produced with `nodes`, `edges`, `metadata` keys.
- `godot/tests/test_scene_graph_loading.gd → test_volumes_created_for_each_node()` — verifies Godot creates an anchor per JSON node.
- `godot/tests/test_scene_graph_loading.gd → test_edge_mesh_instances_created()` — verifies Godot creates mesh instances for edges.

---

### Requirement: Top-Down Architectural View — COVERED

**Implementation:**
- `godot/scripts/camera_controller.gd` initialises `_theta = 0.15` (≈ 8.6° from vertical — predominantly top-down).
- `extractor/extractor.py → _order_by_coupling()` re-orders bounded contexts so tightly-coupled pairs are adjacent in the ring, minimizing their spatial distance.
- `main.gd → _create_edge()` renders ImmediateMesh lines between context volumes.

**Tests:**
- `godot/tests/test_camera_controls.gd → test_initial_theta_is_near_top_down()` — asserts `_theta < PI/4`.
- `extractor/tests/test_extractor.py → test_coupled_bcs_are_closer_than_uncoupled()` — asserts coupled pair `auth↔shared_kernel` is closer than uncoupled pair `auth↔billing`.
- `godot/tests/test_dependency_rendering.gd → test_edge_line_mesh_created()` — asserts ImmediateMesh line exists between contexts.

---

### Requirement: Zoom to Detail — COVERED

**Implementation:**
- `godot/scripts/lod_manager.gd` implements three LOD levels:
  - Far (> FAR_THRESHOLD): only bounded_context volumes visible, all edges hidden.
  - Medium (NEAR < d < FAR): bounded_context + module volumes visible; cross-context edges visible, internal hidden.
  - Near (< NEAR_THRESHOLD): all nodes and all edges visible.
- Scroll wheel controls camera distance; LOD transitions happen as user zooms in.

**Tests:**
- `godot/tests/test_spatial_structure.gd → test_far_distance_shows_only_bounded_contexts()` — asserts modules hidden at far distance.
- `godot/tests/test_spatial_structure.gd → test_medium_distance_shows_modules()` — asserts modules visible when closer.
- `godot/tests/test_spatial_structure.gd → test_near_distance_shows_all_nodes()` — asserts all nodes visible at near distance.
- `godot/tests/test_spatial_structure.gd → test_near_distance_shows_internal_edges_as_fine_detail()` — asserts internal edges visible at near distance.
- `godot/tests/test_spatial_structure.gd → test_lod_integration_far_hides_modules_in_built_scene()` — end-to-end: builds graph, applies far LOD, asserts module hidden.

---

### Requirement: Abstract Visual Language — COVERED

**Implementation:**
- `main.gd → _create_volume()` uses `BoxMesh` for all structural elements (no terrain, buildings, or metaphorical decoration).
- `nd["size"]` (log-scaled LOC from extractor) drives `box.size` dimensions directly.
- Position comes from JSON layout (coupling-ordered).
- Containment: module anchors are children of context anchors in the scene tree.

**Tests:**
- `godot/tests/test_size_encoding.gd → test_large_module_has_bigger_mesh()` — asserts larger LOC → larger `BoxMesh.size.x`.
- `godot/tests/test_containment_rendering.gd → test_module_parented_inside_context()` — asserts scene-tree parent-child relationship.
- `godot/tests/test_containment_rendering.gd → test_bounded_context_larger_than_module()` — asserts context `BoxMesh.size.x > module BoxMesh.size.x`.
- `extractor/tests/test_extractor.py → test_coupled_bcs_are_closer_than_uncoupled()` — asserts position encodes coupling.

---

### Requirement: Readable Labels — COVERED

**Implementation:**
- `main.gd → _create_volume()` creates `Label3D` with:
  - `text = nd["name"]` (human-readable name)
  - `billboard = BaseMaterial3D.BILLBOARD_ENABLED` (always faces camera)
  - `pixel_size = 0.012` (positive, readable at zoom levels)
  - `no_depth_test = true` (visible through geometry)

**Tests:**
- `godot/tests/test_scene_graph_loading.gd → test_labels_are_billboard_and_readable()` — asserts `billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` on the context anchor's Label3D.

---

### Requirement: Dependency Visualization — COVERED

**Implementation:**
- `main.gd → _create_edge()` renders:
  - `ImmediateMesh` (PRIMITIVE_LINES) connecting source and target world positions.
  - `CylinderMesh` arrowhead (top_radius=0 = pointed tip) at the target end, oriented along edge direction.
- Cross-context edges use orange (`Color(1.0, 0.50, 0.10)`); internal edges use grey.

**Tests:**
- `godot/tests/test_dependency_rendering.gd → test_edge_line_mesh_created()` — asserts ImmediateMesh child exists.
- `godot/tests/test_dependency_rendering.gd → test_direction_indicator_cone_created()` — asserts CylinderMesh with `top_radius == 0.0` exists.
- `godot/tests/test_dependency_rendering.gd → test_direction_cone_near_target()` — asserts cone position is within 2 units of target end.
- `godot/tests/test_dependency_rendering.gd → test_cross_context_cone_is_orange()` — asserts cross-context arrowhead has orange color (R > 0.8, B < 0.3).

