## Requirement-by-Requirement Coverage

### Requirement: Question-Driven View Generation (SHALL)

The system MUST accept natural language questions and generate a spatial view
tailored to answering that specific question.

**Implementation:**
- `LLMViewGenerator.build_prompt()` (`godot/scripts/llm_view_generator.gd`) embeds the
  question and graph node IDs in the prompt, giving the LLM the context it needs.
- `LLMViewGenerator.parse_response()` returns a validated view-spec Dictionary.
- `SceneInterpreter.apply()` (`godot/scripts/scene_interpreter.gd`) mutates scene-tree
  Node3D properties in response to each operation in the spec.
- `main.gd::apply_view_spec()` wires Stage 1 → Stage 2 on the live scene.

**Scenario: Architectural question** — COVERED

| THEN-clause | Code | Test |
|---|---|---|
| generates a view focused on auth-related components | `_apply_show()`: `anchor.visible = true`; `_apply_highlight()`: `mat.albedo_color = Color(r,g,b)` | `test_show_op_sets_visible_true`, `test_highlight_op_changes_albedo_color` — assert `.visible == true`, `.albedo_color.r/g/b` on real Node3D |
| irrelevant components are hidden or de-emphasized | `_apply_hide()`: `anchor.visible = false` | `test_hide_op_sets_visible_false` — asserts `anchor.visible == false` |
| relevant components are arranged to answer the question | `_apply_arrange()`: `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`, `test_arrange_op_sets_all_three_axes` — assert `.position.x/y/z` |

**Scenario: Impact question** — COVERED

| THEN-clause | Code | Test |
|---|---|---|
| view showing the user database and all its dependents | `_apply_show()`: `anchor.visible = true` | `test_show_op_sets_visible_true` (fixture question: "what depends on the user database?") |
| dependency relationships are spatially clear | `_apply_connect()`: ImmediateMesh line + CylinderMesh (top_radius=0) arrowhead added to scene_root | `test_connect_op_adds_line_geometry` (≥1 MeshInstance3D); `test_connect_op_adds_arrowhead` (≥2 MeshInstance3D) |

