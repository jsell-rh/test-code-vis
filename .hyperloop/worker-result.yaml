## Untestable THEN-Clauses

**THEN "runs natively without browser, container, or VM dependencies"**
- Why untestable: No render pipeline in headless CI; "native" execution identity cannot be asserted from within the process.
- Architectural evidence: `project.godot` contains no HTML5/web export preset, no Dockerfile exists, no `config/features` entry for "Web".

**THEN "frame rate remains above 30fps"**
- Why untestable: FPS measurement requires a live render pipeline; headless Godot has no frame timing.
- Architectural evidence: LOD system (lod_manager.gd) is present and tested, reducing node count at distance; scene builds at 60-node kartograph scale without error.

**THEN "no perceptible stutter or pop-in"**
- Why untestable: "Perceptible" is a subjective real-time render quality metric.
- Architectural evidence: LOD hides modules and edges by distance threshold (tested in test_spatial_structure.gd), preventing pop-in of offscreen geometry.

