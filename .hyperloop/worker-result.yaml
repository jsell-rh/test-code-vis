## Findings

### F-1 (non-blocking): check-report-scope-section.sh failure is a tooling limitation

The check script's recovery logic runs:
  `git log --oneline -- .hyperloop/worker-result.yaml | head -1`
and gets commit `17779eb` ("orchestrator: clean worker verdict") — the commit
that *deleted* the file. `git show 17779eb:.hyperloop/worker-result.yaml`
returns empty content, causing the FAIL.

**Manual recovery:** `git show 214c9d3:.hyperloop/worker-result.yaml` yields
the second worker-result (the most recent one with actual content). That file
contains `## Scope Check Output` and `OK: No prohibited (not-in-scope) features
detected.` — the recovery check would pass if the script looked past the
deletion commit.

**Not an implementer defect.** The worker-result.yaml was deleted by the
orchestrator cleanup commit, not by the implementer. The content is valid.

### F-2 (non-blocking): THEN→test mapping in recovered 214c9d3 worker-result uses wrong names

The second worker-result (commit 214c9d3) lists test names for Scenarios 2 and 3
that do not match the actual test functions in the file:

| Reported name | Exists? |
|---|---|
| test_spec_nodes_have_type_spec | NO |
| test_code_nodes_are_non_spec_types | NO |
| test_spec_and_code_nodes_coexist_in_graph | NO |
| test_spec_nodes_visible_alongside_code_nodes | NO |
| test_architectural_soundness_navigable | NO |
| test_change_impact_explorable | YES |

The actual test names in the file (verified by grep) differ. However, the
*first* worker-result (commit ea387de) used the correct names. This discrepancy
is a documentation-only defect in the re-submitted report. The underlying tests
DO exist and DO pass (see below).

