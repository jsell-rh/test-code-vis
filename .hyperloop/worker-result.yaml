### F1 — BLOCKING: Pan direction INVERTED from Google Maps spec

**Affected file:** `godot/scripts/camera_controller.gd` — `_handle_motion()`

**Spec requirement** (Non-Inverted Movement scenario, "i.e." parenthetical = definition):
> "scene moves in same direction as drag (i.e. dragging left reveals content to the right, as in Google Maps)"

**Google Maps sign chain:**
- Drag left → user grabs scene and pulls left → scene slides LEFT on screen
- Camera moves RIGHT (opposite to scene slide direction)
- Pivot must move in +screen-right direction when dragging LEFT

**Implementation (`camera_controller.gd`, `_handle_motion`, pan block):**
```gdscript
_pivot += right * delta.x * pan_amount
_pivot += forward * delta.y * pan_amount
```
When drag left: `delta.x < 0` → pivot moves in **−screen-right direction** → standard camera pan.
Content from the LEFT is revealed. Opposite of Google Maps.

**Concrete headless check** (basis.x = identity = (1,0,0), drag left delta.x = −50, pan_amount = 0.12):
- `pivot.x += 1.0 × (−50) × 0.12 = −6.0` → DECREASES
- Google Maps requires: `pivot.x INCREASES by 6.0`
- Implementation is INVERTED.

**Fix:**
```gdscript
_pivot -= right * delta.x * pan_amount   # negate: Google Maps map-grab model
_pivot -= forward * delta.y * pan_amount  # same
```

---

### F2 — BLOCKING: Wrong predicate — `test_pan_drag_right_increases_pivot_x`

**File:** `godot/tests/test_ux_polish.gd`

Test asserts: `cam._pivot.x > initial_x` when dragging right (+50 px).

Derived from Google Maps spec: drag right → camera moves LEFT → pivot DECREASES in +X.
Expected predicate: `cam._pivot.x < initial_x`.

Test encodes OPPOSITE direction. A sign-flipped (incorrect) implementation passes this test; a
correct Google Maps implementation would FAIL it.

**Fix:** Change assertion to `cam._pivot.x < initial_x`.

