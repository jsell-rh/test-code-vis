### Requirement: Camera Controls ‚Äî COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- **Top-down default**: `_theta = 0.15` rad (‚âà8.6¬∞ from directly above, well under 45¬∞ = PI/4). `_frame_camera()` in `main.gd` calls `set_pivot(centre, distance)` to frame the scene.
- **Zoom**: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`, `WHEEL_DOWN` increases it; clamped to `[min_distance, max_distance]`.
- **Orbit**: `MOUSE_BUTTON_MIDDLE` drag adjusts `_phi` (azimuth) and `_theta` (polar, clamped to `[0.01, PI-0.01]`).
- **Up-stability**: `_update_transform()` calls `look_at(_pivot, Vector3.UP)` after every state change.

**Tests** (`godot/tests/test_camera_controls.gd` ‚Äî 8 tests):
- `test_initial_theta_is_near_top_down`: `cam._theta < PI/4`.
- `test_initial_distance_is_positive`: `cam._distance > 0`.
- `test_scroll_up_decreases_distance`: fires `MOUSE_BUTTON_WHEEL_UP`, asserts `_distance` decreased.
- `test_scroll_down_increases_distance`: fires `MOUSE_BUTTON_WHEEL_DOWN`, asserts `_distance` increased.
- `test_orbit_horizontal_drag_changes_phi`: middle-mouse press then 50px right drag, asserts `_phi` changed.
- `test_orbit_vertical_drag_changes_theta`: middle-mouse press then 20px up drag, asserts `_theta` changed.
- `test_set_pivot_updates_state`: `set_pivot(Vector3(5,0,5), 100.0)` ‚Üí `_pivot == (5,0,5)` and `_distance == 100`.
- `test_zoom_clamped_at_minimum`: 200√ó scroll-up, asserts `_distance >= cam.min_distance`.

