## THEN→Test Mapping

### Scenario: Engine version

| THEN clause | Test | Predicate match |
|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` (Pattern-1) | FileAccess reads project.godot; asserts `content.contains("4.6")` ✓ |
| config/features declares "4.6" | `test_project_godot_config_features_line` (Pattern-1) | Asserts `"config/features"` and `'"4.6"'` both present ✓ |
| All scripts use GDScript (iteration) | `test_scripts_dir_contains_only_gdscript` (Pattern-1) | DirAccess iterates `res://scripts/`; asserts every file ends `.gd` ✓ |
| No C# / Mono | `test_project_does_not_declare_csharp` (Pattern-1) | Asserts `"Mono"` and `"C#"` absent from project.godot ✓ |
| FileAccess.get_as_text() is Godot 4.6 API | `test_file_access_get_as_text_returns_non_empty_string` (Pattern-1) | Calls API and asserts non-empty return; confirms valid 4.6 API ✓ |
| API calls are valid Godot 4.6 (not deprecated) | `test_main_uses_godot4_fileaccess_api` (Pattern-2) | Reads main.gd; asserts `FileAccess.open(` + `get_as_text()`; asserts `File.new()` + `read_as_text()` absent ✓ |

**Note on Pattern-2 in test_godot_version.gd:** Functions return `bool` (true/false).
Verified in `run_tests.gd` lines 88–96: the runner detects absence of `var _test_failed`
and uses Pattern-2 (treats bool return as pass/fail signal). These tests are NOT inert.
`check-gdscript-test-bool-return.sh` correctly skips non-Pattern-1 files.

