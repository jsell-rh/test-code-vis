**Tests:**
- `godot/tests/test_scene_graph_loading.gd` — all tests use inline fixture dicts; never invoke the Python extractor. Verifies Godot app works without the extractor.
- `godot/tests/test_scene_graph_loader.gd` — `test_metadata_is_returned`, `test_nodes_list_is_returned`, `test_edges_list_is_returned` — verify JSON dict → parsed output contract.
- `test_empty_graph_is_handled_gracefully`, `test_missing_top_level_keys_default_to_empty` — confirm the JSON is self-contained and gracefully handles all valid inputs.

### Req 4: Desktop Platform — COVERED (with note)

**Implementation:**
- `godot/project.godot` declares only a desktop window configuration (`viewport_width=1920`, `viewport_height=1080`).
- No `Dockerfile`, no `docker-compose.yml`, no `.html` web export config, no `*.electron` config in repo.
- Godot 4.6.2 compiles and runs headlessly on Fedora (`godot-compile.sh` exit 0).

**Note:** "runs natively without browser, container, or VM" cannot be confirmed by automated test — it requires a physical GPU desktop. Architecturally, no browser/container dependency is present.

