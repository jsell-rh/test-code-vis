### Requirement: Size Encoding — COVERED

**Spec**: Application MUST encode complexity metrics as the visual size of volumes.

**Scenario**: Large module vs small module — proportional sizes.

**Implementation** (`godot/scripts/main.gd → _create_volume()`):
- `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)`.
- X/Z dimensions are linearly proportional to JSON `size` field. The Python extractor
  is responsible for mapping `metrics.loc` → `size`; Godot renders it directly.

**Tests** (`godot/tests/test_size_encoding.gd`, 2 behavioral tests):
- `test_large_module_has_bigger_mesh()`: `large_mesh.size.x > small_mesh.size.x` (9.0 vs 3.0).
- `test_mesh_sizes_proportional_to_metric()`:
  `abs(9.0/3.0 - actual_ratio) < 0.001` — exact proportionality verified.

