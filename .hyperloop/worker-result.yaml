### Requirement 4: Orbit Around Mouse Point — COVERED

**SHALL**: Orbit (RMB drag) MUST rotate around the point under the mouse cursor when orbit began.

**Code** (`camera_controller.gd`):
- `_handle_button()` MOUSE_BUTTON_RIGHT pressed: calls `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))` (lines 111–118) ✓
- `begin_orbit_at_world_point(world_pt)`: sets `_pivot = world_pt`, `_target_pivot = world_pt`, recomputes spherical coords from camera offset — camera does not jump (lines 73–85) ✓
- `_handle_motion()` when `_orbiting`: updates `_phi` and `_theta` while `_pivot` stays fixed → camera orbits around world_pt ✓

**Scenario: Orbiting around a component** — COVERED
- THEN camera orbits around cursor point at orbit start → `test_orbit_around_cursor_point`: calls `begin_orbit_at_world_point(world_pt)`, asserts `cam._pivot == world_pt` ✓
- AND component remains at visual centre → `test_orbit_pivot_is_world_point`: asserts `cam._pivot.is_equal_approx(world_pt)` — since camera always `look_at(_pivot)`, world_pt is always the visual centre ✓
- RMB binding verified → `test_orbit_uses_right_mouse_button`: RMB press + drag changes `_phi` ✓

