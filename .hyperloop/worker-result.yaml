## Untestable THEN-Clauses

### Clause 1 — Desktop Platform: native execution

**Verbatim THEN text:**
> it runs natively without browser, container, or VM dependencies

**Why untestable in this environment:**
This clause describes a deployment and OS-execution property. In the headless CI environment:
- `OS.get_name()` would return whatever OS the CI runner uses — not "Fedora 42" specifically.
- "No browser/container dependency" is a negative property of the runtime environment that
  is not observable at the GDScript level; there is no GDScript API that lists or detects
  active browser or container runtimes.
- GDScript unit tests run inside the same Godot process and cannot introspect the host OS
  container configuration.

**Architectural evidence of compliance:**
- `godot/project.godot` contains no HTML5/Web export preset or `[preset.0]` section
  referencing "HTML5" or "Web".
- `grep -r "html5\|HTML5\|web\|Web" godot/project.godot` returns no matches.
- No `Dockerfile`, `docker-compose.yml`, `.containerfile`, or container manifest exists
  anywhere in the repository (`find . -name "Dockerfile" -o -name "*.containerfile"`
  returns empty).
- The project uses only `MeshInstance3D`, `Label3D`, `Camera3D`, `Node3D` — standard
  desktop Godot nodes with no WebGL-specific workarounds.

