### Requirement: Dependency Rendering — COVERED

**Spec**: The application MUST render dependency edges as visible lines between
connected nodes.

**Scenario**: Rendering a cross-context dependency

**Implementation**: `godot/scripts/main.gd` → `_create_edge()`
- `ImmediateMesh` with `PRIMITIVE_LINES` connecting `from_pos` → `to_pos`.
- `CylinderMesh` arrowhead: `top_radius=0.0` (pointed tip), `bottom_radius=0.25`,
  `height=0.7`, oriented via `Basis(Quaternion(Vector3.UP, dir))`, placed at
  `to_pos - dir * (height*0.5)` so tip points at target — visually indicates direction.
- Cross-context: `Color(1.0, 0.50, 0.10)` (orange); internal: `Color(0.55, 0.55, 0.55)`.

**THEN clause verification:**
- "a line connects the two context volumes" → ImmediateMesh with PRIMITIVE_LINES (lines 191–196)
- "line's direction is visually indicated" → CylinderMesh cone (top_radius=0) at target end (lines 210–228)

