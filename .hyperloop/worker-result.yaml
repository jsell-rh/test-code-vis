## Fixes Applied

### 1. Not-In-Scope: Data-Flow Visualization (check-not-in-scope.sh)

The `flow_overlay.gd` and related files were introduced by a prior task-015 cycle
targeting `specs/visualization/data-flow.spec.md`. The current task targets
`specs/prototype/ux-polish.spec.md`, under which data-flow visualization is explicitly
prohibited by `prototype-scope.spec.md`. Removed all flow_overlay artifacts.

### 2. Coordinate Frame (check-relative-position-tests.sh)

`extractor/extractor.py` was storing child node positions as absolute world coordinates
(`parent_pos + local_offset`). Fixed to store LOCAL offsets only. Godot's `main.gd`
adds the parent world position at render time — the old code caused double-offsetting.

### 3. Y-Axis (check-circular-position-y-axis.sh)

`_circular_positions` was called with `y=1.0` for module-level positions, adding a
vertical component to every child position that inflated 3D distances and caused
`test_child_nodes_are_near_parent_position` to fail. Fixed to `y=0.0`.

### 4. Radius Bounds (check-layout-radius-bound.sh)

`bc_radius` and `mod_radius` were unbounded `max(lower, expr)` expressions. Wrapped
with `min()` caps:
- `bc_radius  = min(max(5.0, len(bc_nodes) * 2.5), 80.0)`
- `mod_radius = min(max(1.5, len(children) * 0.9), bc_radius * 0.4)`

### 5. Direct Relative-Offset Test (check-relative-position-tests.sh F3b)

Added `test_child_position_is_local_offset` to `test_extractor.py`: places a BC at
non-zero world position (x=5.0), asserts `child["position"]["x"] == pytest.approx(1.5)`
(local offset), and confirms it's NOT equal to `parent_x + offset` (absolute coord).

Also updated `test_child_nodes_are_near_parent_position` to correctly check the
magnitude of the stored LOCAL offset (not the distance from parent world position,
which is semantically wrong after the coordinate frame fix).

### 6. CLI Entry Point Test (check-extractor-cli-tested.sh)

Added `extractor/tests/test_cli.py::TestCliEntryPoint` with 4 tests: exit 0 on valid
src, output file created, output is valid JSON, non-zero on missing path.

### 7. Stdlib-Only Constraint Test (check-extractor-stdlib-only.sh)

Added `extractor/tests/test_cli.py::TestStdlibOnly::test_extractor_imports_are_stdlib_only`:
uses `sys.stdlib_module_names` to assert all imports in extractor/ resolve to stdlib
modules or the extractor package itself.

## UX Polish Spec Coverage

The `camera_controller.gd` implementation (from a prior task-015 pass that WAS
correctly targeting the UX Polish spec) covers all requirements:

| Requirement | Test(s) |
|---|---|
| Pan with Left Mouse Button | `test_lmb_pan_moves_pivot` |
| Non-Inverted Movement | `test_pan_drag_right_increases_pivot_x`, `test_pan_drag_left_decreases_pivot_x`, `test_drag_direction_matches_view_movement` |
| Zoom Toward Mouse Cursor | `test_zoom_toward_cursor_shifts_pivot_toward_cursor`, `test_component_stays_under_cursor_on_zoom_in`, `test_zoom_out_from_cursor_shifts_pivot_away`, `test_zoom_out_increases_target_distance` |
| Orbit Around Mouse Point | `test_orbit_pivot_set_to_cursor_point_at_start`, `test_orbit_pivot_is_used_during_orbit`, `test_component_remains_at_visual_center_during_orbit` |
| Smooth Camera Movement | `test_zoom_is_interpolated_not_instantaneous`, `test_pan_proportional_to_drag_speed` |

