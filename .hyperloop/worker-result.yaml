### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 42–47: `_process` uses exponential smoothing:
  `t = 1.0 - pow(0.05, delta * zoom_smooth)`;
  `_distance = lerpf(_distance, _target_distance, t)`;
  `_pivot = _pivot.lerp(_target_pivot, t)`.
- Scroll events only mutate `_target_distance`/`_target_pivot`; actual values converge each frame.
- Pan applies immediately and proportionally per drag delta (no interpolation lag by design).

**Scenario: Smooth zoom** — COVERED
- Test `test_smooth_zoom_target_differs_from_distance_after_scroll` (lines 304–315):
  After scroll up, `cam._target_distance < cam._distance` (zoom is not instantaneous). ✓
- Test `test_smooth_zoom_process_interpolates_distance` (lines 319–327):
  After `_process(0.1)` with target=20 and distance=40, `20 < _distance < 40`. ✓

**Scenario: Smooth pan** — COVERED
- Test `test_pan_proportional_to_drag_speed` (lines 332–354):
  10-pixel drag vs. 50-pixel drag → 50-pixel drag yields larger pivot displacement. ✓

