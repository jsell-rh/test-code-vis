### REQ-5: Camera Controls (SHALL)
**Status: COVERED**

Implementation (`camera_controller.gd`):
- Initial `_theta = 0.15` rad ‚Čą 8.6¬į from top-down (< PI/4 = 45¬į threshold).
- Scroll wheel: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; DOWN increases.
- Middle-mouse drag: changes `_phi` (azimuth) and `_theta` (polar angle).
- `_theta` clamped to `[0.01, PI-0.01]` so camera never flips past poles.
- Labels have `BILLBOARD_ENABLED` + `no_depth_test=true` for readability at all zoom levels.

Scenarios ‚ÄĒ all tested in `test_camera_controls.gd`:
- *Top-down overview*: `test_initial_theta_is_near_top_down()` (theta < PI/4).
- *Zooming in*: `test_scroll_up_decreases_distance()`, `test_scroll_down_increases_distance()`.
- *Labels readable*: `test_labels_are_billboard_and_readable()` (in `test_scene_graph_loading.gd`).
- *Orbiting / rotates around focal point*: `test_orbit_horizontal_drag_changes_phi()`,
  `test_orbit_vertical_drag_changes_theta()`.
- *Up stays up*: `test_theta_clamped_at_minimum()`, `test_theta_clamped_at_maximum()`.

