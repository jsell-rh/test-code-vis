#### Direction Derivation (i.e.-clause verification)

Spec: "dragging left reveals content to the right, as in Google Maps" (i.e. = definition).

Independent predicate derivation:
1. Drag left → delta.x = −50
2. "Reveals content to the right" → world content at +x enters the view
3. Camera pivot must move RIGHT (pivot.x increases) for right-side content to enter view
4. Implementation: `_pivot -= right(1,0,0) * (−50) * pan_amount` → pivot.x += positive → INCREASES ✓

Test `test_pan_drag_left_increases_pivot_x`: `return cam._pivot.x > initial_x` — matches derivation ✓
Test `test_drag_direction_matches_view_movement` (drag right): `return cam._pivot.x < initial_x` — correct opposite ✓

No opposite-direction mapping detected.

