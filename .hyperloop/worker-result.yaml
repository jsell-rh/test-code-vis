### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Top-down default: `_theta = 0.15` (≈ 8.6°, far less than 45° = PI/4); `look_at(_pivot, Vector3.UP)`.
- Zoom: `WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it. Clamped to `[min_distance, max_distance]`.
- Orbit: middle-mouse drag modifies `_phi` (azimuth) and `_theta` (polar); `_theta` clamped
  to `[0.01, PI - 0.01]` so up-orientation is maintained.
- `_frame_camera()` calls `set_pivot(centre, distance)` after load so whole graph is visible.

**Tests** (`godot/tests/test_camera_controls.gd`, 8 tests):
- `test_initial_theta_is_near_top_down()` — `_theta < PI/4`.
- `test_initial_distance_is_positive()` — `_distance > 0.0`.
- `test_scroll_up_decreases_distance()` — `WHEEL_UP` decreases `_distance`.
- `test_scroll_down_increases_distance()` — `WHEEL_DOWN` increases `_distance`.
- `test_orbit_horizontal_drag_changes_phi()` — horizontal motion changes `_phi`.
- `test_orbit_vertical_drag_changes_theta()` — vertical motion changes `_theta`.
- `test_set_pivot_updates_state()` — `set_pivot()` updates `_pivot` and `_distance`.
- `test_zoom_clamped_at_minimum()` — 200× scroll-up never goes below `min_distance`.

All three camera scenarios (top-down default, zoom in, orbiting) fully covered. ✅

