## Spec Alignment Review — specs/extraction/scene-graph-schema.spec.md

Branch: hyperloop/task-001

---

### Requirement: Schema Structure — COVERED

**Scenario: Top-level structure**

- Code: `extractor/schema.py::SceneGraph` is a TypedDict with exactly three keys —
  `nodes`, `edges`, `metadata`. The docstring explicitly states "The JSON file MUST
  contain exactly these three top-level fields."
- Code: `extractor/extractor.py::build_scene_graph()` returns a dict with exactly
  those three fields.
- Tests: `extractor/tests/test_schema.py::TestSchemaStructure` covers all THEN
  clauses, including `test_scene_graph_has_no_extra_top_level_fields` which asserts
  `set(graph.keys()) == {"nodes", "edges", "metadata"}`.
- Godot: `godot/tests/test_scene_graph_loader.gd` confirms the loader forwards
  exactly these three keys via `test_nodes_list_is_returned`,
  `test_edges_list_is_returned`, `test_metadata_is_returned`.

---

### Requirement: Node Schema — PARTIAL (one scenario)

**Scenario: Bounded context node — COVERED**

- Code: `schema.py::Node` declares all required fields (id, name, type, position,
  size, parent). `extractor.py::discover_bounded_contexts()` produces nodes with
  `type="bounded_context"`, `parent=None`, `size=size_from_loc(loc)` (complexity
  derived), and x/y/z position.
- Tests: `test_schema.py::TestNodeSchema` (8 tests: id, name, type,
  position/xyz, size numeric, parent null). `test_extractor.py::TestModuleDiscovery`
  also verifies type, parent=None, and that metrics/loc drives size.
- Godot: `test_scene_graph_loader.gd` verifies id, name, type, parent=null,
  position xyz, size, and metrics fields.

**Scenario: Module node inside a bounded context — PARTIAL**

- Code: `schema.py::Node` supports `type="module"` and a non-null `parent`.
  `extractor.py::discover_submodules()` produces dotted IDs (`"iam.domain"`),
  correct parent references, and `type="module"`. These structural fields are
  correct.
- **MISSING — relative positions**: The spec says "AND `position` coordinates
  relative to its parent." The schema docstring also says "Coordinates are relative
  to the parent node." However, `extractor.py::compute_layout()` stores **absolute**
  world-space coordinates for module nodes:

      px, py, pz = bc_pos_map.get(parent_id, (0.0, 0.0, 0.0))
      child["position"] = {"x": px + pos[0], "y": py + pos[1], "z": pz + pos[2]}

  Godot's `main.gd::_resolve_world_pos()` treats JSON position as **relative**
  (adds parent world position on top: `return _world_positions[parent_id] + local`),
  and `_create_volume()` sets `anchor.position` to the raw JSON value inside the
  parent's Godot scene-tree node (also relative). With absolute JSON positions the
  module would be double-offset and visually placed outside its parent's bounds.
- **MISSING — test**: No test in `test_extractor.py`, `test_schema.py`,
  `test_layout.py`, or the Godot suite verifies that module positions are
  stored as offsets relative to the parent rather than as absolute coordinates.
  `test_child_nodes_are_near_parent_position` checks absolute-to-absolute distance
  (which is always small because the extractor adds a small offset to the parent's
  absolute position) — it does not distinguish relative from absolute storage.

**What is needed to fix:**
1. `extractor.py::compute_layout()` must store only the local offset for module
   nodes: `child["position"] = {"x": pos[0], "y": pos[1], "z": pos[2]}` (no
   `px/py/pz` addition).
2. Add a Python test that verifies a module node's stored position is NOT the
   same as its absolute world position — e.g. assert that `child["position"]["x"]`
   does not equal `parent["position"]["x"] + child_local_x` but rather equals
   `child_local_x` alone.

