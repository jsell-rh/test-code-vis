## Requirement-by-Requirement Findings

### Requirement: Pan with Left Mouse Button — COVERED

**SHALL**: User MUST pan view by holding LMB and dragging.

Implementation (`camera_controller.gd`):
- Lines 101–104: `MOUSE_BUTTON_LEFT` sets `_panning = true`/`false`, records `_last_mouse`.
- Lines 141–160: `_handle_motion` on `_panning` computes `delta`, derives `right` and `backward`
  from `transform.basis`, applies `_target_pivot -= right * delta.x * pan_amount`.

**Scenario: Panning the view**
| THEN clause | Test | Verdict |
|---|---|---|
| Camera pans in direction of drag | `test_lmb_drag_pans_camera` — LMB press+drag → `cam._pivot != initial_pivot` | COVERED |
| Movement direction not inverted | `test_pan_direction_not_inverted` — drag 50px left at phi=PI/2 → `cam._pivot.x > 0.0` (pivot moves +X → scene shifts -X, same as drag direction) | COVERED |

