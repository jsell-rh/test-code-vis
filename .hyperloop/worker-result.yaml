### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 42–47 (`_process`): exponential smoothing — `t = 1 - 0.05^(delta * zoom_smooth)`;
  `_distance = lerpf(_distance, _target_distance, t)` and `_pivot = _pivot.lerp(_target_pivot, t)`.
  Produces smooth, frame-rate-independent interpolation with no snapping.
- Zoom sets `_target_distance` only; `_distance` converges across frames.
- Pan sets `_target_pivot` and `_pivot` together immediately (responsive, proportional to drag
  delta — no queued animation, but no jerk because each motion event fires proportionally).

**Scenario: Smooth zoom**
- GIVEN any camera position.
- WHEN user scrolls.
- THEN zoom is animated smoothly (interpolated), not instantaneous.

**Tests**:
- `test_smooth_zoom_target_differs_from_distance_after_scroll` (`test_camera_controls.gd:304`)
  — after scroll up, `_target_distance < _distance` (separation proves lazy interpolation). ✓
- `test_smooth_zoom_process_interpolates_distance` (`test_camera_controls.gd:319`) — sets
  `_distance=40`, `_target_distance=20`, calls `_process(0.1)`, asserts `20 < _distance < 40`
  (moved partway, not fully). ✓

**Scenario: Smooth pan**
- GIVEN any camera position.
- WHEN user drags to pan.
- THEN pan is smooth and proportional to drag speed.

**Test**: `test_pan_proportional_to_drag_speed` (`test_camera_controls.gd:332`)
- `cam_slow` dragged 10 px, `cam_fast` dragged 50 px (same direction).
- Asserts `cam_fast._pivot.length() > cam_slow._pivot.length()`. ✓

