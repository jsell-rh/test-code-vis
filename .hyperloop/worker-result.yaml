## Untestable THEN-Clauses

### THEN it runs natively without browser, container, or VM dependencies
- **Why untestable:** "Runs natively" is a deployment-environment assertion requiring a
  physical OS launch. Headless CI runs inside containers; there is no way to distinguish
  a native launch from a containerized one in automated tests.
- **Architectural evidence:** No HTML5 export presets in project.godot, no Dockerfile, no
  docker-compose.yml, no container manifests anywhere in the repo. All Godot APIs used
  (FileAccess, DirAccess, Node3D, Camera3D, MeshInstance3D, Label3D, ImmediateMesh) are
  standard desktop Godot 4.6 APIs. The project compiles and all GDScript tests pass with
  Godot 4.6.2.stable in headless mode on Linux (Fedora).

### THEN the frame rate remains above 30fps
- **Why untestable:** FPS measurement requires a GPU render pipeline. Godot headless mode
  disables the renderer; frame timing is not meaningful and cannot be measured.
- **Architectural evidence:** `godot/scripts/lod_manager.gd` implements level-of-detail
  visibility control keyed on camera distance. `main.gd` registers every node and edge
  with the LOD manager and calls `_update_lod()` each frame. The scene graph structure
  correctness at kartograph scale (60 nodes, 5 cross-context edges) is fully tested by
  `test_nfr_scale.gd`.

### AND there is no perceptible stutter or pop-in
- **Why untestable:** Stutter and pop-in are perceptual phenomena requiring a rendered
  frame sequence. No automated headless test can detect them.
- **Architectural evidence:** LOD system exists and is tested. Scene builds at kartograph
  scale (6 bounded contexts × 9 modules = 54 modules + 6 contexts = 60 anchors) without
  errors, confirmed by `test_kartograph_scale_anchor_count` and related tests.

