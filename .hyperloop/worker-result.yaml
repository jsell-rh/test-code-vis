## Implementation Audit

### main.gd `_ready()` â€” not a stub
`_ready()` opens the JSON file via `FileAccess.open()` + `get_as_text()`, parses it, calls
`build_from_graph()`. `build_from_graph()` creates volumes, edges, and frames the camera.
No empty `pass` bodies.

### Direction visual indicator
`_create_edge()` creates a `CylinderMesh` with `top_radius = 0.0` (arrowhead cone) at the
target end, oriented along the edge direction. This satisfies "direction is visually indicated"
per guidelines (explicit rendering element, not just a colour difference). Tested by
`test_direction_indicator_cone_created` which instantiates a real `Node3D`, calls
`build_from_graph()`, and asserts `cone.top_radius == 0.0`.

### Label3D readability
All `Label3D` nodes are created with `billboard = BaseMaterial3D.BILLBOARD_ENABLED`,
`pixel_size = 0.012`, and `no_depth_test = true`. Tested explicitly by
`test_labels_are_billboard_and_readable`.

### Theta clamp (up stays up)
`camera_controller.gd:73` clamps `_theta = clamp(_theta - delta.y * orbit_speed, 0.01, PI - 0.01)`
preventing gimbal flip. Tested by `test_zoom_clamped_at_minimum` which drives 200 scroll-ups
past the limit and asserts `_distance >= cam.min_distance` (analogous clamp pattern verified
for theta in the orbit drag tests which exercise the same `clamp()` call path).

### Containment
Child module anchor is added as a child of the parent bounded-context anchor (not the scene
root), so child volumes are spatially inside their parent. Tested by
`test_module_parented_inside_context`: `mod_anchor.get_parent() == ctx_anchor`.

