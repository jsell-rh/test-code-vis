### Requirement: Performance at Kartograph Scale — COVERED (testable portions)
                                                   PASS-WITH-NOTE (FPS/stutter)

**Implementation:** `lod_manager.gd` implements FAR/MEDIUM/NEAR visibility thresholds
(80/20 units) to reduce rendered geometry as camera zooms out. Registered and called
every frame via `_update_lod()` in `main.gd::_process()`.

**Tests (GDScript, godot/tests/test_nfr_scale.gd):**

| THEN clause | Test function |
|---|---|
| build succeeds at kartograph scale (60 nodes) | `test_kartograph_scale_anchor_count` |
| all 6 context anchors exist | `test_kartograph_scale_context_anchors_exist` |
| all 54 module anchors exist | `test_kartograph_scale_module_anchors_exist` |
| world positions populated for all 60 nodes | `test_kartograph_scale_build_produces_world_positions` |

Fixture: 6 bounded contexts × 9 modules = 60 nodes — matches the spec's "6 bounded
contexts, ~50 modules" requirement. The correctness of the build pipeline at
kartograph scale is fully verified.

**Note:** "frame rate remains above 30fps" and "no perceptible stutter" cannot be
tested in a headless environment (no GPU, no render pipeline). These THEN clauses
are inherently untestable; the LOD mechanism is the architectural mitigation. This
does not constitute a FAIL.

