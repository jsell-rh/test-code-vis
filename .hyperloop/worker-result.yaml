### Requirement: Godot 4.6 — COVERED

**Implementation:**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` — declares engine version.
- All three scripts (`main.gd`, `scene_graph_loader.gd`, `camera_controller.gd`) are `.gd` files.
- `main.gd` uses `FileAccess.open()` + `file.get_as_text()` — the Godot 4.x API (not the
  removed `read_as_text()`).
- Runtime: godot-compile.sh confirms `Godot Engine v4.6.2.stable.official`.

**Scenario: Engine version — all THEN clauses tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| uses Godot 4.6.x | `test_project_godot_declares_46` | `"4.6" in file.get_as_text()` |
| features line contains 4.6 | `test_features_line_contains_46` | `'PackedStringArray("4.6")' in text` |
| all scripts use GDScript | `test_scripts_dir_contains_only_gdscript` | DirAccess iterates res://scripts/, asserts every file ends in `.gd` |
| API calls valid for 4.6 | `test_fileaccess_open_returns_non_null` | `FileAccess.open()` returns non-null (no crash) |

All four tests pass.

