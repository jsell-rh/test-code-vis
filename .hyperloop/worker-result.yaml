### Requirement: Zoom Toward Mouse Cursor — COVERED

**Scenario: Zooming into a specific component**

Implementation:
- WHEEL_UP (line 120-123): `_zoom_toward_point(_get_ground_point_under_cursor(_last_mouse), -1)`.
- `_zoom_toward_point()` (lines 170-178): `zoom_ratio = new_dist / old_dist`.
  Zoom-in: ratio < 1. `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
  → pivot shifts toward cursor.

Tests:
- `test_zoom_in_shifts_pivot_toward_cursor()` (line 203): cursor=(10,0,0), asserts
  `_target_pivot.x > 0.0`. Covers THEN "view zooms toward cursor."
- `test_zoom_in_cursor_point_invariant()` (line 219): cursor=(20,0,0), asserts
  `0 < _target_pivot.x < 20`. Derivation: new_pivot.x = 20*(1-ratio), 0 < ratio < 1
  → 0 < new_pivot.x < 20. Covers THEN "component stays under cursor."

**Scenario: Zooming out**

Implementation: WHEEL_DOWN (lines 125-128): `_zoom_toward_point(world_pt, 1)`.
Zoom-out: ratio > 1 → pivot moves away from cursor.

Test:
- `test_zoom_out_shifts_pivot_away_from_cursor()` (line 234): cursor=(10,0,0), asserts
  `_target_pivot.x < 0.0`. Derivation: new_pivot.x = 10*(1-ratio), ratio > 1 → x < 0. ✓

Status: **COVERED**.

