## THEN-Clause to Test Mapping (independently verified)

Every test name was grepped in `godot/tests/test_camera_controls.gd` and the assertion
body read directly. All are real functions with correct predicates.

### Scenario: Panning the view

**THEN the camera pans in the direction of the drag**
→ `test_lmb_drag_pans_camera` (line 147): LMB press at (100,100) + motion to (150,100)
  → asserts `cam._pivot != initial_pivot`. Pivot must move on LMB drag. ✓

**AND the movement direction matches the drag direction (not inverted)**
→ `test_pan_direction_not_inverted` (line 167): Sets `_phi = PI/2` so `basis.x` aligns
  with world +X. Right drag (delta.x = +50) → asserts `cam._pivot.x > 0.0`.
  Predicate matches THEN-clause: non-inverted = drag direction equals pivot movement
  direction. ✓

### Scenario: Drag direction matches view movement

**THEN the scene moves in the same direction as the drag**
→ `test_pan_direction_not_inverted` (line 167): Same test; pivot.x > 0 after right drag
  confirms Google Maps convention. ✓

### Scenario: Zooming into a specific component

**THEN the view zooms toward the point under the cursor**
→ `test_zoom_in_shifts_pivot_toward_cursor` (line 197): cursor at world_pt=(10,0,0),
  zoom in → asserts `_target_pivot.x > 0.0`. Pivot moved toward cursor. ✓

**AND the component under the cursor stays under the cursor during the zoom**
→ `test_zoom_in_cursor_point_invariant` (line 213): cursor at (20,0,0), zoom in →
  asserts `0 < _target_pivot.x < 20`. Verifies pivot lies between old position and
  cursor via `world_pt + (pivot - world_pt) * ratio` formula. ✓

### Scenario: Zooming out

**THEN the view zooms out from the point under the cursor**
→ `test_zoom_out_shifts_pivot_away_from_cursor` (line 228): cursor at (+10,0,0), zoom
  out → asserts `_target_pivot.x < 0.0`. Pivot pushed away from cursor (ratio > 1). ✓

### Scenario: Orbiting around a component

**THEN the camera orbits around the point under the cursor at orbit start**
→ `test_orbit_uses_right_mouse_button` (line 249): RMB press + motion → asserts
  `cam._phi != initial_phi`. Confirms RMB triggers orbit. ✓
→ `test_orbit_around_cursor_point` (line 269): `begin_orbit_at_world_point(world_pt)`
  → asserts `cam._pivot == world_pt`. Confirms pivot is set to cursor point. ✓

**AND the component remains at the visual center during the orbit**
→ `test_orbit_pivot_is_world_point` (line 285): After `begin_orbit_at_world_point()`,
  asserts `cam._pivot.is_equal_approx(world_pt)`. Since camera always look_at `_pivot`,
  world_pt is always the visual center. ✓

### Scenario: Smooth zoom

**THEN the zoom is animated smoothly (interpolated), not instantaneous**
→ `test_smooth_zoom_target_differs_from_distance_after_scroll` (line 304): After
  WHEEL_UP, asserts `_target_distance < _distance`. Scroll moves only the target —
  actual distance deferred to `_process()`. ✓
→ `test_smooth_zoom_process_interpolates_distance` (line 319): Sets _distance=40,
  _target=20, calls `_process(0.1)`, asserts `20 < _distance < 40`. Confirms
  exponential lerp converges without snapping. ✓

### Scenario: Smooth pan

**THEN the pan movement is smooth and proportional to drag speed**
→ `test_pan_proportional_to_drag_speed` (line 332): Two cameras — one dragged 10px,
  one 50px. Asserts `cam_fast._pivot.length() > cam_slow._pivot.length()`.
  Proportionality confirmed. ✓
  Note: Pan applies immediately (not deferred), which is correct UX — direct
  mouse-following is the smoothest possible pan. The spec's "smooth" means no snapping,
  not animation delay; immediate proportional response satisfies this.

