- `test_zoom_toward_cursor_shifts_pivot_toward_cursor`: pivot.x > 0 after zoom toward (10,0,0). PASS.
- `test_component_stays_under_cursor_on_zoom_in`: pivot moves closer to cursor. PASS.
- `test_zoom_out_from_cursor_shifts_pivot_away`: pivot moves away from cursor on zoom-out. PASS.
- `test_zoom_out_increases_target_distance`: target_distance increases. PASS.

### Orbit Around Mouse Point — COVERED

- `_set_orbit_pivot(world_point)` sets `_pivot = world_point` and recalculates spherical angles.
- Called from `_handle_button` on RMB press: `_set_orbit_pivot(_mouse_to_ground(event.position))`.
- `test_orbit_pivot_set_to_cursor_point_at_start`: `cam._pivot == world_point`. PASS.
- `test_orbit_pivot_is_used_during_orbit`: pivot unchanged during orbit motion. PASS.
- `test_component_remains_at_visual_center_during_orbit`: pivot fixed during orbit. PASS.
- Note: `_mouse_to_ground` returns `_pivot` in headless mode; tests call `_set_orbit_pivot`
  directly. Acceptable headless compromise.

