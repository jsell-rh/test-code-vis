## Requirement 1: Pan with Left Mouse Button (SHALL)

**Status: COVERED**

Implementation (`godot/scripts/camera_controller.gd`):
- `_handle_button`: `MOUSE_BUTTON_LEFT` → `_panning = event.pressed`, records `_last_mouse`.
- `_handle_motion` (when `_panning`): `_target_pivot -= right * delta.x * pan_amount`
  and `_target_pivot -= backward * delta.y * pan_amount`.
  `_pivot = _target_pivot` applied immediately for responsive feel.

### Scenario: Panning the view
- THEN the camera pans in the direction of the drag
  → `test_lmb_drag_pans_camera` (line 149): LMB press + 50 px right → `cam._pivot != initial_pivot` ✓
- AND movement direction matches drag direction (not inverted)
  → `test_pan_direction_not_inverted` (line 172): see Requirement 2 below ✓

