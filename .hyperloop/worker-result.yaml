### Requirement 4: Orbit Around Mouse Point (MUST)

**Implementation:** `godot/scripts/camera_controller.gd` lines 111–118, 73–85
- `_handle_button` for `MOUSE_BUTTON_RIGHT` press: calls
  `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))`
- `begin_orbit_at_world_point(world_pt)`: sets `_pivot = world_pt` and
  `_target_pivot = world_pt`, recomputes spherical coordinates from new pivot
  so camera does not jump; only the orbit centre changes.
- Subsequent `_handle_motion` with `_orbiting=true` rotates `_phi` and `_theta`
  around the established `_pivot = world_pt`.

**Scenario: Orbiting around a component**
- GIVEN cursor over specific component ✓
- WHEN user holds RMB and drags ✓
- THEN camera orbits around cursor point at orbit start ✓ (`_pivot` set to `world_pt`)
- AND component remains at visual centre ✓ (camera always `look_at(_pivot)`)

**Tests:**
- `test_orbit_uses_right_mouse_button` — RMB press+drag changes `cam._phi`
  (orbit rotation occurring)
- `test_orbit_around_cursor_point` — after `begin_orbit_at_world_point(world_pt)`,
  asserts `cam._pivot == world_pt`
- `test_orbit_pivot_is_world_point` — asserts `cam._pivot.is_equal_approx(world_pt)`
  (camera looks_at world_pt → it is the visual centre)

**Status: COVERED**

