## THEN-Clause → Test Mapping (Reviewer-Derived)

The spec contains 10 THEN/AND clauses across 5 requirements. All are covered by the
implementation (the implementer addressed the full spec in camera_controller.gd since
all controls share the same spherical-coordinate state machine).

| # | THEN-clause (verbatim) | Test function | Assertion verified |
|---|---|---|---|
| 1 | the camera pans in the direction of the drag | `test_lmb_drag_pans_camera` | `cam._pivot != initial_pivot` after LMB drag ✓ |
| 2 | the movement direction matches the drag direction (not inverted) | `test_pan_direction_not_inverted` | drag left (delta.x=-50) → `cam._pivot.x > 0.0` ✓ |
| 3 | the scene moves in the same direction as the drag (Google Maps) | `test_pan_direction_not_inverted` | same predicate — pivot +X → camera +X → scene −X (left) ✓ |
| 4 | the view zooms toward the point under the cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `cam._target_pivot.x > 0.0` toward cursor at +X ✓ |
| 5 | the component under the cursor stays under the cursor during zoom | `test_zoom_in_cursor_point_invariant` | `0 < new_pivot.x < world_pt.x` (pivot between old and cursor) ✓ |
| 6 | the view zooms out from the point under the cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | zoom out → `cam._target_pivot.x < 0.0` (away from +X cursor) ✓ |
| 7 | the camera orbits around the point under the cursor at orbit start | `test_orbit_around_cursor_point` | `cam._pivot == world_pt` after `begin_orbit_at_world_point` ✓ |
| 8 | AND the component remains at the visual center during the orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` ✓ |
| 9 | the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll` + `test_smooth_zoom_process_interpolates_distance` | target≠distance after scroll; lerp moves distance toward target ✓ |
| 10 | the pan movement is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | larger drag → larger `cam._pivot.length()` ✓ |

All 10 THEN-clauses mapped; all test bodies read and assertions confirmed correct.

