#### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Initial state: `_theta = 0.15` (≈8.6° from straight above), `_distance = 40.0` — top-down default.
- `_frame_camera()` in `main.gd` calls `camera.set_pivot(centre, distance)` after building the scene, so the camera frames the entire graph.
- WHEEL_UP/DOWN → zoom (`_distance` decremented/incremented, clamped to `[min_distance, max_distance]`).
- MIDDLE drag → orbit (`_phi`, `_theta` updated); RIGHT drag → pan (`_pivot` moved in camera's local XZ plane).
- `look_at(_pivot, Vector3.UP)` called on every transform update — up-axis is always maintained.

**Tests** (`godot/tests/test_camera_controls.gd` — 8 tests):
- `test_initial_theta_is_near_top_down`: `_theta < PI/4`. Covers THEN "camera defaults to top-down view".
- `test_initial_distance_is_positive`: `_distance > 0`. Sanity check for valid initial state.
- `test_scroll_up_decreases_distance`: WHEEL_UP event decreases `_distance`. Covers THEN "camera moves closer".
- `test_scroll_down_increases_distance`: WHEEL_DOWN event increases `_distance`. Verifies bidirectional zoom.
- `test_orbit_horizontal_drag_changes_phi`: middle-drag right changes `_phi`. Covers THEN "camera rotates around focal point".
- `test_orbit_vertical_drag_changes_theta`: middle-drag up changes `_theta`. Covers THEN "camera rotates around focal point" (altitude).
- `test_set_pivot_updates_state`: `set_pivot()` updates `_pivot` and `_distance`. Covers framing after scene load.
- `test_zoom_clamped_at_minimum`: 200 scroll-up events never push `_distance` below `min_distance`. Verifies bounds.

Note: "AND internal structure becomes visible as the camera approaches" — all nodes are always rendered (no LOD or visibility gating); this is an emergent property of the 3D rendering as zoom reduces distance. No separate test is needed or applicable.

