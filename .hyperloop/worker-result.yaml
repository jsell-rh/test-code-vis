### Requirement: JSON Interface Contract — COVERED

**Implementation:**
- `godot/scripts/scene_graph_loader.gd` — `SceneGraphLoader.load_from_dict()` accepts a plain
  `Dictionary` parsed from JSON; zero reference to the Python extractor or source codebase.
- `godot/scripts/main.gd` — `_ready()` reads a JSON file via `FileAccess.open()`, parses
  it with `JSON.new()`, passes the resulting dict to `SceneGraphLoader.load_from_dict()`,
  then calls `build_from_graph()`. No extractor import or codebase access.

**Tests (all registered in `run_tests.gd`):**
- `test_scene_graph_loader.gd` — uses a hardcoded dict fixture; asserts all fields survive
  `load_from_dict()` without any extractor involvement.
- `test_scene_graph_loading.gd` — `test_anchor_positions_match_json()`: exercises
  `build_from_graph()` with a dict fixture; confirms positions in the scene tree exactly
  match the JSON coordinates (no layout recomputation in Godot).
- `test_node_renderer.gd` — `test_no_layout_recomputed_in_godot()`: instantiates `Main.new()`,
  calls `build_from_graph()` with fixture coords `(7.0, 3.0, -2.0)`, and asserts the scene-
  tree node position equals those exact values — confirming Godot is a pure consumer of the
  JSON, not a re-layouter.

The "Decoupled pipeline" scenario is fully covered.

