## Requirement: Containment Rendering тАФ COVERED

**Implementation** (`godot/scripts/main.gd тЖТ _create_volume()`):
- Bounded context: `BoxMesh(sz, sz*0.2, sz)`, `TRANSPARENCY_ALPHA`, alpha=0.18,
  `CULL_DISABLED`.
- Module: `BoxMesh(sz, sz*0.6, sz)`, alpha=1.0 (opaque).
- Child nodes are parented to their parent's `Node3D` anchor, placing them
  structurally and visually inside the parent volume.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` тАФ `transparency != DISABLED` and alpha < 1. тЬУ
- `test_module_is_opaque` тАФ module albedo alpha тЙе 1.0. тЬУ
- `test_module_parented_inside_context` тАФ `mod_anchor.get_parent() == ctx_anchor`. тЬУ
- `test_bounded_context_larger_than_module` тАФ `ctx_mesh.size.x > mod_mesh.size.x`. тЬУ
- `test_bounded_context_cull_disabled` тАФ `cull_mode == CULL_DISABLED`. тЬУ

