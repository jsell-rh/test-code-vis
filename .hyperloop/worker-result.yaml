### Requirement: Structure as Persistent Geography
**Status: COVERED**

The system MUST represent the static structure (modules, boundaries, dependencies) as the
persistent geography of the 3D space.

**Scenario: Structural elements have spatial presence**

**Implementation:**
- `main.gd → _create_volume()`:
  - Anchors are placed at `Vector3(p["x"], p["y"], p["z"])` from JSON — each element occupies
    a distinct region.
  - `bounded_context` nodes receive a translucent blue slab (alpha 0.18, TRANSPARENCY_ALPHA).
  - `module` nodes receive an opaque green box (alpha 1.0).
  - Visual contrast between translucent context and opaque module makes boundaries clear.
  - Child modules are added as children of their parent context anchor via
    `_create_volume(nd, parent_anchor)` — containment is expressed spatially.
- `main.gd → _create_edge()`:
  - Produces an ImmediateMesh line plus a CylinderMesh arrowhead for each edge — dependencies
    are expressed as visible 3D connections.

**Tests:**
- `test_distinct_contexts_occupy_distinct_regions` — two bounded contexts at different JSON
  positions → different `anchor.position` values after build.
- `test_context_boundary_is_visually_distinct_translucent` — context StandardMaterial3D has
  `albedo_color.a < 1.0` and `TRANSPARENCY_ALPHA` mode.
- `test_module_boundary_is_opaque` — module StandardMaterial3D has `albedo_color.a >= 1.0`.
- `test_containment_expressed_as_scene_tree_parenting` — module anchor's `get_parent()` equals
  the context anchor.
- `test_dependency_expressed_as_visible_connection` — at least one ImmediateMesh child of
  main node exists after build.

