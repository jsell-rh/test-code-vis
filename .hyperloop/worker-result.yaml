## Implementation Summary

Two new GDScript scripts implement the full LLMâ†’view-specâ†’3D pipeline:

**Stage 1 â€” `godot/scripts/llm_view_generator.gd`** (`class_name LlmViewGenerator`):
- `build_prompt(question, graph) â†’ String`: embeds the human question, all node
  ids/names/types, and the complete `VALID_OPS` list so the LLM understands the
  fixed primitive contract.
- `parse_response(response) â†’ Dictionary`: strips markdown fences, parses JSON,
  and filters operations to `VALID_OPS` â€” ensuring no new rendering logic is
  generated at runtime.
- `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`

**Stage 2 â€” `godot/scripts/scene_interpreter.gd`** (`class_name SceneInterpreter`):
- `apply_spec(spec, anchors, scene_root)`: consumes the view spec and mutates
  the live 3D scene by setting `node.visible`, `node.position`, material
  `albedo_color`, creating `Label3D` annotations (with `billboard` and
  `pixel_size` set), and drawing `ImmediateMesh` connection lines.

**Tests:**
- `godot/tests/test_llm_view_generator.gd`: 29 tests covering prompt content,
  all six primitives round-trip, unknown op rejection, fence stripping.
- `godot/tests/test_scene_interpreter.gd`: 22 tests instantiating real `Node3D`
  objects and asserting actual `.visible`, `.position.x/y/z`, `albedo_color.r`,
  `Label3D.billboard == BILLBOARD_ENABLED`, `Label3D.pixel_size > 0.0`,
  and `MeshInstance3D` creation.

Total: 164 tests pass, 0 fail.

