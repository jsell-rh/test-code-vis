## Round-0 Failure Resolution â€” VERIFIED

**Issue:** `annotate` primitive left `Label3D.billboard` at `BILLBOARD_DISABLED`
and `pixel_size` at Godot default; no tests asserted these properties.

**Fix in commit 2cc7a62:**

`view_spec_renderer.gd` lines 89â€“90:
```gdscript
label.billboard = BaseMaterial3D.BILLBOARD_ENABLED
label.pixel_size = 0.05
```

`test_view_spec_renderer.gd` lines 434â€“437 (inside `test_annotate_op_sets_label3d_text`):
```gdscript
_check(label.billboard == BaseMaterial3D.BILLBOARD_ENABLED,
    "annotation Label3D must have billboard enabled for readability in 3D space")
_check(label.pixel_size > 0.0,
    "annotation Label3D must have pixel_size > 0.0 for legibility, got %s" % label.pixel_size)
```

Both the implementation fix and the test assertions are present and correct.
No outstanding issues remain.
