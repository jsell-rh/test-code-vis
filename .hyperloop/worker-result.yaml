### Requirement: Not In Scope — FAIL ❌

**Spec:** The following MUST NOT be implemented in the prototype phase:
- conformance mode
- evaluation mode
- simulation mode
- data flow visualization
- **moldable views (LLM-powered question-driven views)**
- **spec extraction**
- first-person navigation

**Findings:**

#### 1. Moldable Views — IMPLEMENTED (prohibited) ❌

Three scripts implement moldable views in full:
- `godot/scripts/question_panel.gd` — UI panel accepting natural-language questions,
  calling `process_question()` to emit a `view_spec_requested` signal.
- `godot/scripts/view_spec.gd` — `ViewSpec` class with `VALID_OPS` primitive set
  and `from_dict()` parser.
- `godot/scripts/view_spec_renderer.gd` — `ViewSpecRenderer.apply()` interprets a
  view spec into MeshInstance3D nodes (show/hide/highlight/arrange/annotate/connect).

These are **integrated into the running application** via `main.gd`:
- Line 16: `const QuestionPanel = preload("res://scripts/question_panel.gd")`
- Lines 56–65: `QuestionPanel` is instantiated, added to a CanvasLayer, and its
  `view_spec_requested` signal is connected.

Three GDScript test files cover this feature:
- `godot/tests/test_question_panel.gd` (415 lines, 16 tests)
- `godot/tests/test_view_spec.gd` (132 lines, 11 tests)
- `godot/tests/test_view_spec_renderer.gd` (627 lines, ~25 tests)

**What must be removed:** `question_panel.gd`, `view_spec.gd`,
`view_spec_renderer.gd`, their preloads in `main.gd`, the QuestionPanel
instantiation in `_ready()`, the `_on_view_spec_requested()` handler, and all
three test files.

#### 2. Spec Extraction — IMPLEMENTED (prohibited) ❌

`extractor/extractor.py` contains:
- `extract_spec_nodes()` function (lines 365–426): discovers and parses a `specs/`
  directory alongside the source tree into `Node` dicts with `type='spec'`.
- `_layout_spec_nodes()` helper (lines 429–449): positions spec nodes in a ring.
- `build_scene_graph()` calls `extract_spec_nodes()` when `include_specs=True`
  (lines 489–496).

`extractor/__main__.py` exposes a `--specs` / `-s` CLI flag that enables this
feature (lines 47–49).

Python tests cover this feature:
- `extractor/tests/test_extractor.py` `TestSpecExtraction` class (lines 593–629),
  6 tests covering spec node type, id prefix, parent linkage, and opt-in/opt-out.

**What must be removed:** `extract_spec_nodes()`, `_layout_spec_nodes()`,
the `include_specs` parameter and its body in `build_scene_graph()`, the
`--specs` CLI flag in `__main__.py`, the `src_with_specs` fixture and
`TestSpecExtraction` class in `test_extractor.py`.

#### Other prohibited features — NOT implemented ✓
- Conformance mode: absent.
- Evaluation mode: absent.
- Simulation mode: absent.
- Data flow visualization: absent.
- First-person navigation: camera is orbit-only; no WASD/fly-mode.

