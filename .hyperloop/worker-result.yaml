## Requirement 4: Orbit Around Mouse Point (MUST)

**Status: COVERED**

Implementation:
- RMB press → `_get_ground_point_under_cursor(event.position)` → `begin_orbit_at_world_point(world_pt)`
- `begin_orbit_at_world_point`: sets `_pivot = world_pt`, `_target_pivot = world_pt`,
  recomputes `_distance`, `_theta`, `_phi` from current camera position (no jump).
- During orbit drag: only `_phi` and `_theta` change; `_pivot` stays at the cursor world point.
  Camera always `look_at(_pivot)` → cursor point stays at visual center throughout orbit.

### Scenario: Orbiting around a component
- THEN camera orbits around the cursor point at orbit start
  → `test_orbit_uses_right_mouse_button`: RMB press + 50 px right drag → `cam._phi != initial_phi` ✓
  → `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` ✓
- AND component remains at visual center during orbit
  → `test_orbit_pivot_is_world_point`: after `begin_orbit_at_world_point`, `cam._pivot.is_equal_approx(world_pt)` ✓
    Camera always `look_at(_pivot)`; orbit only mutates `_phi`/`_theta`, not `_pivot`. ✓

