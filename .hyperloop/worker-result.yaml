|---|---|---|---|
| Runs as standalone CLI tool | `TestCliEntryPoint::test_main_produces_json_output` | extractor/tests/test_cli.py | calls `main([str(src), "--output", ...])`, asserts rc==0, JSON has nodes/edges/metadata |
| Stdlib-only dependencies | `TestStdlibOnlyImports::test_extractor_uses_only_stdlib_imports` | extractor/tests/test_cli.py | ast-walks all .py in extractor/ (excl tests/), asserts each import in sys.stdlib_module_names |

Both test bodies read and verified. Predicates exactly match THEN-clauses.

### R3: JSON Interface Contract (MUST) — COVERED

Confirmed by code inspection: `godot/scripts/` contains zero subprocess calls, zero
extractor imports. `build_from_graph()` accepts a plain `Dictionary`. All
`test_scene_graph_loader.gd` tests use inline `_make_fixture()` dictionaries with no
extractor invocation — structurally confirms decoupled contract.

### R4: Desktop Platform (MUST) — PASS-WITH-NOTE

