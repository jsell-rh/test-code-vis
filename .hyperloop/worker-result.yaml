## Independent Verification Notes

**main.gd _ready()**: Not a stub. Contains FileAccess.open() + get_as_text() + JSON.parse()
+ build_from_graph() call. Real rendering pipeline wired from entry point.

**Containment test predicate**: mod_anchor.get_parent() == ctx_anchor — real Node3D
parent-child hierarchy, not dict.has(). Satisfies spec "containment is shown by nesting."

**Direction indicator**: CylinderMesh with top_radius==0.0 (arrowhead cone) is an explicit
rendering element. Satisfies "direction is visually indicated" — not a plain line or
colour difference alone.

**Coupling test quality**: test_coupled_bcs_are_closer_than_uncoupled VARIES the coupling
fixture (auth--shared_kernel coupled; auth--billing uncoupled) and asserts the relative
distance ordering. Algorithm-quality confirmed by reading test body (lines 435-462,
test_extractor.py). test_complexity_and_coupling_both_reflected also verified: varies LOC
(100 vs 1) and coupling (big_ctx→ctx_c edge), asserts size ordering AND positional proximity.

**Pan direction sign chain**: Reviewer independently derived: drag right → delta.x = +50 →
_pivot += basis.x * +50 * pan_amount (camera_controller.gd line 143) → in headless tests
basis.x = (1,0,0) → pivot.x increases. Test asserts pivot.x > initial_x. Correct non-inverted
mapping. check-pan-grab-model-comments.sh exits 0, user-visible-outcome language confirmed in
derivation comments.

**Bool-returning tests in test_ux_polish.gd**: test_ux_polish.gd does NOT declare
`var _test_failed` — it is a Pattern-2 suite. run_tests.gd detects pattern by checking
`get_script_property_list()` for `_test_failed`. Pattern-2 tests return true/false directly.
check-gdscript-test-bool-return.sh exits 0 (only checks Pattern-1 suites for inert bools).
All test_ux_polish.gd functions are live — false returns would correctly cause FAIL output.

**Commit count note**: worker-result.yaml stored "19 commits" at time of previous write;
fresh check-branch-has-commits.sh reports 20 (one chore commit was added after). Cosmetic
self-referential artifact; not a functional failure. Check exits 0.

