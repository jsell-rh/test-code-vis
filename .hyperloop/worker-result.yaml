## Pan Direction Sign Derivation (independent)

Spec: "scene moves in the same direction as the drag (i.e. dragging left reveals content
to the right, as in Google Maps)"

At phi=PI/2, basis.x ≈ world +X. Drag left means delta.x < 0.
Implementation: `_target_pivot -= right * delta.x * pan_amount`
= `_target_pivot -= (+X) * (negative) * pan_amount`
= `_target_pivot += (+X) * |delta.x| * pan_amount`
→ pivot moves in +X → camera moves in +X → scene appears to move in −X (left).
Drag was left; scene shifts left. **Google Maps convention satisfied.** ✓

Test assertion `cam._pivot.x > 0.0` matches this derivation. ✓

