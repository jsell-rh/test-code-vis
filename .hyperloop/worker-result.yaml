## Requirement 2: Non-Inverted Movement (MUST)

**Status: COVERED**

Implementation: `_target_pivot -= right * delta.x * pan_amount`
  Drag left → delta.x < 0 → subtract negative → pivot.x increases → camera shifts +X →
  scene shifts −X (left) → same direction as drag. Google Maps convention satisfied.

### Scenario: Drag direction matches view movement
- THEN the scene moves in the same direction as the drag
  → `test_pan_direction_not_inverted`:
    Setup: phi=PI/2 → camera on +Z side → basis.x = world +X
    Drag 50 px left (delta.x = −50) → `_target_pivot -= (+X)·(−50)·pan_amount` → pivot.x > 0
    Assertion: `cam._pivot.x > 0.0` ✓
  Independent derivation: drag left → pivot moves +X → camera right → scene moves left (same as drag). ✓

