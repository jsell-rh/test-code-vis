## Requirement: Containment Rendering — COVERED

**Spec**: MUST render containment relationships as nested volumes — child nodes visually inside parent.

**Implementation** (`godot/scripts/main.gd → _create_volume()`):
- `bounded_context` type: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`
- `module` type: `albedo_color.a = 1.0` (fully opaque)
- Child anchors parented to parent anchor via `parent_anchor.add_child(anchor)`, establishing
  the scene-tree containment hierarchy.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` — asserts `transparency != TRANSPARENCY_DISABLED` and `a < 1.0` ✓
- `test_module_is_opaque` — asserts `albedo_color.a >= 1.0` ✓
- `test_module_parented_inside_context` — asserts `mod_anchor.get_parent() == ctx_anchor` ✓
- `test_bounded_context_larger_than_module` — asserts `ctx_mesh.size.x > mod_mesh.size.x` ✓
- `test_bounded_context_cull_disabled` — asserts `mat.cull_mode == BaseMaterial3D.CULL_DISABLED` ✓

