## Untestable THEN-Clauses

### 1. "runs natively without browser, container, or VM dependencies"
- **Verbatim THEN**: "it runs natively without browser, container, or VM dependencies"
- **Why untestable**: This is a deployment environment property. A headless GDScript test runs in the same environment it would be trying to assert about — it cannot prove the absence of a container or browser from within a test. There is no GDScript API to query "is this a VM?" or "is there a browser present?".
- **Architectural evidence**: No `export_presets.cfg` in the repository (no web export target configured). No `Dockerfile` or container config. `project.godot` declares `config/features=PackedStringArray("4.6")` — no `"Web"` feature. `godot-compile.sh` exits 0, confirming the engine binary runs natively.

### 2. "the frame rate remains above 30fps"
- **Verbatim THEN**: "the frame rate remains above 30fps"
- **Why untestable**: FPS measurement requires an active GPU render pipeline. Godot headless mode (`--headless --quit`) has no render pipeline. `Engine.get_frames_per_second()` returns 0 in headless mode. There is no way to drive a meaningful FPS assertion without a display server.
- **Architectural evidence**: `lod_manager.gd` implements three-tier LOD (FAR/MEDIUM/NEAR) that reduces visible geometry at large distances. LOD correctness is verified behaviorally in `test_spatial_structure.gd` (9 tests). `test_nfr_scale.gd` confirms the scene builds correctly with 60 nodes (kartograph-scale fixture) without error.

### 3. "there is no perceptible stutter or pop-in"
- **Verbatim THEN**: "there is no perceptible stutter or pop-in"
- **Why untestable**: "Perceptible" is a subjective perceptual property that requires a human observer or a frame-time profiler with a live render pipeline. Neither is available in headless CI.
- **Architectural evidence**: LOD system hides distant nodes per-frame via `_update_lod()` called from `_process()`, preventing geometry overload. Tested structurally in `test_spatial_structure.gd`.

