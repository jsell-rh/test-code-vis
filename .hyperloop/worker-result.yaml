## Pan Direction Derivation (Independent)

Spec: "dragging left reveals content to the right, as in Google Maps."

At phi=PI/2 (camera on +Z side), camera local X = world +X.
- drag left: delta.x = 50 - 100 = -50
- code: `_target_pivot -= right * delta.x * pan_amount`
       = `_target_pivot -= (+X) * (-50) * pan_amount`
       = `_target_pivot.x += positive` → pivot.x increases
- camera moves +X → scene appears to shift -X (left on screen) = drag direction ✓

Test predicate `cam._pivot.x > 0.0` matches derived expectation. CORRECT.

