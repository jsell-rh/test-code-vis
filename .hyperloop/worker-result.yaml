## THEN-Clause → Test Mapping

### Requirement 1: Godot 4.6 Engine

| THEN clause | Test function | File |
|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | godot/tests/test_engine_version.gd |
| config/features includes "4.6" | `test_project_godot_config_features_line` | godot/tests/test_engine_version.gd |
| All scripts use GDScript (iteration) | `test_scripts_dir_contains_only_gdscript` | godot/tests/test_engine_version.gd |
| No C#/Mono | `test_project_does_not_declare_csharp` | godot/tests/test_engine_version.gd |
| All API calls valid for Godot 4.6 | `test_file_access_get_as_text_returns_non_empty_string` | godot/tests/test_engine_version.gd |

Note: `test_scripts_dir_contains_only_gdscript` uses `DirAccess.open("res://scripts")` +
`dir.list_dir_begin()` to iterate every file and assert `.gd` extension — satisfies the
"all scripts" predicate via iteration, not single-file or config-string check.

### Requirement 2: Python Extractor

| THEN clause | Test function | File |
|---|---|---|
| Runs as standalone CLI tool | `TestCliEntryPoint::test_main_produces_json_output` | extractor/tests/test_cli.py |
| Stdlib-only dependencies | `TestStdlibOnlyImports::test_extractor_uses_only_stdlib_imports` | extractor/tests/test_cli.py |

`test_extractor_uses_only_stdlib_imports` uses `ast.walk()` to inspect every `.py` file in
the extractor package and checks every import name against `sys.stdlib_module_names` — a true
iteration assertion, not an absence-of-requirements.txt proxy.

### Requirement 3: JSON Interface Contract

| THEN clause | Test function | File |
|---|---|---|
| Godot does not need Python extractor or source codebase | Multiple tests using `_make_fixture()` inline dicts | godot/tests/test_scene_graph_loader.gd |
| JSON file is self-contained | `test_nodes_list_is_returned`, `test_edges_list_is_returned`, `test_metadata_is_returned` | godot/tests/test_scene_graph_loader.gd |

All test_scene_graph_loader.gd tests use inline fixture dictionaries — they never invoke
the Python extractor or read from the filesystem, confirming decoupled contract.

### Requirement 4: Desktop Platform

| THEN clause | Status |
|---|---|
| Runs natively without browser, container, or VM | PASS-WITH-NOTE (untestable in headless CI) |

**Untestable THEN-Clause:** "runs natively without browser, container, or VM dependencies"
- **Why untestable:** This is a deployment-environment assertion requiring a physical GPU
  desktop to verify at runtime. Headless CI has no render pipeline.
- **Architectural evidence:** No Dockerfile, no docker-compose.yml, no `.html` export
  preset, no `export_presets.cfg` in the repository. `godot/project.godot` declares no
  web/Android/iOS export configuration. The project compiles as a standard desktop app.

### Requirement 5: Performance at Kartograph Scale

| THEN clause | Test function | File |
|---|---|---|
| Scene builds at kartograph scale (60 nodes) | `test_kartograph_scale_anchor_count` | godot/tests/test_nfr_scale.gd |
| All 6 context anchors created | `test_kartograph_scale_context_anchors_exist` | godot/tests/test_nfr_scale.gd |
| All 54 module anchors created | `test_kartograph_scale_module_anchors_exist` | godot/tests/test_nfr_scale.gd |
| Build completes without errors | `test_kartograph_scale_build_produces_world_positions` | godot/tests/test_nfr_scale.gd |

**Untestable THEN-Clause:** "frame rate remains above 30fps"
- **Why untestable:** FPS measurement requires the GPU render pipeline. Godot headless mode
  has no renderer, so frame timing cannot be measured.
- **Architectural evidence:** `godot/scripts/lod_manager.gd` provides Level-of-Detail
  visibility management. `build_from_graph()` processes nodes in a single pass without
  per-frame iteration overhead.

### Requirement 6: Prototype Disposability (SHOULD)

SHOULD-level requirement — no mandatory behavioral test. No architectural lock-in detected
(no persistent stores, no external service coupling). The JSON scene graph is the only
artifact with defined longevity.

