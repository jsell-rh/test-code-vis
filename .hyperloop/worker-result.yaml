### Requirement: Smooth Camera Movement (SHALL/MUST)

| THEN-clause | Test | Status |
|---|---|---|
| Zoom is animated smoothly, not instantaneous | test_smooth_zoom_target_differs_from_distance_after_scroll | PASS |
| _process interpolates distance toward target | test_smooth_zoom_process_interpolates_distance | PASS |
| Pan movement proportional to drag speed | test_pan_proportional_to_drag_speed | PASS |

**Implementation:** `_process(delta)` uses exponential smoothing:
`t = 1.0 - pow(0.05, delta * zoom_smooth)`, then
`_distance = lerpf(_distance, _target_distance, t)` and
`_pivot = _pivot.lerp(_target_pivot, t)`.
Scroll only mutates `_target_distance`; `_distance` converges smoothly each frame.
Pan applies immediately (responsive) and is proportional to `delta.x / delta.y`.

**Verdict: COVERED**

