### Requirement: Zoom Toward Mouse Cursor (SHALL/MUST)

**Status: COVERED**

Implementation (`_zoom_toward_point`):
- Zoom in/out changes `_target_distance` proportionally.
- Shifts `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
  where `zoom_ratio = new_target_distance / old_target_distance`.
- Zoom in: ratio < 1 → pivot shifts toward world_pt (cursor position).
- Zoom out: ratio > 1 → pivot shifts away from world_pt.

**Scenario: Zooming into a specific component**
- THEN the view zooms toward the point under the cursor →
  `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (10,0,0), zoom in →
  asserts `cam._target_pivot.x > 0.0` ✓
- AND the component under the cursor stays under the cursor during zoom →
  `test_zoom_in_cursor_point_invariant`: cursor at (20,0,0), zoom in →
  asserts `0.0 < cam._target_pivot.x < 20.0` (pivot between old origin and cursor) ✓

**Scenario: Zooming out**
- THEN the view zooms out from the point under the cursor →
  `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (10,0,0), zoom out →
  asserts `cam._target_pivot.x < 0.0` (pivot moves away from +X cursor) ✓

