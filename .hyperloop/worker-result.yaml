### Requirement: Dependency Rendering — COVERED

**Implementation** (`main.gd → _create_edge()`):
- `ImmediateMesh` (PRIMITIVE_LINES) drawn between `from_pos` and `to_pos`.
- `CylinderMesh` with `top_radius = 0` (cone/arrowhead) placed at the target
  end, oriented along the edge direction — this is the visual direction indicator.
- Cross-context edges use orange `Color(1.0, 0.50, 0.10)`; internal edges use
  grey.

**Tests** (`godot/tests/test_dependency_rendering.gd` — 4 tests):
- `test_edge_line_mesh_created` — `ImmediateMesh` child exists on main node.
- `test_direction_indicator_cone_created` — `CylinderMesh` with
  `top_radius == 0` exists.
- `test_direction_cone_near_target` — cone position within 2 units of target
  node's world position.
- `test_cross_context_cone_is_orange` — cone material `r > 0.8` and `b < 0.3`
  for a `cross_context` edge.

