## Requirement Coverage

### R1: Pan with Left Mouse Button (MUST) — COVERED

**Code:** `godot/scripts/camera_controller.gd`
- Lines 101–104: `MOUSE_BUTTON_LEFT` sets `_panning = event.pressed`.
- Lines 141–160 (`_handle_motion`): When `_panning`, computes right/backward
  vectors from `transform.basis` and applies:
  `_target_pivot -= right * delta.x * pan_amount`
  `_target_pivot -= backward * delta.y * pan_amount`
  then immediately sets `_pivot = _target_pivot`.

**Scenario: Panning the view**

| THEN clause | Test | File |
|---|---|---|
| Camera pans in direction of drag | `test_lmb_drag_pans_camera` | test_camera_controls.gd |
| Direction not inverted (drag left → scene left) | `test_pan_direction_not_inverted` | test_camera_controls.gd |

`test_lmb_drag_pans_camera`: LMB press + motion → asserts `cam._pivot != initial_pivot`.
`test_pan_direction_not_inverted`: At `phi = PI/2`, drags 50 px left (delta.x = -50) →
asserts `cam._pivot.x > 0` (pivot moved +X, scene shifted −X, matching drag direction).

