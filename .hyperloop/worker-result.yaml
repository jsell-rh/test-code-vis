## Spec Alignment Review — specs/visualization/data-flow.spec.md

All SHALL/MUST requirements have both implementation in `godot/scripts/flow_overlay.gd`
and GDScript behavioral test coverage in `godot/tests/test_flow_overlay.gd`.
The test suite is registered in `godot/tests/run_tests.gd` (line 46).

---

### Requirement: Flow is On-Demand — COVERED

**SHALL**: flow MUST NOT be shown by default; invocation must be explicit.

- **Code**: `_path_active: bool = false` (flow_overlay.gd). The `FlowOverlay` object
  is constructed in `main.gd` (line 47) but no path is activated until the user
  presses F (`_toggle_path_overlay`) or G (`_toggle_aggregate_overlay`).
- **Test**: `test_flow_not_active_by_default()` — creates a bare `FlowOverlay` and
  asserts `not overlay.is_path_active()`. ✅

**Scenario: Requesting a flow path** — all three THEN-clauses covered:

| THEN-clause | Test |
|---|---|
| Relevant flow path lights up | `test_path_mid_node_lit_up()` — mid-path node gets bright-white albedo (r,g,b ≥ 0.9) |
| Irrelevant elements de-emphasized | `test_offpath_nodes_deemphasized()` — off-path node channels ≤ 0.4, alpha ≤ 0.4 |
| Transparency mode set on dimmed nodes | `test_offpath_node_transparency_mode()` — TRANSPARENCY_ALPHA verified |
| Path traceable — entry node marked | `test_entry_node_green()` — entry albedo g > 0.8, r/b < 0.5 |
| Path traceable — terminus marked | `test_terminus_node_red()` — terminus albedo r > 0.8, g/b < 0.5 |

---

### Requirement: Flow Shows Paths Through Structure — COVERED

**MUST**: flow rendered as paths through structural geography; structural context
must remain visible (not replaced).

- **Code**: `show_path()` modifies materials and edge visibility but never removes
  nodes from the scene tree. Off-path anchors are dimmed with alpha transparency but
  `visible` remains `true`. `clear_path()` restores every material and edge-visibility
  to its saved original state.

**Scenario: Flow overlaid on structure** — all three THEN-clauses covered:

| THEN-clause | Test |
|---|---|
| Flow rendered as path (edges highlighted) | `test_path_edges_visible()` — path edges are visible after show_path |
| Path edges distinctly coloured | `test_path_edges_cyan()` — edge albedo r ≤ 0.1, g ≥ 0.8, b ≥ 0.9 |
| Structural context remains (not replaced) | `test_offpath_nodes_still_in_scene()` — off-path node has parent != null and visible == true |
| Path followable spatially | `test_positions_unchanged_when_path_shown()` — 3D positions verified unchanged after show_path |

---

### Requirement: Aggregate Flow Patterns — COVERED (SHOULD)

This is a SHOULD requirement; absence would be a note, not a failure. It is fully
implemented and tested.

- **Code**: `show_aggregate(hot_edges, bottleneck_ids)` applies orange (≥ 500 traffic)
  or yellow (≥ 100 traffic) to hot edges, and adds a red translucent `BottleneckOverlay`
  MeshInstance3D child to each bottleneck anchor. Structural edges are NOT hidden
  (aggregate adds prominence only).

**Scenario: Identifying a bottleneck** — all THEN-clauses covered:

| THEN-clause | Test |
|---|---|
| High-traffic paths visually prominent (orange) | `test_high_traffic_edge_orange()` — traffic=950, r ≥ 0.9, g ≤ 0.6, b ≤ 0.1 |
| Medium-traffic paths prominent (yellow) | `test_medium_traffic_edge_yellow()` — traffic=200, r ≥ 0.9, g ≥ 0.7, b ≤ 0.1 |
| Bottleneck point has overlay child | `test_bottleneck_node_has_overlay()` — child named "BottleneckOverlay" found |
| Bottleneck overlay is red | `test_bottleneck_overlay_red()` — r ≥ 0.9, g ≤ 0.1, b ≤ 0.1 |

