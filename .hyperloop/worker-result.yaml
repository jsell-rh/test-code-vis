### Direction Derivation (Manual — check-direction-test-derivations.sh not present on main)

Spec defines map-grab model via "(i.e. dragging left reveals content to the
right, as in Google Maps)".

Independent derivation before reading test bodies:
- Drag LEFT → world moves LEFT → camera reveals content to RIGHT → pivot moves
  RIGHT → pivot.x INCREASES.
- Drag RIGHT → world moves RIGHT → camera reveals content to LEFT → pivot moves
  LEFT → pivot.x DECREASES.

Implementation (camera_controller.gd line 134): `_pivot -= right * delta.x * pan_amount`
- Drag right: delta.x = +50, right = (1,0,0) in headless → pivot.x -= 50*k → DECREASES ✓
- Drag left:  delta.x = -50 → pivot.x += 50*k → INCREASES ✓

Test predicates match derivation. No sign-flip defect.

### Test Runner Pattern

test_ux_polish.gd uses Pattern 2 (bool-return). The runner (run_tests.gd lines
85-93) explicitly handles this: `result == true → PASS, else → FAIL`. Tests
are NOT inert — a false return correctly registers as a failure.
check-gdscript-test-bool-return.sh is not present on main (22 scripts total);
manual verification substitutes.

