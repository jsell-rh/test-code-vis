## THEN-Clause Coverage

### Conformance Mode

| THEN clause | Implementing code | Test function | Assertion line |
|---|---|---|---|
| "the human can see that the realized system has auth and user management as separate components" | `apply_alignment_overlay()` creates distinct coloured anchors for each node | `test_aligned_nodes_displayed_as_separate_components` | `_check(auth_anchor != user_mgmt_anchor, ...)` + `_check(_get_mesh_color(auth_anchor).is_equal_approx(ALIGNED_COLOR), ...)` |
| "the correspondence between spec and realization is visually apparent" | aligned nodes receive `ALIGNED_COLOR` | `test_aligned_node_receives_aligned_color` | `_check(color.is_equal_approx(UnderstandingOverlay.ALIGNED_COLOR), ...)` |
| "the human can see the divergence between spec and realization" | divergent nodes receive `DIVERGENT_COLOR` | `test_divergent_node_receives_divergent_color` | `_check(color.is_equal_approx(UnderstandingOverlay.DIVERGENT_COLOR), ...)` |
| "the specific nature of the divergence is clear (merged vs. separate)" | divergent node gets Label3D with `spec_divergence` text | `test_divergent_node_has_divergence_label` | `_check(_find_label_text(anchor) == "merged with order service", ...)` |

### Evaluation Mode

| THEN clause | Implementing code | Test function | Assertion line |
|---|---|---|---|
| "the coupling between those services is apparent" | mutual-edge nodes receive `COUPLED_COLOR` | `test_coupling_between_services_apparent` | `_check(_get_mesh_color(svc_a).is_equal_approx(COUPLED_COLOR), ...)` |
| "the human can assess whether the coupling is problematic" | `COUPLED_COLOR` visually distinct from default | same test — `COUPLED_COLOR != ALIGNED_COLOR` confirmed by `test_critical_color_distinct_from_normal` | `_check(not CRITICAL_COLOR.is_equal_approx(COUPLED_COLOR), ...)` |
| "the criticality and centrality of that component is apparent" | in_degree≥3 → `CRITICAL_COLOR` | `test_critical_component_centrality_apparent` | `_check(_get_mesh_color(hub).is_equal_approx(CRITICAL_COLOR), ...)` |
| "the risk it represents is clear" | `CRITICAL_COLOR` ≠ `COUPLED_COLOR` ≠ `ALIGNED_COLOR` | `test_critical_color_distinct_from_normal` | `_check(not CRITICAL_COLOR.is_equal_approx(COUPLED_COLOR), ...)` |
| "architectural problems are visible even though conformance is perfect" | quality overlay ignores `spec_status` field | `test_quality_overlay_independent_of_alignment` | `_check(_get_mesh_color(hub).is_equal_approx(CRITICAL_COLOR), ...)` (hub has `spec_status="aligned"`) |

