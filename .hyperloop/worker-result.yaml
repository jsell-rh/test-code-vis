### Requirement: View Specs as Intermediate Representation (SHALL)

The system MUST use a structured view specification as the intermediate
representation between the LLM and the 3D renderer.

**Scenario: LLM produces view spec** — COVERED

| THEN-clause | Code | Test |
|---|---|---|
| emits a structured view specification (not raw 3D geometry) | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` — `result is Dictionary` asserted |
| view spec controls which elements are shown, hidden, highlighted, and how they are arranged | `_make_spec()` passes all 6 valid ops through; `parse_response()` returns complete ops array | `test_parse_response_passes_through_show_op`, `_hide_op`, `_highlight_op`, `_arrange_op`, `_annotate_op`, `_connect_op`, plus `test_parse_response_all_six_ops_pass_through` |
| the 3D renderer interprets the view spec into a spatial scene | `SceneInterpreter.apply()` dispatches each op to scene-tree mutations; wired via `main.gd::apply_view_spec()` | `test_all_six_ops_mutate_scene_correctly` — asserts `anchor.visible`, `position.x`, `albedo_color.g`, `label.text`, MeshInstance3D geometry all changed |

