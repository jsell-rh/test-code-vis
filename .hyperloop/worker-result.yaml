## Requirement Coverage

### 1. Godot 4.6 Engine (MUST) — COVERED

**Implementation:**
- `godot/project.godot` line 19: `config/features=PackedStringArray("4.6")` — declares 4.6.x.
- `godot/scripts/` contains exactly four `.gd` files (`main.gd`, `scene_graph_loader.gd`,
  `camera_controller.gd`, `lod_manager.gd`). No `.cs` files exist.
- `main.gd::_ready()` uses `FileAccess.open()` + `get_as_text()` — the valid Godot 4.6
  API; does NOT use deprecated `File.new()` or `read_as_text()`.

**Tests (godot/tests/test_engine_version.gd + test_godot_version.gd):**

| THEN clause | Test | Verification |
|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | FileAccess.open(project.godot) + get_as_text(); asserts `content.contains("4.6")` |
| config/features declares "4.6" | `test_project_godot_config_features_line` | Asserts both `"config/features"` and `'"4.6"'` present in project.godot |
| No C# / Mono | `test_project_does_not_declare_csharp` | Asserts `"Mono"` and `"C#"` absent from project.godot |
| FileAccess.get_as_text() is valid 4.6 API | `test_file_access_get_as_text_returns_non_empty_string` | Calls FileAccess.get_as_text() and asserts non-empty return |
| All scripts use GDScript | `test_scripts_dir_contains_only_gdscript` | DirAccess iterates res://scripts/; asserts every file ends with `.gd` |
| Godot 4.x API (not deprecated) | `test_godot_version.gd::test_main_uses_godot4_fileaccess_api` | Reads main.gd; asserts `FileAccess.open(` + `get_as_text()` present and `File.new()` / `read_as_text()` absent |

All tests are behavioral (runtime): they call FileAccess/DirAccess APIs and assert on
actual return values. These are NOT compilation-only checks.

