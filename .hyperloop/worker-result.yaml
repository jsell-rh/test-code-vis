### Spec scenario coverage

#### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:**
- `main.gd _ready()` opens `scene_graph_path` via `FileAccess.open()`, reads content
  via `get_as_text()`, parses with `JSON.new()`, calls `build_from_graph()`. Not a stub. ✓
- `build_from_graph()` iterates `nodes`, creates a `Node3D` anchor for each, positions
  the anchor from `position.{x,y,z}` in the JSON, then iterates `edges` and calls
  `_create_edge()` for each. ✓
- `SceneGraphLoader.load_from_dict()` preserves all fields (id, name, type, parent,
  position, size, metrics, edges). ✓

**Tests:**
- `test_scene_graph_loading.gd`:
  - `test_volumes_created_for_each_node()` — asserts `_anchors.has("ctx1")` and
    `_anchors.has("mod1")` after `build_from_graph()` ✓
  - `test_mesh_instances_exist_in_anchors()` — asserts `MeshInstance3D` child exists
    in each anchor ✓
  - `test_edge_mesh_instances_created()` — asserts ≥ 2 `MeshInstance3D` children
    (line + arrowhead) on the main node ✓
  - `test_anchor_positions_match_json()` — asserts `.position.is_equal_approx()` for
    each anchor against JSON values ✓
  - `test_labels_are_billboard_and_readable()` — asserts `BILLBOARD_ENABLED`,
    `pixel_size > 0.0`, `no_depth_test == true` ✓
- `test_node_renderer.gd` (fixture uses kartograph context ids "iam", "shared_kernel"):
  - `test_node_rendered_at_json_position()`, `test_second_node_rendered_at_json_position()`,
    `test_no_layout_recomputed_in_godot()`, `test_each_json_node_becomes_a_scene_tree_child()`
    — all assert concrete `position.x/y/z` values on live `Node3D` objects ✓

#### Requirement: Containment Rendering — COVERED

**Implementation:**
- `_create_volume()`: bounded_context gets `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`,
  `CULL_DISABLED`; modules get `albedo_color.a = 1.0`. Child nodes added to parent
  anchor, placing them inside. ✓

**Tests (`test_containment_rendering.gd`):**
- `test_bounded_context_is_translucent()` — asserts `transparency != TRANSPARENCY_DISABLED`
  and `albedo_color.a < 1.0` ✓
- `test_module_is_opaque()` — asserts `albedo_color.a >= 1.0` ✓
- `test_module_parented_inside_context()` — asserts `mod_anchor.get_parent() == ctx_anchor` ✓
- `test_bounded_context_larger_than_module()` — asserts `ctx_mesh.size.x > mod_mesh.size.x` ✓
- `test_bounded_context_cull_disabled()` — asserts `cull_mode == CULL_DISABLED` ✓

#### Requirement: Dependency Rendering — COVERED

**Implementation:**
- `_create_edge()` builds an `ImmediateMesh` with `PRIMITIVE_LINES` (the connecting line)
  and a `CylinderMesh` with `top_radius = 0.0` (arrowhead cone) positioned at the target
  end, oriented along the edge direction. ✓

**Tests (`test_dependency_rendering.gd`):**
- `test_edge_line_mesh_created()` — asserts `ImmediateMesh` child found on main node ✓
- `test_direction_indicator_cone_created()` — asserts `CylinderMesh` with
  `top_radius == 0.0` found ✓
- `test_direction_cone_near_target()` — asserts cone position within 2 units of target ✓
- `test_cross_context_cone_is_orange()` — asserts `albedo_color.r > 0.8` and
  `albedo_color.b < 0.3` for cross_context edge type ✓

#### Requirement: Size Encoding — COVERED

**Implementation:**
- `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz * 0.6, sz)`: linear mapping
  from JSON size metric to mesh dimensions. ✓

**Tests (`test_size_encoding.gd`):**
- `test_large_module_has_bigger_mesh()` — asserts `large_mesh.size.x > small_mesh.size.x` ✓
- `test_mesh_sizes_proportional_to_metric()` — asserts ratio within 0.001 of 3.0
  (fixture: size 9 vs size 3) ✓

#### Requirement: Camera Controls — COVERED

**Implementation (`camera_controller.gd`):**
- `_theta = 0.15` rad (≈ 8.6° from vertical) → top-down initial view ✓
- Scroll wheel → decrements/increments `_distance` with clamping ✓
- Middle-mouse drag → updates `_phi` (azimuth) and `_theta` (polar) ✓
- `look_at(_pivot, Vector3.UP)` → up-orientation preserved ✓
- `set_pivot()` → repositions camera after scene framing ✓

**Tests (`test_camera_controls.gd`):**
- `test_initial_theta_is_near_top_down()` — asserts `_theta < PI/4` ✓
- `test_initial_distance_is_positive()` — asserts `_distance > 0` ✓
- `test_scroll_up_decreases_distance()` — calls `_handle_button(WHEEL_UP)`, asserts
  `_distance < initial` ✓
- `test_scroll_down_increases_distance()` — calls `_handle_button(WHEEL_DOWN)`, asserts
  `_distance > initial` ✓
- `test_orbit_horizontal_drag_changes_phi()` — simulates middle-mouse press + motion,
  asserts `_phi != initial` ✓
- `test_orbit_vertical_drag_changes_theta()` — simulates middle-mouse press + motion,
  asserts `_theta != initial` ✓
- `test_set_pivot_updates_state()` — calls `set_pivot()`, asserts `_pivot` and
  `_distance` updated ✓
- `test_zoom_clamped_at_minimum()` — 200× scroll-up, asserts `_distance >= min_distance` ✓

Note: Headless tests emit "Node not inside tree" warnings for `look_at()` because
`CameraController` extends `Camera3D` and is not added to a scene tree. All 8 tests
pass because they assert internal state variables, not `Transform3D` output. Acceptable
for prototype scope.

#### Requirement: Godot 4.6 — COVERED

**Implementation:**
- `project.godot` contains `config/features=PackedStringArray("4.6")` ✓
- All scripts are `.gd` (GDScript only) ✓
- `main.gd` uses `FileAccess.open()` + `get_as_text()` (Godot 4.6 API); no use of
  the removed `read_as_text()` in any production script ✓

**Tests (`test_engine_version.gd`):**
- `test_project_godot_declares_46()` — reads `project.godot` via `FileAccess.open()`
  + `get_as_text()`, asserts `"4.6" in text` ✓
- `test_features_line_contains_46()` — asserts `'PackedStringArray("4.6")' in text` ✓
- `test_fileaccess_open_returns_non_null()` — asserts `FileAccess.open()` returns
  non-null, exercising the same API path as `main.gd _ready()` ✓

