## THEN→Test Mapping

All THEN-clauses independently derived from spec before reading test bodies.

### Scenario: Panning the view

**THEN: camera pans in the direction of the drag**
- Test: `test_lmb_pan_moves_pivot` (test_ux_polish.gd:86)
- Assert: `cam._pivot != initial_pivot`
- Non-directional presence check; direction fully covered by AND-clause tests below.
- Note: `test_lmb_pan_moves_pivot` has name including "pan" and uses `!= initial_pivot`.
  check-nondirectional-movement-assertions.sh regex matches `test_pan_*`, not `test_lmb_pan_*`,
  so the check does not flag it. The non-directional assertion is acceptable here because
  this test's purpose is to confirm LMB triggers panning at all; the AND clause below
  provides directional coverage. Status: COVERED (basic), direction COVERED below.

**AND: movement direction matches the drag direction (not inverted)**
- Test 1: `test_pan_drag_right_increases_pivot_x` (test_ux_polish.gd:108)
  - Drag right: delta.x = 150-100 = +50. Code: `_pivot -= right*(+50)*pan_amount` → pivot.x decreases.
  - Spec-derived predicate: pivot.x < initial_x.
  - Actual assert: `cam._pivot.x < initial_x` ✓ MATCHES.
  - NOTE: Test name says "increases_pivot_x" but assertion says decreases. Name is a relic
    from when the assertion was inverted (fixed in cycle 6). Name is misleading but assertion
    is correct; assertion predicate matches spec-derived predicate. Non-blocking.
- Test 2: `test_pan_drag_left_decreases_pivot_x` (test_ux_polish.gd:119)
  - Drag left: delta.x = 50-100 = -50. Code: `_pivot -= right*(-50)*pan_amount` → pivot.x increases.
  - Spec-derived predicate: pivot.x > initial_x.
  - Actual assert: `cam._pivot.x > initial_x` ✓ MATCHES.
  - NOTE: Test name says "decreases_pivot_x" but assertion says increases. Same relic issue.
    Non-blocking.
- Status: COVERED.

### Scenario: Drag direction matches view movement

**THEN: scene moves in the same direction as the drag (i.e. dragging left reveals content to the right)**
- Spec parenthetical "(i.e. dragging left reveals content to the right)" defines the predicate.
- Derivation: drag left → Google Maps map-grab → user sees right-side content → pivot moves RIGHT.
  delta.x = 50-100 = -50. Code: `_pivot -= right*(-50)*pan_amount` → pivot.x increases.
  Spec-derived predicate: pivot.x > initial_x.
- Test: `test_drag_direction_matches_view_movement` (test_ux_polish.gd:132)
- Actual assert: `cam._pivot.x > initial_x` ✓ MATCHES.
- Status: COVERED.

### Scenario: Zooming into a specific component

**THEN: view zooms toward the point under the cursor**
- Derivation: zoom_fraction = 1.0 - (new_target/old_target). Zoom in reduces _target_distance →
  new_target < old_target → zoom_fraction > 0 → pivot lerps toward cursor.
  Cursor at (10,0,0), pivot starts at (0,0,0) → pivot.x increases.
  Spec-derived predicate: pivot.x > 0.0.
- Test: `test_zoom_toward_cursor_shifts_pivot_toward_cursor` (test_ux_polish.gd:149)
- Actual assert: `cam._pivot.x > 0.0` ✓ MATCHES.
- Status: COVERED.

**AND: component under the cursor stays under the cursor during the zoom**
- Derivation: each zoom step shifts pivot closer to cursor; pivot approaches cursor.
  Spec-derived predicate: after-zoom pivot.x > before-zoom pivot.x (closer to cursor at x=20).
- Test: `test_component_stays_under_cursor_on_zoom_in` (test_ux_polish.gd:159)
- Actual assert: `after > before` (pivot.x increases toward cursor) ✓ MATCHES.
- Status: COVERED.

### Scenario: Zooming out

**THEN: view zooms out from the point under the cursor**
- Derivation: zoom out increases _target_distance → zoom_fraction = 1-(new/old) < 0 →
  pivot lerps AWAY from cursor. Pivot at (5,0,0), cursor at (10,0,0).
  lerp(5, 10, negative) < 5. Spec-derived predicate: pivot.x < 5.0.
- Test: `test_zoom_out_from_cursor_shifts_pivot_away` (test_ux_polish.gd:177)
- Actual assert: `cam._pivot.x < 5.0` ✓ MATCHES.
- Status: COVERED.

### Scenario: Orbiting around a component

**THEN: camera orbits around the point under the cursor at orbit start**
- Derivation: RMB press calls `_set_orbit_pivot()` which sets `_pivot = world_point`.
  Spec-derived predicate: after _set_orbit_pivot(world_point), cam._pivot == world_point.
- Test: `test_orbit_pivot_set_to_cursor_point_at_start` (test_ux_polish.gd:202)
- Actual assert: `cam._pivot == world_point` ✓ MATCHES.
- Note: In headless mode `_mouse_to_ground()` returns `_pivot` (no viewport for raycasting),
  so test calls `_set_orbit_pivot()` directly. This tests the mechanism correctly; cursor→world
  integration is untestable in headless per guidelines.
- Status: COVERED.

**AND: component remains at the visual center during the orbit**
- Derivation: orbit motion changes `_phi`/`_theta` (spherical angles), not `_pivot`.
  Spec-derived predicate: pivot unchanged after orbit motion.
- Test: `test_component_remains_at_visual_center_during_orbit` (test_ux_polish.gd:232)
- Actual assert: `cam._pivot == center` ✓ MATCHES.
- Status: COVERED.

### Scenario: Smooth zoom

**THEN: zoom is animated smoothly (interpolated), not instantaneous**
- Derivation: scroll changes only `_target_distance`; `_distance` moves toward target only in
  `_process()`. After scroll: `_distance` unchanged. After `_process(0.016)`: `_distance`
  moves partially (lerp fraction = zoom_smoothing*0.016 < 1).
  Spec-derived predicate: immediately after scroll `_distance == initial_distance`;
  after one _process frame, `target < _distance < initial_distance`.
- Test: `test_zoom_is_interpolated_not_instantaneous` (test_ux_polish.gd:249)
- Actual assert: `after_one_frame < initial_distance and after_one_frame > target` ✓ MATCHES.
- Status: COVERED.

### Scenario: Smooth pan

**THEN: pan movement is smooth and proportional to drag speed**
- Derivation: pan_amount is fixed per call; pivot displacement = |delta| * pan_amount.
  Larger delta → larger displacement. 50px drag produces 5× the displacement of 10px drag.
  Spec-derived predicate: move2 > move1 for a 5× larger drag.
- Test: `test_pan_proportional_to_drag_speed` (test_ux_polish.gd:337)
- Actual assert: `move2 > move1` ✓ MATCHES.
- Status: COVERED.

