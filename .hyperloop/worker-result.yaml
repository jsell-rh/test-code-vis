## Requirement: JSON Scene Graph Loading — COVERED

**SHALL**: Load a JSON scene graph file produced by the Python extractor and
generate the 3D scene from it.

**Code** (`godot/scripts/main.gd`):
- `_ready()` opens the JSON file with `FileAccess.open()` + `file.get_as_text()`
  (valid Godot 4.6 API — removed `read_as_text()` is absent).
- `SceneGraphLoader.load_from_dict()` parses JSON into nodes/edges/metadata.
- `build_from_graph()` creates one anchor `Node3D` + one `MeshInstance3D` per
  node (populating `_anchors`), and calls `_create_edge()` per edge.
- `_compute_world_positions()` derives world-space coordinates from JSON
  `position` fields — satisfies "positions elements according to layout data".

**Scenario: Loading kartograph's scene graph — `test_scene_graph_loading.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| reads the JSON file | `test_fileaccess_open_returns_non_null` (test_engine_version.gd) | `FileAccess.open("res://project.godot", READ) != null` |
| generates 3D volumes for each node | `test_volumes_created_for_each_node` | `_anchors.has("ctx1") and _anchors.has("mod1")` |
| volumes contain MeshInstance3D | `test_mesh_instances_exist_in_anchors` | iterates anchors, asserts child `is MeshInstance3D` |
| generates connections for each edge | `test_edge_mesh_instances_created` | counts `MeshInstance3D` on main node, asserts ≥ 2 (line + cone) |
| positions elements from layout data | `test_anchor_positions_match_json` | `ctx.position.is_equal_approx(Vector3(0,0,0))` and `mod.position.is_equal_approx(Vector3(2,0,2))` |

