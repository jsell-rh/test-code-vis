## Requirement: Conformance Mode — COVERED

**Implementation:** `check_alignment()` and `render_alignment()` in
`godot/scripts/understanding_analyzer.gd`.

- `check_alignment()` compares actual node IDs against spec node IDs, returning
  `aligned` / `divergent` / `missing` arrays. Substring matching detects merged
  components (e.g. `payment_order` contains `payment`).
- `render_alignment()` adds `Label3D("✓ SPEC ALIGNED")` for aligned nodes and
  `Label3D("⚠ MERGED")` + highlight color for divergent nodes.

### Scenario: Spec-aligned implementation
| THEN-clause | Test | Assertion |
|---|---|---|
| human can see auth and user_management as separate components | `test_aligned_nodes_detected_as_separate` | `result["aligned"].has("auth")` and `.has("user_management")` |
| correspondence between spec and realization is visually apparent | `test_aligned_nodes_have_annotation_in_scene` | `label_count >= 1` Label3D nodes added to live Node3D scene |

### Scenario: Spec-divergent implementation
| THEN-clause | Test | Assertion |
|---|---|---|
| human can see the divergence between spec and realization | `test_divergent_nodes_detected` | `missing.has("payment_service") or divergent.has("payment_service")` |
| specific nature of divergence is clear (merged vs. separate) | `test_divergent_nodes_annotated_as_merged` | `divergent.has("payment")` + Label3D with "MERGED" in text |

