## Spec Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

`main.gd::_ready()` is non-empty: guards with `FileAccess.file_exists()`, opens
via `FileAccess.open(..., READ)`, reads via `get_as_text()`, parses with `JSON.new()`
+ `json.parse()`, delegates to `SceneGraphLoader.load_from_dict()`, then calls
`build_from_graph()`.

`build_from_graph()` creates Node3D anchors for every node (two passes: parents
first), calls `_create_volume()` for each, and `_create_edge()` for each edge.
Anchor `.position` is set from `Vector3(p["x"], p["y"], p["z"])`.

`godot/tests/test_scene_graph_loading.gd` — 5 tests:
- `test_volumes_created_for_each_node` — asserts `_anchors` contains both node ids
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a MeshInstance3D child
- `test_edge_mesh_instances_created` — asserts ≥2 children (line + cone) per edge
- `test_anchor_positions_match_json` — asserts `ctx1.position ≈ (0,0,0)` and
  `mod1.position ≈ (2,0,2)` (real `.position.x/y/z` properties, not dict-key checks)
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test == true` on Label3D

Status: **COVERED** ✓

---

### Requirement: Containment Rendering — COVERED

`_create_volume()` creates bounded-context anchors with:
- `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED` (translucent slab)
- `box.size = Vector3(sz, sz*0.2, sz)` (large flat footprint)

Module anchors: `albedo_color.a = 1.0`, `box.size = Vector3(sz, sz*0.6, sz)`.

`build_from_graph()` pass 2: `parent_anchor.add_child(anchor)` — child lives inside
parent in scene tree.

`godot/tests/test_containment_rendering.gd` — 5 tests asserting real Node3D
material and mesh properties:
- `test_bounded_context_is_translucent` — `transparency != DISABLED` and `alpha < 1.0`
- `test_module_is_opaque` — `albedo_color.a >= 1.0`
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`
- `test_bounded_context_cull_disabled` — `cull_mode == CULL_DISABLED`

Status: **COVERED** ✓

---

### Requirement: Dependency Rendering — COVERED

`_create_edge()` creates:
1. `ImmediateMesh` with `PRIMITIVE_LINES` (the line)
2. `CylinderMesh` with `top_radius=0.0` (cone arrowhead), oriented via
   `Basis(Quaternion(Vector3.UP, dir))`, placed at `to_pos - dir*(height*0.5)`.
   This is an explicit rendering element confirming "direction is visually indicated."

`godot/tests/test_dependency_rendering.gd` — 4 tests:
- `test_edge_line_mesh_created` — finds ImmediateMesh child
- `test_direction_indicator_cone_created` — finds CylinderMesh with `top_radius == 0.0`
- `test_direction_cone_near_target` — asserts cone `position.distance_to(target) < 2.0`
- `test_cross_context_cone_is_orange` — asserts `r > 0.8` and `b < 0.3`

Status: **COVERED** ✓

