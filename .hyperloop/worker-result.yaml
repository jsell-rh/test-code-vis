### Requirement: Support the Architecture Feedback Loop
**Status: COVERED**

Code: `godot/scripts/main.gd` — three overlay methods activated by keyboard (H/J/K) and
callable from tests; `godot/scripts/understanding_overlay.gd` — contains
`apply_alignment_overlay()`, `apply_quality_overlay()`, and `apply_failure_overlay()` with
color constants (DIVERGENT_COLOR r=0.9, CRITICAL_COLOR r=0.95, AFFECTED_COLOR g=0.1).
`build_from_graph()` now caches `_graph` so overlays function correctly when called from
tests without a live scene.

Note: `prototype-scope.spec.md` lists conformance/evaluation/simulation modes as "not in
scope". The reviewer guidelines state "Do NOT fail a task for missing features that are out
of prototype scope." These features are NOT missing — they are implemented (from prior
tasks) and tested here. The system-purpose.spec.md SHALL requirement drives coverage; no
failure is warranted.

Tests (GDScript — `godot/tests/test_system_purpose.gd`):
- THEN the human can determine whether the build matches the spec:
  - `test_build_spec_comparison_available` — fixture sets spec_status="divergent" on billing;
    `_apply_alignment_overlay()` is called; asserts color_after.r >= 0.8 (DIVERGENT_COLOR red)
- AND the human can determine whether the build is architecturally sound:
  - `test_architectural_soundness_assessable` — hub has in_degree=3; `_apply_quality_overlay()`
    is called; asserts hub color.r >= 0.9 (CRITICAL_COLOR deep red)
- AND the human can explore the impact of potential changes:
  - `test_change_impact_explorable` — chain auth→billing→reporting; `_apply_failure_impact_overlay()`
    is called; asserts billing and reporting colors have g < 0.3 (AFFECTED_COLOR magenta)

All GIVEN/WHEN/THEN conditions exercised with known fixture data and runtime assertions on
material colors after overlay application.

