### Test Body Predicate Verification
Each critical THEN-clause was traced to its test assertion predicate:

- **Containment (nesting):** `mod_anchor.get_parent() == ctx_anchor` — correct predicate. PASS.
- **Labels readable:** `lbl.billboard == BaseMaterial3D.BILLBOARD_ENABLED and lbl.pixel_size > 0.0 and lbl.no_depth_test == true` — exact properties asserted. PASS.
- **Direction indicator (cone):** `cone.top_radius == 0.0` (CylinderMesh with pointed tip) placed within 2 units of target — correct rendering element, not a plain line. PASS.
- **Translucent bounded contexts:** `mat.transparency != TRANSPARENCY_DISABLED and mat.albedo_color.a < 1.0` — correct. PASS.
- **Containment size:** `ctx_mesh.size.x > mod_mesh.size.x` on actual BoxMesh nodes — not a dict-key check. PASS.
- **Size proportionality:** `abs(large_mesh.size.x / small_mesh.size.x - 3.0) < 0.001` — exact ratio. PASS.

### Direction Test Derivations (independently derived)
Spec requires non-inverted pan (Google Maps analogy: drag right → scene reveals left content → pivot moves right). Test asserts `cam._pivot.x > initial_x` after drag right. Predicate matches the spec reference. PASS.

Orbit: drag right → phi changes; drag up → theta changes. Both asserted as `!= initial` value. PASS.

