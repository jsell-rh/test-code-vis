## Implementation Summary

All 5 requirements from `specs/prototype/ux-polish.spec.md` are implemented in
`godot/scripts/camera_controller.gd` and covered by named behavioral tests in
`godot/tests/test_camera_controls.gd`.

- **Pan (LMB)**: Lines 101–103 set `_panning = true` on LMB press; lines 141–158 compute
  non-inverted pivot offset from `transform.basis`.
- **Non-inverted**: `right = basis.x`; `_target_pivot += right * delta.x * pan_amount` ensures
  drag-right → pivot-right.
- **Zoom toward cursor**: `_zoom_toward_point()` (lines 168–176) computes zoom ratio and shifts
  `_target_pivot` toward/away from cursor world point.
- **Orbit around cursor**: `begin_orbit_at_world_point()` (lines 73–85) sets `_pivot = world_pt`
  and recomputes spherical coordinates without camera jump.
- **Smooth movement**: Exponential smoothing in `_process()` (lines 42–47) using
  `lerpf(_distance, _target_distance, t)` and `_pivot.lerp(_target_pivot, t)`.

All 91 GDScript tests pass. All 13 check scripts exit 0. No prohibited features detected.
