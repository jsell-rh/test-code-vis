### Notes
The camera-controls tests emit Godot `ERROR: Node not inside tree` messages during
the headless run because `CameraScript.new()` (a `Camera3D` subclass) calls
`look_at()` in `_update_transform()` while not parented to a scene tree. This is a
cosmetic issue with the test harness; all assertions target internal state variables
(`_distance`, `_theta`, `_phi`, `_pivot`) and all 8 tests pass correctly. No action
required for this prototype.

### Conclusion
All four check scripts pass. Every THEN clause from the relevant prototype-scope
scenarios is implemented in `main.gd` / `camera_controller.gd` and validated by
GDScript behavioral tests that instantiate real `Node3D` objects, invoke
`build_from_graph()` with known fixture data, and assert on scene-tree properties
(positions, mesh sizes, material transparency/cull_mode, label billboard/pixel_size,
camera spherical coordinates).
