### Scenarios: Top-down overview / Zooming in / Orbiting — COVERED ✅

**Implementation**: Spherical coordinates; `_theta = 0.15` (near top-down); WHEEL_UP/DOWN adjusts
`_distance`; middle-mouse drag adjusts `_phi` and `_theta`; `look_at(_pivot, Vector3.UP)` keeps
up-direction intuitive; Label3D with BILLBOARD_ENABLED + no_depth_test stays legible at all zoom levels.

**Tests** (`test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4` ✅
- `test_initial_distance_is_positive` — asserts `_distance > 0` ✅
- `test_scroll_up_decreases_distance` — fires WHEEL_UP, asserts `_distance` decreased ✅
- `test_scroll_down_increases_distance` — fires WHEEL_DOWN, asserts `_distance` increased ✅
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse press + motion, asserts `_phi != initial` ✅
- `test_orbit_vertical_drag_changes_theta` — vertical drag, asserts `_theta != initial` ✅
- `test_set_pivot_updates_state` — asserts `_pivot == new_pivot` after `set_pivot()` ✅
- `test_zoom_clamped_at_minimum` — 200 scroll-ups, asserts `_distance >= min_distance` ✅

