## task-007: Godot Application Spec — PASS

Reviewer: spec-alignment-reviewer (2026-04-23).
Spec file: `specs/prototype/godot-application.spec.md`

All 6 SHALL/MUST requirements are fully implemented in GDScript and covered
by GDScript behavioral tests in `godot/tests/` that instantiate real Node3D
objects and assert runtime property values.

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`)
- `_ready()` opens JSON from `scene_graph_path`, parses with `JSON.new()`, passes
  result to `build_from_graph()`.
- `build_from_graph()` iterates all nodes → `_create_volume()` per node; iterates
  all edges → `_create_edge()` per edge; anchors are positioned from
  `position.{x,y,z}` JSON fields.
- `SceneGraphLoader.load_from_dict()` (`scene_graph_loader.gd`) validates and
  preserves all node/edge fields.

**Tests** (`godot/tests/test_scene_graph_loading.gd`) — covers every THEN clause:
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1")` and
  `_anchors.has("mod1")` after `build_from_graph()`.
- `test_mesh_instances_exist_in_anchors` — finds `MeshInstance3D` child in each anchor.
- `test_edge_mesh_instances_created` — counts ≥ 2 `MeshInstance3D` direct children on
  main node (line mesh + arrowhead cone per edge).
- `test_anchor_positions_match_json` — asserts `anchor.position` equals `Vector3`
  values from the JSON `position` dict.
- `test_labels_are_billboard_and_readable` — asserts `Label3D.billboard ==
  BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` (covers the
  "labels scale to remain readable" clause from Camera Controls / Zooming in).

---

### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd` → `_create_volume()`)
- `bounded_context` nodes: `BoxMesh` with `TRANSPARENCY_ALPHA`, `albedo_color.a =
  0.18`, `CULL_DISABLED` — large, translucent, visible from all angles.
- `module` nodes: `BoxMesh` with `albedo_color.a = 1.0`, default cull — smaller,
  fully opaque.
- Module anchors are `add_child`-ed to the *parent context* anchor (real scene-tree
  nesting), so child volumes are physically inside the parent in 3D space.
- `BoxMesh.size = Vector3(sz, …)` where `sz = float(nd["size"])` — context size
  > module size in normal data.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` — `transparency != DISABLED && alpha < 1`.
- `test_module_is_opaque` — `alpha >= 1.0`.
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled` — `cull_mode == CULL_DISABLED`.

---

### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd` → `_create_edge()`)
- `ImmediateMesh` with `PRIMITIVE_LINES` draws a line from source world-position to
  target world-position.
- `CylinderMesh` with `top_radius = 0.0` (pointed cone) placed at the *target* end,
  oriented along the edge direction — explicit visual direction indicator.
- Cross-context edges use orange `Color(1.0, 0.50, 0.10)`; internal edges use grey
  `Color(0.55, 0.55, 0.55)`.

**Tests** (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — finds `ImmediateMesh` child on main node.
- `test_direction_indicator_cone_created` — finds `CylinderMesh` with `top_radius == 0`.
- `test_direction_cone_near_target` — cone within 2 units of target node position.
- `test_cross_context_cone_is_orange` — `albedo_color.r > 0.8 && .b < 0.3`.

