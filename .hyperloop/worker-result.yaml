## Root Cause of Prior pr-feedback-addressed Loop

Every prior iteration of this worker-result.yaml used "### Scope Check Output"
(three hashes) as the heading. The check-report-scope-section.sh script greps for
"^## Scope Check Output" (exactly two hashes). The mismatch caused the check to fail
on every cycle even though the underlying scope check itself passed, triggering the
pr-feedback-addressed gate failure and looping back. This revision uses the correct
two-hash heading level.

