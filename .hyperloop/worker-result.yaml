### Requirement: View Specs as Intermediate Representation â€” COVERED

The LLM emits JSON; `parse_response()` returns a `Dictionary` (not raw geometry); `SceneInterpreter`
interprets that dict into scene mutations. No geometry is returned by the LLM layer.

**Scenario: LLM produces view spec**
- THEN emits a structured view specification (not raw 3D geometry):
  `parse_response()` returns a `Dictionary`.
  Test: `test_parse_response_returns_dictionary` asserts `result is Dictionary`. âś“
- AND view spec controls show/hide/highlight/arrange/annotate/connect:
  Six individual pass-through tests in `test_llm_view_generator.gd`:
  `test_parse_response_passes_through_show_op`, `..._hide_op`, `..._arrange_op`,
  `..._connect_op`, `..._highlight_op`, `..._annotate_op` â€” each asserts the op survives
  `parse_response()` filtering. âś“
- AND the 3D renderer interprets the view spec into a spatial scene:
  All tests in `test_scene_interpreter.gd` instantiate real `Node3D` objects, call
  `SceneInterpreter.apply()`, and assert actual scene-tree property values
  (`.visible`, `.position.x/y/z`, `albedo_color.r/g/b`, `label.billboard`, `label.pixel_size`).
  `test_all_six_ops_mutate_scene_correctly` is an end-to-end integration test. âś“

---

### Requirement: Fixed Visual Primitive Set â€” COVERED

`VALID_OPS` is a compile-time constant in `llm_view_generator.gd` listing exactly 6 strings:
`["show", "hide", "highlight", "arrange", "annotate", "connect"]`.
`_make_spec()` drops any op not in `VALID_OPS`.
`SceneInterpreter.apply()` uses a `match` with exactly 6 arms; unknown ops fall through silently.

**Scenario: LLM uses existing primitives**
- THEN composes from existing set only:
  `build_prompt()` embeds `VALID_OPS` in the prompt text.
  Tests: `test_build_prompt_contains_show_primitive`, `..._hide_primitive`,
  `..._highlight_primitive`, `..._arrange_primitive`, `..._annotate_primitive`,
  `..._connect_primitive` â€” each asserts the primitive name appears in the prompt. âś“
- AND no new rendering logic generated at runtime:
  `_make_spec()` filters unknown ops; `SceneInterpreter.apply()` match ignores unknown arms.
  Tests: `test_parse_response_filters_unknown_ops` asserts unknown op is dropped and only
  `"show"` survives; `test_unknown_op_is_ignored` asserts a `"teleport"` op causes no crash
  and no scene mutation. âś“

