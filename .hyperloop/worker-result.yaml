### Requirement: Containment Rendering — COVERED

bounded_context nodes: `mat.transparency = TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`,
`cull_mode = CULL_DISABLED`.
module nodes: `albedo_color.a = 1.0` (fully opaque).
Child module anchors are `add_child`-ed to the parent context anchor (scene-tree nesting).

Tests (assert actual material properties on instantiated nodes):
  test_bounded_context_is_translucent    — mat.transparency != DISABLED, a < 1.0
  test_module_is_opaque                  — mat.albedo_color.a >= 1.0
  test_module_parented_inside_context    — mod_anchor.get_parent() == ctx_anchor
  test_bounded_context_larger_than_module — ctx BoxMesh.size.x > mod BoxMesh.size.x
  test_bounded_context_cull_disabled     — mat.cull_mode == CULL_DISABLED

