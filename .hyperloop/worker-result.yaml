## Requirement: Size Encoding — COVERED

**Spec**: MUST encode complexity metrics as the visual size of volumes.

**Implementation** (`godot/scripts/main.gd → _create_volume()`):
- `sz = float(nd["size"])` → `box.size = Vector3(sz, sz * 0.6, sz)` — mesh width is directly
  proportional to the `size` metric, so size ratios in the JSON map exactly to mesh size ratios.

**Tests** (`godot/tests/test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — fixture sizes 3.0 vs 9.0; asserts `large_mesh.size.x > small_mesh.size.x` ✓
- `test_mesh_sizes_proportional_to_metric` — asserts ratio == 9.0/3.0 = 3.0 within 0.001 ✓

