### Requirement: Fixed Visual Primitive Set — COVERED

**Implementation:**
- `VALID_OPS = ["show","hide","highlight","arrange","annotate","connect"]` declared as a
  `const` at `llm_view_generator.gd:31`. This list is embedded verbatim in the prompt.
- `_make_spec()` (line 122) filters ops to VALID_OPS — unknown ops silently dropped before
  reaching the renderer.
- `SceneInterpreter.apply()` dispatches via a `match op.get("op","")` block covering only
  the six known ops; any other value falls through silently.

