## Pipeline Wiring (Guidelines §"Verify multi-stage pipeline completeness")

Stage 1 — `LLMViewGenerator` (`llm_view_generator.gd`):
- `build_prompt(question, graph)` → embeds question + node ids + `VALID_OPS` into LLM prompt.
- `parse_response(llm_text)` → returns `{"question": …, "operations": […]}` — a plain
  Dictionary, never raw geometry.

Stage 2 — `SceneInterpreter` (`scene_interpreter.gd`):
- `apply(spec, anchors, scene_root, world_positions)` → reads the return value of
  `parse_response()` and mutates live `Node3D` scene-tree objects.

Wiring — `main.gd`:
- `apply_view_spec(spec)` instantiates `SceneInterpreter` and passes the real
  `_anchors` and `_world_positions` maps built by `_ready()`.
- `_ready()` is NOT empty: it calls `FileAccess.open()`, `JSON.parse()`,
  `SceneGraphLoader.load_from_dict()`, and `build_from_graph()`.

Pipeline is complete end-to-end. No stub or empty function found.

