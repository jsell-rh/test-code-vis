### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:** `godot/scripts/main.gd::_ready()` reads the JSON file
via `FileAccess.open()` + `get_as_text()`, parses it with `JSON.new()`,
calls `SceneGraphLoader.load_from_dict()`, then `build_from_graph()`.
`build_from_graph()` creates a `Node3D` anchor + `MeshInstance3D` (BoxMesh)
+ `Label3D` for every node, calls `_create_edge()` for every edge, and sets
`anchor.position` from the JSON `position` field.

**Tests:** `godot/tests/test_scene_graph_loading.gd`
- `test_volumes_created_for_each_node` — PASS
- `test_mesh_instances_exist_in_anchors` — PASS
- `test_edge_mesh_instances_created` — PASS
- `test_anchor_positions_match_json` — PASS
- `test_labels_are_billboard_and_readable` — PASS

