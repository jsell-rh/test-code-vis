### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`)
- Spherical coordinates `(_theta, _phi, _distance)` around `_pivot`.
- Initial `_theta = 0.15 rad` (approximately 8.6 degrees from vertical) — predominantly top-down view.
- `MOUSE_BUTTON_WHEEL_UP/DOWN`: adjust `_distance` (zoom).
- `MOUSE_BUTTON_MIDDLE` drag: adjust `_phi` and `_theta` (orbit).
- `look_at(_pivot, Vector3.UP)`: maintains intuitive up-orientation.
- `set_pivot()`: called from `main.gd::_frame_camera()` after loading to frame the scene.
- Labels use `BILLBOARD_ENABLED` and `no_depth_test = true` for readability at all zoom levels.

**Tests** (`godot/tests/test_camera_controls.gd`, `test_scene_graph_loading.gd`)
| Scenario | Test method |
|---|---|
| Top-down: initial view | `test_initial_theta_is_near_top_down` (_theta < PI/4) |
| Top-down: camera positioned | `test_initial_distance_is_positive` |
| Zooming in: scroll up moves closer | `test_scroll_up_decreases_distance` |
| Zooming in: scroll down moves farther | `test_scroll_down_increases_distance` |
| Zooming in: labels remain readable | `test_labels_are_billboard_and_readable` (BILLBOARD_ENABLED, pixel_size > 0, no_depth_test) |
| Orbiting: horizontal drag | `test_orbit_horizontal_drag_changes_phi` |
| Orbiting: vertical drag | `test_orbit_vertical_drag_changes_theta` |
| Orbiting: up stays up (set_pivot) | `test_set_pivot_updates_state` |
| Zoom clamped | `test_zoom_clamped_at_minimum` |

