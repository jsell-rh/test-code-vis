## Independent THEN→Test Verification

All test function names independently confirmed present via grep in
`godot/tests/test_camera_controls.gd`. Test bodies read and assertion
predicates verified against THEN-clause predicates.

| # | THEN-clause | Test function | Predicate verified |
|---|---|---|---|
| 1 | Camera pans in direction of drag (LMB) | `test_lmb_drag_pans_camera` | `cam._pivot != initial_pivot` — pivot changes on LMB+drag ✓ |
| 2 | Movement non-inverted (drag direction matches) | `test_pan_direction_not_inverted` | `cam._pivot.x > 0.0` after +50px X drag at phi=PI/2 ✓ |
| 3 | Scene moves same direction as drag (Google Maps) | `test_pan_direction_not_inverted` | Same test — right drag → +X pivot shift matches spec ✓ |
| 4 | View zooms toward point under cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `cam._target_pivot.x > 0.0` when cursor at x=10, zoom in ✓ |
| 5 | Component under cursor stays under cursor | `test_zoom_in_cursor_point_invariant` | `0 < pivot.x < 20` — new pivot between old pivot and cursor ✓ |
| 6 | View zooms out from point under cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | `cam._target_pivot.x < 0.0` — pivot shifts away from cursor ✓ |
| 7 | Camera orbits around cursor point at orbit start | `test_orbit_around_cursor_point` | `cam._pivot == world_pt` after `begin_orbit_at_world_point()` ✓ |
| 8 | Component remains at visual centre during orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` ✓ |
| 9 | Zoom animated smoothly (not instantaneous) | `test_smooth_zoom_target_differs_from_distance_after_scroll` | `cam._target_distance < cam._distance` immediately after scroll ✓ |
| 9b | Zoom interpolates each frame | `test_smooth_zoom_process_interpolates_distance` | `20 < _distance < 40` after `_process(0.1)` with target=20, dist=40 ✓ |
| 10 | Pan proportional to drag speed | `test_pan_proportional_to_drag_speed` | 50px drag pivot.length() > 10px drag pivot.length() ✓ |

**Clamping boundary tests** (required by `check-clamp-boundary-tests.sh`):
- `test_set_pivot_clamps_distance_at_minimum` — `set_pivot(ZERO, 0.0)` → `_distance >= min_distance` ✓
- `test_theta_clamped_at_minimum` — huge upward drag → `_theta >= 0.01` ✓
- `test_theta_clamped_at_maximum` — huge downward drag → `_theta <= PI - 0.01` ✓

