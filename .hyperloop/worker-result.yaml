## Detailed Findings

### Requirement: JSON Scene Graph Loading — COVERED

`main.gd:_ready()` is a full non-stub implementation: opens file with
`FileAccess.open()` + `get_as_text()` (correct Godot 4.x API), parses via `JSON.new()`,
delegates to `SceneGraphLoader.load_from_dict()`, then calls `build_from_graph()` which
iterates nodes → `_create_volume()`, iterates edges → `_create_edge()`, and sets
`anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))` from JSON layout.

`test_scene_graph_loading.gd` (5 tests): exercises `build_from_graph()` with fixture data
and asserts on real `Node3D` instances — positions via `is_equal_approx()`, mesh children
by class type, edge mesh count. `test_anchor_positions_match_json` asserts
`anchor.position.is_equal_approx(Vector3(2.0, 0.0, 2.0))` on an actual Node3D (not a
dict key check). `test_labels_are_billboard_and_readable` asserts `billboard ==
BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` on a real Label3D.

### Requirement: Containment Rendering — COVERED

`_create_volume()` branches on `nd["type"] == "bounded_context"`:
- Context: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED` → translucent slab
- Module: `albedo_color.a = 1.0` → opaque box
- Child anchors are added to `parent_anchor` (fetched from `_anchors`) → scene-tree nesting

`test_containment_rendering.gd` (5 tests): asserts `mat.transparency !=
TRANSPARENCY_DISABLED` and `mat.albedo_color.a < 1.0` on instantiated material;
`mod_anchor.get_parent() == ctx_anchor` on real Node3D objects; `ctx_mesh.size.x >
mod_mesh.size.x` on instantiated BoxMesh; `mat.cull_mode == CULL_DISABLED`.

### Requirement: Dependency Rendering — COVERED

`_create_edge()` creates (1) `ImmediateMesh` with `PRIMITIVE_LINES` for the line, and
(2) `CylinderMesh` with `top_radius=0.0` (pointed arrowhead cone) at the target end,
oriented via `Basis(Quaternion(Vector3.UP, dir))`. This is an explicit rendering element,
not merely a colour difference — satisfying "direction is visually indicated."

`test_dependency_rendering.gd` (4 tests): confirms `ImmediateMesh` exists, confirms
`CylinderMesh` with `top_radius == 0.0` exists, asserts cone position within 2 units of
target, asserts orange colour (R > 0.8, B < 0.3) for cross_context edges.

### Requirement: Size Encoding — COVERED

`sz = float(nd["size"])` → `box.size = Vector3(sz, sz * 0.6, sz)`. The width ratio
matches the input size ratio exactly.

`test_size_encoding.gd` (2 tests): fixture has small_mod size=3, large_mod size=9.
Asserts `large_mesh.size.x > small_mesh.size.x` and `abs(ratio - 3.0) < 0.001` on
instantiated BoxMesh objects.

### Requirement: Camera Controls — COVERED

`camera_controller.gd`: spherical-coordinate orbit. `_theta = 0.15` (≈8.6° from vertical,
satisfies top-down). Scroll wheel adjusts `_distance` (clamped). Middle-mouse drag adjusts
`_phi` and `_theta`. `look_at(_pivot, Vector3.UP)` always called → "up stays up."

`test_camera_controls.gd` (7 tests): asserts `_theta < PI/4.0` for top-down; simulates
`MOUSE_BUTTON_WHEEL_UP/DOWN` and asserts distance change; simulates middle-mouse drag and
asserts `_phi` / `_theta` change; verifies zoom clamped at `min_distance` after 200
scroll-up events; verifies `set_pivot()` updates `_pivot` and `_distance`.

### Requirement: Godot 4.6 — COVERED

`project.godot` declares `config/features=PackedStringArray("4.6")`. All scripts are `.gd`.
`main.gd` uses `FileAccess.open()` + `get_as_text()`. Compiled against Godot 4.6.2.

`test_engine_version.gd` (3 tests): reads `project.godot` via `FileAccess.open()` +
`get_as_text()` at runtime; asserts `content.contains("4.6")`, `content.contains("\"4.6\"")`,
and `content.contains("main.tscn") and not content.contains(".cs")`. This also exercises
the `_ready()` file-I/O code path required by `godot-fileaccess-tested.sh`.

