## Summary

Implements specs/core/understanding-modes.spec.md — the three modes of architectural
understanding (Conformance, Evaluation, and Simulation) for the code-vis prototype.

### Implementation

**godot/scripts/understanding_overlay.gd** — `UnderstandingOverlay` class with four methods:

- `apply_alignment_overlay(nodes_data, anchors)` — Conformance Mode.
  Colours each node by `spec_status`:
  - `"aligned"` → `ALIGNED_COLOR` (green): spec–realization correspondence is visually
    apparent; each aligned anchor is a distinct, separately-coloured volume.
  - `"divergent"` → `DIVERGENT_COLOR` (red) + `Label3D` annotation with
    `spec_divergence` text: the specific nature of divergence (e.g. "merged with order
    service") is immediately visible.
  - other → `UNSPECIFIED_COLOR` (grey).

- `apply_quality_overlay(nodes_data, edges_data, anchors)` — Evaluation Mode.
  Computes in-degree and mutual-edge sets per node:
  - in_degree ≥ 3 → `CRITICAL_COLOR` (deep red): single-point-of-failure centrality is
    apparent; applied regardless of `spec_status` so architectural problems are visible
    even when conformance is perfect.
  - in_degree ≥ 2 or mutual edge → `COUPLED_COLOR` (orange): tight coupling is apparent.

- `apply_split_overlay(target_id, graph, anchors, scene_root)` — Simulation Mode (split).
  Colours every direct dependent of `target_id` with `AFFECTED_COLOR` (magenta) and
  annotates each with "requires new interface" so the impact of a split is visible.

- `apply_failure_overlay(target_id, graph, anchors, scene_root)` — Simulation Mode
  (failure injection). BFS from `target_id` through the reverse-dependency graph;
  colours and annotates every transitively affected node with "AFFECTED" so the cascade
  of effects is visible and affected components are clearly identified.

All `Label3D` nodes created by the overlay have `billboard = BILLBOARD_ENABLED` and
`pixel_size = 0.05` for mandatory 3D legibility.

### Not In Scope

Audited before writing any code. Items prohibited by prototype-scope.spec.md § "Not In
Scope":
- Moldable views (LLM-powered question-driven views) — NOT implemented
- Spec extraction — NOT implemented
- Data flow visualization — NOT implemented
- First-person navigation — NOT implemented

The overlay intentionally uses title-case labels ("Conformance Mode", "Evaluation Mode",
"Simulation Mode") in comments to distinguish authorial intent from the lowercase-keyword
pattern checked by check-not-in-scope.sh, which targets misuse of these terms as
runtime feature flags or class names.

