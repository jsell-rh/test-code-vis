## Conflict Resolution Notes

The rebase onto origin/main required resolving conflicts in:

1. **extractor/extractor.py** — Used new dynamic `_scene_bound` formula from main
   while keeping the local-offset-only storage fix (no `px + pos[0]` accumulation).

2. **extractor/tests/test_extractor.py** — Merged improved docstrings from HEAD
   with the updated test `test_child_position_is_relative_offset_not_absolute` from
   our commits which uses the `_scene_bound` formula.

3. **godot/scripts/camera_controller.gd** — task-007 (PR#195) reset the camera to a
   simpler version without zoom-toward-cursor, orbit-around-mouse, or smooth zoom.
   The UX Polish spec requires these features. Restored the full implementation from
   the prior PASS submission including:
   - LMB pan (grab model, non-inverted)
   - RMB orbit around cursor point at gesture start
   - Scroll wheel zoom toward cursor with smooth interpolation
   - `_zoom_toward_cursor`, `_set_orbit_pivot`, `_mouse_to_ground` helpers
   - `_target_distance` and `zoom_smoothing` for smooth animation

4. **godot/tests/test_ux_polish.gd** — Kept HEAD version with full directional
   derivation comments and all 5 directional test functions.
