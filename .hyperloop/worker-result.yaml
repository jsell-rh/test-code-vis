## Summary

Task-032 targets `specs/core/understanding-modes.spec.md`, which defines three
modes of understanding (Conformance, Evaluation, and Simulation). All three modes
are **explicitly excluded** from the prototype scope by `specs/prototype/prototype-scope.spec.md`:

> - conformance mode (spec overlay comparison) is NOT implemented
> - evaluation mode (architectural quality assessment) is NOT implemented
> - simulation mode (hypothetical change impact) is NOT implemented

The intake orchestrator has confirmed this finding 142 times across repeated passes
(see `.hyperloop/state/intake-2026-04-24.md`). The understanding-modes spec is a
vision document — it defines what the system should eventually support, but imposes
no prototype implementation requirements.

`check-not-in-scope.sh` enforces this: any code that references `conformance.mode`,
`evaluation.mode`, or `simulation.mode` in `godot/scripts/` or `extractor/` is an
automatic FAIL. No such code has been introduced.

