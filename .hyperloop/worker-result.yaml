### Requirement: Containment Rendering — COVERED

**Implementation:** `godot/scripts/main.gd`
- Lines 65-76: child volumes parented to parent anchors (modules become Godot children of
  their bounded-context anchor), making them visually nested.
- `_create_volume()` lines 138-153:
  - `bounded_context`: `mat.transparency = TRANSPARENCY_ALPHA`, `mat.albedo_color.a = 0.18`
    (translucent), `mat.cull_mode = CULL_DISABLED` (visible from both sides — visually distinct).
  - `module`: `mat.albedo_color = Color(0.35, 0.70, 0.40, 1.0)` (fully opaque).
  - Size: context `box.size.x = sz` (10.0 in fixture) vs module `box.size.x = sz` (3.0) — context
    is always larger when the fixture has a larger size value.

**Scenario: Modules inside a bounded context — all THEN clauses tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| bounded context is larger translucent volume | `test_bounded_context_is_translucent` | `transparency != DISABLED and albedo_color.a < 1.0` |
| bounded context larger volume (size) | `test_bounded_context_larger_than_module` | `ctx_mesh.size.x > mod_mesh.size.x` |
| child modules are smaller opaque volumes | `test_module_is_opaque` | `mat.albedo_color.a >= 1.0` |
| modules visually inside parent | `test_module_parented_inside_context` | `mod_anchor.get_parent() == ctx_anchor` |
| boundary visually distinct | `test_bounded_context_cull_disabled` | `mat.cull_mode == CULL_DISABLED` |

All five tests pass.

