### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd` `_create_edge()`)
- Builds an `ImmediateMesh` with `PRIMITIVE_LINES` between `from_pos` and `to_pos`.
- Creates a `CylinderMesh` with `top_radius = 0.0` (cone/arrowhead) positioned at the
  target end and oriented along the edge direction — explicit directional indicator.
- Cross-context edges rendered orange (`Color(1.0, 0.50, 0.10)`); internal edges grey.

**Tests** (`godot/tests/test_dependency_rendering.gd`)
| THEN clause | Test method |
|---|---|
| a line connects the two context volumes | `test_edge_line_mesh_created` (ImmediateMesh found) |
| line's direction is visually indicated | `test_direction_indicator_cone_created` (CylinderMesh top_radius==0 found) |
| cone is near target end | `test_direction_cone_near_target` (distance to target_pos < 2 units) |
| cross-context colour distinction | `test_cross_context_cone_is_orange` |

