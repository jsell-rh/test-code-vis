### Requirement: Godot 4.6 — COVERED

**Code:** `godot/project.godot` declares
`config/features=PackedStringArray("4.6", "GL Compatibility")`. All scripts in
`godot/scripts/` are `.gd` (GDScript only). `main.gd` uses `FileAccess.open()` +
`get_as_text()` — the valid Godot 4.6 API (the deprecated `read_as_text()` is absent).

**Tests:** `godot/tests/test_engine_version.gd` — 3 behavioral tests that read
`project.godot` at runtime via `FileAccess.open()` + `get_as_text()`:
- `test_project_godot_declares_46` — `"4.6" in text`
- `test_features_line_contains_46` — `'PackedStringArray("4.6")' in text`
- `test_fileaccess_open_returns_non_null` — exercises the FileAccess API path

Status: **COVERED** ✓

