## Requirement: Simulation Mode — COVERED

**Implementation:** `simulate_split()`, `render_split_impact()`, `simulate_failure()`,
and `render_failure_cascade()` in `godot/scripts/understanding_analyzer.gd`.

- `simulate_split()` finds direct dependents and generates `new_interfaces` entries for
  each dependent.
- `simulate_failure()` performs BFS through the reverse dependency graph to collect the
  full transitive cascade.
- Both `render_*` functions highlight affected nodes and add `Label3D` annotations.

### Scenario: Splitting a service
| THEN-clause | Test | Assertion |
|---|---|---|
| impact on dependent services is visible | `test_split_dependents_detected` | `dependents.has("client_a")` and `dependents.has("client_b")` |
| new dependencies or interfaces that would be required are shown | `test_split_new_interfaces_shown` | `new_interfaces.size() >= 1`; caller MeshInstance3D has `HIGHLIGHT_COLOR`; Label3D with "split" in text |

### Scenario: Failure injection
| THEN-clause | Test | Assertion |
|---|---|---|
| cascade of effects through the system is visible | `test_failure_cascade_detected` | `cascade.has("api")` and `cascade.has("frontend")` (transitive BFS through db→api→frontend) |
| components that would be affected are clearly identified | `test_failure_affected_nodes_highlighted` | `consumer_1` MeshInstance3D has `HIGHLIGHT_COLOR`; Label3D with "FAILED" on failed node |

