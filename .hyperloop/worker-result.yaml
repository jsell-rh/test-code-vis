### Requirement: Size Encoding — COVERED

**Implementation**: `_create_volume()` sets `box.size = Vector3(sz, sz * 0.6, sz)` where
`sz = float(nd["size"])`. Mesh width (x) is therefore directly proportional to the input size
metric, producing visually proportional volumes.

**Scenario: Large module vs small module** — covered by `test_size_encoding.gd` (2 tests),
fixture uses `size: 3.0` (small_mod) vs `size: 9.0` (large_mod):
- THEN the module with more code appears as a larger volume: `test_large_module_has_bigger_mesh()`
  asserts `large_mesh.size.x > small_mesh.size.x`.
- AND the relative sizes are proportional: `test_mesh_sizes_proportional_to_metric()` asserts
  `|actual_ratio - 3.0| < 0.001` (exact floating-point proportionality verified).

