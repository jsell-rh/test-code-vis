### Requirement: Two-Stage Pipeline — COVERED

**Implementation:**
- `extractor/__main__.py` runs the Python extractor and writes a JSON file.
- `godot/scripts/main.gd` (`_ready()`) reads the JSON with `FileAccess.open()`,
  parses it with `JSON.new()`, and calls `build_from_graph()`.

**Scenario: Extraction then visualization — COVERED**
- JSON production: `TestSceneGraphOutput` in `extractor/tests/test_extractor.py`
  verifies `build_scene_graph()` produces a dict with `nodes`, `edges`, `metadata`,
  is JSON-serialisable, and contains expected node ids and positions.
- Godot loading: `test_scene_graph_loading.gd` tests `build_from_graph()` with a
  fixture dict and asserts volumes, edges, and positions are rendered correctly.

---

### Requirement: Top-Down Architectural View — COVERED

**Implementation:**
- `camera_controller.gd`: `_theta = 0.15` rad (≈8.6° from directly above).
- `main.gd` `_create_volume()`: bounded-context nodes are translucent
  `BoxMesh` slabs; `_create_edge()` draws `ImmediateMesh` lines between them.
- `extractor.py` `_order_by_coupling()` + `compute_layout()`: places tightly
  coupled BCs adjacent in the ring, reflecting coupling in spatial position.

**Scenario: Viewing kartograph from above — COVERED**
- Distinct volumes: `test_containment_rendering.gd` `test_bounded_context_is_translucent`.
- Coupling-aware positioning: `TestLayout.test_coupled_bcs_are_closer_than_uncoupled`
  in `test_extractor.py`.
- Dependency connections visible: `test_dependency_rendering.gd`
  `test_edge_line_mesh_created`.

---

### Requirement: Zoom to Detail — COVERED

**Implementation:**
- `camera_controller.gd`: WHEEL_UP/WHEEL_DOWN change `_distance`; the camera moves
  closer, making nested module geometry occupy more screen area.
- Internal modules exist in the scene graph for all BCs (e.g., iam.domain,
  iam.application, iam.infrastructure, iam.presentation) and are always rendered.

**Scenario: Zooming into IAM — COVERED**
- Zoom mechanism: `test_camera_controls.gd` `test_scroll_up_decreases_distance` and
  `test_scroll_down_increases_distance`.
- Internal layers present in scene: `test_scene_graph_loading.gd`
  `test_mesh_instances_exist_in_anchors` (child nodes rendered inside parent anchor).
- Internal dependencies: `test_dependency_rendering.gd`
  `test_edge_line_mesh_created` covers both internal and cross-context edges.
- Relative sizes: `test_size_encoding.gd` verifies larger LOC → larger mesh.

Note: "becomes visible as camera approaches" is an emergent visual property of zoom;
no headless test can assert rendering visibility, but the zoom mechanism and nested
structure are both explicitly tested.

