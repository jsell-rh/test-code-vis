## Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:** `godot/scripts/main.gd`
- `_ready()` (lines 31-46): opens the JSON file via `FileAccess.open()` + `get_as_text()`,
  parses it with `JSON.new()`, then delegates to `build_from_graph()`.
- `build_from_graph()` (lines 51-83): iterates `nodes` to create volumes via `_create_volume()`
  and iterates `edges` to create lines + arrowheads via `_create_edge()`.
- `_create_volume()` (lines 121-165): sets `anchor.position = Vector3(p["x"], p["y"], p["z"])`
  directly from the JSON layout data — no layout recomputation.

**Scenario: Loading kartograph's scene graph — all THEN clauses tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| reads the JSON file | `test_fileaccess_open_returns_non_null` (test_engine_version.gd) | `FileAccess.open(...) != null` |
| generates 3D volumes for each node | `test_volumes_created_for_each_node` (test_scene_graph_loading.gd) | `_anchors.has("ctx1") and _anchors.has("mod1")` |
| volumes contain MeshInstance3D | `test_mesh_instances_exist_in_anchors` | iterates anchors, finds `child is MeshInstance3D` |
| generates connections for each edge | `test_edge_mesh_instances_created` | counts MeshInstance3D on main node, asserts ≥ 2 |
| positions elements from layout data | `test_anchor_positions_match_json` | `anchor.position.is_equal_approx(Vector3(...))` |

All five tests pass at runtime (confirmed by godot-tests.sh output: 57/57 pass).

