## Requirement-by-Requirement Findings

### Requirement: Target Codebase — COVERED

**Spec:** The prototype MUST use the kartograph codebase as its target system.

**Scenario: Loading kartograph**

| Element | Location |
|---|---|
| Implementation | `extractor/__main__.py` → `build_scene_graph()` runs against `~/code/kartograph/src/api`; `godot/scripts/main.gd::_ready()` loads `res://data/scene_graph.json` |
| Test (Python) | `extractor/tests/test_kartograph_integration.py` → `test_kartograph_integration_bounded_contexts`: runs CLI against real kartograph, asserts iam/graph/shared_kernel contexts present |
| Test (Python) | `extractor/tests/test_kartograph_integration.py` → `test_kartograph_extraction_produces_modules`: verifies module-level nodes are present, confirming actual structure is reflected |

Both kartograph integration tests are marked `skipif` when the codebase is absent (CI-safe),
and they run against the real codebase when available. The GIVEN/WHEN/THEN is fully exercised.

---

### Requirement: Two-Stage Pipeline — COVERED

**Spec:** The system MUST operate as a two-stage pipeline: Python extractor → JSON scene graph
→ Godot application.

**Scenario: Extraction then visualization**

| Element | Location |
|---|---|
| Implementation (stage 1) | `extractor/__main__.py::main()` → `build_scene_graph()` → JSON file written |
| Implementation (stage 2) | `godot/scripts/main.gd::_ready()` → `FileAccess.open()` + `JSON.new().parse()` → `build_from_graph()` |
| Test (Python — stage 1) | `extractor/tests/test_cli.py::test_main_writes_json_output`: CLI writes valid JSON with nodes/edges/metadata |
| Test (GDScript — stage 2) | `godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node`: build_from_graph() creates Node3D anchors |

---

### Requirement: Top-Down Architectural View — COVERED

**Spec:** The prototype MUST provide a top-down camera view showing the overall system
architecture.

**Scenario: Viewing kartograph from above**

| THEN-clause | Implementation | Test |
|---|---|---|
| All bounded contexts visible as distinct volumes | `main.gd::_create_volume()` creates BoxMesh anchor per node | `test_scene_graph_loading.gd::test_volumes_created_for_each_node` |
| Relative positions reflect coupling | `extractor.py::compute_layout()` uses coupling-aware greedy nearest-neighbour ordering | `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled` |
| Dependencies visible as connections | `main.gd::_create_edge()` creates ImmediateMesh line + CylinderMesh arrowhead | `test_dependency_rendering.gd::test_edge_line_mesh_created` |
| Camera defaults to top-down | `camera_controller.gd::_theta = 0.15` (≈ 8.6° from vertical) | `test_camera_controls.gd::test_initial_theta_is_near_top_down` |

---

### Requirement: Zoom to Detail — COVERED

**Spec:** The prototype MUST allow the user to zoom into a bounded context to see its
internal structure.

**Scenario: Zooming into IAM**

| THEN-clause | Implementation | Test |
|---|---|---|
| Internal layers become visible | `lod_manager.gd::_apply_medium/near()` shows module nodes | `test_spatial_structure.gd::test_medium_distance_shows_modules` |
| Internal dependencies shown | `lod_manager.gd::_apply_near()` shows all edges | `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail` |
| Relative sizes of internal modules visible | `main.gd::_create_volume()` maps `nd["size"]` to `BoxMesh.size.x` | `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` |
| Camera can zoom | `camera_controller.gd::_handle_button()` WHEEL_UP/DOWN → `_zoom_toward_cursor()` | `test_camera_controls.gd::test_scroll_up_decreases_distance` |

