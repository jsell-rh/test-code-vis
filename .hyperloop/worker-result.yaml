## Methodology

For each SHALL requirement I verified:
1. Production code that implements it (file + logic).
2. GDScript behavioral tests in `godot/tests/` that exercise the exact
   Given/When/Then conditions with known fixture data and assert on
   runtime outputs (scene-tree nodes, property values, mesh types, positions).

Tests run via `godot --headless --path godot/ --script tests/run_tests.gd`,
which calls `build_from_graph()` / `_handle_button()` / `_handle_motion()`
directly on instantiated objects and asserts on `_anchors`, `position`,
material properties, mesh types, etc. This is runtime behavioral coverage,
not compilation checking.

