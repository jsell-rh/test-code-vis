### Spec Scenario Coverage

**Module Discovery — Bounded contexts** ✓
`discover_bounded_contexts()` discovers top-level Python packages, excluding
`_NON_CONTEXT_DIRS`. Each node carries `id`, `name`, `type`, `parent`, `size`,
and `metrics`. Type hints present; no hardcoded paths (`src_path` is a CLI
argument).

**Module Discovery — Nested modules** ✓
`discover_submodules()` discovers internal packages within each bounded context
and sets `parent` to the BC id, representing containment correctly.
`test_node_module_parent_references_bounded_context` in GDScript asserts the
`parent == "iam"` value on a real loaded node.

**Dependency Extraction — Cross-context** ✓
`build_dependency_edges()` emits `{source, target, type:"cross_context"}` edges
at the BC level. Python test `test_cross_context_edge_created` and GDScript test
`test_edge_direction_preserved_source_to_target` cover the direction requirement.

**Dependency Extraction — Internal** ✓
Internal edges are emitted only from module-level nodes with
`type:"internal"`. `test_edge_types_are_distinguishable` in GDScript confirms
the two values differ.

**Complexity Metrics — Module size** ✓
`compute_loc()` recursively counts `.py` lines. The value is stored in
`metrics["loc"]` on each node. GDScript test `test_node_has_metrics_field`
asserts `node["metrics"]["loc"] == 150` against the fixture.

**JSON Scene Graph Output — Format** ✓
`build_scene_graph()` returns a `SceneGraph` TypedDict with `nodes`, `edges`,
and `metadata`. `__main__.py` serialises it as JSON. All required fields
(id, name, type, parent, metrics; source, target, type) are present and
validated by both Python and GDScript tests.

**Spec Extraction — Kartograph specs** ✓
`extract_spec_nodes()` discovers the `specs/` directory, assigns
`type:"spec"` and ids prefixed with `"spec."`. The `--specs` CLI flag enables
it. GDScript tests `test_spec_node_type_is_preserved` and
`test_spec_nodes_have_id_prefixed_with_spec` validate both distinguishers.

### Godot Code Quality

- `main.gd._ready()` has real implementation (loads JSON, calls
  `build_from_graph()`). Not a stub.
- `test_node_renderer.gd` instantiates `Main.new()`, calls
  `build_from_graph()`, and asserts `node.position.x/y/z` on live
  `MeshInstance3D` nodes — not dict-key-only checks.
- `test_scene_graph_loader.gd` covers every THEN clause in the spec.

