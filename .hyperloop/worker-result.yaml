### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` opens the file with `FileAccess.open()`, parses it with `JSON.new()`, calls
  `SceneGraphLoader.load_from_dict()`, then `build_from_graph()`.
- `build_from_graph()` → `_create_volume()` for each node, `_create_edge()` for each edge.
- `_compute_world_positions()` + `anchor.position = Vector3(p.x, p.y, p.z)` satisfies the
  "positions according to layout data" clause.

**Tests** (`godot/tests/test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1")` and
  `_anchors.has("mod1")` after `build_from_graph()`.
- `test_mesh_instances_exist_in_anchors` — asserts `MeshInstance3D` child present in
  every anchor.
- `test_edge_mesh_instances_created` — asserts ≥ 2 `MeshInstance3D` direct children on
  the main node (1 line + 1 arrowhead per edge).
- `test_anchor_positions_match_json` — asserts `anchor.position` exactly matches the
  JSON `position` dict values.

All four THEN/AND clauses of the scenario are covered.

