- AND its position reflects its coupling relationships
  тЖТ `test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled` (covered above).
- AND containment is shown by nesting (smaller volumes inside larger ones)
  тЖТ `test_containment_rendering.gd::test_module_parented_inside_context`:
    `mod_anchor.get_parent() == ctx_anchor`.
  тЖТ `test_containment_rendering.gd::test_bounded_context_larger_than_module`:
    ctx BoxMesh.size.x > mod BoxMesh.size.x.

Code: `main.gd::_create_volume()` тАФ BoxMesh only; `extractor.py::compute_layout()`.

