### Requirement: Size Encoding — COVERED

**Implementation:** `sz = float(nd["size"])` applied as `BoxMesh.size =
Vector3(sz, sz*0.6, sz)` for modules, so mesh width is linearly proportional
to the size metric.

**Tests:** `godot/tests/test_size_encoding.gd`
- `test_large_module_has_bigger_mesh` — PASS
- `test_mesh_sizes_proportional_to_metric` — PASS

