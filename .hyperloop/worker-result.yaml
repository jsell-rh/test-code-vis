## Test Registration

Both test suites are registered in godot/tests/run_tests.gd (lines 49-50):
  _run_suite(preload("res://tests/test_llm_view_generator.gd").new())
  _run_suite(preload("res://tests/test_scene_interpreter.gd").new())

All tests use the _check()/_test_failed pattern with the shared runner, so failures
are reported and the process exits non-zero on failure.
