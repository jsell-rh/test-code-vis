### Spec scenario coverage

**JSON Scene Graph Loading** — COVERED
- `test_scene_graph_loading.gd`: asserts anchors created per node, MeshInstance3D children
  present, edge mesh instances created, anchor positions match JSON x/y/z values.
- `test_node_renderer.gd`: asserts node positions equal JSON coordinates to floating-point
  precision for multiple nodes; confirms no Godot-side layout recomputation.

**Containment Rendering** — COVERED
- `test_containment_rendering.gd`: asserts bounded_context material has TRANSPARENCY_ALPHA
  and alpha < 1 (translucent); module material has alpha == 1 (opaque); module anchor is
  direct child of context anchor (parented inside); context BoxMesh.size.x > module's;
  context cull_mode == CULL_DISABLED (visually distinct boundary).

**Dependency Rendering** — COVERED (direction visually indicated)
- `test_dependency_rendering.gd`: asserts ImmediateMesh line mesh created; CylinderMesh
  with `top_radius == 0` (arrowhead cone) created and positioned within 2 units of
  target end; cross-context cone material albedo_color is orange (r > 0.8, b < 0.3).
  The cone is a genuine rendering artifact, not a colour-only distinction.

**Size Encoding** — COVERED
- `test_size_encoding.gd`: asserts large module BoxMesh.size.x > small module's;
  ratio of mesh sizes matches ratio of input size values (9/3 = 3.0) within 0.001.

**Camera Controls** — COVERED
- `test_camera_controls.gd`: asserts initial _theta < PI/4 (top-down), _distance > 0;
  MOUSE_BUTTON_WHEEL_UP decreases _distance (zoom in), WHEEL_DOWN increases it;
  middle-mouse horizontal drag changes _phi (orbit azimuth); vertical drag changes
  _theta (orbit elevation); set_pivot() updates _pivot and _distance; zoom is clamped
  at min_distance after 200 scroll-ups.
  Note: "Node not inside tree" ERRORs in output are expected in headless testing
  (Camera3D.look_at() needs scene tree); all 7 camera tests report PASS.

**Godot 4.6 Engine Version** — COVERED
- `test_engine_version.gd`: opens `res://project.godot` via FileAccess.open() +
  get_as_text() and asserts "4.6" is present and `PackedStringArray("4.6")` appears
  in the features line. Also satisfies godot-fileaccess-tested.sh requirement.

