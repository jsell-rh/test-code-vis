### Direction-Sign Independent Verification

Spec: "dragging left reveals content to the right, as in Google Maps"
→ dragging left → delta.x = −50 → `_pivot += right * (−50) * pan_amount` → `_pivot.x` decreases
→ view centre moves left → content to the right enters the viewport ✓

Implementation (camera_controller.gd line 143):
```gdscript
_pivot += right * delta.x * pan_amount   # no negation — non-inverted
```

Test `test_pan_drag_left_decreases_pivot_x`: asserts `_pivot.x < initial_x` for `delta.x = -50` ✓
Test `test_pan_drag_right_increases_pivot_x`: asserts `_pivot.x > initial_x` for `delta.x = +50` ✓

Sign chain is correct. Tests verify the right direction.

