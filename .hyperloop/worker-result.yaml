## Findings

### Fix applied — Pan direction (F1, F2, F3 from Cycle 6 reviewer report)

The Cycle 6 reviewer correctly identified that `camera_controller.gd` used `+=`
(camera-pan model: pivot follows drag) where the spec's "i.e." parenthetical mandates
`-=` (map-grab model: drag left reveals content to the right, as in Google Maps).

Three changes were made in one commit:

**1. `godot/scripts/camera_controller.gd` lines 134-135**
- Changed `_pivot += right * delta.x * pan_amount` to `_pivot -= right * delta.x * pan_amount`
- Changed `_pivot += forward * delta.y * pan_amount` to `_pivot -= forward * delta.y * pan_amount`
- Updated inline comment to document the map-grab model

**2. `godot/tests/test_ux_polish.gd` — F2 fixes (inverted predicates)**
- Renamed `test_pan_drag_right_increases_pivot_x` to `test_pan_drag_right_decreases_pivot_x`
  and flipped predicate from `> initial_x` to `< initial_x`
- Renamed `test_pan_drag_left_decreases_pivot_x` to `test_pan_drag_left_increases_pivot_x`
  and flipped predicate from `< initial_x` to `> initial_x`

**3. `godot/tests/test_ux_polish.gd` — F3 fix (directional assertion)**
- Replaced `cam._pivot != Vector3.ZERO` with `cam._pivot.z < 0.0`
- Drag down (delta.y = +50); map-grab: `_pivot -= forward * delta.y * pan_amount`;
  headless identity transform `basis.z = (0,0,1)` so `_pivot.z` decreases — assert `< 0.0`

All 95 GDScript tests pass (including the three corrected direction tests).
