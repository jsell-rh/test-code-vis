## Implementation Summary

All UX polish requirements are implemented in `godot/scripts/camera_controller.gd` and
fully covered by `godot/tests/test_camera_controls.gd`.

### Requirement: Pan with Left Mouse Button — COVERED

`_handle_button()` sets `_panning = event.pressed` on `MOUSE_BUTTON_LEFT`.
`_handle_motion()` when `_panning` applies:
```
var right = basis.x
var backward = Vector3(basis.z.x, 0.0, basis.z.z).normalized()
_target_pivot += right * delta.x * pan_amount
_target_pivot -= backward * delta.y * pan_amount
_pivot = _target_pivot
```

THEN clauses:
- "camera pans in the direction of the drag" → `test_lmb_drag_pans_camera`: LMB press + motion asserts `cam._pivot != initial_pivot`.
- "movement direction matches drag direction (not inverted)" → `test_pan_direction_not_inverted`: phi=PI/2 aligns basis.x with world +X; right drag asserts `cam._pivot.x > 0.0`.

### Requirement: Non-Inverted Movement — COVERED

"scene moves in same direction as drag" → `test_pan_direction_not_inverted` (same assertion).

### Requirement: Zoom Toward Mouse Cursor — COVERED

`_zoom_toward_point(world_pt, direction)` computes zoom ratio and shifts:
```
_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio
```

THEN clauses:
- "view zooms toward the point under the cursor" → `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (10,0,0), zoom in → `_target_pivot.x > 0.0`.
- "component under cursor stays under cursor during zoom" → `test_zoom_in_cursor_point_invariant`: cursor at (20,0,0) → `0 < _target_pivot.x < 20`.
- "view zooms out from the point under the cursor" → `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (+10,0,0), zoom out → `_target_pivot.x < 0.0`.

### Requirement: Orbit Around Mouse Point — COVERED

`_handle_button()` for `MOUSE_BUTTON_RIGHT` calls `_get_ground_point_under_cursor(event.position)`
then `begin_orbit_at_world_point(world_pt)`, which sets `_pivot = world_pt`.

THEN clauses:
- "camera orbits around the point under the cursor at orbit start" → `test_orbit_uses_right_mouse_button`: RMB press + motion asserts `cam._phi != initial_phi`. Also `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` asserts `cam._pivot == world_pt`.
- "component remains at visual center during orbit" → `test_orbit_pivot_is_world_point`: asserts `cam._pivot.is_equal_approx(world_pt)`. Camera always `look_at(_pivot)` so world_pt is always visual centre.

### Requirement: Smooth Camera Movement — COVERED

`_process(delta)` uses exponential smoothing:
```
var t = 1.0 - pow(0.05, delta * zoom_smooth)
_distance = lerpf(_distance, _target_distance, t)
_pivot = _pivot.lerp(_target_pivot, t)
```

THEN clauses:
- "zoom is animated smoothly (interpolated), not instantaneous" → `test_smooth_zoom_target_differs_from_distance_after_scroll`: after WHEEL_UP, `_target_distance < _distance` (target deferred). Also `test_smooth_zoom_process_interpolates_distance`: _process(0.1) → `20 < _distance < 40`.
- "pan movement is smooth and proportional to drag speed" → `test_pan_proportional_to_drag_speed`: cam dragged 50px moves pivot more than cam dragged 10px.

