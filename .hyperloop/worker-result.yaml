### Requirement: JSON Scene Graph Loading — COVERED

THEN "reads the JSON file":
  `main.gd:_ready()` opens `res://data/scene_graph.json` via `FileAccess.open()` and
  parses it with `JSON.new().parse()`.

THEN "generates 3D volumes for each node":
  `build_from_graph()` calls `_create_volume(nd)` for every element of `graph.nodes`.
  Each call produces a `MeshInstance3D` with a `BoxMesh` inside a `Node3D` anchor.
  Test: `test_volumes_created_for_each_node`, `test_mesh_instances_exist_in_anchors`.

THEN "generates connections for each edge":
  `build_from_graph()` calls `_create_edge(ed)` for every element of `graph.edges`.
  Each call produces an `ImmediateMesh` line and a `CylinderMesh` arrowhead.
  Test: `test_edge_mesh_instances_created`.

THEN "positions elements according to the layout data":
  `anchor.position = Vector3(p.x, p.y, p.z)` where `p` is the JSON `position` dict.
  Test: `test_anchor_positions_match_json` asserts exact x/y/z values.

