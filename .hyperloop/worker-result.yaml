## Predicate Verification for Critical THEN-clauses

**"relative positions reflect coupling"** → `test_coupled_bcs_are_closer_than_uncoupled`:
- Fixture in test_extractor.py (line 435): 4 BCs where auth↔shared_kernel have cross-context
  edges; billing has no edges to auth. `compute_layout()` is called.
- Assert: `dist("auth", "shared_kernel") < dist("auth", "billing")`
- The fixture VARIES the coupling input (edges present vs absent) and asserts relative
  position output. This is an algorithm-quality test. PASS.

**"label remains readable"** → `test_labels_are_billboard_and_readable`:
- Instantiates real `Node3D` via `build_from_graph()`, finds Label3D, asserts:
  `lbl.billboard == BaseMaterial3D.BILLBOARD_ENABLED` AND `lbl.pixel_size > 0.0`
  AND `lbl.no_depth_test == true`. All three visual properties explicitly asserted. PASS.

**"direction is discernible"** → `test_direction_indicator_cone_created`:
- Asserts `CylinderMesh` with `top_radius == 0.0` exists (cone = pointed arrowhead).
  This is an explicit rendering element per guideline requirement. PASS.
- `test_direction_cone_near_target`: asserts cone is within 2 units of target node
  (`to_pos = (20,0,0)`). PASS.

**"pan right → pivot increases"** (`test_pan_drag_right_increases_pivot_x`):
- Spec analogy: non-inverted panning (drag matches view movement direction).
- Test: LMB press at (100,100), move to (150,100) = delta.x +50.
- Assert: `cam._pivot.x > initial_x`. Sign is correct (positive delta → positive pivot). PASS.

**"size reflects complexity"** → `test_mesh_sizes_proportional_to_metric`:
- Fixture varies size (3.0 vs 9.0); assert ratio == 3.0 within float tolerance.
- If `_create_volume()` used a constant size, the ratio would be 1.0 and the test
  would fail. Algorithm-quality test. PASS.

