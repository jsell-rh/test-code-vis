## THEN-Clause Coverage

### Requirement: Conformance Mode (check_alignment + render_alignment)

#### Scenario: Spec-aligned implementation
| THEN-clause | Test | Assertion |
|---|---|---|
| "the human can see that the realized system has auth and user management as separate components" | `test_aligned_nodes_detected_as_separate` | `result["aligned"].has("auth")` and `result["aligned"].has("user_management")` |
| "the correspondence between spec and realization is visually apparent" | `test_aligned_nodes_have_annotation_in_scene` | `label_count >= 1` Label3D added to live Node3D scene root |

#### Scenario: Spec-divergent implementation
| THEN-clause | Test | Assertion |
|---|---|---|
| "the human can see the divergence between spec and realization" | `test_divergent_nodes_detected` | `missing.has("payment_service") or divergent.has("payment_service")` |
| "the specific nature of the divergence is clear (merged vs. separate)" | `test_divergent_nodes_annotated_as_merged` | `divergent.has("payment")` + Label3D with "MERGED" in text confirmed in live scene |

### Requirement: Evaluation Mode (analyze_coupling + analyze_criticality + render_* methods)

#### Scenario: Detecting tight coupling
| THEN-clause | Test | Assertion |
|---|---|---|
| "the coupling between those services is apparent" | `test_tightly_coupled_pair_detected` | `pairs.size() >= 1` and `pairs[0]["coupling_score"] >= 2` |
| "the human can assess whether the coupling is problematic" | `test_coupled_nodes_highlighted` | `svc_x` and `svc_y` MeshInstance3D albedo_color == HIGHLIGHT_COLOR |

#### Scenario: Identifying single point of failure
| THEN-clause | Test | Assertion |
|---|---|---|
| "the criticality and centrality of that component is apparent" | `test_central_node_detected_as_critical` | `critical[0]["node_id"] == "hub"` and `critical[0]["in_degree"] == 3` |
| "the risk it represents is clear" | `test_critical_node_annotated_with_spof_risk` | Label3D with "SPOF" in text on live scene |

#### Scenario: Spec faithfully implemented but architecturally poor
| THEN-clause | Test | Assertion |
|---|---|---|
| "architectural problems are visible even though conformance is perfect" | `test_coupling_detected_despite_perfect_alignment` | `aligned.size() == 2` (perfect conformance) AND `pairs.size() >= 1` (coupling detected) |

### Requirement: Simulation Mode (simulate_split + simulate_failure + render_* methods)

#### Scenario: Splitting a service
| THEN-clause | Test | Assertion |
|---|---|---|
| "the impact on dependent services is visible" | `test_split_dependents_detected` | `dependents.has("client_a")` and `dependents.has("client_b")` |
| "new dependencies or interfaces that would be required are shown" | `test_split_new_interfaces_shown` | `new_interfaces.size() >= 1`; caller albedo_color == HIGHLIGHT_COLOR; Label3D with "split" in scene |

#### Scenario: Failure injection
| THEN-clause | Test | Assertion |
|---|---|---|
| "the cascade of effects through the system is visible" | `test_failure_cascade_detected` | `cascade.has("api")` and `cascade.has("frontend")` (BFS through db→api→frontend) |
| "components that would be affected are clearly identified" | `test_failure_affected_nodes_highlighted` | consumer_1 albedo_color == HIGHLIGHT_COLOR; Label3D with "FAILED" on failed node |

