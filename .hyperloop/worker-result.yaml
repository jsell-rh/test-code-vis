## UX Polish Implementation Evidence

### Camera Controller (`godot/scripts/camera_controller.gd`)

All five requirements from the spec are implemented:

| Requirement | Implementation | Test File |
|---|---|---|
| Pan with LMB | `_handle_button` MOUSE_BUTTON_LEFT → `_panning = true`; `_handle_motion` shifts `_pivot` | `test_ux_polish.gd` |
| Non-inverted movement | `right = global_transform.basis.x` (no negation) | `test_pan_drag_right_increases_pivot_x`, `test_pan_drag_left_decreases_pivot_x` |
| Zoom toward cursor | `_zoom_toward_cursor(cursor_world, dir)` shifts `_pivot` toward cursor | `test_zoom_toward_cursor_shifts_pivot_toward_cursor` |
| Orbit around mouse point | `_set_orbit_pivot(world_point)` called on RMB press | `test_orbit_pivot_set_to_cursor_point_at_start` |
| Smooth camera movement | `_process(delta)` lerps `_distance` toward `_target_distance` | `test_zoom_is_interpolated_not_instantaneous` |

### THEN-Clause → Test Mapping

#### Panning the view
- THEN camera pans → `test_lmb_pan_moves_pivot` asserts `cam._pivot != initial_pivot`
- AND movement matches drag direction → `test_pan_drag_right_increases_pivot_x` asserts
  `pivot.x > initial_x` on rightward drag; `test_pan_drag_left_decreases_pivot_x` asserts
  `pivot.x < initial_x` on leftward drag

#### Drag direction matches view movement
- THEN scene moves same direction as drag → `test_drag_direction_matches_view_movement`
  confirms pivot changes on drag

#### Zoom toward cursor
- THEN view zooms toward point under cursor → `test_zoom_toward_cursor_shifts_pivot_toward_cursor`
  asserts `pivot.x > 0` when cursor at `(10, 0, 0)` and zoom-in
- AND component stays under cursor → `test_component_stays_under_cursor_on_zoom_in`
  asserts pivot moves closer to cursor

#### Zooming out
- THEN view zooms out from point under cursor → `test_zoom_out_from_cursor_shifts_pivot_away`
  asserts pivot moves away from cursor on zoom-out
- `test_zoom_out_increases_target_distance` asserts `target_distance > initial`

#### Orbiting around a component
- THEN camera orbits around cursor-point at start → `test_orbit_pivot_set_to_cursor_point_at_start`
  asserts `_pivot == world_point` after `_set_orbit_pivot`
- AND component remains at visual center → `test_orbit_pivot_is_used_during_orbit` and
  `test_component_remains_at_visual_center_during_orbit` assert `_pivot` unchanged during orbit

#### Smooth zoom
- THEN zoom is interpolated not instantaneous → `test_zoom_is_interpolated_not_instantaneous`
  asserts `_distance` unchanged after scroll (only `_target_distance` changes),
  then partially advanced after `_process(0.016)`

#### Smooth pan
- THEN pan proportional to drag speed → `test_pan_proportional_to_drag_speed` asserts
  5× larger drag produces larger pivot displacement

