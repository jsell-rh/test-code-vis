## Requirement: Containment Rendering — COVERED

**SHALL**: Render containment relationships as nested volumes — child nodes visually
inside their parent.

**Code** (`main.gd._create_volume()`):
- Bounded context: `BoxMesh.size = Vector3(sz, sz*0.2, sz)`, material with
  `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
- Module: `BoxMesh.size = Vector3(sz, sz*0.6, sz)`, fully opaque (`a = 1.0`).
- Child nodes are parented to their parent's `_anchors` entry, nesting them
  inside the parent volume in the scene tree.

**Scenario: Modules inside a bounded context — `test_containment_rendering.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| bounded context appears as larger translucent volume | `test_bounded_context_is_translucent` | `mat.transparency != TRANSPARENCY_DISABLED and mat.albedo_color.a < 1.0` |
| bounded context larger than module | `test_bounded_context_larger_than_module` | `ctx_mesh.size.x > mod_mesh.size.x` |
| child modules are smaller opaque volumes | `test_module_is_opaque` | `mat.albedo_color.a >= 1.0` |
| modules visually inside parent | `test_module_parented_inside_context` | `mod_anchor.get_parent() == ctx_anchor` |
| boundary visually distinct | `test_bounded_context_cull_disabled` | `mat.cull_mode == BaseMaterial3D.CULL_DISABLED` |

