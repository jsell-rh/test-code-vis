## Findings

### F1 — FAIL [BLOCKING — RACF]: check-checkpoint-commit-is-first.sh (6th consecutive cycle)

**Finding:** The checkpoint commit `chore: begin task-007` is NOT the first commit on the
branch. The oldest commit is `feat(godot): implement task-007 Godot Application spec`
(d51848a1). This has failed every cycle since cycle 1.

**Re-attempt compliance failure:** Prior cycle (f4b1de1) prescribed the fix verbatim:
  > git rebase -i main — move 'chore: begin task-007' line to the TOP of the list.
The fix was not applied in this cycle. Because check-no-state-files-committed.sh (F2)
also fails, the combined rewrite guide (check-combined-rewrite-guide.sh) mandates running
filter-branch BEFORE rebase. See F2 for the mandatory order.

**Fix:**
  Step 1: git filter-branch --index-filter \
    'git rm --cached --ignore-unmatch .hyperloop/state/*' -- main..HEAD
  Step 2: git rebase -i main  (move checkpoint commit to top)
  Step 3: Verify with check-no-state-files-committed.sh and check-checkpoint-commit-is-first.sh

