|---|---|---|---|
| the camera pans in the direction of the drag | test_lmb_drag_pans_camera | LMB press + motion changes `_pivot` from initial | PASS |
| the movement direction matches the drag direction (not inverted) | test_pan_direction_not_inverted | At phi=PI/2, drag-left (delta.x=-50) → pivot.x > 0 (Google Maps: camera moves right, scene shifts left) | PASS |
| the scene moves in the same direction as the drag (dragging left reveals content to the right, as in Google Maps) | test_pan_direction_not_inverted | Same assertion; sign-chain independently derived: delta.x<0 × right(+X) × minus-sign → pivot.x > 0 ✓ | PASS |
| the view zooms toward the point under the cursor | test_zoom_in_shifts_pivot_toward_cursor | Zoom in with world_pt=(10,0,0) → `_target_pivot.x > 0` (moved toward cursor) | PASS |
| the component under the cursor stays under the cursor during the zoom | test_zoom_in_cursor_point_invariant | `0 < target_pivot.x < world_pt.x` — pivot between old pivot and cursor; invariant maintained | PASS |
| the view zooms out from the point under the cursor | test_zoom_out_shifts_pivot_away_from_cursor | Zoom out with world_pt=(10,0,0) → `_target_pivot.x < 0` (pivot moved away from cursor) | PASS |
| the camera orbits around the point under the cursor at orbit start | test_orbit_around_cursor_point | `cam._pivot == world_pt` after `begin_orbit_at_world_point(world_pt)` | PASS |
| the component remains at the visual center during the orbit | test_orbit_pivot_is_world_point | `cam._pivot.is_equal_approx(world_pt)` — camera always looks at pivot = world_pt | PASS |
| the zoom is animated smoothly (interpolated), not instantaneous | test_smooth_zoom_target_differs_from_distance_after_scroll | After scroll: `_target_distance < _distance` (target changed, actual not yet) | PASS |
| the zoom is animated smoothly (interpolated), not instantaneous | test_smooth_zoom_process_interpolates_distance | After `_process(0.1)`: `20 < _distance < 40` (lerping toward target) | PASS |
| the pan movement is smooth and proportional to drag speed | test_pan_proportional_to_drag_speed | 50px drag produces larger `_pivot.length()` than 10px drag | PASS |

**Direction sign derivation (independently computed before reading test body):**
Spec: "dragging left reveals content to the right, as in Google Maps."
At phi=PI/2, basis.x (right) = world +X. Drag left: delta.x = -50.
Code: `_target_pivot -= right * delta.x * pan_amount` = `_target_pivot -= (+X)(-50)(pan)` = `_target_pivot += X*50*pan`.
Result: pivot.x increases → camera moves +X → content at x=0 shifts to camera-left → scene moves left ✓.
Test asserts `cam._pivot.x > 0.0` — **correct predicate**.

