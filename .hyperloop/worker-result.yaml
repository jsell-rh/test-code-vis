are the proxy evidence — they verify structural correctness at kartograph scale (60 nodes,
5 cross-context edges), which is the necessary structural condition for smooth navigation.
The `test_kartograph_scale_*` functions use `_check()` assertions (Pattern-1) on the
actual scene-tree anchor count and world-position dictionary, not on intermediate dicts.

