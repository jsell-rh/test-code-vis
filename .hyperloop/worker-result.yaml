## Sign-Chain Derivation (independent verification)

The critical THEN-clause: *"dragging left reveals content to the right, as in Google Maps"*

Implementation at `camera_controller.gd:152–153`:
```gdscript
_pivot -= right * delta.x * pan_amount
_pivot -= forward * delta.y * pan_amount
```

Independent derivation — drag **left** (delta.x = −50), identity transform
(right = (1,0,0)), pan_amount > 0:
```
_pivot.x -= 1 * (−50) * pan_amount
_pivot.x += 50 * pan_amount   →   pivot.x INCREASES
```
→ camera now looks at a point to the **right** of the original pivot
→ old-center content drifts **left** on screen
→ content from the **right** enters view
→ **matches spec**: "dragging left reveals content to the right" ✓

Test predicate (`test_pan_drag_left_increases_pivot_x`): `cam._pivot.x > initial_x` ✓
Test predicate (`test_drag_direction_matches_view_movement`): drag right → `cam._pivot.x < initial_x` ✓

Both predicates are correctly derived from the spec's authoritative "i.e." definition.

