| All scripts use GDScript | `test_scripts_dir_contains_only_gdscript` | `test_engine_version.gd` | `DirAccess` iterates every file in `res://scripts/`; asserts each `.ends_with(".gd")` ✓ |
| No C# / Mono | `test_project_does_not_declare_csharp` | `test_engine_version.gd` | Asserts `"Mono"` and `"C#"` absent from `project.godot` ✓ |
| API calls valid for Godot 4.6 | `test_file_access_get_as_text_returns_non_empty_string` | `test_engine_version.gd` | Calls `FileAccess.get_as_text()` live and asserts non-empty return — exercises the 4.x API directly ✓ |
| FileAccess code path (main.gd `_ready()`) | `test_main_uses_godot4_fileaccess_api` | `test_godot_version.gd` | Reads `main.gd` source and asserts `FileAccess.open(` + `get_as_text()` present, `File.new()` absent ✓ |

