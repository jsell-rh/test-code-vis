### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd` `_create_volume()`)
- `bounded_context`: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18` (translucent),
  `CULL_DISABLED` (visually distinct boundary), `size = (sz, sz*0.2, sz)` (larger slab).
- `module`: `albedo_color.a = 1.0` (opaque), `size = (sz, sz*0.6, sz)` (compact box).
- Child nodes are parented to their parent's `Node3D` anchor, placing them visually
  inside the parent volume.

**Tests** (`godot/tests/test_containment_rendering.gd`)
| THEN clause | Test method |
|---|---|
| bounded context is larger translucent volume | `test_bounded_context_is_translucent`, `test_bounded_context_larger_than_module` |
| child modules are smaller opaque volumes inside | `test_module_is_opaque`, `test_module_parented_inside_context` |
| boundary of parent is visually distinct | `test_bounded_context_cull_disabled` |

