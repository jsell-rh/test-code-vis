## Requirement Coverage

### Requirement: Pan with Left Mouse Button ‚Äî COVERED

**Implementation** (`camera_controller.gd` lines 72‚Äì74, 133‚Äì145):
`_handle_button` sets `_panning = true` on `MOUSE_BUTTON_LEFT` press.
`_handle_motion` panning block shifts `_pivot` via:
```gdscript
_pivot += right * delta.x * pan_amount
_pivot += forward * delta.y * pan_amount
```

**Scenario: Panning the view**
- THEN camera pans in direction of drag ‚Üí `test_lmb_pan_moves_pivot` asserts
  `cam._pivot != initial_pivot` after LMB drag.
- AND movement direction not inverted ‚Üí covered by Non-Inverted tests below.

| THEN-clause | Test | Status |
|---|---|---|
| Camera pans in direction of drag | `test_lmb_pan_moves_pivot` | PASS |
| Movement direction not inverted | `test_pan_drag_right_increases_pivot_x`, `test_pan_drag_left_decreases_pivot_x` | PASS |

