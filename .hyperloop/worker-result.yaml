### Verification details

**JSON Scene Graph Loading**
- `_ready()` calls `_load_and_build()` — not a stub.
- `_build()` creates Node3D anchors per node, MeshInstance3D per volume, ImmediateMesh+cone per edge.
- Tests: `test_volumes_created_for_each_node`, `test_mesh_instances_exist_in_anchors` (checks real MeshInstance3D child, not dict keys), `test_edge_mesh_instances_created`, `test_anchor_positions_match_json` (asserts `.position.is_equal_approx()` on real Node3D).

**Containment Rendering**
- Bounded context → translucent flat slab (TRANSPARENCY_ALPHA, alpha=0.18, CULL_DISABLED).
- Module → opaque cube (alpha=1.0), scene-tree parented inside context anchor.
- Tests: `test_bounded_context_is_translucent`, `test_module_is_opaque`, `test_module_parented_inside_context` (asserts `get_parent() == ctx_anchor`), `test_bounded_context_larger_than_module`, `test_bounded_context_cull_disabled`.

**Dependency Rendering**
- Each edge produces an ImmediateMesh line plus a CylinderMesh cone (top_radius=0) at the target end.
- Direction indicator is an explicit arrowhead geometry — not a colour difference alone.
- Tests: `test_edge_line_mesh_created`, `test_direction_indicator_cone_created`, `test_direction_cone_near_target`, `test_cross_context_cone_is_orange`.

**Size Encoding**
- `sz = float(nd["size"])` applied directly as BoxMesh.size dimensions → ratio preserved.
- Tests: `test_large_module_has_bigger_mesh`, `test_mesh_sizes_proportional_to_metric` (asserts ratio within 0.001 of 3.0).

**Camera Controls — Top-down overview**
- `_theta` initialised to 0.15 rad (8.6°, well below PI/4).
- Tests: `test_initial_theta_is_near_top_down`, `test_initial_distance_is_positive`.

**Camera Controls — Zooming in**
- WHEEL_UP decreases `_distance`, WHEEL_DOWN increases it; clamped to `[min_distance, max_distance]`.
- Labels: `billboard == BILLBOARD_ENABLED`, `pixel_size = 0.012 > 0`, `no_depth_test = true` set in `_create_volume()`.
- Tests: `test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`, `test_zoom_clamped_at_minimum`, `test_labels_are_billboard_and_readable` (instantiates Node3D, calls `_build()`, retrieves Label3D, asserts all three properties).

**Camera Controls — Orbiting**
- Middle-mouse drag changes `_phi`/`_theta`; `_theta` clamped to `[0.01, PI-0.01]` so up never flips.
- `look_at(_pivot, Vector3.UP)` preserves orientation.
- Tests: `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`, `test_set_pivot_updates_state`.

**Godot 4**
- `project.godot`: `config/features=PackedStringArray("4.6")`.
- Compile check confirms `Godot Engine v4.6.2.stable`.
- All scripts are `.gd` (GDScript).

