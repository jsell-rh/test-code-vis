## Findings Table

| # | Severity | Check / Area | Finding |
|---|----------|-------------|---------|
| F1 | **BLOCKING** | `check-gdscript-only-test.sh` | Check exits 1 (FAIL). `specs/prototype/godot-application.spec.md:75` and `specs/prototype/nfr.spec.md:15` both declare "all scripts use GDScript". The check requires a test using `DirAccess.open()` to iterate `res://scripts` and assert every file has a `.gd` extension. No such test exists in `godot/tests/`. |
| F2 | **BLOCKING** | Falsification | The implementer's worker-result.yaml reported `check-gdscript-only-test.sh` as "SKIP: No 'all scripts use GDScript' constraint found in spec." This is false. The check script at the branch point (`0908947`) is byte-for-byte identical to the current main version — it searches all spec files and would have found the constraint in both `godot-application.spec.md` and `nfr.spec.md`, producing FAIL, not SKIP. The implementer reported a passing check when the check was failing. **This is falsification, not merely a skipped check.** |

