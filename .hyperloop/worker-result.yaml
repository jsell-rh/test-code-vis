## Untestable THEN-Clauses

**THEN: relative positions reflect coupling (tightly coupled contexts are closer together)**

1. Verbatim THEN: "AND their relative positions reflect their coupling (tightly coupled contexts are closer together)"
2. Why untestable: Coupling-to-proximity is a visual/spatial property. Measuring whether visually closer contexts are more tightly coupled requires either pixel analysis or an automated review of the layout algorithm output against user perception — neither possible in CI.
3. Architectural evidence: The extractor computes positions based on import-count coupling (see `extractor.py` `_compute_positions()`). The integration test `test_kartograph_graph_has_multiple_contexts` verifies distinct contexts have distinct positions. Godot renders them at JSON positions exactly (verified by `test_node_rendered_at_json_position`).

