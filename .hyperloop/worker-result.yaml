## Spec Alignment Review — Task-008: Godot Node Volume Rendering
### Spec: specs/prototype/prototype-scope.spec.md

---

### Requirement: Target Codebase — COVERED

**Implementation:** `extractor/__main__.py` accepts an arbitrary `src_path` argument;
`godot/data/scene_graph.json` is pre-generated from kartograph (contains bounded
contexts: graph, iam, infrastructure, management, shared_kernel, etc.).

**Test:** No automated unit test verifies "kartograph specifically loaded" — this is a
deployment-level runtime requirement, not unit-testable. The scene_graph.json file
present in the repo is the actual kartograph output. Acceptable for prototype scope.

**Scenario: Loading kartograph — COVERED**
- GIVEN the kartograph codebase → exists at ~/code/kartograph
- WHEN the prototype is launched → main.gd loads `scene_graph_path` on `_ready()`
- THEN kartograph's structure is visualized → scene_graph.json contains 30+ nodes from kartograph
- AND the visualization reflects the actual structure → extractor uses ast.parse on kartograph's Python source

---

### Requirement: Two-Stage Pipeline — COVERED

**Implementation:**
- Stage 1: `extractor/extractor.py` → `build_scene_graph()` produces JSON with nodes/edges/metadata
- Stage 2: `godot/scripts/main.gd` + `scene_graph_loader.gd` consume that JSON

**Tests:**
- Python: `extractor/tests/test_extractor.py` covers `build_scene_graph()` (96 pytest tests pass)
- GDScript: `test_scene_graph_loader.gd` (17 tests) and `test_scene_graph_loading.gd` (5 tests)

**Scenario: Extraction then visualization — COVERED**
- GIVEN the kartograph codebase
- WHEN the user runs `python -m extractor <src_path> -o scene_graph.json` → JSON file produced ✓
- AND the Godot application can load that file → `main.gd` `_ready()` reads JSON via `FileAccess`,
  parses via `JSON`, calls `SceneGraphLoader.load_from_dict()` then `build_from_graph()` ✓
- Tests: `test_scene_graph_loading.gd::test_volumes_created_for_each_node`,
  `test_mesh_instances_exist_in_anchors`, `test_edge_mesh_instances_created`,
  `test_anchor_positions_match_json`

