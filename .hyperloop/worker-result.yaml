### 5. Performance at Kartograph Scale — COVERED (PASS-WITH-NOTE)

**Code:** `godot/scripts/lod_manager.gd` implements LOD visibility control keyed on camera
distance (far → bounded_context nodes only; medium → + modules; near → all nodes + edges).
`main.gd` registers every node and edge in `_lod_node_entries` / `_lod_edge_entries` and calls
`_lod.apply()` each frame, directly addressing the "no perceptible stutter" design concern.

**Tests (`godot/tests/test_nfr_scale.gd`):**

| THEN clause | Test function | Status |
|---|---|---|
| Scene builds at kartograph scale (60 nodes) | `test_kartograph_scale_anchor_count` | COVERED |
| All 6 bounded context anchors created | `test_kartograph_scale_context_anchors_exist` | COVERED |
| All 54 module anchors created | `test_kartograph_scale_module_anchors_exist` | COVERED |
| World positions for all 60 nodes populated | `test_kartograph_scale_build_produces_world_positions` | COVERED |

The fixture models 6 bounded contexts × 9 modules = 60 nodes, matching kartograph's real scale.
FPS measurement (>30fps) and subjective stutter detection require a GPU render pipeline and
cannot be automated in headless CI. The structural correctness of the full build path at scale
is tested and sufficient. Not a FAIL.

