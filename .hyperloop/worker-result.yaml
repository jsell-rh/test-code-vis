  - Reads `project.godot` via `FileAccess.open()` + `get_as_text()`, asserts
    `content.contains("4.6")`. Verified `project.godot` line 19:
    `config/features=PackedStringArray("4.6")`. PASS
- `test_project_declares_godot_46()` — `test_godot_version.gd:20` PASS
- `test_project_godot_config_features_line()` — `test_engine_version.gd:52`
