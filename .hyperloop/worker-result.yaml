### REQ-3: Top-Down Architectural View тАФ COVERED

Scenario: Viewing kartograph from above
- THEN all bounded contexts are visible as distinct volumes
  тЖТ `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`:
    LOD FAR тЖТ bounded_context visible, module hidden.
  тЖТ `test_spatial_structure.gd::test_distinct_contexts_occupy_distinct_regions`:
    Two contexts at different JSON positions тЖТ different scene positions.
- AND their relative positions reflect coupling
  тЖТ `test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled`:
    dist(auth,shared_kernel) < dist(auth,billing) for coupled vs uncoupled fixture.
  тЖТ `test_extractor.py::test_complexity_and_coupling_both_reflected`:
    Varies both LOC and coupling; asserts BOTH size and position outputs together.
- AND dependencies between contexts are visible as connections
  тЖТ `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection`:
    ImmediateMesh child of main node exists per edge.

Code: `camera_controller.gd` (_theta=0.15, top-down start); `lod_manager.gd` FAR mode;
`extractor.py::_order_by_coupling()` + `compute_layout()`.
- `test_camera_controls.gd::test_initial_theta_is_near_top_down` confirms theta < PI/4.

