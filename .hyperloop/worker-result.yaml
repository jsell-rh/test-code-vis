### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:** `godot/scripts/main.gd`
- `_ready()` opens the JSON file, parses it with `JSON.new()`, delegates to `SceneGraphLoader.load_from_dict()`, then calls `build_from_graph()`.
- `build_from_graph()` iterates nodes creating anchors/volumes, iterates edges creating line+arrowhead meshes, and calls `_frame_camera()`.
- Positions are set from `nd["position"]` JSON fields on each anchor (local positions for child nodes, world-space pre-computed via `_resolve_world_pos()`).

**Scenario: Loading kartograph's scene graph — all THEN clauses covered**
| THEN clause | Test | Method |
|---|---|---|
| reads the JSON file | `test_scene_graph_loading.gd` | `test_volumes_created_for_each_node()` — calls `build_from_graph()` with fixture, asserts `_anchors` populated |
| generates 3D volumes for each node | `test_scene_graph_loading.gd` | `test_mesh_instances_exist_in_anchors()` — asserts `MeshInstance3D` child in every anchor |
| generates connections for each edge | `test_scene_graph_loading.gd` | `test_edge_mesh_instances_created()` — asserts ≥2 `MeshInstance3D` children on main node (line + arrowhead) |
| positions elements per JSON layout | `test_scene_graph_loading.gd` | `test_anchor_positions_match_json()` — asserts `anchor.position` equals fixture `{"x","y","z"}` |
| labels scale to remain readable | `test_scene_graph_loading.gd` | `test_labels_are_billboard_and_readable()` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true` |

