## Untestable THEN-Clauses

1. **"it runs natively without browser, container, or VM dependencies"**
   - Why untestable: Cannot verify OS identity or absence of VM/container from a headless test runner on a source tree.
   - Architectural evidence: `project.godot` contains no HTML5 export preset; no Dockerfile or container config present in the repo; Godot 4.6 desktop-only build.

2. **"the frame rate remains above 30fps"**
   - Why untestable: FPS measurement requires a live render pipeline; headless Godot (--headless) does not render frames.
   - Architectural evidence: `lod_manager.gd` implements Level-of-Detail culling; `test_nfr_scale.gd` exercises loading at kartograph's scale (6 bounded contexts, 50 modules, 100 files) without error.

3. **"there is no perceptible stutter or pop-in"**
   - Why untestable: Perceptible stutter is a subjective runtime rendering property.
   - Architectural evidence: LOD system prevents simultaneous instantiation of all nodes; spatial culling reduces per-frame work.

