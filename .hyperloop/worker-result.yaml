### Requirement: Performance at Kartograph Scale (MUST)

**Code**:
- `godot/scripts/main.gd::build_from_graph()` creates one `Node3D` anchor per node and populates `_world_positions` for all nodes.
- `godot/scripts/lod_manager.gd`: LOD system toggling visibility by camera distance — implemented and exercised.

**Scenario: Smooth navigation — THEN clause coverage**:

| THEN clause | Test | File |
|---|---|---|
| Scene builds at kartograph scale (6 BCs, 54 modules = 60 nodes) — anchors created | `test_kartograph_scale_anchor_count` — fixture with 60 nodes; asserts `_anchors.size() == 60` | `test_nfr_scale.gd` |
| All 6 context anchors present | `test_kartograph_scale_context_anchors_exist` — iterates 6 context IDs, asserts each in `_anchors` | `test_nfr_scale.gd` |
| All 54 module anchors present | `test_kartograph_scale_module_anchors_exist` — asserts `module_count == 54` and each present in `_anchors` | `test_nfr_scale.gd` |
| World positions for all 60 nodes | `test_kartograph_scale_build_produces_world_positions` — asserts `_world_positions.size() == 60` | `test_nfr_scale.gd` |

Suite registered in `run_tests.gd` (line 46). Tests instantiate real `Node3D` (not mocks) and call `build_from_graph()` with fixture data. Bodies read and predicates verified.

FPS clauses ("frame rate above 30fps", "no perceptible stutter"):
- `Engine.get_frames_per_second()` returns 0 in headless mode (no render pipeline).
- These clauses are physically unverifiable in automated headless CI.
- LOD system is implemented in `lod_manager.gd` and exercised by 10 LOD behavioral tests in `test_spatial_structure.gd`.

**STATUS: COVERED + NOTE** (FPS/stutter untestable in headless CI)

