## Requirement-by-Requirement Findings

### 1. Pan with Left Mouse Button — COVERED

**SHALL requirement: user MUST be able to pan with left mouse button drag.**

Implementation (`godot/scripts/camera_controller.gd`):
- Lines 101–104: `MOUSE_BUTTON_LEFT` press/release sets `_panning = event.pressed`
- Lines 141–159: `_handle_motion` when `_panning` applies:
  `_target_pivot -= right * delta.x * pan_amount`
  `_target_pivot -= backward * delta.y * pan_amount`

Scenario — Panning the view:
- THEN camera pans in the direction of the drag → `test_lmb_drag_pans_camera`: LMB press + motion, asserts `cam._pivot != initial_pivot` ✓
- AND movement direction matches drag (not inverted) → `test_pan_direction_not_inverted`: drag left at phi=PI/2 → `cam._pivot.x > 0.0` (camera moves right = scene moves left = Google Maps) ✓

### 2. Non-Inverted Movement — COVERED

**MUST requirement: all camera movement directions must match intuitive expectation.**

Implementation: same pan code as above. Comment at line 153–158 explicitly documents Google Maps convention: "Dragging right → scene moves right → camera/pivot move LEFT → subtract right·delta.x". The formula `_target_pivot -= right * delta.x * pan_amount` produces non-inverted movement.

Scenario — Drag direction matches view movement:
- THEN scene moves in the same direction as the drag → `test_pan_direction_not_inverted`: independently verified — at phi=PI/2, `right` = world +X; drag left (delta.x = -50) → `_target_pivot -= (+X)*(-50)*pan_amount` → pivot.x increases → camera moves +X → scene appears to move -X (left) = same direction as drag ✓

### 3. Zoom Toward Mouse Cursor — COVERED

**MUST requirement: scroll-wheel zoom MUST zoom toward point under mouse cursor.**

Implementation (`_zoom_toward_point`, lines 170–178):
```
var zoom_ratio = _target_distance / old_dist
_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio
```
RMB not in scene tree falls back to `_target_pivot` via `_get_ground_point_under_cursor`.

Scenario — Zooming into a specific component:
- THEN view zooms toward point under cursor → `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (+10,0,0), zoom in → `cam._target_pivot.x > 0.0` ✓
- AND component under cursor stays under cursor → `test_zoom_in_cursor_point_invariant`: `0.0 < pivot.x < world_pt.x` (pivot is between old origin and cursor point) ✓

Scenario — Zooming out:
- THEN view zooms out from point under cursor → `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (+10,0,0), zoom out (ratio > 1) → `cam._target_pivot.x < 0.0` (pivot pushed away from cursor) ✓

### 4. Orbit Around Mouse Point — COVERED

**MUST requirement: right mouse button orbit MUST rotate around the point under the cursor at orbit start.**

Implementation:
- Lines 111–118: `MOUSE_BUTTON_RIGHT` press → `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))`
- `begin_orbit_at_world_point` (lines 73–85): sets `_pivot = world_pt`, recomputes spherical coordinates from actual camera offset so no jump occurs

Scenario — Orbiting around a component:
- THEN camera orbits around point under cursor at orbit start → `test_orbit_uses_right_mouse_button`: RMB + horizontal motion → `cam._phi != initial_phi` ✓; `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` ✓
- AND component remains at visual center during orbit → `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` — camera looks_at _pivot which equals world_pt throughout orbit ✓

### 5. Smooth Camera Movement — COVERED

**MUST requirement: all camera transitions MUST be smooth and continuous, no snapping or jerking.**

Implementation (`_process`, lines 42–47):
```gdscript
var t = 1.0 - pow(0.05, delta * zoom_smooth)
_distance = lerpf(_distance, _target_distance, t)
_pivot = _pivot.lerp(_target_pivot, t)
```
Exponential smoothing produces frame-rate-adaptive interpolation.

Scenario — Smooth zoom:
- THEN zoom is animated smoothly (interpolated), not instantaneous → `test_smooth_zoom_target_differs_from_distance_after_scroll`: scroll event changes `_target_distance` but not `_distance`; asserts `_target_distance < _distance` ✓; `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`, `20 < _distance < 40` ✓

Scenario — Smooth pan:
- THEN pan movement is smooth and proportional to drag speed → `test_pan_proportional_to_drag_speed`: 50px drag produces larger pivot displacement than 10px drag; asserts `cam_fast._pivot.length() > cam_slow._pivot.length()` ✓

