## Summary

Implemented `specs/core/understanding-modes.spec.md` for task-031.

Two commits above main:

1. **fix: address pre-existing check failure — add sign-chain derivation comments to direction tests**
   Six direction/sign-convention tests in `test_camera_controls.gd`,
   `test_dependency_rendering.gd`, and `test_ux_polish.gd` were missing the
