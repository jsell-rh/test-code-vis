## Pipeline Completeness

Stage 1 (producer): `llm_view_generator.gd` — `build_prompt()` embeds question + graph;
`parse_response()` converts LLM text → ViewSpec dict, enforcing VALID_OPS.

Stage 2 (consumer): `scene_interpreter.gd` — `apply(spec, anchors, scene_root, world_positions)`
iterates `spec["operations"]`, dispatches each op to a `_apply_*` method that mutates
live Node3D scene-tree properties (`.visible`, `.position`, `albedo_color`, `Label3D` child,
`ImmediateMesh` line + `CylinderMesh` arrowhead).

Wiring: `main.gd` `apply_view_spec(spec: Dictionary)` creates a `SceneInterpreter` and
calls `interp.apply(spec, _anchors, self, _world_positions)`. `_ready()` is not a stub —
it loads the JSON scene graph and builds the 3D scene. VALID.

