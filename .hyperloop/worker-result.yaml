### Per-requirement notes

**JSON Scene Graph Loading**: `test_anchor_positions_match_json` instantiates a real
Node3D, calls build_from_graph(), and asserts `anchor.position.is_equal_approx(Vector3(...))`.
Not a dict-key `.has()` check. ✓

**Containment Rendering**: `test_module_parented_inside_context` asserts
`mod_anchor.get_parent() == ctx_anchor` on real Node3D objects. Translucency is asserted
via `mat.transparency != TRANSPARENCY_DISABLED` and `albedo_color.a < 1.0` (actual value
0.18). Module opaqueness asserted via `albedo_color.a >= 1.0`. ✓

**Dependency Rendering**: Direction is visually indicated by a CylinderMesh arrowhead
(`top_radius=0.0`, pointed tip) placed at the target end — this satisfies "visually
indicated" per guidelines (explicit rendering element, not just line colour). Tests assert
the cone exists, its `top_radius == 0.0`, and its proximity to the target position. ✓

**Size Encoding**: BoxMesh.size.x is set directly from the JSON `size` field. Test asserts
proportionality (ratio 9.0/3.0 = 3.0) within 0.001 tolerance on real BoxMesh objects. ✓

**Camera Controls**: `_theta = 0.15` rad (< PI/4) satisfies top-down default. Scroll
wheel adjusts `_distance` (clamped). Middle-mouse drag changes `_phi`/`_theta`. `look_at`
called with `Vector3.UP` ensuring intuitive up. All 8 camera tests pass. ✓

**Godot 4.6**: `project.godot` contains `config/features=PackedStringArray("4.6")`.
`test_engine_version.gd` calls `FileAccess.open()` + `get_as_text()` on project.godot and
asserts the version string — this is a behavioral runtime test, not config-only. ✓

**Label3D**: `pixel_size = 0.012 > 0`, `billboard = BILLBOARD_ENABLED`,
`no_depth_test = true` — all asserted in `test_labels_are_billboard_and_readable`. ✓

**FileAccess I/O coverage**: `test_engine_version.gd` exercises `FileAccess.open()` +
`get_as_text()` at runtime, satisfying the guideline requirement. ✓

