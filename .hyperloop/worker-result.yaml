## Implementation Notes

All camera UX requirements are implemented in `godot/scripts/camera_controller.gd`:

- **Pan (LMB drag)**: `_handle_button()` sets `_panning = true` on LMB press; `_handle_motion()` when `_panning` computes `right`/`backward` from `transform.basis` and applies `_target_pivot -= right * delta.x * pan_amount`.
- **Non-inverted movement**: drag left (delta.x < 0) at phi=PI/2 where right=+X: `_target_pivot -= (+X)(−50)(pan)` → pivot.x > 0 → camera moves +X → scene shifts left. Google Maps convention satisfied.
- **Zoom toward cursor**: `_zoom_toward_point(world_pt, direction)` computes `zoom_ratio = _target_distance / old_dist` then `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.
- **Orbit around cursor**: RMB press calls `begin_orbit_at_world_point(_get_ground_point_under_cursor(pos))` which sets `_pivot = world_pt` and recomputes spherical coordinates without camera jump.
- **Smooth movement**: `_process()` uses exponential smoothing `t = 1.0 - pow(0.05, delta * zoom_smooth)` with `lerpf` for distance and `lerp` for pivot.

