### Requirement: JSON Scene Graph Loading (SHALL)

**Implementation:**
- `godot/scripts/main.gd` — `_ready()` calls `_load_and_build()` (not a stub).
- `_load_and_build()` opens the file via `FileAccess`, parses JSON, and passes the dict to `_build()`.
- `_build()` iterates `graph["nodes"]`, calls `_create_volume()` per node, then iterates `graph["edges"]` and calls `_create_edge()` per edge.
- `_create_volume()` sets `anchor.position = Vector3(p["x"], p["y"], p["z"])` — positions from JSON.

**Tests** (`godot/tests/test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` — asserts `_anchors` contains entries for every node id. (GIVEN fixture with ctx1+mod1, WHEN `_build()`, THEN `_anchors.has("ctx1")` and `.has("mod1")`)
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a `MeshInstance3D` child.
- `test_edge_mesh_instances_created` — asserts ≥2 `MeshInstance3D` children on the main node (line + arrowhead per edge).
- `test_anchor_positions_match_json` — asserts `anchor.position` equals the JSON `position` field numerically.
- `test_labels_are_billboard_and_readable` — asserts `Label3D.billboard == BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true` (covers "labels scale to remain readable").

All Given/When/Then conditions match. **COVERED.**

