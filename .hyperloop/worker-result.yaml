## Independent Predicate Verification

### "reflects coupling" THEN-clauses (two siblings)
Both map to algorithm-quality tests that VARY the coupling property:
- `test_coupled_bcs_are_closer_than_uncoupled`: fixture has `auth↔shared_kernel` coupled, `billing` not. Asserts `dist(auth, shared_kernel) < dist(auth, billing)`. Varies coupling in fixture → correct algorithm-quality test.
- `test_complexity_and_coupling_both_reflected`: fixture has `big_ctx↔ctx_c` coupled, `ctx_d` not. Asserts both size difference (100 LOC vs 1 LOC) AND `dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d)`. Varies both inputs → correct algorithm-quality test.
Both tests are algorithm-quality (not rendering-fidelity). No inconsistency.

### "size reflects complexity" THEN-clause
`test_mesh_sizes_proportional_to_metric`: fixture uses sizes 3.0 and 9.0 (varies the metric). Asserts `abs(large.size.x / small.size.x - 3.0) < 0.001`. Algorithm-quality. ✓

### Pan direction (test_pan_drag_right_increases_pivot_x)
Spec: drag right → scene content pans right → `_pivot.x` increases.
Test: drag from x=100 to x=150 (delta.x = +50) → asserts `cam._pivot.x > initial_x`.
Predicate sign matches spec intent. ✓

### Orbit (test_orbit_horizontal_drag_changes_phi)
Spec: user can rotate. Test confirms `_phi != initial_phi` after drag. Direction of phi change is documented in comment (phi decreases on right-drag). Change is confirmed. ✓

### main.gd _ready() stub check
`_ready()` opens file via `FileAccess.open()`, parses JSON, calls `SceneGraphLoader.load_from_dict()`, then `build_from_graph()`. NOT a stub. ✓

