### 3. JSON Interface Contract — COVERED

**Code:** `godot/scripts/scene_graph_loader.gd` loads and validates JSON as pure dictionary
operations. `godot/scripts/main.gd::build_from_graph()` accepts a `Dictionary` and contains no
import of the Python extractor and no runtime dependency on any external source codebase.

**Tests:** All 22 tests in `test_scene_graph_loader.gd` and 5 tests in
`test_scene_graph_loading.gd` use inline `Dictionary` fixtures — no Python extractor invocation,
no filesystem reads of source code. The Godot loading path is fully exercised with self-contained
data, confirming the decoupled contract.

