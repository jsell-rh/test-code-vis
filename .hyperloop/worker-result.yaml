### 3. JSON Interface Contract (MUST) — COVERED

**Implementation:**
- `godot/scripts/main.gd` `_ready()`: reads JSON via `FileAccess.open()` → `get_as_text()` → `JSON.new().parse()` → `SceneGraphLoader.load_from_dict()`
- No subprocess calls in any GDScript file; no Python imports; no reference to extractor source paths
- `extractor/` has no GDScript imports or Godot API calls
- `build_from_graph()` accepts a `Dictionary` with no assumption about how it was produced

**Tests (Scenario: Decoupled pipeline):**
- `test_scene_graph_loader.gd` (25 tests): exercises `SceneGraphLoader.load_from_dict()` with inline Dictionary fixtures — no extractor invocation
- `test_node_renderer.gd::test_no_layout_recomputed_in_godot`: explicitly asserts positions come directly from JSON (no Godot-side layout recomputation)
- `test_scene_graph_loading.gd::test_anchor_positions_match_json`: asserts anchor positions match JSON values 1:1

The absence of cross-component coupling is both structural (no imports) and tested (inline-fixture tests exercise the entire Godot pipeline without the extractor). ✓

