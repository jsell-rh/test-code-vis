### Requirement: Readable Labels — COVERED

**Code:** `main.gd::_create_volume()` attaches a `Label3D` to every anchor node with:
`text = nd["name"]`, `billboard = BaseMaterial3D.BILLBOARD_ENABLED`, `pixel_size = 0.012`,
`no_depth_test = true`.

**Tests:** `test_readable_labels.gd` provides 10 tests covering bounded-context and module
labels for text content, billboard mode, `pixel_size > 0`, and `no_depth_test = true`.
Also covered by `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`.

**Scenario: Identifying a module** — COVERED

