## Task: task-034 — Prototype Scope Specification Review

Reviewed branch: `hyperloop/task-034`
Spec file: `specs/prototype/prototype-scope.spec.md`

---

## Requirement-by-Requirement Findings

### 1. Requirement: Target Codebase — COVERED

**Spec**: The prototype MUST use the kartograph codebase as its target system.

**Scenario: Loading kartograph**
- Implementation: `extractor/__main__.py` accepts any path including `~/code/kartograph/src/api`; `godot/data/scene_graph.json` contains a pre-extracted scene graph; `godot/scripts/main.gd` loads the JSON at startup.
- Tests:
  - `extractor/tests/test_kartograph_integration.py` → `test_kartograph_integration_bounded_contexts` and `test_kartograph_extraction_produces_modules` run the extractor CLI against the real kartograph source and assert bounded context nodes (`iam`, `graph`, `shared_kernel`) and module-level nodes are present. Tests are correctly skipped via `pytest.mark.skipif` when kartograph is not installed at `~/code/kartograph/src/api`.
  - `godot/tests/test_scene_graph_loading.gd` → `test_volumes_created_for_each_node` and `test_anchor_positions_match_json` verify the Godot application renders nodes from a kartograph-shaped fixture.

### 2. Requirement: Two-Stage Pipeline — COVERED

**Spec**: The system MUST operate as a two-stage pipeline: Python extractor → JSON → Godot application.

**Scenario: Extraction then visualization**
- Implementation: `extractor/extractor.py::build_scene_graph()` + `extractor/__main__.py` (CLI) produce `scene_graph.json`; `godot/scripts/main.gd::_ready()` reads the file and calls `build_from_graph()`; `godot/scripts/scene_graph_loader.gd` parses the JSON.
- Tests:
  - `extractor/tests/test_cli.py` → `test_main_writes_json_output` asserts the CLI writes a valid JSON with `nodes`, `edges`, `metadata`.
  - `godot/tests/test_scene_graph_loading.gd` → `test_volumes_created_for_each_node`, `test_edge_mesh_instances_created`, `test_anchor_positions_match_json` assert that Godot creates 3D volumes and edge visuals from the JSON format.
  - `godot/tests/test_scene_graph_loader.gd` → 20+ tests on `SceneGraphLoader.load_from_dict()` verifying the JSON-to-dictionary bridge.

### 3. Requirement: Top-Down Architectural View — COVERED

**Spec**: The prototype MUST provide a top-down camera view showing the overall system architecture. Bounded contexts visible as distinct volumes; relative positions reflect coupling; dependencies visible as connections.

**Scenario: Viewing kartograph from above**
- Implementation:
  - `camera_controller.gd`: `_theta: float = 0.15` (small polar angle ≈ 8.6° from top-down).
  - `extractor/extractor.py::_order_by_coupling()` + `compute_layout()`: tightly coupled BCs are placed adjacent in the circular layout, reducing their inter-node distance.
  - `main.gd::_create_edge()`: ImmediateMesh lines + CylinderMesh arrowheads for all edges.
- Tests:
  - `godot/tests/test_camera_controls.gd` → `test_initial_theta_is_near_top_down` asserts theta < PI/4.
  - `extractor/tests/test_extractor.py` → `test_coupled_bcs_are_closer_than_uncoupled` asserts tightly coupled pair `auth↔shared_kernel` is closer than uncoupled pair `auth↔billing`.
  - `godot/tests/test_spatial_structure.gd` → `test_distinct_contexts_occupy_distinct_regions`, `test_dependency_expressed_as_visible_connection`.

### 4. Requirement: Zoom to Detail — COVERED

**Spec**: The prototype MUST allow the user to zoom into a bounded context to see its internal structure. Internal layers visible; internal dependencies shown; relative module sizes visible.

**Scenario: Zooming into IAM**
- Implementation:
  - `lod_manager.gd`: FAR_THRESHOLD=80, NEAR_THRESHOLD=20. At medium distance modules become visible; at near distance internal edges appear.
  - `camera_controller.gd::_zoom_toward_cursor()`: reduces `_target_distance` smoothly.
  - `main.gd::_create_volume()`: box size proportional to `nd["size"]` (derived from LOC metric).
- Tests:
  - `godot/tests/test_spatial_structure.gd` → `test_medium_distance_shows_modules`, `test_near_distance_shows_internal_edges_as_fine_detail`.
  - `godot/tests/test_size_encoding.gd` → `test_large_module_has_bigger_mesh`, `test_mesh_sizes_proportional_to_metric`.
  - `godot/tests/test_ux_polish.gd` → `test_zoom_toward_cursor_shifts_pivot_toward_cursor`, `test_zoom_is_interpolated_not_instantaneous`.

### 5. Requirement: Abstract Visual Language — COVERED

**Spec**: MUST use abstract volumes (boxes, spheres, or similar primitives). No buildings, terrain, or thematic decoration. Size reflects complexity; position reflects coupling; containment shown by nesting.

**Scenario: Visual representation**
- Implementation: `main.gd::_create_volume()` creates `BoxMesh` for every node. Bounded contexts get a large translucent slab; modules get compact opaque boxes. Size = `sz` from JSON (computed from LOC). Position from JSON (pre-computed coupling-aware layout). Module anchors are added as children of context anchors.
- Tests:
  - `godot/tests/test_containment_rendering.gd` → `test_bounded_context_is_translucent`, `test_module_is_opaque`, `test_bounded_context_larger_than_module`, `test_module_parented_inside_context` (containment as nesting).
  - `godot/tests/test_size_encoding.gd` → `test_mesh_sizes_proportional_to_metric` (size reflects complexity).
  - `godot/tests/test_spatial_structure.gd` → `test_containment_expressed_as_scene_tree_parenting`.

### 6. Requirement: Readable Labels — COVERED

**Spec**: The prototype MUST label all visible structural elements with their names. Label remains readable at current zoom level.

**Scenario: Identifying a module**
- Implementation: `main.gd::_create_volume()` creates `Label3D` with `nd["name"]`, `billboard = BaseMaterial3D.BILLBOARD_ENABLED` (always faces camera), `no_depth_test = true` (visible through geometry), positive `pixel_size`.
- Tests:
  - `godot/tests/test_scene_graph_loading.gd` → `test_labels_are_billboard_and_readable` asserts `billboard == BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true`.

### 7. Requirement: Dependency Visualization — COVERED

**Spec**: The prototype MUST show dependencies between modules as visible connections. Line drawn; direction of dependency discernible.

**Scenario: Cross-context dependency**
- Implementation: `main.gd::_create_edge()` creates: (1) `ImmediateMesh` line in orange (cross_context) or grey (internal); (2) `CylinderMesh` with `top_radius=0` (cone/arrowhead) at target end, oriented along edge direction.
- Tests:
  - `godot/tests/test_dependency_rendering.gd` → `test_edge_line_mesh_created`, `test_direction_indicator_cone_created`, `test_direction_cone_near_target`, `test_cross_context_cone_is_orange`.
  - `godot/tests/test_scene_graph_loader.gd` → `test_edge_direction_preserved_source_to_target`, `test_edge_types_are_distinguishable`.

### 8. Requirement: Navigation — COVERED

**Spec**: The prototype MUST support basic spatial navigation: pan, zoom, rotate; smooth transition between overview and detail levels.

**Scenario: Moving through the space**
- Implementation: `camera_controller.gd` — LMB drag = pan, scroll wheel = smooth zoom (lerp toward `_target_distance`), RMB drag = orbit. LOD manager handles overview↔detail transition.
- Tests:
  - `godot/tests/test_camera_controls.gd` → `test_scroll_up_decreases_distance` (zoom), `test_orbit_horizontal_drag_changes_phi` (rotate), `test_orbit_vertical_drag_changes_theta` (rotate), `test_set_pivot_updates_state` (framing).
  - `godot/tests/test_ux_polish.gd` → `test_lmb_pan_moves_pivot`, `test_pan_drag_right_increases_pivot_x` (pan), `test_zoom_is_interpolated_not_instantaneous` (smooth), `test_pan_proportional_to_drag_speed`.
  - `godot/tests/test_spatial_structure.gd` → `test_lod_integration_far_hides_modules_in_built_scene` (smooth overview↔detail).

### 9. Requirement: Not In Scope — COVERED

**Spec**: Conformance mode, evaluation mode, simulation mode, data flow visualization, moldable views, spec extraction, and first-person navigation MUST NOT be implemented.

**Scenario: Features excluded from prototype**
- Code review confirms none of these features are implemented:
  - No conformance mode: no spec overlay comparison code.
  - No evaluation mode: no architectural quality scoring.
  - No simulation mode: no hypothetical change impact code.
  - No data flow visualization: no data-flow tracking (only structural/import edges).
  - No moldable views: no LLM integration.
  - No spec extraction: the extractor only processes Python imports, not spec files. (Note: `schema.py` declares `spec` as a valid `NodeType` and `test_scene_graph_loader.gd` has two tests for spec-typed nodes — this is inert schema infrastructure that does not constitute spec extraction being implemented.)
  - No first-person navigation: only the orbit camera (pan/zoom/rotate around a pivot) is implemented.

