## Untestable THEN-Clauses

None. All THEN-clauses are verifiable in the headless Godot test environment:
- Smooth interpolation is verified by calling `_process()` one step and asserting
  `_distance` has moved toward `_target_distance` (not teleported).
- Pan proportionality is verified by comparing displacement for two different delta magnitudes.
- Zoom cursor invariance is verified by checking that pivot shifts in the correct direction.

