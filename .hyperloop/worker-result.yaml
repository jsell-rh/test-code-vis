  3. Color coding: orange for cross-context, grey for internal

**Test Coverage:**
- `test_edge_line_mesh_created` (`godot/tests/test_dependency_rendering.gd:73`): ImmediateMesh line created for edge.
- `test_direction_indicator_cone_created` (`godot/tests/test_dependency_rendering.gd:87`): CylinderMesh with `top_radius=0.0` created.
- `test_direction_cone_near_target` (`godot/tests/test_dependency_rendering.gd:105`): Cone within 2 units of target endpoint.
- `test_cross_context_cone_is_orange` (`godot/tests/test_dependency_rendering.gd:125`): Cross-context colored orange.

