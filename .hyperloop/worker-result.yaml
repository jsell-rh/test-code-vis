## Summary

Task 028 implements behavioral tests for `specs/core/system-purpose.spec.md`, verifying
that the CodeVis system enables humans to acquire concrete architectural understanding of
agent-built software systems without requiring them to read source code.

This attempt also fixes the pre-existing scope violation from the previous attempt:
`godot/scripts/flow_overlay.gd` and `godot/tests/test_flow_overlay.gd` (prohibited
data-flow visualization) were removed, along with all wiring in `main.gd` and
`run_tests.gd`. The pre-existing fix is committed separately from the task-028 work.

## THEN-Clause Coverage

### Requirement: Understanding Without Writing Code
### Scenario: Architect evaluates unfamiliar system

**THEN "the human can correctly answer architectural questions about the system"**
- `test_bounded_contexts_are_structurally_identifiable` (test_system_purpose.gd:120)
  Asserts that bounded-context anchors ("auth", "billing") are present in the scene
  after build_from_graph(), making major system components identifiable.
- `test_node_names_are_labelled_for_identification` (test_system_purpose.gd:133)
  Asserts that each anchor has a Label3D child whose .text matches the node name.
- `test_label_billboard_enabled_for_readability` (test_system_purpose.gd:160)
  Asserts label.billboard == BaseMaterial3D.BILLBOARD_ENABLED.
- `test_label_pixel_size_positive_for_readability` (test_system_purpose.gd:187)
  Asserts label.pixel_size > 0.0.

**AND "the human can identify structural problems in the system"**
- `test_dependencies_are_visible_as_connections` (test_system_purpose.gd:219)
  Asserts at least one ImmediateMesh line is added as a scene child after build.
- `test_cross_context_and_internal_edges_are_distinguishable` (test_system_purpose.gd:241)
  Asserts _lod_edge_entries has >= 2 distinct albedo_color values (orange vs grey).

**AND "the human can predict the impact of proposed changes"**
- `test_dependency_direction_is_encoded_in_edges` (test_system_purpose.gd:273)
  Asserts _path_edge_entries contains entry {source:"billing", target:"auth"},
  confirming edge direction is correctly tracked for dependency reasoning.
  Sign chain: # billing→auth edge: source="billing", target="auth" → entry in
  _path_edge_entries proves direction encoding exists for dependency reasoning.
- `test_modules_are_contained_within_bounded_contexts` (test_system_purpose.gd:301)
  Asserts auth.domain anchor's parent == auth anchor (containment via scene parenting).

### Requirement: Spec-Driven Context
### Scenario: Spec and codebase loaded together

**THEN "the spec is treated as the intended design"** — NOT IN SCOPE FOR PROTOTYPE
**AND "the codebase is treated as the realized design"** — NOT IN SCOPE FOR PROTOTYPE
**AND "the relationship between them is available for inspection"** — NOT IN SCOPE FOR PROTOTYPE

Per `specs/prototype/prototype-scope.spec.md § Not In Scope`: conformance mode
(spec overlay comparison) is explicitly NOT implemented in the prototype.

### Requirement: Support the Architecture Feedback Loop
### Scenario: Post-build evaluation

**THEN "the human can determine whether the build matches the spec"** — NOT IN SCOPE
**AND "the human can determine whether the build is architecturally sound"** — NOT IN SCOPE
**AND "the human can explore the impact of potential changes"** — NOT IN SCOPE

Per `specs/prototype/prototype-scope.spec.md § Not In Scope`: evaluation mode and
simulation mode are explicitly NOT implemented in the prototype.

