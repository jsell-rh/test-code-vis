### Requirement: Camera Controls — COVERED

**Spec**: The application MUST provide camera controls for navigating the scene.

**Scenarios**: Top-down overview / Zooming in / Orbiting

Implementation: `godot/scripts/camera_controller.gd`
- Extends `Camera3D`. Initial state: `_theta = 0.15` (≈8.6° from top-down), `_phi = 0.0`,
  `_distance = 40.0`. `_ready()` calls `_update_transform()` to position on start.
- Top-down: `_theta = 0.15` is near 0 (straight above), satisfying "defaults to top-down".
- Zoom: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance` (clamped to `min_distance`);
  `MOUSE_BUTTON_WHEEL_DOWN` increases it (clamped to `max_distance`).
- Orbit: `MOUSE_BUTTON_MIDDLE` drag changes `_phi` (azimuth) and `_theta` (polar angle);
  `_theta` clamped to `[0.01, PI-0.01]` so camera never flips (up stays up).
- Pan: `MOUSE_BUTTON_RIGHT` drag translates `_pivot`.
- `_update_transform()` uses `look_at(_pivot, Vector3.UP)` when inside scene tree,
  ensuring correct orientation at all times.

Tests: `godot/tests/test_camera_controls.gd` (8 tests)
- `test_initial_theta_is_near_top_down`: asserts `_theta < PI/4` (< 45°).
- `test_initial_distance_is_positive`: asserts `_distance > 0.0`.
- `test_scroll_up_decreases_distance`: sends WHEEL_UP event, asserts `_distance` decreases.
- `test_scroll_down_increases_distance`: sends WHEEL_DOWN event, asserts `_distance` increases.
- `test_orbit_horizontal_drag_changes_phi`: middle-press + right-drag, asserts `_phi` changes.
- `test_orbit_vertical_drag_changes_theta`: middle-press + upward-drag, asserts `_theta` changes.
- `test_set_pivot_updates_state`: calls `set_pivot(new_pivot, new_distance)`, asserts both stored.
- `test_zoom_clamped_at_minimum`: 200× WHEEL_UP, asserts `_distance >= min_distance`.

Status: **COVERED**

