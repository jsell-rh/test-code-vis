### Requirement: Dependency Rendering — PASS

**Code** (`main.gd` `_create_edge()`):
- `ImmediateMesh` (PRIMITIVE_LINES) for the connecting line
- `CylinderMesh` with `top_radius = 0.0` (arrowhead cone) at the target end,
  oriented along edge direction via `Basis(Quaternion(Vector3.UP, dir))`
- This is an explicit rendering element, not a plain line or colour difference alone ✅

**Tests** (`test_dependency_rendering.gd`, 4 tests): assert `ImmediateMesh` exists,
`CylinderMesh` with `top_radius == 0.0` exists, cone position within 2 units of target,
and cross-context cone material `r > 0.8 and b < 0.3`.

"Direction is visually indicated" satisfied by a distinct arrowhead mesh. ✅

