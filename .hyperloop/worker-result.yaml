## Spec Scenario Coverage

### JSON Scene Graph Loading — COVERED

`main.gd::_ready()` opens the file with `FileAccess.open()` + `get_as_text()`,
parses JSON, calls `SceneGraphLoader.load_from_dict()` then `build_from_graph()`.
`build_from_graph()` instantiates a `Node3D` anchor + `MeshInstance3D` (BoxMesh)
+ `Label3D` per node, sets `anchor.position` from the JSON `position` field,
and calls `_create_edge()` per edge.

Tests (test_scene_graph_loading.gd — 5/5 PASS):
- `test_volumes_created_for_each_node` — Node3D anchors exist for every node ID
- `test_mesh_instances_exist_in_anchors` — real MeshInstance3D children in each anchor
- `test_edge_mesh_instances_created` — ≥2 MeshInstance3D at scene root per edge
- `test_anchor_positions_match_json` — `anchor.position` values match JSON x/y/z
- `test_labels_are_billboard_and_readable` — BILLBOARD_ENABLED, pixel_size>0, no_depth_test=true asserted on instantiated Label3D

### Containment Rendering — COVERED

`_create_volume()` in `main.gd`:
- bounded_context: TRANSPARENCY_ALPHA, albedo_color.a = 0.18, CULL_DISABLED
- module: albedo_color.a = 1.0 (opaque), default cull
- Child anchors are parented to the parent anchor (scene-tree nesting)
- bounded_context BoxMesh.size.x > module BoxMesh.size.x for any fixture pair

Tests (test_containment_rendering.gd — 5/5 PASS):
- `test_bounded_context_is_translucent` — transparency != DISABLED, alpha < 1
- `test_module_is_opaque` — alpha >= 1.0
- `test_module_parented_inside_context` — mod_anchor.get_parent() == ctx_anchor
- `test_bounded_context_larger_than_module` — ctx BoxMesh.size.x > mod BoxMesh.size.x
- `test_bounded_context_cull_disabled` — cull_mode == CULL_DISABLED

### Dependency Rendering — COVERED

`_create_edge()` in `main.gd`:
- ImmediateMesh with PRIMITIVE_LINES from source world-position to target
- CylinderMesh (top_radius=0, pointed tip = arrowhead) at target end, oriented along edge
- Cross-context: Color(1.0, 0.50, 0.10) orange; internal: grey

The spec's "direction is visually indicated" is satisfied by an explicit arrowhead
CylinderMesh with top_radius=0, not a plain line — meets the rendering-element requirement.

Tests (test_dependency_rendering.gd — 4/4 PASS):
- `test_edge_line_mesh_created` — ImmediateMesh exists as child of main node
- `test_direction_indicator_cone_created` — CylinderMesh with top_radius==0 present
- `test_direction_cone_near_target` — cone position within 2 units of target world pos
- `test_cross_context_cone_is_orange` — mat.albedo_color.r>0.8, .b<0.3 on cone

### Size Encoding — COVERED

`sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)`, so mesh width
is directly proportional to the size metric (ratio is exactly preserved).

Tests (test_size_encoding.gd — 2/2 PASS):
- `test_large_module_has_bigger_mesh` — large BoxMesh.size.x > small
- `test_mesh_sizes_proportional_to_metric` — actual ratio == expected ratio ±0.001

### Camera Controls — COVERED

`camera_controller.gd` (extends Camera3D):
- Top-down: `_theta = 0.15` rad ≈ 8.6° from vertical (< PI/4 threshold)
- Zoom: MOUSE_BUTTON_WHEEL_UP/DOWN adjusts `_distance`, clamped to [min_distance, max_distance]
- Orbit: MOUSE_BUTTON_MIDDLE drag changes `_phi` (azimuth) and `_theta` (altitude)
- `_theta` clamped to [0.01, PI-0.01] so "up stays up"
- `set_pivot()` updates pivot + distance; called from `main.gd::_frame_camera()`

Tests (test_camera_controls.gd — 8/8 PASS):
- `test_initial_theta_is_near_top_down` — cam._theta < PI/4
- `test_initial_distance_is_positive` — cam._distance > 0
- `test_scroll_up_decreases_distance` — _distance decreases after WHEEL_UP
- `test_scroll_down_increases_distance` — _distance increases after WHEEL_DOWN
- `test_orbit_horizontal_drag_changes_phi` — _phi changes after horizontal drag
- `test_orbit_vertical_drag_changes_theta` — _theta changes after vertical drag
- `test_set_pivot_updates_state` — _pivot and _distance updated correctly
- `test_zoom_clamped_at_minimum` — 200x scroll-up never goes below min_distance

Note: ERROR lines in test output ("Condition is_inside_tree() is true") are benign
headless Godot warnings from look_at() being called outside the scene tree; all 8
tests PASS as confirmed by the "Results: 58 passed, 0 failed" summary.

