### Requirement: Godot 4.6 — COVERED

**Implementation**: `project.godot` declares `config/features=PackedStringArray("4.6")`. All scripts
use `.gd` (GDScript). `main.gd._ready()` uses `FileAccess.open()` + `file.get_as_text()` (correct
Godot 4.6 API, not deprecated `read_as_text()`). No C# or Mono declarations present.

**Scenario: Engine version** — covered by `test_engine_version.gd` (4 tests):
- THEN it uses Godot 4.6.x: `test_project_godot_declares_46_feature()` opens `project.godot` via
  `FileAccess.open()` + `get_as_text()` and asserts `content.contains("4.6")`.
- Config features line: `test_project_godot_config_features_line()` asserts `config/features` present
  and contains `'"4.6"'`.
- AND all scripts use GDScript: `test_project_does_not_declare_csharp()` asserts no `"Mono"` or
  `"C#"` in project.godot.
- AND all API calls valid for Godot 4.6: `test_file_access_get_as_text_returns_non_empty_string()`
  verifies `FileAccess.open()` + `get_as_text()` succeed and return the expected config file header.

