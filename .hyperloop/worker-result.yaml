### Requirement: Godot 4 — COVERED

**Implementation:**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` — Godot 4.x ✓
- All scripts (`main.gd`, `camera_controller.gd`, all tests) use `.gd` GDScript with
  Godot 4 syntax (`@export`, `@onready`, typed `Array[String]`, etc.) ✓

**Note:** The "Engine version" scenario is a static configuration check, not a
runtime behavior. No GDScript behavioral test covers it (a test would be a
tautology — the code cannot run at all unless the engine IS Godot 4.x). The
requirement is satisfied by the project configuration files.

