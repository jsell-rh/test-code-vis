### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd`, `_create_edge()`):
- `ImmediateMesh` with `PRIMITIVE_LINES` between `from_pos` and `to_pos` provides the
  visible line.
- `CylinderMesh(top_radius=0)` cone placed at `to_pos - dir * (height * 0.5)`,
  oriented along edge direction, provides the directional indicator.
- Cross-context edges coloured orange `Color(1.0, 0.50, 0.10)`.

**Tests** (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — verifies `ImmediateMesh` MeshInstance3D present.
- `test_direction_indicator_cone_created` — verifies `CylinderMesh` with
  `top_radius == 0.0` present.
- `test_direction_cone_near_target` — verifies cone position within 2 units of
  target coords.
- `test_cross_context_cone_is_orange` — verifies cone `albedo_color.r > 0.8` and
  `albedo_color.b < 0.3`.

Both THEN clauses ("line connects" and "direction visually indicated") are covered.

