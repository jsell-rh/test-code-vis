## Scope Check Output

```
OK: No prohibited (not-in-scope) features detected.
```

**This result is a false negative.** The script searches `godot/scripts/` for the
literal patterns `data.flow|dataflow`. The prohibited feature is implemented as
`flow_overlay.gd` / `FlowOverlay`, which matches neither pattern. The script also does
not scan `godot/tests/` for flow-related code.

---

## Blocking Finding: Data Flow Visualization Is Present

The spec states:

> AND data flow visualization is NOT implemented

Independent semantic audit (grepping for `flow_overlay`, `FlowOverlay`, `show_path`,
`show_aggregate`, `flow path`) found the feature fully present:

**`godot/scripts/flow_overlay.gd`** (214 lines)
- Implements `show_path()`, `show_aggregate()`, `clear_path()`, `is_path_active()`
- Explicit docstring: "Scenario 'Requesting a flow path' → show_path()",
  "Scenario 'Identifying a bottleneck' → show_aggregate()"

**`godot/tests/test_flow_overlay.gd`** (21 tests)
- Docstring line 3: "Covers all THEN-clauses from specs/visualization/data-flow.spec.md"
- Tests: `test_path_mid_node_lit_up`, `test_entry_node_green`, `test_terminus_node_red`,
  `test_high_traffic_edge_orange`, `test_bottleneck_node_has_overlay`, etc.

**`godot/scripts/main.gd`** — fully wired:
```gdscript
const FlowOverlay = preload("res://scripts/flow_overlay.gd")
var _flow: FlowOverlay = FlowOverlay.new()
var _flows: Array = []        # loaded from JSON scene graph
var _aggregate: Dictionary = {}  # loaded from JSON scene graph
_flow.setup(_anchors, _path_edge_entries)   # called in build_from_graph()
```
Keyboard shortcuts F (cycle path overlays) and G (toggle aggregate traffic) activate
the feature at runtime via `_unhandled_input()`.

**`godot/tests/run_tests.gd`** — suite registered:
```gdscript
_run_suite(preload("res://tests/test_flow_overlay.gd").new())
```

Per the guidelines:

> A renamed prohibited feature is still a prohibited feature. "The check script passed"
> is not a defence — check-not-in-scope.sh detects known patterns; semantic audit
> detects novel names. Both are required.

> A prohibited feature in any form (code, test, CLI flag, import, or signal connection)
> is an automatic FAIL regardless of how small or optional the implementation appears.

The worker's Not In Scope audit entry "Data flow visualization: NOT present ✓" is
factually incorrect. The feature is present throughout the codebase.

