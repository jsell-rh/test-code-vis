## Spec Alignment Review — task-007: Godot Application
Branch: hyperloop/task-007
Spec: specs/prototype/godot-application.spec.md

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation**
- `main.gd:_ready()` (lines 31–46) opens `scene_graph.json` with `FileAccess`, parses via
  `JSON.new()`, calls `build_from_graph(graph)`.
- `build_from_graph()` (lines 51–83) iterates nodes to create 3D volumes, then iterates edges to
  create line meshes, then calls `_frame_camera()`.
- `_create_volume()` (lines 121–165) creates a `Node3D` anchor at the JSON position, a `BoxMesh`
  sized from `nd["size"]`, and a `Label3D` with `BILLBOARD_ENABLED`.
- `_create_edge()` (lines 172–228) creates an `ImmediateMesh` line and a `CylinderMesh` arrowhead.

**Tests** (`test_scene_graph_loading.gd`)
- `test_volumes_created_for_each_node()` — asserts `_anchors` contains every node id. Covers
  THEN "generates 3D volumes for each node".
- `test_mesh_instances_exist_in_anchors()` — asserts each anchor has a `MeshInstance3D` child.
  Covers THEN "generates 3D volumes for each node".
- `test_edge_mesh_instances_created()` — asserts ≥ 2 `MeshInstance3D` children on main node per
  edge (1 line + 1 arrowhead). Covers AND "generates connections for each edge".
- `test_anchor_positions_match_json()` — asserts `anchor.position` equals JSON `position.x/y/z`.
  Covers AND "positions elements according to the layout data in the JSON".
- `test_labels_are_billboard_and_readable()` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test = true`. Covers AND "labels scale to remain readable" (Zooming scenario).

