| Zooming out | view zooms out from point under cursor | `test_zoom_out_shifts_pivot_away_from_cursor` (L228) | cursor=(10,0,0), zoom out → `cam._target_pivot.x < 0.0` (pivot past origin, away from cursor) | COVERED |
