## Implementation Consistency Checks (independent)

- **Edge key consistency**: extractor produces `source`/`target` keys; schema.py
  defines Edge TypedDict with `source`/`target`; scene_graph_loader.gd parses
  `source`/`target`; main.gd reads `ed["source"]` and `ed["target"]`; all test
  fixtures use `source`/`target`. Fully consistent. ✓

- **Camera API consistency**: camera_controller.gd exposes `_handle_button()`,
  `_handle_motion()`, `get_distance()`, `_set_orbit_pivot()`, `_orbiting`,
  `_last_mouse`, `zoom_speed`, `orbit_speed`, `min_distance`, `max_distance` as
  @export vars. test_camera_controls.gd and test_ux_polish.gd call exactly these
  methods/properties. Fully consistent. ✓

- **LOD constant names**: lod_manager.gd defines `FAR_THRESHOLD = 80.0` and
  `NEAR_THRESHOLD = 20.0`. test_spatial_structure.gd accesses
  `LodManager.FAR_THRESHOLD` and `LodManager.NEAR_THRESHOLD`. Fully consistent. ✓

- **set_pivot signature**: main.gd calls `_camera.call("set_pivot", centre, distance)`
  (2 args). camera_controller.gd defines `set_pivot(pivot: Vector3, distance: float)`.
  Consistent. ✓

- **LOD integration**: main.gd::_update_lod() checks `_camera.has_method("get_distance")`;
  camera_controller.gd implements `get_distance() -> float`. The method exists, so
  LOD is properly activated at runtime. ✓

