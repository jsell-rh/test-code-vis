### Requirement: Camera Controls — COVERED

Implementation: godot/scripts/camera_controller.gd
- Extends Camera3D. _theta=0.15 (nearly top-down), _phi=0.0, _distance=20.0.
- _update_camera_transform() uses look_at_from_position() (works without scene tree).
- WHEEL_UP/DOWN: clampf(_distance +/- ZOOM_STEP, MIN_DISTANCE, MAX_DISTANCE).
- Middle-mouse drag: _phi -= delta.x * ORBIT_SPEED, _theta = clampf(...) (orbit).
- Right-mouse drag: translates _pivot (pan).

Tests: godot/tests/test_camera_controls.gd (8 tests, all PASS)
- test_initial_theta_is_near_top_down: asserts 0.0 < _theta < 0.5.
