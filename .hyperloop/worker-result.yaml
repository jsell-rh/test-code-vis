### Requirement: Zoom Toward Mouse Cursor
#### Scenario: Zooming into a specific component

**THEN: view zooms toward the point under the cursor**
- Derivation: WHEEL_UP → `direction = −zoom_speed = −2.0`. step < 0 → _target_distance
  decreases. zoom_fraction = 1.0 − (smaller/original) > 0. `_pivot.lerp(cursor, positive)`
  → pivot moves TOWARD cursor. Cursor at (10,0,0), pivot at origin → pivot.x increases.
  Spec-derived predicate: pivot.x > 0.0.
- Test: `test_zoom_toward_cursor_shifts_pivot_toward_cursor` (test_ux_polish.gd:149)
  - Actual assert: `cam._pivot.x > 0.0` ✓ MATCHES.
- Status: COVERED.

**AND: component under the cursor stays under the cursor during the zoom**
- Derivation: each zoom-in step shifts pivot closer to cursor; pivot.x approaches cursor.x.
  After > before for pivot.x approaching cursor at x=20. Spec-derived predicate: after > before.
- Test: `test_component_stays_under_cursor_on_zoom_in` (test_ux_polish.gd:159)
  - Actual assert: `after > before` ✓ MATCHES.
- Status: COVERED.

#### Scenario: Zooming out

**THEN: view zooms out from the point under the cursor**
- Derivation: WHEEL_DOWN → `direction = +zoom_speed = +2.0`. step > 0 → _target_distance
  increases. zoom_fraction = 1.0 − (larger/original) < 0. `_pivot.lerp(cursor, negative)`
  → pivot moves AWAY from cursor. Pivot at (5,0,0), cursor at (10,0,0):
  zoom_fraction ≈ −0.15, pivot.x = 5 + (10−5)*(−0.15) = 4.25 < 5.
  Spec-derived predicate: pivot.x < 5.0.
- Test: `test_zoom_out_from_cursor_shifts_pivot_away` (test_ux_polish.gd:177)
  - Actual assert: `cam._pivot.x < 5.0` ✓ MATCHES.
- Status: COVERED.

