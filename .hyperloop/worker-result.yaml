## Requirement Coverage

### R1: Godot 4.6 Engine (MUST) — COVERED

**Code:** `godot/project.godot` declares `config/features=PackedStringArray("4.6")`.
All scripts in `godot/scripts/` are `.gd` files (`main.gd`, `scene_graph_loader.gd`,
`camera_controller.gd`, `lod_manager.gd`). No `.cs` files exist. `main.gd` uses
`FileAccess.open()` + `get_as_text()` — valid Godot 4.6 API, not the deprecated
Godot 3 `read_as_text()`.

**Scenario: Engine version — tests verified:**

| THEN clause | Test function | File |
|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | test_engine_version.gd |
| config/features declares "4.6" | `test_project_godot_config_features_line` | test_engine_version.gd |
| No C# / Mono | `test_project_does_not_declare_csharp` | test_engine_version.gd |
| FileAccess.get_as_text() is valid 4.6 API | `test_file_access_get_as_text_returns_non_empty_string` | test_engine_version.gd |
| All scripts use GDScript (DirAccess iteration) | `test_scripts_dir_contains_only_gdscript` | test_engine_version.gd |
| Opens in Godot 4.6.x (bool-return pattern) | `test_project_declares_godot_46` | test_godot_version.gd |
| All scripts use GDScript | `test_main_script_is_gdscript` | test_godot_version.gd |
| API calls are valid Godot 4.6 | `test_main_uses_godot4_fileaccess_api` | test_godot_version.gd |

Both test suites (Pattern-1 `_check`/`_test_failed` and Pattern-2 bool-return) are
correctly wired in `run_tests.gd`. All test function names independently verified
by grep before inclusion.

