## Requirement-by-Requirement Findings

### Requirement: Pan with Left Mouse Button — **COVERED**

**SHALL** the user be able to pan by holding LMB and dragging.

Implementation (`camera_controller.gd`):
- Lines 101–103: `MOUSE_BUTTON_LEFT` press sets `_panning = true` and records `_last_mouse`.
- Lines 141–160 (`_handle_motion` when `_panning`): derives `right` and `backward` from
  `transform.basis`, then applies `_target_pivot -= right * delta.x * pan_amount` and
  `_target_pivot -= backward * delta.y * pan_amount`; immediately copies to `_pivot`.

Scenario — *Panning the view* (GIVEN top-down view, WHEN LMB+drag, THEN pans):
- `test_lmb_drag_pans_camera` — presses LMB at (100,100), moves to (150,100),
  asserts `cam._pivot != initial_pivot`. ✓

AND movement direction matches drag (not inverted):
- `test_pan_direction_not_inverted` — at phi=PI/2 (camera on +Z side), drags left
  (delta.x = −50), asserts `cam._pivot.x > 0.0`. Derivation comment present and
  independently verified: `_target_pivot -= (+X) * (−50) * pan` → pivot.x increases
  → scene shifts left = same direction as drag. ✓

