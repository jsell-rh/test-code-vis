### Requirement: Godot 4 (SHALL)

**Implementation:**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` — confirms Godot 4.6.
- All scripts (`main.gd`, `camera_controller.gd`, all test files) use `.gd` extension and GDScript syntax.

**Tests:** The GDScript test suite (`run_tests.gd` extends `SceneTree`) uses Godot 4-specific typed array syntax and `GDScript` APIs only available in Godot 4. Compilation under Godot 4.6.2 is confirmed by the project configuration. There is no behavioral runtime test explicitly asserting the version string, but this is a configuration/build requirement, not a runtime behavior — `project.godot` is the authoritative source, and all scripts are GDScript.

**COVERED.**

