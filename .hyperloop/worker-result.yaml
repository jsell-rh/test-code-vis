### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd → _create_volume()`):
- `bounded_context`: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`,
  box size `Vector3(sz, sz*0.2, sz)` where `sz` comes from JSON.
- `module`: fully opaque (`albedo_color.a = 1.0`), box size `Vector3(sz, sz*0.6, sz)`.
- Module anchor is parented directly to its context anchor (lines 71–73), placing it
  inside the parent in the scene tree.

**Tests** (`test_containment_rendering.gd`):
- `test_bounded_context_is_translucent()`: asserts `transparency != TRANSPARENCY_DISABLED`
  and `albedo_color.a < 1.0`.
- `test_module_is_opaque()`: asserts `albedo_color.a >= 1.0`.
- `test_module_parented_inside_context()`: asserts `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module()`: asserts `ctx_mesh.size.x > mod_mesh.size.x`
  (10.0 > 3.0 with fixture data).
- `test_bounded_context_cull_disabled()`: asserts `cull_mode == CULL_DISABLED` —
  visually distinct from children which use default back-face culling.

All THEN/AND clauses covered by real Node3D property assertions.

