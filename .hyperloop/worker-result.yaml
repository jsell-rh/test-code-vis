### Requirement: Target Codebase — COVERED

**Code:** `extractor/__main__.py` accepts any `src_path`; `build_scene_graph()` in
`extractor/extractor.py` discovers bounded contexts and sub-modules. A real kartograph
extraction is committed in `godot/data/scene_graph.json` (contains "graph", "iam", and
other kartograph BCs), confirming the pipeline runs against the live codebase.

**Tests:** `TestModuleDiscovery` and `TestSceneGraphOutput` in `extractor/tests/test_extractor.py`
use a kartograph-shaped fixture (`iam`, `graph`, `shared_kernel`) and assert structure
is produced correctly.

**Scenario: Loading kartograph** — COVERED

