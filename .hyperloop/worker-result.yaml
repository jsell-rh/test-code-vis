### Requirement: View Specs as Intermediate Representation — COVERED

The system MUST use a structured view specification as the intermediate representation
between the LLM and the 3D renderer. The LLM generates a view spec; the renderer
interprets it.

**Implementation:** `parse_response()` returns `{"question": str, "operations": Array}`
— a structured Dictionary, not raw 3D geometry. This is the intermediate representation
contract. The 3D renderer side is prohibited by prototype scope (not a FAIL).

#### Scenario: LLM produces view spec — COVERED
- `test_parse_response_returns_dictionary` — confirms return type is Dictionary (not
  geometry).
- `test_parse_response_has_question_key` / `test_parse_response_has_operations_key` —
  verifies the view spec structure.
- `test_parse_response_all_six_ops_pass_through` — all six op types (show, hide,
  highlight, arrange, annotate, connect) survive parsing, confirming the view spec
  controls which elements are shown, hidden, highlighted, and arranged.
- `test_parse_response_strips_markdown_code_fences` / `test_parse_response_strips_plain_code_fences`
  — LLM wrapping handled gracefully.

---

### Requirement: Fixed Visual Primitive Set — COVERED

The set of visual primitives MUST be fixed and finite. The LLM selects from available
primitives; it does not invent new ones.

**Implementation:**
- `VALID_OPS: Array = ["show","hide","highlight","arrange","annotate","connect"]` is a
  compile-time constant in `llm_view_generator.gd`.
- `build_prompt()` embeds all VALID_OPS in the prompt text so the LLM cannot invent ops
  it was never told about.
- `_make_spec()` (called by `parse_response()`) drops any op not in VALID_OPS,
  enforcing the contract at parse time — no new rendering logic enters the renderer.

#### Scenario: LLM uses existing primitives — COVERED
- `test_build_prompt_contains_{show,hide,highlight,arrange,annotate,connect}_primitive`
  (6 tests) — all primitives are listed in the prompt.
- `test_parse_response_all_six_ops_pass_through` — all 6 valid ops survive.
- `test_parse_response_filters_unknown_ops` — unknown op "invent_new_renderer" is
  silently dropped; only "show" survives.
- `test_parse_response_with_all_unknown_ops_returns_empty_operations` — all-unknown
  payload yields zero operations.

