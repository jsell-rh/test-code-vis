All SHALL/MUST requirements from specs/extraction/code-extraction.spec.md are
implemented and have passing test coverage. 96 tests pass (0 failures).

## Requirement: Module Discovery — COVERED

**Implementation:** `extractor/extractor.py`
- `discover_bounded_contexts()` walks the source tree and returns nodes typed
  `bounded_context` with id, name, path (via id), and type.
- `discover_submodules()` returns child `module` nodes with `parent` set to the
  BC id, representing containment.
- `is_bounded_context()` / `is_python_package()` / `is_internal_module()` are
  the predicate helpers.

**Scenario: Discovering kartograph's bounded contexts**
- Tests: `TestModuleDiscovery::test_discovers_bounded_contexts`,
  `test_bounded_context_node_has_required_keys`, `test_bounded_context_type`,
  `test_bounded_context_parent_is_none`.
  Fixture uses iam / graph / shared_kernel (representative subset). COVERED.

**Scenario: Discovering nested modules**
- Tests: `TestModuleDiscovery::test_discovers_submodules_in_iam`,
  `test_submodule_parent_references_bc`, `test_submodule_type_is_module`,
  `test_submodule_id_is_dotted`. COVERED.

## Requirement: Dependency Extraction — COVERED

**Implementation:** `build_dependency_edges()` in `extractor/extractor.py`
- Cross-context edges are normalised to BC level (`iam → shared_kernel`).
- Internal edges are emitted at module level (`iam.application → iam.domain`).
- EdgeType literals (`"cross_context"` / `"internal"`) distinguish the two.
- Direction encoded by `source` / `target` fields.

**Scenario: Cross-context dependency**
- Tests: `TestDependencyExtraction::test_cross_context_edge_created`,
  `test_cross_context_edge_type`. COVERED.

**Scenario: Internal dependency**
- Tests: `TestDependencyExtraction::test_internal_edge_created`,
  `test_internal_edge_type`. COVERED.

