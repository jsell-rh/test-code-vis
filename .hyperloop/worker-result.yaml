| "no dependencies beyond stdlib (and tree-sitter/ast)" | `extractor/tests/test_cli.py::TestStdlibOnlyImports::test_extractor_uses_only_stdlib_imports` | AST-walks every `.py` in `extractor/`; asserts every import top-level name is in `sys.stdlib_module_names` or the `extractor` package itself. ✓ |

