## THEN-Clause → Test Mapping

**Conformance / Alignment requirement:**

1. "THEN the human can see that the realized system has auth and user management as separate components"
   → `test_aligned_nodes_detected_as_separate` (line 88)
   Calls `check_alignment([auth, user_management], ["auth", "user_management"])` and asserts
   both IDs are in the `aligned` array with `divergent` and `missing` empty.

2. "AND the correspondence between spec and realization is visually apparent"
   → `test_aligned_nodes_have_annotation_in_spec` (line 111)
   Instantiates Node3D anchors, calls `build_alignment_spec(alignment)`, applies via
   SceneInterpreter, asserts ≥1 Label3D child of scene_root.

3. "THEN the human can see the divergence between spec and realization"
   → `test_divergent_nodes_detected` (line 143)
   actual_nodes = [order_service]; spec = ["payment_service"].
   Asserts payment_service is in `missing` or `divergent`.

4. "AND the specific nature of the divergence is clear (merged vs. separate)"
   → `test_divergent_nodes_annotated_as_merged` (line 164)
   actual_nodes = [payment_order]; spec = ["payment"] (substring match → divergent).
   Applies build_alignment_spec and asserts a Label3D with text containing "MERGED" appears.

**Evaluation / Quality requirement:**

5. "THEN the coupling between those services is apparent"
   → `test_tightly_coupled_pair_detected` (line 202)
   3 edges between service_a ↔ service_b; asserts pairs.size() >= 1 and
   coupling_score >= 2.

6. "AND the human can assess whether the coupling is problematic"
   → `test_coupled_nodes_highlighted_in_spec` (line 225)
   Instantiates MeshInstance3D-equipped anchors, calls build_coupling_spec, applies via
   SceneInterpreter, asserts both nodes' material_override.albedo_color ==
   SceneInterpreter.HIGHLIGHT_COLOR.

7. "THEN the criticality and centrality of that component is apparent"
   → `test_central_node_detected_as_critical` (line 266)
   hub has in-degree 3 (three services depend on it); asserts critical[0].node_id == "hub"
   and critical[0].in_degree == 3.

8. "AND the risk it represents is clear"
   → `test_critical_node_annotated_with_spof_risk` (line 294)
   Applies build_criticality_spec; asserts a Label3D with "SPOF" in its text appears in
   scene_root.

9. "THEN architectural problems are visible even though conformance is perfect"
   → `test_coupling_detected_despite_perfect_alignment` (line 329)
   alignment.aligned.size() == 2 (perfect). analyze_coupling still returns pairs.size() >= 1
   (coupling problem visible independently).

**Simulation / Impact requirement:**

10. "THEN the impact on dependent services is visible"
    → `test_split_dependents_detected` (line 359)
    client_a and client_b both target monolith; asserts both appear in `dependents`.

11. "AND new dependencies or interfaces that would be required are shown"
    → `test_split_new_interfaces_shown` (line 384)
    Asserts new_interfaces.size() >= 1; applies build_split_spec via SceneInterpreter;
    asserts caller's MeshInstance3D is highlighted AND a Label3D with "split" text is present.

12. "THEN the cascade of effects through the system is visible"
    → `test_failure_cascade_detected` (line 435)
    api → db; frontend → api. simulate_failure("db") BFS; asserts both api and frontend
    are in cascade (transitive).

13. "AND components that would be affected are clearly identified"
    → `test_failure_affected_nodes_highlighted` (line 460)
    build_failure_spec; SceneInterpreter.apply_spec; asserts consumer_1's mesh
    albedo_color == HIGHLIGHT_COLOR AND a Label3D with "FAILED" text appears.

**Label3D readability (mandatory):**

14. `test_annotation_label3d_has_billboard_and_pixel_size` (line 509)
    Exercises criticality → build_criticality_spec → apply_spec pipeline; asserts
    label.billboard == BaseMaterial3D.BILLBOARD_ENABLED AND label.pixel_size > 0.0.

## Untestable THEN-Clauses

None. All THEN-clauses are fully testable in the headless environment through
scene-tree property assertions on Node3D, MeshInstance3D, and Label3D objects.

