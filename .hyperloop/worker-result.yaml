## Requirement-by-Requirement Findings

### Requirement: Pan with Left Mouse Button — COVERED

Implementation (`camera_controller.gd`):
- Lines 101–104: `MOUSE_BUTTON_LEFT` sets `_panning = true`/`false`, records `_last_mouse`.
- Lines 141–160: `_handle_motion` when `_panning` computes `delta`, derives `right` and `backward` from `transform.basis`, applies `_target_pivot -= right * delta.x * pan_amount`.

THEN clauses:
- "camera pans in the direction of the drag" → `test_lmb_drag_pans_camera`: LMB press + 50px drag → `cam._pivot != initial_pivot` ✓
- "movement direction matches the drag direction (not inverted)" → `test_pan_direction_not_inverted`: drag left → `cam._pivot.x > 0.0` (Google Maps sign-chain) ✓

### Requirement: Non-Inverted Movement — COVERED

Implementation lines 152–157: `_target_pivot -= right * delta.x * pan_amount`. Drag left (delta.x < 0) → pivot moves +X → camera shifts right → scene appears to shift left (same as drag).

THEN clause: "scene moves in same direction as drag" → `test_pan_direction_not_inverted` ✓

### Requirement: Zoom Toward Mouse Cursor — COVERED

Implementation: `_zoom_toward_point(world_pt, direction)` computes `zoom_ratio = _target_distance / old_dist`, sets `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.

THEN clauses:
- "view zooms toward point under cursor" → `test_zoom_in_shifts_pivot_toward_cursor` ✓
- "component under cursor stays under cursor" → `test_zoom_in_cursor_point_invariant` ✓
- "view zooms out from point under cursor" → `test_zoom_out_shifts_pivot_away_from_cursor` ✓

### Requirement: Orbit Around Mouse Point — COVERED

Implementation: RMB press → `begin_orbit_at_world_point(world_pt)` sets `_pivot = world_pt`.

THEN clauses:
- "camera orbits around point under cursor at orbit start" → `test_orbit_uses_right_mouse_button` + `test_orbit_around_cursor_point` ✓
- "component remains at visual center" → `test_orbit_pivot_is_world_point` ✓

### Requirement: Smooth Camera Movement — COVERED

Implementation (`_process` lines 42–47): exponential smoothing `t = 1.0 - pow(0.05, delta * zoom_smooth)`, `_distance = lerpf(...)`, `_pivot = _pivot.lerp(...)`.

THEN clauses:
- "zoom is animated smoothly (interpolated), not instantaneous" → `test_smooth_zoom_target_differs_from_distance_after_scroll` + `test_smooth_zoom_process_interpolates_distance` ✓
- "pan movement is smooth and proportional to drag speed" → `test_pan_proportional_to_drag_speed` ✓

