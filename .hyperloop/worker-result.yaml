### Requirement: Camera Controls (SHALL)

**Implementation** (`godot/scripts/camera_controller.gd`):
- Top-down default: `_theta = 0.15` (≈8.6° from top, < PI/4 = 45°).
- Zoom: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `MOUSE_BUTTON_WHEEL_DOWN` increases it; clamped to `[min_distance=2, max_distance=500]`.
- Orbit: `MOUSE_BUTTON_MIDDLE` drag updates `_phi` (azimuth) and `_theta` (polar); `look_at(_pivot, Vector3.UP)` keeps Y-up stable.

**Tests** (`godot/tests/test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` — `cam._theta < PI / 4.0`. ✓ (Top-down overview scenario)
- `test_initial_distance_is_positive` — `cam._distance > 0.0`. ✓
- `test_scroll_up_decreases_distance` — after WHEEL_UP event, `_distance < initial`. ✓ (Zooming scenario)
- `test_scroll_down_increases_distance` — after WHEEL_DOWN event, `_distance > initial`. ✓
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse press + motion → `_phi != initial`. ✓ (Orbiting scenario)
- `test_orbit_vertical_drag_changes_theta` — middle-mouse press + upward motion → `_theta != initial`. ✓
- `test_set_pivot_updates_state` — `set_pivot(v, d)` sets `_pivot` and `_distance`. ✓
- `test_zoom_clamped_at_minimum` — 200 WHEEL_UP events → `_distance >= min_distance`. ✓

All Given/When/Then conditions for all three sub-scenarios match. **COVERED.**

