## Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

**Code:** `godot/scripts/main.gd` `_ready()` uses `FileAccess.file_exists()`, opens
with `FileAccess.open(scene_graph_path, FileAccess.READ)`, reads via `get_as_text()`,
parses with `JSON.new()` + `json.parse()`, passes to `SceneGraphLoader.load_from_dict()`,
then calls `build_from_graph()`. The `build_from_graph()` method creates Node3D anchors
for every node (two passes: roots first, then children), calls `_create_volume()` for
each node and `_create_edge()` for each edge. Anchor `.position` is set directly from
`Vector3(float(p["x"]), float(p["y"]), float(p["z"]))`. A real kartograph scene graph
(`godot/data/scene_graph.json`) with ~37 nodes and ~58 edges is present in the repo.

**Tests:** `godot/tests/test_scene_graph_loading.gd` — 5 behavioral tests asserting
real Node3D property values:
- `test_volumes_created_for_each_node` — asserts `_anchors` contains both node ids
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a MeshInstance3D child
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D children per edge (line + cone)
- `test_anchor_positions_match_json` — asserts real `.position` values match JSON coordinates
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test == true` on Label3D

Status: **COVERED** ✓

