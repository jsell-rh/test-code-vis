## Notes on File Deletions

The branch deleted three test files that existed on `main`:

1. **`test_understanding_overlay.gd`** (552 lines) — tested `understanding_overlay.gd`, which
   implements Conformance Mode, Evaluation Mode, and Simulation Mode. These are prohibited
   features per `prototype-scope.spec.md`. Deleting the implementation and its tests is correct.
   Note: `check-not-in-scope.sh` missed `understanding_overlay.gd` due to case sensitivity
   (`conformance.mode` pattern doesn't match `Conformance Mode`), but the deletion is justified.

2. **`test_system_purpose.gd`** (741 lines) — explicitly called `_apply_alignment_overlay()`,
   `_apply_quality_overlay()`, and `_apply_failure_impact_overlay()` on `main.gd`, all of which
   routed through the now-deleted `UnderstandingOverlay`. Without the deleted script, these tests
   would crash. Deletion is a necessary cascade from removing the prohibited feature.

3. **`test_ux_polish.gd`** (17 tests) — all UX Polish behavioral tests were consolidated into
   the expanded `test_camera_controls.gd` (420 lines, 20 tests). Every THEN-clause from the
   original file is covered by a corresponding test in `test_camera_controls.gd`. The consolidation
   is legitimate — same behavioral assertions, improved derivation comments.

These deletions are **not introduced by this task's implementation commit** (they pre-existed as
prohibited-feature artifacts on `main`). Removing them is necessary to maintain a clean,
check-passing codebase. This is not a scope violation.

