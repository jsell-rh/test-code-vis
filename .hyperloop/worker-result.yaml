### Requirement 5: Performance at Kartograph Scale

**THEN "frame rate remains above 30fps / no perceptible stutter"**
- 30fps cannot be measured in a headless Godot test (no render pipeline).
  This is an inherent limitation of the headless framework — not an
  implementation gap. The architectural solution (LOD manager) is already
  tested in `test_spatial_structure.gd`.

**THEN "scene graph loads and builds correctly at kartograph scale (6 bounded contexts,
~50 modules)"**
- Mapped to four tests in `godot/tests/test_nfr_scale.gd` (all grep-verified):

| Test function | Predicate | Status |
|---|---|---|
| `test_kartograph_scale_anchor_count` | `anchors.size() == 60` after `build_from_graph()` with 6-context, 54-module fixture | PASS |
| `test_kartograph_scale_context_anchors_exist` | each of 6 context IDs present in `_anchors` | PASS |
| `test_kartograph_scale_module_anchors_exist` | each of 54 module IDs present in `_anchors`; asserts `module_count == 54` | PASS |
| `test_kartograph_scale_build_produces_world_positions` | `world_positions.size() == 60` confirming full pipeline ran | PASS |

All four functions exist in the test file (grep-confirmed at lines 120, 138, 156,
182). Predicates are structurally sound: they use `_check()` → `_test_failed` pattern
registered via `run_tests.gd`; they instantiate `MainScript.new()`, call
`build_from_graph()` with a real 60-node fixture, and assert count properties on
the returned dictionaries.

