### Requirement: Dependency Rendering — COVERED

**Implementation**
- `_create_edge()`: `ImmediateMesh` with `PRIMITIVE_LINES` from `from_pos` to `to_pos`.
- `CylinderMesh` with `top_radius = 0.0` (a cone) oriented along the edge direction, placed at
  `to_pos - dir * (height * 0.5)` — tip lands exactly at `to_pos`, indicating flow direction.
- Cross-context: `Color(1.0, 0.50, 0.10)` (orange). Internal: grey.

**Tests** (`test_dependency_rendering.gd`)
- `test_edge_line_mesh_created()` — asserts an `ImmediateMesh MeshInstance3D` exists. Covers
  THEN "a line connects the two context volumes".
- `test_direction_indicator_cone_created()` — asserts `CylinderMesh` with `top_radius == 0.0`
  exists. Covers AND "the line's direction is visually indicated".
- `test_direction_cone_near_target()` — asserts cone position is within 2 units of target `(20,0,0)`.
  Verifies the arrowhead marks the correct arrival end.
- `test_cross_context_cone_is_orange()` — asserts `r > 0.8` and `b < 0.3` on the cone material.
  Verifies cross-context visual distinction.

