## Spec Alignment Review — task-019
### Spec: specs/interaction/moldable-views.spec.md
### Branch: hyperloop/task-019

All three SHALL requirements are implemented and have corresponding GDScript
behavioral tests in godot/tests/ that exercise Given/When/Then conditions with
known fixture data and assert runtime outputs (scene-tree nodes, property
values, positions).

---

### Requirement: Question-Driven View Generation — COVERED

**Implementation:**
- `godot/scripts/view_spec_renderer.gd` — `ViewSpecRenderer.apply()` accepts a
  parsed view spec and graph, then builds a spatial scene under a Node3D root.
  The `show` op restricts which nodes are rendered; the `hide` op removes
  listed ids from the scene; the `arrange` op overrides positions; the
  `connect` op creates a connector Node3D at the midpoint between two nodes.

**Scenario: Architectural question** — COVERED
- `test_show_op_includes_listed_node_in_scene_tree` — THEN: auth-related node
  appears after `show` op with question "how does authentication work?"
- `test_show_op_excludes_non_listed_nodes_from_scene_tree` — AND: irrelevant
  nodes (payment_service, user_db) are absent when `show` restricts to
  auth_service
- `test_hide_op_removes_node_from_scene_tree` — AND: de-emphasis via `hide` op
  removes payment_service from scene tree
- `test_arrange_op_overrides_node_position_x/y/z` — AND: `arrange` op
  overrides the node's 3D position to spec-provided coordinates

**Scenario: Impact question** — COVERED
- `test_show_multiple_ids_all_appear_in_scene_tree` — THEN: user_db and
  auth_service (its dependent) both appear in scene tree with question
  "what depends on the user database?"
- `test_connect_op_creates_connector_node_in_scene_tree` — AND: `connect` op
  creates a Node3D named "conn_auth_service_user_db" making the dependency
  spatially visible
- `test_connect_op_connector_position_is_midpoint_x/y` — AND: connector is
  placed at the geometric midpoint between the two nodes, making the
  relationship spatially clear

