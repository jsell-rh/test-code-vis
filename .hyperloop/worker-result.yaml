## Requirements Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 101–103: `MOUSE_BUTTON_LEFT` press sets `_panning = true` and records `_last_mouse`.
- Lines 141–158 (`_handle_motion`): when `_panning`, computes `right` and `backward` from
  `transform.basis` and shifts `_target_pivot` by `delta * pan_amount`.

**Scenario: Panning the view**
- GIVEN top-down camera view — `_theta` initialised to `0.15` (near top-down).
- WHEN LMB held and dragged — `_panning` flag set on button press; motion handler fires.
- THEN camera pans in direction of drag — `_target_pivot` mutated; `_pivot` set equal to
  `_target_pivot` immediately for responsive feel.
- AND direction is not inverted — see Non-Inverted requirement below.

**Test**: `test_lmb_drag_pans_camera` (`test_camera_controls.gd:147`)
- Presses LMB, drags 50 px right, asserts `cam._pivot != initial_pivot`. ✓

---

### Requirement: Non-Inverted Movement — COVERED

**Implementation** (`camera_controller.gd` lines 144–155):
- `right = basis.x` — local right axis.
- `backward` = horizontal component of `basis.z` normalised.
- `_target_pivot += right * delta.x * pan_amount` — drag right → pivot moves right (not left).
- `_target_pivot -= backward * delta.y * pan_amount` — drag up (negative delta.y) → pivot moves
  forward in world space.
- Comment at line 153 explicitly documents the non-inverted convention.

**Scenario: Drag direction matches view movement**
- GIVEN any camera position.
- WHEN user drags in any direction.
- THEN scene moves in same direction as drag.

**Test**: `test_pan_direction_not_inverted` (`test_camera_controls.gd:167`)
- Sets `_phi = PI/2` so `basis.x` aligns with world +X.
- Drags 50 px right (delta.x = +50).
- Asserts `cam._pivot.x > 0.0` — confirms right drag shifts pivot rightward (non-inverted). ✓

---

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation** (`camera_controller.gd` lines 168–176, `_zoom_toward_point`):
- Computes new `_target_distance` (clamped to `[min_distance, max_distance]`).
- `zoom_ratio = _target_distance / old_dist`.
- `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio` — shifts pivot
  toward (ratio < 1, zoom-in) or away from (ratio > 1, zoom-out) the cursor world point.
- `_distance` and `_pivot` interpolate toward targets in `_process()`.
- Zoom is triggered by `MOUSE_BUTTON_WHEEL_UP/DOWN` (lines 120–128), passing the ground
  point under `_last_mouse` as `world_pt`.

**Scenario: Zooming into a specific component**
- GIVEN cursor over a bounded context.
- WHEN scrolling to zoom in.
- THEN view zooms toward cursor point.

**Tests**:
- `test_zoom_in_shifts_pivot_toward_cursor` (`test_camera_controls.gd:197`) — cursor at
  `(10,0,0)`, zoom-in: `cam._target_pivot.x > 0.0`. ✓
- `test_zoom_in_cursor_point_invariant` (`test_camera_controls.gd:213`) — cursor at
  `(20,0,0)`, asserts `0 < cam._target_pivot.x < 20.0` (pivot between old origin and cursor). ✓

**Scenario: Zooming out**
- GIVEN zoomed-in view.
- WHEN scrolling to zoom out.
- THEN view zooms out from cursor point.

**Test**: `test_zoom_out_shifts_pivot_away_from_cursor` (`test_camera_controls.gd:228`)
- Cursor at `(10,0,0)`, zoom-out: asserts `cam._target_pivot.x < 0.0` (pivot pushed past origin,
  away from cursor). ✓

