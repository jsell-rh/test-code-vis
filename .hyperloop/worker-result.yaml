## Implementation Summary

All five requirements from specs/prototype/ux-polish.spec.md are implemented in
`godot/scripts/camera_controller.gd` and covered by tests in
`godot/tests/test_camera_controls.gd`.

- **Pan with LMB**: `_handle_button` sets `_panning = true` on `MOUSE_BUTTON_LEFT` press.
  `_handle_motion` shifts `_target_pivot` via `right * delta.x` and `backward * delta.y`.
- **Non-inverted**: Drag left (delta.x < 0) at phi=PI/2 causes pivot.x to increase, camera
  moves right, scene shifts left matching drag direction (Google Maps convention).
- **Zoom toward cursor**: `_zoom_toward_point` adjusts `_target_distance` and shifts
  `_target_pivot` toward/away from the cursor world point, keeping it invariant.
- **Orbit around cursor**: RMB press calls `_get_ground_point_under_cursor` then
  `begin_orbit_at_world_point(world_pt)`, setting `_pivot = world_pt`.
- **Smooth movement**: `_process()` uses exponential smoothing
  (`t = 1.0 - pow(0.05, delta * zoom_smooth)`) to interpolate `_distance` and `_pivot`
  each frame.

