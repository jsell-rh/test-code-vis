## Requirement-by-Requirement Findings

### Requirement: Question-Driven View Generation — COVERED

The system MUST accept natural language questions and generate a spatial view tailored
to answering that specific question.

**Implementation:**
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` accepts a
  natural-language question and embeds it with all graph node IDs into an LLM prompt.
- `godot/scripts/scene_interpreter.gd` — `apply(spec, anchors, scene_root, world_positions)`
  executes show/hide/arrange/connect/highlight/annotate ops to produce a spatial view.
- `godot/scripts/main.gd:apply_view_spec()` (lines 271–273) — wires stage 1 → stage 2.

**Scenario: Architectural question**

| THEN clause | Implementation | Test |
|---|---|---|
| view focused on auth-related components | `build_prompt()` includes all node IDs | `test_build_prompt_contains_node_id_auth_service` — asserts `prompt.contains("auth_service")` |
| irrelevant components hidden or de-emphasized | `_apply_hide()` sets `anchor.visible = false` | `test_hide_op_sets_visible_false` — real Node3D, asserts `anchor.visible == false` |
| relevant components arranged to answer the question | `_apply_arrange()` sets `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_all_three_axes` — asserts x/y/z within 0.001 |

**Scenario: Impact question**

| THEN clause | Implementation | Test |
|---|---|---|
| view shows user database and all its dependents | `_apply_show()` sets `anchor.visible = true` | `test_show_op_sets_visible_true` — fixture "user_db", asserts `anchor.visible == true` |
| dependency relationships spatially clear | `_apply_connect()` draws ImmediateMesh line + CylinderMesh arrowhead | `test_connect_op_adds_arrowhead` — asserts >= 2 MeshInstance3D children in scene_root |

