| API calls valid for Godot 4.6 | `test_file_access_get_as_text_returns_non_empty_string` | test_engine_version.gd | ✓ |

Iteration predicate check: `test_scripts_dir_contains_only_gdscript` opens
`res://scripts` via `DirAccess.open()`, iterates every file with `get_next()`, and
asserts `file_name.ends_with(".gd")` for each non-directory entry. This is a full
iteration over all files, not a single-file check — the THEN-clause predicate matches.

### Scenario: Running the extractor

| THEN-clause | Test function | File | Verified |
|---|---|---|---|
| runs as standalone CLI tool | `TestCliEntryPoint::test_main_produces_json_output` | extractor/tests/test_cli.py | ✓ |
| no deps beyond stdlib/tree-sitter | `TestStdlibOnlyImports::test_extractor_uses_only_stdlib_imports` | extractor/tests/test_cli.py | ✓ |

Stdlib predicate check: `test_extractor_uses_only_stdlib_imports` iterates all `.py`
files in `extractor/` (excluding `tests/`), walks their ASTs, and asserts every
top-level import is in `sys.stdlib_module_names` or is an intra-package import. This
exactly matches the THEN-clause predicate.

### Scenario: Decoupled pipeline

| THEN-clause | Test function | File | Verified |
|---|---|---|---|
| no access to extractor or codebase | `test_nodes_list_is_returned` | test_scene_graph_loader.gd | ✓ |
| JSON file is self-contained | `test_metadata_is_returned` | test_scene_graph_loader.gd | ✓ |
| JSON file is self-contained (missing keys) | `test_missing_top_level_keys_default_to_empty` | test_scene_graph_loader.gd | ✓ |

Note: `test_scene_graph_loader.gd` loads exclusively from a `_make_fixture()`
dictionary with no filesystem I/O and no Python extractor invocation, confirming
decoupling.

