### Notes

- The spec's "WHEN the LLM processes the question" clause implies full LLM
  integration, which is not part of this task (task title: "Godot: view-spec
  interpreter"). This task implements the renderer side of the intermediate-
  representation contract. The LLM-to-spec pipeline is a separate concern and
  its absence does not constitute a failure here.
- `specs/prototype/prototype-scope.spec.md` lists moldable views as out of
  prototype scope, but the implementer has correctly built only the interpreter
  layer (ViewSpec + ViewSpecRenderer) without coupling to an LLM runtime,
  which is consistent with the task scope and the spirit of the prototype-
  scope restriction.
- Both `test_view_spec.gd` and `test_view_spec_renderer.gd` are registered and
  executed by `godot/tests/run_tests.gd` (lines 27–28), confirming these are
  active runtime behavioral tests, not dead code.
