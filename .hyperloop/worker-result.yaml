## Implementation Overview

The prototype implements a two-stage pipeline:

**Stage 1 — Python Extractor (`extractor/`):**
- `extractor/extractor.py` — discovers bounded contexts and modules from any Python codebase via filesystem traversal and AST-based import parsing; computes LOC metrics; produces a JSON scene graph.
- `extractor/__main__.py` — CLI entry point: `python -m extractor <src_path> [--output out.json]`.
- `extractor/schema.py` — TypedDict definitions for the JSON contract between extractor and Godot.

**Stage 2 — Godot Application (`godot/scripts/`):**
- `main.gd` — loads JSON via `FileAccess.open()`, calls `build_from_graph()` to create BoxMesh volumes (bounded contexts = translucent slabs, modules = opaque boxes), Label3D labels (billboard + pixel_size=0.012 + no_depth_test), ImmediateMesh edge lines, and CylinderMesh arrowhead cones.
- `camera_controller.gd` — orbit (RMB drag), pan (LMB drag), smooth zoom (scroll wheel); starts at `_theta=0.15` (top-down); zoom clamped to `[min_distance, max_distance]`.
- `lod_manager.gd` — three LOD levels: far (only bounded_context visible), medium (+ modules, cross_context edges), near (all nodes + all edges).
- `scene_graph_loader.gd` — parses JSON dict into typed arrays for `main.gd`.

