### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 42–47: `_process` uses exponential smoothing: `t = 1.0 - pow(0.05, delta * zoom_smooth)`,
  then `lerpf(_distance, _target_distance, t)` and `_pivot.lerp(_target_pivot, t)`.
- `_zoom_toward_point` sets only targets; actual _distance/_pivot lag behind until _process runs.
- Pan applies immediately (responsive) and is proportional to drag delta (lines 152–159).

**Tests**:
- `test_smooth_zoom_target_differs_from_distance_after_scroll`: After scroll, `_target_distance < _distance`
  (target changed, current has not yet interpolated) ✓
- `test_smooth_zoom_process_interpolates_distance`: After `_process(0.1)`, `20.0 < _distance < 40.0` ✓
- `test_pan_proportional_to_drag_speed`: 50px drag moves pivot more than 10px drag ✓

#### Scenario: Smooth zoom — COVERED
`test_smooth_zoom_target_differs_from_distance_after_scroll` + `test_smooth_zoom_process_interpolates_distance` ✓

#### Scenario: Smooth pan — COVERED
`test_pan_proportional_to_drag_speed` ✓

