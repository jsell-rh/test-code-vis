## Not-In-Scope Audit

The NFR spec does not have an explicit "Not In Scope" section. The broader prototype scope
is governed by `specs/prototype/prototype-scope.spec.md`. Items that `check-not-in-scope.sh`
enforces as prohibited (from that spec):

- Moldable views / LLM-powered question-driven views — NOT implemented
- Spec extraction features — NOT implemented
- Conformance/evaluation/simulation modes — NOT implemented
- Data-flow visualization — NOT implemented
- First-person navigation — NOT implemented

