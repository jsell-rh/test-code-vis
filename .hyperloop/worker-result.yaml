## THEN-Clause Coverage

### Scenario: Loading kartograph
- THEN kartograph's structure is visualized in 3D space
  -> `test_kartograph_integration_bounded_contexts` (extractor/tests/test_kartograph_integration.py:32) — runs extractor against ~/code/kartograph/src/api, asserts iam/graph/shared_kernel contexts in output
- AND the visualization reflects the actual structure of the codebase
  -> Same test: asserts bounded context names match actual kartograph structure

### Scenario: Extraction then visualization
- THEN a JSON scene graph file is produced
  -> `test_main_writes_json_output` (extractor/tests/test_cli.py:44) — verifies file written, valid JSON, contains nodes/edges/metadata keys
- AND the Godot application can load that file and render the scene
  -> `test_volumes_created_for_each_node` (godot/tests/test_scene_graph_loading.gd:45) — Godot creates anchors for each JSON node
  -> `test_anchor_positions_match_json` (godot/tests/test_scene_graph_loading.gd:88) — positions match JSON data

### Scenario: Viewing kartograph from above
- THEN all bounded contexts are visible as distinct volumes
  -> `test_spatial_layout_creates_node_per_structural_element` (godot/tests/test_spatial_structure.gd:156)
- AND their relative positions reflect their coupling
  -> Architectural: extractor `_order_by_coupling()` places tightly coupled contexts adjacent; `test_anchor_positions_match_json` verifies positions rendered at JSON coordinates. Perceptual quality is untestable headlessly (see Untestable Clauses section).
- AND dependencies between contexts are visible as connections
  -> `test_dependency_expressed_as_visible_connection` (godot/tests/test_spatial_structure.gd:244)

### Scenario: Zooming into IAM
- THEN the internal layers become visible
  -> `test_medium_distance_shows_modules` (godot/tests/test_spatial_structure.gd:336) — module anchors visible at medium distance
- AND internal dependencies are shown
  -> `test_near_distance_shows_internal_edges_as_fine_detail` (godot/tests/test_spatial_structure.gd:409)
- AND the user can see relative sizes of internal modules
  -> `test_large_module_has_bigger_mesh` (godot/tests/test_size_encoding.gd:53)
  -> `test_mesh_sizes_proportional_to_metric` (godot/tests/test_size_encoding.gd:68)

