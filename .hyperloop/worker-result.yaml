### Requirement: Camera Controls — COVERED

**Scenario: Top-down overview**
- `camera_controller.gd` initialises `_theta = 0.15` rad (≈ 8.6° from straight above;
  `_frame_camera()` in `main.gd` calls `set_pivot()` to reframe after build.
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4`.
- `test_initial_distance_is_positive` — asserts `_distance > 0`.

**Scenario: Zooming in**
- `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it.
- Distance clamped to `[min_distance, max_distance]`.
- Labels use `BILLBOARD_ENABLED` + `no_depth_test = true` for readability at all zoom levels.
- `test_scroll_up_decreases_distance` — asserts distance decreases on WHEEL_UP.
- `test_scroll_down_increases_distance` — asserts distance increases on WHEEL_DOWN.
- `test_zoom_clamped_at_minimum` — asserts distance never falls below `min_distance`.
- `test_labels_are_billboard_and_readable` (test_scene_graph_loading.gd) — asserts billboard,
  pixel_size > 0, no_depth_test on Label3D.

**Scenario: Orbiting**
- Middle-mouse drag modifies `_phi` (azimuth) and `_theta` (polar); `_update_transform()`
  uses `look_at(_pivot, Vector3.UP)` so orientation stays intuitive (up stays up).
- `_theta` clamped to `[0.01, PI-0.01]` preventing pole-flip.
- `test_orbit_horizontal_drag_changes_phi` — phi changes on horizontal middle-drag.
- `test_orbit_vertical_drag_changes_theta` — theta changes on vertical middle-drag.
- `test_set_pivot_updates_state` — asserts `set_pivot()` updates `_pivot` and `_distance`.

