## Summary

All 5 MUST requirements from ux-polish.spec.md are implemented and tested:

1. **Pan with Left Mouse Button** — `MOUSE_BUTTON_LEFT` in `_handle_button()` sets `_panning=true`; `_handle_motion()` mutates `_target_pivot`. Tests: `test_lmb_drag_pans_camera`, `test_pan_direction_not_inverted`.

2. **Non-Inverted Movement** — Google Maps sign convention: `_target_pivot -= right * delta.x * pan_amount`. With delta.x<0 (drag left) and right=+X, pivot moves +X → scene shifts left ✓. Direction independently derived and confirmed against test assertion.

3. **Zoom Toward Mouse Cursor** — `_zoom_toward_point()` shifts `_target_pivot` toward cursor world point using `zoom_ratio = new_dist/old_dist`. Tests: `test_zoom_in_shifts_pivot_toward_cursor`, `test_zoom_in_cursor_point_invariant`, `test_zoom_out_shifts_pivot_away_from_cursor`.

4. **Orbit Around Mouse Point** — RMB press calls `begin_orbit_at_world_point(world_pt)` which sets `_pivot = world_pt` and recomputes spherical coords. Tests: `test_orbit_around_cursor_point`, `test_orbit_pivot_is_world_point`.

5. **Smooth Camera Movement** — `_process(delta)` uses exponential lerp (`1 - pow(0.05, delta * zoom_smooth)`) for zoom; pan is immediate per-frame (proportional to drag). Tests: `test_smooth_zoom_target_differs_from_distance_after_scroll`, `test_smooth_zoom_process_interpolates_distance`, `test_pan_proportional_to_drag_speed`.

