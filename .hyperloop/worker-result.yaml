## Implementation Summary

**camera_controller.gd** — spherical-coordinate camera with:
- LMB drag → pan via `_panning` flag; `_target_pivot -= right * delta.x * pan_amount` (Google Maps non-inverted convention)
- RMB press → `begin_orbit_at_world_point()` remaps pivot to cursor world point without camera jump; RMB drag changes `_phi` and `_theta`
- Scroll wheel → `_zoom_toward_point()` shifts `_target_distance` and `_target_pivot` by zoom ratio; `_process()` exponential-lerps toward targets for smooth animation
- `clamp()` on `_distance` (min/max zoom) and `_theta` (prevent gimbal flip) — both have boundary tests

**test_camera_controls.gd** — 23 tests covering all 10 THEN-clauses plus clamping boundaries. Pattern-2 (bool-return) test suite handled by run_tests.gd `_run_one()`. Direction derivation comments present in all 5 relevant tests per `check-direction-test-derivations.sh`.

**Commit trailers** — Spec-Ref and Task-Ref present on all implementation commits (7a69ffa, f7a81f7, e64847f, 6b3464f).
