### Notes (not blocking)

The following guidelines apply to full Godot visualization tasks; task-003 is
scoped to the data-loading layer only, so these remain open for a future task:

- Camera pan/zoom/orbit controls: `main.gd` is still an empty stub.
- Label rendering: not yet implemented.
- Containment visual representation (child volumes inside parent): not yet implemented.
- Direction indicators on edges (arrowhead/cone): not yet implemented.

These are not counted against task-003 because the referenced spec does not
mandate them in this slice, and the task title explicitly scopes work to
SceneGraphLoader + behavioral tests. They MUST be implemented before any task
that covers visualization rendering.
