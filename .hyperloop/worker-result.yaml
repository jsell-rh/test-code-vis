## Summary

Task-022: Godot — wire question UI → LLM → view-spec interpreter end-to-end.

The previous attempt (reviewed as FAIL) had implemented `LlmViewGenerator` and
`SceneInterpreter` as isolated classes but never called them from any coordinator,
and had no end-to-end integration test. This submission adds:

1. **End-to-end wiring in `main.gd`**: a natural-language question input UI
   (LineEdit + Button added in `_ready()` via `_add_question_ui()`), with the
   button connected to `_on_question_submitted()` which calls
   `LlmViewGenerator.build_prompt()`, a mock LLM call, `LlmViewGenerator.parse_response()`,
   and `SceneInterpreter.apply_spec()` in sequence.

2. **End-to-end integration test** in `godot/tests/test_moldable_views_pipeline.gd`:
   seven tests each calling `build_prompt()` + `parse_response()` + `apply_spec()`
   in a single test body and asserting the resulting scene-tree state.

3. **`run_tests.gd` updated** to include the new test suite.

All 171 GDScript tests pass. All 17 checks exit 0.

