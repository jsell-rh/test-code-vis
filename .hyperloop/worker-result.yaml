### Requirement: Readable Labels — COVERED

**Implementation:** `main.gd::_create_volume()`:
- `label.text = nd["name"]` ✓
- `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` ✓
- `label.pixel_size = 0.012` (positive, legible value) ✓
- `label.no_depth_test = true` (visible through geometry at all zoom levels) ✓

**Tests:**
- `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` asserts all three:
  `billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` ✓

**Scenario: Identifying a module — COVERED**
- THEN the module's name is visible as a text label ✓
- AND the label remains readable at the current zoom level → billboard + no_depth_test ✓

