## THEN-Clause Coverage

All 14 test functions grepped in `godot/tests/` — each present exactly once.

### Requirement: Conformance Mode

#### Scenario: Spec-aligned implementation
| THEN-clause | Test | Assertion |
|---|---|---|
| human can see auth and user management as separate components | `test_aligned_nodes_detected_as_separate` | `result["aligned"].has("auth")` and `.has("user_management")` on real check_alignment() result |
| correspondence between spec and realization is visually apparent | `test_aligned_nodes_have_annotation_in_scene` | `label_count >= 1` Label3D added to live Node3D scene root via render_alignment() |

#### Scenario: Spec-divergent implementation
| THEN-clause | Test | Assertion |
|---|---|---|
| human can see the divergence | `test_divergent_nodes_detected` | `missing.has("payment_service") or divergent.has("payment_service")` |
| specific nature of divergence clear (merged vs. separate) | `test_divergent_nodes_annotated_as_merged` | `divergent.has("payment")` + Label3D with "MERGED" in text on live scene |

### Requirement: Evaluation Mode

#### Scenario: Detecting tight coupling
| THEN-clause | Test | Assertion |
|---|---|---|
| coupling between services is apparent | `test_tightly_coupled_pair_detected` | `pairs.size() >= 1` and `pairs[0]["coupling_score"] >= 2` |
| human can assess whether coupling is problematic | `test_coupled_nodes_highlighted` | svc_x and svc_y MeshInstance3D `albedo_color == HIGHLIGHT_COLOR` |

#### Scenario: Identifying single point of failure
| THEN-clause | Test | Assertion |
|---|---|---|
| criticality and centrality of component is apparent | `test_central_node_detected_as_critical` | `critical[0]["node_id"] == "hub"` and `critical[0]["in_degree"] == 3` |
| risk it represents is clear | `test_critical_node_annotated_with_spof_risk` | Label3D with "SPOF" in text on live scene |

#### Scenario: Spec faithfully implemented but architecturally poor
| THEN-clause | Test | Assertion |
|---|---|---|
| architectural problems visible even though conformance is perfect | `test_coupling_detected_despite_perfect_alignment` | `aligned.size() == 2` (perfect conformance) AND `pairs.size() >= 1` (coupling detected) |

### Requirement: Simulation Mode

#### Scenario: Splitting a service
| THEN-clause | Test | Assertion |
|---|---|---|
| impact on dependent services is visible | `test_split_dependents_detected` | `dependents.has("client_a")` and `dependents.has("client_b")` |
| new dependencies or interfaces shown | `test_split_new_interfaces_shown` | `new_interfaces.size() >= 1`; caller albedo_color == HIGHLIGHT_COLOR; Label3D with "split" in scene |

#### Scenario: Failure injection
| THEN-clause | Test | Assertion |
|---|---|---|
| cascade of effects through system is visible | `test_failure_cascade_detected` | `cascade.has("api")` and `cascade.has("frontend")` (BFS through db→api→frontend) |
| components that would be affected are clearly identified | `test_failure_affected_nodes_highlighted` | consumer_1 albedo_color == HIGHLIGHT_COLOR; Label3D with "FAILED" on failed node |

