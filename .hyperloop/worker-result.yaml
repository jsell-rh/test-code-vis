## Implementation Summary

**File:** `godot/scripts/camera_controller.gd`

All 5 MUST requirements from `specs/prototype/ux-polish.spec.md` are implemented:

1. **Pan with LMB** — `MOUSE_BUTTON_LEFT` in `_handle_button()` sets `_panning = true`; `_handle_motion()` shifts `_target_pivot` using camera basis vectors, then immediately applies `_pivot = _target_pivot`.
2. **Non-Inverted Movement** — Google Maps convention: `_target_pivot -= right * delta.x * pan_amount`. Drag left → pivot.x increases → camera moves +X → scene shifts left (same as drag direction).
3. **Zoom Toward Cursor** — `_zoom_toward_point(world_pt, direction)` shifts `_target_pivot` toward/away from cursor point at the same ratio as distance change. Cursor point stays fixed in scene.
4. **Orbit Around Mouse Point** — RMB press calls `begin_orbit_at_world_point(world_pt)` which sets `_pivot = world_pt` and recomputes spherical coordinates without camera jumping. Camera always `look_at(_pivot)`.
5. **Smooth Camera Movement** — `_process(delta)` uses exponential lerp: `t = 1.0 - pow(0.05, delta * zoom_smooth)`. Zoom/pivot interpolate each frame. Pan applied immediately (proportional to drag speed, no latency).

