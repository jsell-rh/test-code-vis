### Requirement: Readable Labels — COVERED

**Implementation:**
- `main.gd` `_create_volume()`: each node gets a `Label3D` with
  `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true`.

**Scenario: Identifying a module — COVERED**
- `test_scene_graph_loading.gd` `test_labels_are_billboard_and_readable` asserts
