### Requirement: Dependency Rendering — COVERED

**Spec**: The application MUST render dependency edges as visible lines between
connected nodes.

**Scenario**: Rendering a cross-context dependency

Implementation: `godot/scripts/main.gd` → `_create_edge()`
- Builds `ImmediateMesh` with `PRIMITIVE_LINES` from `from_pos` to `to_pos`.
- Builds `CylinderMesh` arrowhead (`top_radius=0.0`, `bottom_radius=0.25`, `height=0.7`)
  positioned at the target end and oriented along the edge direction using
  `Basis(Quaternion(Vector3.UP, dir))` — visually indicates dependency direction.
- Cross-context edges: `Color(1.0, 0.50, 0.10)` (orange); internal: `Color(0.55, 0.55, 0.55)` (grey).

Tests: `godot/tests/test_dependency_rendering.gd` (4 tests)
- `test_edge_line_mesh_created`: asserts `ImmediateMesh` MeshInstance3D exists among root children.
- `test_direction_indicator_cone_created`: asserts `CylinderMesh` with `top_radius == 0.0` exists.
- `test_direction_cone_near_target`: asserts cone position is within 2.0 units of target (x=20).
- `test_cross_context_cone_is_orange`: asserts cone material `albedo_color.r > 0.8` and `blue < 0.3`.

Status: **COVERED**

