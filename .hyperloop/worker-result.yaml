### Requirement: Camera Controls — COVERED

`camera_controller.gd`: `_theta=0.15` (near-top-down), `_distance=40.0`. Scroll
wheel adjusts `_distance` (clamped). Middle-mouse drag updates `_phi` and `_theta`
(clamped `[0.01, PI-0.01]` so up stays up). Right-mouse drag pans `_pivot`.
`_update_transform()` uses `look_at(_pivot, Vector3.UP)` inside tree; stores
`position` outside tree (headless-test safe).

`godot/tests/test_camera_controls.gd` — 8 tests:
- `test_initial_theta_is_near_top_down`, `test_initial_distance_is_positive`
- `test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`
- `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`
- `test_set_pivot_updates_state`, `test_zoom_clamped_at_minimum`

Status: **COVERED** ✓

