### Requirement: Navigation — COVERED

**Implementation:**
- `godot/scripts/camera_controller.gd`:
  - **Zoom:** WHEEL_UP/DOWN adjusts `_target_distance`; `_distance` lerps smoothly each frame.
  - **Orbit:** RMB drag changes `_phi` (azimuth) and `_theta` (polar).
  - **Pan:** LMB drag moves `_pivot`.
  - Zoom clamped to [min_distance, max_distance].

**Tests:**
- `godot/tests/test_camera_controls.gd → test_scroll_up_decreases_distance()` — scroll-up reduces `_target_distance`.
- `godot/tests/test_camera_controls.gd → test_scroll_down_increases_distance()` — scroll-down increases `_target_distance`.
- `godot/tests/test_camera_controls.gd → test_orbit_horizontal_drag_changes_phi()` — RMB drag changes azimuth.
- `godot/tests/test_camera_controls.gd → test_orbit_vertical_drag_changes_theta()` — RMB drag changes polar angle.
- `godot/tests/test_camera_controls.gd → test_zoom_clamped_at_minimum()` — 200× scroll-up never pushes below min_distance.
- `godot/tests/test_ux_polish.gd` — covers LMB pan and smooth zoom interpolation.

