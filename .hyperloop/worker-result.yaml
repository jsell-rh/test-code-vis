## Requirement-by-Requirement Findings

### Requirement: Target Codebase — COVERED

**SHALL**: The prototype MUST use the kartograph codebase as its target system.

**Implementation**: The extractor CLI (`extractor/__main__.py`) accepts a `src_path`
argument; `godot/data/scene_graph.json` was produced from the real kartograph source at
`~/code/kartograph/src/api` and contains bounded contexts `graph`, `iam`, `shared_kernel`
matching kartograph's actual structure.

**Scenario: Loading kartograph**:
- THEN kartograph's structure is visualized in 3D → `test_volumes_created_for_each_node`
  (GDScript: `_anchors.has("ctx1")` and `_anchors.has("mod1")` after `build_from_graph()`)
- AND visualization reflects actual structure → `test_kartograph_integration_bounded_contexts`
  (Python: runs extractor against `~/code/kartograph/src/api`, asserts `iam`, `graph`,
  `shared_kernel` in context_ids) + `test_kartograph_extraction_produces_modules` (asserts
  at least one `module`-type node is produced)

---

### Requirement: Two-Stage Pipeline — COVERED

**SHALL**: MUST operate as a two-stage pipeline: Python extractor → JSON → Godot.

**Implementation**:
- Stage 1: `extractor/extractor.py` → `build_scene_graph()` produces a `SceneGraph` dict;
  `extractor/__main__.py` serialises it to JSON.
- Stage 2: `godot/scripts/main.gd` `_ready()` opens the JSON file via `FileAccess.open()`,
  parses it with `JSON.new()`, passes the result to `SceneGraphLoader.load_from_dict()`,
  then calls `build_from_graph()` — fully implemented, not a stub.

**Scenario: Extraction then visualization**:
- THEN JSON scene graph file is produced → `test_main_writes_json_output` (calls `main()`,
  asserts output file exists with `nodes`/`edges`/`metadata` keys)
- AND Godot app loads that file and renders the scene → `test_volumes_created_for_each_node`
  + `test_anchor_positions_match_json` (anchor created per node; positions verified with
  `is_equal_approx()` against JSON values)

---

### Requirement: Top-Down Architectural View — COVERED

**SHALL**: MUST provide a top-down camera view showing the overall system architecture.

**Implementation**: `camera_controller.gd` initialises `_theta = 0.15` (≈ 8.6° from
vertical — predominantly top-down). LOD (far) shows only bounded_context nodes.

**Scenario: Viewing kartograph from above**:
- THEN all bounded contexts visible as distinct volumes → `test_far_distance_shows_only_bounded_contexts`
  (asserts `ctx_anchor.visible == true`, `mod_anchor.visible == false` at FAR distance)
- AND relative positions reflect coupling → `test_coupled_bcs_are_closer_than_uncoupled`
  (Python: fixture with `auth` importing from `shared_kernel` but not `billing`;
  asserts `dist(auth,shared_kernel) < dist(auth,billing)` after `compute_layout()`)
- AND dependencies visible as connections → `test_edge_line_mesh_created`
  (GDScript: finds `ImmediateMesh` child in scene tree after `build_from_graph()`)
- AND camera defaults to top-down → `test_initial_theta_is_near_top_down`
  (`cam._theta < PI/4.0`)

---

### Requirement: Zoom to Detail — COVERED

**SHALL**: MUST allow the user to zoom into a bounded context to see its internal structure.

**Implementation**: `lod_manager.gd` exposes three LOD tiers; `camera_controller.gd`
decreases `_target_distance` on scroll-up; `_process()` lerps `_distance` toward target.

**Scenario: Zooming into IAM**:
- THEN internal layers become visible → `test_near_distance_shows_all_nodes`
  (asserts both `ctx_anchor.visible` and `mod_anchor.visible` after `update_lod(NEAR-5)`)
- AND internal dependencies shown → `test_near_distance_shows_internal_edges_as_fine_detail`
  (asserts internal edge visual `.visible == true` at near distance)
- AND relative sizes of internal modules visible → `test_mesh_sizes_proportional_to_metric`
  (fixture: `size=3.0` vs `size=9.0`; asserts `BoxMesh.size.x` ratio ≈ 3.0 ± 0.001)

---

### Requirement: Abstract Visual Language — COVERED

**SHALL**: MUST use abstract volumes (boxes, spheres, or similar primitives). No
buildings, terrain, or thematic decoration.

**Implementation**: `main.gd` `_create_volume()` creates only `BoxMesh` instances.
No metaphorical assets exist in `godot/scripts/` or `godot/scenes/`.

**Scenario: Visual representation**:
- THEN appears as labeled geometric volume → `test_mesh_instances_exist_in_anchors` +
  `test_labels_are_billboard_and_readable`
- AND size reflects complexity → `test_mesh_sizes_proportional_to_metric`
- AND position reflects coupling relationships → `test_coupled_bcs_are_closer_than_uncoupled`
- AND containment shown by nesting → `test_module_parented_inside_context`
  (`mod_anchor.get_parent() == ctx_anchor`) + `test_bounded_context_larger_than_module`
  (`ctx_mesh.size.x > mod_mesh.size.x`)

---

### Requirement: Readable Labels — COVERED

**SHALL**: MUST label all visible structural elements with their names.

**Implementation**: `main.gd` `_create_volume()` creates a `Label3D` for every node with
`label.text = nd["name"]`, `label.pixel_size = 0.012`, `label.billboard = BILLBOARD_ENABLED`,
`label.no_depth_test = true`.

**Scenario: Identifying a module**:
- THEN module's name visible as text label → `test_labels_are_billboard_and_readable`
  (iterates `Label3D` children; checks `billboard == BILLBOARD_ENABLED`)
- AND label remains readable at current zoom level → same test
  (`pixel_size > 0.0` and `no_depth_test == true` enforce always-on-top readability)

---

### Requirement: Dependency Visualization — COVERED

**SHALL**: MUST show dependencies between modules as visible connections.

**Implementation**: `main.gd` `_create_edge()` builds an `ImmediateMesh` line
(PRIMITIVE_LINES) and a `CylinderMesh` arrowhead cone (`top_radius=0`) placed at the
target end, oriented along the edge direction.

**Scenario: Cross-context dependency**:
- THEN line or connection drawn between contexts → `test_edge_line_mesh_created`
  (finds `ImmediateMesh` child in `main_node.get_children()`)
- AND direction of dependency discernible → `test_direction_indicator_cone_created`
  (`CylinderMesh` with `top_radius == 0.0`) + `test_direction_cone_near_target`
  (cone positioned within 2 units of `to_pos`)

---

### Requirement: Navigation — COVERED

**SHALL**: MUST support basic spatial navigation.

**Implementation**: `camera_controller.gd` implements:
- Pan: LMB drag → `_pivot` moves in camera XZ plane (non-inverted)
- Orbit: RMB drag → `_phi` and `_theta` change (spherical coordinates)
- Zoom: scroll wheel → `_target_distance` changes; `_process()` lerps smoothly
- LOD: `lod_manager.gd` shows/hides detail tiers as distance changes

**Scenario: Moving through the space**:
- THEN can pan → `test_lmb_pan_moves_pivot` (`cam._pivot != initial_pivot` after LMB drag)
- THEN can zoom → `test_scroll_up_decreases_distance` (`_target_distance < initial` after WHEEL_UP)
- THEN can rotate → `test_orbit_horizontal_drag_changes_phi` (`cam._phi != initial_phi` after RMB drag)
- AND smoothly transition between overview and detail → `test_zoom_is_interpolated_not_instantaneous`
  (zoom lerps in one `_process(0.016)` tick; `_distance` moves partially not fully)
  + `test_far_distance_shows_only_bounded_contexts` (LOD hides modules at far distance)

