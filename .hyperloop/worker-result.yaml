### Requirement 5: Camera Controls — PASS

**Code verified (camera_controller.gd):**
- Top-down default: `_theta = 0.15` rad (≈8.6° from directly above, well within 45°).
- Zoom: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `MOUSE_BUTTON_WHEEL_DOWN` increases it;
  clamped to `[min_distance, max_distance]`.
- Orbit: middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar angle); `_theta` clamped
  to `[0.01, PI-0.01]` so camera never flips past poles (up stays up).
- `look_at(_pivot, Vector3.UP)` — orientation always correct.

**Tests (test_camera_controls.gd — 8 tests, all PASS):**
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4`.
- `test_initial_distance_is_positive` — asserts `_distance > 0`.
- `test_scroll_up_decreases_distance` — synthetic `InputEventMouseButton` WHEEL_UP, checks `_distance` decreased.
- `test_scroll_down_increases_distance` — synthetic WHEEL_DOWN, checks `_distance` increased.
- `test_orbit_horizontal_drag_changes_phi` — synthetic middle-mouse press + motion, checks `_phi` changed.
- `test_orbit_vertical_drag_changes_theta` — synthetic middle-mouse press + motion, checks `_theta` changed.
- `test_set_pivot_updates_state` — calls `set_pivot()`, asserts `_pivot` and `_distance` updated.
- `test_zoom_clamped_at_minimum` — 200 scroll-up events, asserts `_distance >= min_distance`.

