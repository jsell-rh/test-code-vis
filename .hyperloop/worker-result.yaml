### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `_theta = 0.15` rad (≈ 8.6°, well below PI/4 = 45°) → top-down default view.
- Scroll wheel: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it.
  Distance clamped to `[min_distance, max_distance]`. Zooming in makes nested child volumes
  increasingly prominent (emergent from nested containment + closer camera).
- Middle-mouse drag: `_handle_motion()` updates `_phi` (azimuth) and `_theta` (polar) →
  orbit around `_pivot`.
- `look_at(_pivot, Vector3.UP)` ensures up-axis stays intuitive throughout orbit.
- `_frame_camera()` calls `set_pivot(centre, span * 1.5)` after building the graph → camera
  frames the entire system on startup.

**Tests** (`godot/tests/test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4`. Covers top-down scenario.
- `test_initial_distance_is_positive` — confirms camera is not at origin.
- `test_scroll_up_decreases_distance` — fires `MOUSE_BUTTON_WHEEL_UP` event, asserts distance
  decreased. Covers Zooming-in scenario: camera moves closer.
- `test_scroll_down_increases_distance` — inverse.
- `test_orbit_horizontal_drag_changes_phi` — fires middle-mouse press + motion, asserts `_phi`
  changed. Covers Orbiting scenario.
- `test_orbit_vertical_drag_changes_theta` — asserts `_theta` changed on vertical drag.
- `test_set_pivot_updates_state` — asserts `_pivot` and `_distance` updated by `set_pivot()`.
- `test_zoom_clamped_at_minimum` — 200 scroll-up events, asserts `_distance >= min_distance`.

Note: "internal structure becomes visible as the camera approaches" is covered by the
combination of zoom tests (camera moves closer) + containment tests (child nodes are nested
inside parents). There is no explicit LOD toggle; structure is always present, becoming more
prominent visually as camera approaches. This is acceptable given the prototype scope.

