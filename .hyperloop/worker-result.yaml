## Findings

### F1 [FAIL] — Pan direction implementation inverted relative to spec

Spec (`specs/prototype/ux-polish.spec.md`, Non-Inverted Movement):
> "the scene moves in the same direction as the drag (i.e. dragging left reveals content to the right, as in Google Maps)"

The authoritative "i.e." parenthetical specifies the Google Maps map-grab model:
- Drag left → scene appears to move left → camera focus (pivot) moves RIGHT → `_pivot.x` INCREASES
- Drag right → scene appears to move right → camera focus moves LEFT → `_pivot.x` DECREASES

Implementation (`godot/scripts/camera_controller.gd` line 133):
```gdscript
_pivot += right * delta.x * pan_amount
```
In headless mode `global_transform.basis.x` = (1,0,0), so:
- Drag right (delta.x = +50) → `_pivot.x` INCREASES
- Drag left (delta.x = -50) → `_pivot.x` DECREASES

This is the camera-pan model (pivot follows drag) — the opposite of the spec's map-grab model (pivot moves against drag direction).

Fix required in `godot/scripts/camera_controller.gd`:
```gdscript
_pivot -= right * delta.x * pan_amount   # was +=
_pivot -= forward * delta.y * pan_amount  # was +=
```

### F2 [FAIL] — Tests verify wrong predicate for pan direction

`test_pan_drag_right_increases_pivot_x` (`godot/tests/test_ux_polish.gd` line 113):
```gdscript
return cam._pivot.x > initial_x  # drag-right → pivot increases
```
Per spec: drag-right should DECREASE `_pivot.x`. Predicate is inverted.

`test_pan_drag_left_decreases_pivot_x` (`godot/tests/test_ux_polish.gd` line 123):
```gdscript
return cam._pivot.x < initial_x  # drag-left → pivot decreases
```
Per spec: drag-left should INCREASE `_pivot.x`. Predicate is inverted.

Fix required: swap assertions — `test_pan_drag_right_increases_pivot_x` should assert `< initial_x`; `test_pan_drag_left_decreases_pivot_x` should assert `> initial_x`. Rename tests accordingly.

### F3 [FAIL] — `test_drag_direction_matches_view_movement` asserts no direction

`godot/tests/test_ux_polish.gd` line 138:
```gdscript
return cam._pivot != Vector3.ZERO
```
This passes whenever the pivot is non-zero regardless of direction. It cannot distinguish between correct and inverted implementations. A test with no directional assertion provides no coverage of the Non-Inverted Movement requirement.

Fix required: assert the specific axis. The test drags down (delta.y = +50). In map-grab model: drag down → pivot moves in the negative forward direction. With headless identity transform, `basis.z` = (0,0,1), so forward = (0,0,1). Map-grab: `_pivot -= forward * delta.y * pan_amount` → `_pivot.z` DECREASES. Assert `cam._pivot.z < 0.0`.

