## Spec Scenario Coverage

### Scenario: Loading kartograph's scene graph — COVERED ✅

**Implementation**: `_ready()` opens JSON via `FileAccess.open()` + `get_as_text()` (Godot 4.6 API),
parses it, and passes to `build_from_graph()` which creates Node3D anchors with MeshInstance3D
children for each node and ImmediateMesh/CylinderMesh pairs for each edge.

**Tests** (`test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1")` and `_anchors.has("mod1")` ✅
- `test_mesh_instances_exist_in_anchors` — instantiates real Node3D, checks for MeshInstance3D children ✅
- `test_edge_mesh_instances_created` — asserts ≥ 2 MeshInstance3D children on main node (line + cone) ✅
- `test_anchor_positions_match_json` — asserts `anchor.position.is_equal_approx(Vector3(x,y,z))` ✅
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED, pixel_size > 0.0, no_depth_test ✅

Note: `test_volumes_created_for_each_node` uses `.has()` on _anchors dict, but this is supplemented
by `test_anchor_positions_match_json` and `test_mesh_instances_exist_in_anchors` which assert real
Node3D `.position.x/y/z` properties and child node types. The rendering THEN clauses are fully
covered by real Node3D assertions.

