## Requirement Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation:**
`camera_controller.gd` `_handle_button()` sets `_panning = event.pressed` on
`MOUSE_BUTTON_LEFT`. `_handle_motion()` when `_panning` is true applies:
```
_target_pivot += right * delta.x * pan_amount
_target_pivot -= backward * delta.y * pan_amount
_pivot = _target_pivot
```

**Scenario: Panning the view — COVERED**
- `test_lmb_drag_pans_camera` (line 147): LMB press at (100,100) + motion to (150,100)
  → asserts `cam._pivot != initial_pivot`. Confirms pivot moves on LMB drag. ✓

### Requirement: Non-Inverted Movement — COVERED

**Implementation:**
`right = basis.x` (camera local X), right-drag (positive `delta.x`) adds to `_target_pivot`
in the +X direction — matching drag direction, not inverted.

**Scenario: Drag direction matches view movement — COVERED**
- `test_pan_direction_not_inverted` (line 167): Sets `_phi = PI/2` so `basis.x ≈ world +X`.
  Right drag (+50 px) → asserts `cam._pivot.x > 0.0`. Confirms non-inverted Google Maps
  panning convention. ✓

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation:**
`_zoom_toward_point(world_pt, direction)` computes a zoom ratio from old/new `_target_distance`
and shifts `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.

**Scenario: Zooming into a specific component — COVERED**
- `test_zoom_in_shifts_pivot_toward_cursor` (line 197): cursor world_pt=(10,0,0), zoom in
  → asserts `_target_pivot.x > 0.0`. Pivot moved toward cursor. ✓
- `test_zoom_in_cursor_point_invariant` (line 213): cursor at (20,0,0), zoom in
  → asserts `0 < _target_pivot.x < 20`. Verifies cursor-point invariant via ratio formula. ✓

**Scenario: Zooming out — COVERED**
- `test_zoom_out_shifts_pivot_away_from_cursor` (line 228): cursor at (+10,0,0), zoom out
  → asserts `_target_pivot.x < 0.0`. Pivot pushed away from cursor (ratio > 1). ✓

### Requirement: Orbit Around Mouse Point — COVERED

**Implementation:**
`_handle_button()` for `MOUSE_BUTTON_RIGHT` calls `_get_ground_point_under_cursor(event.position)`
then `begin_orbit_at_world_point(world_pt)`, which sets `_pivot = world_pt` and recomputes
spherical coordinates so the camera orbits around that exact point.

**Scenario: Orbiting around a component — COVERED**
- `test_orbit_uses_right_mouse_button` (line 249): RMB press + motion → asserts
  `cam._phi != initial_phi`. Confirms RMB triggers orbit. ✓
- `test_orbit_around_cursor_point` (line 269): `begin_orbit_at_world_point(world_pt)`
  → asserts `cam._pivot == world_pt`. Confirms pivot set to cursor world point. ✓
- `test_orbit_pivot_is_world_point` (line 285): After `begin_orbit_at_world_point()`,
  asserts `cam._pivot.is_equal_approx(world_pt)`. Camera always `look_at(_pivot)` so
  world_pt stays at visual centre during orbit. ✓

### Requirement: Smooth Camera Movement — COVERED

**Implementation:**
`_process(delta)` uses exponential smoothing:
```
var t = 1.0 - pow(0.05, delta * zoom_smooth)
_distance = lerpf(_distance, _target_distance, t)
_pivot = _pivot.lerp(_target_pivot, t)
```
Pan applies immediately (direct, proportional, no latency — correct UX for
mouse-following). Zoom is deferred to `_process()` producing animated interpolation.

**Scenario: Smooth zoom — COVERED**
- `test_smooth_zoom_target_differs_from_distance_after_scroll` (line 304): After WHEEL_UP,
  asserts `_target_distance < _distance`. Scroll updates only target; actual distance
  deferred to `_process()`. ✓
- `test_smooth_zoom_process_interpolates_distance` (line 319): Sets _distance=40, _target=20,
  calls `_process(0.1)` → asserts `20 < _distance < 40`. Confirms lerp convergence
  without snapping. ✓

**Scenario: Smooth pan — COVERED**
- `test_pan_proportional_to_drag_speed` (line 332): Two cameras — one dragged 10px, one 50px.
  Asserts `cam_fast._pivot.length() > cam_slow._pivot.length()`. Proportionality confirmed. ✓

