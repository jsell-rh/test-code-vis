## Findings

### Directional Behavior Review

Per guidelines, directional THEN-clauses are derived independently before reading test bodies.

**Non-Inverted Movement (i.e. parenthetical derivation):**

Spec: "the scene moves in the same direction as the drag (i.e. dragging left reveals content
to the right, as in Google Maps)"

The "(i.e.)" parenthetical defines the grab model:
- Drag LEFT → map/scene slides LEFT → content from the RIGHT enters view → pivot moves RIGHT
- In camera_controller.gd headless frame (identity basis): right = (1,0,0), forward = (0,0,1)
- Drag left (delta.x = -50): `_pivot -= right * -50 * pan_amount` → pivot.x increases ✓
- Derived predicate: `cam._pivot.x > initial_x` for drag-left

Implementation (camera_controller.gd line 136):
  `_pivot -= right * delta.x * pan_amount`
Inline derivation comment (line 135):
  `# drag left → delta.x = -50 → negate → pivot.x += 50 * pan_amount (moves right) ✓`
Inline derivation comment (line 137):
  `# drag down → delta.y = +50 → negate → pivot.z -= 50 * pan_amount (moves backward) ✓`
Both comments are present immediately before their respective calculation lines. ✓

check-nondirectional-movement-assertions.sh: EXIT 0 — all directional tests use signed predicates.

**Zoom direction derivation:**

WHEEL_UP → direction = -zoom_speed (negative) → step negative → _target_distance decreases → zoom IN
  zoom_fraction = 1 - (new_target / old_target) > 0 → lerp toward cursor → pivot moves TOWARD cursor ✓
WHEEL_DOWN → direction = +zoom_speed (positive) → step positive → _target_distance increases → zoom OUT
  zoom_fraction = 1 - (new_target / old_target) < 0 → lerp away from cursor → pivot moves AWAY ✓

Inline derivation comments (lines 82–86 of camera_controller.gd):
  `# scroll up → zoom IN → _target_distance decreases → direction must be negative`
  `# scroll down → zoom OUT → _target_distance increases → direction must be positive`
Both present. ✓

