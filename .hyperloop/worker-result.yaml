Spec scenario coverage:
  - JSON Scene Graph Loading: main.gd uses FileAccess.open() + get_as_text() to read
    the JSON file, SceneGraphLoader.load_from_dict() parses it, build_from_graph()
    creates volumes and edges at pre-computed world positions.
  - Containment Rendering: bounded_context nodes → large translucent BoxMesh
    (TRANSPARENCY_ALPHA, albedo_color.a=0.18, CULL_DISABLED); module nodes → smaller
    opaque BoxMesh. Tests in test_containment_rendering.gd assert color, alpha,
    transparency_mode, and cull_mode property values on the resulting scene nodes.
  - Dependency Rendering: edges rendered as colored ImmediateMesh lines + CylinderMesh
    arrowhead cone at target end (top_radius=0 = pointed tip) indicating direction.
    Tests in test_dependency_rendering.gd assert cone presence and arrowhead orientation.
  - Size Encoding: BoxMesh dimensions scale with nd["size"]; larger metric values produce
    larger volumes. test_size_encoding.gd asserts proportional sizes from fixture data.
  - Camera Controls (task core): camera_controller.gd implements top-down default
    (theta=0.15 rad), zoom via scroll wheel, orbit via middle-mouse drag, pan via
    right-mouse drag. test_camera_controls.gd covers 8 behavioral assertions.
  - Godot 4.6 Engine Version: project.godot declares config/features=PackedStringArray("4.6").
    test_godot_version.gd reads project.godot via FileAccess + get_as_text() and asserts
    "4.6" is present; also verifies main.gd uses Godot 4.x FileAccess API (not deprecated
    File.new() / read_as_text()). test_engine_version.gd provides additional coverage.

