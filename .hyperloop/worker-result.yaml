## Requirement: Camera Controls ‚Äî COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Initial state: `_theta = 0.15` (‚âà8.6¬∞ from top-down), `_distance = 40.0`.
- Scroll wheel: WHEEL_UP decreases `_distance`, WHEEL_DOWN increases, clamped
  to `[min_distance, max_distance]`.
- Middle-mouse drag: changes `_phi` (azimuth) and `_theta` (polar); theta clamped
  to `(0.01, PI‚àí0.01)` so camera never flips.
- `look_at(_pivot, Vector3.UP)` ensures up-vector remains consistent (up stays up).
- `set_pivot()` repositions the focal point and distance for whole-scene framing.
- Labels use `BILLBOARD_ENABLED` + `no_depth_test` so they stay readable at any zoom.

**Tests** (`godot/tests/test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` ‚Äî `cam._theta < PI/4`. ‚úì
- `test_initial_distance_is_positive` ‚Äî `cam._distance > 0`. ‚úì
- `test_scroll_up_decreases_distance` ‚Äî distance decreases after WHEEL_UP. ‚úì
- `test_scroll_down_increases_distance` ‚Äî distance increases after WHEEL_DOWN. ‚úì
- `test_orbit_horizontal_drag_changes_phi` ‚Äî `_phi != initial_phi` after drag. ‚úì
- `test_orbit_vertical_drag_changes_theta` ‚Äî `_theta != initial_theta` after drag. ‚úì
- `test_set_pivot_updates_state` ‚Äî `_pivot` and `_distance` updated correctly. ‚úì
- `test_zoom_clamped_at_minimum` ‚Äî 200 scroll-up events never breach min_distance. ‚úì

