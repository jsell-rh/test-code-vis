## Pan Direction Sign Audit (independent derivation)

**Spec**: "dragging left reveals content to the right, as in Google Maps"

**My derivation (before reading test)**:
- Drag left → delta.x < 0
- To reveal right-side content, camera must move RIGHT (+X)
- Camera moves right ↔ pivot moves right
- Required: `_target_pivot.x` increases when delta.x < 0
- Code: `_target_pivot -= right * delta.x * pan_amount`
  - At phi=PI/2, basis.x = world +X (confirmed by geometry: camera on +Z axis, looking at origin, up=Y)
  - `_target_pivot -= (+X) * (-50) * k = _target_pivot += (+X) * 50 * k`
  - → pivot.x increases ✓

**Test assertion**: `return cam._pivot.x > 0.0` after drag left 50px.

**Verdict**: test assertion matches my independently-derived predicate. Implementation sign is correct.

