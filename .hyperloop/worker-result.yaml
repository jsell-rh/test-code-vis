### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd` → `_create_edge()`):
- Creates an `ImmediateMesh` with `PRIMITIVE_LINES` connecting `from_pos` to `to_pos`.
- Creates a `CylinderMesh` with `top_radius = 0.0` (pointed arrowhead cone) placed at the
  target end, oriented along the edge direction, indicating dependency flow.
- Cross-context edges use orange (`Color(1.0, 0.50, 0.10)`); internal use grey.

**Tests** (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — asserts `ImmediateMesh` child exists on main node. Covers
  THEN: a line connects the two context volumes.
- `test_direction_indicator_cone_created` — asserts `CylinderMesh` with `top_radius == 0.0`
  exists. Covers THEN: direction is visually indicated.
- `test_direction_cone_near_target` — asserts cone position is within 2 units of `to_pos`.
  Confirms directionality placement.
- `test_cross_context_cone_is_orange` — asserts `r > 0.8` and `b < 0.3` on arrowhead material.

