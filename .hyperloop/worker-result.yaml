### Requirement: Size Encoding — COVERED

**Implementation** (`godot/scripts/main.gd` → `_create_volume()`):
- `sz = float(nd["size"])` read from JSON. The `size` field in the schema is defined as
  "derived from complexity metric" (scene-graph-schema.spec.md). `box.size = Vector3(sz, ...)`
  gives direct proportionality: larger `size` → larger volume.

**Tests** (`godot/tests/test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — fixture `large_mod.size=9.0`, `small_mod.size=3.0`.
  Asserts `large_mesh.size.x > small_mesh.size.x` on real `BoxMesh` objects.
- `test_mesh_sizes_proportional_to_metric` — asserts `large/small` ratio equals `9.0/3.0 = 3.0`
  within 0.001 tolerance. Covers THEN: relative sizes are proportional to the metric.

