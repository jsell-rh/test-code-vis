### REQ: Top-Down Architectural View — COVERED

Spec: "MUST provide a top-down camera view … all bounded contexts visible …
positions reflect coupling … dependencies visible as connections."

- **Code**:
  - `camera_controller.gd`: `_theta = 0.15` (≈ 8.6° from vertical → near
    top-down default).
  - `lod_manager.gd::_apply_far()`: at `camera_distance > FAR_THRESHOLD (80)`,
    only `bounded_context` and `spec` anchors remain visible.
  - `extractor.py::_order_by_coupling()` + `compute_layout()`: Fruchterman-
    Reingold greedy ordering places coupled BCs adjacent in a circle.
  - `main.gd::_create_edge()`: ImmediateMesh lines drawn between contexts.
- **Tests**:
  - `test_camera_controls.gd::test_initial_theta_is_near_top_down`
    — asserts `_theta < PI/4` ✓
  - `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`
    — LOD at FAR+10: context visible, module hidden ✓
  - `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection`
    — asserts ImmediateMesh line exists for cross-context edge ✓
  - `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled`
    — auth↔shared_kernel coupled pair closer than auth↔billing ✓
  - `test_extractor.py::TestLayout::test_complexity_and_coupling_both_reflected`
    — big_ctx.size > small_ctx.size AND dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d) ✓

