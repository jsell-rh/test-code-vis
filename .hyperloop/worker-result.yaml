## Spec Alignment Review — task-007: Godot Application (2026-04-23)

Spec: specs/prototype/godot-application.spec.md
Branch: hyperloop/task-007

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:**
- `main.gd:_ready()` opens `res://data/scene_graph.json` via `FileAccess.open()`, parses
  it with `JSON.new().parse()`, passes the result through `SceneGraphLoader.load_from_dict()`,
  and calls `build_from_graph()`.
- `build_from_graph()` iterates `graph.nodes` and calls `_create_volume()` for each, producing
  a `Node3D` anchor containing a `BoxMesh` `MeshInstance3D` and a `Label3D`.
- `build_from_graph()` iterates `graph.edges` and calls `_create_edge()` for each, producing
  an `ImmediateMesh` line and a `CylinderMesh` arrowhead cone.
- Anchor positions set directly from JSON `position.x/y/z` fields (no Godot-side layout).

**Tests (`godot/tests/test_scene_graph_loading.gd`):**
- `test_volumes_created_for_each_node` — `_anchors` has entry per node id
- `test_mesh_instances_exist_in_anchors` — each anchor contains a `MeshInstance3D`
- `test_edge_mesh_instances_created` — ≥2 `MeshInstance3D` children for an edge (line + cone)
- `test_anchor_positions_match_json` — asserts `ctx_anchor.position == (0,0,0)`,
  `mod_anchor.position == (2,0,2)` (relative JSON coordinates)
- `test_labels_are_billboard_and_readable` — `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test = true` (covers "labels scale to remain readable" THEN clause)

**Scenario: Loading kartograph's scene graph** — all four THEN clauses verified by tests.

