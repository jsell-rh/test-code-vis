## Untestable THEN-Clauses

### 1. "the frame rate remains above 30fps"
- **Verbatim THEN text:** "the frame rate remains above 30fps"
- **Why untestable:** FPS measurement requires a GPU render pipeline. Godot's `--headless` mode
  runs without a display or GPU-driven compositor; `Engine.get_frames_per_second()` always returns
  0 in this mode. There is no way to measure actual frame rate in headless CI.
- **Architectural evidence:** `lod_manager.gd` implements three LOD tiers (far/medium/near) that
  reduce visible geometry based on camera distance. `main.gd` calls `_lod.apply()` every frame
  via `_process()`. The LOD system is specifically designed to keep geometry below the render
  budget at kartograph scale. The `test_nfr_scale.gd` suite confirms the full build pipeline
  completes correctly at 60 nodes.

### 2. "there is no perceptible stutter or pop-in"
- **Verbatim THEN text:** "there is no perceptible stutter or pop-in"
- **Why untestable:** Perceptible stutter requires human perception and a running GPU render loop.
  This is a subjective quality attribute that is definitionally impossible to automate in CI.
- **Architectural evidence:** Same as above — LOD tiers prevent pop-in by making transitions
  distance-based rather than load-event-driven. The deterministic LOD logic is verified in
  `test_nfr_scale.gd`.

### 3. "it runs natively without browser, container, or VM dependencies"
- **Verbatim THEN text:** "it runs natively without browser, container, or VM dependencies"
- **Why untestable:** Detecting the absence of a browser/container/VM at runtime requires
  inspecting the execution environment, which is not possible from within a GDScript headless
  test or a Python pytest suite operating only on source files.
- **Architectural evidence:** No HTML5 export preset exists in `project.godot`. No `Dockerfile`,
  `docker-compose.yml`, or container manifest exists in the repository. All Godot APIs used
  target the desktop renderer. The project has no web export configuration.

