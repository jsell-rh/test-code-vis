### Requirement: Question-Driven View Generation — COVERED

The system MUST accept natural language questions and generate a spatial view tailored to answering that specific question.

**Implementation:**
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` embeds the natural-language question and the graph's node list in a prompt string. `parse_response(llm_text)` converts the LLM's JSON response into a validated ViewSpec dictionary.
- `godot/scripts/scene_interpreter.gd` — `apply(spec, anchors, scene_root, world_positions)` maps each operation in the spec to live Node3D mutations.
- `godot/scripts/main.gd` — `apply_view_spec(spec)` wires the two stages; `_ready()` loads the JSON scene graph (not a stub).

**Scenario: Architectural question — COVERED**

| THEN clause | Code | Test |
|---|---|---|
| View focused on auth-related components (show/highlight) | `_apply_show()` sets `anchor.visible = true`; `_apply_highlight()` sets `mat.albedo_color` | `test_show_op_sets_visible_true`, `test_highlight_op_changes_albedo_color` |
| Irrelevant components hidden or de-emphasized | `_apply_hide()` sets `anchor.visible = false` | `test_hide_op_sets_visible_false`, `test_hide_op_leaves_other_nodes_unchanged` |
| Relevant components arranged to answer the question | `_apply_arrange()` sets `anchor.position = Vector3(x, y, z)` | `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`, `test_arrange_op_sets_all_three_axes` |

All tests instantiate real Node3D objects and assert observable scene-tree properties.

**Scenario: Impact question — COVERED**

