### Requirement: Size Encoding (SHALL)

**Implementation:**
- `_create_volume()`: `sz = float(nd["size"])`, then `BoxMesh.size = Vector3(sz, sz*k, sz)`. Size is applied linearly and directly — ratio of mesh widths equals ratio of input sizes.

**Tests** (`godot/tests/test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — `large_mesh.size.x > small_mesh.size.x` (sizes 9 vs 3). ✓
- `test_mesh_sizes_proportional_to_metric` — `abs(ratio - 3.0) < 0.001` with sizes 9/3. ✓

All Given/When/Then conditions match. **COVERED.**

