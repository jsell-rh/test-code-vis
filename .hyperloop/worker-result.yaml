## Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`
- Initial state: `_theta = 0.15` (≈8.6° from top-down), `_distance = 40.0`.
- Scroll wheel adjusts `_distance` (zoom), clamped to `[min_distance, max_distance]`.
- Middle-mouse drag changes `_phi` (azimuth) and `_theta` (polar angle).
- `_update_transform()` uses `look_at(_pivot, Vector3.UP)` — "up stays up".
- `_theta` clamped to `[0.01, PI-0.01]` preventing camera flip.

**Scenario tests in `test_camera_controls.gd`:**
- `test_initial_theta_is_near_top_down()` — THEN `_theta < PI/4`.
- `test_scroll_up_decreases_distance()` / `test_scroll_down_increases_distance()`.
- `test_zoom_clamped_at_minimum()`.
- `test_orbit_horizontal_drag_changes_phi()` / `test_orbit_vertical_drag_changes_theta()`.
- `test_set_pivot_updates_state()`.

