## Requirement-by-Requirement Findings

### 1. Godot 4.6 Engine (MUST) — COVERED

**Implementation:**
- `godot/project.godot` line 19: `config/features=PackedStringArray("4.6")`
- `godot/scripts/main.gd`: uses `FileAccess.open()` + `get_as_text()` (Godot 4.x API, not deprecated `File.new()` / `read_as_text()`)
- All files in `godot/scripts/` are `.gd` (GDScript); no `.cs` present
- `godot-compile.sh` confirms: Godot Engine v4.6.2.stable.official

**Tests (Scenario: Engine version):**

| THEN clause | Test | Predicate |
|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | FileAccess reads project.godot; `content.contains("4.6")` |
| config/features has "4.6" | `test_project_godot_config_features_line` | Asserts `config/features` and `"4.6"` both present |
| All scripts use GDScript (iterative) | `test_scripts_dir_contains_only_gdscript` | DirAccess iterates `res://scripts/`; asserts every file ends `.gd` |
| No C# / Mono | `test_project_does_not_declare_csharp` | Asserts `"Mono"` and `"C#"` absent |
| `FileAccess.get_as_text()` is valid Godot 4.6 API | `test_file_access_get_as_text_returns_non_empty_string` | Calls API and asserts non-empty return |
| Scripts use Godot 4 API, not deprecated | `test_main_uses_godot4_fileaccess_api` | Reads main.gd; asserts `FileAccess.open(` + `get_as_text()`; no `File.new()` / `read_as_text()` |

All six THEN-clauses have matching assertion predicates. ✓

