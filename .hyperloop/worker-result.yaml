### Requirement: Size Encoding — COVERED

**Implementation** (`godot/scripts/main.gd`, `_create_volume()`):
- `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz * 0.6, sz)`.
- X and Z dimensions are linearly proportional to the JSON `size` field; larger `size` → larger mesh.

**Tests** (`godot/tests/test_size_encoding.gd`, 2 tests):
- `test_large_module_has_bigger_mesh()` — asserts `large_mesh.size.x > small_mesh.size.x`
  (size 9.0 vs 3.0).
- `test_mesh_sizes_proportional_to_metric()` — asserts `abs(9.0/3.0 - actual_ratio) < 0.001`.

Both THEN clauses (larger volume, proportional sizes) covered. ✅

