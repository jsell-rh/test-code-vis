### Requirement: Dependency Rendering — COVERED

THEN "a line connects the two context volumes":
  `_create_edge()` draws an `ImmediateMesh` with `PRIMITIVE_LINES` from `from_pos` to
  `to_pos`.
  Test: `test_edge_line_mesh_created`.

THEN "the line's direction is visually indicated":
  A `CylinderMesh(top_radius=0.0)` cone is placed near `to_pos` and oriented along the
  edge direction vector.
  Tests: `test_direction_indicator_cone_created` (top_radius == 0.0),
         `test_direction_cone_near_target` (position within 2 units of target),
         `test_cross_context_cone_is_orange` (albedo_color.r > 0.8, .b < 0.3).

