### Requirement: Navigation — COVERED

**Implementation:** `camera_controller.gd`:
- Zoom: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it; clamped to `[min_distance, max_distance]`
- Orbit/Rotate: middle-mouse drag changes `_phi` (azimuth) and `_theta` (polar angle)
- Pan: right-mouse drag moves `_pivot`
- Smooth transitions: continuous spherical-coordinate computation via `_update_transform()`

**Tests:**
- `test_camera_controls.gd::test_scroll_up_decreases_distance` ✓
- `test_camera_controls.gd::test_scroll_down_increases_distance` ✓
- `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` ✓
- `test_camera_controls.gd::test_orbit_vertical_drag_changes_theta` ✓
- `test_camera_controls.gd::test_set_pivot_updates_state` ✓
- `test_camera_controls.gd::test_zoom_clamped_at_minimum` ✓

**Scenario: Moving through the space — COVERED**
- THEN they can pan, zoom, and rotate the view ✓
- AND they can smoothly transition between overview and detail levels ✓

