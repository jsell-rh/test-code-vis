### Requirement: Godot 4 — COVERED

**Implementation**
- `project.godot`: `config/features=PackedStringArray("4.6")` — declares Godot 4.6.
- All scripts (`main.gd`, `scene_graph_loader.gd`, `camera_controller.gd`, `view_spec.gd`,
  `view_spec_renderer.gd`, all test files) use GDScript with Godot 4.x syntax (`@export`,
  `@onready`, `BaseMaterial3D.TRANSPARENCY_ALPHA`, etc.).

**Tests:** No dedicated behavioral test for the Engine version scenario exists in `godot/tests/`.
This is a declarative/configuration requirement that is factually verifiable from the project
files. The entire test suite using Godot 4.x APIs (Label3D, StandardMaterial3D,
BaseMaterial3D.BILLBOARD_ENABLED, ImmediateMesh, etc.) implicitly validates the engine version.

