### Requirement: Godot 4.6 ‚Äî COVERED

**Spec**: The application MUST be built using Godot 4.6.x with GDScript. All API calls MUST be compatible with the Godot 4.6 API.

**Implementation**:
- `project.godot` declares `config/features=PackedStringArray("4.6")`
- All 3 scripts (`main.gd`, `camera_controller.gd`, `scene_graph_loader.gd`) are GDScript `.gd` files ‚Äî no C# or Mono
- File reading uses `FileAccess.open()` + `get_as_text()` (Godot 4.6 API; the deprecated `read_as_text()` from 4.0 is not used)
- `ImmediateMesh`, `BaseMaterial3D`, `StandardMaterial3D`, `Label3D`, `BoxMesh`, `CylinderMesh`, `Basis(Quaternion(...))` ‚Äî all valid Godot 4.6 API

**Tests** (`test_engine_version.gd`):
- `test_project_godot_declares_46_feature`: reads `project.godot` via `FileAccess.open()` + `get_as_text()`; asserts `"4.6"` present ‚úì
- `test_project_godot_config_features_line`: asserts `"config/features"` and `'"4.6"'` strings present ‚úì
- `test_project_does_not_declare_csharp`: asserts no `"Mono"` or `"C#"` in project.godot ‚úì
- `test_file_access_get_as_text_returns_non_empty_string`: exercises `FileAccess.open()` + `get_as_text()` directly; asserts non-empty string returned ‚úì

