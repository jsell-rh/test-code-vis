### R2: Python Extractor (MUST) — COVERED

**Code:** `extractor/__main__.py` implements a full argparse CLI (`main(argv)` callable
as `python -m extractor <src_path> [--output <file>]`). All imports across the extractor
package are stdlib-only: `ast`, `math`, `datetime`, `pathlib`, `typing`, `argparse`,
`json`, `sys`. No third-party packages.

**Scenario: Running the extractor — tests verified:**

| THEN clause | Test function | File |
|---|---|---|
| Runs as standalone CLI tool | `TestCliEntryPoint::test_main_produces_json_output` | extractor/tests/test_cli.py |
| Stdlib-only dependencies | `TestStdlibOnlyImports::test_extractor_uses_only_stdlib_imports` | extractor/tests/test_cli.py |

`test_main_produces_json_output` calls `main([str(src), "--output", str(output)])`,
asserts `rc == 0`, and validates JSON contains `nodes`/`edges`/`metadata`.
`test_extractor_uses_only_stdlib_imports` AST-walks every `.py` in `extractor/`
(excluding `tests/`) and asserts each top-level import name is in `sys.stdlib_module_names`.

