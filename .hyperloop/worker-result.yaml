### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Lines 44–46: `_process()` applies exponential smoothing:
  `t = 1.0 - pow(0.05, delta * zoom_smooth)` then `_distance = lerpf(_distance, _target_distance, t)`.
- Scroll events only mutate `_target_distance`/`_target_pivot`; actual values converge each frame.
- Pan applies immediately (proportional to drag delta) per design intent noted in comment.

**Scenario: Smooth zoom** — COVERED
- `test_smooth_zoom_target_differs_from_distance_after_scroll` (lines 304–315): after
  scroll event `_target_distance < _distance`, i.e., zoom is not instantaneous. ✓
- `test_smooth_zoom_process_interpolates_distance` (lines 319–327): after `_process(0.1)`,
  `20 < _distance < 40`, confirming interpolation. ✓

**Scenario: Smooth pan** — COVERED
- `test_pan_proportional_to_drag_speed` (lines 332–354): 50-pixel drag produces larger
  pivot displacement than 10-pixel drag. ✓

