## Pipeline Wiring (manual verification — check-pipeline-wiring.sh absent)

`main.gd._ready()`:
1. `FileAccess.open(scene_graph_path, FileAccess.READ)` → `file.get_as_text()` → `JSON.new().parse()`
2. `SceneGraphLoader.load_from_dict(json.data)` returns structured dict
3. `build_from_graph(graph)` consumes that dict:
   - iterates `graph["nodes"]` → `_create_volume()` for each → mutates live scene tree
   - iterates `graph["edges"]` → `_create_edge()` for each → mutates live scene tree

The complete pipeline (extractor JSON → Godot load → scene creation) is fully wired with no missing consumer stage. ✅

