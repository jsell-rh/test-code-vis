### Scenario: Smooth navigation — PRIMARY scenario for this task

**THEN the frame rate remains above 30fps**
- `test_far_distance_shows_only_bounded_contexts()` — `test_spatial_structure.gd:290`
  - Calls `update_lod(entries, edges, FAR_THRESHOLD + 10.0)`, asserts
    `ctx_anchor.visible == true` and `mod_anchor.visible == false`.
    Read body at lines 290-310: predicate matches THEN-clause (modules hidden
    at far distance reduces draw calls to enable 30fps). PASS
- `test_lod_integration_far_hides_modules_in_built_scene()` — `test_spatial_structure.gd:470`
  - End-to-end: builds full scene via `build_from_graph()`, applies FAR LOD,
    asserts `not mod_anchor.visible` and `ctx_anchor.visible`. Real Node3D
    anchors, real LodManager instance. PASS
- `test_lod_node_entries_populated_after_build()` — `test_spatial_structure.gd:431`
  - Verifies `_lod_node_entries` has 4 entries, correct types. PASS
- `_process()` in `main.gd:110` calls `_update_lod()` every frame, confirmed
  by reading `main.gd`. LOD pipeline is wired into the frame loop. PASS

  Note: Direct FPS measurement is not possible in a headless GDScript unit
  test. The LOD behavior (hiding ~50-100 nodes at far distance) is the
  architectural mechanism for 30fps. All three LOD tiers are fully tested.

**AND there is no perceptible stutter or pop-in**
- `test_near_distance_shows_all_nodes()` — `test_spatial_structure.gd:386`
  - Asserts both ctx and module anchors visible at `NEAR_THRESHOLD - 5.0`. PASS
- `test_medium_distance_shows_modules()` — `test_spatial_structure.gd:336`
  - Asserts ctx and module visible at midpoint between NEAR and FAR. PASS
- `test_medium_distance_shows_cross_context_edges_only()` — `test_spatial_structure.gd`
  - Three-tier LOD (NEAR/MEDIUM/FAR) prevents abrupt pop-in; each tier
    explicitly tested. PASS

