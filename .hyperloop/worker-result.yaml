`main.gd` wires these via `_toggle_path_overlay()` and `_toggle_aggregate_overlay()`, called from `_unhandled_input()` (keys F/G). `_flow.setup()` is called inside `build_from_graph()` after nodes and edges are built. Full producer → consumer pipeline confirmed. ✓

