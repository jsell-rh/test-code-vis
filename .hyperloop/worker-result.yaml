### Requirement: View Specs as Intermediate Representation
**Status: COVERED**

Implementation — `godot/scripts/llm_view_generator.gd` + `scene_interpreter.gd`:
- `LlmViewGenerator.parse_response()` returns a `Dictionary {"operations": [...]}` —
  structured data, not raw 3D geometry or Godot nodes.
- `SceneInterpreter.apply_spec(spec, anchors, scene_root)` reads the dict and mutates
  the scene tree; it never generates raw geometry itself.
- `main.gd` wires both stages sequentially, confirming the intermediate representation
  pattern is used in the running application.

**Scenario: LLM produces view spec — COVERED**
Test: `test_pipeline_produces_structured_view_spec_not_geometry`
- Calls `build_prompt()` (Stage 1a) ✓
- Asserts `spec is Dictionary` — not a mesh, not a node, not raw coordinates ✓
- Asserts `spec.has("operations")` ✓
- Asserts each operation is a Dictionary with an "op" key — structured primitive ✓
- Calls `apply_spec()` (Stage 2) and asserts `anchors["iam"].visible == true` —
  the 3D renderer interprets the view spec into a spatial scene ✓

