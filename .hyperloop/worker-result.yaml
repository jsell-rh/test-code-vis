## Spec Coverage

### Scenario: Architectural question
- COVERED. `build_prompt()` includes node ids so the LLM can identify auth-related components; `parse_response()` passes through `hide` and `arrange` ops for de-emphasis and arrangement.

### Scenario: Impact question
- COVERED. `build_prompt()` includes node ids; `parse_response()` passes through `show` and `connect` ops for dependent visibility and spatial clarity.

### Scenario: LLM produces view spec
- COVERED (within prototype scope). `parse_response()` returns a structured Dictionary (not raw 3D geometry) with `question` and `operations` keys, ready for a renderer to consume.
- PROTOTYPE LIMITATION: "AND the 3D renderer interprets the view spec into a spatial scene" cannot be tested because `view_spec_renderer.gd` is explicitly prohibited by `check-not-in-scope.sh`. The view spec is produced correctly; interpretation awaits a future task.

### Scenario: LLM uses existing primitives
- COVERED. `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` is defined in `llm_view_generator.gd`; all six are embedded in the prompt; `parse_response()` silently drops any op not in this list, ensuring no new rendering logic enters the renderer at runtime.

