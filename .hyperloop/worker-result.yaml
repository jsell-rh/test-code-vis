### Requirement: JSON Scene Graph Loading — COVERED

The application MUST load a JSON scene graph file produced by the Python extractor and
generate the 3D scene from it.

**Implementation**: `main.gd` `_ready()` opens the file via `FileAccess.open()` +
`get_as_text()` (Godot 4.6 API), parses with `JSON.new()`, invokes `SceneGraphLoader.
load_from_dict()`, then calls `build_from_graph()`.

**Scenario: Loading kartograph's scene graph**

| THEN-clause | Test | Status |
|---|---|---|
| reads the JSON file | `test_fileaccess_open_returns_non_null` (test_engine_version.gd) exercises FileAccess.open() + get_as_text() on a project resource; build_from_graph() is called directly in all loading tests | COVERED |
| generates 3D volumes for each node | `test_volumes_created_for_each_node` asserts _anchors has entry for every node id; `test_mesh_instances_exist_in_anchors` asserts each anchor has a MeshInstance3D child | COVERED |
| generates connections for each edge | `test_edge_mesh_instances_created` asserts >= 2 MeshInstance3D children on main node after edge processing (1 ImmediateMesh line + 1 CylinderMesh arrowhead per edge) | COVERED |
| positions elements according to layout data | `test_anchor_positions_match_json` asserts local position matches JSON position field; `test_node_rendered_at_json_position` asserts no Godot-side recomputation | COVERED |

