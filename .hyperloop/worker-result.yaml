### Requirement: Camera Controls — COVERED

THEN "camera defaults to a top-down view" (top-down overview scenario):
  `_theta = 0.15` rad (≈ 8.6° from zenith) at init.
  Test: `test_initial_theta_is_near_top_down` (_theta < PI/4).

THEN "camera moves closer" / "internal structure becomes visible" (zooming scenario):
  Scroll wheel events update `_distance`; clamped to [min_distance, max_distance].
  Tests: `test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`,
         `test_zoom_clamped_at_minimum`.

THEN "labels scale to remain readable":
  Labels use `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true`.
  Test: `test_labels_are_billboard_and_readable`.

THEN "camera rotates around current focal point" (orbiting scenario):
  Middle-mouse drag updates `_phi` and `_theta`; `look_at(_pivot, Vector3.UP)` enforces
  world-up orientation.
  Tests: `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`.

THEN "orientation remains intuitive (up stays up)":
  `look_at(_pivot, Vector3.UP)` is called in `_update_camera_transform()`.
  Test: `test_set_pivot_updates_state`.

