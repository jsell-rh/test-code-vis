   `check-desktop-platform-tested.sh` was added to main after the branch was created. It
   detects the desktop/native-platform THEN-clause in `nfr.spec.md` ("runs natively without
   browser, container, or VM dependencies") and requires at least one GDScript test calling
   `OS.has_feature()`. Added `godot/tests/test_desktop_platform.gd` with two tests
   (`test_not_web_platform`, `test_is_pc_desktop_platform`) and registered it in
   `run_tests.gd`.

