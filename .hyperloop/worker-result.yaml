### Directional Derivation (Manual)

Spec "(i.e.)" clause: "dragging left reveals content to the right, as in Google Maps."

Independent sign derivation before reading tests:
- Drag LEFT → world moves LEFT → camera reveals content to RIGHT → pivot must move RIGHT → pivot.x INCREASES.
- Drag RIGHT → reveals content LEFT → pivot.x DECREASES.

Implementation `camera_controller.gd line 134`: `_pivot -= right * delta.x * pan_amount`
- Drag right: delta.x = +50, right = (1,0,0) → pivot.x -= 50*k → DECREASES ✓
- Drag left:  delta.x = -50 → pivot.x += 50*k → INCREASES ✓

Inline derivation comment present at lines 125–126:
  `# Map-grab model (Google Maps): drag right → pivot moves LEFT (reveals content to the left).`
  `# Negate delta so pivot moves opposite to drag direction.`

Required comment is present. Sign chain is correct.

Test predicates:
- `test_pan_drag_right_decreases_pivot_x` → asserts `cam._pivot.x < initial_x` ✓
- `test_pan_drag_left_increases_pivot_x` → asserts `cam._pivot.x > initial_x` ✓
- `test_drag_direction_matches_view_movement` → drag down, asserts `pivot.z < 0.0` ✓

check-nondirectional-movement-assertions.sh exits 0: all directional test
functions use signed comparison predicates. No presence-only (!=) predicates.

