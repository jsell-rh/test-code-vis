## Findings

### Godot 4.6 / Engine version — NOW COVERED

`godot/tests/test_godot_version.gd` added with three behavioral tests:

1. **test_project_declares_godot_46** — reads `res://project.godot` via
   `FileAccess.open()` + `get_as_text()` and asserts the content contains "4.6".
   Satisfies "it uses Godot 4.6.x" AND exercises the FileAccess API path that was
   previously untested.

2. **test_main_script_is_gdscript** — opens `res://scripts/main.gd` via
   FileAccess and asserts it is a non-empty readable `.gd` file, confirming the
   GDScript-only constraint.

3. **test_main_uses_godot4_fileaccess_api** — reads `main.gd` source and asserts
   it contains `FileAccess.open(` and `get_as_text(` while not containing the
   deprecated Godot 3 `File.new()` or `read_as_text()` patterns.

Suite wired into `run_tests.gd` under the task-013 section. All three tests
pass at runtime (confirmed in godot-tests.sh output).

