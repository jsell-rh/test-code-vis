### 8. Navigation (MUST support basic spatial navigation)
**Status: COVERED**

Scenario: Moving through the space
- THEN they can pan, zoom, and rotate the view
  → Pan: `test_ux_polish.gd::test_lmb_pan_moves_pivot`, `test_pan_drag_right_increases_pivot_x`
  → Zoom: `test_camera_controls.gd::test_scroll_up_decreases_distance` / `test_scroll_down_increases_distance`
  → Rotate: `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` / `test_orbit_vertical_drag_changes_theta`
- AND they can smoothly transition between overview and detail levels
  → `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous`:
    After scroll event, `_distance != _target_distance` (interpolation in flight).
    After `_process(0.016)`, distance is between initial and target.
  → `test_spatial_structure.gd` LOD suite confirms FAR/MEDIUM/NEAR transitions.

Implementation: `camera_controller.gd` (orbit, pan, smooth zoom via lerp),
`lod_manager.gd` (progressive disclosure by distance).

