### Requirement: Question-Driven View Generation — COVERED

The system MUST accept natural language questions and generate a spatial view tailored to answering that specific question.

**Implementation:**
- `godot/scripts/question_panel.gd`: `QuestionPanel` extends `Control`; `process_question(question)` accepts natural-language input, matches keywords, and returns a structured `ViewSpec`.
- `godot/scripts/main.gd`: Adds a `QuestionPanel` on a `CanvasLayer` overlay, connects `view_spec_requested` → `_on_view_spec_requested()`, which calls `ViewSpecRenderer.apply(_graph, spec, _view_root)`.

**Scenario: Architectural question** — COVERED
- `test_auth_question_show_op_includes_auth_service`: THEN view focused on auth components (show op contains auth_service).
- `test_auth_question_excludes_unrelated_nodes_from_render`: AND irrelevant components hidden — asserts `payment_service` is absent from scene tree after `ViewSpecRenderer.apply()` with the auth spec.
- `test_auth_question_includes_highlight_op_for_auth_service`: AND relevant components emphasised via highlight op.
- `test_auth_question_includes_annotate_op_for_auth_service`: AND annotate op adds label to auth_service.
- `test_auth_question_highlight_sets_material_on_rendered_node`: Runtime assertion — `material_override` is non-null on the `MeshInstance3D` for `auth_service`.

**Scenario: Impact question** — COVERED
- `test_impact_question_show_op_includes_user_db`: THEN user_db in show op.
- `test_impact_question_show_op_includes_dependents`: THEN auth_service (dependent) in show op.
- `test_impact_question_includes_connect_op`: AND connect op present for spatial clarity.
- `test_impact_question_connect_targets_user_db`: connect op target is user_db.
- `test_impact_question_connect_creates_midpoint_node_in_scene`: Runtime assertion — `Node3D` named `conn_auth_service_user_db` exists in scene tree after renderer apply.

