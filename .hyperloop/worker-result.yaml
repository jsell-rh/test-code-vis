### Requirement: Camera Controls — COVERED

**Implementation**: `camera_controller.gd` implements spherical-coordinate orbit camera:
- Initial state: `_theta = 0.15` (≈8.6°, near top-down), `_phi = 0.0`, `_distance = 40.0`,
  `_pivot = Vector3.ZERO`.
- WHEEL_UP decreases `_distance` (zoom in); WHEEL_DOWN increases (zoom out); both clamped to
  `[min_distance=2.0, max_distance=500.0]`.
- Middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar angle, clamped `[0.01, PI-0.01]`
  to prevent pole-flip).
- `_update_transform()` computes spherical position and calls `look_at(_pivot, Vector3.UP)`,
  guaranteeing "up stays up" at all camera positions.
- `set_pivot(pivot, distance)` repositions the camera to frame the whole scene (called from
  `main.gd._frame_camera()` after loading).
- Labels: `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true` ensure
  labels remain readable at all zoom levels (tested in `test_scene_graph_loading.gd`).

**Scenario: Top-down overview** — covered by `test_camera_controls.gd`:
- THEN camera defaults to top-down: `test_initial_theta_is_near_top_down()` asserts `_theta < PI/4`.
- Showing entire system: `test_initial_distance_is_positive()` asserts `_distance > 0`;
  `test_set_pivot_updates_state()` asserts `set_pivot()` updates both `_pivot` and `_distance`.

**Scenario: Zooming in** — covered by `test_camera_controls.gd`:
- THEN camera moves closer: `test_scroll_up_decreases_distance()` asserts `_distance` decreases
  after WHEEL_UP event.
- Zoom out: `test_scroll_down_increases_distance()` asserts `_distance` increases after WHEEL_DOWN.
- Clamped: `test_zoom_clamped_at_minimum()` scrolls in 200× and asserts `_distance >= min_distance`.
- Labels remain readable: `test_labels_are_billboard_and_readable()` in `test_scene_graph_loading.gd`
  asserts `BILLBOARD_ENABLED`, `pixel_size > 0`, and `no_depth_test = true`.

**Scenario: Orbiting** — covered by `test_camera_controls.gd`:
- THEN camera rotates around focal point: `test_orbit_horizontal_drag_changes_phi()` simulates
  middle-mouse press + horizontal motion and asserts `_phi != initial_phi`.
- Vertical orbit: `test_orbit_vertical_drag_changes_theta()` simulates vertical drag and asserts
  `_theta != initial_theta`.
- AND orientation remains intuitive (up stays up): `_update_transform()` always calls
  `look_at(_pivot, Vector3.UP)`; `_theta` is clamped to `[0.01, PI-0.01]`. The orbit tests
  exercise this code path. Note: no dedicated boundary-condition test for theta clamping exists,
  but the behavior is enforced by the implementation and exercised (within non-extreme range) by
  the orbit tests. This is a minor gap (note only, not a FAIL, as the primary orbit behaviors
  are tested).

