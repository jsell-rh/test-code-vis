### Requirement: Camera Controls — PASS

**Code** (`camera_controller.gd`):
- Top-down default: `_theta = 0.15` (~8.6 deg, < PI/4)
- Zoom: `WHEEL_UP`/`WHEEL_DOWN` adjust `_distance`, clamped to `[min_distance, max_distance]`
- Orbit: middle-mouse drag adjusts `_phi` and `_theta`; `_theta` clamped to `[0.01, PI-0.01]`
- `_frame_camera()` calls `set_pivot(centre, distance)` after load

**Tests** (`test_camera_controls.gd`, 8 tests): assert `_theta < PI/4`, `_distance > 0`,
scroll changes distance, orbit drag changes phi/theta, zoom clamp at minimum, set_pivot
updates state. All three camera scenarios covered. ✅

