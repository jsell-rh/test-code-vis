## Requirement Coverage

### Requirement 1: Pan with Left Mouse Button — COVERED

**SHALL**: The user MUST be able to pan the view by holding the left mouse button and dragging.

**Code** (`camera_controller.gd`):
- `_handle_button()`: `MOUSE_BUTTON_LEFT` sets `_panning = event.pressed` (lines 101–104)
- `_handle_motion()` when `_panning`: computes `right` and `backward` from `transform.basis`, then
  `_target_pivot -= right * delta.x * pan_amount` and `_pivot = _target_pivot` (lines 141–160)

**Scenario: Panning the view** — COVERED
- THEN camera pans in direction of drag → `test_lmb_drag_pans_camera`: LMB press + 50-px motion asserts `cam._pivot != initial_pivot` ✓
- AND movement direction not inverted → `test_pan_direction_not_inverted`: at phi=PI/2, drag-left (delta.x=-50) → `cam._pivot.x > 0.0` ✓

