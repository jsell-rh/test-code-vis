## THEN-Clause → Test Mapping (Independently Verified)

All 12 THEN-clauses from `specs/prototype/ux-polish.spec.md` mapped and test bodies read:

### Requirement 1: Pan with Left Mouse Button — Scenario: Panning the view

**THEN the camera pans in the direction of the drag**
→ `test_lmb_drag_pans_camera` (line 149): asserts `cam._pivot != initial_pivot` after LMB press + 50px drag.
Predicate verified: pivot changes = panning occurred. ✓

**AND the movement direction matches the drag direction (not inverted)**
→ `test_pan_direction_not_inverted` (line 172): sets `phi = PI/2` (camera on +Z side, `basis.x ≈ +X`), drags left (`delta.x = -50`), asserts `cam._pivot.x > 0.0`.
Derivation independently verified: `_target_pivot -= right * delta.x * pan_amount` → `+= (+X) * 50 * pan_amount` → pivot moves +X → camera moves right → scene shifts left = same direction as drag. ✓

### Requirement 2: Non-Inverted Movement — Scenario: Drag direction matches view movement

**THEN the scene moves in the same direction as the drag (Google Maps convention)**
→ `test_pan_direction_not_inverted` — same assertion, same derivation (drag left → pivot.x > 0 → camera moves +X → scene shifts left). ✓

### Requirement 3: Zoom Toward Mouse Cursor — Scenario: Zooming into a specific component

**THEN the view zooms toward the point under the cursor**
→ `test_zoom_in_shifts_pivot_toward_cursor` (line 203): `world_pt=(10,0,0)`, zoom in direction=-1, asserts `_target_pivot.x > 0.0`.
Verified via `_zoom_toward_point`: `zoom_ratio < 1` → `new_pivot.x = 10 - 10*ratio > 0`. ✓

**AND the component under the cursor stays under the cursor during zoom**
→ `test_zoom_in_cursor_point_invariant` (line 219): asserts `0 < _target_pivot.x < 20.0` (pivot between old_pivot and world_pt). ✓

### Requirement 3: Zoom Toward Mouse Cursor — Scenario: Zooming out

**THEN the view zooms out from the point under the cursor**
→ `test_zoom_out_shifts_pivot_away_from_cursor` (line 234): `world_pt=(10,0,0)`, zoom out direction=+1, asserts `_target_pivot.x < 0.0`.
Verified: `zoom_ratio > 1` → `new_pivot.x = 10 - 10*ratio < 0` → pivot moved away from cursor. ✓

### Requirement 4: Orbit Around Mouse Point — Scenario: Orbiting around a component

**THEN the camera orbits around the point under the cursor at orbit start**
→ `test_orbit_uses_right_mouse_button` (line 255): RMB press + 50px drag asserts `cam._phi != initial_phi`. ✓
→ `test_orbit_around_cursor_point` (line 275): `begin_orbit_at_world_point(world_pt)` asserts `cam._pivot == world_pt`. ✓

**AND the component remains at the visual center during the orbit**
→ `test_orbit_pivot_is_world_point` (line 291): after `begin_orbit_at_world_point`, asserts `cam._pivot.is_equal_approx(world_pt)`. Camera always `look_at(_pivot)` → pivot = visual center. ✓

### Requirement 5: Smooth Camera Movement — Scenario: Smooth zoom

**THEN the zoom is animated smoothly (interpolated), not instantaneous**
→ `test_smooth_zoom_target_differs_from_distance_after_scroll` (line 310): after WHEEL_UP, asserts `_target_distance < _distance` (targets diverge before _process interpolates). ✓
→ `test_smooth_zoom_process_interpolates_distance` (line 325): `_process(0.1)` with target=20, asserts `20.0 < _distance < 40.0`. ✓

### Requirement 5: Smooth Camera Movement — Scenario: Smooth pan

**THEN the pan movement is smooth and proportional to drag speed**
→ `test_pan_proportional_to_drag_speed` (line 338): cam_fast (50px) produces larger pivot displacement than cam_slow (10px). ✓

