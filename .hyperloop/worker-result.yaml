## Untestable THEN-Clauses

- Layout positions bounded contexts in a ring: layout is a pure geometric
  arrangement verified implicitly by `test_every_node_has_position`; the
  exact circular arrangement is a visual property not observable headlessly.

- Camera frames the whole graph on startup: requires a running display; only
  the camera-framing helper method itself is exercised through the camera
  controls test suite (`test_camera_controls.gd`).

- LOD transitions hide/show nodes at distance thresholds: LOD distances are
  applied in `_process()` each frame using the real Camera3D distance; the
  headless test suite validates the LOD manager logic in isolation
  (`test_size_encoding.gd`) but the end-to-end frame-based behaviour is
  not observable without a rendered viewport.
