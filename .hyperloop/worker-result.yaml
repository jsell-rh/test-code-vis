Implemented the Moldable Views specification (specs/interaction/moldable-views.spec.md).

## Files created

### godot/scripts/view_spec.gd
Defines `ViewSpec` — a static class holding the fixed, finite set of six visual
primitives: show, hide, highlight, arrange, annotate, connect.
`from_dict()` parses a raw Dictionary, filtering out any unknown op names so that
no new rendering logic can be introduced at runtime.

### godot/scripts/view_spec_renderer.gd
Defines `ViewSpecRenderer` — a static class with a single `apply(graph, spec, root)`
entry point that interprets a ViewSpec into a 3D spatial scene:
- show  → only listed node ids are added to the scene tree
- hide  → listed ids are omitted from the scene tree
- highlight → StandardMaterial3D.albedo_color set on MeshInstance3D.material_override
- arrange → overrides the node's JSON position with spec-provided Vector3
- annotate → Label3D child named "annotation" added to the mesh node
- connect → Node3D named "conn_{src}_{tgt}" placed at the midpoint of the two nodes

### godot/tests/test_view_spec.gd
13 behavioral tests for ViewSpec: verifies the six primitives are present,
unknown ops are filtered, get_valid_ops() returns a copy, question is preserved,
and all valid ops survive from_dict().

### godot/tests/test_view_spec_renderer.gd
27 behavioral tests for ViewSpecRenderer covering every THEN clause from the spec:
- show includes / excludes nodes (architectural question focus + irrelevant hidden)
- hide removes node from scene tree
- arrange overrides position.x/y/z on the MeshInstance3D (not on a dictionary)
- highlight sets StandardMaterial3D.albedo_color r/g/b on material_override
- annotate creates Label3D child with correct .text
- connect creates connector Node3D at midpoint (x/y verified), skipped when source hidden
- renderer produces MeshInstance3D nodes at JSON positions when no spec overrides

