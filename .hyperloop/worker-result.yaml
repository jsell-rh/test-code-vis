### Requirement 1: JSON Scene Graph Loading — COVERED

**Implementation (main.gd):**
- `FileAccess.open()` + `file.get_as_text()` reads the JSON file (Godot 4.6 API)
- `JSON.new()` / `json.parse()` parses the JSON
- `build_from_graph()` iterates `nodes` → `_create_volume()` (volumes for each node)
- `build_from_graph()` iterates `edges` → `_create_edge()` (connections for each edge)
- `anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))` — positions from JSON layout

**Tests (test_scene_graph_loading.gd — 5 tests, all PASS):**
- `test_volumes_created_for_each_node` — asserts `_anchors` has entry per node id
- `test_mesh_instances_exist_in_anchors` — asserts MeshInstance3D child in each anchor
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D at scene root (line + cone)
- `test_anchor_positions_match_json` — asserts anchor.position == JSON position fields
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED, pixel_size > 0, no_depth_test

