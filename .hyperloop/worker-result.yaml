### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:**
- `main.gd::_ready()` opens the JSON file using `FileAccess.open()` + `file.get_as_text()`
  (Godot 4.6 API), parses with `JSON.new()`, and calls `build_from_graph()`.
- `build_from_graph()` iterates nodes to call `_create_volume()` and edges to call
  `_create_edge()`, using position data from the JSON `position` dict directly.
- `scene_graph_loader.gd::load_from_dict()` normalises raw JSON into structured arrays.

**Tests (test_scene_graph_loading.gd):**
- `test_volumes_created_for_each_node` — asserts `_anchors` contains all node ids.
- `test_mesh_instances_exist_in_anchors` — asserts MeshInstance3D child on every anchor.
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D children on root for edges.
- `test_anchor_positions_match_json` — asserts `anchor.position` equals JSON `position` values.
- `test_labels_are_billboard_and_readable` — asserts Label3D billboard + pixel_size > 0 + no_depth_test.
- `test_godot_version.gd::test_main_uses_godot4_fileaccess_api` — exercises FileAccess.open()
  + get_as_text() code path and verifies no deprecated API is present.

