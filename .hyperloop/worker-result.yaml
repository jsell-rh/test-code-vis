## THEN-Clause Coverage

### Requirement: Understanding Without Writing Code
### Scenario: Architect evaluates unfamiliar system

**THEN "the human can correctly answer architectural questions about the system"**

- `test_bounded_contexts_are_structurally_identifiable` (line 120)
  Instantiates MainScript, calls `build_from_graph()` with 2-context fixture,
  asserts `_anchors.has("auth")` and `_anchors.has("billing")`. COVERED.

- `test_node_names_are_labelled_for_identification` (line 133)
  Finds Label3D child of auth anchor, asserts `.text == "AuthService"`. COVERED.

- `test_label_billboard_enabled_for_readability` (line 160)
  Finds Label3D child of billing anchor, asserts
  `label.billboard == BaseMaterial3D.BILLBOARD_ENABLED`. COVERED.

- `test_label_pixel_size_positive_for_readability` (line 187)
  Finds Label3D child of auth anchor, asserts `label.pixel_size > 0.0`. COVERED.

**AND "the human can identify structural problems in the system"**

- `test_dependencies_are_visible_as_connections` (line 219)
  Iterates scene children, asserts at least one `MeshInstance3D` whose mesh
  `is ImmediateMesh`. COVERED.

- `test_cross_context_and_internal_edges_are_distinguishable` (line 241)
  Reads `_lod_edge_entries`, collects distinct `albedo_color` values from
  `material_override`, asserts `colors.size() >= 2`. COVERED.

**AND "the human can predict the impact of proposed changes"**

- `test_dependency_direction_is_encoded_in_edges` (line 273)
  Reads `_path_edge_entries`, asserts an entry with `source == "billing"` and
  `target == "auth"` exists. Direction derivation: billing→auth fixture edge has
  source="billing", target="auth"; correct encoding means that pair appears in
  path entries. COVERED.

- `test_modules_are_contained_within_bounded_contexts` (line 301)
  Gets `auth_anchor` and `domain_anchor`, asserts
  `domain_anchor.get_parent() == auth_anchor`. COVERED.

