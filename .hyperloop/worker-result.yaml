**Pan direction sign derivation (derived before reading test body):**

Spec: "the scene moves in the same direction as the drag (dragging left reveals
content to the right, as in Google Maps)."
At phi=PI/2, camera pos ≈ (0, 39.5, 6.0). Godot look_at computes
basis.x = UP × z_dir ≈ +X. Drag left: delta.x = −50.
Code: `_target_pivot -= right * delta.x * pan_amount` = `−= (+X)(−50)(positive)` →
pivot.x increases → camera moves right → scene appears to move left →
right-side content enters view. Matches Google Maps. Assert: `pivot.x > 0.0`. ✓

