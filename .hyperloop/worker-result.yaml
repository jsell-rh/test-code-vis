### Requirement 2: Non-Inverted Movement — COVERED

**SHALL**: All camera movement directions MUST match the user's intuitive expectation (Google Maps style).

**Code** (`camera_controller.gd` lines 153–159):
- Comment: "Dragging right → scene moves right → camera/pivot move LEFT → subtract right·delta.x"
- `_target_pivot -= right * delta.x * pan_amount`
- Drag left (delta.x < 0) at phi=PI/2 where right=+X: pivot moves +X → scene shifts left → drag direction matches ✓

**Direction sign independently derived:**
- delta.x = −50 (drag left), right = +X at phi=PI/2
- `_target_pivot -= (+X)(−50)(pan)` = `_target_pivot += X·50·pan` → pivot.x > 0
- Camera view centre moves +X → everything shifts left on screen (Google Maps: drag left reveals right content) ✓

**Scenario: Drag direction matches view movement** — COVERED
- THEN the scene moves in the same direction as drag → `test_pan_direction_not_inverted` asserts `cam._pivot.x > 0.0` ✓

