### Requirement: Simulation Mode (SHALL)
The system MUST allow the human to explore the impact of hypothetical changes before committing to them.

Implementation: `godot/scripts/understanding_analyzer.gd`
  - `simulate_split(nodes, edges, node_id)` → returns dependents and new_interfaces required
  - `render_split_impact(split_result, split_node_id, anchors, scene_root)` → highlights split node and all affected dependents
  - `simulate_failure(nodes, edges, node_id)` → BFS traversal of reverse dependency graph returns transitive cascade
  - `render_failure_cascade(failure_result, failed_node_id, anchors, scene_root)` → annotates failed node "✕ FAILED", highlights all cascade members

**Status: COVERED**

#### Scenario: Splitting a service
- THEN the impact on dependent services is visible
  → `test_split_dependents_detected`: asserts `dependents.has("client_a")` and `dependents.has("client_b")`
- AND new dependencies or interfaces that would be required are shown
  → `test_split_new_interfaces_shown`: asserts `new_interfaces.size() >= 1`; instantiates Node3D, calls `render_split_impact()`, asserts `albedo_color == HIGHLIGHT_COLOR` on caller anchor and Label3D annotation present

**Status: COVERED**

#### Scenario: Failure injection
- THEN the cascade of effects through the system is visible
  → `test_failure_cascade_detected`: asserts `cascade.has("api")` and `cascade.has("frontend")` (transitive BFS through db→api→frontend)
- AND components that would be affected are clearly identified
  → `test_failure_affected_nodes_highlighted`: instantiates Node3D+MeshInstance3D for consumer_1, calls `render_failure_cascade()`, asserts `albedo_color == HIGHLIGHT_COLOR` on consumer and Label3D with "FAILED" text

**Status: COVERED**

