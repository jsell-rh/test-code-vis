### R8: Navigation ‚Äî COVERED

**SHALL:** Basic spatial navigation: pan, zoom, rotate; smooth transitions between levels.

**Scenario: Moving through the space**
- GIVEN: 3D scene loaded
- WHEN: user interacts
- THEN: pan, zoom, rotate; smooth transitions between overview and detail

**Implementation:** `camera_controller.gd`:
- LMB drag ‚Üí pan (`_pivot += right * delta.x * pan_amount`)
- RMB drag ‚Üí orbit (`_phi -= delta.x * orbit_speed`, `_theta` clamped)
- Scroll wheel ‚Üí smooth zoom (lerp `_distance` toward `_target_distance` via `_process()`)
- LOD system (via `main.gd::_update_lod()` each frame) provides smooth level transitions

**Tests:**
