### Requirement Coverage

#### Requirement: Conformance Mode — COVERED
`check_alignment(actual_nodes, spec_node_ids)` classifies each spec-defined
component as aligned / divergent / missing by comparing actual node IDs.
`render_alignment()` adds Label3D annotations for aligned and divergent nodes.

#### Requirement: Evaluation Mode — COVERED
`analyze_coupling(nodes, edges, threshold)` counts bidirectional edge traffic
per pair. `render_coupling()` highlights coupled nodes with HIGHLIGHT_COLOR.
`analyze_criticality(nodes, edges, threshold)` computes in-degree per node.
`render_criticality()` annotates high-in-degree nodes with "⚠ SPOF Risk" labels.

#### Requirement: Simulation Mode — COVERED
`simulate_split(nodes, edges, node_id)` finds direct dependents and generates
new_interfaces list. `render_split_impact()` highlights the split node and dependents.
`simulate_failure(nodes, edges, node_id)` BFS-traverses the reverse adjacency graph
to find transitive cascade. `render_failure_cascade()` highlights all affected nodes.

