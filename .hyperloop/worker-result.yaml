### REQ: Zoom to Detail — COVERED

**Implementation**: `lod_manager.gd` with `FAR_THRESHOLD=80.0`,
`NEAR_THRESHOLD=20.0`:
- FAR (>80): only bounded_context nodes visible, all edges hidden.
- MEDIUM (20–80): bounded_context + module nodes visible, cross_context
  edges visible, internal edges hidden.
- NEAR (≤20): everything visible.
Module sizes derived from `nd["size"]` (LOC-based via `size_from_loc()`)
passed to `BoxMesh.size`.

**Scenario: Zooming into IAM**
