## Direction-Test Derivation Verification

The preparatory commit (3f377ef) added sign-chain derivation comments to 6 direction tests
that were failing `check-direction-test-derivations.sh`. I independently verified each:

**test_orbit_horizontal_drag_changes_phi**: drag right 50px → delta.x = +50 →
`_phi -= delta.x * orbit_speed` (line 118, camera_controller.gd) → phi decreases →
phi ≠ initial_phi. Comment matches implementation ✓

**test_orbit_vertical_drag_changes_theta**: drag up 20px (y: 100→80) → delta.y = -20 →
`_theta = clamp(_theta - delta.y * orbit_speed, ...)` → theta increases → theta ≠
initial_theta. Comment matches implementation ✓

All other derivation comments (dependency rendering cone, UX polish zoom/pan) are
consistent with the underlying camera_controller.gd and main.gd implementations.

