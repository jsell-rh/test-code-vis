### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Top-down default: `_theta = 0.15` (≈ 8.6° from vertical, well below PI/4 = 45°).
- `_distance = 40.0` (positive, camera not at pivot).
- Zoom: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`, `WHEEL_DOWN` increases it,
  clamped to `[min_distance, max_distance]`.
- Orbit: middle-mouse drag changes `_phi` (azimuth) and `_theta` (polar), then
  `look_at(_pivot, Vector3.UP)` ensures up-vector stays intuitive.
- `set_pivot(pivot, distance)`: updates `_pivot` and `_distance` for programmatic framing.

Label readability (Zooming in scenario "AND labels scale to remain readable"):
- `_create_volume()` creates `Label3D` with `billboard = BILLBOARD_ENABLED`,
  `pixel_size = 0.012 > 0.0`, `no_depth_test = true`.

**Tests** (`test_camera_controls.gd`, 8 tests):
- `test_initial_theta_is_near_top_down()`: `cam._theta < PI/4`.
- `test_initial_distance_is_positive()`: `cam._distance > 0.0`.
- `test_scroll_up_decreases_distance()`: wheel-up decreases distance.
- `test_scroll_down_increases_distance()`: wheel-down increases distance.
- `test_orbit_horizontal_drag_changes_phi()`: 50px drag changes `_phi`.
- `test_orbit_vertical_drag_changes_theta()`: 20px vertical drag changes `_theta`.
- `test_set_pivot_updates_state()`: `set_pivot()` updates `_pivot` and `_distance`.
- `test_zoom_clamped_at_minimum()`: 200 scroll-ups stay above `min_distance`.

Label readability test in `test_scene_graph_loading.gd`:
- `test_labels_are_billboard_and_readable()`: asserts `BILLBOARD_ENABLED`,
  `pixel_size > 0.0`, `no_depth_test == true` on real Label3D node.

