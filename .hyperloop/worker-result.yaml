All test functions exist in `godot/tests/test_understanding_modes.gd` and use
the `_check()/_test_failed` Pattern-1 convention.

| THEN-clause (verbatim from spec) | Test function | Assertion |
|---|---|---|
| "the human can see that the realized system has auth and user management as separate components" | `test_aligned_nodes_detected_as_separate` | `_check(result["aligned"].has("auth"), ...)` + `_check(result["aligned"].has("user_management"), ...)` |
| "the correspondence between spec and realization is visually apparent" | `test_aligned_nodes_have_annotation_in_scene` | `_check(label_count >= 1, ...)` on Label3D children of scene_root |
| "the human can see the divergence between spec and realization" | `test_divergent_nodes_detected` | `_check(detected, "payment_service should be detected...")` |
| "the specific nature of the divergence is clear (merged vs. separate)" | `test_divergent_nodes_annotated_as_merged` | `_check(found_merged, "a Label3D with 'MERGED'...")` |
| "the coupling between those services is apparent" | `test_tightly_coupled_pair_detected` | `_check(pairs.size() >= 1, ...)` + `_check(pairs[0]["coupling_score"] >= 2, ...)` |
| "the human can assess whether the coupling is problematic" | `test_coupled_nodes_highlighted` | `_check(mesh_x.material_override["albedo_color"] == HIGHLIGHT_COLOR, ...)` + mesh_y |
| "the criticality and centrality of that component is apparent" | `test_central_node_detected_as_critical` | `_check(critical[0]["node_id"] == "hub", ...)` + `_check(critical[0]["in_degree"] == 3, ...)` |
| "the risk it represents is clear" | `test_critical_node_annotated_with_spof_risk` | `_check(found_spof, "a Label3D with 'SPOF'...")` |
| "architectural problems are visible even though conformance is perfect" | `test_coupling_detected_despite_perfect_alignment` | `_check(alignment["aligned"].size() == 2, ...)` + `_check(coupling["pairs"].size() >= 1, ...)` |
| "the impact on dependent services is visible" | `test_split_dependents_detected` | `_check(dependents.has("client_a"), ...)` + `_check(dependents.has("client_b"), ...)` |
| "new dependencies or interfaces that would be required are shown" | `test_split_new_interfaces_shown` | `_check(new_interfaces.size() >= 1, ...)` + mesh highlight + found_split_annotation |
| "the cascade of effects through the system is visible" | `test_failure_cascade_detected` | `_check(cascade.has("api"), ...)` + `_check(cascade.has("frontend"), ...)` |
| "components that would be affected are clearly identified" | `test_failure_affected_nodes_highlighted` | `_check(mesh_c1.albedo_color == HIGHLIGHT_COLOR, ...)` + `_check(found_failed_annotation, ...)` |

**Mandatory Label3D legibility**: `test_annotation_label3d_has_billboard_and_pixel_size`
asserts `billboard == BaseMaterial3D.BILLBOARD_ENABLED` and `pixel_size > 0.0` on
annotations produced by the render_criticality pipeline.

