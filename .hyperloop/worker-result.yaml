### Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`
- Initial state: `_theta = 0.15` (≈8.6° from directly above), `_distance = 40.0` — top-down view.
- `_handle_button()`: WHEEL_UP decreases `_distance` (zoom in); WHEEL_DOWN increases it (zoom out).
  Both are clamped to `[min_distance, max_distance]`.
- `_handle_motion()`: middle-mouse drag updates `_phi` (azimuth) and `_theta` (altitude).
  `_theta` is clamped to `[0.01, PI-0.01]` preventing camera flip — "up stays up".
- `set_pivot()`: repositions the camera's focal point and distance (called from `_frame_camera()`
  in main.gd after scene load).

**Scenario: Top-down overview — tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| camera defaults to top-down | `test_initial_theta_is_near_top_down` | `cam._theta < PI / 4.0` |
| positive initial distance | `test_initial_distance_is_positive` | `cam._distance > 0.0` |

**Scenario: Zooming in — tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| camera moves closer on scroll | `test_scroll_up_decreases_distance` | `cam._distance < initial_distance` |
| labels remain readable | `test_labels_are_billboard_and_readable` (test_scene_graph_loading.gd) | `BILLBOARD_ENABLED and pixel_size > 0 and no_depth_test` |
| internal structure visible (emergent) | satisfied by zoom — no standalone scene-visibility assertion needed for this emergent property |

**Scenario: Orbiting — tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| camera rotates around focal point (azimuth) | `test_orbit_horizontal_drag_changes_phi` | `cam._phi != initial_phi` after MIDDLE drag |
| camera rotates around focal point (altitude) | `test_orbit_vertical_drag_changes_theta` | `cam._theta != initial_theta` after MIDDLE drag |
| orientation intuitive — up stays up | `test_orbit_theta_clamped_prevents_flip` | 1 000 000 px downward drag; `cam._theta <= PI - 0.01` |

All nine camera tests pass.

