## Summary

Converted all 7 inert bool-returning test functions in `godot/tests/test_system_purpose.gd`
to use `_check()` under Pattern 1 (the `_test_failed` runner pattern).

The file declares `var _test_failed: bool = false`, which the runner detects as Pattern 1.
Under Pattern 1, the runner ignores each test method's return value and only checks
whether `_test_failed` became `true` via `_check()`. The 7 affected functions were
returning bool without calling `_check()`, so they always reported PASS regardless of
outcome (inert tests).

### Tests fixed (all converted from `-> bool` to `-> void` + `_check()`):

1. `test_bounded_context_nodes_distinguishable_by_type`
