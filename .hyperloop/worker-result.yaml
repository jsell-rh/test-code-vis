## Implementation Quality

- **camera_controller.gd**: clean spherical-coordinate orbit camera. LMB → pan (Google Maps
  convention, immediate, proportional), RMB → `begin_orbit_at_world_point()` (sets pivot to
  cursor world point before orbiting), scroll → `_zoom_toward_point()` (pivot shifted by zoom
