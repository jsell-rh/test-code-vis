## THEN-Clause Coverage (task-024 scope: LMB pan, non-inverted movement)

### Scenario: Panning the view
1. THEN the camera pans in the direction of the drag
   → `test_lmb_drag_pans_camera` (line 149): LMB press + 50px right motion → `cam._pivot != initial_pivot` ✓

2. AND the movement direction matches the drag direction (not inverted)
   → `test_pan_direction_not_inverted` (line 172): drag left 50px at phi=PI/2 → `cam._pivot.x > 0.0` ✓
     Independent derivation: drag left → delta.x = -50 → `_target_pivot -= right * (-50)` → pivot.x increases
     → camera shifts +X → scene shifts −X (left) → content to the right revealed (Google Maps convention) ✓

### Scenario: Drag direction matches view movement
3. THEN the scene moves in the same direction as the drag
   → `test_pan_direction_not_inverted`: same assertion — directly verifies Google Maps convention ✓

### Additional scenarios covered by the implementation (tasks-025/026/027 in scope):
4. THEN the view zooms toward the point under the cursor
   → `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (10,0,0), zoom in → `target_pivot.x > 0.0` ✓

5. AND the component under the cursor stays under the cursor during zoom
   → `test_zoom_in_cursor_point_invariant`: `0 < target_pivot.x < world_pt.x` ✓

6. THEN the view zooms out from the point under the cursor
   → `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (10,0,0), zoom out → `target_pivot.x < 0.0` ✓

7. THEN the camera orbits around the point under the cursor at orbit start
   → `test_orbit_uses_right_mouse_button`: RMB + horizontal drag → `cam._phi != initial_phi` ✓
   → `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` ✓

8. AND the component remains at the visual center during the orbit
   → `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` ✓

9. THEN the zoom is animated smoothly (interpolated), not instantaneous
   → `test_smooth_zoom_target_differs_from_distance_after_scroll`: `target_distance < _distance` after scroll ✓
   → `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`: `20.0 < _distance < 40.0` ✓

10. THEN the pan movement is smooth and proportional to drag speed
    → `test_pan_proportional_to_drag_speed`: 50px drag → larger pivot displacement than 10px drag ✓

