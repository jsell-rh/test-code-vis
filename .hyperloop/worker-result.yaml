| Drag right ‚Üí pivot.x increases | `test_pan_drag_right_increases_pivot_x` | PASS |
| Drag left ‚Üí pivot.x decreases | `test_pan_drag_left_decreases_pivot_x` | PASS |
| Any direction ‚Üí pivot moves in drag direction | `test_drag_direction_matches_view_movement` | PASS |

