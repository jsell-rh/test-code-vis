### Requirement: Godot 4 — COVERED

**Evidence**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` — Godot 4.6.
- All source files use the `.gd` extension and GDScript 2.0 syntax (typed variables,
  `@export`, `@onready`, `class_name`, etc.).
- Previous CI run: "Godot Engine v4.6.2.stable" in compile output.

**Note**: There is no GDScript behavioral test that can assert the engine version
from inside GDScript (that would be circular). The `project.godot` file is the
correct and definitive artifact. Engine version is a configuration fact, not a
runtime behavior to be exercised by a test.

