## Key Implementation Findings

**main.gd — not a stub.** `_ready()` (lines 35–50) performs real FileAccess.open() +
get_as_text() I/O and calls `build_from_graph()`. `apply_view_spec()` (line 271) wires
SceneInterpreter into the running application.

**Pipeline is end-to-end:**
- Stage 1: `LLMViewGenerator.build_prompt()` → LLM → `parse_response()` → ViewSpec dict
- Stage 2: `SceneInterpreter.apply()` → scene-tree mutations (visible, position, albedo_color, Label3D, arrowhead)
- Wiring: `main.gd:apply_view_spec()` connects Stage 1 output to Stage 2 input

**Fixed primitive set enforced at two layers:**
1. `VALID_OPS` const + `_make_spec()` filter in `llm_view_generator.gd` drops unknown ops at parse time
2. `match op.get("op","")` fall-through in `scene_interpreter.gd` ignores unknown ops at render time

**Test quality:** `test_scene_interpreter.gd` uses the bool-return pattern. Every test
instantiates real Godot node objects and asserts specific property values (.visible,
.position.x/y/z, .albedo_color.r/g/b, .billboard, .pixel_size, child count). No
dict-key-only assertions used in rendering tests.

