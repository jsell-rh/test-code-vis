### Requirement: Orbit Around Mouse Point ÔÇö COVERED

**Implementation** (`camera_controller.gd`):
- Lines 111ÔÇô118: `MOUSE_BUTTON_RIGHT` pressed Ôćĺ calls `_get_ground_point_under_cursor(event.position)`
  then `begin_orbit_at_world_point(world_pt)`.
- Lines 73ÔÇô85: `begin_orbit_at_world_point` sets `_pivot = world_pt` and `_target_pivot = world_pt`,
  recomputing spherical coordinates without a camera jump.

**Scenario: Orbiting around a component** ÔÇö COVERED
- `test_orbit_uses_right_mouse_button`: RMB press + horizontal motion Ôćĺ `cam._phi != initial_phi` Ôťô
- `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` Ôćĺ `cam._pivot == world_pt` Ôťô
- `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` after orbit begin Ôťô
  (pivot = world_pt Ôćĺ camera always looks_at world_pt Ôćĺ it stays at visual centre)

Note: `_get_ground_point_under_cursor()` returns `_target_pivot` in headless mode (correct
architectural fallback). Tests call `begin_orbit_at_world_point()` directly to verify the
orbit-pivot mechanism. Raycast-to-ground-plane is architecturally correct but genuinely
untestable headlessly; this is acceptable.

