## Additional Guideline Checks

**main.gd `_ready()` stub check**: Not a stub. `_ready()` opens the scene graph JSON via
`FileAccess.open()`, parses it, calls `SceneGraphLoader.load_from_dict()`, and then
`build_from_graph()`. Full implementation present.

**Pipeline completeness**: Stage 1 (`LLMViewGenerator → ViewSpec dict`) and Stage 2
(`SceneInterpreter → Node3D mutations`) both exist; `main.gd.apply_view_spec()` wires
them end-to-end. `check-pipeline-wiring.sh` independently confirmed this.

**Arrowhead / direction indicator**: `_apply_connect()` adds both an `ImmediateMesh` line
and a `CylinderMesh` arrowhead on `scene_root`, satisfying "direction is visually indicated"
for the connect primitive. Test `test_connect_op_adds_arrowhead` asserts the arrowhead child
exists as a `MeshInstance3D`.

**Dict-key-only assertion check**: No test in `test_scene_interpreter.gd` limits itself to
`.has()` checks. Each test instantiates a real `Node3D`, calls `apply()`, and asserts
concrete scene-tree property values (`.visible`, `.position.x/y/z`, `albedo_color`,
`billboard`, `pixel_size`).

**Prohibited file names vs. required features**: The renderer feature lives in
`scene_interpreter.gd` (not the prohibited `view_spec_renderer.gd`). The feature is
present and tested; the prohibited file name is absent. Both checks satisfied.

