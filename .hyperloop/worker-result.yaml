## Requirement Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Code:** `camera_controller.gd` lines 101–104: `MOUSE_BUTTON_LEFT` sets `_panning = true`.
Lines 141–160: `_handle_motion` pans `_target_pivot` via:
```
_target_pivot -= right * delta.x * pan_amount
_target_pivot -= backward * delta.y * pan_amount
_pivot = _target_pivot  # immediate for responsive feel
```

**Scenario: Panning the view** — COVERED
- GIVEN top-down camera view: `_theta = 0.15` (near-vertical) ✓
- WHEN user holds LMB and drags: `MOUSE_BUTTON_LEFT` → `_panning = true` ✓
- THEN camera pans in direction of drag: pivot shifts ✓
- AND direction not inverted: no double-negation; sign verified below ✓

Tests: `test_lmb_drag_pans_camera`, `test_pan_direction_not_inverted`

---

### Requirement: Non-Inverted Movement — COVERED

**Code:** Same pan path. Comment at line 153–155 documents convention:
"Google Maps convention: drag moves scene in same direction as drag.
Dragging right → scene moves right → camera/pivot move LEFT → subtract right·delta.x."
Code: `_target_pivot -= right * delta.x * pan_amount`

**Pan Direction Sign Derivation (independent):**
- At phi=PI/2, camera is on +Z side; basis.x = world +X
- Drag LEFT: delta.x = -50
- `_target_pivot -= (+X) * (-50) * k → pivot.x += 50k` → pivot moves RIGHT → scene shifts LEFT ✓
- "dragging left reveals content to the right" (Google Maps) ✓

**Scenario: Drag direction matches view movement** — COVERED
Tests: `test_pan_direction_not_inverted` (asserts `cam._pivot.x > 0.0` after 50px left drag at phi=PI/2)

---

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Code:** `_zoom_toward_point(world_pt, direction)` lines 170–179:
```
var zoom_ratio = _target_distance / old_dist
_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio
```
On zoom-in (direction < 0): `zoom_ratio < 1` → pivot shifts toward `world_pt` → cursor stays fixed.
On zoom-out (direction > 0): `zoom_ratio > 1` → pivot moves away from `world_pt`.
Called from `_handle_button` with `_get_ground_point_under_cursor` (lines 120–128).

**Scenario: Zooming into a specific component** — COVERED
- GIVEN cursor over bounded context: `world_pt = Vector3(20, 0, 0)` ✓
- WHEN scrolls to zoom in: `_zoom_toward_point(world_pt, -1)` ✓
- THEN view zooms toward cursor: `_target_pivot.x > 0` ✓
- AND component stays under cursor: `0 < _target_pivot.x < world_pt.x` (invariant) ✓

Tests: `test_zoom_in_shifts_pivot_toward_cursor`, `test_zoom_in_cursor_point_invariant`

**Scenario: Zooming out** — COVERED
- GIVEN zoomed-in view ✓
- WHEN scrolls to zoom out: `_zoom_toward_point(world_pt, 1)` ✓
- THEN view zooms out from cursor: `_target_pivot.x < 0` (pivot pushed away from +X cursor) ✓

Tests: `test_zoom_out_shifts_pivot_away_from_cursor`, `test_scroll_down_increases_target_distance`

