#### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_build()` creates root nodes first (parent==null), then child nodes parented to their parent anchor via `_create_volume(nd, parent_anchor)`.
- `_create_volume()` for `bounded_context`: `BoxMesh.size = Vector3(sz, sz*0.2, sz)`, `TRANSPARENCY_ALPHA`, `CULL_DISABLED`, `albedo_color.a = 0.18`.
- `_create_volume()` for `module`: `BoxMesh.size = Vector3(sz, sz*0.6, sz)`, `albedo_color.a = 1.0` (opaque).

**Tests** (`godot/tests/test_containment_rendering.gd` — 5 tests):
- `test_bounded_context_is_translucent`: checks `transparency != TRANSPARENCY_DISABLED && albedo_color.a < 1.0`. Covers THEN "bounded context appears as a larger translucent volume".
- `test_module_is_opaque`: checks `albedo_color.a >= 1.0`. Covers AND "child modules appear as smaller opaque volumes".
- `test_module_parented_inside_context`: checks `mod_anchor.get_parent() == ctx_anchor`. Covers AND child nodes "inside" parent.
- `test_bounded_context_larger_than_module`: checks `ctx_mesh.size.x > mod_mesh.size.x`. Covers THEN "larger volume".
- `test_bounded_context_cull_disabled`: checks `cull_mode == CULL_DISABLED`. Covers AND "boundary visually distinct from children".

