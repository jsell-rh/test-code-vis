## Requirement Status

### REQ: Target Codebase — COVERED
The prototype MUST use the kartograph codebase.

- **Implementation**: `extractor/__main__.py` accepts any `src_path`; comments explicitly reference `~/code/kartograph/src/api` as the target. The Godot app loads `scene_graph.json` produced by the extractor.
- **Scenario: Loading kartograph**:
  - `extractor/tests/test_kartograph_integration.py::test_kartograph_integration_bounded_contexts` — GIVEN kartograph codebase, WHEN main() runs, THEN JSON produced with `iam`, `graph`, `shared_kernel` bounded contexts. Tests are `@pytest.mark.skipif` when kartograph is absent (appropriate for CI).
  - `extractor/tests/test_kartograph_integration.py::test_kartograph_extraction_produces_modules` — THEN visualization reflects actual structure (module-level nodes produced).

### REQ: Two-Stage Pipeline — COVERED
Python extractor → JSON scene graph → Godot application.

- **Implementation**: `extractor/extractor.py::build_scene_graph()` + `extractor/__main__.py` produce JSON. `godot/scripts/scene_graph_loader.gd::load_from_dict()` + `godot/scripts/main.gd::build_from_graph()` consume it.
- **Scenario: Extraction then visualization**:
  - `extractor/tests/test_cli.py::test_main_writes_json_output` — THEN JSON file is produced with `nodes`, `edges`, `metadata` keys.
  - `godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node` — THEN Godot app creates 3D volumes for each node from the JSON.
  - `godot/tests/test_scene_graph_loader.gd` — 24 tests verify JSON parsing is correct and passthrough.

### REQ: Top-Down Architectural View — COVERED
Camera must default to top-down. BCs visible at distinct positions. Coupling reflected in layout. Dependencies visible.

- **Implementation**: `camera_controller.gd` sets `_theta = 0.15` (≈8.6° from vertical — effectively top-down). `extractor.py::_order_by_coupling()` + `compute_layout()` place coupled BCs adjacent in a ring. `main.gd::_create_edge()` draws lines for all edges.
- **Scenario: Viewing kartograph from above**:
  - `godot/tests/test_camera_controls.gd::test_initial_theta_is_near_top_down` — `_theta < PI/4` (0.15 < 0.785). ✓
  - `extractor/tests/test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled` — `dist(auth, shared_kernel) < dist(auth, billing)` with coupling fixture. ✓
  - `godot/tests/test_spatial_structure.gd::test_distinct_contexts_occupy_distinct_regions` — two BC anchors at different positions. ✓
  - `godot/tests/test_dependency_rendering.gd::test_edge_line_mesh_created` — ImmediateMesh line exists between contexts. ✓

### REQ: Zoom to Detail — COVERED
User can zoom into a bounded context to see internal structure.

- **Implementation**: `camera_controller.gd::_zoom_toward_cursor()` decreases distance. `lod_manager.gd` makes modules visible at MEDIUM distance (`< FAR_THRESHOLD=80`), all edges at NEAR (`< NEAR_THRESHOLD=20`). Module size encodes complexity via `size_from_loc()` in extractor.
- **Scenario: Zooming into IAM**:
  - `godot/tests/test_spatial_structure.gd::test_medium_distance_shows_modules` — modules become visible at medium distance. ✓
  - `godot/tests/test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail` — internal edges visible at near. ✓
  - `godot/tests/test_size_encoding.gd::test_large_module_has_bigger_mesh` — larger size → larger BoxMesh. ✓
  - `godot/tests/test_camera_controls.gd::test_scroll_up_decreases_distance` — zoom moves camera closer. ✓

### REQ: Abstract Visual Language — COVERED
Abstract volumes (boxes), no metaphorical representations. Size reflects complexity. Position reflects coupling. Nesting for containment.

- **Implementation**: `main.gd::_create_volume()` uses `BoxMesh` (abstract geometric primitive). Size is `float(nd["size"])` applied to `BoxMesh.size`. Module anchors are children of BC anchors in scene tree.
- **Scenario: Visual representation**:
  - `godot/tests/test_containment_rendering.gd::test_bounded_context_is_translucent` — abstract volume (BoxMesh + TRANSPARENCY_ALPHA). ✓
  - `godot/tests/test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` — 9.0/3.0 ratio matches BoxMesh.size.x ratio. ✓
  - `extractor/tests/test_extractor.py::TestLayout::test_complexity_and_coupling_both_reflected` — `dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d)` for coupled vs uncoupled pair. ✓
  - `godot/tests/test_containment_rendering.gd::test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor` (scene-tree parenting, not dict). ✓

### REQ: Readable Labels — COVERED
All structural elements labeled with names. Labels readable at current zoom.

- **Implementation**: `main.gd::_create_volume()` attaches `Label3D` with `text = nd["name"]`, `billboard = BILLBOARD_ENABLED`, `no_depth_test = true`, `pixel_size = 0.012`.
- **Scenario: Identifying a module**:
  - `godot/tests/test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true`. ✓

### REQ: Dependency Visualization — COVERED
Dependencies shown as visible connections with discernible direction.

- **Implementation**: `main.gd::_create_edge()` creates `ImmediateMesh` line (orange for cross_context, grey for internal) and `CylinderMesh` arrowhead cone (`top_radius=0`) at the target end.
- **Scenario: Cross-context dependency**:
  - `godot/tests/test_dependency_rendering.gd::test_edge_line_mesh_created` — ImmediateMesh line exists. ✓
  - `godot/tests/test_dependency_rendering.gd::test_direction_indicator_cone_created` — CylinderMesh with `top_radius==0` exists (arrowhead). ✓
  - `godot/tests/test_dependency_rendering.gd::test_direction_cone_near_target` — cone within 2 units of target position. ✓
  - `godot/tests/test_dependency_rendering.gd::test_cross_context_cone_is_orange` — orange color (`R>0.8, B<0.3`) distinguishes cross-context. ✓

### REQ: Navigation — COVERED
Pan, zoom, and rotate. Smooth transition between overview and detail.

- **Implementation**: `camera_controller.gd` — LMB drag pans pivot, scroll wheel zooms (smooth lerp via `_process()`), RMB drag orbits around cursor point. `lod_manager.gd` toggles visibility FAR→MEDIUM→NEAR.
- **Scenario: Moving through the space**:
  - `godot/tests/test_camera_controls.gd::test_scroll_up_decreases_distance` / `test_scroll_down_increases_distance` — pan/zoom. ✓
  - `godot/tests/test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` / `test_orbit_vertical_drag_changes_theta` — rotate. ✓
  - `godot/tests/test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous` — smooth zoom (lerp confirmed: `_distance != target` after input, partial lerp after one frame). ✓
  - `godot/tests/test_spatial_structure.gd::test_lod_integration_far_hides_modules_in_built_scene` — smooth overview→detail transition via LOD. ✓

### REQ: Not In Scope — COVERED
Conformance mode, evaluation mode, simulation mode, data flow visualization, moldable views, spec extraction, first-person navigation are NOT implemented.

- **Implementation check**: Searched for `conformance`, `evaluation_mode`, `simulation`, `data_flow`, `moldable`, `llm`, `build_prompt`, `first_person`, `spec_extract` — no matches in `extractor/` or `godot/scripts/`.
- The `spec` node type in `schema.py` and `scene_graph_loader.gd` is schema infrastructure (forward-compatible), not spec extraction. The extractor does not generate spec nodes.
- `godot/tests/test_spatial_structure.gd` explicitly notes: "first person navigation is NOT implemented in the prototype."

