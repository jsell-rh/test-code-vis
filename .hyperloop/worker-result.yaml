### F3 — BLOCKING: Wrong predicate — `test_pan_drag_left_decreases_pivot_x`

**File:** `godot/tests/test_ux_polish.gd`

Test asserts: `cam._pivot.x < initial_x` when dragging left (−50 px).

Derived from Google Maps spec: drag left → camera moves RIGHT → pivot INCREASES in +X.
Expected predicate: `cam._pivot.x > initial_x`.

Test encodes OPPOSITE direction.

**Fix:** Change assertion to `cam._pivot.x > initial_x`.

