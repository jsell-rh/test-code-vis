## Independent Direction Predicate Verification

Per guidelines: independently derived expected predicates BEFORE reading test bodies.

**test_pan_drag_right_increases_pivot_x:**
- Spec: "drag direction matches view movement (not inverted)"
- Derivation: drag right → delta.x = +50 → `_pivot += right * delta.x * pan_amount`; in headless mode `right` = identity basis.x = (1,0,0) → pivot.x += 50*pan_amount → pivot.x increases
- Test asserts: `cam._pivot.x > initial_x` ✓ CORRECT

**test_pan_drag_left_decreases_pivot_x:**
- Derivation: drag left → delta.x = -50 → pivot.x -= 50*pan_amount → pivot.x decreases
- Test asserts: `cam._pivot.x < initial_x` ✓ CORRECT

**test_orbit_vertical_drag_changes_theta:**
- Spec: "camera rotates around focal point; orientation remains intuitive"
- Derivation: drag up → delta.y = -20 → code: `theta -= delta.y * orbit_speed` = theta += 20*orbit_speed → theta increases (less top-down, more horizontal — standard viewport behavior)
- Test asserts: `cam._theta != initial_theta` ✓ CORRECT (theta did change)
- NOTE: derivation comment in test says "theta += delta.y × orbit_speed" which would give theta decreasing. The comment's formula is wrong (should be "theta -= delta.y"), but the test assertion (theta changed) is correct and the code behavior is standard.

**test_orbit_horizontal_drag_changes_phi:**
- Derivation: drag right → delta.x = +50 → `_phi -= delta.x * orbit_speed` → phi decreases
- Test asserts: `cam._phi != initial_phi` ✓ CORRECT

