### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 111–118: RMB press calls `_get_ground_point_under_cursor(event.position)` then
  `begin_orbit_at_world_point(world_pt)`.
- Lines 73–85: `begin_orbit_at_world_point` sets `_pivot = world_pt`, `_target_pivot = world_pt`,
  recomputes `_theta`/`_phi` from current camera position so no jump occurs.
- `_update_transform` always calls `look_at(_pivot)`, ensuring orbit centre is visual centre.

**Scenario: Orbiting around a component** — COVERED
- Test `test_orbit_uses_right_mouse_button` (lines 249–264):
  RMB press + rightward drag → `cam._phi != initial_phi`. ✓
- Test `test_orbit_around_cursor_point` (lines 267–279):
  `begin_orbit_at_world_point(Vector3(5,0,3))` → `cam._pivot == world_pt`. ✓
- Test `test_orbit_pivot_is_world_point` (lines 283–294):
  `cam._pivot.is_equal_approx(world_pt)`, confirming component stays at visual centre
  (camera always `look_at(_pivot)`). ✓

