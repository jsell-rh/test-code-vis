## Requirement Status

### Requirement: Question-Driven View Generation — COVERED

**Implementation reviewed:**
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` accepts a
  natural-language question and the structural graph, embedding both in a structured
  prompt that instructs the LLM to generate a targeted view spec.
- `parse_response(llm_text)` parses LLM JSON output into a validated view spec Dictionary.
- `godot/scripts/scene_interpreter.gd` — `_apply_show()`, `_apply_hide()`,
  `_apply_arrange()`, `_apply_highlight()` translate view spec operations into live
  Node3D mutations (visibility, position, material color).
- `godot/scripts/main.gd` `apply_view_spec(spec)` wires generator → interpreter.

**Scenario: Architectural question — COVERED**

| THEN-clause | Production code | Test | Predicate |
|---|---|---|---|
| generates view focused on auth-related components | `build_prompt()` embeds node IDs; LLM references them via show/highlight ops | `test_build_prompt_contains_node_id_auth_service` | asserts `prompt.contains("auth_service")` |
| irrelevant components hidden or de-emphasized | `_apply_hide()`: `anchor.visible = false` | `test_hide_op_sets_visible_false` | asserts `anchor.visible == false` on real Node3D with "auth_service" fixture |
| relevant components arranged to answer the question | `_apply_arrange()`: `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`, `test_arrange_op_sets_all_three_axes` | assert `anchor.position` components within 0.001 on real Node3D |

**Scenario: Impact question — COVERED**

| THEN-clause | Production code | Test | Predicate |
|---|---|---|---|
| view showing user database and all its dependents | `_apply_show()`: `anchor.visible = true` | `test_show_op_sets_visible_true` | asserts `anchor.visible == true`; fixture uses "user_db" and "what depends on the user database?" |
| dependency relationships are spatially clear | `_apply_connect()`: ImmediateMesh line + CylinderMesh cone arrowhead | `test_connect_op_adds_line_geometry`, `test_connect_op_adds_arrowhead` | assert ≥1 and ≥2 MeshInstance3D children on scene_root with "what depends on the user database?" fixture |

