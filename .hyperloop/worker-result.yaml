### R2: Non-Inverted Movement (MUST) — COVERED

**Code:** `godot/scripts/camera_controller.gd` lines 143–160
Comment: "Google Maps convention: drag moves scene in same direction as drag."
Formula: `_target_pivot -= right * delta.x * pan_amount` — dragging left (delta.x < 0)
subtracts a negative → pivot moves +right → camera moves right → scene moves left = same
direction as drag. ✓

**Scenario: Drag direction matches view movement**

| THEN clause | Test | File |
|---|---|---|
| Scene moves in same direction as drag | `test_pan_direction_not_inverted` | test_camera_controls.gd |

Same test covers both R1 and R2; the behavioral predicates are identical.

