### Requirement: Containment Rendering — COVERED

**Implementation:** `godot/scripts/main.gd` `_create_volume()`
- `bounded_context` nodes: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`, larger `BoxMesh.size = Vector3(sz, sz*0.2, sz)`.
- `module` nodes: `albedo_color.a = 1.0` (opaque), `BoxMesh.size = Vector3(sz, sz*0.6, sz)`.
- Child volumes are parented to parent anchor: `parent_anchor.add_child(anchor)`.

**Scenario: Modules inside a bounded context — all THEN clauses covered**
| THEN clause | Test | Method |
|---|---|---|
| bounded context is translucent | `test_containment_rendering.gd` | `test_bounded_context_is_translucent()` — asserts `transparency != DISABLED` and `alpha < 1.0` |
| child modules are opaque | `test_containment_rendering.gd` | `test_module_is_opaque()` — asserts `albedo_color.a >= 1.0` |
| child modules appear inside parent | `test_containment_rendering.gd` | `test_module_parented_inside_context()` — asserts `mod_anchor.get_parent() == ctx_anchor` |
| bounded context appears larger | `test_containment_rendering.gd` | `test_bounded_context_larger_than_module()` — asserts `ctx_mesh.size.x > mod_mesh.size.x` |
| boundary visually distinct | `test_containment_rendering.gd` | `test_bounded_context_cull_disabled()` — asserts `cull_mode == CULL_DISABLED` |

