| generates 3D volumes for each node | `test_scene_graph_loading.gd::test_volumes_created_for_each_node` | `_anchors.has("ctx1") and _anchors.has("mod1")` |
| volumes have MeshInstance3D | `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors` | each anchor has a MeshInstance3D child |
| generates connections for each edge | `test_scene_graph_loading.gd::test_edge_mesh_instances_created` | >=2 MeshInstance3D children on main node per edge |
| positions elements according to layout data | `test_scene_graph_loading.gd::test_anchor_positions_match_json` | anchor.position.is_equal_approx(Vector3(x,y,z)) |
| labels scale to remain readable | `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` | BILLBOARD_ENABLED, pixel_size > 0.0, no_depth_test == true |

