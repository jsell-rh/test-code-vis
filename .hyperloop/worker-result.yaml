### Requirement: JSON Interface Contract — COVERED

**Scenario: Decoupled pipeline**

Implementation:
- `godot/scripts/scene_graph_loader.gd`: `SceneGraphLoader.load_from_dict(data: Dictionary)` — takes a raw Dictionary, returns structured nodes/edges/metadata. No Python extractor code referenced, no file path to source codebase needed.
- `godot/scripts/main.gd` `_ready()`: loads JSON file from disk via FileAccess, parses with Godot's JSON class, passes resulting Dictionary to `SceneGraphLoader.load_from_dict()`. Zero knowledge of the Python extractor.

Tests:
- `godot/tests/test_scene_graph_loader.gd`:
  - `test_nodes_list_is_returned`: calls `SceneGraphLoader.load_from_dict(_make_fixture())` with a hardcoded fixture dict (no extractor invoked), asserts "nodes" key is Array.
  - `test_metadata_is_returned`: asserts `metadata.source_path` and `timestamp` present in result.
  - Multiple additional tests verify edges, node fields, graceful handling of empty/missing keys.
- The fixture dict is self-contained — no external file or Python process required.

All THEN-clauses covered.

