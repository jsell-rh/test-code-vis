### Requirement: Godot 4.6 Engine — COVERED

**Implementation:**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` — version pinned to 4.6.x.
- All files under `godot/scripts/` are `.gd` — no C# or Mono files.
- `godot/scripts/main.gd` uses `FileAccess.open()` + `get_as_text()` throughout — Godot 4.x API, not deprecated Godot 3 `File.new()` / `read_as_text()`.

**Tests (both registered in `run_tests.gd`):**
- `test_engine_version.gd` — reads `project.godot` via `FileAccess.open()` + `get_as_text()`,
  asserts `"4.6"` present, asserts no C#/Mono, asserts every file in `res://scripts/` ends
  with `.gd` (DirAccess iteration over full set — satisfies the "all scripts use GDScript"
  iteration predicate).
- `test_godot_version.gd` — also reads `project.godot` checking `config/features` + `"4.6"`;
  reads `main.gd` and verifies presence of `FileAccess.open(` + `get_as_text()` and absence
  of `File.new()` / `read_as_text()`.

All THEN clauses of the Engine version scenario are covered by code and test.

