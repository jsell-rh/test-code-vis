### Pre-Existing Extractor Fixes Applied

Files changed: `extractor/extractor.py`, `extractor/tests/test_extractor.py`

1. **check-layout-radius-bound.sh (F1)**: Added `min()` cap to `bc_radius` and
   `mod_radius` to prevent unbounded child-orbit radii:
   ```python
   bc_radius = min(max(5.0, len(bc_nodes) * 2.5), 100.0)
   mod_radius = min(max(1.5, len(children) * 0.9), bc_radius * 0.4)
   ```

2. **check-circular-position-y-axis.sh (F2)**: Changed `y=1.0` → `y=0.0` in
   `_circular_positions` call for module layout.

3. **check-relative-position-tests.sh (F3a)**: Removed absolute parent-coordinate
   accumulation:
   ```python
   # BEFORE: child["position"] = {"x": px + pos[0], ...}  # absolute world coord
   # AFTER:  child["position"] = {"x": pos[0], ...}        # local offset only
   ```

4. **check-relative-position-tests.sh (F3b)**: Added
   `test_child_position_is_relative_local_offset` with direct equality assertion:
   ```python
   assert mod_node["position"]["x"] == pytest.approx(1.5)
   ```

All 95 Python tests pass after these fixes.

