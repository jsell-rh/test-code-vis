## Requirement: Dependency Rendering тАФ COVERED

**Implementation** (`godot/scripts/main.gd тЖТ _create_edge()`):
- `ImmediateMesh` with `PRIMITIVE_LINES` draws the connecting line.
- `CylinderMesh` (top_radius=0, bottom_radius=0.25) placed at target end serves
  as an arrowhead cone indicating direction.
- Cross-context edges coloured orange `Color(1.0, 0.50, 0.10)`; internal grey.

**Tests** (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` тАФ `ImmediateMesh` child found on main node. тЬУ
- `test_direction_indicator_cone_created` тАФ `CylinderMesh` with `top_radius==0`. тЬУ
- `test_direction_cone_near_target` тАФ cone position within 2 units of target. тЬУ
- `test_cross_context_cone_is_orange` тАФ `albedo_color.r > 0.8` and `.b < 0.3`. тЬУ

