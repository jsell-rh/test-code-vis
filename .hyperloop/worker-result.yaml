### REQ: Navigation — COVERED

Spec: "MUST support basic spatial navigation … pan, zoom, rotate … smoothly
transition between overview and detail levels."

- **Code**: `camera_controller.gd`:
  - LMB drag → `_panning = true` → `_pivot` shifted along camera right/forward.
  - RMB drag → `_orbiting = true` → `_phi` / `_theta` updated.
  - Scroll wheel → `_zoom_toward_cursor()` → `_target_distance` clamped; `_process()` lerps `_distance` toward target for smooth animation.
  - `get_distance()` → queried by `main.gd` each frame for LOD transitions.
- **Tests**:
  - `test_camera_controls.gd::test_scroll_up_decreases_distance` ✓
  - `test_camera_controls.gd::test_scroll_down_increases_distance` ✓
  - `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` ✓
  - `test_camera_controls.gd::test_orbit_vertical_drag_changes_theta` ✓
  - `test_ux_polish.gd::test_lmb_pan_moves_pivot` ✓
  - `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous` — after
    scroll, `_distance != _target_distance`; after one `_process(0.016)` frame,
    `_distance` is partially interpolated (not snapped) ✓

