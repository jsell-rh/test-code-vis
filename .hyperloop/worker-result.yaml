### Scenario: Running the prototype (Desktop Platform)

**PASS-WITH-NOTE:** "runs natively without browser, container, or VM dependencies" is a
deployment assertion untestable in headless CI. Structural evidence:
- No `Dockerfile`, no web export preset, no HTML5 config in `project.godot`.
- `config/features = PackedStringArray("4.6")` — does not include `"Web"`.
- All APIs (`FileAccess`, `Node3D`, `Camera3D`, `MeshInstance3D`, `Label3D`,
  `ImmediateMesh`) are standard desktop Godot 4.6 — no browser equivalents required.

### Scenario: Smooth navigation

**PASS-WITH-NOTE:** "frame rate remains above 30fps" requires a live GPU render pipeline
unavailable in headless CI. Structural coverage via `test_nfr_scale.gd`:

| THEN clause | Test | Predicate match |
|---|---|---|
| Builds 6 bounded contexts (scale) | `test_kartograph_scale_context_anchors_exist` | Asserts all 6 context IDs present in `_anchors` after `build_from_graph()` ✓ |
| Builds ~50 module anchors (scale) | `test_kartograph_scale_module_anchors_exist` | Iterates 54-module fixture; asserts each ID in `_anchors`; asserts module_count == 54 ✓ |
| Total anchor count at scale | `test_kartograph_scale_anchor_count` | Asserts `_anchors.size() == 60` (6 + 54) ✓ |
| Build pipeline completes at scale | `test_kartograph_scale_build_produces_world_positions` | Asserts `_world_positions.size() == 60` after build ✓ |

LOD manager (`lod_manager.gd`) implements three-tier visibility gating (FAR/MEDIUM/NEAR),
reducing rendered geometry at distance. Architectural mechanism for 30fps is correct.
FPS itself is physically untestable in headless — not a missing implementation.

### Scenario: Pivoting after prototype

SHOULD-level process statement. No testable behavioral clause. No architectural lock-in:
JSON scene graph is the sole inter-component artifact; neither `godot/` nor `extractor/`
has any knowledge of the other.

