### main.gd _ready() — Not a Stub

`_ready()` calls `FileAccess.open()` + `get_as_text()`, parses JSON, invokes
`SceneGraphLoader.load_from_dict()`, then calls `build_from_graph()`. The full
rendering pipeline executes at startup. **Not a stub.**

### Pipeline Completeness

Complete 4-stage pipeline verified:
1. `_ready()` reads JSON via FileAccess + get_as_text ✓
2. `SceneGraphLoader.load_from_dict()` structures nodes/edges ✓
3. `build_from_graph()` creates Node3D volumes (bounded_context = translucent,
   module = opaque, children parented inside context anchor) ✓
4. `_create_edge()` creates ImmediateMesh line + CylinderMesh cone
   (top_radius=0, direction indicator) per edge ✓

### note on check-gdscript-only-test.sh SKIP

The check uses `find specs/ -name "*.spec.md" | head -1` which resolves to
`specs/core/system-purpose.spec.md` (no GDScript constraint there), so it SKIPs.
The spec at `specs/prototype/godot-application.spec.md` *does* say "all scripts
use GDScript". However, `test_scripts_dir_contains_only_gdscript` in
`test_engine_version.gd` uses DirAccess iteration to verify every file in
`res://scripts/` has a `.gd` extension — exactly the predicate required by the
guidelines. Coverage is present; the check design is a pre-existing gap that does
not affect pass/fail (the check exits 0 and the test is correct).

