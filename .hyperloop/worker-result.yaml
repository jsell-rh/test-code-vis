## Requirement Status

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation:** `camera_controller.gd` lines 72–74 set `_panning = true` and
capture `_last_mouse` when LMB is pressed. Lines 133–145 in `_handle_motion` compute
`delta = event.position - _last_mouse` and translate the pivot with
`_pivot += right * delta.x * pan_amount` when `_panning` is true.

### Requirement: Non-Inverted Movement — COVERED

**Implementation:** Line 136 sets `right = global_transform.basis.x` (no negation).
Line 143: `_pivot += right * delta.x * pan_amount` — positive `delta.x` (drag right)
adds a positive amount to `_pivot.x`, matching drag direction without inversion.

In headless tests `global_transform.basis` is identity, so `right = Vector3(1,0,0)`.
A right drag (`delta.x = +50`) yields `_pivot.x += 50 * pan_amount > 0`. Verified.

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation:** `_zoom_toward_cursor(cursor_world, direction)` (lines 98–106).
Zoom-in (`direction < 0`): `step < 0 → _target_distance` decreases →
`zoom_fraction = 1 − (smaller/larger) > 0 → _pivot.lerp(cursor, +f)` — pivot shifts
toward cursor. Zoom-out (`direction > 0`): `zoom_fraction < 0` → pivot shifts away.
Called from `_handle_button` at lines 82–84 for WHEEL_UP/WHEEL_DOWN.

### Requirement: Orbit Around Mouse Point — COVERED

**Implementation:** Lines 78–80: when RMB is pressed,
`_set_orbit_pivot(_mouse_to_ground(event.position))` repositions `_pivot` to the
world point under the cursor and recalculates spherical angles so camera position
is preserved. Subsequent orbit motion (lines 127–131) rotates `_phi`/`_theta`
without moving `_pivot`, keeping the focal point fixed.

### Requirement: Smooth Camera Movement — COVERED

**Smooth zoom implementation:** `_process(delta)` (lines 50–56) uses
`_distance = lerp(_distance, _target_distance, min(zoom_smoothing * delta, 0.9))`.
`_distance` does not jump to `_target_distance` immediately; it interpolates over
multiple frames.

**Smooth pan implementation:** Pan is direct (no interpolation needed — the pivot
tracks mouse position proportionally, which is smooth by construction). The
pan_amount scalar `pan_speed * (_distance * 0.05 + 1.0)` ensures movement is
proportional to drag distance and current zoom level.

