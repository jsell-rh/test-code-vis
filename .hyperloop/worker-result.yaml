## Algorithm-Quality Verification

`test_complexity_and_coupling_both_reflected` (extractor/tests/test_extractor.py:464):
- Fixture: big_ctx (100 LOC, imports ctx_c) vs small_ctx (1 LOC, no coupling).
- Assert 1: `bc_nodes["big_ctx"]["size"] > bc_nodes["small_ctx"]["size"]`
  (size reflects complexity / LOC — varies LOC, asserts relative size).
- Assert 2: `dist("big_ctx","ctx_c") < dist("big_ctx","ctx_d")`
  (position reflects coupling — varies coupling, asserts relative distance).
- ✓ Algorithm-quality: varies BOTH LOC and coupling; asserts BOTH relative outputs.

`test_coupled_bcs_are_closer_than_uncoupled` (extractor/tests/test_extractor.py:435):
- Fixture: 4 BCs; auth imports shared_kernel (coupled); billing has no auth import.
- Assert: `dist("auth","shared_kernel") < dist("auth","billing")`.
- ✓ Algorithm-quality: varies coupling in fixture, asserts relative spatial output.

