### Fix applied in this run

The previous verdict was FAIL due to a missing property-value test for the
"AND labels scale to remain readable" THEN clause in the Camera Controls /
Zooming-in scenario.

Added `test_labels_are_billboard_and_readable()` to
`godot/tests/test_scene_graph_loading.gd`. The test:
1. Instantiates `MainScript`, calls `_build()` with a known fixture.
2. Retrieves the `Label3D` child from the `ctx1` anchor.
3. Asserts the three properties that implement readability at all zoom levels:
   - `lbl.billboard == BaseMaterial3D.BILLBOARD_ENABLED`  (label always faces camera)
   - `lbl.pixel_size > 0.0`  (non-zero world-space text scale)
   - `lbl.no_depth_test == true`  (visible through geometry at any zoom)

These properties are set in `main.gd::_create_volume()` at lines 169–171.

