### Requirement: Question-Driven View Generation — COVERED

**Scenario: Architectural question**
- THEN generates a view focused on auth-related components
  → `_apply_show()`: `anchor.visible = true`
  → `test_show_op_sets_visible_true`: asserts `anchor.visible == true` on real `Node3D`
- AND irrelevant components are hidden or de-emphasized
  → `_apply_hide()`: `anchor.visible = false`
  → `test_hide_op_sets_visible_false`: asserts `anchor.visible == false`
- AND the relevant components are arranged to answer the question
  → `_apply_arrange()`: `anchor.position = Vector3(x, y, z)`
  → `test_arrange_op_sets_position_x`, `test_arrange_op_sets_all_three_axes`: assert
    `absf(anchor.position.x - 5.0) < 0.001`

