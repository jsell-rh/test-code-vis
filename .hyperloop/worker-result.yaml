## Findings

### No blocking findings.

**Advisory (non-blocking, prototype):** Extractor writes absolute world coordinates for
child nodes (`px + pos[0]`), while the Godot renderer parents child anchors to their BC
anchor and treats JSON positions as local offsets. For real kartograph data (where BC
anchors are not at the world origin), child volumes would be rendered at `parent_world +
json_pos` instead of `json_pos`, effectively doubling the parent offset. Test fixtures
use BC at the world origin, so local == absolute and tests pass. This is a prototype-level
design issue, not a test coverage failure; spec guidance ("prototype — focus on does it
work") is satisfied by the current test corpus.

**Camera "internal structure becomes visible" THEN-clause:** This clause is satisfied
emergently — zooming (tested) reduces camera distance, which naturally exposes internal
3D structure; no standalone scene-visibility test is required for this emergent property.

