### Requirement: Module Discovery (MUST)

**COVERED**

#### Scenario: Discovering kartograph's bounded contexts

- **Code**: `discover_bounded_contexts()` in `extractor/extractor.py`. Iterates
  the source directory, filters to Python packages excluded from `_NON_CONTEXT_DIRS`
  and not underscore-prefixed. Each is represented as a `Node` with `id` (dotted
  module path, encodes the "path" concept from the spec), `name`, `type`, `position`,
  `size`, `parent`, and `metrics`.

  Minor note: the spec says "a node with a name, path, and type". The schema uses
  `id` (e.g. `"iam"`) in place of an explicit `path` field. This is a naming
  difference, not a gap ÔÇö the `id` unambiguously encodes the module path and the
  Godot consumer uses it as such. Not a failure.

- **Tests** (`extractor/tests/test_extractor.py`):
  - `TestModuleDiscovery::test_discovers_bounded_contexts` ÔÇö asserts `iam`, `graph`,
    `shared_kernel` are discovered from a synthetic kartograph-like fixture.
  - `TestModuleDiscovery::test_bounded_context_node_has_required_keys` ÔÇö asserts
    presence of `id`, `name`, `type`, `position`, `size`, `parent`.
  - `TestModuleDiscovery::test_bounded_context_type` ÔÇö type == `"bounded_context"`.
  - `TestModuleDiscovery::test_bounded_context_parent_is_none` ÔÇö top-level nodes
    have `parent = None`.
  - `TestModuleDiscovery::test_excludes_tests_directory` ÔÇö exclusion list enforced.

#### Scenario: Discovering nested modules

- **Code**: `discover_submodules()` in `extractor/extractor.py`. For each bounded
  context, iterates its sub-directories for non-underscore Python packages.
  Each gets `id = f"{bc_name}.{candidate.name}"` and `parent = bc_name`, encoding
  the containment relationship.

- **Tests**:
  - `TestModuleDiscovery::test_discovers_submodules_in_iam` ÔÇö finds `iam.domain`
    and `iam.application`.
  - `TestModuleDiscovery::test_submodule_parent_references_bc` ÔÇö parent == `"iam"`.
  - `TestModuleDiscovery::test_submodule_type_is_module` ÔÇö type == `"module"`.
  - `TestModuleDiscovery::test_submodule_id_is_dotted` ÔÇö id contains `.`.
  - `TestSceneGraphOutput::test_nodes_include_internal_modules` ÔÇö integration check
    that the full pipeline includes submodules.

