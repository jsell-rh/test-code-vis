## Spec Alignment Review — specs/core/understanding-modes.spec.md

### Prototype Scope Note
`specs/prototype/prototype-scope.spec.md` §"Not In Scope" explicitly excludes all three
modes from the prototype. Nevertheless, implementation was assigned (task-033), the work
was done, and this review evaluates that implementation against the spec contract.

---

### Requirement: Conformance Mode
> The system MUST allow the human to see whether the as-built system matches the as-specced design.

**Status: COVERED**

Implementation: `godot/scripts/understanding_analyzer.gd`
- `check_alignment(actual_nodes, spec_node_ids)` — classifies spec IDs as aligned /
  divergent / missing relative to the actual node graph.
- `build_alignment_spec(alignment_result)` — emits `annotate` ops with "✓ SPEC ALIGNED"
  for aligned nodes and `highlight` + "⚠ MERGED" ops for divergent nodes.

#### Scenario: Spec-aligned implementation
- THEN (auth and user_management visible as separate components):
  - Code: `check_alignment()` returns both IDs in the "aligned" array.
  - Test: `test_aligned_nodes_detected_as_separate()` — fixture has auth + user_management as
    separate actual nodes, asserts both appear in result["aligned"], none in divergent/missing. ✓
- AND (correspondence visually apparent):
  - Code: `build_alignment_spec()` emits "annotate" ops; `SceneInterpreter.apply_spec()` adds
    Label3D nodes with "✓ SPEC ALIGNED" text.
  - Test: `test_aligned_nodes_have_annotation_in_spec()` — applies spec to real Node3D anchors,
    asserts at least one Label3D child appears in scene_root. ✓

#### Scenario: Spec-divergent implementation
- THEN (divergence visible — payment_service merged into order_service):
  - Code: partial-name matching in `check_alignment()` flags payment_service as divergent when
    only order_service exists; full-miss case flagged as missing.
  - Test: `test_divergent_nodes_detected()` — fixture with only order_service; asserts
    payment_service is in divergent or missing. ✓
- AND (nature of divergence clear — merged vs. separate):
  - Code: `build_alignment_spec()` emits "⚠ MERGED" annotation for divergent IDs.
  - Test: `test_divergent_nodes_annotated_as_merged()` — fixture has payment_order (contains
    substring "payment"); applies spec; asserts a Label3D with "MERGED" in text appears. ✓

