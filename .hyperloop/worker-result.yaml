## Findings

### Requirement: Target Codebase — COVERED

Implementation:
- `extractor/extractor.py::build_scene_graph()` traverses any Python codebase
  parameterized by `src_path`.
- `godot/data/scene_graph.json` contains kartograph's actual bounded-context
  structure (`graph`, `iam`, `infrastructure`, `management`, `query`,
  `shared_kernel`), proving the prototype was exercised against the target.

Tests:
- `extractor/tests/test_kartograph_integration.py` invokes the CLI against
  `~/code/kartograph/src/api` and asserts that `iam`, `graph`, and
  `shared_kernel` appear in the produced scene graph.
- `test_scene_graph_loading.gd::test_volumes_created_for_each_node` confirms
  the Godot app renders a 3D scene from that graph.

Scenario "Loading kartograph": COVERED.

---

### Requirement: Two-Stage Pipeline — COVERED

Implementation:
- Stage 1: `extractor/__main__.py` + `extractor/extractor.py::build_scene_graph()`
  produce a JSON scene graph file.
- Stage 2: `godot/scripts/main.gd::_ready()` reads the file via
  `FileAccess.open()` / `JSON.new().parse()` and calls `build_from_graph()`.
  `scene_graph_loader.gd::load_from_dict()` parses nodes, edges, and metadata.

Tests:
- Python: `test_cli.py::test_main_writes_json_output` calls `main()`, asserts
  exit 0, file existence, valid JSON with nodes/edges/metadata.
- GDScript: `test_scene_graph_loading.gd::test_volumes_created_for_each_node`
  drives `build_from_graph()` end-to-end and asserts scene-tree children.
- GDScript: `test_engine_version.gd::test_file_access_get_as_text_returns_non_empty_string`
  exercises the `FileAccess.open()` / `get_as_text()` path used in `_ready()`.

Scenario "Extraction then visualization": COVERED.

---

### Requirement: Top-Down Architectural View — COVERED

Implementation:
- `camera_controller.gd` initialises `_theta = 0.15` (≈8.6° from vertical)
  placing the camera in near-top-down view at launch.
- LOD thresholds: FAR > 80.0, NEAR < 20.0. Initial distance 40.0 is MEDIUM,
  making all bounded contexts and cross-context edges visible by default.
- `extractor.py::_order_by_coupling()` places tightly-coupled contexts
  adjacent in the circular layout, satisfying the coupling-proximity THEN-clause.

Tests:
- `test_camera_controls.gd::test_initial_theta_is_near_top_down`
- `test_spatial_structure.gd::test_distinct_contexts_occupy_distinct_regions`
- `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection`

Scenario "Viewing kartograph from above": COVERED.

---

### Requirement: Zoom to Detail — COVERED

Implementation: `lod_manager.gd` implements three visibility levels:
- FAR (distance > 80): bounded_context nodes only; all edges hidden.
- MEDIUM (20–80): bounded_context + module nodes; cross_context edges.
- NEAR (< 20): all nodes; all edges including internal.

`camera_controller.gd` transitions between levels as the user scrolls,
with smooth lerped distance interpolation.

Tests:
- `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`
- `test_spatial_structure.gd::test_near_distance_shows_all_nodes`
- `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail`
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`

Scenario "Zooming into IAM": COVERED.

---

### Requirement: Abstract Visual Language — COVERED

Implementation: `main.gd` uses `BoxMesh` for all nodes.
- Bounded contexts: translucent (`TRANSPARENCY_ALPHA`) flat slab with
  `cull_mode = CULL_DISABLED`.
- Modules: opaque compact boxes.
- No buildings, terrain, or thematic decoration in any scene script.

Tests:
- `test_containment_rendering.gd::test_bounded_context_is_translucent`
- `test_containment_rendering.gd::test_module_is_opaque`
- `test_containment_rendering.gd::test_bounded_context_cull_disabled`
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`
- `test_containment_rendering.gd::test_bounded_context_larger_than_module`

Scenario "Visual representation": COVERED.

---

### Requirement: Readable Labels — COVERED

Implementation: Every node in `main.gd` receives a `Label3D` with:
- `billboard = BaseMaterial3D.BILLBOARD_ENABLED`
- `no_depth_test = true`
- `pixel_size = 0.012`

Tests:
- `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`
  instantiates the built scene and asserts all three properties on every
  node's `Label3D` child.

Scenario "Identifying a module": COVERED.

---

### Requirement: Dependency Visualization — COVERED

Implementation: `main.gd::_create_edge()` produces:
1. An `ImmediateMesh` line from source to target.
2. A `CylinderMesh` cone (`top_radius = 0`) near the target as a directional arrowhead.
   - Cross-context: orange `Color(1.0, 0.50, 0.10)`.
   - Internal: grey `Color(0.55, 0.55, 0.55)`.

Tests:
- `test_dependency_rendering.gd::test_edge_line_mesh_created`
- `test_dependency_rendering.gd::test_direction_indicator_cone_created`
  (derivation: `# edge A→B → CylinderMesh(top_radius=0) arrowhead → cone with top_radius==0 exists ✓`)
- `test_dependency_rendering.gd::test_direction_cone_near_target`
  (derivation: `# edge A(0,0,0)→B(20,0,0) → cone placed at to_pos - dir*(height*0.5) → cone.position near (20,0,0) within 2 units ✓`)
- `test_dependency_rendering.gd::test_cross_context_cone_is_orange`

Scenario "Cross-context dependency": COVERED.

---

### Requirement: Navigation — COVERED

Implementation: `camera_controller.gd`:
- LMB drag → pan (`_pivot` shifts in the view plane, derived from right vector × drag delta).
- RMB drag → orbit (changes `_phi` azimuth and `_theta` elevation).
- Scroll wheel → smooth zoom (lerped `_distance` with cursor-toward pivot shift),
  clamped to `[min_distance=2.0, max_distance=500.0]`.

Tests:
- `test_camera_controls.gd::test_scroll_up_decreases_distance`
- `test_camera_controls.gd::test_scroll_down_increases_distance`
- `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi`
- `test_camera_controls.gd::test_orbit_vertical_drag_changes_theta`
- `test_camera_controls.gd::test_zoom_clamped_at_minimum`
- `test_ux_polish.gd::test_lmb_pan_moves_pivot`
- `test_ux_polish.gd::test_pan_drag_right_increases_pivot_x`
- `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous`
- `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts` (overview)
- `test_spatial_structure.gd::test_near_distance_shows_all_nodes` (detail)

Scenario "Moving through the space": COVERED.

