## Requirement: Abstract Visual Language — COVERED

**Scenario: Visual representation**

- `main.gd _create_volume()` uses `BoxMesh` for every node (no metaphorical meshes).
- Bounded contexts: translucent (`TRANSPARENCY_ALPHA`), large flat slab.
- Modules: opaque, compact box; height proportional to size metric.
- Containment: module anchors parented to context anchors in scene tree.
- Size encodes complexity: `box.size` dimensions set from JSON `"size"` field.
- Tests: `test_containment_rendering.gd` (translucency, nesting, cull_disabled),
  `test_size_encoding.gd` (proportional mesh sizes).

---

## Requirement: Readable Labels — COVERED

**Scenario: Identifying a module**

- `main.gd _create_volume()` creates a `Label3D` for each node with:
  - `label.text = nd["name"]`
  - `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` (always faces camera)
  - `label.no_depth_test = true` (visible through geometry)
  - `label.pixel_size = 0.012` (legible real-world size)
- Test: `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`.

---

## Requirement: Dependency Visualization — COVERED

**Scenario: Cross-context dependency**

- `main.gd _create_edge()`:
  - Draws an `ImmediateMesh` (PRIMITIVE_LINES) between source and target world positions.
  - Adds a `CylinderMesh` with `top_radius = 0.0` (arrowhead cone) at the target end,
    oriented along the edge direction — direction is discernible.
  - Cross-context edges: orange (`Color(1.0, 0.50, 0.10)`).
  - Internal edges: grey (`Color(0.55, 0.55, 0.55)`).
- Tests:
  - `test_dependency_rendering.gd::test_edge_line_mesh_created`
  - `test_dependency_rendering.gd::test_direction_indicator_cone_created`
  - `test_dependency_rendering.gd::test_direction_cone_near_target`
  - `test_dependency_rendering.gd::test_cross_context_cone_is_orange`

---

## Requirement: Navigation — COVERED

**Scenario: Moving through the space**

- `camera_controller.gd` implements:
  - Pan: left-mouse drag moves pivot in camera's local XZ plane.
  - Zoom: scroll wheel adjusts `_target_distance` (smooth lerp via `_process`).
  - Orbit: right-mouse drag changes `_phi` / `_theta` spherical angles.
- Tests:
  - `test_camera_controls.gd::test_scroll_up_decreases_distance`,
    `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`
  - `test_ux_polish.gd::test_lmb_pan_moves_pivot`, `test_zoom_is_interpolated_not_instantaneous`,
    `test_orbit_pivot_set_to_cursor_point_at_start`

