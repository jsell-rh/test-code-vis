## Spec Alignment Review — specs/core/understanding-modes.spec.md

All three SHALL requirements are implemented in `godot/scripts/understanding_overlay.gd`
and fully covered by behavioral GDScript tests in `godot/tests/test_understanding_overlay.gd`.
The test suite is registered in `run_tests.gd` (line 49) and uses real Node3D fixture objects
with asserted runtime outputs — this constitutes valid Godot behavioral test coverage.

> **Prototype-scope note:** `specs/prototype/prototype-scope.spec.md` marks all three modes
> as out of prototype scope (§ "Not In Scope"). The guidelines instruct reviewers not to FAIL
> for *missing* out-of-scope features; since the implementation *is* present and correct, the
> scope exclusion is immaterial to this verdict.

---

### Requirement: Conformance Mode — COVERED

> The system MUST allow the human to see whether the as-built system matches the as-specced design.

**Implementation:** `apply_alignment_overlay(nodes_data, anchors)` in `understanding_overlay.gd`
colours each node by its `spec_status` field: `"aligned"` → `ALIGNED_COLOR` (green),
`"divergent"` → `DIVERGENT_COLOR` (red) plus a `Label3D` annotation containing the
`spec_divergence` text, anything else → `UNSPECIFIED_COLOR` (grey).

#### Scenario: Spec-aligned implementation — COVERED
- THEN "human can see auth and user management as separate components"
  → `test_aligned_nodes_displayed_as_separate_components`: two distinct `Node3D` anchors
    each receive `ALIGNED_COLOR`; anchor identity confirms they are separate objects.
- AND "correspondence between spec and realization is visually apparent"
  → `test_aligned_node_receives_aligned_color`: asserts the node's `albedo_color` equals
    `ALIGNED_COLOR` and differs from the pre-overlay default.

#### Scenario: Spec-divergent implementation — COVERED
- THEN "human can see the divergence between spec and realization"
  → `test_divergent_node_receives_divergent_color`: asserts `DIVERGENT_COLOR` is applied
    and is distinct from `ALIGNED_COLOR`.
- AND "specific nature of the divergence is clear (merged vs. separate)"
  → `test_divergent_node_has_divergence_label`: asserts a `Label3D` child exists whose
    `.text` equals the `spec_divergence` field value ("merged with order service").

