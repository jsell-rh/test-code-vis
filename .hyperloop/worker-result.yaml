## Requirement: Containment Rendering ‚Äî COVERED

**Implementation** (`godot/scripts/main.gd ‚Üí _create_volume()`):
- Bounded context: `BoxMesh(sz, sz*0.2, sz)`, `TRANSPARENCY_ALPHA`, alpha=0.18,
  `CULL_DISABLED`.
- Module: `BoxMesh(sz, sz*0.6, sz)`, alpha=1.0 (opaque).
- Child nodes are parented to their parent's `Node3D` anchor, placing them
  structurally and visually inside the parent volume.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` ‚Äî `transparency != DISABLED` and alpha < 1. ‚úì
- `test_module_is_opaque` ‚Äî module albedo alpha ‚â• 1.0. ‚úì
- `test_module_parented_inside_context` ‚Äî `mod_anchor.get_parent() == ctx_anchor`. ‚úì
- `test_bounded_context_larger_than_module` ‚Äî `ctx_mesh.size.x > mod_mesh.size.x`. ‚úì
- `test_bounded_context_cull_disabled` ‚Äî `cull_mode == CULL_DISABLED`. ‚úì

