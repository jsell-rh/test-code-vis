### Requirement: Dependency Rendering — COVERED

**Implementation**: `_create_edge()` creates an `ImmediateMesh` with `PRIMITIVE_LINES` between
world-space positions, plus a `CylinderMesh` (top_radius=0.0, bottom_radius=0.25) cone arrowhead
placed at the target end and oriented via `Basis(Quaternion(Vector3.UP, dir))`. Cross-context
edges use `Color(1.0, 0.50, 0.10)` (orange); internal edges use `Color(0.55, 0.55, 0.55)` (grey).

**Scenario: Rendering a cross-context dependency** — covered by `test_dependency_rendering.gd` (4 tests):
- THEN a line connects the two context volumes: `test_edge_line_mesh_created()` confirms a
  MeshInstance3D with ImmediateMesh exists among main node's children.
- AND the line's direction is visually indicated:
  - `test_direction_indicator_cone_created()` confirms a CylinderMesh with `top_radius == 0.0`
    (pointed arrowhead cone) is present.
  - `test_direction_cone_near_target()` asserts the cone is within 2 units of the target position.
  - `test_cross_context_cone_is_orange()` asserts cross-context cone material has
    `r > 0.8 and b < 0.3` (orange), visually distinguishing direction and dependency type.

