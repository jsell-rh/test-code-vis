### Advisory: Test function names do not match assertions (not blocking)

Two test functions in test_ux_polish.gd have names that contradict their assertions:
- `test_pan_drag_right_increases_pivot_x`: name says "increases", assertion is `< initial_x` (decreases). Assertion is CORRECT for grab model.
- `test_pan_drag_left_decreases_pivot_x`: name says "decreases", assertion is `> initial_x` (increases). Assertion is CORRECT for grab model.

These names are relics from a prior camera-pan-model implementation (cycles 1–2). The assertions were corrected in cycle 3 (commit 4c8471e1) but names were not renamed.

Per guidelines, the comparison is between the derived predicate and the ACTUAL ASSERTION STATEMENT — both align. The NAME is wrong but is not a behavioral defect. Not blocking. Implementer may rename in a follow-up for clarity.

