### Requirement: Camera Controls — COVERED

**Implementation** (`camera_controller.gd`)
- **Top-down**: `_theta = 0.15` rad ≈ 8.6° from vertical; `_distance = 40.0`.
- **Zooming**: `WHEEL_UP` decreases `_distance` (clamped ≥ `min_distance`);
  `WHEEL_DOWN` increases (clamped ≤ `max_distance`).
- **Orbiting**: middle-mouse sets `_orbiting = true`; motion delta updates
  `_phi` and `_theta`; `_theta` clamped to `[0.01, PI-0.01]`; `look_at(_pivot,
  Vector3.UP)` keeps Y-up.
- **Pan**: right-mouse drag moves `_pivot` in camera's local XZ plane.

**Tests** (`test_camera_controls.gd`) — 8 tests:
- `test_initial_theta_is_near_top_down` — `_theta < PI/4`.
- `test_initial_distance_is_positive` — `_distance > 0`.
- `test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`.
- `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`.
- `test_set_pivot_updates_state` — `set_pivot(v, d)` updates both fields.
- `test_zoom_clamped_at_minimum` — 200× scroll-up never drops below `min_distance`.

Label readability under zoom: covered by `test_labels_are_billboard_and_readable`.

