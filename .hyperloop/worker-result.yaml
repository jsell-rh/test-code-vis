| Pre-Computed Layout      | Godot renders without recomputing     | COVERED |

**Overall verdict: FAIL**

Two SHALL conditions are unmet:

1. **Module node positions must be relative to parent** (spec: "AND `position`
   coordinates relative to its parent"). The extractor stores absolute world
   coordinates; Godot's renderer treats them as relative. No test exercises the
   contract boundary.

2. **Child spatial containment end-to-end** follows directly from (1): the Python
   test for child-within-parent-bounds passes on absolute coordinates but would
   fail if the Godot double-offset were accounted for.

Fix required: store local offsets (not absolute world coordinates) for module
nodes in `extractor.py::compute_layout()`, and add a test that verifies the
stored position is the relative offset rather than the absolute world position.
