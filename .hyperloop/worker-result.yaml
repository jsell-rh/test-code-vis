## Requirement: Godot 4.6 — COVERED

**Implementation:**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")`.
- All scripts are `.gd` files (GDScript only).
- `main.gd` uses `FileAccess.open()` + `get_as_text()` (Godot 4.x API).

**Scenario: Engine version — tests in `test_engine_version.gd` and `test_godot_version.gd`:**
- `test_project_declares_godot_46()` — reads `project.godot` via FileAccess,
  asserts "4.6" present. Also exercises the FileAccess call path from `_ready()`.
- `test_main_script_is_gdscript()` — asserts `main.gd` is readable as a GDScript file.
- `test_main_uses_godot4_fileaccess_api()` — asserts `FileAccess.open(` +
  `get_as_text()` in main.gd, and that deprecated `File.new()` is absent.

