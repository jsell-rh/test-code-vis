## Direction Predicate Independent Derivation

**test_pan_direction_not_inverted** — derived before reading the test body:

Spec: "dragging left reveals content to the right (Google Maps)"
- Drag left → mouse position goes from 100 to 50 → delta.x = −50
- At phi = PI/2: camera is at +Z looking toward origin; basis.x = +world_X (right vector)
- Code: `_target_pivot -= right * delta.x * pan_amount`
         = `_target_pivot -= (+X) * (−50) * pan_amount`
         = `_target_pivot.x += 50 * pan_amount` → pivot moves to +X
- Camera/pivot at +X → the view centre shifts rightward → content previously to the
  right (+X) is now centred → right-side content revealed ✓
- Test asserts `cam._pivot.x > 0.0` — **matches derived predicate** ✓

No opposite-direction mapping found. The test would FAIL if the sign were flipped.

