### Requirement: Size Encoding — COVERED

**Implementation** (`main.gd` `_create_volume()`)
- `sz = float(nd["size"])` is applied directly: `BoxMesh.size = Vector3(sz, sz*0.6, sz)`
  for modules. Size ratio in JSON equals size ratio in rendered mesh.

**Tests** (`godot/tests/test_size_encoding.gd`)
- `test_large_module_has_bigger_mesh` — `large_mesh.size.x > small_mesh.size.x`
  (fixture: large_mod size=9, small_mod size=3).
- `test_mesh_sizes_proportional_to_metric` — ratio `9/3 = 3.0` reproduced in
  `BoxMesh.size.x` ratio within 0.001 tolerance.

