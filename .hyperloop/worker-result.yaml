## THEN Clause Traceability

**Scenario: Architectural question**
- "view focused on auth-related components" → `_apply_show()` sets `anchor.visible = true`; tested by `test_show_op_sets_visible_true`
- "irrelevant components are hidden or de-emphasized" → `_apply_hide()` sets `anchor.visible = false`; tested by `test_hide_op_sets_visible_false`
- "relevant components are arranged to answer the question" → `_apply_arrange()` sets `anchor.position`; tested by `test_arrange_op_sets_position_x`

**Scenario: Impact question**
- "view showing the user database and all its dependents" → `_apply_show()` sets `anchor.visible = true`; tested by `test_show_op_sets_visible_true`
- "dependency relationships are spatially clear" → `_apply_connect()` draws `ImmediateMesh` line + `CylinderMesh` arrowhead; tested by `test_connect_op_adds_line_geometry` and `test_connect_op_adds_arrowhead`

**Scenario: LLM produces view spec**
- "3D renderer interprets the view spec into a spatial scene" → `SceneInterpreter.apply()` in `scene_interpreter.gd`; `main.gd` exposes `apply_view_spec()` calling it
- "view spec controls which elements are shown, hidden, highlighted, and how they are arranged" → all six op handlers in `SceneInterpreter`; tested by `test_all_six_ops_mutate_scene_correctly`

