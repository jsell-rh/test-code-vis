## Requirement-by-Requirement Findings

### Pan with Left Mouse Button — COVERED
`camera_controller.gd` lines 101–104: MOUSE_BUTTON_LEFT sets `_panning`; lines 141–160:
`_handle_motion` when panning applies `_target_pivot -= right * delta.x * pan_amount`.
Both THEN-clauses have passing tests with correct predicates.

### Non-Inverted Movement — COVERED
Same implementation. Direction predicate independently derived and confirmed correct.

### Zoom Toward Mouse Cursor — COVERED
`_zoom_toward_point(world_pt, direction)` computes `zoom_ratio = _target_distance / old_dist`,
sets `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`. All 3 THEN-clauses
have passing tests.

### Orbit Around Mouse Point — COVERED
RMB press → `begin_orbit_at_world_point(world_pt)` → `_pivot = world_pt`. Both THEN-clauses
have passing tests.

### Smooth Camera Movement — COVERED
`_process()` uses exponential smoothing: `t = 1.0 - pow(0.05, delta * zoom_smooth)`.
Both THEN-clauses (smooth zoom, proportional pan) have passing tests.

