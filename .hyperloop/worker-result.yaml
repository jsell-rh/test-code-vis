## Spec Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

**Spec**: The application MUST load a JSON scene graph file produced by the Python
extractor and generate the 3D scene from it.

**Scenario**: Loading kartograph's scene graph

Implementation: `godot/scripts/main.gd`
- `_ready()` opens the JSON file via `FileAccess.open(scene_graph_path, FileAccess.READ)`,
  reads it with `get_as_text()`, parses with `JSON.new()` + `json.parse()`, and delegates
  to `SceneGraphLoader.load_from_dict()` before calling `build_from_graph(graph)`.
- `build_from_graph()` runs three passes: (1) root nodes → bounded-context anchors
  positioned from `position.{x,y,z}`, (2) child nodes → module anchors parented inside
  their bounded context, (3) edges → lines + arrowheads.
- `_compute_world_positions()` resolves local→world coordinates from layout data.

Tests: `godot/tests/test_scene_graph_loading.gd` (5 tests)
- `test_volumes_created_for_each_node`: asserts `_anchors` has entries for every node id.
- `test_mesh_instances_exist_in_anchors`: asserts each anchor contains a MeshInstance3D.
- `test_edge_mesh_instances_created`: asserts ≥2 MeshInstance3D children at root (line + cone per edge).
- `test_anchor_positions_match_json`: asserts ctx1 at (0,0,0), mod1 at (2,0,2) matching JSON fixture.
- `test_labels_are_billboard_and_readable`: asserts Label3D has BILLBOARD_ENABLED,
  pixel_size > 0, no_depth_test=true (covers "labels scale to remain readable" THEN).

FileAccess API additionally exercised in `test_engine_version.gd`:
- `test_fileaccess_open_returns_non_null`: exercises FileAccess.open() + get_as_text() on project file.

Status: **COVERED**

