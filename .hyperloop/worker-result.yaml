## THEN-Clause → Test Mapping

Every THEN-clause from the spec is mapped to a named test below. Each test function
name was confirmed present in `godot/tests/test_camera_controls.gd` by grep.

| THEN-clause | Test function | Assertion predicate | Verdict |
|---|---|---|---|
| [Pan/LMB] camera pans in direction of drag | `test_lmb_drag_pans_camera` | `cam._pivot != initial_pivot` after LMB press + motion | COVERED |
| [Pan/LMB] movement direction matches drag (not inverted) | `test_pan_direction_not_inverted` | phi=PI/2, right drag → `cam._pivot.x > 0.0` | COVERED |
| [Drag dir] scene moves in same direction as drag | `test_pan_direction_not_inverted` | same assertion — identical behavioral predicate | COVERED |
| [Zoom-in] view zooms toward point under cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `_zoom_toward_point(world_pt, -1)` → `_target_pivot.x > 0.0` | COVERED |
| [Zoom-in] component under cursor stays under cursor | `test_zoom_in_cursor_point_invariant` | `0 < _target_pivot.x < world_pt.x` (pivot between old and cursor) | COVERED |
| [Zoom-out] view zooms out from point under cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | `_zoom_toward_point(world_pt, 1)` → `_target_pivot.x < 0.0` | COVERED |
| [Orbit] camera orbits around point under cursor at start | `test_orbit_uses_right_mouse_button` + `test_orbit_around_cursor_point` | RMB + motion → `_phi` changes; `begin_orbit_at_world_point` → `_pivot == world_pt` | COVERED |
| [Orbit] component remains at visual center during orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` — camera always look_at(_pivot) | COVERED |
| [Smooth zoom] zoom animated smoothly (interpolated) | `test_smooth_zoom_target_differs_from_distance_after_scroll` + `test_smooth_zoom_process_interpolates_distance` | after scroll: `_target_distance < _distance`; after `_process(0.1)`: `20 < _distance < 40` | COVERED |
| [Smooth pan] pan smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | 50px drag → larger `_pivot.length()` than 10px drag | COVERED |

All 10 THEN-clauses are explicitly covered. No unmapped clauses.

