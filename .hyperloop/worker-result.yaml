### Requirement: Zoom Toward Mouse Cursor (SHALL/MUST)

| THEN-clause | Test | Status |
|---|---|---|
| View zooms toward the point under the cursor | test_zoom_in_shifts_pivot_toward_cursor | PASS |
| Component stays under cursor during zoom | test_zoom_in_cursor_point_invariant | PASS |
| View zooms out from the point under the cursor | test_zoom_out_shifts_pivot_away_from_cursor | PASS |

**Implementation:** `_zoom_toward_point(world_pt, direction)` computes
`zoom_ratio = _target_distance / old_dist` then
`_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.
Zoom in → ratio < 1 → pivot shifts toward world_pt. Zoom out → ratio > 1 → pivot shifts away.
RMB/scroll events call `_get_ground_point_under_cursor(mouse_pos)` to supply the world point.

**Verdict: COVERED**

