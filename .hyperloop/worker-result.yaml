## Sign-Chain Derivation Verification (Independent)

Derived predicates from spec semantics BEFORE reading test bodies:

**Drag right — "scene moves same direction as drag":**
- Map-grab model: `_pivot -= right * delta.x` where delta.x = +50 -> pivot.x decreases
- Camera moves left -> sees content that was to the left -> scene appears to move right
- Expected predicate: `pivot.x < initial_x`
- Test asserts: `cam._pivot.x < initial_x` -- MATCH

**Drag left — "dragging left reveals content to the right" (i.e. = definition, not example):**
- `_pivot -= right * (-50) * pan_amount` -> pivot.x increases
- Camera moves right -> sees content that was to the right -> right-side content enters view
- Expected predicate: `pivot.x > initial_x`
- Test asserts: `cam._pivot.x > initial_x` -- MATCH

**Zoom in — "view zooms toward the point under the cursor":**
- step < 0 -> target_distance decreases -> zoom_fraction = 1-(smaller/larger) > 0
- pivot.lerp(cursor, positive) -> pivot shifts toward cursor
- Fixture: cursor at x=10, pivot at x=0 -> Expected: `pivot.x > 0.0`
- Test asserts: `cam._pivot.x > 0.0` -- MATCH

**Zoom out — "view zooms out from the point under the cursor":**
- step > 0 -> target_distance increases -> zoom_fraction = 1-(larger/smaller) < 0
- pivot.lerp(cursor, negative) -> pivot shifts away from cursor
- Fixture: pivot at x=5, cursor at x=10 -> lerp(5, 10, -0.15) = 4.25 < 5
- Expected predicate: `pivot.x < 5.0`
- Test asserts: `cam._pivot.x < 5.0` -- MATCH

All direction derivations confirm correct predicates. No direction inversions.

## Informational: Headless ENGINE ERROR vs SCRIPT ERROR

Godot emits `ERROR: Condition "!is_inside_tree()"` in headless mode when tests
call `global_transform`. These are C++ engine-level warnings, NOT `SCRIPT ERROR:`
entries. `check-godot-no-script-errors.sh` scans specifically for `SCRIPT ERROR:`
(which silently aborts GDScript test functions before assertions execute) -- zero
found. In headless mode:

- `global_transform` returns identity -> `basis.x = (1,0,0)`, `basis.z = (0,0,1)`
  -- exactly the values the pan tests document in their sign-chain derivation comments.
- `global_position` returns (0,0,0) in `_set_orbit_pivot` -- orbit tests work around
  this by calling `_set_orbit_pivot(world_point)` directly, which correctly sets
  `_pivot = world_point` before any global_position access triggers.

All 150 GDScript tests report PASS. Assertions execute and are verified by the
independent sign-chain analysis above.

