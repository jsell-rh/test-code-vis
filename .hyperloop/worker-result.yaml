### Requirement: Camera Controls — COVERED

**Scenarios: Top-down overview, Zooming in, Orbiting**

**Implementation** (`godot/scripts/camera_controller.gd`)
- **Top-down default**: `_theta = 0.15` rad (≈ 8.6° from vertical); `_distance = 40.0`;
  `_pivot = Vector3.ZERO`; `_ready()` calls `_update_transform()`.
- **Zooming**: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance` (clamped ≥
  `min_distance = 2.0`); `MOUSE_BUTTON_WHEEL_DOWN` increases (clamped ≤
  `max_distance = 500.0`).
- **Orbiting**: middle-mouse sets `_orbiting = true`; motion delta updates `_phi`
  (azimuth) and `_theta` (polar); `_theta` clamped to `[0.01, PI-0.01]` to prevent
  pole flip; `look_at(_pivot, Vector3.UP)` maintains Y-up orientation.
- `set_pivot(pivot, distance)` called from `main.gd._frame_camera()` to frame
  entire scene at startup.
- **Labels readable**: `Label3D.billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`,
  `no_depth_test = true` in `_create_volume()`.

**Tests** (`godot/tests/test_camera_controls.gd`) — 8 tests:
- `test_initial_theta_is_near_top_down` — `_theta < PI/4` (top-down overview).
- `test_initial_distance_is_positive` — camera not at origin.
- `test_scroll_up_decreases_distance` — zoom in moves camera closer.
- `test_scroll_down_increases_distance` — zoom out moves camera farther.
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse drag changes azimuth.
- `test_orbit_vertical_drag_changes_theta` — vertical drag changes polar angle.
- `test_set_pivot_updates_state` — `set_pivot()` updates `_pivot` and `_distance`.
- `test_zoom_clamped_at_minimum` — 200× scroll-up stays ≥ `min_distance`.
- Label readability: covered by `test_labels_are_billboard_and_readable` in
  `test_scene_graph_loading.gd`.

