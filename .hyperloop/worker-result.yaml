## task-007: Godot Application — Implementation Verified

All checks pass (extractor-lint, godot-compile, godot-label3d, godot-tests).

### Implementation Summary

**JSON Scene Graph Loading** (`main.gd`)
- `_ready()` loads the JSON file via `FileAccess` + `JSON.new()`, calls `build_from_graph()`.
- `build_from_graph()` iterates nodes to create 3D anchor volumes, iterates edges to create line
  meshes + arrowhead cones, then calls `_frame_camera()`.
- World positions pre-computed in `_compute_world_positions()` so edge endpoints are available
  without deferred transform propagation.

**Containment Rendering** (`main.gd::_create_volume()`)
- `bounded_context` nodes: translucent (`TRANSPARENCY_ALPHA`, alpha=0.18), `CULL_DISABLED`,
  `BoxMesh.size = Vector3(sz, sz*0.2, sz)`.
- Module nodes: opaque (alpha=1.0), `BoxMesh.size = Vector3(sz, sz*0.6, sz)`.
- Module anchors are `add_child`-ed to their parent context anchor (real scene-tree nesting).

**Dependency Rendering** (`main.gd::_create_edge()`)
- `ImmediateMesh` with `PRIMITIVE_LINES` draws the line between source and target.
- `CylinderMesh` with `top_radius=0.0` (cone) placed at the target end indicates direction.
- Cross-context edges: orange `Color(1.0, 0.50, 0.10)`; internal: grey.

**Size Encoding**
- `sz = float(nd["size"])` applied directly to `BoxMesh.size`; ratio preserved exactly.

**Camera Controls** (`camera_controller.gd`)
- Spherical coordinates: `_theta=0.15` (near top-down), scroll zoom, middle-mouse orbit.
- `_theta` clamped to `[0.01, PI-0.01]` keeps Y-up orientation. `set_pivot()` frames graph.

**Label3D Legibility**
- Every `Label3D` has `billboard = BaseMaterial3D.BILLBOARD_ENABLED`, `pixel_size = 0.012`,
  `no_depth_test = true`. Tests assert all three properties.

### Tests
