All spec requirements for scene-graph-schema are now fully covered.

## What was fixed

### MISSING item: "Godot renders nodes at pre-computed positions without recomputing layout"

**`godot/scripts/main.gd`** — implemented `build_from_graph(graph: Dictionary)` and
`_spawn_node(node_data: Dictionary)`. On `_ready`, the script loads the JSON from
`res://data/scene_graph.json`, parses it via `SceneGraphLoader.load_from_dict`, then
calls `build_from_graph`. For each node entry, a `MeshInstance3D` is created and its
`position` is set directly from the JSON `x`/`y`/`z` values — no layout algorithm runs
in GDScript.

**`godot/tests/test_node_renderer.gd`** — four behavioral tests that:
- Instantiate `Main` (a Node3D), call `build_from_graph` with a fixture dict containing
  known positions.
- Assert actual `.position.x`, `.position.y`, `.position.z` values on the scene-tree
  `MeshInstance3D` nodes via `_find_child_by_name` + `get_children()`.
- Confirm no recomputation: a node at `{"x": 7.0, "y": 3.0, "z": -2.0}` appears at
  exactly those coordinates in the scene tree.
- Confirm every JSON node produces a scene-tree child (no silent drops).

**`godot/tests/run_tests.gd`** — updated to also run the `test_node_renderer` suite.

