## Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd` implements spherical-coordinate
orbit camera. Initial `_theta = 0.15` rad (≈8.6°, near top-down). `set_pivot()` called
from `main.gd::_frame_camera()` to frame the entire graph on load. Scroll wheel adjusts
`_target_distance` with smooth lerp; right-drag changes phi/theta; theta is clamped to
[0.01, PI-0.01] to prevent pole-flip. LOD via `lod_manager.gd` shows modules at medium
distance and all edges at near distance.

**Scenario: Top-down overview — COVERED:**

| Clause | Code | Test |
|--------|------|------|
| camera defaults to top-down | `_theta = 0.15` (< PI/4); `_frame_camera()` calls `set_pivot()` | `test_camera_controls.gd::test_initial_theta_is_near_top_down`, `test_initial_distance_is_positive` |

**Scenario: Zooming in — COVERED:**

| Clause | Code | Test |
|--------|------|------|
| camera moves closer | WHEEL_UP → `_target_distance` decreases | `test_camera_controls.gd::test_scroll_up_decreases_distance` |
| internal structure becomes visible | `lod_manager._apply_medium()` shows modules when distance < FAR_THRESHOLD | `test_spatial_structure.gd::test_medium_distance_shows_modules`, `test_near_distance_shows_all_nodes` |
| labels scale to remain readable | Label3D: `billboard = BILLBOARD_ENABLED`, `no_depth_test = true`, `pixel_size > 0` | `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` |

**Scenario: Orbiting — COVERED:**

| Clause | Code | Test |
|--------|------|------|
| camera rotates around current focal point | right-drag changes phi (azimuth) and theta (altitude) | `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta` |
| orientation remains intuitive (up stays up) | theta clamped; `look_at(_pivot, Vector3.UP)` | `test_camera_controls.gd::test_set_pivot_updates_state`, `test_zoom_clamped_at_minimum` |

