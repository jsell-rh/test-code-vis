## Summary

Implemented all UX Polish requirements from `specs/prototype/ux-polish.spec.md`.

### Changes

**`godot/scripts/camera_controller.gd`** — fully rewritten:
- **Left mouse button** now pans the view (was right mouse button).
- **Right mouse button** now orbits around the world point under the cursor at press time, not around the screen centre. Uses `begin_orbit_at_world_point()` which recomputes spherical coordinates to keep the camera stationary while switching the orbit centre.
- **Middle mouse button** retained as an alternate orbit binding (no existing test regression).
- **Scroll-wheel zoom** is now directed: `_zoom_toward_point()` shifts `_target_pivot` proportionally so the point under the cursor stays fixed during zoom.
- **Smooth zoom**: scroll events mutate `_target_distance`/`_target_pivot` only; `_distance`/`_pivot` interpolate toward the targets in `_process()` via exponential smoothing (`zoom_smooth = 12`), eliminating snapping.
- **Non-inverted pan**: removed the `-` negation on `global_transform.basis.x`; drag direction now matches scene movement.
- **Headless safety**: `_update_transform()` calls `look_at_from_position()` (plus local `position`) when not in the scene tree, eliminating Godot ERROR lines during unit tests.

**`godot/tests/test_camera_controls.gd`** — fully rewritten:
- 20 tests covering every THEN-clause in the spec (see mapping below).
- Clamp boundary tests for `_theta` (min and max) and `_distance` (via `set_pivot`).
- Proportionality test for pan speed.

### THEN-clause → test mapping

| THEN-clause | Test function |
|---|---|
| Camera pans in direction of drag | `test_lmb_drag_pans_camera` |
| Movement direction not inverted | `test_pan_direction_not_inverted` |
| Scene moves in same direction as drag | `test_pan_direction_not_inverted` |
| View zooms toward point under cursor | `test_zoom_in_shifts_pivot_toward_cursor` |
| Component under cursor stays under cursor | `test_zoom_in_cursor_point_invariant` |
| View zooms out from point under cursor | `test_zoom_out_shifts_pivot_away_from_cursor` |
| Camera orbits around point under cursor | `test_orbit_uses_right_mouse_button` + `test_orbit_around_cursor_point` |
| Component remains at visual centre during orbit | `test_orbit_pivot_is_world_point` |
| Zoom is animated smoothly (interpolated) | `test_smooth_zoom_target_differs_from_distance_after_scroll` + `test_smooth_zoom_process_interpolates_distance` |
| Pan is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` |

