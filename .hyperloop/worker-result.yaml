### Spec scenario coverage

#### Requirement: JSON Scene Graph Loading — COVERED

- `main.gd _ready()` is NOT a stub. It calls `FileAccess.open()` + `get_as_text()` +
  `JSON.new().parse()` + `build_from_graph()`. ✓
- `build_from_graph()` iterates all `nodes`, creates `Node3D` anchors positioned from
  `position.{x,y,z}`, then iterates `edges` and calls `_create_edge()`. ✓
- Tests (`test_scene_graph_loading.gd`, `test_node_renderer.gd`) instantiate real
  `Node3D` objects and assert `.position.x/y/z` values against JSON coordinates. ✓
  (Not dict-key-only assertions.)

#### Requirement: Containment Rendering — COVERED

- `_create_volume()`: bounded context → `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`,
  `CULL_DISABLED`; module → fully opaque `a = 1.0`. Children are parented to the parent
  anchor, visually nesting them inside the parent volume. ✓
- `test_containment_rendering.gd` asserts: translucency, opacity, parent link,
  relative box sizes, and `CULL_DISABLED` — all on instantiated `Node3D` objects. ✓

#### Requirement: Dependency Rendering — COVERED

- `_create_edge()` produces an `ImmediateMesh` line (2-vertex `PRIMITIVE_LINES`) and a
  `CylinderMesh` arrowhead (`top_radius = 0.0`) placed near the target end. This is an
  explicit rendering element (not a plain colour difference), satisfying "direction is
  visually indicated". ✓
- `test_dependency_rendering.gd` asserts: line mesh present, cone present with
  `top_radius == 0.0`, cone position within 2 units of target, orange colour for
  cross-context edges. ✓

#### Requirement: Size Encoding — COVERED

- `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)`. Linear,
  proportional mapping with no clamping that would break ratios. ✓
- `test_size_encoding.gd` asserts `large.size.x > small.size.x` and that the ratio
  matches the metric ratio within 0.001. ✓

#### Requirement: Camera Controls — COVERED

- `camera_controller.gd`: `_theta = 0.15` rad initial (≈ 8.6° from vertical, top-down);
  scroll wheel modifies `_distance` (clamped); middle-mouse drag changes `_phi`/`_theta`;
  `look_at(_pivot, Vector3.UP)` preserves up orientation (called only inside tree). ✓
- `test_camera_controls.gd` — 8 tests, all PASS: initial angles, scroll in/out,
  horizontal/vertical orbit, set_pivot state update, minimum distance clamping. ✓

#### Requirement: Godot 4.6 — COVERED

- `project.godot` declares `config/features=PackedStringArray("4.6")`. ✓
- All scripts are `.gd` (GDScript only). ✓
- `main.gd` uses `FileAccess.open()` + `get_as_text()` (Godot 4.6 API). ✓
- `test_engine_version.gd` reads `project.godot` via `FileAccess.open()` +
  `get_as_text()` and asserts the version string at runtime. ✓ (Not config-only.)

