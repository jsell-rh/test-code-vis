### Requirement: Godot 4.6 ‚Äî COVERED (with FileAccess behavioral test)

**Implementation:**
- `project.godot` declares `config/features=PackedStringArray("4.6")`.
- All scripts use GDScript (`extends` / `class_name`).
- `FileAccess.get_as_text()` is used (correct Godot 4.6 API, not `read_as_text()`).

**New test file (`godot/tests/test_engine_version.gd` ‚Äî 3 tests):**

Per project guidelines, technology/version constraint scenarios require a
behavioral test that reads the config file via `FileAccess.open()` +
`get_as_text()`. This also satisfies the `godot-fileaccess-tested.sh` check,
which requires that `FileAccess.open()` in production code (`main.gd`) is also
exercised in at least one test.

- `test_project_godot_declares_46` ‚Äî `FileAccess.open("res://project.godot")`
  + `get_as_text()` + asserts `"4.6" in text`.
- `test_features_line_contains_46` ‚Äî asserts
  `'PackedStringArray("4.6")' in text` (exact features declaration).
- `test_fileaccess_open_returns_non_null` ‚Äî confirms `FileAccess.open()`
  returns a non-null handle, exercising the same API path used in `_ready()`.

