### Requirement: Size Encoding — COVERED

`_create_volume()`: `var sz: float = float(nd["size"])` maps JSON size directly to
`box.size = Vector3(sz, sz*0.6, sz)` — linear, no clamping or additive offset.

`godot/tests/test_size_encoding.gd` — 2 tests:
- `test_large_module_has_bigger_mesh` — inputs 9.0 vs 3.0; asserts `large.size.x > small.size.x`
- `test_mesh_sizes_proportional_to_metric` — asserts `large.size.x / small.size.x ≈ 3.0`
  (within tolerance 0.001) — ratio preserved exactly

Status: **COVERED** ✓

