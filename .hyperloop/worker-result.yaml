## Requirement: Camera Controls — COVERED

**Spec**: MUST provide camera controls for navigating the scene.

**Implementation** (`godot/scripts/camera_controller.gd`):
- Spherical coordinates (`_theta`, `_phi`, `_distance`) around `_pivot`.
- `_theta = 0.15` initial value (≈ 8.6° from top-down, < 45°) satisfies top-down default.
- `MOUSE_BUTTON_WHEEL_UP/DOWN` adjusts `_distance` (clamped to `[min_distance, max_distance]`).
- `MOUSE_BUTTON_MIDDLE` drag adjusts `_phi` (azimuth) and `_theta` (polar/altitude).
- `look_at(_pivot, Vector3.UP)` ensures up-direction remains intuitive throughout orbit.
- `Label3D` with `BILLBOARD_ENABLED` and `no_depth_test=true` keeps labels readable at all zoom levels.

**Tests** (`godot/tests/test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4` ✓
- `test_initial_distance_is_positive` — asserts `_distance > 0` ✓
- `test_scroll_up_decreases_distance` — fires WHEEL_UP, asserts distance decreased ✓
- `test_scroll_down_increases_distance` — fires WHEEL_DOWN, asserts distance increased ✓
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse + horizontal motion, asserts `_phi` changed ✓
- `test_orbit_vertical_drag_changes_theta` — vertical drag, asserts `_theta` changed ✓
- `test_set_pivot_updates_state` — asserts `_pivot == new_pivot` after `set_pivot()` ✓
- `test_zoom_clamped_at_minimum` — 200 scroll-ups, asserts `_distance >= min_distance` ✓

