### Requirement: Zoom Toward Mouse Cursor

#### Scenario: Zooming into a specific component

Pre-read derivation:
- `_zoom_toward_cursor(cursor_world, -zoom_speed)` → negative direction
- `step < 0` → `_target_distance` decreases
- `zoom_fraction = 1.0 - (_target_distance / old_target)` > 0
- `_pivot.lerp(cursor_world, positive_fraction)` → pivot shifts toward cursor

Test `test_zoom_toward_cursor_shifts_pivot_toward_cursor`:
- cursor at (10,0,0), pivot starts at (0,0,0)
- Asserts `cam._pivot.x > 0.0` → pivot moved toward cursor ✓

Test `test_component_stays_under_cursor_on_zoom_in`:
- Asserts `after > before` (pivot.x grew toward cursor) ✓

#### Scenario: Zooming out

Pre-read derivation:
- positive direction → `_target_distance` increases
- `zoom_fraction < 0` → `lerp` moves pivot AWAY from cursor

Test `test_zoom_out_from_cursor_shifts_pivot_away`:
- pivot at (5,0,0), cursor at (10,0,0)
- Asserts `cam._pivot.x < 5.0` → pivot moved away from cursor ✓

Test `test_zoom_out_increases_target_distance`:
- Asserts `cam._target_distance > initial` ✓

STATUS: **COVERED**

