## Spec Alignment Review — specs/prototype/prototype-scope.spec.md
Branch: `hyperloop/task-034`
Date: 2026-04-25

## Summary

All 9 requirements (8 SHALL + 1 "Not In Scope" exclusion set) are implemented and
covered by GDScript behavioral tests and/or Python pytest tests. Verdict: **PASS**.

---

## Requirement-by-Requirement Findings

### 1. Target Codebase (MUST use kartograph)
**Status: COVERED**

Scenario: Loading kartograph
- THEN kartograph's structure is visualized in 3D space
  → `test_kartograph_integration.py::test_kartograph_integration_bounded_contexts`
    Runs `main()` CLI against `~/code/kartograph/src/api`, asserts iam, graph,
    shared_kernel bounded contexts present in output JSON. Skipped when kartograph
    not locally available (CI-safe skip, not a missing test).
- AND the visualization reflects the actual structure of the codebase
  → `test_kartograph_integration.py::test_kartograph_extraction_produces_modules`
    Asserts at least one `type=="module"` node in the output.

Implementation: `extractor/__main__.py` CLI + `extractor/extractor.py:build_scene_graph()`.

---

### 2. Two-Stage Pipeline (Python extractor → JSON → Godot)
**Status: COVERED**

Scenario: Extraction then visualization
- THEN a JSON scene graph file is produced
  → `test_cli.py::test_main_writes_json_output`: CLI call, asserts output file exists
    and is valid JSON with nodes/edges/metadata keys.
- AND the Godot application can load that file and render the scene
  → `test_scene_graph_loading.gd::test_volumes_created_for_each_node`:
    `build_from_graph()` with fixture, asserts Node3D anchors created per node id.
  → `test_scene_graph_loader.gd::test_nodes_list_is_returned` + full suite:
    SceneGraphLoader.load_from_dict() correctly parses every JSON field.

Implementation: `extractor/__main__.py` → JSON, `godot/scripts/main.gd::_ready()`
reads JSON via FileAccess → `SceneGraphLoader.load_from_dict()` → `build_from_graph()`.

---

### 3. Top-Down Architectural View (MUST provide top-down camera)
**Status: COVERED**

Scenario: Viewing kartograph from above
- THEN all bounded contexts are visible as distinct volumes
  → `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`:
    LOD FAR applied → bounded_context anchor visible, module anchor hidden.
  → `test_spatial_structure.gd::test_distinct_contexts_occupy_distinct_regions`:
    Two contexts at different JSON positions → different world positions in scene.
- AND their relative positions reflect their coupling
  → `test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled`:
    Fixture varies coupling; asserts dist(auth,shared_kernel) < dist(auth,billing).
  → `test_extractor.py::test_complexity_and_coupling_both_reflected`:
    Fixture varies both LOC and coupling; asserts size AND position outputs.
- AND dependencies between contexts are visible as connections
  → `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection`:
    ImmediateMesh line exists as child of main node.

Implementation: `camera_controller.gd` (_theta=0.15 ≈ top-down), `lod_manager.gd`
(FAR mode shows only bounded_contexts), `extractor.py::_order_by_coupling()` + layout.
- `test_camera_controls.gd::test_initial_theta_is_near_top_down` confirms theta < PI/4.

---

### 4. Zoom to Detail (MUST allow zoom into bounded context)
**Status: COVERED**

Scenario: Zooming into IAM
- THEN the internal layers become visible
  → `test_spatial_structure.gd::test_medium_distance_shows_modules`:
    At mid-distance modules become visible.
- AND internal dependencies are shown
  → `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail`:
    Internal edges visible at NEAR distance.
- AND the user can see relative sizes of internal modules
  → `test_size_encoding.gd::test_large_module_has_bigger_mesh`:
    size=9 node has wider BoxMesh.x than size=3 node.
  → `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`:
    BoxMesh.size.x ratio matches input size ratio within float tolerance.

Implementation: `lod_manager.gd` (MEDIUM/NEAR LOD modes), `main.gd::_create_volume()`
scales BoxMesh from `nd["size"]`, `camera_controller.gd` scroll-wheel zoom.

---

### 5. Abstract Visual Language (MUST use abstract volumes, no buildings/terrain)
**Status: COVERED**

Scenario: Visual representation
- THEN it appears as a labeled geometric volume
  → `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors`:
    Each anchor contains a MeshInstance3D (BoxMesh).
  → `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`:
    Each anchor contains Label3D with billboard enabled, pixel_size > 0.
- AND its size reflects its relative complexity
  → `test_size_encoding.gd::test_large_module_has_bigger_mesh` (see above).
- AND its position reflects its coupling relationships
  → `test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled` (see above).
- AND containment is shown by nesting (smaller volumes inside larger ones)
  → `test_containment_rendering.gd::test_module_parented_inside_context`:
    mod_anchor.get_parent() == ctx_anchor.
  → `test_containment_rendering.gd::test_bounded_context_larger_than_module`:
    ctx BoxMesh.size.x > mod BoxMesh.size.x.

No metaphorical representations found in production code (BoxMesh only).

