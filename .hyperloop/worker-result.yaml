## Findings

### F1 (RACF — 7th consecutive cycle): check-checkpoint-commit-is-first.sh — Checkpoint not oldest commit

**Status:** FAIL — Re-attempt Compliance Failure (RACF). Has failed in every cycle since cycle 1.

The checkpoint commit (`chore: begin task-007`, SHA 16073446) is NOT the first commit on the branch. The oldest commit is `feat(godot): implement task-007 Godot Application spec` (SHA d51848a1), meaning the implementer explored the repo and wrote code before creating the checkpoint commit. This violates the orchestrator's liveness signal requirement.

**Fix (mandatory — do NOT add new commits first):**
Per `check-combined-rewrite-guide.sh`, both F1 and F2 require a coordinated two-step rewrite:
1. Remove state files from branch history (Step 2 below must come AFTER this):
   `git filter-branch --index-filter 'git rm --cached --ignore-unmatch .hyperloop/state/*' -- main..HEAD`
2. Reorder commits so checkpoint is oldest:
   `git rebase -i main` → move `chore: begin task-007` to the TOP of the commit list.
3. Verify: `git log main..HEAD --reverse --pretty=format:"%s" | head -1` must return `chore: begin task-007`.

