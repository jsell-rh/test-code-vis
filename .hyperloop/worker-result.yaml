## Requirement-by-Requirement Analysis

### Requirement 1: Pan with Left Mouse Button (MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `_handle_button()` matches `MOUSE_BUTTON_LEFT` → sets `_panning = event.pressed`
- `_handle_motion()` when `_panning`: computes `right` and `backward` from `transform.basis`,
  applies `_target_pivot -= right * delta.x * pan_amount` and `_target_pivot -= backward * delta.y * pan_amount`
- Immediately copies `_pivot = _target_pivot` so pan is lag-free

**Scenario: Panning the view — COVERED**
- GIVEN top-down camera view ✓ (`_theta = 0.15`, small polar angle)
- WHEN user holds LMB and drags ✓ (`MOUSE_BUTTON_LEFT` → `_panning = true`)
- THEN camera pans in direction of drag ✓ (pivot changes on motion)
- AND movement direction matches drag direction (not inverted) ✓ (Google Maps: `_target_pivot -= right * delta.x`)

Tests: `test_lmb_drag_pans_camera` (pivot moves), `test_pan_direction_not_inverted` (direction correct)

---

### Requirement 2: Non-Inverted Movement (MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Same pan formula: subtracting `right * delta.x` means drag-right moves pivot right → scene shifts left
- Inline comment explains Google Maps convention explicitly

**Scenario: Drag direction matches view movement — COVERED**
- GIVEN any camera position ✓
- WHEN user drags in any direction ✓
- THEN scene moves in same direction as drag (Google Maps) ✓

Tests: `test_pan_direction_not_inverted` (at `_phi=PI/2`, drag left → `pivot.x > 0` ✓)

---

### Requirement 3: Zoom Toward Mouse Cursor (MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `MOUSE_BUTTON_WHEEL_UP` → `_get_ground_point_under_cursor()` + `_zoom_toward_point(world_pt, -1)`
- `MOUSE_BUTTON_WHEEL_DOWN` → `_get_ground_point_under_cursor()` + `_zoom_toward_point(world_pt, 1)`
- `_zoom_toward_point()`: `zoom_ratio = _target_distance / old_dist`;
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`

**Scenario: Zooming into a specific component — COVERED**
- GIVEN mouse cursor over a bounded context ✓
- WHEN user scrolls to zoom in ✓ (`MOUSE_BUTTON_WHEEL_UP`)
- THEN view zooms toward point under cursor ✓ (pivot shifts toward cursor: ratio < 1)
- AND component under cursor stays under cursor ✓ (pivot stays between old position and cursor)

Tests: `test_zoom_in_shifts_pivot_toward_cursor`, `test_zoom_in_cursor_point_invariant`

**Scenario: Zooming out — COVERED**
- GIVEN zoomed-in view ✓
- WHEN user scrolls to zoom out ✓ (`MOUSE_BUTTON_WHEEL_DOWN`)
- THEN view zooms out from point under cursor ✓ (pivot shifts away: ratio > 1 → `pivot.x < 0`)

Tests: `test_zoom_out_shifts_pivot_away_from_cursor`

---

### Requirement 4: Orbit Around Mouse Point (MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `MOUSE_BUTTON_RIGHT` pressed → `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))`
- `begin_orbit_at_world_point()`: sets `_pivot = world_pt`, recomputes `_distance`, `_theta`, `_phi`
  from current camera position — camera does not jump, only orbit centre changes

**Scenario: Orbiting around a component — COVERED**
- GIVEN mouse cursor over a specific component ✓
- WHEN user holds RMB and drags ✓ (`MOUSE_BUTTON_RIGHT` → `begin_orbit_at_world_point`)
- THEN camera orbits around point under cursor at orbit start ✓ (`_pivot == world_pt`)
- AND component remains at visual center during orbit ✓ (`look_at(_pivot)` keeps `world_pt` centered)

Tests: `test_orbit_uses_right_mouse_button`, `test_orbit_around_cursor_point`, `test_orbit_pivot_is_world_point`

---

### Requirement 5: Smooth Camera Movement (MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `_process(delta)`: exponential smoothing `t = 1.0 - pow(0.05, delta * zoom_smooth)`,
  `_distance = lerpf(_distance, _target_distance, t)`, `_pivot = _pivot.lerp(_target_pivot, t)`
- Pan applies `_pivot = _target_pivot` immediately for proportional, lag-free feel

**Scenario: Smooth zoom — COVERED**
- GIVEN any camera position ✓
- WHEN user scrolls to zoom ✓
- THEN zoom is animated smoothly (interpolated), not instantaneous ✓
  (scroll changes only `_target_distance`; `_distance` interpolates in `_process()`)

Tests: `test_smooth_zoom_target_differs_from_distance_after_scroll`, `test_smooth_zoom_process_interpolates_distance`

**Scenario: Smooth pan — COVERED**
- GIVEN any camera position ✓
- WHEN user drags to pan ✓
- THEN pan movement is smooth and proportional to drag speed ✓

Tests: `test_pan_proportional_to_drag_speed`, `test_pan_applied_immediately_no_lag`

