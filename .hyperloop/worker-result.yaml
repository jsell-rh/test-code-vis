## Spec scenario coverage

### JSON Scene Graph Loading
- THEN reads the JSON file: _ready() opens via FileAccess.open() + get_as_text()
- AND generates 3D volumes: test_volumes_created_for_each_node,
  test_mesh_instances_exist_in_anchors — instantiates real Node3D, asserts
  MeshInstance3D children exist; NOT a dict-key-only check
- AND generates connections: test_edge_mesh_instances_created (≥2 MeshInstance3D:
  1 ImmediateMesh line + 1 CylinderMesh arrowhead)
- AND positions per JSON: test_anchor_positions_match_json — asserts
  .position.x/y/z on real Node3D instances

### Containment Rendering
- THEN bounded context is larger translucent volume: test_bounded_context_is_translucent
  (TRANSPARENCY_ALPHA + alpha < 1.0), test_bounded_context_larger_than_module
  (BoxMesh.size.x comparison on real Node3D)
- AND modules are smaller opaque volumes inside parent: test_module_is_opaque
  (alpha ≥ 1.0), test_module_parented_inside_context (get_parent() == ctx_anchor)
- AND parent boundary visually distinct: test_bounded_context_cull_disabled
  (CULL_DISABLED asserted on StandardMaterial3D)

### Dependency Rendering
- THEN line connects volumes: test_edge_line_mesh_created (ImmediateMesh present)
- AND direction visually indicated: test_direction_indicator_cone_created
  (CylinderMesh top_radius==0.0 — explicit arrowhead, not a colour difference),
  test_direction_cone_near_target (cone within 2 units of target),
  test_cross_context_cone_is_orange (albedo R > 0.8, B < 0.3)
  Guideline: "visually indicated" satisfied by explicit cone mesh element.

### Size Encoding
- THEN larger module has bigger mesh: test_large_module_has_bigger_mesh
- AND proportional to metric: test_mesh_sizes_proportional_to_metric
  (9/3 = 3.0 ratio asserted within 0.001 tolerance)

### Camera Controls — Top-down overview
- test_initial_theta_is_near_top_down (_theta=0.15 < PI/4 ≈ 0.785)
- test_initial_distance_is_positive

### Camera Controls — Zooming
- test_scroll_up_decreases_distance
- test_scroll_down_increases_distance
- test_zoom_clamped_at_minimum (200 scroll-ups stay ≥ min_distance)

### Camera Controls — Orbiting
- test_orbit_horizontal_drag_changes_phi (middle-mouse drag mutates _phi)
- test_orbit_vertical_drag_changes_theta (vertical drag mutates _theta)
- test_set_pivot_updates_state (_pivot and _distance updated correctly)

### Labels readable (guideline: assert property values on instantiated node)
- test_labels_are_billboard_and_readable asserts billboard == BILLBOARD_ENABLED,
  pixel_size > 0.0, no_depth_test == true on real Label3D node instance

### Godot 4.6 / Engine version
