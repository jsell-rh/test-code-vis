### Requirement: Python Extractor — COVERED

**Implementation:** `extractor/__main__.py` is a standalone CLI entry point
(`python -m extractor <src_path> [--output <out.json>]`). It imports only stdlib
modules (`argparse`, `json`, `sys`, `pathlib`) plus the `extractor` package itself.
`extractor/extractor.py` implements `build_scene_graph()` using only `ast`, `os`,
`pathlib`, `json`, `collections` — all stdlib.

**Tests (pytest, extractor/tests/test_cli.py):**

| THEN clause | Test function | Line |
|---|---|---|
| THEN runs as standalone CLI | `test_main_produces_json_output` | :73 |
| AND stdlib-only deps | `test_extractor_uses_only_stdlib_imports` | :154 |

`test_extractor_uses_only_stdlib_imports` walks the AST of every `.py` in the
extractor package (excluding `tests/`) and checks every import against
`sys.stdlib_module_names` — a dynamic, exhaustive predicate, not a hand-curated list.

---

### Requirement: JSON Interface Contract — COVERED

**Implementation:** `godot/scripts/scene_graph_loader.gd` accepts a Dictionary
(parsed from JSON) and has no import of or subprocess call to the Python extractor.
`main.gd` reads the JSON file via `FileAccess.open()`, parses it with `JSON.new()`,
then passes the resulting Dictionary to `SceneGraphLoader.load_from_dict()`.
The Godot application has zero knowledge of the extractor's implementation.

**Tests (GDScript, godot/tests/test_scene_graph_loader.gd):**

| THEN clause | Test function | Line |
|---|---|---|
| THEN no extractor access needed | `test_nodes_list_is_returned` | :74 |
| AND JSON is self-contained | `test_metadata_is_returned` | :228 |

All tests use inline Dictionary fixtures — no Python extractor invoked.
Decoupling is real, not nominal.

