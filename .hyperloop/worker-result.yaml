## Requirement-by-Requirement Findings

### Requirement: Question-Driven View Generation — COVERED

**Scenario: Architectural question — COVERED**

THEN-clause → test mapping (all verified by reading test bodies):

| THEN-clause | Test function | Assertion |
|---|---|---|
| System generates view focused on auth-related components | `test_full_pipeline_arch_question_shows_auth_focused_view` | `anchors["auth"].visible == true` |
| Irrelevant components hidden or de-emphasized | `test_full_pipeline_arch_question_shows_auth_focused_view` | `anchors["billing"].visible == false`, `anchors["shipping"].visible == false` |
| Relevant components arranged to answer the question | `test_full_pipeline_arrange_positions_relevant_components` | `anchors["auth"].position.x == 0.0`, `anchors["token"].position.x == 5.0`, `anchors["session"].position.x == 10.0` |

Each test body calls `LlmViewGenerator.build_prompt()` (Stage 1), `LlmViewGenerator.parse_response()` (Stage 1), and `SceneInterpreter.apply_spec()` (Stage 2) in sequence before asserting. This is genuine end-to-end coverage, not unit tests of isolated components.

**Scenario: Impact question — COVERED**

| THEN-clause | Test function | Assertion |
|---|---|---|
| System shows user_db and all its dependents | `test_full_pipeline_impact_question_shows_dependents` | `.visible == true` for user_db, orders, billing, reports; `.visible == false` for unrelated |
| Dependency relationships are spatially clear | `test_full_pipeline_impact_question_connect_adds_lines` | `root.get_child_count() > children_before` after connect ops |

**Coordinator wiring verified:**

`main.gd` contains:
- `const LlmViewGenerator = preload(...)` and `const SceneInterpreter = preload(...)` at lines 22–23
- `_add_question_ui()` called from `_ready()` at line 94
- `_on_question_submitted()` at line 421 calls `LlmViewGenerator.build_prompt()` (line 426), mock LLM (line 431), `LlmViewGenerator.parse_response()` (line 434), and `_scene_interpreter.apply_spec()` (line 437)
- `_ready()` is not a stub — it performs FileAccess I/O and calls `build_from_graph()`

The question UI is a real CanvasLayer with LineEdit + Button connected to the pipeline. The `_call_llm()` method returns a neutral `{"operations": []}` mock (documented as a prototype placeholder for a real HTTP endpoint), which is acceptable for this task scope.

