### Requirement: Spec-Driven Context — COVERED

**SHALL**: The system MUST accept human-authored specifications as input alongside the
codebase, treating specs as the authoritative expression of human intent.

**Scenario: Spec and codebase loaded together**

**Code implementation**:
- `extractor/extractor.py::discover_spec_nodes()` — discovers a `specs/` or `spec/`
  directory adjacent to or inside the source root, reads every `.md` file, and creates
  `Node` records with `type="spec"` and a size derived from file size.
- `extractor/schema.py` — `NodeType` literal includes `"spec"` alongside
  `"bounded_context"` and `"module"`.
- `extractor/extractor.py::build_scene_graph()` (step 4) calls `discover_spec_nodes()`
  and appends spec nodes to the combined node list before layout.
- `extractor/extractor.py::compute_layout()` / `_position_spec_nodes()` — positions
  spec nodes beyond the code ring at `z = -(bc_radius + 5)`, spatially separating
  intended design from realized code.
- `godot/scripts/main.gd::_create_volume()` — `is_spec` branch renders spec nodes as
  gold slabs (`Color(0.95, 0.80, 0.10, 0.55)`), distinct from blue bounded-context nodes
  (`Color(0.25, 0.45, 0.85, 0.18)`) and green module nodes.

**Test coverage**:

Python extractor tests (`extractor/tests/test_extractor.py`, class `TestSpecNodeDiscovery`):
- `test_spec_files_produce_spec_type_nodes` — nodes have type='spec' when specs/ exists.
- `test_spec_nodes_count_matches_markdown_files` — exactly one node per .md file.
- `test_spec_nodes_have_required_schema_fields` — id/name/type/position/size/parent present.
- `test_spec_nodes_are_top_level_parent_null` — parent is None for all spec nodes.
