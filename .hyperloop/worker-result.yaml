## Requirement Coverage

### Requirement: Godot 4.6 Engine — COVERED

**Scenario: Engine version**

Implementation:
- `godot/project.godot` line 19: `config/features=PackedStringArray("4.6")` — declares Godot 4.6.x engine version.
- `godot/scripts/`: four files, all `.gd` (camera_controller.gd, lod_manager.gd, main.gd, scene_graph_loader.gd) — GDScript only, no C#.
- `godot/scripts/main.gd` `_ready()`: uses `FileAccess.open()` + `file.get_as_text()` — valid Godot 4.6 API (not deprecated `File.new()` / `read_as_text()`).

Tests:
- `godot/tests/test_engine_version.gd`:
  - `test_project_godot_declares_46_feature`: opens project.godot via FileAccess, asserts content contains "4.6".
  - `test_project_godot_config_features_line`: asserts both `config/features` key and `"4.6"` string present.
  - `test_project_does_not_declare_csharp`: asserts no "Mono" or "C#" in project.godot.
  - `test_file_access_get_as_text_returns_non_empty_string`: calls `FileAccess.open()` + `get_as_text()`, asserts non-empty result — exercises valid 4.6 API.
  - `test_scripts_dir_contains_only_gdscript`: iterates `res://scripts/` via DirAccess, asserts every file ends with `.gd`.
- `godot/tests/test_godot_version.gd`:
  - `test_project_declares_godot_46`: reads project.godot via FileAccess, asserts "4.6" present.
  - `test_main_script_is_gdscript`: opens `res://scripts/main.gd`, asserts non-empty .gd content.
  - `test_main_uses_godot4_fileaccess_api`: reads main.gd source, asserts `FileAccess.open(` present, `get_as_text()` present, `File.new()` absent.

All THEN-clauses covered by tests with matching predicates.

