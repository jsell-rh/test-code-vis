### THEN Clause Implementation Details

**JSON Scene Graph Loading:**
- THEN reads the JSON file → `FileAccess.open()` + `JSON.parse()` in `_load_and_build()`
- AND generates 3D volumes → `_create_volume()` called for every node in `graph["nodes"]`
- AND generates connections → `_create_edge()` called for every edge in `graph["edges"]`
- AND positions elements → `anchor.position = Vector3(p["x"], p["y"], p["z"])` per node

**Containment Rendering:**
- THEN bounded context appears as larger translucent volume → `BoxMesh(sz, sz*0.2, sz)` with `TRANSPARENCY_ALPHA`, alpha=0.18
- AND child modules appear as smaller opaque volumes inside → child anchor parented to parent anchor; `BoxMesh(sz, sz*0.6, sz)`, alpha=1.0
- AND boundary visually distinct → `CULL_DISABLED` on context material; different color (blue-ish vs green)

**Dependency Rendering:**
- THEN a line connects the two context volumes → `ImmediateMesh` with `PRIMITIVE_LINES`
- AND the line's direction is visually indicated → `CylinderMesh` (top_radius=0, cone arrowhead) placed at target end, oriented along edge direction via `Basis(Quaternion(Vector3.UP, dir))`

**Size Encoding:**
- THEN module with more code appears as larger volume → `sz = float(nd["size"])` drives `BoxMesh.size`
- AND relative sizes are proportional → linear mapping: ratio of sizes == ratio of metrics (verified by test at 3:1 ratio)

**Camera Controls:**
- THEN camera defaults to top-down → `_theta = 0.15` rad (≈8.6° from vertical)
- THEN camera moves closer on scroll → `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`
- AND internal structure becomes visible → distance clamped to `[min_distance=2, max_distance=500]`
- AND labels scale to remain readable → `Label3D.billboard = BILLBOARD_ENABLED`
- THEN camera rotates around focal point → middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar)
- AND orientation remains intuitive → `look_at(_pivot, Vector3.UP)` keeps up-vector consistent
