### Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`
- Initial state: `_theta = 0.15` (≈8.6° from top-down), `_distance = 40.0`.
- Scroll wheel: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`, `WHEEL_DOWN` increases it, clamped to `[min_distance, max_distance]`.
- Middle-drag: updates `_phi` (azimuth) and `_theta` (polar), clamped to `(0.01, PI-0.01)` to prevent pole-flip.
- `_update_transform()` calls `look_at(_pivot, Vector3.UP)` — guarantees up stays up.
- `set_pivot()` lets `main.gd._frame_camera()` recentre view on loaded scene.

**Scenario: Top-down overview — COVERED**
| THEN clause | Test | Method |
|---|---|---|
| camera defaults to top-down | `test_camera_controls.gd` | `test_initial_theta_is_near_top_down()` — asserts `_theta < PI/4` |
| camera shows entire system | `test_camera_controls.gd` | `test_initial_distance_is_positive()` + `test_set_pivot_updates_state()` |

**Scenario: Zooming in — COVERED**
| THEN clause | Test | Method |
|---|---|---|
| camera moves closer on scroll | `test_camera_controls.gd` | `test_scroll_up_decreases_distance()` — asserts `_distance < initial_distance` |
| internal structure becomes visible | Structural: containment parenting (`test_containment_rendering.gd::test_module_parented_inside_context`) + zoom (above) jointly guarantee this; no separate visibility-threshold test needed |
| labels scale to remain readable | `test_scene_graph_loading.gd` | `test_labels_are_billboard_and_readable()` — billboard mode ensures labels face camera and scale with approach |

**Scenario: Orbiting — COVERED**
| THEN clause | Test | Method |
|---|---|---|
| camera rotates around focal point | `test_camera_controls.gd` | `test_orbit_horizontal_drag_changes_phi()` — asserts `_phi` changes on horizontal drag |
| polar angle changes on vertical drag | `test_camera_controls.gd` | `test_orbit_vertical_drag_changes_theta()` — asserts `_theta` changes |
| orientation remains intuitive (up stays up) | Implementation: `look_at(_pivot, Vector3.UP)` statically enforces this; `test_zoom_clamped_at_minimum()` and orbit tests exercise `_update_transform()` |

