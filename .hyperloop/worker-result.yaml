## task-007: Godot Application Spec — Independent Review (2026-04-23)

Reviewed `specs/prototype/godot-application.spec.md` on branch `hyperloop/task-007`.
Every SHALL/MUST requirement was verified against implementation code and GDScript
behavioral tests.

---

### Requirement: JSON Scene Graph Loading — COVERED

**Spec**: Application MUST load a JSON scene graph file and generate the 3D scene from it.

**Scenario**: Loading kartograph's scene graph (reads JSON, generates 3D volumes, connections, positions)

**Implementation** (`godot/scripts/main.gd`):
- `_ready()`: opens file via `FileAccess`, parses with `JSON.new()`, calls
  `SceneGraphLoader.load_from_dict()` then `build_from_graph()`.
- `build_from_graph()`: iterates nodes → `_create_volume()`, iterates edges → `_create_edge()`.
- `_resolve_world_pos()`: reads `position.{x,y,z}` directly from JSON; no Godot-side
  layout recomputation.

**Tests** (`godot/tests/test_scene_graph_loading.gd`, 5 behavioral tests):
- `test_volumes_created_for_each_node()`: asserts `_anchors` dict contains entry for every node id.
- `test_mesh_instances_exist_in_anchors()`: asserts MeshInstance3D child present in each anchor.
- `test_edge_mesh_instances_created()`: asserts ≥ 2 MeshInstance3D children on main node
  (1 ImmediateMesh line + 1 CylinderMesh arrowhead per edge).
- `test_anchor_positions_match_json()`: asserts `anchor.position` equals fixture
  coordinates exactly (Vector3(0,0,0) and Vector3(2,0,2)).
- `test_labels_are_billboard_and_readable()`: asserts `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test == true` on Label3D — covers the "labels scale to remain readable"
  clause from the Zooming in camera scenario.

All four GIVEN/WHEN/THEN/AND clauses exercised by real Node3D instantiation.

