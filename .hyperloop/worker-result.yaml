### Requirement: Camera Controls — COVERED

**Implementation:**
- `camera_controller.gd`: spherical-coordinate orbit (`_phi`, `_theta`), scroll-wheel zoom
  with `min_distance`/`max_distance` clamping, right-mouse pan.
- Initial state: `_theta = 0.15` rad (≈ 8.6°, near-top-down view), `_distance = 40.0`.
- `_update_transform()` calls `look_at(_pivot, Vector3.UP)` on every update, enforcing
  world-up orientation to keep orbiting intuitive.
- `set_pivot(pivot, distance)` exposed for programmatic framing; called from
  `main.gd:_frame_camera()` after the scene graph is built.
- Labels: `BILLBOARD_ENABLED`, `no_depth_test=true` in `_create_volume()` ensure labels
  remain readable at all zoom levels.

**Tests (`godot/tests/test_camera_controls.gd`):**
- `test_initial_theta_is_near_top_down` — `_theta < PI/4` (top-down overview scenario)
- `test_initial_distance_is_positive` — `_distance > 0`
- `test_scroll_up_decreases_distance` — `WHEEL_UP` → `_distance` decreases (zooming in)
- `test_scroll_down_increases_distance` — `WHEEL_DOWN` → `_distance` increases
- `test_orbit_horizontal_drag_changes_phi` — MMB drag → `_phi` changes (orbiting)
- `test_orbit_vertical_drag_changes_theta` — MMB drag → `_theta` changes
- `test_set_pivot_updates_state` — pivot and distance stored correctly
- `test_zoom_clamped_at_minimum` — 200× scroll-up never breaks `min_distance`

Labels readability also covered by `test_labels_are_billboard_and_readable` in
`test_scene_graph_loading.gd`.

**Scenarios:**
- Top-down overview: `test_initial_theta_is_near_top_down` ✓
- Zooming in: `test_scroll_up_decreases_distance` ✓; label readability ✓
- Orbiting: `test_orbit_horizontal_drag_changes_phi` + `test_orbit_vertical_drag_changes_theta` ✓;
  world-up enforced by `look_at(..., Vector3.UP)` ✓

