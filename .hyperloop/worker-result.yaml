### Requirement: Containment Rendering — COVERED

**Spec**: Application MUST render containment relationships as nested volumes.

**Scenario**: Modules inside a bounded context (translucent parent, opaque nested children,
visually distinct boundary)

**Implementation** (`godot/scripts/main.gd → _create_volume()`):
- `bounded_context`: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`,
  box `Vector3(sz, sz*0.2, sz)`.
- `module`: opaque (`albedo_color.a = 1.0`), box `Vector3(sz, sz*0.6, sz)`.
- Module anchor is scene-tree-parented directly to its parent context anchor (lines 71–73),
  placing it spatially inside the parent volume.

**Tests** (`godot/tests/test_containment_rendering.gd`, 5 behavioral tests):
- `test_bounded_context_is_translucent()`: `transparency != TRANSPARENCY_DISABLED` and `a < 1.0`.
- `test_module_is_opaque()`: `albedo_color.a >= 1.0`.
- `test_module_parented_inside_context()`: `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module()`: `ctx_mesh.size.x > mod_mesh.size.x` (10 vs 3).
- `test_bounded_context_cull_disabled()`: `cull_mode == CULL_DISABLED` — distinguishes
  parent boundary from children's default back-face culling.

