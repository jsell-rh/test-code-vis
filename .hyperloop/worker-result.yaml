## Spec Scenario Coverage

### Scenario: Loading kartograph
`check-kartograph-integration-test.sh` PASS. Extractor runs against ~/code/kartograph and produces a scene_graph.json with context assertions. ✅

### Scenario: Extraction then visualization
Two-stage pipeline confirmed: Python extractor produces JSON; Godot `_ready()` loads JSON via `FileAccess.open()` + `SceneGraphLoader` + `build_from_graph()`. Not a stub — full implementation in main.gd. ✅

### Scenario: Viewing kartograph from above
`test_camera_controls.gd::test_initial_theta_is_near_top_down` asserts `cam._theta < PI/4` (< 45°, predominantly top-down). Bounded contexts visualised as translucent BoxMesh volumes; dependencies shown as lines + cones. ✅

### Scenario: Zooming into IAM
`test_scroll_up_decreases_distance` / `test_scroll_down_increases_distance` confirm zoom works. `test_containment_rendering.gd` confirms module anchors are children of context anchors (internal structure visible on zoom). `test_size_encoding.gd` confirms relative sizes. ✅

### Scenario: Visual representation (geometric volumes, size, containment)
`test_containment_rendering.gd` — instantiates real Node3D, checks: translucent context (TRANSPARENCY_ALPHA, alpha < 1), opaque module (alpha == 1), module parented inside context anchor, context BoxMesh larger than module BoxMesh, CULL_DISABLED on context. All assertions are on live node properties, not dict keys. ✅

### Scenario: Identifying a module (readable labels)
`test_readable_labels.gd` (11 tests) — instantiates real Node3D via `build_from_graph()`, retrieves Label3D child, asserts:
- `.text == node name from JSON` ✅
- `.billboard == BaseMaterial3D.BILLBOARD_ENABLED` ✅
- `.pixel_size > 0.0` ✅
- `.no_depth_test == true` ✅
These are live property assertions on instantiated nodes, not dict-key checks. `godot-label3d.sh` PASS confirms. ✅

### Scenario: Cross-context dependency (direction discernible)
`test_dependency_rendering.gd` verifies: `ImmediateMesh` line exists; `CylinderMesh` with `top_radius == 0` (arrowhead cone) exists; cone is within 2 units of target position; cone colour is orange for cross-context edges. This satisfies the "direction is visually indicated" guideline (explicit rendering element — arrowhead cone, not just colour). ✅

### Scenario: Moving through space (pan, zoom, orbit)
`test_camera_controls.gd` confirms: zoom in/out via scroll wheel, orbit via middle-mouse drag (both horizontal/vertical), `set_pivot` updates state, zoom clamped at `min_distance`. Pan is exercised by pivot update. ✅

