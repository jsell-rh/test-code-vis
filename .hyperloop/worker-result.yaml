### Requirement: Containment Rendering — COVERED

**Implementation:** `godot/scripts/main.gd` → `_create_volume()` and `_build()`
- `bounded_context` nodes get `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`,
  `CULL_DISABLED` — translucent, larger slab
- `module` nodes get `albedo_color.a = 1.0` — fully opaque cube
- Child node anchors are parented under parent anchor in scene tree:
  `parent_anchor.add_child(anchor)` when `nd["parent"] != null`

**Tests:** `godot/tests/test_containment_rendering.gd`
- `test_bounded_context_is_translucent()` — asserts `transparency != DISABLED` and `alpha < 1` ✓
- `test_module_is_opaque()` — asserts `albedo_color.a >= 1.0` ✓
- `test_module_parented_inside_context()` — asserts `mod_anchor.get_parent() == ctx_anchor` ✓
- `test_bounded_context_larger_than_module()` — asserts `ctx_mesh.size.x > mod_mesh.size.x` ✓
- `test_bounded_context_cull_disabled()` — asserts `cull_mode == CULL_DISABLED` ✓

All THEN clauses of the "Modules inside a bounded context" scenario are covered.

