### Requirement: Size Encoding — COVERED

**Code:** In `_create_volume()`, `var sz: float = float(nd["size"])` is applied directly
to `box.size = Vector3(sz, sz*0.6, sz)` for modules and `Vector3(sz, sz*0.2, sz)` for
bounded contexts — a pure linear mapping with no clamping or additive offset, so the
size ratio in the output mesh exactly equals the size ratio in the JSON.

**Tests:** `godot/tests/test_size_encoding.gd` — 2 behavioral tests:
- `test_large_module_has_bigger_mesh` — `large_mesh.size.x > small_mesh.size.x`
- `test_mesh_sizes_proportional_to_metric` — `abs(actual_ratio - 3.0) < 0.001`
  (inputs: size=9.0 vs size=3.0 → expected ratio 3.0)

Status: **COVERED** ✓

