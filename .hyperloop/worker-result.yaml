## THEN-Clause Coverage

### Scenario: Loading kartograph's scene graph
- THEN it reads the JSON file → `test_file_access_reads_fixture_json` (FileAccess.open + get_as_text on fixture JSON)
- AND generates 3D volumes for each node → `test_volumes_created_for_each_node`, `test_mesh_instances_exist_in_anchors`
- AND generates connections for each edge → `test_edge_mesh_instances_created`
- AND positions elements according to the layout data → `test_anchor_positions_match_json`, `test_node_rendered_at_json_position`, `test_second_node_rendered_at_json_position`

### Scenario: Modules inside a bounded context
- THEN the bounded context appears as a larger translucent volume → `test_bounded_context_is_translucent` (TRANSPARENCY_ALPHA + alpha < 1.0), `test_bounded_context_larger_than_module`
- AND its child modules appear as smaller opaque volumes inside it → `test_module_is_opaque` (alpha == 1.0), `test_module_parented_inside_context`
- AND the boundary of the parent is visually distinct from the children → `test_bounded_context_cull_disabled` (CULL_DISABLED on bounded context material)

### Scenario: Rendering a cross-context dependency
- THEN a line connects the two context volumes → `test_edge_line_mesh_created` (ImmediateMesh with PRIMITIVE_LINES)
- AND the line's direction is visually indicated → `test_direction_indicator_cone_created` (CylinderMesh top_radius==0.0), `test_direction_cone_near_target`, `test_cross_context_cone_is_orange`

### Scenario: Large module vs small module
- THEN the module with more code appears as a larger volume → `test_large_module_has_bigger_mesh`
- AND the relative sizes are proportional to the metric → `test_mesh_sizes_proportional_to_metric`

### Scenario: Top-down overview
- THEN the camera defaults to a top-down view showing the entire system → `test_initial_theta_is_near_top_down` (_theta < PI/4), `test_initial_distance_is_positive`

### Scenario: Zooming in
- THEN the camera moves closer → `test_scroll_up_decreases_distance`
- AND internal structure becomes visible as the camera approaches → (structural: child volumes are nested inside parent volumes)
- AND labels scale to remain readable → `test_labels_are_billboard_and_readable` (BILLBOARD_ENABLED, pixel_size > 0)

### Scenario: Orbiting
- THEN the camera rotates around the current focal point → `test_orbit_changes_theta_and_phi`
- AND orientation remains intuitive (up stays up) → `test_theta_clamped_at_maximum_to_prevent_flip`, `test_theta_clamped_at_minimum_to_prevent_flip`

### Scenario: Engine version
- THEN it uses Godot 4.6.x → `test_project_godot_declares_46_feature` + `test_project_godot_config_features_line`
- AND all scripts use GDScript → `test_scripts_dir_contains_only_gdscript` (DirAccess iterates scripts/, asserts .gd extension)
- AND all API calls are valid for the Godot 4.6 API → `test_file_access_get_as_text_returns_non_empty_string` (exercises FileAccess.get_as_text())

