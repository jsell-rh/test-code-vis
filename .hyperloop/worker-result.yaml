### Requirement: Fixed Visual Primitive Set (MUST)

STATUS: COVERED

Implementation:
- `llm_view_generator.gd:31` — `const VALID_OPS: Array = ["show", "hide", "highlight",
  "arrange", "annotate", "connect"]` — exactly 6 fixed primitives.
- `_make_spec()` at line 125 filters: `if op is Dictionary and VALID_OPS.has(op.get("op",""))`.
  Unknown ops from the LLM are silently dropped — no new rendering logic can enter at runtime.
- `build_prompt()` embeds the full VALID_OPS list in the prompt text so the LLM knows its
  options before generating.
- `scene_interpreter.gd` — `match op.get("op","")` dispatches only the 6 known cases;
  any unknown string falls through with no effect.

**Scenario: LLM uses existing primitives** — COVERED

| THEN clause | Implementation | Test |
|---|---|---|
| prompt lists "show" | `build_prompt()` includes ops_list string | `test_build_prompt_contains_show_primitive` |
| prompt lists "hide" | same | `test_build_prompt_contains_hide_primitive` |
| prompt lists "highlight" | same | `test_build_prompt_contains_highlight_primitive` |
| prompt lists "arrange" | same | `test_build_prompt_contains_arrange_primitive` |
| prompt lists "annotate" | same | `test_build_prompt_contains_annotate_primitive` |
| prompt lists "connect" | same | `test_build_prompt_contains_connect_primitive` |
| no new rendering logic — mixed ops | `_make_spec()` VALID_OPS.has() filter | `test_parse_response_filters_unknown_ops` — asserts only "show" survives |
| no new rendering logic — all unknown | same | `test_parse_response_with_all_unknown_ops_returns_empty_operations` — asserts 0 ops |
| renderer ignores unknown ops | `match` fall-through in scene_interpreter.gd | `test_unknown_op_is_ignored` — asserts no crash, no state change |

