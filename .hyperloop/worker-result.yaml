## Required Fix to Achieve Pass

Remove the data flow visualization feature entirely:

1. Delete `godot/scripts/flow_overlay.gd`
2. Delete `godot/tests/test_flow_overlay.gd`
3. In `godot/scripts/main.gd`, remove:
   - `const FlowOverlay = preload("res://scripts/flow_overlay.gd")`
   - `var _flow: FlowOverlay = FlowOverlay.new()`
   - `var _flows: Array = []`
   - `var _aggregate: Dictionary = {}`
   - `var _path_edge_entries: Array = []`
   - `_flow.setup(_anchors, _path_edge_entries)` call in `build_from_graph()`
   - `_flows = graph.get("flows", [])` and `_aggregate = graph.get("aggregate", {})` lines
   - All `_path_edge_entries.append(...)` calls in `_create_edge()`
   - `_unhandled_input()`, `_toggle_path_overlay()`, `_toggle_aggregate_overlay()`
4. In `godot/tests/run_tests.gd`, remove the `test_flow_overlay.gd` suite registration line
