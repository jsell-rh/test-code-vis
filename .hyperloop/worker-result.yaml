### Requirement: View Specs as Intermediate Representation — COVERED

**Implementation:**
- `parse_response()` returns `{"question": str, "operations": Array}` — a plain Dictionary,
  not geometry. LLM output is structurally validated; raw JSON never reaches the renderer.
- `SceneInterpreter.apply()` is the sole renderer; it reads the dict and mutates Node3D
  properties. The intermediate representation is enforced architecturally.

**Scenario: LLM produces view spec — COVERED**

