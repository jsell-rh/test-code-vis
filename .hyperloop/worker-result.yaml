## Requirement-by-Requirement Findings

### Requirement: Target Codebase — COVERED

The prototype uses the kartograph codebase as its target system.

- **Implementation**: `extractor/extractor.py::build_scene_graph()` discovers Python
  packages as bounded contexts, extracts import-based dependencies, and computes layout.
  The CLI entry point (`extractor/__main__.py::main()`) accepts a path argument.
- **Tests**:
  - `test_kartograph_integration.py::test_kartograph_integration_bounded_contexts` —
    runs the extractor against `~/code/kartograph/src/api` and asserts that `iam`,
    `graph`, and `shared_kernel` are present as bounded-context nodes.
  - `test_kartograph_integration.py::test_kartograph_extraction_produces_modules` —
    asserts that at least one module-level node is produced.
  - `test_scene_graph_loading.gd::test_volumes_created_for_each_node` — confirms
    Godot renders nodes from JSON.

### Requirement: Two-Stage Pipeline — COVERED

Python extractor → JSON → Godot consumer.

- **Extractor**: `extractor/extractor.py::build_scene_graph()` produces
  `{"nodes": [...], "edges": [...], "metadata": {...}}`.
  CLI: `extractor/__main__.py::main()` writes JSON to file or stdout.
- **Godot consumer**: `godot/scripts/main.gd::_ready()` uses `FileAccess.open()`,
  `JSON.new()`, `SceneGraphLoader.load_from_dict()`, and `build_from_graph()`.
- **Tests**:
  - `extractor/tests/test_cli.py::TestCliEntryPoint::test_main_produces_json_output` —
    CLI produces valid JSON.
  - `godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node` +
    `test_anchor_positions_match_json` — Godot loads JSON and renders scene.
  - `godot/tests/test_godot_version.gd::test_main_uses_godot4_fileaccess_api` —
    confirms FileAccess API usage.

### Requirement: Top-Down Architectural View — COVERED

Camera defaults to near-top-down; bounded contexts are distinct visible volumes placed
by coupling-aware layout; dependencies shown as connections.

- **Implementation**:
  - `camera_controller.gd`: `_theta = 0.15` (≈8.6° from vertical).
  - `extractor.py::_order_by_coupling()` + `compute_layout()`: coupled BCs placed
    adjacent in the ring so tightly coupled contexts are spatially closer.
  - `main.gd::_create_edge()`: ImmediateMesh line + CylinderMesh arrowhead cone.
  - `lod_manager.gd::_apply_far()`: at far distance only bounded_context nodes visible.
- **Tests**:
  - `test_camera_controls.gd::test_initial_theta_is_near_top_down` — _theta < PI/4.
  - `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled` —
    dist(auth, shared_kernel) < dist(auth, billing) with coupling-aware layout.
  - `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts` —
    LOD hides modules at far camera distance.
  - `test_dependency_rendering.gd::test_edge_line_mesh_created` — line exists.

### Requirement: Zoom to Detail — COVERED

LOD manager reveals module internals at near camera distance.

- **Implementation**: `lod_manager.gd` defines FAR (80), NEAR (20) thresholds.
  `_apply_near()` makes all nodes and all edges visible. `_apply_medium()` shows
  bounded_context + module nodes. `main.gd::_create_volume()` registers all nodes
  with the LOD manager. Size encoding: `BoxMesh.size` directly reflects JSON `size`.
- **Tests**:
  - `test_spatial_structure.gd::test_near_distance_shows_all_nodes` — both
    bounded_context and module anchors visible at NEAR distance.
  - `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail`
    — internal edges visible at NEAR distance.
  - `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` — large_mod (size=9)
    mesh is 3× larger than small_mod (size=3), ratio ≈ 3.0 ± 0.001.
  - `test_containment_rendering.gd::test_bounded_context_larger_than_module` —
    ctx BoxMesh.size.x > mod BoxMesh.size.x.

### Requirement: Abstract Visual Language — COVERED

BoxMesh primitives only; size encodes complexity; position encodes coupling;
containment via scene-tree parenting.

- **Implementation**: `main.gd::_create_volume()` creates BoxMesh for every node.
  Bounded contexts: translucent slab. Modules: opaque compact box.
  Size = `float(nd["size"])` applied directly to `BoxMesh.size`.
  Modules parented to context anchor in scene tree.
- **Tests**:
  - `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors`.
  - `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`.
  - `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled`.
  - `test_containment_rendering.gd::test_module_parented_inside_context` —
    `mod_anchor.get_parent() == ctx_anchor`.
  - `test_containment_rendering.gd::test_bounded_context_larger_than_module`.

### Requirement: Readable Labels — COVERED

Label3D with BILLBOARD_ENABLED, positive pixel_size, no_depth_test=true.

- **Implementation**: `main.gd::_create_volume()` creates Label3D per node with
  `label.text = nd["name"]`, `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED`,
  `label.pixel_size = 0.012`, `label.no_depth_test = true`.
- **Tests**:
  - `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` —
    asserts all three properties on the Label3D node in the anchor.
  - `godot-label3d.sh` check: PASS — all Label3D nodes have billboard and pixel_size set.

### Requirement: Dependency Visualization — COVERED

Line mesh (ImmediateMesh) + CylinderMesh arrowhead cone (top_radius=0) at target end.

- **Implementation**: `main.gd::_create_edge()` reads `ed["source"]` and `ed["target"]`,
  draws an ImmediateMesh PRIMITIVE_LINES segment and a cone near the target.
  Orange color for cross_context, grey for internal.
- **Tests**:
  - `test_dependency_rendering.gd::test_edge_line_mesh_created` — ImmediateMesh exists.
  - `test_dependency_rendering.gd::test_direction_indicator_cone_created` —
    CylinderMesh with `top_radius == 0.0` exists. Derivation comment present.
  - `test_dependency_rendering.gd::test_direction_cone_near_target` —
    cone position within 2 units of to_pos=(20,0,0). Derivation comment present.

### Requirement: Navigation — COVERED

Pan (LMB), zoom (scroll, smooth interpolation), orbit (RMB).

- **Implementation**: `camera_controller.gd` with `_handle_button()` / `_handle_motion()`.
  Zoom uses `_target_distance` + `_process(delta)` lerp (smooth). Pan via basis.x/z.
  Orbit changes `_theta` / `_phi`.
- **Tests** (all pass at runtime — verified by godot-tests.sh):
  - `test_camera_controls.gd::test_scroll_up_decreases_distance` — zoom in.
  - `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` — orbit.
  - `test_ux_polish.gd::test_lmb_pan_moves_pivot` — LMB pan.
  - `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous` —
    `_distance` doesn't snap; after one _process(0.016) frame it is between
    initial and target.
  - `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts` +
    `test_near_distance_shows_all_nodes` — overview/detail transition.
  - Note: Several pan/orbit tests produce `Condition "!is_inside_tree()" is true`
    engine ERRORs (expected headless behavior — camera not in scene tree during unit
    tests). All tests still PASS because the code gracefully falls back to identity
    transform, and the assertions are met.

