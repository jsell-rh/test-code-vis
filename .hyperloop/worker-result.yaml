### Requirement: Orbit Around Mouse Point — COVERED

**Code:** On RMB press, `_handle_button` calls
`_set_orbit_pivot(_mouse_to_ground(event.position))` which sets `_pivot` to
the world point under the cursor and recalculates spherical angles so the
camera position does not jump. Subsequent motion events rotate `_phi`/`_theta`
while `_pivot` remains fixed. (camera_controller.gd lines 78–82, 99–108,
110–115)

**Tests:**
- `test_orbit_pivot_set_to_cursor_point_at_start` — `_set_orbit_pivot` with
  (5,0,7) sets `cam._pivot == Vector3(5,0,7)`. PASS ✓
- `test_orbit_pivot_is_used_during_orbit` — pivot does not change during
  subsequent motion when `_orbiting = true`. PASS ✓
- `test_component_remains_at_visual_center_during_orbit` — pivot equals the
  pre-set center after diagonal orbit drag. PASS ✓

---

### Requirement: Smooth Camera Movement — COVERED

**Smooth zoom:**

**Code:** `_process(delta)` lerps `_distance` toward `_target_distance` with
`t = min(zoom_smoothing * delta, 0.9)`. `_handle_button` on WHEEL_UP/DOWN
updates only `_target_distance`, not `_distance` directly. (camera_controller.gd
lines 43–52)

**Test:**
- `test_zoom_is_interpolated_not_instantaneous` — after WHEEL_UP, `_distance`
  is unchanged; after one `_process(0.016)` call, `_distance` is between
  `initial_distance` and `_target_distance`. PASS ✓

**Smooth pan:**

**Code:** Pan delta is `pan_speed * (_distance * 0.05 + 1.0)`, making
displacement strictly proportional to mouse-motion magnitude. No smoothing
lag is applied (pan is direct / immediate), satisfying "proportional to drag
speed". (camera_controller.gd lines 122–125)

**Test:**
- `test_pan_proportional_to_drag_speed` — 50 px drag produces larger pivot
  displacement than 10 px drag. PASS ✓

