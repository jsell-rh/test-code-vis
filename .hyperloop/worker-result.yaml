| Component remains at visual centre during orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` ✓ |
| Zoom is animated smoothly (interpolated) | `test_smooth_zoom_target_differs_from_distance_after_scroll` + `test_smooth_zoom_process_interpolates_distance` | `_target_distance < _distance` after scroll; `20 < _distance < 40` after one _process frame ✓ |
