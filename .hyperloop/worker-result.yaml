## Task-004: Extractor — LOC Complexity Metrics Per Module

### Summary

The LOC complexity-metrics requirement from `specs/extraction/code-extraction.spec.md`
is fully satisfied by the implementation already on this branch.  All checks
relevant to this task pass.

---

### Requirement Coverage

#### Requirement: Module Discovery (MUST) — COVERED
- `discover_bounded_contexts()` and `discover_submodules()` discover all top-level
  contexts and their internal modules and represent each as a `Node` with `id`,
  `name`, `path` (encoded in `id`), and `type`.
- Tests: `TestModuleDiscovery` (11 tests) exercise both discovery functions with
  the hermetic `src` fixture that mirrors a kartograph-style layout.

#### Requirement: Dependency Extraction (MUST) — COVERED
- `build_dependency_edges()` produces cross-context edges (`"cross_context"`) and
  internal edges (`"internal"`), with direction encoded as `source → target`.
- Tests: `TestDependencyExtraction` (5 tests) verify the `iam→shared_kernel`
  cross-context edge and the `iam.application→iam.domain` internal edge.

#### Requirement: Complexity Metrics — Module Size (SHOULD) — COVERED
- `compute_loc(directory)` counts all Python lines recursively.
- `size_from_loc(loc)` derives a visual size (log scale, minimum 0.5).
- Both `discover_bounded_contexts()` and `discover_submodules()` populate
  `node["metrics"] = {"loc": loc}` for every code-derived node.
- `schema.py` defines `NodeMetrics(TypedDict)` with `loc: int`.
- Tests (8 dedicated):
  - `test_compute_loc_counts_python_lines` — verifies line counting
  - `test_compute_loc_recursive` — verifies recursion into sub-packages
  - `test_compute_loc_empty_dir` — verifies zero for empty directory
  - `test_size_from_loc_minimum` — verifies 0.5 floor
  - `test_size_from_loc_grows_with_loc` — verifies monotonic growth
  - `test_size_from_loc_is_float` — verifies return type
  - `test_bounded_context_has_metrics_loc` — verifies `metrics.loc` on BC nodes
  - `test_submodule_has_metrics_loc` — verifies `metrics.loc` on module nodes

#### Requirement: JSON Scene Graph Output (MUST) — COVERED
- `build_scene_graph()` returns a `SceneGraph` with `nodes`, `edges`, and
  `metadata`.  Every node carries `id`, `name`, `type`, `parent`, `position`,
  `size`, and `metrics`.
- Tests: `TestSceneGraphOutput` (8 tests) and `TestSchemaStructure` (8 tests)
  confirm JSON serializability and structural completeness.

#### Requirement: Spec Extraction (SHOULD) — COVERED
- `extract_spec_nodes()` discovers spec directories and files under `specs/`, tags
  them `type="spec"`, and exposes them when `build_scene_graph(include_specs=True)`.
- Tests: `TestSpecExtraction` (6 tests) verify discovery, distinguishability, ID
  prefix, parent/child relationships, and opt-in flag behaviour.

