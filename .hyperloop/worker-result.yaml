### Requirement: Containment Rendering — COVERED

The application MUST render containment relationships as nested volumes.

**Implementation**: `_create_volume()` in `main.gd` — parents first pass creates context
anchors at scene root; second pass parents module anchors to their context anchor.
Context volumes use `TRANSPARENCY_ALPHA` + alpha=0.18 + `CULL_DISABLED`. Module volumes
are fully opaque (alpha=1.0) with default culling.

**Scenario: Modules inside a bounded context**

| THEN-clause | Test | Status |
|---|---|---|
| bounded context appears as larger translucent volume | `test_bounded_context_is_translucent` asserts transparency != DISABLED and albedo_color.a < 1.0; `test_bounded_context_larger_than_module` asserts ctx_mesh.size.x > mod_mesh.size.x | COVERED |
| child modules appear as smaller opaque volumes inside it | `test_module_is_opaque` asserts albedo_color.a >= 1.0; `test_module_parented_inside_context` asserts mod_anchor.get_parent() == ctx_anchor | COVERED |
| boundary of parent is visually distinct from children | `test_bounded_context_cull_disabled` asserts cull_mode == CULL_DISABLED (renders both faces, distinguishing parent boundary from child surfaces) | COVERED |

