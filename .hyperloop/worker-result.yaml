## Untestable THEN-Clauses

### Desktop Platform — "runs natively without browser, container, or VM dependencies"

1. **Verbatim THEN text:** "it runs natively without browser, container, or VM dependencies"
2. **Why untestable:** OS identity and container/VM absence cannot be asserted from within a headless GDScript or pytest test — these are deployment-environment properties.
3. **Architectural evidence:** `godot/project.godot` does not declare `"Web"` in `config/features`; no `Dockerfile` or web export preset exists; `godot-compile.sh` confirms Godot Engine v4.6.2.stable.official runs as a native binary.

### Performance — "frame rate remains above 30fps"

1. **Verbatim THEN text:** "the frame rate remains above 30fps"
2. **Why untestable:** FPS measurement requires a live GPU render pipeline; headless Godot runs without a rendering backend.
3. **Architectural evidence:** `lod_manager.gd` implements three-tier LOD (FAR/MEDIUM/NEAR) to bound geometry count during navigation; `build_from_graph()` is O(n) with no quadratic loops; correctness at kartograph scale (60 nodes) is verified by `test_nfr_scale.gd`.

