## Task: task-027 — UX Polish (specs/prototype/ux-polish.spec.md)

Implementation of smooth camera interaction: LMB pan, non-inverted movement,
zoom toward cursor, orbit around mouse point, and smooth camera transitions.

The camera_controller.gd implements all five UX polish requirements. This task
adds two missing vertical-direction pan tests (drag-up and drag-down) that
cover the spec requirement "Dragging up moves the view up" — previously only
horizontal pan (left/right) was exercised.

