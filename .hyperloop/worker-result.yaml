All 15 tests in `godot/tests/test_understanding_overlay.gd` are registered in
`godot/tests/run_tests.gd` under the task-031 block. Tests use the `_check()/_test_failed`
pattern with real Godot Node3D/MeshInstance3D/Label3D fixture objects and assert on
runtime property values (albedo_color via is_equal_approx, Label3D.text exact match,
scene-tree child presence). This satisfies the GDScript behavioral test requirement.
