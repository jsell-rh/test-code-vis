### Requirement: Dependency Visualization — COVERED

**Code:** `main.gd::_create_edge()` draws an `ImmediateMesh` line between node
world-positions and adds a `CylinderMesh` (top_radius=0, pointed tip) arrowhead at the
target end. Cross-context edges are orange `Color(1.0, 0.50, 0.10)`; internal are grey.

**Tests:**
- `test_dependency_rendering.gd::test_edge_line_mesh_created`, `test_direction_indicator_cone_created`,
  `test_direction_cone_near_target`, `test_cross_context_cone_is_orange`

**Scenario: Cross-context dependency** — COVERED

