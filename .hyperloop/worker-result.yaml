### THEN Clause Verification

**JSON Scene Graph Loading**
- THEN it reads the JSON file → `_load_and_build()` uses `FileAccess.open()` + `JSON.new().parse()`
- AND generates 3D volumes for each node → `_build()` calls `_create_volume()` per node; `test_volumes_created_for_each_node` asserts `_anchors` has every node id
- AND generates connections for each edge → `_create_edge()` called per edge; `test_edge_mesh_instances_created` asserts ≥2 MeshInstance3D children on root
- AND positions elements according to layout data → `anchor.position = Vector3(p["x"], p["y"], p["z"])`; `test_anchor_positions_match_json` asserts `.position` values

**Containment Rendering**
- THEN the bounded context appears as a larger translucent volume → `transparency = TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`; `test_bounded_context_is_translucent` asserts
- AND its child modules appear as smaller opaque volumes inside it → `albedo_color.a = 1.0`; `test_module_is_opaque` + `test_module_parented_inside_context` assert
- AND the boundary of the parent is visually distinct → `cull_mode = CULL_DISABLED`; `test_bounded_context_cull_disabled` asserts

**Dependency Rendering**
- THEN a line connects the two context volumes → `ImmediateMesh` with `PRIMITIVE_LINES`; `test_edge_line_mesh_created` asserts `ImmediateMesh` child exists
- AND the line's direction is visually indicated → `CylinderMesh` with `top_radius=0` (cone) at target end; `test_direction_indicator_cone_created` + `test_direction_cone_near_target` assert

**Size Encoding**
- THEN the module with more code appears as a larger volume → `sz = float(nd["size"])` → `BoxMesh.size.x = sz`; `test_large_module_has_bigger_mesh` asserts `large.size.x > small.size.x`
- AND the relative sizes are proportional to the metric → `test_mesh_sizes_proportional_to_metric` asserts ratio 9.0/3.0 = 3.0 within 0.001

**Camera Controls**
- THEN the camera defaults to a top-down view → `_theta = 0.15` (< PI/4); `test_initial_theta_is_near_top_down` asserts
- THEN the camera moves closer → scroll up decreases `_distance`; `test_scroll_up_decreases_distance` asserts
- THEN the camera rotates around the current focal point → middle-mouse drag changes `_phi`/`_theta`; two orbit tests assert
- AND orientation remains intuitive (up stays up) → `look_at(_pivot, Vector3.UP)` in `_update_transform()`; `test_set_pivot_updates_state` asserts pivot tracking
