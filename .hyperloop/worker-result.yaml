## Summary

The UX Polish spec (`specs/prototype/ux-polish.spec.md`) is fully implemented.
The implementation was delivered by task-026 (commit `6eaf8dc6`, PR #70) and is
already on `main`. This branch:

1. Synced updated check scripts from `main` (21 checks, up from 15 prior).
2. Fixed three pre-existing bugs in `extractor/extractor.py` that the new checks
   exposed:
   - **F3a** — `compute_layout` was accumulating parent world coordinates into
     child positions (`px + pos[0]` etc.). Fixed to store local offsets only.
   - **check-layout-radius-bound** — `bc_radius` and `mod_radius` were unbounded
     `max()` expressions. Added `min(…, parent_size * fraction)` caps.
   - **check-circular-position-y-axis** — `_circular_positions` was called with
     `y=1.0` for module positions, inflating 3D child-to-parent distance.
     Changed to `y=0.0`.
3. Updated `test_child_nodes_are_near_parent_position` to compare local-offset
   magnitude (not world-distance-from-parent, which is semantically wrong after
   child positions became local offsets).
4. Added `test_child_position_is_relative_offset_not_absolute` — places a parent
   BC at a known non-zero world position and asserts the child's stored position
   equals the local offset (direct equality, not proximity).

**Pre-existing scope violation note:**
`check-not-in-scope.sh` flags four data-flow files that originate from `main`
(introduced by PR #88 / task-017, commit `5208924d`). This branch has zero
commits touching those files. The check has no branch-filtering for data-flow
violations (unlike the conformance/simulation mode check which does), creating
an unavoidable deadlock for any task branch based on `main`. Per the
pre-existing scope violation guidelines, the verbatim FAIL output is pasted in
the Scope Check Output section below, and the files are documented here:

- `godot/scripts/flow_overlay.gd` — pre-existing (origin: `5208924d`)
- `godot/scripts/main.gd` — pre-existing (origin: `5208924d`)
- `godot/tests/run_tests.gd` — pre-existing (origin: `5208924d`)
- `godot/tests/test_flow_overlay.gd` — pre-existing (origin: `5208924d`)

All 4 files: `git log main..HEAD --oneline -- <file>` returns zero commits.

