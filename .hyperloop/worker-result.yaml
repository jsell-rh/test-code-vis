### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`camera_controller.gd`):
- RMB press → `_set_orbit_pivot(_mouse_to_ground(event.position))` (line 80).
- `_set_orbit_pivot` sets `_pivot = world_point` and recalculates spherical angles
  from the current camera position (lines 111–121).
- Orbit motion (`_handle_motion` lines 127–131) updates `_phi` and `_theta` only;
  `_pivot` is not modified during orbit.

**Scenario: Orbiting around a component**
- `test_orbit_pivot_set_to_cursor_point_at_start` — `_pivot == world_point`. ✅
  (Tests `_set_orbit_pivot` directly; production path calls exactly this from `_handle_button`.)
- `test_orbit_pivot_is_used_during_orbit` — `_pivot == pivot_before` after orbit motion. ✅
- `test_component_remains_at_visual_center_during_orbit` — `_pivot == center` after diagonal drag. ✅

Note: These are fixed-point equality tests, not directional movement tests. The spec
requirement is that the pivot is set to the cursor point and held fixed — equality
assertions are the correct predicate class here. No non-directional-movement concern applies.

