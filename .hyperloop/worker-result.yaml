## Detailed Findings

### JSON Scene Graph Loading — COVERED

- `_ready()` uses `FileAccess.open()` + `file.get_as_text()` (Godot 4.6-compatible; not the
  deprecated `read_as_text()`). JSON parsed with `JSON.new()`.
- `build_from_graph()` iterates `nodes` → `_create_volume()` (3D volumes), then `edges` →
  `_create_edge()` (connections), with `anchor.position` set from the JSON `position` field.
- `test_scene_graph_loading.gd`: 5 tests assert node anchors created, MeshInstance3D children
  present, edge mesh + arrowhead created (≥ 2 MeshInstance3D direct children), anchor positions
  exactly match JSON coordinates via `is_equal_approx`, and Label3D uses BILLBOARD_ENABLED
  with pixel_size > 0 and no_depth_test=true. All PASS.

### Containment Rendering — COVERED

- `bounded_context`: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
- `module`: `albedo_color.a = 1.0` (fully opaque), default culling.
- Child anchors parented to parent anchor via `parent_anchor.add_child(anchor)` — structural
  containment in the scene tree.
- `test_containment_rendering.gd`: 5 tests assert translucency (a < 1.0), module opacity
  (a >= 1.0), parent-child relationship on real Node3D objects, bounded context larger
  BoxMesh, and CULL_DISABLED on bounded context material. All PASS.

### Dependency Rendering — COVERED

- `ImmediateMesh` with `PRIMITIVE_LINES` draws the connecting line.
- `CylinderMesh` with `top_radius=0.0` (pointed cone) placed at the target end and oriented
  along the edge direction — this is an explicit rendering element satisfying "direction is
  visually indicated" per guidelines (not just a colour difference).
- Orange (`Color(1.0, 0.50, 0.10)`) for cross-context; grey for internal.
- `test_dependency_rendering.gd`: 4 tests assert ImmediateMesh line exists, CylinderMesh
  cone with top_radius==0 exists, cone position within 2 units of target, cross-context cone
  is orange (r > 0.8, b < 0.3). All PASS.

### Size Encoding — COVERED

- `sz = float(nd["size"])` read directly from JSON. `box.size = Vector3(sz, sz*0.6, sz)` for
  modules — direct proportionality.
- `test_size_encoding.gd`: 2 tests confirm larger size produces larger BoxMesh.size.x, and
  the ratio of mesh sizes equals the ratio of input size values (9.0/3.0 = 3.0) within 0.001
  tolerance. Both PASS.

### Camera Controls — COVERED

- Top-down: initial `_theta = 0.15` rad ≈ 8.6° (< PI/4 = 45° → top-down).
- Zoom: WHEEL_UP decreases `_distance`, WHEEL_DOWN increases it; clamped to
  `[min_distance, max_distance]`.
- Orbit: middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar).
- `look_at(_pivot, Vector3.UP)` preserves intuitive up-axis throughout orbit.
- `_frame_camera()` calls `set_pivot(centre, span * 1.5)` on startup to frame entire scene.
- `test_camera_controls.gd`: 8 tests assert initial theta < PI/4, distance positive, scroll
  up decreases distance, scroll down increases distance, horizontal drag changes phi, vertical
  drag changes theta, set_pivot updates state, and zoom clamped at min_distance. All PASS.
- Note: there are `look_at` errors during tests ("Node not inside tree") — these are expected
  when Camera3D is instantiated outside a running scene tree. All tests still return PASS
  because the relevant state (`_distance`, `_phi`, `_theta`, `_pivot`) is mutated before
  `_update_transform()` calls `look_at()`.

### Godot 4.6 — COVERED

- `godot/project.godot` contains `config/features=PackedStringArray("4.6")`.
- All scripts are `.gd`; no `.cs` files in the project.
- API uses `FileAccess.get_as_text()` — correct 4.x API.
- `test_engine_version.gd`: 3 tests read `project.godot` via `FileAccess.open()` +
  `get_as_text()` at runtime and assert `"4.6"` present, `"\"4.6\""` present in features
  array, and `"main.tscn"` present without `".cs"`. All PASS. This also exercises the
  `FileAccess.open()` + `get_as_text()` code path, satisfying the `godot-fileaccess-tested.sh`
  guideline requirement.

