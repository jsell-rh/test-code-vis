## THEN→Test Mapping

### Scenario: Engine version

| THEN clause | Test function | Predicate verified |
|---|---|---|
| "opens in Godot 4.6.x" | `test_engine_version.gd::test_project_godot_declares_46_feature` | Reads project.godot via FileAccess.open()+get_as_text(); asserts `content.contains("4.6")`. Also verified by `test_godot_version.gd::test_project_declares_godot_46` (Pattern-2 suite, same predicate). ✓ |
| "all scripts use GDScript" | `test_engine_version.gd::test_scripts_dir_contains_only_gdscript` | DirAccess iterates ALL files in `res://scripts/`; asserts each ends with `.gd`. Iteration predicate satisfied. ✓ |
| "API calls valid for Godot 4.6" | `test_engine_version.gd::test_file_access_get_as_text_returns_non_empty_string` | Exercises `FileAccess.get_as_text()` (Godot 4.x API) directly and confirms non-empty return. Also `test_godot_version.gd::test_main_uses_godot4_fileaccess_api` confirms `main.gd` uses the 4.x API and not deprecated `File.new()/read_as_text()`. ✓ |

**Note on `test_godot_version.gd`:** This is a Pattern-2 suite (no `var _test_failed`; tests return `bool`). The runner's Pattern-2 path handles these correctly — `result == true` → PASS, otherwise FAIL. `check-gdscript-test-bool-return.sh` only audits Pattern-1 suites for inert bool-returning tests; Pattern-2 is the correct form here.

