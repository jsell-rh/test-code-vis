### Requirement: View Specs as Intermediate Representation — COVERED

The system MUST use a structured view specification as the intermediate representation
between the LLM and the 3D renderer.

**Implementation:**
- `LLMViewGenerator.parse_response()` returns a `Dictionary` (`"question"` + `"operations"`)
  — never a Node or raw geometry object.
- `SceneInterpreter.apply()` consumes that dictionary and mutates scene-tree properties.
- The separation is architectural: `LLMViewGenerator` never touches `Node3D`;
  `SceneInterpreter` never calls an LLM.

**Scenario: LLM produces view spec**

| THEN clause | Implementation | Test |
|---|---|---|
| emits structured view spec, not raw 3D geometry | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` — asserts `result is Dictionary` |
| view spec controls show/hide/highlight/arrange/annotate/connect | `_make_spec()` passes all 6 valid ops through | `test_parse_response_all_six_ops_pass_through` — asserts `spec["operations"].size() == 6` |
| 3D renderer interprets view spec into spatial scene | `SceneInterpreter.apply()` called from `main.gd:apply_view_spec()` | `test_all_six_ops_mutate_scene_correctly` — asserts visible, position.x, albedo_color.g, label.text, MeshInstance3D presence |

---

### Requirement: Fixed Visual Primitive Set — COVERED

The set of visual primitives MUST be fixed and finite. The LLM selects from available
primitives; it does not invent new ones.

**Implementation:**
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
  is a compile-time constant in `llm_view_generator.gd`.
- `_make_spec()` iterates raw ops and silently drops any whose `"op"` key is not in
  `VALID_OPS` — enforcing the closed primitive set at parse time.
- `SceneInterpreter.apply()` uses a `match` block over the same fixed set; unrecognised
  ops are not matched and produce no scene effect.

**Scenario: LLM uses existing primitives**

| THEN clause | Implementation | Test |
|---|---|---|
| composes from existing set (show/hide/highlight/arrange/annotate/connect) | `build_prompt()` joins `VALID_OPS` into prompt text | 6 tests: `test_build_prompt_contains_{show,hide,highlight,arrange,annotate,connect}_primitive` — each asserts `prompt.contains("<op>")` |
| no new rendering logic generated at runtime | `_make_spec()` drops unknown ops; `SceneInterpreter` match ignores them | `test_parse_response_filters_unknown_ops` (mixed: 1 survives), `test_parse_response_with_all_unknown_ops_returns_empty_operations` (0 survive), `test_unknown_op_is_ignored` (scene unchanged) |

