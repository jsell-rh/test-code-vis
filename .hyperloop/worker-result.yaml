## Requirement Analysis

### Requirement: Question-Driven View Generation — COVERED

**Code**: `LLMViewGenerator.build_prompt(question, graph)` accepts a natural-language
question and the structural graph, embeds both into a prompt for the LLM.
`parse_response()` converts the LLM's JSON reply into a view-spec Dictionary.
`main.gd.apply_view_spec(spec)` hands the spec to `SceneInterpreter.apply()`, which
mutates the live 3D scene.

**Scenario: Architectural question** ("how does authentication work?")
- THEN generates view focused on auth-related components (show):
  `SceneInterpreter._apply_show()` sets `anchor.visible = true`.
  Test: `test_show_op_sets_visible_true` instantiates a real `Node3D`, calls
  `apply()`, asserts `anchor.visible == true`. ✓
- AND irrelevant components are hidden or de-emphasized:
  `SceneInterpreter._apply_hide()` sets `anchor.visible = false`.
  Test: `test_hide_op_sets_visible_false` asserts `anchor.visible == false`. ✓
- AND relevant components are arranged to answer the question:
  `SceneInterpreter._apply_arrange()` sets `anchor.position = Vector3(x,y,z)`.
  Tests: `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`,
  `test_arrange_op_sets_all_three_axes` each assert `.position` on a real `Node3D`. ✓

**Scenario: Impact question** ("what depends on the user database?")
- THEN shows user database and all dependents: covered by show op above. ✓
- AND dependency relationships are spatially clear:
  `SceneInterpreter._apply_connect()` adds an `ImmediateMesh` line +
  `CylinderMesh` arrowhead (top_radius=0, pointed cone) to `scene_root`.
  Tests: `test_connect_op_adds_line_geometry` (≥1 MeshInstance3D);
  `test_connect_op_adds_arrowhead` (≥2, line + cone) on real `Node3D` objects. ✓

---

### Requirement: View Specs as Intermediate Representation — COVERED

**Code**: `parse_response()` returns a `Dictionary` (structured view spec, not raw
geometry). `SceneInterpreter.apply()` consumes that dict and mutates live scene nodes.
No geometry primitives are returned by the LLM layer.

**Scenario: LLM produces view spec**
- THEN emits a structured view specification (not raw 3D geometry):
  Test: `test_parse_response_returns_dictionary` asserts `result is Dictionary`. ✓
- AND the view spec controls show/hide/highlight/arrange/annotate/connect:
  Six pass-through tests in `test_llm_view_generator.gd`:
  `test_parse_response_passes_through_show_op`, `..._hide_op`, `..._arrange_op`,
  `..._connect_op`, `..._highlight_op`, `..._annotate_op`. ✓
- AND the 3D renderer interprets the view spec into a spatial scene:
  All tests in `test_scene_interpreter.gd` instantiate real `Node3D` objects, call
  `SceneInterpreter.apply()`, and assert actual scene-tree property values
  (`.visible`, `.position.x/y/z`, `albedo_color.r/g/b`, `label.billboard`,
  `label.pixel_size`). `test_all_six_ops_mutate_scene_correctly` is an end-to-end
  integration test exercising all 6 ops in one pass. ✓

---

### Requirement: Fixed Visual Primitive Set — COVERED

**Code**: `VALID_OPS` is a compile-time constant in `llm_view_generator.gd`:
`["show", "hide", "highlight", "arrange", "annotate", "connect"]`.
`_make_spec()` drops any op not in `VALID_OPS` before returning the spec.
`SceneInterpreter.apply()` uses a `match` with exactly 6 named arms; unknown
ops fall through without effect — no new rendering logic enters at runtime.

**Scenario: LLM uses existing primitives**
- THEN composes from existing set only:
  `build_prompt()` embeds `VALID_OPS` in the prompt text.
  Six tests (`test_build_prompt_contains_*_primitive`) verify each primitive name
  is present in the prompt. ✓
- AND no new rendering logic generated at runtime:
  Test: `test_parse_response_filters_unknown_ops` verifies an unknown op is dropped
  and only the known `"show"` op survives.
  Test: `test_unknown_op_is_ignored` verifies a `"teleport"` op causes no crash
  and no scene mutation (visibility unchanged). ✓

