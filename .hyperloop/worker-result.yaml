### Requirement: View Specs as Intermediate Representation — COVERED

**Implementation:**
- `godot/scripts/view_spec.gd` — `ViewSpec.from_dict()` parses a raw
  Dictionary into a normalised view spec (structured intermediate
  representation, not raw 3D geometry). The spec carries a `question` string
  and an `operations` array.
- `godot/scripts/view_spec_renderer.gd` — `ViewSpecRenderer.apply()` is the
  sole entry point that interprets the view spec into MeshInstance3D nodes,
  highlights, labels, and connector nodes under the provided root.

**Scenario: LLM produces view spec** — COVERED
- `test_view_spec_from_dict_returns_dictionary` — THEN: `ViewSpec.from_dict()`
  returns a plain Dictionary, not a Node or geometry object (not raw 3D
  geometry)
- `test_view_spec_has_operations_key` — AND: spec has `operations` Array key
  that controls which elements are shown, hidden, highlighted, and arranged
- `test_renderer_creates_mesh_instance_3d_for_each_shown_node` — AND: 3D
  renderer (ViewSpecRenderer) interprets the spec into a spatial scene
  (MeshInstance3D children under root)
- `test_renderer_nodes_are_mesh_instance_3d` — AND: rendered nodes are
  MeshInstance3D (3D geometry objects produced by the renderer, not by the
  spec itself)
- `test_renderer_uses_json_position_when_no_arrange_op` — AND: spec controls
  arrangement; without an arrange op, the graph's JSON position is used

---

### Requirement: Fixed Visual Primitive Set — COVERED

**Implementation:**
- `godot/scripts/view_spec.gd` — `VALID_OPS: Array = ["show", "hide",
  "highlight", "arrange", "annotate", "connect"]` declares a fixed, finite
  constant at class level. `from_dict()` silently drops any op whose `op` key
  is not in VALID_OPS, preventing new rendering logic from being injected at
  runtime. `get_valid_ops()` returns a duplicate (copy-on-read), preventing
  external mutation of the canonical set.

**Scenario: LLM uses existing primitives** — COVERED
- `test_valid_ops_contains_show/hide/highlight/arrange/annotate/connect` (6
  individual tests) — THEN: each of the six required primitives is present in
  VALID_OPS
- `test_valid_ops_has_exactly_six_primitives` — AND: the set is fixed and
  finite (exactly 6 entries; no extras)
- `test_unknown_op_is_filtered_out` — AND: an unknown op "invent_new_thing" is
  silently dropped by `from_dict()`, confirming no new rendering logic is
  generated at runtime
- `test_all_valid_ops_pass_through` — AND: all six valid primitives survive
  `from_dict()` without alteration
- `test_get_valid_ops_returns_a_copy` — AND: VALID_OPS cannot be mutated from
  outside the class (immutability of the canonical primitive set)

