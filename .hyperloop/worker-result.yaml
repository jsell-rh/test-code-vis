## Summary

Fixed the pan direction inversion bug identified in the prior review.

**Root cause**: `_target_pivot += right * delta.x * pan_amount` moves the pivot RIGHT when dragging RIGHT, so the camera moves right and the scene appears to move LEFT — inverted relative to Google Maps convention.

**Fix**: Changed to `_target_pivot -= right * delta.x * pan_amount` so dragging right moves the pivot LEFT, camera moves left, and the scene appears to move RIGHT (same direction as drag, Google Maps style).

**Test fix**: The test `test_pan_direction_not_inverted` was also testing the wrong direction (asserted pivot.x > 0 on a RIGHT drag = inverted behavior). Updated to simulate a LEFT drag and assert pivot.x > 0, matching the spec's "dragging left reveals content to the right."

Also added sign-chain derivation comments (required by `check-direction-test-derivations.sh`) inside the body of all direction/sign-convention test functions.

