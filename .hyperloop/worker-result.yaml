## Independent Direction-Predicate Derivation

**test_pan_direction_not_inverted** — derived from spec BEFORE reading test body:

Spec says: "dragging left reveals content to the right, as in Google Maps"
→ drag left → camera/pivot moves +X → world objects appear to move −X in screen → right-side content revealed.

Test setup: phi=PI/2, camera on +Z side.
- basis.x = up.cross(basis.z).normalized() = (0,1,0) × normalize(0,39.8,5.97) ≈ (1,0,0) = world +X ✓
- Drag left: delta.x = 50→50-100 = −50
- Implementation: `_target_pivot -= right * delta.x * pan_amount` = `−(1,0,0)·(−50)·k` → pivot.x > 0 ✓
- My derived assertion: `cam._pivot.x > 0.0` — matches actual test assert. CORRECT.

