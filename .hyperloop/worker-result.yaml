### Requirement: Size Encoding — COVERED

**Implementation** (`godot/scripts/main.gd` → `_create_volume()`)
- `sz = float(nd["size"])`; `BoxMesh.size = Vector3(sz, sz * 0.6, sz)`.
- Direct linear mapping: JSON size ratio == rendered BoxMesh.size ratio.

**Tests** (`godot/tests/test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — fixture large=9, small=3; asserts
  `large_mesh.size.x > small_mesh.size.x`.
- `test_mesh_sizes_proportional_to_metric` — ratio `9/3 = 3.0` reproduced in
  `BoxMesh.size.x` ratio within 0.001 tolerance.

