### Requirement: Size Encoding ‚Äî COVERED

**Spec**: The application MUST encode complexity metrics as the visual size of volumes.

**Implementation** (`godot/scripts/main.gd ‚Üí _create_volume()`):
- `var sz: float = float(nd["size"])` is applied as `box.size = Vector3(sz, sz * 0.6, sz)` ‚Äî the mesh width ratio equals the input size ratio exactly

**Tests** (`test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh`: asserts `large_mesh.size.x > small_mesh.size.x` ‚úì
- `test_mesh_sizes_proportional_to_metric`: asserts `large_mesh.size.x / small_mesh.size.x ‚âà 3.0` (9.0/3.0) within 0.001 ‚úì

