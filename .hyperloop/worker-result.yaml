### FINDING 3 — FAIL: check-clamp-boundary-tests.sh: `_theta` boundary not tested

`camera_controller.gd` line 79 clamps `_theta`:
```gdscript
_theta = clamp(_theta - delta.y * orbit_speed, 0.01, PI - 0.01)
```
No test drives `_theta` to its boundary and asserts `_theta >= 0.01` or `_theta <= PI - 0.01`. The check script confirmed `_distance` has a boundary test (`test_zoom_clamped_at_minimum`), but `_theta` does not.

**Action required:** Add a test that applies extreme vertical orbit input and asserts `cam._theta >= 0.01` and a separate test that asserts `cam._theta <= PI - 0.01`.

*(Note: this is a pre-existing gap from the base branch, but it remains a blocking check failure.)*

