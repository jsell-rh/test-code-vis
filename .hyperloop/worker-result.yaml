### F2 (RACF — 7th consecutive cycle): check-no-state-files-committed.sh — State file in branch history

**Status:** FAIL — Re-attempt Compliance Failure (RACF). Has failed in every cycle since cycle 3.

Commit `032589eb` introduced `.hyperloop/state/intake-2026-04-25.md` into the branch. The implementer's fix attempt in cycle 7 was to "sync the state file from main" (make its content identical). This did not work because `check-no-state-files-committed.sh` uses `git log` to detect presence in branch history — not content diff.

**Fix:** Run `git filter-branch` as described in F1 step 1 above. This removes the file from branch commit history entirely. Do this BEFORE the rebase.

