## Spec Scenario Coverage

### Loading kartograph
COVERED. `__main__.py` accepts `src_path` as a CLI argument (no hardcoded paths).
`_ready()` in main.gd reads JSON via `FileAccess.open()` + `get_as_text()`.
Tested by `test_scene_graph_loading.gd` and `test_node_renderer.gd`.

### Extraction then visualization
COVERED. Python extractor produces JSON schema; Godot application loads it.
`test_scene_graph_loader.gd` covers all JSON schema fields.

### Viewing kartograph from above
COVERED. Camera initial `_theta = 0.15 rad < PI/4` (top-down). Bounded contexts
rendered as distinct translucent volumes. `test_camera_controls.gd` asserts
`_theta < PI/4`.

### Zooming into IAM
COVERED. Scroll-up decreases `_distance`, scroll-down increases it.
`test_camera_controls.gd` tests `test_scroll_up_decreases_distance` and
`test_scroll_down_increases_distance`. Module anchors are parented inside
context anchors (visible as camera zooms).

### Visual representation
COVERED. BoxMesh used for all nodes; size derived from LOC; position from JSON.
`test_size_encoding.gd` asserts proportional mesh sizes.
`test_containment_rendering.gd` asserts nesting (module parented inside context).

### Identifying a module
COVERED. Label3D nodes with `BILLBOARD_ENABLED`, `pixel_size = 0.012 > 0`,
`no_depth_test = true`. `test_readable_labels.gd` asserts all three properties
on instantiated Node3D anchors.

### Cross-context dependency
COVERED. `_create_edge()` adds an `ImmediateMesh` line plus a `CylinderMesh`
arrowhead cone (`top_radius == 0`) at the target end.
`test_dependency_rendering.gd` asserts cone existence, proximity to target,
and orange colour for cross-context edges. Direction is visually indicated by
an explicit arrowhead cone — satisfies "direction is discernible."

### Moving through the space
COVERED. Camera supports pan (`test_set_pivot_updates_state`), zoom
(`test_scroll_up/down`), and orbit (`test_orbit_horizontal/vertical_drag`).
Minimum zoom clamp tested.

### Engine version (Godot 4.6.x)
COVERED. `test_engine_version.gd` reads `project.godot` via `FileAccess.open()`
and asserts "4.6" and `"4.6"` feature tag presence.

