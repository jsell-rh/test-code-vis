### Scenario: Rendering a cross-context dependency — COVERED ✅

**Implementation**: ImmediateMesh (PRIMITIVE_LINES) for the line; CylinderMesh `top_radius=0.0`
(arrowhead cone, separate mesh) at target end indicates direction. Guidelines require "an explicit
rendering element (arrowhead, cone, separate mesh)" — cone is present. ✅

**Tests** (`test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — asserts ImmediateMesh MeshInstance3D exists ✅
- `test_direction_indicator_cone_created` — asserts CylinderMesh with `top_radius == 0.0` ✅
- `test_direction_cone_near_target` — asserts cone position within 2 units of to_pos ✅
- `test_cross_context_cone_is_orange` — asserts `mat.albedo_color.r > 0.8 and .b < 0.3` on cone material ✅

