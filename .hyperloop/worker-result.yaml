All three SHALL requirements from specs/core/understanding-modes.spec.md are fully
implemented and covered by GDScript behavioral tests that exercise real Godot runtime
objects (Node3D, MeshInstance3D, Label3D) with known fixture data and assert on
property values (albedo_color, label text, scene-tree children).

Note: specs/prototype/prototype-scope.spec.md explicitly excludes conformance, evaluation,
and simulation modes from the prototype. Task-031 was assigned specifically to implement
understanding-modes.spec.md, so the implementation was in scope for this task. The review
validates the spec contract, not the scoping decision.

---

## Requirement: Conformance Mode — COVERED

Implementation: `godot/scripts/understanding_overlay.gd` → `apply_alignment_overlay()`
  - Reads `spec_status` field from each node entry.
  - "aligned"   → ALIGNED_COLOR (green)  — separate components are visually distinct.
  - "divergent" → DIVERGENT_COLOR (red) + Label3D annotation from `spec_divergence` field.
  - other/absent → UNSPECIFIED_COLOR (grey).
  Wired into the live application via `main.gd::_apply_alignment_overlay()` (H key).

### Scenario: Spec-aligned implementation — COVERED
- Code: `apply_alignment_overlay()` colours auth + user_mgmt anchors independently.
- Test: `test_aligned_nodes_displayed_as_separate_components` — GIVEN auth + user_mgmt
  both with spec_status "aligned", WHEN overlay applied, THEN both anchors are distinct
  objects each receiving ALIGNED_COLOR.
- Test: `test_aligned_node_receives_aligned_color` — confirms single aligned node
  receives ALIGNED_COLOR and changes from the pre-overlay default.

### Scenario: Spec-divergent implementation — COVERED
- Code: divergent branch applies DIVERGENT_COLOR and calls `_add_overlay_label()` with
  the `spec_divergence` string (e.g. "merged with order service").
- Test: `test_divergent_node_receives_divergent_color` — GIVEN payment node with
  spec_status "divergent", WHEN overlay applied, THEN receives DIVERGENT_COLOR (distinct
  from ALIGNED_COLOR).
- Test: `test_divergent_node_has_divergence_label` — confirms Label3D child exists on
  the divergent anchor with text == spec_divergence value.

