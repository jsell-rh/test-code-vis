## Summary

The single blocking issue is unchanged from Cycle 5: the pan direction model in `camera_controller.gd` uses `+=` (camera-pan model), but the spec's "i.e." parenthetical mandates `-=` (map-grab model). The two direction tests (`test_pan_drag_right_increases_pivot_x`, `test_pan_drag_left_decreases_pivot_x`) have inverted predicates and pass against the wrong implementation. `test_drag_direction_matches_view_movement` asserts no direction at all. All three tests must be fixed simultaneously with the implementation sign change.

Required changes (implementation + tests must be updated together):
- `godot/scripts/camera_controller.gd` lines 133-134: `+=` → `-=`
- `godot/tests/test_ux_polish.gd` line 113: `> initial_x` → `< initial_x`
- `godot/tests/test_ux_polish.gd` line 123: `< initial_x` → `> initial_x`
- `godot/tests/test_ux_polish.gd` line 138: `cam._pivot != Vector3.ZERO` → `cam._pivot.z < 0.0`
