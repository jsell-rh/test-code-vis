### Requirement: Navigation — COVERED

**SHALL:** Pan, zoom, rotate; smooth transitions between overview and detail levels.

**Implementation:**
- `godot/scripts/camera_controller.gd`:
  - Pan: LMB drag moves `_pivot` in camera's local XZ plane
  - Zoom: scroll wheel adjusts `_target_distance`; `_process()` lerps `_distance → _target_distance`
  - Rotate: RMB drag adjusts `_phi` (azimuth) and `_theta` (polar)
  - Smooth interpolation: `t = min(zoom_smoothing * delta, 0.9)` in `_process()`
- `godot/scripts/lod_manager.gd`: LOD thresholds drive visibility changes as camera moves

**Test Coverage:**
- `test_lmb_pan_moves_pivot` (`godot/tests/test_ux_polish.gd:86`): LMB drag moves pivot.
- `test_pan_drag_right_increases_pivot_x` (`godot/tests/test_ux_polish.gd:106`): Non-inverted pan direction.
- `test_scroll_up_decreases_distance` (`godot/tests/test_camera_controls.gd:48`): Wheel-up decreases distance.
- `test_scroll_down_increases_distance` (`godot/tests/test_camera_controls.gd:62`): Wheel-down increases distance.
- `test_orbit_horizontal_drag_changes_phi` (`godot/tests/test_camera_controls.gd:76`): RMB horizontal drag changes phi.
- `test_orbit_vertical_drag_changes_theta` (`godot/tests/test_camera_controls.gd:99`): RMB vertical drag changes theta.
- `test_zoom_is_interpolated_not_instantaneous` (`godot/tests/test_ux_polish.gd:249`): `_distance` lerps over multiple frames (smooth).
- `test_far_distance_shows_only_bounded_contexts` + `test_near_distance_shows_all_nodes` (`godot/tests/test_spatial_structure.gd:290,386`): LOD transitions verified.

