## Spec Alignment Review — prototype-scope.spec.md (2026-04-23)

Branch: hyperloop/task-012
Spec: specs/prototype/prototype-scope.spec.md

---

### Requirement: Target Codebase — PARTIAL

**Spec:** The prototype MUST use the kartograph codebase (~/code/kartograph) as its target system.

**Implementation:**
- `extractor/__main__.py` CLI accepts any src_path and was run against
  `/home/jsell/code/kartograph/src/api` — confirmed by `godot/data/scene_graph.json`
  which has `"source_path": "/home/jsell/code/kartograph/src/api"` and contains
  real kartograph nodes (iam, graph, shared_kernel, etc.).
- The Godot app loads `res://data/scene_graph.json` by default, so launching the
  prototype DOES visualise kartograph's structure.

**Scenario: Loading kartograph — PARTIAL**
- GIVEN/WHEN/THEN: The scene_graph.json produced from the real kartograph codebase
  exists and the Godot loader is tested against synthetic fixtures that mirror its
  structure. However, there is **no automated integration test** that runs the
  extractor against `~/code/kartograph/src/api` and asserts that, e.g., the `iam`
  bounded context is present in the JSON output. All Python tests use synthetic
  `tmp_path` fixtures; the committed scene_graph.json demonstrates the pipeline
  works but is not an automated test.
- What is needed: an integration test (pytest or shell) that invokes
  `python -m extractor ~/code/kartograph/src/api` and asserts at minimum that the
  output JSON contains expected bounded contexts (iam, graph, shared_kernel).

