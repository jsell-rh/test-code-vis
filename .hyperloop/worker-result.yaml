## Implementation Summary

All 5 requirements from `specs/prototype/ux-polish.spec.md` are implemented in
`godot/scripts/camera_controller.gd` and covered by named GDScript behavioral tests in
`godot/tests/test_camera_controls.gd`.

Key implementation points:
- **Pan (LMB):** `_handle_motion` subtracts `right * delta.x * pan_amount` and `backward * delta.y * pan_amount`
  from `_target_pivot`. Google Maps convention: drag-left → pivot moves right → scene shifts left. ✓
- **Non-inverted:** Sign chain verified: at phi=PI/2, drag-left (delta.x=-50) → pivot.x += 50k → scene left. ✓
- **Zoom toward cursor:** `_zoom_toward_point` scales pivot toward/away from the world point under cursor
  using `zoom_ratio = _target_distance / old_dist`. ✓
- **Orbit around cursor:** `begin_orbit_at_world_point` sets `_pivot = world_pt` and recomputes spherical
  coordinates; subsequent motion changes only `_phi`/`_theta`, not `_pivot`. ✓
- **Smooth movement:** `_process` uses exponential smoothing `t = 1 - pow(0.05, delta * zoom_smooth)` to
  interpolate `_distance` and `_pivot` toward their targets each frame. ✓

All 19 automated checks pass. 91 GDScript tests pass. 94 Python tests pass.
