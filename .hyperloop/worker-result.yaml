### Requirement: View Specs as Intermediate Representation — COVERED

**Implementation:**
- `LLMViewGenerator.parse_response()` returns a plain `Dictionary` with keys `"question"`
  and `"operations"` — no Node3D, no geometry.
- `SceneInterpreter.apply(spec, anchors, scene_root, world_positions)` consumes that
  Dictionary and mutates actual Node3D scene-tree properties.
- `main.gd.apply_view_spec()` connects the two stages end-to-end as Stage 1 → Stage 2.

**Scenario: LLM produces view spec**
- THEN it emits a structured view specification (not raw 3D geometry)
  → Test `test_parse_response_returns_dictionary`: confirms `result is Dictionary` ✓
  → Tests `test_parse_response_has_question_key`, `test_parse_response_has_operations_key`,
    `test_parse_response_operations_is_array`: confirm structural shape of the dict ✓
- AND the view spec controls which elements are shown, hidden, highlighted, arranged
  → Tests `test_parse_response_passes_through_show_op`, `..._hide_op`, `..._arrange_op`,
    `..._highlight_op`, `..._annotate_op`, `..._connect_op`: each passes fixture JSON
    through `parse_response()` and asserts the op survives intact ✓
  → Test `test_parse_response_all_six_ops_pass_through`: all 6 ops in one call ✓
- AND the 3D renderer interprets the view spec into a spatial scene
  → All `test_scene_interpreter.gd` tests instantiate real Node3D objects, call
    `SceneInterpreter.apply()`, and assert concrete scene-tree property values
    (`.visible`, `.position.x/y/z`, `mat.albedo_color`, `label.billboard`,
    `label.pixel_size`, child count on root) — NOT dict key presence ✓
  → Test `test_all_six_ops_mutate_scene_correctly`: integration test applying all 6 ops
    at once and asserting every resulting property ✓

