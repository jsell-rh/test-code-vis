## Summary

Task-022 implements the Moldable Views spec (`specs/interaction/moldable-views.spec.md`) for the code-vis Godot application. The implementation delivers a two-stage view-spec pipeline:

- **Stage 1 — `godot/scripts/llm_view_generator.gd`**: Converts a natural-language question + scene graph into a structured view specification. Exposes `build_prompt(question, graph)` and `parse_response(response)`. Enforces a fixed visual primitive set (`VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`); any op not in this list is discarded at parse time, ensuring no new rendering logic is introduced at runtime.

- **Stage 2 — `godot/scripts/scene_interpreter.gd`**: Consumes the view spec dictionary and applies each operation to the live 3D scene by mutating `Node3D` properties — `anchor.visible`, `anchor.position`, `MeshInstance3D.material_override.albedo_color`, `Label3D` annotation nodes, and `ImmediateMesh` connection lines.

All 164 GDScript tests pass. All 15 checks exit 0.

