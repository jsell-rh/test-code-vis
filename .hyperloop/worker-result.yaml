### F1 — zoom-direction derivation comments added [PASS]

Per the directional-behavior guideline, inline # derivation comments are required
before any directional implementation line. The zoom sign was undocumented.

Added to `_handle_button` in camera_controller.gd:
  # scroll up → zoom IN → _target_distance decreases → direction must be negative
  # scroll down → zoom OUT → _target_distance increases → direction must be positive

This provides the same self-documenting sign convention that was already present
in the pan section of `_handle_motion`.

