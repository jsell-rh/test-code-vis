### Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`
- `_theta = 0.15` rad on init (≈8.6° from top-down)
- Scroll wheel zoom: `_distance` clamped to [min_distance, max_distance]
- Middle-mouse drag: changes `_phi` (azimuth) and `_theta` (altitude)
- `_theta` clamped to [0.01, PI-0.01] so camera never flips (up stays up)
- `set_pivot()` called from `_frame_camera()` to fit entire scene

**Tests:** `godot/tests/test_camera_controls.gd`
- `test_initial_theta_is_near_top_down` — PASS
- `test_initial_distance_is_positive` — PASS
- `test_scroll_up_decreases_distance` — PASS
- `test_scroll_down_increases_distance` — PASS
- `test_orbit_horizontal_drag_changes_phi` — PASS
- `test_orbit_vertical_drag_changes_theta` — PASS
- `test_set_pivot_updates_state` — PASS
- `test_zoom_clamped_at_minimum` — PASS

