The PARTIAL finding on the "Godot 4.6 / Engine version" requirement has been resolved.

## What was done

Added `godot/tests/test_godot_version.gd` with three behavioral tests covering all
THEN clauses of the "Engine version" scenario:

1. **test_project_declares_godot_46** — reads `res://project.godot` via
   `FileAccess.open()` + `get_as_text()` and asserts the content contains "4.6".
   This simultaneously satisfies the "it uses Godot 4.6.x" THEN clause and exercises
   the `FileAccess.open()` + `get_as_text()` API path that was only in production code
   (`main.gd::_ready()`) but never in any test.

2. **test_main_script_is_gdscript** — opens `res://scripts/main.gd` via FileAccess
   and asserts it is a non-empty readable `.gd` file, confirming the GDScript-only
   constraint is in effect.

3. **test_main_uses_godot4_fileaccess_api** — reads `main.gd` source and asserts it
   contains `FileAccess.open(` and `get_as_text(` while not containing the deprecated
   Godot 3 `File.new()` or `read_as_text()` patterns.

Wired the new suite into `run_tests.gd` under the task-013 section.

