### Requirement 3: Zoom Toward Mouse Cursor (MUST)

**Implementation:** `godot/scripts/camera_controller.gd` lines 170–178
- `_zoom_toward_point(world_pt, direction)`:
  - Adjusts `_target_distance` (clamped to min/max)
  - Shifts `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
  - zoom_ratio < 1 for zoom-in → pivot moves toward cursor
  - zoom_ratio > 1 for zoom-out → pivot moves away from cursor
- `_handle_button` calls `_get_ground_point_under_cursor` to find world point under cursor,
  then passes it to `_zoom_toward_point` (lines 120–128)

**Scenario: Zooming into a specific component**
- GIVEN cursor over a bounded context ✓ (world_pt computed from cursor position)
- WHEN user scrolls to zoom in ✓ (`MOUSE_BUTTON_WHEEL_UP`)
- THEN view zooms toward cursor point ✓ (`zoom_ratio < 1` shifts pivot toward world_pt)
- AND component under cursor stays under cursor ✓ (pivot invariant: world_pt stays fixed)

**Tests:**
- `test_zoom_in_shifts_pivot_toward_cursor` — zoom-in with cursor at +X → asserts
  `cam._target_pivot.x > 0.0` (pivot moved toward cursor)
- `test_zoom_in_cursor_point_invariant` — asserts `0 < new_pivot.x < world_pt.x`
  (pivot between old position and cursor, i.e. cursor stays fixed relative to scene)

**Scenario: Zooming out**
- GIVEN zoomed-in view ✓
- WHEN user scrolls to zoom out ✓ (`MOUSE_BUTTON_WHEEL_DOWN`)
- THEN view zooms out from cursor point ✓ (`zoom_ratio > 1` shifts pivot away)

**Tests:**
- `test_zoom_out_shifts_pivot_away_from_cursor` — cursor at +X, zoom-out →
  asserts `cam._target_pivot.x < 0.0` (pivot pushed away from cursor)

**Status: COVERED**

