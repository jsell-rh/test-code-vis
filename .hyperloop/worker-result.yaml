### Implementation verified

**`godot/scripts/main.gd` `_create_volume()`** creates Label3D nodes with:
- `label.text = nd["name"]` — name from JSON
- `label.pixel_size = 0.012` — legible real-world height (> 0.0)
- `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` — always faces camera
- `label.no_depth_test = true` — visible through geometry at all zoom depths

**`godot/tests/test_readable_labels.gd`** — 11 tests, all PASS:
- `test_bounded_context_anchor_has_label` — Label3D child exists on bounded-context anchor
- `test_module_anchor_has_label` — Label3D child exists on module anchor
- `test_label_text_matches_node_name_bounded_context` — `.text == "IAM"`
- `test_label_text_matches_node_name_module` — `.text == "Domain"`
- `test_label_billboard_enabled_bounded_context` — asserts `BILLBOARD_ENABLED` on real Node3D
- `test_label_billboard_enabled_module` — asserts `BILLBOARD_ENABLED` on real Node3D
- `test_label_pixel_size_positive_bounded_context` — asserts `pixel_size > 0.0` on real node
- `test_label_pixel_size_positive_module` — asserts `pixel_size > 0.0` on real node
- `test_label_no_depth_test_bounded_context` — asserts `no_depth_test == true`
- `test_label_no_depth_test_module` — asserts `no_depth_test == true`
- `test_project_godot_declares_version_4_6` — uses FileAccess.open() + get_as_text()
  to read project.godot and assert it contains "4.6"

Tests instantiate real `Node3D` objects via `MainScript.new()` + `build_from_graph()`,
then assert actual property values — no dict-key-only assertions.

