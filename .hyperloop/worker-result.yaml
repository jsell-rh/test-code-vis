## Requirement Review

### 1. Target Codebase — COVERED

**Requirement:** The prototype MUST use the kartograph codebase as its target.

**Code:** `extractor/__main__.py` accepts `src_path` as a CLI argument (no hardcoded
path). `test_kartograph_integration.py` sets `KARTOGRAPH_SRC = Path.home() / "code" /
"kartograph" / "src" / "api"` and skips gracefully when not present.

**Tests:**
- `test_kartograph_integration_bounded_contexts` — calls `main()` against kartograph,
  asserts bounded contexts `iam`, `graph`, `shared_kernel` appear in output.
- `test_kartograph_extraction_produces_modules` — asserts at least one `module`-type
  node is produced, confirming the internal structure is reflected.

Both tests are skipped (not failed) when kartograph is absent, which is acceptable
per the spec ("skipped when the kartograph codebase is not present").

---

### 2. Two-Stage Pipeline — COVERED

**Requirement:** MUST operate as a two-stage pipeline: Python extractor → JSON scene
graph → Godot application.

**Code (extractor):** `extractor/extractor.py:build_scene_graph()` builds the graph;
`extractor/__main__.py:main()` serialises it to JSON with `json.dumps(graph, indent=2)`.

**Code (Godot):** `godot/scripts/main.gd:_ready()` opens the JSON file via `FileAccess`,
parses it with `JSON.new()`, calls `SceneGraphLoader.load_from_dict()`, then
`build_from_graph()` which creates volumes and edges.

**Tests:**
- `test_main_writes_json_output` (test_cli.py) — verifies CLI produces a valid JSON
  file with `nodes`, `edges`, `metadata` keys.
- `test_volumes_created_for_each_node` (test_scene_graph_loading.gd) — verifies
  `build_from_graph()` creates `_anchors` entries for every node.
- `test_anchor_positions_match_json` (test_scene_graph_loading.gd) — verifies
  anchor positions match the position data in the fixture JSON.

---

### 3. Top-Down Architectural View — COVERED

**Requirement:** MUST provide a top-down camera view; all bounded contexts visible;
positions reflect coupling; dependencies visible as connections.

**Code (camera):** `camera_controller.gd` initialises `_theta = 0.15` rad (≈8.6°
from straight above, well within the "top-down" threshold of π/4 = 45°).

**Code (LOD — bounded contexts visible):** `lod_manager.gd:_apply_far()` sets
`anchor.visible = (ntype == "bounded_context")` when `camera_distance > FAR_THRESHOLD`.

**Code (coupling positions):** `extractor.py:_order_by_coupling()` reorders BCs in
the ring so tightly coupled pairs are placed adjacent (greedy nearest-neighbour heuristic).

**Code (dependency connections):** `main.gd:_create_edge()` draws an `ImmediateMesh`
line and a `CylinderMesh` arrowhead for every edge.

**Tests:**
- `test_initial_theta_is_near_top_down` (test_camera_controls.gd) — asserts
  `_theta < PI/4`.
- `test_far_distance_shows_only_bounded_contexts` (test_spatial_structure.gd) —
  asserts bounded_context anchor visible, module anchor hidden at FAR distance.
- `test_coupled_bcs_are_closer_than_uncoupled` (test_extractor.py line 435) —
  fixture with 4 BCs; `auth↔shared_kernel` have cross-context edges; `billing` has
  none. Asserts `dist("auth","shared_kernel") < dist("auth","billing")`.
- `test_dependency_expressed_as_visible_connection` (test_spatial_structure.gd) —
  asserts `ImmediateMesh` child exists in main node after `build_from_graph()`.

---

### 4. Zoom to Detail — COVERED

**Requirement:** MUST allow user to zoom into a bounded context to see internal layers,
internal dependencies, and relative sizes.

**Code:** `camera_controller.gd:_zoom_toward_cursor()` updates `_target_distance`
and shifts pivot toward cursor; `lod_manager.gd` reveals modules at MEDIUM and all
edges at NEAR distance.

**Tests:**
- `test_scroll_up_decreases_distance` (test_camera_controls.gd) — `_target_distance`
  decreases on WHEEL_UP.
- `test_medium_distance_shows_modules` (test_spatial_structure.gd) — module anchor
  visible when `camera_distance` is between NEAR_THRESHOLD and FAR_THRESHOLD.
- `test_near_distance_shows_all_nodes` (test_spatial_structure.gd) — all anchors
  visible at NEAR distance.
- `test_near_distance_shows_internal_edges_as_fine_detail` (test_spatial_structure.gd) —
  internal edges visible at NEAR distance.
- `test_mesh_sizes_proportional_to_metric` (test_size_encoding.gd) — fixture has
  `size=3.0` and `size=9.0`; asserts `large_mesh.size.x / small_mesh.size.x ≈ 3.0`.

---

### 5. Abstract Visual Language — COVERED

**Requirement:** MUST use abstract geometric volumes (no buildings/terrain); size
reflects complexity; position reflects coupling; containment via nesting.

**Code:** `main.gd:_create_volume()` creates `BoxMesh` with dimensions derived from
`nd["size"]`. Context: large translucent slab (`size * 0.2` height). Module: compact
opaque box (`size * 0.6` height). Module anchors are added as children of the parent
context anchor when `nd["parent"] != null`.

**Tests:**
- `test_mesh_instances_exist_in_anchors` (test_scene_graph_loading.gd) — each anchor
  has a `MeshInstance3D` child (geometric volume confirmed).
- `test_large_module_has_bigger_mesh` (test_size_encoding.gd) — larger `size` value
  → larger `BoxMesh.size.x`.
- `test_mesh_sizes_proportional_to_metric` (test_size_encoding.gd) — ratio exact.
- `test_module_parented_inside_context` (test_containment_rendering.gd) — module
  anchor's `get_parent() == ctx_anchor`.
- `test_containment_expressed_as_scene_tree_parenting` (test_spatial_structure.gd) —
  same assertion from a different fixture.

