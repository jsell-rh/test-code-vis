### Requirement: View Specs as Intermediate Representation (SHALL)

STATUS: COVERED

Implementation:
- `LLMViewGenerator.parse_response()` returns a plain `Dictionary` with "question"
  (String) and "operations" (Array of Dicts) — no raw 3D geometry, no Node3D.
- `SceneInterpreter.apply()` consumes that Dictionary and mutates the 3D scene.
  The LLM never touches the renderer directly.

**Scenario: LLM produces view spec** — COVERED

| THEN clause | Implementation | Test |
|---|---|---|
| emits structured view spec, not raw 3D geometry | `parse_response()` returns Dictionary | `test_parse_response_returns_dictionary` — asserts `result is Dictionary` |
| view spec controls show/hide/highlight/arrange | `_make_spec()` passes all 6 valid ops through | `test_parse_response_all_six_ops_pass_through` — asserts 6 ops present |
| 3D renderer interprets view spec into spatial scene | `SceneInterpreter.apply()` dispatches match statement | `test_all_six_ops_mutate_scene_correctly` — asserts .visible, .albedo_color, .position.x, .text, ImmediateMesh on live Node3D |

