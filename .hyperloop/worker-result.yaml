## Requirement Coverage

### Requirement: Pan with Left Mouse Button (SHALL/MUST)

**Implementation:** `camera_controller.gd` lines 101–104 — `MOUSE_BUTTON_LEFT` sets
`_panning = event.pressed`; lines 141–160 — pan branch in `_handle_motion` updates
`_target_pivot` via `right` and `backward` vectors.

| Scenario THEN-clause | Test | Assertion | Status |
|---|---|---|---|
| Camera pans in direction of drag | `test_lmb_drag_pans_camera` (line 149) | `cam._pivot != initial_pivot` after LMB + 50px drag | COVERED |
| Movement direction not inverted | `test_pan_direction_not_inverted` (line 172) | phi=PI/2, drag left 50px → `cam._pivot.x > 0.0` | COVERED |

**Status: COVERED**

### Requirement: Non-Inverted Movement (SHALL/MUST)

**Implementation:** `_target_pivot -= right * delta.x * pan_amount` (line 156) with
`_target_pivot -= backward * delta.y * pan_amount` (line 157). Comment confirms Google Maps
convention (drag left → pivot.x increases → scene shifts left = same direction as drag).

| Scenario THEN-clause | Test | Assertion | Status |
|---|---|---|---|
| Scene moves in same direction as drag | `test_pan_direction_not_inverted` | Same predicate as above | COVERED |

**Status: COVERED**

### Requirement: Zoom Toward Mouse Cursor (SHALL/MUST)

**Implementation:** `_handle_button` lines 120–128 — both wheel events call
`_get_ground_point_under_cursor(_last_mouse)` then `_zoom_toward_point(world_pt, ±1)`.
`_zoom_toward_point` (lines 170–178) shifts `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.

| Scenario THEN-clause | Test | Assertion | Status |
|---|---|---|---|
| View zooms toward cursor | `test_zoom_in_shifts_pivot_toward_cursor` (line 203) | `_target_pivot.x > 0.0` toward (10,0,0) | COVERED |
| Component stays under cursor during zoom | `test_zoom_in_cursor_point_invariant` (line 219) | `0 < _target_pivot.x < 20.0` | COVERED |
| Zoom out from cursor | `test_zoom_out_shifts_pivot_away_from_cursor` (line 234) | `_target_pivot.x < 0.0` on zoom-out from +X cursor | COVERED |

**Status: COVERED**

### Requirement: Orbit Around Mouse Point (SHALL/MUST)

**Implementation:** `_handle_button` lines 111–118 — `MOUSE_BUTTON_RIGHT` press calls
`_get_ground_point_under_cursor(event.position)` and `begin_orbit_at_world_point(world_pt)`.
`begin_orbit_at_world_point` (lines 73–85) sets `_pivot = world_pt` and recomputes spherical
coordinates so the camera does not jump.

| Scenario THEN-clause | Test | Assertion | Status |
|---|---|---|---|
| Orbit triggered by RMB (not MMB) | `test_orbit_uses_right_mouse_button` (line 255) | `cam._phi != initial_phi` after RMB + drag | COVERED |
| Camera orbits around cursor point | `test_orbit_around_cursor_point` (line 275) | `cam._pivot == world_pt` after `begin_orbit_at_world_point` | COVERED |
| Component at visual center during orbit | `test_orbit_pivot_is_world_point` (line 291) | `cam._pivot.is_equal_approx(world_pt)` | COVERED |

**Status: COVERED**

### Requirement: Smooth Camera Movement (SHALL/MUST)

**Implementation:** `_process` (lines 42–47) uses exponential smoothing:
`t = 1.0 - pow(0.05, delta * zoom_smooth)` then `lerpf(_distance, _target_distance, t)`
and `_pivot.lerp(_target_pivot, t)`. Pan applies immediately for responsiveness (line 159)
but is inherently proportional to drag delta.

| Scenario THEN-clause | Test | Assertion | Status |
|---|---|---|---|
| Zoom interpolated, not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll` (line 310) | `_target_distance < _distance` immediately after scroll | COVERED |
| _process converges distance toward target | `test_smooth_zoom_process_interpolates_distance` (line 325) | `20.0 < _distance < 40.0` after `_process(0.1)` | COVERED |
| Pan proportional to drag speed | `test_pan_proportional_to_drag_speed` (line 338) | cam_fast (50px) > cam_slow (10px) pivot displacement | COVERED |

**Status: COVERED**

