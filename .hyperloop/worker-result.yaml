## Requirement Coverage

### Requirement: Question-Driven View Generation — COVERED

The system MUST accept natural language questions and generate a spatial view tailored to answering
that specific question.

**Implementation:**
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` builds a prompt embedding
  the question and all graph node IDs, instructing the LLM to produce a view spec using VALID_OPS.
- `godot/scripts/scene_interpreter.gd` — `apply(spec, anchors, scene_root)` applies show/hide/
  arrange ops that produce a spatially arranged answer.
- `godot/scripts/main.gd` — `apply_view_spec(spec)` wires the two together.

**Scenario: Architectural question — all THEN/AND clauses covered:**
| THEN clause | Code | Test |
|---|---|---|
| View focused on auth-related components | `build_prompt()` embeds node IDs | `test_build_prompt_contains_node_id_auth_service` (test_llm_view_generator.gd:123) |
| Irrelevant components hidden/de-emphasized | `_apply_hide()` sets `anchor.visible = false` | `test_hide_op_sets_visible_false` (test_scene_interpreter.gd:73) |
| Relevant components arranged | `_apply_arrange()` sets `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_all_three_axes` (test_scene_interpreter.gd:250) |

**Scenario: Impact question — all THEN/AND clauses covered:**
| THEN clause | Code | Test |
|---|---|---|
| View shows user database and all its dependents | `_apply_show()` sets `anchor.visible = true` | `test_show_op_sets_visible_true` (test_scene_interpreter.gd:115) |
| Dependency relationships spatially clear | `_apply_connect()` adds ImmediateMesh line + CylinderMesh arrowhead | `test_connect_op_adds_line_geometry` + `test_connect_op_adds_arrowhead` (test_scene_interpreter.gd:364,393) |

---

### Requirement: View Specs as Intermediate Representation — COVERED

The system MUST use a structured view specification as the intermediate representation between the
LLM and the 3D renderer.

**Implementation:**
- `parse_response(llm_text)` in `llm_view_generator.gd` returns a plain Dictionary `{"question":
  ..., "operations": [...]}` — NOT raw 3D geometry (no Node3D, no Mesh, no Vector3 returned).
- `SceneInterpreter.apply(spec, anchors, scene_root)` consumes that Dictionary and mutates the live
  scene tree. The LLM never generates geometry directly.
- `main.gd.apply_view_spec()` is the end-to-end wiring point.

**Scenario: LLM produces view spec — all THEN/AND clauses covered:**
| THEN clause | Code | Test |
|---|---|---|
| Emits structured view spec (not raw 3D geometry) | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` (test_llm_view_generator.gd:157) |
| View spec controls show/hide/highlight/arrange | `_make_spec()` validates and passes all 6 ops | `test_parse_response_all_six_ops_pass_through` (test_llm_view_generator.gd:273) |
| 3D renderer interprets view spec into spatial scene | `SceneInterpreter.apply()` mutates `.visible`, `.albedo_color`, `.position`, adds Label3D + MeshInstance3D | `test_all_six_ops_mutate_scene_correctly` (test_scene_interpreter.gd:445) |

---

### Requirement: Fixed Visual Primitive Set — COVERED

The set of visual primitives available in view specs MUST be fixed and finite. The LLM selects from
available primitives; it does not invent new ones.

**Implementation:**
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` is a
  compile-time constant in `llm_view_generator.gd`.
- `_make_spec()` filters any op not in VALID_OPS before the spec leaves `parse_response()`.
- `SceneInterpreter.apply()` uses a `match` statement that silently ignores unrecognised op strings.
  Two enforcement layers prevent runtime primitive invention.

**Scenario: LLM uses existing primitives — all THEN/AND clauses covered:**
| THEN clause | Code | Test |
|---|---|---|
| Composes from fixed primitive set (show/hide/highlight/arrange/annotate/connect) | VALID_OPS const + `_make_spec()` allows exactly these 6 | `test_parse_response_all_six_ops_pass_through` (test_llm_view_generator.gd:273) |
| No new rendering logic generated at runtime | `_make_spec()` drops unknown ops; `SceneInterpreter` match ignores unrecognised strings | `test_parse_response_filters_unknown_ops` (line 298) + `test_parse_response_with_all_unknown_ops_returns_empty_operations` (line 314) + `test_unknown_op_is_ignored` (test_scene_interpreter.gd:504) |

