### main.gd
`_ready()` is not an empty stub. It loads the JSON scene graph via FileAccess, wires a QuestionPanel into a CanvasLayer, connects the `view_spec_requested` signal to `_on_view_spec_requested()`, and calls `ViewSpecRenderer.apply()` on spec receipt. Full implementation.

### Spec coverage

**Requirement: Question-Driven View Generation — COVERED**

Scenario: Architectural question
- THEN generates view focused on auth-related components: `test_auth_question_show_op_includes_auth_service` confirms `process_question("how does authentication work?")` emits a `show` op containing `auth_service`.
- AND irrelevant components hidden/de-emphasised: `test_auth_question_excludes_unrelated_nodes_from_render` instantiates a real Node3D root, calls `ViewSpecRenderer.apply()`, and asserts `payment_service` is absent.
- AND relevant components arranged: `test_auth_question_includes_highlight_op_for_auth_service`, `test_auth_question_highlight_sets_material_on_rendered_node` assert `material_override != null` on the instantiated `MeshInstance3D`; `test_arrange_op_overrides_node_position_x/y/z` each assert numeric position properties on the real node.

Scenario: Impact question
- THEN shows user database and dependents: `test_impact_question_show_op_includes_user_db`, `test_impact_question_show_op_includes_dependents`.
- AND dependency relationships spatially clear: `test_impact_question_connect_creates_midpoint_node_in_scene` instantiates a real Node3D root and asserts `conn_auth_service_user_db` exists; `test_connect_op_connector_position_is_midpoint_x/y` assert numeric `.position.x/.y` values on the connector.

**Requirement: View Specs as Intermediate Representation — COVERED**

Scenario: LLM produces view spec
- THEN emits structured view spec (not raw 3D geometry): `test_parse_response_returns_dictionary` and `test_process_question_returns_dictionary` confirm a `Dictionary` is returned, not a Node or geometry object.
- AND view spec controls shown/hidden/highlighted/arranged elements: all six op pass-through tests in `test_llm_view_generator.gd`; `test_highlight_op_albedo_color_red/green/blue_component` assert `.albedo_color` channel values on the actual `StandardMaterial3D`; `test_annotate_op_sets_label3d_text` asserts `.billboard == BILLBOARD_ENABLED` and `.pixel_size > 0.0` on the `Label3D`.
- AND 3D renderer interprets spec into spatial scene: `test_renderer_can_apply_auth_spec_to_scene` / `test_renderer_can_apply_impact_spec_to_scene` instantiate a real root, call `ViewSpecRenderer.apply()`, and assert `MeshInstance3D` nodes are present.

**Requirement: Fixed Visual Primitive Set — COVERED**

Scenario: LLM uses existing primitives
- THEN composes from existing set: `test_build_prompt_contains_[show|hide|highlight|arrange|annotate|connect]_primitive` assert all six appear in the prompt string; `test_valid_ops_has_exactly_six_primitives` asserts the VALID_OPS array contains exactly 6 entries.
- AND no new rendering logic at runtime: `test_parse_response_filters_unknown_ops` confirms an invented op (`invent_new_renderer`) is dropped; `test_parse_response_with_all_unknown_ops_returns_empty_operations` confirms an all-unknown response yields zero ops.

All requirements COVERED. Implementation is complete and behaviorally verified.
