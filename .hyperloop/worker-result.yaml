## Requirement: Fixed Visual Primitive Set

**Status: COVERED**

Implementation:
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
  declared as a const on line 31 of `llm_view_generator.gd`.
- `build_prompt()` embeds `VALID_OPS` in the prompt text (line 53-64), so the LLM is told
  the fixed contract before it generates any output.
- `_make_spec()` (line 122-127) filters every op through `VALID_OPS.has(op.get("op", ""))`,
  silently dropping any unknown op — no new rendering logic can enter the renderer.
- `SceneInterpreter.apply()` uses a `match` statement covering exactly the 6 ops; unmatched
  ops fall through silently.

### Scenario: LLM uses existing primitives — COVERED

| THEN clause | Implementation | Test |
|---|---|---|
| composes from show | `build_prompt()` includes "show" in ops_list | `test_build_prompt_contains_show_primitive` (line 85): `prompt.contains("show")` |
| composes from hide | `build_prompt()` includes "hide" in ops_list | `test_build_prompt_contains_hide_primitive` (line 93): `prompt.contains("hide")` |
| composes from highlight | `build_prompt()` includes "highlight" in ops_list | `test_build_prompt_contains_highlight_primitive` (line 99): `prompt.contains("highlight")` |
| composes from arrange | `build_prompt()` includes "arrange" in ops_list | `test_build_prompt_contains_arrange_primitive` (line 105): `prompt.contains("arrange")` |
| composes from annotate | `build_prompt()` includes "annotate" in ops_list | `test_build_prompt_contains_annotate_primitive` (line 111): `prompt.contains("annotate")` |
| composes from connect | `build_prompt()` includes "connect" in ops_list | `test_build_prompt_contains_connect_primitive` (line 117): `prompt.contains("connect")` |
| no new rendering logic at runtime (partial unknown) | `_make_spec()` drops op not in VALID_OPS | `test_parse_response_filters_unknown_ops` (line 298): unknown op removed, only "show" survives |
| no new rendering logic at runtime (all unknown) | `_make_spec()` drops all ops | `test_parse_response_with_all_unknown_ops_returns_empty_operations` (line 314): `spec["operations"].size() == 0` |
| no new rendering logic at runtime (renderer ignores unknown) | `match` in `SceneInterpreter.apply()` has no arm for unknown ops | `test_unknown_op_is_ignored` (test_scene_interpreter.gd:505): `anchor.visible == true` unchanged after unknown op |

