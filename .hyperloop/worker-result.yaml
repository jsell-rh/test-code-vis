### Requirement: Dependency Rendering — COVERED

**Implementation:** `godot/scripts/main.gd::_create_edge()`
- Builds an `ImmediateMesh` with `PRIMITIVE_LINES` between from_pos and to_pos.
- Adds a `CylinderMesh` with `top_radius = 0` (arrowhead cone) at the target end,
  oriented along the edge direction, to indicate flow direction.
- Cross-context edges are colored orange `Color(1.0, 0.50, 0.10)`; internal are grey.

**Tests:** `godot/tests/test_dependency_rendering.gd`
- `test_edge_line_mesh_created()` — ImmediateMesh exists in main node's children.
- `test_direction_indicator_cone_created()` — CylinderMesh with top_radius == 0
  exists among children.
- `test_direction_cone_near_target()` — cone position is within 2 units of target.
- `test_cross_context_cone_is_orange()` — cross_context edge cone has R > 0.8,
  B < 0.3.

---

### Requirement: Size Encoding — COVERED

**Implementation:** `godot/scripts/main.gd::_create_volume()`
- `sz = float(nd["size"])` is applied directly to `BoxMesh.size` dimensions.
- Larger `size` value → larger mesh in all three axes (no normalization or
  re-scaling performed in Godot).

**Tests:** `godot/tests/test_size_encoding.gd`
- `test_large_module_has_bigger_mesh()` — large_mod (size=9) BoxMesh.size.x >
  small_mod (size=3) BoxMesh.size.x.
- `test_mesh_sizes_proportional_to_metric()` — ratio of mesh x-dimensions equals
  ratio of input sizes (9/3 = 3.0) within float tolerance.

