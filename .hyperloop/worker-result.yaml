### Requirement: Dependency Rendering — COVERED

**Implementation (`main.gd::_create_edge()`):**
- Line: `ImmediateMesh` with `PRIMITIVE_LINES` between `_world_positions[src]` and
  `_world_positions[tgt]`.
- Direction indicator: `CylinderMesh` with `top_radius=0` (pointed cone) placed at target
  end, oriented along the edge direction via `Basis(Quaternion(Vector3.UP, dir))`.
- Cross-context edges colored orange `Color(1.0, 0.50, 0.10)`; internal edges grey.

**Tests (test_dependency_rendering.gd):**
- `test_edge_line_mesh_created` — asserts ImmediateMesh MeshInstance3D on main node.
- `test_direction_indicator_cone_created` — asserts CylinderMesh with `top_radius == 0`.
- `test_direction_cone_near_target` — asserts cone position within 2 units of `to_pos`.
- `test_cross_context_cone_is_orange` — asserts `R > 0.8` and `B < 0.3` on cone material.

