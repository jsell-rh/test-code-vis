### Requirement: Dependency Rendering ‚Äî COVERED

**Spec**: The application MUST render dependency edges as visible lines between connected nodes.

**Implementation** (`godot/scripts/main.gd ‚Üí _create_edge()`):
- ImmediateMesh (PRIMITIVE_LINES) with vertex colors creates the line between `_world_positions[src]` and `_world_positions[tgt]`
- CylinderMesh with `top_radius=0.0` (cone, pointed at tip) positioned at the target end, oriented along the edge direction, indicates the dependency flow direction

**Tests** (`test_dependency_rendering.gd`):
- `test_edge_line_mesh_created`: asserts ImmediateMesh MeshInstance3D exists on main node ‚úì
- `test_direction_indicator_cone_created`: asserts CylinderMesh with `top_radius == 0.0` exists ‚úì
- `test_direction_cone_near_target`: asserts cone position is within 2 units of target ‚úì
- `test_cross_context_cone_is_orange`: asserts cone material `r > 0.8` and `b < 0.3` (orange) for cross-context edge ‚úì

