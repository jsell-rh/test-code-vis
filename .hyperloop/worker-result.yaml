## Algorithm-Quality Audit for "Reflects" THEN-Clauses

**"relative positions reflect coupling"** → `test_coupled_bcs_are_closer_than_uncoupled`
- `src_coupling` fixture: auth imports from shared_kernel (coupled); billing has no import from auth (uncoupled).
- Assert: `dist("auth", "shared_kernel") < dist("auth", "billing")`.
- Fixture VARIES the coupling property. Assert checks RELATIVE spatial output. **Algorithm-quality confirmed.** ✓

**"size reflects complexity"** → `test_mesh_sizes_proportional_to_metric`
- Fixture: small_mod size=3.0, large_mod size=9.0.
- Assert: `large_mesh.size.x / small_mesh.size.x ≈ 3.0` (tolerance 0.001).
- Fixture VARIES size metric. Assert checks proportional mesh output. **Algorithm-quality confirmed.** ✓

