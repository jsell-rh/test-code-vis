## Review Summary for task-003

### What this task implements
Adds `godot/scripts/scene_graph_loader.gd` — a static GDScript class that
parses the JSON scene graph produced by the Python extractor into structured
Arrays (nodes, edges, metadata). Adds a headless test runner
(`godot/tests/run_tests.gd`) and 24 behavioral tests
(`godot/tests/test_scene_graph_loader.gd`).

