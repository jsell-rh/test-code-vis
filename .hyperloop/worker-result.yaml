### Spec coverage

**JSON Scene Graph Loading** (`godot/scripts/main.gd`):
- `_ready()` → `_load_and_build()` reads JSON via `FileAccess` + `JSON.parse()`.
- `_build()` calls `_create_volume()` for each node and `_create_edge()` for each edge.
- `_compute_world_positions()` resolves positions from the JSON `position` field.
- THEN clauses tested: anchors created (test_volumes_created_for_each_node),
  MeshInstance3D children exist (test_mesh_instances_exist_in_anchors),
  edge meshes created (test_edge_mesh_instances_created),
  positions match JSON data (test_anchor_positions_match_json),
  labels are billboard+readable (test_labels_are_billboard_and_readable).

**Containment Rendering** (`_create_volume()`):
- Bounded context: BoxMesh, `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
- Module: BoxMesh, `albedo_color.a = 1.0` (opaque).
- Children parented to context anchor in the scene tree.
- THEN clauses tested: translucency (test_bounded_context_is_translucent),
  opacity (test_module_is_opaque), nesting (test_module_parented_inside_context),
  size ordering (test_bounded_context_larger_than_module),
  distinct boundary (test_bounded_context_cull_disabled).

**Dependency Rendering** (`_create_edge()`):
- Line: `ImmediateMesh` with `PRIMITIVE_LINES` between source and target world positions.
- Direction indicator: `CylinderMesh` with `top_radius=0.0` (cone) placed at target end.
- Cross-context edges: orange (`Color(1.0, 0.50, 0.10)`); internal: grey.
- THEN clauses tested: line mesh created (test_edge_line_mesh_created),
  cone created (test_direction_indicator_cone_created),
  cone near target end (test_direction_cone_near_target),
  cross-context cone is orange (test_cross_context_cone_is_orange).

**Size Encoding** (`_create_volume()`):
- `sz = float(nd["size"])` applied directly to `BoxMesh.size` axes.
- THEN clauses tested: larger metric → larger mesh (test_large_module_has_bigger_mesh),
  proportional sizes within 0.001 tolerance (test_mesh_sizes_proportional_to_metric).

**Camera Controls** (`godot/scripts/camera_controller.gd`):
- Top-down default: `_theta = 0.15` rad (< PI/4 = 45°).
- Zoom: WHEEL_UP decreases `_distance`, WHEEL_DOWN increases; clamped to [min, max].
- Orbit: MIDDLE drag adjusts `_phi` (azimuth) and `_theta` (polar, clamped [0.01, PI-0.01]).
- `look_at(_pivot, Vector3.UP)` on every update maintains up-stability.
- THEN clauses tested: initial theta top-down, initial distance positive,
  scroll up/down changes distance, orbit changes phi/theta,
  set_pivot updates state, zoom clamped at minimum.

