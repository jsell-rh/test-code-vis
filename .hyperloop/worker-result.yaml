### Sign-Chain Derivation (independently computed with bc)

**Zoom-in** (`direction = -2.0`, `pivot=(0,0,0)`, `cursor=(10,0,0)`, `old_target=40`):
- `step = -2.0 × (40×0.05 + 1.0) = -6.0`
- `new_target = 34.0` (decreases)
- `zoom_fraction = 1 - 34/40 = +0.15` (positive → lerp toward cursor)
- `new_pivot.x = lerp(0, 10, 0.15) = 1.5`
- Assertion `> 0.0` → `1.5 > 0.0` ✓

**Zoom-out** (`direction = +2.0`, `pivot=(5,0,0)`, `cursor=(10,0,0)`, `old_target=40`):
- `step = +2.0 × 3.0 = +6.0`
- `new_target = 46.0` (increases)
- `zoom_fraction = 1 - 46/40 = -0.15` (negative → lerp away from cursor)
- `new_pivot.x = lerp(5, 10, -0.15) = 4.25`
- Assertion `< 5.0` → `4.25 < 5.0` ✓

**Edge case** (cursor == pivot = `(3,0,0)`):
- `zoom_fraction × (cursor-pivot) = 0.15 × 0 = 0`
- `new_pivot.x = 3.0` unchanged ✓ (lerp identity holds)

All three sign chains are mathematically correct and match their test assertions.

