### Requirement 1 — Pan with Left Mouse Button: COVERED

- **Code**: `camera_controller.gd` lines 72–74 set `_panning = event.pressed` on LMB;
  lines 133–154 move `_pivot` in the camera's local XZ plane on every motion event while
  `_panning` is true.
- **Tests**:
  - `test_lmb_pan_moves_pivot` — LMB + right drag → `cam._pivot != initial_pivot` (smoke
    test confirming pan fires; presence check is appropriate here since direction is
    covered by the dedicated directional tests below).
  - `test_pan_drag_right_decreases_pivot_x` — signed: `pivot.x < initial_x` ✅
  - `test_pan_drag_left_increases_pivot_x` — signed: `pivot.x > initial_x` ✅
  - `test_pan_drag_down_decreases_pivot_z` — signed: `pivot.z < initial_z` ✅
  - `test_pan_drag_up_increases_pivot_z` — signed: `pivot.z > initial_z` ✅

### Requirement 2 — Non-Inverted Movement: COVERED

- **Spec (i.e.) parenthetical**: "dragging left reveals content to the right, as in Google Maps".
- **Sign-chain derivation**: drag left → delta.x = −50 → `_pivot -= right(1,0,0)*(−50)*pan_amount`
  → pivot.x increases → camera looks right → scene shifts left on screen → content from the
  right enters view. ✓
- **Code**: Sign-chain derivation comments are present at `camera_controller.gd` lines 136–144,
  immediately before the computation. ✅
- **Tests**: `test_pan_drag_left_increases_pivot_x` asserts `cam._pivot.x > initial_x` with
  a left drag — matches derivation exactly. `test_drag_direction_matches_view_movement` asserts
  `pivot.x < initial_x` for a right drag — consistent with map-grab model. Both tests pass,
  both use signed predicates. ✅
- **check-nondirectional-movement-assertions.sh**: EXIT 0. ✅

### Requirement 3 — Zoom Toward Mouse Cursor: COVERED

- **Code**: `_zoom_toward_cursor` at lines 98–106 with full sign-chain comment block at lines
  89–97. Zoom-in: step < 0 → `_target_distance` decreases → `zoom_fraction > 0` → pivot lerps
  toward cursor. Zoom-out: step > 0 → `_target_distance` increases → `zoom_fraction < 0` →
  pivot shifts away from cursor.
- **Scenario Zooming into a component**:
  - `test_zoom_toward_cursor_shifts_pivot_toward_cursor` — cursor at (10,0,0), pivot starts at
    (0,0,0), zoom in → `pivot.x > 0.0` ✅
  - `test_component_stays_under_cursor_on_zoom_in` — `after > before` ✅
- **Scenario Zooming out**:
  - `test_zoom_out_from_cursor_shifts_pivot_away` — pivot at (5,0,0), cursor at (10,0,0),
    zoom out → `pivot.x < 5.0` ✅
  - `test_zoom_out_increases_target_distance` — `target > initial` ✅

### Requirement 4 — Orbit Around Mouse Point: COVERED

- **Code**: `_handle_button` lines 75–80: on RMB press, calls
  `_set_orbit_pivot(_mouse_to_ground(event.position))`. `_set_orbit_pivot` (lines 111–120)
  updates `_pivot` to the world point under the cursor and recalculates spherical angles so
  camera position is preserved. During orbit motion (lines 127–131), `_phi` and `_theta` change
  but `_pivot` is not moved.
- **Tests**:
  - `test_orbit_pivot_set_to_cursor_point_at_start` — calls `_set_orbit_pivot` with (5,0,7)
    → asserts `cam._pivot == world_point` ✅
  - `test_orbit_pivot_is_used_during_orbit` — sets pivot to (3,0,4), drives horizontal orbit
    → asserts `cam._pivot == pivot_before` (pivot unchanged during orbit) ✅
  - `test_component_remains_at_visual_center_during_orbit` — same invariant, diagonal drag ✅

### Requirement 5 — Smooth Camera Movement: COVERED

- **Scenario Smooth zoom**:
  - **Code**: `_process` at lines 50–56 lerps `_distance` toward `_target_distance` each frame
    with `t = min(zoom_smoothing * delta, 0.9)`.
  - **Test**: `test_zoom_is_interpolated_not_instantaneous` — WHEEL_UP sets target but
    `_distance` is unchanged before `_process`; after `_process(0.016)`, distance is between
    `initial_distance` and `target` (partial lerp). Both signed clauses required and
    asserted. ✅

- **Scenario Smooth pan** (proportional to drag speed):
  - **Code**: `_handle_motion` computes `pan_amount = pan_speed * (_distance * 0.05 + 1.0)`
    and applies `_pivot -= right * delta.x * pan_amount`. Pan displacement is linear in
    `delta.x`, so proportional to drag distance/speed.
  - **Test**: `test_pan_proportional_to_drag_speed` — cam1 dragged 10 px → `move1`;
    cam2 dragged 50 px → `move2`; asserts `move2 > move1`. ✅

### Boundary / constraint tests (supplemental, not spec-required but confirm robustness)

- `test_target_distance_clamped_at_minimum` — 200 zoom-in events → `target >= min_distance` ✅
- `test_target_distance_clamped_at_maximum` — 200 zoom-out events → `target <= max_distance` ✅
- `test_theta_clamped_at_minimum` — large upward orbit → `theta >= 0.01` ✅
- `test_theta_clamped_at_maximum` — large downward orbit → `theta <= PI - 0.01` ✅

