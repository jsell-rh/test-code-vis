### Requirement: Orbit Around Mouse Point (SHALL/MUST)

| THEN-clause | Test | Status |
|---|---|---|
| Camera orbits around the point under the cursor at orbit start | test_orbit_around_cursor_point | PASS |
| Camera orbits on right-mouse drag | test_orbit_uses_right_mouse_button | PASS |
| Component remains at visual centre during orbit | test_orbit_pivot_is_world_point | PASS |

**Implementation:** RMB press calls `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))`.
`begin_orbit_at_world_point` sets `_pivot = world_pt` and recomputes spherical coordinates so
the camera doesn't jump. Camera always `look_at(_pivot)` → pivot is always the visual centre.

**Verdict: COVERED**

