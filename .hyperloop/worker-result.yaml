## Requirement Coverage

### REQ: Target Codebase — COVERED

Spec: "The prototype MUST use the kartograph codebase as its target system."

- **Code**: `extractor/extractor.py` → `discover_bounded_contexts()`,
  `discover_submodules()`, `build_scene_graph()` — discovers Python packages as
  bounded contexts and sub-packages as modules; works against any Python DDD tree
  including kartograph.
- **Tests**:
  - `test_kartograph_integration.py::test_kartograph_integration_bounded_contexts`
    — runs the CLI against `~/code/kartograph/src/api`, asserts `iam`, `graph`,
    `shared_kernel` nodes in output JSON. (Correctly gated with
    `@pytest.mark.skipif` when codebase absent.)
  - `test_kartograph_integration.py::test_kartograph_extraction_produces_modules`
    — asserts at least one `type=module` node is produced.

---

### REQ: Two-Stage Pipeline — COVERED

Spec: "MUST operate as a two-stage pipeline: Python extractor → JSON → Godot."

- **Code**:
  - `extractor/__main__.py` → CLI that calls `build_scene_graph()` and writes
    JSON to the output path.
  - `godot/scripts/main.gd._ready()` → `FileAccess.open()` → `JSON.parse()` →
    `SceneGraphLoader.load_from_dict()` → `build_from_graph()`.
- **Edge format consistency**: extractor.py emits `{"source": …, "target": …}`;
  main.gd reads `ed["source"]` / `ed["target"]`; all GDScript test fixtures use
  the same `"source"/"target"` keys. Pipeline is internally consistent.
- **Tests**:
  - Python: `test_extractor.py::TestSceneGraphOutput::test_build_scene_graph_has_required_keys` + `test_output_is_json_serialisable` confirm extractor output is valid JSON.
  - GDScript: `test_scene_graph_loading.gd::test_volumes_created_for_each_node`
    exercises `build_from_graph()` with fixture data and asserts `Node3D` anchors
    are created in `_anchors`.

