## Requirement 3: Zoom Toward Mouse Cursor (MUST)

**Status: COVERED**

Implementation:
- WHEEL_UP/DOWN: `_get_ground_point_under_cursor(_last_mouse)` → `_zoom_toward_point(world_pt, dir)`
- `_zoom_toward_point`: `zoom_ratio = _target_distance / old_dist`
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
  Zoom in (ratio < 1) → pivot moves toward world_pt.
  Zoom out (ratio > 1) → pivot moves away from world_pt.

### Scenario: Zooming into a specific component
- THEN view zooms toward the cursor point
  → `test_zoom_in_shifts_pivot_toward_cursor`: world_pt=(10,0,0), zoom in → `_target_pivot.x > 0.0` ✓
- AND component stays under cursor during zoom
  → `test_zoom_in_cursor_point_invariant`: `0 < new_pivot.x < 20.0` (pivot between old_pivot and world_pt) ✓

### Scenario: Zooming out
- THEN view zooms out from the cursor point
  → `test_zoom_out_shifts_pivot_away_from_cursor`: world_pt=(10,0,0), zoom out → `_target_pivot.x < 0.0` ✓

