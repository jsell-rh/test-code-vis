### R3: JSON Interface Contract (MUST) — COVERED

**Implementation:**
- `godot/scripts/scene_graph_loader.gd` — `load_from_dict(data: Dictionary)` accepts a plain Dictionary parsed from JSON. No subprocess calls, no extractor imports.
- `main.gd::_ready()` reads JSON via `FileAccess.open()` + `get_as_text()` → `JSON.new().parse()` → passes `json.data` (a Dictionary) to `SceneGraphLoader.load_from_dict()` and `build_from_graph()`. Zero access to the Python extractor or source codebase.
- Grep confirms: no `subprocess`, `OS.execute`, `import extractor`, or extractor-path strings anywhere in `godot/scripts/`.

**Test coverage:**
- All `test_scene_graph_loader.gd` tests use inline `_make_fixture()` dictionaries — no extractor invocation. Structurally confirms decoupled contract: Godot app consumes only a Dictionary; the Python extractor is not referenced.
- `godot-fileaccess-tested.sh`: EXIT 0 — confirms `FileAccess.open()` path is exercised in tests.

**Verdict: COVERED**

