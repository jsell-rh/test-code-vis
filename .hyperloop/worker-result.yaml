## Not-In-Scope Audit

The spec contains no explicit "Not In Scope" section. Scope is strictly limited to the five requirements defined:
- Pan with Left Mouse Button
- Non-Inverted Movement
- Zoom Toward Mouse Cursor
- Orbit Around Mouse Point
- Smooth Camera Movement

No prohibited features were identified or implemented.

---

## THEN-Clause → Test Mapping

| THEN-clause (verbatim from spec) | Test function | File |
|---|---|---|
| the camera pans in the direction of the drag | `test_lmb_drag_pans_camera` | `godot/tests/test_camera_controls.gd` |
| the movement direction matches the drag direction (not inverted) | `test_pan_direction_not_inverted` | `godot/tests/test_camera_controls.gd` |
| the scene moves in the same direction as the drag (i.e. dragging left reveals content to the right, as in Google Maps) | `test_pan_direction_not_inverted` | `godot/tests/test_camera_controls.gd` |
| the view zooms toward the point under the cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `godot/tests/test_camera_controls.gd` |
| the component under the cursor stays under the cursor during the zoom | `test_zoom_in_cursor_point_invariant` | `godot/tests/test_camera_controls.gd` |
| the view zooms out from the point under the cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | `godot/tests/test_camera_controls.gd` |
| the camera orbits around the point under the cursor at orbit start | `test_orbit_uses_right_mouse_button`, `test_orbit_around_cursor_point` | `godot/tests/test_camera_controls.gd` |
| the component remains at the visual center during the orbit | `test_orbit_pivot_is_world_point` | `godot/tests/test_camera_controls.gd` |
| the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll`, `test_smooth_zoom_process_interpolates_distance` | `godot/tests/test_camera_controls.gd` |
| the pan movement is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | `godot/tests/test_camera_controls.gd` |

