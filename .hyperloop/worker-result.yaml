## THEN-Clause to Test Mapping

**Scenario 1 – First-person exploration**

| THEN-clause | Covering test |
|---|---|
| system presented as navigable 3D space | `test_camera_supports_zoom_in`, `test_camera_supports_zoom_out`, `test_camera_supports_orbit` |
| human can move through it in first person | **NOT IN SCOPE** — prototype-scope.spec.md §"Features excluded from prototype" explicitly lists "first-person navigation is NOT implemented" |
| spatial layout communicates structure | `test_spatial_layout_creates_node_per_structural_element` — asserts one Node3D anchor per node id |

**Scenario 2 – Structural elements have spatial presence**

| THEN-clause | Covering test |
|---|---|
| each structural element occupies a distinct region | `test_distinct_contexts_occupy_distinct_regions` — asserts `pos_a != pos_b` on instantiated anchors |
| boundaries between elements are visually clear | `test_context_boundary_is_visually_distinct_translucent` — asserts `albedo_color.a < 1.0` and `transparency == TRANSPARENCY_ALPHA` on live MeshInstance3D |
| containment expressed spatially | `test_containment_expressed_as_scene_tree_parenting` — asserts `mod_anchor.get_parent() == ctx_anchor` |
| dependency expressed spatially | `test_dependency_expressed_as_visible_connection` — asserts ImmediateMesh child exists on main node |

**Scenario 3 – Scale Through Zoom / LOD**

| THEN-clause | Covering test |
|---|---|
| far away → see high-level services only | `test_far_distance_shows_only_bounded_contexts` — asserts ctx visible, mod hidden at distance > FAR_THRESHOLD+10 |
| far away → all edges hidden | `test_far_distance_hides_all_edges` |
| closer to service → modules become visible | `test_medium_distance_shows_modules` — asserts both ctx and mod visible at midpoint |
| medium → cross-context edges only | `test_medium_distance_shows_cross_context_edges_only` |
| closer to module → finer details appear | `test_near_distance_shows_all_nodes` + `test_near_distance_shows_internal_edges_as_fine_detail` |
| LOD entries populated from build | `test_lod_node_entries_populated_after_build` + `test_lod_edge_entries_populated_after_build` |
| end-to-end LOD integration | `test_lod_integration_far_hides_modules_in_built_scene` |

All THEN-clauses are covered by named test assertions. No unmapped clauses.

## Implementation Quality

- `lod_manager.gd`: Clean, 80-line implementation with FAR (>80), MEDIUM (20-80), NEAR (<20) thresholds. All three `_apply_*` methods are directly tested.
- `main.gd _ready()`: Not a stub — has full FileAccess.open() + get_as_text() I/O path. FileAccess is exercised in 2 test files (godot-fileaccess-tested.sh confirmed).
- `camera_controller.gd`: Exposes `get_distance()` used by `_process()` in main.gd for per-frame LOD. Zoom clamped at `min_distance`/`max_distance`; theta clamped to (0.01, PI−0.01) to prevent pole flip. Both constraints tested (test_zoom_clamped_at_minimum, test_orbit_vertical_drag_changes_theta).
- Direction indicator: CylinderMesh with `top_radius=0` (pointed tip) placed at edge target. This is an explicit rendering element satisfying "direction is visually indicated."
- Label3D: `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true` — all asserted in existing tests.
