### Requirement: Size Encoding — COVERED

THEN "module with more code appears as a larger volume":
  `sz = float(nd["size"])` drives `box.size = Vector3(sz, sz * 0.6, sz)`.
  Test: `test_large_module_has_bigger_mesh` (size=9 > size=3 in scene tree).

THEN "relative sizes are proportional to the metric":
  Test: `test_mesh_sizes_proportional_to_metric` asserts ratio == 3.0 ± 0.001.

