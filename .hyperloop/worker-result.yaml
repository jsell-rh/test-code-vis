## Key Findings from Independent Code Review

### Finding: Coupling-Aware Layout is Correctly Implemented

**Prior reviewer (FAIL):** Mapped "position reflects coupling relationships" to
`test_anchor_positions_match_json` — a rendering-fidelity test that cannot verify
the layout algorithm.

**Fix (commit 61f6919):** The mapping was changed to cite
`test_coupled_bcs_are_closer_than_uncoupled` for both "reflects coupling"
THEN-clauses (Top-Down View AND Abstract Visual Language scenarios).

**Independent verification of the algorithm:**

`extractor/extractor.py`, lines 154–186 (`_order_by_coupling`):
- Builds a symmetric coupling count between BC pairs (number of cross-context edges)
- Uses greedy nearest-neighbor heuristic: starting from the first BC, each step picks
  the remaining BC with the highest coupling score to the current tail
- Result: highly coupled BCs end up adjacent in the ring, minimising their distance

`extractor/extractor.py`, lines 189–231 (`compute_layout`):
- When edges are provided, calls `_order_by_coupling(bc_nodes, edges)` before placing
  BCs in a circle — confirming coupling IS encoded as spatial proximity

**Independent verification of the test:**

`extractor/tests/test_extractor.py`, lines 435–462 (`test_coupled_bcs_are_closer_than_uncoupled`):
- Fixture: 4 bounded contexts (auth, billing, reporting, shared_kernel)
- auth imports from shared_kernel (coupled); billing imports from reporting (coupled)
- billing is NOT coupled to auth
- Calls `compute_layout(nodes, edges)` with actual edge data
- Asserts: `dist("auth", "shared_kernel") < dist("auth", "billing")`
- This IS an algorithm-quality test — it would fail if positions were equal-spaced or random

**`check-reflects-mapping-consistency.sh`:** "All 3 'reflects' concept group(s) cite
consistent tests across THEN-clauses." Both coupling clauses map to the same algorithm
test. PASS.

### Finding: All Godot Tests Are Genuine (Not False Positives)

All Godot test suites that exercise `build_from_graph` use Pattern 2 (bool-return):
- `test_scene_graph_loading.gd extends RefCounted` — creates `MainScript.new()` directly,
  no null `_main` issue; tests return `true`/`false`
- `test_containment_rendering.gd extends RefCounted` — same pattern
- `test_dependency_rendering.gd extends RefCounted` — same
- `test_size_encoding.gd extends RefCounted` — same

`check-gdscript-test-bool-return.sh` confirms no inert bool-returning functions in
Pattern-1 suites. PASS.

The `ERROR: Condition "!is_inside_tree()"` messages in test output are benign
headless artifacts from camera controller tests that call `get_global_transform`
when the camera is not attached to the scene tree. These errors do NOT abort test
execution (Godot returns a default Transform3D and continues); the assertions still
run and report correct results. All 97 tests pass.

### Finding: No Scope Violations

No out-of-scope artifacts found. `check-not-in-scope.sh` passes. Independent semantic
audit confirms no prohibited features in `extractor/` or `godot/`.

