### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd → _create_edge()`):
- Line: `ImmediateMesh` with `PRIMITIVE_LINES`, coloured by edge type.
- Direction indicator: `CylinderMesh` with `top_radius = 0.0` (pointed cone) placed at
  `to_pos - dir * (height * 0.5)`, oriented with `Basis(Quaternion(Vector3.UP, dir))`.
  This is an explicit arrowhead geometry — satisfies "direction is visually indicated".
- Cross-context edges use orange (`Color(1.0, 0.50, 0.10)`).

**Tests** (`test_dependency_rendering.gd`):
