## Requirement: Top-Down Architectural View — COVERED

**Scenario: Viewing kartograph from above**

- Top-down camera default: `camera_controller.gd` initialises `_theta = 0.15` (near-vertical
  polar angle → near top-down with slight tilt for depth perception).
  Tested by `test_camera_controls.gd::test_initial_theta_is_near_top_down`.
- Bounded contexts as distinct volumes: `main.gd _create_volume()` creates a large
  translucent BoxMesh for each bounded_context node.
  Tested by `test_containment_rendering.gd::test_bounded_context_is_translucent`,
  `test_distinct_contexts_occupy_distinct_regions` in `test_spatial_structure.gd`.
- Coupling-relative positions: extractor `_order_by_coupling()` / `compute_layout()`
  produce `"position"` fields in JSON consumed by Godot.
- Dependency connections: `main.gd _create_edge()` draws line + arrowhead.
  Tested by `test_dependency_rendering.gd::test_edge_line_mesh_created`.

