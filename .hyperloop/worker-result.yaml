### PO-4: Zoom test sign-chain in docstring rather than function body
`test_zoom_toward_point_moves_pivot_toward_target` has its `→` sign-chain derivation in
the `##` docstring above the function, not inside the function body. The
`check-direction-test-derivations.sh` and `check-docstring-arrow-placement.sh` scripts
that flagged this have been removed from main.

