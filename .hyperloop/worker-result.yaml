## Requirement 5: Smooth Camera Movement (MUST)

**Status: COVERED**

Implementation:
- `_process(delta)`: exponential smoothing → `t = 1.0 - pow(0.05, delta * zoom_smooth)`
  `_distance = lerpf(_distance, _target_distance, t)`
  `_pivot = _pivot.lerp(_target_pivot, t)`
  Zoom updates only `_target_distance`/`_target_pivot`; actual values interpolate each frame.
- Pan: applied directly to `_pivot` = `_target_pivot` (immediate + proportional to drag distance).

### Scenario: Smooth zoom
- THEN zoom is animated smoothly, not instantaneous
  → `test_smooth_zoom_target_differs_from_distance_after_scroll`:
    After WHEEL_UP: `cam._target_distance < cam._distance` (target changed, actual hasn't snapped) ✓
  → `test_smooth_zoom_process_interpolates_distance`:
    `_distance=40, _target_distance=20`; after `_process(0.1)`: `20.0 < _distance < 40.0` ✓

### Scenario: Smooth pan
- THEN pan is smooth and proportional to drag speed
  → `test_pan_proportional_to_drag_speed`:
    cam_slow: 10 px drag; cam_fast: 50 px drag → `cam_fast._pivot.length() > cam_slow._pivot.length()` ✓

