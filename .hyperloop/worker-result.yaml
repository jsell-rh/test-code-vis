### 8. Navigation — COVERED

**Requirement:** MUST support pan, zoom, rotate; smooth transitions between overview
and detail.

**Code:** `camera_controller.gd`:
- LMB drag → pans `_pivot` in camera's local XZ plane (non-inverted).
- Scroll wheel → `_zoom_toward_cursor()` updates `_target_distance`; `_process()`
  lerps `_distance` toward it (smooth).
- RMB drag → `_orbiting = true`; `_phi` and `_theta` updated per pixel delta.

**Tests:**
- `test_lmb_pan_moves_pivot` (test_ux_polish.gd) — LMB press + drag changes `_pivot`.
- `test_pan_drag_right_increases_pivot_x` (test_ux_polish.gd) — non-inverted panning:
  drag right → `_pivot.x > initial_x`.
- `test_scroll_up_decreases_distance` (test_camera_controls.gd) — zoom in reduces
  `_target_distance`.
- `test_orbit_horizontal_drag_changes_phi` (test_camera_controls.gd) — horizontal
  RMB drag changes `_phi`.
- `test_zoom_is_interpolated_not_instantaneous` (test_ux_polish.gd) — after
  `WHEEL_UP`, `_distance` equals `initial_distance` (not snapped); after `_process(0.016)`,
  `_distance` is between `initial_distance` and `_target_distance` (smooth lerp).
- `test_far_distance_shows_only_bounded_contexts` (test_spatial_structure.gd) —
  confirms LOD transitions from overview to detail.

