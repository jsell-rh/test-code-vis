**Pan direction sign derivation (independent, derived before reading test body):**

Spec: "the scene moves in the same direction as the drag (dragging left reveals content to
the right, as in Google Maps)." At phi=PI/2, camera position ≈ (0, 39.5, 6.0). Godot's
look_at computes basis.x = UP × z_dir = (0,1,0) × (0, 0.989, 0.149) ≈ (0.149, 0, 0) →
normalized = world +X. Drag left: delta.x = −50. Code:
`_target_pivot -= right * delta.x * pan_amount` = `−= (+X)(−50)(positive)` → pivot.x
increases. Camera moves right in world → scene appears to move left → right-side content
enters view. Matches Google Maps. Expected assert: `_pivot.x > 0.0`. Test body confirms
exactly this. ✓

