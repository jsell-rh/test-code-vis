### Implementation summary

**`godot/scripts/main.gd`** — scene loading, volume and edge creation, size encoding
- `_ready()` → `_load_and_build()` reads JSON via `FileAccess`, parses with `JSON.new()`
- `_build()` creates `Node3D` anchors for every node, parents children under parents
- `_create_volume()` — `bounded_context` → translucent `TRANSPARENCY_ALPHA` slab
  (`CULL_DISABLED`); `module` → opaque cube; both use `sz = float(nd["size"])` as
  `BoxMesh.size`, so sizes are proportional to the metric
- Each anchor gets a `Label3D` with `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`,
  `no_depth_test = true` (readable at all zoom levels)
- `_create_edge()` → `ImmediateMesh` line + `CylinderMesh` (top_radius=0) arrowhead at
  target end oriented via `Basis(Quaternion(Vector3.UP, dir))`; cross-context edges orange

**`godot/scripts/camera_controller.gd`** — orbit/zoom/pan camera
- Initial `_theta = 0.15` (near top-down), `_distance = 40.0`
- `WHEEL_UP/DOWN` zoom; `MIDDLE` drag orbit (`_phi`, `_theta`); `RIGHT` drag pan
- `look_at(_pivot, Vector3.UP)` keeps "up stays up"
- `set_pivot()` called by `main.gd` after scene framing

**`godot/project.godot`** — Godot 4.6, `config/features=PackedStringArray("4.6")`

