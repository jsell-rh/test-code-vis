### PASS — Stage 2 renderer now present (resolves previous blocking FAIL)

`godot/scripts/scene_interpreter.gd` implements `SceneInterpreter.apply()` which takes the
Dictionary produced by `LLMViewGenerator.parse_response()` and applies each operation to live
Node3D scene objects:
- `show`/`hide` → `anchor.visible`
- `highlight` → `MeshInstance3D material_override.albedo_color`
- `arrange` → `anchor.position`
- `annotate` → `Label3D` child added (billboard=ENABLED, pixel_size=0.05)
- `connect` → `ImmediateMesh` line + `CylinderMesh` arrowhead (cone with `top_radius=0`)
              added to `scene_root`

`main.gd` exposes `apply_view_spec(spec)` which wires Stage 1 → Stage 2 end-to-end.
`main.gd._ready()` is not a stub — it performs real FileAccess.open() I/O and calls
`build_from_graph()`.

