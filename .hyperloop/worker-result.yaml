## Summary

| Requirement                  | Status  |
|------------------------------|---------|
| Target Codebase              | PARTIAL |
| Two-Stage Pipeline           | COVERED |
| Top-Down Architectural View  | COVERED |
| Zoom to Detail               | COVERED |
| Abstract Visual Language     | COVERED |
| Readable Labels              | COVERED |
| Dependency Visualization     | COVERED |
| Navigation                   | COVERED |
| Not In Scope                 | FAIL    |

**Verdict: FAIL**

Two features explicitly prohibited by the prototype-scope spec are implemented,
tested, and integrated into the running application:

1. **Moldable views** — `question_panel.gd` + `view_spec.gd` +
   `view_spec_renderer.gd` + wiring in `main.gd`. Must be removed entirely.

2. **Spec extraction** — `extract_spec_nodes()` + `_layout_spec_nodes()` +
   `include_specs` parameter + `--specs` CLI flag. Must be removed entirely.

Additionally, the Target Codebase requirement has no automated integration test
running the extractor against the real `~/code/kartograph` codebase (PARTIAL),
though a committed scene_graph.json shows the pipeline was manually exercised.
