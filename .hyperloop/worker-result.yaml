## Requirement-by-Requirement Coverage

### Requirement: Conformance Mode — COVERED

The system MUST allow the human to see whether the as-built system matches the as-specced design.

Implementation: `check_alignment(actual_nodes, spec_node_ids)` returns `{aligned, divergent, missing}`;
`render_alignment()` applies Label3D annotations ("✓ SPEC ALIGNED", "⚠ MERGED") and highlights
divergent nodes on the live scene tree.

#### Scenario: Spec-aligned implementation

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "the human can see that the realized system has auth and user management as separate components" | test_aligned_nodes_detected_as_separate | PASS |
| "the correspondence between spec and realization is visually apparent" | test_aligned_nodes_have_annotation_in_scene | PASS |

#### Scenario: Spec-divergent implementation

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "the human can see the divergence between spec and realization" | test_divergent_nodes_detected | PASS |
| "the specific nature of the divergence is clear (merged vs. separate)" | test_divergent_nodes_annotated_as_merged | PASS |

---

### Requirement: Evaluation Mode — COVERED

The system MUST allow the human to evaluate the architectural quality of the realized system independent of the spec.

Implementation: `analyze_coupling(nodes, edges, threshold)` returns `{pairs}` sorted by
coupling_score; `analyze_criticality(nodes, edges, threshold)` returns `{critical}` sorted by
in_degree; `render_coupling()` and `render_criticality()` apply HIGHLIGHT_COLOR and Label3D
annotations ("⚠ Coupling: N", "⚠ SPOF Risk (in-degree: N)").

#### Scenario: Detecting tight coupling

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "the coupling between those services is apparent" | test_tightly_coupled_pair_detected | PASS |
| "the human can assess whether the coupling is problematic" | test_coupled_nodes_highlighted | PASS |

#### Scenario: Identifying single point of failure

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "the criticality and centrality of that component is apparent" | test_central_node_detected_as_critical | PASS |
| "the risk it represents is clear" | test_critical_node_annotated_with_spof_risk | PASS |

#### Scenario: Spec faithfully implemented but architecturally poor

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "architectural problems are visible even though conformance is perfect" | test_coupling_detected_despite_perfect_alignment | PASS |

---

### Requirement: Simulation Mode — COVERED

The system MUST allow the human to explore the impact of hypothetical changes.

Implementation: `simulate_split(nodes, edges, node_id)` returns `{dependents, new_interfaces}`;
`simulate_failure(nodes, edges, node_id)` performs BFS through the reverse dependency graph and
returns `{cascade}`; `render_split_impact()` and `render_failure_cascade()` apply highlights
and Label3D annotations ("◈ SPLITTING", "↯ Affected by split", "✕ FAILED", "⚡ Cascading failure").

#### Scenario: Splitting a service

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "the impact on dependent services is visible" | test_split_dependents_detected | PASS |
| "new dependencies or interfaces that would be required are shown" | test_split_new_interfaces_shown | PASS |

#### Scenario: Failure injection

| THEN-clause (verbatim) | Test function | Status |
|---|---|---|
| "the cascade of effects through the system is visible" | test_failure_cascade_detected | PASS |
| "components that would be affected are clearly identified" | test_failure_affected_nodes_highlighted | PASS |

