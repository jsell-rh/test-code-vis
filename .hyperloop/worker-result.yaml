### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd`, `_create_edge()`):
- Builds `ImmediateMesh` line between `from_pos` and `to_pos` (PRIMITIVE_LINES, two vertices).
- Adds `CylinderMesh` arrowhead with `top_radius = 0.0` (pointed cone) at target end,
  oriented along the edge direction (`Basis(Quaternion(Vector3.UP, dir))`).
- Cross-context edges: orange `Color(1.0, 0.50, 0.10)`. Internal: grey `Color(0.55, 0.55, 0.55)`.

**Tests** (`godot/tests/test_dependency_rendering.gd`, 4 tests):
- `test_edge_line_mesh_created()` — asserts `ImmediateMesh` exists among main node's children.
- `test_direction_indicator_cone_created()` — asserts `CylinderMesh` with `top_radius == 0.0` exists.
- `test_direction_cone_near_target()` — asserts cone position within 2 units of `Vector3(20, 0, 0)`.
- `test_cross_context_cone_is_orange()` — asserts `r > 0.8 and b < 0.3` on cross-context cone material.

Line-connects-two-volumes and direction-indicated THEN clauses both covered. ✅

