## Requirement: Godot 4.6 — COVERED

**SHALL**: Built using Godot 4.6.x with GDScript; all API calls compatible with Godot 4.6.

**Code**:
- `project.godot`: `config/features=PackedStringArray("4.6")`.
- `main.gd` uses `FileAccess.open()` + `file.get_as_text()` — valid 4.6 API.
- All scripts in `godot/scripts/` have `.gd` extension (verified by DirAccess test).

**Scenario: Engine version — `test_engine_version.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| uses Godot 4.6.x | `test_project_godot_declares_46` | `"4.6" in file.get_as_text()` on project.godot |
| features line is correct | `test_features_line_contains_46` | `'PackedStringArray("4.6")' in text` |
| API calls valid for 4.6 | `test_fileaccess_open_returns_non_null` | `FileAccess.open()` returns non-null (no crash) |
| all scripts use GDScript | `test_scripts_dir_contains_only_gdscript` | `DirAccess` over `res://scripts/`, every file ends in `.gd` |

