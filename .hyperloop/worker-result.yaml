## Independent THEN→Test Mapping Verification

For each THEN-clause I independently derived the expected predicate before reading the test body.

| THEN-clause | Mapped test(s) | Predicate verified | Verdict |
|---|---|---|---|
| the camera pans in the direction of the drag | `test_lmb_drag_pans_camera` | LMB + motion → `pivot != initial_pivot` | PASS |
| AND the movement direction matches the drag direction (not inverted) | `test_pan_direction_not_inverted`, `test_lmb_drag_pans_camera` | At phi=PI/2, drag-left (delta.x=-50): formula `_target_pivot -= right*delta.x*pan_amount` → pivot.x > 0. Camera moves +X → scene shifts left ← matches drag-left. ✓ | PASS |
| the scene moves in the same direction as the drag | `test_pan_direction_not_inverted` | Same predicate as above | PASS |
| the view zooms toward the point under the cursor | `test_zoom_in_shifts_pivot_toward_cursor` | cursor=(10,0,0), pivot=(0,0,0), zoom_in: zoom_ratio<1 → `new_pivot = world_pt + (pivot-world_pt)*ratio` → pivot.x = 10-10*ratio > 0 | PASS |
| AND the component under the cursor stays under the cursor during zoom | `test_zoom_in_cursor_point_invariant`, `test_zoom_in_shifts_pivot_toward_cursor` | 0 < new_pivot.x < world_pt.x proves cursor-invariant intermediate position | PASS |
| the view zooms out from the point under the cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | zoom_ratio>1 → new_pivot.x = 10-10*ratio < 0 (pivot moves away from cursor) | PASS |
| the camera orbits around the point under the cursor at orbit start | `test_orbit_uses_right_mouse_button`, `test_orbit_around_cursor_point` | RMB → `begin_orbit_at_world_point` → `_pivot == world_pt`; phi changes on drag | PASS |
| AND the component remains at the visual center during the orbit | `test_orbit_pivot_is_world_point`, `test_orbit_around_cursor_point` | `_pivot.is_equal_approx(world_pt)` + camera `look_at(_pivot)` keeps it centered | PASS |
| the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll`, `test_smooth_zoom_process_interpolates_distance` | Scroll changes only `_target_distance`; `_distance` unchanged until `_process()` interpolates | PASS |
| the pan movement is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed`, `test_pan_applied_immediately_no_lag` | 50px drag > 10px drag in pivot displacement; `_pivot == _target_pivot` (no lag) | PASS |

**Direction predicate independent derivation for `test_pan_direction_not_inverted`:**
- Camera at phi=PI/2, theta=0.15, distance=40 → cam_pos ≈ (0, 39.5, 6.0)
- `look_at_from_position` → basis.x = cross(UP, Z_local) = cross((0,1,0),(0,0.989,0.15)) = (0.15,0,0) normalized = +X ✓
- Drag LEFT: position (100→50), delta.x = -50
- `_target_pivot -= right * delta.x * pan_amount` = `-= (+X) * (-50) * pan_amount` → pivot.x increases
- Test asserts `cam._pivot.x > 0.0` ✓ — correct predicate, not opposite direction

