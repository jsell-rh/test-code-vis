## Requirement: Evaluation Mode — COVERED

**Implementation:** `analyze_coupling()`, `render_coupling()`, `analyze_criticality()`,
and `render_criticality()` in `godot/scripts/understanding_analyzer.gd`.

- `analyze_coupling()` counts bidirectional edges per node pair; returns pairs above
  threshold sorted by score descending.
- `analyze_criticality()` computes in-degree for each node; returns nodes above
  threshold sorted by in-degree descending.
- Both `render_*` functions apply `HIGHLIGHT_COLOR` to `MeshInstance3D` materials and
  add descriptive `Label3D` annotations.

### Scenario: Detecting tight coupling
| THEN-clause | Test | Assertion |
|---|---|---|
| coupling between services is apparent | `test_tightly_coupled_pair_detected` | `pairs.size() >= 1` and `pairs[0]["coupling_score"] >= 2` |
| human can assess whether coupling is problematic | `test_coupled_nodes_highlighted` | `albedo_color == HIGHLIGHT_COLOR` on both `svc_x` and `svc_y` MeshInstance3D |

### Scenario: Identifying single point of failure
| THEN-clause | Test | Assertion |
|---|---|---|
| criticality and centrality of component is apparent | `test_central_node_detected_as_critical` | `critical[0]["node_id"] == "hub"` and `critical[0]["in_degree"] == 3` |
| risk it represents is clear | `test_critical_node_annotated_with_spof_risk` | Label3D with "SPOF" in text on live scene |

### Scenario: Spec faithfully implemented but architecturally poor
| THEN-clause | Test | Assertion |
|---|---|---|
| architectural problems visible even with perfect conformance | `test_coupling_detected_despite_perfect_alignment` | `aligned.size() == 2` (perfect conformance) AND `pairs.size() >= 1` (coupling detected) |

