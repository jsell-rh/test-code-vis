### Requirement: Navigation — COVERED

**SHALL**: Basic spatial navigation — pan, zoom, rotate; smooth transition
between overview and detail levels.

Scenario: Moving through the space

Implementation: `godot/scripts/camera_controller.gd`:
- RMB drag -> orbit: phi and theta updated on mouse motion.
- LMB drag -> pan: `_pivot` translated along camera right/forward.
- WHEEL -> smooth zoom: `_target_distance` set; `_distance` lerps each frame.

Tests:
- `test_orbit_horizontal_drag_changes_phi` (test_camera_controls.gd): RMB
  press + motion event changes `_phi`.
- `test_orbit_vertical_drag_changes_theta`: vertical drag changes `_theta`.
- `test_lmb_pan_moves_pivot` (test_ux_polish.gd): LMB drag changes `_pivot`.
- `test_pan_drag_right_increases_pivot_x`: non-inverted pan direction verified.
- `test_scroll_up_decreases_distance`: WHEEL_UP decreases `_target_distance`.
- `test_zoom_is_interpolated_not_instantaneous`: one 16ms `_process()` call
  moves `_distance` partway toward target (smooth lerp confirmed).
- `test_far_distance_shows_only_bounded_contexts` + `test_medium_distance_shows_modules`:
  LOD progression confirms overview-to-detail transition as zoom changes.

**COVERED**

