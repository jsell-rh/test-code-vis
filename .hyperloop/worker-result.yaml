### Requirement 2: Containment Rendering — COVERED

**Implementation (main.gd `_create_volume()`)**
- `bounded_context`: `mat.transparency = BaseMaterial3D.TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18` (translucent), `CULL_DISABLED`.
- `module`: `albedo_color = Color(0.35, 0.70, 0.40, 1.0)` (fully opaque, alpha = 1.0).
- Child anchors added via `parent_anchor.add_child(anchor)` — scene-tree nesting = visual containment.
- `BoxMesh.size.x = sz` where `sz` is larger for bounded contexts than contained modules.

**THEN clauses satisfied:**
- THEN bounded context appears as larger translucent volume: size + TRANSPARENCY_ALPHA + alpha=0.18.
- AND child modules appear as smaller opaque volumes inside: parented to context anchor, alpha=1.0.
- AND boundary of parent visually distinct: `CULL_DISABLED` on context vs default cull on modules.

**Tests (test_containment_rendering.gd):** `test_bounded_context_is_translucent`, `test_module_is_opaque`,
`test_module_parented_inside_context`, `test_bounded_context_larger_than_module`,
`test_bounded_context_cull_disabled` — all PASS.

