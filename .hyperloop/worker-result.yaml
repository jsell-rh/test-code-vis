### Requirement: Size Encoding — COVERED

`sz = float(nd["size"])` drives `box.size = Vector3(sz, sz * 0.6, sz)` — linear
proportionality is direct.

Tests:
  test_large_module_has_bigger_mesh      — size=9 mesh.x > size=3 mesh.x
  test_mesh_sizes_proportional_to_metric — ratio == 3.0 ± 0.001

