## Implementation Quality Notes

- `camera_controller.gd` correctly implements LMB pan (non-inverted), RMB orbit
  around cursor world point, scroll-wheel zoom toward cursor, and smooth
  exponential interpolation of distance/pivot.
- Pan is applied immediately (no lag) — correct UX for drag; zoom is interpolated
  — correct for smooth animated feel.
- `_get_ground_point_under_cursor` falls back to `_target_pivot` when not in scene
  tree, enabling full headless unit-test coverage.
- `begin_orbit_at_world_point` recomputes spherical coordinates so the camera
  doesn't jump when the orbit center changes — architecturally sound.
- Clamp boundaries on `_theta` (prevent polar flip) and `_distance` (min/max zoom)
  are tested at their limits by dedicated boundary tests.

