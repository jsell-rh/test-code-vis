## Requirement Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 101–104: `MOUSE_BUTTON_LEFT` press sets `_panning = true`; release sets `_panning = false`.
- Lines 141–158: `_handle_motion` — when `_panning`, computes right/backward vectors from
  `transform.basis` and shifts `_target_pivot` proportional to `delta.x` / `delta.y`.

**Scenario: Panning the view**
- `test_lmb_drag_pans_camera`: LMB press + 50px right drag → `cam._pivot != initial_pivot` ✅
- `test_pan_direction_not_inverted`: at phi=π/2 (camera X aligned with world +X), 50px right
  drag → `cam._pivot.x > 0.0` (pivot moved in drag direction, non-inverted) ✅

---

### Requirement: Non-Inverted Movement — COVERED

**Implementation**: `_target_pivot += right * delta.x * pan_amount` (line 154). Positive drag
delta produces positive pivot shift — pivot follows the drag, not the opposite.

**Scenario: Drag direction matches view movement**
- `test_pan_direction_not_inverted`: same test as above. At phi=π/2, drag right → pivot.x > 0.
  Pivot moves with the drag (Google Maps semantics: drag left reveals content to the right). ✅

---

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation**:
- Lines 120–128: scroll events call `_get_ground_point_under_cursor(_last_mouse)` to obtain the
  world point under the cursor, then pass it to `_zoom_toward_point`.
- Lines 168–176: `_zoom_toward_point` computes `zoom_ratio = _target_distance / old_dist` and
  sets `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`. Zoom in (ratio < 1)
  moves pivot toward cursor; zoom out (ratio > 1) moves pivot away.

**Scenario: Zooming into a specific component**
- `test_zoom_in_shifts_pivot_toward_cursor`: `world_pt=(10,0,0)`, zoom in →
  `cam._target_pivot.x > 0.0` ✅
- `test_zoom_in_cursor_point_invariant`: `world_pt=(20,0,0)`, zoom in →
  `0 < cam._target_pivot.x < 20.0` (new pivot strictly between old pivot and cursor point,
  confirming cursor-point invariance) ✅

**Scenario: Zooming out**
- `test_zoom_out_shifts_pivot_away_from_cursor`: `world_pt=(10,0,0)`, zoom out →
  `cam._target_pivot.x < 0.0` (pivot moved past origin, away from cursor) ✅

---

### Requirement: Orbit Around Mouse Point — COVERED

**Implementation**:
- Lines 111–118: RMB press calls `begin_orbit_at_world_point(_get_ground_point_under_cursor(...))`.
- Lines 72–85: `begin_orbit_at_world_point` sets `_pivot = world_pt`, recomputes spherical
  coordinates from the camera's current world position (no visual jump), then marks `_orbiting = true`.

**Scenario: Orbiting around a component**
- `test_orbit_uses_right_mouse_button`: RMB press + 50px horizontal motion → `cam._phi != initial_phi`
  (orbit is active and changing azimuth) ✅
- `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt`
  (orbit centre is exactly the cursor's world point) ✅
- `test_orbit_pivot_is_world_point`: after `begin_orbit_at_world_point`, `cam._pivot.is_equal_approx(world_pt)`
  — camera always calls `look_at(_pivot)`, so world_pt is always the visual centre ✅

---

### Requirement: Smooth Camera Movement — COVERED

**Implementation**:
- Lines 42–47: `_process()` uses exponential smoothing: `t = 1 - pow(0.05, delta * zoom_smooth)`;
  `_distance = lerpf(_distance, _target_distance, t)` and `_pivot = _pivot.lerp(_target_pivot, t)`.
  Scroll events only mutate targets; actual values converge over multiple frames.
- Pan (lines 154–157): `_pivot = _target_pivot` applied immediately for proportional feel; the
  pivot shift is linear in `delta.x`/`delta.y` — larger drag → larger displacement.

**Scenario: Smooth zoom**
- `test_smooth_zoom_target_differs_from_distance_after_scroll`: after scroll `_target_distance < _distance`
  (not yet converged — zoom is deferred to `_process()`) ✅
- `test_smooth_zoom_process_interpolates_distance`: set `_target_distance=20`, call `_process(0.1)` →
  `20 < _distance < 40` (partial interpolation, not instantaneous snap) ✅

**Scenario: Smooth pan**
- `test_pan_proportional_to_drag_speed`: 10px drag vs 50px drag → `cam_fast._pivot.length() >
  cam_slow._pivot.length()` (displacement is linearly proportional to drag distance) ✅

