### Requirement: Orbit Around Mouse Point (SHALL/MUST)

**Status: COVERED**

Implementation:
- `_handle_button` on `MOUSE_BUTTON_RIGHT` press: calls `_get_ground_point_under_cursor(event.position)`
  then `begin_orbit_at_world_point(world_pt)`.
- `begin_orbit_at_world_point`: sets `_pivot = world_pt`, `_target_pivot = world_pt`, recomputes
  spherical coordinates so camera doesn't jump; only the orbit centre changes.
- Camera's `_update_transform` always calls `look_at(_pivot)` so `_pivot` is the visual centre.

**Scenario: Orbiting around a component**
- THEN the camera orbits around the point under the cursor at orbit start →
  `test_orbit_uses_right_mouse_button`: RMB press + horizontal motion → asserts `cam._phi != initial_phi` ✓
  `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → asserts `cam._pivot == world_pt` ✓
- AND the component remains at the visual center during the orbit →
  `test_orbit_pivot_is_world_point`: after orbit begins, asserts `cam._pivot.is_equal_approx(world_pt)` ✓
  (the camera always `look_at(_pivot)`, so world_pt stays at visual centre)

