**Scenario: Orbiting**

| THEN clause | test functions | Status |
|---|---|---|
| THEN the camera rotates around the current focal point | `test_orbit_changes_theta_and_phi`, `test_orbit_pivot_set_to_cursor_world_point` | PASS |
