## Requirement: Camera Controls тАФ COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Initial state: `_theta = 0.15` (тЙИ8.6┬░ from top-down), `_distance = 40.0`.
- Scroll wheel: WHEEL_UP decreases `_distance`, WHEEL_DOWN increases, clamped
  to `[min_distance, max_distance]`.
- Middle-mouse drag: changes `_phi` (azimuth) and `_theta` (polar); theta clamped
  to `(0.01, PIтИТ0.01)` so camera never flips.
- `look_at(_pivot, Vector3.UP)` ensures up-vector remains consistent (up stays up).
- `set_pivot()` repositions the focal point and distance for whole-scene framing.
- Labels use `BILLBOARD_ENABLED` + `no_depth_test` so they stay readable at any zoom.

**Tests** (`godot/tests/test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` тАФ `cam._theta < PI/4`. тЬУ
- `test_initial_distance_is_positive` тАФ `cam._distance > 0`. тЬУ
- `test_scroll_up_decreases_distance` тАФ distance decreases after WHEEL_UP. тЬУ
- `test_scroll_down_increases_distance` тАФ distance increases after WHEEL_DOWN. тЬУ
- `test_orbit_horizontal_drag_changes_phi` тАФ `_phi != initial_phi` after drag. тЬУ
- `test_orbit_vertical_drag_changes_theta` тАФ `_theta != initial_theta` after drag. тЬУ
- `test_set_pivot_updates_state` тАФ `_pivot` and `_distance` updated correctly. тЬУ
- `test_zoom_clamped_at_minimum` тАФ 200 scroll-up events never breach min_distance. тЬУ

