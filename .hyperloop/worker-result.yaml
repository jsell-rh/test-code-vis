- Parsed via `JSON.new()` / `json.parse()` / `json.data`.
- `build_from_graph()` iterates `nodes` → `_create_volume()` and `edges` → `_create_edge()`.
- `anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))` uses JSON layout coords directly.

**THEN clauses satisfied:**
- THEN reads the JSON file: `FileAccess.get_as_text()` in `_ready()`.
- AND generates 3D volumes for each node: `_create_volume()` creates `MeshInstance3D` with `BoxMesh` per node.
- AND generates connections for each edge: `_create_edge()` creates `ImmediateMesh` line + cone arrowhead per edge.
- AND positions elements according to layout data: `anchor.position` set from JSON `position.x/y/z`.

**Tests (test_scene_graph_loading.gd):** `test_volumes_created_for_each_node`, `test_mesh_instances_exist_in_anchors`,
