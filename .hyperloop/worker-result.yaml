### Requirement: View Specs as Intermediate Representation — COVERED

**Files:**
- `LLMViewGenerator.parse_response()` returns a plain Dictionary — no Node3D, no geometry.
- `SceneInterpreter.apply(spec, anchors, scene_root, world_positions)` consumes that
  Dictionary and mutates actual Node3D scene-tree properties.
- `main.gd.apply_view_spec()` connects the two stages end-to-end: Stage 1 → Stage 2.

**Scenario: LLM produces view spec**
- THEN it emits a structured view specification (not raw 3D geometry)
  → `test_parse_response_returns_dictionary`: confirms `result is Dictionary` ✓
- AND the view spec controls which elements are shown, hidden, highlighted, arranged
  → `test_parse_response_passes_through_show/hide/arrange/highlight/annotate/connect_op` ✓
- AND the 3D renderer interprets the view spec into a spatial scene
  → All `test_scene_interpreter.gd` tests instantiate real Node3D objects and assert
    `.visible`, `.position.x/y/z`, `mat.albedo_color`, `label.billboard`,
    `label.pixel_size`, child count — NOT dict key presence ✓
  → `test_all_six_ops_mutate_scene_correctly`: integration test applying all 6 ops ✓

---

### Requirement: Fixed Visual Primitive Set — COVERED

**Files:**
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
  is a compile-time constant in `llm_view_generator.gd` — fixed and finite.
- `parse_response()` calls `_make_spec()` which drops any op not in `VALID_OPS`.
- `SceneInterpreter.apply()` uses a `match` with exactly 6 arms; other ops fall through.

**Scenario: LLM uses existing primitives**
- THEN it composes the answer from the existing set of primitives
  → `test_build_prompt_contains_show/hide/highlight/arrange/annotate/connect_primitive` ✓
- AND no new rendering logic is generated at runtime
  → `test_parse_response_filters_unknown_ops`: unknown op dropped ✓
  → `test_unknown_op_is_ignored`: SceneInterpreter does not crash on unknown op ✓

