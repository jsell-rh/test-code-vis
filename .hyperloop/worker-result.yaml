## Requirement Analysis

### Requirement: Question-Driven View Generation — COVERED

**Code:**
- `godot/scripts/llm_view_generator.gd` `build_prompt(question, graph)` encodes
  the natural-language question and all graph node ids/names/types into a prompt string.
- `parse_response(llm_text)` converts LLM JSON output into a structured view-spec dict.
- `godot/scripts/main.gd` `apply_view_spec(spec)` feeds the dict into
  `SceneInterpreter.apply()`, which mutates the live 3D scene.

**Scenario: Architectural question** ("how does authentication work?")
- THEN view focused on auth-related components:
  `_apply_show()` → `anchor.visible = true`.
  Test: `test_show_op_sets_visible_true` — real Node3D, asserts `.visible == true`. COVERED
- AND irrelevant components hidden or de-emphasized:
  `_apply_hide()` → `anchor.visible = false`.
  Test: `test_hide_op_sets_visible_false` — asserts `.visible == false`. COVERED
- AND relevant components arranged to answer the question:
  `_apply_arrange()` → `anchor.position = Vector3(x,y,z)`.
  Tests: `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`,
  `test_arrange_op_sets_all_three_axes` — assert real `.position` values. COVERED

**Scenario: Impact question** ("what depends on the user database?")
- THEN view showing user database and all its dependents:
  show op — `test_show_op_sets_visible_true`. COVERED
- AND dependency relationships are spatially clear:
  `_apply_connect()` adds ImmediateMesh line + CylinderMesh arrowhead (top_radius=0
  = pointed cone, direction indicates dependency flow).
  Test: `test_connect_op_adds_line_geometry` — asserts ≥1 MeshInstance3D on root. COVERED
  Test: `test_connect_op_adds_arrowhead` — asserts ≥2 MeshInstance3D (line + cone). COVERED

---

### Requirement: View Specs as Intermediate Representation — COVERED

**Code:**
- `parse_response()` returns a plain Dictionary with "question" and "operations" keys.
  No Node3D or geometry objects are produced by the LLM layer.
- `SceneInterpreter.apply(spec, anchors, scene_root, world_positions)` consumes the
  dict and mutates Node3D scene-tree properties. The renderer is separate from the parser.

**Scenario: LLM produces view spec**
- THEN emits structured view spec (not raw 3D geometry):
  Test: `test_parse_response_returns_dictionary` — asserts `result is Dictionary`. COVERED
- AND view spec controls show/hide/highlight/arrange/annotate/connect:
  Six pass-through tests (`test_parse_response_passes_through_show_op`, ..._hide_,
  ..._arrange_, ..._connect_, ..._highlight_, ..._annotate_) verify each op survives
  `parse_response()` intact. COVERED
- AND 3D renderer interprets the view spec into a spatial scene:
  All tests in `test_scene_interpreter.gd` instantiate real Node3D objects, call
  `apply()`, and assert actual scene-tree properties (`.visible`, `.position.x/y/z`,
  `albedo_color`, `label.billboard`, `label.pixel_size`).
  `test_all_six_ops_mutate_scene_correctly` exercises all 6 ops together and checks
  every resulting property. COVERED

---

### Requirement: Fixed Visual Primitive Set — COVERED

**Code:**
- `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` —
  compile-time constant in `llm_view_generator.gd`.
- `_make_spec()` silently drops any op not in `VALID_OPS`.
- `SceneInterpreter.apply()` uses a `match` with exactly 6 named arms; unrecognised
  ops fall through without effect.

**Scenario: LLM uses existing primitives**
- THEN composes answer from existing set (show/hide/highlight/arrange/annotate/connect):
  `build_prompt()` embeds VALID_OPS in the prompt text.
  Six tests (`test_build_prompt_contains_show_primitive`, ..._hide_, ..._highlight_,
  ..._arrange_, ..._annotate_, ..._connect_) assert each primitive name appears. COVERED
- AND no new rendering logic generated at runtime:
  Test: `test_parse_response_filters_unknown_ops` — "invent_new_renderer" op dropped,
  only "show" survives. COVERED
  Test: `test_parse_response_with_all_unknown_ops_returns_empty_operations` — all-unknown
  ops yield zero operations. COVERED
  Test: `test_unknown_op_is_ignored` — "teleport" op causes no crash and no scene mutation. COVERED

