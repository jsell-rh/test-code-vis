### Pattern-1 Wiring — Confirmed Correct

`test_system_purpose.gd` declares `var _test_failed: bool = false`, so
`run_tests.gd._run_one()` detects Pattern-1, resets `_test_failed`, calls each
`test_*` method, and checks `_test_failed` afterward. All 8 test functions are
`-> void` and signal failure exclusively through `_check()`. No bool-returning
test functions remain.

