## Independent Predicate Verification

### "reflects" algorithm-quality tests (check-reflects-mapping-consistency.sh PASS)

**`test_coupled_bcs_are_closer_than_uncoupled`** (file: extractor/tests/test_extractor.py):
- Fixture: 4 bounded contexts; auth→shared_kernel coupling edge; billing uncoupled to auth.
- Assert: `dist("auth", "shared_kernel") < dist("auth", "billing")`.
- Algorithm-quality confirmed: fixture VARIES coupling input; assert checks RELATIVE position ordering. ✓

**`test_complexity_and_coupling_both_reflected`** (file: extractor/tests/test_extractor.py):
- Fixture: big_ctx (100 LOC, imports ctx_c), small_ctx (1 LOC), ctx_c, ctx_d (uncoupled).
- Assert size: `bc_nodes["big_ctx"]["size"] > bc_nodes["small_ctx"]["size"]`.
- Assert position: `dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d)`.
- Algorithm-quality confirmed: fixture varies BOTH LOC and coupling simultaneously. ✓

**`test_mesh_sizes_proportional_to_metric`** (file: godot/tests/test_size_encoding.gd):
- Fixture: small_mod size=3.0, large_mod size=9.0.
- Assert: `abs(large_mesh.size.x / small_mesh.size.x - 3.0) < 0.001`.
- Algorithm-quality confirmed: fixture varies size input; assert checks exact ratio. ✓

### Compound THEN-clauses (check-compound-then-clause-coverage.sh PASS)

**"Godot application can load scene file and render it"** (2 tests):
- `test_main_writes_json_output`: CLI produces JSON with nodes/edges/metadata. Covers "extract to JSON". ✓
- `test_volumes_created_for_each_node`: build_from_graph() creates anchors. Covers "Godot renders". ✓

**"pan, zoom, and rotate the view"** (5 tests):
- `test_scroll_up_decreases_distance`: WHEEL_UP → target_distance < initial. Zoom in. ✓
- `test_scroll_down_increases_distance`: WHEEL_DOWN → target_distance > initial. Zoom out. ✓
- `test_orbit_horizontal_drag_changes_phi`: RMB drag → `_phi != initial_phi`. Azimuth rotation. ✓
- `test_orbit_vertical_drag_changes_theta`: RMB drag up → `_theta != initial_theta`. Polar tilt. ✓
- `test_pan_drag_right_increases_pivot_x`: LMB drag right → `_pivot.x > initial_x`. Pan. ✓

**"smoothly transition between overview and detail levels"** (2 tests):
- `test_zoom_is_interpolated_not_instantaneous`: one _process() frame lerps distance toward target. ✓
- `test_lod_integration_far_hides_modules_in_built_scene`: FAR LOD → module hidden, BC visible. ✓

### Pan direction verification

The diff shows task-034 changed `camera_controller.gd` pan sign from `-=` (map-grab) to `+=` (non-inverted):
- Old main: `_pivot -= right * delta.x` → drag right moves pivot LEFT.
- New task-034: `_pivot += right * delta.x` → drag right moves pivot RIGHT.

Tests `test_pan_drag_right_increases_pivot_x` and `test_pan_drag_left_decreases_pivot_x` correctly assert
the new non-inverted model. Derivation comments explain user-visible screen outcome. check-pan-grab-model-comments.sh PASS ✓.
The spec only requires "pan", not a specific direction model. Implementation is internally consistent. ✓

### main.gd _ready() verification

`_ready()` calls `FileAccess.open()` → `file.get_as_text()` → `JSON.new().parse()` →
`SceneGraphLoader.load_from_dict()` → `build_from_graph()`. Real file I/O and full scene construction.
NOT a stub. godot-fileaccess-tested.sh confirms FileAccess.open() exercised in 3 test files. ✓

