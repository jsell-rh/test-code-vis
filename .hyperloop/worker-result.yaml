### Requirement: Godot 4 — COVERED

**Implementation:**
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` (Godot 4.6).
- All source files are `.gd` GDScript files — no C#, C++, or other languages.

**Verification:**
- Project config explicitly declares Godot 4.x engine version.
- The test suite itself is written in GDScript with Godot 4 syntax (typed variables,
  `@export`, `@onready`), which would fail to compile under any earlier version.

**Scenario: Engine version** — verified by `project.godot` config and GDScript syntax.

