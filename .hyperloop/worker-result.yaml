### Requirement: Containment Rendering (SHALL)

**Implementation:**
- `_create_volume()` in `main.gd`: bounded_context type → `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`; module type → `albedo_color.a = 1.0`.
- Child anchor is attached to parent anchor via `parent_anchor.add_child(anchor)` — child is literally inside the parent in the scene tree and local-space coordinates.
- Bounded context `BoxMesh.size = Vector3(sz, sz*0.2, sz)` vs module `Vector3(sz, sz*0.6, sz)`: for the fixture (ctx size=10, mod size=3) ctx mesh.x=10 > mod mesh.x=3.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` — `transparency != TRANSPARENCY_DISABLED && alpha < 1.0`. ✓
- `test_module_is_opaque` — `alpha >= 1.0`. ✓
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`. ✓
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`. ✓
- `test_bounded_context_cull_disabled` — `cull_mode == CULL_DISABLED`. ✓

All Given/When/Then conditions match. **COVERED.**

