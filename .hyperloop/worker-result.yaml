### Fix Verification

**Commit `37f00db`** — "fix(task-028): convert 7 inert bool-return tests to _check() in Pattern-1 suite"

Read the diff directly. All 7 previously inert functions were converted:

| Function | Before | After | Correct? |
|---|---|---|---|
| `test_bounded_context_nodes_distinguishable_by_type` | `-> bool`, `return found_transparent_bc` | `-> void`, `_check(found_transparent_bc, …)` | ✓ |
| `test_node_size_grows_with_scene_graph_size_value` | `-> bool`, `return big_mesh_x > small_mesh_x` | `-> void`, `_check(big_mesh_x > small_mesh_x, …)` + early return guards converted | ✓ |
| `test_dependency_edges_expose_coupling_in_scene` | `-> bool`, `return found_line` | `-> void`, `_check(found_line, …)` | ✓ |
| `test_cross_context_edge_has_directional_arrowhead` | `-> bool`, `return true/false` in loop | `-> void`, accumulator flag + `_check(found_arrowhead, …)` | ✓ |
| `test_scene_graph_loader_reads_codebase_json` | `-> bool`, compound `return` | `-> void`, three separate `_check()` calls | ✓ |
| `test_structural_metrics_available_in_scene` | `-> bool`, `return has_size_encoded_box and has_edge_line` | `-> void`, two `_check()` calls | ✓ |
| `test_navigation_methods_exist_on_camera_controller` | `-> bool`, compound `return` | `-> void`, five `_check()` calls | ✓ |

Confirmed: no `-> bool` signatures remain in any `func test_` in `test_system_purpose.gd`. The file has 21 `_check()` calls across all 8 test functions.

