### Requirement: Size Encoding — COVERED

**Spec**: The application MUST encode complexity metrics as the visual size of volumes.

**Scenario**: Large module vs small module

**Implementation**: `godot/scripts/main.gd` → `_create_volume()`
- `var sz: float = float(nd["size"])` — JSON size field maps directly to mesh dimension.
- Module: `box.size = Vector3(sz, sz*0.6, sz)` — linear proportional mapping.
- Mesh width ratio equals input size ratio exactly (no clamping or offset applied).

**THEN clause verification:**
- "module with more code appears as a larger volume" → `box.size = Vector3(sz, sz*0.6, sz)` (line 148)
- "relative sizes are proportional to the metric" → direct linear `sz` mapping preserves ratio (line 131)

**Tests**: `godot/tests/test_size_encoding.gd` (2 tests)
