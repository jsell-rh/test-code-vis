### Requirement: Size Encoding — COVERED

**Implementation:** `godot/scripts/main.gd` → `_create_volume()`
- `sz = float(nd["size"])` used directly as `BoxMesh.size` dimensions
- Module: `box.size = Vector3(sz, sz * 0.6, sz)` → width proportional to metric
- Context: `box.size = Vector3(sz, sz * 0.2, sz)` → same proportionality rule

**Tests:** `godot/tests/test_size_encoding.gd`
- `test_large_module_has_bigger_mesh()` — asserts `large_mesh.size.x > small_mesh.size.x` ✓
- `test_mesh_sizes_proportional_to_metric()` — asserts ratio == 3.0 ± 0.001 (9.0/3.0) ✓

Both THEN clauses of the "Large module vs small module" scenario are covered.

