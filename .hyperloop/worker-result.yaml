## Implementation Summary

### camera_controller.gd

Implements all 5 MUST requirements from ux-polish.spec.md:

1. **Pan with Left Mouse Button**: `_handle_button` handles `MOUSE_BUTTON_LEFT` setting `_panning = true`; `_handle_motion` applies `_target_pivot -= right * delta.x * pan_amount` and `_target_pivot -= backward * delta.y * pan_amount`.

2. **Non-Inverted Movement (Google Maps convention)**: Drag left (delta.x < 0) subtracts `right * delta.x` which is `+right`, moving pivot rightward → scene shifts left (same as drag direction). Verified by `test_pan_direction_not_inverted`.

3. **Zoom Toward Mouse Cursor**: `_zoom_toward_point(world_pt, direction)` shifts `_target_pivot` toward/away from the cursor's world point using `zoom_ratio = _target_distance / old_dist`. Smooth animation via exponential lerp in `_process()`.

4. **Orbit Around Mouse Point**: `MOUSE_BUTTON_RIGHT` press calls `begin_orbit_at_world_point(world_pt)` which sets `_pivot = world_pt` and recomputes spherical coordinates so camera position is preserved.

5. **Smooth Camera Movement**: `_process()` uses `t = 1.0 - pow(0.05, delta * zoom_smooth)` exponential smoothing for distance and pivot — produces frame-rate-independent smooth interpolation. Pan applies immediately (proportional to drag distance, no latency).

### test_camera_controls.gd

18 tests covering all 10 THEN-clauses, 4 clamp boundaries, and additional orbit/scroll behavior. All 91 GDScript tests pass.
