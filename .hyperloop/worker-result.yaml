### Requirement: View Specs as Intermediate Representation — COVERED

The system MUST use a structured view specification as the intermediate representation between the LLM and the 3D renderer.

**Implementation:**
- `godot/scripts/view_spec.gd`: `ViewSpec.from_dict()` produces a normalised `Dictionary` (not geometry) from raw question+operations data.
- `question_panel.gd` `process_question()` returns `ViewSpec.from_dict(...)` — never a `Node` or geometry object.
- `view_spec_renderer.gd` `apply(graph, spec, root)` consumes the Dictionary and spawns `MeshInstance3D`, `Label3D`, and `Node3D` children into `root`.
- `main.gd` wires the signal so the spec flows from panel → renderer.

**Scenario: LLM produces view spec** — COVERED
- `test_process_question_returns_dictionary`: THEN emits a Dictionary (not raw geometry).
- `test_process_question_spec_has_question_key` / `test_process_question_spec_has_operations_array`: AND view spec structure (question + operations) verified.
- `test_renderer_can_apply_auth_spec_to_scene`: AND 3D renderer interprets spec — asserts `auth_service` MeshInstance3D exists in scene tree.
- `test_renderer_can_apply_impact_spec_to_scene`: AND renderer produces nodes for user_db and auth_service from impact spec.

---

### Requirement: Fixed Visual Primitive Set — COVERED

The set of visual primitives available in view specs MUST be fixed and finite; the LLM selects from available primitives and does not invent new ones.

**Implementation:**
- `view_spec.gd`: `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` — exactly the set named in the spec.
- `ViewSpec.from_dict()` silently drops any op whose `"op"` key is not in `VALID_OPS`.
- `question_panel.gd` `process_question()` only emits ops from `VALID_OPS`.
- `view_spec_renderer.gd` only handles ops from `VALID_OPS`.

**Scenario: LLM uses existing primitives** — COVERED
- `test_all_ops_in_auth_spec_are_valid_primitives`: All ops in architectural question spec are members of `ViewSpec.VALID_OPS`.
- `test_all_ops_in_impact_spec_are_valid_primitives`: All ops in impact question spec are members of `ViewSpec.VALID_OPS`.
- Both tests iterate over returned operations and assert each `op` key is in the fixed set — runtime enforcement verified.

