### Requirement: Godot 4.6 — COVERED

The application MUST be built using Godot 4.6.x with GDScript. All API calls MUST be
compatible with the Godot 4.6 API.

**Implementation**: `project.godot` declares `config/features=PackedStringArray("4.6")`.
All files in `godot/scripts/` use `.gd` extension. `FileAccess.open()` + `get_as_text()`
used throughout (not the removed `read_as_text()`).

**Scenario: Engine version**

| THEN-clause | Test | Status |
|---|---|---|
| uses Godot 4.6.x | `test_project_godot_declares_46` reads project.godot via FileAccess.open() + get_as_text(), asserts "4.6" in text | COVERED |
| all scripts use GDScript | `test_scripts_dir_contains_only_gdscript` uses DirAccess to iterate res://scripts/ and asserts every non-directory file ends with ".gd" | COVERED |
| all API calls valid for Godot 4.6 API | `test_features_line_contains_46` asserts PackedStringArray("4.6") in project.godot; `test_fileaccess_open_returns_non_null` exercises get_as_text() successfully confirming 4.6 API is functional | COVERED |

