## Pipeline Wiring (manual, `check-pipeline-wiring.sh` absent)

`check-pipeline-wiring.sh` does not exist in this project's `.hyperloop/checks/`. The
two-stage pipeline is verified directly:

1. **Extractor** (`extractor/extractor.py` / `extractor/__main__.py`): produces a JSON
   scene graph with `nodes`, `edges`, and `metadata` keys.
2. **Godot consumer** (`godot/scripts/main.gd` → `_ready()`): opens the JSON file via
   `FileAccess.open()` + `get_as_text()`, parses it with `JSON.new()`, delegates to
   `SceneGraphLoader.load_from_dict()`, then calls `build_from_graph()` which iterates every
   node (creating volumes) and every edge (creating line + arrowhead). The consumer stage is
   fully wired: there is no disconnected producer.

