Implemented all requirements from specs/extraction/code-extraction.spec.md.

## What was built

### extractor/extractor.py
Core extraction pipeline covering every spec requirement:
- **Module Discovery**: `discover_bounded_contexts()` finds all top-level Python packages
  that are not excluded directories (tests, docs, util, etc.). `discover_submodules()`
  finds internal layers (domain, application, infrastructure, ports, presentation).
- **Dependency Extraction**: `build_dependency_edges()` parses every Python file via the
  `ast` module and creates cross-context edges at the bounded-context level (e.g.
  `graph â†’ shared_kernel`) and internal edges at the module level (e.g.
  `iam.application â†’ iam.domain`). Duplicates are deduplicated with a set.
- **Complexity Metrics**: `compute_loc()` counts Python source lines recursively.
  `size_from_loc()` derives a normalised visual size. Both are stored in the node's
  `metrics.loc` field and the `size` field respectively.
- **Layout**: `compute_layout()` arranges bounded contexts in a circle and modules in
  smaller per-context circles at y=1 so child nodes appear above/inside their parent.
- **Spec Extraction**: `extract_spec_nodes()` parses a `specs/index.spec.md` (or scans
  the specs/ directory) and creates nodes with `type='spec'` so they are
  distinguishable from code-derived nodes. Enabled via `--specs` CLI flag.

### extractor/__main__.py
CLI entry point: `python -m extractor <src_path> [--output file.json] [--specs]`

### extractor/schema.py (updated)
Added `NodeMetrics` TypedDict and `"spec"` to `NodeType`. The new `metrics` field on
`Node` is `NotRequired` so existing tests continue to pass without modification.

### extractor/tests/test_extractor.py
93 tests total (57 new + 36 existing schema tests). All requirements are covered with
hermetic tests using `tmp_path` fixtures â€” no dependency on the live kartograph checkout.

