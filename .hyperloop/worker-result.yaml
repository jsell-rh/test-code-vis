### Requirement: Smooth Camera Movement — **COVERED**

**MUST** all transitions be smooth with no snapping.

Implementation (`_process`, line 42–47):
```
var t: float = 1.0 - pow(0.05, delta * zoom_smooth)
_distance = lerpf(_distance, _target_distance, t)
_pivot = _pivot.lerp(_target_pivot, t)
```
Scroll events only set `_target_distance`/`_target_pivot`; actual `_distance`/`_pivot`
interpolate each frame. Pan sets `_pivot = _target_pivot` immediately for zero-latency
proportional response.

Scenario — *Smooth zoom* (interpolated, not instantaneous):
- `test_smooth_zoom_target_differs_from_distance_after_scroll` — after WHEEL_UP,
  `_target_distance < _distance` (target changed, actual hasn't yet). ✓
- `test_smooth_zoom_process_interpolates_distance` — sets `_target=20, _distance=40`,
  calls `_process(0.1)`, asserts `20 < _distance < 40`. ✓

Scenario — *Smooth pan* (smooth and proportional to drag speed):
- `test_pan_applied_immediately_no_lag` — after LMB drag, `_pivot.is_equal_approx(_target_pivot)`. ✓
- `test_pan_proportional_to_drag_speed` — 10px drag vs 50px drag; asserts
  `cam_fast._pivot.length() > cam_slow._pivot.length()`. ✓

