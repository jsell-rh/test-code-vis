### Requirement: Dependency Rendering — COVERED

**Implementation:** `godot/scripts/main.gd`
- `_create_edge()` (lines 172-228):
  - Creates an `ImmediateMesh` with `PRIMITIVE_LINES` connecting `from_pos` to `to_pos`.
  - Creates a `CylinderMesh` with `top_radius=0.0` (arrowhead cone) positioned at the
    target end, oriented along the edge direction to indicate dependency flow.
  - Cross-context edges: `Color(1.0, 0.50, 0.10)` (orange); internal: `Color(0.55, 0.55, 0.55)` (grey).

**Scenario: Rendering a cross-context dependency — all THEN clauses tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| line connects the two volumes | `test_edge_line_mesh_created` | finds `child.mesh is ImmediateMesh` on main node |
| direction is visually indicated | `test_direction_indicator_cone_created` | finds `CylinderMesh with top_radius == 0.0` |
| cone near target end | `test_direction_cone_near_target` | `cone.position.distance_to(target_pos) < 2.0` |
| cross-context color (orange) | `test_cross_context_cone_is_orange` | `albedo_color.r > 0.8 and albedo_color.b < 0.3` |

All four tests pass.

