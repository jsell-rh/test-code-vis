### F3a — RACF (cycles 5-11, 7th consecutive cycle): absolute coordinates in layout.py

check-relative-position-tests.sh [EXIT 1 FAIL] (first condition)

layout.py lines 92-93 accumulate parent world coordinates into child positions:
  parent_pos[0] + math.cos(angle) * offset_r   # stores ABSOLUTE x
  parent_pos[1] + math.sin(angle) * offset_r   # stores ABSOLUTE z

The spec requires LOCAL offsets. Godot's main.gd resolves world positions by adding
parent world pos + child local offset. Storing absolute coordinates would produce
double-offset rendering.

Note: extractor.py's compute_layout correctly stores local offsets (its comment
explicitly documents this). The bug exists only in the dead layout.py module. It is
caught because check-relative-position-tests.sh scans all Python files.

Fix: Option A (delete layout.py) or Option B (fix layout.py before importing it):
  pos[child["id"]] = [
      math.cos(angle) * offset_r,   # local x offset only
      math.sin(angle) * offset_r,   # local z offset only
  ]

