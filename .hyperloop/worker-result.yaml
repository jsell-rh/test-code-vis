### Requirement: Orbit Around Mouse Point ‚Äî COVERED

**Implementation** (`camera_controller.gd` lines 75‚Äì80, 110‚Äì120):
On `MOUSE_BUTTON_RIGHT` press, calls `_set_orbit_pivot(_mouse_to_ground(event.position))`,
which sets `_pivot = world_point` and recalculates spherical coordinates from
current camera position. Subsequent orbit motion (`_handle_motion` orbiting
block) changes only `_phi` and `_theta`; `_pivot` is not moved.

**Scenario: Orbiting around a component**
- THEN camera orbits around point under cursor ‚Üí `test_orbit_pivot_set_to_cursor_point_at_start`
- AND component remains at visual center ‚Üí `test_orbit_pivot_is_used_during_orbit`,
  `test_component_remains_at_visual_center_during_orbit`

| THEN-clause | Test | Status |
|---|---|---|
| Pivot set to cursor world-point at orbit start | `test_orbit_pivot_set_to_cursor_point_at_start` | PASS |
| Pivot unchanged during orbit motion | `test_orbit_pivot_is_used_during_orbit` | PASS |
| Component remains at visual center | `test_component_remains_at_visual_center_during_orbit` | PASS |

