### R5: Smooth Camera Movement (MUST) — COVERED

**Code:** `godot/scripts/camera_controller.gd`
- Lines 42–47 (`_process`): Exponential smoothing: `t = 1.0 - pow(0.05, delta * zoom_smooth)`,
  `_distance = lerpf(_distance, _target_distance, t)`, `_pivot = _pivot.lerp(_target_pivot, t)`.
  Scroll events only mutate `_target_*` fields; actual values interpolate every frame → smooth.
- Lines 155–159 (pan): Applied immediately, proportional to drag delta — no snapping.

**Scenario: Smooth zoom**

| THEN clause | Test | File |
|---|---|---|
| Zoom animated smoothly (not instantaneous) | `test_smooth_zoom_target_differs_from_distance_after_scroll` | test_camera_controls.gd |
| Zoom animated smoothly (_process interpolates) | `test_smooth_zoom_process_interpolates_distance` | test_camera_controls.gd |

`test_smooth_zoom_target_differs_from_distance_after_scroll`: After scroll-up asserts
`_target_distance < _distance` (target moved, current has not yet caught up).
`test_smooth_zoom_process_interpolates_distance`: `_distance=40, _target_distance=20`;
`_process(0.1)` → asserts `20 < _distance < 40` (partial interpolation in one frame).

**Scenario: Smooth pan**

| THEN clause | Test | File |
|---|---|---|
| Pan smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | test_camera_controls.gd |

Two instances: 10 px drag vs 50 px drag; asserts `cam_fast._pivot.length() > cam_slow._pivot.length()`.

