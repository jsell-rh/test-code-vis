| View shows the user database and all its dependents | `_apply_show()` sets `anchor.visible = true` | `test_show_op_sets_visible_true` (question fixture: "what depends on the user database?") |
| Dependency relationships spatially clear | `_apply_connect()` adds ImmediateMesh line + CylinderMesh arrowhead (top_radius=0) to scene_root | `test_connect_op_adds_line_geometry` (≥1 MeshInstance3D on root), `test_connect_op_adds_arrowhead` (≥2 MeshInstance3D) |

