## Requirement: Dependency Rendering — COVERED

**Spec**: MUST render dependency edges as visible lines between connected nodes.

**Implementation** (`godot/scripts/main.gd → _create_edge()`):
- `ImmediateMesh` with `PRIMITIVE_LINES` connecting `from_pos` to `to_pos` — visible line.
- `CylinderMesh` with `top_radius=0.0` (cone/arrowhead) placed at target end, oriented along
  edge direction — visually indicates dependency direction.

**Tests** (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — asserts ImmediateMesh MeshInstance3D exists ✓
- `test_direction_indicator_cone_created` — asserts CylinderMesh with `top_radius == 0.0` ✓
- `test_direction_cone_near_target` — asserts cone within 2 units of target position ✓
- `test_cross_context_cone_is_orange` — asserts `albedo_color.r > 0.8 and .b < 0.3` ✓

