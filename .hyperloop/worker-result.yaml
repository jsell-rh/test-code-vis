### Requirement: JSON Scene Graph Loading — COVERED

**Implementation**: `main.gd._ready()` uses `FileAccess.open(scene_graph_path, FileAccess.READ)` +
`file.get_as_text()` (Godot 4.6 API), parses via `JSON.new()` + `json.parse()`, delegates to
`SceneGraphLoader.load_from_dict(json.data)`, then calls `build_from_graph(graph)`.
`build_from_graph()` iterates nodes (parents first, then children) calling `_create_volume()`,
then iterates edges calling `_create_edge()`. Positions are set directly from JSON:
`anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))`.

**Scenario: Loading kartograph's scene graph** — covered by `test_scene_graph_loading.gd` (5 tests):
- THEN it reads the JSON file: `test_scene_graph_loading.gd` exercises `build_from_graph()` which
  is the logic invoked by `_ready()` after file read; `test_engine_version.gd` also exercises
  `FileAccess.open()` + `get_as_text()` directly.
- AND generates 3D volumes for each node: `test_volumes_created_for_each_node()` asserts
  `_anchors.has("ctx1") and _anchors.has("mod1")`; `test_mesh_instances_exist_in_anchors()`
  confirms each anchor contains a MeshInstance3D child.
- AND generates connections for each edge: `test_edge_mesh_instances_created()` asserts ≥2
  MeshInstance3D direct children on the main node (1 ImmediateMesh line + 1 CylinderMesh arrowhead).
- AND positions elements according to the layout data: `test_anchor_positions_match_json()` asserts
  `anchor.position.is_equal_approx(Vector3(...))` against fixture JSON values for both nodes.

