## Evidence Summary

### Python extractor (96 tests pass)
- `test_main_writes_json_output`: Calls `main()`, asserts exit 0, file exists, valid JSON
  with nodes/edges/metadata keys. Covers "JSON scene graph file is produced".
- `test_kartograph_integration_bounded_contexts`: Runs extractor against real kartograph
  codebase at `~/code/kartograph/src/api`; asserts iam, graph, shared_kernel contexts
  present. Covers "kartograph's structure is visualized in 3D space". Test is marked
  skipif when the path is absent (CI guard) — correctly handles both environments.
- `test_kartograph_extraction_produces_modules`: Asserts ≥1 module-level node from
  kartograph, confirming the visualization reflects actual internal structure.
- `test_coupled_bcs_are_closer_than_uncoupled`: Algorithm-quality test. Fixture with 4
  BCs where auth↔shared_kernel have cross-context imports; billing has none to auth.
  Asserts dist(auth,shared_kernel) < dist(auth,billing). Covers coupling-aware layout.

### GDScript behavioral tests (97 tests pass)
- `test_initial_theta_is_near_top_down`: `_theta = 0.15 rad ≈ 8.6°` (< PI/4 ≈ 45°);
  confirms initial top-down camera. Covers Top-Down Architectural View.
- `test_volumes_created_for_each_node` / `test_mesh_instances_exist_in_anchors`:
  Confirms `build_from_graph()` creates an `_anchors` entry and a `MeshInstance3D`
  child for every JSON node. Together cover "Godot loads and renders the scene".
- `test_mesh_sizes_proportional_to_metric`: Fixture size=9 vs size=3; asserts
  `BoxMesh.size.x` ratio ≈ 3.0 ±0.001. Covers size-encodes-complexity.
- `test_module_parented_inside_context`: `mod_anchor.get_parent() == ctx_anchor`.
  Covers containment-shown-by-nesting.
- `test_bounded_context_is_translucent` / `test_module_is_opaque`: Context alpha < 1.0
  with TRANSPARENCY_ALPHA; module alpha ≥ 1.0. Covers labeled geometric volume.
- `test_labels_are_billboard_and_readable`: `billboard == BILLBOARD_ENABLED`,
  `pixel_size > 0`, `no_depth_test == true`. Covers readable labels at all zoom levels.
- `test_edge_line_mesh_created`: `ImmediateMesh` child exists after `_create_edge()`.
  Covers dependency line connection.
- `test_direction_indicator_cone_created` / `test_direction_cone_near_target`:
  `CylinderMesh` with `top_radius == 0.0` (arrowhead) exists and is within 2 units of
  target endpoint. Covers direction of dependency discernible.
- `test_lmb_pan_moves_pivot` / `test_scroll_up_decreases_distance` /
  `test_orbit_horizontal_drag_changes_phi`: Three distinct gestures (LMB drag, scroll
  wheel, RMB drag) each mutate separate camera state variables. Covers pan + zoom +
  rotate navigation.
- `test_far_distance_shows_only_bounded_contexts` / `test_medium_distance_shows_modules`:
  LOD thresholds verified at FAR+10 (only BC visible) and midpoint between NEAR/FAR
  (both BC and module visible). Covers smooth overview↔detail transitions.
- `test_zoom_is_interpolated_not_instantaneous`: `_distance != _target_distance`
  immediately after scroll (lerp not yet applied); confirms smooth animated zoom.
- `check-not-in-scope.sh EXIT 0` + independent grep for conformance/evaluation/
  simulation/data_flow/moldable/first_person/build_prompt/parse_response: zero matches
  in extractor/ or godot/ source or test files. Covers "Not In Scope" requirement.

