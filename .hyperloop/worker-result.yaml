### Requirement: Smooth Camera Movement ‚Äî COVERED

**Implementation** (`camera_controller.gd` lines 50‚Äì56, `_process`):
Zoom events set `_target_distance` only. `_process(delta)` interpolates:
```gdscript
var t: float = min(zoom_smoothing * delta, 0.9)
_distance = lerp(_distance, _target_distance, t)
```
Pan is instantaneous per-frame (proportional to drag delta), matching the spec's
"proportional to drag speed" requirement.

**Scenario: Smooth zoom**
- THEN zoom interpolated not instantaneous ‚Üí `test_zoom_is_interpolated_not_instantaneous`
  verifies `_distance` unchanged immediately after scroll event, then moves
  partially toward target after one `_process(0.016)` call.

**Scenario: Smooth pan**
- THEN pan proportional to drag speed ‚Üí `test_pan_proportional_to_drag_speed`
  verifies a 50px drag moves pivot 5√ó further than a 10px drag.

| THEN-clause | Test | Status |
|---|---|---|
| Zoom interpolated (lerp), not instantaneous | `test_zoom_is_interpolated_not_instantaneous` | PASS |
| Pan proportional to drag speed | `test_pan_proportional_to_drag_speed` | PASS |

