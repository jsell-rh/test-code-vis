## Requirement Trace

### Requirement: JSON Scene Graph Loading — COVERED

Implementation: `godot/scripts/main.gd`
- `_ready()` opens JSON via `FileAccess.open()` + `file.get_as_text()` (Godot 4.6 API)
- Parses with `JSON.new()` + `json.parse()`
- Calls `SceneGraphLoader.load_from_dict(json.data)` then `build_from_graph(graph)`
- `build_from_graph()` creates Node3D anchors for every node, positions them from
  JSON `position.{x,y,z}`, and calls `_create_edge()` per edge entry

Tests in `godot/tests/test_scene_graph_loading.gd`:
- `test_volumes_created_for_each_node` — asserts `_anchors` contains every node id
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a MeshInstance3D child
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D on main node per edge
- `test_anchor_positions_match_json` — asserts anchor.position == JSON position field
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED, pixel_size>0, no_depth_test

Tests in `godot/tests/test_node_renderer.gd`:
- `test_node_rendered_at_json_position` — verifies iam node at exact JSON coordinates
- `test_second_node_rendered_at_json_position` — rules out single-node special case
- `test_no_layout_recomputed_in_godot` — confirms no Godot-side layout algorithm

Test in `godot/tests/test_engine_version.gd`:
- `test_fileaccess_open_returns_non_null` — exercises FileAccess.open() path from main.gd

### Requirement: Containment Rendering — COVERED

Implementation: `godot/scripts/main.gd` → `_create_volume()`
- bounded_context: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`
- module: `albedo_color.a = 1.0` (fully opaque), no cull override
- Children parented to `parent_anchor` (the context's Node3D), not scene root

Tests in `godot/tests/test_containment_rendering.gd`:
- `test_bounded_context_is_translucent` — asserts transparency != DISABLED and alpha < 1
- `test_module_is_opaque` — asserts module material alpha >= 1.0
- `test_module_parented_inside_context` — asserts mod_anchor.get_parent() == ctx_anchor
- `test_bounded_context_larger_than_module` — asserts ctx BoxMesh.size.x > mod BoxMesh.size.x
- `test_bounded_context_cull_disabled` — asserts CULL_DISABLED on context material

### Requirement: Dependency Rendering — COVERED

Implementation: `godot/scripts/main.gd` → `_create_edge()`
- Builds ImmediateMesh with PRIMITIVE_LINES, two vertices (from_pos, to_pos)
- Builds CylinderMesh arrowhead: `top_radius=0.0` (pointed tip), placed near to_pos
- Arrowhead oriented along edge direction via `Basis(Quaternion(Vector3.UP, dir))`
- Cross-context edges colored orange, internal edges grey

Tests in `godot/tests/test_dependency_rendering.gd`:
- `test_edge_line_mesh_created` — finds ImmediateMesh MeshInstance3D among main_node children
- `test_direction_indicator_cone_created` — finds CylinderMesh with top_radius==0.0
- `test_direction_cone_near_target` — asserts cone position within 2 units of target
- `test_cross_context_cone_is_orange` — asserts R > 0.8 and B < 0.3 on cross_context edge material

### Requirement: Size Encoding — COVERED

Implementation: `godot/scripts/main.gd` → `_create_volume()`
- `sz := float(nd["size"])` used directly as `BoxMesh.size = Vector3(sz, sz*0.6, sz)`
- So mesh width ratio equals the input size ratio exactly

Tests in `godot/tests/test_size_encoding.gd`:
- `test_large_module_has_bigger_mesh` — asserts large_mesh.size.x > small_mesh.size.x
- `test_mesh_sizes_proportional_to_metric` — asserts ratio == 9.0/3.0 within 0.001 tolerance

### Requirement: Camera Controls — COVERED

Implementation: `godot/scripts/camera_controller.gd`
- Initial `_theta = 0.15` (≈8.6° from directly above, satisfies "top-down")
- `MOUSE_BUTTON_WHEEL_UP/DOWN` adjusts `_distance` (zoom)
- `MOUSE_BUTTON_MIDDLE` drag adjusts `_phi` (azimuth) and `_theta` (polar)
- `_theta` clamped to `[0.01, PI-0.01]` preventing camera flip
- `_distance` clamped to `[min_distance, max_distance]`
- `Label3D` nodes use `BILLBOARD_ENABLED`, `pixel_size=0.012`, `no_depth_test=true`

Tests in `godot/tests/test_camera_controls.gd`:
- `test_initial_theta_is_near_top_down` — asserts _theta < PI/4
- `test_scroll_up_decreases_distance` — WHEEL_UP event decreases _distance
- `test_orbit_horizontal_drag_changes_phi` — horizontal drag changes _phi
- `test_orbit_vertical_drag_changes_theta` — vertical drag changes _theta
- `test_orbit_theta_clamped_prevents_flip` — 1M-px drag; asserts theta <= PI-0.01
- `test_zoom_clamped_at_minimum` — 200× scroll-up; asserts _distance >= min_distance

Test in `godot/tests/test_scene_graph_loading.gd`:
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED + pixel_size>0 + no_depth_test

