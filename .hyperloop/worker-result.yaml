## Spec Alignment Review: Godot Application Specification

All six MUST requirements are implemented in `godot/scripts/` and covered by
GDScript behavioral tests in `godot/tests/`. Every test exercises known fixture
data and asserts runtime outputs (scene-tree nodes, property values, positions)
— not merely Godot compilation (`--headless --quit`).

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:** `godot/scripts/main.gd`
- `_ready()` opens the JSON file with `FileAccess.open()` + `get_as_text()`.
- `SceneGraphLoader.load_from_dict()` (scene_graph_loader.gd) parses the raw dict.
- `build_from_graph()` iterates nodes to create 3D anchors/volumes, then iterates
  edges to call `_create_edge()`, and calls `_frame_camera()` afterwards.
- World-space positions are resolved from JSON `position` fields (no recomputation).

**Tests:** `godot/tests/test_scene_graph_loading.gd`
- `test_volumes_created_for_each_node()` — GIVEN fixture with 2 nodes, THEN
  `_anchors` contains both node ids.
- `test_mesh_instances_exist_in_anchors()` — each anchor contains a MeshInstance3D.
- `test_edge_mesh_instances_created()` — at least 2 MeshInstance3D children exist
  on the main node (line + arrowhead cone per edge).
- `test_anchor_positions_match_json()` — local positions on anchors equal the JSON
  `position` fields exactly.
- `test_labels_are_billboard_and_readable()` — Label3D uses BILLBOARD_ENABLED,
  pixel_size > 0, no_depth_test = true.

---

### Requirement: Containment Rendering — COVERED

**Implementation:** `godot/scripts/main.gd::_create_volume()`
- `bounded_context` nodes: BoxMesh with `TRANSPARENCY_ALPHA`, `alpha = 0.18`,
  `CULL_DISABLED`.
- `module` nodes: BoxMesh with `alpha = 1.0` (opaque).
- Child nodes are parented to their parent's anchor Node3D, placing them visually
  inside the parent volume.
- Context size is larger than module size because `sz` is taken directly from the
  JSON `size` field (extractor sets context sizes larger).

**Tests:** `godot/tests/test_containment_rendering.gd`
- `test_bounded_context_is_translucent()` — material transparency != DISABLED,
  albedo_color.a < 1.
- `test_module_is_opaque()` — module material albedo_color.a >= 1.
- `test_module_parented_inside_context()` — module anchor's parent == context anchor.
- `test_bounded_context_larger_than_module()` — context BoxMesh.size.x > module's.
- `test_bounded_context_cull_disabled()` — context material uses CULL_DISABLED,
  making it visually distinct from child nodes (which use default back-face culling).

