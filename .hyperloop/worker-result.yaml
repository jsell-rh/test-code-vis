| Edge Schema              | Cross-context dependency edge         | COVERED |
| Edge Schema              | Internal dependency edge              | COVERED |
| Metadata                 | Extraction metadata                   | COVERED |
| Pre-Computed Layout      | Layout in JSON (xyz present)          | COVERED |
