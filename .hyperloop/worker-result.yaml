### Requirement: Dependency Rendering (SHALL)

**Implementation:**
- `_create_edge()` in `main.gd`:
  - Builds `ImmediateMesh` with `PRIMITIVE_LINES` between `_world_positions[src]` and `_world_positions[tgt]`.
  - Builds `CylinderMesh` with `top_radius=0` (cone/arrowhead) placed at `to_pos - dir * (height*0.5)`, oriented along the edge direction.
  - Cross-context edges use `Color(1.0, 0.50, 0.10)` (orange); internal use grey.

**Tests** (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — finds `MeshInstance3D` with `ImmediateMesh` mesh among main node's children. ✓
- `test_direction_indicator_cone_created` — finds `MeshInstance3D` with `CylinderMesh` where `top_radius == 0.0`. ✓
- `test_direction_cone_near_target` — cone `.position.distance_to(Vector3(20,0,0)) < 2.0`. ✓
- `test_cross_context_cone_is_orange` — cone material `albedo_color.r > 0.8 && .b < 0.3`. ✓

All Given/When/Then conditions match. **COVERED.**

