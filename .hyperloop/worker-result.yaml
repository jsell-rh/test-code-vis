## THEN→Test Mapping

Verified by reading test_ux_polish.gd (godot/tests/test_ux_polish.gd) and
camera_controller.gd (godot/scripts/camera_controller.gd) in full.

| Scenario | THEN-clause | Mapped test | Predicate verified |
|---|---|---|---|
| Panning the view | camera pans in direction of drag | `test_lmb_pan_moves_pivot` | Asserts pivot != initial_pivot after LMB+drag ✓ |
| Panning / Non-Inverted | movement direction not inverted (drag right) | `test_pan_drag_right_decreases_pivot_x` | drag right → delta.x=+50 → `_pivot -= right*50*pan` → pivot.x < initial ✓ |
| Panning / Non-Inverted | movement direction not inverted (drag left) | `test_pan_drag_left_increases_pivot_x` | drag left → delta.x=-50 → `_pivot += right*50*pan` → pivot.x > initial ✓ |
| Drag direction matches view | scene moves same direction as drag (i.e. parenthetical) | `test_drag_direction_matches_view_movement` | drag right → pivot.x decreases → camera shifts left → objects appear shift right (same as drag) ✓ |
| Zooming into component | view zooms toward point under cursor | `test_zoom_toward_cursor_shifts_pivot_toward_cursor` | zoom in → target_dist decreases → zoom_fraction>0 → pivot lerps toward cursor ✓ |
| Zooming into component | component stays under cursor during zoom | `test_component_stays_under_cursor_on_zoom_in`, `test_zoom_cursor_at_pivot_does_not_shift_pivot` | after > before (pivot moved toward cursor); cursor==pivot → no movement ✓ |
| Zooming out | view zooms out from point under cursor | `test_zoom_out_from_cursor_shifts_pivot_away` | zoom out → target_dist increases → zoom_fraction<0 → pivot lerps away from cursor ✓ |
| Orbiting around component | camera orbits around point under cursor at orbit start | `test_orbit_pivot_set_to_cursor_point_at_start` | `_set_orbit_pivot(world_point)` → asserts `_pivot == world_point` ✓ |
| Orbiting around component | component remains at visual center during orbit | `test_component_remains_at_visual_center_during_orbit`, `test_orbit_pivot_is_used_during_orbit` | orbit motion changes angles but not _pivot; asserts pivot unchanged ✓ |
| Smooth zoom | zoom animated smoothly (interpolated) | `test_zoom_is_interpolated_not_instantaneous` | wheel event sets _target_distance but not _distance; after _process(0.016) distance moved partway ✓ |
| Smooth pan | pan proportional to drag speed | `test_pan_proportional_to_drag_speed` | 50px drag produces larger pivot offset than 10px drag (move2 > move1) ✓ |

**Direction derivation for the spec's i.e. parenthetical** (independently derived before reading tests):
- Spec: "dragging left reveals content to the right, as in Google Maps"
- Derivation: drag left → delta.x = −50 → `_pivot -= right*(−50)*pan` → pivot.x INCREASES
  → camera shifts right → fixed world objects appear to shift LEFT on screen
  → content that was off-screen to the right slides INTO view from the right ✓
- Test predicate: `cam._pivot.x > initial_x` — matches derivation ✓

**Constraint boundary tests** (bonus, correctly implemented):
- `test_target_distance_clamped_at_minimum` / `test_target_distance_clamped_at_maximum`
- `test_theta_clamped_at_minimum` / `test_theta_clamped_at_maximum`

## Findings

**Engine-level `ERROR:` messages during headless pan tests (informational, not blocking)**

During test execution of test_ux_polish.gd, the Godot engine emits:
```
ERROR: Condition "!is_inside_tree()" is true. Returning: Transform3D()
```
at `camera_controller.gd:145` and `:146` (`global_transform.basis.x` / `.z`) for pan
tests. These are engine-level errors (not `SCRIPT ERROR:`), and they do NOT abort test
function execution. The implementation's `_handle_motion` reads `global_transform.basis`
for the camera's local right/forward vectors. In headless mode the camera is not in the
scene tree, so `global_transform` falls back to identity (`Transform3D()`) — yielding
`basis.x = (1,0,0)` and `basis.z = (0,0,1)`. The test comments document this explicitly
and assert accordingly. All pan tests complete and return the correct bool result.
`check-godot-no-script-errors.sh` checks for `SCRIPT ERROR:` specifically and exits 0.
**This is not a defect** — it is the expected headless fallback, correctly anticipated by
the test design.

