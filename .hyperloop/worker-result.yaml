## Findings

### F1 — RACF: layout.py dead code (cycles 5-6-7 → cycle 8, blocking)

extractor/layout.py exports compute_layout() but NO non-test Python file imports it.
The production code path is: __main__.py → extractor.extractor.build_scene_graph()
→ extractor.extractor.compute_layout() (defined at line 189 of extractor.py).
extractor/layout.py is never reached at runtime.

Evidence:
  grep -rn "from extractor.layout|import layout" extractor/ --include="*.py" | grep -v test
  → (no output)

The prescribed fix from cycle 7 was not applied. The branch shows no implementation
commits between the cycle-7 review (c41b0165) and the orchestrator cleanup (af06de32).
The implementation commit a947f3fd added layout.py and test_layout.py but did not
wire layout.py into the production import chain.

Fix (choose one):
  Option A: Delete extractor/layout.py. Fix compute_layout directly in extractor.py
            (address F3a and F4 there). Add a relative-offset assertion test
            to test_extractor.py.
  Option B: In extractor.py, replace the compute_layout definition at line 189 with
            'from extractor.layout import compute_layout'. Reconcile the signature
            difference (layout.py returns dict[str, Position]; extractor.py version
            mutates nodes in-place). Fix F3a in layout.py before wiring.

### F2 — RACF: compute_layout duplicate (cycles 5-6-7 → cycle 8, blocking)

compute_layout is defined as a top-level function in BOTH:
  extractor/extractor.py line 189
  extractor/layout.py line 24

These are structurally different implementations with different signatures:
  extractor.py: compute_layout(nodes, edges=None) -> None  (mutates in-place)
  layout.py:    compute_layout(nodes, edges) -> dict[str, Position]  (returns dict)

Fixing F1 (Option A or B) resolves F2 as a side-effect.

### F3a — RACF: Absolute coordinates in layout.py (cycles 5-6-7 → cycle 8, blocking)

layout.py lines 89-92 accumulate parent world coordinates into child position:
  pos[child["id"]] = [
      parent_pos[0] + math.cos(angle) * offset_r,   # ABSOLUTE — adds parent x
      parent_pos[1] + math.sin(angle) * offset_r,   # ABSOLUTE — adds parent z
  ]

The spec requires module positions to be LOCAL OFFSETS (relative to parent).
Although layout.py is currently dead code (F1), the pattern is still a FAIL because:
  (a) it would cause double-offset rendering if ever wired in (Godot's main.gd
      adds parent world position at render time)
  (b) check-relative-position-tests.sh scans ALL extractor Python files

Fix: remove parent_pos from child position:
  pos[child["id"]] = [
      math.cos(angle) * offset_r,
      math.sin(angle) * offset_r,
  ]

Note: extractor.py's compute_layout correctly stores local offsets (confirmed at lines
229-235: _circular_positions returns origin-centred positions, no parent offset added).

### F3b — RACF: No relative-offset assertion test (cycles 5-6-7 → cycle 8, blocking)

All existing child-position tests use proximity assertions only:
  test_layout.py::TestChildNodesWithinParentBounds: asserts dist <= parent_size
  test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position: asserts dist < bc_radius

Neither test places the parent at a non-zero world position and then asserts
child["position"]["x"] == local_offset_x. A proximity test passes for BOTH
absolute and relative coordinate storage when the offset is small — it provides
no assurance that the STORED value is the local offset.

Required test (add to whichever file exercises the production compute_layout):
  1. Create fixture where parent BC lands at a non-zero world position (e.g., x ≠ 0)
  2. Assert child["position"]["x"] == approx(local_offset_x) (NOT parent_x + offset)
  3. Optionally assert child["position"]["x"] != approx(parent_x + local_offset_x)

### F4 — RACF: pytest failure (cycles 5-6-7 → cycle 8, blocking)

pytest extractor/tests/ exits 1 with:
  FAILED extractor/tests/test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position
  AssertionError: Child graph.infrastructure is at distance 9.35 from parent graph,
  exceeding scene radius 7.50. Child must be positioned within parent's spatial bounds.

Root cause: extractor.py's compute_layout assigns mod_radius = max(1.5, len(children) * 0.9).
For the 'graph' context with many children, mod_radius exceeds bc_radius (7.50 for 3 BCs).
Additionally _circular_positions(..., y=1.0) adds a y-component that adds to the 3D distance.

The test also has a coordinate-frame mismatch: parent positions are stored as WORLD
positions while child positions are stored as LOCAL OFFSETS. Comparing them directly
with Euclidean distance gives a spurious result. However, fixing the test to compare
correctly would require understanding that "within parent bounds" means local offset ≤ size,
not world-distance < bc_radius.

Fix options:
  (a) Cap mod_radius to stay within parent's visual bound:
      parent_size = next((n["size"] for n in nodes if n["id"] == parent_id), 5.0)
      mod_radius = min(max(1.5, len(children) * 0.9), parent_size * 0.4)
      Also set y=0.0 for module positions to avoid 3D distance inflation.
  (b) Fix the test's coordinate-frame assumption to compare child LOCAL position
      magnitude (not world distance) against parent size.

