#### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` → `_load_and_build()`: opens the JSON file via `FileAccess`, parses with `JSON.new()`, passes the parsed dictionary to `_build()`.
- `_build()`: iterates `graph.get("nodes", [])` creating Node3D anchors (volumes) for each node; iterates `graph.get("edges", [])` calling `_create_edge()` for each.
- Anchor positions set directly from `nd["position"]` dict → `Vector3(float(p["x"]), float(p["y"]), float(p["z"]))`.

**Tests** (`godot/tests/test_scene_graph_loading.gd` — 5 tests):
- `test_volumes_created_for_each_node`: asserts `_anchors` contains an entry for every node id. Covers THEN "generates 3D volumes for each node".
- `test_mesh_instances_exist_in_anchors`: asserts each anchor has a `MeshInstance3D` child. Covers THEN "generates 3D volumes".
- `test_edge_mesh_instances_created`: asserts >= 2 `MeshInstance3D` children on the main node (line + arrowhead cone). Covers AND "generates connections for each edge".
- `test_anchor_positions_match_json`: asserts `anchor.position` equals `Vector3` from JSON for both nodes. Covers AND "positions elements according to layout data".
- `test_labels_are_billboard_and_readable`: asserts `billboard == BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true`. Covers AND "labels scale to remain readable".

