### Requirement: Simulation Mode
> The system MUST allow the human to explore the impact of hypothetical changes before
> committing to them.

**Status: COVERED**

Implementation: `godot/scripts/understanding_analyzer.gd`
- `simulate_split(nodes, edges, node_id)` — returns direct dependents and new_interfaces
  descriptions for each dependent.
- `build_split_spec(split_result, split_node_id)` — highlights the split subject ("◈ SPLITTING")
  and all dependents ("↯ Affected by split").
- `simulate_failure(nodes, edges, node_id)` — BFS through reverse adjacency graph; returns
  full transitive cascade.
- `build_failure_spec(failure_result, failed_node_id)` — annotates failed node ("✕ FAILED"),
  highlights all cascade members ("⚡ Cascading failure").

#### Scenario: Splitting a service
- THEN (impact on dependent services visible):
  - Code: `simulate_split()` collects all nodes with edges pointing to the split target.
  - Test: `test_split_dependents_detected()` — client_a and client_b both depend on monolith;
    asserts both appear in result["dependents"]. ✓
- AND (new dependencies/interfaces shown):
  - Code: `simulate_split()` populates new_interfaces as "dep → (new interface required)" per
    dependent; `build_split_spec()` highlights dependent nodes in scene.
  - Test: `test_split_new_interfaces_shown()` — asserts new_interfaces.size() >= 1; applies
    spec; asserts caller mesh is highlighted (HIGHLIGHT_COLOR) and a Label3D with "split" text
    appears. ✓

#### Scenario: Failure injection
- THEN (cascade of effects visible):
  - Code: `simulate_failure()` does BFS including transitive dependents (api→db, frontend→api
    both included when db fails).
  - Test: `test_failure_cascade_detected()` — db fails; asserts api and frontend both in
    cascade. ✓
- AND (affected components clearly identified):
  - Code: `build_failure_spec()` highlights each cascade member and annotates failed node.
  - Test: `test_failure_affected_nodes_highlighted()` — applies spec; asserts consumer_1 mesh
    is highlighted and a Label3D with "FAILED" text appears. ✓

