## Detailed Findings

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` calls `FileAccess.open()` + `file.get_as_text()` (Godot 4.6-compatible API, not
  deprecated `read_as_text()`), parses JSON via `JSON.new()`, delegates to
  `SceneGraphLoader.load_from_dict()`, then calls `build_from_graph()`.
- `build_from_graph()` iterates `nodes` and calls `_create_volume()` for each (generating 3D
  volumes), iterates `edges` and calls `_create_edge()` for each (generating connections),
  positions anchors from the `position` field in the JSON dictionary.

**Tests** (`godot/tests/test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1")` and
  `_anchors.has("mod1")` after `build_from_graph()`. Covers THEN: generates 3D volumes.
- `test_mesh_instances_exist_in_anchors` — asserts `MeshInstance3D` child exists in each anchor.
- `test_edge_mesh_instances_created` — asserts ≥ 2 `MeshInstance3D` direct children of
  main node (line + arrowhead). Covers THEN: generates connections for each edge.
- `test_anchor_positions_match_json` — asserts `anchor.position.is_equal_approx(Vector3(...))`
  using actual JSON fixture coordinates. Covers THEN: positions elements from JSON layout data.
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test = true`. Covers the Zooming-in scenario: labels remain readable.

All four THEN clauses of the Loading scenario are exercised with known fixtures and runtime
property assertions.

