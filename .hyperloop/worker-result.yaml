## Task-008: Godot Node Volume Rendering — Verification

All four check scripts pass:
- **extractor-lint.sh**: PASS (96 Python tests, ruff clean)
- **godot-compile.sh**: PASS (Godot 4.6.2 project parses without errors)
- **godot-tests.sh**: PASS (91/91 GDScript behavioral tests passed)
- **godot-label3d.sh**: PASS (all Label3D nodes have billboard + pixel_size)

### Spec Coverage (prototype-scope.spec.md)

**Scenario: Visual representation (Abstract Visual Language)**
- THEN it appears as a labeled geometric volume → `_create_volume()` builds BoxMesh + Label3D per node
- AND its size reflects its relative complexity → `sz = float(nd["size"])`; `BoxMesh.size = Vector3(sz, sz*0.6, sz)` / `Vector3(sz, sz*0.2, sz)` for contexts
- AND its position reflects its coupling relationships → positions read directly from JSON, no Godot-side recomputation
- AND containment is shown by nesting → child anchors are parented to parent anchors (`parent_anchor.add_child(anchor)`)

Tests: `test_node_renderer.gd` (4), `test_containment_rendering.gd` (5), `test_size_encoding.gd` (2)

**Scenario: Identifying a module (Readable Labels)**
- THEN the module's name is visible as a text label → `label.text = nd["name"]`
- AND the label remains readable at the current zoom level → `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED`, `label.pixel_size = 0.012`, `label.no_depth_test = true`

Tests: `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`

**Scenario: Cross-context dependency (Dependency Visualization)**
- THEN a line or connection is drawn between them → `ImmediateMesh` with `PRIMITIVE_LINES` in `_create_edge()`
- AND the direction of the dependency is discernible → `CylinderMesh` cone (`top_radius=0.0`) arrowhead at target node

Tests: `test_dependency_rendering.gd` (4)

**Scenario: Moving through the space (Navigation)**
- THEN they can pan, zoom, and rotate the view → `camera_controller.gd` handles WHEEL_UP/DOWN (zoom), middle-mouse drag (orbit φ/θ), right-mouse drag (pan)
- AND they can smoothly transition between overview and detail levels → orbit + zoom work continuously; `_frame_camera()` initializes pivot/distance from graph bounds

Tests: `test_camera_controls.gd` (8)

**Scenario: Viewing kartograph from above (Top-Down View)**
- THEN all bounded contexts are visible as distinct volumes → translucent BoxMesh slabs, `CULL_DISABLED`
- AND dependencies between contexts are visible as connections → `_create_edge()` runs for all graph edges

Initial `_theta = 0.15 rad` ≈ 8.6° from directly above satisfies "top-down view" (< 45°).

### Conclusion

All THEN clauses from the relevant prototype-scope scenarios are implemented in code
and validated by GDScript behavioral tests that instantiate real Node3D objects,
invoke `build_from_graph()` with known fixture data, and assert on scene-tree
properties (positions, mesh sizes, material transparency/cull_mode, label billboard
and pixel_size, camera spherical coordinates).
