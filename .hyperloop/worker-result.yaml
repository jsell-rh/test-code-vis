## Untestable THEN-Clauses

### Desktop Platform — native OS launch

**Verbatim THEN:** "it runs natively without browser, container, or VM dependencies"

**Why untestable:** Runtime environment assertion — cannot be verified in headless CI.
There is no way to assert "no browser present" or "no VM present" from within the codebase.

**Architectural evidence:** No Dockerfile, docker-compose.yml, or HTML5 export preset
exists in the repo. All Godot APIs used are standard desktop APIs (FileAccess, Node3D,
Camera3D, Label3D, ImmediateMesh, StandardMaterial3D). project.godot declares only "4.6"
in config/features — not "Web".

### Performance — FPS and stutter

**Verbatim THEN:** "the frame rate remains above 30fps" and "there is no perceptible stutter or pop-in"

**Why untestable:** FPS measurement requires a live render pipeline with GPU. Headless
Godot does not render frames; there is no way to measure frame rate or perceive stutter.

**Architectural evidence:** lod_manager.gd implements FAR/MEDIUM/NEAR thresholds
(80/20 units). At far distance only bounded_context nodes are visible; at medium
distance bounded_context + module nodes; at near distance all nodes and edges.
This system is registered and called every frame in main.gd::_process().

