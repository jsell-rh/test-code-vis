Task-023 addresses the two PARTIAL findings from the spec alignment review of
specs/prototype/nfr.spec.md.

## Changes Made

### 1. Requirement 2 (Python Extractor) — now COVERED

Added `extractor/tests/test_cli.py` with two test classes:

**TestCliEntryPoint** (7 tests):
- `test_main_produces_json_output`: calls `main([str(src), "--output", str(output)])`,
  asserts rc=0, output file exists, and JSON contains nodes/edges/metadata keys.
- `test_main_nodes_are_non_empty`: asserts the nodes list is non-empty.
- `test_main_default_output_filename`: asserts default output is `scene_graph.json` in cwd.
- `test_main_returns_1_on_missing_src`: asserts rc=1 when src_path does not exist.
- `test_main_returns_1_on_file_src`: asserts rc=1 when src_path is a file.
- `test_main_output_nodes_have_required_keys`: asserts each node has id/name/type/parent/position/size.
- `test_main_output_edges_have_required_keys`: asserts each edge has source/target/type.

**TestStdlibOnlyImports** (1 test):
- `test_extractor_uses_only_stdlib_imports`: iterates every `.py` file in the
  extractor package (excluding tests/) via `ast`, collects all import names, and
  asserts each is in `sys.stdlib_module_names` or is an intra-package (`extractor.*`)
  or `__future__` import. Satisfies the THEN-clause "requires no dependencies beyond
  the Python standard library."

### 2. Requirement 5 (Performance at Kartograph Scale) — structural build coverage added

Added `godot/tests/test_nfr_scale.gd` with 4 tests using a 6-context, 54-module
fixture (matching kartograph's real scale: 6 bounded contexts × 9 modules each):

- `test_kartograph_scale_anchor_count`: asserts `_anchors.size() == 60` (6 + 54)
  after `build_from_graph()`.
- `test_kartograph_scale_context_anchors_exist`: asserts all 6 context IDs
  (iam, shared_kernel, graph, billing, notifications, audit) have anchors.
- `test_kartograph_scale_module_anchors_exist`: iterates all 54 module nodes and
  asserts each has an anchor in `_anchors`.
- `test_kartograph_scale_build_produces_world_positions`: asserts
  `_world_positions.size() == 60`, confirming the full build pipeline ran without
  error.

Note: 30fps frame-rate cannot be measured in a headless Godot test (no render
pipeline). The structural correctness of the build at kartograph scale is fully
verified — the architecture test confirms `build_from_graph()` handles 6 contexts
and 54 modules without error.

Also registered the new suite in `godot/tests/run_tests.gd`.

