### F5 (RACF — 7th consecutive cycle): check-relative-position-tests.sh — Absolute position bug and weak tests

**Status:** FAIL — Re-attempt Compliance Failure (RACF). Has failed in every cycle since cycle 1.

**Two distinct sub-issues:**

**F5a — Bug in extractor.py (lines 228–230):** The extractor accumulates the parent bounded context's world position (`px`, `py`, `pz`) into child module positions:
```python
child["position"] = {
    "x": px + pos[0],   # absolute world coord, not local offset
    "y": py + pos[1],
    "z": pz + pos[2],
}
```
This is wrong. The spec requires child `position` to be a local offset relative to the parent. `main.gd`'s `_resolve_world_pos()` adds the parent's world position to the child's stored position — causing double-counting when the parent is not at the origin. The fix is to store only the local offset:
```python
child["position"] = {"x": pos[0], "y": pos[1], "z": pos[2]}
```

**F5b — Tests don't catch the bug:** All existing tests place the parent bounded context at `(0, 0, 0)`. When parent is at the origin, `px=0` so `px + pos[0] == pos[0]` — absolute and relative are identical. The proximity-based test (`test_child_nodes_are_near_parent_position`) also passes because it only checks that child is within a threshold of the parent, not that the position field is the local offset.

**Fix for F5b:** Add a pytest test in `extractor/tests/test_extractor.py` that:
1. Places the parent bounded context at a non-zero world position (e.g., x=10.0)
2. Asserts `child["position"]["x"] == local_offset_x` (exactly equal, not proximity)
3. Optionally asserts `child["position"]["x"] != parent_x + local_offset_x` to explicitly reject the absolute-position pattern

