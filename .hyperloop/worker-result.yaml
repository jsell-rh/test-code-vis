### Requirement: Non-Inverted Movement ‚Äî COVERED

**Implementation** (`camera_controller.gd` lines 135‚Äì145):
Right-pan uses `global_transform.basis.x` with no negation; dragging right
(positive `delta.x`) directly increases `_pivot.x`. Comment in code confirms:
`# Non-inverted: right = camera-right (basis.x, no negation)`.

**Scenario: Drag direction matches view movement**
- THEN scene moves same direction as drag ‚Üí positive `delta.x` ‚Üí `pivot.x`
  increases (dragging right shifts view right, non-inverted).

| THEN-clause | Test | Status |
