## Requirement Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Lines 101–104: `MOUSE_BUTTON_LEFT` press sets `_panning = true` and records `_last_mouse`.
- Lines 141–158: `_handle_motion()` when `_panning` applies camera-local `basis.x` (right)
  and horizontal `basis.z` (backward) to `_target_pivot`; immediately syncs `_pivot = _target_pivot`.

**Scenario: Panning the view** — COVERED
- Test `test_lmb_drag_pans_camera`: LMB press at (100,100) + motion to (150,100) → asserts
  `cam._pivot != initial_pivot`. ✓
- Test `test_pan_direction_not_inverted`: rightward drag → `cam._pivot.x > 0.0`. ✓

---

### Requirement: Non-Inverted Movement — COVERED

**Implementation** (`camera_controller.gd`):
- `_target_pivot += right * delta.x * pan_amount` — rightward drag → pivot moves +X. ✓
- `_target_pivot -= backward * delta.y * pan_amount` — upward drag (negative delta.y)
  → pivot moves forward (not backward). ✓

**Scenario: Drag direction matches view movement** — COVERED
- Test `test_pan_direction_not_inverted`: Sets `_phi = PI/2` so camera local X = world +X;
  50-pixel right drag → asserts `cam._pivot.x > 0.0`. ✓

---

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation** (`camera_controller.gd`):
- `MOUSE_BUTTON_WHEEL_UP/DOWN` calls `_get_ground_point_under_cursor(_last_mouse)`,
  then passes the world point to `_zoom_toward_point(world_pt, direction)`.
- `_zoom_toward_point` computes `zoom_ratio = new_dist / old_dist` and shifts
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`, keeping cursor invariant.

**Scenario: Zooming into a specific component** — COVERED
- Test `test_zoom_in_shifts_pivot_toward_cursor`: Cursor at `(10,0,0)`, zoom in →
  `cam._target_pivot.x > 0.0`. ✓
- Test `test_zoom_in_cursor_point_invariant`: Cursor at `(20,0,0)`, zoom in →
  `0 < pivot.x < 20`, confirming cursor stays invariant. ✓

**Scenario: Zooming out** — COVERED
- Test `test_zoom_out_shifts_pivot_away_from_cursor`: Cursor at `(10,0,0)`, zoom out →
  `cam._target_pivot.x < 0.0` (pivot retreats from cursor). ✓

---

### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`camera_controller.gd`):
- RMB press calls `_get_ground_point_under_cursor(event.position)` then
  `begin_orbit_at_world_point(world_pt)`.
- `begin_orbit_at_world_point` sets `_pivot = world_pt`, `_target_pivot = world_pt`,
  recomputes `_theta`/`_phi` from current camera position so no jump occurs.
- `_update_transform` always calls `look_at(_pivot)`, ensuring orbit centre is visual centre.

**Scenario: Orbiting around a component** — COVERED
- Test `test_orbit_uses_right_mouse_button`: RMB press + rightward drag → `cam._phi != initial_phi`. ✓
- Test `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(Vector3(5,0,3))` →
  `cam._pivot == world_pt`. ✓
- Test `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)`, confirming
  component stays at visual centre. ✓

---

### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`camera_controller.gd`):
- `_process` uses exponential smoothing:
  `t = 1.0 - pow(0.05, delta * zoom_smooth)`;
  `_distance = lerpf(_distance, _target_distance, t)`;
  `_pivot = _pivot.lerp(_target_pivot, t)`.
- Scroll events only mutate `_target_distance`/`_target_pivot`; actual values converge each frame.
- Pan applies immediately and proportionally per drag delta (smooth by design).

**Scenario: Smooth zoom** — COVERED
- Test `test_smooth_zoom_target_differs_from_distance_after_scroll`: After scroll up,
  `cam._target_distance < cam._distance` (zoom is not instantaneous). ✓
- Test `test_smooth_zoom_process_interpolates_distance`: After `_process(0.1)` with
  target=20 and distance=40, `20 < _distance < 40`. ✓

**Scenario: Smooth pan** — COVERED
- Test `test_pan_proportional_to_drag_speed`: 10-pixel drag vs. 50-pixel drag →
  50-pixel drag yields larger pivot displacement. ✓

