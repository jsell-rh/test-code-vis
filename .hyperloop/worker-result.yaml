### Requirement: Containment Rendering — COVERED

**Implementation (`main.gd::_create_volume()`):**
- `bounded_context` nodes: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18` (translucent),
  `CULL_DISABLED` (visually distinct boundary), `box.size = Vector3(sz, sz*0.2, sz)` (flat/large slab).
- `module` nodes: `albedo_color.a = 1.0` (fully opaque), `box.size = Vector3(sz, sz*0.6, sz)` (compact).
- Child volumes: `parent_node.add_child(anchor)` where `parent_node` is the context anchor,
  making modules scene-tree children of their bounded context.

**Tests (test_containment_rendering.gd):**
- `test_bounded_context_is_translucent` — asserts transparency != DISABLED and alpha < 1.
- `test_module_is_opaque` — asserts module alpha >= 1.0.
- `test_module_parented_inside_context` — asserts `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — asserts `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled` — asserts `cull_mode == CULL_DISABLED`.

