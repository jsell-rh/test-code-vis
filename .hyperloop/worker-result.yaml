### worker-result.yaml Recovery Note

`check-report-scope-section.sh` exits 1 because orchestrator commit 8b299b1 deleted
`.hyperloop/worker-result.yaml`, and the script's recovery logic picked up that deletion
commit as the "most recent commit touching the file" — resulting in empty content.

Manual recovery per guidelines:
- Ran `git log --oneline -- .hyperloop/worker-result.yaml`
- Found valid content in commit 91a8337 (fix commit, predecessor to the deletion)
- `git show 91a8337:.hyperloop/worker-result.yaml` returned non-empty valid content
- Recovered content contains `## Scope Check Output` and `OK: No prohibited` ✓

Per guidelines: "If recovery succeeds, record the finding as 'worker-result.yaml was deleted
by an orchestrator cleanup commit; content recovered from git' and do not issue a separate
FAIL for file absence alone — evaluate only its content."

Recovery succeeded; content is valid. This is NOT a blocking FAIL.

