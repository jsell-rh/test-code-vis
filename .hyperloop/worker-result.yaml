## Implementation Summary

The Godot application is implemented across three scripts:

- `godot/scripts/scene_graph_loader.gd` — parses the JSON scene graph into structured arrays
- `godot/scripts/main.gd` — builds the 3D scene from the parsed graph (volumes, edges, labels, camera framing)
- `godot/scripts/camera_controller.gd` — orbit/zoom/pan camera with spherical coordinates

Tests live in `godot/tests/` and are run via `godot/tests/run_tests.gd` (headless SceneTree runner).

