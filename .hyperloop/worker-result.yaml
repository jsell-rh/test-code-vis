## Requirement-by-Requirement Findings

### JSON Scene Graph Loading — COVERED

`main.gd:_ready()` opens the JSON file via `FileAccess.open()` + `get_as_text()`, parses
it, delegates to `SceneGraphLoader.load_from_dict()`, then calls `build_from_graph()`.
`build_from_graph()` iterates nodes → `_create_volume()` for each, then `_create_edge()`
for each edge, then `_frame_camera()`. `_ready()` is fully implemented (not a `pass` stub).

`test_scene_graph_loading.gd` (5 tests, all PASS):
- `test_volumes_created_for_each_node` — instantiates `MainScript`, calls
  `build_from_graph()`, asserts `_anchors.has("ctx1")` and `_anchors.has("mod1")`.
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a `MeshInstance3D` child.
- `test_edge_mesh_instances_created` — asserts ≥2 `MeshInstance3D` children at root (line + cone).
- `test_anchor_positions_match_json` — asserts `anchor.position` matches JSON `position` field
  using `is_equal_approx()` on `Vector3` (real property assertion, not `.has()` check).
- `test_labels_are_billboard_and_readable` — asserts `lbl.billboard == BILLBOARD_ENABLED`,
  `lbl.pixel_size > 0.0`, `lbl.no_depth_test == true` on the instantiated `Label3D`.

All four THEN/AND clauses of "Loading kartograph's scene graph" are covered.

### Containment Rendering — COVERED

`_create_volume()` branches on `nd["type"] == "bounded_context"`: contexts get
`TRANSPARENCY_ALPHA` + alpha 0.18 + `CULL_DISABLED`; modules get alpha 1.0. Child nodes
receive their parent anchor as scene-tree parent, placing them inside it spatially.

`test_containment_rendering.gd` (5 tests, all PASS):
- Asserts `mat.transparency != TRANSPARENCY_DISABLED` and `mat.albedo_color.a < 1.0` on
  the instantiated context `StandardMaterial3D`.
- Asserts `mat.albedo_color.a >= 1.0` on the instantiated module material.
- Asserts `mod_anchor.get_parent() == ctx_anchor` (real scene-tree parent check).
- Asserts `ctx_mesh.size.x > mod_mesh.size.x` on instantiated `BoxMesh` objects.
- Asserts `mat.cull_mode == CULL_DISABLED` on context material.

All three THEN/AND clauses of "Modules inside a bounded context" are covered.

### Dependency Rendering — COVERED

`_create_edge()` builds an `ImmediateMesh` line (PRIMITIVE_LINES) between world-space
endpoints. Direction is visually indicated by a `CylinderMesh` with `top_radius=0.0`
(arrowhead cone) placed at the target end, oriented along the edge direction.

`test_dependency_rendering.gd` (4 tests, all PASS):
- Asserts an `ImmediateMesh` `MeshInstance3D` exists in main node's children.
- Asserts a `CylinderMesh` with `top_radius == 0.0` exists (not just a colour difference).
- Asserts cone `position.distance_to(target_pos) < 2.0` (positioned at target end).
- Asserts cross_context cone material has R > 0.8 and B < 0.3 (orange).

"Direction is visually indicated" is satisfied by an explicit arrowhead cone, not a plain
line or colour alone. Both THEN/AND clauses covered.

### Size Encoding — COVERED

`_create_volume()` reads `sz = float(nd["size"])` and sets
`box.size = Vector3(sz, sz*0.6, sz)`. Ratio is preserved exactly.

`test_size_encoding.gd` (2 tests, all PASS):
- Asserts `large_mesh.size.x > small_mesh.size.x` on instantiated `BoxMesh` objects.
- Asserts `large_mesh.size.x / small_mesh.size.x` equals 3.0 within 0.001 tolerance.

Both THEN/AND clauses covered.

### Camera Controls — COVERED

`camera_controller.gd` implements spherical-coordinate orbit (`_theta`, `_phi`,
`_distance`) around `_pivot`. Initial `_theta = 0.15` (≈ 8.6°, top-down). Scroll wheel
changes `_distance` (clamped). Middle-mouse drag changes `_phi` and `_theta`.
`look_at(_pivot, Vector3.UP)` preserves orientation. `set_pivot()` updates pivot and
distance for post-load camera framing.

`test_camera_controls.gd` (8 tests, all PASS): exercises `_handle_button()` and
`_handle_motion()` directly, asserting `_theta`, `_phi`, `_distance`, and `_pivot` state
on the instantiated camera object. Zoom clamp verified by 200× scroll.

All three scenarios (Top-down overview, Zooming in, Orbiting) are covered.

### Godot 4.6 — COVERED

`project.godot` declares `config/features=PackedStringArray("4.6")`. All scripts are `.gd`.
`FileAccess.open()` + `get_as_text()` (correct Godot 4.x API) used in `main.gd`.
Compiled against Godot 4.6.2.

`test_engine_version.gd` (3 tests, all PASS): uses `FileAccess.open()` + `get_as_text()`
at runtime to read `project.godot` and asserts `content.contains("4.6")`,
`content.contains("\"4.6\"")`, and `content.contains("main.tscn")`. This also exercises
the file-I/O code path required by `godot-fileaccess-tested.sh`.

All three THEN/AND clauses of "Engine version" covered.

