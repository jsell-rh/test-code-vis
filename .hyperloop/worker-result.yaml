### Requirement: Orbit Around Mouse Point

#### Scenario: Orbiting around a component

Pre-read derivation:
- RMB press → `_set_orbit_pivot(_mouse_to_ground(pos))` (line 80)
- `_set_orbit_pivot(world_point)` → `_pivot = world_point` (line 103)
- Orbit motion: only `_phi` and `_theta` change (lines 118-120); `_pivot` unchanged
- Component at pivot location stays at pivot = visual orbit center

Tests:
- `test_orbit_pivot_set_to_cursor_point_at_start`:
  `_set_orbit_pivot(Vector3(5,0,7))` → asserts `cam._pivot == world_point` ✓
- `test_orbit_pivot_is_used_during_orbit`:
  Non-origin pivot set, orbit motion applied, asserts `cam._pivot == pivot_before` ✓
- `test_component_remains_at_visual_center_during_orbit`:
  Pivot at (8,0,0), diagonal drag, asserts `cam._pivot == center` ✓

Note on headless compromise: `_mouse_to_ground` returns `_pivot` when not in tree,
so tests call `_set_orbit_pivot(known_point)` directly. This is the exact production
code path called by RMB press, so coverage is valid.

STATUS: **COVERED**

