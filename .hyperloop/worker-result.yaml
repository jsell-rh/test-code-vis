### Requirement: Dependency Rendering ‚Äî COVERED

**Spec scenario: Rendering a cross-context dependency**
- GIVEN an edge from graph context to shared_kernel context
- WHEN the scene is rendered
- THEN a line connects the two context volumes
- AND the line's direction is visually indicated

**Implementation (`godot/scripts/main.gd` ‚Üí `_create_edge()`):**

THEN "a line connects the two context volumes":
- `ImmediateMesh` with `PRIMITIVE_LINES` draws a two-vertex line between
  `from_pos` and `to_pos` (world-space centres of source/target nodes).
- `mesh_instance.mesh = imesh` ‚Üí added as a child of the main scene root.

AND "the line's direction is visually indicated":
- `CylinderMesh` with `top_radius = 0.0` (a genuine cone, pointed at `+Y`)
  acts as an arrowhead.
- Arrow basis is set to `Basis(Quaternion(Vector3.UP, dir))` so the tip aligns
  with the edge direction.
- Arrow position: `to_pos - dir * (cone_mesh.height * 0.5)` ‚Äî tip lands at the
  target node's centre.
- Cross-context edges use orange (`Color(1.0, 0.50, 0.10)`);
  internal edges use grey (`Color(0.55, 0.55, 0.55)`).

**Tests (`godot/tests/test_dependency_rendering.gd` ‚Äî 4 tests):**
- `test_edge_line_mesh_created` ‚Äî finds `MeshInstance3D` with `ImmediateMesh`
  among scene-root children. Covers THEN clause "a line connects."
- `test_direction_indicator_cone_created` ‚Äî finds `CylinderMesh` with
  `top_radius == 0.0`. Covers AND clause "direction is visually indicated."
- `test_direction_cone_near_target` ‚Äî asserts cone position within 2 units of
  `(20, 0, 0)` (the target node's world position).
- `test_cross_context_cone_is_orange` ‚Äî asserts `albedo_color.r > 0.8` and
  `albedo_color.b < 0.3` on the cone's `StandardMaterial3D`.

