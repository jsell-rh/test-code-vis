### Requirement: Smooth Camera Movement
#### Scenario: Smooth zoom

**THEN: zoom is animated smoothly (interpolated), not instantaneous**
- Derivation: scroll changes only `_target_distance`; `_distance` is unchanged immediately.
  `_process(dt)` lerps `_distance` toward `_target_distance` by fraction `zoom_smoothing*dt`.
  At 0.016s frame: lerp fraction = 8.0*0.016 = 0.128 < 1 → partial movement only.
  After scroll (before _process): `_distance == initial_distance`.
  After one _process frame: `target < _distance < initial_distance`.
- Test: `test_zoom_is_interpolated_not_instantaneous` (test_ux_polish.gd:249)
  - Actual assert: `after_one_frame < initial_distance and after_one_frame > target` ✓ MATCHES.
- Status: COVERED.

#### Scenario: Smooth pan

**THEN: pan movement is smooth and proportional to drag speed**
- Derivation: pan_amount is constant per event; displacement = |delta| * pan_amount.
  A 50px drag produces 5× the pivot displacement of a 10px drag.
  Spec-derived predicate: move2 (50px) > move1 (10px).
- Test: `test_pan_proportional_to_drag_speed` (test_ux_polish.gd:337)
  - Actual assert: `move2 > move1` ✓ MATCHES.
- Status: COVERED.

