### Requirement: Abstract Visual Language — COVERED

**Scenario: Visual representation**
- GIVEN any structural element in the scene
- WHEN it is rendered
- THEN it appears as a labeled geometric volume
- AND its size reflects its relative complexity
- AND its position reflects its coupling relationships
- AND containment is shown by nesting

**Implementation:**
- All elements rendered as `BoxMesh` (geometric primitive, no thematic decoration)
- Bounded contexts: flat translucent slab (`sz × sz × sz*0.2`, alpha material)
- Modules: compact opaque box (`sz × sz*0.6 × sz`)
- Size derived from LOC via `size_from_loc()` in extractor
- Containment: module anchor added as child of bounded-context anchor
- No buildings, terrain, or thematic decoration found anywhere in codebase

