## THEN-Clause → Test Mapping

**Scenario: Architectural question**

| THEN clause | Test function | Assertion line |
|---|---|---|
| THEN the system generates a view focused on auth-related components | `test_full_pipeline_arch_question_shows_auth_focused_view` | `_check((anchors["auth"] as Node3D).visible == true, …)` |
| AND irrelevant components are hidden or de-emphasized | `test_full_pipeline_arch_question_shows_auth_focused_view` | `_check((anchors["billing"] as Node3D).visible == false, …)`, `_check((anchors["shipping"] as Node3D).visible == false, …)` |
| AND the relevant components are arranged to answer the question | `test_full_pipeline_arrange_positions_relevant_components` | `_check((anchors["auth"] as Node3D).position.x == 0.0, …)`, `_check((anchors["token"] as Node3D).position.x == 5.0, …)`, `_check((anchors["session"] as Node3D).position.x == 10.0, …)` |

**Scenario: Impact question**

| THEN clause | Test function | Assertion line |
|---|---|---|
| THEN the system generates a view showing the user database and all its dependents | `test_full_pipeline_impact_question_shows_dependents` | `_check((anchors["user_db"] as Node3D).visible == true, …)`, `_check((anchors["orders"] as Node3D).visible == true, …)`, `_check((anchors["unrelated"] as Node3D).visible == false, …)` |
| AND the dependency relationships are spatially clear | `test_full_pipeline_impact_question_connect_adds_lines` | `_check(root.get_child_count() > children_before, "connect ops must add MeshInstance3D line children")` |

**Scenario: LLM produces view spec**

| THEN clause | Test function | Assertion line |
|---|---|---|
| THEN it emits a structured view specification (not raw 3D geometry) | `test_pipeline_produces_structured_view_spec_not_geometry` | `_check(spec is Dictionary, …)`, `_check(spec["operations"][0] is Dictionary, …)`, `_check(spec["operations"][0].has("op"), …)` |
| AND the view spec controls which elements are shown, hidden, highlighted, and how they are arranged | `test_full_pipeline_arch_question_shows_auth_focused_view`, `test_full_pipeline_arrange_positions_relevant_components` | visible and position assertions on Node3D anchors |
| AND the 3D renderer interprets the view spec into a spatial scene | `test_pipeline_produces_structured_view_spec_not_geometry` | `_check((anchors["iam"] as Node3D).visible == true, "3D renderer must interpret the show op from the view spec")` |

**Scenario: LLM uses existing primitives**

| THEN clause | Test function | Assertion line |
|---|---|---|
| THEN it composes the answer from the existing set of primitives (show, hide, highlight, arrange, annotate, connect) | `test_full_pipeline_all_six_primitives_applied_end_to_end` | `_check(spec["operations"].size() == 6, "All six fixed primitives must survive parse_response round-trip")` |
| AND no new rendering logic is generated at runtime | `test_full_pipeline_unknown_op_rejected_no_new_rendering` | `_check(spec["operations"].size() == 1, "Unknown op must be rejected — no new rendering logic at runtime")` |

