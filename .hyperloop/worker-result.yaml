### Requirement: Fixed Visual Primitive Set — COVERED

**Code:** `godot/scripts/view_spec.gd` defines
`VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
as a module-level constant. `ViewSpec.from_dict()` silently drops any op
whose `"op"` key is not in `VALID_OPS`. `LLMViewGenerator.build_prompt()`
embeds `ViewSpec.VALID_OPS` in the prompt so the LLM is explicitly told
the fixed set. `LLMViewGenerator.parse_response()` delegates to
`ViewSpec.from_dict()`, ensuring no novel op can enter the renderer.

**Scenario: LLM uses existing primitives — COVERED**

- `test_view_spec.gd::test_valid_ops_contains_show/hide/highlight/arrange/annotate/connect`
  — each of the six spec-named primitives is in VALID_OPS.
- `test_view_spec.gd::test_valid_ops_has_exactly_six_primitives`
  — set is finite (exactly 6).
- `test_view_spec.gd::test_unknown_op_is_filtered_out`
  — "invent_new_thing" is dropped; only "show" survives.
- `test_view_spec.gd::test_all_valid_ops_pass_through`
  — all 6 valid ops pass through from_dict() unchanged.
- `test_llm_view_generator.gd::test_parse_response_filters_unknown_ops`
  — "invent_new_renderer" is filtered; only "show" survives.
- `test_llm_view_generator.gd::test_parse_response_with_all_unknown_ops_returns_empty_operations`
  — entirely unknown response yields zero operations.
- `test_llm_view_generator.gd::test_build_prompt_contains_show/hide/highlight/arrange/annotate/connect_primitive`
  — prompt advertises every valid primitive to the LLM.
- `test_question_panel.gd::test_all_ops_in_auth_spec_are_valid_primitives` /
  `test_all_ops_in_impact_spec_are_valid_primitives`
  — end-to-end: all ops produced by process_question() are members of
  VALID_OPS; no runtime invention.
- `test_view_spec.gd::test_get_valid_ops_returns_a_copy`
  — defensive: mutating the returned array does not pollute VALID_OPS.
