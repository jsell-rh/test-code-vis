### F2 [FAIL] — `test_drag_direction_matches_view_movement` wrong predicate

**THEN-clause:** "the scene moves in the same direction as the drag (i.e. dragging left reveals content to the right, as in Google Maps)"

**Test assertion (line 138):**
```gdscript
return cam._pivot != Vector3.ZERO
```
This only checks that the pivot moved at all (from its initial value of `Vector3.ZERO`). It does NOT verify:
- That the pivot moved in the direction required by the spec
- That dragging down (as the test does) moves the pivot in the correct direction per the map-grab model

A test that passes whenever the pivot is non-zero (regardless of sign) cannot distinguish between correct and inverted implementations. This test would pass even if the direction were perfectly reversed.

**Fix required:** The test should assert the specific direction: drag down → `cam._pivot.z < 0` (map-grab: scene moves down → camera moves up/backward → pivot.z decreases). Currently it tests an orthogonal axis compared to F1 tests and asserts no direction.

---

### F3 [PROCESS NOTE] — `check-direction-test-derivations.sh` and `check-pan-grab-model-comments.sh` absent from check suite

The reviewer guidelines prescribe running `check-direction-test-derivations.sh` and `check-pan-grab-model-comments.sh` as part of verification. Neither script exists in `.hyperloop/checks/` on `main` (confirmed after syncing). The manual direction derivation analysis above substitutes for these scripts. The absence of the scripts is a process-owner gap, not an implementer violation; however, their absence is what allowed the wrong-direction implementation to accumulate passing automated checks over multiple cycles.

