## Spec Alignment Review — task-029: Extractor: spec file structure extraction
### Spec: specs/core/system-purpose.spec.md

All three SHALL requirements are implemented and tested. Detail below.

---

### Requirement: Understanding Without Writing Code
**Status: COVERED**

Code: `godot/scripts/main.gd` — `build_from_graph()`, `_create_volume()`, `_create_edge()`
build a full 3D scene from the JSON scene graph; nodes get labeled volumes and edges
become visible coloured lines with arrowhead cones.

Tests (GDScript — `godot/tests/test_system_purpose.gd`):
- THEN the human can correctly answer architectural questions:
  - `test_bounded_contexts_are_structurally_identifiable` — BC anchors exist in _anchors
  - `test_node_names_are_labelled_for_identification` — Label3D.text == node name
  - `test_label_billboard_enabled_for_readability` — BILLBOARD_ENABLED set
  - `test_label_pixel_size_positive_for_readability` — pixel_size > 0
- AND the human can identify structural problems:
  - `test_dependencies_are_visible_as_connections` — ImmediateMesh edge lines exist
  - `test_cross_context_and_internal_edges_are_distinguishable` — ≥ 2 distinct colors in _lod_edge_entries
- AND the human can predict the impact of proposed changes:
  - `test_dependency_direction_is_encoded_in_edges` — _path_edge_entries tracks billing→auth direction
  - `test_modules_are_contained_within_bounded_contexts` — auth.domain.get_parent() == auth anchor

All GIVEN/WHEN/THEN conditions exercised with known fixture data; runtime property values
(colors, labels, node hierarchy) are asserted.

---

### Requirement: Spec-Driven Context
**Status: COVERED**

This is the primary deliverable of task-029.

Code:
- `extractor/extractor.py` — `discover_spec_nodes()`: finds *.md files in adjacent `specs/`
  or `spec/` directory; returns nodes with `type="spec"`, stable dot-separated IDs, and
  size derived from file byte count.
- `extractor/extractor.py` — `_position_spec_nodes()`: places spec nodes in a row at
  `z = -(bc_radius + 5)`, beyond the code circle, so intended and realized design occupy
  distinct spatial regions.
- `extractor/extractor.py` — `build_scene_graph()`: calls `discover_spec_nodes()` and
  `compute_layout()` (which delegates to `_position_spec_nodes()`); spec nodes are included
  in the returned graph alongside code nodes.
- `godot/scripts/main.gd` — `_create_volume()`: `is_spec` branch renders spec nodes as
  gold translucent slabs (`Color(0.95, 0.80, 0.10, 0.55)`), visually distinct from blue
  bounded_context and green module nodes.
- `godot/scripts/lod_manager.gd` — `_apply_far()` and `_apply_medium()`: spec nodes remain
  visible at all LOD distances, same as bounded_context.

Tests (Python — `extractor/tests/test_extractor.py`, class `TestSpecNodeDiscovery`):
- THEN the spec is treated as the intended design (type='spec' nodes):
  - `test_spec_files_produce_spec_type_nodes` — all returned nodes have type='spec'
  - `test_spec_nodes_count_matches_markdown_files` — 2 .md files → 2 nodes
  - `test_spec_nodes_have_required_schema_fields` — id/name/type/position/size/parent present
  - `test_spec_nodes_are_top_level_parent_null` — parent is None
  - `test_spec_node_ids_are_stable_and_dot_separated` — IDs start with 'spec.', no spaces
  - `test_spec_nodes_have_positive_size` — size > 0.0
  - `test_spec_nodes_have_position_fields` — x/y/z present
  - `test_no_spec_nodes_when_no_specs_directory` — empty list when specs/ absent
- AND the relationship is available for inspection (both coexist):
  - `test_build_scene_graph_includes_spec_nodes_when_specs_exist` — type='spec' present alongside code
  - `test_build_scene_graph_no_spec_nodes_when_no_specs` — no spec nodes when no specs/
  - `test_spec_node_ids_are_unique_from_code_nodes` — no ID collision between spec and code
  - `test_spec_nodes_have_distinct_positions_after_layout` — positions not all (0,0,0)
  - `test_spec_nodes_are_spatially_beyond_code_nodes` — spec z_min < code z_min
- _position_spec_nodes unit tests:
  - `test_position_spec_nodes_assigns_distinct_x_values`
  - `test_position_spec_nodes_z_offset_beyond_code_radius`
  - `test_position_spec_nodes_no_op_when_empty`

Tests (GDScript — `godot/tests/test_system_purpose.gd`):
- THEN the spec is treated as the intended design:
  - `test_spec_rendered_as_intended_design` — spec node has gold material (r >= 0.9, b < 0.3)
- AND the codebase is treated as the realized design:
  - `test_code_rendered_as_realized_design` — bounded_context has blue material (b > 0.7)
- AND the relationship between them is available for inspection:
  - `test_spec_and_code_coexist_for_inspection` — both spec and code anchors present; spec label
    readable (BILLBOARD_ENABLED, pixel_size > 0)

All GIVEN/WHEN/THEN conditions exercised with known fixture data (`src_with_spec_files`
fixture creates both code and spec directories; `_make_spec_driven_fixture()` creates a
scene graph with both types); runtime property values are asserted.

