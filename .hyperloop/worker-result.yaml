## Findings

### FAIL — F1: "all scripts use GDScript" mapped to the wrong test; no runtime assertion exists

**Spec:** Godot 4.6 scenario, THEN-clause: "AND all scripts use GDScript"

**What the implementer claimed:** The prior worker-result.yaml maps this THEN-clause to
`test_project_godot_declares_46`. That test reads `project.godot` and asserts it
contains the string `"4.6"`. It does NOT iterate the scripts directory to confirm every
file ends in `.gd`. The mapping is incorrect — this THEN-clause is unmapped.

**Guideline:** "Technology/version constraint scenarios are not exempt from test coverage.
For any scenario whose THEN clause is a version or technology assertion (e.g.,
'all scripts are GDScript'), confirm a GDScript test exists that exercises the
assertion at runtime."

**Fix required:** Add a named test to `godot/tests/test_engine_version.gd` that uses
`DirAccess` to iterate `res://scripts/` and assert every file ends in `.gd`, e.g.:

```gdscript
## AND all scripts use GDScript —
## DirAccess must find only .gd files under res://scripts/.
func test_scripts_dir_contains_only_gdscript() -> bool:
    var dir := DirAccess.open("res://scripts")
    if dir == null:
        return false
    dir.list_dir_begin()
    var fname := dir.get_next()
    while fname != "":
        if not dir.current_is_dir() and not fname.ends_with(".gd"):
            dir.list_dir_end()
            return false
        fname = dir.get_next()
    dir.list_dir_end()
    return true
```

---

### OBSERVATION — O1: "internal structure becomes visible as camera approaches" — untestable headlessly

**Spec:** Zooming scenario, THEN-clause: "AND internal structure becomes visible as the
camera approaches"

**Status:** This is emergent visual behavior that cannot be asserted without an active
render pipeline. The prior worker-result.yaml mapped it to "translucent parent + nested
child tests," which the guidelines classify as indirect coverage. However, because true
visibility requires a live renderer, this THEN-clause cannot be directly exercised in
headless GDScript. The structural pre-conditions (modules parented inside contexts via
`test_module_parented_inside_context`, camera distance decreasing via
`test_scroll_up_decreases_distance`) are both verified. No further action required on
this observation — it is noted for completeness only.

