### Requirement: Abstract Visual Language — COVERED

**SHALL**: Abstract volumes only (no buildings/terrain); size reflects complexity;
position reflects coupling; containment shown by nesting.

Scenario: Visual representation

Implementation:
- `main.gd -> _create_volume()`: BoxMesh for all nodes (no metaphorical meshes).
- `sz = float(nd["size"])` applied directly to BoxMesh dimensions.
- Module anchors parented to context anchors via `_create_volume(nd, parent_anchor)`.
- `compute_layout()` with `_order_by_coupling()` places coupled BCs adjacent.

Tests:
- `test_mesh_instances_exist_in_anchors` (test_scene_graph_loading.gd): every
  anchor has MeshInstance3D.
- `test_complexity_and_coupling_both_reflected` (test_extractor.py): single
  fixture asserts `big_ctx.size > small_ctx.size` AND
  `dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d)`.
- `test_containment_expressed_as_scene_tree_parenting` (test_spatial_structure.gd):
  `mod_anchor.get_parent() == ctx_anchor`.
- `test_module_parented_inside_context` (test_containment_rendering.gd):
  same parenting assertion from a second independent test file.

**COVERED**

