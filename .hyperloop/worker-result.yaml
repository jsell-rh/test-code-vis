- `test_project_does_not_declare_csharp` тАФ no `"Mono"` or `"C#"` in project.godot. тЬУ
- `test_file_access_get_as_text_returns_non_empty_string` тАФ exercises
  `FileAccess.open()` + `get_as_text()` and validates non-empty return. тЬУ

