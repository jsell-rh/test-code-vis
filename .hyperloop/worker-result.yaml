### 6. Readable Labels (MUST label all visible structural elements)
**Status: COVERED**

Scenario: Identifying a module
- THEN the module's name is visible as a text label
  → `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`:
    Label3D exists with `billboard == BILLBOARD_ENABLED`.
- AND the label remains readable at the current zoom level
  → Same test: `pixel_size > 0.0` and `no_depth_test == true` verified,
    ensuring labels render above geometry at all zoom levels.

Implementation: `main.gd::_create_volume()` lines adding Label3D node.

