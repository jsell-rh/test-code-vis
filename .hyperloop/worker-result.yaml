### F3 — FAIL [BLOCKING — RACF]: check-direction-test-derivations.sh (6th consecutive cycle)

**Finding:** `test_zoom_toward_point_moves_pivot_toward_target` in
`godot/tests/test_camera_controls.gd` (line 181) has its sign-chain derivation in the
`##` docstring ABOVE the `func` declaration (lines 178–180):
  ```
  ## call set_pivot(target, dist) → _pivot = target → distance changes to dist
  ## → camera frames the target → zoom toward target ✓
  ```
The `check-direction-test-derivations.sh` script scans only lines AFTER the `func`
declaration line. The docstring is never reached. The function body (lines 182–186)
contains no `→` or `->` inline comment.

**Re-attempt compliance failure:** Prior cycle (f4b1de1) prescribed adding a `#` inline
comment inside the function body with `→`. The fix was not applied (6th cycle).

**Fix:** Insert the derivation as a `#` comment inside the function body (before the
first statement), e.g.:
  ```gdscript
  func test_zoom_toward_point_moves_pivot_toward_target() -> bool:
      # call set_pivot(target, dist) → _pivot = target → distance changes to dist → zoom toward target ✓
      var cam = CameraScript.new()
      ...
  ```
The `##` docstring may remain; add a duplicate inside the body.

