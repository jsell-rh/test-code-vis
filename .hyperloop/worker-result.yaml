## Spec Scenario Coverage

### Requirement: Question-Driven View Generation — COVERED

**Scenario: Architectural question**
- THEN generates a view focused on auth-related components — COVERED
  `_apply_show()` sets `anchor.visible = true`; `test_show_op_sets_visible_true`
  asserts the property on a real `Node3D`.
- AND irrelevant components are hidden or de-emphasized — COVERED
  `_apply_hide()` sets `anchor.visible = false`; `test_hide_op_sets_visible_false`
  asserts it.
- AND the relevant components are arranged to answer the question — COVERED
  `_apply_arrange()` sets `anchor.position`; `test_arrange_op_sets_position_x`,
  `test_arrange_op_sets_all_three_axes` assert `.position.x/y/z` values on real Node3D.

**Scenario: Impact question**
- THEN shows user database and all dependents — COVERED (show op, above)
- AND dependency relationships are spatially clear — COVERED
  `_apply_connect()` adds `ImmediateMesh` line + `CylinderMesh` arrowhead (top_radius=0,
  pointed cone) to `scene_root`. `test_connect_op_adds_line_geometry` asserts ≥1
  `MeshInstance3D` on root; `test_connect_op_adds_arrowhead` asserts ≥2 (line + cone).
  This satisfies "visually indicated" per guidelines — explicit arrowhead geometry, not
  just color.

### Requirement: View Specs as Intermediate Representation — COVERED

**Scenario: LLM produces view spec**
- THEN emits structured view spec (not raw 3D geometry) — COVERED
  `parse_response()` returns a `Dictionary`; `test_parse_response_returns_dictionary`
  asserts `result is Dictionary`.
- AND view spec controls show/hide/highlight/arrange/annotate/connect — COVERED
  Six individual op pass-through tests in `test_llm_view_generator.gd` each invoke
  `parse_response()` with a single op and assert it survives filtering.
- AND 3D renderer interprets the view spec into a spatial scene — COVERED
  All tests in `test_scene_interpreter.gd` instantiate real `Node3D` objects, call
  `SceneInterpreter.apply()`, and assert actual scene-tree property values
  (`.visible`, `.position.x/y/z`, `albedo_color.r/g/b`, `label.billboard`,
  `label.pixel_size`) — no dict `.has()` shortcuts.
  `test_all_six_ops_mutate_scene_correctly` is an end-to-end integration test.
  `main.gd.apply_view_spec()` wires Stage 1 → Stage 2 in the live scene.

### Requirement: Fixed Visual Primitive Set — COVERED

**Scenario: LLM uses existing primitives**
- THEN composes from existing set only — COVERED
  `VALID_OPS` is a compile-time constant listing exactly 6 strings. `build_prompt()`
  embeds them in the prompt text; six `test_build_prompt_contains_*_primitive` tests
  assert each is present.
- AND no new rendering logic generated at runtime — COVERED
  `_make_spec()` drops any op not in `VALID_OPS`; `SceneInterpreter.apply()` uses a
  `match` with exactly 6 arms (unknown ops fall through with no effect).
  `test_parse_response_filters_unknown_ops` and `test_unknown_op_is_ignored` verify both.

