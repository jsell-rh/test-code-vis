## Key Reviewer Findings

### Direction predicate verification
- test_pan_drag_right_increases_pivot_x: Spec says "(i.e. dragging right shifts pivot
  right)". Test asserts `cam._pivot.x > initial_x` after 50px right drag. Predicates
  match exactly. ✓
- test_direction_indicator_cone_created: Spec says "direction of dependency is discernible".
  Test checks for CylinderMesh with top_radius==0 (a cone arrowhead), not merely a colour
  difference on a line. Satisfies "visually indicated" requirement. ✓
- test_zoom_is_interpolated_not_instantaneous: Asserts `cam._distance != initial_distance`
  is false immediately (no snap), then after _process(0.016) distance is between initial and
  target. Correctly verifies interpolation. ✓

### Algorithm-quality tests for "reflects" clauses
- test_coupled_bcs_are_closer_than_uncoupled: Fixture VARIES coupling (auth→sk coupled,
  billing uncoupled to auth). Asserts dist(auth,sk) < dist(auth,billing). Algorithm-quality. ✓
- test_mesh_sizes_proportional_to_metric: Fixture VARIES size input (3.0 vs 9.0). Asserts
  ratio == 3.0 within 0.001. Algorithm-quality. ✓
- test_complexity_and_coupling_both_reflected: Combined test VARIES both LOC (100 vs 1)
  AND coupling. Asserts both size ordering and positional proximity. Algorithm-quality. ✓

### Scope violation investigation
Files `understanding_overlay.gd`, `understanding_analyzer.gd`, and their tests existed
on main (added by prior tasks). Commit 9ddabb8 on this branch correctly deleted them.
check-not-in-scope.sh passes on the worktree (these files are absent). This is correct
remediation, not a scope violation by this task.

