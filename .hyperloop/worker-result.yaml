## Implementation Summary

Fresh implementation of `specs/interaction/moldable-views.spec.md` on branch
`hyperloop/task-021`.

---

### Requirement: Question-Driven View Generation — COVERED

**Files:**
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` embeds
  the natural-language question and all graph node ids into a prompt for the LLM.
- `godot/scripts/scene_interpreter.gd` — `_apply_show()`, `_apply_hide()`,
  `_apply_arrange()`, `_apply_connect()` mutate Node3D anchor visibility, position,
  and scene geometry in the live scene.
- `godot/scripts/main.gd` — `apply_view_spec(spec)` wires SceneInterpreter to the
  real `_anchors` and `_world_positions` maps built at startup.

**Scenario: Architectural question ("how does authentication work?")**
- THEN the system generates a view focused on auth-related components
  → `SceneInterpreter._apply_show()` sets `anchor.visible = true`
  → `test_show_op_sets_visible_true`: instantiates Node3D, applies show op,
    asserts `anchor.visible == true` ✓
- AND irrelevant components are hidden or de-emphasized
  → `SceneInterpreter._apply_hide()` sets `anchor.visible = false`
  → `test_hide_op_sets_visible_false`: asserts `anchor.visible == false` ✓
  → `test_hide_op_leaves_other_nodes_unchanged`: asserts only named ids are hidden ✓
- AND the relevant components are arranged to answer the question
  → `SceneInterpreter._apply_arrange()` sets `anchor.position = Vector3(...)`
  → `test_arrange_op_sets_position_x/z`, `test_arrange_op_sets_all_three_axes`:
    assert exact float values on anchor.position ✓

**Scenario: Impact question ("what depends on the user database?")**
- THEN the system generates a view showing the user database and all its dependents
  → show op (tested above) ✓
- AND the dependency relationships are spatially clear
  → `SceneInterpreter._apply_connect()` draws ImmediateMesh line + CylinderMesh
    arrowhead on scene_root
  → `test_connect_op_adds_line_geometry`: asserts ≥1 MeshInstance3D on root ✓
  → `test_connect_op_adds_arrowhead`: asserts ≥2 MeshInstance3D (line + cone) ✓

