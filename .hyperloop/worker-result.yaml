  structured prompt that embeds the human's question, the full node-id/name/type list
  from the structural graph, and the fixed VALID_OPS list. This is the "accept natural
  language question" contract.
- `godot/scripts/llm_view_generator.gd` — `parse_response(llm_text)` converts LLM
  output → validated ViewSpec dict, filtering unknown ops.
- `godot/scripts/scene_interpreter.gd` — `apply(spec, anchors, scene_root, ...)` maps
  every ViewSpec operation to live 3D scene-tree mutations.
- `godot/scripts/main.gd:271` — `apply_view_spec(spec)` wires SceneInterpreter into
  the running application.

