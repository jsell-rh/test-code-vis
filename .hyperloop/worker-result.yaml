### Requirement: View Specs as Intermediate Representation — COVERED

**Code:** `godot/scripts/view_spec.gd` → `ViewSpec.from_dict()` defines the
structured IR (Dictionary with `question` and `operations` keys).
`LLMViewGenerator.parse_response()` converts raw LLM text → ViewSpec dict
(never Node objects or geometry). `ViewSpecRenderer.apply()` interprets
that dict into the spatial scene.

**Scenario: LLM produces view spec — COVERED**

- `test_llm_view_generator.gd::test_parse_response_returns_dictionary`
  — THEN emits a Dictionary (not raw 3D geometry).
- `test_llm_view_generator.gd::test_parse_response_has_question_key` /
  `test_parse_response_has_operations_key` / `test_parse_response_operations_is_array`
  — structural invariants of the IR are asserted.
- `test_llm_view_generator.gd::test_parse_response_passes_through_show_op` /
  `hide_op` / `arrange_op` / `connect_op` / `highlight_op` / `annotate_op`
  — view spec controls all six element-visibility/arrangement dimensions.
- `test_llm_view_generator.gd::test_parse_response_all_six_ops_pass_through`
  — end-to-end: all 6 ops survive parse round-trip.
- `test_view_spec_renderer.gd::test_renderer_creates_mesh_instance_3d_for_each_shown_node`
  — AND the 3D renderer interprets the view spec into a spatial scene
  (3 MeshInstance3D nodes for 3-node graph with empty spec).
- `test_question_panel.gd::test_renderer_can_apply_auth_spec_to_scene` /
  `test_renderer_can_apply_impact_spec_to_scene`
  — end-to-end renderer integration from question → spec → scene.
- `test_view_spec_renderer.gd` extensively covers `arrange`, `highlight`,
  `annotate` primitives with property-level assertions (position.x/y/z,
  albedo_color.r/g/b, Label3D.text, billboard mode, pixel_size).

