## Task-012 Implementation Review — prototype-scope.spec.md

All requirements from the prototype scope specification are implemented and verified.
The `pr-feedback-addressed` check failure is a pipeline-level timing issue (CodeRabbit
bot has not yet posted a review on PR #39). No code changes are needed; all
implementation checks pass.

---

### Requirement: Target Codebase — COVERED

`extractor/__main__.py` accepts a `--src` CLI argument pointing to any Python source
tree. The default path, when run for this prototype, is `~/code/kartograph/src/api`.
`build_scene_graph()` in `extractor/extractor.py` discovers bounded contexts, modules,
and their import-based dependencies from the supplied path.

Tests:
- `extractor/tests/test_extractor.py::TestSceneGraphOutput` — uses a kartograph-shaped
  tmp fixture (`iam`, `graph`, `shared_kernel` BCs) and asserts structure.
- `check-kartograph-integration-test.sh` — passes (integration test references actual
  kartograph path and asserts expected bounded contexts).

---

### Requirement: Two-Stage Pipeline — COVERED

The Python extractor writes a JSON file to stdout/disk; the Godot application reads it
via `FileAccess.open()` in `main.gd::_ready()`, parses the JSON, and builds the 3D
scene via `SceneGraphLoader.load_from_dict()` + `build_from_graph()`.

Tests:
- `test_extractor.py::TestSceneGraphOutput::test_output_is_json_serialisable`
- `test_scene_graph_loader.gd` — full parser coverage
- `test_scene_graph_loading.gd::test_volumes_created_for_each_node`,
  `test_edge_mesh_instances_created`

---

### Requirement: Top-Down Architectural View — COVERED

`camera_controller.gd` initialises `_theta = 0.15` (≈8.6° from vertical). Bounded
contexts are arranged in a coupling-aware circle by `compute_layout()`/
`_order_by_coupling()`. Cross-context edges are drawn as orange ImmediateMesh lines.

Tests:
- `test_camera_controls.gd::test_initial_theta_is_near_top_down`
- `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled`
- `test_dependency_rendering.gd::test_edge_line_mesh_created`,
  `test_cross_context_cone_is_orange`

---

### Requirement: Zoom to Detail — COVERED

Scroll-wheel zoom changes `_distance` (clamped) in `camera_controller.gd`. Module
nodes are parented inside their bounded-context anchor, so zooming in reveals them.

Tests:
- `test_camera_controls.gd::test_scroll_up_decreases_distance`,
  `test_scroll_down_increases_distance`
- `test_containment_rendering.gd::test_module_parented_inside_context`,
  `test_bounded_context_larger_than_module`

---

### Requirement: Abstract Visual Language — COVERED

All nodes render as `BoxMesh` primitives: bounded contexts as translucent flat slabs
(`TRANSPARENCY_ALPHA`), modules as opaque compact boxes. Size is derived directly from
the `size` field (LOC-based). Containment is achieved by parenting module anchors under
BC anchors.

Tests:
- `test_containment_rendering.gd::test_bounded_context_is_translucent`,
  `test_module_is_opaque`, `test_bounded_context_cull_disabled`
- `test_size_encoding.gd::test_large_module_has_bigger_mesh`,
  `test_mesh_sizes_proportional_to_metric`
- `test_node_renderer.gd::test_no_layout_recomputed_in_godot`

---

### Requirement: Readable Labels — COVERED

`_create_volume()` in `main.gd` attaches a `Label3D` to every anchor with:
- `text = nd["name"]`
- `billboard = BaseMaterial3D.BILLBOARD_ENABLED`
- `pixel_size = 0.012` (> 0)
- `no_depth_test = true`

Tests: `test_readable_labels.gd` — 10 tests covering text content, billboard mode,
pixel_size > 0, and no_depth_test for both bounded context and module nodes.

---

### Requirement: Dependency Visualization — COVERED

`_create_edge()` in `main.gd` renders an `ImmediateMesh` line between world positions
and adds a `CylinderMesh` arrowhead (top_radius=0) at the target end. Cross-context
edges are orange; internal edges are grey.

Tests:
- `test_dependency_rendering.gd::test_edge_line_mesh_created`,
  `test_direction_indicator_cone_created`, `test_direction_cone_near_target`,
  `test_cross_context_cone_is_orange`

---

### Requirement: Navigation — COVERED

`camera_controller.gd` implements scroll-wheel zoom, middle-mouse-drag orbit (`_theta`,
`_phi` spherical coordinates), and right-mouse-drag pan.

Tests: `test_camera_controls.gd` — 7 tests covering initial state, zoom in/out,
orbit, panning, set_pivot, and zoom clamp.

