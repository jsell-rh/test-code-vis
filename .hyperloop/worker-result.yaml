## Requirement Status

### Requirement: Pan with Left Mouse Button (SHALL)
- **Implementation:** COVERED — `camera_controller.gd` line 72–74 handles `MOUSE_BUTTON_LEFT`,
  sets `_panning = true`, and `_handle_motion` lines 126–138 shifts `_pivot` via
  `_pivot -= right * delta.x * pan_amount` / `_pivot -= forward * delta.y * pan_amount`.
- **Scenario: Panning the view** — MISSING test coverage: `test_lmb_pan_moves_pivot` exists
  in `test_ux_polish.gd` but is dead code — not registered in `run_tests.gd`.

### Requirement: Non-Inverted Movement (SHALL)
- **Implementation:** COVERED — grab-model comment at line 135: `# drag left → delta.x = -50
  → negate → pivot.x += 50 * pan_amount (moves right) ✓`. Inline derivation comment is
  present immediately before each directional calculation line as required.
- **Scenario: Drag direction matches view movement** — MISSING test coverage:
  `test_pan_drag_left_increases_pivot_x`, `test_pan_drag_right_decreases_pivot_x`,
  `test_drag_direction_matches_view_movement`, `test_pan_drag_down_decreases_pivot_z`,
  `test_pan_drag_up_increases_pivot_z` — all exist in `test_ux_polish.gd`, all dead code.

### Requirement: Zoom Toward Mouse Cursor (SHALL)
- **Implementation:** COVERED — `_zoom_toward_cursor` (lines 90–98) computes
  `zoom_fraction = 1 - (_target_distance / old_target)` and calls
  `_pivot = _pivot.lerp(cursor_world, zoom_fraction)`. WHEEL_UP passes `-zoom_speed`
  (zoom in), WHEEL_DOWN passes `+zoom_speed` (zoom out). Derivation comments present.
- **Scenario: Zooming into a specific component** — MISSING: `test_zoom_toward_cursor_shifts_pivot_toward_cursor`,
  `test_component_stays_under_cursor_on_zoom_in` — dead code.
- **Scenario: Zooming out** — MISSING: `test_zoom_out_from_cursor_shifts_pivot_away` — dead code.

### Requirement: Orbit Around Mouse Point (SHALL)
- **Implementation:** COVERED — RMB press (line 75–80) calls
  `_set_orbit_pivot(_mouse_to_ground(event.position))`, which sets `_pivot = world_point`
  and recalculates `_theta`/`_phi` from the new pivot (lines 103–112). Orbit motion
  only changes `_phi`/`_theta`, never moves `_pivot`.
- **Scenario: Orbiting around a component** — MISSING: `test_orbit_pivot_set_to_cursor_point_at_start`,
  `test_orbit_pivot_is_used_during_orbit`, `test_component_remains_at_visual_center_during_orbit`
  — dead code.

### Requirement: Smooth Camera Movement (SHALL)
- **Implementation (zoom):** COVERED — `_process` (lines 50–56) lerps `_distance` toward
  `_target_distance` each frame using `t = min(zoom_smoothing * delta, 0.9)`. Distance
  does not snap immediately on scroll events.
- **Implementation (pan):** COVERED — Pan shifts `_pivot` proportionally to `delta.x`/`delta.y`
  scaled by `pan_amount`. Larger drag → proportionally larger shift.
- **Scenario: Smooth zoom** — MISSING: `test_zoom_is_interpolated_not_instantaneous` — dead code.
- **Scenario: Smooth pan** — MISSING: `test_pan_proportional_to_drag_speed` — dead code.

