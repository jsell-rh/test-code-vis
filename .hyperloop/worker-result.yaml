## Independent Predicate Verification

### Compound THEN-clauses (each cites ≥2 tests)

**"Godot application can load scene file and render it"** (two capabilities):
- `test_main_writes_json_output`: verifies CLI produces JSON with nodes/edges/metadata. Covers "extract to JSON". ✓
- `test_volumes_created_for_each_node`: calls `build_from_graph()` and asserts `_anchors.has("ctx1")`. Covers "Godot loads and renders". ✓

**"pan, zoom, and rotate the view"** (three capabilities, four tests):
- `test_scroll_up_decreases_distance`: WHEEL_UP → `_target_distance < initial`. Zoom in. ✓
- `test_scroll_down_increases_distance`: WHEEL_DOWN → `_target_distance > initial`. Zoom out. ✓
- `test_orbit_horizontal_drag_changes_phi`: RMB drag → `_phi != initial_phi`. Azimuth rotation. ✓
- `test_orbit_vertical_drag_changes_theta`: RMB drag up → `_theta != initial_theta`. Polar tilt. ✓
Pan: `test_pan_drag_right_increases_pivot_x` — LMB drag right → `_pivot.x > initial_x`. ✓

**"smoothly transition between overview and detail levels"** (two capabilities):
- `test_zoom_is_interpolated_not_instantaneous`: one frame of `_process()` moves `_distance` toward target but doesn't snap. Lerp smooth. ✓
- `test_lod_integration_far_hides_modules_in_built_scene`: builds scene, applies FAR LOD, asserts module hidden, context visible. Seamless transition. ✓

### "reflects" consistency (check-reflects-mapping-consistency.sh)

Both "relative positions reflect coupling" and "position reflects coupling relationships" cite
`test_coupled_bcs_are_closer_than_uncoupled` as first test. Concept keyword "coupling" →
same algorithm-quality test for both. ✓

Algorithm-quality confirmation:
- `test_mesh_sizes_proportional_to_metric`: fixture varies size 3.0 vs 9.0; asserts ratio = 3.0 within 0.001. ✓
- `test_coupled_bcs_are_closer_than_uncoupled`: varies import edge presence; asserts distance ordering. ✓
- `test_complexity_and_coupling_both_reflected`: varies both LOC (100 vs 1) and coupling simultaneously. ✓

### main.gd _ready() verification

`_ready()` calls `FileAccess.open()` → `JSON.new().parse()` → `SceneGraphLoader.load_from_dict()` →
`build_from_graph()`. Real file I/O and full scene construction — not a stub. ✓

