### Requirement: Edge Schema — COVERED

**Scenario: Cross-context dependency edge — COVERED**

- Code: `schema.py::Edge` has `source`, `target`, `type`.
  `extractor.py::build_dependency_edges()` emits `type="cross_context"` when
  source and target belong to different bounded contexts.
- Tests: `test_schema.py::TestEdgeSchema::test_cross_context_edge_*` (source,
  target, type). `test_extractor.py::TestDependencyExtraction::
  test_cross_context_edge_created` / `test_cross_context_edge_type` use the
  fixture `iam.domain → shared_kernel.auth` import to confirm edge production.
- Godot: `test_scene_graph_loader.gd::test_cross_context_edge_type_is_cross_context`
  and `test_edge_direction_preserved_source_to_target` exercise this scenario
  with known fixture data.

**Scenario: Internal dependency edge — COVERED**

- Code: `extractor.py::classify_edge_type()` returns `"internal"` when source
  and target share the same top-level context.
  `build_dependency_edges()` emits module-level internal edges
  (`iam.application → iam.domain`).
- Tests: `test_schema.py::TestEdgeSchema::test_internal_edge_*`.
  `test_extractor.py::test_internal_edge_created` / `test_internal_edge_type`
  confirm the fixture produces `("iam.application", "iam.domain", "internal")`.
- Godot: `test_scene_graph_loader.gd::test_internal_edge_type_is_internal` and
  `test_edge_types_are_distinguishable` confirm the loader preserves both types.

