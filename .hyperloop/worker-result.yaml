### Scenario: Large module vs small module — COVERED ✅

**Implementation**: `sz = float(nd["size"])` → `box.size = Vector3(sz, sz * 0.6, sz)` — mesh width
ratio equals input size ratio exactly.

**Tests** (`test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — asserts `large_mesh.size.x > small_mesh.size.x` ✅
- `test_mesh_sizes_proportional_to_metric` — asserts ratio == 9.0/3.0 = 3.0 within 0.001 ✅

