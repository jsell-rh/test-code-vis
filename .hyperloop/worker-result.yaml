| all bounded contexts visible as distinct volumes | `test_far_distance_shows_only_bounded_contexts` | LOD FAR → bc visible, module hidden |
| relative positions reflect coupling | `test_complexity_and_coupling_both_reflected` | ALGORITHM-QUALITY: dist(big_ctx,ctx_c) < dist(big_ctx,ctx_d) |
| dependencies visible as connections | `test_dependency_expressed_as_visible_connection` | ImmediateMesh child exists per edge |
| initial top-down view | `test_initial_theta_is_near_top_down` | theta < PI/4 |
| internal layers visible on zoom | `test_medium_distance_shows_modules` | LOD MEDIUM → module visible |
| internal dependencies shown | `test_near_distance_shows_internal_edges_as_fine_detail` | internal edge visible at NEAR |
| relative sizes of internal modules | `test_large_module_has_bigger_mesh` | size=9 → larger BoxMesh than size=3 |
| appears as labeled geometric volume | `test_mesh_instances_exist_in_anchors` | MeshInstance3D (BoxMesh) per anchor |
| size reflects complexity | `test_complexity_and_coupling_both_reflected` | ALGORITHM-QUALITY: big_ctx (100 LOC) > small_ctx (1 LOC) in size |
| containment shown by nesting | `test_module_parented_inside_context` | mod_anchor.get_parent() == ctx_anchor |
| larger volumes for larger contexts | `test_bounded_context_larger_than_module` | ctx BoxMesh.size.x > mod BoxMesh.size.x |
| name visible as text label | `test_labels_are_billboard_and_readable` | Label3D billboard==BILLBOARD_ENABLED |
| label readable at zoom level | `test_labels_are_billboard_and_readable` | pixel_size > 0.0, no_depth_test == true |
| line or connection drawn | `test_edge_line_mesh_created` | ImmediateMesh MeshInstance3D child present |
| direction of dependency discernible | `test_direction_indicator_cone_created` | CylinderMesh top_radius==0 (arrowhead cone) |
| cone near target | `test_direction_cone_near_target` | cone within 2.0 units of target position |
| cross-context visually distinct | `test_cross_context_cone_is_orange` | albedo_color.r > 0.8, .b < 0.3 |
