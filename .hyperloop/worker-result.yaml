## Requirement: Containment Rendering — COVERED

**Implementation:** `godot/scripts/main.gd::_create_volume()`
- `bounded_context` nodes: `BoxMesh.size = (sz, sz*0.2, sz)`, material uses
  `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `cull_mode = CULL_DISABLED`.
- `module` nodes: `BoxMesh.size = (sz, sz*0.6, sz)`, fully opaque (alpha=1.0).
- Child nodes are `add_child()`ed to their parent's anchor (`Node3D`), making them
  visually nested inside the parent.

**Scenario: Modules inside a bounded context — tests in `test_containment_rendering.gd`:**
- `test_bounded_context_is_translucent()` — THEN transparency != DISABLED and alpha < 1.
- `test_module_is_opaque()` — THEN module material alpha >= 1.0.
- `test_module_parented_inside_context()` — THEN `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module()` — THEN `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled()` — THEN `cull_mode == CULL_DISABLED`.

