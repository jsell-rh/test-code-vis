### Requirement: Zoom to Detail — COVERED

**Implementation:**
- `camera_controller.gd` handles `MOUSE_BUTTON_WHEEL_UP/DOWN` → adjusts `_distance`
- Module anchors are nested inside bounded-context anchors in `main.gd::build_from_graph()`
- Both context and module volumes are created with different sizes to reflect internal structure

**Tests:**
- `test_camera_controls.gd::test_scroll_up_decreases_distance` ✓
- `test_camera_controls.gd::test_scroll_down_increases_distance` ✓
- `test_containment_rendering.gd::test_module_parented_inside_context` ✓
- `test_containment_rendering.gd::test_bounded_context_larger_than_module` ✓
- `test_size_encoding.gd::test_large_module_has_bigger_mesh` ✓

**Scenario: Zooming into IAM — COVERED**
- THEN the internal layers become visible → modules nested inside bounded-context anchors ✓
- AND internal dependencies are shown → `_create_edge()` processes both cross-context and internal edges ✓
- AND the user can see relative sizes → size encoding proportional to LOC metric ✓

