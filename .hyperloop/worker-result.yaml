### Requirement: Top-Down Architectural View — COVERED

**Code**: `camera_controller.gd` starts with `_theta = 0.15` (≈8.6° from vertical).
`lod_manager.gd::_apply_far()` shows only bounded_context anchors at distance >
FAR_THRESHOLD (80). `_create_edge()` in `main.gd` produces ImmediateMesh lines.
`extractor.py::_order_by_coupling()` uses greedy nearest-neighbour heuristic so
tightly coupled bounded contexts are adjacent in the ring (closer together).

**Tests**:
- `test_camera_controls.gd::test_initial_theta_is_near_top_down`: asserts
  `cam._theta < PI / 4.0`. ✓
- `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`:
  drives `lod.update_lod(..., FAR_THRESHOLD + 10.0)`, asserts ctx_anchor.visible
  and `not mod_anchor.visible`. Uses correct constant `LodManager.FAR_THRESHOLD`
  (= 80.0 in worktree). ✓
- `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled`:
  4-BC fixture where auth↔shared_kernel are coupled; asserts
  `dist("auth","shared_kernel") < dist("auth","billing")`. Algorithm-quality test
  with varying coupling input and relative-distance assertion. ✓
- `test_dependency_rendering.gd::test_edge_line_mesh_created`: asserts
  ImmediateMesh exists among main node's children. ✓

