### Requirement 2: Non-Inverted Movement (SHALL/MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Same pan formula: subtracting `right * delta.x` means drag-right moves pivot right → scene shifts left
- Inline comment explains Google Maps convention explicitly

**Scenario: Drag direction matches view movement — COVERED**
- GIVEN any camera position ✓
- WHEN user drags in any direction ✓
- THEN scene moves in same direction as drag (Google Maps) ✓

Tests: `test_pan_direction_not_inverted` (at `_phi=PI/2`, drag left → `pivot.x > 0` ✓)

