## Godot Application — Spec Alignment Review (task-007, 2026-04-23)

All SHALL/MUST requirements in the Godot Application spec are implemented
and have corresponding GDScript behavioral tests with known fixture data
and property assertions. Verdict: **PASS**.

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` → `_load_and_build()`: opens the file via `FileAccess`, parses
  with `JSON.new()`, calls `_build()`.
- `_build()`: iterates `nodes` and `edges`; calls `_create_volume()` for each
  node (rooted at scene root or a parent anchor) and `_create_edge()` for each
  edge.
- `_compute_world_positions()` / `_resolve_world_pos()`: derives world-space
  coordinates from the `position` field in each node, matching the layout data
  requirement.

**Tests** (`godot/tests/test_scene_graph_loading.gd` — 5 tests):
- `test_volumes_created_for_each_node` — `_anchors` contains an entry for
  every node id after `_build()`.
- `test_mesh_instances_exist_in_anchors` — each anchor has a `MeshInstance3D`
  child.
- `test_edge_mesh_instances_created` — at least 2 `MeshInstance3D` children on
  the main node (line + arrowhead) for each edge.
- `test_anchor_positions_match_json` — anchor local positions equal the `x/y/z`
  values from the JSON fixture.
- `test_labels_are_billboard_and_readable` — `Label3D` has
  `BILLBOARD_ENABLED`, `pixel_size > 0`, and `no_depth_test = true`; satisfies
  "labels scale to remain readable" from the Zooming-in scenario.

