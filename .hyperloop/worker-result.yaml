## Spec Scenario Coverage

All 8 spec scenarios have corresponding GDScript test files with fixture data and runtime assertions on Node3D properties:

1. **Loading kartograph's scene graph** — `test_scene_graph_loading.gd` (volumes created, mesh instances, edge meshes, positions asserted via `Vector3.is_equal_approx()`) + `test_node_renderer.gd` (anchor positions match JSON x/y/z)
2. **Modules inside a bounded context** — `test_containment_rendering.gd` (translucency asserts `TRANSPARENCY_ALPHA` + `albedo_color.a < 1.0`; opacity asserts `albedo_color.a >= 1.0`; parenting asserts `mod_anchor.get_parent() == ctx_anchor`; size comparison asserts `ctx_mesh.size.x > mod_mesh.size.x`; cull asserts `CULL_DISABLED`)
3. **Rendering a cross-context dependency** — `test_dependency_rendering.gd` (ImmediateMesh line + CylinderMesh arrowhead with `top_radius == 0.0` at target; orange color `r > 0.8 and b < 0.3` for cross-context)
4. **Large module vs small module** — `test_size_encoding.gd` (mesh size.x larger; ratio 9/3 = 3.0 within 0.001 tolerance)
5. **Top-down overview** — `test_camera_controls.gd` (`_theta < PI/4`; `_distance > 0`)
6. **Zooming in** — `test_camera_controls.gd` (WHEEL_UP decreases `_distance`; WHEEL_DOWN increases; clamp enforced)
7. **Orbiting** — `test_camera_controls.gd` (horizontal drag changes `_phi`; vertical drag changes `_theta`; `set_pivot` updates state)
8. **Engine version** — `test_engine_version.gd` (`FileAccess.open("res://project.godot")` + `get_as_text()` asserts "4.6" in content; no C#/Mono; `get_as_text()` returns non-empty string)

