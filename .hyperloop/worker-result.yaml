### Label Readability

`main.gd` sets on each `Label3D`:
- `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` (faces camera at all orientations)
- `label.pixel_size = 0.012` (non-zero world-space scale)
- `label.no_depth_test = true` (visible through geometry)

`test_labels_are_billboard_and_readable` asserts all three properties on a real Label3D node.

### Notes

The extractor's `compute_layout` was simplified in this branch: child module positions are now relative to their parent bounded context (not absolute world coordinates), and coupling-based ordering was removed. This is internally consistent: Godot's parented scene tree correctly interprets local positions. The corresponding extractor tests for the removed features were also removed. All 93 remaining extractor tests pass. This simplification does not violate any spec requirement.

The `godot-label3d.sh` check was deleted from `.hyperloop/checks/` but its coverage is fully superseded by the GDScript test `test_labels_are_billboard_and_readable`.

