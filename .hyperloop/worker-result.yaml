### 7. Dependency Visualization (MUST show dependencies as visible connections)
**Status: COVERED**

Scenario: Cross-context dependency
- THEN a line or connection is drawn between them
  → `test_dependency_rendering.gd::test_edge_line_mesh_created`:
    ImmediateMesh MeshInstance3D child exists after `_create_edge()`.
- AND the direction of the dependency is discernible
  → `test_dependency_rendering.gd::test_direction_indicator_cone_created`:
    CylinderMesh with top_radius=0 (pointed cone arrowhead) exists.
  → `test_dependency_rendering.gd::test_direction_cone_near_target`:
    Cone position within 2.0 units of target node.
  → `test_dependency_rendering.gd::test_cross_context_cone_is_orange`:
    Cross-context arrowhead uses distinct orange color (R>0.8, B<0.3).

Implementation: `main.gd::_create_edge()` builds ImmediateMesh line and
CylinderMesh(top_radius=0) arrowhead at target end.

