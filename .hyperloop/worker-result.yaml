## Requirement: JSON Scene Graph Output — COVERED

**Implementation:** `build_scene_graph()` returns a `SceneGraph` TypedDict with
`nodes`, `edges`, `metadata`. `__main__.py` serialises to JSON via
`json.dumps(graph, indent=2)`. `schema.py` defines the complete contract.

**Scenario: Output format**
- Nodes include id, name, type, parent, metrics — verified by `TestNodeSchema`
  (14 tests) and `TestSceneGraphOutput` (9 tests).
- Edges include source, target, type — verified by `TestEdgeSchema` (8 tests).
- JSON-serialisable: `test_output_is_json_serialisable`,
  `TestSchemaStructure::test_scene_graph_is_json_serialisable`. COVERED.

## Requirement: Spec Extraction — COVERED (SHOULD)

**Implementation:** `extract_spec_nodes()` in `extractor/extractor.py`.
Spec nodes carry `type="spec"` and ids prefixed `spec.*`, making them
distinguishable from code-derived nodes. `build_scene_graph(include_specs=True)`
merges them.

**Scenario: Kartograph specs**
- Tests: `TestSpecExtraction::test_spec_nodes_have_spec_type`,
  `test_spec_nodes_distinguishable_from_code_nodes`,
  `test_spec_node_ids_prefixed`, `test_spec_child_nodes_have_parent`,
  `test_no_spec_nodes_when_not_enabled`, `test_no_spec_nodes_when_no_specs_dir`.
  COVERED.

