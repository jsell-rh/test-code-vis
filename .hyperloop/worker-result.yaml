## Requirement: View Specs as Intermediate Representation

**Status: COVERED**

Implementation:
- `LLMViewGenerator.parse_response()` returns a plain `Dictionary` with `"question"` and
  `"operations"` keys — never raw Node3D geometry.
- `SceneInterpreter.apply()` consumes that dictionary and mutates scene-tree nodes.
- The two stages are decoupled: the LLM never touches Node3D objects.

### Scenario: LLM produces view spec — COVERED

| THEN clause | Implementation | Test |
|---|---|---|
| emits structured view spec (not raw 3D geometry) | `parse_response()` returns `Dictionary`, not Node/geometry | `test_parse_response_returns_dictionary` (line 157): `result is Dictionary` |
| view spec controls show/hide/highlight/arrange/annotate/connect | `_make_spec()` filters and preserves all 6 op types | `test_parse_response_all_six_ops_pass_through` (line 273): `spec["operations"].size() == 6` with all 6 ops named |
| 3D renderer interprets view spec into spatial scene | `SceneInterpreter.apply()` dispatches all 6 ops to Node3D mutations | `test_all_six_ops_mutate_scene_correctly` (test_scene_interpreter.gd:445): `anchor_a.visible`, `anchor_b.visible`, `mat_a.albedo_color.g`, `anchor_a.position.x`, `label.text`, `line_added` all asserted |

