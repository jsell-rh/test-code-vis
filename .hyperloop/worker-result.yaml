### Requirement: Non-Inverted Movement тАФ COVERED

**Implementation** (`camera_controller.gd`, lines 141тАУ160):
```
_target_pivot -= right * delta.x * pan_amount
_target_pivot -= backward * delta.y * pan_amount
```
Comment explicitly documents Google Maps convention. Drag left (delta.x < 0) тЖТ
pivot.x increases тЖТ camera moves +X тЖТ scene shifts left. Direction matches drag. тЬУ

**Tests**:
- `test_pan_direction_not_inverted`: At phi=PI/2 (camera on +Z), dragging left 50px
  тЖТ `cam._pivot.x > 0.0`. Sign chain independently verified: delta.x=-50,
  right=(1,0,0), `-= right*(-50)` тЖТ pivot.x += 50 тЖТ scene moves left тЬУ

#### Scenario: Drag direction matches view movement тАФ COVERED
Same test covers this scenario.

