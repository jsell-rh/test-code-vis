## Requirement-by-Requirement Coverage

### Requirement: Question-Driven View Generation

**Implementation:**
- `LLMViewGenerator.build_prompt()` (`godot/scripts/llm_view_generator.gd`) embeds the question and graph node IDs in the prompt.
- `LLMViewGenerator.parse_response()` returns a validated view-spec Dictionary.
- `SceneInterpreter.apply()` (`godot/scripts/scene_interpreter.gd`) mutates scene-tree Node3D properties in response to each operation in the spec.
- `main.gd::apply_view_spec()` wires Stage 1 → Stage 2 on the live scene.

**Scenario: Architectural question** — COVERED

| THEN-clause | Code | Test |
|---|---|---|
| generates a view focused on auth-related components | `_apply_show()`: `anchor.visible = true`; `_apply_highlight()`: `mat.albedo_color = Color(r,g,b)` | `test_show_op_sets_visible_true`, `test_highlight_op_changes_albedo_color` |
| irrelevant components are hidden or de-emphasized | `_apply_hide()`: `anchor.visible = false` | `test_hide_op_sets_visible_false` |
| relevant components are arranged to answer the question | `_apply_arrange()`: `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`, `test_arrange_op_sets_all_three_axes` |

**Scenario: Impact question** — COVERED

| THEN-clause | Code | Test |
|---|---|---|
| view showing the user database and all its dependents | `_apply_show()`: `anchor.visible = true` | `test_show_op_sets_visible_true` |
| dependency relationships are spatially clear | `_apply_connect()`: ImmediateMesh line + CylinderMesh arrowhead | `test_connect_op_adds_line_geometry`, `test_connect_op_adds_arrowhead` |

