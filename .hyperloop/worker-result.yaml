### Requirement: Pre-Computed Layout — PARTIAL

**Scenario: Layout in JSON**

- "each node's `position` field contains x, y, z coordinates" → **COVERED**
  All nodes receive positions from `compute_layout()`. Both Python tests
  (`TestLayout::test_all_nodes_have_positions_after_layout`) and Godot tests
  (`test_scene_graph_loading.gd::test_anchor_positions_match_json`) confirm this.

- "tightly coupled nodes have smaller distances between them" → **COVERED**
  `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled`
  uses the `src_coupling` fixture with 4 BCs and asserts
  `dist(auth, shared_kernel) < dist(auth, billing)`.
  `test_layout.py::TestTightlyCoupledNodesAreCloser` exercises the standalone
  `layout.py::compute_layout()` with multiple edge counts and verifies the
  spring-force attraction produces shorter distances for coupled pairs.

- "child nodes are positioned within the spatial bounds of their parent" → **PARTIAL**
  `test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position`
  verifies that, using the extractor's absolute coordinates, the stored child
  position is numerically close to the stored parent position (within `bc_radius`).
  However this test does not catch the absolute-vs-relative bug described above:
  at Godot render time the children would appear double-offset from their parent,
  placing them outside the parent's visual bounds. No integration test covers
  the full extractor → Godot pipeline for child placement.

- "Godot application renders nodes at these positions without recomputing layout"
  → **COVERED** (for hand-crafted fixtures). `test_scene_graph_loading.gd::
  test_anchor_positions_match_json` confirms positions flow directly from JSON
  to `anchor.position` without any layout recomputation in GDScript.

