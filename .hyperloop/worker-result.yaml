## Additional Checks

- **No dict-key-only assertions**: All tests in `test_scene_interpreter.gd` create real
  `Node3D` objects, call `SceneInterpreter.apply()`, and assert `.visible`,
  `.position.x/y/z`, `mat.albedo_color.r/g/b`, `label.billboard`, `label.pixel_size`,
  `label.text`, and `MeshInstance3D` child presence. No shallow `.has()` dict-key tests.
- **Label3D legibility**: `_apply_annotate()` sets `billboard = BILLBOARD_ENABLED` and
  `pixel_size = 0.05`. Tested by `test_annotate_label_billboard_enabled` and
  `test_annotate_label_pixel_size_positive`.
- **Arrowhead direction**: `_apply_connect()` uses `Quaternion(Vector3.UP, dir)` to
  orient the cone tip along the edge direction. `test_connect_op_adds_arrowhead` asserts
  ≥2 MeshInstance3D children (line + arrowhead).
- **Pipeline wiring**: `apply_view_spec()` in `main.gd` instantiates `SceneInterpreter`
  and calls `interp.apply(spec, _anchors, self, _world_positions)`. Confirmed at line
  271–273.
- **`_make_spec()` filtering verified**: The filter `VALID_OPS.has(op.get("op", ""))`
  is the sole gate for ops entering the renderer. No bypass path.
- **DirAccess iteration test**: `test_scripts_dir_contains_only_gdscript` in
  `test_engine_version.gd` uses `DirAccess.open("res://scripts")` to iterate every file
  in the scripts directory and asserts each filename ends in `.gd` — satisfying the
  "all scripts use GDScript" THEN-clause predicate.

