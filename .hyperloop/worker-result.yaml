## Requirement-by-Requirement Coverage

### Requirement: Conformance Mode — COVERED

The system MUST allow the human to see whether the as-built system matches the as-specced design.

Implementation: `check_alignment(actual_nodes, spec_node_ids)` returns `{aligned, divergent, missing}`;
`render_alignment()` applies Label3D annotations ("✓ SPEC ALIGNED", "⚠ MERGED") and highlights
divergent nodes on the live scene tree.

#### Scenario: Spec-aligned implementation
| THEN-clause | Test | Key assertion |
|---|---|---|
| human can see auth and user_management as separate components | `test_aligned_nodes_detected_as_separate` | `result["aligned"].has("auth")` and `.has("user_management")` |
| correspondence between spec and realization is visually apparent | `test_aligned_nodes_have_annotation_in_scene` | `label_count >= 1` Label3D added to live Node3D scene root |

#### Scenario: Spec-divergent implementation
| THEN-clause | Test | Key assertion |
|---|---|---|
| human can see the divergence | `test_divergent_nodes_detected` | `missing.has("payment_service") or divergent.has("payment_service")` |
| specific nature of divergence is clear (merged vs. separate) | `test_divergent_nodes_annotated_as_merged` | `divergent.has("payment")` AND Label3D with "MERGED" in text |

---

### Requirement: Evaluation Mode — COVERED

The system MUST allow the human to evaluate architectural quality independent of the spec.

Implementation: `analyze_coupling(nodes, edges, threshold)` returns `{pairs}` sorted by
coupling_score; `analyze_criticality(nodes, edges, threshold)` returns `{critical}` sorted by
in_degree; `render_coupling()` and `render_criticality()` apply HIGHLIGHT_COLOR and Label3D
annotations ("⚠ Coupling: N", "⚠ SPOF Risk (in-degree: N)").

#### Scenario: Detecting tight coupling
| THEN-clause | Test | Key assertion |
|---|---|---|
| coupling between services is apparent | `test_tightly_coupled_pair_detected` | `pairs.size() >= 1` and `pairs[0]["coupling_score"] >= 2` |
| human can assess whether coupling is problematic | `test_coupled_nodes_highlighted` | `svc_x` and `svc_y` MeshInstance3D `albedo_color == HIGHLIGHT_COLOR` |

#### Scenario: Identifying single point of failure
| THEN-clause | Test | Key assertion |
|---|---|---|
| criticality and centrality of component is apparent | `test_central_node_detected_as_critical` | `critical[0]["node_id"] == "hub"` and `critical[0]["in_degree"] == 3` |
| risk it represents is clear | `test_critical_node_annotated_with_spof_risk` | Label3D with "SPOF" in text present in scene |

#### Scenario: Spec faithfully implemented but architecturally poor
| THEN-clause | Test | Key assertion |
|---|---|---|
| architectural problems visible even though conformance is perfect | `test_coupling_detected_despite_perfect_alignment` | `aligned.size() == 2` (perfect conformance) AND `pairs.size() >= 1` (coupling still detected) |

---

### Requirement: Simulation Mode — COVERED

The system MUST allow the human to explore the impact of hypothetical changes.

Implementation: `simulate_split(nodes, edges, node_id)` returns `{dependents, new_interfaces}`;
`simulate_failure(nodes, edges, node_id)` performs BFS through the reverse dependency graph and
returns `{cascade}`; `render_split_impact()` and `render_failure_cascade()` apply highlights
and Label3D annotations ("◈ SPLITTING", "↯ Affected by split", "✕ FAILED", "⚡ Cascading failure").

#### Scenario: Splitting a service
| THEN-clause | Test | Key assertion |
|---|---|---|
| impact on dependent services is visible | `test_split_dependents_detected` | `dependents.has("client_a")` and `dependents.has("client_b")` |
| new dependencies or interfaces that would be required are shown | `test_split_new_interfaces_shown` | `new_interfaces.size() >= 1`; `caller` albedo_color == HIGHLIGHT_COLOR; Label3D with "split" in scene |

#### Scenario: Failure injection
| THEN-clause | Test | Key assertion |
|---|---|---|
| cascade of effects through system is visible | `test_failure_cascade_detected` | `cascade.has("api")` and `cascade.has("frontend")` (BFS: db→api→frontend) |
| components that would be affected are clearly identified | `test_failure_affected_nodes_highlighted` | `consumer_1` albedo_color == HIGHLIGHT_COLOR; Label3D with "FAILED" on failed node |

