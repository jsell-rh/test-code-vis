### Requirement: Abstract Visual Language — COVERED

**Implementation:**
- `main.gd` `_create_volume()`: all nodes use `BoxMesh`; no buildings, terrain, or
  thematic decoration anywhere in the codebase.
- Size set to `sz` derived from LOC via `size_from_loc()`.
- Child anchors added inside parent anchor (containment by nesting).

**Scenario: Visual representation — COVERED**
- Geometric volumes: `test_scene_graph_loading.gd` `test_mesh_instances_exist_in_anchors`.
- Size reflects complexity: `test_size_encoding.gd` `test_large_module_has_bigger_mesh`
  and `test_mesh_sizes_proportional_to_metric`.
- Containment by nesting: `test_containment_rendering.gd`
  `test_module_parented_inside_context`.

