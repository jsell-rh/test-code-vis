## THEN → Test Mapping (Verifier's Independent Derivation)

Per guidelines: derive expected predicate from spec BEFORE reading test bodies.

### Process note on check-nondirectional-movement-assertions.sh

This check was added to main AFTER the branch was created. It now passes against the
fixed implementation, which is additional machine-level confirmation that the prior
cycle reviewers' F4 (null directional test) has been resolved.

### Spec Requirement: Pan with Left Mouse Button

**THEN: camera pans in the direction of the drag**
- Spec: LMB + drag causes the camera to pan
- Test: `test_lmb_pan_moves_pivot`
- Assertion: `cam._pivot != initial_pivot`
- Note: This is a presence test (pivot moved), not a directional test. The directional
  requirement is covered by the adjacent Non-Inverted Movement tests below.
  The function name `test_lmb_pan_moves_pivot` does NOT match the DIRECTION_RE pattern
  in check-nondirectional-movement-assertions.sh (requires `test_pan_`, `test_drag_`,
  etc. immediately after `test_`), so the null-predicate check does not apply here.
- Status: COVERED (panning occurred)

**AND: movement direction matches drag direction (not inverted)**
- See Non-Inverted Movement mapping below.

### Spec Requirement: Non-Inverted Movement

**THEN: scene moves in same direction as drag (i.e. dragging left reveals content to the right, as in Google Maps)**

Pre-read derivation from the "i.e." parenthetical (definition, not example):

Google Maps map-grab sign chain for drag LEFT:
1. User drags left (delta.x = -50)
2. User is "grabbing" the map and pulling left
3. The map slides LEFT under the user's hand
4. Content to the RIGHT of the initial viewport becomes visible
5. Camera effectively moved RIGHT → camera origin moved in +X direction
6. Pivot (camera focus) moved RIGHT → pivot.x INCREASES
7. In headless identity basis (basis.x = (1,0,0)): pivot.x += |delta.x| × pan_amount

Derivation for drag RIGHT (delta.x = +50, Google Maps):
1. Map slides RIGHT → camera moves LEFT → pivot.x DECREASES

Implementation verification (camera_controller.gd lines 134-135):
```
_pivot -= right * delta.x * pan_amount
```
- drag left: delta.x = -50 → `_pivot -= (1,0,0) * (-50) * 0.12` = `_pivot += (6, 0, 0)` → pivot.x += 6 ✓
- drag right: delta.x = +50 → `_pivot -= (1,0,0) * (+50) * 0.12` = `_pivot -= (6, 0, 0)` → pivot.x -= 6 ✓

| THEN-clause | Test | Derived predicate | Actual assertion | Match |
|---|---|---|---|---|
| Drag left reveals content to the right | `test_pan_drag_left_increases_pivot_x` | pivot.x INCREASES | `cam._pivot.x > initial_x` | ✓ PASS |
| Drag right reveals content to the left | `test_pan_drag_right_decreases_pivot_x` | pivot.x DECREASES | `cam._pivot.x < initial_x` | ✓ PASS |
| Scene moves in same direction (drag down) | `test_drag_direction_matches_view_movement` | pivot.z DECREASES (drag down: delta.y=+50; `_pivot -= forward*(+50)*pan`; headless basis.z=(0,0,1) → pivot.z -= 6.0) | `cam._pivot.z < 0.0` | ✓ PASS |

All three tests use signed comparisons — confirmed by check-nondirectional-movement-assertions.sh. ✓

