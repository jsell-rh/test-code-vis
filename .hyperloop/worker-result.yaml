## task-007: Godot Application Spec Alignment — PASS

Independent review performed 2026-04-23. Every SHALL requirement in
`specs/prototype/godot-application.spec.md` is implemented and has GDScript
behavioral tests in `godot/tests/` that assert runtime property values and
scene-tree structure. No requirement is partial or missing.

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation**
- `godot/scripts/main.gd` `_ready()`: opens the JSON file, parses it with
  `JSON.new()`, calls `build_from_graph()`.
- `godot/scripts/scene_graph_loader.gd` `load_from_dict()`: parses nodes and
  edges from the raw dictionary; preserves all fields.
- `build_from_graph()`: iterates `nodes` → calls `_create_volume()` per node;
  iterates `edges` → calls `_create_edge()` per edge; positions anchors from
  JSON `position.{x,y,z}` fields.

**Tests** (`godot/tests/test_scene_graph_loading.gd`)
- `test_volumes_created_for_each_node` — asserts `_anchors` has an entry for
  every node id (THEN generates 3D volumes for each node).
- `test_mesh_instances_exist_in_anchors` — asserts each anchor contains a
  `MeshInstance3D` child (volumes have geometry).
- `test_edge_mesh_instances_created` — asserts ≥ 2 `MeshInstance3D` children on
  the main node after a single edge (line + arrowhead cone) (THEN generates
  connections for each edge).
- `test_anchor_positions_match_json` — asserts `anchor.position` equals the
  `Vector3` from the JSON `position` field (THEN positions elements according to
  layout data).
- `test_labels_are_billboard_and_readable` — asserts `Label3D.billboard ==
  BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true` (labels scale to
  remain readable as camera zooms in; also covers the Zooming-in THEN clause).

---

### Requirement: Containment Rendering — COVERED

**Implementation** (`main.gd` `_create_volume()`)
- `bounded_context`: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
- `module`: `albedo_color.a = 1.0` (fully opaque); default cull mode.
- Child module anchor is `add_child`-ed to the *parent* anchor, not to the scene
  root — real scene-tree nesting (visually inside).
- `BoxMesh.size.x` equals `float(nd["size"])`, so larger `size` → larger box.

**Tests** (`godot/tests/test_containment_rendering.gd`)
- `test_bounded_context_is_translucent` — `transparency != DISABLED && alpha < 1`.
- `test_module_is_opaque` — `alpha >= 1.0`.
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`
  (fixture: context size=10, module size=3).
- `test_bounded_context_cull_disabled` — `cull_mode == CULL_DISABLED` (boundary
  visually distinct: visible from all viewing angles unlike the children).

