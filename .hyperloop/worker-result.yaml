## THEN-Clause → Test Mapping

### Requirement: Flow is On-Demand

| THEN-clause | Test function | Assertion |
|---|---|---|
| NOT shown by default | `test_flow_not_active_by_default` | `not overlay.is_path_active()` |

### Scenario: Requesting a flow path

| THEN-clause | Test function | Assertion |
|---|---|---|
| relevant flow path lights up through the structure | `test_path_mid_node_lit_up` | `col.r >= 0.9 and col.g >= 0.9 and col.b >= 0.9` (bright white) |
| irrelevant structural elements are de-emphasized | `test_offpath_nodes_deemphasized` | `col.r <= 0.4 and col.a <= 0.4` (dimmed) |
| irrelevant elements de-emphasized (transparency) | `test_offpath_node_transparency_mode` | `mat.transparency == BaseMaterial3D.TRANSPARENCY_ALPHA` |
| flow path traceable — entry point distinct | `test_entry_node_green` | `col.g > 0.8 and col.r < 0.5 and col.b < 0.5` |
| flow path traceable — terminus distinct | `test_terminus_node_red` | `col.r > 0.8 and col.g < 0.5 and col.b < 0.5` |

### Scenario: Flow overlaid on structure

| THEN-clause | Test function | Assertion |
|---|---|---|
| flow rendered as a path through the structural space | `test_path_edges_visible` | `e1.visible and e2.visible` |
| path edges highlighted as path (not structural) | `test_path_edges_cyan` | `col.r <= 0.1 and col.g >= 0.8 and col.b >= 0.9` |
| structural context remains visible (not replaced) | `test_offpath_nodes_still_in_scene` | `other.get_parent() != null and other.visible` |
| human can follow the path spatially | `test_positions_unchanged_when_path_shown` | `entry.position.is_equal_approx(Vector3(1,0,2))` |

### Scenario: Identifying a bottleneck

| THEN-clause | Test function | Assertion |
|---|---|---|
| high-traffic paths visually prominent (≥500) | `test_high_traffic_edge_orange` | `col.r >= 0.9 and col.g <= 0.6 and col.b <= 0.1` |
| high-traffic paths prominent (100–499) | `test_medium_traffic_edge_yellow` | `col.r >= 0.9 and col.g >= 0.7 and col.b <= 0.1` |
| bottleneck points identifiable (overlay exists) | `test_bottleneck_node_has_overlay` | child with `name == "BottleneckOverlay"` found |
| bottleneck overlay is visually distinct (red) | `test_bottleneck_overlay_red` | `col.r >= 0.9 and col.g <= 0.1 and col.b <= 0.1` |

