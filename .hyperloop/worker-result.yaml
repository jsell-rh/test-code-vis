### Requirement: Navigation — COVERED

**Code:** `camera_controller.gd` implements orbit (middle-mouse drag → `_phi`, `_theta`),
zoom (scroll-wheel → `_distance`, clamped), and pan (right-mouse drag → `_pivot`
translation in camera-local XZ plane). `set_pivot()` frames the whole graph on load.

**Tests:** `test_camera_controls.gd` — 7 tests covering initial state, zoom in/out, orbit
horizontal/vertical, `set_pivot`, and zoom clamp.

**Scenario: Moving through the space** — COVERED

