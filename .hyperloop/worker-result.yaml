### 9. Not In Scope (excluded features MUST NOT be implemented)
**Status: COVERED — all exclusions confirmed absent**

Grep of `extractor/` and `godot/scripts/` for prohibited terms returns no matches:
- conformance mode: absent
- evaluation mode: absent
- simulation mode: absent
- data flow visualization: absent
- moldable views / LLM-driven views: absent
- spec extraction: absent (extractor produces only bounded_context and module nodes)
- first-person navigation: absent (camera is orbit-only)

Note: `schema.py` includes `"spec"` in `NodeType` and `lod_manager.gd` handles spec
node visibility. However, this is schema pass-through plumbing — there is no spec
extraction logic in the extractor, no conformance comparison UI, and no spec overlay
mode. The presence of a node type in the schema does not constitute implementing the
excluded feature. The extractor never emits spec nodes.

---

## Final Verdict: PASS

All 8 SHALL requirements have code implementation and corresponding behavioral tests
(GDScript tests assert runtime scene-tree properties with fixture data, Python pytest
tests assert extractor logic with hermetic temp-directory fixtures). All excluded
features are absent from production code.
