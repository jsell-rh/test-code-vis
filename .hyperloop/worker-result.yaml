## THEN-Clause Coverage (Task-010: Dependency Rendering)

Task-010 is scoped to the Dependency Rendering requirement.

### Requirement: Dependency Rendering

#### Scenario: Rendering a cross-context dependency

| THEN clause | Test function | File | Result |
|---|---|---|---|
| a line connects the two context volumes | test_edge_line_mesh_created | test_dependency_rendering.gd | PASS |
| the line's direction is visually indicated | test_direction_indicator_cone_created, test_direction_cone_near_target | test_dependency_rendering.gd | PASS |

Predicate verification:

- test_edge_line_mesh_created: Instantiates MainScript as a real Node3D, calls
  build_from_graph() with a two-node fixture, iterates get_children(), confirms
  a MeshInstance3D whose .mesh is ImmediateMesh exists. Correct predicate.

- test_direction_indicator_cone_created: Same fixture; confirms a MeshInstance3D
  whose .mesh is CylinderMesh with .top_radius == 0.0 (pointed tip = arrowhead)
  exists. Satisfies the guidelines requirement that "visually indicated" requires an
  explicit rendering element (arrowhead cone), not merely a colour difference.

- test_direction_cone_near_target: Asserts the cone's .position.distance_to(target_pos) < 2.0,
  confirming the cone is placed at the arrival end of the edge (direction correctly encoded).

"Visually indicated" guideline satisfied: Implementation uses CylinderMesh with
top_radius=0 (cone) oriented along the edge direction - an explicit geometric arrowhead.

