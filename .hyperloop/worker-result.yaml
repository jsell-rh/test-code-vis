## Requirement-by-Requirement Analysis

### Requirement: Pan with Left Mouse Button (SHALL/MUST)

**Status: COVERED**

Implementation (`camera_controller.gd`):
- `_handle_button`: `MOUSE_BUTTON_LEFT` sets `_panning = event.pressed` and records `_last_mouse`.
- `_handle_motion`: when `_panning`, computes `delta = position - _last_mouse`, then
  `_target_pivot -= right * delta.x * pan_amount` and `_target_pivot -= backward * delta.y * pan_amount`.
  Pivot is also updated immediately for responsive feel.

**Scenario: Panning the view**
- THEN the camera pans in the direction of the drag →
  `test_lmb_drag_pans_camera`: LMB press + motion event → asserts `cam._pivot != initial_pivot` ✓
- AND the movement direction matches the drag direction (not inverted) →
  `test_pan_direction_not_inverted`: at phi=PI/2, drag left (delta.x=-50) → asserts `cam._pivot.x > 0.0`
  (pivot moves +X → camera moves +X → scene appears to move left, matching drag direction) ✓

---

### Requirement: Non-Inverted Movement (SHALL/MUST)

**Status: COVERED**

Implementation: Same panning formula as above. The comment in the code explicitly notes
"Google Maps convention: drag moves scene in same direction as drag."

Formula derivation:
- At phi=PI/2: `basis.x` = world +X (right vector)
- Drag left: `delta.x = -50` → `_target_pivot -= (+X) × (-50) × pan_amount`
  = pivot.x increases → camera/pivot moves right → scene appears to move left (same as drag)

**Scenario: Drag direction matches view movement**
- THEN the scene moves in the same direction as the drag →
  `test_pan_direction_not_inverted`: same test covers this; drag left → `pivot.x > 0.0` ✓

