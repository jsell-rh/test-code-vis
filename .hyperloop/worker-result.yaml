### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 111–118: `MOUSE_BUTTON_RIGHT` press calls `begin_orbit_at_world_point(world_pt)` where
  `world_pt` is the ground point under the cursor.
- `begin_orbit_at_world_point` (lines 73–85): sets `_pivot = world_pt`, `_target_pivot = world_pt`,
  recomputes `_distance`, `_theta`, `_phi` from the camera offset so the camera does not jump —
  only the orbit centre changes.
- Motion handler (lines 135–139): `_phi` and `_theta` updated from drag delta when `_orbiting`.
- Camera always `look_at(_pivot)` in `_update_transform()`, so `_pivot` (= world_pt) stays at the
  visual centre throughout the orbit.

**Scenario: Orbiting around a component**
- GIVEN cursor over a specific component.
- WHEN RMB held and dragged.
- THEN camera orbits around point under cursor at orbit start.
- AND component remains at visual centre.

**Tests**:
- `test_orbit_uses_right_mouse_button` (`test_camera_controls.gd:249`) — RMB press + 50 px
  horizontal drag changes `_phi`. ✓
- `test_orbit_around_cursor_point` (`test_camera_controls.gd:269`) — `begin_orbit_at_world_point(
  (5,0,3))` leaves `cam._pivot == (5,0,3)`. ✓
- `test_orbit_pivot_is_world_point` (`test_camera_controls.gd:285`) — asserts
  `cam._pivot.is_equal_approx(world_pt)` after orbit begins. ✓

