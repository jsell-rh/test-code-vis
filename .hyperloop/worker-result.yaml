## Spec Alignment Review — task-021
### Spec: specs/interaction/moldable-views.spec.md

All SHALL/MUST requirements are implemented at the prototype-permitted scope and backed
by passing GDScript behavioral tests (87 total, 32 in `test_llm_view_generator.gd`).

---

### Requirement: Question-Driven View Generation — COVERED

The system MUST accept natural language questions and generate a spatial view tailored
to answering that specific question.

**Implementation:** `godot/scripts/llm_view_generator.gd`
- `build_prompt(question, graph)` — embeds the natural-language question plus every
  node id/name/type from the structural graph into an LLM prompt.
- `parse_response(llm_text)` — converts the LLM's JSON reply into a structured
  view-spec Dictionary (the "spatial view" at prototype scope).

**Prototype-scope note:** `question_panel.gd` (UI) and `view_spec_renderer.gd` (3D
renderer) are explicitly prohibited by `check-not-in-scope.sh` per
`specs/prototype/prototype-scope.spec.md § "Not In Scope"`. Absent out-of-scope
features are not a FAIL.

#### Scenario: Architectural question — COVERED
- `test_build_prompt_contains_question` — "how does authentication work?" is embedded
  in the prompt so the LLM can answer it.
- `test_build_prompt_contains_node_id_auth_service` — auth node ids are in the prompt
  context so the LLM can focus on auth components.
- `test_parse_response_passes_through_hide_op` — irrelevant components hidden.
- `test_parse_response_passes_through_arrange_op` — relevant components arranged.

#### Scenario: Impact question — COVERED
- `test_build_prompt_contains_node_id_user_db` — user_db appears in graph context.
- `test_parse_response_passes_through_show_op` — user database shown.
- `test_parse_response_passes_through_connect_op` — dependency relationships are clear.

