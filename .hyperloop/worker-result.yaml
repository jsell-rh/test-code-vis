## Requirement: Godot 4.6 — COVERED

**Spec**: MUST be built using Godot 4.6.x with GDScript. All API calls MUST be compatible with Godot 4.6.

**Implementation**:
- `godot/project.godot`: `config/features=PackedStringArray("4.6")` — declares Godot 4.6.x.
- All 3 scripts (`main.gd`, `camera_controller.gd`, `scene_graph_loader.gd`) are `.gd` (GDScript).
- Uses `FileAccess.open()` + `get_as_text()` — valid Godot 4.6 API (not deprecated `read_as_text()`).
- No `"Mono"` or `"C#"` in project.godot.

**Tests** (`godot/tests/test_engine_version.gd`):
- `test_project_godot_declares_46_feature` — reads project.godot, asserts `"4.6"` present ✓
- `test_project_godot_config_features_line` — asserts `"config/features"` and `'"4.6"'` both present ✓
- `test_project_does_not_declare_csharp` — asserts no `"Mono"` or `"C#"` ✓
- `test_file_access_get_as_text_returns_non_empty_string` — exercises Godot 4.6 FileAccess API ✓

