### Production Code
**`godot/scripts/understanding_analyzer.gd`** implements all three modes:

**Conformance Mode:**
- `check_alignment(actual_nodes, spec_node_ids) → Dictionary` — classifies spec IDs
  as aligned / divergent / missing relative to the actual node graph
- `render_alignment(alignment_result, anchors, scene_root) → void` — adds Label3D
  annotations ("✓ SPEC ALIGNED", "⚠ MERGED") and highlights divergent nodes

**Evaluation Mode:**
- `analyze_coupling(nodes, edges, threshold) → Dictionary` — detects tightly coupled
  node pairs by counting bidirectional edges
- `render_coupling(coupling_result, anchors, scene_root) → void` — highlights both
  nodes in each coupled pair and annotates with coupling score
- `analyze_criticality(nodes, edges, threshold) → Dictionary` — computes in-degree
  to identify high-centrality (SPOF risk) nodes
- `render_criticality(criticality_result, anchors, scene_root) → void` — highlights
  and annotates critical nodes with "⚠ SPOF Risk (in-degree: N)"

**Simulation Mode:**
- `simulate_split(nodes, edges, node_id) → Dictionary` — finds direct dependents and
  describes new interfaces required by the split
- `render_split_impact(split_result, split_node_id, anchors, scene_root) → void` —
  highlights split subject ("◈ SPLITTING") and all dependents ("↯ Affected by split")
- `simulate_failure(nodes, edges, node_id) → Dictionary` — BFS through reverse
  adjacency to find all transitively affected nodes
- `render_failure_cascade(failure_result, failed_node_id, anchors, scene_root) → void`
  — annotates failed node ("✕ FAILED") and highlights cascade members

**Shared infrastructure:**
- `HIGHLIGHT_COLOR = Color(1.0, 0.9, 0.0, 1.0)`
- `_highlight_node(anchor)` — sets MeshInstance3D material albedo_color
- `_add_annotation(scene_root, anchor, text)` — creates Label3D with
  `billboard = BaseMaterial3D.BILLBOARD_ENABLED` and `pixel_size = 0.05`

