### Requirement: Dependency Rendering — COVERED

"Direction visually indicated" satisfied by a real rendering element: a `CylinderMesh`
with `top_radius=0.0` (cone/arrowhead) oriented along the edge direction vector and
placed at the target end. This is NOT a plain line/colour difference.

Tests:
  test_edge_line_mesh_created            — ImmediateMesh child present
  test_direction_indicator_cone_created  — CylinderMesh with top_radius == 0.0 present
  test_direction_cone_near_target        — cone position within 2 units of to_pos
  test_cross_context_cone_is_orange      — asserts albedo_color.r > 0.8, .b < 0.3

