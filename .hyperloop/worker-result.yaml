## Untestable THEN-Clauses

None. All THEN-clauses are testable in the headless/CI environment.

Note: The "smoothly transition between overview and detail levels" clause is tested
via LOD system behavioral tests (`test_initial_theta_is_near_top_down` places the camera
in the top-down position, and `test_far_distance_shows_only_bounded_contexts` /
`test_near_distance_shows_all_nodes` confirm the transition logic). Actual frame
interpolation smoothness cannot be measured in headless mode, but the architectural
evidence is the lerped distance in `camera_controller.gd::_process()`.

