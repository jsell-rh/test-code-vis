## THEN-Clause → Test Mapping (Reviewer-Constructed)

### Scenario: Architectural question

| THEN-clause | Production code | Named test(s) | Predicate match |
|---|---|---|---|
| generates a view focused on auth-related components | `_apply_show()`: `anchor.visible = true`; `_apply_highlight()`: `mat.albedo_color = Color(r,g,b)` | `test_show_op_sets_visible_true`, `test_highlight_op_changes_albedo_color` | Asserts `anchor.visible == true`; asserts `mat.albedo_color.r/g/b` within 0.01 |
| irrelevant components are hidden or de-emphasized | `_apply_hide()`: `anchor.visible = false` | `test_hide_op_sets_visible_false` | Asserts `anchor.visible == false` on real Node3D |
| relevant components are arranged to answer the question | `_apply_arrange()`: `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`, `test_arrange_op_sets_all_three_axes` | Asserts `.position.x`, `.position.z`, all 3 axes within 0.001 |

### Scenario: Impact question

| THEN-clause | Production code | Named test(s) | Predicate match |
|---|---|---|---|
| view showing the user database and all its dependents | `_apply_show()`: `anchor.visible = true` | `test_show_op_sets_visible_true` | Asserts `anchor.visible == true` on real Node3D |
| dependency relationships are spatially clear | `_apply_connect()`: ImmediateMesh line + CylinderMesh cone arrowhead | `test_connect_op_adds_line_geometry`, `test_connect_op_adds_arrowhead` | Asserts ≥1 MeshInstance3D child; asserts ≥2 MeshInstance3D children (line + arrowhead) |

### Scenario: LLM produces view spec

| THEN-clause | Production code | Named test(s) | Predicate match |
|---|---|---|---|
| emits a structured view specification (not raw 3D geometry) | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` | `result is Dictionary` |
| view spec controls show, hidden, highlighted, arranged | `_make_spec()` passes all 6 valid ops through; each has a corresponding `_apply_*` branch | `test_parse_response_all_six_ops_pass_through`, individual `_passes_through_*` tests | Asserts `spec["operations"].size() == 6`; each op["op"] matches expected string |
| the 3D renderer interprets the view spec into a spatial scene | `SceneInterpreter.apply()` dispatches to scene mutations; wired via `main.gd::apply_view_spec()` | `test_all_six_ops_mutate_scene_correctly` | Asserts visible, albedo_color.g, position.x, label.text, MeshInstance3D presence on real Node3D objects |

### Scenario: LLM uses existing primitives

| THEN-clause | Production code | Named test(s) | Predicate match |
|---|---|---|---|
| composes from existing set of primitives (show, hide, highlight, arrange, annotate, connect) | `VALID_OPS` constant; `build_prompt()` lists all 6 in prompt text | `test_build_prompt_contains_show_primitive`, `_hide_`, `_highlight_`, `_arrange_`, `_annotate_`, `_connect_` | Asserts `prompt.contains("<primitive>")` for each of the 6 |
| no new rendering logic is generated at runtime | `_make_spec()` drops ops not in `VALID_OPS`; `SceneInterpreter.apply()` match block exhaustive over same 6 | `test_parse_response_filters_unknown_ops`, `test_parse_response_with_all_unknown_ops_returns_empty_operations`, `test_unknown_op_is_ignored` | Asserts unknown op dropped, size == 1 (valid survives); all-unknown → size == 0; unknown op → no scene change |

