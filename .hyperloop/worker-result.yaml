## Predicate Justifications (addressing prior reviewer findings)

### Finding 1: "the internal layers become visible" → test_near_distance_shows_all_nodes

**Prior wrong mapping:** `test_far_distance_shows_only_bounded_contexts` — that test asserts
modules are HIDDEN at FAR distance (opposite behavior: `mod_anchor.visible == false`).

**Correct mapping:** `test_near_distance_shows_all_nodes` asserts `mod_anchor.visible == true`
when `_distance` is set to the NEAR threshold. This directly covers "when the user zooms into
IAM, the internal layers become visible" — positive direction, correct predicate.

### Finding 2: "smoothly transition between overview and detail levels" → test_zoom_is_interpolated_not_instantaneous, test_far_distance_shows_only_bounded_contexts

**Prior wrong mapping:** `test_initial_theta_is_near_top_down` — verifies starting camera angle,
asserts nothing about smooth transitions.

**Correct mapping:** `test_zoom_is_interpolated_not_instantaneous` asserts `_distance` lerps
toward `_target_distance` over `_process()` frames without jumping — directly covering animation
smoothness. `test_far_distance_shows_only_bounded_contexts` covers the LOD transition aspect
(overview level). Both tests together cover smooth transition between overview and detail levels.
This is also a compound clause (contains "and") requiring ≥2 tests per
`check-compound-then-clause-coverage.sh`.

### Finding 3: "pan, zoom, and rotate the view" → test_lmb_pan_moves_pivot, test_scroll_up_decreases_distance, test_orbit_horizontal_drag_changes_phi

**Prior wrong mapping:** `test_camera_supports_zoom_in` alone — zoom only, partial predicate.

**Correct mapping (one test per capability in this compound clause):**
- Pan: `test_lmb_pan_moves_pivot` — LMB drag shifts pivot position
- Zoom: `test_scroll_up_decreases_distance` — scroll-up decreases camera distance
- Rotate: `test_orbit_horizontal_drag_changes_phi` — RMB drag changes orbital phi angle

