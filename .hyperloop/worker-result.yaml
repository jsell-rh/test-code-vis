## Test Quality

- `test_scene_interpreter.gd` uses the bool-return pattern. Every test instantiates real
  `Node3D`/`MeshInstance3D`/`Label3D` objects and asserts specific property values
  (`.visible`, `.position.x/y/z`, `.albedo_color.r/g/b`, `.billboard`, `.pixel_size`,
  child count). No dict-key-only assertions.
- `test_llm_view_generator.gd` uses the `_check()`/`_test_failed` pattern. Tests verify
  prompt content and parsed dict structure.
- `run_tests.gd` registers both suites (lines 37-40) and supports both test patterns.

