### Notes

1. **"Internal structure becomes visible as camera approaches"** (Camera Controls / Zooming
   scenario, third THEN-clause): No direct behavioral test exists. This assertion cannot be
   evaluated without a rendering surface in headless mode. The structural prerequisites are
   both tested: containment (modules are Godot children of context anchors, position
   assertions pass) and zoom (distance decreases on scroll-up). Since the prototype has no
   LOD or occlusion culling, internal structure is always visible once the camera is close
   enough. Marking as NOTE rather than FAIL — the gap is a headless-mode limitation, not a
   missing implementation.

2. **test_readable_labels.gd deleted**: This file existed on main and was replaced by the
   more comprehensive `test_labels_are_billboard_and_readable` test in test_scene_graph_loading.gd.
   The label coverage is equivalent and the run_tests.gd no longer references the old file. ✓

3. **set_pivot() signature**: The worktree's camera_controller.gd uses `set_pivot(pivot,
   distance)` (two arguments) to also reframe the camera distance. The test
   `test_set_pivot_updates_state` correctly calls the two-argument form and asserts both
   `_pivot == new_pivot` and `_distance == new_distance`. Consistent throughout. ✓

