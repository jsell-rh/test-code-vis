### Key Verification Points

**main.gd `_ready()` is not a stub** — calls `_load_and_build()` which opens the JSON
file, parses it, and invokes `_build()` to create volumes and edges.

**Direction indicator uses explicit cone geometry** — `_create_edge()` adds a
`CylinderMesh` with `top_radius=0` (pointed tip) at the target end, oriented along
the edge direction via `Quaternion(Vector3.UP, dir)`. A plain colored line alone
does not satisfy "visually indicated"; the cone satisfies it.

**Tests instantiate real Node3D objects** — `test_anchor_positions_match_json`
calls `MainScript.new()`, invokes `_build()`, and asserts `.position.x/y/z`
on real `Node3D` anchors (not `.has()` dict checks).

**THEN clause mapping (sampled)**:
- JSON loading / positions → `anchor.position = Vector3(p["x"], p["y"], p["z"])`; asserted by `test_anchor_positions_match_json`
- Containment translucency → `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`; asserted by `test_bounded_context_is_translucent`
- Containment nesting → module anchor `.get_parent() == ctx_anchor`; asserted by `test_module_parented_inside_context`
- Direction indicator → cone `MeshInstance3D` within 2 units of `to_pos`; asserted by `test_direction_cone_near_target`
- Size proportionality → `large.size.x / small.size.x` within 0.001 of 3.0; asserted by `test_mesh_sizes_proportional_to_metric`
- Top-down camera → `_theta = 0.15 < PI/4`; asserted by `test_initial_theta_is_near_top_down`
- Zoom → scroll-up decreases `_distance`; asserted by `test_scroll_up_decreases_distance`
- Orbit → middle-mouse drag changes `_phi` / `_theta`; asserted by two orbit tests
- Up-stays-up → `look_at(_pivot, Vector3.UP)` in `_update_transform()`

**Commit trailers** — `Spec-Ref` and `Task-Ref` present on implementation commit
`12ac742` (feat: add GDScript test suite and edge direction indicator).

