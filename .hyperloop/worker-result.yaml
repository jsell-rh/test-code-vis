### Requirement: JSON Scene Graph Output (MUST)

**COVERED**

#### Scenario: Output format

- **Code**: `build_scene_graph()` in `extractor/extractor.py` returns a `SceneGraph`
  TypedDict (defined in `extractor/schema.py`) with:
  - `nodes`: list of `Node` (id, name, type, parent, position, size, metrics)
  - `edges`: list of `Edge` (source, target, type)
  - `metadata`: `Metadata` (source_path, timestamp)
  The output is directly JSON-serialisable with `json.dumps` ÔÇö no transformation
  needed for Godot consumption.

- **Tests** (`test_extractor.py` ÔÇö `TestSceneGraphOutput`):
  - `test_build_scene_graph_has_required_keys` ÔÇö top-level keys present.
  - `test_output_is_json_serialisable` ÔÇö round-trip through `json.dumps/loads`.
  - `test_every_node_has_position` ÔÇö all nodes carry x/y/z.
  - `test_node_ids_are_unique` ÔÇö no duplicate IDs.
  - `test_nodes_include_bounded_contexts` / `test_nodes_include_internal_modules`
    ÔÇö content validation.
  - `test_edges_non_empty` ÔÇö at least one edge produced.
  - `test_metadata_has_source_path` / `test_metadata_has_timestamp` ÔÇö metadata
    fields present.
- **Tests** (`test_schema.py`): `TestSchemaStructure`, `TestNodeSchema`,
  `TestEdgeSchema`, `TestMetadataSchema`, `TestPreComputedLayout` ÔÇö exhaustively
  validate every field of the schema TypedDicts.

