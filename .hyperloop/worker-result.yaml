## task-007 — Godot Application Spec Alignment Review (2026-04-23)

Spec: `specs/prototype/godot-application.spec.md`
Branch: `hyperloop/task-007`

All implementation files read directly; findings are based on code inspection,
not prior reviews.

---

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation:** `godot/scripts/main.gd`
- `_ready()` calls `_load_and_build()` (non-stub)
- `_load_and_build()` opens file via `FileAccess`, parses with `JSON.new().parse()`,
  calls `_build(graph)`
- `_build()` iterates `graph["nodes"]` and calls `_create_volume()` for each node
- `_build()` iterates `graph["edges"]` and calls `_create_edge()` for each edge
- `_compute_world_positions()` / `_resolve_world_pos()` convert JSON position fields
  to `Vector3` and assign them to anchors

**Tests:** `godot/tests/test_scene_graph_loading.gd`
- `test_volumes_created_for_each_node()` — asserts `_anchors` has every node id ✓
- `test_mesh_instances_exist_in_anchors()` — asserts `MeshInstance3D` child in each anchor ✓
- `test_edge_mesh_instances_created()` — asserts ≥2 `MeshInstance3D` on main node (line + cone) ✓
- `test_anchor_positions_match_json()` — asserts local `.position` matches JSON `{"x","y","z"}` ✓
- `test_labels_are_billboard_and_readable()` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test == true` (covers "labels scale to remain readable" THEN clause) ✓

All THEN clauses of the "Loading kartograph's scene graph" scenario are covered.

