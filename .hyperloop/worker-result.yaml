## Findings

### F1 [FAIL] — Wrong direction predicate: pan direction is inverted relative to spec

**THEN-clause (authoritative parenthetical):** "the scene moves in the same direction as the drag (i.e. dragging left reveals content to the right, as in Google Maps)"

**Derived expected predicate (from "i.e." parenthetical):**
The spec cites Google Maps, which uses the map-grab model:
1. Drag left → scene (map) moves left in the viewport
2. Scene appearing to move left = camera focus point moves RIGHT
3. Therefore: drag-left → `_pivot.x` INCREASES (camera looks further right, revealing content to the right)
4. Corollary: drag-right → `_pivot.x` DECREASES

**Implementation (camera_controller.gd `_handle_motion`):**
```gdscript
# Non-inverted: right = camera-right (basis.x, no negation).
var right: Vector3 = global_transform.basis.x  # = (1,0,0) in headless
_pivot += right * delta.x * pan_amount
```
- Drag left (delta.x = -50) → `_pivot.x` DECREASES (camera looks further left)
- This reveals content to the LEFT — the opposite of the spec's requirement

**Tests with wrong predicates:**

`test_pan_drag_left_decreases_pivot_x` (line 116):
```gdscript
return cam._pivot.x < initial_x  # asserts DECREASES for drag-left
```
Per spec derivation: should assert `cam._pivot.x > initial_x` (INCREASES). **Predicate is inverted.**

`test_pan_drag_right_increases_pivot_x` (line 106):
```gdscript
return cam._pivot.x > initial_x  # asserts INCREASES for drag-right
```
Per spec derivation: should assert `cam._pivot.x < initial_x` (DECREASES). **Predicate is inverted.**

**Root cause:** The implementation chose the camera-pan model ("pivot follows drag direction"), but the spec's "i.e." parenthetical mandates the map-grab model ("content follows drag direction = pivot moves opposite to drag"). The tests verify the camera-pan behavior, so they pass against the wrong implementation and would also pass against any further sign-flip.

**Fix required:** In `_handle_motion`, negate the pan direction:
```gdscript
_pivot -= right * delta.x * pan_amount   # was +=
_pivot -= forward * delta.y * pan_amount  # was +=
```
Then update `test_pan_drag_left_decreases_pivot_x` to assert `> initial_x` and `test_pan_drag_right_increases_pivot_x` to assert `< initial_x`.

