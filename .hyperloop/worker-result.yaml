## Direction Predicate Independent Derivation

**test_pan_direction_not_inverted** — independently derived before reading test body:

- Spec says: "dragging left reveals content to the right" (Google Maps convention)
- Camera at phi=PI/2 means camera is on +Z side; `transform.basis.x` ≈ world +X.
- Drag LEFT: delta.x = -50 (position 100 → 50).
- Production code: `_target_pivot -= right * delta.x * pan_amount`
  = `_target_pivot -= (+X) * (-50) * pan_amount` = `_target_pivot += +X * positive`
- Result: pivot.x increases → camera moves +X → scene appears to move -X (left).
- "Scene moves left when you drag left" ✓ Google Maps convention.
- Test assertion: `cam._pivot.x > 0.0` — **correct direction**.

