## Spec Alignment Review — task-026 / specs/prototype/ux-polish.spec.md

All SHALL/MUST requirements in the UX Polish spec are implemented in
`godot/scripts/camera_controller.gd` and exercised by named GDScript
behavioral tests in `godot/tests/test_ux_polish.gd`.

All project check scripts pass (94 GDScript tests, 90 pytest tests, 0 failures).

---

## Requirement Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Code:** `_handle_button` sets `_panning = true` on LMB press and records
`_last_mouse`. `_handle_motion` computes `delta = event.position - _last_mouse`
and translates `_pivot` using `right * delta.x + forward * delta.y` scaled by
`pan_amount` (camera_controller.gd lines 116–126).

**Tests:**
- `test_lmb_pan_moves_pivot` — asserts `cam._pivot != initial_pivot` after LMB
  press + mouse move. PASS ✓
- `test_pan_drag_right_increases_pivot_x` — asserts pivot.x increases on
  rightward drag. PASS ✓
- `test_pan_drag_left_decreases_pivot_x` — asserts pivot.x decreases on
  leftward drag. PASS ✓

---

### Requirement: Non-Inverted Movement — COVERED

**Code:** In `_handle_motion`, `right` is `global_transform.basis.x` (no
negation). A positive `delta.x` (drag right) therefore increases `_pivot.x`,
matching the non-inverted Google Maps convention. (camera_controller.gd
lines 118–124)

**Tests:**
- `test_pan_drag_right_increases_pivot_x` — pivot.x > initial on right drag. PASS ✓
- `test_pan_drag_left_decreases_pivot_x` — pivot.x < initial on left drag. PASS ✓
- `test_drag_direction_matches_view_movement` — pivot moves on downward drag. PASS ✓

---

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Code:** `_zoom_toward_cursor(cursor_world, direction)` adjusts `_target_distance`
then shifts `_pivot` toward `cursor_world` via
`_pivot = _pivot.lerp(cursor_world, zoom_fraction)` where
`zoom_fraction = 1 - (_target_distance / old_target)`. Zoom-in moves pivot
toward cursor; zoom-out moves it away. (camera_controller.gd lines 87–97)

**Tests (zoom-in scenario):**
- `test_zoom_toward_cursor_shifts_pivot_toward_cursor` — pivot.x > 0 after
  zoom-in with cursor at (10,0,0). PASS ✓
- `test_component_stays_under_cursor_on_zoom_in` — pivot.x increases toward
  cursor on zoom-in. PASS ✓

**Tests (zoom-out scenario):**
- `test_zoom_out_from_cursor_shifts_pivot_away` — pivot.x < 5 after zoom-out
  with pivot at (5,0,0) and cursor at (10,0,0). PASS ✓
- `test_zoom_out_increases_target_distance` — _target_distance grows on
  zoom-out. PASS ✓

