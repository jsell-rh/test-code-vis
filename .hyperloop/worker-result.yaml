## Requirement: Camera Controls — COVERED

**SHALL**: Provide camera controls for navigating the scene.

**Code** (`godot/scripts/camera_controller.gd`):
- Spherical coordinate orbit: `_theta` (polar, 0=top-down), `_phi` (azimuth).
- Initial `_theta = 0.15` rad ≈ 8.6° — satisfies "defaults to top-down view".
- `MOUSE_BUTTON_WHEEL_UP/DOWN` adjusts `_distance` (zoom).
- `MOUSE_BUTTON_MIDDLE` drag adjusts `_phi` / `_theta` (orbit).
- `_theta` clamped to `[0.01, PI-0.01]` — "up stays up", prevents pole flip.
- `set_pivot()` called from `main.gd._frame_camera()` to frame the whole graph.
- `Label3D` uses `BILLBOARD_ENABLED` + `no_depth_test=true` (labels readable
  at all zoom levels, satisfying "labels scale to remain readable").

**Scenario: Top-down overview — `test_camera_controls.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| defaults to top-down view | `test_initial_theta_is_near_top_down` | `cam._theta < PI/4.0` |
| camera not at origin/pivot | `test_initial_distance_is_positive` | `cam._distance > 0.0` |

**Scenario: Zooming in — `test_camera_controls.gd` + `test_scene_graph_loading.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| camera moves closer | `test_scroll_up_decreases_distance` | WHEEL_UP → `cam._distance < initial` |
| zoom clamped | `test_zoom_clamped_at_minimum` | 200× WHEEL_UP → `cam._distance >= cam.min_distance` |
| labels scale readable | `test_labels_are_billboard_and_readable` | `lbl.billboard == BILLBOARD_ENABLED and lbl.pixel_size > 0 and lbl.no_depth_test` |

**Scenario: Orbiting — `test_camera_controls.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| camera rotates around focal point | `test_orbit_horizontal_drag_changes_phi` | MIDDLE + horizontal drag → `cam._phi != initial_phi` |
| camera altitude changes | `test_orbit_vertical_drag_changes_theta` | MIDDLE + vertical drag → `cam._theta != initial_theta` |
| up stays up | `test_orbit_theta_clamped_prevents_flip` | 1M px downward drag → `cam._theta <= PI - 0.01` |
| set_pivot tracks scene center | `test_set_pivot_updates_state` | `cam._pivot == new_pivot and cam._distance == new_distance` |

