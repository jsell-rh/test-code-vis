### 4. Desktop Platform (MUST) — COVERED (PASS-WITH-NOTE)

**Implementation:**
- No `Dockerfile`, no web export preset, no HTML5 target in `project.godot`.
- `project.godot` `config/features` declares only `"4.6"` (not `"Web"`).
- All Godot APIs used (`FileAccess`, `DirAccess`, `Node3D`, `Camera3D`,
  `MeshInstance3D`, `Label3D`, `ImmediateMesh`) are standard desktop Godot 4.6
  APIs with no browser/VM equivalents required.

**Note:** The THEN clause "runs natively without browser, container, or VM
dependencies" is a deployment-environment assertion that cannot be automatically
verified in headless CI. Structural evidence (API selection, absence of
web/container config) is the maximum achievable. This does not constitute a FAIL.

