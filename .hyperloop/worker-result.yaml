### 6. Readable Labels — COVERED

**Requirement:** MUST label all visible structural elements; label readable at zoom level.

**Code:** `main.gd:_create_volume()` adds `Label3D` with `text = nd["name"]`,
`pixel_size = 0.012`, `billboard = BaseMaterial3D.BILLBOARD_ENABLED`,
`no_depth_test = true`.

**Test:**
- `test_labels_are_billboard_and_readable` (test_scene_graph_loading.gd) — finds
  `Label3D` in anchor, asserts all three properties: `BILLBOARD_ENABLED`,
  `pixel_size > 0.0`, `no_depth_test == true`.

---

### 7. Dependency Visualization — COVERED

**Requirement:** MUST show dependencies as visible connections; direction discernible.

**Code:** `main.gd:_create_edge()` creates:
1. `ImmediateMesh` line (orange for `cross_context`, grey for `internal`).
2. `CylinderMesh` arrowhead (`top_radius = 0.0` = pointed cone) placed at the target
   end, oriented along the edge direction.

**Tests:**
- `test_edge_line_mesh_created` (test_dependency_rendering.gd) — `ImmediateMesh`
  child exists in main node.
- `test_direction_indicator_cone_created` (test_dependency_rendering.gd) —
  `CylinderMesh` with `top_radius == 0.0` exists (pointed arrowhead = direction indicator).
- `test_direction_cone_near_target` (test_dependency_rendering.gd) — cone is within
  2 units of `to_pos = (20, 0, 0)`.

