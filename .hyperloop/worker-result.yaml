### Requirement: Camera Controls — COVERED

**Spec**: The application MUST provide camera controls for navigating the scene.

**Scenarios**: Top-down overview / Zooming in / Orbiting

**Implementation**: `godot/scripts/camera_controller.gd`
- Extends `Camera3D`. Initial: `_theta=0.15` (≈8.6° from overhead), `_phi=0.0`,
  `_distance=40.0`. `_ready()` calls `_update_transform()`.
- `MOUSE_BUTTON_WHEEL_UP` → decrease `_distance` (clamped at `min_distance`).
- `MOUSE_BUTTON_WHEEL_DOWN` → increase `_distance` (clamped at `max_distance`).
- Middle-mouse drag → `_phi -= delta.x * orbit_speed`, `_theta = clamp(...)`.
  `_theta` clamped to `[0.01, PI-0.01]` so camera never flips (up stays up).
- Right-mouse drag → translate `_pivot` (pan).
- `_update_transform()` uses `look_at(_pivot, Vector3.UP)` when in scene tree,
  stores `position` when out of tree (safe for headless tests).
- `set_pivot(pivot, distance)` called by `main.gd._frame_camera()` to frame the scene.

**THEN clause verification:**
- "camera defaults to top-down view" → `_theta=0.15` (near 0 = overhead) (line 20)
- "camera moves closer" → `_distance -= zoom_speed * ...` on WHEEL_UP (line 59)
- "labels scale to remain readable" → `Label3D.billboard=BILLBOARD_ENABLED`, `pixel_size=0.012`
- "camera rotates around the current focal point" → spherical coords around `_pivot` (lines 95–98)
- "orientation remains intuitive (up stays up)" → `look_at(_pivot, Vector3.UP)` (line 105)

**Tests**: `godot/tests/test_camera_controls.gd` (8 tests)
- `test_initial_theta_is_near_top_down` — asserts `_theta < PI/4`
- `test_initial_distance_is_positive` — asserts `_distance > 0.0`
- `test_scroll_up_decreases_distance` — WHEEL_UP event; asserts `_distance` decreases
- `test_scroll_down_increases_distance` — WHEEL_DOWN event; asserts `_distance` increases
- `test_orbit_horizontal_drag_changes_phi` — middle-press + drag; asserts `_phi` changes
- `test_orbit_vertical_drag_changes_theta` — middle-press + vertical drag; asserts `_theta` changes
- `test_set_pivot_updates_state` — calls `set_pivot(new_pivot, new_distance)`; asserts both stored
- `test_zoom_clamped_at_minimum` — 200× WHEEL_UP; asserts `_distance >= min_distance`

Status: **COVERED** ✓

