### Requirement: Scale Through Zoom
**Status: COVERED**

The system MUST handle systems of varying size through level-of-detail, not scrolling or
panning across a flat surface.

**Scenario: Navigating from system level to module level**

**Implementation:**
- `godot/scripts/lod_manager.gd` defines FAR_THRESHOLD = 80.0 and NEAR_THRESHOLD = 20.0 and
  exposes `update_lod(node_entries, edge_entries, camera_distance)`:
  - FAR (> 80): only `bounded_context` (and `spec`) anchors visible; all edges hidden.
  - MEDIUM (20–80): `bounded_context` + `module` visible; only `cross_context` edges visible.
  - NEAR (≤ 20): everything visible — finest detail including `internal` edges.
- `main.gd → _process()` calls `_update_lod()` every frame, querying
  `camera_controller.get_distance()` to drive LOD.
- `main.gd → _create_volume()` populates `_lod_node_entries`; `_create_edge()` populates
  `_lod_edge_entries` (2 visuals per edge = line + arrowhead).

**Tests:**
- `test_far_distance_shows_only_bounded_contexts` — at FAR+10: context visible, module hidden.
- `test_far_distance_hides_all_edges` — at FAR+10: both cross_context and internal edges hidden.
- `test_medium_distance_shows_modules` — at midpoint: both context and module visible.
- `test_medium_distance_shows_cross_context_edges_only` — at midpoint: cross_context visible,
  internal hidden.
- `test_near_distance_shows_all_nodes` — at NEAR−5: both context and module visible.
- `test_near_distance_shows_internal_edges_as_fine_detail` — at NEAR−5: internal edges visible
  (satisfies "finer-grained details appear").
- `test_lod_node_entries_populated_after_build` — 4 entries for 4-node fixture, both types
  present.
- `test_lod_edge_entries_populated_after_build` — 4 entries (2 edges × 2 visuals), both
  edge types present.
- `test_lod_integration_far_hides_modules_in_built_scene` — end-to-end: build graph, apply
  FAR LOD, assert module hidden and context visible.

