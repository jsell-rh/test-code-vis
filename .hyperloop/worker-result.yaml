## Untestable THEN-Clauses

### 1. Desktop Platform — "runs natively without browser, container, or VM dependencies"
- **Verbatim THEN:** "it runs natively without browser, container, or VM dependencies"
- **Why untestable:** Verifying the absence of a browser/container/VM runtime requires
  inspecting the OS process table at launch time — not possible in a headless GDScript
  or pytest test.
- **Architectural evidence:** No HTML5 export preset in `godot/project.godot`, no
  Dockerfile, no container manifest, no Electron/browser dependency in the project.
  All runtime APIs (FileAccess, Node3D, Camera3D) are desktop Godot 4.x native.

### 2. Performance — "frame rate remains above 30fps"
- **Verbatim THEN:** "the frame rate remains above 30fps"
- **Why untestable:** `Engine.get_frames_per_second()` returns 0 in headless mode;
  there is no render pipeline in CI.
- **Architectural evidence:** LOD system (`lod_manager.gd`) culls distant modules and
  edges each frame, verified structurally by `test_lod_integration_far_hides_modules_in_built_scene`.

### 3. Performance — "no perceptible stutter or pop-in"
- **Verbatim THEN:** "there is no perceptible stutter or pop-in"
- **Why untestable:** "Perceptible" is a human-perceptual judgment requiring a live
  render at interactive frame rates.
- **Architectural evidence:** LOD transitions are threshold-based (not probability-based),
  so visibility changes are deterministic and verified by the LOD integration test.

