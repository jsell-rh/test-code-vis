### Requirement 5: Smooth Camera Movement (MUST)

**Implementation:** `godot/scripts/camera_controller.gd`
- `_process(delta)` lines 42–47: exponential lerp smoothing:
  `t = 1.0 - pow(0.05, delta * zoom_smooth)`
  `_distance = lerpf(_distance, _target_distance, t)`
  `_pivot = _pivot.lerp(_target_pivot, t)`
- Zoom events only mutate `_target_distance`/`_target_pivot`; actual values
  interpolate each frame → smooth animation, not instantaneous
- Pan events immediately set `_pivot = _target_pivot` (lines 158–159) for
  lag-free, proportional-to-drag-speed movement

**Scenario: Smooth zoom**
- GIVEN any camera position ✓
- WHEN user scrolls to zoom ✓
- THEN zoom animated smoothly (interpolated), not instantaneous ✓

**Tests:**
- `test_smooth_zoom_target_differs_from_distance_after_scroll` — after WHEEL_UP,
  asserts `_target_distance < _distance` (not yet interpolated = smooth not instant)
- `test_smooth_zoom_process_interpolates_distance` — after setting `_target_distance=20`,
  one `_process(0.1)` call → asserts `20 < _distance < 40` (lerp in progress)

**Scenario: Smooth pan**
- GIVEN any camera position ✓
- WHEN user drags to pan ✓
- THEN pan movement smooth and proportional to drag speed ✓

**Tests:**
- `test_pan_applied_immediately_no_lag` — after drag, asserts
  `cam._pivot.is_equal_approx(cam._target_pivot)` (no lerp lag on pan)
- `test_pan_proportional_to_drag_speed` — two cameras, 10px vs 50px drag →
  asserts `cam_fast._pivot.length() > cam_slow._pivot.length()`

**Status: COVERED**

