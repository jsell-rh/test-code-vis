### Requirement: JSON Scene Graph Loading ‚Äî COVERED

**Implementation:** `godot/scripts/main.gd`
- `_ready()` opens the file with `FileAccess.open(scene_graph_path, FileAccess.READ)`,
  reads via `file.get_as_text()`, parses with `JSON.new()` + `json.parse()`, delegates
  to `SceneGraphLoader.load_from_dict()`, then calls `build_from_graph(graph)`.
- `build_from_graph()` runs three passes: (1) bounded-context `Node3D` anchors
  positioned from `position.{x,y,z}`, (2) module anchors parented inside their BC,
  (3) edges via `_create_edge()`.

**THEN clause verification:**
- "it reads the JSON file" ‚Üí `FileAccess.open()` + `get_as_text()` in `_ready()`
- "generates 3D volumes for each node" ‚Üí `_create_volume(nd)` called for each node
- "generates connections for each edge" ‚Üí `_create_edge(edge, _anchors)` called for each edge
- "positions elements according to the layout data in the JSON" ‚Üí `anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))`

**Tests:** `godot/tests/test_scene_graph_loading.gd` ‚Äî 5 behavioral tests:
- `test_volumes_created_for_each_node` ‚Äî asserts `_anchors` contains both node ids
