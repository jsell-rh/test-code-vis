### Requirement: Zoom to Detail — COVERED

**Code**: `camera_controller.gd` reduces `_target_distance` on WHEEL_UP; `_process`
lerps `_distance` toward `_target_distance` (smooth). `lod_manager.gd::_apply_medium()`
shows bounded_context + module nodes at NEAR_THRESHOLD < dist ≤ FAR_THRESHOLD.
`_apply_near()` shows everything at dist ≤ NEAR_THRESHOLD (20). `_create_volume()`
uses `sz = float(nd["size"])` for BoxMesh dimensions (size encodes complexity).

**Tests**:
- `test_camera_controls.gd::test_scroll_up_decreases_distance`: WHEEL_UP decreases
  `_target_distance`. ✓
- `test_spatial_structure.gd::test_medium_distance_shows_modules`: mid = (NEAR +
  FAR)/2 = 50; asserts both ctx and mod anchors visible. Uses correct constant names
  `LodManager.NEAR_THRESHOLD` (= 20) and `LodManager.FAR_THRESHOLD` (= 80). ✓
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`: large_mod.size=9,
  small_mod.size=3; asserts ratio ≈ 3.0 ± 0.001. ✓

---

### Requirement: Abstract Visual Language — COVERED

**Code**: `_create_volume()` uses `BoxMesh`. Bounded contexts are translucent
(`TRANSPARENCY_ALPHA`, alpha=0.18). Modules are opaque (alpha=1.0). Module anchors
are parented to their context anchor (containment = scene-tree nesting).
No buildings, terrain, or metaphorical decoration. Size from `float(nd["size"])`.
Position from coupling-ordered layout (`_order_by_coupling`).

**Tests**:
- `test_containment_rendering.gd::test_bounded_context_is_translucent`:
  asserts `mat.transparency != TRANSPARENCY_DISABLED and mat.albedo_color.a < 1.0`.
- `test_containment_rendering.gd::test_module_is_opaque`:
  asserts `mat.albedo_color.a >= 1.0`.
- `test_containment_rendering.gd::test_module_parented_inside_context`:
  asserts `mod_anchor.get_parent() == ctx_anchor` (scene-tree nesting). ✓
- `test_containment_rendering.gd::test_bounded_context_larger_than_module`:
  asserts `ctx_mesh.size.x > mod_mesh.size.x`. ✓
- `test_size_encoding.gd`: size proportionality tested. ✓
- `test_coupled_bcs_are_closer_than_uncoupled`: position reflects coupling. ✓

