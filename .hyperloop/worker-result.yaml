- **THEN human can determine whether build is architecturally sound** — `main.gd`
  produces both size-encoded `BoxMesh` volumes and `ImmediateMesh` coupling edges
  in the same scene.
  Test: `test_structural_metrics_available_in_scene` `_check`s `has_size_encoded_box`
  AND `has_edge_line` are both true from a two-node, one-edge fixture. **COVERED**

- **THEN human can explore impact of potential changes** — `camera_controller.gd`
  exposes `set_pivot`, `get_distance`, `_handle_button`, `_handle_motion`, and
  `_zoom_toward_cursor`.
  Test: `test_navigation_methods_exist_on_camera_controller` calls
  `cam.has_method(...)` for each and `_check`s all five are present. **COVERED**

**Verdict for Requirement 3: PASS — all in-scope THEN-clauses COVERED**

