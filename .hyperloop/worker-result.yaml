### F3 (RACF — 7th consecutive cycle): check-direction-test-derivations.sh — Missing in-body sign-chain arrow

**Status:** FAIL — Re-attempt Compliance Failure (RACF). Has failed in every cycle since cycle 3.

`test_zoom_toward_point_moves_pivot_toward_target` in `godot/tests/test_camera_controls.gd` has a sign-chain derivation comment in the `##` docstring above the `func` declaration, but `check-direction-test-derivations.sh` scans only lines AFTER the `func` declaration — so it never finds the arrow.

**Fix:** Add a `#` inline comment with `→` inside the function body, before the first assertion:
```gdscript
func test_zoom_toward_point_moves_pivot_toward_target() -> bool:
    # spec: call set_pivot(target, dist) → _pivot = target → dist changes to new_distance ✓
    var cam = CameraScript.new()
    ...
```
The docstring may remain; just add a duplicate inside the body.

