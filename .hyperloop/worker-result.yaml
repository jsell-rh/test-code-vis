### Requirement: View Specs as Intermediate Representation — COVERED

The system MUST use a structured view specification as the intermediate representation
between the LLM and the 3D renderer.

**Implementation:** `parse_response()` returns `{"question": str, "operations": Array}`
— a structured Dictionary, not raw 3D geometry.

#### Scenario: LLM produces view spec — COVERED
- `test_parse_response_returns_dictionary` — result is a Dictionary (not geometry).
- `test_parse_response_has_question_key` — "question" key present.
- `test_parse_response_has_operations_key` — "operations" key present.
- `test_parse_response_operations_is_array` — operations is an Array.
- `test_parse_response_preserves_question` — the original question is preserved.
- `test_parse_response_passes_through_show_op`, `_hide_op`, `_highlight_op`,
  `_arrange_op`, `_annotate_op`, `_connect_op` — view spec controls all listed
  element states and arrangements.

---

### Requirement: Fixed Visual Primitive Set — COVERED

The set of visual primitives MUST be fixed and finite. The LLM selects from them;
it does not invent new ones.

**Implementation:** `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate",
"connect"]` is the closed set. `_make_spec()` filters out any op not in `VALID_OPS`
before returning — no new rendering logic can be introduced at runtime.

#### Scenario: LLM uses existing primitives — COVERED
- `test_build_prompt_contains_show_primitive` through `_connect_primitive` — all 6
  primitives are listed in the prompt so the LLM knows the fixed contract.
- `test_parse_response_all_six_ops_pass_through` — all 6 valid ops survive filtering.
- `test_parse_response_filters_unknown_ops` — unknown ops are silently dropped.
- `test_parse_response_with_all_unknown_ops_returns_empty_operations` — all-unknown
  yields zero operations (no new rendering logic).

