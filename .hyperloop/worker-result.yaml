### F3 — FAIL: check-relative-position-tests.sh [BLOCKING — same as previous review, NOT fixed]

**check**: `check-relative-position-tests.sh` exits 1

**Part A — extractor bug**: `extractor/extractor.py` lines 228–230 stores
absolute world coordinates for child nodes (parent world position + local offset):
```python
child["position"] = {
    "x": px + pos[0],  # absolute, not relative
    "y": py + pos[1],
    "z": pz + pos[2],
}
```
`main.gd` sets `anchor.position` (LOCAL position relative to parent anchor) directly
from the JSON value, then adds the child anchor as a child of the parent anchor.
Godot's scene tree then adds the parent's world position automatically. When a parent is
at a non-zero world position, the child's visual position becomes
`parent_world + stored_absolute = parent_world + (parent_world + offset) = double-offset`.

This is a rendering correctness bug that manifests whenever any parent node is not at the
origin (i.e., for all real kartograph data).

**Part B — test gap**: The existing test `test_volumes_positioned_from_json` uses a fixture
where `ctx1` (parent) is at `position: {x:0, y:0, z:0}`. With parent at origin,
`absolute == relative`, so the test passes for both correct and incorrect implementations.
No test on the branch verifies that a child's JSON position is treated as a LOCAL offset
when the parent is at a non-zero world position.

**Fix**:
1. In `extractor/extractor.py`, store only the local offset:
   ```python
   child["position"] = {"x": pos[0], "y": pos[1], "z": pos[2]}
   ```
2. Add a pytest test (or GDScript test) that places the parent at a non-zero world
   position (e.g., x=10.0) and asserts `child["position"]["x"] == local_offset_x`
   (not `== parent_x + local_offset_x`).

