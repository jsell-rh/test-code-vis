### Requirement: Pan with Left Mouse Button
#### Scenario: Panning the view

**THEN: camera pans in the direction of the drag**
- Implementation: `_handle_button` sets `_panning = true` on LMB press (camera_controller.gd:73).
  `_handle_motion` applies pan: `_pivot -= right * delta.x * pan_amount` (line 134).
- Test: `test_lmb_pan_moves_pivot` (test_ux_polish.gd:86)
  - Drags right 50 px; asserts `cam._pivot != initial_pivot`.
  - Non-directional presence check — acceptable here because this test's sole purpose is
    confirming LMB activates pan. Direction is fully covered by the AND-clause tests.
- Status: COVERED.

**AND: movement direction matches the drag direction (not inverted)**
- Derivation (drag right, delta.x = +50, headless basis.x = (1,0,0)):
  `_pivot -= (1,0,0)*(+50)*pan_amount` → pivot.x decreases. Spec predicate: pivot.x < initial_x.
- Test: `test_pan_drag_right_increases_pivot_x` (test_ux_polish.gd:108)
  - Actual assert: `cam._pivot.x < initial_x` — matches spec-derived predicate ✓
  - NOTE: function name says "increases" but asserts decrease. Name is a relic from the
    pre-fix state (cycles ≤5). Non-blocking; assertion is correct.
- Derivation (drag left, delta.x = −50):
  `_pivot -= (1,0,0)*(−50)*pan_amount` → pivot.x increases. Spec predicate: pivot.x > initial_x.
- Test: `test_pan_drag_left_decreases_pivot_x` (test_ux_polish.gd:119)
  - Actual assert: `cam._pivot.x > initial_x` — matches spec-derived predicate ✓
  - NOTE: function name says "decreases" but asserts increase. Same relic issue. Non-blocking.
- Status: COVERED.

