## Untestable THEN-Clauses

### "THEN the frame rate remains above 30fps"
1. **Verbatim**: "THEN the frame rate remains above 30fps"
2. **Why untestable**: FPS measurement requires a GPU render pipeline. Godot headless mode
   runs without a display server render loop; `Engine.get_frames_per_second()` always
   returns 0 in headless mode. There is no CI-compatible mechanism to observe frame rate.
3. **Architectural evidence**: `lod_manager.gd` implements Level-of-Detail culling, actively
   removing invisible geometry from the render queue each frame. It is integrated in `main.gd`
   via `_lod_manager.update(camera_pos)`. Structural correctness at kartograph scale
   (6 bounded contexts, 54 modules) is verified by `test_nfr_scale.gd` — `build_from_graph()`
   completes without errors and produces exactly 60 anchors.

### "AND there is no perceptible stutter or pop-in"
1. **Verbatim**: "AND there is no perceptible stutter or pop-in"
2. **Why untestable**: "Perceptible" is a subjective human-perception metric requiring
   real-time rendering. It cannot be measured in a headless test environment.
3. **Architectural evidence**: LOD thresholds in `lod_manager.gd` control mesh visibility
   transitions based on camera distance, preventing sudden geometry appearance (pop-in).
   The LOD system uses smooth distance-based culling rather than abrupt on/off switching.

