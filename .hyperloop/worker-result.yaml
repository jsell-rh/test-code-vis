### Requirement: Top-Down Architectural View — COVERED

**Scenario: Viewing kartograph from above**
- GIVEN kartograph's scene graph is loaded
- WHEN the user is in top-down view
- THEN all bounded contexts are visible as distinct volumes
- AND their relative positions reflect their coupling
- AND dependencies between contexts are visible as connections

**Implementation:**
- `camera_controller.gd` defaults `_theta = 0.15` (~8.6° from vertical) —
  near-top-down start position
- `extractor/extractor.py::_order_by_coupling()`: greedy ordering by coupling
  score ensures tightly coupled contexts are adjacent in the circular layout;
  `_circular_positions()` translates order to world positions
- Cross-context edges rendered as orange `ImmediateMesh` lines with arrowheads

