### Requirement: Evaluation Mode — COVERED

> The system MUST allow the human to evaluate the architectural quality of the realized
> system independent of the spec.

**Implementation:** `apply_quality_overlay(nodes_data, edges_data, anchors)` computes
in-degree per node and detects mutual bidirectional edges. Nodes with `in_degree >= 3`
receive `CRITICAL_COLOR`; nodes with `in_degree >= 2` or mutual coupling receive
`COUPLED_COLOR`. Overlay is applied regardless of each node's `spec_status`.

#### Scenario: Detecting tight coupling — COVERED
- THEN "coupling between those services is apparent"
  AND "human can assess whether the coupling is problematic"
  → `test_coupling_between_services_apparent`: two services with mutual edges (A→B and B→A)
    both receive `COUPLED_COLOR`; color is distinct from the default, making coupling apparent.

#### Scenario: Identifying single point of failure — COVERED
- THEN "criticality and centrality of that component is apparent"
  → `test_critical_component_centrality_apparent`: a hub with three incoming edges receives
    `CRITICAL_COLOR`.
- AND "risk it represents is clear"
  → `test_critical_color_distinct_from_normal`: asserts `CRITICAL_COLOR ≠ COUPLED_COLOR`
    and `CRITICAL_COLOR ≠ ALIGNED_COLOR`, ensuring risk levels are distinguishable.

#### Scenario: Spec faithfully implemented but architecturally poor — COVERED
- THEN "architectural problems are visible even though conformance is perfect"
  → `test_quality_overlay_independent_of_alignment`: a node with `spec_status = "aligned"`
    (perfect conformance) but `in_degree = 3` still receives `CRITICAL_COLOR` from
    `apply_quality_overlay`, proving the quality overlay operates independently of alignment.

