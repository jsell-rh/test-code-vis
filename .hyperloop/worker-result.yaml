## THEN-Clause to Test Mapping

### Conformance Mode — Scenario: Spec-aligned implementation

**THEN** "the human can see that the realized system has auth and user management as
separate components"
→ `test_aligned_nodes_displayed_as_separate_components`
  `_check(auth_anchor != user_mgmt_anchor, "auth and user_mgmt must be separate anchors")`
  (godot/tests/test_understanding_overlay.gd, line 128)

**AND** "the correspondence between spec and realization is visually apparent"
→ `test_aligned_node_receives_aligned_color`
  `_check(color.is_equal_approx(UnderstandingOverlay.ALIGNED_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 153)

### Conformance Mode — Scenario: Spec-divergent implementation

**THEN** "the human can see the divergence between spec and realization"
→ `test_divergent_node_receives_divergent_color`
  `_check(color.is_equal_approx(UnderstandingOverlay.DIVERGENT_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 184)

**AND** "the specific nature of the divergence is clear (merged vs. separate)"
→ `test_divergent_node_has_divergence_label`
  `_check(_find_label_text(anchor) == "merged with order service", ...)`
  (godot/tests/test_understanding_overlay.gd, line 213)

### Evaluation Mode — Scenario: Detecting tight coupling

**THEN** "the coupling between those services is apparent"
→ `test_coupling_between_services_apparent`
  `_check(_get_mesh_color(svc_a).is_equal_approx(UnderstandingOverlay.COUPLED_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 269)

**AND** "the human can assess whether the coupling is problematic"
→ `test_coupling_between_services_apparent`
  `_check(_get_mesh_color(svc_b).is_equal_approx(UnderstandingOverlay.COUPLED_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 273)

### Evaluation Mode — Scenario: Identifying single point of failure

**THEN** "the criticality and centrality of that component is apparent"
→ `test_critical_component_centrality_apparent`
  `_check(_get_mesh_color(hub).is_equal_approx(UnderstandingOverlay.CRITICAL_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 304)

**AND** "the risk it represents is clear"
→ `test_critical_color_distinct_from_normal`
  `_check(not UnderstandingOverlay.CRITICAL_COLOR.is_equal_approx(UnderstandingOverlay.COUPLED_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 317)

### Evaluation Mode — Scenario: Spec faithfully implemented but architecturally poor

**THEN** "architectural problems are visible even though conformance is perfect"
→ `test_quality_overlay_independent_of_alignment`
  `_check(_get_mesh_color(hub).is_equal_approx(UnderstandingOverlay.CRITICAL_COLOR), ...)`
  where hub has `spec_status: "aligned"` — quality overlay overrides alignment colour
  (godot/tests/test_understanding_overlay.gd, line 355)

### Simulation Mode — Scenario: Splitting a service

**THEN** "the impact on dependent services is visible"
→ `test_split_impact_on_dependents_visible`
  `_check(_get_mesh_color(svc_a).is_equal_approx(UnderstandingOverlay.AFFECTED_COLOR), ...)`
  (godot/tests/test_understanding_overlay.gd, line 387)

**AND** "new dependencies or interfaces that would be required are shown"
→ `test_split_shows_required_new_interfaces`
  `_check(_has_label_in_scene(scene_root, "requires new interface"), ...)`
  (godot/tests/test_understanding_overlay.gd, line 415)

### Simulation Mode — Scenario: Failure injection

**THEN** "the cascade of effects through the system is visible"
→ `test_failure_cascade_effects_visible`
  `_check(_get_mesh_color(svc_b).is_equal_approx(UnderstandingOverlay.AFFECTED_COLOR), ...)` (direct cascade)
  `_check(_get_mesh_color(svc_c).is_equal_approx(UnderstandingOverlay.AFFECTED_COLOR), ...)` (transitive cascade)
  (godot/tests/test_understanding_overlay.gd, lines 485–493)

**AND** "components that would be affected are clearly identified"
→ `test_failure_affected_components_clearly_identified`
  `_check(_has_label_in_scene(scene_root, "AFFECTED"), ...)`
  (godot/tests/test_understanding_overlay.gd, line 518)

