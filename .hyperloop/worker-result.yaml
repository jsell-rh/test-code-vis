All six SHALL/MUST requirements in specs/prototype/godot-application.spec.md are
implemented and have corresponding GDScript behavioral tests in godot/tests/.

## Requirement: JSON Scene Graph Loading — COVERED

Implementation (godot/scripts/main.gd):
- `_ready()` calls `FileAccess.open()` + `file.get_as_text()` to read the JSON file.
- `SceneGraphLoader.load_from_dict()` parses the raw dict into nodes/edges arrays.
- `build_from_graph()` iterates nodes to create volumes and edges to create lines.
- Positions are read from `nd["position"]` and applied to each anchor node.

Tests (godot/tests/test_scene_graph_loading.gd):
- `test_volumes_created_for_each_node()` — _anchors contains an entry per node id.
- `test_mesh_instances_exist_in_anchors()` — each anchor has a MeshInstance3D child.
- `test_edge_mesh_instances_created()` — at least 2 MeshInstance3D children on main node per edge (line + cone).
- `test_anchor_positions_match_json()` — anchor.position matches the JSON position field.

## Requirement: Containment Rendering — COVERED

Implementation (godot/scripts/main.gd → _create_volume()):
- bounded_context: BoxMesh, TRANSPARENCY_ALPHA, albedo alpha = 0.18, CULL_DISABLED.
- module: BoxMesh, fully opaque (alpha = 1.0).
- Child anchors are reparented to their parent anchor, achieving visual nesting.

Tests (godot/tests/test_containment_rendering.gd):
- `test_bounded_context_is_translucent()` — transparency != DISABLED, alpha < 1.
- `test_module_is_opaque()` — albedo alpha >= 1.0.
- `test_module_parented_inside_context()` — mod_anchor.get_parent() == ctx_anchor.
- `test_bounded_context_larger_than_module()` — context BoxMesh.size.x > module BoxMesh.size.x.
- `test_bounded_context_cull_disabled()` — context material uses CULL_DISABLED.

## Requirement: Dependency Rendering — COVERED

Implementation (godot/scripts/main.gd → _create_edge()):
- ImmediateMesh with PRIMITIVE_LINES draws a colored line between world positions.
- CylinderMesh (top_radius=0) cone placed at the target end indicates direction.
- Cross-context edges use orange Color(1.0, 0.50, 0.10); internal use grey.

Tests (godot/tests/test_dependency_rendering.gd):
- `test_edge_line_mesh_created()` — ImmediateMesh MeshInstance3D exists on main node.
- `test_direction_indicator_cone_created()` — CylinderMesh with top_radius==0 exists.
- `test_direction_cone_near_target()` — cone position within 2 units of target end.
- `test_cross_context_cone_is_orange()` — cone material: R > 0.8, B < 0.3.

## Requirement: Size Encoding — COVERED

Implementation (godot/scripts/main.gd → _create_volume()):
- `sz = float(nd["size"])` drives BoxMesh dimensions directly (x and z = sz; y = sz * 0.6 for modules).
- Larger `size` value → larger mesh in all spatial dimensions.

Tests (godot/tests/test_size_encoding.gd):
- `test_large_module_has_bigger_mesh()` — large module BoxMesh.size.x > small module BoxMesh.size.x.
- `test_mesh_sizes_proportional_to_metric()` — ratio of mesh widths equals ratio of size values (9/3 = 3.0, tolerance 0.001).

## Requirement: Camera Controls — COVERED (all three scenarios)

Implementation (godot/scripts/camera_controller.gd):
- Top-down default: `_theta = 0.15` rad (≈8.6° from vertical), `_distance = 40.0`.
- Zoom: MOUSE_BUTTON_WHEEL_UP decreases `_distance`; WHEEL_DOWN increases it; clamped to [min_distance, max_distance].
- Orbit: middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar angle, clamped 0.01..PI-0.01).
- `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps up orientation intuitive.
- Labels: BILLBOARD_ENABLED + no_depth_test=true ensures readability at all zoom levels.

Tests (godot/tests/test_camera_controls.gd + test_scene_graph_loading.gd):
- `test_initial_theta_is_near_top_down()` — _theta < PI/4.
- `test_initial_distance_is_positive()` — _distance > 0.
- `test_scroll_up_decreases_distance()` — WHEEL_UP event reduces _distance.
- `test_scroll_down_increases_distance()` — WHEEL_DOWN event increases _distance.
- `test_orbit_horizontal_drag_changes_phi()` — middle-mouse horizontal drag changes _phi.
- `test_orbit_vertical_drag_changes_theta()` — middle-mouse vertical drag changes _theta.
- `test_set_pivot_updates_state()` — set_pivot() updates _pivot and _distance.
- `test_zoom_clamped_at_minimum()` — 200 scroll-ups never push _distance below min_distance.
- `test_labels_are_billboard_and_readable()` (in test_scene_graph_loading.gd) — BILLBOARD_ENABLED, pixel_size > 0, no_depth_test=true.

## Requirement: Godot 4.6 — COVERED

Implementation:
- godot/project.godot: `config/features=PackedStringArray("4.6")` confirms Godot 4.6.x.
- All scripts are GDScript (.gd files).
- main.gd uses `FileAccess.get_as_text()` (the 4.6 API, not the deprecated `read_as_text()`).

Note: The engine-version scenario is a static configuration check rather than a
runtime behavioral scenario; it is verified by inspection of project.godot and
the script files. All GDScript runtime tests indirectly validate API compatibility
by loading and calling the same scripts.
