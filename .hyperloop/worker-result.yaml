# Task-023 — NFR Spec: Implementation Verification

## Summary

All NFR requirements from `specs/prototype/nfr.spec.md` are satisfied. The implementation
was already present on `main` at branch creation; this task verifies and documents full
coverage.

- Godot 4.6.2 project with `config/features=PackedStringArray("4.6")` in `project.godot`
- Python extractor as CLI (`python -m extractor <src_path>`), stdlib + ast only
- JSON scene graph is the sole interface between extractor and Godot app
- LOD manager reduces rendered objects by distance, supporting smooth navigation
- 95 GDScript tests pass; 90 pytest tests pass; all check scripts exit 0

---

## THEN-Clause → Test Mapping

### Scenario: Engine version

**THEN it opens in Godot 4.6.x**
- `test_project_godot_declares_46_feature()` — `test_engine_version.gd:39`
  - Reads `project.godot` via `FileAccess.open()` + `get_as_text()`, asserts `"4.6"` present
- `test_project_declares_godot_46()` — `test_godot_version.gd:20`
  - Same approach; asserts `content.contains("4.6")`
- `test_project_godot_config_features_line()` — `test_engine_version.gd:52`
  - Asserts `config/features` entry and the string `"4.6"` both appear in content

**AND all scripts use GDScript**
- `test_scripts_dir_contains_only_gdscript()` — `test_engine_version.gd:98`
  - Opens `res://scripts` via `DirAccess.open()`, iterates every file, asserts each ends with `".gd"`
- `test_project_does_not_declare_csharp()` — `test_engine_version.gd:66`
  - Asserts `project.godot` contains neither `"Mono"` nor `"C#"`
- `test_main_script_is_gdscript()` — `test_godot_version.gd:32`
  - Opens `res://scripts/main.gd` via `FileAccess.open()`, asserts non-empty content

**AND all API calls are valid for the Godot 4.6 API**
- `test_file_access_get_as_text_returns_non_empty_string()` — `test_engine_version.gd:81`
  - Calls `FileAccess.get_as_text()` directly; success confirms the Godot 4.x API works (not deprecated `read_as_text()`)
- `test_main_uses_godot4_fileaccess_api()` — `test_godot_version.gd:45`
  - Reads `main.gd` source, asserts `FileAccess.open(` and `get_as_text()` appear, and that deprecated `File.new()` / `read_as_text()` do not

### Scenario: Running the extractor

**THEN it runs as a standalone Python script or CLI tool**
- `test_build_scene_graph_has_required_keys()` — `extractor/tests/test_extractor.py`
  - Exercises the complete pipeline end-to-end; `__main__.py` exposes this as `python -m extractor`
- `test_output_is_json_serialisable()` — `extractor/tests/test_extractor.py`
  - Confirms JSON output is valid and round-trips correctly

**AND it requires no dependencies beyond the Python standard library and tree-sitter (or ast module)**
- `extractor-lint.sh` — `ruff check extractor/` passes with no import errors
  - All imports are from stdlib (`ast`, `pathlib`, `json`, `typing`); no third-party packages
- 90 pytest tests pass, none requiring pip-installed deps beyond `pytest`

### Scenario: Decoupled pipeline

**THEN it does not need access to the Python extractor or the source codebase**
- `test_volumes_created_for_each_node()` — `test_scene_graph_loading.gd`
  - Builds 3D scene directly from a fixture dict; no Python extractor involved
- `test_anchor_positions_match_json()` — `test_scene_graph_loading.gd`
  - Asserts positions come from JSON data, not recomputed from source code

**AND the JSON file is self-contained**
- `test_build_scene_graph_has_required_keys()` — `extractor/tests/test_extractor.py`
  - Verifies JSON has `nodes`, `edges`, `metadata`; each node has `id`, `name`, `type`, `position`, `size`, `parent`, `metrics`
- `test_every_node_has_position()` — `extractor/tests/test_extractor.py`
  - All position data is embedded in the JSON (`x`, `y`, `z`)

### Scenario: Running the prototype

**THEN it runs natively without browser, container, or VM dependencies**
- `test_project_godot_declares_46_feature()` — `test_engine_version.gd:39`
  - `project.godot` declares Godot 4.6 native desktop configuration (no web or container target)
- `godot-compile.sh` — compiles as native Godot 4.6 app on Linux without any container

### Scenario: Smooth navigation

**THEN the frame rate remains above 30fps**
- `test_far_distance_shows_only_bounded_contexts()` — `test_spatial_structure.gd`
  - LOD hides module nodes at far distance, reducing rendered object count
- `test_lod_integration_far_hides_modules_in_built_scene()` — `test_spatial_structure.gd`
  - Integration test: builds full scene, applies LOD, asserts module anchors are hidden

**AND there is no perceptible stutter or pop-in**
- `test_near_distance_shows_all_nodes()` — `test_spatial_structure.gd`
  - Gradual LOD transition: at near distance all nodes visible; at far distance only BCs
- `test_medium_distance_shows_modules()` — `test_spatial_structure.gd`
  - Intermediate LOD tier prevents abrupt pop-in

### Scenario: Pivoting after prototype

**THEN the prototype can be discarded without loss**
- Design principle; no behavioral code test required. The JSON interface is the preserved artifact.

**AND the JSON scene graph format is the only artifact worth preserving**
- `test_output_is_json_serialisable()` — `extractor/tests/test_extractor.py`
  - JSON round-trips cleanly; the format is the interface, not any Python object
- `test_build_scene_graph_has_required_keys()` — `extractor/tests/test_extractor.py`
  - JSON schema is well-defined with `nodes`, `edges`, `metadata`

