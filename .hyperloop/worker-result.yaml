### Requirement 3: Dependency Rendering — COVERED

**Implementation (main.gd `_create_edge()`)**
- `ImmediateMesh` with `PRIMITIVE_LINES` draws a line from `from_pos` to `to_pos`.
- `CylinderMesh` with `top_radius = 0.0` (cone/arrowhead) rotated to face edge direction, placed at `to_pos - dir * height/2` — explicit direction indicator pointing at target.
- Cross-context edges use orange `Color(1.0, 0.50, 0.10)`; internal edges use grey.

**Scenario: Rendering a cross-context dependency — all THEN clauses covered**
- THEN a line connects the two context volumes: ImmediateMesh PRIMITIVE_LINES.
- AND the line's direction is visually indicated: cone arrowhead at target end.

**Tests: `test_dependency_rendering.gd`**
- `test_edge_line_mesh_created()` — asserts `ImmediateMesh` child exists.
- `test_direction_indicator_cone_created()` — asserts `CylinderMesh` with `top_radius == 0.0` exists.
- `test_direction_cone_near_target()` — asserts cone position within 2 units of target `Vector3(20,0,0)`.
- `test_cross_context_cone_is_orange()` — asserts cone material R > 0.8, B < 0.3 for cross_context type.

