## Requirement Coverage

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Lines 100–104: `MOUSE_BUTTON_LEFT` press sets `_panning = true` and records `_last_mouse`.
- Lines 141–158: `_handle_motion()` when `_panning` is true applies delta to `_target_pivot`
  using camera-local `basis.x` (right) and horizontal `basis.z` (backward) vectors.

**Scenario: Panning the view** — COVERED
- GIVEN top-down camera view: `_theta = 0.15` (near top-down) at initialization.
- WHEN user holds LMB and drags: `test_lmb_drag_pans_camera` (line 147–161) presses
  LMB then sends motion event.
- THEN camera pans: asserts `cam._pivot != initial_pivot`. ✓
- AND movement matches drag direction (not inverted): see Non-Inverted requirement below.

---

### Requirement: Non-Inverted Movement — COVERED

**Implementation** (`godot/scripts/camera_controller.gd` lines 141–158):
- Comment: "Non-inverted pan: drag direction matches scene movement direction."
- `_target_pivot += right * delta.x * pan_amount` — right drag → pivot moves +X (right).
- `_target_pivot -= backward * delta.y * pan_amount` — upward drag (negative delta.y) →
  pivot moves forward (not backward).

**Scenario: Drag direction matches view movement** — COVERED
- `test_pan_direction_not_inverted` (lines 167–188): sets `_phi = PI/2` so camera's local
  X axis aligns with world +X; drags 50 pixels right; asserts `cam._pivot.x > 0.0`. ✓

