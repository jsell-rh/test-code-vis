## Requirement Coverage

### 1. Godot 4.6 Engine — COVERED

**Code:** `godot/project.godot` declares `config/features=PackedStringArray("4.6")`. All four
scripts in `godot/scripts/` (`main.gd`, `scene_graph_loader.gd`, `camera_controller.gd`,
`lod_manager.gd`) are GDScript (`.gd`). No `.cs` files exist. `main.gd` uses
`FileAccess.open()` + `get_as_text()` — valid Godot 4.6 API, not the deprecated `read_as_text()`.

**Tests (`godot/tests/test_engine_version.gd`):**

| THEN clause | Test function | Status |
|---|---|---|
| Opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | COVERED |
| config/features declares "4.6" | `test_project_godot_config_features_line` | COVERED |
| No C# / Mono | `test_project_does_not_declare_csharp` | COVERED |
| FileAccess.get_as_text() is valid 4.6 API | `test_file_access_get_as_text_returns_non_empty_string` | COVERED |
| All scripts use GDScript (DirAccess iteration) | `test_scripts_dir_contains_only_gdscript` | COVERED |

All five tests read `project.godot` via `FileAccess.open()` + `get_as_text()` and assert content
strings, or use `DirAccess` to iterate `res://scripts/` asserting every file ends with `.gd`.
These are runtime behavioral tests, not compilation-only checks.

