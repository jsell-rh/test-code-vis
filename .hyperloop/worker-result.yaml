## Requirement Coverage

### 1. Target Codebase — COVERED

**THEN kartograph's structure is visualized in 3D space**
- `test_kartograph_integration_bounded_contexts` (test_kartograph_integration.py)
  — calls `main()` against `~/code/kartograph/src/api`; asserts `iam`, `graph`,
  `shared_kernel` contexts appear in the JSON output.

**AND the visualization reflects the actual structure of the codebase**
- `test_kartograph_extraction_produces_modules` (test_kartograph_integration.py)
  — asserts at least one `module`-type node is produced alongside bounded contexts.

---

### 2. Two-Stage Pipeline — COVERED

**THEN a JSON scene graph file is produced**
- `test_main_writes_json_output` (test_cli.py)
  — invokes `main()` CLI; asserts output JSON has `nodes`, `edges`, `metadata` keys.

**AND the Godot application can load that file and render the scene**
- `test_volumes_created_for_each_node` (test_scene_graph_loading.gd)
  — `build_from_graph()` called with fixture; asserts `_anchors` has an entry per node.
- `test_anchor_positions_match_json` (test_scene_graph_loading.gd)
  — anchor positions match position data in fixture JSON.

---

### 3. Top-Down Architectural View — COVERED

**THEN all bounded contexts are visible as distinct volumes**
- `test_far_distance_shows_only_bounded_contexts` (test_spatial_structure.gd)
  — at FAR camera distance, bounded_context anchor is visible, module anchor is hidden.

**AND their relative positions reflect their coupling**
- `test_coupled_bcs_are_closer_than_uncoupled` (test_extractor.py)
  — fixture with 4 BCs; auth↔shared_kernel have cross-context edges; billing has none.
  Asserts `dist("auth","shared_kernel") < dist("auth","billing")`.

**AND dependencies between contexts are visible as connections**
- `test_dependency_expressed_as_visible_connection` (test_spatial_structure.gd)
  — asserts ImmediateMesh child exists in main node after `build_from_graph()`.
- `test_initial_theta_is_near_top_down` (test_camera_controls.gd)
  — asserts camera `_theta < PI/4` (top-down orientation on init).

---

### 4. Zoom to Detail — COVERED

**THEN the internal layers become visible**
- `test_medium_distance_shows_modules` (test_spatial_structure.gd)
  — module anchor visible at MEDIUM distance between NEAR and FAR thresholds.

**AND internal dependencies are shown**
- `test_near_distance_shows_internal_edges_as_fine_detail` (test_spatial_structure.gd)
  — internal edge visual visible at NEAR distance.

**AND the user can see relative sizes of internal modules**
- `test_mesh_sizes_proportional_to_metric` (test_size_encoding.gd)
  — fixture has `size=3.0` and `size=9.0`; asserts large_mesh.size.x / small_mesh.size.x ≈ 3.0.
- `test_near_distance_shows_all_nodes` (test_spatial_structure.gd)
  — all anchors visible at NEAR distance.

---

### 5. Abstract Visual Language — COVERED

**THEN it appears as a labeled geometric volume**
- `test_mesh_instances_exist_in_anchors` (test_scene_graph_loading.gd)
  — each anchor has a `MeshInstance3D` child (BoxMesh).

**AND its size reflects its relative complexity**
- `test_large_module_has_bigger_mesh` (test_size_encoding.gd)
  — larger `size` field → larger `BoxMesh.size.x`.
- `test_mesh_sizes_proportional_to_metric` (test_size_encoding.gd)
  — ratio of mesh x-dimensions equals ratio of size values exactly.

**AND its position reflects its coupling relationships**
- `test_coupled_bcs_are_closer_than_uncoupled` (test_extractor.py)
  — coupled pair placed closer than uncoupled pair (algorithm-quality test).

**AND containment is shown by nesting**
- `test_module_parented_inside_context` (test_containment_rendering.gd)
  — module anchor's `get_parent() == ctx_anchor`.
- `test_containment_expressed_as_scene_tree_parenting` (test_spatial_structure.gd)
  — same assertion from independent fixture.

---

### 6. Readable Labels — COVERED

**THEN the module's name is visible as a text label**
- `test_labels_are_billboard_and_readable` (test_scene_graph_loading.gd)
  — finds Label3D child; asserts `text == nd["name"]`.

**AND the label remains readable at the current zoom level**
- `test_labels_are_billboard_and_readable` (test_scene_graph_loading.gd)
  — asserts `billboard == BaseMaterial3D.BILLBOARD_ENABLED`, `pixel_size > 0.0`,
  `no_depth_test == true` on the resulting node.

---

### 7. Dependency Visualization — COVERED

**THEN a line or connection is drawn between them**
- `test_edge_line_mesh_created` (test_dependency_rendering.gd)
  — ImmediateMesh child exists in main node after edge creation.

**AND the direction of the dependency is discernible**
- `test_direction_indicator_cone_created` (test_dependency_rendering.gd)
  — CylinderMesh with `top_radius == 0.0` (pointed arrowhead) exists.
- `test_direction_cone_near_target` (test_dependency_rendering.gd)
  — cone is within 2 units of the target node position.

---

### 8. Navigation — COVERED

**THEN they can pan, zoom, and rotate the view**
- Pan: `test_lmb_pan_moves_pivot` (test_ux_polish.gd)
  — LMB press + drag changes `_pivot`.
- Pan direction: `test_pan_drag_right_increases_pivot_x` (test_ux_polish.gd)
  — non-inverted panning: drag right → `_pivot.x > initial_x`.
- Zoom: `test_scroll_up_decreases_distance` (test_camera_controls.gd)
  — WHEEL_UP → `_target_distance` decreases.
- Rotate: `test_orbit_horizontal_drag_changes_phi` (test_camera_controls.gd)
  — horizontal RMB drag → `_phi` changes.

**AND they can smoothly transition between overview and detail levels**
- `test_zoom_is_interpolated_not_instantaneous` (test_ux_polish.gd)
  — after WHEEL_UP, `_distance == initial_distance` (not snapped); after `_process(0.016)`,
  `_distance` is between `initial_distance` and `_target_distance`.
- `test_far_distance_shows_only_bounded_contexts` (test_spatial_structure.gd)
  — confirms LOD transitions from overview (bounded contexts) to detail (modules).

