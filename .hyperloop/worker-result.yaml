## task-010: Godot Application (godot-application.spec.md) ‚Äî implementation + fixes

### Changes in this round

Two concrete fixes were applied to address feedback from the previous review cycle
(the `pr-feedback-addressed` check failed because prior re-checks were worker-result-only
commits with no code changes):

1. **`camera_controller.gd` ‚Äî guard `look_at()` with `is_inside_tree()`**
   Previously, `_update_transform()` called `global_position =` and `look_at()`
   unconditionally, which triggers `"Node not inside tree"` engine errors whenever the
   controller is instantiated in headless unit tests (all 8 camera tests). The fix
   wraps those calls in `if is_inside_tree(): ‚Ä¶ else: position = cam_pos` so tests
   run error-free while runtime behaviour is unchanged.

2. **Missing check scripts added to `.hyperloop/checks/`**
   `check-not-in-scope.sh`, `check-report-scope-section.sh`,
   `check-kartograph-integration-test.sh`, and `check-pipeline-wiring.sh` were present
   on trunk but absent from this branch. All four were copied in and committed so every
   required check can be run from within the worktree.

