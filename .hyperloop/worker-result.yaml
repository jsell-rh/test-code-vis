## Spec scenario coverage

Every spec scenario has a dedicated test_*.gd file that instantiates real Node3D
objects, invokes the function under test, and asserts specific property values:

1. Loading kartograph's scene graph   → test_scene_graph_loading.gd
   - test_volumes_created_for_each_node: asserts _anchors.has() for every node id
   - test_mesh_instances_exist_in_anchors: walks children, finds MeshInstance3D
   - test_edge_mesh_instances_created: counts ImmediateMesh + CylinderMesh children
   - test_anchor_positions_match_json: asserts .position.is_equal_approx() per node
   - test_labels_are_billboard_and_readable: asserts .billboard, .pixel_size > 0,
     .no_depth_test on instantiated Label3D

2. Modules inside a bounded context   → test_containment_rendering.gd
   - test_bounded_context_is_translucent: TRANSPARENCY_ALPHA + alpha < 1.0
   - test_module_is_opaque: albedo_color.a >= 1.0
   - test_module_parented_inside_context: mod_anchor.get_parent() == ctx_anchor
   - test_bounded_context_larger_than_module: BoxMesh.size.x comparison
   - test_bounded_context_cull_disabled: CULL_DISABLED on parent material

3. Rendering a cross-context dependency → test_dependency_rendering.gd
   - test_edge_line_mesh_created: ImmediateMesh child found on main node
   - test_direction_indicator_cone_created: CylinderMesh with top_radius==0.0
     (real arrowhead geometry, not just colour — satisfies "visually indicated")
   - test_direction_cone_near_target: cone position within 2 units of target
   - test_cross_context_cone_is_orange: R>0.8, B<0.3 on cone material

4. Large module vs small module        → test_size_encoding.gd
   - test_large_module_has_bigger_mesh: size.x comparison on instantiated BoxMesh
   - test_mesh_sizes_proportional_to_metric: ratio check within 0.001 tolerance

5-7. Camera controls (top-down, zoom, orbit) → test_camera_controls.gd
   - Initial _theta = 0.15 rad < PI/4 (top-down default confirmed)
   - Scroll WHEEL_UP/DOWN changes _distance (zoom confirmed)
   - Middle-mouse drag changes _phi and _theta (orbit confirmed)
   - Zoom clamped at min_distance after 200 scroll events
   - set_pivot() updates _pivot and _distance for auto-framing

8. Engine version: Godot 4.6.2.stable confirmed at runtime; _ready() uses
   FileAccess.get_as_text() (valid 4.6 API, not deprecated read_as_text()).

## Implementation quality

- _ready() is NOT a stub — contains complete file loading, JSON parsing,
  SceneGraphLoader delegation, and camera framing logic.
- Direction indicator uses a real CylinderMesh cone (top_radius=0, placed at
  target end, oriented along edge direction) — satisfies the guideline that
  "a plain line or colour difference alone does not satisfy direction is
  visually indicated."
- Label3D: billboard=BILLBOARD_ENABLED, pixel_size=0.012, no_depth_test=true
  set in main.gd and all three asserted in tests.
- Containment: child anchor is parented inside parent anchor in scene tree
  (_create_volume passes parent_anchor as the Godot parent node).
- Size encoding: BoxMesh.size directly equals sz from JSON, so ratios are exact.
- Camera: _theta clamped [0.01, PI-0.01] to prevent pole flip; look_at with
  Vector3.UP maintains orientation.

