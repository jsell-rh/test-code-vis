## Untestable THEN-Clauses

**"positions reflect coupling"**
- Verbatim: "their relative positions reflect their coupling (tightly coupled contexts are closer together)"
- Why untestable: Perceptual proximity is a visual/spatial judgment requiring rendering and human perception. Headless mode cannot measure perceived closeness.
- Architectural evidence: _order_by_coupling() in extractor.py ranks contexts by import count; test_distinct_contexts_occupy_distinct_regions asserts distinct positions.

**Smooth transitions (frame rate)**
- Verbatim: "they can smoothly transition between overview and detail levels"
- Why untestable: FPS measurement requires a live render pipeline.
- Architectural evidence: LOD system (lod_manager.gd) toggles visibility by camera distance. test_zoom_is_interpolated_not_instantaneous confirms interpolation logic.
