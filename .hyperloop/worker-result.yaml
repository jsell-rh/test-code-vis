## THEN→Test Mapping (UX Polish spec — independently derived)

### Requirement: Pan with Left Mouse Button

**Scenario: Panning the view**

| THEN-clause | Test function | Assertion | Verified |
|---|---|---|---|
| Camera pans in direction of drag | `test_lmb_drag_pans_camera` | `cam._pivot != initial_pivot` | ✓ |
| Movement direction not inverted | `test_pan_direction_not_inverted` | `cam._pivot.x > 0.0` after drag-left | ✓ |

**Direction derivation for `test_pan_direction_not_inverted` (independently derived before reading test body):**

Spec: "dragging left reveals content to the right, as in Google Maps."
Camera at phi=PI/2: local X axis (basis.x) = world +X.
Drag LEFT: event.position = (50, 100), _last_mouse = (100, 100) → delta.x = −50.
Code: `_target_pivot -= right * delta.x * pan_amount` = `_target_pivot -= (+X) * (−50) * k` → pivot.x += 50k > 0.
Camera looks at point (+5, 0, 0) → scene shifts LEFT → content to the RIGHT is revealed. ✓
Expected predicate: `pivot.x > 0` after drag-left. Actual test asserts: `cam._pivot.x > 0.0`. **Match.** ✓

