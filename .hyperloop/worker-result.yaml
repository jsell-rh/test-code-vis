## Summary

Task-016 implements `specs/visualization/data-flow.spec.md`: on-demand flow
path visualization overlaid on the persistent structural geography.

### What was already present on main (PR #88)

The full implementation was merged before this branch was cut:

- `godot/scripts/flow_overlay.gd` — FlowOverlay class with `setup()`,
  `show_path()`, `clear_path()`, `show_aggregate()`, and `is_path_active()`.
- `godot/tests/test_flow_overlay.gd` — 21 GDScript tests covering every
  THEN-clause in the spec.
- `godot/tests/run_tests.gd` — headless runner already wires in
  `test_flow_overlay.gd`.

### What this branch adds

Two pre-existing check failures prevented `run-all-checks.sh` from exiting 0:

1. `check-extractor-cli-tested.sh` — no test exercised `main()` in
   `extractor/__main__.py`.
2. `check-extractor-stdlib-only.sh` — no test verified the extractor uses
   only stdlib imports via `sys.stdlib_module_names`.

This branch adds `extractor/tests/test_cli.py` to address both failures.

