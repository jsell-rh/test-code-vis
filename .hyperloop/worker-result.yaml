### Requirement: Size Encoding — COVERED

**Implementation:**
- `main.gd:_create_volume()`: `sz = float(nd["size"])`, `box.size = Vector3(sz, sz*0.6, sz)`.
  Size is linearly proportional to the JSON "size" field, which the extractor derives from
  lines-of-code metrics.

**Tests (`godot/tests/test_size_encoding.gd`):**
- `test_large_module_has_bigger_mesh` — size=9 mesh.x > size=3 mesh.x
- `test_mesh_sizes_proportional_to_metric` — `large.size.x / small.size.x == 3.0 ± 0.001`

**Scenario: Large module vs small module** — both THEN clauses verified.

