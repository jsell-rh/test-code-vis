### Clause 2 — Performance: frame rate above 30fps

**Verbatim THEN text:**
> the frame rate remains above 30fps

**Why untestable in this environment:**
FPS measurement requires an active render pipeline. In headless Godot:
- There is no display server and no GPU rendering loop.
- `Engine.get_frames_per_second()` returns 0 in headless mode.
- Any test asserting `fps >= 30` would trivially fail regardless of actual visual
  performance.

**Architectural evidence of compliance:**
- `godot/scripts/lod_manager.gd` implements a three-tier LOD system with thresholds
  `FAR_THRESHOLD` and `NEAR_THRESHOLD` that hide meshes and edges based on camera
  distance, keeping draw calls bounded at scale.
- `godot/scripts/main.gd` calls `lod_manager._update_lod()` every frame in `_process()`.
- LOD correctness at kartograph scale (60 nodes) is verified by 10 behavioral tests in
  `godot/tests/test_spatial_structure.gd` (functions:
  `test_far_distance_shows_only_bounded_contexts`,
  `test_far_distance_hides_all_edges`,
  `test_medium_distance_shows_modules`,
  `test_medium_distance_shows_cross_context_edges_only`,
  `test_near_distance_shows_all_nodes`,
  `test_near_distance_shows_internal_edges_as_fine_detail`,
  `test_lod_node_entries_populated_after_build`,
  `test_lod_edge_entries_populated_after_build`,
  `test_lod_integration_far_hides_modules_in_built_scene`).
- The kartograph-scale fixture test (`test_nfr_scale.gd`) confirms all 60 nodes build
  without error, confirming no O(n²) algorithmic issue exists.

---

### Clause 3 — Performance: no perceptible stutter or pop-in

**Verbatim THEN text:**
> there is no perceptible stutter or pop-in

**Why untestable in this environment:**
"Perceptible stutter" is a subjective human perception property that requires a live
render pipeline and a human observer (or a frame-time profiler). Headless Godot provides
neither a display nor a frame-time measurement API beyond `Engine.get_frames_per_second()`
(which returns 0 headless). There is no GDScript equivalent of a profiler that could
assert P99 frame time < 33ms.

**Architectural evidence of compliance:**
- Same LOD system as Clause 2 above; LOD transitions are implemented as `visible = true/false`
  toggles (O(n) per frame), not as mesh rebuilds or scene-tree restructuring, which avoids
  common sources of pop-in stutter.
- No dynamic node instantiation occurs in `_process()` — all nodes are created in `_ready()`
  at load time.

