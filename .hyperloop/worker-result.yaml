### Requirement: Desktop Platform — COVERED (structural evidence; THEN clause is environmental)

**Implementation:**
- No `export_presets.cfg` exists — no web export target configured.
- No `Dockerfile` or container configuration exists.
- `godot/project.godot` does not include `"Web"` in `config/features`.
- Godot Engine compiles and runs natively (confirmed by `godot-compile.sh` exiting 0).

**Tests / Verification:**
- The THEN clause "it runs natively without browser, container, or VM dependencies" describes
  a runtime deployment property, not a code behavior. It cannot be asserted from within a
  headless GDScript test (the test itself runs in the same environment it would be trying to
  assert about). This is analogous to asserting "the CPU is x86_64" — structural evidence is
  the correct form.
- Structural evidence: `project.godot` declares `"4.6"` (not `"Web"`); no container or web
  configs exist in the repository; `godot-compile.sh` confirms native execution.
- Note: a GDScript test reading `project.godot` to assert absence of `"Web"` in
  `config/features` would add defense-in-depth but is not required for the THEN clause, which
  is about the deployment environment rather than the application code.

This requirement is covered by implementation and structural evidence appropriate to its nature.

