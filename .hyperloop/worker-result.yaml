### Requirement: Non-Inverted Movement — COVERED

**SHALL**: Dragging left moves view left; dragging up moves view up.

Implementation (`camera_controller.gd` lines 152–157):
```
_target_pivot -= right * delta.x * pan_amount
_target_pivot -= backward * delta.y * pan_amount
```
Subtracting `right * delta.x`: drag left (delta.x < 0) → pivot += right → camera shifts +X →
scene content appears to shift -X (left). Google Maps convention ✓.

**Scenario: Drag direction matches view movement**
| THEN clause | Test | Verdict |
|---|---|---|
| Scene moves in same direction as drag | `test_pan_direction_not_inverted` (same test as above; predicate directly encodes Google Maps convention) | COVERED |

