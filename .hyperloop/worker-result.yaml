## THEN-Clause Verification (Reviewer-Independent)

Each entry below was verified by: (a) grepping the test file to confirm the
function exists, (b) reading the test body to confirm the assertion predicate
matches the THEN-clause predicate.

### Requirement: Pan with Left Mouse Button

| THEN-clause | Test function | Predicate verified |
|---|---|---|
| THEN the camera pans in the direction of the drag | `test_lmb_drag_pans_camera` | LMB press + 50px right drag → `cam._pivot != initial_pivot` ✅ |
| AND the movement direction matches the drag direction (not inverted) | `test_pan_direction_not_inverted` | phi=π/2 aligns camera X with world +X; right drag → `cam._pivot.x > 0.0` ✅ |

### Requirement: Non-Inverted Movement

| THEN-clause | Test function | Predicate verified |
|---|---|---|
| THEN the scene moves in the same direction as the drag | `test_pan_direction_not_inverted` | Same test; right drag → pivot moves +X (camera moves right, scene appears to move left, revealing left content) ✅ |

### Requirement: Zoom Toward Mouse Cursor

| THEN-clause | Test function | Predicate verified |
|---|---|---|
| THEN the view zooms toward the point under the cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `world_pt=(10,0,0)`, zoom in → `cam._target_pivot.x > 0.0` ✅ |
| AND the component under the cursor stays under the cursor during zoom | `test_zoom_in_cursor_point_invariant` | `world_pt=(20,0,0)`, zoom in → `0 < cam._target_pivot.x < 20.0` (new pivot strictly between old pivot and cursor) ✅ |
| THEN the view zooms out from the point under the cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | `world_pt=(10,0,0)`, zoom out → `cam._target_pivot.x < 0.0` (pivot moved past world origin, away from cursor) ✅ |

### Requirement: Orbit Around Mouse Point

| THEN-clause | Test function | Predicate verified |
|---|---|---|
| THEN the camera orbits around the point under the cursor at orbit start | `test_orbit_uses_right_mouse_button` | RMB press + horizontal motion → `cam._phi != initial_phi` ✅ |
| THEN the camera orbits around the point under the cursor at orbit start | `test_orbit_around_cursor_point` | `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` ✅ |
| AND the component remains at the visual center during the orbit | `test_orbit_pivot_is_world_point` | After begin_orbit → `cam._pivot.is_equal_approx(world_pt)` (camera always looks_at _pivot = world_pt) ✅ |

### Requirement: Smooth Camera Movement

