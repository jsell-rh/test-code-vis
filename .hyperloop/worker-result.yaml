## Implementation Summary

### godot/scripts/main.gd
- `_ready()`: `FileAccess.open()` + `file.get_as_text()` + `JSON.new()` + `json.parse()`
  + `SceneGraphLoader.load_from_dict()` + `build_from_graph()`. Full implementation, no stubs.
- `build_from_graph()`: iterates nodes to create volumes, iterates edges to create line+cone pairs.
- `_create_volume()`: creates `Node3D` anchor → `MeshInstance3D` (BoxMesh) → `Label3D`.
  - Bounded context: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
  - Module: fully opaque (`albedo_color.a = 1.0`), default cull.
  - Label3D: `billboard = BaseMaterial3D.BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true`.
  - `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)` (size-proportional).
- `_create_edge()`: `ImmediateMesh` (PRIMITIVE_LINES) + `CylinderMesh` arrowhead (`top_radius=0`).
  - Cross-context edges: orange color `Color(1.0, 0.50, 0.10)`.
  - Cone positioned at target end, oriented along edge direction.

### godot/scripts/camera_controller.gd
- `_theta = 0.15` (8.6° from top-down) satisfies "defaults to top-down view".
- `MOUSE_BUTTON_WHEEL_UP/DOWN`: decreases/increases `_distance` (zoom).
- `MOUSE_BUTTON_MIDDLE` drag: updates `_phi` (azimuth) and `_theta` (polar).
- `look_at(_pivot, Vector3.UP)` + `_theta` clamped to `[0.01, PI-0.01]`: up stays up.
- `set_pivot()`: repositions pivot and distance for post-load camera framing.

### godot/project.godot
- `config/features=PackedStringArray("4.6")`: declares Godot 4.6.x requirement.
- All scripts use `.gd` extension (GDScript); no `.cs` files.
- All APIs: `FileAccess.open()` + `get_as_text()` (Godot 4.x); not deprecated `File.new()`.

