## Requirement: Containment Rendering — COVERED

**Implementation:** `_create_volume()` in `main.gd` renders bounded contexts as large
translucent BoxMesh (TRANSPARENCY_ALPHA, alpha=0.18, CULL_DISABLED) and modules as
compact opaque BoxMesh (alpha=1.0). `build_from_graph()` parents module anchors to
their context anchor, achieving visual nesting.

**Scenario: Modules inside a bounded context — all THEN/AND clauses covered:**

| Clause | Code | Test |
|--------|------|------|
| bounded context is larger translucent volume | `mat.transparency = TRANSPARENCY_ALPHA`, alpha=0.18, size = sz | `test_containment_rendering.gd::test_bounded_context_is_translucent`, `test_bounded_context_larger_than_module` |
| child modules appear as smaller opaque volumes inside | alpha=1.0, parented to context anchor | `test_containment_rendering.gd::test_module_is_opaque`, `test_module_parented_inside_context` |
| boundary of parent is visually distinct | `mat.cull_mode = CULL_DISABLED` (visible from all angles unlike children) | `test_containment_rendering.gd::test_bounded_context_cull_disabled` |

