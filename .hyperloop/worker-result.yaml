### Requirement: Not In Scope — COVERED

**Spec:** The following MUST NOT be implemented in the prototype phase.

All verified via `check-not-in-scope.sh` (exits 0) plus manual grep audit:

| Excluded Feature | Status |
|---|---|
| Conformance mode (spec overlay comparison) | No comparison logic, no ConformanceMode class or UI |
| Evaluation mode | Absent |
| Simulation mode | Absent |
| Data flow visualization | Absent |
| Moldable views (LLM-powered question-driven views) | Absent — no LlmViewGenerator, build_prompt, parse_response, SceneInterpreter |
| Spec extraction | Absent — no `extract_spec_nodes`, `discover_spec_nodes`, or `--specs` CLI flag |
| First-person navigation | Absent — no WASD, KEY_W/A/S/D, fly-cam in camera_controller.gd |

**Note on "spec" node type:** `schema.py` and `lod_manager.gd` reserve a `"spec"` node type
for visibility. This is structural scaffolding (a type constant + visibility rule), NOT a
conformance mode implementation. No comparison logic, overlay renderer, or spec-loading
pipeline exists. `check-not-in-scope.sh` exits 0 and confirms no prohibited feature keywords
are present.

