### Requirement: View Specs as Intermediate Representation — COVERED

**Implementation reviewed:**
- `LLMViewGenerator.parse_response()` returns a plain `Dictionary` with `"question"`
  and `"operations"` keys — never raw 3D geometry.
- `SceneInterpreter.apply(spec, anchors, scene_root, world_positions)` is the renderer
  that consumes the view spec and mutates the live scene tree.
- `main.gd.apply_view_spec(spec)` (lines 271–273) wires the full pipeline end-to-end.

**Scenario: LLM produces view spec — COVERED**

| THEN-clause | Production code | Test | Predicate |
|---|---|---|---|
| emits structured view spec, not raw 3D geometry | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` | `result is Dictionary` |
| view spec controls show, hidden, highlighted, arranged | `_make_spec()` passes all 6 valid ops; each has a `_apply_*` branch in SceneInterpreter | `test_parse_response_all_six_ops_pass_through` | `spec["operations"].size() == 6` with all 6 primitives present |
| 3D renderer interprets view spec into spatial scene | `SceneInterpreter.apply()` dispatches to scene mutations via match block | `test_all_six_ops_mutate_scene_correctly` | asserts `anchor.visible`, `anchor.position.x`, `mat.albedo_color.g`, `label.text`, MeshInstance3D presence on real Node3D objects |

---

### Requirement: Fixed Visual Primitive Set — COVERED

**Implementation reviewed:**
- `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` is a
  fixed constant (6 items) in `llm_view_generator.gd`.
- `build_prompt()` lists only these 6 ops in the prompt so the LLM knows the contract.
- `_make_spec()` iterates raw LLM ops and drops any op not in `VALID_OPS`.
- `SceneInterpreter.apply()` match block covers exactly these 6 ops; no fallback that
  would accept or invoke novel rendering logic.

**Scenario: LLM uses existing primitives — COVERED**

| THEN-clause | Production code | Test | Predicate |
|---|---|---|---|
| composes from existing set (show, hide, highlight, arrange, annotate, connect) | `build_prompt()` embeds all 6 in prompt text via `ops_list` | `test_build_prompt_contains_show_primitive`, `..._hide_`, `..._highlight_`, `..._arrange_`, `..._annotate_`, `..._connect_` (6 tests) | each asserts `prompt.contains("<primitive>")` |
| no new rendering logic generated at runtime | `_make_spec()` drops ops not in `VALID_OPS`; SceneInterpreter match block is exhaustive | `test_parse_response_filters_unknown_ops` (unknown op dropped; valid survives), `test_parse_response_with_all_unknown_ops_returns_empty_operations` (all-unknown → size 0), `test_unknown_op_is_ignored` (no scene change) | all assert on real scene state or op count |

