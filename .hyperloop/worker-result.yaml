### Requirement: Non-Inverted Movement
#### Scenario: Drag direction matches view movement

**THEN: scene moves in the same direction as the drag**
**(i.e. dragging left reveals content to the right, as in Google Maps)**
- The "(i.e.)" parenthetical is the definitive predicate per review guidelines.
- Derivation: "dragging left reveals content to the right" → pivot must move RIGHT.
  delta.x = 50−100 = −50. Code: `_pivot -= (1,0,0)*(−50)*pan_amount` → pivot.x increases.
  Spec-derived predicate: pivot.x > initial_x.
- Inline sign-chain comment at camera_controller.gd:125–126:
  "Google Maps drag model: drag left → grab scene → scene slides LEFT → pivot moves RIGHT
   → negate delta.x" — PRESENT for the horizontal calculation line (line 134). ✓
- Test: `test_drag_direction_matches_view_movement` (test_ux_polish.gd:132)
  - Drags left (to x=50 from x=100); asserts `cam._pivot.x > initial_x` ✓ MATCHES.
- check-nondirectional-movement-assertions.sh: EXIT 0 — script does not flag
  `test_lmb_pan_moves_pivot` (name prefix is `test_lmb_`, not `test_pan_*` or directional
  keyword) and all `test_pan_*` / directional functions use signed comparisons.
- Status: COVERED.

**NOTE (non-blocking):** The requirement prose also says "Dragging up moves the view up."
The forward/Y pan calculation at line 135 (`_pivot -= forward * delta.y * pan_amount`) has
no separate inline sign-chain comment (guidelines require one per directional calculation
line). The spec's scenario THEN-clause only defines the horizontal "(i.e.)" example; there
is no THEN-clause for vertical, so no test is required for it. The missing vertical comment
is a style gap, not a spec-alignment FAIL. Recommendation: add a `# drag up → pivot moves
forward → subtract delta.y` comment before line 135.

