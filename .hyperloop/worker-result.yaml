## Python extractor (pre-existing, verified passing)

93 pytest tests pass covering every spec scenario:
- Module Discovery: bounded contexts and nested modules discovered, nodes
  have id/name/type/parent/metrics fields.
- Dependency Extraction: cross-context and internal edges built from AST
  import analysis; edge type field distinguishes the two.
- Complexity Metrics: LOC computed recursively; included in node metrics.
- JSON Scene Graph Output: nodes list + edges list + metadata dict; all
  fields present and JSON-serialisable.
- Spec Extraction: spec nodes prefixed with "spec.", distinguishable from
  code-derived nodes, disabled by default.

Ruff lint and format checks: all clean.

## Godot component (added this task)

Added `godot/scripts/scene_graph_loader.gd` (SceneGraphLoader class) that
parses the JSON scene graph dict into structured arrays the visualiser can
consume without transformation.

Added `godot/tests/test_scene_graph_loader.gd` with 24 behavioral tests
covering every THEN clause:
- nodes list with id, name, type, parent (null for top-level / "iam" for
  modules), metrics.loc, position (x/y/z), size fields
- edges list with source, target, type fields
- Direction preservation: source = importer, target = imported-from
- Distinguishability: cross_context vs internal type values differ
- Metadata passthrough: source_path and timestamp preserved
- Spec nodes: type="spec" preserved; id begins with "spec."
- Edge cases: empty graph, missing top-level keys handled gracefully

Added `godot/tests/run_tests.gd` — minimal headless runner (extends
SceneTree) that discovers test_* methods, reports PASS/FAIL per method,
and exits non-zero on any failure.

