### REQ-9: Not In Scope — COVERED (exclusions confirmed absent)

Grep of `extractor/` and `godot/scripts/` for all prohibited terms: no matches.

| Excluded feature | Status |
|---|---|
| Conformance mode (spec overlay comparison) | ABSENT |
| Evaluation mode (architectural quality assessment) | ABSENT |
| Simulation mode (hypothetical change impact) | ABSENT |
| Data flow visualization | ABSENT |
| Moldable views (LLM-powered question-driven views) | ABSENT |
| Spec extraction | ABSENT — extractor produces only bounded_context/module nodes |
| First-person navigation | ABSENT — camera is orbit-only |

Note on `NodeType = Literal["bounded_context", "module", "spec"]`: the schema
type list includes "spec" as a pass-through, but the extractor never emits spec
nodes, there is no spec extraction logic, and no conformance comparison UI exists.
Schema pass-through ≠ implementing the excluded feature.

