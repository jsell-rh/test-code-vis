  verifies coupled pair is geometrically closer than uncoupled pair ✓
- `test_extractor.py::TestCouplingAwareLayout::test_order_by_coupling_places_coupled_adjacent` —
  unit test for greedy ordering function ✓
- `test_spatial_structure.gd::test_dependency_expressed_as_visible_connection` —
  asserts ImmediateMesh child exists for edge ✓

