### F2 — WEAK DIRECTION TEST: WRONG PREDICATE [FAIL]

**Spec THEN-clause under review:**
> THEN the scene moves in the same direction as the drag (i.e. dragging left reveals
> content to the right, as in Google Maps)

**Mapped test:** `test_drag_direction_matches_view_movement`

**Test body (read verbatim):**
  ```gdscript
  func test_drag_direction_matches_view_movement() -> bool:
      var cam = _make_cam()
      _press_lmb(cam, Vector2(100.0, 100.0))
      _move_mouse(cam, Vector2(100.0, 150.0))  # drag down 50 px
      return cam._pivot != Vector3.ZERO
  ```

**Required predicate:** The test must verify the DIRECTION of pivot movement matches the
spec (either grab model or camera-pan model — but it must assert direction, not just
non-zero movement).

**Actual predicate:** `cam._pivot != Vector3.ZERO` — only asserts movement occurred.
A pivot could move in any direction (or even diagonally) and this test would PASS.
An implementation with completely inverted pan direction passes this test identically.

This test provides zero assurance about which direction the scene moves. It is a
wrong-predicate mapping regardless of which directional model (grab or camera-pan)
the spec intends.

**Prescribed fix:**
  Replace the `!= Vector3.ZERO` assertion with a directional assertion.
  For camera-pan model (drag down → pivot moves forward/positive Z in headless identity):
    `return cam._pivot.z > 0.0`
  For grab model (drag down → pivot moves backward/negative Z):
    `return cam._pivot.z < 0.0`
  The correct sign depends on F1 resolution (spec clarification required).

