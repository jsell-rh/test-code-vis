## Requirement: JSON Scene Graph Loading — COVERED

**Implementation:** `godot/scripts/main.gd`
- `_ready()` uses `FileAccess.open()` + `get_as_text()` (Godot 4.x API) to read
  the JSON file, then calls `SceneGraphLoader.load_from_dict()` and
  `build_from_graph()`.
- `build_from_graph()` iterates nodes and edges, calling `_create_volume()` for
  each node and `_create_edge()` for each edge.
- Positions are read from `nd["position"]` dict and applied as `anchor.position`.

**Scenario: Loading kartograph's scene graph — tests in `test_scene_graph_loading.gd`:**
- `test_volumes_created_for_each_node()` — GIVEN fixture with 2 nodes, WHEN
  `build_from_graph()` called, THEN `_anchors` has entries for both node IDs.
- `test_mesh_instances_exist_in_anchors()` — THEN each anchor has a MeshInstance3D child.
- `test_edge_mesh_instances_created()` — THEN each edge produces ≥2 MeshInstance3D
  nodes at the scene root (line + arrowhead cone).
- `test_anchor_positions_match_json()` — THEN anchor positions match JSON "position" fields.
- `test_labels_are_billboard_and_readable()` — THEN labels use BILLBOARD_ENABLED,
  pixel_size > 0, no_depth_test=true.

