### Requirement: Dependency Rendering — COVERED

**Implementation:**
- `main.gd:_create_edge()` creates an `ImmediateMesh` (PRIMITIVE_LINES) for the line
  connecting two node world-space positions.
- A `CylinderMesh` with `top_radius=0.0` (arrowhead cone) oriented along the edge direction
  vector is placed at the target end, visually indicating direction of the dependency flow.
- Cross-context edges: orange (`Color(1.0, 0.50, 0.10)`); internal: grey.

**Tests (`godot/tests/test_dependency_rendering.gd`):**
- `test_edge_line_mesh_created` — `ImmediateMesh` child present on main node
- `test_direction_indicator_cone_created` — `CylinderMesh` with `top_radius == 0.0` present
- `test_direction_cone_near_target` — cone within 2 units of target position `(20,0,0)`
- `test_cross_context_cone_is_orange` — `albedo_color.r > 0.8`, `albedo_color.b < 0.3`

**Scenario: Rendering a cross-context dependency** — both THEN clauses verified.

