### F5 — FAIL [BLOCKING — RACF]: check-relative-position-tests.sh (6th consecutive cycle)

**Two sub-findings:**

**F5a — Extractor bug:** `extractor/extractor.py` lines 228–230 add the parent's world
position to the child's local offset, storing absolute world coordinates:
  ```python
  child["position"] = {
      "x": px + pos[0],   # BUG: absolute world x, not local offset
      "y": py + pos[1],
      "z": pz + pos[2],
  }
  ```
The spec requires positions to be stored as relative (local) offsets. `main.gd` adds the
parent's world position at render time, causing double-offset rendering when parents are
not at origin.

**F5b — Inadequate test:** The test fixture in `test_scene_graph_loading.gd` places the
parent context at `position: {x:0, y:0, z:0}`. With the parent at the origin, absolute
and relative coordinates are numerically identical, so the test passes whether the extractor
stores absolute or relative values. The check is correct: this is not a relative-offset
assertion.

**Re-attempt compliance failure:** Prior cycle (f4b1de1) prescribed both fixes verbatim.
Neither was applied.

**Fix for F5a:** `extractor/extractor.py` lines 228–230:
  ```python
  child["position"] = {
      "x": pos[0],
      "y": pos[1],
      "z": pos[2],
  }
  ```

**Fix for F5b:** Add a pytest test that:
  1. Places the parent node at a non-zero world position (e.g., `x=10.0`)
  2. Computes layout for child nodes (local offset from parent)
  3. Asserts `child['position']['x'] == local_offset_x` (NOT `parent_x + local_offset_x`)
  4. Optionally asserts `child['position']['x'] != parent_x + local_offset_x`

