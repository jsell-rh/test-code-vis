All test function names below were verified with `grep -rn` before being accepted.

### Scenario: Engine version

| THEN-clause | Test function | File | Verified |
|---|---|---|---|
| opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | test_engine_version.gd | ✓ |
