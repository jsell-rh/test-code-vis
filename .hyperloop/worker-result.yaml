## THEN-Clause Mapping — Independently Verified

Each THEN-clause is traced to a named test. I read the test body and independently
derived the expected predicate from the spec BEFORE reading the assert statement.

| THEN-Clause | Test(s) | Predicate Verified | Verdict |
|---|---|---|---|
| camera pans in the direction of the drag | test_lmb_drag_pans_camera | `cam._pivot != initial_pivot` (LMB drag moves pivot) | COVERED |
| movement direction matches the drag direction (not inverted) | test_pan_direction_not_inverted | `cam._pivot.x > 0.0` at phi=PI/2 after drag-left 50px | COVERED |
| scene moves in the same direction as the drag | test_pan_direction_not_inverted | same assertion — direction invariant is the predicate | COVERED |
| view zooms toward the point under the cursor | test_zoom_in_shifts_pivot_toward_cursor | `cam._target_pivot.x > 0.0` after zoom-in toward cursor at +X | COVERED |
| component under the cursor stays under the cursor during zoom | test_zoom_in_cursor_point_invariant | `0 < _target_pivot.x < world_pt.x` (between old pivot and cursor) | COVERED |
| view zooms out from the point under the cursor | test_zoom_out_shifts_pivot_away_from_cursor | `cam._target_pivot.x < 0.0` after zoom-out (pivot moves away) | COVERED |
| camera orbits around the point under the cursor at orbit start | test_orbit_uses_right_mouse_button, test_orbit_around_cursor_point | phi changes on RMB drag; `cam._pivot == world_pt` after begin_orbit_at_world_point | COVERED |
| component remains at the visual centre during the orbit | test_orbit_pivot_is_world_point | `cam._pivot.is_equal_approx(world_pt)` | COVERED |
| zoom is animated smoothly (interpolated), not instantaneous (compound) | test_smooth_zoom_target_differs_from_distance_after_scroll, test_smooth_zoom_process_interpolates_distance | `_target_distance < _distance` (not yet interpolated); `_distance < 40 and _distance > 20` after _process(0.1) | COVERED |
| pan movement is smooth and proportional to drag speed (compound) | test_pan_applied_immediately_no_lag, test_pan_proportional_to_drag_speed | `_pivot.is_equal_approx(_target_pivot)` (immediate apply); `cam_fast._pivot.length() > cam_slow._pivot.length()` | COVERED |

**Pan direction sign derivation (derived before reading test body):**

Spec: "scene moves in the same direction as the drag (dragging left reveals content
to the right, as in Google Maps)."

Independent derivation at phi=PI/2, theta=0.15, distance=40:
- Camera position = (0*sin*cos, 40*cos(0.15), 40*sin(0.15)*1) ≈ (0, 39.55, 5.98)
- look_at_from_position toward origin → view_dir ≈ (0, -0.989, -0.150)
- basis.x = cross(view_dir, UP) = cross((0,-0.989,-0.150),(0,1,0)) = (0.150, 0, 0) → normalized = +X
- Drag left: delta.x = 50→100→50 = position(50,100) - last(100,100) → delta.x = -50
- Code: `_target_pivot -= right * delta.x * pan_amount = -((+X)*(-50)*+) = +X * 50 * pan_amount`
- pivot.x increases (camera/pivot move right) → scene appears to move left = drag direction ✓
- Expected assert: `pivot.x > 0.0` — test asserts exactly this. ✓

**Opposite-direction check:**
The test asserts `pivot.x > 0.0` (positive), consistent with the spec requirement that
drag-left produces same-direction scene movement. NOT the opposite sign. ✓

