## Requirement Coverage

### REQ-1: Pan with Left Mouse Button (MUST) — COVERED

**Implementation** (`camera_controller.gd`):
- `_handle_button()` sets `_panning = event.pressed` on `MOUSE_BUTTON_LEFT`.
- `_handle_motion()` when `_panning` applies:
  `_target_pivot -= right * delta.x * pan_amount` and
  `_target_pivot -= backward * delta.y * pan_amount`,
  then immediately `_pivot = _target_pivot`.

**Scenario: Panning the view**
- `test_lmb_drag_pans_camera`: LMB press at (100,100), motion to (150,100);
  asserts `_pivot != initial_pivot`. PASS.
- `test_pan_direction_not_inverted`: direction matches drag. PASS (see REQ-2).

---

### REQ-2: Non-Inverted Movement (MUST) — COVERED

**Implementation**: At `_phi = PI/2`, `basis.x = world +X`. Dragging left
(`delta.x = −50`): `_target_pivot -= (+X)(−50)(pan_amount)` → `pivot.x > 0` →
camera moves +X → scene shifts left. Google Maps convention satisfied.

**Scenario: Drag direction matches view movement**
- `test_pan_direction_not_inverted`: phi=PI/2, drag 50 px left; asserts
  `cam._pivot.x > 0.0`. Derivation comment explains each sign-convention step. PASS.

---

### REQ-3: Zoom Toward Mouse Cursor (MUST) — COVERED

**Implementation** (`_zoom_toward_point(world_pt, direction)`):
- `zoom_ratio = _target_distance / old_dist`
- `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
- Only targets mutated; `_process()` smoothly interpolates `_distance`/`_pivot`.
- `_handle_button()` passes `_get_ground_point_under_cursor(_last_mouse)` for
  both WHEEL_UP and WHEEL_DOWN.

**Scenario: Zooming into a specific component**
- `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (10,0,0), zoom in;
  asserts `_target_pivot.x > 0`. PASS.
- `test_zoom_in_cursor_point_invariant`: cursor at (20,0,0), zoom in;
  asserts `0 < _target_pivot.x < 20` (geometric invariant). PASS.

**Scenario: Zooming out**
- `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (10,0,0), zoom out;
  asserts `_target_pivot.x < 0`. PASS.

---

### REQ-4: Orbit Around Mouse Point (MUST) — COVERED

**Implementation**:
- `MOUSE_BUTTON_RIGHT` pressed → `begin_orbit_at_world_point(
  _get_ground_point_under_cursor(event.position))`.
- `begin_orbit_at_world_point(world_pt)` sets `_pivot = world_pt`, recomputes
  `_distance`, `_theta`, `_phi` from current camera position (no jump).
- `_handle_motion()` while `_orbiting` adjusts `_phi` and `_theta`.

**Scenario: Orbiting around a component**
- `test_orbit_uses_right_mouse_button`: RMB press + horizontal motion;
  asserts `_phi != initial_phi`. PASS.
- `test_orbit_around_cursor_point`: `begin_orbit_at_world_point((5,0,3))`;
  asserts `_pivot == world_pt`. PASS.
- `test_orbit_pivot_is_world_point`: asserts `_pivot.is_equal_approx(world_pt)`.
  Camera `look_at`s `_pivot` on every transform update, so world_pt is always
  at the visual centre. PASS.

---

### REQ-5: Smooth Camera Movement (MUST) — COVERED

**Implementation**:
- Zoom: `_process()` applies exponential smoothing
  `t = 1.0 - pow(0.05, delta * zoom_smooth)` then `lerpf`/`lerp` to converge
  `_distance → _target_distance` and `_pivot → _target_pivot`.
- Pan: directly proportional to drag delta (no snapping).

**Scenario: Smooth zoom**
- `test_smooth_zoom_target_differs_from_distance_after_scroll`: scroll up;
  asserts `_target_distance < _distance`. PASS.
- `test_smooth_zoom_process_interpolates_distance`: target=20, current=40,
  `_process(0.1)`; asserts `20 < _distance < 40`. PASS.

**Scenario: Smooth pan**
- `test_pan_proportional_to_drag_speed`: 10 px vs 50 px drag; asserts
  larger drag produces larger pivot displacement. PASS.

