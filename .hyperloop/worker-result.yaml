### Requirement: Pre-Computed Layout / Godot renders at positions (sub-clause 4)
**Status: COVERED** (was MISSING in prior round — now resolved)

**Implementation** (`godot/scripts/main.gd` commit 8ce381b):
- `build_from_graph(graph)` iterates `graph.get("nodes", [])` and calls `_spawn_node`.
- `_spawn_node(node_data)` creates a `MeshInstance3D`, names it `node_data["id"]`, and
  sets `mesh_instance.position = Vector3(pos.get("x"), pos.get("y"), pos.get("z"))` —
  using extractor-computed coordinates verbatim.  No layout algorithm runs in GDScript.

**Tests** (`godot/tests/test_node_renderer.gd`, registered in `run_tests.gd` line 19):

1. `test_node_rendered_at_json_position`: instantiates `Main`, calls `build_from_graph`
   with fixture (iam at x=1.0, y=0.0, z=0.0), asserts `iam_node.position.x == 1.0`,
   `position.y == 0.0`, `position.z == 0.0` using `is_equal_approx`.

2. `test_second_node_rendered_at_json_position`: same fixture, asserts `shared_kernel`
   node at position x=-3.0, y=2.0, z=5.0 exactly.

3. `test_no_layout_recomputed_in_godot`: arbitrary coordinates (7.0, 3.0, -2.0) fed in;
   asserts scene-tree node matches exactly — confirms no Godot-side recomputation.

4. `test_each_json_node_becomes_a_scene_tree_child`: verifies `root.get_child_count() == 2`
   for a 2-node fixture — every JSON node must produce exactly one Node3D child.

All four tests:
- Instantiate `Main` directly (not via scene file).
- Assert actual `.position` property values on `Node3D` children in the scene tree.
- Do NOT invoke any layout function; the only position source is the JSON fixture.

This satisfies the guideline: "Verify a test exists that exercises this exact scenario
with known fixture data and asserts runtime outputs (scene-tree nodes, property values,
positions)."

