### Requirement: Smooth Camera Movement — COVERED

**SHALL**: All transitions smooth and continuous, no snapping/jerking.

Implementation (`_process` lines 42–47):
```
var t: float = 1.0 - pow(0.05, delta * zoom_smooth)
_distance = lerpf(_distance, _target_distance, t)
_pivot = _pivot.lerp(_target_pivot, t)
```
Input events only mutate `_target_distance`/`_target_pivot`; actuals converge each frame via exponential smoothing.

**Scenario: Smooth zoom**
| THEN clause | Test | Verdict |
|---|---|---|
| Zoom interpolated, not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll` — after scroll: `cam._target_distance < cam._distance` (target changed but actual not yet) | COVERED |
| _process interpolates toward target | `test_smooth_zoom_process_interpolates_distance` — after `_process(0.1)`: `20.0 < _distance < 40.0` | COVERED |

**Scenario: Smooth pan**
| THEN clause | Test | Verdict |
|---|---|---|
| Pan proportional to drag speed | `test_pan_proportional_to_drag_speed` — 50px drag yields larger pivot displacement than 10px drag | COVERED |

