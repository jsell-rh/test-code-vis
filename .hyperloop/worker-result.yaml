### Requirement: Containment Rendering — COVERED

**Implementation** (`main.gd` `_create_volume()`)
- `bounded_context`: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
- `module`: `albedo_color.a = 1.0` (fully opaque), default cull mode.
- Child module anchor is `add_child`-ed to the *parent* anchor — real scene-tree
  nesting (child volume is physically inside parent in 3D space).
- `BoxMesh.size.x = float(nd["size"])` — larger size → larger box.

**Tests** (`test_containment_rendering.gd`)
- `test_bounded_context_is_translucent` — `transparency != DISABLED && alpha < 1`.
- `test_module_is_opaque` — `alpha >= 1.0`.
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled` — `cull_mode == CULL_DISABLED`.

