### Requirement: Dependency Visualization — COVERED

**SHALL**: Dependencies shown as visible connections; direction discernible.

Scenario: Cross-context dependency

Implementation: `main.gd -> _create_edge()`:
1. ImmediateMesh (PRIMITIVE_LINES) line from source to target world position.
2. CylinderMesh(top_radius=0.0) cone at the target end, oriented along edge
   direction, so the pointed tip marks the dependency destination.
3. Cross-context: orange Color(1.0, 0.50, 0.10). Internal: grey.

Tests:
- `test_edge_line_mesh_created` (test_dependency_rendering.gd): ImmediateMesh
  child exists after `_create_edge()`.
- `test_direction_indicator_cone_created`: CylinderMesh with `top_radius == 0.0`
  exists — explicit cone arrowhead.
- `test_direction_cone_near_target`: cone position within 2.0 units of target.
- `test_cross_context_cone_is_orange`: cross-context arrowhead has r > 0.8, b < 0.3.
- `test_edge_direction_preserved_source_to_target` (test_scene_graph_loader.gd):
  source/target order preserved through JSON parse.

**COVERED**

