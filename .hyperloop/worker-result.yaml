All moldable-views spec scenarios are fully implemented and tested.

## Implementation summary

### godot/scripts/view_spec.gd
- `VALID_OPS` constant declares the fixed set of 6 primitives: show, hide, highlight, arrange, annotate, connect.
- `from_dict()` parses raw view-spec dicts and silently drops any op not in VALID_OPS, enforcing the fixed primitive contract.
- `get_valid_ops()` returns a copy so callers cannot mutate the canonical set.

### godot/scripts/view_spec_renderer.gd
- `apply(graph, spec, root)` is the sole entry point.
- **show**: renders only listed node ids (when present); otherwise renders all non-hidden nodes.
- **hide**: listed node ids are absent from the scene tree.
- **highlight**: sets `StandardMaterial3D.albedo_color` on `MeshInstance3D.material_override`.
- **arrange**: overrides the node's JSON position with spec-provided coordinates on the `MeshInstance3D`.
- **annotate**: adds a `Label3D` child named "annotation" with `billboard = BaseMaterial3D.BILLBOARD_ENABLED` and `pixel_size = 0.05`.
- **connect**: creates a `Node3D` named "conn_{src}_{tgt}" at the midpoint of the two nodes' positions.

### godot/tests/test_view_spec.gd and test_view_spec_renderer.gd
- 32 behavioral tests cover every THEN clause in the spec.
- All 91 project tests pass (0 failures).

