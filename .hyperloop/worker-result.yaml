### 5. Performance at Kartograph Scale (MUST) — COVERED (PASS-WITH-NOTE)

**Implementation:**
- `godot/scripts/lod_manager.gd` implements three-tier LOD (FAR/MEDIUM/NEAR)
  based on camera distance, hiding modules and edges at distance thresholds.
- `main.gd` registers every node and edge in `_lod_node_entries` /
  `_lod_edge_entries` and calls `_update_lod()` every `_process()` frame.

**Tests (godot/tests/test_nfr_scale.gd):**

| THEN clause | Test | Verification |
|---|---|---|
| Builds at kartograph scale | `test_kartograph_scale_anchor_count` | 6 contexts × 9 modules = 60 nodes; asserts `_anchors.size() == 60` |
| All 6 bounded context anchors | `test_kartograph_scale_context_anchors_exist` | Asserts each of 6 context IDs present in `_anchors` |
| All 54 module anchors | `test_kartograph_scale_module_anchors_exist` | Iterates fixture, asserts each module ID in `_anchors`; fixture count asserted == 54 |
| World positions populated | `test_kartograph_scale_build_produces_world_positions` | Asserts `_world_positions.size() == 60` after build |

**Note:** FPS measurement (>30fps) and perceptible-stutter detection require a
live GPU render pipeline unavailable in headless CI. The structural correctness
of the build path at full kartograph scale is fully tested. Classification:
PASS-WITH-NOTE (physically untestable metric, not a missing implementation).

