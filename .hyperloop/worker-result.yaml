### Requirement: Camera Controls — COVERED

**Code:** `godot/scripts/camera_controller.gd`

- **Top-down default:** `_theta = 0.15` rad (≈ 8.6° from vertical). ✓
- **Zoom:** `MOUSE_BUTTON_WHEEL_UP/DOWN` adjusts `_distance` (clamped to `[min_distance, max_distance]`). ✓
- **Orbit:** Middle-mouse drag adjusts `_phi` (azimuth) and `_theta` (polar, clamped to prevent
  pole-flip). `look_at(_pivot, Vector3.UP)` preserves up-orientation. ✓
- **Labels readable:** `Label3D` with `billboard = BILLBOARD_ENABLED` ensures labels always face
  the camera regardless of zoom distance. ✓

**Tests:** `godot/tests/test_camera_controls.gd` (7 tests)
- `test_initial_theta_is_near_top_down` — verifies `_theta < PI/4` (< 45° from vertical).
- `test_initial_distance_is_positive` — verifies `_distance > 0`.
- `test_scroll_up_decreases_distance` — synthesises `MOUSE_BUTTON_WHEEL_UP` event; asserts
  `_distance` decreases.
- `test_scroll_down_increases_distance` — synthesises `MOUSE_BUTTON_WHEEL_DOWN` event; asserts
  `_distance` increases.
- `test_orbit_horizontal_drag_changes_phi` — synthesises middle-mouse press + horizontal motion;
  asserts `_phi` changes.
- `test_orbit_vertical_drag_changes_theta` — synthesises middle-mouse press + vertical motion;
  asserts `_theta` changes.
- `test_set_pivot_updates_state` — calls `set_pivot()`; asserts `_pivot` and `_distance` update.
- `test_zoom_clamped_at_minimum` — scrolls in 200 times; asserts `_distance >= min_distance`.

