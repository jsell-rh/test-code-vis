### Requirement: Understanding Without Writing Code — COVERED

**SHALL**: The system MUST provide humans with a concrete understanding of how a software system
is actually built, without requiring them to read or write any of its source code.

**Scenario: Architect evaluates unfamiliar system**

**Code implementation** (`godot/scripts/main.gd`):
- `build_from_graph()` creates Node3D anchors for all structural elements, so the
  entire system structure is visible without reading source.
- `_create_volume()` attaches a Label3D with `billboard = BILLBOARD_ENABLED` and
  `pixel_size = 0.012` so names are legible from any angle.
- `_create_edge()` renders dependency lines (ImmediateMesh) with coloured arrowhead
  cones: orange (`Color(1.0, 0.50, 0.10)`) for cross-context, grey
  (`Color(0.55, 0.55, 0.55)`) for internal edges.
- Module anchors are parented to bounded-context anchors (containment in scene tree).

**Test coverage** (`godot/tests/test_system_purpose.gd` — runtime behavioral GDScript tests):
- `test_bounded_contexts_are_structurally_identifiable` — verifies `_anchors` contains
  both top-level bounded-context IDs from known fixture data.
- `test_node_names_are_labelled_for_identification` — asserts Label3D.text == "AuthService".
- `test_label_billboard_enabled_for_readability` — asserts label.billboard == BILLBOARD_ENABLED.
- `test_label_pixel_size_positive_for_readability` — asserts label.pixel_size > 0.
- `test_dependencies_are_visible_as_connections` — verifies at least one ImmediateMesh
  MeshInstance3D exists as a dependency line.
- `test_cross_context_and_internal_edges_are_distinguishable` — collects distinct albedo
  colours from `_lod_edge_entries` and asserts >= 2 distinct colours are used.
- `test_dependency_direction_is_encoded_in_edges` — inspects `_path_edge_entries` for
  correct source/target ("billing" → "auth").
- `test_modules_are_contained_within_bounded_contexts` — asserts `auth.domain` anchor's
  get_parent() == `auth` anchor.

All 8 tests exercise known fixture data and assert scene-tree properties at runtime.
`run_tests.gd` line 46 registers this suite: `_run_suite(preload("res://tests/test_system_purpose.gd").new())`.

