## Requirement: Simulation Mode — COVERED

Implementation: `godot/scripts/understanding_overlay.gd`
  - `apply_split_overlay()`: finds all nodes with an edge → target_id (dependents),
    colours each AFFECTED_COLOR, annotates each with "requires new interface" label.
  - `apply_failure_overlay()`: BFS from target_id through reverse-adjacency graph,
    colours every transitively affected node AFFECTED_COLOR, annotates each "AFFECTED".
  Wired via `main.gd::_apply_failure_impact_overlay()` (K key).
  (apply_split_overlay is implemented and tested; the K-key wires failure injection.)

### Scenario: Splitting a service — COVERED
- Test: `test_split_impact_on_dependents_visible` — GIVEN svc_a depending on monolith,
  WHEN split overlay applied to "monolith", THEN svc_a receives AFFECTED_COLOR.
- Test: `test_split_shows_required_new_interfaces` — confirms scene root contains
  a Label3D with text "requires new interface".

### Scenario: Failure injection — COVERED
- Test: `test_failure_cascade_effects_visible` — GIVEN chain svc_b→svc_a, svc_c→svc_b,
  WHEN failure overlay applied to "svc_a", THEN both svc_b (direct) and svc_c
  (transitive) receive AFFECTED_COLOR.
- Test: `test_failure_affected_components_clearly_identified` — confirms scene root
  contains a Label3D with text "AFFECTED" for the affected component.

