## Requirement: Dependency Rendering — COVERED

**Implementation:** `_create_edge()` in `main.gd` creates an ImmediateMesh
(PRIMITIVE_LINES, two vertices) for the line and a CylinderMesh (top_radius=0, cone)
placed at the target end, oriented along the edge direction. Cross-context edges are
orange; internal edges are grey.

**Scenario: Rendering a cross-context dependency — all THEN/AND clauses covered:**

| Clause | Code | Test |
|--------|------|------|
| a line connects the two context volumes | ImmediateMesh with from_pos → to_pos vertices | `test_dependency_rendering.gd::test_edge_line_mesh_created` |
| line's direction is visually indicated | CylinderMesh cone (top_radius=0) at target end | `test_dependency_rendering.gd::test_direction_indicator_cone_created`, `test_direction_cone_near_target`, `test_cross_context_cone_is_orange` |

