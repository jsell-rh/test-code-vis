## Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

**Implementation**: `godot/scripts/main.gd._ready()` uses `FileAccess.open()` +
`get_as_text()` + `JSON.parse_string()` + `SceneGraphLoader.load_from_dict()` +
`build_from_graph()`. The full pipeline executes at startup, not a stub.

**Scenario: Loading kartograph's scene graph**
- THEN it reads the JSON file → `FileAccess.open()` + `get_as_text()` in `_ready()`
- AND generates 3D volumes for each node → `test_volumes_created_for_each_node` asserts
  `_anchors.has("ctx1") and _anchors.has("mod1")`; `test_mesh_instances_exist_in_anchors`
  confirms MeshInstance3D children exist in every anchor
- AND generates connections for each edge → `test_edge_mesh_instances_created` asserts
  ≥2 MeshInstance3D children on main node (ImmediateMesh line + CylinderMesh arrowhead)
- AND positions elements according to layout data → `test_anchor_positions_match_json`
  asserts `anchor.position.is_equal_approx(Vector3(…))` using JSON fixture values;
  `test_node_renderer.gd` (4 tests) confirms positions match JSON x/y/z directly

### Requirement: Containment Rendering — COVERED

**Implementation**: `main.gd._create_volume()` creates bounded_context nodes as
translucent BoxMesh slabs (`TRANSPARENCY_ALPHA`, `albedo_color.a < 1.0`,
`CULL_DISABLED`) and module nodes as opaque boxes (`TRANSPARENCY_DISABLED`),
parented to their context anchor in the scene tree.

**Scenario: Modules inside a bounded context** — `test_containment_rendering.gd`:
- THEN bounded context is translucent → `test_bounded_context_is_translucent` asserts
  `transparency != TRANSPARENCY_DISABLED and albedo_color.a < 1.0`
- AND child modules are opaque → `test_module_is_opaque` asserts `albedo_color.a >= 1.0`
- AND modules are parented inside context → `test_module_parented_inside_context`
  asserts `mod_anchor.get_parent() == ctx_anchor`
- AND context is larger → `test_bounded_context_larger_than_module` asserts
  `ctx_mesh.size.x > mod_mesh.size.x`
- AND boundary visually distinct → `test_bounded_context_cull_disabled` asserts
  `cull_mode == CULL_DISABLED`

### Requirement: Dependency Rendering — COVERED

**Implementation**: `main.gd._create_edge()` builds an `ImmediateMesh` line with
`PRIMITIVE_LINES` between world-space positions, plus a `CylinderMesh` (`top_radius=0.0`)
arrowhead cone oriented along edge direction placed at the target end. Cross-context
edges use orange color (`r=1.0, g=0.5, b=0.0`); internal edges use grey.

**Scenario: Rendering a cross-context dependency** — `test_dependency_rendering.gd`:
- THEN a line connects the two context volumes → `test_edge_line_mesh_created` finds
  MeshInstance3D whose mesh is ImmediateMesh
- AND the line's direction is visually indicated → `test_direction_indicator_cone_created`
  finds CylinderMesh with `top_radius == 0.0`; `test_direction_cone_near_target` asserts
  cone position within 2 units of target node; `test_cross_context_cone_is_orange` asserts
  `r > 0.8 and b < 0.3` on the cone material

### Requirement: Size Encoding — COVERED

**Implementation**: `main.gd._create_volume()` sets `box.size = Vector3(sz, …, sz)`
where `sz = float(nd["size"])`, making mesh width directly proportional to the size metric.

**Scenario: Large module vs small module** — `test_size_encoding.gd`:
- THEN larger module has bigger volume → `test_large_module_has_bigger_mesh` asserts
  `large_mesh.size.x > small_mesh.size.x` (sizes 9.0 vs 3.0)
- AND relative sizes are proportional → `test_mesh_sizes_proportional_to_metric` asserts
  `|actual_ratio - 3.0| < 0.001`

### Requirement: Camera Controls — COVERED

**Implementation**: `godot/scripts/camera_controller.gd` implements spherical-coordinate
orbit camera (`_theta`, `_phi`, `_distance`, `_pivot`). Initial `_theta = 0.15` rad (≈ 8.6°
from vertical = nearly top-down). Scroll wheel adjusts `_distance`. Middle-mouse drag
updates `_phi` and `_theta`. Right-mouse drag pans the pivot. `_update_transform()` always
calls `look_at(_pivot, Vector3.UP)` to keep up canonical, `_theta` clamped to `[0.01, PI-0.01]`
to prevent pole flip.

**Scenario: Top-down overview** — `test_camera_controls.gd`:
- `test_initial_theta_is_near_top_down` asserts `_theta < PI/4`
- `test_initial_distance_is_positive` asserts `_distance > 0`

**Scenario: Zooming in**:
- `test_scroll_up_decreases_distance` asserts `_distance` decreases on WHEEL_UP
- `test_scroll_down_increases_distance` asserts `_distance` increases on WHEEL_DOWN
- `test_zoom_clamped_at_minimum` asserts repeated scroll-up never goes below `min_distance`
- Labels readability: `test_labels_are_billboard_and_readable` asserts `BILLBOARD_ENABLED`,
  `pixel_size > 0`, `no_depth_test = true` on every label

**Scenario: Orbiting**:
- `test_orbit_horizontal_drag_changes_phi` asserts horizontal drag changes `_phi`
- `test_orbit_vertical_drag_changes_theta` asserts vertical drag changes `_theta`
- `test_set_pivot_updates_state` asserts `set_pivot()` stores new pivot + distance
- "Up stays up": enforced by `look_at(_pivot, Vector3.UP)` on every transform update
  and `_theta` clamped to `[0.01, PI-0.01]`

