### Requirement: Dependency Rendering — COVERED

**Implementation** (`main.gd` `_create_edge()`)
- `ImmediateMesh` with `PRIMITIVE_LINES` (two vertices: from_pos → to_pos) added
  as a child of the scene root (world-space line).
- `CylinderMesh` with `top_radius = 0.0` (pointed cone) placed at `to_pos`,
  oriented along the edge direction — explicit direction indicator.
- Cross-context edges use orange `Color(1.0, 0.50, 0.10)`; internal edges use grey.

**Tests** (`godot/tests/test_dependency_rendering.gd`)
- `test_edge_line_mesh_created` — finds `ImmediateMesh` child (line exists).
- `test_direction_indicator_cone_created` — finds `CylinderMesh` with
  `top_radius == 0` (direction visually indicated).
- `test_direction_cone_near_target` — asserts cone position within 2 units of
  the target node's world position (cone marks the arrival end).
- `test_cross_context_cone_is_orange` — asserts `albedo_color.r > 0.8 && .b < 0.3`
  for cross-context arrowhead.

