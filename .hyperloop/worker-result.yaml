### Requirement: Containment Rendering — COVERED

**Implementation:**
- `main.gd:_create_volume()`: bounded_context nodes → `TRANSPARENCY_ALPHA`, `albedo_color.a=0.18`,
  `CULL_DISABLED`; module nodes → fully opaque (`albedo_color.a=1.0`).
- Child module anchors are `add_child`-ed to the parent context anchor (scene-tree nesting),
  placing them visually inside the parent volume.
- Context BoxMesh: `Vector3(sz, sz*0.2, sz)` (larger flat slab);
  module BoxMesh: `Vector3(sz, sz*0.6, sz)` (smaller compact box).

**Tests (`godot/tests/test_containment_rendering.gd`):**
- `test_bounded_context_is_translucent` — `mat.transparency != DISABLED`, `albedo_color.a < 1.0`
- `test_module_is_opaque` — `mat.albedo_color.a >= 1.0`
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`
- `test_bounded_context_larger_than_module` — `ctx BoxMesh.size.x > mod BoxMesh.size.x`
- `test_bounded_context_cull_disabled` — `mat.cull_mode == CULL_DISABLED`

**Scenario: Modules inside a bounded context** — all three THEN clauses verified by tests.

