### Requirement: Top-Down Architectural View — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`:
- `_theta = 0.15 rad` ≈ 8.6° from straight above (satisfies "top-down"; threshold < 45°)
- Bounded contexts rendered as distinct translucent slabs by `main.gd::_create_volume()`
- `extractor.py::_order_by_coupling()` + `compute_layout()` place tightly coupled contexts adjacent

**Tests:**
- `test_camera_controls.gd::test_initial_theta_is_near_top_down` asserts `cam._theta < PI / 4.0` ✓
- `test_containment_rendering.gd::test_bounded_context_is_translucent` ✓
- `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled` — verifies coupled
  bounded contexts are spatially closer after layout ✓
- `test_extractor.py::TestLayout::test_order_by_coupling_places_coupled_adjacent` ✓
- `test_dependency_rendering.gd` — edges (connections) exist between contexts ✓

**Scenario: Viewing kartograph from above — COVERED**
- THEN all bounded contexts are visible as distinct volumes ✓
- AND their relative positions reflect coupling ✓ (coupling-aware layout tested)
- AND dependencies between contexts are visible as connections ✓

