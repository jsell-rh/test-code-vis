### Advisory: Misleading test names (non-blocking)

`test_pan_drag_right_increases_pivot_x` — name says "increases"; assertion is `< initial_x`
  (decreases). The ASSERTION is correct for the grab model. Name is a relic of the prior
  camera-pan-model implementation (cycles 1–2).

`test_pan_drag_left_decreases_pivot_x` — name says "decreases"; assertion is `> initial_x`
  (increases). Again, the ASSERTION is correct. The name is wrong.

Per guidelines, the comparison is between the derived predicate and the actual assertion
statement. Both align with the grab model derivation. Not blocking. Renaming recommended
for future maintainability.

