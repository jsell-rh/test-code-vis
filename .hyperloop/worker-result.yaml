### Requirement Coverage

**JSON Scene Graph Loading** — COVERED

`main.gd._ready()` is not an empty stub: opens file via FileAccess, parses JSON,
calls `SceneGraphLoader.load_from_dict()` and `build_from_graph()`. The latter
iterates nodes → `_create_volume()` and edges → `_create_edge()`, with positions
set directly from JSON `position.{x,y,z}`.

Tests (`test_scene_graph_loading.gd`): instantiate real Node3D, call
`build_from_graph()`, assert `_anchors` entries exist, MeshInstance3D children
exist, and `anchor.position` matches JSON fixture values exactly. Real node
instantiation and property assertions — not dict.has() checks.

**Containment Rendering** — COVERED

`_create_volume()`: bounded_context uses `TRANSPARENCY_ALPHA`, `albedo_color.a=0.18`,
`CULL_DISABLED`. Module anchors are parented to their context anchor. Context
mesh is larger (sz*1.0 × sz*0.2 × sz) vs module (sz*1.0 × sz*0.6 × sz with smaller sz).

Tests (`test_containment_rendering.gd`): assert `transparency != DISABLED`,
`alpha < 1.0`, module `alpha >= 1.0`, `mod_anchor.get_parent() == ctx_anchor`,
`ctx_mesh.size.x > mod_mesh.size.x`, `cull_mode == CULL_DISABLED`. All are real
Node3D property assertions.

**Dependency Rendering** — COVERED

`_create_edge()`: draws an `ImmediateMesh` (PRIMITIVE_LINES) for the line.
Direction is visually indicated by a `CylinderMesh` with `top_radius=0.0` (a true
cone/arrowhead geometry) placed at `to_pos - dir*(height*0.5)`. This satisfies the
guideline: "a plain line or colour difference alone does not satisfy direction is
visually indicated" — an explicit arrowhead mesh is present.

Tests (`test_dependency_rendering.gd`): assert ImmediateMesh exists, CylinderMesh
with `top_radius==0.0` exists, cone position is within 2 units of target, and
cross-context cone has orange albedo (r>0.8, b<0.3).

**Size Encoding** — COVERED

`sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)`. Mesh width
is directly proportional to the size field (linear mapping).

Tests (`test_size_encoding.gd`): assert `large_mesh.size.x > small_mesh.size.x` and
ratio `9.0/3.0 = 3.0` matches within 0.001 tolerance.

**Camera Controls** — COVERED

`camera_controller.gd`: initial `_theta=0.15 < PI/4` (near top-down), scroll wheel
changes `_distance`, middle-mouse drag changes `_phi` and `_theta`, `look_at(_pivot,
Vector3.UP)` preserves orientation. `set_pivot()` updates pivot and distance for
programmatic framing at startup.

Tests (`test_camera_controls.gd`): 8 tests asserting initial state, scroll zoom,
orbit drag via real InputEventMouseButton/InputEventMouseMotion objects, clamping.

Label readability (`test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`):
asserts `BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` on real
Label3D node.

