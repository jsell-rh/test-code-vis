## THEN-Clause → Test Mapping (independently verified)

| THEN clause (verbatim from spec) | Test function | Predicate verified |
|---|---|---|
| camera pans in the direction of the drag | test_lmb_drag_pans_camera | `cam._pivot != initial_pivot` after LMB drag — ✓ |
| movement direction matches drag direction (not inverted) | test_pan_direction_not_inverted | drag left at phi=PI/2 → pivot.x > 0 (camera moves right = scene moves left = Google Maps) — ✓ |
| scene moves in the same direction as the drag | test_pan_direction_not_inverted | same assertion — ✓ |
| view zooms toward point under cursor | test_zoom_in_shifts_pivot_toward_cursor | cursor at (+10,0,0), zoom in → pivot.x > 0 — ✓ |
| component under cursor stays under cursor during zoom | test_zoom_in_cursor_point_invariant | 0 < pivot.x < world_pt.x after zoom — ✓ |
| view zooms out from point under cursor | test_zoom_out_shifts_pivot_away_from_cursor | cursor at (+10,0,0), zoom out → pivot.x < 0 — ✓ |
| camera orbits around point under cursor at orbit start | test_orbit_uses_right_mouse_button + test_orbit_around_cursor_point | RMB → phi changes; pivot == world_pt — ✓ |
| component remains at visual center during orbit | test_orbit_pivot_is_world_point | pivot.is_equal_approx(world_pt) — ✓ |
| zoom is animated smoothly (interpolated), not instantaneous | test_smooth_zoom_target_differs_from_distance_after_scroll | _target_distance < _distance after scroll — ✓ |
| (_process interpolates) | test_smooth_zoom_process_interpolates_distance | 20 < _distance < 40 after _process(0.1) — ✓ |
| pan movement is smooth and proportional to drag speed | test_pan_proportional_to_drag_speed | 50px drag → larger displacement than 10px drag — ✓ |

### Direction predicate independent derivation — test_pan_direction_not_inverted

Spec reference: "dragging left reveals content to the right, as in Google Maps"
- Google Maps: drag left → map content moves left in viewport → camera/pivot moves RIGHT (+X)
- Implementation: `_target_pivot -= right * delta.x * pan_amount`
  - drag left → delta.x = -50 → `_target_pivot -= (+X) * (-50) * pan_amount` → pivot.x increases
- Assertion: `cam._pivot.x > 0.0` — matches derived expectation ✓

### Smooth pan note

The spec says "smooth and proportional to drag speed." Pan is applied immediately to `_pivot`
(no target/lerp), which is intentional: instant response to cursor IS the smoothness (no lag,
no snapping). The proportionality is the tested invariant. Architecturally correct.

