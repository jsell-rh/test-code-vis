## Untestable THEN-Clauses

### Desktop Platform — runs natively without browser, container, or VM
- **Verbatim THEN**: "it runs natively without browser, container, or VM dependencies"
- **Why untestable**: Runtime environment properties (absence of browser/Docker/VM) cannot
  be asserted from within the application itself during headless CI.
- **Architectural evidence**: `godot/project.godot` declares only Linux/X11 export presets;
  no `Dockerfile`, no HTML5 export, no container orchestration file exists in the repository.

### Frame rate above 30fps
- **Verbatim THEN**: "the frame rate remains above 30fps"
- **Why untestable**: FPS requires an active render pipeline. Godot's headless mode
  (`--headless`) disables the renderer entirely; `Engine.get_frames_per_second()` returns 0.
- **Architectural evidence**: `lod_manager.gd` implements LOD that hides geometry beyond
  camera-distance thresholds, directly reducing draw calls at the scale kartograph requires.
  The LOD system is integrated into `main.gd._update_lod()` called every `_process()` tick.

### No perceptible stutter or pop-in
- **Verbatim THEN**: "there is no perceptible stutter or pop-in"
- **Why untestable**: Perceptual jitter cannot be measured without a render pipeline.
- **Architectural evidence**: Same as 30fps above (LOD system). Additionally,
  `test_kartograph_scale_build_produces_world_positions` verifies that world positions for
  all 60 nodes are precomputed in a single pass before any geometry is created, eliminating
  deferred-transform race conditions that would cause pop-in.

### Prototype can be discarded without loss
- **Verbatim THEN**: "the prototype can be discarded without loss"
- **Why untestable**: "can be discarded" is a team-process requirement, not a code property.
- **Architectural evidence**: The sole interface between extractor and Godot is the JSON
  file (`godot/data/scene_graph.json`). Neither component imports or links the other.

### JSON scene graph is the only artifact worth preserving
- **Verbatim THEN**: "the JSON scene graph format is the only artifact worth preserving"
- **Why untestable**: Preservation intent is a product decision, not a code assertion.
- **Architectural evidence**: The JSON schema is defined in `extractor/schema.py` as pure
  Python dataclasses. It has no Godot-specific bindings; the JSON file can be consumed
  by any renderer.

