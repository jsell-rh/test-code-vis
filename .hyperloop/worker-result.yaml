## Spec Alignment Review — specs/prototype/godot-application.spec.md

Reviewed branch: hyperloop/task-007 (commit 12ac742)
All SHALL/MUST requirements are implemented in code and covered by GDScript tests in `godot/tests/`.

---

### Requirement: JSON Scene Graph Loading — COVERED

**Code:** `godot/scripts/main.gd` → `_load_and_build()` + `_build()`

`_load_and_build()` opens `scene_graph_path` via `FileAccess`, parses JSON, and calls `_build()`.
`_build()` iterates `graph["nodes"]` to create 3D volumes (via `_create_volume()`) and
`graph["edges"]` to create edge lines + arrowheads (via `_create_edge()`). Node positions are
read from `nd["position"]` and applied to each anchor's `.position`.

**Tests:** `godot/tests/test_scene_graph_loading.gd` (4 tests)
- `test_volumes_created_for_each_node` — asserts `_anchors` contains an entry for every node id.
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a MeshInstance3D child.
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D children on the main node per
  edge (ImmediateMesh line + CylinderMesh arrowhead).
- `test_anchor_positions_match_json` — asserts anchor.position equals the JSON "position" field.

---

### Requirement: Containment Rendering — COVERED

**Code:** `godot/scripts/main.gd` → `_create_volume()`

`bounded_context` nodes receive a flat translucent box (`TRANSPARENCY_ALPHA`, alpha 0.18,
`CULL_DISABLED`). Module nodes receive a compact opaque green box (alpha 1.0). Child nodes are
parented to their parent's `Node3D` anchor so they are physically nested inside it. Visual
distinction is achieved through colour, opacity, cull mode, and size difference.

**Tests:** `godot/tests/test_containment_rendering.gd` (5 tests)
- `test_bounded_context_is_translucent` — verifies `transparency != TRANSPARENCY_DISABLED` and
  `albedo_color.a < 1.0` on bounded_context material.
- `test_module_is_opaque` — verifies `albedo_color.a >= 1.0` on module material.
- `test_module_parented_inside_context` — verifies `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — verifies `BoxMesh.size.x(ctx) > BoxMesh.size.x(mod)`.
- `test_bounded_context_cull_disabled` — verifies `cull_mode == CULL_DISABLED` on context material.

