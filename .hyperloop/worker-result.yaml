### Requirement: Smooth Camera Movement (SHALL/MUST)

**Status: COVERED**

Implementation (`_process`):
- Exponential smoothing: `t = 1.0 - pow(0.05, delta * zoom_smooth)`
- `_distance = lerpf(_distance, _target_distance, t)`
- `_pivot = _pivot.lerp(_target_pivot, t)`
- Scroll events only change `_target_distance`/`_target_pivot`; actual values interpolate each frame.
- Pan immediately applies `_pivot = _target_pivot` for responsive-proportional feel.

**Scenario: Smooth zoom**
- THEN the zoom is animated smoothly (interpolated), not instantaneous →
  `test_smooth_zoom_target_differs_from_distance_after_scroll`: after scroll, `_target_distance < _distance` ✓
  `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`, `20.0 < _distance < 40.0` ✓

**Scenario: Smooth pan**
- THEN the pan movement is smooth and proportional to drag speed →
  `test_pan_proportional_to_drag_speed`: 10px drag vs 50px drag →
  asserts `cam_fast._pivot.length() > cam_slow._pivot.length()` ✓

