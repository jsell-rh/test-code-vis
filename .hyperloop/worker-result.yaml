**Implementation:** `godot/project.godot` declares
`config/features=PackedStringArray("4.6")`. No C#/Mono entries present.
`main.gd::_ready()` uses `FileAccess.open()` + `get_as_text()` (Godot 4.x API),
not the deprecated Godot 3 `File.new()` / `read_as_text()`.

**Tests (GDScript, godot/tests/):**

| THEN clause | Test function | File |
|---|---|---|
| THEN opens in Godot 4.6.x | `test_project_godot_declares_46_feature` | test_engine_version.gd:39 |
| THEN 4.6 in config/features | `test_project_godot_config_features_line` | test_engine_version.gd:52 |
| THEN 4.6 (Pattern-2) | `test_project_declares_godot_46` | test_godot_version.gd:20 |
| AND all scripts use GDScript (DirAccess iteration) | `test_scripts_dir_contains_only_gdscript` | test_engine_version.gd:98 |
| AND no C#/Mono | `test_project_does_not_declare_csharp` | test_engine_version.gd:66 |
| AND main.gd is .gd | `test_main_script_is_gdscript` | test_godot_version.gd:32 |
| AND API calls valid (get_as_text returns content) | `test_file_access_get_as_text_returns_non_empty_string` | test_engine_version.gd:81 |
| AND API calls valid (no deprecated File.new) | `test_main_uses_godot4_fileaccess_api` | test_godot_version.gd:45 |

All tests verified to exist and assert correct predicates in the source tree.
