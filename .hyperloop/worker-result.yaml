### Requirement: Python Extractor — COVERED

**Scenario: Running the extractor**

Implementation:
- `extractor/__main__.py`: standalone CLI using `argparse`, callable as `python -m extractor <src_path> [--output out.json]`. Exits 0 on success, 1 on error. Writes valid JSON.
- Imports: `argparse`, `json`, `sys`, `pathlib` (all stdlib) + `extractor.extractor` (intra-package).
- `extractor/extractor.py`, `extractor/schema.py`, `extractor/__init__.py`: all Python, no third-party dependencies.

Tests:
- `extractor/tests/test_cli.py`:
  - `TestCliEntryPoint.test_main_produces_json_output`: calls `main([str(src), "--output", str(output)])`, asserts rc==0, file exists, JSON has nodes/edges/metadata.
  - `TestCliEntryPoint.test_main_returns_1_on_missing_src`: asserts rc==1 for nonexistent path.
  - `TestCliEntryPoint.test_main_returns_1_on_file_src`: asserts rc==1 when src is a file.
  - `TestStdlibOnlyImports.test_extractor_uses_only_stdlib_imports`: iterates all .py files in the extractor package (excluding tests/), parses each with `ast`, asserts every imported module top-level name is in `sys.stdlib_module_names` or is the `extractor` package itself.

All THEN-clauses covered.

