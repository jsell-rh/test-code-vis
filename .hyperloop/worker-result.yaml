### F2 — FAIL [BLOCKING — RACF]: check-no-state-files-committed.sh (6th consecutive cycle)

**Finding:** Commit 032589eb added `.hyperloop/state/intake-2026-04-25.md` to the branch.
The commit message explains the intent: "Also sync .hyperloop/state/intake-2026-04-25.md
from main to eliminate the state-file diff." This approach is incorrect: the check uses
`git log main..HEAD` to detect commits touching state files, regardless of whether the
working tree content is identical to main. Making the file content match main does NOT
remove the commit from branch history.

**Re-attempt compliance failure:** Prior cycle (f4b1de1) prescribed exactly this fix:
  > git filter-branch --index-filter 'git rm --cached --ignore-unmatch .hyperloop/state/*' -- main..HEAD
The implementer instead took the opposite action and ADDED the state file to the branch.

**Fix:** Run filter-branch as prescribed (see F1 for the combined fix sequence). Do NOT
add or sync state files. The check-combined-rewrite-guide.sh output gives the mandatory
combined sequence for fixing F1 and F2 together.

