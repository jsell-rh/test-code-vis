## Requirement Coverage

### Requirement: Conformance Mode (SHALL)
The system MUST allow the human to see whether the as-built system matches the as-specced design.

Implementation: `godot/scripts/understanding_analyzer.gd`
  - `check_alignment(actual_nodes, spec_node_ids)` → returns aligned/divergent/missing classifications
  - `render_alignment(alignment_result, anchors, scene_root)` → adds Label3D annotations ("✓ SPEC ALIGNED", "⚠ MERGED") to the live 3D scene

**Status: COVERED**

#### Scenario: Spec-aligned implementation
- THEN the human can see auth/user_management as separate components
  → `test_aligned_nodes_detected_as_separate`: asserts `aligned.has("auth")` and `aligned.has("user_management")`
- AND correspondence is visually apparent
  → `test_aligned_nodes_have_annotation_in_scene`: instantiates Node3D anchors, calls `render_alignment()`, asserts Label3D count ≥ 1

**Status: COVERED**

#### Scenario: Spec-divergent implementation
- THEN the human can see the divergence
  → `test_divergent_nodes_detected`: asserts `payment_service` is in `missing` or `divergent`
- AND the specific nature of the divergence is clear (merged vs. separate)
  → `test_divergent_nodes_annotated_as_merged`: asserts `divergent.has("payment")` AND Label3D with "MERGED" text

**Status: COVERED**

---

### Requirement: Evaluation Mode (SHALL)
The system MUST allow the human to evaluate the architectural quality of the realized system independent of the spec.

Implementation: `godot/scripts/understanding_analyzer.gd`
  - `analyze_coupling(nodes, edges, threshold)` → returns tightly coupled pairs sorted by coupling_score
  - `render_coupling(coupling_result, anchors, scene_root)` → highlights both nodes in each pair
  - `analyze_criticality(nodes, edges, threshold)` → returns high-in-degree nodes sorted by in_degree
  - `render_criticality(criticality_result, anchors, scene_root)` → highlights and annotates critical nodes with "SPOF Risk"

**Status: COVERED**

#### Scenario: Detecting tight coupling
- THEN the coupling between services is apparent
  → `test_tightly_coupled_pair_detected`: asserts `pairs.size() >= 1` and `coupling_score >= 2`
- AND the human can assess whether the coupling is problematic
  → `test_coupled_nodes_highlighted`: instantiates Node3D+MeshInstance3D for svc_x and svc_y, calls `render_coupling()`, asserts `albedo_color == HIGHLIGHT_COLOR` on both

**Status: COVERED**

#### Scenario: Identifying single point of failure
- THEN the criticality and centrality of that component is apparent
  → `test_central_node_detected_as_critical`: asserts `critical[0].node_id == "hub"` and `in_degree == 3`
- AND the risk it represents is clear
  → `test_critical_node_annotated_with_spof_risk`: instantiates Node3D, calls `render_criticality()`, asserts Label3D with "SPOF" in text

**Status: COVERED**

#### Scenario: Spec faithfully implemented but architecturally poor
- THEN architectural problems are visible even though conformance is perfect
  → `test_coupling_detected_despite_perfect_alignment`: asserts `aligned.size() == 2` (perfect conformance) AND `coupling.pairs.size() >= 1` (coupling problem still detected)

**Status: COVERED**

