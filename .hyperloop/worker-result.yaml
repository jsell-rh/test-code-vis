## Implementation Verification

### godot/scripts/main.gd — NOT a stub
`_ready()` performs real file I/O: `FileAccess.open()` + `file.get_as_text()` + `JSON.new()` +
`json.parse()` + `SceneGraphLoader.load_from_dict()` + `build_from_graph()`. Full pipeline, no
`pass`-only stubs.

`build_from_graph()`: iterates nodes in two passes (parents first, children second) to create
Node3D anchors, BoxMesh volumes, and Label3D labels; then iterates edges to create
ImmediateMesh line + CylinderMesh arrowhead pairs.

`_create_volume()`: size derived from JSON `nd["size"]`; bounded context = translucent
(TRANSPARENCY_ALPHA, alpha=0.18, CULL_DISABLED); module = opaque (alpha=1.0); Label3D has
`billboard=BILLBOARD_ENABLED`, `pixel_size=0.012`, `no_depth_test=true`.

`_create_edge()`: ImmediateMesh PRIMITIVE_LINES line between world-space endpoints +
CylinderMesh arrowhead (`top_radius=0.0`, pointed tip) at target end, oriented along
edge direction. Cross-context edges: orange Color(1.0, 0.50, 0.10); internal: grey.

### godot/scripts/camera_controller.gd — Full implementation
Spherical-coordinate orbit: `_theta=0.15` (≈8.6° from top-down), `_phi=0.0`, `_distance=40.0`.
Scroll wheel zooms (`_distance` clamped to [2, 500]). Middle-mouse drag orbits (`_phi`, `_theta`).
Right-mouse drag pans pivot. `look_at(_pivot, Vector3.UP)` with theta clamped to [0.01, PI-0.01]
— camera never flips, up stays up.

