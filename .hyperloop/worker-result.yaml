| THEN/AND clause | Implementation | Test |
|---|---|---|
| The system generates a view focused on auth-related components | `build_prompt()` in `llm_view_generator.gd` embeds question + all node IDs; LLM uses VALID_OPS to produce a show/highlight spec | `test_build_prompt_contains_node_id_auth_service` (test_llm_view_generator.gd) |
| Irrelevant components are hidden or de-emphasized | `_apply_hide()` in `scene_interpreter.gd` sets `anchor.visible = false` | `test_hide_op_sets_visible_false` (test_scene_interpreter.gd) |
| The relevant components are arranged to answer the question | `_apply_arrange()` in `scene_interpreter.gd` sets `anchor.position = Vector3(x, y, z)` | `test_arrange_op_sets_all_three_axes` (test_scene_interpreter.gd) |

#### Scenario: Impact question

| THEN/AND clause | Implementation | Test |
|---|---|---|
| The system generates a view showing the user database and all its dependents | `_apply_show()` in `scene_interpreter.gd` sets `anchor.visible = true` | `test_show_op_sets_visible_true` (test_scene_interpreter.gd) |
| The dependency relationships are spatially clear | `_apply_connect()` draws `ImmediateMesh` line + `CylinderMesh` arrowhead between anchors | `test_connect_op_adds_line_geometry` + `test_connect_op_adds_arrowhead` (test_scene_interpreter.gd) |

