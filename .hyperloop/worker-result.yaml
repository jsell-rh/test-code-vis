### Spec Coverage (prototype-scope.spec.md)

**Scenario: Visual representation (Abstract Visual Language)**
- THEN it appears as a labeled geometric volume → `_create_volume()` builds `BoxMesh` +
  `Label3D` per node ✓
- AND its size reflects its relative complexity → `sz = float(nd["size"])`;
  `BoxMesh.size = Vector3(sz, sz*0.6, sz)` for modules, `Vector3(sz, sz*0.2, sz)` for
  contexts ✓
- AND its position reflects its coupling relationships → positions read from
  pre-computed JSON layout; no Godot-side recomputation ✓
- AND containment is shown by nesting → child anchors parented to parent anchors via
  `parent_anchor.add_child(anchor)` ✓

Tests: `test_node_renderer.gd` (4), `test_containment_rendering.gd` (5),
`test_size_encoding.gd` (2)

**Scenario: Identifying a module (Readable Labels)**
- THEN the module's name is visible as a text label → `label.text = nd["name"]` ✓
- AND the label remains readable at the current zoom level →
  `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED`, `label.pixel_size = 0.012`,
  `label.no_depth_test = true` ✓

Tests: `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`

**Scenario: Cross-context dependency (Dependency Visualization)**
- THEN a line or connection is drawn between them → `ImmediateMesh` with
  `PRIMITIVE_LINES` in `_create_edge()` ✓
- AND the direction of the dependency is discernible → `CylinderMesh` cone
  (`top_radius=0.0`, pointed tip) placed at target end; orange for cross-context,
  grey for internal ✓

Tests: `test_dependency_rendering.gd` (4): line mesh created, cone created, cone
near target, cross-context cone color asserted on instantiated `MeshInstance3D`

**Scenario: Moving through the space (Navigation)**
- THEN they can pan, zoom, and rotate the view → `camera_controller.gd`:
  scroll-wheel zoom (`WHEEL_UP/DOWN`), middle-mouse orbit (changes `_theta`/`_phi`),
  right-mouse pan (moves `_pivot`) ✓
- AND they can smoothly transition between overview and detail levels → continuous
  spherical-coordinate orbit + proportional zoom; `_frame_camera()` / `set_pivot()`
  initialise pivot and distance from graph bounding box ✓

Tests: `test_camera_controls.gd` (8): initial top-down angle, positive distance,
scroll zoom in/out, orbit horizontal/vertical drag, set_pivot, zoom clamping

**Scenario: Viewing kartograph from above (Top-Down Architectural View)**
- THEN all bounded contexts are visible as distinct volumes → translucent
  `TRANSPARENCY_ALPHA` flat boxes with `CULL_DISABLED` ✓
- AND dependencies between contexts are visible as connections → `_create_edge()`
  runs for every edge in the graph ✓

Initial `_theta = 0.15 rad` ≈ 8.6° from straight above satisfies "top-down view"
(threshold: < 45° = PI/4).

**Scenario: Zooming into IAM (Zoom to Detail)**
- THEN the internal layers become visible → module-type anchors nested inside
  bounded-context anchors; zoom reveals their interior ✓
- AND internal dependencies are shown → `_create_edge()` processes all edge types ✓
- AND the user can see relative sizes of internal modules → size encoding produces
  proportional `BoxMesh.size.x` values ✓

