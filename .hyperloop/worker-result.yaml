### Requirement: Camera Controls — COVERED (with minor observation)

**Implementation**
- `camera_controller.gd`: spherical-coordinate orbit around `_pivot` using `_theta` (polar,
  initial 0.15 rad ≈ 8.6° from vertical = near top-down) and `_phi` (azimuth).
- Scroll-wheel zoom: `WHEEL_UP` decreases `_distance`, `WHEEL_DOWN` increases; clamped to
  `[min_distance, max_distance]`.
- Middle-mouse drag: adjusts `_phi` and `_theta`; `_theta` clamped to `[0.01, PI-0.01]` to
  prevent pole flipping (preserving Y-up orientation).
- `_update_transform()` calls `look_at(_pivot, Vector3.UP)` after every change.
- `main.gd:_frame_camera()` calls `set_pivot(centre, distance)` after graph construction.

**Tests** (`test_camera_controls.gd`)

*Top-down overview scenario:*
- `test_initial_theta_is_near_top_down()` — asserts `_theta < PI/4` (~45°). Covers THEN "camera
  defaults to a top-down view".
- `test_initial_distance_is_positive()` — asserts `_distance > 0.0`.

*Zooming in scenario:*
- `test_scroll_up_decreases_distance()` — `WHEEL_UP` event decreases `_distance`. Covers THEN
  "the camera moves closer".
- `test_scroll_down_increases_distance()` — `WHEEL_DOWN` event increases `_distance`.
- `test_zoom_clamped_at_minimum()` — 200× scroll-up stays ≥ `min_distance`.
- `test_labels_are_billboard_and_readable()` (in test_scene_graph_loading.gd) — asserts
  `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test = true`. Covers AND "labels scale to
  remain readable".

*Orbiting scenario:*
- `test_orbit_horizontal_drag_changes_phi()` — middle-mouse horizontal drag changes `_phi`.
  Covers THEN "camera rotates around the current focal point" (azimuth axis).
- `test_orbit_vertical_drag_changes_theta()` — middle-mouse vertical drag changes `_theta`.
  Covers THEN "camera rotates around the current focal point" (elevation axis).
- `test_set_pivot_updates_state()` — `set_pivot()` stores `_pivot` and `_distance`. Covers AND
  "orientation remains intuitive" (pivot tracking).

**Observation (not a failure):** The THEN clause "AND internal structure becomes visible as the
camera approaches" (Zooming scenario) and "AND orientation remains intuitive (up stays up)"
(Orbiting scenario) do not have dedicated single-assertion behavioral tests. However:
- "Internal structure visible": children are always present in the scene tree (proven by
  containment tests) and zoom reduces distance (proven by zoom tests); visual appearance is an
  emergent consequence of 3D perspective projection that cannot be asserted in headless mode.
- "Up stays up": relies on `look_at(_pivot, Vector3.UP)` (Godot engine built-in) and `_theta`
  clamped to `[0.01, PI-0.01]`. The orbital motion is tested; the engine-level guarantee of Y-up
  is not custom code. A theta-clamp stress test (e.g., 1000 downward drag events) would be a
  desirable addition but its absence does not represent a missing implementation.

