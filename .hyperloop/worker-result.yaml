## Requirement Status

### Requirement: Pan with Left Mouse Button ‚Äî COVERED
- Implementation: `_handle_mouse_button` (camera_controller.gd:83‚Äì101) handles
  `MOUSE_BUTTON_LEFT`, sets `_is_panning = true`. Motion handler pans when `_is_panning`.
- Scenarios:
  - "Panning the view": `test_lmb_drag_pans_camera` ‚Äî LMB press + motion ‚Üí pivot moves ‚úì
  - AND direction not inverted: `test_pan_direction_not_inverted` ‚úì

### Requirement: Non-Inverted Movement ‚Äî COVERED
- Implementation: `_pivot -= right * delta.x * PAN_SPEED` (line 128). Drag left
  (delta.x < 0) ‚Üí `-(+X)*(negative)*speed` ‚Üí pivot moves in +X ‚Üí Google Maps style.
- Scenario: `test_pan_direction_not_inverted` ‚Äî drag-left (delta.x=-100) ‚Üí pivot.x > 0 ‚úì

### Requirement: Zoom Toward Mouse Cursor ‚Äî COVERED
- Implementation: `_zoom_toward_cursor` ‚Üí `_get_world_point_for_mouse` ‚Üí `_zoom_toward_point`
  (lines 137‚Äì151). Ratio `1 - new_dist/target_dist` applied via lerp to pivot.
- Scenario "Zooming into a specific component":
  - `test_zoom_in_shifts_pivot_toward_cursor` ‚Äî target_distance decreases, pivot moves toward cursor ‚úì
  - `test_zoom_in_cursor_point_invariant` ‚Äî pivot shifts by correct zoom ratio ‚úì
- Scenario "Zooming out":
  - `test_zoom_out_shifts_pivot_away_from_cursor` ‚Äî target_distance increases, pivot adjusts ‚úì

### Requirement: Orbit Around Mouse Point ‚Äî COVERED
- Implementation: RMB press calls `_set_orbit_pivot_to_cursor` ‚Üí `_remap_orbit_pivot`
  (lines 166‚Äì181). Sets `_pivot = world_pt`, recomputes spherical coords from
  camera-offset so camera does not jump. Orbit drag updates phi/theta around new pivot.
- Scenario "Orbiting around a component":
  - `test_orbit_around_cursor_point` ‚Äî `_pivot == world_pt` after remap ‚úì
  - `test_orbit_uses_right_mouse_button` ‚Äî RMB drag changes phi/theta ‚úì
  - `test_orbit_pivot_is_world_point` ‚Äî pivot equals world point (= visual center) ‚úì

### Requirement: Smooth Camera Movement ‚Äî COVERED
- Implementation: `_process(delta)` lerps `_distance` ‚Üí `_target_distance` and
  `_pivot` ‚Üí `_target_pivot` at `SMOOTH_SPEED=12.0` (lines 47‚Äì56). Pan is direct
  (proportional per event), zoom goes through target ‚Üí smooth.
- Scenario "Smooth zoom":
  - `test_smooth_zoom_target_differs_from_distance_after_scroll` ‚Äî `_distance` unchanged
    immediately after scroll event (deferred to _process) ‚úì
  - `test_smooth_zoom_process_interpolates_distance` ‚Äî `20 < _distance < 40` after
    `_process(0.1)` (interpolated, not snapped) ‚úì
- Scenario "Smooth pan":
  - `test_pan_proportional_to_drag_speed` ‚Äî 200px drag produces 2√ó displacement of
    100px drag (ratio verified to 0.05 tolerance) ‚úì

