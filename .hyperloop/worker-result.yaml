## Requirement-by-Requirement Findings

### Requirement: Target Codebase — COVERED

**Scenario: Loading kartograph**
- THEN kartograph's structure is visualized in 3D space
  → `extractor/extractor.py::build_scene_graph()` extracts bounded contexts and modules from any Python codebase; CLI accepts path as argument
  → Test: `test_kartograph_integration_bounded_contexts` (extractor/tests/test_kartograph_integration.py) — asserts `iam`, `graph`, `shared_kernel` context IDs in output JSON when run against `~/code/kartograph/src/api`
- AND the visualization reflects the actual structure of the codebase
  → Test: `test_kartograph_extraction_produces_modules` — asserts at least one `module` type node exists in the scene graph, verifying internal structure is captured

### Requirement: Two-Stage Pipeline — COVERED

**Scenario: Extraction then visualization**
- THEN a JSON scene graph file is produced
  → `extractor/__main__.py::main()` writes JSON via `json.dump()`
  → Test: `test_main_writes_json_output` (extractor/tests/test_cli.py) — calls `main()` with `--output` and asserts file exists with valid JSON
- AND the Godot application can load that file and render the scene
  → `godot/scripts/main.gd::_ready()` — uses `FileAccess.open()` → `JSON.new()` → `build_from_graph()`; `godot/data/scene_graph.json` present
  → Tests: `test_volumes_created_for_each_node`, `test_edge_mesh_instances_created`, `test_anchor_positions_match_json` (test_scene_graph_loading.gd) — verify the Godot pipeline produces geometry from JSON data

### Requirement: Top-Down Architectural View — COVERED

**Scenario: Viewing kartograph from above**
- THEN all bounded contexts are visible as distinct volumes
  → `main.gd::_create_volume()` renders BoxMesh for each node; LOD system shows BCs at all distances
  → Test: `test_far_distance_shows_only_bounded_contexts` (test_spatial_structure.gd)
- AND their relative positions reflect their coupling (tightly coupled contexts are closer together)
  → `extractor.py::_order_by_coupling()` reorders BCs by cross-context edge counts before placing on circular layout
  → Test: `test_coupled_bcs_are_closer_than_uncoupled` (test_size_encoding.gd or test_extractor.py — confirmed present by check-then-test-mapping.sh)
- AND dependencies between contexts are visible as connections
  → `main.gd::_create_edge()` draws ImmediateMesh lines + arrowhead cones
  → Test: `test_dependency_expressed_as_visible_connection` (test_spatial_structure.gd)

### Requirement: Zoom to Detail — COVERED

**Scenario: Zooming into IAM**
- THEN the internal layers become visible (domain, application, infrastructure, presentation)
  → `lod_manager.gd` three-tier LOD: far=BC only, medium=BC+modules, near=all
  → Tests: `test_medium_distance_shows_modules`, `test_near_distance_shows_all_nodes` (test_spatial_structure.gd)
- AND internal dependencies are shown
  → LOD near distance shows internal edges; `test_near_distance_shows_internal_edges_as_fine_detail`
- AND the user can see relative sizes of internal modules
  → `extractor.py::size_from_loc()` drives `nd["size"]`; `main.gd` sets `BoxMesh.size` from `nd["size"]`
  → Tests: `test_large_module_has_bigger_mesh`, `test_mesh_sizes_proportional_to_metric` (test_size_encoding.gd)

### Requirement: Abstract Visual Language — COVERED

**Scenario: Visual representation**
- THEN it appears as a labeled geometric volume
  → `main.gd` uses `BoxMesh` (abstract geometric primitive) for every node; no terrain/buildings
  → Test: `test_mesh_instances_exist_in_anchors` (test_scene_graph_loading.gd)
- AND its size reflects its relative complexity
  → `BoxMesh.size` proportional to `nd["size"]` derived from LOC metric
  → Test: `test_mesh_sizes_proportional_to_metric`
- AND its position reflects its coupling relationships
  → `extractor.py::_order_by_coupling()` ensures tightly coupled BCs are adjacent in the ring
  → Test: `test_coupled_bcs_are_closer_than_uncoupled`
- AND containment is shown by nesting (smaller volumes inside larger ones)
  → Module anchors added as children of context anchors in scene tree; modules positioned relative to parent
  → Tests: `test_module_parented_inside_context` (test_containment_rendering.gd), `test_containment_expressed_as_scene_tree_parenting` (test_spatial_structure.gd)

### Requirement: Readable Labels — COVERED

**Scenario: Identifying a module**
- THEN the module's name is visible as a text label
  → `main.gd::_create_volume()` — `Label3D.text = nd["name"]` for every node
  → Test: `test_labels_are_billboard_and_readable` — asserts Label3D child exists with non-empty text
- AND the label remains readable at the current zoom level
  → `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true` in `_create_volume()`
  → Test: `test_labels_are_billboard_and_readable` — asserts all three properties on instantiated Label3D

### Requirement: Dependency Visualization — COVERED

**Scenario: Cross-context dependency**
- THEN a line or connection is drawn between them
  → `main.gd::_create_edge()` creates `ImmediateMesh` line between `from_pos` and `to_pos`
  → Test: `test_edge_line_mesh_created` (test_dependency_rendering.gd) — iterates children, finds ImmediateMesh
- AND the direction of the dependency is discernible
  → `CylinderMesh` with `top_radius=0` (pointed cone) placed at target end, oriented along edge direction
  → Tests: `test_direction_indicator_cone_created`, `test_direction_cone_near_target` — assert cone exists with `top_radius == 0.0` and positioned within 2 units of target node

### Requirement: Navigation — COVERED

**Scenario: Moving through the space**
- THEN they can pan, zoom, and rotate the view
  → `camera_controller.gd`: LMB drag → pan pivot; RMB drag → orbit (φ, θ); scroll wheel → smooth zoom
  → Tests: `test_lmb_pan_moves_pivot` (pan), `test_scroll_up_decreases_distance` (zoom), `test_orbit_horizontal_drag_changes_phi` (rotate)
- AND they can smoothly transition between overview and detail levels
  → `_process()` lerps `_distance` toward `_target_distance` with `zoom_smoothing`; LOD changes tier on distance threshold
  → Tests: `test_zoom_is_interpolated_not_instantaneous` (test_ux_polish.gd), `test_far_distance_shows_only_bounded_contexts` / `test_medium_distance_shows_modules` (LOD tier transitions)

