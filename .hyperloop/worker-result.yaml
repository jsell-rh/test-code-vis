## Implementation Summary

Task-029 implements **spec file structure extraction** as required by
`specs/core/system-purpose.spec.md` Requirement: Spec-Driven Context.

The system now discovers spec files (`.md` files under a `specs/` directory
adjacent to the source tree) and includes them as `"spec"` type nodes in the
JSON scene graph, alongside code nodes (`"bounded_context"`, `"module"`).
This makes the intended design visible alongside the realized design in the
navigable 3D scene.

### Files Changed

- **`extractor/extractor.py`**: Added `discover_spec_nodes()` to find spec
  files and build spec-type nodes; added `_position_spec_nodes()` to place
  them beyond the code circle; updated `compute_layout()` and
  `build_scene_graph()` to include spec nodes.
- **`extractor/tests/test_extractor.py`**: Added `TestSpecNodeDiscovery` with
  14 new tests covering all new functions and their integration with
  `build_scene_graph()`.
- **`godot/scripts/main.gd`**: Added `is_spec` branch to `_create_volume()`
  rendering spec nodes as gold translucent slabs (distinct from blue
  bounded_context and green module nodes). Also caches `_graph` in
  `build_from_graph()` so overlay functions work in tests.
- **`godot/scripts/lod_manager.gd`**: Updated `_apply_far()` and
  `_apply_medium()` to show spec nodes at all LOD distances (like
  bounded_context, since specs are top-level intended-design elements).
- **`godot/tests/test_system_purpose.gd`**: Added 6 new tests covering
  Scenario 2 (Spec-Driven Context) and Scenario 3 (Architecture Feedback Loop).

