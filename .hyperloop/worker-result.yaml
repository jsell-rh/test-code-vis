### Requirement: JSON Scene Graph Loading — COVERED

`main.gd:_ready()` is NOT a stub — it opens `res://data/scene_graph.json` via
`FileAccess.open()`, parses it with `JSON.new().parse()`, and calls `build_from_graph()`.

`build_from_graph()` iterates `graph.nodes` → `_create_volume()` (produces a `Node3D`
anchor containing a `MeshInstance3D` with `BoxMesh` and a `Label3D`).
`build_from_graph()` iterates `graph.edges` → `_create_edge()` (produces an
`ImmediateMesh` line + `CylinderMesh` arrowhead cone).

Anchor positions set directly from JSON `position.x/y/z` fields.

Tests (instantiate real Node3D, assert .position.x/y/z values):
  test_volumes_created_for_each_node     — _anchors has entry per node id
  test_mesh_instances_exist_in_anchors   — each anchor contains MeshInstance3D
  test_edge_mesh_instances_created       — ≥2 MeshInstance3D children for an edge
  test_anchor_positions_match_json       — asserts ctx_anchor.position == (0,0,0),
                                           mod_anchor.position == (2,0,2)

