### Test Infrastructure
- All 14 test functions in `godot/tests/test_understanding_modes.gd` use the
  `_check()/_test_failed` pattern (Pattern 1 in run_tests.gd).
- Each test instantiates real `Node3D`, `MeshInstance3D`, and `Label3D` objects, applies
  the analyzer → spec → SceneInterpreter pipeline, and asserts runtime property values
  (material albedo_color, label text content, Label3D billboard mode, pixel_size). This
  satisfies the GDScript behavioral test requirement.
- `run_tests.gd` registers the suite at line 54:
  `_run_suite(preload("res://tests/test_understanding_modes.gd").new())`
- `SceneInterpreter` (scene_interpreter.gd) exposes `HIGHLIGHT_COLOR` and `apply_spec()` as
  required by the tests. ✓

### Additional: Label3D legibility test
- `test_annotation_label3d_has_billboard_and_pixel_size()` verifies that all annotation
  Label3D nodes produced through the analyzer pipeline have `billboard == BILLBOARD_ENABLED`
  and `pixel_size > 0.0`. This covers the project guideline on 3D legibility.

