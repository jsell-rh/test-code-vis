### Requirement: Abstract Visual Language — COVERED

**Implementation:** `main.gd::_create_volume()`:
- All structural elements use `BoxMesh` (geometric primitive)
- No metaphorical representations, buildings, terrain, or decoration
- `sz = float(nd["size"])` drives `BoxMesh.size` proportional to complexity
- Containment: module anchors are `add_child`-ed to their parent context anchor

**Tests:**
- `test_containment_rendering.gd::test_bounded_context_is_translucent` asserts `BoxMesh` + alpha material ✓
- `test_containment_rendering.gd::test_module_parented_inside_context` asserts nesting ✓
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` asserts `size.x` ratio matches
  input size ratio within 0.001 tolerance ✓
- `test_node_renderer.gd::test_node_rendered_at_json_position` asserts position from JSON ✓

**Scenario: Visual representation — COVERED**
- THEN it appears as a labeled geometric volume → `BoxMesh` + `Label3D` ✓
- AND its size reflects relative complexity → size encoding tested ✓
- AND its position reflects coupling → coupling-aware layout tested ✓
- AND containment shown by nesting → module parented inside context tested ✓

