## Untestable THEN-Clauses (PASS-WITH-NOTE)

**"positions reflect coupling"** — Perceptual proximity is a spatial/visual judgment requiring human perception. Headless mode cannot assert perceived closeness. `_order_by_coupling()` in the extractor ranks contexts by import count; `test_distinct_contexts_occupy_distinct_regions` asserts distinct positions exist.

**"smooth transitions (frame rate)"** — FPS measurement requires a live render pipeline. The LOD system (`lod_manager.gd`) toggles visibility by camera distance; `test_zoom_is_interpolated_not_instantaneous` confirms interpolation logic is non-instantaneous.

