## Entry-Point Stub Check

`main.gd` `_ready()` is NOT a stub. It:
1. Calls `FileAccess.open()` + `get_as_text()` to load the JSON file
2. Calls `JSON.new().parse()` to parse it
3. Calls `SceneGraphLoader.load_from_dict()` to interpret the structure
4. Calls `build_from_graph()` to generate 3D scene nodes

The full data-producer → consumer pipeline is wired end-to-end.

