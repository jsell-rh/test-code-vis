## THEN-Clause → Test Mapping

### Requirement: Flow is On-Demand

| THEN-clause | Test function | Assertion line |
|---|---|---|
| overlay is NOT active by default | `test_flow_not_active_by_default` | `return not overlay.is_path_active()` (line 119) |

### Scenario: Requesting a flow path

| THEN-clause | Test function | Assertion line |
|---|---|---|
| the relevant flow path lights up through the structure | `test_path_mid_node_lit_up` | asserts mid-path node albedo ≥ 0.9 on each channel (line 135-136) |
| irrelevant structural elements are de-emphasized | `test_offpath_nodes_deemphasized` | asserts off-path node albedo ≤ 0.4 and alpha ≤ 0.4 (line 181) |
| irrelevant structural elements are de-emphasized (transparency mode) | `test_offpath_node_transparency_mode` | asserts `mat.transparency == BaseMaterial3D.TRANSPARENCY_ALPHA` (line 194) |
| the flow path is traceable from entry point to terminus | `test_entry_node_green` | asserts entry `col.g > 0.8 and col.r < 0.5 and col.b < 0.5` (line 151) |
| the flow path is traceable from entry point to terminus | `test_terminus_node_red` | asserts terminus `col.r > 0.8 and col.g < 0.5 and col.b < 0.5` (line 166) |

### Scenario: Flow overlaid on structure

| THEN-clause | Test function | Assertion line |
|---|---|---|
| the flow is rendered as a path through the structural space | `test_path_edges_visible` | asserts `e1.visible and e2.visible` (line 233) |
| the flow is rendered as a path through the structural space (colour) | `test_path_edges_cyan` | asserts path edge `col.r <= 0.1 and col.g >= 0.8 and col.b >= 0.9` (line 248) |
| the structural context remains visible (not replaced) | `test_offpath_nodes_still_in_scene` | asserts `other.get_parent() != null and other.visible` (line 207) |
| the human can follow the path spatially through the system | `test_positions_unchanged_when_path_shown` | asserts node `.position` unchanged after `show_path()` (lines 221-222) |

### Scenario: Identifying a bottleneck

| THEN-clause | Test function | Assertion line |
|---|---|---|
| high-traffic paths are visually prominent (traffic ≥ 500) | `test_high_traffic_edge_orange` | asserts `col.r >= 0.9 and col.g <= 0.6 and col.b <= 0.1` (line 317) |
| high-traffic paths are visually prominent (traffic 100–499) | `test_medium_traffic_edge_yellow` | asserts `col.r >= 0.9 and col.g >= 0.7 and col.b <= 0.1` (line 332) |
| bottleneck points (where flow constricts) are identifiable | `test_bottleneck_node_has_overlay` | asserts BottleneckOverlay child exists on anchor (lines 341-344) |
| bottleneck points identifiable (visual red colour) | `test_bottleneck_overlay_red` | asserts `col.r >= 0.9 and col.g <= 0.1 and col.b <= 0.1` (line 362) |

