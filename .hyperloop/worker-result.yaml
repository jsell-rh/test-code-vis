### Requirement: Fixed Visual Primitive Set (SHALL)

The set of visual primitives available in view specs MUST be fixed and finite.

**Scenario: LLM uses existing primitives** — COVERED

| THEN-clause | Code | Test |
|---|---|---|
| composes from existing set of primitives (show, hide, highlight, arrange, annotate, connect) | `VALID_OPS = ["show","hide","highlight","arrange","annotate","connect"]` constant; `build_prompt()` lists all 6; `_make_spec()` enforces the list | `test_build_prompt_contains_show_primitive`, `_hide_`, `_highlight_`, `_arrange_`, `_annotate_`, `_connect_` (one test per primitive) |
| no new rendering logic is generated at runtime | `_make_spec()` drops any op not in `VALID_OPS`; `SceneInterpreter.apply()` match block is exhaustive over the same 6 ops | `test_parse_response_filters_unknown_ops`, `test_parse_response_with_all_unknown_ops_returns_empty_operations`, `test_unknown_op_is_ignored` |

