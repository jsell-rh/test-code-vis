### Requirement 5: Camera Controls — COVERED

**Implementation (camera_controller.gd):**
- Top-down default: `_theta = 0.15` rad (≈8.6° from directly above)
- Zoom: WHEEL_UP decreases `_distance`; WHEEL_DOWN increases; clamped to [min, max]
- Orbit: middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar)
- `look_at(_pivot, Vector3.UP)` — orientation always correct

**Tests (test_camera_controls.gd — 8 tests, all PASS):**
- `test_initial_theta_is_near_top_down` — _theta < PI/4
- `test_initial_distance_is_positive` — _distance > 0
- `test_scroll_up_decreases_distance` — synthetic WHEEL_UP decreases _distance
- `test_scroll_down_increases_distance` — synthetic WHEEL_DOWN increases _distance
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse + motion changes _phi
- `test_orbit_vertical_drag_changes_theta` — middle-mouse + motion changes _theta
- `test_set_pivot_updates_state` — set_pivot() updates _pivot and _distance
- `test_zoom_clamped_at_minimum` — 200 scroll-up events, _distance >= min_distance

