## Spec Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

**Spec**: The application MUST load a JSON scene graph file produced by the Python
extractor and generate the 3D scene from it.

**Scenario**: Loading kartograph's scene graph

**Implementation**: `godot/scripts/main.gd`
- `_ready()` guards with `FileAccess.file_exists()`, opens via
  `FileAccess.open(scene_graph_path, FileAccess.READ)`, reads with `get_as_text()`,
  parses with `JSON.new()` + `json.parse()`, delegates to
  `SceneGraphLoader.load_from_dict(json.data)`, calls `build_from_graph(graph)`.
- `build_from_graph()`: pass 1 creates bounded-context anchors (parent==null) at JSON
  positions; pass 2 creates module anchors parented inside their BC; pass 3 creates
  edges via `_create_edge()`.
- `_compute_world_positions()` pre-computes world-space centres from JSON layout data
  before edge geometry is built.

**THEN clause verification:**
- "reads the JSON file" → `FileAccess.open()` + `get_as_text()` in `_ready()` (lines 33–44)
- "generates 3D volumes for each node" → `_create_volume(nd, parent)` called for each node in passes 1 & 2 (lines 66–76)
- "generates connections for each edge" → `_create_edge(ed)` for each edge (line 80)
- "positions elements according to the layout data in the JSON" → `anchor.position = Vector3(p["x"], p["y"], p["z"])` (line 127)

**Tests**: `godot/tests/test_scene_graph_loading.gd` (5 tests)
- `test_volumes_created_for_each_node` — asserts Node3D anchors in `_anchors` dict
- `test_mesh_instances_exist_in_anchors` — asserts each anchor contains a MeshInstance3D
- `test_edge_mesh_instances_created` — asserts ImmediateMesh line at scene root
- `test_anchor_positions_match_json` — asserts `ctx1.position ≈ (0,0,0)`, `mod1.position ≈ (2,0,2)`
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test=true`

FileAccess path additionally tested in `test_engine_version.gd`:
- `test_fileaccess_open_returns_non_null` — exercises `FileAccess.open()` + `get_as_text()`

Status: **COVERED** ✓

