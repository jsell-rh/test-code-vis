## Implementation Summary

**File**: `godot/scripts/understanding_analyzer.gd`

### Conformance Mode (alignment check)
- `check_alignment(actual_nodes, spec_node_ids)` → classifies each spec component as aligned/divergent/missing
- `render_alignment(alignment_result, anchors, scene_root)` → adds Label3D "✓ SPEC ALIGNED" (aligned) or "⚠ MERGED" + highlight (divergent)

### Evaluation Mode (quality analysis)
- `analyze_coupling(nodes, edges, threshold)` → detects tightly coupled node pairs by bidirectional edge count
- `render_coupling(coupling_result, anchors, scene_root)` → highlights both nodes in each pair, annotates with coupling score
- `analyze_criticality(nodes, edges, threshold)` → detects high-in-degree nodes (SPOF risk) by incoming edge count
- `render_criticality(criticality_result, anchors, scene_root)` → highlights critical nodes, annotates "⚠ SPOF Risk (in-degree: N)"

### Simulation Mode (impact analysis)
- `simulate_split(nodes, edges, node_id)` → returns direct dependents and new interface descriptions
- `render_split_impact(split_result, split_node_id, anchors, scene_root)` → highlights split subject ("◈ SPLITTING") and dependents ("↯ Affected by split")
- `simulate_failure(nodes, edges, node_id)` → BFS transitive cascade of all affected nodes
- `render_failure_cascade(failure_result, failed_node_id, anchors, scene_root)` → annotates failed node ("✕ FAILED"), highlights all cascade members ("⚡ Cascading failure")
