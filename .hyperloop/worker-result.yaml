### F3a -- RACF (cycles 5-8 -> cycle 9, blocking): absolute coordinates in layout.py

check-relative-position-tests.sh [EXIT 1 FAIL]

layout.py lines 92-93 accumulate parent world coordinates into child position:
  pos[child["id"]] = [
      parent_pos[0] + math.cos(angle) * offset_r,   # ABSOLUTE -- adds parent x
      parent_pos[1] + math.sin(angle) * offset_r,   # ABSOLUTE -- adds parent z
  ]

The spec requires module positions to be LOCAL OFFSETS relative to parent.
Although layout.py is dead code (F1), check-relative-position-tests.sh scans all
Python files regardless, and the pattern still triggers FAIL.

Note: extractor.py's compute_layout correctly stores local offsets (lines 229-235 store
_circular_positions return values without adding parent world position).

Fix: remove parent_pos from child position:
  pos[child["id"]] = [
      math.cos(angle) * offset_r,
      math.sin(angle) * offset_r,
  ]

