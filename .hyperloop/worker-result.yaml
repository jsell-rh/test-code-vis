## Requirement-by-Requirement Findings

### Requirement: Pan with Left Mouse Button (MUST)

**Status: COVERED**

- **Implementation:** `camera_controller.gd` `_handle_button()` (line 101) sets
  `_panning = true` on `MOUSE_BUTTON_LEFT`; `_handle_motion()` (lines 141–158)
  translates drag delta into a non-inverted pivot shift using `transform.basis.x`
  and a flattened backward vector.
- **Scenario — Panning the view:**
  - `test_lmb_drag_pans_camera`: LMB press + 50px right motion → `cam._pivot != initial_pivot` ✓
  - `test_pan_direction_not_inverted`: At phi=PI/2, right drag → `cam._pivot.x > 0.0` ✓

### Requirement: Non-Inverted Movement (MUST)

**Status: COVERED**

- **Implementation:** `_target_pivot += right * delta.x * pan_amount` and
  `_target_pivot -= backward * delta.y * pan_amount` — drag right moves pivot
  right; drag up (negative delta.y) moves pivot forward. Non-inverted.
- **Scenario — Drag direction matches view movement:**
  - `test_pan_direction_not_inverted`: right drag (delta.x=+50) → `cam._pivot.x > 0.0`
    (Google Maps–style: same direction as drag) ✓

### Requirement: Zoom Toward Mouse Cursor (MUST)

**Status: COVERED**

- **Implementation:** `_zoom_toward_point()` (lines 168–176) computes
  `zoom_ratio = _target_distance / old_dist` then sets
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`,
  keeping the cursor world-point stationary relative to the pivot.
- **Scenario — Zooming into a specific component:**
  - `test_zoom_in_shifts_pivot_toward_cursor`: cursor at x=10, zoom in → `_target_pivot.x > 0` ✓
  - `test_zoom_in_cursor_point_invariant`: cursor at x=20, zoom in → `0 < _target_pivot.x < 20` ✓
- **Scenario — Zooming out:**
  - `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at x=10, zoom out → `_target_pivot.x < 0` ✓

### Requirement: Orbit Around Mouse Point (MUST)

**Status: COVERED**

- **Implementation:** `begin_orbit_at_world_point()` (lines 73–85) sets
  `_pivot = world_pt`, recomputes `_distance`, `_theta`, `_phi` from current
  camera position so no jump occurs. `_handle_button()` (lines 112–118) calls
  this on `MOUSE_BUTTON_RIGHT` press after raycasting the ground plane.
- **Scenario — Orbiting around a component:**
  - `test_orbit_uses_right_mouse_button`: RMB press + horizontal drag → `cam._phi != initial_phi` ✓
  - `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` ✓
  - `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` after orbit begins ✓

### Requirement: Smooth Camera Movement (MUST)

**Status: COVERED**

- **Implementation:** `_process()` (lines 42–47) applies frame-rate-independent
  exponential smoothing: `_distance = lerpf(_distance, _target_distance, t)` and
  `_pivot = _pivot.lerp(_target_pivot, t)`. Pan applies immediately for
  proportional-to-drag responsiveness; zoom only mutates `_target_*` for
  smooth interpolation.
- **Scenario — Smooth zoom:**
  - `test_smooth_zoom_target_differs_from_distance_after_scroll`: after WHEEL_UP,
    `_target_distance < _distance` (targets differ — interpolation required) ✓
  - `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`,
    `20 < _distance < 40` (partially interpolated) ✓
- **Scenario — Smooth pan:**
  - `test_pan_proportional_to_drag_speed`: 10px drag pivot displacement < 50px drag
    pivot displacement ✓

