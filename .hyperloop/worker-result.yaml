### Requirement: Camera Controls — COVERED

**Code:** `godot/scripts/camera_controller.gd`:
- Initial state: `_theta = 0.15` (~8.6° from straight above), `_distance = 40.0` —
  satisfies "top-down overview" scenario
- Scroll wheel (`MOUSE_BUTTON_WHEEL_UP`/`WHEEL_DOWN`): adjusts `_distance` with
  clamping to `[min_distance, max_distance]` — satisfies "zooming in" scenario
- Middle-mouse drag: updates `_phi` (azimuth) and `_theta` (polar, clamped
  `[0.01, PI-0.01]` so camera never flips past poles) — satisfies "orbiting" scenario
- `_update_transform()` calls `look_at(_pivot, Vector3.UP)` when inside tree, ensuring
  "up stays up" at all times

**Tests:** `godot/tests/test_camera_controls.gd` — 8 behavioral tests:
- `test_initial_theta_is_near_top_down` — `cam._theta < PI/4.0`
- `test_initial_distance_is_positive` — `cam._distance > 0.0`
- `test_scroll_up_decreases_distance` — distance decreases after WHEEL_UP event
- `test_scroll_down_increases_distance` — distance increases after WHEEL_DOWN event
- `test_orbit_horizontal_drag_changes_phi` — `_phi != initial_phi` after horizontal drag
- `test_orbit_vertical_drag_changes_theta` — `_theta != initial_theta` after vertical drag
- `test_set_pivot_updates_state` — `_pivot` and `_distance` updated by `set_pivot()`
- `test_zoom_clamped_at_minimum` — 200x scroll-up leaves `_distance >= min_distance`

Status: **COVERED** ✓

