## Untestable THEN-Clauses

### 1. Desktop Platform — "runs natively without browser, container, or VM dependencies"
- **Verbatim THEN text**: "it runs natively without browser, container, or VM dependencies"
- **Why untestable**: Requires launching the Godot application on a physical Linux desktop and observing OS-level behavior. Headless CI cannot verify that the binary runs without a browser or container.
- **Architectural evidence**: No `Dockerfile`, `docker-compose.yml`, or HTML5 export preset exists in the repository. `godot/project.godot` declares no "Web" feature flag. All APIs used (FileAccess, Node3D, Camera3D, MeshInstance3D, Label3D) are standard desktop Godot 4.6 APIs.

### 2. Performance — "frame rate remains above 30fps"
- **Verbatim THEN text**: "the frame rate remains above 30fps"
- **Why untestable**: FPS measurement requires a running render pipeline. Headless Godot (`--headless --quit`) has no display server and cannot measure frame rates.
- **Architectural evidence**: `godot/scripts/lod_manager.gd` implements FAR/MEDIUM/NEAR LOD thresholds (80.0m / 20.0m) and toggles node visibility each `_process()` frame, providing the primary architectural mitigation for performance at kartograph scale (60 nodes). The testable proxy (`test_kartograph_scale_anchor_count`, `test_kartograph_scale_build_produces_world_positions`) confirms the full 60-node scene builds correctly without errors.

### 3. Performance — "no perceptible stutter or pop-in"
- **Verbatim THEN text**: "there is no perceptible stutter or pop-in"
- **Why untestable**: Perceptual stutter requires a running render pipeline and human observation. Headless CI cannot measure this.
- **Architectural evidence**: Same as above — LOD manager toggles visibility based on camera distance, the primary mechanism for preventing pop-in.

