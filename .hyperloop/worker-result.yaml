### REQ-2: Two-Stage Pipeline (MUST) — COVERED
- Implementation:
  - Stage 1: extractor/extractor.py → JSON scene graph (nodes, edges, metadata).
  - Stage 2: godot/scripts/main.gd → _ready() reads JSON via FileAccess,
    calls build_from_graph() to render 3D scene.
- Tests:
  - extractor/tests/test_cli.py::test_main_writes_json_output — CLI writes valid
    JSON with nodes/edges/metadata keys.
  - godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node —
    build_from_graph() populates _anchors for every fixture node.
  - godot/tests/test_scene_graph_loading.gd::test_anchor_positions_match_json —
    anchor positions match JSON position fields exactly.

### REQ-3: Top-Down Architectural View (MUST) — COVERED
- Implementation:
  - camera_controller.gd initialises _theta near vertical (top-down).
  - build_from_graph() creates distinct Node3D anchors per bounded context.
  - compute_layout() in extractor places tightly coupled BCs adjacent.
  - _create_edge() draws ImmediateMesh lines between context volumes.
- Tests:
  - godot/tests/test_camera_controls.gd::test_initial_theta_is_near_top_down
  - godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node
  - extractor/tests/test_extractor.py::test_coupled_bcs_are_closer_than_uncoupled
    — 4-BC fixture with auth↔shared_kernel coupled; asserts
    dist(auth,shared_kernel) < dist(auth,billing).
  - godot/tests/test_dependency_rendering.gd::test_edge_line_mesh_created

### REQ-4: Zoom to Detail (MUST) — COVERED
- Implementation: lod_manager.gd (FAR/MEDIUM/NEAR thresholds) hides/shows nodes
  and edges per distance tier. Internal dependencies appear only at NEAR.
- Tests:
