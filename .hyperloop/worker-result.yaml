### Containment Rendering
`test_containment_rendering.gd` asserts material properties on instantiated nodes:
- `mat.transparency != TRANSPARENCY_DISABLED` and `mat.albedo_color.a < 1.0` (translucent)
- Module `mat.albedo_color.a >= 1.0` (opaque) Ôťô
- `mod_anchor.get_parent() == ctx_anchor` (structural containment) Ôťô
- `ctx_mesh.size.x > mod_mesh.size.x` (size ordering) Ôťô
- `mat.cull_mode == CULL_DISABLED` (visually distinct boundary) Ôťô

### Dependency Rendering
`test_dependency_rendering.gd` verifies direction indicator via explicit rendering element:
