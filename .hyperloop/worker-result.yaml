### Requirement: Zoom Toward Mouse Cursor — **COVERED**

**MUST** scroll-wheel zoom toward the point under the mouse cursor.

Implementation (`camera_controller.gd`):
- Lines 120–128: `MOUSE_BUTTON_WHEEL_UP` calls `_zoom_toward_point(world_pt, -1)`;
  `MOUSE_BUTTON_WHEEL_DOWN` calls `_zoom_toward_point(world_pt, 1)`. Both use
  `_get_ground_point_under_cursor(_last_mouse)`.
- Lines 170–178 (`_zoom_toward_point`): adjusts `_target_distance`, then
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.

Scenario — *Zooming into a specific component* (cursor over component, scroll in):
- `test_zoom_in_shifts_pivot_toward_cursor` — world_pt=(10,0,0), zoom in,
  asserts `cam._target_pivot.x > 0.0`. ✓
- `test_zoom_in_cursor_point_invariant` — world_pt=(20,0,0), zoom in,
  asserts `0 < cam._target_pivot.x < 20` (pivot lies between old pivot and cursor,
  proving cursor-point invariant). ✓

Scenario — *Zooming out*:
- `test_zoom_out_shifts_pivot_away_from_cursor` — world_pt=(10,0,0), zoom out,
  asserts `cam._target_pivot.x < 0.0` (pivot pushed past origin, away from cursor). ✓

