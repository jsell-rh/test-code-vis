### Requirement: Size Encoding — COVERED

**Implementation:** `godot/scripts/main.gd`
- Line 131: `var sz: float = float(nd["size"])` — the size field from JSON is used directly
  as the `BoxMesh.size` dimension, so mesh width = sz. Larger `size` → larger box; the ratio
  of mesh widths equals the ratio of size values exactly.

**Scenario: Large module vs small module — all THEN clauses tested:**

| THEN clause | Test | Assertion |
|---|---|---|
| module with more code is larger volume | `test_large_module_has_bigger_mesh` | `large_mesh.size.x > small_mesh.size.x` |
| relative sizes proportional to metric | `test_mesh_sizes_proportional_to_metric` | `abs(actual_ratio - 3.0) < 0.001` (9.0/3.0 = 3.0) |

Both tests pass.

