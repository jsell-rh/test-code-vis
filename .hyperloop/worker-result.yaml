### Requirement 5: Performance at Kartograph Scale — COVERED (PASS-WITH-NOTE)

**Implementation:** `godot/scripts/lod_manager.gd` implements 3 LOD tiers
(FAR > 80 units, MEDIUM 20–80, NEAR ≤ 20), culling module nodes and edges at
distance to maintain render performance. `main.gd` calls `_lod.apply()` via
`_process()` every frame.

**Test coverage:** `godot/tests/test_nfr_scale.gd`

| THEN clause | Test function | Verified |
|---|---|---|
| "scene builds at kartograph scale (60 nodes)" | `test_kartograph_scale_anchor_count` | 6 contexts + 54 modules; asserts anchors.size() == 60 ✓ |
| "all 6 bounded context anchors created" | `test_kartograph_scale_context_anchors_exist` | Asserts anchors.has(ctx_id) for each of the 6 known context IDs ✓ |
| "all 54 module anchors created" | `test_kartograph_scale_module_anchors_exist` | Iterates all 54 module nodes, asserts anchors.has(node["id"]) ✓ |
| "world positions populated for all 60 nodes" | `test_kartograph_scale_build_produces_world_positions` | Asserts _world_positions.size() == 60 ✓ |

**Untestable in CI:** "frame rate > 30fps" and "no perceptible stutter" require
a GPU render pipeline; `Engine.get_frames_per_second()` returns 0 in headless
mode. Architectural mitigation (LOD system) verified. PASS-WITH-NOTE.

