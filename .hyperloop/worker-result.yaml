## Implementation Quality Notes

- **main.gd `_ready()`**: Fully implemented — performs FileAccess.open(), JSON parsing, SceneGraphLoader, and build_from_graph(). Not a stub.
- **Pipeline completeness**: Two-stage pipeline is wired end-to-end. `LLMViewGenerator.parse_response()` produces a ViewSpec dict; `main.gd.apply_view_spec()` delegates to `SceneInterpreter.apply()` which mutates the live scene tree.
- **Fixed primitive enforcement**: Two layers — `_make_spec()` in LLMViewGenerator drops unknown ops, and `SceneInterpreter.apply()` uses a `match` statement that ignores unrecognised op strings. Runtime invention of primitives is structurally prevented.
- **Direction visually indicated**: `_apply_connect()` creates both an ImmediateMesh line AND a CylinderMesh arrowhead cone (`top_radius=0` → pointed tip). `test_connect_op_adds_arrowhead` asserts `mesh_count >= 2` on the real scene root.
- **Label3D legibility**: `annotate` op sets `billboard = BILLBOARD_ENABLED` and `pixel_size = 0.05 > 0`. Both asserted in `test_annotate_label_billboard_enabled` and `test_annotate_label_pixel_size_positive`.

