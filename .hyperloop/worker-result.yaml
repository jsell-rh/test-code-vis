### Requirement: Dependency Rendering ‚Äî COVERED

**Implementation** (`main.gd _create_edge()`):
- Line: `ImmediateMesh` with `PRIMITIVE_LINES` drawn between world-space positions of source and target.
- Direction indicator: `CylinderMesh` with `top_radius=0.0` (cone/arrowhead) oriented along edge direction and placed at the target end.
- Cross-context edges use `Color(1.0, 0.50, 0.10)` (orange); internal edges use grey.

**Tests** (`godot/tests/test_dependency_rendering.gd` ‚Äî 4 tests):
- `test_edge_line_mesh_created`: finds `ImmediateMesh` child on main node after `_build()`.
- `test_direction_indicator_cone_created`: finds `CylinderMesh` with `top_radius == 0.0`.
- `test_direction_cone_near_target`: asserts cone `position.distance_to(Vector3(20,0,0)) < 2.0`.
- `test_cross_context_cone_is_orange`: asserts `albedo_color.r > 0.8 && albedo_color.b < 0.3` on cross-context edge cone.

