## Implementation Review

**`camera_controller.gd`** â€” not a stub. `_ready()` initialises `_target_distance`,
`_target_pivot`, and calls `_update_transform()`. `_process()` applies exponential
smoothing via `lerpf`/`lerp`. All five spec behaviors are implemented:

- LMB pan: `_handle_button()` sets `_panning = true`; `_handle_motion()` adds
  `right * delta.x * pan_amount` to `_target_pivot` (non-inverted).
- Zoom toward cursor: `_zoom_toward_point()` computes zoom_ratio and shifts
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.
- RMB orbit: `begin_orbit_at_world_point()` sets `_pivot` to the world point and
  recomputes spherical coordinates without a camera jump.
- Smooth animation: `_distance` and `_pivot` interpolate each frame toward their
  `_target_*` counterparts with frame-rate-independent exponential smoothing.

**`main.gd`** â€” not a stub. Full implementation in `_ready()` and `build_from_graph()`.

