### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 120–128: Wheel events call `_get_ground_point_under_cursor` then `_zoom_toward_point`.
- Lines 170–178: `_zoom_toward_point` computes zoom ratio and shifts
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.

**Tests**:
- `test_zoom_in_shifts_pivot_toward_cursor`: cursor at +X → after zoom in, `pivot.x > 0` ✓
- `test_zoom_in_cursor_point_invariant`: `0 < pivot.x < world_pt.x` (between old pivot and cursor) ✓
- `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at +X → after zoom out, `pivot.x < 0` ✓

#### Scenario: Zooming into a specific component — COVERED
`test_zoom_in_shifts_pivot_toward_cursor` + `test_zoom_in_cursor_point_invariant` ✓

#### Scenario: Zooming out — COVERED
`test_zoom_out_shifts_pivot_away_from_cursor` ✓

