| THEN the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll` | After scroll: `cam._target_distance < cam._distance` (not yet converged) ✅ |
| THEN the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_process_interpolates_distance` | Set `_target_distance=20`, call `_process(0.1)` → `20 < _distance < 40` (partial interpolation) ✅ |
| THEN the pan movement is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | 10px drag vs 50px drag; `cam_fast._pivot.length() > cam_slow._pivot.length()` ✅ |

