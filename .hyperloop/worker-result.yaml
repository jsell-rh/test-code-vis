### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`main.gd`)
- `_ready()` is NOT a stub: opens JSON file, parses with `JSON.new()`, calls
  `build_from_graph()`.
- `build_from_graph()` iterates nodes → `_create_volume()` per node; iterates
  edges → `_create_edge()` per edge; positions anchors from `position.{x,y,z}`.
- `SceneGraphLoader.load_from_dict()` parses and preserves all fields.

**Tests** (`test_scene_graph_loading.gd`)
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1")` and
  `_anchors.has("mod1")`.
- `test_mesh_instances_exist_in_anchors` — finds `MeshInstance3D` child in each
  anchor.
- `test_edge_mesh_instances_created` — counts ≥ 2 `MeshInstance3D` children on
  main node (line + cone).
- `test_anchor_positions_match_json` — asserts `anchor.position` equals
  `Vector3` from JSON.
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`,
  `pixel_size > 0.0`, `no_depth_test == true` on `Label3D`.

All tests instantiate `MainScript.new()` (a real `Node3D`) and call
`build_from_graph()` — no dict-key-only assertions.

