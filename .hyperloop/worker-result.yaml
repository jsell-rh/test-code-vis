### Requirement 4: Orbit Around Mouse Point (SHALL/MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `MOUSE_BUTTON_RIGHT` pressed → `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))`
- `begin_orbit_at_world_point()`: sets `_pivot = world_pt`, recomputes `_distance`, `_theta`, `_phi`
  from current camera position — camera does not jump, only orbit centre changes

**Scenario: Orbiting around a component — COVERED**
- GIVEN mouse cursor over a specific component ✓
- WHEN user holds RMB and drags ✓ (`MOUSE_BUTTON_RIGHT` → `begin_orbit_at_world_point`)
- THEN camera orbits around point under cursor at orbit start ✓ (`_pivot == world_pt`)
- AND component remains at visual center during orbit ✓ (`look_at(_pivot)` keeps `world_pt` centered)

Tests: `test_orbit_uses_right_mouse_button`, `test_orbit_around_cursor_point`, `test_orbit_pivot_is_world_point`

---

### Requirement 5: Smooth Camera Movement (SHALL/MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `_process(delta)`: exponential smoothing `t = 1.0 - pow(0.05, delta * zoom_smooth)`,
  `_distance = lerpf(_distance, _target_distance, t)`, `_pivot = _pivot.lerp(_target_pivot, t)`
- Pan applies `_pivot = _target_pivot` immediately for proportional, lag-free feel

**Scenario: Smooth zoom — COVERED**
- GIVEN any camera position ✓
- WHEN user scrolls to zoom ✓
- THEN zoom is animated smoothly (interpolated), not instantaneous ✓
  (scroll changes only `_target_distance`; `_distance` interpolates in `_process()`)

Tests: `test_smooth_zoom_target_differs_from_distance_after_scroll`, `test_smooth_zoom_process_interpolates_distance`

**Scenario: Smooth pan — COVERED**
- GIVEN any camera position ✓
- WHEN user drags to pan ✓
- THEN pan movement is smooth and proportional to drag speed ✓

Tests: `test_pan_proportional_to_drag_speed`, `test_pan_applied_immediately_no_lag`

