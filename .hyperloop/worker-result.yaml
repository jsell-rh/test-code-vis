### Requirement: Smooth Camera Movement ÔÇö COVERED

**Implementation** (`camera_controller.gd`):
- Lines 42ÔÇô47: `_process` uses exponential smoothing (`lerpf`) to interpolate `_distance`
  and `_pivot` toward their targets each frame.
- Zoom events only change `_target_distance`/`_target_pivot` (lines 170ÔÇô178); actual
  values lag behind, producing smooth animation.
