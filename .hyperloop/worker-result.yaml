## Pan Direction Independent Derivation

Spec: "dragging left reveals content to the right, as in Google Maps."

At phi=PI/2, camera is on +Z side looking at origin. `transform.basis.x = (1,0,0)` (world +X = camera right).

Code: `_target_pivot -= right * delta.x * pan_amount`

Drag left → `delta.x = -50` → `right * delta.x = (1,0,0)*(-50) = (-50,0,0)` → `_target_pivot -= (-50,0,0)` → `_target_pivot.x += 50` → pivot goes right (+X) → camera goes right → objects appear to shift left relative to camera → **scene moves left = same direction as drag** ✓

Test assertion `cam._pivot.x > 0.0` after left drag is the correct predicate for this THEN-clause.
