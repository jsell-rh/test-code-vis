## Requirement Analysis

### Requirement: Question-Driven View Generation — COVERED

**Implementation:**
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` constructs
  an LLM prompt embedding the natural-language question and the graph's node IDs/names.
- `parse_response(llm_text)` converts the LLM's JSON response into a ViewSpec dict.
- `godot/scripts/scene_interpreter.gd` — `apply(spec, anchors, scene_root)` mutates
  the live 3D scene tree based on the ViewSpec.
- `godot/scripts/main.gd:apply_view_spec()` (line 271) wires Stage 1 output into Stage 2.

**Scenario: Architectural question (auth components)**

| THEN clause | Code | Test | Assertion |
|---|---|---|---|
| View focused on auth-related components | `build_prompt()` embeds node ids in prompt | `test_build_prompt_contains_node_id_auth_service` | `prompt.contains("auth_service")` |
| Irrelevant components hidden/de-emphasized | `_apply_hide()` sets `anchor.visible = false` | `test_hide_op_sets_visible_false` | `anchor.visible == false` on real Node3D |
| Relevant components arranged | `_apply_arrange()` sets `anchor.position = Vector3(x,y,z)` | `test_arrange_op_sets_all_three_axes` | `anchor.position.x/y/z` on real Node3D |

**Scenario: Impact question (user database dependents)**

| THEN clause | Code | Test | Assertion |
|---|---|---|---|
| View shows user database and dependents | `_apply_show()` sets `anchor.visible = true` | `test_show_op_sets_visible_true` | `anchor.visible == true` on real Node3D |
| Dependency relationships spatially clear | `_apply_connect()` adds ImmediateMesh line | `test_connect_op_adds_line_geometry` | MeshInstance3D in `root.get_children()` |
| Dependency direction visually indicated | `_apply_connect()` adds CylinderMesh arrowhead | `test_connect_op_adds_arrowhead` | `mesh_count >= 2` on real Node3D scene |

---

### Requirement: View Specs as Intermediate Representation — COVERED

**Implementation:**
- `parse_response()` returns a plain `Dictionary` with `"question"` and `"operations"` keys
  — no raw 3D geometry at this stage.
- `SceneInterpreter.apply()` reads the dict and mutates `visible`, `position`,
  `albedo_color`, adds `Label3D` children, and creates `ImmediateMesh`/`CylinderMesh`
  geometry — all on real `Node3D` scene objects.

**Scenario: LLM produces view spec**

| THEN clause | Code | Test | Assertion |
|---|---|---|---|
| Emits structured view spec (not raw 3D geometry) | `parse_response()` returns `Dictionary` | `test_parse_response_returns_dictionary` | `result is Dictionary` |
| View spec controls show/hide/highlight/arrange | All 6 ops filter correctly | `test_parse_response_all_six_ops_pass_through` | all 6 ops present in output |
| 3D renderer interprets view spec into spatial scene | `SceneInterpreter.apply()` end-to-end | `test_all_six_ops_mutate_scene_correctly` | `.visible`, `.albedo_color`, `.position.x`, `.text`, ImmediateMesh on live Node3D |

---

### Requirement: Fixed Visual Primitive Set — COVERED

**Implementation:**
- `VALID_OPS` const (line 31 of `llm_view_generator.gd`) defines the fixed set:
  `["show", "hide", "highlight", "arrange", "annotate", "connect"]`
- `_make_spec()` filters any op not in `VALID_OPS` before returning the spec dict.
- `SceneInterpreter.apply()` uses a `match` statement that silently ignores unknown ops.
- Two enforcement layers prevent runtime invention of new rendering primitives.

**Scenario: LLM uses existing primitives**

| THEN clause | Code | Test | Assertion |
|---|---|---|---|
| Composes from fixed set (show/hide/highlight/arrange/annotate/connect) | `_make_spec()` filter + `VALID_OPS` | `test_parse_response_all_six_ops_pass_through` | all 6 valid ops pass through |
| No new rendering logic generated (mixed unknown) | `_make_spec()` drops `"invent_new_renderer"` | `test_parse_response_filters_unknown_ops` | unknown op dropped; only "show" survives |
| No new rendering logic generated (all unknown) | `_make_spec()` drops all unknowns | `test_parse_response_with_all_unknown_ops_returns_empty_operations` | 0 ops in output |

