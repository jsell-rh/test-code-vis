### F3b — RACF (cycles 5-11, 7th consecutive cycle): no relative-offset assertion test

check-relative-position-tests.sh [EXIT 1 FAIL] (second condition)

All child-position tests use proximity assertions (distance < threshold) only.
No test places the parent at a non-zero world position and then asserts:
  child["position"]["x"] == approx(local_offset_x)   # not world x

A proximity test passes for BOTH absolute and relative coordinate storage when
the offset is small. It does not cover the spec's "position relative to parent" THEN-clause.

Required test (add to test_extractor.py):
  1. Create fixture with one BC placed at non-zero world position (e.g., x=10.0 after
     compute_layout places it there via a specific graph structure or mock).
  2. Call compute_layout(nodes, edges).
  3. Assert child["position"]["x"] == approx(local_offset_x) — a value small enough
     that it could not be the world position (which would be ~10.0 + local_offset_x).
  Note: Because compute_layout determines BC positions internally, drive a fixture
  that reliably places the parent at a known non-zero position (e.g., a BC ring with
  exactly one BC guaranteed to be at non-zero x), then assert the child's position
  field is within a small local-offset range, NOT near the parent's world coordinate.

