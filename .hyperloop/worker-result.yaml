## Methodology

Read each SHALL/MUST requirement in the spec, located the production code that
implements it (by domain concept), and verified that a behavioral GDScript test
exists for every Scenario Given/When/Then. Tests in `godot/tests/` are exercised
by `run_tests.gd` which discovers `test_*` methods and asserts runtime Node3D
properties (positions, mesh types, material values) ‚Äî not just dict-key presence.

