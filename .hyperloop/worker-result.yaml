## Pipeline Wiring Verification (manual, check-pipeline-wiring.sh absent)

`main.gd._ready()` calls `FileAccess.open()` → `get_as_text()` → `JSON.new().parse()` →
`SceneGraphLoader.load_from_dict()` which returns a typed graph dict →
`build_from_graph()` consumes it: iterates nodes with `_create_volume()`, iterates
edges with `_create_edge()`. Full producer→consumer pipeline confirmed.

---

## Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

- `main.gd._ready()` uses `FileAccess.open()` + `file.get_as_text()` (Godot 4.6 API)
- `build_from_graph()` iterates nodes → `_create_volume()` and edges → `_create_edge()`
- Positions set directly from JSON x/y/z with no Godot-side recomputation
- **Tests** (`test_scene_graph_loading.gd`, `test_node_renderer.gd`): assert
  `anchor.position.is_equal_approx(Vector3(...))`, MeshInstance3D children, edge
  mesh instances — real Node3D property assertions, not dict-key checks. ✓

### Requirement: Containment Rendering — COVERED

- Bounded contexts: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`
- Modules: opaque boxes (`albedo_color.a = 1.0`)
- Child node parented to parent anchor via `_create_volume(nd, parent_anchor)`
- **Tests** (`test_containment_rendering.gd`): assert translucency, opacity, parent
  relationship (`mod_anchor.get_parent() == ctx_anchor`), size comparison,
  `CULL_DISABLED` property value. ✓

### Requirement: Dependency Rendering — COVERED

- `_create_edge()` produces ImmediateMesh (PRIMITIVE_LINES) for the line
- Direction indicated by `CylinderMesh` with `top_radius=0.0` (arrowhead cone)
  placed at the target end — satisfies "explicit rendering element" requirement
- **Tests** (`test_dependency_rendering.gd`): assert ImmediateMesh exists,
  CylinderMesh with `top_radius == 0.0` exists, cone within 2 units of target
  position, orange color on cross-context edge. ✓

### Requirement: Size Encoding — COVERED

- `box.size = Vector3(sz, sz * 0.6, sz)` where `sz = float(nd["size"])`
- Width ratio equals input size ratio exactly
- **Tests** (`test_size_encoding.gd`): assert larger size → larger mesh, ratio
  within 0.001 of expected 3.0×. ✓

### Requirement: Camera Controls — COVERED

- `camera_controller.gd`: spherical coordinates (`_theta = 0.15` rad, near top-down)
- WHEEL_UP/DOWN adjusts `_distance`, clamped to `[min_distance, max_distance]`
- Middle-mouse drag orbits (changes `_phi`, `_theta`); right-mouse drag pans pivot
- `look_at(_pivot, Vector3.UP)` keeps orientation intuitive
- **Tests** (`test_camera_controls.gd`): assert initial theta < PI/4 (top-down),
  scroll events change distance in correct direction, drag events change `_phi`/`_theta`,
  zoom clamped at minimum, `set_pivot()` updates state. ✓

### Requirement: Godot 4.6 — COVERED

- `project.godot`: `config/features=PackedStringArray("4.6")`
- All scripts are `.gd` (GDScript); no C# or Mono
- **Tests** (`test_engine_version.gd`): reads `project.godot` via
  `FileAccess.open()` + `get_as_text()`, asserts `"4.6"` present, no `"Mono"`/`"C#"`,
  file non-empty. Covers FileAccess code path from `_ready()`. ✓

