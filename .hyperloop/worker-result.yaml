## Requirement: Size Encoding — COVERED

**Implementation:** `godot/scripts/main.gd::_create_volume()`
- `sz = float(nd["size"])` is applied directly as the BoxMesh width/depth, so mesh
  size ratio equals input `size` ratio exactly.

**Scenario: Large module vs small module — tests in `test_size_encoding.gd`:**
- `test_large_module_has_bigger_mesh()` — GIVEN size=9 and size=3 modules, THEN
  `large_mesh.size.x > small_mesh.size.x`.
- `test_mesh_sizes_proportional_to_metric()` — THEN `large/small` ratio == 3.0
  (within float tolerance).

