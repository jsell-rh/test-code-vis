## Direction Derivation — Independent Verification

**test_pan_direction_not_inverted:**
- Spec THEN-clause: "scene moves in the same direction as the drag (dragging left reveals content to the right)"
- Independent derivation: at phi=PI/2, camera is at +Z; basis.x ≈ world +X.
  Drag left → delta.x = 50−100 = −50 → `_target_pivot -= (+X)×(−50)×pan_amount` → pivot.x > 0.
  Camera moves +X → user sees content shift left → right-side content revealed. ✓
- Test asserts: `cam._pivot.x > 0.0` → CORRECT direction. ✓

**test_orbit_horizontal_drag_changes_phi / test_orbit_vertical_drag_changes_theta:**
- Spec does not mandate a specific orbit sign, only that orbit occurs.
- Tests assert `cam._phi != initial_phi` / `cam._theta != initial_theta` — appropriate.
- Derivation comments present and correct per check-direction-test-derivations.sh. ✓

