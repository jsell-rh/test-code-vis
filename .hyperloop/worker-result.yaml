### R4: Orbit Around Mouse Point (MUST) — COVERED

**Code:** `godot/scripts/camera_controller.gd`
- Lines 112–118: On RMB press, resolves `world_pt = _get_ground_point_under_cursor(event.position)`,
  calls `begin_orbit_at_world_point(world_pt)`.
- Lines 73–85 (`begin_orbit_at_world_point`): Sets `_pivot = world_pt`,
  `_target_pivot = world_pt`, recomputes `_distance`, `_theta`, `_phi` from camera's
  current position — camera does not jump, only orbit center changes.
- Lines 135–139: During `_orbiting`, motion updates `_phi`/`_theta` around fixed `_pivot`.

**Scenario: Orbiting around a component**

| THEN clause | Test | File |
|---|---|---|
| Camera orbits via RMB (phi changes) | `test_orbit_uses_right_mouse_button` | test_camera_controls.gd |
| Camera orbits around cursor point (_pivot = world_pt) | `test_orbit_around_cursor_point` | test_camera_controls.gd |
| Component remains at visual center | `test_orbit_pivot_is_world_point` | test_camera_controls.gd |

`test_orbit_uses_right_mouse_button`: RMB press + horizontal motion → asserts `_phi != initial_phi`.
`test_orbit_around_cursor_point`: `begin_orbit_at_world_point(Vector3(5,0,3))` → asserts
`cam._pivot == world_pt`. `test_orbit_pivot_is_world_point`: asserts `_pivot.is_equal_approx(world_pt)`;
since the camera always `look_at(_pivot)`, world_pt is always at visual center.

