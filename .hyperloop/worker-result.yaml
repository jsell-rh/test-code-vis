### Requirement: Zoom to Detail — COVERED

**SHALL**: Zoom into bounded context reveals internal layers; internal dependencies
shown; relative sizes of internal modules visible.

Scenario: Zooming into IAM

Implementation:
- `lod_manager.gd`: FAR (contexts only), MEDIUM (contexts + modules,
  cross-context edges), NEAR (all nodes and edges including internal).
- `main.gd -> _create_volume()`: `box.size = Vector3(sz, sz*0.6, sz)` for
  modules; `sz` from `size_from_loc(loc)` — proportional to LOC.
- Internal edges registered in `_lod_edge_entries` with `edge_type == "internal"`;
  visible only at near distance.

Tests:
- `test_medium_distance_shows_modules` (test_spatial_structure.gd): module
  anchor visible at midpoint between NEAR/FAR thresholds.
- `test_near_distance_shows_internal_edges_as_fine_detail`: internal edge
  visual visible at `NEAR_THRESHOLD - 5`.
- `test_large_module_has_bigger_mesh` / `test_mesh_sizes_proportional_to_metric`
  (test_size_encoding.gd): fixture with size=3 vs size=9; BoxMesh.size.x
  ratio == 3.0 within tolerance.

**COVERED**

