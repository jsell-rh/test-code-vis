### Requirement: Godot 4.6 — COVERED

**Implementation**:
- `godot/project.godot` contains `config/features=PackedStringArray("4.6")` — engine version
  declared.
- All scripts are `.gd` (GDScript); no `.cs` files exist in the project.
- `FileAccess.open()` + `file.get_as_text()` is used in `main.gd` — correct Godot 4.x API
  (not the deprecated `read_as_text()` explicitly called out in the spec).

**Tests** (`godot/tests/test_engine_version.gd`):
- `test_project_godot_declares_version_4_6` — reads `project.godot` via `FileAccess.open()` +
  `get_as_text()`, asserts `content.contains("4.6")`. This is a runtime behavioral test, not
  a config-only check.
- `test_project_features_include_4_6` — asserts `content.contains("\"4.6\"")` matching the
  `PackedStringArray("4.6")` feature declaration.
- `test_main_script_is_gdscript` — asserts `content.contains("main.tscn")` and
  `not content.contains(".cs")`.

