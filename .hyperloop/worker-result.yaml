### Requirement: Size Encoding — COVERED

**Implementation** (`godot/scripts/main.gd`, `_create_volume()`):
- `sz = float(nd["size"])` drives `box.size = Vector3(sz, sz * 0.6, sz)`.
- The `size` field in the JSON is expected to be pre-computed from the extractor's
  `loc` metric, so the rendered mesh dimensions are proportional to complexity.

**Tests** (`godot/tests/test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — fixture `size=9` vs `size=3`; asserts
  `large_mesh.size.x > small_mesh.size.x`.
- `test_mesh_sizes_proportional_to_metric` — asserts ratio `== 3.0` within 0.001.

Both THEN clauses ("larger volume" and "proportional sizes") are covered.

