### REQ-5: Abstract Visual Language тАФ COVERED

Scenario: Visual representation
- THEN it appears as a labeled geometric volume
  тЖТ `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors`:
    Each anchor has MeshInstance3D (BoxMesh). No terrain/buildings/metaphors.
  тЖТ `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`:
