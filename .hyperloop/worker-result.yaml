## Pan Direction Independent Derivation

Spec: "dragging left reveals content to the right, as in Google Maps"
Expected: drag left → scene moves left → pivot moves RIGHT (+X) → pivot.x > 0

Trace through code at phi=PI/2 (camera on +Z side, basis.x ≈ world +X):
- drag left: delta.x = 50 - 100 = -50
- `_target_pivot -= right * delta.x * pan_amount`
- `_target_pivot -= (+X) * (-50) * pan_amount` → pivot.x += positive ✓

Test assertion `return cam._pivot.x > 0.0` correctly captures the spec predicate.

