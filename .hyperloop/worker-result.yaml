### Requirement: Dependency Extraction (MUST)

**COVERED**

#### Scenario: Cross-context dependency

- **Code**: `build_dependency_edges()` in `extractor/extractor.py`. When source and
  target belong to different bounded contexts, a `cross_context` edge is emitted at
  the BC level (e.g. `iam ÔåÆ shared_kernel`). Direction is encoded by `source` and
  `target` fields.

- **Tests**:
  - `TestDependencyExtraction::test_cross_context_edge_created` ÔÇö asserts
    `("iam", "shared_kernel")` pair is in the edge set.
  - `TestDependencyExtraction::test_cross_context_edge_type` ÔÇö asserts
    `type == "cross_context"` for that edge.
  - `TestDependencyExtraction::test_edges_have_required_keys` ÔÇö every edge has
    `source`, `target`, `type`.

#### Scenario: Internal dependency

- **Code**: Same `build_dependency_edges()`. When source and target share the same
  bounded context and the source is a module-level node, an `internal` edge is
  emitted (e.g. `iam.application ÔåÆ iam.domain`).

- **Tests**:
  - `TestDependencyExtraction::test_internal_edge_created` ÔÇö asserts
    `("iam.application", "iam.domain")` pair is in the edge set.
  - `TestDependencyExtraction::test_internal_edge_type` ÔÇö asserts
    `type == "internal"` for that edge.
  - `TestEdgeSchema::test_internal_edge_*` in `test_schema.py` ÔÇö validates schema
    fields on an internal edge.

