## Test Quality Notes

All GDScript tests in `godot/tests/test_scene_interpreter.gd` and `test_llm_view_generator.gd`
operate on real instantiated objects (Node3D, MeshInstance3D, Label3D) and assert concrete runtime
property values — not just dictionary keys. The headless test runner (`godot-tests.sh` check)
confirms these run and pass at the GDScript behavioral level.

The integration test `test_all_six_ops_mutate_scene_correctly` exercises all 6 operations in a
single end-to-end pass, asserting `.visible`, `.albedo_color.g`, `.position.x`, `.text`, and
`MeshInstance3D` presence in the scene root.

