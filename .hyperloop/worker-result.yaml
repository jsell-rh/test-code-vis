### F1 — FAIL: check-layout-radius-bound.sh exits 1 — unbounded child-orbit radius (blocking)

**Check:** `check-layout-radius-bound.sh` (new check, added to main after branch creation)
**File:** `extractor/extractor.py`
**Offending lines:**
- Line 206: `bc_radius = max(5.0, len(bc_nodes) * 2.5)`
- Line 221: `mod_radius = max(1.5, len(children) * 0.9)`

The `mod_radius` at line 221 grows without bound as the number of children increases.
For the `graph` bounded context in kartograph (which has many submodules), `mod_radius`
exceeds `bc_radius`, placing child nodes' local offsets outside the parent's spatial
boundary.

**Required fix:**
```python
mod_radius = min(max(1.5, len(children) * 0.9), bc_radius * 0.4)
```
`bc_radius` is already computed at line 206 and is available in scope.

