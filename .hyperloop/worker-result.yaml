## Resolution of Prior FAIL Finding

**Prior finding:** "position reflects coupling relationships" (Abstract Visual Language
scenario) was mapped to `test_anchor_positions_match_json` — a rendering-fidelity test
that loads pre-computed fixture positions and passes even if the algorithm is random.

**Fix applied (commit `61f6919`):** The THEN→test mapping now cites
`test_coupled_bcs_are_closer_than_uncoupled` for both sibling "reflects coupling"
THEN-clauses (Top-Down View scenario AND Abstract Visual Language scenario).

**Verification of algorithm-quality:** Read `extractor/tests/test_extractor.py` lines
435–459. The fixture varies coupling (auth↔shared_kernel coupled, billing uncoupled) and
asserts `dist("auth","shared_kernel") < dist("auth","billing")`. This is a genuine
algorithm-quality test — it would fail if the layout algorithm assigned random positions.

**`check-reflects-mapping-consistency.sh` result:** "All 3 'reflects' concept group(s)
cite consistent tests across THEN-clauses." Both sibling coupling clauses now cite the
same algorithm-quality test. PASS.

