### FINDING 4 — FAIL: check-gdscript-only-test.sh: No DirAccess iteration test

The spec requires all scripts use GDScript. No test iterates `res://scripts/` via `DirAccess.open()` and asserts each file ends in `.gd`. The check confirms this is absent.

*(Note: also pre-existing, but blocking.)*

