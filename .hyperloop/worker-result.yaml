## task-007: Godot Application Spec — PASS (review 2026-04-23)

### Requirement Coverage

---

**JSON Scene Graph Loading** — COVERED

Implementation (`godot/scripts/main.gd`):
- `_ready()` opens the JSON file via `FileAccess.open()`, parses it with `JSON.new().parse()`,
  calls `SceneGraphLoader.load_from_dict(json.data)`, then `build_from_graph(graph)`.
- `build_from_graph()` iterates nodes → `_create_volume()`, iterates edges → `_create_edge()`.
- Anchor `position` is set directly from the JSON `position.{x,y,z}` fields.

Tests (`godot/tests/test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` — `_anchors` has an entry for every node id (GIVEN/THEN volumes).
- `test_mesh_instances_exist_in_anchors` — each anchor contains a `MeshInstance3D` child.
- `test_edge_mesh_instances_created` — at least 2 `MeshInstance3D` children on root (line + arrowhead).
- `test_anchor_positions_match_json` — local positions match JSON `position` values for both ctx1 and mod1.

---

**Containment Rendering** — COVERED

Implementation (`godot/scripts/main.gd`, `_create_volume()`):
- `bounded_context` type: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
- Module anchors are parented to their parent context anchor via `_anchors.get(nd["parent"])`.
- Bounded context mesh is sized `Vector3(sz, sz*0.2, sz)`; modules sized `Vector3(sz, sz*0.6, sz)`.

Tests (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` — transparency != DISABLED and alpha < 1.0.
- `test_module_is_opaque` — module albedo alpha >= 1.0.
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled` — `cull_mode == CULL_DISABLED`.

---

**Dependency Rendering** — COVERED

Implementation (`godot/scripts/main.gd`, `_create_edge()`):
- `ImmediateMesh` with `PRIMITIVE_LINES` and two vertices draws the line.
- `CylinderMesh` with `top_radius = 0.0` (cone) placed at `to_pos - dir*(height*0.5)` provides direction indicator.
- Cross-context edges coloured orange `Color(1.0, 0.50, 0.10)`; internal edges grey.

Tests (`godot/tests/test_dependency_rendering.gd`):
- `test_edge_line_mesh_created` — `ImmediateMesh` child exists on main node.
- `test_direction_indicator_cone_created` — `CylinderMesh` with `top_radius == 0.0` exists.
- `test_direction_cone_near_target` — cone position within 2 units of target (20, 0, 0).
- `test_cross_context_cone_is_orange` — cone albedo: r > 0.8, b < 0.3.

---

**Size Encoding** — COVERED

Implementation (`godot/scripts/main.gd`, `_create_volume()`):
- `sz = float(nd["size"])`, then `BoxMesh.size = Vector3(sz, sz * 0.6, sz)` for modules.
- Linear mapping: mesh width is directly proportional to the `size` field.

Tests (`godot/tests/test_size_encoding.gd`):
- `test_large_module_has_bigger_mesh` — large (size=9) mesh.size.x > small (size=3) mesh.size.x.
- `test_mesh_sizes_proportional_to_metric` — ratio 9.0/3.0 = 3.0 matches within 0.001 tolerance.

---

**Camera Controls** — COVERED

Implementation (`godot/scripts/camera_controller.gd`):
- Initial state: `_theta = 0.15` rad (~8.6°, well below PI/4), `_distance = 40.0`.
- Scroll wheel: `WHEEL_UP` decreases `_distance` (clamped at `min_distance`), `WHEEL_DOWN` increases it.
- Middle-mouse drag: changes `_phi` (azimuth) and `_theta` (polar), enforcing `theta` within (0.01, PI-0.01).
- `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps Y-up orientation.
- Label readability: `BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true` in `_create_volume()`.

Tests (`godot/tests/test_camera_controls.gd`):
- `test_initial_theta_is_near_top_down` — `_theta < PI/4` (top-down scenario).
- `test_initial_distance_is_positive` — `_distance > 0`.
- `test_scroll_up_decreases_distance` — scroll wheel up reduces distance (zooming in scenario).
- `test_scroll_down_increases_distance` — scroll wheel down increases distance.
- `test_orbit_horizontal_drag_changes_phi` — horizontal drag changes `_phi` (orbiting scenario).
- `test_orbit_vertical_drag_changes_theta` — vertical drag changes `_theta`.
- `test_set_pivot_updates_state` — `set_pivot()` updates `_pivot` and `_distance`.
- `test_zoom_clamped_at_minimum` — 200x scroll-in stays >= `min_distance`.

Label readability test (`godot/tests/test_scene_graph_loading.gd`):
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true`.

---

**Godot 4** — COVERED

- `godot/project.godot`: `config/features=PackedStringArray("4.6")` confirms Godot 4.6.x.
- All files under `godot/scripts/` use the `.gd` extension (GDScript 2.0).

---

### Summary

All six SHALL/MUST requirements are implemented in `godot/scripts/main.gd` and
`godot/scripts/camera_controller.gd`. Every spec scenario is exercised by GDScript
behavioral tests in `godot/tests/` that instantiate real Node3D/Camera3D objects,
supply known fixture data, and assert actual runtime property values (positions,
mesh sizes, material transparency, cull mode, arrowhead geometry, label billboard mode).
The runner in `godot/tests/run_tests.gd` includes all five task-007 test suites.
No requirement or scenario is missing implementation or test coverage.

