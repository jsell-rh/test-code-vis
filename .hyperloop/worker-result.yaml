## Observations (Non-blocking)

- During headless tests, `camera_controller.gd`'s `_update_transform()` calls
  `look_at()` which emits Godot engine errors ("Node not inside tree") because the
  Camera3D is not added to a scene tree in unit tests. The tests still pass because they
  assert the internal state variables (`_theta`, `_phi`, `_distance`) directly — the
  transform error is a harmless side-effect for headless testing. This is acceptable for
  a prototype; a future improvement would be to guard `look_at()` with
  `is_inside_tree()`.
