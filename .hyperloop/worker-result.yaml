### Requirement: Zoom Toward Mouse Cursor

**Scenario: Zooming into a specific component**

| THEN-clause | Test function | Assertion | Verified |
|---|---|---|---|
| View zooms toward cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `cam._target_pivot.x > 0.0` (cursor at +10X, pivot shifts toward it) | ✓ |
| Component stays under cursor during zoom | `test_zoom_in_cursor_point_invariant` | `0 < pivot.x < world_pt.x` (pivot between old position and cursor) | ✓ |

**Derivation:** `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`. Zoom-in → ratio < 1 → new_pivot = (10,0,0) + ((0,0,0)−(10,0,0)) * r = (10 − 10r, 0, 0). r < 1 → x ∈ (0, 10). Matches both assertions. ✓

**Scenario: Zooming out**

| THEN-clause | Test function | Assertion | Verified |
|---|---|---|---|
| View zooms out from cursor point | `test_zoom_out_shifts_pivot_away_from_cursor` | `cam._target_pivot.x < 0.0` (cursor at +10X, pivot pushed away to −X) | ✓ |

**Derivation:** Zoom-out → ratio > 1 → new_pivot.x = 10 − 10*ratio. ratio > 1 → x < 0. Matches `pivot.x < 0.0`. ✓

---

### Requirement: Orbit Around Mouse Point

**Scenario: Orbiting around a component**

| THEN-clause | Test function | Assertion | Verified |
|---|---|---|---|
| Camera orbits around cursor point at orbit start | `test_orbit_around_cursor_point` | `cam._pivot == world_pt` | ✓ |
| RMB triggers orbiting (phi changes) | `test_orbit_uses_right_mouse_button` | `cam._phi != initial_phi` | ✓ |
| Component remains at visual center during orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` | ✓ |

Note: `test_orbit_uses_right_mouse_button` calls `_handle_button` which, outside the scene
tree, falls back to `_target_pivot` for the cursor world point (not the actual mouse cursor).
The correct "orbit AROUND cursor" coverage is `test_orbit_around_cursor_point` which
calls `begin_orbit_at_world_point(world_pt)` directly and asserts `_pivot == world_pt`. ✓

