### Requirement: Containment Rendering — COVERED

**Implementation**
- `bounded_context` nodes: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`.
  `BoxMesh.size = Vector3(sz, sz*0.2, sz)`.
- Module nodes: `albedo_color.a = 1.0` (opaque). `BoxMesh.size = Vector3(sz, sz*0.6, sz)`.
- Module anchors are `add_child`-ed to their parent context anchor, creating real scene-tree
  nesting so children are spatially inside the parent volume.

**Tests** (`test_containment_rendering.gd`)
- `test_bounded_context_is_translucent()` — asserts `transparency != DISABLED` and `alpha < 1.0`.
  Covers THEN "bounded context appears as a larger translucent volume".
- `test_module_is_opaque()` — asserts `alpha >= 1.0`. Covers AND "child modules appear as smaller
  opaque volumes inside it".
- `test_module_parented_inside_context()` — asserts `mod_anchor.get_parent() == ctx_anchor`.
  Covers AND "child modules appear … inside it" (structurally).
- `test_bounded_context_larger_than_module()` — asserts `ctx_mesh.size.x > mod_mesh.size.x`.
  Covers THEN "bounded context appears as a larger … volume".
- `test_bounded_context_cull_disabled()` — asserts `CULL_DISABLED`. Covers AND "boundary of the
  parent is visually distinct from the children".

