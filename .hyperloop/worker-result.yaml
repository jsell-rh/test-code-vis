## Requirement: Godot 4.6 — COVERED

**Implementation:**
- `godot/project.godot` declares `config/features=PackedStringArray("4.6")`. ✓
- All scripts are `.gd` files (GDScript only — no `.cs` or other script types). ✓
- `main.gd` uses `FileAccess.open()` and `file.get_as_text()` (Godot 4.x API); no deprecated
  `read_as_text()` or Godot 3-style `File.new()` calls. ✓

**Tests:** Two test files were added to address the previously PARTIAL status:

`godot/tests/test_godot_version.gd`:
- `test_project_godot_declares_version_4_6()` — reads `res://project.godot` via
  `FileAccess.open()` + `get_as_text()` and asserts content contains "4.6". ✓
- `test_project_features_include_4_6()` — asserts content contains `"4.6"` in the
  features array. ✓
- `test_main_script_is_gdscript()` — asserts `project.godot` references `main.tscn` and
  contains no `.cs` references. ✓

`godot/tests/test_engine_version.gd`:
- `test_project_declares_godot_46()` — reads `res://project.godot` via
  `FileAccess.open()` + `get_as_text()` and asserts "4.6" present. ✓
- `test_main_script_is_gdscript()` — opens `res://scripts/main.gd` via `FileAccess` and
  confirms file is non-empty (confirming GDScript file exists and is readable). ✓
- `test_main_uses_godot4_fileaccess_api()` — reads `main.gd` source text and asserts
  `FileAccess.open(` and `get_as_text()` are present, and `File.new()` /
  `read_as_text()` are absent. ✓

All three THEN conditions of the "Engine version" scenario are now exercised:
1. "it uses Godot 4.6.x" → verified by reading project.godot content. ✓
2. "all scripts use GDScript" → verified by absence of .cs references, presence of .gd file. ✓
3. "all API calls are valid for Godot 4.6 API" → `test_main_uses_godot4_fileaccess_api()` checks
   the actual source for correct API usage. ✓

The `FileAccess.open()` + `get_as_text()` code path from `main.gd::_ready()` is now exercised
through the version tests that use the same API to read project files.

