### 7. Direction Predicate Independent Derivation

**Pan direction (test_pan_direction_not_inverted):**

Spec: "dragging left reveals content to the right, as in Google Maps"
→ drag left → scene shifts LEFT → camera/pivot moves RIGHT

At `_phi = PI/2`, camera is on +Z side; `transform.basis.x` = world +X (verified from `look_at_from_position`).

Drag left: `delta.x = -50` (position 100 → 50).
```
_target_pivot -= right * delta.x * pan_amount
             -= (+X) * (-50) * pan_amount
             += (+X) * 50 * pan_amount
```
→ `pivot.x > 0` (camera moves right → scene shifts left → right-side content revealed) ✓

The test asserts `cam._pivot.x > 0.0` — **correct predicate, correct direction**.

**Zoom toward cursor (test_zoom_in_shifts_pivot_toward_cursor):**

Spec: "zooms toward the point under the cursor"
→ zoom-in with cursor at (+10, 0, 0) → pivot must shift toward +X

Formula: `new_pivot = world_pt + (old_pivot - world_pt) * zoom_ratio`
With `zoom_ratio < 1` (zoom in): `new_pivot.x = 10 + (0 - 10) * ratio = 10*(1-ratio) > 0` ✓

**Zoom away from cursor (test_zoom_out_shifts_pivot_away_from_cursor):**

Spec: "zooms out from the point under the cursor"
→ zoom-out with cursor at (+10, 0, 0) → pivot must shift away from cursor (toward -X)

With `zoom_ratio > 1` (zoom out): `new_pivot.x = 10 + (0 - 10) * ratio = 10*(1-ratio) < 0` ✓

