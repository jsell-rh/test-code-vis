## Key Implementation Correctness Notes

1. **Pan direction**: At phi=PI/2, transform.basis.x ≈ world +X. Formula:
   `_target_pivot -= right * delta.x * pan_amount`. Drag left (delta.x < 0):
   pivot += +X * |delta.x| → camera moves +X → scene appears to shift -X (left).
   Google Maps convention verified. ✓

2. **Zoom toward cursor**: Formula `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
   with zoom_ratio = new_dist/old_dist. Zoom in → ratio<1 → pivot moves toward cursor. ✓

3. **Orbit pivot**: `begin_orbit_at_world_point()` sets `_pivot = world_pt` and recomputes
   spherical coordinates from current camera position — no jump. ✓

4. **Smooth zoom**: `_process()` uses `t = 1.0 - pow(0.05, delta * zoom_smooth)` (exponential
   smoothing). Only `_target_*` changes on input; actuals interpolate each frame. ✓

5. **`main.gd`**: `_ready()` is fully implemented with FileAccess I/O, JSON parsing, and
   scene-tree construction. Not a stub. ✓

6. **New GDScript files**: Docstrings verified. No file names or docstrings referencing
   prohibited spec sections. ✓

