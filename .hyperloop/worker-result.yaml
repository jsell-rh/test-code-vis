### Requirement: Camera Controls — COVERED

**Implementation:** `godot/scripts/camera_controller.gd`
- Initial `_theta = 0.15` rad (≈ 8.6° from top-down, well below 45°).
- Scroll wheel up/down changes `_distance` (zoom), clamped to `[min_distance,
  max_distance]`.
- Middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar/altitude);
  `_theta` clamped to `[0.01, PI − 0.01]` so up stays up.
- `set_pivot(pivot, distance)` called from `main.gd::_frame_camera()` to frame
  the scene on load.

**Tests:** `godot/tests/test_camera_controls.gd`
- `test_initial_theta_is_near_top_down()` — theta < PI/4.
- `test_initial_distance_is_positive()` — distance > 0.
- `test_scroll_up_decreases_distance()` — WHEEL_UP reduces _distance.
- `test_scroll_down_increases_distance()` — WHEEL_DOWN increases _distance.
- `test_orbit_horizontal_drag_changes_phi()` — middle-mouse horizontal drag
  changes _phi.
- `test_orbit_vertical_drag_changes_theta()` — middle-mouse vertical drag
  changes _theta.
- `test_set_pivot_updates_state()` — set_pivot stores new pivot and distance.
- `test_zoom_clamped_at_minimum()` — 200 scroll-up events never push _distance
  below min_distance.

Label readability on zoom additionally covered by
`test_scene_graph_loading.gd::test_labels_are_billboard_and_readable()`.

