## THEN-Clause Coverage

Every THEN-clause from specs/core/understanding-modes.spec.md is mapped to an exact
test function and assertion line in godot/tests/test_understanding_modes.gd.

### Requirement: Conformance Mode

#### Scenario: Spec-aligned implementation
- **THEN** the human can see that the realized system has auth and user management as separate components
  → `test_aligned_nodes_detected_as_separate` — asserts `result.get("aligned", []).has("auth")` and `.has("user_management")`
- **AND** the correspondence between spec and realization is visually apparent
  → `test_aligned_nodes_have_annotation_in_scene` — instantiates Node3D anchors, calls `render_alignment()`, asserts `label_count >= 1`

#### Scenario: Spec-divergent implementation
- **THEN** the human can see the divergence between spec and realization
  → `test_divergent_nodes_detected` — asserts `missing.has("payment_service") or divergent.has("payment_service")`
- **AND** the specific nature of the divergence is clear (merged vs. separate)
  → `test_divergent_nodes_annotated_as_merged` — asserts `divergent.has("payment")` AND Label3D with "MERGED" text exists in scene_root

### Requirement: Evaluation Mode

#### Scenario: Detecting tight coupling
- **THEN** the coupling between those services is apparent
  → `test_tightly_coupled_pair_detected` — asserts `pairs.size() >= 1` and `pairs[0]["coupling_score"] >= 2`
- **AND** the human can assess whether the coupling is problematic
  → `test_coupled_nodes_highlighted` — instantiates Node3D+MeshInstance3D anchors, calls `render_coupling()`, asserts `albedo_color == HIGHLIGHT_COLOR` on both svc_x and svc_y

#### Scenario: Identifying single point of failure
- **THEN** the criticality and centrality of that component is apparent
  → `test_central_node_detected_as_critical` — asserts `critical[0]["node_id"] == "hub"` and `critical[0]["in_degree"] == 3`
- **AND** the risk it represents is clear
  → `test_critical_node_annotated_with_spof_risk` — instantiates Node3D anchor, calls `render_criticality()`, asserts Label3D with "SPOF" in `.text`

#### Scenario: Spec is faithfully implemented but architecturally poor
- **THEN** architectural problems are visible even though conformance is perfect
  → `test_coupling_detected_despite_perfect_alignment` — asserts `aligned.size() == 2` (perfect conformance) then asserts `pairs.size() >= 1` from `analyze_coupling()` (quality problem still detected)

### Requirement: Simulation Mode

#### Scenario: Splitting a service
- **THEN** the impact on dependent services is visible
  → `test_split_dependents_detected` — asserts `dependents.has("client_a")` and `dependents.has("client_b")`
- **AND** new dependencies or interfaces that would be required are shown
  → `test_split_new_interfaces_shown` — asserts `new_interfaces.size() >= 1` AND caller anchor highlighted (`albedo_color == HIGHLIGHT_COLOR`) AND Label3D with "split" in text

#### Scenario: Failure injection
- **THEN** the cascade of effects through the system is visible
  → `test_failure_cascade_detected` — asserts `cascade.has("api")` and `cascade.has("frontend")` (transitive cascade through db→api→frontend)
- **AND** components that would be affected are clearly identified
  → `test_failure_affected_nodes_highlighted` — instantiates Node3D+MeshInstance3D anchors, calls `render_failure_cascade()`, asserts `albedo_color == HIGHLIGHT_COLOR` on consumer_1 AND Label3D with "FAILED" text exists

### Label3D readability (mandatory per guidelines)
  → `test_annotation_label3d_has_billboard_and_pixel_size` — asserts `label.billboard == BaseMaterial3D.BILLBOARD_ENABLED` and `label.pixel_size > 0.0`

