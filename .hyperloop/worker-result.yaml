## Findings

### F1 — RACF: check-new-modules-wired.sh (cycles 5-6 → cycle 7, blocking)

`extractor/layout.py` is imported ONLY from `extractor/tests/test_layout.py` (line 15).
No production Python file imports it. `extractor/extractor.py` defines its OWN
`compute_layout()` at line 189, which is the live code path called at line 472 of the
same file. Tests for `layout.py` pass but exercise dead code — the actual pipeline output
is produced by `extractor.py`'s internal function, not by `layout.py`.

This RACF was first prescribed in cycle 5, confirmed again in cycle 6. The prescribed fix
was NOT applied. The commit `a528dc0d` added `layout.py` and `test_layout.py` but made no
change to `extractor.py` to wire the new module into the production code path.

**Fix (choose exactly one):**
- Option A: Delete `extractor/layout.py`, fix `compute_layout` directly in `extractor.py`
  (see F3a + F4 for what to fix), and add a direct relative-offset assertion test (see F3b).
- Option B: In `extractor.py`, replace the `compute_layout` definition at line 189 with
  `from extractor.layout import compute_layout`. Note: the signatures differ — `layout.py`
  returns `dict[str, Position]` while `extractor.py`'s version mutates nodes in-place.
  Reconcile signatures AND fix F3a in layout.py before wiring.

### F2 — RACF: check-no-duplicate-toplevel-functions.sh (cycles 5-6 → cycle 7, blocking)

`compute_layout` is top-level-defined in BOTH `extractor/extractor.py` (line 189) and
`extractor/layout.py` (line 29). This is a direct structural consequence of F1 — the new
module was created without removing the original definition. Fixing F1 (Option A or B)
resolves F2 as a side effect.

### F3 — RACF: check-relative-position-tests.sh (cycles 5-6 → cycle 7, blocking)

Two sub-failures:

**F3a — Absolute-coord accumulation in layout.py (lines 91-93):**
```python
pos[child["id"]] = [
    parent_pos[0] + math.cos(angle) * offset_r,   # ABSOLUTE — adds parent's x
    parent_pos[1] + math.sin(angle) * offset_r,   # ABSOLUTE — adds parent's z
]
```
The spec requires module positions to be LOCAL OFFSETS (relative to parent). This code
stores absolute world-space coordinates. `main.gd` adds the parent world position again
at render time (`_resolve_world_pos`, line 153: `return _world_positions[parent_id] + local`),
so children would be rendered at `2 * parent_pos + offset` — a double-offset bug.
Although `layout.py` is currently dead code (F1), the check scans all extractor Python
files and flags the pattern regardless of whether the module is imported.

Fix: remove `parent_pos` from the child position assignment:
```python
pos[child["id"]] = [
    math.cos(angle) * offset_r,
    math.sin(angle) * offset_r,
]
```

**F3b — Only proximity tests, no direct relative-offset assertion:**
The test `test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position` uses:
```python
dist = math.sqrt((cx - px)**2 + (cy - py)**2 + (cz - pz)**2)
assert dist < bc_radius
```
This proximity check passes for BOTH absolute and relative coordinate storage when the
offset is small. It does NOT verify that the stored value IS the local offset (not the
absolute world position).

Required test (in whichever test file exercises the production `compute_layout`):
1. Place the parent BC at a non-zero world position (e.g., create fixture so parent lands at x≈10.0 after layout).
2. Assert `child["position"]["x"] == approx(local_offset_x)` — equality to the offset alone.
3. Optionally assert `child["position"]["x"] != approx(parent_x + local_offset_x)`.

### F4 — pytest failure: test_child_nodes_are_near_parent_position (blocking)

`pytest extractor/tests/` exits 1 with 1 FAILED / 122 passed:
```
FAILED extractor/tests/test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position
AssertionError: Child graph.infrastructure is at distance 9.35 from parent graph,
exceeding scene radius 7.50.
```

The production `extractor.py`'s `compute_layout` (dead-code issue aside) uses:
```python
mod_radius = max(1.5, len(children) * 0.9)
```
When `graph` has 10+ children, `mod_radius` can exceed `bc_radius` (7.5 for 3 contexts).
Additionally `_circular_positions(..., y=1.0)` introduces a y-component that adds to the
3D distance even when the XZ offset is within bounds.

Fix: cap `mod_radius` to stay within the parent's visual bound, e.g.:
```python
parent_size = next((n["size"] for n in nodes if n["id"] == parent_id), 5.0)
mod_radius = min(max(1.5, len(children) * 0.9), parent_size * 0.4)
```
Also consider setting `y=0.0` for module positions (matching the flat layout convention)
unless the test accepts y≠0.

