### Requirement 3: Zoom Toward Mouse Cursor (SHALL/MUST) — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- `MOUSE_BUTTON_WHEEL_UP` → `_get_ground_point_under_cursor()` + `_zoom_toward_point(world_pt, -1)`
- `MOUSE_BUTTON_WHEEL_DOWN` → `_get_ground_point_under_cursor()` + `_zoom_toward_point(world_pt, 1)`
- `_zoom_toward_point()`: `zoom_ratio = _target_distance / old_dist`;
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`

**Scenario: Zooming into a specific component — COVERED**
- GIVEN mouse cursor over a bounded context ✓
- WHEN user scrolls to zoom in ✓ (`MOUSE_BUTTON_WHEEL_UP`)
- THEN view zooms toward point under cursor ✓ (pivot shifts toward cursor: ratio < 1)
- AND component under cursor stays under cursor ✓ (pivot stays between old position and cursor)

Tests: `test_zoom_in_shifts_pivot_toward_cursor`, `test_zoom_in_cursor_point_invariant`

**Scenario: Zooming out — COVERED**
- GIVEN zoomed-in view ✓
- WHEN user scrolls to zoom out ✓ (`MOUSE_BUTTON_WHEEL_DOWN`)
- THEN view zooms out from point under cursor ✓ (pivot shifts away: ratio > 1 → `pivot.x < 0`)

Tests: `test_zoom_out_shifts_pivot_away_from_cursor`

