## Direction Predicate Audit (Independent)

Expected predicates derived from spec BEFORE reading test bodies:

- pan right → pivot moves right (positive x): `test_pan_drag_right_increases_pivot_x` asserts `cam._pivot.x > initial_x`. **Matches.** ✓
- pan left → pivot moves left (negative x): `test_pan_drag_left_decreases_pivot_x` asserts `cam._pivot.x < initial_x`. **Matches.** ✓
- scroll up = zoom in = closer = less distance: `test_scroll_up_decreases_distance` asserts `cam._target_distance < initial_target`. **Matches.** ✓
- orbit drag → phi changes: `test_orbit_horizontal_drag_changes_phi` asserts phi changed. **Matches.** ✓
- coupled BCs closer than uncoupled: `test_coupled_bcs_are_closer_than_uncoupled` asserts `dist(auth,sk) < dist(auth,billing)`. **Matches.** ✓

No opposite-direction mappings found.

