### Requirement 5: Performance at Kartograph Scale (MUST) — COVERED + PASS-WITH-NOTE

**Implementation verified:**
- `lod_manager.gd` implements three LOD tiers (`FAR_THRESHOLD=80`, `NEAR_THRESHOLD=20`)
  with `_apply_far()`, `_apply_medium()`, `_apply_near()`.
- `main.gd` registers all nodes/edges with `_lod_node_entries`/`_lod_edge_entries` and
  calls `_update_lod()` every frame in `_process()`.

**Tests verified:**

| THEN sub-clause | Test | File |
|---|---|---|
| 60 anchors at kartograph scale (6 ctx + 54 mod) | `test_kartograph_scale_anchor_count` | test_nfr_scale.gd |
| All 6 context anchors present | `test_kartograph_scale_context_anchors_exist` | test_nfr_scale.gd |
| All 54 module anchors present | `test_kartograph_scale_module_anchors_exist` | test_nfr_scale.gd |
| World positions for all 60 nodes | `test_kartograph_scale_build_produces_world_positions` | test_nfr_scale.gd |
| FAR: only bounded_context visible | `test_far_distance_shows_only_bounded_contexts` | test_spatial_structure.gd |
| FAR: all edges hidden | `test_far_distance_hides_all_edges` | test_spatial_structure.gd |
| MEDIUM: modules visible | `test_medium_distance_shows_modules` | test_spatial_structure.gd |
| MEDIUM: cross-context edges only | `test_medium_distance_shows_cross_context_edges_only` | test_spatial_structure.gd |
| NEAR: all nodes visible | `test_near_distance_shows_all_nodes` | test_spatial_structure.gd |
| NEAR: internal edges visible | `test_near_distance_shows_internal_edges_as_fine_detail` | test_spatial_structure.gd |

`test_kartograph_scale_anchor_count` instantiates `MainScript` (a real `Node3D` subclass),
calls `build_from_graph()` with a 60-node fixture, and asserts `_anchors.size() == 60`.
Real node instantiation — not a compile-only check.

**THEN clauses — "frame rate remains above 30fps" and "no perceptible stutter":**
Headless Godot has no render pipeline. `Engine.get_frames_per_second()` returns 0 in
headless mode. FPS measurement and stutter perception require a display server and a human
observer; neither is available in automated CI. These clauses are genuinely untestable in
the current test infrastructure.

