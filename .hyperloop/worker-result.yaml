#### Requirement: Size Encoding — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_create_volume()`: `sz = float(nd["size"])`, then `BoxMesh.size = Vector3(sz, ...)` — mesh XZ dimension maps 1:1 to the `size` metric.

**Tests** (`godot/tests/test_size_encoding.gd` — 2 tests):
- `test_large_module_has_bigger_mesh`: fixture has `small_mod` size=3, `large_mod` size=9; asserts `large_mesh.size.x > small_mesh.size.x`. Covers THEN "module with more code appears as a larger volume".
- `test_mesh_sizes_proportional_to_metric`: asserts `large_mesh.size.x / small_mesh.size.x == 3.0` within 0.001. Covers AND "relative sizes are proportional to the metric".

