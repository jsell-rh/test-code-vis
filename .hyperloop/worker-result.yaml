### Requirement: Performance at Kartograph Scale (MUST)

#### Scenario: Smooth navigation — COVERED (PASS-WITH-NOTE)

**Code verified:**
- `godot/scripts/main.gd::build_from_graph()`: creates one `Node3D` anchor per node and populates `_world_positions` for all nodes, enabling the full scene to render.
- `godot/scripts/lod_manager.gd`: three-tier LOD system (FAR > 80 units: bounded_context only; MEDIUM 20–80: bounded_context + module + cross_context edges; NEAR < 20: everything visible) — architecturally correct approach to maintaining frame rate at scale.

**THEN → test mapping:**

| THEN clause | Test function | File | Predicate |
|---|---|---|---|
| Scene builds at kartograph scale (6 BC, 54 modules) | `test_kartograph_scale_anchor_count` | `test_nfr_scale.gd` | 60-node fixture; asserts `_anchors.size() == 60` ✓ |
| All 6 bounded context anchors exist | `test_kartograph_scale_context_anchors_exist` | `test_nfr_scale.gd` | Iterates all 6 context IDs; asserts each present in `_anchors` ✓ |
| All 54 module anchors exist | `test_kartograph_scale_module_anchors_exist` | `test_nfr_scale.gd` | Asserts `module_count == 54`; asserts each module ID in `_anchors` ✓ |
| World positions populated for all nodes | `test_kartograph_scale_build_produces_world_positions` | `test_nfr_scale.gd` | Asserts `_world_positions.size() == 60` ✓ |

**THEN clause analysis — FPS / stutter:**

The clauses "frame rate remains above 30fps" and "no perceptible stutter or pop-in" require a live render pipeline. `Engine.get_frames_per_second()` returns 0 in headless mode — there is no render tick. "No perceptible stutter" is a subjective quality attribute that requires human perception or GPU profiling. Both are genuinely untestable in automated headless CI.

The LOD system's correctness at keeping visible node count low at far distances is tested behaviorally in `test_spatial_structure.gd`.

**STATUS: COVERED (PASS-WITH-NOTE — FPS and stutter clauses are genuinely untestable in headless CI; correctness of scene build at kartograph scale is fully verified by behavioral tests)**

