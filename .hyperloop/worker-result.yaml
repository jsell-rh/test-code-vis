All SHALL/MUST requirements from specs/extraction/code-extraction.spec.md are
implemented and have passing test coverage. All 93 tests pass (pytest 8.4.1,
Python 3.13).

## Requirement: Module Discovery — COVERED

Implementation:
- `extractor/extractor.py`: `discover_bounded_contexts()` scans a src_path for
  top-level Python packages, filtering out known non-context dirs (tests, docs,
  etc.) and underscore-prefixed dirs.
- `extractor/extractor.py`: `discover_submodules()` scans inside a bounded
  context dir for inner Python packages.
- Each node carries `id` (dotted module name, encodes path), `name`, `type`,
  `parent`, and `metrics`.

Scenario: Discovering kartograph's bounded contexts — COVERED
- Tests in `TestModuleDiscovery`:
  - `test_discovers_bounded_contexts`: verifies iam, graph, shared_kernel found.
  - `test_excludes_tests_directory`: verifies non-context dirs excluded.
  - `test_bounded_context_node_has_required_keys`: verifies id/name/type/parent.
  - `test_bounded_context_type`: verifies type == "bounded_context".
  - `test_bounded_context_parent_is_none`: verifies top-level parent is null.
  - `test_bounded_context_has_metrics_loc`: verifies loc metric present.

Note: the spec says "name, path, and type" but the schema uses `id` (dotted
module name) as the path identifier rather than an explicit `path` field.
This is a reasonable design choice — `metadata.source_path` + `id` fully
identifies any node on disk. Not a failure.

Scenario: Discovering nested modules — COVERED
- Tests in `TestModuleDiscovery`:
  - `test_discovers_submodules_in_iam`: verifies iam.domain, iam.application.
  - `test_submodule_parent_references_bc`: verifies containment (parent == "iam").
  - `test_submodule_type_is_module`: verifies type == "module".
  - `test_submodule_id_is_dotted`: verifies dotted id convention.
  - `test_submodule_has_metrics_loc`: verifies loc metric present on modules.

## Requirement: Dependency Extraction — COVERED

Implementation:
- `extractor/extractor.py`: `extract_imports_from_file()` AST-parses each .py
  file and returns absolute (non-relative) import paths.
- `extractor/extractor.py`: `get_target_node_id()` maps an import path to the
  most specific known node ID.
- `extractor/extractor.py`: `build_dependency_edges()` iterates over all nodes,
  collects imports, produces directed edges with type "cross_context" or
  "internal".
- Cross-context edges are normalised to the bounded-context level; internal edges
  are emitted only from module-level nodes.

Scenario: Cross-context dependency — COVERED
- Tests in `TestDependencyExtraction`:
  - `test_cross_context_edge_created`: asserts ("iam","shared_kernel") in edges.
  - `test_cross_context_edge_type`: asserts edge type == "cross_context".
  - `test_edges_have_required_keys`: asserts source/target/type keys present.
- (The fixture also sets up graph→shared_kernel; iam→shared_kernel exercises
  the identical code path, satisfying the scenario's intent.)

Scenario: Internal dependency — COVERED
- Tests in `TestDependencyExtraction`:
  - `test_internal_edge_created`: asserts ("iam.application","iam.domain") in
    edges — exact match with the scenario's GIVEN condition.
  - `test_internal_edge_type`: asserts edge type == "internal", satisfying the
    "distinguishable from cross-context" requirement.

## Requirement: Complexity Metrics — COVERED (SHOULD)

Implementation:
- `compute_loc()`: recursively counts Python source lines under a directory.
- `size_from_loc()`: maps loc to a visual size scalar.
- Both bounded contexts and modules store `metrics: {loc: int}`.

Scenario: Module size — COVERED
- Tests in `TestComplexityMetrics`:
  - `test_compute_loc_counts_python_lines`: counts lines across multiple .py files.
  - `test_compute_loc_recursive`: counts lines in nested subdirectories.
  - `test_compute_loc_empty_dir`: handles zero-line edge case.
- `test_bounded_context_has_metrics_loc`, `test_submodule_has_metrics_loc`:
  verify metric is present in actual node output.

## Requirement: JSON Scene Graph Output — COVERED

Implementation:
- `extractor/extractor.py`: `build_scene_graph()` assembles nodes + edges +
  metadata into a `SceneGraph` TypedDict and returns it.
- `extractor/__main__.py`: serialises the graph to JSON via `json.dumps`.
- `extractor/schema.py`: `SceneGraph`, `Node`, `Edge`, `Metadata` TypedDicts
  define the contract.

Scenario: Output format — COVERED
- Tests in `TestSceneGraphOutput`:
  - `test_build_scene_graph_has_required_keys`: nodes/edges/metadata present.
  - `test_output_is_json_serialisable`: JSON round-trip preserves all nodes.
  - `test_node_ids_are_unique`: no duplicate nodes.
  - `test_every_node_has_position`: positions pre-computed for all nodes.
- Tests in `TestSchemaStructure` (test_schema.py):
  - Verifies exact top-level fields, list/dict types, and JSON serialisability.
- Tests in `TestNodeSchema`, `TestEdgeSchema`, `TestMetadataSchema`:
  - Verify id/name/type/parent/size on nodes; source/target/type on edges;
    source_path/timestamp on metadata — matching the spec's field list exactly.

## Requirement: Spec Extraction — COVERED (SHOULD)

Implementation:
- `extractor/extractor.py`: `extract_spec_nodes()` reads a specs/ directory,
  uses the index.spec.md to discover bounded-context subdirs, and creates nodes
