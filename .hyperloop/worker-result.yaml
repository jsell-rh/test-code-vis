### Requirement: Orbit Around Mouse Point — COVERED

**SHALL**: Orbit (RMB drag) rotates around point under cursor at orbit start, not screen center.

Implementation:
- Lines 111–118: `MOUSE_BUTTON_RIGHT` pressed → `_get_ground_point_under_cursor(event.position)` → `begin_orbit_at_world_point(world_pt)`.
- Lines 73–85: `begin_orbit_at_world_point` sets `_pivot = world_pt`, `_target_pivot = world_pt`, recomputes spherical coords from current camera position (no jump).

**Scenario: Orbiting around a component**
| THEN clause | Test | Verdict |
|---|---|---|
| Camera orbits around cursor point at orbit start | `test_orbit_uses_right_mouse_button` — RMB press+drag → `cam._phi != initial_phi` | COVERED |
| Camera orbits around cursor point | `test_orbit_around_cursor_point` — `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` | COVERED |
| Component remains at visual center | `test_orbit_pivot_is_world_point` — `cam._pivot.is_equal_approx(world_pt)` after orbit begins; since camera `look_at(_pivot)`, the pivot is always the visual center | COVERED |

