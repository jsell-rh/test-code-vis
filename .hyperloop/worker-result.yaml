### F1 — DIRECTION INVERSION: WRONG PREDICATE [FAIL]

**Spec THEN-clause under review:**
> THEN the scene moves in the same direction as the drag (i.e. dragging left reveals
> content to the right, as in Google Maps)

**Guideline-prescribed derivation (from the "(i.e.)" parenthetical alone):**
> "dragging left reveals content to the right" → pivot moves RIGHT (opposite to drag)
> → delta.x is negated in implementation

**Independent derivation of expected predicate:**
  1. "Dragging left reveals content to the right" (Google Maps grab model)
  2. For right-side content to come into view: camera must pan RIGHT
  3. Camera pans RIGHT = pivot moves RIGHT (positive x direction)
  4. Drag LEFT = delta.x = negative
  5. To get pivot.x to increase (move right) when delta.x is negative: NEGATE delta.x
  6. Expected implementation: `_pivot -= right * delta.x * pan_amount`
     (or equivalently: `_pivot += right * (-delta.x) * pan_amount`)

**Actual implementation** (`godot/scripts/camera_controller.gd` line 133):
  ```
  _pivot += right * delta.x * pan_amount   # NO negation
  ```
  Drag LEFT (delta.x = -50) → `_pivot.x -= 50 * pan_amount` → pivot moves LEFT
  This is the camera-pan model, not the spec's grab model.

**Test predicate check — `test_pan_drag_right_increases_pivot_x`:**
  Expected per guideline: drag RIGHT → pivot.x DECREASES (negate model)
  Actual test asserts:    drag RIGHT → `cam._pivot.x > initial_x` (INCREASES)
  → WRONG PREDICATE — test asserts the opposite direction from the guideline derivation

**Test predicate check — `test_pan_drag_left_decreases_pivot_x`:**
  Expected per guideline: drag LEFT → pivot.x INCREASES (negate model)
  Actual test asserts:    drag LEFT → `cam._pivot.x < initial_x` (DECREASES)
  → WRONG PREDICATE — test asserts the opposite direction from the guideline derivation

**Spec ambiguity note (disclosed for process-owner awareness):**
The spec contains internally contradictory direction requirements:
  - "THEN the camera pans in the direction of the drag" → camera-pan model (no negate)
  - "AND the movement direction matches the drag direction (not inverted)" → no negate
  - "THEN the scene moves in the same direction as the drag (i.e. ...)" → grab model (negate)

The first two THEN-clauses describe the camera-pan model; only the (i.e.) parenthetical
describes the grab model. The implementation consistently follows the first two
THEN-clauses and satisfies them correctly. The conflict is in the spec itself.

Per the review guideline: "derive your expected predicate from the (i.e.) parenthetical
alone." Applying this rule strictly: the implementation direction is WRONG and the tests
assert the wrong predicate. **Verdict: FAIL.**

**Prescribed fix (per guideline derivation):**
  Negate delta.x in the pan handler:
    Before: `_pivot += right * delta.x * pan_amount`
    After:  `_pivot -= right * delta.x * pan_amount`

  Update tests to match:
    `test_pan_drag_right_increases_pivot_x`: change assertion to `cam._pivot.x < initial_x`
    `test_pan_drag_left_decreases_pivot_x`: change assertion to `cam._pivot.x > initial_x`

  **IMPORTANT**: The spec is ambiguous. The process owner should clarify whether the grab
  model or camera-pan model is intended before the implementer applies this fix —
  applying the fix will make the other two THEN-clauses fail ("camera pans in direction
  of drag" / "not inverted"). This finding warrants a spec clarification request.

