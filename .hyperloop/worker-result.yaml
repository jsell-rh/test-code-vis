## Requirement Coverage

### Requirement: Pan with Left Mouse Button (SHALL/MUST)

| THEN-clause | Test | Status |
|---|---|---|
| Camera pans in the direction of the drag | test_lmb_drag_pans_camera | PASS |
| Movement direction matches drag direction (not inverted) | test_pan_direction_not_inverted | PASS |

**Implementation:** `_handle_button` sets `_panning = true` on `MOUSE_BUTTON_LEFT` press.
`_handle_motion` checks `if _panning` and shifts `_target_pivot` via
`_target_pivot -= right * delta.x * pan_amount` / `_target_pivot -= backward * delta.y * pan_amount`.

**Verdict: COVERED**

