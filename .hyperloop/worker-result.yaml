### Requirement: Dependency Rendering — COVERED

**Code:** `_create_edge()` in `main.gd`:
1. `ImmediateMesh` with `PRIMITIVE_LINES` — visible line between two volumes
2. `CylinderMesh` with `top_radius=0.0` (pointed cone arrowhead) oriented via
   `Basis(Quaternion(Vector3.UP, dir))`, placed at `to_pos - dir*(height*0.5)` so
   the tip lands at the target position — explicitly indicates direction of dependency

**Tests:** `godot/tests/test_dependency_rendering.gd` — 4 behavioral tests:
- `test_edge_line_mesh_created` — ImmediateMesh child found on main node
- `test_direction_indicator_cone_created` — CylinderMesh with `top_radius == 0.0` found
- `test_direction_cone_near_target` — cone `position.distance_to(target) < 2.0`
- `test_cross_context_cone_is_orange` — `albedo_color.r > 0.8` and `albedo_color.b < 0.3`

Status: **COVERED** ✓

