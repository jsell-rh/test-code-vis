### Requirement: Orbit Around Mouse Point — **COVERED**

**MUST** orbit around the point under the cursor when RMB drag began.

Implementation:
- Lines 111–118: `MOUSE_BUTTON_RIGHT` press calls
  `begin_orbit_at_world_point(_get_ground_point_under_cursor(event.position))`.
- Lines 73–85 (`begin_orbit_at_world_point`): sets `_pivot = world_pt`,
  `_target_pivot = world_pt`, recomputes `_distance`/`_theta`/`_phi` from camera's
  current position so the camera does not jump — only the orbit centre changes.

Scenario — *Orbiting around a component*:
- `test_orbit_uses_right_mouse_button` — RMB press + horizontal drag changes `_phi`. ✓
- `test_orbit_around_cursor_point` — calls `begin_orbit_at_world_point(Vector3(5,0,3))`,
  asserts `cam._pivot == world_pt`. ✓
- `test_orbit_pivot_is_world_point` — asserts `cam._pivot.is_equal_approx(world_pt)`.
  Camera always looks_at `_pivot`, so `_pivot == world_pt` means world_pt is always
  the visual centre. ✓

