#### Requirement: Pre-Computed Layout — COVERED

Implementation: `compute_layout()` in extractor.py (lines 189–237) runs a
coupling-aware circular layout algorithm. `_order_by_coupling()` places tightly
coupled BCs adjacent in the ring. Module children receive LOCAL offsets (not absolute
world coordinates) so they are always within the parent's spatial bounds. The Godot
side (`scripts/main.gd`) applies these positions directly from JSON without
recomputing.

Sub-clause coverage:
  "each node's position field contains x, y, z coordinates" —
    test_extractor.py::TestLayout::test_all_nodes_have_positions_after_layout    PASS
    test_schema.py::TestPreComputedLayout::test_every_node_has_a_position        PASS

  "tightly coupled nodes have smaller distances between them" —
    test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled   PASS
      (auth↔shared_kernel coupled pair closer than auth↔billing uncoupled pair)
    test_extractor.py::TestLayout::test_order_by_coupling_places_coupled_adjacent PASS

  "child nodes are positioned within the spatial bounds of their parent" —
    test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position    PASS
      (local offset magnitude < bc_radius bound)

  "the Godot application renders nodes at these positions without recomputing layout" —
