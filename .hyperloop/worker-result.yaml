### Requirement: Dependency Visualization — COVERED

**Implementation:** `main.gd::_create_edge()`:
- Line: `ImmediateMesh` with `PRIMITIVE_LINES` (two vertices, coloured) ✓
- Direction: `CylinderMesh` with `top_radius=0` (cone) placed at target end, oriented along edge ✓
- Color: orange `Color(1.0, 0.50, 0.10)` for cross-context, grey for internal ✓

**Tests:**
- `test_dependency_rendering.gd::test_edge_line_mesh_created` → `ImmediateMesh` present ✓
- `test_dependency_rendering.gd::test_direction_indicator_cone_created` → cone present ✓
- `test_dependency_rendering.gd::test_direction_cone_near_target` → cone within 2 units of target ✓
- `test_dependency_rendering.gd::test_cross_context_cone_is_orange` → R>0.8, B<0.3 ✓

**Scenario: Cross-context dependency — COVERED**
- THEN a line or connection is drawn between them ✓
- AND the direction of the dependency is discernible ✓

