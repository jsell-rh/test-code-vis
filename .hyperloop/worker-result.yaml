### Requirement: Python Extractor — COVERED

**Implementation:**
- `extractor/__main__.py` — standalone CLI tool implemented with `argparse`; entry point is
  `python -m extractor <src_path> [--output <file>]`.
- `extractor/extractor.py` — imports only `ast`, `math`, `datetime`, `pathlib` (all Python
  standard library). No third-party dependencies.

**Tests:**
- `extractor/tests/test_cli.py` — `TestCliEntryPoint`: calls `main([...])` with fixture
  source trees and asserts `rc=0`, valid JSON output with required keys, default output
  filename behavior, and error codes (rc=1) for non-existent or non-directory src paths.
- `extractor/tests/test_cli.py` — `TestStdlibOnlyImports.test_extractor_uses_only_stdlib_imports`:
  AST-walks every `.py` file in the extractor package and asserts every import name is in
  `sys.stdlib_module_names` or is an intra-package import.

Both THEN clauses of the "Running the extractor" scenario are covered by code and test.

