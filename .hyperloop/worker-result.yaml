### Requirement: Simulation Mode — COVERED

The system MUST allow the human to explore the impact of hypothetical changes before
committing to them.

Implementation: `simulate_split(nodes, edges, node_id)` returns `{dependents, new_interfaces}`;
`simulate_failure(nodes, edges, node_id)` performs BFS through the reverse dependency graph
and returns `{cascade}`. `render_split_impact()` and `render_failure_cascade()` apply
HIGHLIGHT_COLOR highlights and Label3D annotations.

#### Scenario: Splitting a service

| THEN-clause | Test function | Status |
|---|---|---|
| "the impact on dependent services is visible" | `test_split_dependents_detected` | COVERED |
| "new dependencies or interfaces that would be required are shown" | `test_split_new_interfaces_shown` | COVERED |

`test_split_dependents_detected`: client_a and client_b both depend on monolith; asserts
both appear in result["dependents"].

`test_split_new_interfaces_shown`: Asserts new_interfaces.size()>=1, then calls
`render_split_impact()` and asserts: (a) caller anchor gets HIGHLIGHT_COLOR, (b) a Label3D
with "split" (case-insensitive) appears in the scene tree.

#### Scenario: Failure injection

| THEN-clause | Test function | Status |
|---|---|---|
| "the cascade of effects through the system is visible" | `test_failure_cascade_detected` | COVERED |
| "components that would be affected are clearly identified" | `test_failure_affected_nodes_highlighted` | COVERED |

`test_failure_cascade_detected`: api depends on db, frontend depends on api; simulates db
failure; asserts cascade contains both api and frontend (transitive BFS verified).

`test_failure_affected_nodes_highlighted`: Calls `render_failure_cascade()` and asserts:
(a) consumer_1's MeshInstance3D gets HIGHLIGHT_COLOR, (b) a Label3D with "FAILED" appears
in the scene root for the failed component.

