## THEN-Clause → Test Mapping

### Requirement 1: Pan with Left Mouse Button

**THEN the camera pans in the direction of the drag**
→ `test_lmb_drag_pans_camera` — asserts `cam._pivot != initial_pivot` after LMB + 50px right drag

**AND the movement direction matches the drag direction (not inverted)**
→ `test_pan_direction_not_inverted` — asserts `cam._pivot.x > 0.0` after left drag with derivation comment

### Requirement 2: Non-Inverted Movement

**THEN the scene moves in the same direction as the drag (dragging left reveals content to the right)**
→ `test_pan_direction_not_inverted` — full sign-chain derivation: drag left → delta.x < 0 → pivot.x increases → camera moves +X → scene shifts left (same as drag direction) ✓

### Requirement 3: Zoom Toward Mouse Cursor

**THEN the view zooms toward the point under the cursor**
→ `test_zoom_in_shifts_pivot_toward_cursor` — world_pt=(10,0,0), zoom in → `_target_pivot.x > 0.0`

**AND the component under the cursor stays under the cursor during the zoom**
→ `test_zoom_in_cursor_point_invariant` — asserts `0 < new_pivot.x < 20.0` (pivot between old_pivot and world_pt)

**THEN the view zooms out from the point under the cursor**
→ `test_zoom_out_shifts_pivot_away_from_cursor` — world_pt=(10,0,0), zoom out → `_target_pivot.x < 0.0`

### Requirement 4: Orbit Around Mouse Point

**THEN the camera orbits around the point under the cursor at orbit start**
→ `test_orbit_uses_right_mouse_button` — RMB press + 50px drag → `cam._phi != initial_phi`
→ `test_orbit_around_cursor_point` — `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt`

**AND the component remains at the visual center during the orbit**
→ `test_orbit_pivot_is_world_point` — after `begin_orbit_at_world_point`, `cam._pivot.is_equal_approx(world_pt)`

### Requirement 5: Smooth Camera Movement

**THEN the zoom is animated smoothly (interpolated), not instantaneous**
→ `test_smooth_zoom_target_differs_from_distance_after_scroll` — after WHEEL_UP: `_target_distance < _distance`
→ `test_smooth_zoom_process_interpolates_distance` — `_process(0.1)` interpolates between _distance and _target_distance

**THEN the pan movement is smooth and proportional to drag speed**
→ `test_pan_proportional_to_drag_speed` — 50px drag produces larger displacement than 10px drag

### Constraint THEN-Clauses

**_distance clamped at min_distance (prevent flip)**
→ `test_set_pivot_clamps_distance_at_minimum` — set_pivot(_, 0.0) → `_distance >= min_distance`
→ `test_zoom_clamped_at_minimum` — repeated zoom-in → `_target_distance >= min_distance`

**_theta clamped to prevent gimbal flip**
→ `test_theta_clamped_at_minimum` — extreme upward drag → `_theta >= 0.01`
→ `test_theta_clamped_at_maximum` — extreme downward drag → `_theta <= PI - 0.01`

