## Summary

All 6 spec requirements are implemented with GDScript behavioral tests:

1. **JSON Scene Graph Loading** — `main.gd::_ready()` reads JSON via `FileAccess.open()` + `get_as_text()`, calls `SceneGraphLoader.load_from_dict()` and `build_from_graph()`. Covered by `test_scene_graph_loading.gd` (5 tests).

2. **Containment Rendering** — bounded-context nodes rendered as large translucent slabs (`TRANSPARENCY_ALPHA`, `CULL_DISABLED`); module nodes as smaller opaque boxes parented inside their context anchor. Covered by `test_containment_rendering.gd` (5 tests).

3. **Dependency Rendering** — edges rendered as `ImmediateMesh` (PRIMITIVE_LINES) lines with a `CylinderMesh` arrowhead (top_radius=0) at the target end indicating direction. Covered by `test_dependency_rendering.gd` (4 tests).

4. **Size Encoding** — `BoxMesh.size` set to `Vector3(sz, sz*0.6, sz)` so width is linearly proportional to the `size` field. Covered by `test_size_encoding.gd` (2 tests).

5. **Camera Controls** — `camera_controller.gd` implements spherical-coordinate orbit (middle-mouse drag), scroll-wheel zoom, right-mouse pan. Initial `_theta = 0.15 rad` ≈ near-top-down view. Covered by `test_camera_controls.gd` (8 tests).

6. **Godot 4.6** — `project.godot` declares `config/features=PackedStringArray("4.6")`. All scripts are `.gd` (GDScript only). `main.gd` uses `FileAccess.open()` + `get_as_text()`. Covered by `test_engine_version.gd` (3 tests) and `test_godot_version.gd` (3 tests).

