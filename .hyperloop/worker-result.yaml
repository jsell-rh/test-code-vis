## Requirement Coverage

### R1: Godot 4.6 Engine (MUST) — COVERED

`godot/project.godot` declares `config/features=PackedStringArray("4.6")`. All files in
`godot/scripts/` are `.gd` (camera_controller.gd, lod_manager.gd, main.gd,
scene_graph_loader.gd). No `.cs` files. `main.gd` uses `FileAccess.open()` + `get_as_text()`
(Godot 4.x API), not deprecated Godot 3 `File.new()` or `read_as_text()`.

### R2: Python Extractor (MUST) — COVERED

`extractor/__main__.py` implements a full argparse CLI (`main(argv)` callable as
`python -m extractor <src_path> [--output <file>]`). All imports are stdlib-only: `ast`,
`math`, `datetime`, `pathlib`, `argparse`, `json`, `sys`. Confirmed by
`test_extractor_uses_only_stdlib_imports` which AST-walks every `.py` in `extractor/`
and asserts each top-level import is in `sys.stdlib_module_names`.

### R3: JSON Interface Contract (MUST) — COVERED

`godot/scripts/scene_graph_loader.gd` and `main.gd::build_from_graph()` operate on pure
Dictionary input with no imports of the Python extractor and no runtime dependency on the
source codebase. Zero subprocess calls, zero extractor imports in `godot/scripts/`.
`test_nodes_list_is_returned` and `test_metadata_is_returned` use inline fixture dictionaries
with no Python extractor invocation.

### R4: Desktop Platform (MUST) — COVERED (PASS-WITH-NOTE)

No web export presets, no Dockerfile, no container manifests. All Godot APIs are standard
desktop Godot 4.6. Project compiles and all tests pass under Godot 4.6.2.stable on Linux.
Deployment environment assertion is untestable in headless CI (documented above).

### R5: Performance at Kartograph Scale (MUST) — COVERED (PASS-WITH-NOTE)

LOD manager implemented. Scene builds correctly at kartograph scale (60 nodes) confirmed
by `test_nfr_scale.gd`. FPS and stutter detection are untestable in headless CI
(documented above).

### R6: Prototype Disposability (SHOULD) — NOTE

SHOULD-level requirement. No architectural lock-in. JSON scene graph is the only
cross-component artifact. No test required per spec convention.

