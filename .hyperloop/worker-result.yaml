## Requirement Coverage

### REQ: Target Codebase — COVERED
- Code: `extractor/extractor.py` → `build_scene_graph()`, `discover_bounded_contexts()`
- Tests: `extractor/tests/test_kartograph_integration.py`
  - `test_kartograph_integration_bounded_contexts` — runs extractor against real `~/code/kartograph/src/api`, asserts iam/graph/shared_kernel contexts in output JSON
  - `test_kartograph_extraction_produces_modules` — asserts at least one module-level node produced

### REQ: Two-Stage Pipeline — COVERED
- Code: `extractor/__main__.py` produces JSON; `godot/scripts/main.gd._ready()` reads JSON via `FileAccess.open()`, parses, calls `SceneGraphLoader.load_from_dict()`, delegates to `build_from_graph()`
- Tests:
  - Python: `test_main_writes_json_output` exercises the CLI end-to-end and asserts the output file exists
  - GDScript: `test_volumes_created_for_each_node` (`test_scene_graph_loading.gd`) exercises `build_from_graph()` with fixture data and asserts Node3D anchors are created

### REQ: Top-Down Architectural View — COVERED
- Code: `camera_controller.gd` starts with `_theta = 0.15` (near top-down); `lod_manager.gd._apply_far()` hides modules at far distance; `extractor.py._order_by_coupling()` + `compute_layout()` places coupled BCs adjacent in circular ring (closer together)
- Tests:
  - `test_far_distance_shows_only_bounded_contexts` (`test_spatial_structure.gd`) — context visible, module hidden at far distance
  - `test_dependency_expressed_as_visible_connection` (`test_spatial_structure.gd`) — ImmediateMesh line rendered for each edge
  - `test_coupled_bcs_are_closer_than_uncoupled` (`test_extractor.py`) — fixture with 4 BCs, coupled pair auth↔shared_kernel asserted closer than uncoupled pair auth↔billing
  - `test_complexity_and_coupling_both_reflected` (`test_extractor.py`) — big_ctx.size > small_ctx.size AND dist(big_ctx, ctx_c) < dist(big_ctx, ctx_d)

### REQ: Zoom to Detail — COVERED
- Code: LOD system in `lod_manager.gd` exposes `FAR_THRESHOLD`/`NEAR_THRESHOLD` constants; `_apply_far()` hides modules, `_apply_medium()` shows modules + cross-context edges, `_apply_near()` shows everything; `_process()` calls `_update_lod()` each frame
- Tests:
  - `test_medium_distance_shows_modules` (`test_spatial_structure.gd`) — module visible between thresholds
  - `test_near_distance_shows_internal_edges_as_fine_detail` (`test_spatial_structure.gd`) — all edges visible below NEAR_THRESHOLD
  - `test_lod_integration_far_hides_modules_in_built_scene` (`test_spatial_structure.gd`) — end-to-end: builds graph, applies FAR LOD, asserts module hidden

### REQ: Abstract Visual Language — COVERED
- Code: `main.gd._create_volume()` uses `BoxMesh` for all elements; bounded contexts get translucent slab (alpha=0.18, TRANSPARENCY_ALPHA); modules get opaque box; no terrain/buildings/metaphors
- Tests:
  - `test_mesh_instances_exist_in_anchors` (`test_scene_graph_loading.gd`) — MeshInstance3D children exist in anchors
  - `test_large_module_has_bigger_mesh` + `test_mesh_sizes_proportional_to_metric` (`test_size_encoding.gd`) — size=9 node has 3× wider BoxMesh than size=3 node
  - `test_bounded_context_is_translucent` (`test_containment_rendering.gd`) — alpha < 1.0 + TRANSPARENCY_ALPHA mode
  - `test_containment_expressed_as_scene_tree_parenting` (`test_spatial_structure.gd`) — module anchor is child of context anchor in scene tree

### REQ: Readable Labels — COVERED
- Code: `main.gd._create_volume()` creates `Label3D` with `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true`
- Tests:
  - `test_labels_are_billboard_and_readable` (`test_scene_graph_loading.gd`) — asserts `billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true` on instantiated Label3D node

### REQ: Dependency Visualization — COVERED
- Code: `main.gd._create_edge()` creates `ImmediateMesh` line (PRIMITIVE_LINES) + `CylinderMesh` arrowhead (top_radius=0, cone) at target end oriented along edge direction
- Tests:
  - `test_edge_line_mesh_created` (`test_dependency_rendering.gd`) — ImmediateMesh child exists after build_from_graph()
  - `test_direction_indicator_cone_created` (`test_dependency_rendering.gd`) — CylinderMesh with top_radius=0 present as child of main
  - `test_direction_cone_near_target` (`test_dependency_rendering.gd`) — cone position is within 2 units of target node position

### REQ: Navigation — COVERED
- Code: `camera_controller.gd` implements LMB→pan (`_pivot` shift), RMB→orbit (`_phi`/`_theta`), scroll→zoom (`_target_distance`), smooth interpolation via `_process(delta)` lerp
- Tests:
  - `test_lmb_pan_moves_pivot` + `test_pan_drag_right_increases_pivot_x` + `test_pan_drag_left_decreases_pivot_x` (`test_ux_polish.gd`)
  - `test_scroll_up_decreases_distance` + `test_scroll_down_increases_distance` (`test_camera_controls.gd`)
  - `test_orbit_horizontal_drag_changes_phi` + `test_orbit_vertical_drag_changes_theta` (`test_camera_controls.gd`)
  - `test_zoom_is_interpolated_not_instantaneous` (`test_ux_polish.gd`) — after scroll, asserts `_distance != _target_distance` (animation still in progress)
  - `test_lod_integration_far_hides_modules_in_built_scene` (`test_spatial_structure.gd`) — smooth LOD-based level transitions

