### Per-requirement verification

**JSON Scene Graph Loading**: `test_anchor_positions_match_json` instantiates a real Node3D,
calls `build_from_graph()`, and asserts `anchor.position.is_equal_approx(Vector3(0,0,0))` and
`mod_anchor.position.is_equal_approx(Vector3(2,0,2))` — this is a real Node3D position
assertion, not a dict-key `.has()` check. ✓

**Containment Rendering**: `test_module_parented_inside_context` asserts
`mod_anchor.get_parent() == ctx_anchor` on real Node3D objects. Translucency asserted via
`mat.transparency != TRANSPARENCY_DISABLED` and `mat.albedo_color.a < 1.0` (actual: 0.18).
Opaqueness asserted via `mat.albedo_color.a >= 1.0` (actual: 1.0). `CULL_DISABLED` verified
on context material. ✓

**Dependency Rendering**: Direction visually indicated by a CylinderMesh arrowhead
(`top_radius=0.0`, pointed tip) placed at the target end — explicit rendering element
(not just color), satisfying "direction is visually indicated" per guidelines. Tests assert
cone existence, `top_radius == 0.0`, proximity to target (< 2 units), and orange color for
cross-context edges. ✓

**Size Encoding**: BoxMesh.size.x set directly from JSON `size` field. Test asserts
proportionality: ratio 9.0/3.0 = 3.0 within 0.001 tolerance on real BoxMesh objects. ✓

**Camera Controls**: `_theta = 0.15` rad (< PI/4 = 45°) satisfies top-down default. Scroll
wheel adjusts `_distance` (clamped). Middle-mouse drag changes `_phi` and `_theta`. `look_at`
called with `Vector3.UP`. All 8 camera tests pass. ✓

**Godot 4.6 — Engine version**: Both `test_engine_version.gd` and `test_godot_version.gd`
call `FileAccess.open("res://project.godot", FileAccess.READ)` + `get_as_text()` and assert
the version string "4.6". `test_main_uses_godot4_fileaccess_api` reads `main.gd` source and
confirms `FileAccess.open(` and `get_as_text()` are present and `File.new()`/`read_as_text()`
are absent. This satisfies: (a) version scenario behavioral test, (b) _ready() FileAccess I/O
tested, (c) API compatibility verified. ✓

