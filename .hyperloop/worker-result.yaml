### Requirement: Abstract Visual Language — COVERED

**SHALL:** Abstract volumes (boxes/spheres/primitives), no metaphors.

**Implementation:**
- `godot/scripts/main.gd`: BoxMesh for bounded contexts (translucent blue) and modules (opaque green). No buildings, terrain, or thematic decoration.
- `extractor/extractor.py` `size_from_loc()`: Size = f(LOC), log-scaled
- `godot/scripts/main.gd:84-93`: Modules added as scene-tree children of context anchors (containment = nesting)

**Test Coverage:**
- `test_mesh_instances_exist_in_anchors` (`godot/tests/test_scene_graph_loading.gd:52`): Each anchor has MeshInstance3D child.
- `test_mesh_sizes_proportional_to_metric` (`godot/tests/test_size_encoding.gd:68`): `abs(actual_ratio - 3.0) < 0.001` ✓
- `test_distinct_contexts_occupy_distinct_regions` (`godot/tests/test_spatial_structure.gd:176`): Position reflects coupling.
- `test_containment_expressed_as_scene_tree_parenting` (`godot/tests/test_spatial_structure.gd:228`): `mod_anchor.get_parent() == ctx_anchor`.
- `test_context_boundary_is_visually_distinct_translucent` (`godot/tests/test_spatial_structure.gd:193`): alpha < 1.0 for bounded context material.

