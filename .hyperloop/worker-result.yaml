### Requirement: Dependency Rendering — COVERED

**Implementation:** `godot/scripts/main.gd` → `_create_edge()`
- Creates `ImmediateMesh` with `PRIMITIVE_LINES` between `from_pos` and `to_pos` ✓
- Creates `CylinderMesh` (top_radius=0 = cone/arrowhead) placed at target end,
  oriented via `Basis(Quaternion(Vector3.UP, dir))` — direction visually indicated ✓
- Cross-context edges use orange color `Color(1.0, 0.50, 0.10)`; internal use grey

**Tests:** `godot/tests/test_dependency_rendering.gd`
- `test_edge_line_mesh_created()` — asserts `ImmediateMesh` exists in main node children ✓
- `test_direction_indicator_cone_created()` — asserts `CylinderMesh` with `top_radius == 0.0` ✓
- `test_direction_cone_near_target()` — asserts cone position within 2 units of `to_pos` ✓
- `test_cross_context_cone_is_orange()` — asserts cone `albedo_color.r > 0.8` and `b < 0.3` ✓

All THEN clauses of the "Rendering a cross-context dependency" scenario are covered.

