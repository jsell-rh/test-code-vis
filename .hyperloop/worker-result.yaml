### Requirement: Size Encoding — COVERED

**Implementation**
- `_create_volume()` line 131: `var sz: float = float(nd["size"])`.
- Applied directly to `BoxMesh.size`: modules get `Vector3(sz, sz*0.6, sz)`, contexts get
  `Vector3(sz, sz*0.2, sz)`. The linear mapping means size ratios are preserved exactly.
- The `size` field is set by the Python extractor from lines-of-code; Godot reads it without
  recomputation — appropriate separation of concerns in the two-stage pipeline.

**Tests** (`test_size_encoding.gd`, fixture: `small_mod size=3.0`, `large_mod size=9.0`)
- `test_large_module_has_bigger_mesh()` — asserts `large_mesh.size.x > small_mesh.size.x`.
  Covers THEN "module with more code appears as a larger volume".
- `test_mesh_sizes_proportional_to_metric()` — asserts ratio `large/small == 3.0 ± 0.001`.
  Covers AND "relative sizes are proportional to the metric".

