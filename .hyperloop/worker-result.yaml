## Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

`main.gd._ready()` uses `FileAccess.open()` + `file.get_as_text()` (Godot 4.6 API),
parses via `JSON.new()` + `json.parse()`, delegates to
`SceneGraphLoader.load_from_dict(json.data)`, then calls `build_from_graph(graph)`.
`build_from_graph()` iterates nodes calling `_create_volume()` and edges calling
`_create_edge()`. Positions are set directly from JSON x/y/z.

`test_scene_graph_loading.gd` (5 tests):
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1") and _anchors.has("mod1")`
- `test_mesh_instances_exist_in_anchors` — confirms MeshInstance3D children exist per anchor
- `test_edge_mesh_instances_created` — asserts ≥2 MeshInstance3D on main node (line + cone)
- `test_anchor_positions_match_json` — asserts `anchor.position.is_equal_approx(Vector3(...))`
  against JSON fixture values for both nodes (real Node3D property check, not dict-key)
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED, pixel_size > 0, no_depth_test

### Requirement: Containment Rendering — COVERED

`_create_volume()` creates bounded_context nodes as translucent BoxMesh slabs
(`TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`) and module nodes
as opaque boxes (`albedo_color.a = 1.0`). Child nodes are parented to their parent's
anchor Node3D in the scene tree.

`test_containment_rendering.gd` (5 tests):
- `test_bounded_context_is_translucent` — asserts `transparency != TRANSPARENCY_DISABLED and albedo_color.a < 1.0`
- `test_module_is_opaque` — asserts `albedo_color.a >= 1.0`
- `test_module_parented_inside_context` — asserts `mod_anchor.get_parent() == ctx_anchor`
- `test_bounded_context_larger_than_module` — asserts `ctx_mesh.size.x > mod_mesh.size.x`
- `test_bounded_context_cull_disabled` — asserts `mat.cull_mode == CULL_DISABLED`

### Requirement: Dependency Rendering — COVERED

`_create_edge()` creates an `ImmediateMesh` with `PRIMITIVE_LINES` between world-space
positions. Direction is visually indicated by a `CylinderMesh` (top_radius=0.0,
bottom_radius=0.25) cone arrowhead placed at the target end. Cross-context edges use
orange `Color(1.0, 0.50, 0.10)`; internal edges use grey. "Visually indicated" is
satisfied by the explicit cone arrowhead rendering element — not a plain line or colour
difference alone.

`test_dependency_rendering.gd` (4 tests):
- `test_edge_line_mesh_created` — confirms ImmediateMesh MeshInstance3D exists
- `test_direction_indicator_cone_created` — confirms CylinderMesh with `top_radius == 0.0` exists
- `test_direction_cone_near_target` — asserts cone `position.distance_to(target_pos) < 2.0`
- `test_cross_context_cone_is_orange` — asserts cone `mat.albedo_color.r > 0.8 and b < 0.3`

### Requirement: Size Encoding — COVERED

`_create_volume()` sets `box.size = Vector3(sz, sz * 0.6, sz)` where `sz = float(nd["size"])`.
Width is directly proportional to the input size metric.

`test_size_encoding.gd` (2 tests with fixture: size 3.0 vs 9.0):
- `test_large_module_has_bigger_mesh` — asserts `large_mesh.size.x > small_mesh.size.x`
- `test_mesh_sizes_proportional_to_metric` — asserts ratio within 0.001 of expected 3.0×

### Requirement: Camera Controls — COVERED

`camera_controller.gd` implements spherical-coordinate orbit camera. `_theta = 0.15`
(near top-down), WHEEL_UP/DOWN zoom with clamping, middle-mouse drag orbits via `_phi`
and `_theta` (clamped [0.01, PI-0.01] to prevent pole-flip), `look_at(_pivot, Vector3.UP)`
ensures intuitive orientation. Pan implemented via right-mouse drag.

`test_camera_controls.gd` tests:
- Top-down default: asserts `_theta < PI/4`
- Zoom in/out: asserts distance decreases/increases on WHEEL_UP/WHEEL_DOWN events
- Zoom clamped: scrolls 200× and asserts `_distance >= min_distance`
- Orbit: asserts `_phi != initial_phi` after horizontal drag, `_theta != initial_theta` after vertical
- Labels readable: `test_labels_are_billboard_and_readable` in `test_scene_graph_loading.gd`

### Requirement: Godot 4.6 — COVERED

`project.godot` declares `config/features=PackedStringArray("4.6")`. All scripts are `.gd`
(GDScript). `main.gd._ready()` uses `FileAccess.open()` + `file.get_as_text()` (Godot 4.6
API, not deprecated `read_as_text()`). No C# or Mono present.

`test_engine_version.gd` (4 tests, all using `FileAccess.open()` + `get_as_text()`):
- Asserts `project.godot` contains `"4.6"`
- Asserts `config/features` present and contains `'"4.6"'`
- Asserts no `"Mono"` or `"C#"` in project.godot
- Asserts `get_as_text()` returns non-empty string beginning with `"; Engine configuration"`

