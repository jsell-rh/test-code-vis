### Requirement: Zoom to Detail — COVERED

**Scenario: Zooming into IAM**
- GIVEN the top-down view showing all bounded contexts
- WHEN the user zooms into the IAM context
- THEN the internal layers become visible
- AND internal dependencies are shown
- AND the user can see relative sizes of internal modules

**Implementation:**
- `lod_manager.gd`: LOD thresholds FAR (>80), MEDIUM (20–80), NEAR (≤20).
  - FAR: only bounded_context nodes visible; all edges hidden
  - MEDIUM: bounded_context + module nodes visible; cross-context edges visible
  - NEAR: all nodes and all edges visible
- Module nodes are scene-tree children of their bounded context anchor (containment)
- Size encoding: `box.size = Vector3(sz, sz * 0.6, sz)` — proportional to LOC metric

**Tests:**
- `test_spatial_structure.gd::test_medium_distance_shows_modules` — modules
  visible at medium LOD distance ✓
- `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail` —
  internal edges visible at near distance ✓
- `test_size_encoding.gd::test_large_module_has_bigger_mesh` — larger size → larger mesh ✓
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` — ratio matches ✓

| THEN clause | Test | Status |
|---|---|---|
| Internal layers become visible at zoom | test_medium_distance_shows_modules | COVERED |
| Internal dependencies shown at near zoom | test_near_distance_shows_internal_edges_as_fine_detail | COVERED |
| Relative sizes of internal modules visible | test_large_module_has_bigger_mesh, test_mesh_sizes_proportional_to_metric | COVERED |

