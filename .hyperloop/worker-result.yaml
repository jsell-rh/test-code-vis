## Implementation Summary

All 5 MUST requirements from `specs/prototype/ux-polish.spec.md` are implemented in
`godot/scripts/camera_controller.gd` and covered by named behavioral tests in
`godot/tests/test_camera_controls.gd`.

### REQ-1: Pan with Left Mouse Button — COVERED

**Implementation (`camera_controller.gd`):**
- `_handle_button()` sets `_panning = event.pressed` on `MOUSE_BUTTON_LEFT` (line 102–104)
- `_handle_motion()` when `_panning` shifts `_target_pivot += right * delta.x * pan_amount`
  and `_target_pivot -= backward * delta.y * pan_amount` (lines 141–158)

**THEN-clauses:**
- THEN the camera pans in the direction of the drag → `test_lmb_drag_pans_camera`: asserts `cam._pivot != initial_pivot`
- AND the movement direction matches (not inverted) → `test_pan_direction_not_inverted`: rightward drag at phi=π/2 → `cam._pivot.x > 0.0`

### REQ-2: Non-Inverted Movement — COVERED

**Implementation:** Pan formula `_target_pivot += right * delta.x * pan_amount` directly
adds the drag delta — rightward drag (delta.x > 0) shifts pivot right (non-inverted, Google Maps style).

**THEN-clause:**
- THEN scene moves in same direction as drag → `test_pan_direction_not_inverted`: phi=π/2, 50px right drag → `cam._pivot.x > 0.0`

### REQ-3: Zoom Toward Mouse Cursor — COVERED

**Implementation:** `_zoom_toward_point(world_pt, direction)` computes
`zoom_ratio = _target_distance / old_dist` then shifts
`_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.

**THEN-clauses:**
- THEN view zooms toward cursor → `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (10,0,0), zoom in → `_target_pivot.x > 0`
- AND component stays under cursor → `test_zoom_in_cursor_point_invariant`: cursor at (20,0,0), zoom in → `0 < _target_pivot.x < 20`
- THEN view zooms out from cursor → `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (10,0,0), zoom out → `_target_pivot.x < 0`

### REQ-4: Orbit Around Mouse Point — COVERED

**Implementation:** RMB press calls `_get_ground_point_under_cursor(event.position)` then
`begin_orbit_at_world_point(world_pt)` which sets `_pivot = world_pt` and recomputes spherical
coordinates so the camera does not jump (lines 73–85).

**THEN-clauses:**
- THEN camera orbits around point under cursor at orbit start → `test_orbit_uses_right_mouse_button`: RMB + horizontal drag → `cam._phi != initial_phi`; `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(Vector3(5,0,3))` → `cam._pivot == world_pt`
- AND component remains at visual center → `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` after orbit begins

### REQ-5: Smooth Camera Movement — COVERED

**Implementation (zoom):** `_zoom_toward_point()` only sets `_target_distance`/`_target_pivot`.
`_process()` interpolates via exponential smoothing: `t = 1 - pow(0.05, delta * zoom_smooth)`
then `_distance = lerpf(_distance, _target_distance, t)`.

**Implementation (pan):** Pan amount is `pan_speed * (_distance * 0.05 + 1.0)`, proportional
to current distance and drag delta.

**THEN-clauses:**
- THEN zoom is animated smoothly (interpolated) → `test_smooth_zoom_target_differs_from_distance_after_scroll`: after scroll, `_target_distance < _distance` (not snapped); `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`, `20 < _distance < 40`
- THEN pan is smooth and proportional to drag speed → `test_pan_proportional_to_drag_speed`: 50px drag produces larger pivot displacement than 10px drag

