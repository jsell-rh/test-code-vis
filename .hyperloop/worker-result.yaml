### Key Findings

**Direction indicator** satisfies the "visually indicated" requirement: `_create_edge()` places a `CylinderMesh` (top_radius=0 = pointed cone) at the target end, oriented along the edge direction via `Basis(Quaternion(Vector3.UP, dir))`. This is an explicit rendering element, not merely a colour difference.

**Containment** is rendered with child anchors parented to parent anchors in the scene tree, and the bounded-context BoxMesh is larger and translucent (alpha=0.18, TRANSPARENCY_ALPHA, CULL_DISABLED) vs child modules which are opaque (alpha=1.0).

**Camera** defaults to theta=0.15 rad (~8.6° from vertical = near top-down). Middle-mouse drag orbits, scroll wheel zooms (clamped), right-mouse drag pans. `look_at(_pivot, Vector3.UP)` keeps up-vector consistent. Labels use `BILLBOARD_ENABLED` so they remain readable at any distance or angle.

**Size encoding** maps `nd["size"]` linearly to BoxMesh dimensions; the 3:1 ratio test confirms proportionality.

### Note on State Files
The branch diff vs main includes changes to `.hyperloop/state/` files. These are not from implementation commits — they result from the branch diverging from main at a point where orchestrator state differed. The two implementation commits (`a02ffac`, `12ac742`) touch only `godot/` and `.hyperloop/worker-result.yaml`. The state file divergence is what caused the prior 3 merge failures; the implementation itself is clean.
