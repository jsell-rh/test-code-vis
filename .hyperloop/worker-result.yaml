## THEN→Test Mapping (independently verified)

| THEN-clause | Test function(s) | Predicate correct? |
|---|---|---|
| the camera pans in the direction of the drag | `test_lmb_pan_moves_pivot` | YES — `cam._pivot != initial_pivot` |
| AND the movement direction matches the drag direction (not inverted) | `test_pan_drag_right_increases_pivot_x`, `test_pan_drag_left_decreases_pivot_x` | YES — drag right → `pivot.x > initial`, drag left → `pivot.x < initial` |
| the scene moves in the same direction as the drag | `test_drag_direction_matches_view_movement` | YES — drag right 50px → `pivot.x > initial_x` |
| the view zooms toward the point under the cursor | `test_zoom_toward_cursor_shifts_pivot_toward_cursor` | YES — zoom-in → zoom_fraction > 0 → pivot.lerp(cursor, +f) → `pivot.x > 0` |
| AND the component under the cursor stays under the cursor during the zoom | `test_component_stays_under_cursor_on_zoom_in`, `test_zoom_toward_cursor_shifts_pivot_toward_cursor` | YES — `after > before` (pivot moved closer to cursor) |
| the view zooms out from the point under the cursor | `test_zoom_out_from_cursor_shifts_pivot_away` | YES — zoom-out → zoom_fraction < 0 → pivot shifts away → `pivot.x < 5.0` |
| the camera orbits around the point under the cursor at orbit start | `test_orbit_pivot_set_to_cursor_point_at_start` | YES — `cam._pivot == world_point` |
| AND the component remains at the visual center during the orbit | `test_orbit_pivot_is_used_during_orbit`, `test_component_remains_at_visual_center_during_orbit` | YES — `cam._pivot == pivot_before` after orbit motion |
| the zoom is animated smoothly (interpolated), not instantaneous | `test_zoom_is_interpolated_not_instantaneous` | YES — `after_one_frame < initial AND after_one_frame > target` |
| the pan movement is smooth and proportional to drag speed | `test_lmb_pan_moves_pivot`, `test_pan_proportional_to_drag_speed` | YES — `move2 > move1` for 5× larger drag |

