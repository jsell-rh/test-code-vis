### R5: Performance at Kartograph Scale (MUST) — COVERED (PASS-WITH-NOTE)

**Code:** `godot/scripts/lod_manager.gd` implements level-of-detail visibility control
keyed on camera distance (far → bounded_context only; medium → + modules; near → all
nodes + edges). `main.gd` registers every node and edge with the LOD manager and calls
`update_lod()` each frame.

**Scenario: Smooth navigation — tests verified:**

| THEN clause | Test function | File |
|---|---|---|
| Scene builds at kartograph scale (60 nodes) | `test_kartograph_scale_anchor_count` | test_nfr_scale.gd |
| All 6 bounded context anchors created | `test_kartograph_scale_context_anchors_exist` | test_nfr_scale.gd |
| All 54 module anchors created | `test_kartograph_scale_module_anchors_exist` | test_nfr_scale.gd |
| World positions for all 60 nodes populated | `test_kartograph_scale_build_produces_world_positions` | test_nfr_scale.gd |

Fixture: 6 bounded contexts × 9 modules = 60 nodes, matching kartograph's real scale.
FPS measurement (>30fps) and stutter detection require a GPU render pipeline and cannot
be automated in headless CI. Scene-build correctness at full scale is fully tested.
Marked PASS-WITH-NOTE per guidelines (genuinely untestable THEN-clauses).

