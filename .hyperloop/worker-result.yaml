## Implementation Notes

### Pan (LMB drag) — non-inverted
`camera_controller.gd` lines 101–103: `MOUSE_BUTTON_LEFT` sets `_panning = true`.
Lines 141–160: derives `right` (basis.x) and `backward` (flattened basis.z), then:
`_target_pivot -= right * delta.x * pan_amount` and `_target_pivot -= backward * delta.y * pan_amount`.
Immediately copies to `_pivot` for zero-latency response.
Google Maps sign: drag left (delta.x < 0), at phi=PI/2 right=(+X), so pivot.x increases → scene shifts left. ✓

### Zoom toward cursor
Lines 120–128: scroll events call `_zoom_toward_point(world_pt, direction)` using
`_get_ground_point_under_cursor(_last_mouse)` for the target point.
Lines 170–178: `_zoom_toward_point` adjusts `_target_distance` then shifts
`_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio` to keep the
cursor point invariant. Actual `_distance`/`_pivot` interpolate in `_process()`.

### Orbit around cursor point (RMB)
Lines 111–118: RMB press calls `begin_orbit_at_world_point(cursor_world_point)`.
Lines 73–85: recomputes spherical coordinates from current camera position to the
new pivot (world_pt) — camera doesn't jump, only orbit centre changes.

### Smooth movement
`_process()` uses exponential smoothing: `t = 1 - pow(0.05, delta * zoom_smooth)`,
then `_distance = lerpf(_distance, _target_distance, t)` and
`_pivot = _pivot.lerp(_target_pivot, t)`. Pan is immediate; zoom/pivot are interpolated.

### Clamping
- `_theta` clamped to [0.01, PI−0.01] (prevents pole flip)
- `_distance` clamped to [min_distance, max_distance]
- Boundary tests: `test_theta_clamped_at_minimum`, `test_theta_clamped_at_maximum`,
  `test_set_pivot_clamps_distance_at_minimum`, `test_zoom_clamped_at_minimum`
