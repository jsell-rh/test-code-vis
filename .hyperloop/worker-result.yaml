### Spec Scenario Coverage

Each spec scenario has a dedicated `test_*.gd` file in `godot/tests/`. All tests
instantiate real `Node3D` (or `Camera3D`) objects and assert concrete property values —
no dict-key-only (`has()`) checks.

#### JSON Scene Graph Loading — PASS

`main.gd._ready()` is NOT a stub. It calls `FileAccess.open()` + `get_as_text()`,
parses JSON, calls `SceneGraphLoader.load_from_dict()`, then `build_from_graph()`.

`test_scene_graph_loading.gd` (5 tests):
- Asserts `_anchors` has an entry per node id
- Asserts each anchor contains a `MeshInstance3D` child
- Asserts edge geometry: ≥2 `MeshInstance3D` children on root (1 line + 1 arrowhead)
- Asserts `anchor.position.is_equal_approx(Vector3(x,y,z))` — real position check
- Asserts `Label3D.billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true`

#### Containment Rendering — PASS

`_create_volume()` sets `TRANSPARENCY_ALPHA` + `albedo_color.a = 0.18` + `CULL_DISABLED`
for bounded_context nodes; `albedo_color.a = 1.0` (fully opaque) for modules. Child
anchors are parented directly to the parent context anchor (scene-tree nesting).

`test_containment_rendering.gd` (5 tests):
- Asserts bounded context `mat.transparency != TRANSPARENCY_DISABLED and albedo_color.a < 1.0`
- Asserts module `albedo_color.a >= 1.0`
- Asserts `mod_anchor.get_parent() == ctx_anchor` (nesting)
- Asserts `ctx_mesh.size.x > mod_mesh.size.x` (larger volume)
- Asserts `mat.cull_mode == CULL_DISABLED` (visible boundary from all angles)

#### Dependency Rendering — PASS

`_create_edge()` produces an `ImmediateMesh` line (PRIMITIVE_LINES) and a
`CylinderMesh` with `top_radius = 0.0` (cone / arrowhead) at the target end.
Direction is visually indicated by the distinct cone geometry — not just colour.

`test_dependency_rendering.gd` (4 tests):
- Asserts `ImmediateMesh` child exists on root
- Asserts `CylinderMesh` with `top_radius == 0.0` exists (cone)
- Asserts cone `position.distance_to(target_pos) < 2.0` (positioned at target end)
- Asserts cross-context cone `albedo_color.r > 0.8 and .b < 0.3` (orange)

#### Size Encoding — PASS

`box.size = Vector3(sz, sz * 0.6, sz)` where `sz = float(nd["size"])` → mesh width is
linearly proportional to the JSON size field.

`test_size_encoding.gd` (2 tests):
- Asserts `large_mesh.size.x > small_mesh.size.x`
- Asserts `abs(9.0/3.0 - actual_ratio) < 0.001` (proportionality)

#### Camera Controls — PASS

`camera_controller.gd`: `_theta = 0.15` (≈ 8.6°, top-down default); scroll adjusts
`_distance` with `clamp()`; middle-mouse drag adjusts `_phi` and `_theta`; `_theta`
clamped to `[0.01, PI-0.01]` so orientation stays stable.

`test_camera_controls.gd` (8 tests):
- Asserts `_theta < PI/4` (top-down default)
- Asserts `_distance > 0`
- Asserts WHEEL_UP decreases distance, WHEEL_DOWN increases it
- Asserts horizontal drag changes `_phi`, vertical drag changes `_theta`
- Asserts `set_pivot()` updates `_pivot` and `_distance`
- Asserts repeated WHEEL_UP never drops below `min_distance`

#### Godot 4.6 — PASS

`project.godot`: `config/features=PackedStringArray("4.6")`. All scripts use GDScript 2.0.
`FileAccess.get_as_text()` is the correct Godot 4.6 API call.

