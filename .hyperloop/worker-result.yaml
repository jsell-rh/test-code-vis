## THEN→Test Mapping

Every THEN-clause from specs/prototype/ux-polish.spec.md mapped to its covering test:

| THEN-clause | Tests | Verdict |
|---|---|---|
| THEN the camera pans in the direction of the drag | test_lmb_pan_moves_pivot | PASS |
| AND the movement direction matches the drag direction (not inverted) | test_pan_drag_right_increases_pivot_x, test_pan_drag_left_decreases_pivot_x | PASS |
| THEN the scene moves in the same direction as the drag | test_drag_direction_matches_view_movement, test_pan_drag_down_increases_pivot_z, test_pan_drag_up_decreases_pivot_z | PASS |
| THEN the view zooms toward the point under the cursor | test_zoom_toward_cursor_shifts_pivot_toward_cursor | PASS |
| AND the component under the cursor stays under the cursor during the zoom | test_component_stays_under_cursor_on_zoom_in, test_zoom_cursor_at_pivot_does_not_shift_pivot | PASS |
| THEN the view zooms out from the point under the cursor | test_zoom_out_from_cursor_shifts_pivot_away | PASS |
| THEN the camera orbits around the point under the cursor at orbit start | test_orbit_pivot_set_to_cursor_point_at_start | PASS |
| AND the component remains at the visual center during the orbit | test_component_remains_at_visual_center_during_orbit, test_orbit_pivot_is_used_during_orbit | PASS |
| THEN the zoom is animated smoothly (interpolated), not instantaneous | test_zoom_is_interpolated_not_instantaneous | PASS |
| THEN the pan movement is smooth and proportional to drag speed | test_lmb_pan_moves_pivot, test_pan_proportional_to_drag_speed | PASS |

## Untestable THEN-Clauses

None. All THEN-clauses in the UX polish spec are mechanically testable via
headless GDScript tests operating on the camera controller's internal state.

