### Python Extractor (pre-existing, unchanged by this task)

- Type hints: **present on all functions** in `extractor/extractor.py` and `extractor/schema.py`.
- Hardcoded paths: **none** — `src_path` is accepted as a positional CLI argument.
- Output JSON schema: **consistent** between `extractor/schema.py` (TypedDicts) and
