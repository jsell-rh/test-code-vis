## Direction Predicate Independent Derivation

**Spec reference**: "dragging left reveals content to the right, as in Google Maps"
= drag left → scene scrolls left → camera/pivot shifts right (+X) → exposes +X content.

**Implementation** (`_handle_motion`, panning branch):
```
_target_pivot -= right * delta.x * pan_amount
```
At phi=PI/2, basis.x = world +X.
Drag left: delta.x = −50 → `−= (+X) × (−50) × pan_amount` → `+= +X × 50 × pan_amount` → pivot.x increases ✓

**Test assertion** (`test_pan_direction_not_inverted`):
drag left from x=100 to x=50 → assert `cam._pivot.x > 0.0` ✓ — predicate matches spec.

