### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd`, `_create_volume()`):
- `bounded_context` nodes: `BoxMesh` with `size.x = sz` (large), `mat.transparency =
  TRANSPARENCY_ALPHA`, `mat.albedo_color.a = 0.18`, `mat.cull_mode = CULL_DISABLED`.
- `module` nodes: `BoxMesh` with same `sz`, `mat.albedo_color.a = 1.0` (opaque).
- Children are added to the parent anchor node (scene-tree nesting), placing them
  visually inside the parent volume.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` — verifies `transparency != DISABLED` and
  `albedo_color.a < 1.0`.
- `test_module_is_opaque` — verifies `albedo_color.a >= 1.0`.
- `test_module_parented_inside_context` — verifies
  `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — verifies `ctx BoxMesh.size.x >
  mod BoxMesh.size.x`.
- `test_bounded_context_cull_disabled` — verifies `cull_mode == CULL_DISABLED`,
  distinguishing the parent boundary visually.

All three THEN/AND clauses of the scenario are covered.

