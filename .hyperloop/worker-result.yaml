### F4 -- RACF (cycles 5-8 -> cycle 9, blocking): pytest failure

pytest extractor/tests/ [EXIT 1 -- 1 failed, 109 passed]

FAILED extractor/tests/test_extractor.py::TestLayout::test_child_nodes_are_near_parent_position
AssertionError: Child graph.infrastructure is at distance 9.35 from parent graph,
exceeding scene radius 7.50. Child must be positioned within parent's spatial bounds.

Root cause: extractor.py's compute_layout assigns mod_radius = max(1.5, len(children) * 0.9).
For the 'graph' context with many children, mod_radius exceeds bc_radius (7.50 for 3 BCs).
_circular_positions(..., y=1.0) adds a y-component that inflates 3D Euclidean distance.
There is also a coordinate-frame mismatch: parent positions are world positions, child
positions are local offsets; comparing them directly is semantically wrong.

Fix (choose one):
  (a) Cap mod_radius: mod_radius = min(max(1.5, len(children)*0.9), parent_size*0.4)
      Use y=0.0 for module positions to eliminate y-component inflation.
  (b) Fix the test's coordinate-frame assumption: compare child LOCAL position magnitude
      against parent size rather than world-distance from parent world position.

