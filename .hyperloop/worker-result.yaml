## Requirement: JSON Scene Graph Loading — COVERED

**Spec**: The application MUST load a JSON scene graph file and generate the 3D scene from it.

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` calls `FileAccess.open(scene_graph_path, FileAccess.READ)` then `file.get_as_text()`
  (Godot 4.6 API — not deprecated `read_as_text()`), parses with `JSON.new().parse()`, passes to
  `build_from_graph()`.
- `build_from_graph()` iterates `graph["nodes"]` → `_create_volume()` per node (creates Node3D anchor
  + MeshInstance3D + Label3D), and `graph["edges"]` → `_create_edge()` per edge.
- Node positions are set from JSON `position.{x,y,z}` fields via `_compute_world_positions()`.

**Tests** (`godot/tests/test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` — asserts `_anchors.has("ctx1")` and `_anchors.has("mod1")` ✓
- `test_mesh_instances_exist_in_anchors` — asserts MeshInstance3D child exists in each anchor ✓
- `test_edge_mesh_instances_created` — asserts ≥ 2 MeshInstance3D children on main node (line + cone) ✓
- `test_anchor_positions_match_json` — asserts `anchor.position.is_equal_approx(Vector3(x,y,z))` ✓
- `test_labels_are_billboard_and_readable` — asserts BILLBOARD_ENABLED, pixel_size > 0.0, no_depth_test ✓

All GIVEN/WHEN/THEN conditions of the scenario are covered.

