### Requirement: Size Encoding — COVERED

**Implementation** (`main.gd → _create_volume()`):
- `sz = float(nd["size"])` used directly as `BoxMesh.size` x-dimension; ratio
  between two nodes' mesh widths equals the ratio of their `size` values exactly.

**Tests** (`godot/tests/test_size_encoding.gd` — 2 tests):
- `test_large_module_has_bigger_mesh` — `large_mesh.size.x > small_mesh.size.x`.
- `test_mesh_sizes_proportional_to_metric` — ratio 9.0/3.0 = 3.0 within 0.001
  floating-point tolerance.

