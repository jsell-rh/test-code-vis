## Requirement: Evaluation Mode — COVERED

Implementation: `godot/scripts/understanding_overlay.gd` → `apply_quality_overlay()`
  - Computes in_degree per node from edges_data.
  - Detects mutual (bidirectional) edge pairs.
  - in_degree >= 3  → CRITICAL_COLOR (deep red, single-point-of-failure risk).
  - in_degree == 2 or mutual edge → COUPLED_COLOR (orange, tight coupling).
  - Operates independently of spec_status so architectural problems are visible
    even when conformance is perfect.
  Wired via `main.gd::_apply_quality_overlay()` (J key).

### Scenario: Detecting tight coupling — COVERED
- Test: `test_coupling_between_services_apparent` — GIVEN svc_a→svc_b AND svc_b→svc_a
  mutual edges, WHEN quality overlay applied, THEN both receive COUPLED_COLOR.

### Scenario: Identifying single point of failure — COVERED
- Test: `test_critical_component_centrality_apparent` — GIVEN hub with three incoming
  edges (svc1, svc2, svc3 all depend on hub), WHEN quality overlay applied, THEN hub
  receives CRITICAL_COLOR.
- Test: `test_critical_color_distinct_from_normal` — confirms CRITICAL_COLOR ≠
  COUPLED_COLOR and CRITICAL_COLOR ≠ ALIGNED_COLOR (risk levels are distinguishable).

### Scenario: Spec is faithfully implemented but architecturally poor — COVERED
- Test: `test_quality_overlay_independent_of_alignment` — GIVEN hub with
  spec_status "aligned" (perfect conformance) but in_degree == 3, WHEN quality overlay
  applied, THEN hub still receives CRITICAL_COLOR regardless of alignment status.

