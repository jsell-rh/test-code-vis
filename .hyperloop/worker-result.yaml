- All five scripts in `godot/scripts/` are `.gd` files (GDScript): `main.gd`, `camera_controller.gd`, `scene_graph_loader.gd`, `view_spec.gd`, `view_spec_renderer.gd`.

**Scenario: Engine version — COVERED**
The project.godot feature flag directly satisfies "it uses Godot 4.x". All test files being `.gd` and successfully compiled/executed under Godot 4.6.2 satisfies "all scripts are GDScript". The behavioral tests in `godot/tests/` are themselves GDScript and run under Godot 4.x, proving the requirement by execution.

