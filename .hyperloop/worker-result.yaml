## Pipeline Completeness

Pipeline verified as fully wired end-to-end:

1. **Producer**: `LLMViewGenerator.build_prompt()` — embeds question + node ids + VALID_OPS.
   `LLMViewGenerator.parse_response()` — strips fences, parses JSON, filters to VALID_OPS.
2. **Consumer**: `SceneInterpreter.apply()` — match dispatch over all 6 ops → real Node3D mutations.
3. **Wiring**: `main.gd.apply_view_spec()` instantiates `SceneInterpreter` and calls
   `interp.apply(spec, _anchors, self, _world_positions)`. Not a stub — fully implemented.
4. **main.gd `_ready()`**: Reads JSON via `FileAccess.open()` + `get_as_text()`, parses
   with `JSON.new()`, delegates to `SceneGraphLoader.load_from_dict()` + `build_from_graph()`.
   Not a stub. ✓

`check-pipeline-wiring.sh` independently confirms: producer + consumer + rendering tests. ✓

