### Requirement: Not In Scope — COVERED WITH OBSERVATIONS

**Conformance mode:** NOT present in codebase ✓
**Evaluation mode:** NOT present ✓
**Simulation mode:** NOT present ✓
**Data flow visualization:** NOT present ✓
**First-person navigation:** NOT present ✓

**Observations (not a FAIL for task-008):**
- `godot/scripts/view_spec.gd` and `view_spec_renderer.gd` provide visual primitive infrastructure
  (show/hide/highlight/arrange/annotate/connect). These were added by earlier completed tasks
  (noted as "from completed prior tasks" in `run_tests.gd`). They do NOT include LLM integration;
  the "LLM-powered question-driven" aspect of moldable views is absent. Task-008 did not introduce
  these files.
- `extractor.py::extract_spec_nodes()` exists but is disabled by default and only activated via
  `--specs` flag. `test_no_spec_nodes_when_not_enabled` confirms this. Task-008 did not introduce
  this function.
- No test asserts absence of in-scope features (not practically testable).

These observations are inherited from prior tasks. Task-008's own deliverables (main.gd,
camera_controller.gd, their corresponding tests) are strictly within prototype scope.

