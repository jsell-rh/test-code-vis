## Requirement: Question-Driven View Generation

**Status: COVERED**

Implementation:
- `godot/scripts/llm_view_generator.gd` — `build_prompt(question, graph)` constructs a
  prompt embedding the question text plus all graph node ids, directing the LLM to emit
  a view spec that identifies and arranges relevant components.
- `godot/scripts/scene_interpreter.gd` — `apply(spec, anchors, scene_root, world_positions)`
  interprets show/hide/arrange/connect operations, producing visible spatial mutations.
- `godot/scripts/main.gd` — `apply_view_spec(spec)` wires both stages together.

