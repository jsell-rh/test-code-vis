### Requirement: Containment Rendering — COVERED

THEN "bounded context appears as a larger translucent volume":
  `_create_volume()` sets `mat.transparency = TRANSPARENCY_ALPHA`,
  `mat.albedo_color.a = 0.18` for bounded_context type nodes.
  Tests: `test_bounded_context_is_translucent`, `test_bounded_context_larger_than_module`.

THEN "child modules appear as smaller opaque volumes inside it":
  Module nodes get `mat.albedo_color.a = 1.0`; their anchors are `add_child`-ed to the
  parent context's anchor node (scene-tree nesting).
  Tests: `test_module_is_opaque`, `test_module_parented_inside_context`.

THEN "boundary of parent is visually distinct from children":
  `mat.cull_mode = CULL_DISABLED` on bounded_context makes both faces visible,
  distinguishing it from opaque children.
  Test: `test_bounded_context_cull_disabled`.

