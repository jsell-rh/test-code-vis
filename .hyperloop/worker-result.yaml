### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 120–128: `MOUSE_BUTTON_WHEEL_UP/DOWN` call `_get_ground_point_under_cursor(_last_mouse)`,
  then pass the world point to `_zoom_toward_point(world_pt, direction)`.
- Lines 168–176: `_zoom_toward_point` computes `zoom_ratio = new_dist / old_dist` and shifts
  `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`, keeping cursor invariant.

**Scenario: Zooming into a specific component** — COVERED
- Test `test_zoom_in_shifts_pivot_toward_cursor` (lines 197–206):
  Cursor at `(10,0,0)`, zoom in → `cam._target_pivot.x > 0.0`. ✓
- Test `test_zoom_in_cursor_point_invariant` (lines 213–223):
  Cursor at `(20,0,0)`, zoom in → `0 < pivot.x < 20`, confirming cursor stays invariant. ✓

**Scenario: Zooming out** — COVERED
- Test `test_zoom_out_shifts_pivot_away_from_cursor` (lines 228–240):
  Cursor at `(10,0,0)`, zoom out → `cam._target_pivot.x < 0.0` (pivot retreats from cursor). ✓

