## Implementation Summary

The UX Polish spec requirements are implemented in `godot/scripts/camera_controller.gd`
and tested in `godot/tests/test_camera_controls.gd`.

### Pan with Left Mouse Button (non-inverted)
`_handle_button()` routes `MOUSE_BUTTON_LEFT` press to set `_panning = true`.
`_handle_motion()` when `_panning` computes `right = transform.basis.x` and
`backward` from `basis.z`, then applies `_target_pivot += right * delta.x * pan_amount`
and `_target_pivot -= backward * delta.y * pan_amount`. Non-inverted: drag right →
pivot shifts right.

### Zoom Toward Mouse Cursor
`_zoom_toward_point(world_pt, direction)` adjusts `_target_distance` and then shifts
`_target_pivot` by `zoom_ratio = _target_distance / old_dist` so the cursor point
stays fixed. Only targets mutate; `_distance`/`_pivot` interpolate in `_process()`.

### Orbit Around Mouse Point
`MOUSE_BUTTON_RIGHT` press calls `begin_orbit_at_world_point()` which sets
`_pivot = world_pt` and recomputes spherical coordinates to avoid camera jump.
The camera then orbits with `_pivot == world_pt` — the world point stays at visual centre.

### Smooth Camera Movement
`_process(delta)` uses exponential smoothing:
`t = 1.0 - pow(0.05, delta * zoom_smooth)` then
`_distance = lerpf(_distance, _target_distance, t)` and
`_pivot = _pivot.lerp(_target_pivot, t)`.
Scroll events only set `_target_distance`; actual distance interpolates across frames.

