### Requirement: Godot 4 — COVERED

**Implementation**:
- `project.godot`: `config/features=PackedStringArray("4.6")` — Godot 4.6.
- All scripts (`main.gd`, `camera_controller.gd`, all test files) are GDScript
  (`.gd` extension, `extends` keyword).
- No behavioral test is needed for this requirement; it is a project
  configuration fact verified by inspecting `project.godot`.

