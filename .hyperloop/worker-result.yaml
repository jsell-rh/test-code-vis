### Requirement 1: JSON Scene Graph Loading — COVERED

**Implementation (main.gd)**
- `_ready()` calls `FileAccess.open()` + `file.get_as_text()` — valid Godot 4.6 API.
- Parsed via `JSON.new()` / `json.parse()` / `json.data`.
- `build_from_graph()` iterates `nodes` → `_create_volume()` and `edges` → `_create_edge()`.
- `anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))` uses JSON layout coords directly.

**Scenario: Loading kartograph's scene graph — all THEN clauses covered**
- THEN reads the JSON file: `FileAccess.get_as_text()` in `_ready()`.
- AND generates 3D volumes for each node: `_create_volume()` creates `MeshInstance3D` with `BoxMesh` per node.
- AND generates connections for each edge: `_create_edge()` creates `ImmediateMesh` line + cone arrowhead per edge.
- AND positions elements according to layout data: `anchor.position` set from JSON `position.x/y/z`.

**Tests: `test_scene_graph_loading.gd`**
- `test_volumes_created_for_each_node()` — asserts `_anchors` contains every node id.
- `test_mesh_instances_exist_in_anchors()` — asserts `MeshInstance3D` child exists in each anchor.
- `test_edge_mesh_instances_created()` — asserts ≥2 `MeshInstance3D` children at root (line + arrowhead).
- `test_anchor_positions_match_json()` — asserts `anchor.position` matches JSON `position` dict.
- `test_labels_are_billboard_and_readable()` — covers the zooming scenario's "labels scale to remain readable" THEN clause.

