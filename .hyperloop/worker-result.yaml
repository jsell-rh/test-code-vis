### Requirement: Simulation Mode — COVERED

> The system MUST allow the human to explore the impact of hypothetical changes before
> committing to them.

**Implementation (split):** `apply_split_overlay(target_id, graph, anchors, scene_root)`
finds all services with an outgoing edge to `target_id`, colours them `AFFECTED_COLOR`,
and adds a scene-root `Label3D` with text "requires new interface".

**Implementation (failure):** `apply_failure_overlay(target_id, graph, anchors, scene_root)`
BFS-traverses the reverse-dependency graph from `target_id`, colours every transitively
affected node `AFFECTED_COLOR`, and adds a scene-root `Label3D` with text "AFFECTED".
The origin node is excluded so the failure source is distinguishable.

#### Scenario: Splitting a service — COVERED
- THEN "impact on dependent services is visible"
  → `test_split_impact_on_dependents_visible`: `svc_a` (which has an edge → monolith)
    receives `AFFECTED_COLOR` when the monolith split is simulated.
- AND "new dependencies or interfaces that would be required are shown"
  → `test_split_shows_required_new_interfaces`: the scene root contains a `Label3D`
    with text "requires new interface".

#### Scenario: Failure injection — COVERED
- THEN "cascade of effects through the system is visible"
  → `test_failure_cascade_effects_visible`: in a chain svc_b→svc_a and svc_c→svc_b,
    failing svc_a colours both svc_b (direct) and svc_c (transitive) as `AFFECTED_COLOR`.
- AND "components that would be affected are clearly identified"
  → `test_failure_affected_components_clearly_identified`: the scene root contains a
    `Label3D` with text "AFFECTED" for the affected component.

