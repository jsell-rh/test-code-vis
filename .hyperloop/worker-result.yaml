### Requirement: Dependency Visualization — COVERED

**Spec:** The prototype MUST show dependencies between modules as visible connections.

**Scenario: Cross-context dependency**

| THEN-clause | Implementation | Test |
|---|---|---|
| Line/connection drawn between contexts | `main.gd::_create_edge()` → ImmediateMesh PRIMITIVE_LINES | `test_dependency_rendering.gd::test_edge_line_mesh_created` |
| Direction of dependency discernible | CylinderMesh cone (top_radius=0) at target end; orange for cross_context | `test_dependency_rendering.gd::test_direction_indicator_cone_created` + `test_direction_cone_near_target` + `test_cross_context_cone_is_orange` |

---

### Requirement: Navigation — COVERED

**Spec:** The prototype MUST support basic spatial navigation.

**Scenario: Moving through the space**

| THEN-clause | Implementation | Test |
|---|---|---|
| Pan | `camera_controller.gd::_handle_motion()` LMB drag: pivot += right*delta*pan_amount | `test_ux_polish.gd::test_lmb_pan_moves_pivot` |
| Zoom | `_handle_button()` WHEEL_UP/DOWN → `_zoom_toward_cursor()` | `test_camera_controls.gd::test_scroll_up_decreases_distance` |
| Rotate/orbit | `_handle_motion()` RMB drag: `_phi -= delta.x * orbit_speed` | `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` |
| Smooth zoom transition | `_process()` lerps `_distance` → `_target_distance` | `test_ux_polish.gd::test_zoom_is_interpolated_not_instantaneous` |
| LOD overview↔detail levels | `lod_manager.gd` three-level FAR/MEDIUM/NEAR system | `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts` + `test_near_distance_shows_all_nodes` |

