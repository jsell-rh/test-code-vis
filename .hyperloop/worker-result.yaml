## Direction Derivation (i.e. parenthetical)

THEN-clause: "the scene moves in the same direction as the drag
(i.e. dragging left reveals content to the right, as in Google Maps)"

Independent derivation from the i.e. definition (derived before reading test body):
1. "dragging left reveals content to the right" is the Google Maps grab model.
2. Drag left means delta.x = -50 (screen x decreases).
3. Grab model: you grab the world and pull left; the world moves left with the drag.
4. Camera focus (pivot) must move RIGHT so the camera shifts right and
   right-side content enters center view.
5. Implementation (headless identity basis; right = (1,0,0)):
     _pivot -= right * delta.x * pan_amount
     _pivot -= (1,0,0) * (-50) * pan_amount
     -> pivot.x += 50 * pan_amount  (pivot moves RIGHT) OK
6. Expected predicate when dragging left: pivot.x > initial_x.

Mapped test test_pan_drag_left_increases_pivot_x asserts cam._pivot.x > initial_x.
Predicate matches derivation exactly. No sign flip.

Converse (drag right): pivot.x < initial_x (pivot moves left, left-side content enters).
Mapped test test_pan_drag_right_decreases_pivot_x and test_drag_direction_matches_view_movement
assert cam._pivot.x < initial_x. Consistent.

