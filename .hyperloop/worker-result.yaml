### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`camera_controller.gd`):
- Lines 111–118: RMB press calls `begin_orbit_at_world_point(_get_ground_point_under_cursor(pos))`.
- Lines 73–85: `begin_orbit_at_world_point` sets `_pivot = world_pt` and recomputes spherical
  coords from current camera position (no jump).

**Tests**:
- `test_orbit_uses_right_mouse_button`: RMB press + horizontal drag → `cam._phi != initial_phi` ✓
- `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt` ✓
- `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` after orbit begin ✓

#### Scenario: Orbiting around a component — COVERED
All three orbit tests together cover GIVEN/WHEN/THEN/AND conditions. ✓

