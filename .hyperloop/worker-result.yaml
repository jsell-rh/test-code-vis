### Requirement: Navigation — COVERED

**Scenario: Moving through the space**
- GIVEN the 3D scene is loaded
- WHEN the user interacts with the application
- THEN they can pan, zoom, and rotate the view
- AND they can smoothly transition between overview and detail levels

**Implementation:**
- `camera_controller.gd`: spherical coordinate camera
  - Left mouse drag → `_handle_mouse_motion` panning (Google Maps non-inverted)
  - Right mouse drag → orbit (`_phi`, `_theta` updated); `_remap_orbit_pivot()`
    keeps camera position fixed when switching pivot
  - Scroll wheel → `_zoom_toward_cursor()` / `_zoom_toward_point()`; smooth
    interpolation via `lerpf()` in `_process()`
  - `get_distance()` method exposed for LOD manager
  - `set_pivot(pivot, distance)` for programmatic camera framing
- `lod_manager.gd`: `update_lod()` transitions between FAR/MEDIUM/NEAR
  tiers based on camera distance — "smooth transition between overview and detail"

**Tests:**
- `test_camera_controls.gd`: 15+ tests covering pan direction, zoom clamping,
  orbit phi/theta, smooth zoom (not instantaneous), set_pivot ✓
- `test_spatial_structure.gd::test_camera_supports_zoom_in/out/orbit` ✓
- `test_spatial_structure.gd::test_camera_get_distance_returns_current_distance` ✓
- `test_ux_polish.gd`: pan proportionality, non-inversion, smooth zoom interpolation ✓
- `test_spatial_structure.gd::test_lod_integration_far_hides_modules_in_built_scene` —
  smooth transition between overview and detail confirmed by LOD visibility ✓

