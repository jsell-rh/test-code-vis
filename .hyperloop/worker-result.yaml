Fix pan direction inversion: apply map-grab model so pivot moves opposite to drag
direction, causing scene content to follow the drag (Google Maps behaviour).
The root cause was `_pivot += right * delta.x * pan_amount`; the fix negates to
`_pivot -= right * delta.x * pan_amount` (and similarly for the Y/forward axis).
Five directional tests were renamed and their assertions inverted to match the
correct map-grab predicate.  All sign-chain derivation comments now trace to the
user-visible screen outcome as required by check-pan-grab-model-comments.sh.

