## Implementation Code Review

**`camera_controller.gd` — key behaviors confirmed by reading source:**

- **LMB pan (non-inverted)**: `_panning = true` on LMB press (line 103); motion handler uses
  `basis.x` (right) and `basis.z` (backward) to compute pivot shift proportional to `delta.x`
  / `delta.y` (lines 145–155). Drag right → pivot moves +right. Non-inverted. ✅

- **Zoom toward cursor**: `_zoom_toward_point()` (lines 168–176) computes `zoom_ratio =
  _target_distance / old_dist` and sets `_target_pivot = world_pt + (_target_pivot - world_pt)
  * zoom_ratio`. Zoom in → ratio < 1 → pivot moves toward cursor. Zoom out → ratio > 1 →
  pivot moves away. ✅

- **Orbit around cursor**: RMB press calls `begin_orbit_at_world_point(world_pt)` (line 116),
  which sets `_pivot = world_pt` and recomputes spherical coordinates from the camera's
  current world position so there is no jump (lines 73–85). ✅

- **Smooth zoom**: `_process()` uses `lerpf(_distance, _target_distance, t)` and
  `_pivot.lerp(_target_pivot, t)` where `t = 1 - pow(0.05, delta * zoom_smooth)` (lines
  42–47). Scroll only mutates `_target_distance`/`_target_pivot`; actual values converge
  each frame. ✅

- **Clamp boundaries**: `_theta` clamped to `[0.01, PI - 0.01]` prevents camera pole flip
  (line 138); `_distance` clamped to `[min_distance, max_distance]` in `set_pivot()` (line
  58) and `begin_orbit_at_world_point()` (line 80). All four clamped variables have
  boundary-asserting tests. ✅

