### Requirement: Target Codebase — COVERED

**Code**: `godot/data/scene_graph.json` contains the actual kartograph structure:
6 bounded contexts (graph, iam, infrastructure, management, query, shared_kernel)
with 31 module nodes. `main.gd::_ready()` loads `res://data/scene_graph.json`
via `FileAccess.open()` + `SceneGraphLoader.load_from_dict()` + `build_from_graph()`.
Not a stub — full loading pipeline confirmed.

**Tests**:
- `test_kartograph_integration.py::test_kartograph_integration_bounded_contexts`:
  GIVEN kartograph at ~/code/kartograph/src/api, WHEN main() runs, THEN iam/graph/
  shared_kernel bounded context nodes appear in output JSON. Skip-guarded for CI.
- `test_kartograph_integration.py::test_kartograph_extraction_produces_modules`:
  THEN at least one module-level node is produced, reflecting actual internal structure.
- `test_scene_graph_loading.gd::test_volumes_created_for_each_node`: THEN Godot
  creates anchors for every node in the scene graph (general mechanism verified
  with fixture data matching the schema kartograph data conforms to).

