## Untestable THEN-Clauses

None. All THEN-clauses are testable headlessly via unit tests with fixture data.

(The "smooth" requirement is validated by asserting that after one scroll event the
target and actual distance differ — meaning interpolation is required — and that
`_process(0.1)` moves distance partway but not fully to the target.)

