## Requirement Analysis

### Requirement: Question-Driven View Generation ‚Äî COVERED

**Code**: `LLMViewGenerator.build_prompt(question, graph)` embeds the natural-language
question and all node ids/names/types into a prompt. `parse_response()` returns a
`Dictionary` view spec. `main.gd.apply_view_spec(spec)` passes it to
`SceneInterpreter.apply()`, which mutates the live scene.

**`main.gd._ready()`** is fully implemented (not a stub): calls `FileAccess.open()` +
`get_as_text()`, parses JSON, calls `build_from_graph()`. ‚úì

**Scenario: Architectural question** ("how does authentication work?")
- THEN generates view focused on auth-related components (show op):
  `SceneInterpreter._apply_show()` sets `anchor.visible = true`.
  Test `test_show_op_sets_visible_true`: real `Node3D`, calls `apply()`, asserts
  `anchor.visible == true`. ‚úì
- AND irrelevant components are hidden or de-emphasized (hide op):
  `SceneInterpreter._apply_hide()` sets `anchor.visible = false`.
  Test `test_hide_op_sets_visible_false`: asserts `anchor.visible == false`. ‚úì
- AND relevant components are arranged (arrange op):
  `SceneInterpreter._apply_arrange()` sets `anchor.position = Vector3(x,y,z)`.
  Tests `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`,
  `test_arrange_op_sets_all_three_axes` ‚Äî each asserts `.position.x/y/z` on a
  real `Node3D`. ‚úì

**Scenario: Impact question** ("what depends on the user database?")
- THEN shows user database and all dependents: covered by show op above. ‚úì
- AND dependency relationships are spatially clear:
  `SceneInterpreter._apply_connect()` adds `ImmediateMesh` line +
  `CylinderMesh` arrowhead (`top_radius=0` = pointed cone).
  Test `test_connect_op_adds_line_geometry`: ‚â•1 `MeshInstance3D` on root. ‚úì
  Test `test_connect_op_adds_arrowhead`: ‚â•2 `MeshInstance3D` (line + cone). ‚úì
  **Direction is visually indicated** by the CylinderMesh cone ‚Äî satisfies the
  "explicit rendering element" requirement. ‚úì

---

### Requirement: View Specs as Intermediate Representation ‚Äî COVERED

**Code**: `parse_response()` returns a plain `Dictionary` (no 3D geometry).
`SceneInterpreter.apply()` consumes that dict and mutates live scene nodes.
The LLM layer never produces raw Node3D objects.

**Scenario: LLM produces view spec**
- THEN emits a structured view specification (not raw 3D geometry):
  Test `test_parse_response_returns_dictionary`: asserts `result is Dictionary`. ‚úì
- AND the view spec controls show/hide/highlight/arrange/annotate/connect:
  Six pass-through tests (`test_parse_response_passes_through_show_op` etc.)
  verify each op survives `parse_response()`. ‚úì
- AND the 3D renderer interprets the view spec into a spatial scene:
  All tests in `test_scene_interpreter.gd` instantiate real `Node3D` objects,
  call `apply()`, and assert actual scene-tree property values
  (`.visible`, `.position.x/y/z`, `albedo_color.r/g/b`, `label.billboard`,
  `label.pixel_size`).
  End-to-end: `test_all_six_ops_mutate_scene_correctly` exercises all 6 ops
  in one call and asserts every resulting property. ‚úì

**Pipeline completeness**: `parse_response()` return value is consumed by
`main.gd.apply_view_spec()` ‚Üí `SceneInterpreter.apply()`. Both stages are
present and wired. ‚úì

---

### Requirement: Fixed Visual Primitive Set ‚Äî COVERED

**Code**: `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
is a compile-time constant. `_make_spec()` drops any op not in `VALID_OPS`.
`SceneInterpreter.apply()` uses a `match` with exactly 6 named arms; unknown ops
fall through without effect.

**Scenario: LLM uses existing primitives**
- THEN composes from existing set only:
  `build_prompt()` embeds `VALID_OPS` in the prompt text.
  Six tests (`test_build_prompt_contains_*_primitive`) verify each primitive name
  appears in the prompt. ‚úì
- AND no new rendering logic generated at runtime:
  Test `test_parse_response_filters_unknown_ops`: unknown op dropped, only
  known `"show"` survives. ‚úì
  Test `test_unknown_op_is_ignored`: a `"teleport"` op causes no crash and no
  scene mutation (`anchor.visible` unchanged). ‚úì

