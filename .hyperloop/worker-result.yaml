## Requirement-by-Requirement Findings

### Requirement: JSON Scene Graph Loading — COVERED

**SHALL**: The application MUST load a JSON scene graph file and generate the 3D scene from it.

**Code**: `godot/scripts/main.gd` `_ready()` calls `FileAccess.open()` + `get_as_text()` +
`JSON.new().parse()` + `SceneGraphLoader.load_from_dict()` + `build_from_graph()`.
The full pipeline is wired end-to-end with no stubs.

**Tests** (all in `godot/tests/test_scene_graph_loading.gd`):

| THEN-clause | Test | Status |
|---|---|---|
| reads the JSON file | `test_fileaccess_open_returns_non_null` (test_engine_version.gd) | COVERED |
| generates 3D volumes for each node | `test_volumes_created_for_each_node`, `test_mesh_instances_exist_in_anchors` | COVERED |
| generates connections for each edge | `test_edge_mesh_instances_created` (asserts ≥2 MeshInstance3D at root per edge) | COVERED |
| positions elements according to layout data | `test_anchor_positions_match_json`, `test_node_rendered_at_json_position` | COVERED |

---

### Requirement: Containment Rendering — COVERED

**SHALL**: Child nodes must be visually inside their parent node.

**Code**: `_create_volume()` in `main.gd`:
- `bounded_context` → `BoxMesh` with `TRANSPARENCY_ALPHA`, alpha=0.18, `CULL_DISABLED`
- `module` → smaller `BoxMesh` with alpha=1.0 (opaque); anchor parented as Godot scene-tree
  child of its context anchor, placing it spatially inside the context volume.

**Tests** (all in `godot/tests/test_containment_rendering.gd`):

| THEN-clause | Test | Status |
|---|---|---|
| bounded context appears as larger translucent volume | `test_bounded_context_is_translucent` (TRANSPARENCY_ALPHA + alpha < 1), `test_bounded_context_larger_than_module` (mesh.size.x comparison) | COVERED |
| child modules appear as smaller opaque volumes inside it | `test_module_is_opaque` (alpha >= 1.0), `test_module_parented_inside_context` (get_parent() == ctx_anchor) | COVERED |
| boundary of parent visually distinct from children | `test_bounded_context_cull_disabled` (asserts CULL_DISABLED; context renders both faces, distinguishing it from back-face-culled modules) | COVERED |

