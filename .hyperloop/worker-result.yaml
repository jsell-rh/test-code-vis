## Requirement Status

### REQ-1: Pan with Left Mouse Button — COVERED

`camera_controller.gd` `_handle_button()` sets `_panning = event.pressed` on
`MOUSE_BUTTON_LEFT`. `_handle_motion()` shifts `_target_pivot += right * delta.x * pan_amount`
when `_panning`. Tests: `test_lmb_drag_pans_camera`, `test_pan_direction_not_inverted`.

### REQ-2: Non-Inverted Movement — COVERED

At phi=π/2 the camera's local X axis aligns with world +X. A rightward drag (delta.x > 0)
produces `_target_pivot.x > 0`. Confirmed by `test_pan_direction_not_inverted` with exact
pivot.x assertion.

### REQ-3: Zoom Toward Mouse Cursor — COVERED

`_zoom_toward_point()` updates `_target_distance` then shifts
`_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.
Zoom-in: ratio < 1 → pivot moves toward cursor. Zoom-out: ratio > 1 → pivot moves away.
Tests: `test_zoom_in_shifts_pivot_toward_cursor`, `test_zoom_in_cursor_point_invariant`,
`test_zoom_out_shifts_pivot_away_from_cursor`.

### REQ-4: Orbit Around Mouse Point — COVERED

RMB press calls `begin_orbit_at_world_point(world_pt)` which sets `_pivot = world_pt`
and recomputes spherical coordinates from the offset so the camera does not jump.
Tests: `test_orbit_uses_right_mouse_button` (RMB binding), `test_orbit_around_cursor_point`
(pivot == world_pt), `test_orbit_pivot_is_world_point` (visual center invariant).

### REQ-5: Smooth Camera Movement — COVERED

Zoom: `_zoom_toward_point()` only sets `_target_distance`; `_process()` lerps `_distance`
toward it each frame. Pan: immediate but proportional to drag delta and distance.
Tests: `test_smooth_zoom_target_differs_from_distance_after_scroll`,
`test_smooth_zoom_process_interpolates_distance`, `test_pan_proportional_to_drag_speed`.

