### Requirement: Orbit Around Mouse Point — COVERED

**Scenario: Orbiting around a component**

Implementation:
- Lines 111-118: RMB press calls `begin_orbit_at_world_point(_get_ground_point_under_cursor(pos))`.
- `begin_orbit_at_world_point()` (lines 73-85): Sets `_pivot = world_pt`, recomputes
  `_distance`, `_theta`, `_phi` from current camera position — camera does not jump.
- Lines 135-139: Orbit drag updates `_phi` and `_theta` around the new pivot.

Tests:
- `test_orbit_around_cursor_point()` (line 275): Calls `begin_orbit_at_world_point(world_pt)`,
  asserts `cam._pivot == world_pt`. Covers THEN "orbits around cursor point at orbit start."
- `test_orbit_pivot_is_world_point()` (line 291): Asserts `cam._pivot.is_equal_approx(world_pt)`.
  Covers THEN "component remains at visual center" (pivot = world_pt → camera always
  looks at the orbited component).
- `test_orbit_uses_right_mouse_button()` (line 255): RMB press + drag asserts
  `_phi != initial_phi`. Confirms right mouse button triggers orbit.

Status: **COVERED**.

