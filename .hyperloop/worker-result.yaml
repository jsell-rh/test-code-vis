### Requirement: Zoom Toward Mouse Cursor ÔÇö COVERED

**Implementation** (`camera_controller.gd`):
- Lines 120ÔÇô128: `MOUSE_BUTTON_WHEEL_UP/DOWN` calls `_zoom_toward_point(world_pt, direction)`
  using the world point under the cursor.
- Lines 170ÔÇô178: `_zoom_toward_point` shifts `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`.
  zoom in: ratio < 1 Ôćĺ pivot moves toward world_pt.
