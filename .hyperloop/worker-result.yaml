## Requirement: Two-Stage Pipeline — COVERED

**Scenario: Extraction then visualization**

- Stage 1 (extractor → JSON): `extractor/__main__.py` writes scene graph JSON.
  Tested by `extractor/tests/test_cli.py::test_main_writes_json_output`.
- Stage 2 (JSON → Godot): `godot/scripts/main.gd _ready()` reads the JSON file and
  calls `build_from_graph()` via `SceneGraphLoader`.
  Tested by `godot/tests/test_scene_graph_loading.gd::test_volumes_created_for_each_node`,
  `test_mesh_instances_exist_in_anchors`, `test_edge_mesh_instances_created`.

