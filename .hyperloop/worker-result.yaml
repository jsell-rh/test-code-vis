## THEN-Clause to Test Mapping

### Requirement: Pan with Left Mouse Button

**THEN the camera pans in the direction of the drag**
→ `test_lmb_drag_pans_camera`: LMB press + 50px right motion → `cam._pivot != initial_pivot`
  (`camera_controller.gd` lines 101, 141–158: `_panning = true` on LMB, pivot shifts on motion)

**AND the movement direction matches the drag direction (not inverted)**
→ `test_pan_direction_not_inverted`: At phi=PI/2, right drag (delta.x=+50) → `cam._pivot.x > 0.0`

### Requirement: Non-Inverted Movement

**THEN the scene moves in the same direction as the drag (dragging left reveals content to the right)**
→ `test_pan_direction_not_inverted`: right drag → `cam._pivot.x > 0.0` (Google Maps convention)

### Requirement: Zoom Toward Mouse Cursor

**THEN the view zooms toward the point under the cursor**
→ `test_zoom_in_shifts_pivot_toward_cursor`: cursor at x=10, zoom in → `_target_pivot.x > 0`

**AND the component under the cursor stays under the cursor during the zoom**
→ `test_zoom_in_cursor_point_invariant`: cursor at x=20, zoom in → `0 < _target_pivot.x < 20`
  (`_zoom_toward_point()` lines 168–176: pivot adjusted by zoom_ratio to keep cursor stationary)

**THEN the view zooms out from the point under the cursor** (zooming out scenario)
→ `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at x=10, zoom out → `_target_pivot.x < 0`

### Requirement: Orbit Around Mouse Point

**THEN the camera orbits around the point under the cursor at orbit start**
→ `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt`
→ `test_orbit_uses_right_mouse_button`: RMB press + horizontal drag → `cam._phi != initial_phi`

**AND the component remains at the visual center during the orbit**
→ `test_orbit_pivot_is_world_point`: `cam._pivot.is_equal_approx(world_pt)` after orbit begins
  (`begin_orbit_at_world_point()` lines 73–85: sets `_pivot = world_pt`, recomputes spherical coords)

### Requirement: Smooth Camera Movement

**THEN the zoom is animated smoothly (interpolated), not instantaneous**
→ `test_smooth_zoom_target_differs_from_distance_after_scroll`: after WHEEL_UP,
   `_target_distance < _distance` (targets differ — interpolation in `_process()` required)
→ `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`,
   `20 < _distance < 40` (partially interpolated, not jumped to target)

**THEN the pan movement is smooth and proportional to drag speed**
→ `test_pan_proportional_to_drag_speed`: 10px drag displacement < 50px drag displacement

### Constraint THEN-clauses (clamp boundaries)

**Distance clamped at minimum**
→ `test_set_pivot_clamps_distance_at_minimum`: distance=0.0 → clamped to `min_distance`
→ `test_zoom_clamped_at_minimum`: 200 scroll-ups → `_distance >= min_distance`

**Theta clamped to prevent gimbal flip**
→ `test_theta_clamped_at_minimum`: extreme upward drag → theta >= 0.01
→ `test_theta_clamped_at_maximum`: extreme downward drag → theta <= PI-0.01

