### Containment Rendering

| THEN clause | Test function | File | Status |
|---|---|---|---|
| bounded context appears as larger translucent volume | `test_bounded_context_is_translucent`, `test_bounded_context_larger_than_module` | test_containment_rendering.gd | PASS |
| child modules appear as smaller opaque volumes inside | `test_module_is_opaque`, `test_module_parented_inside_context` | test_containment_rendering.gd | PASS |
| boundary of parent visually distinct from children | `test_bounded_context_cull_disabled` | test_containment_rendering.gd | PASS |

Verified: `test_bounded_context_is_translucent` checks `transparency != TRANSPARENCY_DISABLED`
AND `albedo_color.a < 1.0`. `test_module_is_opaque` checks `albedo_color.a >= 1.0`.
`test_module_parented_inside_context` uses `mod_anchor.get_parent() == ctx_anchor`.

