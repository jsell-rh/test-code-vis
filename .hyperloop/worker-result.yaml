Task-029 implements the Spec-Driven Context and Architecture Feedback Loop requirements
from specs/core/system-purpose.spec.md. The extractor discovers spec (*.md) files in a
`specs/` directory alongside the source path and emits them as 'spec' type nodes in the
scene graph (intended design), spatially separated from code nodes (realized design).
Godot renders spec nodes as gold translucent slabs, distinct from blue bounded_context
and green module nodes. Tests cover all THEN-clauses: 14 Python tests for spec-node
discovery/positioning, and 6 GDScript tests for Scenario 2 (Spec-Driven Context) and
Scenario 3 (Architecture Feedback Loop).

## THEN-Clause Coverage

**Scenario 1: Architect evaluates unfamiliar system** (inherited from earlier tasks)
- "human can correctly answer architectural questions" → test_can_navigate_architectural_questions (test_system_purpose.gd)
- "human can identify structural problems" → test_can_identify_structural_problems (test_system_purpose.gd)
- "human can predict impact of proposed changes" → test_can_predict_impact_of_changes (test_system_purpose.gd)

**Scenario 2: Spec and codebase loaded together**
- "spec is treated as the intended design" → test_spec_nodes_have_type_spec (test_system_purpose.gd)
- "codebase is treated as the realized design" → test_code_nodes_are_non_spec_types (test_system_purpose.gd)
- "relationship between them is available for inspection" → test_spec_and_code_nodes_coexist_in_graph (test_system_purpose.gd)

**Scenario 3: Post-build evaluation**
- "human can determine whether build matches spec" → test_spec_nodes_visible_alongside_code_nodes (test_system_purpose.gd)
- "human can determine whether build is architecturally sound" → test_architectural_soundness_navigable (test_system_purpose.gd)
- "human can explore impact of potential changes" → test_change_impact_explorable (test_system_purpose.gd)

## Untestable THEN-Clauses

None. All THEN-clauses are testable in the headless environment via scene-tree assertions
and property-value checks.

