## Requirement: Size Encoding — COVERED

**SHALL**: Encode complexity metrics as the visual size of volumes.

**Code** (`main.gd._create_volume()`):
- `sz = float(nd["size"])` applied directly as the `BoxMesh` x-dimension, so
  volume width is proportional to the `size` field from JSON (derived by the
  Python extractor from lines-of-code).

**Scenario: Large module vs small module — `test_size_encoding.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| module with more code is larger | `test_large_module_has_bigger_mesh` | `large_mesh.size.x > small_mesh.size.x` |
| sizes proportional to metric | `test_mesh_sizes_proportional_to_metric` | `abs(9.0/3.0 - actual_ratio) < 0.001` |

