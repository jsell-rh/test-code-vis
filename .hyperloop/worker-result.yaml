# Task-034 Fix: Remove Moldable Views + Add Kartograph Integration Test

## Changes Made

### Fix 1 — Remove moldable-views (was FAIL)

Deleted all prohibited files and wiring:

- `godot/scripts/llm_view_generator.gd` — removed
- `godot/scripts/scene_interpreter.gd` — removed
- `godot/tests/test_llm_view_generator.gd` — removed
- `godot/tests/test_scene_interpreter.gd` — removed
- `godot/tests/test_moldable_views_pipeline.gd` — removed
- `godot/scripts/main.gd` — removed `const LlmViewGenerator`, `const SceneInterpreter`
  preloads; removed `var _scene_interpreter`, `var _question_input`, `var _ask_button`;
  removed `_add_question_ui()` call from `_ready()` and deleted all four moldable-views
  functions (`_add_question_ui`, `_on_ask_button_pressed`, `_on_question_submitted`,
  `_call_llm`).
- `godot/tests/run_tests.gd` — removed the three moldable-views suite registrations
  (`test_llm_view_generator.gd`, `test_scene_interpreter.gd`,
  `test_moldable_views_pipeline.gd`).

### Fix 2 — Kartograph integration test (was PARTIAL)

Added `extractor/tests/test_kartograph_integration.py` with
`test_kartograph_integration_bounded_contexts`, which:
- Invokes `main([str(KARTOGRAPH_SRC), "--output", str(out)])` against
  `~/code/kartograph/src/api`
- Asserts exit code 0, output file created, output JSON has `nodes` and `edges` keys
- Asserts bounded context ids `iam`, `graph`, and `shared_kernel` all appear
- Skipped automatically when the path does not exist (CI without local clone)

