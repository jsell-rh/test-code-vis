### Requirement: Dependency Rendering — COVERED

**SHALL**: Dependency edges must appear as visible lines between connected nodes.

**Code**: `_create_edge()` in `main.gd`:
- Creates an `ImmediateMesh` (PRIMITIVE_LINES) connecting source and target world positions.
- Creates a `CylinderMesh` with `top_radius=0.0` (arrowhead cone) placed at the target end,
  oriented along the edge direction, indicating dependency flow direction.

**Tests** (all in `godot/tests/test_dependency_rendering.gd`):

| THEN-clause | Test | Status |
|---|---|---|
| a line connects the two context volumes | `test_edge_line_mesh_created` (finds ImmediateMesh MeshInstance3D in main node children) | COVERED |
| line's direction is visually indicated | `test_direction_indicator_cone_created` (CylinderMesh with top_radius==0.0 exists), `test_direction_cone_near_target` (cone position within 2u of target node) | COVERED |

---

### Requirement: Size Encoding — COVERED

**SHALL**: Complexity metrics must be encoded as the visual size of volumes.

**Code**: `_create_volume()` applies `sz = float(nd["size"])` directly to `BoxMesh.size`,
so `size.x == sz`. The `size` field in the JSON is the pre-computed metric-derived value
produced by the Python extractor from `metrics.loc`. Proportionality is exact: ratio of
mesh widths equals ratio of `size` inputs.

**Tests** (in `godot/tests/test_size_encoding.gd`):

| THEN-clause | Test | Status |
|---|---|---|
| module with more code appears as a larger volume | `test_large_module_has_bigger_mesh` (size=9 vs size=3; large_mesh.size.x > small_mesh.size.x) | COVERED |
| relative sizes are proportional to the metric | `test_mesh_sizes_proportional_to_metric` (ratio 9/3 = 3.0 asserted within 0.001 tolerance) | COVERED |

