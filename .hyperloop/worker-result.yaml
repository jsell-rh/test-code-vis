### Requirement: Abstract Visual Language (SHALL)
Status: COVERED

**Implementation verified:**
- All nodes rendered as BoxMesh; context: translucent slab; module: opaque box.
- Size = float(nd["size"]) applied as BoxMesh dimensions (proportional to LOC metric).
- Containment: module anchor parented to context anchor in scene tree.
- No buildings, terrain, or thematic decoration — pure geometric primitives. ✓

**Tests — Scenario: Visual representation**
- `test_volumes_created_for_each_node` — geometric volumes (MeshInstance3D) created. ✓
- `test_mesh_sizes_proportional_to_metric` (godot/tests/test_size_encoding.gd:68)
