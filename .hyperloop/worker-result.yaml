## Spec Requirement Coverage

### 1. JSON Scene Graph Loading ‚Äî COVERED

`main.gd._ready()` opens the JSON file with `FileAccess.open()` + `file.get_as_text()`,
parses it with `JSON.new()` + `json.parse()`, delegates to `SceneGraphLoader.load_from_dict()`,
then calls `build_from_graph()`. The function creates Node3D anchors for every node, positions
each anchor from `position.{x,y,z}`, and calls `_create_edge()` for every edge.

`test_scene_graph_loading.gd` ‚Äî 5 behavioral tests instantiate a real `Node3D`, call
`build_from_graph()` with fixture data, and assert:
- `_anchors` contains both node ids
- Each anchor has a `MeshInstance3D` child
- Each edge produces ‚â•2 `MeshInstance3D` children (line + arrowhead)
- `anchor.position` values equal the JSON coordinates exactly
- `Label3D` has `billboard == BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true`

### 2. Containment Rendering ‚Äî COVERED

`_create_volume()` in `main.gd`:
- Bounded context: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`, large flat box
- Module: `albedo_color.a = 1.0` (opaque), compact box
- `build_from_graph()` calls `parent_anchor.add_child(anchor)` ‚Äî child lives in parent scene-tree node

`test_containment_rendering.gd` ‚Äî 5 behavioral tests assert:
- `transparency != DISABLED` and `alpha < 1.0` on bounded context
- `albedo_color.a >= 1.0` on module
- `mod_anchor.get_parent() == ctx_anchor` (actual scene-tree parenting)
- `ctx_mesh.size.x > mod_mesh.size.x` (larger parent volume)
- `cull_mode == CULL_DISABLED` on bounded context (visually distinct boundary)

### 3. Dependency Rendering ‚Äî COVERED

`_create_edge()` in `main.gd`:
- `ImmediateMesh` with `PRIMITIVE_LINES` connecting world-space endpoints
- `CylinderMesh` with `top_radius = 0.0` (cone) at target end, oriented via `Basis(Quaternion(Vector3.UP, dir))`
  ‚Äî this is an explicit rendering element satisfying "direction is visually indicated"
- Orange color for cross-context, grey for internal

`test_dependency_rendering.gd` ‚Äî 4 behavioral tests assert:
- `ImmediateMesh` child found on main node
- `CylinderMesh` with `top_radius == 0.0` found (not just any cylinder)
- Cone `position.distance_to(target_pos) < 2.0` (positioned at target end)
- Cross-context cone has `albedo_color.r > 0.8` and `albedo_color.b < 0.3` (orange)

### 4. Size Encoding ‚Äî COVERED

`_create_volume()` applies `sz = float(nd["size"])` directly as `box.size = Vector3(sz, sz*0.6, sz)`.
Linear mapping with no clamping or offset preserves metric ratios exactly.

`test_size_encoding.gd` ‚Äî 2 behavioral tests assert:
- `large_mesh.size.x > small_mesh.size.x`
- `abs(actual_ratio - 3.0) < 0.001` (inputs 9.0 vs 3.0 ‚Üí expected ratio 3.0)

### 5. Camera Controls ‚Äî COVERED

`camera_controller.gd`:
- `_theta = 0.15` (‚âà8.6¬∞ from vertical) ‚Äî top-down initial view
- `MOUSE_BUTTON_WHEEL_UP/DOWN` ‚Üí adjust `_distance` (clamped to `[min_distance, max_distance]`) ‚Äî zoom
- Middle-mouse drag ‚Üí updates `_phi` (azimuth) and `_theta` (polar, clamped to `[0.01, PI-0.01]`) ‚Äî orbit
- `look_at(_pivot, Vector3.UP)` ‚Äî up stays up at all times
- Right-mouse drag ‚Üí pans `_pivot` in camera's local XZ plane ‚Äî pan

`test_camera_controls.gd` ‚Äî 8 behavioral tests assert:
- `cam._theta < PI/4.0` (top-down initial)
- `cam._distance > 0.0`
- WHEEL_UP decreases `_distance`; WHEEL_DOWN increases it
- Horizontal drag changes `_phi`; vertical drag changes `_theta`
- `set_pivot()` updates `_pivot` and `_distance`
- 200x WHEEL_UP leaves `_distance >= min_distance` (zoom clamp)

