### Algorithm-quality "reflects" test verification
Two "reflects" THEN-clauses in the spec:
(a) "their relative positions reflect their coupling"
(b) "its size reflects its relative complexity"

For (a): `test_coupled_bcs_are_closer_than_uncoupled` uses fixture
`src_coupling` with 4 BCs where auth↔shared_kernel are coupled and
billing is not coupled to auth. Calls `compute_layout(nodes, edges)`
with the actual dependency data. Asserts
`dist("auth","shared_kernel") < dist("auth","billing")`. This IS an
algorithm-quality test: the fixture varies coupling, the assert checks
relative output. PASS.

For (b): `test_mesh_sizes_proportional_to_metric` fixture has
small_mod.size=3.0 and large_mod.size=9.0 (fixture varies the metric Y).
Assert checks `large_mesh.size.x / small_mesh.size.x ≈ 3.0 ± 0.001`.
Algorithm-quality test. PASS.

check-reflects-mapping-consistency.sh SKIPped because the worker-result
mapping is in prose form (no pipe-delimited table rows). The reviewer
independently audited both "reflects" THEN-clauses above and confirmed
both are mapped to algorithm-quality tests with matching predicates.

### Direction test predicate verification
`test_pan_drag_right_increases_pivot_x`: drag right (delta.x=+50px) →
asserts `cam._pivot.x > initial_x`. The camera_controller implementation
does `_pivot += right * delta.x * pan_amount` where right=basis.x=(1,0,0)
in headless (identity transform), so positive delta.x correctly
increases pivot.x. Non-inverted per spec (Google Maps style). PASS.

`test_pan_drag_left_decreases_pivot_x`: drag left (delta.x=-50px) →
asserts `cam._pivot.x < initial_x`. Correct opposite direction. PASS.

### Label readability assertion
`test_labels_are_billboard_and_readable` reads `lbl.billboard`,
`lbl.pixel_size`, `lbl.no_depth_test` on the actual Label3D node in
the anchor and returns `billboard_ok and pixel_size_ok and depth_ok`.
All three properties correctly asserted. PASS.

### Containment assertion
`test_module_parented_inside_context` asserts
`mod_anchor.get_parent() == ctx_anchor` — verifies scene-tree parenting
at node level, not just property comparison. PASS.

### LOD test correctness
`test_far_distance_shows_only_bounded_contexts` drives distance to
`FAR_THRESHOLD + 10.0` (beyond the limit) and asserts
`ctx_anchor.visible == true` and `not mod_anchor.visible`.
Correctly tests the constraint boundary. PASS.

