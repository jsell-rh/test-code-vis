## Requirement Status

### REQ-1: Pan with Left Mouse Button (MUST) — COVERED

**Implementation**: `godot/scripts/camera_controller.gd`
- `_handle_button()` L101-104: `MOUSE_BUTTON_LEFT` sets `_panning = event.pressed` and records `_last_mouse`.
- `_handle_motion()` L141-158: When `_panning`, computes `right`/`backward` from `transform.basis` and shifts `_target_pivot += right * delta.x * pan_amount`.

**Tests**: `godot/tests/test_camera_controls.gd`
- `test_lmb_drag_pans_camera` (L147): LMB press + motion → `cam._pivot != initial_pivot`. COVERS "camera pans in direction of drag".
- `test_pan_direction_not_inverted` (L167): At phi=π/2, right drag (delta.x=50) → `cam._pivot.x > 0.0`. COVERS "movement direction matches drag direction (not inverted)".

### REQ-2: Non-Inverted Movement (MUST) — COVERED

**Implementation**: `_handle_motion()` L154-155: `_target_pivot += right * delta.x * pan_amount` / `_target_pivot -= backward * delta.y * pan_amount`. Positive drag delta → positive pivot shift (non-inverted).

**Tests**:
- `test_pan_direction_not_inverted` (L167): Same test as above. Explicitly confirms Google Maps semantics (drag right → scene moves right). COVERED.

### REQ-3: Zoom Toward Mouse Cursor (MUST) — COVERED

**Implementation**: `_zoom_toward_point()` L168-176: Updates `_target_distance` and then shifts `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`. Zoom-in (direction<0) → ratio<1 → pivot moves toward world_pt. Zoom-out (direction>0) → ratio>1 → pivot moves away.

**Tests**:
- Scenario "Zooming into a specific component":
  - `test_zoom_in_shifts_pivot_toward_cursor` (L197): cursor at (10,0,0), zoom in → `_target_pivot.x > 0`. COVERS "view zooms toward point under cursor".
  - `test_zoom_in_cursor_point_invariant` (L213): `0 < _target_pivot.x < world_pt.x`. COVERS "component under cursor stays under cursor".
- Scenario "Zooming out":
  - `test_zoom_out_shifts_pivot_away_from_cursor` (L228): cursor at (10,0,0), zoom out → `_target_pivot.x < 0`. COVERED.

### REQ-4: Orbit Around Mouse Point (MUST) — COVERED

**Implementation**: `_handle_button()` L111-118: RMB press calls `begin_orbit_at_world_point(world_pt)`. `begin_orbit_at_world_point()` L73-85: Sets `_pivot = world_pt`, recomputes spherical coords from offset so camera does not jump.

**Tests**:
- `test_orbit_uses_right_mouse_button` (L249): RMB press + horizontal motion → `cam._phi != initial_phi`. COVERS "camera orbits around cursor point at orbit start".
- `test_orbit_around_cursor_point` (L269): `begin_orbit_at_world_point(world_pt)` → `cam._pivot == world_pt`. COVERED.
- `test_orbit_pivot_is_world_point` (L285): `cam._pivot.is_equal_approx(world_pt)`. COVERS "component remains at visual center during orbit".

### REQ-5: Smooth Camera Movement (MUST) — COVERED

**Implementation**:
- Smooth zoom: `_zoom_toward_point()` only sets `_target_distance`; `_process()` L44-47 uses exponential lerp `_distance = lerpf(_distance, _target_distance, t)`.
- Smooth pan: `_handle_motion()` sets `_target_pivot` scaled by `pan_speed * (_distance * 0.05 + 1.0)` (proportional to drag delta and distance).

**Tests**:
- Scenario "Smooth zoom":
  - `test_smooth_zoom_target_differs_from_distance_after_scroll` (L304): after scroll `_target_distance < _distance`. COVERS "not instantaneous".
  - `test_smooth_zoom_process_interpolates_distance` (L319): after `_process(0.1)`, `20 < _distance < 40`. COVERS interpolation.
- Scenario "Smooth pan":
  - `test_pan_proportional_to_drag_speed` (L332): 50px drag produces larger pivot displacement than 10px drag. COVERED.

