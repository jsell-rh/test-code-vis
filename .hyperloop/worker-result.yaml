### Req 3: JSON Interface Contract — COVERED

**Implementation:**
- `godot/scripts/scene_graph_loader.gd` — `load_from_dict()` consumes a plain Dictionary; no Python extractor import or subprocess call anywhere in `godot/scripts/`.
