## Test Registration

Both new suites are registered in `run_tests.gd` (lines 37-40):
  - `test_llm_view_generator.gd` — uses _check()/_test_failed pattern
  - `test_scene_interpreter.gd` — uses bool-return pattern

All `test_scene_interpreter.gd` tests instantiate real `Node3D` / `MeshInstance3D` /
`Label3D` objects, call `SceneInterpreter.apply()` with fixture specs, and assert
observable scene-tree properties (visible, position, albedo_color, label.text,
billboard, pixel_size, child_count). This satisfies the guideline requirement for
"GDScript behavioral test with known fixture data asserting runtime outputs."
