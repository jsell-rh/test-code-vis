## Summary

All three SHALL requirements are implemented in code and each scenario's THEN clauses are
exercised by GDScript behavioral tests in `godot/tests/` that instantiate real Node3D objects
and assert actual scene-tree property values (not intermediate dict keys). The two-stage
pipeline (LLMViewGenerator → ViewSpec dict → SceneInterpreter → Node3D mutations) is
fully wired in main.gd and tested end-to-end.

**Verdict: PASS**
