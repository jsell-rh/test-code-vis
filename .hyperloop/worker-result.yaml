### Requirement: JSON Interface Contract (MUST)

**Code**:
- `extractor/schema.py` defines `SceneGraph` TypedDict — the explicit contract between Python and Godot.
- `godot/scripts/scene_graph_loader.gd`: loads JSON dict into structured arrays; never imports or calls Python code.
- `godot/scripts/main.gd::_ready()`: reads file via `FileAccess.open()`, parses with `JSON.new()`, passes to `SceneGraphLoader.load_from_dict()` — no Python reference anywhere in `godot/`.

**Scenario: Decoupled pipeline — THEN clause coverage**:

| THEN clause | Evidence |
|---|---|
| Godot does not need the extractor or source codebase | `test_scene_graph_loader.gd` and `test_scene_graph_loading.gd` use pure dict fixtures; grep of `godot/` confirms zero `import extractor` / `from extractor` references |
| JSON file is self-contained | Same suites operate entirely on fixture dicts with no external filesystem or Python deps |

Key tests: `test_scene_graph_loader.gd` — `test_nodes_list_is_returned`, `test_node_count_matches_input`, `test_metadata_is_returned`, `test_missing_top_level_keys_default_to_empty`, etc. (18 tests). `test_scene_graph_loading.gd` — `test_volumes_created_for_each_node`, `test_edge_mesh_instances_created`, `test_anchor_positions_match_json`, `test_labels_are_billboard_and_readable` (4 tests).

**STATUS: COVERED**

