## THEN-Clause Coverage

### Requirement: Target Codebase — Loading kartograph
- THEN kartograph's structure is visualized in 3D space
  → `test_kartograph_integration.py::test_kartograph_extraction_produces_bounded_contexts` — asserts contexts present in extracted JSON
- AND the visualization reflects the actual structure of the codebase
  → `test_kartograph_integration.py::test_kartograph_extraction_produces_modules` — asserts module nodes present

### Requirement: Two-Stage Pipeline — Extraction then visualization
- THEN a JSON scene graph file is produced
  → `test_cli.py::test_main_produces_output_file` — calls main(), asserts file written
- AND the Godot application can load that file and render the scene
  → `test_scene_graph_loading.gd::test_volumes_created_for_each_node` — instantiates loader, asserts MeshInstance3D nodes created

### Requirement: Top-Down Architectural View — Viewing kartograph from above
- THEN all bounded contexts are visible as distinct volumes
  → `test_spatial_structure.gd::test_spatial_layout_creates_node_per_structural_element`
- AND their relative positions reflect their coupling
  → `test_spatial_structure.gd::test_distinct_contexts_occupy_distinct_regions`
- AND dependencies between contexts are visible as connections
  → `test_dependency_rendering.gd::test_edge_line_mesh_created`

### Requirement: Zoom to Detail — Zooming into IAM
- THEN the internal layers become visible
  → `test_spatial_structure.gd::test_near_distance_shows_all_nodes`
- AND internal dependencies are shown
  → `test_spatial_structure.gd::test_near_distance_shows_internal_edges_as_fine_detail`
- AND the user can see relative sizes of internal modules
  → `test_size_encoding.gd::test_large_module_has_bigger_mesh`

### Requirement: Abstract Visual Language — Visual representation
- THEN it appears as a labeled geometric volume
  → `test_node_renderer.gd::test_node_rendered_at_json_position`
- AND its size reflects its relative complexity
  → `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric`
- AND its position reflects its coupling relationships
  → `test_node_renderer.gd::test_anchor_positions_match_json` (via test_scene_graph_loading.gd)
- AND containment is shown by nesting
  → `test_containment_rendering.gd::test_module_parented_inside_context`

### Requirement: Readable Labels — Identifying a module
- THEN the module's name is visible as a text label
  → `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` — asserts Label3D created
- AND the label remains readable at the current zoom level
  → `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` — asserts billboard=BILLBOARD_ENABLED, pixel_size>0

### Requirement: Dependency Visualization — Cross-context dependency
- THEN a line or connection is drawn between them
  → `test_dependency_rendering.gd::test_edge_line_mesh_created`
- AND the direction of the dependency is discernible
  → `test_dependency_rendering.gd::test_direction_indicator_cone_created`

### Requirement: Navigation — Moving through the space
- THEN they can pan, zoom, and rotate the view
  → `test_camera_controls.gd::test_scroll_up_decreases_distance` (zoom)
  → `test_ux_polish.gd::test_lmb_pan_moves_pivot` (pan)
  → `test_camera_controls.gd::test_orbit_horizontal_drag_changes_phi` (rotate)
- AND they can smoothly transition between overview and detail levels
  → `test_spatial_structure.gd::test_far_distance_shows_only_bounded_contexts`
  → `test_spatial_structure.gd::test_near_distance_shows_all_nodes`

