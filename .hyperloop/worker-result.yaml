#### Requirement: Dependency Rendering — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_create_edge()`: builds `ImmediateMesh` (PRIMITIVE_LINES) from source to target world position.
- Creates `CylinderMesh` with `top_radius=0` (cone/arrowhead) at the target end, oriented via `Basis(Quaternion(Vector3.UP, dir))`. This is the direction indicator.
- Cross-context edges coloured orange `Color(1.0, 0.50, 0.10)`; internal edges grey.

**Tests** (`godot/tests/test_dependency_rendering.gd` — 4 tests):
- `test_edge_line_mesh_created`: checks `ImmediateMesh` child exists on main node. Covers THEN "a line connects the two context volumes".
- `test_direction_indicator_cone_created`: checks `CylinderMesh` with `top_radius==0` exists. Covers AND "line's direction is visually indicated".
- `test_direction_cone_near_target`: checks cone position is within 2 units of the target node's world position. Confirms cone is at the correct end.
- `test_cross_context_cone_is_orange`: checks cone material `albedo_color.r > 0.8 && albedo_color.b < 0.3`. Verifies cross-context visual distinction.

