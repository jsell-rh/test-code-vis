## Reviewer Verification — task-028 (system-purpose spec THEN-clause tests)

### Context

A prior review round correctly identified that 7 of 8 test functions in
`godot/tests/test_system_purpose.gd` were inert under Pattern-1: each returned
`bool` without calling `_check()`, so the runner (which ignores return values and
reads only `_test_failed`) always reported PASS regardless of assertion outcome.

This review verifies that the fix commit (`37f00db`) genuinely resolves that defect.

