### Requirement: Evaluation Mode — COVERED

The system MUST allow the human to evaluate the architectural quality of the realized
system independent of the spec.

Implementation: `analyze_coupling(nodes, edges, threshold)` returns `{pairs}` sorted by
coupling_score descending; `analyze_criticality(nodes, edges, threshold)` returns `{critical}`
sorted by in_degree descending. `render_coupling()` and `render_criticality()` apply
HIGHLIGHT_COLOR and Label3D annotations ("⚠ Coupling: N", "⚠ SPOF Risk (in-degree: N)").

#### Scenario: Detecting tight coupling

| THEN-clause | Test function | Status |
|---|---|---|
| "the coupling between those services is apparent" | `test_tightly_coupled_pair_detected` | COVERED |
| "the human can assess whether the coupling is problematic" | `test_coupled_nodes_highlighted` | COVERED |

`test_tightly_coupled_pair_detected`: 3 edges between service_a/service_b → coupling_score=3
>= threshold=2; asserts pairs.size()>=1 and score>=2.

`test_coupled_nodes_highlighted`: Calls `render_coupling()` with real MeshInstance3D anchors;
asserts material_override.albedo_color == HIGHLIGHT_COLOR on both nodes in the pair.

#### Scenario: Identifying single point of failure

| THEN-clause | Test function | Status |
|---|---|---|
| "the criticality and centrality of that component is apparent" | `test_central_node_detected_as_critical` | COVERED |
| "the risk it represents is clear" | `test_critical_node_annotated_with_spof_risk` | COVERED |

`test_central_node_detected_as_critical`: hub node has in_degree=3 (3 services depend on it);
asserts critical[0].node_id=="hub" and in_degree==3.

`test_critical_node_annotated_with_spof_risk`: Calls `render_criticality()` and asserts a
Label3D with text containing "SPOF" appears in the scene root.

#### Scenario: Spec faithfully implemented but architecturally poor

| THEN-clause | Test function | Status |
|---|---|---|
| "architectural problems are visible even though conformance is perfect" | `test_coupling_detected_despite_perfect_alignment` | COVERED |

`test_coupling_detected_despite_perfect_alignment`: First verifies check_alignment returns
both nodes as aligned (conformance=perfect), then calls analyze_coupling on the same nodes
and asserts coupling pair is still detected — proving the two analyses are independent.

