## Requirement: Size Encoding — COVERED

**Implementation:** `_create_volume()` reads `float(nd["size"])` as `sz` and applies
it directly to `BoxMesh.size` dimensions (`Vector3(sz, sz*0.2, sz)` for contexts;
`Vector3(sz, sz*0.6, sz)` for modules). Since `size` in the JSON is derived from
lines-of-code, the mesh width ratio equals the metric ratio.

**Scenario: Large module vs small module — all THEN/AND clauses covered:**

| Clause | Code | Test |
|--------|------|------|
| module with more code appears as larger volume | `box.size = Vector3(sz, ...)` where sz = float(nd["size"]) | `test_size_encoding.gd::test_large_module_has_bigger_mesh` |
| relative sizes proportional to metric | sz applied 1-to-1 → BoxMesh.size.x ratio = size ratio | `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` |

