### F1 — BLOCKING: Pan direction inverted from Google Maps spec

File: `godot/scripts/camera_controller.gd`, `_handle_motion()`, pan block.

```gdscript
# Current (inverted):
_pivot += right * delta.x * pan_amount
_pivot += forward * delta.y * pan_amount

# Required (Google Maps map-grab model):
_pivot -= right * delta.x * pan_amount
_pivot -= forward * delta.y * pan_amount
```

### F2 — BLOCKING: Wrong predicate in `test_pan_drag_right_increases_pivot_x`

File: `godot/tests/test_ux_polish.gd` line 113.
Current: `return cam._pivot.x > initial_x`
Required: `return cam._pivot.x < initial_x`
Reason: drag right (delta.x = +50) → Google Maps pivot moves LEFT → pivot.x must decrease.

### F3 — BLOCKING: Wrong predicate in `test_pan_drag_left_decreases_pivot_x`

File: `godot/tests/test_ux_polish.gd` line 123.
Current: `return cam._pivot.x < initial_x`
Required: `return cam._pivot.x > initial_x`
Reason: drag left (delta.x = -50) → Google Maps pivot moves RIGHT → pivot.x must increase.

### F4 — BLOCKING: Null directional test in `test_drag_direction_matches_view_movement`

File: `godot/tests/test_ux_polish.gd` lines 129-138.
Current assertion: `return cam._pivot != Vector3.ZERO`
Required: a directional assertion. Example after drag left: `return cam._pivot.x > initial_x`.

