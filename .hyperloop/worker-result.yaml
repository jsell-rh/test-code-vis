### Requirement: JSON Scene Graph Loading — COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` opens `scene_graph_path` via `FileAccess`, parses with `JSON.new()`,
  calls `SceneGraphLoader.load_from_dict()`, then `build_from_graph()`.
- `build_from_graph()` iterates `nodes` → `_create_volume()` and `edges` → `_create_edge()`.
- Positions read directly from JSON `position.{x,y,z}`; no Godot-side layout algorithm.

**Tests** (`godot/tests/test_scene_graph_loading.gd`, 5 tests):
- `test_volumes_created_for_each_node()` — asserts `_anchors` has an entry per node id.
- `test_mesh_instances_exist_in_anchors()` — asserts `MeshInstance3D` child exists in each anchor.
- `test_edge_mesh_instances_created()` — asserts edge produces ≥ 2 `MeshInstance3D` children (line + cone).
- `test_anchor_positions_match_json()` — asserts `anchor.position.is_equal_approx(Vector3(x,y,z))`.
- `test_labels_are_billboard_and_readable()` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0.0`,
  `no_depth_test == true` covering the "labels scale to remain readable" THEN clause.

All GIVEN/WHEN/THEN conditions of the scenario are exercised with concrete fixture data and
property-value assertions on instantiated `Node3D` objects. ✅

