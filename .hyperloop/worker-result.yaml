### F4 — BLOCKING: Null test — `test_drag_direction_matches_view_movement`

**File:** `godot/tests/test_ux_polish.gd`

Worker maps THEN-clause "dragging left reveals content to the right" to this test.

Test body (from reading the actual source):
```gdscript
_press_lmb(cam, Vector2(100.0, 100.0))
_move_mouse(cam, Vector2(100.0, 150.0))  # drag down 50 px
return cam._pivot != Vector3.ZERO
```

This only asserts the pivot moved at all — no directional information. An inverted
implementation passes this identically. Wrong-predicate mapping for a direction THEN-clause.

**Fix:** Add a direction-specific assertion. For example, after dragging left, assert
`cam._pivot.x > initial_x` (consistent with the corrected F2/F3 direction after fixing F1).

