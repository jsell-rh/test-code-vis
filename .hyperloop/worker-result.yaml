### Requirement: Dependency Visualization — COVERED

**Implementation:**
- `main.gd` `_create_edge()`: `ImmediateMesh` with `PRIMITIVE_LINES` draws a line;
  `CylinderMesh` with `top_radius = 0.0` acts as an arrowhead indicating direction.
- Orange for cross-context, grey for internal.

**Scenario: Cross-context dependency — COVERED**
- `test_dependency_rendering.gd`:
  - `test_edge_line_mesh_created` — ImmediateMesh present.
  - `test_direction_indicator_cone_created` — CylinderMesh with top_radius == 0.
  - `test_direction_cone_near_target` — cone at target end.
  - `test_cross_context_cone_is_orange` — colour distinguishes cross-context.

