### Requirement: Dependency Rendering — COVERED

The application MUST render dependency edges as visible lines between connected nodes.

**Implementation**: `_create_edge()` — ImmediateMesh with PRIMITIVE_LINES for the line;
CylinderMesh with top_radius=0 (cone arrowhead) placed at target end, oriented along
the edge direction vector.

**Scenario: Rendering a cross-context dependency**

| THEN-clause | Test | Status |
|---|---|---|
| a line connects the two context volumes | `test_edge_line_mesh_created` finds a MeshInstance3D child of main node whose mesh is an ImmediateMesh | COVERED |
| the line's direction is visually indicated | `test_direction_indicator_cone_created` finds a CylinderMesh with top_radius==0.0; `test_direction_cone_near_target` asserts cone position is within 2 units of the target node | COVERED |

