### Requirement: JSON Scene Graph Loading ‚Äî COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` calls `_load_and_build()` which uses `FileAccess.open()` + `JSON.new().parse()` to read the JSON file.
- `_build()` iterates `graph["nodes"]`, calls `_create_volume()` for each, then iterates `graph["edges"]` calling `_create_edge()` for each.
- `_compute_world_positions()` resolves layout coordinates from the JSON `position` field; `anchor.position = Vector3(p["x"], p["y"], p["z"])` assigns them.

**Tests** (`godot/tests/test_scene_graph_loading.gd` ‚Äî 5 tests):
- `test_volumes_created_for_each_node`: calls `_build()` with fixture, asserts `_anchors.has("ctx1")` and `_anchors.has("mod1")`.
- `test_mesh_instances_exist_in_anchors`: verifies each anchor contains a `MeshInstance3D` child.
- `test_edge_mesh_instances_created`: asserts ‚â• 2 `MeshInstance3D` children on the main node (line + arrowhead per edge).
- `test_anchor_positions_match_json`: asserts `ctx_anchor.position ‚âà (0,0,0)` and `mod_anchor.position ‚âà (2,0,2)`.
- `test_labels_are_billboard_and_readable`: asserts `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true` (covers "labels scale to remain readable" from the Zooming scenario).

All GIVEN/WHEN/THEN conditions exercised with known fixture data against real `Node3D` instances.

