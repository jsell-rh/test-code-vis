## Requirement Analysis

### Requirement: Question-Driven View Generation â€” COVERED

The system accepts a natural language question via `LLMViewGenerator.build_prompt(question, graph)`
and routes LLM output through `LLMViewGenerator.parse_response()` â†’ `SceneInterpreter.apply()`.
`main.gd.apply_view_spec()` wires Stages 1 â†’ 2 in the live scene.

**Scenario: Architectural question**
- THEN generates a view focused on auth-related components:
  `SceneInterpreter._apply_show()` sets `anchor.visible = true`.
  Test: `test_show_op_sets_visible_true` (test_scene_interpreter.gd) asserts `anchor.visible == true`
  on a real `Node3D` after applying the spec. âś“
- AND irrelevant components are hidden or de-emphasized:
  `SceneInterpreter._apply_hide()` sets `anchor.visible = false`.
  Test: `test_hide_op_sets_visible_false` asserts `anchor.visible == false` on a real `Node3D`. âś“
- AND relevant components are arranged to answer the question:
  `SceneInterpreter._apply_arrange()` sets `anchor.position = Vector3(x,y,z)`.
  Tests: `test_arrange_op_sets_position_x`, `test_arrange_op_sets_position_z`,
  `test_arrange_op_sets_all_three_axes` each assert `.position` values on a real `Node3D`. âś“

**Scenario: Impact question**
- THEN shows user database and all dependents: same show op, covered above. âś“
- AND dependency relationships are spatially clear:
  `SceneInterpreter._apply_connect()` adds an `ImmediateMesh` line + `CylinderMesh` arrowhead
  (top_radius=0, pointed cone) to `scene_root`.
  Tests: `test_connect_op_adds_line_geometry` asserts â‰Ą1 `MeshInstance3D` on root;
  `test_connect_op_adds_arrowhead` asserts â‰Ą2 (line + cone) on a real `Node3D`. âś“

