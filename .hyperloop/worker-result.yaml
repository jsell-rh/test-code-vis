## Spec Requirement Coverage

### Requirement: JSON Scene Graph Loading — COVERED

- **Implementation**: `godot/scripts/main.gd` — `_ready()` reads JSON via
  `FileAccess.open()` + `get_as_text()` + `JSON.parse()`, then calls
  `build_from_graph()` which creates `Node3D` anchors and `MeshInstance3D` volumes for
  each node and `ImmediateMesh`/`CylinderMesh` pairs for each edge.  Positions are set
  from the JSON `position` dictionary.
- **Tests** (`test_scene_graph_loading.gd`, 5 tests, all PASS):
  - `test_volumes_created_for_each_node` — anchors keyed by node id
  - `test_mesh_instances_exist_in_anchors` — MeshInstance3D child present in each anchor
  - `test_edge_mesh_instances_created` — ≥2 MeshInstance3D children on main node per edge
  - `test_anchor_positions_match_json` — `anchor.position` matches JSON `position` field
  - `test_labels_are_billboard_and_readable` — BILLBOARD_ENABLED, pixel_size > 0,
    no_depth_test

### Requirement: Containment Rendering — COVERED

- **Implementation**: `_create_volume()` in `main.gd` — bounded_context nodes get
  `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`, and a larger
  `BoxMesh`; module nodes are parented to the bounded_context anchor with full opacity.
- **Tests** (`test_containment_rendering.gd`, 5 tests, all PASS):
  - `test_bounded_context_is_translucent` — transparency != DISABLED, a < 1
  - `test_module_is_opaque` — albedo_color.a >= 1.0
  - `test_module_parented_inside_context` — mod_anchor.get_parent() == ctx_anchor
  - `test_bounded_context_larger_than_module` — ctx BoxMesh.size.x > mod BoxMesh.size.x
  - `test_bounded_context_cull_disabled` — cull_mode == CULL_DISABLED

### Requirement: Dependency Rendering — COVERED

- **Implementation**: `_create_edge()` in `main.gd` — creates an `ImmediateMesh`
