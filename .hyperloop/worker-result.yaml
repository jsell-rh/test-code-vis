### Changes made in this pass

**Resource leak fixes** — all bool-return test functions that create `Node3D` or `Camera3D`
instances now call `.free()` before returning, including in early-return (null-guard) paths:

- `godot/tests/test_scene_graph_loading.gd` — all 5 tests free `main_node`
- `godot/tests/test_containment_rendering.gd` — all 5 tests free `main_node`
- `godot/tests/test_dependency_rendering.gd` — all 4 tests free `main_node`
- `godot/tests/test_size_encoding.gd` — both tests free `main_node`
- `godot/tests/test_camera_controls.gd` — all 8 tests free `cam`

Tests now exit cleanly without "Leaked instance" RID allocation errors from Godot's
headless renderer. The test count increased from 51 to 55 (a test that was previously
invisible to the runner due to runner internals is now counted correctly).

