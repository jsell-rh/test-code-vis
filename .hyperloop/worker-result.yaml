### Requirement: Fixed Visual Primitive Set — COVERED

**Implementation:**
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
  is a compile-time constant in `llm_view_generator.gd` — fixed and finite.
- `parse_response()` delegates to `_make_spec()`, which iterates raw ops and drops any
  whose `"op"` key is not in `VALID_OPS`.
- `SceneInterpreter.apply()` uses a `match` statement with exactly 6 arms; all other
  op strings fall through silently — no new rendering logic can enter at runtime.

**Scenario: LLM uses existing primitives**
- THEN it composes the answer from the existing set of primitives (show, hide, highlight,
  arrange, annotate, connect)
  → Tests `test_build_prompt_contains_show_primitive` through `..._connect_primitive`:
    one test per primitive, each checks that `build_prompt()` embeds the primitive name
    so the LLM knows the contract ✓
- AND no new rendering logic is generated at runtime
  → Test `test_parse_response_filters_unknown_ops`: LLM emits `"invent_new_renderer"` +
    `"show"`; only `"show"` survives ✓
  → Test `test_parse_response_with_all_unknown_ops_returns_empty_operations`: all unknown
    ops → zero operations returned ✓
  → Test `test_unknown_op_is_ignored`: `SceneInterpreter.apply()` with `"teleport"` op
    does not crash and does not mutate any property ✓

