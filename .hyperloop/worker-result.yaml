### Requirement: JSON Scene Graph Loading — COVERED

**Implementation (`godot/scripts/main.gd`):**
- `_ready()` calls `FileAccess.open(scene_graph_path, FileAccess.READ)` + `file.get_as_text()` + `JSON.new().parse()` + `build_from_graph()`. Not a stub — full I/O and parse logic present.
- `build_from_graph()` iterates all nodes and calls `_create_volume()` for each, producing a `Node3D` anchor with a `MeshInstance3D` (BoxMesh) child → satisfies "generates 3D volumes for each node".
- `build_from_graph()` iterates all edges and calls `_create_edge()` → satisfies "generates connections for each edge".
- `anchor.position = Vector3(float(p["x"]), float(p["y"]), float(p["z"]))` taken directly from the JSON `position` field → satisfies "positions elements according to the layout data in the JSON".

**Tests (`godot/tests/test_scene_graph_loading.gd`, 5 tests):**
- `test_volumes_created_for_each_node` — asserts `_anchors` contains entries for all node ids.
- `test_mesh_instances_exist_in_anchors` — asserts each anchor has a `MeshInstance3D` child.
- `test_edge_mesh_instances_created` — asserts ≥2 `MeshInstance3D` children on root node (line + arrowhead) for an edge.
- `test_anchor_positions_match_json` — asserts anchor `.position` matches JSON `position` values exactly (approx).
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test == true` on `Label3D`.

### Requirement: Containment Rendering — COVERED

**Implementation (`main.gd` → `_create_volume()`):**
- `bounded_context` volumes: `albedo_color = Color(0.25, 0.45, 0.85, 0.18)`, `transparency = TRANSPARENCY_ALPHA`, `cull_mode = CULL_DISABLED`. BoxMesh uses `sz` from JSON `size` field.
- `module` volumes: `albedo_color = Color(0.35, 0.70, 0.40, 1.0)` (fully opaque). No transparency set.
- Child volumes parented to parent's anchor (lines 69–76): `_create_volume(nd, parent_anchor)`.
- Context `size=10` → box.size.x=10; module `size=3` → box.size.x=3, so parent is always larger when JSON sizes reflect hierarchy.

**Tests (`godot/tests/test_containment_rendering.gd`, 5 tests):**
- `test_bounded_context_is_translucent` — asserts `TRANSPARENCY_ALPHA` and `alpha < 1.0`.
- `test_module_is_opaque` — asserts `albedo_color.a >= 1.0`.
- `test_module_parented_inside_context` — asserts `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — asserts `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled` — asserts `cull_mode == CULL_DISABLED`.

### Requirement: Dependency Rendering — COVERED

**Implementation (`main.gd` → `_create_edge()`):**
- Creates an `ImmediateMesh` (PRIMITIVE_LINES) from source to target world position → visible line.
- Creates a `CylinderMesh` with `top_radius = 0.0` (arrowhead cone) oriented along `dir = (to_pos - from_pos).normalized()` via `Basis(Quaternion(Vector3.UP, dir))`, placed at the target end. This is a geometric direction indicator, not merely a color distinction.
- Cross-context edges use orange (`Color(1.0, 0.50, 0.10)`); internal edges use grey.

**Tests (`godot/tests/test_dependency_rendering.gd`, 4 tests):**
- `test_edge_line_mesh_created` — finds `MeshInstance3D` with `ImmediateMesh` on root.
- `test_direction_indicator_cone_created` — finds `CylinderMesh` with `top_radius == 0.0` on root.
- `test_direction_cone_near_target` — asserts cone position is within 2 units of target.
- `test_cross_context_cone_is_orange` — asserts `albedo_color.r > 0.8` and `albedo_color.b < 0.3` on cross-context cone material.

### Requirement: Size Encoding — COVERED

**Implementation (`main.gd` → `_create_volume()`):**
- `var sz: float = float(nd["size"])` applied directly: `box.size = Vector3(sz, sz * 0.2, sz)` for contexts; `Vector3(sz, sz * 0.6, sz)` for modules. Mesh x-dimension is linearly proportional to the JSON `size` metric.

**Tests (`godot/tests/test_size_encoding.gd`, 2 tests):**
- `test_large_module_has_bigger_mesh` — asserts `large_mesh.size.x > small_mesh.size.x` (sizes 9 vs 3).
- `test_mesh_sizes_proportional_to_metric` — asserts `large_mesh.size.x / small_mesh.size.x ≈ 3.0` within 0.001 tolerance.

### Requirement: Camera Controls — COVERED

**Implementation (`godot/scripts/camera_controller.gd`):**
- Initial state: `_theta = 0.15` rad (~8.6° from vertical) — satisfies "top-down overview". `_distance = 40.0` (positive).
- Scroll wheel: `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `MOUSE_BUTTON_WHEEL_DOWN` increases it. Clamped to `[min_distance, max_distance]`.
- Middle-mouse drag: horizontal delta changes `_phi` (azimuth); vertical delta changes `_theta` (polar). `_theta` clamped to `(0.01, PI-0.01)` — camera never flips, orientation stays intuitive.
- `_update_transform()` uses spherical coordinates and calls `look_at(_pivot, Vector3.UP)` — up direction is always preserved.

**Tests (`godot/tests/test_camera_controls.gd`, 8 tests):**
- `test_initial_theta_is_near_top_down` — `_theta < PI/4` ✓
- `test_initial_distance_is_positive` — `_distance > 0` ✓
- `test_scroll_up_decreases_distance` — WHEEL_UP reduces `_distance` ✓
- `test_scroll_down_increases_distance` — WHEEL_DOWN increases `_distance` ✓
- `test_zoom_clamped_at_minimum` — 200× WHEEL_UP, `_distance >= min_distance` ✓
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse + horizontal motion changes `_phi` ✓
- `test_orbit_vertical_drag_changes_theta` — middle-mouse + vertical motion changes `_theta` ✓
- `test_set_pivot_updates_state` — `set_pivot()` updates `_pivot` and `_distance` ✓

### Requirement: Godot 4.6 — COVERED

**Implementation:**
- `godot/project.godot` line 19: `config/features=PackedStringArray("4.6")` — unambiguous 4.6 declaration.
- All five scripts (`main.gd`, `camera_controller.gd`, `scene_graph_loader.gd`, `view_spec.gd`, `view_spec_renderer.gd`) are `.gd` GDScript files.
- `main.gd` uses `FileAccess.open()` + `file.get_as_text()` — the Godot 4.x API. No use of the removed `read_as_text()`.

**Tests (`godot/tests/test_engine_version.gd`, 3 tests):**
- `test_project_godot_declares_46` — opens `res://project.godot` via `FileAccess.open()` + `get_as_text()`, asserts `"4.6" in text`.
- `test_features_line_contains_46` — asserts `'PackedStringArray("4.6")' in text`.
- `test_fileaccess_open_returns_non_null` — exercises the exact `FileAccess` API path used in `_ready()`.

