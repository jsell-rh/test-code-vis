### Requirement: Fixed Visual Primitive Set — COVERED

The set of visual primitives MUST be fixed and finite. The LLM selects from available primitives; it does not invent new ones.

**Implementation:**
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` declared as a constant in `llm_view_generator.gd`.
- `_make_spec()` silently drops any op whose "op" key is not in VALID_OPS — unknown LLM-invented operations cannot reach the renderer.
- `scene_interpreter.gd::apply()` uses a `match` block that only handles the same 6 ops; any unknown op in the dict is a no-op at the renderer level as well.

**Scenario: LLM uses existing primitives — COVERED**

| THEN clause | Code | Test |
|---|---|---|
| Composes from existing set of 6 primitives | `build_prompt()` lists all VALID_OPS in the prompt; `_make_spec()` enforces the set | `test_build_prompt_contains_{show,hide,highlight,arrange,annotate,connect}_primitive` (6 tests); `test_parse_response_all_six_ops_pass_through` |
| No new rendering logic generated at runtime | Unknown ops silently dropped by `_make_spec()` | `test_parse_response_filters_unknown_ops` ("invent_new_renderer"), `test_parse_response_with_all_unknown_ops_returns_empty_operations` ("render_as_graph", "explode_view"), `test_unknown_op_is_ignored` ("teleport") |

