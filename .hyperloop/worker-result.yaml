## Requirement Summary

### Requirement: Pan with Left Mouse Button — COVERED
- `_handle_button`: `MOUSE_BUTTON_LEFT` → `_panning = true` (camera_controller.gd:102–104)
- `_handle_motion`: when `_panning`, pivot shifts by `right * delta.x * pan_amount` (lines 141–159)
- Tests: `test_lmb_drag_pans_camera`, `test_pan_direction_not_inverted`

### Requirement: Non-Inverted Movement — COVERED
- Google Maps convention: `_target_pivot -= right * delta.x * pan_amount` (line 156)
- Drag left (delta.x < 0) → subtract negative → pivot.x increases → camera moves +X → scene shifts left ✓
- Test: `test_pan_direction_not_inverted` — drag 50px left → pivot.x > 0 ✓

### Requirement: Zoom Toward Mouse Cursor — COVERED
- `_zoom_toward_point`: shifts `_target_pivot` by zoom ratio toward/away from world cursor point (lines 170–178)
- Tests: `test_zoom_in_shifts_pivot_toward_cursor`, `test_zoom_in_cursor_point_invariant`, `test_zoom_out_shifts_pivot_away_from_cursor`

### Requirement: Orbit Around Mouse Point — COVERED
- RMB press: `_get_ground_point_under_cursor` → `begin_orbit_at_world_point` (lines 113–116)
- `begin_orbit_at_world_point`: sets `_pivot = world_pt`, recomputes spherical coords (lines 73–85)
- Tests: `test_orbit_uses_right_mouse_button`, `test_orbit_around_cursor_point`, `test_orbit_pivot_is_world_point`

### Requirement: Smooth Camera Movement — COVERED
- `_process(delta)`: lerps `_distance`/`_pivot` toward targets using exponential smoothing (lines 42–47)
- Scroll events change only targets; actual distance/pivot converge over subsequent frames
- Tests: `test_smooth_zoom_target_differs_from_distance_after_scroll`, `test_smooth_zoom_process_interpolates_distance`, `test_pan_proportional_to_drag_speed`

