## Spec Alignment Review — specs/interaction/moldable-views.spec.md

All three SHALL requirements are implemented in GDScript and covered by
behavioral tests in `godot/tests/`. Every scenario has a corresponding
test that exercises the exact Given/When/Then conditions using fixture
data and asserts runtime outputs (scene-tree nodes, property values,
positions).

Note: `specs/prototype/prototype-scope.spec.md` marks moldable views as
NOT in prototype scope. The implementation was done anyway (the task was
explicitly assigned). Per the review guidelines, out-of-scope exclusions
are grounds not to fail for missing features — they do not prohibit
implementing the feature. All requirements from the moldable-views spec
itself are fully covered.

---

### Requirement: Question-Driven View Generation — COVERED

**Code:** `godot/scripts/question_panel.gd` → `QuestionPanel.process_question()`
accepts a natural-language question string and returns a `ViewSpec` dict
filtered through `ViewSpec.from_dict()`. The prompt builder in
`godot/scripts/llm_view_generator.gd` → `LLMViewGenerator.build_prompt()`
packages the question plus graph context for an LLM call.
`godot/scripts/view_spec_renderer.gd` → `ViewSpecRenderer.apply()` turns
the resulting spec into a 3D spatial scene (MeshInstance3D children under a
Node3D root).

**Scenario: Architectural question — COVERED**

- `test_question_panel.gd::test_auth_question_show_op_includes_auth_service`
  — GIVEN graph + WHEN "how does authentication work?" THEN spec has `show`
  op containing `auth_service`.
- `test_question_panel.gd::test_auth_question_excludes_unrelated_nodes_from_render`
  — GIVEN graph + auth spec THEN ViewSpecRenderer excludes `payment_service`
  (irrelevant node not in `show` list).
- `test_question_panel.gd::test_auth_question_includes_highlight_op_for_auth_service`
  — AND relevant component is visually emphasised via `highlight` op.
- `test_question_panel.gd::test_auth_question_includes_annotate_op_for_auth_service`
  — AND component is arranged/labelled via `annotate` op.
- `test_question_panel.gd::test_auth_question_highlight_sets_material_on_rendered_node`
  — runtime check: `material_override` is non-null on the auth_service
  MeshInstance3D after `ViewSpecRenderer.apply()`.
- `test_view_spec_renderer.gd::test_show_op_includes_listed_node_in_scene_tree`
  — direct renderer coverage of the `show` primitive.
- `test_view_spec_renderer.gd::test_show_op_excludes_non_listed_nodes_from_scene_tree`
  — direct renderer coverage of de-emphasis logic.

**Scenario: Impact question — COVERED**

- `test_question_panel.gd::test_impact_question_show_op_includes_user_db`
  — WHEN "what depends on the user database?" THEN `show` op contains
  `user_db`.
- `test_question_panel.gd::test_impact_question_show_op_includes_dependents`
  — AND `auth_service` (dependent) also appears in `show` op.
- `test_question_panel.gd::test_impact_question_includes_connect_op`
  — AND dependency relationships are spatially clear via `connect` op.
- `test_question_panel.gd::test_impact_question_connect_targets_user_db`
  — `connect` op targets `user_db` specifically.
- `test_question_panel.gd::test_impact_question_connect_creates_midpoint_node_in_scene`
  — runtime check: `conn_auth_service_user_db` Node3D exists under root
  after `ViewSpecRenderer.apply()`.
- `test_view_spec_renderer.gd::test_connect_op_creates_connector_node_in_scene_tree`
  — direct renderer coverage.
- `test_view_spec_renderer.gd::test_connect_op_connector_position_is_midpoint_x`
  — connector placed at computed midpoint (x=2.5 for auth@0, user_db@5).

