## THEN-Clause → Test Mapping

| THEN clause (verbatim from spec) | Test function | Assertion |
|---|---|---|
| camera pans in the direction of the drag | `test_lmb_drag_pans_camera` | `cam._pivot != initial_pivot` |
| the movement direction matches the drag direction (not inverted) | `test_pan_direction_not_inverted` | drag-left → `cam._pivot.x > 0.0` (Google Maps sign-chain) |
| the scene moves in the same direction as the drag | `test_pan_direction_not_inverted` | same assertion — drag left → scene shifts left |
| the view zooms toward the point under the cursor | `test_zoom_in_shifts_pivot_toward_cursor` | cursor at (+10,0,0), zoom in → `cam._target_pivot.x > 0.0` |
| the component under the cursor stays under the cursor during the zoom | `test_zoom_in_cursor_point_invariant` | `0 < pivot.x < world_pt.x` after zoom in |
| the view zooms out from the point under the cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | cursor at (+10,0,0), zoom out → `cam._target_pivot.x < 0.0` |
| the camera orbits around the point under the cursor at orbit start | `test_orbit_uses_right_mouse_button` + `test_orbit_around_cursor_point` | RMB drag → `_phi` changes; `cam._pivot == world_pt` |
| the component remains at the visual center during the orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` → camera `look_at(_pivot)` keeps it centered |
| the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll` | `cam._target_distance < cam._distance` after scroll (target changed, actual not yet) |
| (smooth zoom) _process interpolates distance | `test_smooth_zoom_process_interpolates_distance` | after `_process(0.1)`: `20 < _distance < 40` |
| the pan movement is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | 50px drag → larger pivot displacement than 10px drag |

