## THEN Clause Verification

### JSON Scene Graph Loading
- **THEN it reads the JSON file**: `main.gd` lines 32-44 — `FileAccess.open()` + `get_as_text()` + `JSON.new()` + `json.parse()`.
- **AND generates 3D volumes for each node**: `build_from_graph()` calls `_create_volume()` for every node; asserted by `test_volumes_created_for_each_node` and `test_mesh_instances_exist_in_anchors`.
- **AND generates connections for each edge**: `build_from_graph()` calls `_create_edge()` for every edge; asserted by `test_edge_mesh_instances_created` (>= 2 MeshInstance3D children per edge: line + cone).
- **AND positions elements according to the layout data**: `anchor.position = Vector3(p["x"], p["y"], p["z"])`; asserted by `test_anchor_positions_match_json` on real Node3D objects.

### Containment Rendering
- **THEN bounded context appears as a larger translucent volume**: `TRANSPARENCY_ALPHA` + `albedo_color.a = 0.18`; asserted by `test_bounded_context_is_translucent`.
- **AND child modules appear as smaller opaque volumes inside it**: module material `albedo_color.a = 1.0`, parented to context anchor; asserted by `test_module_is_opaque` and `test_module_parented_inside_context`.
- **AND boundary of parent is visually distinct**: `CULL_DISABLED` on context; asserted by `test_bounded_context_cull_disabled`. Size: `sz=10 > sz=3`; asserted by `test_bounded_context_larger_than_module`.

### Dependency Rendering
- **THEN a line connects the two context volumes**: `ImmediateMesh` PRIMITIVE_LINES with `from_pos`/`to_pos`; asserted by `test_edge_line_mesh_created`.
- **AND the line's direction is visually indicated**: `CylinderMesh` with `top_radius=0.0` (pointed cone) at target end, rotated to edge direction; asserted by `test_direction_indicator_cone_created`, `test_direction_cone_near_target`, `test_cross_context_cone_is_orange`.

### Size Encoding
- **THEN module with more code appears as a larger volume**: `BoxMesh.size.x = sz` from JSON `size` field; asserted by `test_large_module_has_bigger_mesh`.
- **AND relative sizes are proportional to the metric**: ratio 9.0/3.0 = 3.0 within 0.001 tolerance; asserted by `test_mesh_sizes_proportional_to_metric`.

### Camera Controls — Top-down overview
- **THEN camera defaults to top-down view**: `_theta = 0.15 < PI/4`; asserted by `test_initial_theta_is_near_top_down`.

### Camera Controls — Zooming in
- **THEN camera moves closer**: `WHEEL_UP` decreases `_distance`; asserted by `test_scroll_up_decreases_distance`.
- **AND labels scale to remain readable**: `BILLBOARD_ENABLED`, `pixel_size > 0`, `no_depth_test = true`; asserted by `test_labels_are_billboard_and_readable`.

### Camera Controls — Orbiting
- **THEN camera rotates around focal point**: middle-mouse drag updates `_phi`/`_theta`; asserted by `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`.
- **AND orientation remains intuitive**: `look_at(_pivot, Vector3.UP)` + theta clamped; asserted by `test_set_pivot_updates_state`.

### Godot 4.6 — Engine version
- **THEN it uses Godot 4.6.x**: `project.godot` contains `"4.6"`; asserted by `test_project_godot_declares_version_4_6` and `test_project_declares_godot_46` via `FileAccess.open()` + `get_as_text()`.
- **AND all scripts use GDScript**: no `.cs` files; asserted by `test_main_script_is_gdscript`.
- **AND all API calls are valid for the Godot 4.6 API**: `FileAccess.open()` + `get_as_text()` used; asserted by `test_main_uses_godot4_fileaccess_api`.
