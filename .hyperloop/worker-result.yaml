## Spec Alignment Review — specs/core/system-purpose.spec.md
### Branch: hyperloop/task-028 (round 3 — independent re-verification)

---

### Prior-Round Context

Round 1 found a critical defect: 7 of 8 test functions in
`godot/tests/test_system_purpose.gd` were inert under Pattern-1 because they
returned `bool` without calling `_check()`. Commit `37f00db` fixed that.
Round 2 confirmed the fix. This is an independent re-verification.

---

### Pattern-1 Wiring — Confirmed Correct

`test_system_purpose.gd` declares `var _test_failed: bool = false`, so
`run_tests.gd._run_one()` detects Pattern-1, resets `_test_failed`, calls each
`test_*` method, and checks `_test_failed` afterward. All 8 test functions are
now `-> void` and signal failure exclusively through `_check()`. No bool-returning
test functions remain.

---

### Requirement-by-Requirement Status

---

#### Requirement 1: Understanding Without Writing Code (SHALL)

**Scenario: Architect evaluates unfamiliar system**

THEN — human can correctly answer architectural questions:

- **R1a (labels)** — `main.gd._create_volume()` sets `label.billboard =
  BaseMaterial3D.BILLBOARD_ENABLED` and `label.pixel_size = 0.012` on every
  `Label3D`; `label.text` is set to `nd["name"]`.
  Test: `test_all_scene_nodes_have_visible_name_labels` asserts
  `billboard == BILLBOARD_ENABLED`, `pixel_size > 0.0`, and presence of labels
  whose text matches the node names from the fixture — via `_check()`. **COVERED**

- **R1b (type visual)** — `main.gd._create_volume()` sets
  `mat.transparency = BaseMaterial3D.TRANSPARENCY_ALPHA` for `bounded_context`
  type and leaves modules opaque.
  Test: `test_bounded_context_nodes_distinguishable_by_type` iterates scene
  children and `_check`s that at least one `MeshInstance3D` carries
  `TRANSPARENCY_ALPHA`. **COVERED**

AND — human can identify structural problems:

- **R1c (size encoding)** — `box.size = Vector3(sz, sz * 0.2, sz)` / `Vector3(sz,
  sz * 0.6, sz)` where `sz = float(nd["size"])` makes size-field directly encode
  mesh extent.
  Test: `test_node_size_grows_with_scene_graph_size_value` builds from a fixture
  with `size: 5.0` vs `size: 1.0`, then `_check`s `big BoxMesh.size.x > small
  BoxMesh.size.x`. **COVERED**

- **R1d (coupling lines)** — `_create_edge()` builds an `ImmediateMesh` with
  `PRIMITIVE_LINES` and adds it to the scene root.
  Test: `test_dependency_edges_expose_coupling_in_scene` asserts an
  `ImmediateMesh` child exists via `_check()`. **COVERED**

AND — human can predict the impact of proposed changes:

- **R1e (directional arrowhead)** — `_create_edge()` appends a `CylinderMesh`
  with `top_radius = 0.0` placed at the target end, making direction discernible.
  Test: `test_cross_context_edge_has_directional_arrowhead` scans children for a
  `CylinderMesh` with `top_radius == 0.0` and `_check`s it was found. **COVERED**

**Verdict for Requirement 1: PASS — all THEN-clauses COVERED**

