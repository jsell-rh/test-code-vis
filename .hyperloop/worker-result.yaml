## Findings

### F1 (FAIL — BLOCKING): test_ux_polish.gd not wired into run_tests.gd

**Root cause:** `godot/tests/run_tests.gd` does not include a `_run_suite()` call for
`test_ux_polish.gd`. The test file exists and all functions have correct predicate
derivations, but they are dead code — the Godot headless runner never executes them.

**Evidence:**
```
grep -n "test_ux_polish" godot/tests/run_tests.gd
(no output)
```

**Branch provenance:** The branch diverged from main at `a5e0517c` before main added the
UX Polish entry to run_tests.gd (via commit `464a8f67`). The branch added `test_ux_polish.gd`
to `godot/tests/` but did not update `run_tests.gd`. Main's current `run_tests.gd` already
has the correct entry; this branch is simply missing it.

**Impact:** Every UX Polish THEN-clause is MISSING (all 11 in the table above). Zero spec
scenarios are behaviorally tested.

**Prescribed fix:** Add to `godot/tests/run_tests.gd` immediately after the task-007 block:
```gdscript
	# --- task-016: UX Polish spec ---
	_run_suite(preload("res://tests/test_ux_polish.gd").new())
```

---

### F2 (FAIL — BLOCKING): test_camera_controls.gd has wrong orbit button and wrong distance variable

**Root cause (pre-existing, not introduced by this branch):** At the merge base,
`test_camera_controls.gd` uses `MOUSE_BUTTON_MIDDLE` for orbit tests and checks
`_distance` (not `_target_distance`) for scroll tests. Main has since corrected both
(commit `997ac245` and related: uses `MOUSE_BUTTON_RIGHT`, checks `_target_distance`).
This branch has not incorporated those fixes.

**Specific broken tests:**

1. `test_orbit_horizontal_drag_changes_phi` and `test_orbit_vertical_drag_changes_theta`:
   - Press `MOUSE_BUTTON_MIDDLE` → not handled by `_handle_button` match statement
     → `_orbiting` stays `false` → motion handler does nothing → `_phi`/`_theta` unchanged
   - `return cam._phi != initial_phi` → `false` → **FAIL** if run in headless

2. `test_scroll_up_decreases_distance` and `test_scroll_down_increases_distance`:
   - Scroll events change `_target_distance` (smooth zoom), NOT `_distance` immediately
   - `return cam._distance < initial_distance` → `false` (distance unchanged) → **FAIL**

**Implementation in camera_controller.gd is correct** (uses `MOUSE_BUTTON_RIGHT` for orbit,
uses `_target_distance` with lerp in `_process()`). The tests are wrong, not the production code.

**Note:** This is a pre-existing defect at the branch's merge base, not introduced by task-016.
Main has fixed it. However, since Godot headless tests are blocked by F1 anyway, and
since the implementation is correct, this is secondary to F1. The fix is to rebase
onto current main (which includes the corrected `test_camera_controls.gd`) or manually
apply the corrections:
- `MOUSE_BUTTON_MIDDLE` → `MOUSE_BUTTON_RIGHT` in orbit test helpers
- `cam._distance` → `cam._target_distance` in scroll test assertions

