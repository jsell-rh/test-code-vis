### THEN→Test Mapping (all THEN-clauses verified)

| THEN-clause (spec) | Test function | Assertion predicate | Status |
|---|---|---|---|
| Camera pans in direction of drag | test_lmb_pan_moves_pivot | pivot != initial_pivot | PASS |
| Movement not inverted — drag right | test_pan_drag_right_increases_pivot_x | pivot.x < initial_x (grab model) | PASS |
| Movement not inverted — drag left | test_pan_drag_left_decreases_pivot_x | pivot.x > initial_x (grab model) | PASS |
| Drag left reveals content right (i.e. parenthetical) | test_drag_direction_matches_view_movement | pivot.z < 0.0 for drag-down | PASS |
| View zooms toward cursor | test_zoom_toward_cursor_shifts_pivot_toward_cursor | pivot.x > 0 (cursor at x=10) | PASS |
| Component stays under cursor on zoom-in | test_component_stays_under_cursor_on_zoom_in | pivot.x after > before | PASS |
| View zooms out from cursor | test_zoom_out_from_cursor_shifts_pivot_away | pivot.x < 5 (cursor at x=10) | PASS |
| Camera orbits around cursor at orbit start | test_orbit_pivot_set_to_cursor_point_at_start | pivot == world_point | PASS |
| Component at visual center during orbit | test_component_remains_at_visual_center_during_orbit | pivot unchanged after drag | PASS |
| Zoom smooth (interpolated) | test_zoom_is_interpolated_not_instantaneous | _distance not jumped; partial after 1 frame | PASS |
| Pan proportional to drag speed | test_pan_proportional_to_drag_speed | 50px drag > 10px drag displacement | PASS |

All 11 THEN-clause assertions independently derived from spec before reading test bodies.
Derivation cross-check:

**Non-Inverted Movement parenthetical derivation:**
The spec states: "dragging left reveals content to the right, as in Google Maps"
- Grab model: drag left → map slides right → content to the RIGHT enters view
- From camera perspective: pivot (focal point) moves RIGHT (positive x in identity frame)
- Derived predicate: cam._pivot.x > initial_x for drag-left
- `test_pan_drag_left_decreases_pivot_x` asserts `cam._pivot.x > initial_x` ✓ (name is misleading but assertion matches derivation)

- By symmetry, drag right → pivot moves LEFT → x decreases
- `test_pan_drag_right_increases_pivot_x` asserts `cam._pivot.x < initial_x` ✓ (name wrong, assertion correct)

**Implementation derivation (camera_controller.gd):**
```
_pivot -= right * delta.x * pan_amount
```
- drag left: delta.x = -50 → -right * -50 = +right * 50 → pivot.x += 50*pan_amount (RIGHT) ✓
- drag right: delta.x = +50 → -right * +50 = -right * 50 → pivot.x -= 50*pan_amount (LEFT) ✓

**Zoom direction derivation:**
- WHEEL_UP → direction = -zoom_speed (negative) → step negative → target_distance decreases → zoom IN
- zoom_fraction = 1 - (new/old) = positive → pivot.lerp(cursor, positive) → pivot moves TOWARD cursor ✓
- WHEEL_DOWN → direction = +zoom_speed → step positive → target_distance increases → zoom OUT
- zoom_fraction = negative → pivot moves AWAY from cursor ✓

