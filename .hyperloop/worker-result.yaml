## Untestable THEN-Clauses

1. **"their relative positions reflect their coupling (tightly coupled contexts are closer together)"**
   - Verbatim THEN: "their relative positions reflect their coupling (tightly coupled contexts are closer together)"
   - Why untestable: "Closer together" is a perceptual/spatial judgment requiring a rendered view and human assessment. In headless CI there is no visual output to measure visual proximity against coupling strength.
   - Architectural evidence: `extractor/extractor.py` `_order_by_coupling()` sorts contexts by coupling count before assigning circular positions, ensuring high-coupling pairs appear at adjacent angular positions. `test_anchor_positions_match_json` confirms Godot renders at exact JSON coordinates. The algorithm is correct; the perceptual quality cannot be asserted headlessly.

