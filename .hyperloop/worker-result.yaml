## Spec Coverage

### Camera Controls — Top-down overview (COVERED)
- `camera_controller.gd`: `_theta` initialized to `0.15` rad ≈ 8.6° (well below PI/4
  threshold for "predominantly top-down").
- `_frame_camera()` in `main.gd` computes scene bounding box and calls
  `_camera.call("set_pivot", centre, distance)` so the camera frames the entire graph on
  startup.
- Tests: `test_initial_theta_is_near_top_down`, `test_initial_distance_is_positive` — PASS.

### Camera Controls — Zooming in (COVERED)
- `MOUSE_BUTTON_WHEEL_UP` decreases `_distance`; `WHEEL_DOWN` increases it. Distance is
  clamped to `[min_distance, max_distance]`.
- Labels remain readable through `Label3D.billboard = BILLBOARD_ENABLED` and
  `pixel_size = 0.012`, verified by `test_labels_are_billboard_and_readable`.
- Tests: `test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`,
  `test_zoom_clamped_at_minimum` — PASS.

### Camera Controls — Orbiting (COVERED)
- Middle-mouse drag changes `_phi` (azimuth) and `_theta` (elevation). `_theta` is clamped
  to `[0.01, PI - 0.01]` so the camera never flips past the poles.
- `look_at(_pivot, Vector3.UP)` keeps "up stays up" intuitive orientation.
- Tests: `test_orbit_horizontal_drag_changes_phi`, `test_orbit_vertical_drag_changes_theta`,
  `test_set_pivot_updates_state` — PASS.

### Godot 4.6 (COVERED)
- `project.godot` has `config/features=PackedStringArray("4.6")`.
- All scripts are GDScript. `FileAccess.get_as_text()` is used (Godot 4.6 API).
- Engine confirmed as Godot 4.6.2.stable by compile check.

