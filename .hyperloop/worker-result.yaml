### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Lines 168–176: `_zoom_toward_point(world_pt, direction)` adjusts `_target_distance` and
  shifts `_target_pivot` by the zoom ratio to keep cursor world-point invariant.
- Lines 121–128: Called for `MOUSE_BUTTON_WHEEL_UP` (zoom in) and
  `MOUSE_BUTTON_WHEEL_DOWN` (zoom out).

**Scenario: Zooming into a specific component** — COVERED
