### Requirement: Zoom Toward Mouse Cursor ‚Äî COVERED

**Implementation** (`camera_controller.gd` lines 88‚Äì106, `_zoom_toward_cursor`):
`MOUSE_BUTTON_WHEEL_UP/DOWN` call `_zoom_toward_cursor(_mouse_to_ground(event.position), ¬±zoom_speed)`.
`_zoom_toward_cursor` adjusts `_target_distance` then shifts `_pivot`:
```gdscript
var zoom_fraction: float = 1.0 - (_target_distance / old_target)
_pivot = _pivot.lerp(cursor_world, zoom_fraction)
```
Zoom-in (`direction < 0`): `zoom_fraction > 0` ‚Üí pivot lerps toward cursor.
Zoom-out (`direction > 0`): `zoom_fraction < 0` ‚Üí pivot shifts away from cursor.

**Scenario: Zooming into a specific component**
- THEN view zooms toward point under cursor ‚Üí `test_zoom_toward_cursor_shifts_pivot_toward_cursor`
- AND component stays under cursor ‚Üí `test_component_stays_under_cursor_on_zoom_in`

**Scenario: Zooming out**
- THEN view zooms out from point under cursor ‚Üí `test_zoom_out_from_cursor_shifts_pivot_away`

| THEN-clause | Test | Status |
|---|---|---|
| Pivot shifts toward cursor on zoom-in | `test_zoom_toward_cursor_shifts_pivot_toward_cursor` | PASS |
| Component stays under cursor (pivot moves closer to cursor) | `test_component_stays_under_cursor_on_zoom_in` | PASS |
| Pivot shifts away from cursor on zoom-out | `test_zoom_out_from_cursor_shifts_pivot_away` | PASS |
| Cursor at pivot does not corrupt pivot state | `test_zoom_cursor_at_pivot_does_not_shift_pivot` | PASS |
| Zoom-out increases target distance | `test_zoom_out_increases_target_distance` | PASS |

