### Requirement: Containment Rendering — COVERED

**Implementation** (`main.gd → _create_volume()` + `_build()`):
- Root nodes (parent == null) added to the scene root; child nodes parented to
  their parent's anchor — module `Node3D` is a scene-tree child of the context
  `Node3D` (structural, not cosmetic).
- Bounded context: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`,
  `CULL_DISABLED` — visually distinct from children.
- Module: `albedo_color.a = 1.0` (opaque), `BoxMesh` sized to `sz * 0.6`
  height (compact cube, smaller than context slab).

**Tests** (`godot/tests/test_containment_rendering.gd` — 5 tests):
- `test_bounded_context_is_translucent` — transparency not DISABLED and
  `albedo_color.a < 1.0`.
- `test_module_is_opaque` — `albedo_color.a >= 1.0`.
- `test_module_parented_inside_context` — `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module` — `ctx_mesh.size.x > mod_mesh.size.x`.
- `test_bounded_context_cull_disabled` — `mat.cull_mode == CULL_DISABLED`.

