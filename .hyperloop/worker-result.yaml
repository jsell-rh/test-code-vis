## Implementation Summary

### Stage 1: LLM → View Spec (`llm_view_generator.gd`)

- `build_prompt(question, graph)` — embeds question + graph node ids + all 6
  `VALID_OPS` into a structured LLM prompt; LLM sees only the fixed primitive set.
- `parse_response(llm_text)` — strips markdown fences, parses JSON, filters out
  any op not in `VALID_OPS` via `_make_spec()`. Returns `{"question": …, "operations": […]}`.
- `VALID_OPS = ["show", "hide", "highlight", "arrange", "annotate", "connect"]` is a
  compile-time constant — no new rendering logic enters the system at runtime.

### Stage 2: View Spec → 3D Scene (`scene_interpreter.gd`)

`apply(spec, anchors, scene_root, world_positions)` dispatches each operation:

| Op | Implementation | Scene Mutation |
|---|---|---|
| show | `_apply_show()` | `anchor.visible = true` |
| hide | `_apply_hide()` | `anchor.visible = false` |
| highlight | `_apply_highlight()` | `mat.albedo_color = Color(r, g, b)` |
| arrange | `_apply_arrange()` | `anchor.position = Vector3(x, y, z)` |
| annotate | `_apply_annotate()` | `Label3D.new()` + `billboard=ENABLED` + `pixel_size=0.05` |
| connect | `_apply_connect()` | `ImmediateMesh` line + `CylinderMesh` arrowhead (top_radius=0) |

### Pipeline Wiring (`main.gd`)

`apply_view_spec(spec)` instantiates `SceneInterpreter` and passes the live
`_anchors` and `_world_positions` dictionaries built by `_ready()`. The pipeline
is complete end-to-end.

