### Requirement: Camera Controls — COVERED

camera_controller.gd: spherical-coordinate orbit (_phi, _theta), scroll-wheel zoom
with min/max clamping, right-mouse pan. `_theta = 0.15` rad (≈ 8.6°) at init.
`look_at(_pivot, Vector3.UP)` enforces world-up on every transform update.
`set_pivot()` exposed for programmatic framing called from `main.gd:_frame_camera()`.

Tests (assert state variables directly on instantiated camera):
  test_initial_theta_is_near_top_down    — _theta < PI/4
  test_initial_distance_is_positive      — _distance > 0
  test_scroll_up_decreases_distance      — WHEEL_UP → _distance decreases
  test_scroll_down_increases_distance    — WHEEL_DOWN → _distance increases
  test_orbit_horizontal_drag_changes_phi — MMB drag → _phi changes
  test_orbit_vertical_drag_changes_theta — MMB drag → _theta changes
  test_set_pivot_updates_state           — pivot and distance stored correctly
  test_zoom_clamped_at_minimum           — 200× scroll-up never breaks min_distance

Labels: `billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true`
  test_labels_are_billboard_and_readable — asserts all three properties on Label3D

