### Requirement: Smooth Camera Movement — COVERED

**Scenario: Smooth zoom**

Implementation:
- `_process()` (lines 42-47): Exponential smoothing `t = 1 - pow(0.05, delta * zoom_smooth)`,
  `_distance = lerpf(_distance, _target_distance, t)`. Scroll events set only
  `_target_distance`; `_distance` interpolates each frame.

Tests:
- `test_smooth_zoom_target_differs_from_distance_after_scroll()` (line 310): After WHEEL_UP,
  asserts `_target_distance < _distance` — target changed but current has not snapped.
  Covers THEN "not instantaneous."
- `test_smooth_zoom_process_interpolates_distance()` (line 325): After `_process(0.1)` with
  current=40 and target=20, asserts `20 < _distance < 40`. Confirms interpolation active.

**Scenario: Smooth pan**

Implementation: Direct proportional pan (lines 156-160) — no snap; each drag pixel
produces `pan_amount * delta_pixels` displacement.

Test:
- `test_pan_proportional_to_drag_speed()` (line 338): 10 px vs 50 px drag, asserts
  `cam_fast._pivot.length() > cam_slow._pivot.length()`. Covers THEN "proportional."

Status: **COVERED**.

