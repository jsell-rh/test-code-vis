## Key Independent Findings

1. **main.gd `_ready()` is fully implemented** — reads JSON via FileAccess.open(),
   calls build_from_graph(). Not a stub.

2. **Direction visually indicated by explicit arrowhead** — CylinderMesh with
   top_radius=0 (cone shape) created at the target end of every edge. Satisfies
   the "explicit rendering element" requirement; plain line color alone would not.

3. **"Reflects coupling" is algorithm-quality** — test_coupled_bcs_are_closer_than_uncoupled
   VARIES the coupling input (auth<->shared_kernel edges present, billing absent) and
   asserts a relative-distance inequality, not pre-computed coordinates.

4. **"Reflects complexity" is algorithm-quality** — test_mesh_sizes_proportional_to_metric
   VARIES the size field (3.0 vs 9.0) and asserts the ratio of BoxMesh.x dimensions
   equals the ratio of size values within 0.001.

5. **Pan direction sign is correct** — camera_controller.gd line 133:
   `_pivot += right * delta.x * pan_amount` (no negation). Test asserts
   drag right -> _pivot.x increases. Spec requires non-inverted movement.

6. **Zoom is smooth** — _target_distance is set immediately on scroll; _distance
   lerps toward it in _process(). test_zoom_is_interpolated_not_instantaneous
   verifies _distance does not snap on scroll event, then partially moves after
   one 16ms frame.

7. **All functions have type hints** in extractor.py and __main__.py.

8. **No hardcoded paths** — extractor accepts src_path: Path as argument throughout.

9. **97 GDScript tests, 0 failures**. Headless get_global_transform() errors are
   expected (camera not in scene tree) and do not affect pass/fail outcomes.

10. **Commit trailers present** — Spec-Ref and Task-Ref on all implementation commits.

