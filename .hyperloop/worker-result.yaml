## THEN → Test Mapping (Verifier's Independent Derivation)

Per guidelines: derive expected predicate from spec BEFORE reading test bodies.

### Spec Requirement: Pan with Left Mouse Button

**THEN: camera pans in the direction of the drag**
- Worker maps to: `test_lmb_pan_moves_pivot` → `cam._pivot != initial_pivot`
- My derivation: pivot must move (any direction)
- Predicate match: ✓ PASS (pivot movement confirmed)

**THEN: movement direction matches drag direction (not inverted)**

Derived from spec (i.e. parenthetical in Requirement: Non-Inverted Movement below).
See F1/F2/F3 findings.

### Spec Requirement: Non-Inverted Movement

**THEN: scene moves in same direction as drag (i.e. dragging left reveals content to the right, as in Google Maps)**

"i.e." = definition, not example. Spec defines this as Google Maps map-grab model.

**Pre-read derivation** (Google Maps sign chain):
- Drag left (delta.x < 0) → user grabs scene and pulls left → scene slides LEFT on screen
- Camera effectively moves RIGHT (opposite to scene slide direction)
- Pivot must move in the +screen-right direction when dragging LEFT
- In headless mode: basis.x = (1,0,0) (identity, confirmed by !is_inside_tree() errors in test run)
  → pivot.x must INCREASE when dragging left for Google Maps model
- In production: basis.x = (0,0,−1) (computed: up=(0,1,0) cross z_axis=(0.149,0.989,0) = (0,0,−0.149) normalized)
  → same analysis applies; pivot must increase in basis.x direction on drag left

Worker maps:
- "scene moves in same direction as drag" → `test_pan_drag_left_decreases_pivot_x` → `pivot.x < initial_x`
- "dragging left reveals content to the right" → `test_drag_direction_matches_view_movement` → `pivot != Vector3.ZERO`

**After reading test bodies:**
- `test_pan_drag_left_decreases_pivot_x`: asserts `cam._pivot.x < initial_x` (DECREASES)
  - Derived expectation: INCREASES → **WRONG PREDICATE** → F2
- `test_pan_drag_right_increases_pivot_x`: asserts `cam._pivot.x > initial_x` (INCREASES)
  - Derived expectation for drag right: DECREASES → **WRONG PREDICATE** → F3
- `test_drag_direction_matches_view_movement`: asserts `cam._pivot != Vector3.ZERO`
  - This is a null directional test — tells us nothing about direction → **NULL TEST** → F4

