### Requirement: Performance at Kartograph Scale — COVERED (testable parts)

**Scenario: Smooth navigation**

THEN-clauses:
- "frame rate remains above 30fps" — untestable in headless Godot (no render pipeline).
- "no perceptible stutter or pop-in" — untestable in headless Godot.

Testable proxy: `build_from_graph()` must complete the full scene build for kartograph-scale data (6 bounded contexts + 54 modules = 60 nodes) without error.

Implementation:
- `godot/scripts/main.gd` `build_from_graph()`: creates volumes for all nodes, edges, then calls `_frame_camera()` and `_update_lod()`.
- `godot/scripts/lod_manager.gd`: implements FAR/MEDIUM/NEAR LOD thresholds (80.0 / 20.0) and toggles visibility each `_process()` frame — architectural mitigation for performance.

Tests:
- `godot/tests/test_nfr_scale.gd`:
  - `test_kartograph_scale_anchor_count`: fixture has 6 contexts + 54 modules; asserts `_anchors.size() == 60`.
  - `test_kartograph_scale_context_anchors_exist`: asserts all 6 context IDs present in `_anchors`.
  - `test_kartograph_scale_module_anchors_exist`: iterates all module nodes (asserts count==54), asserts each module ID in `_anchors`.
  - `test_kartograph_scale_build_produces_world_positions`: asserts `_world_positions.size() == 60`.

Scale build fully covered. FPS/stutter clauses: PASS-WITH-NOTE (headless limitation, LOD manager provides architectural evidence).

