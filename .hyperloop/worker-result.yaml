### Requirement: Non-Inverted Movement — COVERED

**Implementation** (`camera_controller.gd`, lines 141–160):
```
_target_pivot -= right * delta.x * pan_amount
_target_pivot -= backward * delta.y * pan_amount
```
Comment explicitly documents Google Maps convention. Drag left (delta.x < 0) →
pivot.x increases → camera moves +X → scene shifts left. Direction matches drag. ✓

**Tests**:
- `test_pan_direction_not_inverted`: At phi=PI/2 (camera on +Z), dragging left 50px
  → `cam._pivot.x > 0.0`. Sign chain independently verified: delta.x=-50,
  right=(1,0,0), `-= right*(-50)` → pivot.x += 50 → scene moves left ✓

#### Scenario: Drag direction matches view movement — COVERED
Same test covers this scenario.

