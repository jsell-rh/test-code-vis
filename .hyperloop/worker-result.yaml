## THEN-clause → Test Mapping

### Requirement: Flow is On-Demand

| THEN-clause | Test function | Assertion |
|---|---|---|
| Flow NOT shown by default | `test_flow_not_active_by_default` | `not overlay.is_path_active()` (line 119) |

### Scenario: Requesting a flow path

| THEN-clause | Test function | Assertion |
|---|---|---|
| Relevant flow path lights up through structure | `test_path_mid_node_lit_up` | `col.r >= 0.9 and col.g >= 0.9 and col.b >= 0.9` (line 136) |
| Irrelevant structural elements are de-emphasized | `test_offpath_nodes_deemphasized` | `col.r <= 0.4 and col.g <= 0.4 and col.b <= 0.4 and col.a <= 0.4` (line 181) |
| Irrelevant elements de-emphasized (transparency) | `test_offpath_node_transparency_mode` | `mat.transparency == BaseMaterial3D.TRANSPARENCY_ALPHA` (line 194) |
| Flow path traceable from entry point | `test_entry_node_green` | `col.g > 0.8 and col.r < 0.5 and col.b < 0.5` (line 151) |
| Flow path traceable to terminus | `test_terminus_node_red` | `col.r > 0.8 and col.g < 0.5 and col.b < 0.5` (line 166) |

### Scenario: Flow overlaid on structure

| THEN-clause | Test function | Assertion |
|---|---|---|
| Flow rendered as path through structural space | `test_path_edges_visible` | `e1.visible and e2.visible` (line 233) |
| Flow rendered as path (cyan highlight) | `test_path_edges_cyan` | `col.r <= 0.1 and col.g >= 0.8 and col.b >= 0.9` (line 248) |
| Structural context remains visible (not replaced) | `test_offpath_nodes_still_in_scene` | `other.get_parent() != null and other.visible` (line 207) |
| Human can follow path spatially | `test_positions_unchanged_when_path_shown` | `entry.position.is_equal_approx(...)` (line 221) |

### Scenario: Identifying a bottleneck

| THEN-clause | Test function | Assertion |
|---|---|---|
| High-traffic paths visually prominent (orange) | `test_high_traffic_edge_orange` | `col.r >= 0.9 and col.g <= 0.6 and col.b <= 0.1` (line 317) |
| High-traffic paths visually prominent (yellow) | `test_medium_traffic_edge_yellow` | `col.r >= 0.9 and col.g >= 0.7 and col.b <= 0.1` (line 332) |
| Bottleneck points identifiable (overlay exists) | `test_bottleneck_node_has_overlay` | child.name == "BottleneckOverlay" (line 343) |
| Bottleneck points identifiable (red color) | `test_bottleneck_overlay_red` | `col.r >= 0.9 and col.g <= 0.1 and col.b <= 0.1` (line 361) |

