## Per-Requirement Findings

### Requirement: Pan with Left Mouse Button
**Implementation:** `camera_controller.gd` line 72 — `MOUSE_BUTTON_LEFT` sets `_panning = true`.
Lines 129–143 apply the pan calculation inside `_handle_motion` when `_panning` is true.
**Test:** `test_lmb_pan_moves_pivot` (test_ux_polish.gd:87) — presses LMB then drags;
asserts `cam._pivot != initial_pivot`. COVERED.

### Requirement: Non-Inverted Movement
**Spec i.e. parenthetical derivation (derived before reading test body):**
"dragging left reveals content to the right" = Google Maps grab model.
- Drag left → delta.x = −50 (screen x decreases)
- Implementation: `_pivot -= right * delta.x * pan_amount` with right = (1,0,0)
- → `_pivot -= (1,0,0) * (−50) * pan_amount` → `pivot.x += 50 * pan_amount` → pivot moves RIGHT
- Camera looks right → scene shifts left on screen → content from the right enters view ✓
- Expected predicate when dragging left: `pivot.x > initial_x`

**Implementation:** `camera_controller.gd` lines 132–142. Sign-chain derivation comment
at line 139: `# drag left → delta.x = -50 → negate → pivot.x += 50 * pan_amount (moves right) ✓`
**Tests:**
- `test_pan_drag_left_increases_pivot_x` — drag left (delta.x = −50) → asserts `pivot.x > initial_x` ✓
- `test_pan_drag_right_decreases_pivot_x` — drag right (delta.x = +50) → asserts `pivot.x < initial_x` ✓
- `test_drag_direction_matches_view_movement` — drag right 50 px → asserts `pivot.x < initial_x` ✓
- `test_pan_drag_down_decreases_pivot_z` — drag down (delta.y = +50) → asserts `pivot.z < initial_z` ✓
- `test_pan_drag_up_increases_pivot_z` — drag up (delta.y = −50) → asserts `pivot.z > initial_z` ✓
All use signed comparison predicates. `check-nondirectional-movement-assertions.sh` exits 0. COVERED.

### Requirement: Zoom Toward Mouse Cursor
**Scenario: Zooming into a specific component**
**Implementation:** `_zoom_toward_cursor` (lines 90–102). zoom_fraction = 1 − (new_target/old_target).
On zoom-in (direction < 0): step < 0 → new_target < old_target → zoom_fraction > 0 →
`_pivot.lerp(cursor_world, positive)` → pivot shifts toward cursor.
**Tests:**
- `test_zoom_toward_cursor_shifts_pivot_toward_cursor` — cursor at (10,0,0), zoom in →
  asserts `pivot.x > 0.0`. Numeric verification: step = −6, target = 34, fraction = 0.15,
  pivot.x = 1.5 > 0. ✓
- `test_component_stays_under_cursor_on_zoom_in` — asserts `after > before` (pivot moved
  toward cursor). ✓
- `test_zoom_cursor_at_pivot_does_not_shift_pivot` — cursor == pivot → pivot unchanged. ✓

**Scenario: Zooming out**
On zoom-out (direction > 0): step > 0 → new_target > old_target → zoom_fraction < 0 →
lerp with negative fraction → pivot shifts AWAY from cursor.
**Test:** `test_zoom_out_from_cursor_shifts_pivot_away` — pivot at (5,0,0), cursor at (10,0,0),
zoom out → asserts `pivot.x < 5.0`. Numeric verification: target = 46, fraction = −0.15,
pivot.x = 4.25 < 5.0. ✓ COVERED.

### Requirement: Orbit Around Mouse Point
**Implementation:** `_handle_button` (line 78–80) — on RMB press, calls
`_set_orbit_pivot(_mouse_to_ground(event.position))` which sets `_pivot = world_point`.
In headless mode, `_mouse_to_ground` returns current `_pivot`; tests call `_set_orbit_pivot`
directly with a known world point (matches the production code call path). Lines 123–127
handle orbit motion: `_phi` and `_theta` update but `_pivot` is unchanged.
**Tests:**
- `test_orbit_pivot_set_to_cursor_point_at_start` — calls `_set_orbit_pivot(Vector3(5,0,7))`;
  asserts `cam._pivot == world_point`. ✓
- `test_orbit_pivot_is_used_during_orbit` — sets pivot to (3,0,4), orbits with `_orbiting = true`;
  asserts `cam._pivot == pivot_before` (pivot unchanged during orbit motion). ✓
- `test_component_remains_at_visual_center_during_orbit` — pivot at (8,0,0), diagonal drag;
  asserts `cam._pivot == center`. ✓ COVERED.

### Requirement: Smooth Camera Movement — Smooth zoom
**Implementation:** `_process` (lines 50–56) — lerps `_distance` toward `_target_distance`
each frame with `t = min(zoom_smoothing * delta, 0.9)`. Scroll input only updates
`_target_distance`, not `_distance`.
**Test:** `test_zoom_is_interpolated_not_instantaneous` — after WHEEL_UP, asserts
`cam._distance == initial_distance` (no instant snap); after `_process(0.016)`, asserts
`after_one_frame < initial_distance and after_one_frame > target` (partial lerp). Numeric
verification: t = 0.128, distance = lerp(40, 34, 0.128) = 39.23; 39.23 < 40 and 39.23 > 34. ✓
**Boundary tests:** `test_target_distance_clamped_at_minimum` and
`test_target_distance_clamped_at_maximum` confirm min/max clamp. COVERED.

### Requirement: Smooth Camera Movement — Smooth pan
**Implementation:** Lines 129–143. Pan is directly proportional to drag delta — each
frame's motion is proportional to drag speed (no deferred interpolation needed for "smooth
and proportional").
**Test:** `test_pan_proportional_to_drag_speed` — cam1 drags 10 px, cam2 drags 50 px;
asserts `move2 > move1` (larger drag produces larger pivot shift). ✓ COVERED.

