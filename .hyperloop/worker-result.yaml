### Requirement: Containment Rendering — PASS

**Code** (`main.gd` `_create_volume()`):
- Bounded-context: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `CULL_DISABLED`
- Module: `albedo_color.a = 1.0` (opaque)
- Module anchor is `add_child`-ed to parent context anchor (scene-tree nesting)

**Tests** (`test_containment_rendering.gd`, 5 tests): assert `TRANSPARENCY_ALPHA`,
`albedo_color.a < 1.0`, `albedo_color.a >= 1.0`, `get_parent() == ctx_anchor`,
`ctx_mesh.size.x > mod_mesh.size.x`, `cull_mode == CULL_DISABLED`.

All THEN clauses covered with real node instantiation and property assertions. ✅

