## Requirement Status

### REQ-1: Pan with Left Mouse Button ÔÇö COVERED

**Spec:** The user MUST be able to pan the view by holding the left mouse button and dragging.

**Implementation (`camera_controller.gd`):**
- `_handle_button()` sets `_panning = event.pressed` on `MOUSE_BUTTON_LEFT` (line 102ÔÇô104)
- `_handle_motion()` when `_panning` shifts `_target_pivot += right * delta.x * pan_amount` and
  `_target_pivot -= backward * delta.y * pan_amount` (lines 141ÔÇô158)

**Scenario ÔÇö Panning the view:**
- GIVEN top-down camera: initial `_theta = 0.15` (near top-down) Ôťô
- WHEN LMB held and dragged: `_panning = true` on press, pivot updated on motion Ôťô
- THEN camera pans in drag direction: `test_lmb_drag_pans_camera` asserts `cam._pivot != initial_pivot` Ôťô
- AND movement not inverted: `test_pan_direction_not_inverted` asserts `cam._pivot.x > 0.0`
  for a rightward drag at phi=¤Ç/2 (where camera X aligns with world +X) Ôťô

### REQ-2: Non-Inverted Movement ÔÇö COVERED

**Spec:** All camera movement directions MUST match the user's intuitive expectation.

**Implementation:** The pan formula `_target_pivot += right * delta.x * pan_amount` directly
adds the drag delta ÔÇö rightward drag (delta.x > 0) shifts pivot right. This is non-inverted
(same as Google Maps). The in-code comment explicitly calls this out (line 144).

**Scenario ÔÇö Drag direction matches view movement:**
- `test_pan_direction_not_inverted`: phi=¤Ç/2, right drag 50px Ôćĺ `cam._pivot.x > 0.0` Ôťô

### REQ-3: Zoom Toward Mouse Cursor ÔÇö COVERED

**Spec:** Scroll-wheel zoom MUST zoom toward the point under the mouse cursor.

**Implementation:** `_zoom_toward_point(world_pt, direction)` (lines 168ÔÇô176) computes
`zoom_ratio = _target_distance / old_dist` then shifts
`_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`. Zoom-in: ratio < 1,
pivot moves toward cursor. Zoom-out: ratio > 1, pivot moves away. Smooth: only targets are
set; `_process()` lerps actual values.

**Scenario A ÔÇö Zooming into a specific component:**
- `test_zoom_in_shifts_pivot_toward_cursor`: cursor at (10,0,0), zoom in Ôćĺ `_target_pivot.x > 0` Ôťô
- `test_zoom_in_cursor_point_invariant`: cursor at (20,0,0), zoom in Ôćĺ `0 < _target_pivot.x < 20`
  (cursor point stays invariant) Ôťô

**Scenario B ÔÇö Zooming out:**
- `test_zoom_out_shifts_pivot_away_from_cursor`: cursor at (10,0,0), zoom out Ôćĺ `_target_pivot.x < 0`
  (pivot moves away from cursor) Ôťô

### REQ-4: Orbit Around Mouse Point ÔÇö COVERED

**Spec:** Orbit (right mouse button drag) MUST rotate the camera around the point under the
mouse cursor when the orbit began.

**Implementation:** RMB press calls `_get_ground_point_under_cursor(event.position)` then
`begin_orbit_at_world_point(world_pt)` (lines 111ÔÇô118). `begin_orbit_at_world_point()` sets
`_pivot = world_pt` and recomputes spherical coordinates so the camera does not jump (lines 73ÔÇô85).
All orbit motion subsequently rotates around `_pivot` which equals the cursor's world point.

**Scenario ÔÇö Orbiting around a component:**
- `test_orbit_uses_right_mouse_button`: RMB press + horizontal drag Ôćĺ `cam._phi != initial_phi` Ôťô
- `test_orbit_around_cursor_point`: `begin_orbit_at_world_point(Vector3(5,0,3))` Ôćĺ `cam._pivot == world_pt` Ôťô
- `test_orbit_pivot_is_world_point`: pivot == world_pt Ôćĺ camera always looks_at world_pt Ôćĺ component at visual center Ôťô

### REQ-5: Smooth Camera Movement ÔÇö COVERED

**Spec:** All camera transitions MUST be smooth and continuous, with no snapping or jerking.

**Implementation (zoom):** `_zoom_toward_point()` only sets `_target_distance`/`_target_pivot`.
`_process()` interpolates via exponential smoothing: `t = 1 - pow(0.05, delta * zoom_smooth)`
then `_distance = lerpf(_distance, _target_distance, t)` (lines 42ÔÇô47). This produces a
smooth, frame-rate-independent animation.

**Implementation (pan):** Pan amount is `pan_speed * (_distance * 0.05 + 1.0)`, proportional
to current distance and drag delta, giving immediate but speed-proportional response.

**Scenario A ÔÇö Smooth zoom:**
- `test_smooth_zoom_target_differs_from_distance_after_scroll`: after scroll, `_target_distance < _distance`
  (not yet snapped) Ôťô
- `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)`, `20 < _distance < 40` Ôťô

**Scenario B ÔÇö Smooth pan proportional to drag speed:**
- `test_pan_proportional_to_drag_speed`: 50px drag produces larger pivot displacement than 10px drag Ôťô

