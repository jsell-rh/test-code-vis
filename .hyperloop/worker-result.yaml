### Extractor Quality
- No hardcoded paths — `src_path` is a required CLI argument (`python -m extractor <src_path>`).
- Type hints present on every function in `extractor.py`, `__main__.py`, and `schema.py`.
- Self-edges are explicitly skipped; edges are deduplicated via a `set`.
- `extract_imports_from_file` skips relative imports (`level == 0` guard) and handles `SyntaxError` gracefully.

### Minor Observations (non-blocking)
1. **`path` field not in Node schema**: The Module Discovery scenario says nodes should have "a name, path, and type". The output format scenario says "id, name, type, parent, metrics" — no `path`. The implementation follows the output format scenario (using `id` as the canonical path-like identifier). The spec is internally inconsistent here; the implemented schema is self-consistent and the Godot consumer receives unambiguous node IDs.
2. **Godot scene is a skeleton**: `scripts/main.gd` is an empty `_ready`/`_process` stub. This task (task-002) is scoped to extraction; the Godot visualization is a separate deliverable. The scene structure is correct and the project compiles without errors.
3. **`_NON_CONTEXT_DIRS` is a static exclusion list**: If a new codebase has differently-named non-context directories, they'd be treated as bounded contexts. Acceptable for a prototype; could be made configurable in a follow-on task.
