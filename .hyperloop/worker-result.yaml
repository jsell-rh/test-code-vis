### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- Lines 112–118: RMB press calls `_get_ground_point_under_cursor()` then
  `begin_orbit_at_world_point(world_pt)`.
- Lines 73–85: `begin_orbit_at_world_point()` sets `_pivot = world_pt`, recomputes
  spherical coordinates so camera does not jump.

**Scenario: Orbiting around a component** — COVERED
- `test_orbit_uses_right_mouse_button` (lines 249–264): RMB press + rightward drag
  changes `_phi`. ✓
- `test_orbit_around_cursor_point` (lines 268–279): `begin_orbit_at_world_point` sets
  `cam._pivot == world_pt`. ✓
- `test_orbit_pivot_is_world_point` (lines 283–294): asserts `cam._pivot.is_equal_approx(world_pt)`,
  confirming component stays at visual center (camera always looks_at `_pivot`). ✓

