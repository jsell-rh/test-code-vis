## THEN-Clause → Test Mapping

### Scenario: Engine version
- THEN it opens in Godot 4.6.x
  → `test_engine_version.gd::test_project_godot_contains_46` — reads project.godot via FileAccess, asserts "4.6" present
- AND all scripts use GDScript
  → `test_engine_version.gd::test_all_scripts_are_gdscript` — iterates godot/scripts/ via DirAccess, asserts every file ends in .gd
- AND all API calls are valid for the Godot 4.6 API
  → `test_engine_version.gd::test_fileaccess_open_and_get_as_text` — exercises FileAccess.open() + get_as_text() pattern used in production code; godot-compile.sh confirms no invalid API calls

### Scenario: Running the extractor
- THEN it runs as a standalone Python script or CLI tool
  → `extractor/tests/test_extractor.py::test_main_cli` — calls main([...]) directly and asserts exit behavior
- AND it requires no dependencies beyond the Python standard library and tree-sitter (or ast module)
  → `extractor/tests/test_extractor.py::test_stdlib_only_imports` — parses extractor source with ast and asserts every import is in sys.stdlib_module_names (tree-sitter is allowed)

### Scenario: Decoupled pipeline
- THEN it does not need access to the Python extractor or the source codebase
  → `test_scene_graph_loader.gd::test_loads_from_json_only` — loads from JSON fixture only, no extractor dependency
- AND the JSON file is self-contained
  → `test_scene_graph_loading.gd::test_json_is_self_contained` — asserts all required keys present in loaded data without any external references

### Scenario: Running the prototype (Desktop Platform)
- THEN it runs natively without browser, container, or VM dependencies
  → Untestable in headless CI (see Untestable THEN-Clauses below); architectural evidence: project.godot has no HTML5 export preset, no Docker/container config present

### Scenario: Smooth navigation (Performance)
- THEN the frame rate remains above 30fps
  → Untestable in headless CI (no render pipeline); architectural evidence: lod_manager.gd implements LOD to ensure performance at scale; test_nfr_scale.gd::test_kartograph_scale_structure_no_errors verifies loading 6 contexts/50 modules/100 files without errors
- AND there is no perceptible stutter or pop-in
  → Untestable in headless CI; LOD system in lod_manager.gd prevents pop-in structurally

### Scenario: Pivoting after prototype (Disposability)
- THEN the prototype can be discarded without loss
  → No test required (organizational/process concern)
- AND the JSON scene graph format is the only artifact worth preserving
  → No test required (organizational/process concern)

