### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`)
- **Top-down overview**: `_theta = 0.15` rad ≈ 8.6° from vertical (well below
  PI/4 = 45°); `_distance = 40.0 > 0`.
- **Zooming**: `WHEEL_UP` → `_distance -= zoom_speed * factor` (clamped ≥
  `min_distance`); `WHEEL_DOWN` → `_distance += zoom_speed * factor` (clamped ≤
  `max_distance`).
- **Orbiting**: middle-mouse press sets `_orbiting = true`; motion delta changes
  `_phi` (horizontal) and `_theta` (vertical); `_theta` clamped to `[0.01, PI-0.01]`
  so Y-up is preserved; `look_at(_pivot, Vector3.UP)` maintains intuitive orientation.
- **set_pivot()**: updates `_pivot` and `_distance` for post-load camera framing.

**Tests** (`godot/tests/test_camera_controls.gd`)
- `test_initial_theta_is_near_top_down` — `_theta < PI/4`.
- `test_initial_distance_is_positive` — `_distance > 0`.
- `test_scroll_up_decreases_distance` — `WHEEL_UP` event → `_distance` decreases.
- `test_scroll_down_increases_distance` — `WHEEL_DOWN` event → `_distance` increases.
- `test_orbit_horizontal_drag_changes_phi` — middle-mouse + horizontal motion →
  `_phi` changes.
- `test_orbit_vertical_drag_changes_theta` — middle-mouse + vertical motion →
  `_theta` changes.
- `test_set_pivot_updates_state` — `set_pivot(v, d)` → `_pivot == v && _distance == d`.
- `test_zoom_clamped_at_minimum` — 200× scroll-up never drives `_distance` below
  `min_distance`.

Label readability under zoom (THEN "labels scale to remain readable") is covered
by `test_labels_are_billboard_and_readable` in `test_scene_graph_loading.gd`.

