### Requirement: Dependency Visualization — COVERED

**Scenario: Cross-context dependency**
- GIVEN two bounded contexts with a dependency between them
- WHEN both are visible
- THEN a line or connection is drawn between them
- AND the direction of the dependency is discernible

**Implementation:**
- `main.gd::_create_edge()`: reads `ed["source"]` and `ed["target"]` (matching
  `scene_graph_loader.gd`'s normalization and extractor's schema)
- Line: `ImmediateMesh` with `PRIMITIVE_LINES` between source and target positions
- Cross-context edges: orange color (`Color(1.0, 0.50, 0.10)`)
- Arrowhead: `CylinderMesh` with `top_radius = 0.0` (pointed cone) placed at
  target end, oriented along edge direction — unambiguously marks dependency direction

**Tests:**
- `test_dependency_rendering.gd::test_edge_line_mesh_created` — ImmediateMesh exists ✓
