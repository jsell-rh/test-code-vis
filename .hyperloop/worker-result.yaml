## Implementation Review

`camera_controller.gd` is fully implemented ‚Äî `_ready()` calls `_update_transform()`,
not a stub. All spec behaviors are wired up:

- **Pan (LMB):** `_panning` flag set in `_handle_button()`; `_handle_motion()` shifts
  `_pivot` via `global_transform.basis.x` (right) and `basis.z.xz` (forward) with no
  negation ‚Äî correctly non-inverted.
- **Orbit (RMB):** `_set_orbit_pivot()` recalculates spherical coords around new pivot;
  `_phi` and `_theta` updated in `_handle_motion()` without moving `_pivot`.
- **Zoom toward cursor:** `_zoom_toward_cursor()` shifts `_target_distance` and lerps
  `_pivot` toward `cursor_world` proportionally.
- **Smooth zoom:** `_process()` lerps `_distance` toward `_target_distance` each frame.
- **Headless fallback:** `_mouse_to_ground()` returns `_pivot` when not in scene tree,
  enabling all tests to run without a viewport.

