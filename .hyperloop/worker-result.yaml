### Requirement 5: Smooth Camera Movement — COVERED

**SHALL**: All camera transitions MUST be smooth and continuous, with no snapping or jerking.

**Code** (`camera_controller.gd` lines 42–47):
- `_process(delta)`: exponential smoothing `t = 1.0 - pow(0.05, delta * zoom_smooth)` then `lerpf(_distance, _target_distance, t)` and `_pivot.lerp(_target_pivot, t)` ✓
- Pan applied directly per frame (proportional to drag delta) — smooth and responsive ✓

**Scenario: Smooth zoom** — COVERED
- THEN zoom is animated smoothly, not instantaneous → `test_smooth_zoom_target_differs_from_distance_after_scroll`: after WHEEL_UP, `_target_distance < _distance` (target moved, actual unchanged) ✓
- `test_smooth_zoom_process_interpolates_distance`: after `_process(0.1)` with _distance=40, _target=20 → `20 < _distance < 40` (lerping) ✓

**Scenario: Smooth pan** — COVERED
- THEN pan is smooth and proportional to drag speed → `test_pan_proportional_to_drag_speed`: 50-px drag produces `cam_fast._pivot.length() > cam_slow._pivot.length()` (10-px drag) ✓

