### Requirement: Containment Rendering ‚Äî COVERED

**Implementation** (`main.gd _create_volume()`):
- Bounded context: `BoxMesh.size = Vector3(sz, sz*0.2, sz)`, `albedo_color = Color(0.25, 0.45, 0.85, 0.18)`, `transparency = TRANSPARENCY_ALPHA`, `cull_mode = CULL_DISABLED`.
- Module: `BoxMesh.size = Vector3(sz, sz*0.6, sz)`, `albedo_color = Color(0.35, 0.70, 0.40, 1.0)` (fully opaque).
- `_build()` parents child anchors to `parent_anchor` (context anchor), placing them inside it in the scene tree.

**Tests** (`godot/tests/test_containment_rendering.gd` ‚Äî 5 tests):
- `test_bounded_context_is_translucent`: `mat.transparency != TRANSPARENCY_DISABLED && albedo_color.a < 1.0`.
- `test_module_is_opaque`: `mat.albedo_color.a >= 1.0`.
- `test_module_parented_inside_context`: `mod_anchor.get_parent() == ctx_anchor`.
- `test_bounded_context_larger_than_module`: `ctx_mesh.size.x > mod_mesh.size.x` (fixture: ctx sz=10, mod sz=3).
- `test_bounded_context_cull_disabled`: `mat.cull_mode == CULL_DISABLED` (visually distinct boundary).

All spec THEN clauses covered.

