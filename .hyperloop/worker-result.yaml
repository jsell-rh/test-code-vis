### Requirement 2: Spec-Driven Context — OUT OF PROTOTYPE SCOPE (not a failure)

**SHALL:** The system MUST accept human-authored specifications as input alongside
the codebase, treating specs as the authoritative expression of human intent.

**Scenario: Spec and codebase loaded together**

Per `specs/prototype/prototype-scope.spec.md` §Not In Scope:
> "conformance mode (spec overlay comparison) is NOT implemented"

The `spec` node type has been added to the schema
(`extractor/schema.py`: `NodeType = Literal["bounded_context", "module", "spec"]`)
as a preparatory schema extension for this task. `godot/scripts/understanding_overlay.gd`
also implements `apply_alignment_overlay()` which reads a `spec_status` field
per node, and `godot/tests/test_understanding_overlay.gd` tests those overlays.

However, the full end-to-end scenario (loading spec files alongside the codebase so
the relationship between intended and realized design is available for inspection) is
explicitly out of prototype scope. Per reviewer guidelines, this is noted but does NOT
cause a FAIL.

Note: `extractor/tests/test_schema.py` has no test that constructs a `spec`-typed
node. This is acceptable because the feature that would exercise `spec` nodes
(conformance mode) is out of prototype scope.

