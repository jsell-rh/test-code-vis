### Requirement: Non-Inverted Movement — COVERED

**Scenario: Drag direction matches view movement**
- GIVEN any camera position
- WHEN the user drags in any direction
- THEN the scene moves in the same direction as the drag (dragging left reveals content
  to the right, as in Google Maps)

Same code and test as above. After leftward drag, pivot.x > 0 means camera moves +X,
scene content appears to move left — right-side content revealed. Google Maps convention. ✓

Test: `test_pan_direction_not_inverted()` — direction derivation comment confirms logic.

Status: **COVERED**.

