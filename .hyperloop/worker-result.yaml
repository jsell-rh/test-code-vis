### Requirement: Camera Controls — COVERED

**Spec**: Application MUST provide camera controls for navigating the scene.

**Scenarios**: Top-down overview, Zooming in, Orbiting.

**Implementation** (`godot/scripts/camera_controller.gd`):
- Top-down default: `_theta = 0.15` (≈ 8.6° from vertical, < PI/4 = 45°).
- Zoom: `WHEEL_UP` decreases `_distance`, `WHEEL_DOWN` increases it, clamped to
  `[min_distance, max_distance]`.
- Orbit: middle-mouse drag modifies `_phi` (azimuth) and `_theta` (polar).
- `look_at(_pivot, Vector3.UP)` in `_update_transform()` keeps up-vector intuitive.
- `set_pivot(pivot, distance)` allows programmatic re-framing (called from `main.gd`
  after graph load).

**Tests** (`godot/tests/test_camera_controls.gd`, 8 behavioral tests):
- `test_initial_theta_is_near_top_down()`: `_theta < PI/4` — top-down default.
- `test_initial_distance_is_positive()`: `_distance > 0.0`.
- `test_scroll_up_decreases_distance()`: `WHEEL_UP` event reduces `_distance`.
- `test_scroll_down_increases_distance()`: `WHEEL_DOWN` event increases `_distance`.
- `test_orbit_horizontal_drag_changes_phi()`: 50px horizontal drag mutates `_phi`.
- `test_orbit_vertical_drag_changes_theta()`: 20px vertical drag mutates `_theta`.
- `test_set_pivot_updates_state()`: `set_pivot()` updates both `_pivot` and `_distance`.
- `test_zoom_clamped_at_minimum()`: 200 scroll-ups do not push `_distance < min_distance`.

Label readability (Zooming in — "AND labels scale to remain readable") is covered
by `test_labels_are_billboard_and_readable()` in `test_scene_graph_loading.gd`.

