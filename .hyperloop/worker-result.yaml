### Key findings

**JSON Scene Graph Loading:**
- `_ready()` calls `_load_and_build()` (not a stub).
- `_build()` creates Node3D anchors for every node (`_anchors` dict), ImmediateMesh+cone for every edge.
- Anchor `.position` set directly from JSON `position.{x,y,z}`.
- 5 behavioral tests in `test_scene_graph_loading.gd` assert on real Node3D tree properties.

**Containment Rendering:**
- Bounded context: `mat.transparency = BaseMaterial3D.TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18`, `cull_mode = CULL_DISABLED`.
- Module: `albedo_color.a = 1.0` (fully opaque).
- Child anchor added to parent anchor (`parent_anchor.add_child(anchor)`), confirmed by `test_module_parented_inside_context`.

**Dependency Rendering:**
- Line: `ImmediateMesh` with `PRIMITIVE_LINES`, two vertices at world-space endpoints.
- Direction indicator: `CylinderMesh(top_radius=0)` (cone) placed at `to_pos - dir * 0.35`, oriented along edge direction via `Quaternion(Vector3.UP, dir)`.
- Cross-context edge color: `Color(1.0, 0.50, 0.10)` (orange), asserted with `r > 0.8 and b < 0.3`.

**Size Encoding:**
- `sz = float(nd["size"])` ‚Üí `box.size.x = sz` for both types; ratio large/small = 9.0/3.0 = 3.0, tested to within 0.001.

**Camera Controls:**
- Initial `_theta = 0.15 < PI/4` ‚Üí near top-down view (8.6¬∞). ‚úì
- Scroll WHEEL_UP decreases `_distance`; WHEEL_DOWN increases. ‚úì
- Middle-mouse drag changes `_phi` (horizontal) and `_theta` (vertical). ‚úì
- `look_at(_pivot, Vector3.UP)` + theta clamp `[0.01, PI-0.01]` ‚Üí intuitive orientation. ‚úì
- `set_pivot()` updates `_pivot` and `_distance` for camera framing. ‚úì

