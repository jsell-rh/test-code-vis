### Requirement: Smooth Camera Movement — COVERED

**Code:** `_process(delta)` lines 42–47:
```
var t = 1.0 - pow(0.05, delta * zoom_smooth)  # exponential smoothing
_distance = lerpf(_distance, _target_distance, t)
_pivot = _pivot.lerp(_target_pivot, t)
```
Zoom: `_target_distance` changes instantly on scroll; `_distance` interpolates per-frame.
Pan: pivot moves immediately and proportionally to `delta.x * pan_amount` (no target queuing
needed — direct drag is already proportional to drag speed).

**Scenario: Smooth zoom** — COVERED
- GIVEN any camera position ✓
- WHEN user scrolls: `_target_distance` changes, `_distance` unchanged until `_process` ✓
- THEN zoom is animated (interpolated), not instantaneous ✓

Tests: `test_smooth_zoom_target_differs_from_distance_after_scroll`
       (asserts `_target_distance < _distance` immediately after scroll — i.e., they differ),
       `test_smooth_zoom_process_interpolates_distance`
       (asserts `20 < _distance < 40` after one `_process(0.1)` call)

**Scenario: Smooth pan** — COVERED
- GIVEN any camera position ✓
- WHEN user drags to pan ✓
- THEN pan is proportional to drag speed: 50px drag produces larger displacement than 10px ✓

Tests: `test_pan_proportional_to_drag_speed`
       (asserts `cam_fast._pivot.length() > cam_slow._pivot.length()`)

