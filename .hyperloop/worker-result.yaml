### Requirement: Zoom Toward Mouse Cursor — COVERED

**SHALL**: Scroll-wheel zoom toward point under cursor, not screen center.

Implementation:
- Lines 120–128: `MOUSE_BUTTON_WHEEL_UP/DOWN` calls `_get_ground_point_under_cursor(_last_mouse)` then `_zoom_toward_point(world_pt, direction)`.
- Lines 170–178: `_zoom_toward_point` computes `zoom_ratio = _target_distance / old_dist`, sets `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`. Zoom in → ratio < 1 → pivot moves toward cursor; zoom out → ratio > 1 → pivot moves away.

**Scenario: Zooming into a specific component**
| THEN clause | Test | Verdict |
|---|---|---|
| View zooms toward cursor | `test_zoom_in_shifts_pivot_toward_cursor` — cursor at (+10,0,0), zoom in → `cam._target_pivot.x > 0.0` | COVERED |
| Component stays under cursor | `test_zoom_in_cursor_point_invariant` — `0 < pivot.x < world_pt.x` (pivot interpolated between old and cursor point) | COVERED |

**Scenario: Zooming out**
| THEN clause | Test | Verdict |
|---|---|---|
| View zooms out from cursor | `test_zoom_out_shifts_pivot_away_from_cursor` — cursor at (+10,0,0), zoom out → `cam._target_pivot.x < 0.0` (ratio>1 pushes past origin) | COVERED |

