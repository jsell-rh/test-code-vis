## Implementation Notes

All five MUST requirements from specs/prototype/ux-polish.spec.md are implemented in
`godot/scripts/camera_controller.gd` and covered by 22 behavioral GDScript tests in
`godot/tests/test_camera_controls.gd`.

Key implementation details:

1. **Pan (LMB)**: `_handle_motion()` computes right/backward vectors from `transform.basis`
   and applies `_target_pivot -= right * delta.x * pan_amount` — drag left (delta.x < 0)
   subtracts negative → pivot moves +right → camera moves right → scene shifts left.
   Google Maps non-inverted convention. Applied immediately for responsive feel.

2. **Non-inverted**: Same formula as above. Sign derivation: drag left → delta.x < 0 →
   × right_vec (+X at phi=PI/2) × minus sign → pivot.x increases → camera moves +X →
   scene shifts left (same direction as drag). ✓

3. **Zoom toward cursor**: `_zoom_toward_point()` adjusts `_target_pivot` using ratio formula:
   `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
   Cursor point remains invariant as pivot approaches it at zoom_ratio < 1.

4. **Orbit around cursor**: On RMB press, `_get_ground_point_under_cursor()` finds the
   world point; `begin_orbit_at_world_point()` sets `_pivot = world_pt` and recomputes
   spherical coords — camera doesn't jump, only orbit center changes.

5. **Smooth movement**: `_process()` uses exponential smoothing
   `t = 1.0 - pow(0.05, delta * zoom_smooth)` — only `_target_*` fields change on input;
   `_distance`/`_pivot` interpolate each frame. Pan is immediate for responsive feel.
