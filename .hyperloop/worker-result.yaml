### Requirement: JSON Scene Graph Loading — COVERED

**Implementation**
- `godot/scripts/main.gd` `_ready()`: opens the JSON file with
  `FileAccess.open()` + `get_as_text()` (Godot 4.6 API), parses via `JSON.new()`,
  calls `build_from_graph()`.
- `godot/scripts/scene_graph_loader.gd` `load_from_dict()`: parses nodes and edges
  into typed dictionaries consumed by `build_from_graph()`.
- `build_from_graph()`: creates one `Node3D` anchor per node (volumes), one
  `ImmediateMesh` + one `CylinderMesh` per edge (connections), positions each anchor
  from the JSON `position.{x,y,z}` fields.

**Tests** (`godot/tests/test_scene_graph_loading.gd`)
| THEN clause | Test method |
|---|---|
| reads the JSON file | `test_mesh_instances_exist_in_anchors` (calls `build_from_graph` with fixture) |
| generates 3D volumes for each node | `test_volumes_created_for_each_node`, `test_mesh_instances_exist_in_anchors` |
| generates connections for each edge | `test_edge_mesh_instances_created` (asserts >= 2 MeshInstance3D children) |
| positions elements per layout data | `test_anchor_positions_match_json` (asserts Vector3 equality) |

Additional coverage: `test_node_renderer.gd` independently asserts position equality
for multiple nodes and confirms no Godot-side layout recomputation.

