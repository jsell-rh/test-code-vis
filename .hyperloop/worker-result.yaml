### Requirement 3: Zoom Toward Mouse Cursor — COVERED

**SHALL**: Scroll-wheel zoom MUST zoom toward the point under the mouse cursor.

**Code** (`camera_controller.gd` lines 170–178):
- `_zoom_toward_point(world_pt, direction)`: computes `zoom_ratio = _target_distance / old_dist`
- `_target_pivot = world_pt + (_target_pivot - world_pt) * zoom_ratio`
- Zoom in (direction<0): new_dist < old_dist → zoom_ratio < 1 → pivot shifts toward world_pt ✓
- Zoom out (direction>0): new_dist > old_dist → zoom_ratio > 1 → pivot shifts away from world_pt ✓
- `_handle_button()` routes WHEEL_UP/WHEEL_DOWN to `_zoom_toward_point` via `_get_ground_point_under_cursor` ✓

**Scenario: Zooming into a specific component** — COVERED
- THEN view zooms toward point under cursor → `test_zoom_in_shifts_pivot_toward_cursor`: world_pt=(10,0,0), zoom in → `cam._target_pivot.x > 0.0` ✓
- AND component stays under cursor → `test_zoom_in_cursor_point_invariant`: asserts `0 < target_pivot.x < world_pt.x` (pivot between origin and cursor) ✓

**Scenario: Zooming out** — COVERED
- THEN view zooms out from cursor → `test_zoom_out_shifts_pivot_away_from_cursor`: world_pt=(10,0,0), zoom out → `cam._target_pivot.x < 0.0` ✓

