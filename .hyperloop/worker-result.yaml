### Requirement: Godot 4.6 — COVERED

**SHALL**: The application must use Godot 4.6.x with GDScript and 4.6-compatible API calls.

**Code**: `godot/project.godot` declares `config/features=PackedStringArray("4.6")`.
All scripts use `.gd` extension. `FileAccess.open()` + `get_as_text()` (not the removed
`read_as_text()`) is used in `main.gd` and exercised in tests.

**Tests** (in `godot/tests/test_engine_version.gd`):

| THEN-clause | Test | Status |
|---|---|---|
| uses Godot 4.6.x | `test_project_godot_declares_46` (reads project.godot via FileAccess.open()+get_as_text(), asserts "4.6" present) | COVERED |
| all scripts use GDScript | `test_scripts_dir_contains_only_gdscript` (DirAccess.open("res://scripts") iterates every file and asserts .gd extension) | COVERED |
| all API calls valid for Godot 4.6 API | `test_features_line_contains_46` (asserts PackedStringArray("4.6") in project.godot), `test_fileaccess_open_returns_non_null` (exercises FileAccess.open() end-to-end) | COVERED |

