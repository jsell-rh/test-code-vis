### Requirement: Dependency Rendering — COVERED

**Spec**: Application MUST render dependency edges as visible lines between connected nodes.

**Scenario**: Cross-context dependency with visually indicated direction.

**Implementation** (`godot/scripts/main.gd → _create_edge()`):
- `ImmediateMesh` with `PRIMITIVE_LINES` between `from_pos` and `to_pos`.
- `CylinderMesh` with `top_radius = 0.0` (pointed cone) placed at `to_pos - dir * (height*0.5)`,
  oriented via `Basis(Quaternion(Vector3.UP, dir))` — explicit arrowhead geometry indicating direction.
- Orange (`Color(1.0, 0.50, 0.10)`) for cross-context, grey for internal.

**Tests** (`godot/tests/test_dependency_rendering.gd`, 4 behavioral tests):
- `test_edge_line_mesh_created()`: ImmediateMesh MeshInstance3D child exists after build.
- `test_direction_indicator_cone_created()`: CylinderMesh with `top_radius == 0.0` exists.
- `test_direction_cone_near_target()`: cone position within 2 units of target Vector3(20,0,0).
- `test_cross_context_cone_is_orange()`: cone material `r > 0.8` and `b < 0.3`.

