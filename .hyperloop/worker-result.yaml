### 2. Python Extractor — COVERED

**Code:** `extractor/__main__.py` implements a full argparse CLI (`main(argv)`, invocable as
`python -m extractor <src_path> [--output <file>]`). All imports across extractor source files
are stdlib-only: `ast`, `math`, `datetime`, `pathlib`, `typing`, `argparse`, `json`, `sys`.
No third-party packages.

**Tests (`extractor/tests/test_cli.py`):**

| THEN clause | Test function | Status |
|---|---|---|
| Runs as standalone CLI tool | `TestCliEntryPoint::test_main_produces_json_output` | COVERED |
| Stdlib-only dependencies | `TestStdlibOnlyImports::test_extractor_uses_only_stdlib_imports` | COVERED |

`test_main_produces_json_output` calls `main([str(src), "--output", str(output)])`, asserts
`rc == 0`, and validates JSON output contains `nodes`/`edges`/`metadata` keys.
`test_extractor_uses_only_stdlib_imports` AST-walks every `.py` in `extractor/` (excluding
`tests/`) and asserts every top-level import name is in `sys.stdlib_module_names`.

