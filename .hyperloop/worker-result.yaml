## Label3D Readability (mandatory per project guidelines)

| Assertion | Test function | Status |
|---|---|---|
| billboard==BILLBOARD_ENABLED and pixel_size > 0.0 | `test_annotation_label3d_has_billboard_and_pixel_size` | COVERED |

`test_annotation_label3d_has_billboard_and_pixel_size`: Triggers annotation creation via
`render_criticality()`, then finds the resulting Label3D in scene_root and asserts
`label.billboard == BaseMaterial3D.BILLBOARD_ENABLED` and `label.pixel_size > 0.0`.
