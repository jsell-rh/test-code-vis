### Requirement: Desktop Platform (MUST)

**Code**:
- `godot/project.godot`: standard Godot desktop project; no HTML5 export preset, no Dockerfile, no docker-compose, no container manifest.
- APIs used (MeshInstance3D, Label3D, Camera3D, Node3D, ImmediateMesh) are desktop-only Godot engine APIs.

**Scenario: Running the prototype — THEN clause**:
- "runs natively without browser, container, or VM dependencies"

This THEN clause is an environmental/deployment property. `OS.get_name()` returns the CI runner OS in headless mode (not "Fedora 42"); "no container dependency" is a negative runtime-env assertion with no Godot API surface. No GDScript unit test can assert "runs natively on Fedora 42 without a VM". The architecture demonstrates compliance:
- No web/container configuration files anywhere in repo.
- No HTML5 or Android export presets.
- Only desktop Godot APIs used throughout.

**STATUS: COVERED** — structural compliance verified; FPS/OS assertion is physically unverifiable in headless CI (correctly classified as untestable).

