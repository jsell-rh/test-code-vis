### Requirement: Readable Labels — COVERED

**Scenario: Identifying a module**
- GIVEN a volume in the scene
- WHEN the user looks at it
- THEN the module's name is visible as a text label
- AND the label remains readable at the current zoom level

**Implementation:**
- `main.gd::_create_volume()` adds `Label3D` to every anchor:
  - `label.text = nd["name"]`
  - `label.billboard = BaseMaterial3D.BILLBOARD_ENABLED` (always faces camera)
  - `label.pixel_size = 0.012` (positive value, legible size)
  - `label.no_depth_test = true` (visible through geometry at any depth)

