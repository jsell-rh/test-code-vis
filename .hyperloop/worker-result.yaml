## Spec compliance

Every requirement in the spec is covered:

**Schema Structure** — `SceneGraph` TypedDict has exactly three top-level keys
(`nodes`, `edges`, `metadata`); no extras possible at the type level.
`test_scene_graph_has_no_extra_top_level_fields` verifies this at runtime. ✓

**Node Schema** — `Node` TypedDict contains all required fields: `id`, `name`,
`type`, `position`, `size`, `parent`. `NodeType` is a `Literal["bounded_context",
"module"]` which encodes the two permitted values from the spec. `parent` is
`str | None`, correctly supporting both top-level and child nodes. ✓

**Edge Schema** — `Edge` TypedDict contains `source`, `target`, `type`.
`EdgeType` is `Literal["cross_context", "internal"]`. Both edge kinds exercised
by the spec scenarios are tested. ✓

**Metadata** — `Metadata` TypedDict contains `source_path` (str) and
`timestamp` (str, expected ISO-8601 UTC). ✓

**Pre-Computed Layout** — `Node.position` is a `Position` TypedDict with `x`,
`y`, `z` floats. The docstring on `position` explicitly states "Pre-computed 3D
position. Coordinates are relative to the parent node." Tests verify every node
carries a numeric position and that fixture nodes have distinct coordinates,
enforcing that layout has been applied. The schema correctly makes positions a
mandatory field so the Godot side has no reason to re-compute them. ✓

