## Requirement: Dependency Rendering — COVERED

**SHALL**: Render dependency edges as visible lines between connected nodes.

**Code** (`main.gd._create_edge()`):
- `ImmediateMesh` with `PRIMITIVE_LINES` between `from_pos` and `to_pos`.
- A `CylinderMesh` (top_radius=0, a cone) at the target end oriented along the
  edge direction — visually indicates direction of dependency.
- Color: orange `Color(1.0, 0.50, 0.10)` for `cross_context`, grey for `internal`.

**Scenario: Rendering a cross-context dependency — `test_dependency_rendering.gd`**

| THEN clause | Test | Predicate |
|---|---|---|
| a line connects the two volumes | `test_edge_line_mesh_created` | finds `child.mesh is ImmediateMesh` on main node |
| direction is visually indicated | `test_direction_indicator_cone_created` | finds `CylinderMesh` with `top_radius == 0.0` |
| cone at target end | `test_direction_cone_near_target` | `cone.position.distance_to(Vector3(20,0,0)) < 2.0` |
| cross-context color orange | `test_cross_context_cone_is_orange` | `albedo_color.r > 0.8 and albedo_color.b < 0.3` |

