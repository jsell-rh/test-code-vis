## Requirement: Zoom to Detail — COVERED

**Scenario: Zooming into IAM**

- `camera_controller.gd` scroll decreases `_target_distance`; `lod_manager.gd`
  transitions FAR → MEDIUM → NEAR, progressively revealing modules then internal edges.
- Tests:
  - `test_camera_controls.gd::test_scroll_up_decreases_distance`
  - `test_spatial_structure.gd::test_medium_distance_shows_modules`
  - `test_spatial_structure.gd::test_near_distance_shows_all_nodes`
  - `test_spatial_structure.gd::test_lod_integration_far_hides_modules_in_built_scene`

