### Requirement: Size Encoding — COVERED

**Spec**: The application MUST encode complexity metrics as the visual size of volumes.

**Scenario**: Large module vs small module

Implementation: `godot/scripts/main.gd` → `_create_volume()`
- `var sz: float = float(nd["size"])` — size field maps directly from JSON metric.
- Module: `box.size = Vector3(sz, sz * 0.6, sz)` — linear, proportional mapping.
- The `sz` value comes directly from `nd["size"]`, so mesh width ratio equals input size ratio.

Tests: `godot/tests/test_size_encoding.gd` (2 tests)
- `test_large_module_has_bigger_mesh`: fixture has small_mod(size=3.0) vs large_mod(size=9.0);
  asserts `large_mesh.size.x > small_mesh.size.x`.
- `test_mesh_sizes_proportional_to_metric`: asserts `large_mesh.size.x / small_mesh.size.x`
  equals `9.0 / 3.0 = 3.0` within tolerance 0.001.

Status: **COVERED**

