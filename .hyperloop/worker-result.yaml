### System-Purpose Spec Tests

New test files implementing all testable THEN-clauses from
`specs/core/system-purpose.spec.md`:

- `extractor/tests/test_system_purpose.py` (8 Python tests)
- `godot/tests/test_system_purpose.gd` (8 GDScript tests)
- `godot/tests/run_tests.gd` updated to register the new suite

## THEN-Clause → Test Mapping

### Scenario: Architect evaluates unfamiliar system

**THEN the human can correctly answer architectural questions about the system**

- Python: `test_scene_graph_exposes_named_bounded_contexts` — asserts that all
  bounded contexts (Iam, Graph, Shared Kernel) appear as named nodes of type
  `bounded_context` in the scene graph.
- Python: `test_scene_graph_exposes_named_modules_with_types` — asserts every
  node has a non-empty `name` and a valid `type` (`bounded_context` or `module`).
- GDScript: `test_all_scene_nodes_have_visible_name_labels` — instantiates Main,
  builds from fixture, asserts a Label3D with the correct text, billboard=ENABLED,
  and pixel_size > 0 exists for each BC node.
- GDScript: `test_bounded_context_nodes_distinguishable_by_type` — asserts BC
  volumes use `TRANSPARENCY_ALPHA` material so they're visually distinct from modules.

**AND the human can identify structural problems in the system**

- Python: `test_size_encoding_reflects_relative_complexity` — asserts
  `size_from_loc(500) > size_from_loc(10)` so large modules appear bigger.
- Python: `test_edge_types_expose_coupling_structure` — asserts all edges carry
  a `type` field (`cross_context` or `internal`) encoding coupling kind.
- GDScript: `test_node_size_grows_with_scene_graph_size_value` — builds a scene
  with a big node (size=5.0) and small node (size=1.0), asserts
  `big_mesh_x > small_mesh_x` on the resulting BoxMesh dimensions.
- GDScript: `test_dependency_edges_expose_coupling_in_scene` — builds scene with
  cross-context edge, asserts an ImmediateMesh line exists in scene children.

**AND the human can predict the impact of proposed changes**

- Python: `test_cross_context_edges_reveal_change_impact_paths` — asserts
  cross-context edges are present with valid non-self-loop source/target pairs.
- GDScript: `test_cross_context_edge_has_directional_arrowhead` — asserts a
  CylinderMesh with `top_radius == 0.0` exists (arrowhead cone at target end).

### Scenario: Spec and codebase loaded together

**AND the codebase is treated as the realized design**

- Python: `test_scene_graph_reflects_actual_source_file_structure` — builds
  scene graph from kart_src fixture, asserts `iam` and `iam.domain` nodes exist
  and an edge from iam to shared_kernel is present (matching the import in
  `iam/domain/user.py`).
- GDScript: `test_scene_graph_loader_reads_codebase_json` — calls
  `SceneGraphLoader.load_from_dict()` and asserts the returned graph has nodes
  and edges, confirming the Godot app can consume extractor output.

### Scenario: Post-build evaluation

**AND the human can determine whether the build is architecturally sound**

- Python: `test_structural_soundness_information_is_complete` — asserts every
  node has `size > 0`, every edge has `source` and `target`, and metadata has
  `source_path`.
- GDScript: `test_structural_metrics_available_in_scene` — builds scene and
  asserts BOTH a BoxMesh (size-encoded volume) AND an ImmediateMesh (dependency
  line) are present, confirming structural metrics are visible.

**AND the human can explore the impact of potential changes**

- Python: `test_dependency_graph_is_traversable_for_impact_analysis` — asserts
  node IDs are unique and every edge endpoint resolves to a known node ID, so
  the dependency graph can be traversed for impact analysis.
- GDScript: `test_navigation_methods_exist_on_camera_controller` — instantiates
  CameraController and asserts `has_method` returns true for `set_pivot`,
  `get_distance`, `_handle_button`, `_handle_motion`, and `_zoom_toward_cursor`.

## Untestable THEN-Clauses

### "THEN the spec is treated as the intended design"

1. **Verbatim THEN text**: "the spec is treated as the intended design"
2. **Why untestable**: The prototype-scope spec explicitly lists "spec extraction
   is NOT implemented" as out of scope. Implementing any mechanism that loads or
   processes spec files at runtime would violate this constraint. The check script
   `check-not-in-scope.sh` would reject any use of `include_specs`, `--specs`,
   `extract_spec_nodes`, etc.
3. **Architectural evidence**: The system-purpose spec describes the design intent
   for the full vision. In the prototype, the human author holds the spec mentally;
   the system visualizes the realized code. The separation is intentional: the
   extractor only reads source code (verified by `test_extractor_imports_are_stdlib_only`
   and all extractor tests), and the Godot app only reads the JSON scene graph.

### "AND the relationship between them is available for inspection"

1. **Verbatim THEN text**: "the relationship between them is available for inspection"
2. **Why untestable**: This requires spec-overlay comparison (showing spec vs.
   realized design side by side), which is excluded from the prototype by
   `prototype-scope.spec.md § Not In Scope` ("spec extraction is NOT implemented").
3. **Architectural evidence**: No spec-overlay, spec-loading, or comparison code
   exists anywhere in the codebase (`check-not-in-scope.sh` exits 0 confirming
   this). The relationship is available only in the human's mental model during
   the evaluation session.

### "THEN the human can determine whether the build matches the spec"

1. **Verbatim THEN text**: "the human can determine whether the build matches the spec"
2. **Why untestable**: This is the spec-overlay comparison feature excluded from
   the prototype. There is no automated comparison mechanism to test.
3. **Architectural evidence**: The prototype provides structural visualization
   only; the human compares the rendered structure against their spec manually.
   No spec-comparison code exists (`check-not-in-scope.sh` exits 0).

