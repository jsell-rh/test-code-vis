### Test Runner Registration

Both new test suites are registered in `godot/tests/run_tests.gd`:
```
_run_suite(preload("res://tests/test_llm_view_generator.gd").new())
_run_suite(preload("res://tests/test_scene_interpreter.gd").new())
```
The runner supports both the `_check()/_test_failed` pattern (used by
`test_llm_view_generator.gd`) and the bool-return pattern (used by
`test_scene_interpreter.gd`).

