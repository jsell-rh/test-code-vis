### Requirement: Containment Rendering — COVERED

**Implementation**: `_create_volume()` in `main.gd` distinguishes node types:
- `bounded_context`: `box.size = Vector3(sz, sz*0.2, sz)`, `albedo_color = Color(0.25, 0.45, 0.85, 0.18)`,
  `transparency = TRANSPARENCY_ALPHA`, `cull_mode = CULL_DISABLED`.
- `module`: `box.size = Vector3(sz, sz*0.6, sz)`, `albedo_color = Color(0.35, 0.70, 0.40, 1.0)` (fully opaque).
Child nodes are parented to their parent's anchor Node3D in the scene tree.

**Scenario: Modules inside a bounded context** — covered by `test_containment_rendering.gd` (5 tests):
- THEN bounded context appears as a larger translucent volume: `test_bounded_context_is_translucent()`
  asserts `mat.transparency != TRANSPARENCY_DISABLED and mat.albedo_color.a < 1.0`.
- AND child modules appear as smaller opaque volumes: `test_module_is_opaque()` asserts
  `mat.albedo_color.a >= 1.0`; `test_bounded_context_larger_than_module()` asserts
  `ctx_mesh.size.x > mod_mesh.size.x`.
- AND child modules are inside parent: `test_module_parented_inside_context()` asserts
  `mod_anchor.get_parent() == ctx_anchor`.
- AND boundary of parent is visually distinct: `test_bounded_context_cull_disabled()` asserts
  `mat.cull_mode == CULL_DISABLED` (distinct from children, which use default back-face culling).

