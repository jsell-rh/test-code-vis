## Requirement Status

### Pan with Left Mouse Button — PARTIAL

Implementation: `godot/scripts/camera_controller.gd` `_handle_motion()`, LMB branch.
- COVERED: LMB press sets `_panning = true`; mouse motion updates `_pivot`.
- COVERED: `test_lmb_pan_moves_pivot` asserts `cam._pivot != initial_pivot`. PASS.
- FAIL: See F1 — pan direction is inverted vs. Google Maps spec.

### Non-Inverted Movement — FAIL

Spec (authoritative): "scene moves in same direction as drag (i.e. dragging left reveals
content to the right, as in Google Maps)"

"i.e." is a definition. Google Maps sign chain:
- Drag left (delta.x < 0) → user grabs scene, pulls it left → scene slides LEFT on screen
- Camera pivot moves RIGHT (+X in screen-right direction)
- Required: `pivot.x INCREASES` when drag left

Current implementation:
```
_pivot += right * delta.x * pan_amount
```
Drag left: delta.x = -50 → pivot.x decreases → INVERTED.

Tests assert WRONG predicates (matching the inverted implementation, not the spec):
- `test_pan_drag_right_increases_pivot_x`: asserts pivot.x INCREASES on right drag
  - Google Maps requires DECREASES. Wrong predicate.
- `test_pan_drag_left_decreases_pivot_x`: asserts pivot.x DECREASES on left drag
  - Google Maps requires INCREASES. Wrong predicate.
- `test_drag_direction_matches_view_movement`: asserts `pivot != Vector3.ZERO`
  - Null directional test. No direction verified.

