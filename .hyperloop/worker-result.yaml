## Untestable THEN-Clauses (PASS-WITH-NOTE)

Three THEN-clauses describe properties that cannot be verified in headless CI:

1. **"frame rate remains above 30fps"** — FPS measurement requires a GPU render pipeline;
   `Engine.get_frames_per_second()` returns 0 in `--headless` mode. Architectural mitigation:
   `lod_manager.gd` with 3 distance-based LOD tiers; verified at full 60-node scale.

2. **"no perceptible stutter or pop-in"** — Subjective quality attribute requiring human
   perception and a live render loop. Architectural mitigation: same LOD system above.

3. **"runs natively without browser, container, or VM dependencies"** — Detecting the absence
   of browser/container/VM from within a headless GDScript or Python test is not possible.
   Architectural evidence: no HTML5 preset, no Dockerfile, no container manifest.

These are correctly classified PASS-WITH-NOTE, not FAIL.

