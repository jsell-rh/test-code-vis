### Requirement: JSON Scene Graph Loading — PASS

**Code** (`main.gd` `_ready()`): opens `scene_graph_path` via `FileAccess`, parses with
`JSON.new()`, calls `SceneGraphLoader.load_from_dict()`, then `build_from_graph()`.
`_ready()` is NOT a stub — it performs real work. ✅

**Tests** (`test_scene_graph_loading.gd`, 5 tests):
- `test_volumes_created_for_each_node` — asserts `_anchors` has entry per node id
- `test_mesh_instances_exist_in_anchors` — asserts `MeshInstance3D` child in each anchor
- `test_edge_mesh_instances_created` — asserts >= 2 `MeshInstance3D` children (line + cone)
- `test_anchor_positions_match_json` — asserts `anchor.position.is_equal_approx(Vector3(x,y,z))`
- `test_labels_are_billboard_and_readable` — asserts `BILLBOARD_ENABLED`, `pixel_size > 0.0`,
  `no_depth_test == true` on an instantiated `Label3D` node

All THEN clauses exercised with concrete fixture data, instantiated `Node3D` objects, and
property-value assertions (not `.has()` dict key checks). ✅

