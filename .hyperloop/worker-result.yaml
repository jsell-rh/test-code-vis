### Requirement: Size Encoding — COVERED

**Code:** `godot/scripts/main.gd` → `_create_volume()`

`sz = float(nd["size"])` is applied directly to `BoxMesh.size` dimensions (`Vector3(sz, sz*0.6, sz)`
for modules, `Vector3(sz, sz*0.2, sz)` for contexts). The mapping is linear, so size ratios in
the JSON are preserved exactly in mesh dimensions.

**Tests:** `godot/tests/test_size_encoding.gd` (2 tests)
- `test_large_module_has_bigger_mesh` — verifies `large_mesh.size.x > small_mesh.size.x`.
- `test_mesh_sizes_proportional_to_metric` — verifies the ratio `large.size.x / small.size.x`
  equals `9.0 / 3.0 = 3.0` within floating-point tolerance.

