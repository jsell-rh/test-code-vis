## Untestable THEN-Clauses

### Desktop Platform — "runs natively without browser, container, or VM"
1. **Verbatim THEN:** "it runs natively without browser, container, or VM dependencies"
2. **Why untestable:** Requires a physical GPU desktop at runtime. The headless Godot runner confirms compile + logic but cannot assert absence of browser/VM at runtime.
3. **Architectural evidence:** No Dockerfile, no HTML5 export preset in project.godot, no docker-compose.yml, no Electron config. `godot-compile.sh` exits 0 on Fedora confirming native desktop compatibility.

### Performance — "frame rate remains above 30fps"
1. **Verbatim THEN:** "the frame rate remains above 30fps"
2. **Why untestable:** FPS measurement requires an active render pipeline. Headless Godot does not render frames.
3. **Architectural evidence:** `lod_manager.gd` implements LOD visibility control. `test_nfr_scale.gd` verifies structural correctness (60 anchors, O(n) build) at kartograph scale. LOD system reduces per-frame geometry to maintain frame rate.

