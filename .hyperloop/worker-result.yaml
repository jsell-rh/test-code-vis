## THEN-clause → Test Mapping

| # | THEN-clause (verbatim from spec) | Test function | Assertion |
|---|---|---|---|
| 1 | the camera pans in the direction of the drag | `test_lmb_drag_pans_camera` | `cam._pivot != initial_pivot` after LMB+drag |
| 2 | the movement direction matches the drag direction (not inverted) | `test_pan_direction_not_inverted` | `cam._pivot.x > 0.0` after right drag at phi=PI/2 |
| 3 | the scene moves in the same direction as the drag | `test_pan_direction_not_inverted` | same test — right drag → +X pivot shift |
| 4 | the view zooms toward the point under the cursor | `test_zoom_in_shifts_pivot_toward_cursor` | `cam._target_pivot.x > 0.0` when cursor at x=10, zoom in |
| 5 | the component under the cursor stays under the cursor during the zoom | `test_zoom_in_cursor_point_invariant` | `0 < pivot.x < 20` — new pivot between old pivot and cursor |
| 6 | the view zooms out from the point under the cursor | `test_zoom_out_shifts_pivot_away_from_cursor` | `cam._target_pivot.x < 0.0` — pivot shifts away |
| 7 | the camera orbits around the point under the cursor at orbit start | `test_orbit_around_cursor_point` | `cam._pivot == world_pt` after `begin_orbit_at_world_point()` |
| 8 | the component remains at the visual center during the orbit | `test_orbit_pivot_is_world_point` | `cam._pivot.is_equal_approx(world_pt)` |
| 9 | the zoom is animated smoothly (interpolated), not instantaneous | `test_smooth_zoom_target_differs_from_distance_after_scroll` | `cam._target_distance < cam._distance` immediately after scroll |
| 10 | (smooth zoom interpolates each frame) | `test_smooth_zoom_process_interpolates_distance` | `20 < _distance < 40` after `_process(0.1)` with target=20 |
| 11 | the pan movement is smooth and proportional to drag speed | `test_pan_proportional_to_drag_speed` | 50px drag produces larger pivot.length() than 10px drag |

**Clamping boundary tests** (required by `check-clamp-boundary-tests.sh`):
- `test_set_pivot_clamps_distance_at_minimum` — `set_pivot(ZERO, 0.0)` → `_distance >= min_distance`
- `test_theta_clamped_at_minimum` — huge upward drag → `_theta >= 0.01`
- `test_theta_clamped_at_maximum` — huge downward drag → `_theta <= PI - 0.01`
- `test_zoom_clamped_at_minimum` — 200 scroll-up events → `_target_distance >= min_distance`

