### Spec scenario coverage

#### Requirement: JSON Scene Graph Loading — COVERED

- `main.gd _ready()` is NOT a stub: it calls `FileAccess.open()` + `get_as_text()` +
  `JSON.new()` + `build_from_graph()`. ✓
- `build_from_graph()` creates a Node3D anchor per node, ImmediateMesh+CylinderMesh per
  edge, positions anchors from JSON `position.{x,y,z}`. ✓
- `test_scene_graph_loading.gd`: instantiates real `Node3D` via `MainScript.new()`,
  asserts `.position.x/y/z`, mesh instance existence, edge mesh count. Dict-key `.has()`
  is NOT the only assertion — actual property values on live nodes are checked. ✓

#### Requirement: Containment Rendering — COVERED

- `_create_volume()` applies `TRANSPARENCY_ALPHA` + `albedo_color.a = 0.18` for
  bounded contexts, `albedo_color.a = 1.0` for modules, `CULL_DISABLED` for parent
  boundary. Children are added to the parent anchor, placing them inside. ✓
- `test_containment_rendering.gd` asserts `transparency != TRANSPARENCY_DISABLED`,
  `albedo_color.a < 1.0`, `albedo_color.a >= 1.0`, `get_parent() == ctx_anchor`,
  `ctx_mesh.size.x > mod_mesh.size.x`, `cull_mode == CULL_DISABLED`. All node
  properties that produce visual behavior are explicitly tested. ✓

#### Requirement: Dependency Rendering — COVERED

- `_create_edge()` creates: (1) `ImmediateMesh` (PRIMITIVE_LINES) — the line; (2)
  `CylinderMesh` with `top_radius = 0.0` (arrowhead cone) at the target end — an
  explicit rendering element for direction, satisfying "direction is visually indicated". ✓
- `test_dependency_rendering.gd` asserts: ImmediateMesh found, CylinderMesh with
  `top_radius == 0.0` found, cone `.position.distance_to(target_pos) < 2.0`,
  `albedo_color.r > 0.8 and albedo_color.b < 0.3` for cross-context orange. All
  assertions operate on instantiated Node3D children — no dict-key-only checks. ✓

#### Requirement: Size Encoding — COVERED

- `sz = float(nd["size"])` → `BoxMesh.size = Vector3(sz, sz*0.6, sz)`: JSON size maps
  linearly to mesh dimensions. ✓
- `test_size_encoding.gd` asserts `large_mesh.size.x > small_mesh.size.x` and ratio
  within 0.001 of 3.0. ✓

#### Requirement: Camera Controls — COVERED

- `camera_controller.gd`: spherical coordinates (_theta=0.15 rad initial ≈ 8.6° from
  vertical, _phi, _distance=40), scroll wheel → zoom, middle-mouse drag → orbit,
  `look_at(_pivot, Vector3.UP)` → up-orientation maintained. ✓
- `test_camera_controls.gd`: asserts _theta < PI/4, _distance > 0, scroll-up decreases
  _distance, scroll-down increases _distance, middle-drag changes _phi and _theta,
  `set_pivot()` updates _pivot + _distance, zoom clamped to min_distance. ✓
- Note: Godot emits "Node not inside tree" errors for `look_at()` in headless tests —
  these are expected because CameraController extends Camera3D (not RefCounted) and
  is not added to a scene tree. All 8 tests still pass because they assert state
  variables, not Transform3D output. This is acceptable for a prototype review. ✓
- Labels tested for `BILLBOARD_ENABLED`, `pixel_size > 0.0`, `no_depth_test == true`
  in `test_labels_are_billboard_and_readable`. ✓

#### Requirement: Godot 4.6 — COVERED

- `project.godot` contains `PackedStringArray("4.6")`. ✓
- All scripts are `.gd` (GDScript). ✓
- `FileAccess.open()` + `get_as_text()` used (not removed `read_as_text()`). ✓
- `test_engine_version.gd` reads `project.godot` via `FileAccess.open()` +
  `get_as_text()` and asserts "4.6" and `PackedStringArray("4.6")` present. This also
  satisfies the `godot-fileaccess-tested.sh` requirement. ✓

