### Requirement: Godot 4.6 — COVERED

**Spec**: The application MUST be built using Godot 4.6.x with GDScript. All API calls
MUST be compatible with the Godot 4.6 API.

**Scenario**: Engine version

Implementation:
- `godot/project.godot` declares `config/features=PackedStringArray("4.6")`.
- All scripts in `godot/scripts/` use the `.gd` extension (GDScript).
- `main.gd` uses `FileAccess.open()` + `get_as_text()` — Godot 4.6 API (not deprecated `read_as_text()`).
- `camera_controller.gd` uses `look_at()`, `Quaternion()`, `Basis()` — all valid Godot 4.6 APIs.

Tests: `godot/tests/test_engine_version.gd` (3 tests)
- `test_project_godot_declares_46`: reads `project.godot` via FileAccess, asserts `"4.6" in text`.
- `test_features_line_contains_46`: asserts `'PackedStringArray("4.6")' in text`.
- `test_fileaccess_open_returns_non_null`: exercises `FileAccess.open()` + `get_as_text()` path.

Status: **COVERED**

