## Findings

### F1 — FAIL: check-no-state-files-committed.sh exits 1 (BLOCKING)

`git diff --name-only main..HEAD` includes `.hyperloop/state/intake-2026-04-25.md`.

**Provenance investigation:** `git log main..HEAD --oneline -- .hyperloop/state/intake-2026-04-25.md` returns no commits — no commit on this branch introduced or modified the file. The file was present at the branch fork point (merge-base `24fcbea`) and main subsequently updated it while the branch remained un-rebased. The branch-vs-main diff appears because this branch carries an older version of the file (with duplicate "pass 125" rows) whereas main has the consolidated version.

**Status:** Pre-existing divergence — not a scope violation by the implementer. However, the guideline states the FAIL remains blocking regardless of provenance: "The FAIL remains blocking regardless of provenance." The branch must be rebased onto current main (or the implementation commits cherry-picked onto a fresh branch) so the state file is no longer in `git diff --name-only main..HEAD`.

**Classification:** Process violation — branch not rebased onto main before submission. The "PR not mergeable" note in the review assignment confirms this: the branch has conflicts with main that must be resolved.

### F2 — NOTE: pre-existing printf bug in pre-submit.sh on main

The implementer correctly fixed a `printf` format-string bug in `.hyperloop/checks/pre-submit.sh` (changed `printf "--- ..."` to `printf -- "--- ..."`). This fix is on this branch but NOT yet on main. When I synced checks from main (`git checkout main -- .hyperloop/checks/`), the fix was reverted and pre-submit.sh failed. I restored the branch's fixed version for the purposes of running the gates. This is a process note, not an implementer fault — the fix should be merged to main.

### Spec Coverage Assessment

All 24 THEN-clauses in `specs/extraction/scene-graph-schema.spec.md` are covered by real, correctly-predicated tests:

- **Schema structure** (nodes/edges/metadata, no extra fields): `test_schema.py::TestSchemaStructure` — asserts exact key set `{"nodes", "edges", "metadata"}`. ✓
- **Bounded context node fields**: `test_schema.py::TestNodeSchema` — each field asserted individually with correct values matching spec examples. ✓
- **Module node fields and parent reference**: `test_schema.py::TestNodeSchema` — id dotted, parent == "iam", type == "module". ✓
- **Child position relative to parent**: `test_extractor.py::test_child_nodes_are_near_parent_position` — asserts dist < bc_radius for all children after compute_layout. ✓
- **Edge schema (both cross_context and internal)**: `test_schema.py::TestEdgeSchema` — source, target, type asserted for both edge types. ✓
- **Metadata fields**: `test_schema.py::TestMetadataSchema` and `test_extractor.py` — source_path and timestamp keys asserted. ✓
- **Layout: xyz coordinates**: `test_layout.py::TestAllPositionsHaveXYZ::test_all_positions_have_xyz` — asserts all three keys present. ✓
- **Layout: coupled nodes closer (algorithm-quality)**: `test_layout.py::TestTightlyCoupledNodesAreCloser::test_tightly_coupled_nodes_are_closer` — VARIES coupling (5 edges vs 0), asserts distance is smaller. This would fail if the algorithm ignored edges. ✓
- **Layout: child within parent bounds (algorithm-quality)**: `test_layout.py::TestChildNodesWithinParentBounds::test_child_nodes_within_parent_spatial_bounds` — asserts d <= parent_size. `test_larger_parent_allows_larger_child_orbit` also varies parent_size and asserts relative orbit change. ✓
- **Godot renders at JSON position without recomputing**: `godot/tests/test_node_renderer.gd::test_node_rendered_at_json_position` — instantiates Main, calls build_from_graph with fixture {x:1, y:0, z:0}, asserts iam_node.position.x == 1.0 / y == 0.0 / z == 0.0. Real Node3D, real position assertion. ✓

