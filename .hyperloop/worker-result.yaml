## PARTIAL Requirements

### Zoom Toward Mouse Cursor — Zooming into a specific component (PARTIAL)
### Zoom Toward Mouse Cursor — Zooming out (PARTIAL)

**What exists:**
- Implementation: `_zoom_toward_cursor()` (lines 90-98) correctly computes
  `zoom_fraction = 1.0 - (_target_distance / old_target)` and lerps `_pivot` toward
  or away from `cursor_world` depending on zoom direction. Directionally correct.
- Tests: `test_zoom_toward_cursor_shifts_pivot_toward_cursor` asserts `pivot.x > 0.0`
  (zoom in, signed PASS); `test_zoom_out_from_cursor_shifts_pivot_away` asserts
  `pivot.x < 5.0` (zoom out, signed PASS). `check-nondirectional-movement-assertions.sh`
  exits 0.
- Call-site comments (lines 82, 85) explain the high-level direction of zoom_speed sign.

**What is missing — blocking per Directional Behavior Review guideline:**

The guideline states: "the implementer is required to write a # comment immediately
before each directional calculation line that shows the full sign chain. If the comment
is absent, mark the scenario PARTIAL — the sign may be accidental and will regress."

The directional calculation line in `_zoom_toward_cursor()` is line 97:

    _pivot = _pivot.lerp(cursor_world, zoom_fraction)

The comment immediately before this block (line 94) reads:

    # Shift pivot toward/away from cursor proportional to zoom fraction.

This is a description, not a sign-chain derivation. It says WHAT happens but does not
trace WHY zoom_fraction has the correct sign. It does NOT show:

    # zoom in: direction < 0 -> step < 0 -> target_distance < old_target
    #   -> zoom_fraction = 1 - (smaller/larger) > 0 -> lerp(cursor, positive) -> pivot toward cursor
    # zoom out: direction > 0 -> step > 0 -> target_distance > old_target
    #   -> zoom_fraction = 1 - (larger/smaller) < 0 -> lerp(cursor, negative) -> pivot away from cursor

Compare with the pan implementation where the required sign-chain format IS correctly
applied (lines 135, 137):
    # drag left -> delta.x = -50 -> negate -> pivot.x += 50 * pan_amount (moves right)

**What the implementer must add** (no other changes needed):

Immediately before line 97 (`_pivot = _pivot.lerp(cursor_world, zoom_fraction)`),
add a comment showing the full sign chain for both zoom-in and zoom-out cases,
following the same arrow-chained format as the pan comments. Example:

    # zoom in: direction < 0 -> step < 0 -> target_distance < old_target
    #   -> zoom_fraction = 1 - (smaller/larger) > 0 -> lerp toward cursor -> pivot shifts toward cursor
    # zoom out: direction > 0 -> step > 0 -> target_distance > old_target
    #   -> zoom_fraction = 1 - (larger/smaller) < 0 -> lerp away from cursor -> pivot shifts away
    _pivot = _pivot.lerp(cursor_world, zoom_fraction)

No implementation changes and no test changes are needed — only this sign-chain
documentation comment is missing.

