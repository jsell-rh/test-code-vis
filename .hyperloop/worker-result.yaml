## Requirement: JSON Scene Graph Loading тАФ COVERED

**Implementation** (`godot/scripts/main.gd`):
- `_ready()` opens the JSON file with `FileAccess.open()` + `get_as_text()` (Godot 4.6 API).
- `SceneGraphLoader.load_from_dict()` parses nodes/edges/metadata from the raw dict.
- `build_from_graph()` creates one `Node3D` anchor per node and one `ImmediateMesh`
  line + `CylinderMesh` arrowhead per edge.
- Anchor positions are set from `nd["position"]` exactly matching JSON values.

**Tests** (`godot/tests/test_scene_graph_loading.gd`):
- `test_volumes_created_for_each_node` тАФ `_anchors` has an entry for every node id. тЬУ
- `test_mesh_instances_exist_in_anchors` тАФ each anchor contains a `MeshInstance3D`. тЬУ
- `test_edge_mesh_instances_created` тАФ тЙе2 edge mesh instances (line + arrowhead). тЬУ
- `test_anchor_positions_match_json` тАФ `anchor.position.is_equal_approx(Vector3(...))`. тЬУ
- `test_labels_are_billboard_and_readable` тАФ `BILLBOARD_ENABLED`, `pixel_size > 0`,
  `no_depth_test == true` (covers "labels scale to remain readable"). тЬУ

