### Requirement: Fixed Visual Primitive Set
**Status: COVERED**

Implementation — `godot/scripts/llm_view_generator.gd`:
- `VALID_OPS: Array = ["show", "hide", "highlight", "arrange", "annotate", "connect"]`
  — exactly six, fixed and finite.
- `parse_response()` filters: any `op` value not in `VALID_OPS` is silently discarded.

**Scenario: LLM uses existing primitives — COVERED**
Tests: `test_full_pipeline_all_six_primitives_applied_end_to_end` and
       `test_full_pipeline_unknown_op_rejected_no_new_rendering`
- `test_full_pipeline_all_six_primitives_applied_end_to_end`:
  Calls build_prompt, asserts all six primitives appear in the prompt; feeds mock
  response using all six ops; asserts all six survive parse_response; calls apply_spec
  and asserts scene state (show/hide/arrange applied, connect/annotate add children). ✓
- `test_full_pipeline_unknown_op_rejected_no_new_rendering`:
  Mock response contains one valid "show" op and one prohibited "holographic_render" op.
  Asserts only 1 op survives parse_response, apply_spec only executes the "show" op. ✓

