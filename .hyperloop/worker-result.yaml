### Requirement: Dependency Rendering — COVERED

**Code:** `godot/scripts/main.gd` → `_create_edge()`

A two-vertex `ImmediateMesh` (PRIMITIVE_LINES) renders the line. A `CylinderMesh` with
`top_radius = 0.0` (cone) is placed at the target end, oriented along `(to_pos - from_pos)`,
to indicate the direction the dependency flows. Edge colour distinguishes type: orange for
`cross_context`, grey for `internal`.

**Tests:** `godot/tests/test_dependency_rendering.gd` (4 tests)
- `test_edge_line_mesh_created` — verifies an `ImmediateMesh` MeshInstance3D child exists.
- `test_direction_indicator_cone_created` — verifies a `CylinderMesh` with `top_radius == 0.0`
  exists on the main node.
- `test_direction_cone_near_target` — verifies the cone's world position is within 2 units of
  `to_pos`, confirming it marks the arrival end.
- `test_cross_context_cone_is_orange` — verifies the cone's material `albedo_color` is orange
  (`r > 0.8, b < 0.3`) for a `cross_context` edge.

Previous FAIL item (direction not indicated) is now resolved: the arrowhead cone was added
in commit 12ac742.

