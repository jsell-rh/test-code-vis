## Untestable THEN-Clauses

- **THEN the frame rate remains above 30fps** (nfr.spec.md): FPS measurement requires
  an active render pipeline with GPU. Headless Godot does not produce rendered frames.
  Architectural evidence: kartograph has ~6 bounded contexts and ~50 modules; the LOD
  system hides modules at far distance, reducing draw calls. No hardware-dependent
  render test is possible in CI.

- **AND there is no perceptible stutter or pop-in** (nfr.spec.md): Same as above.
  LOD transitions are tested logically (test_far_distance_shows_only_bounded_contexts,
  test_medium_distance_shows_modules, test_near_distance_shows_all_nodes) but visual
  smoothness requires a real display.

- **THEN it runs natively without browser, container, or VM dependencies**
  (nfr.spec.md): OS identity at test time cannot be confirmed with certainty from
  within the headless Godot process in a sandboxed environment. Behavioral evidence:
  test_not_running_in_web_browser asserts `not OS.has_feature("web")`, and
  test_project_godot_has_no_web_export_preset verifies no HTML5 export preset.
  No Dockerfile or browser launcher is present in the repository.

