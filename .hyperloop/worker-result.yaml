### Requirement: Containment Rendering — COVERED

**Implementation** (`godot/scripts/main.gd` → `_create_volume()`):
- `bounded_context` type: `TRANSPARENCY_ALPHA`, `albedo_color.a = 0.18` (translucent),
  `CULL_DISABLED` (visible from all angles).
- `module` type: `albedo_color.a = 1.0` (fully opaque), default culling.
- Child anchors are parented to parent anchor via `parent_anchor.add_child(anchor)`.

**Tests** (`godot/tests/test_containment_rendering.gd`):
- `test_bounded_context_is_translucent` — asserts `transparency != TRANSPARENCY_DISABLED`
  and `albedo_color.a < 1.0` on real `StandardMaterial3D`. Covers THEN: bounded context is
  translucent.
- `test_module_is_opaque` — asserts `albedo_color.a >= 1.0`. Covers THEN: child modules are
  opaque.
- `test_module_parented_inside_context` — asserts `mod_anchor.get_parent() == ctx_anchor` on
  real Node3D objects. Covers THEN: children are inside the parent.
- `test_bounded_context_larger_than_module` — asserts `ctx_mesh.size.x > mod_mesh.size.x`.
  Covers THEN: bounded context is a larger volume.
- `test_bounded_context_cull_disabled` — asserts `cull_mode == CULL_DISABLED`. Covers THEN:
  boundary is visually distinct from children.

