## THEN-Clause → Test Mapping (Reviewer-Constructed)

### Requirement: Flow is On-Demand

| THEN clause | Test function | Predicate verified |
|---|---|---|
| overlay NOT shown by default | `test_flow_not_active_by_default` | `not overlay.is_path_active()` — confirmed present and correct |

### Scenario: Requesting a flow path

| THEN clause | Test function | Predicate verified |
|---|---|---|
| relevant flow path lights up | `test_path_mid_node_lit_up` | `col.r >= 0.9 and col.g >= 0.9 and col.b >= 0.9 and col.a >= 0.8` — confirms bright white, matching `ACTIVE_COLOR` |
| irrelevant elements de-emphasized (colour) | `test_offpath_nodes_deemphasized` | `col.r <= 0.4 and col.g <= 0.4 and col.b <= 0.4 and col.a <= 0.4` — matches `DIMMED_COLOR` |
| irrelevant elements de-emphasized (transparency) | `test_offpath_node_transparency_mode` | `mat.transparency == BaseMaterial3D.TRANSPARENCY_ALPHA` — required for alpha rendering |
| path traceable — entry (green) | `test_entry_node_green` | `col.g > 0.8 and col.r < 0.5 and col.b < 0.5` — matches `ENTRY_COLOR` |
| path traceable — terminus (red) | `test_terminus_node_red` | `col.r > 0.8 and col.g < 0.5 and col.b < 0.5` — matches `TERMINUS_COLOR` |

### Scenario: Flow overlaid on structure

| THEN clause | Test function | Predicate verified |
|---|---|---|
| flow rendered as path (edges visible) | `test_path_edges_visible` | `e1.visible and e2.visible` — both path edges |
| flow rendered as path (edges cyan) | `test_path_edges_cyan` | `col.r <= 0.1 and col.g >= 0.8 and col.b >= 0.9` — matches `PATH_EDGE_COLOR` |
| structural context remains visible | `test_offpath_nodes_still_in_scene` | `other.get_parent() != null and other.visible` — off-path nodes not hidden |
| human can follow path spatially | `test_positions_unchanged_when_path_shown` | `entry.position.is_equal_approx(Vector3(1,0,2))` — positions unmodified |

### Scenario: Identifying a bottleneck

| THEN clause | Test function | Predicate verified |
|---|---|---|
| high-traffic paths prominent (≥500 traffic → orange) | `test_high_traffic_edge_orange` | `col.r >= 0.9 and col.g <= 0.6 and col.b <= 0.1` — matches `HIGH_TRAFFIC_COLOR` |
| high-traffic paths prominent (100–499 → yellow) | `test_medium_traffic_edge_yellow` | `col.r >= 0.9 and col.g >= 0.7 and col.b <= 0.1` — matches `MEDIUM_TRAFFIC_COLOR` |
| bottleneck points identifiable (overlay added) | `test_bottleneck_node_has_overlay` | iterates children, finds `child.name == "BottleneckOverlay"` |
| bottleneck points identifiable (overlay red) | `test_bottleneck_overlay_red` | `col.r >= 0.9 and col.g <= 0.1 and col.b <= 0.1` — matches `BOTTLENECK_COLOR` |

