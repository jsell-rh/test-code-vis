### Requirement: Navigation — COVERED

**Implementation:**
- `camera_controller.gd`: middle-mouse → orbit, right-mouse → pan, scroll-wheel → zoom.
- `look_at(_pivot, Vector3.UP)` keeps orientation intuitive (up stays up).

**Scenario: Moving through the space — COVERED**
- `test_camera_controls.gd`:
  - Pan: `test_set_pivot_updates_state`.
  - Zoom: `test_scroll_up_decreases_distance`, `test_scroll_down_increases_distance`,
    `test_zoom_clamped_at_minimum`.
  - Rotate: `test_orbit_horizontal_drag_changes_phi`,
    `test_orbit_vertical_drag_changes_theta`.

