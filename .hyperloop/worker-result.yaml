### Requirement: Dependency Rendering — COVERED

**Implementation:** `godot/scripts/main.gd` `_create_edge()`
- `ImmediateMesh` with `PRIMITIVE_LINES` connects `from_pos` → `to_pos`.
- `CylinderMesh` (top_radius=0 = cone) placed at target end, oriented along edge direction.
- Cross-context edges: orange `Color(1.0, 0.50, 0.10)`; internal: grey `Color(0.55, 0.55, 0.55)`.

**Scenario: Rendering a cross-context dependency — all THEN clauses covered**
| THEN clause | Test | Method |
|---|---|---|
| a line connects the two context volumes | `test_dependency_rendering.gd` | `test_edge_line_mesh_created()` — asserts `ImmediateMesh` child exists on main node |
| line's direction is visually indicated | `test_dependency_rendering.gd` | `test_direction_indicator_cone_created()` — asserts `CylinderMesh` with `top_radius == 0.0` exists |
| cone near target end | `test_dependency_rendering.gd` | `test_direction_cone_near_target()` — asserts cone `position.distance_to(target_pos) < 2.0` |
| cross-context color distinct | `test_dependency_rendering.gd` | `test_cross_context_cone_is_orange()` — asserts `albedo_color.r > 0.8 and b < 0.3` |

