### Requirement: Support the Architecture Feedback Loop — COVERED

**SHALL**: The system MUST support the iterative loop of: human writes spec, agent builds,
human evaluates, human refines spec.

**Scenario: Post-build evaluation**

**Code implementation** (`godot/scripts/understanding_overlay.gd`, `godot/scripts/main.gd`):
- `UnderstandingOverlay.apply_alignment_overlay()` — colours each node green (ALIGNED,
  `Color(0.2, 0.8, 0.3)`), red (DIVERGENT, `Color(0.9, 0.2, 0.1)`), or grey
  (UNSPECIFIED) based on `spec_status` field, so human can see where build matches spec.
- `UnderstandingOverlay.apply_quality_overlay()` — computes in-degree and mutual coupling;
  colours high-centrality nodes deep red (CRITICAL, `Color(0.95, 0.15, 0.05)`) and
  tightly coupled nodes orange (COUPLED), enabling independent soundness assessment.
- `UnderstandingOverlay.apply_failure_overlay()` — BFS-cascades from a target node,
  colouring all transitively affected nodes magenta (AFFECTED, `Color(0.85, 0.1, 0.55)`),
  so human can explore change impact before updating spec.
- `main.gd::_unhandled_input()` — H/J/K keyboard shortcuts invoke the three overlays.

Note: `prototype-scope.spec.md` lists conformance mode, evaluation mode, and simulation
mode as "not in scope" for the prototype. However, all three ARE implemented and fully
tested on this branch, so the system-purpose spec requirement is satisfied. Per the review
guidelines, MISSING out-of-scope features would not be a fail; implemented and tested
features trivially pass.

**Test coverage** (`godot/tests/test_system_purpose.gd` — runtime behavioral GDScript tests):
- `test_build_spec_comparison_available` — sets spec_status "aligned"/"divergent" on
  fixture nodes, calls `_apply_alignment_overlay()`, asserts divergent node turns red
  (r >= 0.8).
- `test_architectural_soundness_assessable` — constructs hub fixture with in_degree=3,
  calls `_apply_quality_overlay()`, asserts hub node turns deep red (r >= 0.9 = CRITICAL_COLOR).
- `test_change_impact_explorable` — constructs auth→billing→reporting dependency chain,
  calls `_apply_failure_impact_overlay()` (simulates auth failure), asserts billing and
  reporting turn magenta (g < 0.3 = AFFECTED_COLOR).

All 3 tests create scene instances with known fixture data and assert colour changes on
MeshInstance3D materials at runtime.

