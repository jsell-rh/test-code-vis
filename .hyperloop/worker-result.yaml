## check-report-scope-section.sh — Process Artifact Note

worker-result.yaml was deleted by orchestrator cleanup commit e17c438. The
check's recovery logic runs `git log --oneline -- .hyperloop/worker-result.yaml
| head -1`, returning e17c438 (the deletion commit), then `git show
e17c438:.hyperloop/worker-result.yaml` returns empty because that commit
removes the file. Verifier manually recovered from aa1a1fb (the creation
commit) and confirmed the file contains a valid "## Scope Check Output" section
with "OK: No prohibited". This is NOT a falsification — the FAIL is a
process artifact from the orchestrator cleanup ordering.

