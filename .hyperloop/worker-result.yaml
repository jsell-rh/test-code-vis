## Requirement-by-Requirement Coverage

### Requirement: Conformance Mode — COVERED

Implementation: `check_alignment(actual_nodes, spec_node_ids)` returns `{aligned, divergent, missing}`;
`render_alignment()` applies Label3D annotations ("✓ SPEC ALIGNED", "⚠ MERGED") and highlights
divergent nodes on the live scene tree.

#### Scenario: Spec-aligned implementation

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "the human can see that the realized system has auth and user management as separate components" | test_aligned_nodes_detected_as_separate | asserts "auth" and "user_management" in `aligned[]`; `divergent` and `missing` empty |
| "the correspondence between spec and realization is visually apparent" | test_aligned_nodes_have_annotation_in_scene | creates Node3D anchors; calls render_alignment(); asserts ≥1 Label3D child in scene_root |

#### Scenario: Spec-divergent implementation

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "the human can see the divergence between spec and realization" | test_divergent_nodes_detected | expects payment_service but actual has order_service; asserts payment_service in missing or divergent |
| "the specific nature of the divergence is clear (merged vs. separate)" | test_divergent_nodes_annotated_as_merged | payment_order contains "payment" substring → divergent; calls render_alignment(); asserts Label3D with "MERGED" in text |

---

### Requirement: Evaluation Mode — COVERED

Implementation: `analyze_coupling(nodes, edges, threshold)` returns `{pairs}` sorted by
coupling_score; `analyze_criticality(nodes, edges, threshold)` returns `{critical}` sorted by
in_degree; `render_coupling()` and `render_criticality()` apply HIGHLIGHT_COLOR and Label3D
annotations ("⚠ Coupling: N", "⚠ SPOF Risk (in-degree: N)").

#### Scenario: Detecting tight coupling

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "the coupling between those services is apparent" | test_tightly_coupled_pair_detected | 3 bidirectional edges → asserts pairs[0].coupling_score >= 2 |
| "the human can assess whether the coupling is problematic" | test_coupled_nodes_highlighted | calls render_coupling(); asserts mesh_x.material_override.albedo_color == HIGHLIGHT_COLOR AND mesh_y.material_override.albedo_color == HIGHLIGHT_COLOR |

#### Scenario: Identifying single point of failure

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "the criticality and centrality of that component is apparent" | test_central_node_detected_as_critical | hub has in_degree=3; asserts critical[0].node_id == "hub" and critical[0].in_degree == 3 |
| "the risk it represents is clear" | test_critical_node_annotated_with_spof_risk | calls render_criticality(); asserts Label3D with "SPOF" in text |

#### Scenario: Spec faithfully implemented but architecturally poor

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "architectural problems are visible even though conformance is perfect" | test_coupling_detected_despite_perfect_alignment | asserts aligned.size()==2 (perfect conformance) AND coupling.pairs.size()>=1 (problem still visible) |

---

### Requirement: Simulation Mode — COVERED

Implementation: `simulate_split(nodes, edges, node_id)` returns `{dependents, new_interfaces}`;
`simulate_failure(nodes, edges, node_id)` performs BFS through reverse dependency graph and
returns `{cascade}`; `render_split_impact()` and `render_failure_cascade()` apply highlights
and Label3D annotations.

#### Scenario: Splitting a service

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "the impact on dependent services is visible" | test_split_dependents_detected | asserts dependents.has("client_a") AND dependents.has("client_b") |
| "new dependencies or interfaces that would be required are shown" | test_split_new_interfaces_shown | asserts new_interfaces.size()>=1; caller mesh highlighted; Label3D with "split" in text |

#### Scenario: Failure injection

| THEN-clause (verbatim) | Test function | Predicate verified |
|---|---|---|
| "the cascade of effects through the system is visible" | test_failure_cascade_detected | BFS: db fails → cascade.has("api") AND cascade.has("frontend") (transitive) |
| "components that would be affected are clearly identified" | test_failure_affected_nodes_highlighted | consumer_1 mesh.material_override.albedo_color == HIGHLIGHT_COLOR; Label3D with "FAILED" in text |

