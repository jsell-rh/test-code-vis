## Findings

### Requirement: Target Codebase — COVERED

Implementation: The extractor is parameterized by `src_path` and can
target any Python codebase. `godot/data/scene_graph.json` contains
kartograph's actual bounded-context structure (graph, iam, infrastructure,
management, query, shared_kernel), confirming the prototype was built
against kartograph.

Tests: `extractor/tests/test_kartograph_integration.py` invokes the CLI
against `~/code/kartograph/src/api` and asserts that `iam`, `graph`, and
`shared_kernel` appear in the produced scene graph. The test skips
gracefully when that path is absent — the correct pattern for an external
dependency.

Scenario "Loading kartograph": COVERED.

---

### Requirement: Two-Stage Pipeline — COVERED

Implementation:
- Stage 1: `extractor/extractor.py::build_scene_graph()` + `extractor/__main__.py`
  produce a JSON scene graph written to disk.
- Stage 2: `godot/scripts/main.gd` reads the file via `FileAccess.open()` /
  `JSON.new()` and calls `build_from_graph()`. `scene_graph_loader.gd::load_from_dict()`
  parses nodes, edges, and metadata.

Tests:
- Python: `test_cli.py::test_main_writes_json_output` calls `main()`,
  asserts exit 0, file existence, and JSON containing nodes/edges/metadata.
- GDScript: `test_scene_graph_loader.gd` unit-tests the loader's field
  parsing; `test_scene_graph_loading.gd::test_volumes_created_for_each_node`
  drives `build_from_graph()` end-to-end and asserts scene-tree children.

Scenario "Extraction then visualization": COVERED.

---

### Requirement: Top-Down Architectural View — COVERED

Implementation:
- `camera_controller.gd` initialises `_theta = 0.15` (≈8.6° from vertical)
  and `_distance = 40.0`.
- LOD thresholds: FAR > 80.0, NEAR < 20.0. Initial distance 40.0 is MEDIUM,
  so bounded contexts AND cross-context dependency lines are visible from
  launch.
- `extractor.py::_order_by_coupling()` places tightly-coupled contexts
  adjacent in the circular layout, satisfying the coupling-proximity clause.

Tests:
- `test_camera_controls.gd::test_initial_theta_is_near_top_down` asserts
  `_theta < PI/4`.
- `test_spatial_structure.gd` asserts that at MEDIUM LOD all bounded contexts
  and cross-context edges are visible simultaneously.

Scenario "Viewing kartograph from above": COVERED.

---

### Requirement: Zoom to Detail — COVERED

Implementation: `lod_manager.gd` implements three visibility levels:
- FAR (distance > 80): bounded_context nodes only; all edges hidden.
- MEDIUM (20–80): bounded_context + module nodes; cross_context edges.
- NEAR (< 20): all nodes; all edges including internal.

`camera_controller.gd` transitions between levels as the user scrolls,
with smooth lerped distance interpolation.

Tests:
- `test_spatial_structure.gd` covers all three LOD transitions, including
  `test_lod_integration_far_hides_modules_in_built_scene` against a fully
  instantiated scene.
- `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` asserts
  the size ratio matches the LOC ratio within tolerance, verifying that
  relative sizes of internal modules are visually encoded.

Scenario "Zooming into IAM": COVERED — the LOD system exposes module
nodes (e.g., `iam.domain`, `iam.application`) and their internal edges
as the user zooms in.

---

### Requirement: Abstract Visual Language — COVERED

Implementation: `main.gd` uses `BoxMesh` for all nodes. Bounded contexts
are flat translucent slabs (`CULL_DISABLED`); modules are compact opaque
boxes. No buildings, terrain, or thematic decoration appears anywhere in
the scene scripts or scene file.

Tests: `test_containment_rendering.gd` asserts `test_bounded_context_is_translucent`,
`test_module_is_opaque`, and `test_bounded_context_cull_disabled` on
instantiated mesh instances.

Scenario "Visual representation": COVERED.

---

### Requirement: Readable Labels — COVERED

Implementation: Every node in `main.gd` receives a `Label3D` with:
- `billboard = BaseMaterial3D.BILLBOARD_ENABLED`
- `no_depth_test = true`
- `pixel_size = 0.012`

Tests: `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable`
instantiates the built scene and asserts all three properties on every
node's Label3D child.

Scenario "Identifying a module": COVERED.

---

### Requirement: Dependency Visualization — COVERED

Implementation: `main.gd::_create_edge()` produces an `ImmediateMesh` line
from source to target and a `CylinderMesh` cone (top_radius = 0) near the
target as a directional arrowhead. Color-coded: orange `Color(1.0, 0.50,
0.10)` for cross-context, grey `Color(0.55, 0.55, 0.55)` for internal.

Tests: `test_dependency_rendering.gd` asserts:
- `test_edge_line_mesh_created` — line mesh exists.
- `test_direction_indicator_cone_created` — cone mesh exists.
- `test_direction_cone_near_target` — cone is positioned near the target node.
- `test_cross_context_cone_is_orange` — cross-context arrowhead color matches spec.

Scenario "Cross-context dependency": COVERED.

---

### Requirement: Navigation — COVERED

Implementation: `camera_controller.gd`:
- LMB drag → pan (`_pivot` shifts in the view plane).
- RMB drag → orbit (changes `_phi` azimuth and `_theta` elevation).
- Scroll wheel → smooth zoom (lerped `_distance` with cursor-toward pivot
  shift), clamped to `[min_distance=2.0, max_distance=500.0]`.

Tests:
- `test_camera_controls.gd`: scroll up/down changes distance, RMB drag
  changes phi/theta, set_pivot updates state, clamp at minimum.
- `test_ux_polish.gd`: LMB pan direction correctness (pivot_x increases
  on drag-right), zoom-toward-cursor pivot shift, smooth interpolation.

Scenario "Moving through the space": COVERED.

