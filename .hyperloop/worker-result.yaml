## Requirement-by-Requirement Coverage

### Requirement: Conformance Mode — COVERED

The system MUST allow the human to see whether the as-built system matches the as-specced
design.

Implementation: `check_alignment(actual_nodes, spec_node_ids)` in `understanding_analyzer.gd`
returns `{aligned, divergent, missing}`. Uses exact-ID matching and substring matching to
classify each spec-defined component. `render_alignment()` applies Label3D annotations
("✓ SPEC ALIGNED", "⚠ MERGED") and highlights divergent nodes on the live scene tree.

#### Scenario: Spec-aligned implementation

| THEN-clause | Test function | Status |
|---|---|---|
| "the human can see that the realized system has auth and user management as separate components" | `test_aligned_nodes_detected_as_separate` | COVERED |
| "the correspondence between spec and realization is visually apparent" | `test_aligned_nodes_have_annotation_in_scene` | COVERED |

`test_aligned_nodes_detected_as_separate`: Given actual_nodes=[auth, user_management] and
spec_node_ids=[auth, user_management], asserts both IDs appear in result["aligned"] with
no divergent/missing entries.

`test_aligned_nodes_have_annotation_in_scene`: Calls `render_alignment()` with real Node3D
anchors and a real scene_root, then counts Label3D children — asserts >= 1 Label3D added.

#### Scenario: Spec-divergent implementation

| THEN-clause | Test function | Status |
|---|---|---|
| "the human can see the divergence between spec and realization" | `test_divergent_nodes_detected` | COVERED |
| "the specific nature of the divergence is clear (merged vs. separate)" | `test_divergent_nodes_annotated_as_merged` | COVERED |

`test_divergent_nodes_detected`: Given actual=[order_service] vs spec=[payment_service],
asserts payment_service appears in divergent or missing (accepted either since it can be
absent entirely or partially matched).

`test_divergent_nodes_annotated_as_merged`: Given actual=[payment_order] vs spec=[payment],
asserts "payment" is classified divergent (substring match), then calls `render_alignment()`
and asserts a Label3D with text containing "MERGED" exists in the scene tree.

