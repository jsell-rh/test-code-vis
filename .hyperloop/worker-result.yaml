| "config/features includes 4.6" | `test_project_godot_config_features_line` | Asserts content.contains("config/features") AND content.contains('"4.6"') ✓ |
| "all scripts use GDScript" | `test_scripts_dir_contains_only_gdscript` | DirAccess iterates ALL files in res://scripts/, asserts each ends with ".gd" ✓ |
