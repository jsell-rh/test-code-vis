### Requirement: Godot 4.6 — COVERED

**Implementation:**
- `project.godot` declares `config/features=PackedStringArray("4.6")`.
- All scripts are `.gd` files (no `.cs` files present).
- `main.gd` uses `FileAccess.open()` + `get_as_text()` (Godot 4 API); no
  deprecated `File.new()` or `read_as_text()` calls.

**Tests:** `godot/tests/test_engine_version.gd` and `test_godot_version.gd`
- `test_project_godot_declares_version_4_6()` / `test_project_declares_godot_46()`
  — reads project.godot via FileAccess and asserts "4.6" is present.
- `test_project_features_include_4_6()` — asserts `"4.6"` appears in the
  `config/features` line.
- `test_main_script_is_gdscript()` — main.gd file is non-empty and project.godot
  references `.tscn` (not `.cs`).
- `test_main_uses_godot4_fileaccess_api()` — main.gd contains `FileAccess.open(`
  and `get_as_text()` and does NOT contain `File.new()` or `read_as_text()`.

