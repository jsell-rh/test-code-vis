## Requirement-by-Requirement Findings

### Requirement: Target Codebase — COVERED

**SHALL**: The prototype MUST use the kartograph codebase as its target system.

Scenario: Loading kartograph
- GIVEN the kartograph codebase
- WHEN the prototype is launched
- THEN kartograph's structure is visualized in 3D space
- AND the visualization reflects the actual structure of the codebase

Implementation: `extractor/extractor.py` — `discover_bounded_contexts()` and
`discover_submodules()` walk any Python source tree. The extractor CLI is
invoked against `~/code/kartograph/src/api`.

Tests:
- `test_kartograph_integration_bounded_contexts` (extractor/tests/test_kartograph_integration.py):
  Calls `main()` against `~/code/kartograph/src/api`; asserts that `iam`,
  `graph`, and `shared_kernel` appear as bounded-context nodes.
  (Skipped when kartograph not on disk — correct CI pattern.)
- `test_kartograph_extraction_produces_modules`: Asserts >= 1 node with
  `type == "module"` produced, confirming the visualization reflects the
  actual internal structure of the codebase.

**COVERED**

---

### Requirement: Two-Stage Pipeline — COVERED

**SHALL**: Python extractor produces JSON scene graph; Godot application consumes it.

Scenario: Extraction then visualization
- GIVEN the kartograph codebase
- WHEN the user runs the extractor
- THEN a JSON scene graph file is produced
- AND the Godot application can load that file and render the scene

Implementation:
- `extractor/__main__.py -> main()` calls `build_scene_graph()`, serialises to JSON.
- `godot/scripts/main.gd -> _ready()`: `FileAccess.open(scene_graph_path)`, parses
  JSON with `JSON.new()`, calls `build_from_graph()`. Not a stub.

Tests:
- `test_main_writes_json_output` (extractor/tests/test_cli.py): CLI produces a
  file with `nodes`, `edges`, `metadata` keys.
- `test_volumes_created_for_each_node` (godot/tests/test_scene_graph_loading.gd):
  `build_from_graph()` populates `_anchors` for every node in fixture.
- `test_anchor_positions_match_json`: anchor positions match JSON position values.

**COVERED**

---

### Requirement: Top-Down Architectural View — COVERED

**SHALL**: Top-down camera view; all bounded contexts visible as distinct volumes;
relative positions reflect coupling; dependencies visible as connections.

Scenario: Viewing kartograph from above

Implementation:
- `camera_controller.gd`: `_theta = 0.15` (~8.6 deg from vertical — top-down).
- `lod_manager.gd -> _apply_far()`: only `bounded_context` anchors visible at
  far distance; modules and edges hidden.
- `extractor.py -> _order_by_coupling()` + `compute_layout()`: greedy
  nearest-neighbour reorders BCs so coupled pairs adjacent in circular ring,
  giving them smaller Euclidean distance.
- `main.gd -> _create_edge()`: ImmediateMesh PRIMITIVE_LINES drawn between
  world positions of connected nodes.

Tests:
- `test_initial_theta_is_near_top_down` (test_camera_controls.gd): `_theta < PI/4`.
- `test_far_distance_shows_only_bounded_contexts` (test_spatial_structure.gd):
  at `FAR_THRESHOLD + 10` context visible, module hidden.
- `test_coupled_bcs_are_closer_than_uncoupled` (test_extractor.py): 4-BC
  fixture; asserts `dist(auth, shared_kernel) < dist(auth, billing)`.
- `test_dependency_expressed_as_visible_connection` (test_spatial_structure.gd):
  ImmediateMesh child of main node found after build.

**COVERED**

