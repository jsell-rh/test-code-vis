### Requirement: Spec Extraction (SHOULD)

**COVERED**

Note: `specs/prototype/prototype-scope.spec.md` lists spec extraction as out of
prototype scope, but since it is a SHOULD in this spec and IS implemented and
tested, it is recorded as covered (not a failure either way).

#### Scenario: Kartograph specs

- **Code**: `extract_spec_nodes()` in `extractor/extractor.py`. Reads the target
  codebase's `specs/` directory, parses an optional `index.spec.md` for bounded
  context links, and returns nodes with `type="spec"`. Top-level spec nodes have
  `parent=None`; per-file child nodes have `parent=f"spec.{dirname}"`. IDs are
  prefixed with `"spec."`. `build_scene_graph(include_specs=True)` triggers this
  path.

- **Tests** (`TestSpecExtraction` in `test_extractor.py`):
  - `test_spec_nodes_have_spec_type` ÔÇö all returned nodes have `type == "spec"`.
  - `test_spec_nodes_distinguishable_from_code_nodes` ÔÇö integration: both code
    and spec nodes coexist and are distinguishable by `type`.
  - `test_spec_node_ids_prefixed` ÔÇö all IDs start with `"spec."`.
  - `test_spec_child_nodes_have_parent` ÔÇö child nodes reference valid parent IDs.
  - `test_no_spec_nodes_when_not_enabled` ÔÇö `include_specs=False` produces zero
    spec nodes.
  - `test_no_spec_nodes_when_no_specs_dir` ÔÇö graceful handling of missing
    `specs/` directory.

