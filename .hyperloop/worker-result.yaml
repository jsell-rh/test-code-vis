# Task-025: Zoom Toward Mouse Cursor

## Implementation Summary

Implements the "Zoom Toward Mouse Cursor" requirement from `specs/prototype/ux-polish.spec.md`.

**Production code** (`godot/scripts/camera_controller.gd`):
- `_zoom_toward_cursor(cursor_world, direction)`: shifts `_target_distance` by a
  proportional step, then shifts `_pivot` via `lerp()` so the cursor world-point
  stays fixed. Direction sign determines whether pivot moves toward or away from cursor.
- Scroll-wheel handler calls `_zoom_toward_cursor(_mouse_to_ground(event.position), ±zoom_speed)`
  so zoom always targets the point under the mouse.
- Added full sign-chain derivation block in code comments (task-025 deliverable):
  zoom-in: step < 0 → target_distance decreases → zoom_fraction > 0 → pivot toward cursor ✓
  zoom-out: step > 0 → target_distance increases → zoom_fraction < 0 → pivot away from cursor ✓

**Tests** (`godot/tests/test_ux_polish.gd`, task-025 additions):
- Added sign-chain derivation comment to `test_zoom_out_from_cursor_shifts_pivot_away`
- Added new edge-case test `test_zoom_cursor_at_pivot_does_not_shift_pivot`: when the
  cursor is exactly at the pivot, `lerp(pivot, pivot, f) = pivot` — pivot must remain
  unchanged, covering the "component stays under cursor" clause for this boundary case.

## THEN-Clause Coverage

### Scenario: Zooming into a specific component

| THEN-clause | Test function | Status |
|---|---|---|
| View zooms toward the point under the cursor | `test_zoom_toward_cursor_shifts_pivot_toward_cursor` (returns `cam._pivot.x > 0.0`) | PASS |
| Component under cursor stays under cursor during zoom | `test_component_stays_under_cursor_on_zoom_in` (returns `after > before`), `test_zoom_cursor_at_pivot_does_not_shift_pivot` (edge: cursor at pivot, returns `cam._pivot == initial_pivot`) | PASS |

### Scenario: Zooming out

| THEN-clause | Test function | Status |
|---|---|---|
| View zooms out from the point under the cursor | `test_zoom_out_from_cursor_shifts_pivot_away` (returns `cam._pivot.x < 5.0`) | PASS |

### Smooth zoom (from Smooth Camera Movement requirement)

| THEN-clause | Test function | Status |
|---|---|---|
| Zoom is animated smoothly (interpolated), not instantaneous | `test_zoom_is_interpolated_not_instantaneous` (asserts `_distance` moves partially after one _process frame) | PASS |

