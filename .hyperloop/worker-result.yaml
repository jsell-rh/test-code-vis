## Implementation Summary

UX Polish spec (specs/prototype/ux-polish.spec.md) is fully implemented and verified.

### Requirement: Pan with Left Mouse Button — COVERED

**Implementation** (`camera_controller.gd`):
- `_panning` flag set on LMB press/release (line 73).
- `_handle_motion` shifts `_pivot` via `_pivot -= right * delta.x * pan_amount` and
  `_pivot -= forward * delta.y * pan_amount` when `_panning` is true (lines 133–154).
- Inline derivation comment at lines 136–144 documents the full sign chain before
  each directional calculation (requirement per guidelines). ✅

**Scenario: Panning the view**
- `test_lmb_pan_moves_pivot` — LMB press + drag right 50 px → `pivot != initial_pivot`. ✅
- Directional coverage: `test_pan_drag_right_decreases_pivot_x` (signed: `pivot.x < initial_x`) and
  `test_pan_drag_left_increases_pivot_x` (signed: `pivot.x > initial_x`). ✅

---

### Requirement: Non-Inverted Movement — COVERED

**Implementation** (`camera_controller.gd` lines 133–154):
Map-grab model: `_pivot -= right * delta.x * pan_amount`. Inline sign-chain comment present
immediately before the calculation lines. ✅

**Independent sign derivation (pre-read):**
- Spec "(i.e.)": "dragging left reveals content to the right"
  - drag left → delta.x = −50 → `_pivot -= right * (−50) * pan_amount` → pivot.x increases
  - Camera moves right → right-side content enters view ✓
  - Expected predicate: `pivot.x > initial_x`
  - `test_pan_drag_left_increases_pivot_x` asserts: `cam._pivot.x > initial_x` — MATCH ✅

**Scenario: Drag direction matches view movement**
- `test_drag_direction_matches_view_movement` — drag right 50 px, asserts `pivot.x < initial_x`. ✅
- `test_pan_drag_right_decreases_pivot_x` — signed: `pivot.x < initial_x`. ✅
- `test_pan_drag_left_increases_pivot_x` — signed: `pivot.x > initial_x`. ✅
- `test_pan_drag_down_decreases_pivot_z` — signed: `pivot.z < initial_z`. ✅
- `test_pan_drag_up_increases_pivot_z` — signed: `pivot.z > initial_z`. ✅

---

### Requirement: Zoom Toward Mouse Cursor — COVERED

**Implementation** (`camera_controller.gd`):
- `_handle_button` calls `_zoom_toward_cursor(_mouse_to_ground(event.position), direction)`
  for both WHEEL_UP (direction = −zoom_speed) and WHEEL_DOWN (direction = +zoom_speed)
  (lines 82–84).
- `_zoom_toward_cursor` shifts `_pivot` via `_pivot = _pivot.lerp(cursor_world, zoom_fraction)`
  (lines 98–106).
- Inline sign-chain derivation comment at lines 89–97. ✅

**Scenario: Zooming into a specific component**
- `test_zoom_toward_cursor_shifts_pivot_toward_cursor` — signed `pivot.x > 0.0`. ✅
- `test_component_stays_under_cursor_on_zoom_in` — `after > before`. ✅

**Scenario: Zooming out**
- `test_zoom_out_from_cursor_shifts_pivot_away` — signed `pivot.x < 5.0`. ✅
- `test_zoom_out_increases_target_distance` — `target > initial`. ✅

---

### Requirement: Orbit Around Mouse Point — COVERED

**Implementation** (`camera_controller.gd`):
- RMB press → `_set_orbit_pivot(_mouse_to_ground(event.position))` (line 80).
- `_set_orbit_pivot` sets `_pivot = world_point` and recalculates spherical angles
  from the current camera position (lines 111–121).
- Orbit motion (`_handle_motion` lines 127–131) updates `_phi` and `_theta` only;
  `_pivot` is not modified during orbit.

**Scenario: Orbiting around a component**
- `test_orbit_pivot_set_to_cursor_point_at_start` — `_pivot == world_point`. ✅
- `test_orbit_pivot_is_used_during_orbit` — `_pivot == pivot_before` after orbit motion. ✅
- `test_component_remains_at_visual_center_during_orbit` — `_pivot == center` after diagonal drag. ✅

---

### Requirement: Smooth Camera Movement — COVERED

**Implementation** (`camera_controller.gd`):
- Zoom: `_process` lerps `_distance` toward `_target_distance` via
  `lerp(_distance, _target_distance, min(zoom_smoothing * delta, 0.9))` (lines 50–56). ✅
- Pan: pivot update is immediate but proportional to `delta.x` / `delta.y` via
  `pan_amount = pan_speed * (_distance * 0.05 + 1.0)` (lines 151–153). ✅

**Scenario: Smooth zoom**
- `test_zoom_is_interpolated_not_instantaneous` — partial move toward target after 1 frame. ✅

**Scenario: Smooth pan**
- `test_pan_proportional_to_drag_speed` — move2 (50 px) > move1 (10 px). ✅

