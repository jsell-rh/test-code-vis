## Direction Predicate Independent Derivation

Spec reference: "the scene moves in the same direction as the drag (i.e. dragging left reveals content
to the right, as in Google Maps)"

Setup: phi=PI/2, camera on +Z side, basis.x = world +X. Drag left → delta.x = −50.
Code: `_target_pivot -= right * delta.x * pan_amount`
     = `_target_pivot -= (+X) * (−50) * pan_amount`
     = `_target_pivot.x += positive`

Result: pivot moves +X → camera shifts right → scene appears to shift left (same direction as drag)
→ content to the right becomes visible. Google Maps convention satisfied. ✓

Test predicate `cam._pivot.x > 0.0` matches independently derived predicate. ✓

