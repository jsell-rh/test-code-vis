- `godot/scripts/main.gd` lines 51–55: uses `FileAccess.open()` + `get_as_text()` (Godot 4.x API); `File.new()` / `read_as_text()` (Godot 3 deprecated API) are absent.
- All four files in `godot/scripts/` have `.gd` extension — GDScript only, no `.cs`.

**THEN → test mapping:**

| THEN clause | Test function | File | Predicate |
|---|---|---|---|
