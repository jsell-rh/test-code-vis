### Requirement: Camera Controls — COVERED

**Implementation** (`godot/scripts/camera_controller.gd`):
- **Top-down overview**: `_theta = 0.15` rad (≈8.6° from zenith, well under
  45°); `_ready()` calls `_update_transform()` so default camera is near
  top-down on scene start. `_frame_camera()` in `main.gd` calls
  `set_pivot(centre, distance)` to reframe the whole graph.
- **Zooming**: `MOUSE_BUTTON_WHEEL_UP/DOWN` decreases/increases `_distance`;
  clamped to `[min_distance, max_distance]`.
- **Orbiting**: Middle-mouse drag updates `_phi` (azimuth) and `_theta` (polar),
  both clamped to avoid gimbal flip; `look_at(_pivot, Vector3.UP)` keeps "up
  stays up".

**Tests** (`godot/tests/test_camera_controls.gd` — 8 tests):
- `test_initial_theta_is_near_top_down` — `_theta < PI/4`.
- `test_initial_distance_is_positive` — `_distance > 0`.
- `test_scroll_up_decreases_distance` — distance drops after WHEEL_UP event.
- `test_scroll_down_increases_distance` — distance grows after WHEEL_DOWN event.
- `test_orbit_horizontal_drag_changes_phi` — `_phi` changes after middle-mouse
  horizontal drag.
- `test_orbit_vertical_drag_changes_theta` — `_theta` changes after vertical
  drag.
- `test_set_pivot_updates_state` — `set_pivot()` stores new `_pivot` and
  `_distance`.
- `test_zoom_clamped_at_minimum` — 200 WHEEL_UP events cannot push `_distance`
  below `min_distance`.

