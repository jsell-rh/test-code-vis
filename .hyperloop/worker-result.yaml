## Additional Implementation Checks

**main.gd `_ready()` not a stub**: Full FileAccess.open() + JSON parse +
`build_from_graph()` call confirmed. Scene building creates Node3D anchors,
BoxMesh volumes, Label3D labels, ImmediateMesh edge lines, and CylinderMesh
arrowhead cones. Not a stub. ✓

**Arrowhead cone (direction visually indicated)**: `_create_edge()` in `main.gd`
creates a `CylinderMesh` with `top_radius = 0.0` (pointed tip) as an explicit
arrowhead, oriented along the edge direction via `Basis(Quaternion(Vector3.UP, dir))`.
Satisfies "direction is visually indicated" — explicit rendering element. ✓

**Label3D legibility**: `billboard = BaseMaterial3D.BILLBOARD_ENABLED` and
`pixel_size = 0.012` set on every Label3D in `_create_volume()`. Confirmed by
`godot-label3d.sh` exit 0. ✓

**RMB orbit trigger**: `_handle_button()` routes `MOUSE_BUTTON_RIGHT` press to
`begin_orbit_at_world_point()` which sets `_pivot = world_pt`. Confirmed by
`test_orbit_uses_right_mouse_button` (phi changes on RMB drag). ✓

**Smooth zoom implementation**: `_process()` uses `lerpf(_distance, _target_distance, t)`
with exponential `t = 1.0 - pow(0.05, delta * zoom_smooth)`. Scroll only changes
`_target_distance`; actual `_distance` follows across frames. ✓

**Commit trailers**: Every implementation commit carries both
`Spec-Ref: specs/prototype/ux-polish.spec.md@<hash>` and `Task-Ref: task-024`. ✓

**Scope check**: `check-not-in-scope.sh` exits 0 with "OK: No prohibited (not-in-scope)
features detected." ✓

