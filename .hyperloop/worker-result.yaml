### Requirement: Abstract Visual Language — COVERED

**Spec:** The prototype MUST use abstract volumes (boxes, spheres, or similar primitives)
rather than metaphorical representations.

**Scenario: Visual representation**

| THEN-clause | Implementation | Test |
|---|---|---|
| Appears as labeled geometric volume | `main.gd::_create_volume()`: BoxMesh + Label3D per node | `test_scene_graph_loading.gd::test_mesh_instances_exist_in_anchors` |
| Size reflects relative complexity | `extractor.py::size_from_loc()` → `nd["size"]` → `BoxMesh.size` proportional | `test_size_encoding.gd::test_mesh_sizes_proportional_to_metric` |
| Position reflects coupling | `extractor.py::compute_layout()` coupling-aware ring order | `test_extractor.py::TestLayout::test_coupled_bcs_are_closer_than_uncoupled` + `test_extractor.py::TestLayout::test_complexity_and_coupling_both_reflected` |
| Containment shown by nesting | `main.gd::build_from_graph()` adds module anchor as child of context anchor | `test_containment_rendering.gd::test_module_parented_inside_context` |

---

### Requirement: Readable Labels — COVERED

**Spec:** The prototype MUST label all visible structural elements with their names.

**Scenario: Identifying a module**

| THEN-clause | Implementation | Test |
|---|---|---|
| Module name visible as text label | `main.gd::_create_volume()`: `label.text = nd["name"]` | `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` |
| Label remains readable at current zoom | `label.billboard = BILLBOARD_ENABLED`, `pixel_size = 0.012`, `no_depth_test = true` | `test_scene_graph_loading.gd::test_labels_are_billboard_and_readable` |

