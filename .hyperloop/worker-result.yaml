**Scenario: Decoupled pipeline — tests verified:**

| THEN clause | Test function | File |
|---|---|---|
| Godot does not need access to extractor | `test_nodes_list_is_returned` | test_scene_graph_loader.gd |
| JSON file is self-contained | `test_metadata_is_returned` | test_scene_graph_loader.gd |
| JSON file is self-contained (missing keys) | `test_missing_top_level_keys_default_to_empty` | test_scene_graph_loader.gd |

All tests in `test_scene_graph_loader.gd` use inline `_make_fixture()` dictionaries
